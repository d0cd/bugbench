# Reference configuration — loaded at runtime by evaluate_tool() for
# per-tool timeout_seconds. Other values document defaults.

tools:
  copilot:
    type: pr
    display_name: GitHub Copilot
    timeout_seconds: 600

  greptile:
    type: pr
    display_name: Greptile
    timeout_seconds: 600

  coderabbit:
    type: pr
    display_name: CodeRabbit
    timeout_seconds: 600

  agent:
    type: agent-api
    display_name: Claude Agent (API)
    model: claude-sonnet-4-6
    max_turns: 10
    timeout_seconds: 600

  agent-gemini:
    type: agent-api
    display_name: Gemini Agent (API)
    model: gemini-2.5-flash
    max_turns: 10
    timeout_seconds: 600

  agent-openai:
    type: agent-api
    display_name: OpenAI Agent (API)
    model: o4-mini
    max_turns: 10
    timeout_seconds: 600

  agent-cli-claude:
    type: agent-cli
    display_name: Claude Code CLI
    timeout_seconds: 600

  agent-cli-gemini:
    type: agent-cli
    display_name: Gemini CLI
    timeout_seconds: 600

  agent-cli-codex:
    type: agent-cli
    display_name: OpenAI Codex CLI
    timeout_seconds: 600

  agent-sdk:
    type: agent-sdk
    display_name: Claude Agent SDK
    model: claude-sonnet-4-6
    max_turns: 10
    timeout_seconds: 600

  agent-sdk-2pass:
    type: agent-sdk-2pass
    display_name: Claude Two-Pass (explorer + reviewer)
    model: claude-sonnet-4-6
    max_turns: 30
    timeout_seconds: 900

  agent-sdk-v3:
    type: agent-sdk-v3
    display_name: Claude Agent SDK v3 (Enhanced Review)
    model: claude-opus-4-6
    max_turns: 40
    timeout_seconds: 900

repos:
  ProvableHQ/snarkVM:
    language: rust
    domain: blockchain
  ProvableHQ/snarkOS:
    language: rust
    domain: blockchain
  ProvableHQ/leo:
    language: rust
    domain: compiler
  AleoNet/sdk:
    language: rust
    domain: sdk

scoring:
  judge_model: claude-haiku-4-5
  judge_temperature: 0
  mechanical_tolerance: 10
  contamination_threshold: 0.5

defaults:
  concurrency: 5
  mine_limit: 200
  mine_since: "2023-01-01"
  # Agent evaluation defaults (override via env vars)
  agent_model: claude-sonnet-4-6      # AGENT_MODEL
  agent_max_tokens: 4096              # AGENT_MAX_TOKENS
  cost_ceiling_usd: 2.0              # COST_CEILING_USD
  api_timeout_seconds: 120.0          # API_TIMEOUT_SECONDS
