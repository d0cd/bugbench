{% extends "base.html" %}
{% block title %}Score Review — {{ run_id }} — bugeval{% endblock %}
{% block content %}
<div class="nav-arrows">
  <a href="/metrics/{{ run_id }}" class="btn btn-secondary btn-sm">← Back to Metrics</a>
</div>

<h1>Score Review <span class="text-muted">{{ run_id }}</span></h1>

<div class="filter-bar" id="filter-bar">
  <select id="filter-tool"><option value="">All tools</option></select>
  <select id="filter-score">
    <option value="">All scores</option>
    <option value="0">0 — missed</option>
    <option value="1">1 — wrong-area</option>
    <option value="2">2 — correct-id</option>
    <option value="3">3 — correct-id-and-fix</option>
  </select>
  <label style="font-size:13px;">
    <input type="checkbox" id="filter-disagree"> Show disagreements only
  </label>
</div>

<table id="scores-table">
  <thead>
    <tr>
      <th>Case</th>
      <th>Tool</th>
      <th>Score</th>
      <th>Reasoning</th>
      <th>Comments</th>
      <th>TP</th>
      <th>FP</th>
      <th>Votes</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="scores-body">
    <tr><td colspan="9" class="text-muted">Loading...</td></tr>
  </tbody>
</table>

<div class="pagination" id="pagination"></div>

<!-- Inline override form (hidden by default) -->
<div id="override-form" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;background:var(--color-card);border:1px solid var(--color-border);border-radius:var(--radius);padding:24px;min-width:320px;box-shadow:0 8px 24px rgba(0,0,0,0.15);">
  <h2>Human Score Override</h2>
  <p id="override-label" class="text-muted" style="margin-bottom:12px;"></p>
  <div class="form-row" style="margin-bottom:10px;">
    <label>Score</label>
    <select id="override-score">
      <option value="0">0 — missed</option>
      <option value="1">1 — wrong-area</option>
      <option value="2">2 — correct-id</option>
      <option value="3">3 — correct-id-and-fix</option>
    </select>
  </div>
  <div class="form-row" style="margin-bottom:10px;">
    <label>Notes</label>
    <input type="text" id="override-notes" placeholder="Optional reason">
  </div>
  <div class="actions-bar">
    <button class="btn btn-primary" onclick="submitOverride()">Save</button>
    <button class="btn btn-secondary" onclick="closeOverride()">Cancel</button>
  </div>
</div>

<script>
const runId = '{{ run_id }}';
let currentPage = 1;
let overrideCaseId = '';
let overrideTool = '';

function loadScores() {
  const tool = document.getElementById('filter-tool').value;
  const score = document.getElementById('filter-score').value;
  const disagree = document.getElementById('filter-disagree').checked;
  let url = '/api/runs/' + runId + '/scores?page=' + currentPage + '&per_page=50';
  if (tool) url += '&tool=' + encodeURIComponent(tool);
  if (score) url += '&score=' + encodeURIComponent(score);
  if (disagree) url += '&disagreement=true';

  fetch(url).then(r => r.json()).then(data => {
    // Populate tool filter on first load
    const toolSel = document.getElementById('filter-tool');
    if (toolSel.options.length <= 1 && data.tools.length > 0) {
      data.tools.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t; opt.textContent = t;
        toolSel.appendChild(opt);
      });
    }

    const tbody = document.getElementById('scores-body');
    if (data.scores.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="text-muted">No scores match filters.</td></tr>';
    } else {
      tbody.innerHTML = data.scores.map(s => {
        const bc = ['badge-red','badge-yellow','badge-blue','badge-green'][s.score] || 'badge-gray';
        const reason = s.reasoning.length > 100 ? s.reasoning.substring(0, 100) + '...' : s.reasoning;
        return '<tr>' +
          '<td><a href="/metrics/' + runId + '/scores/' + s.case_id + '/' + s.tool + '">' + s.case_id + '</a></td>' +
          '<td>' + s.tool + '</td>' +
          '<td><span class="badge ' + bc + '">' + s.score + '</span></td>' +
          '<td class="text-muted" title="' + s.reasoning.replace(/"/g, '&quot;') + '">' + reason + '</td>' +
          '<td>' + s.comment_count + '</td>' +
          '<td>' + s.tp_count + '</td>' +
          '<td>' + s.fp_count + '</td>' +
          '<td>' + s.votes.join(', ') + '</td>' +
          '<td><button class="btn btn-sm btn-secondary" onclick="openOverride(\'' + s.case_id + '\',\'' + s.tool + '\')">Override</button>' +
          ' <a href="/metrics/' + runId + '/compare/' + s.case_id + '" class="btn btn-sm btn-secondary">Compare</a></td>' +
          '</tr>';
      }).join('');
    }

    // Pagination
    const pg = document.getElementById('pagination');
    pg.innerHTML = '';
    for (let i = 1; i <= data.pages; i++) {
      const el = document.createElement(i === data.page ? 'span' : 'a');
      el.textContent = i;
      if (i === data.page) el.className = 'current';
      else { el.href = '#'; el.onclick = function(e) { e.preventDefault(); currentPage = i; loadScores(); }; }
      pg.appendChild(el);
    }
  });
}

function openOverride(caseId, tool) {
  overrideCaseId = caseId;
  overrideTool = tool;
  document.getElementById('override-label').textContent = caseId + ' / ' + tool;
  document.getElementById('override-form').style.display = 'block';
}

function closeOverride() {
  document.getElementById('override-form').style.display = 'none';
}

function submitOverride() {
  const score = parseInt(document.getElementById('override-score').value);
  const notes = document.getElementById('override-notes').value;
  fetch('/api/runs/' + runId + '/scores/' + overrideCaseId + '/' + overrideTool + '/human', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({score: score, notes: notes})
  }).then(r => {
    if (r.ok) { closeOverride(); loadScores(); }
    else { alert('Failed to save override'); }
  });
}

document.getElementById('filter-tool').onchange = function() { currentPage = 1; loadScores(); };
document.getElementById('filter-score').onchange = function() { currentPage = 1; loadScores(); };
document.getElementById('filter-disagree').onchange = function() { currentPage = 1; loadScores(); };

loadScores();
</script>
{% endblock %}
