{% extends "base.html" %}
{% block title %}Model Comparison — {{ case_id }} — bugeval{% endblock %}
{% block content %}
<div class="nav-arrows">
  <a href="/metrics/{{ run_id }}/review" class="btn btn-secondary btn-sm">← Back to Score Review</a>
  <a href="/cases/{{ case_id }}" class="btn btn-secondary btn-sm">View Case</a>
</div>

<h1>Model Comparison <span class="text-muted">{{ case_id }}</span></h1>

<div class="card" id="case-info">
  <h2>Case Info</h2>
  <p id="case-desc" class="text-muted">Loading...</p>
  <h3>Expected Findings</h3>
  <table id="expected-table">
    <thead><tr><th>File</th><th>Line</th><th>Summary</th></tr></thead>
    <tbody id="expected-body"></tbody>
  </table>
</div>

<div id="tools-container" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:16px;margin-top:16px;">
  <p class="text-muted">Loading tool results...</p>
</div>

<script>
const runId = '{{ run_id }}';
const caseId = '{{ case_id }}';

fetch('/api/runs/' + runId + '/compare/' + caseId)
  .then(r => r.json())
  .then(data => {
    // Case info
    document.getElementById('case-desc').textContent = data.case.description;
    const ebody = document.getElementById('expected-body');
    ebody.innerHTML = data.case.expected_findings.map(f =>
      '<tr><td>' + f.file + '</td><td>' + f.line + '</td><td>' + f.summary + '</td></tr>'
    ).join('');

    // Tool columns
    const container = document.getElementById('tools-container');
    if (data.tools.length === 0) {
      container.innerHTML = '<p class="text-muted">No tool results found for this case.</p>';
      return;
    }
    container.innerHTML = data.tools.map(t => {
      const bc = ['badge-red','badge-yellow','badge-blue','badge-green'][t.score] || 'badge-gray';
      const labels = ['missed','wrong-area','correct-id','correct-id-and-fix'];
      const findings = t.findings.map(f =>
        '<div class="finding-row"><strong>' + f.file + ':' + f.line + '</strong>' +
        (f.confidence !== null ? ' <span class="badge badge-gray">conf: ' + Math.round(f.confidence * 100) + '%</span>' : '') +
        '<div style="font-size:13px;margin-top:4px;">' + f.summary + '</div></div>'
      ).join('');
      return '<div class="card">' +
        '<h2>' + t.tool + '</h2>' +
        '<div style="margin-bottom:12px;"><span class="badge ' + bc + '">' + t.score + ' — ' + (labels[t.score] || '?') + '</span>' +
        ' <span class="text-muted">' + t.tp_count + ' TP / ' + t.fp_count + ' FP / ' + t.comment_count + ' comments</span></div>' +
        '<h3>Findings</h3>' +
        (findings || '<p class="text-muted">No findings.</p>') +
        '<h3>Judge Reasoning</h3>' +
        '<p style="font-size:13px;">' + t.reasoning + '</p>' +
        '</div>';
    }).join('');
  })
  .catch(() => {
    document.getElementById('tools-container').innerHTML = '<p class="text-muted">Failed to load comparison data.</p>';
  });
</script>
{% endblock %}
