<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}bugeval dashboard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', 'SF Mono', monospace;
      --color-ink: #0f0f0f;
      --color-ink-2: #333;
      --color-ink-3: #666;
      --color-ink-muted: #999;
      --color-surface: #fafaf9;
      --color-card: #fff;
      --color-border: #e8e6e3;
      --color-border-light: #f2f0ed;
      --color-accent: #1a1a1a;
      --color-accent-hover: #3a3a3a;
      --color-green: #1a6b3c;
      --color-green-bg: #edf7f0;
      --color-amber: #8a6500;
      --color-amber-bg: #fef9eb;
      --color-red: #b42525;
      --color-red-bg: #fdf0f0;
      --color-blue: #1a5fb4;
      --color-blue-bg: #eef4fc;
      --color-gray-bg: #f3f2f0;
      --radius: 8px;
      --radius-sm: 5px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); font-size: 14px; line-height: 1.6; color: var(--color-ink); background: var(--color-surface); -webkit-font-smoothing: antialiased; }

    /* Nav */
    nav { background: var(--color-ink); padding: 0 24px; display: flex; gap: 0; align-items: stretch; height: 48px; }
    nav a { color: rgba(255,255,255,0.6); text-decoration: none; font-weight: 500; font-size: 13px; padding: 0 16px; display: flex; align-items: center; transition: color 0.15s, background 0.15s; border-bottom: 2px solid transparent; }
    nav a:hover { color: #fff; background: rgba(255,255,255,0.05); }
    nav a.active { color: #fff; border-bottom-color: #fff; }
    nav .brand { font-size: 14px; font-weight: 700; color: #fff; padding: 0 20px 0 0; display: flex; align-items: center; letter-spacing: -0.03em; }

    /* Layout */
    main { max-width: 1200px; margin: 32px auto; padding: 0 24px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 20px; color: var(--color-ink); letter-spacing: -0.02em; }
    h2 { font-size: 15px; font-weight: 600; margin: 24px 0 12px; color: var(--color-ink-2); letter-spacing: -0.01em; }
    h3 { font-size: 12px; font-weight: 600; margin: 16px 0 8px; color: var(--color-ink-3); text-transform: uppercase; letter-spacing: 0.06em; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; background: var(--color-card); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--color-border); }
    th { background: var(--color-surface); text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-ink-3); border-bottom: 1px solid var(--color-border); }
    td { padding: 10px 14px; border-bottom: 1px solid var(--color-border-light); font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(0,0,0,0.015); }
    td a { color: var(--color-ink); text-decoration: none; border-bottom: 1px solid var(--color-border); transition: border-color 0.15s; }
    td a:hover { border-bottom-color: var(--color-ink); }

    /* Badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 600; letter-spacing: 0.01em; }
    .badge-green { background: var(--color-green-bg); color: var(--color-green); }
    .badge-yellow { background: var(--color-amber-bg); color: var(--color-amber); }
    .badge-red { background: var(--color-red-bg); color: var(--color-red); }
    .badge-blue { background: var(--color-blue-bg); color: var(--color-blue); }
    .badge-gray { background: var(--color-gray-bg); color: var(--color-ink-3); }

    /* Buttons */
    .btn { display: inline-block; padding: 7px 16px; border-radius: var(--radius-sm); border: 1px solid transparent; cursor: pointer; font-family: var(--font-body); font-size: 13px; text-decoration: none; font-weight: 600; transition: all 0.15s; }
    .btn-primary { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }
    .btn-primary:hover { background: var(--color-accent-hover); }
    .btn-success { background: var(--color-green); color: #fff; }
    .btn-danger { background: var(--color-red); color: #fff; }
    .btn-secondary { background: var(--color-card); color: var(--color-ink-2); border-color: var(--color-border); }
    .btn-secondary:hover { background: var(--color-surface); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* Cards */
    .card { background: var(--color-card); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; border: 1px solid var(--color-border); }

    /* Stat grid */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--color-card); border-radius: var(--radius); padding: 20px 16px; text-align: center; border: 1px solid var(--color-border); }
    .stat-num { font-size: 30px; font-weight: 700; color: var(--color-ink); letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
    .stat-label { font-size: 11px; color: var(--color-ink-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }

    /* Pipeline */
    .pipeline-stage { display: inline-block; padding: 4px 10px; border-radius: var(--radius-sm); margin-right: 4px; font-size: 12px; font-weight: 600; }
    .stage-done { background: var(--color-green-bg); color: var(--color-green); }
    .stage-partial { background: var(--color-amber-bg); color: var(--color-amber); }
    .stage-missing { background: var(--color-red-bg); color: var(--color-red); }

    /* Filters */
    .filter-bar { background: var(--color-card); padding: 12px 14px; border-radius: var(--radius); margin-bottom: 14px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; border: 1px solid var(--color-border); }
    .filter-bar select, .filter-bar input { padding: 6px 10px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font-body); background: var(--color-card); }

    /* Code */
    .diff-block { font-family: var(--font-mono); font-size: 12px; white-space: pre; overflow-x: auto; background: #111; color: #d4d4d4; padding: 16px; border-radius: var(--radius); max-height: 500px; overflow-y: auto; }
    .diff-add { color: #8ee89a; }
    .diff-del { color: #ff9090; }
    .diff-hunk { color: #7cc4ef; }

    /* Forms */
    form.edit-form { display: grid; gap: 10px; }
    .form-row { display: grid; grid-template-columns: 140px 1fr; align-items: start; gap: 8px; }
    .form-row label { font-size: 13px; font-weight: 600; padding-top: 6px; color: var(--color-ink-2); }
    .form-row select, .form-row input[type=text], .form-row textarea { width: 100%; padding: 6px 10px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font-body); }
    .form-row textarea { resize: vertical; min-height: 80px; }
    .actions-bar { display: flex; gap: 8px; margin-top: 14px; }
    .nav-arrows { display: flex; gap: 6px; margin-bottom: 14px; }

    /* Progress bars */
    .progress-bar-wrap { background: var(--color-border-light); border-radius: 3px; height: 6px; overflow: hidden; margin-top: 4px; }
    .progress-bar-fill { height: 100%; background: var(--color-accent); border-radius: 3px; }

    /* Finding rows */
    .finding-row { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; }

    /* Kappa */
    .kappa-display { font-size: 32px; font-weight: 700; padding: 12px 0; }
    .kappa-ok { color: var(--color-green); }
    .kappa-bad { color: var(--color-red); }

    /* Sliders */
    .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .slider-row label { width: 180px; font-size: 13px; font-weight: 600; }
    .slider-row input[type=range] { flex: 1; }
    .slider-val { width: 30px; text-align: center; font-weight: 700; color: var(--color-ink); }

    /* Pagination */
    .pagination { display: flex; gap: 6px; margin-top: 14px; align-items: center; }
    .pagination a, .pagination span { padding: 4px 10px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); text-decoration: none; font-size: 13px; color: var(--color-ink-2); }
    .pagination .current { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }

    /* Misc */
    .score-radio { display: flex; gap: 14px; }
    .score-radio label { cursor: pointer; }
    .text-muted { color: var(--color-ink-muted); font-size: 12px; }
    .mt-8 { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .gap-8 { gap: 8px; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }

    /* Runner group headers */
    .runner-group-header td { background: var(--color-surface); font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-ink-3); padding: 8px 14px;
      border-bottom: 1px solid var(--color-border); }

    /* Alignment badges */
    .badge-aligned { background: var(--color-green-bg); color: var(--color-green); }
    .badge-file-only { background: var(--color-amber-bg); color: var(--color-amber); }
    .badge-misaligned { background: var(--color-red-bg); color: var(--color-red); }

    /* Comparison deltas */
    .delta-up { color: var(--color-green); font-weight: 600; }
    .delta-down { color: var(--color-red); font-weight: 600; }
    .delta-flat { color: var(--color-ink-muted); }

    /* Distribution bars */
    .dist-bar { display: flex; align-items: center; gap: 8px; }
    .dist-bar-fill { height: 14px; background: var(--color-accent); border-radius: 3px; min-width: 2px; opacity: 0.65; }
    .dist-bar-label { font-size: 11px; color: var(--color-ink-muted); white-space: nowrap; font-variant-numeric: tabular-nums; }

    /* Report content */
    .report-content h2 { font-size: 16px; font-weight: 600; margin: 24px 0 10px; color: var(--color-ink-2); }
    .report-content table { font-size: 13px; margin: 8px 0 16px; }
    .report-content p { margin: 6px 0; line-height: 1.65; }
    .report-content { overflow-x: auto; }

    /* Comment classifications */
    .badge-tp { background: var(--color-green-bg); color: var(--color-green); }
    .badge-fp { background: var(--color-red-bg); color: var(--color-red); }
    .badge-lv { background: var(--color-gray-bg); color: var(--color-ink-3); }

    /* Chart images */
    .chart-img { max-width: 100%; border-radius: var(--radius); border: 1px solid var(--color-border); margin: 12px 0; }

    /* Two-column layout */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<nav>
  <span class="brand">bugeval</span>
  <a href="/">Home</a>
  <a href="/cases">Cases</a>
  <a href="/dataset">Dataset</a>
  <a href="/runs">Runs</a>
  <a href="/golden">Golden Set</a>
  <a href="/human-judge">Human Judge</a>
  <a href="/dx">DX Assessment</a>
  <a href="/metrics">Metrics</a>
  <a href="/compare">Compare</a>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
