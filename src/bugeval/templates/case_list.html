{% extends "base.html" %}
{% block title %}Cases{% endblock %}
{% block content %}
<h1>Cases</h1>
<div class="filter-bar" id="filter-bar">
  <select id="f-repo"><option value="">All repos</option></select>
  <select id="f-kind"><option value="">All kinds</option></select>
  <input type="text" id="f-q" placeholder="Search...">
  <button class="btn btn-sm btn-primary" onclick="loadCases()">Filter</button>
</div>
<div id="cases-table"></div>
<div id="pagination" class="pagination"></div>
<script>
let currentPage = 1;
function loadCases(page) {
  page = page || 1; currentPage = page;
  const repo = document.getElementById('f-repo').value;
  const kind = document.getElementById('f-kind').value;
  const q = document.getElementById('f-q').value;
  const params = new URLSearchParams({repo, kind, q, page, per_page: 50});
  fetch('/api/cases?' + params).then(r => {
    if (!r.ok) throw new Error('API returned ' + r.status);
    return r.json();
  }).then(data => {
    // Populate filters on first load
    const repoSel = document.getElementById('f-repo');
    if (repoSel.options.length <= 1 && data.filters) {
      data.filters.repos.forEach(rp => {
        const o = document.createElement('option'); o.value = rp; o.textContent = rp;
        repoSel.appendChild(o);
      });
      const kindSel = document.getElementById('f-kind');
      data.filters.kinds.forEach(k => {
        const o = document.createElement('option'); o.value = k; o.textContent = k;
        kindSel.appendChild(o);
      });
    }
    function goldenBadge(s) {
      if (s === 'confirmed') return '<span class="badge badge-green">confirmed</span>';
      if (s === 'disputed') return '<span class="badge badge-red">disputed</span>';
      return '<span class="badge badge-gray">unreviewed</span>';
    }
    let html = '<table><tr><th>ID</th><th>Repo</th><th>Kind</th><th>Category</th><th>Difficulty</th><th>Blame</th><th>Golden</th></tr>';
    data.cases.forEach(c => {
      html += `<tr>
        <td><a href="/cases/${c.id}">${c.id}</a></td>
        <td>${c.repo}</td>
        <td><span class="badge ${c.kind==='bug'?'badge-red':'badge-green'}">${c.kind}</span></td>
        <td>${c.category || '-'}</td>
        <td>${c.difficulty || '-'}</td>
        <td>${c.blame_confidence || '-'}</td>
        <td>${goldenBadge(c.golden_status)}</td>
      </tr>`;
    });
    html += '</table>';
    document.getElementById('cases-table').innerHTML = html;
    // Pagination
    let pHtml = '';
    for (let i = 1; i <= data.pages; i++) {
      pHtml += i === data.page
        ? `<span class="current">${i}</span>`
        : `<a href="#" onclick="loadCases(${i});return false;">${i}</a>`;
    }
    document.getElementById('pagination').innerHTML = `<span class="text-muted">${data.total} cases</span> ` + pHtml;
  }).catch(err => {
    document.getElementById('cases-table').innerHTML = '<div class="card text-muted">Failed to load cases: ' + err.message + '</div>';
  });
}
loadCases();
</script>
{% endblock %}
