name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync
      - name: Lint
        run: uv run ruff check src/ tests/
      - name: Format
        run: uv run ruff format --check src/ tests/
      - name: Type check
        run: uv run pyright src/
      - name: Test
        run: uv run pytest --tb=short -q
