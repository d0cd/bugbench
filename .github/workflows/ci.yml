name: CI

# Project is in maintenance mode (see README). The weekly cron exists to
# catch dependency drift early — discover breakage on Monday, not when
# someone returns to the repo months later to fix one thing.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 12 * * 1'  # Mondays 12:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync
      - name: Lint
        run: uv run ruff check src/ tests/
      - name: Format
        run: uv run ruff format --check src/ tests/
      - name: Type check
        run: uv run pyright src/
      - name: Test
        run: uv run pytest --tb=short -q
