description: In the heatmap panel's bucket expansion factor calculation, a division
  by zero occurs when the minimum y value is zero, causing the entire heatmap to fail
  to render when the y-axis max is set to auto. The fix extracts the calculation into
  a separate function that skips invalid (zero) bucket values and falls back to the
  next valid bucket, defaulting to a factor of 1 if none are found.
