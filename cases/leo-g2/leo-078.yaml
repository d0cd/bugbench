description: "The FormatString AST node incorrectly handled console format strings,\
  \ lacking proper escape handling for `{` and `}` brackets and not supporting empty\
  \ string literals. The fix replaces FormatString with a simpler ConsoleArgs node,\
  \ moves format-string parsing to the compiler level, adds bracket escaping via doubling\
  \ (e.g., `{{` \u2192 `{`), and fixes the grammar to allow empty string literals\
  \ while erroring at canonicalization for zero-size arrays."
expected_findings:
- file: ast/src/statements/console/formatted_string.rs
  line: 1
  summary: The FormatString AST node structure is overly complex and handles format
    parsing at the wrong abstraction level; should be replaced with a simpler ConsoleArgs
    node that defers parsing to the compiler.
- file: compiler/src/console/format.rs
  line: 17
  summary: Console format function does not handle escaped braces (`{{` and `}}`)
    and incorrectly processes format string characters, leading to wrong output for
    strings containing literal braces.
- file: grammar/abnf-grammar.txt
  line: 555
  summary: Grammar rule for string-literal does not allow empty strings (missing `*`
    quantifier on string-literal-element), causing parse failures for empty string
    literals.
