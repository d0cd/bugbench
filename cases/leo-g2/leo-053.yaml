description: Returning a multidimensional array from a function failed when the declared
  return type and the actual value used different but semantically equivalent array
  syntax (e.g., nested `[[u8; 2]; 3]` vs tuple `[u8; (3, 2)]`). The fix adds a `match_array_types`
  method to the Type enum that normalizes and compares array dimensions regardless
  of syntax, and uses it in the return statement type checker and value matching.
expected_findings:
- file: compiler/src/statement/return_/return_.rs
  line: 30
  summary: Return type check uses strict equality instead of semantic array type matching;
    equivalent array syntaxes (nested vs tuple) are incorrectly rejected
- file: compiler/src/value/value.rs
  line: 108
  summary: Array value matching does not account for equivalent multidimensional array
    type representations, causing false type mismatches on return
- file: typed/src/types/type_.rs
  line: 58
  summary: Missing match_array_types method to compare array types across nested and
    tuple dimension syntaxes
