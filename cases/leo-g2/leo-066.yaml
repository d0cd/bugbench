description: The SSA pass incorrectly attempted to rename paths to external global
  variables (e.g., `child.aleo/foo`) when the global name matched a local variable
  name (e.g., `let foo = ...`). This was especially problematic for external mapping
  accesses inside loops. The fix adds a `try_local_symbol()` guard so SSA renaming
  only applies to local symbols, and also fixes type inference for `get_or_use` with
  unsuffixed numeric literals.
expected_findings:
- file: compiler/passes/src/static_single_assignment/expression.rs
  line: 211
  summary: SSA renaming should only apply to local symbols. Before this fix, the code
    did not check `path.try_local_symbol()` and would incorrectly attempt to SSA-rename
    paths referencing external global variables when they share a name with a local
    variable.
- file: compiler/passes/src/type_checking/visitor.rs
  line: 309
  summary: Type checking for mapping intrinsics (e.g., get_or_use) did not properly
    infer types for unsuffixed numeric arguments. The destructuring and type propagation
    pattern for [container, key] arguments needs to match the corrected intrinsic
    type-checking pattern.
- file: compiler/passes/src/type_checking/visitor.rs
  line: 735
  summary: Mapping operations (get_or_use, set, etc.) need consistent type-checking
    patterns to properly infer types for default value arguments, especially unsuffixed
    numeric literals.
