description: The Leo language tokenizer/lexer incorrectly handled block comment parsing,
  producing malformed block comments. The bug was in the length calculation logic
  at lexer.rs line 396, where the code used an EOL-based length computation (`let
  len = if let Some(eol) = eol`) that did not correctly account for multi-line block
  comment boundaries, causing incorrect tokenization.
