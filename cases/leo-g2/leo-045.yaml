description: The Leo parser/tokenizer was missing symbol definitions and token-to-symbol
  mappings for ampersand (`&`) and at (`@`) characters. This caused parse failures
  when these symbols appeared in input files. The fix adds the missing symbol entries
  in `span/src/symbol.rs`, the `Token::At` mapping in the tokenizer, and supporting
  AST/parser changes.
expected_findings:
- file: span/src/symbol.rs
  line: 101
  summary: "Missing symbol definition for `Ampersand: \"&\"` \u2014 the symbols table\
    \ lacks an entry for the ampersand character, causing it to be unrecognized during\
    \ parsing."
- file: parser/src/tokenizer/token.rs
  line: 200
  summary: "Missing `Token::At => sym::At` mapping in token-to-symbol conversion \u2014\
    \ the `@` token has no corresponding symbol, so it cannot be correctly represented\
    \ in the AST."
- file: parser/src/parser/input.rs
  line: 57
  summary: "Missing `span: section.span` field when constructing input AST node \u2014\
    \ section span not propagated, leading to incorrect or missing source location\
    \ information."
