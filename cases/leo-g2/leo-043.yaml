description: 'The Leo compiler''s type checker had multiple gaps: it did not verify
  that both arms of a ternary expression had matching types (check_expressions.rs),
  did not track or enforce that functions have return statements (missing `has_return`
  field in checker.rs and corresponding checks in check_statements.rs), and did not
  catch references to non-existent variables in certain expression contexts. The fix
  adds a `has_return` boolean to the type checker state, sets it in return/conditional
  statements, adds type-matching checks for ternary/binary expressions, and introduces
  a new error for missing returns.'
expected_findings:
- file: compiler/passes/src/type_checker/checker.rs
  line: 26
  summary: Type checker struct is missing a `has_return` field to track whether a
    function body contains a return statement, allowing functions without returns
    to pass type checking silently.
- file: compiler/passes/src/type_checker/check_expressions.rs
  line: 226
  summary: Ternary expression type checking does not compare the types of both arms
    (`Some(t1)` vs `Some(t2)`), allowing type-mismatched ternary expressions (e.g.,
    group ternaries) to pass without error.
- file: compiler/passes/src/type_checker/check_statements.rs
  line: 31
  summary: Return statement visitor does not set `has_return = true` on the checker,
    so the type checker cannot detect functions that are missing return statements.
