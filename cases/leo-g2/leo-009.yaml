description: 'External structs referenced in async functions were not handled correctly
  because the `program: Symbol` context was not being propagated when constructing
  function stubs. The fix adds the `program` parameter to the relevant function stub
  construction paths (around lines 258 and 274 in function_stub.rs) so that external
  struct references are properly resolved in async function contexts.'
expected_findings:
- file: compiler/ast/src/stub/function_stub.rs
  line: 258
  summary: "Missing `program: Symbol` parameter when constructing function stub \u2014\
    \ external struct references in async functions will fail to resolve the owning\
    \ program"
- file: compiler/ast/src/stub/function_stub.rs
  line: 274
  summary: "Missing `program: Symbol` parameter in second stub construction path \u2014\
    \ same issue as line 258, external program context is lost for async functions"
