description: The `!=` (not-equals) operator's `BinaryOperation::Ne` match arm in the
  pest AST conversion caused infinite recursion (stack overflow). The Ne case likely
  called itself recursively instead of properly constructing the not-equals expression,
  creating an infinite loop. The fix corrects the Ne arm to properly convert the expression
  without self-recursion.
