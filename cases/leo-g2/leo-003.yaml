description: The Leo compiler's ASG layer did not enforce const variable semantics,
  allowing variables declared as `const` to be reassigned without producing an error.
  The fix adds a validation check in the definition statement handler to detect invalid
  const assignments and introduces a new `invalid_const_assign` error type. Test files
  were updated to use `let` instead of `const` where mutability was needed.
expected_findings:
- file: asg/src/statement/definition.rs
  line: 75
  summary: 'Missing enforcement of const semantics: no check exists to verify that
    variables declared as `const` are not reassigned or that their initializer is
    a constant expression.'
- file: asg/src/error/mod.rs
  line: 172
  summary: No error variant exists for invalid const assignment, so the compiler silently
    accepts reassignment of const variables.
