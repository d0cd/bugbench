description: The Leo compiler's type checker and static analyzer did not properly
  validate Future type usage, allowing invalid patterns like futures in tuples, incorrect
  future parameter types, and improper future consumption to pass compilation without
  errors. The fix introduces a dedicated future_checker static analysis pass and tightens
  type checking at multiple points where futures are created, consumed, and passed
  as parameters.
expected_findings:
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 147
  summary: "Future consumption logic is incorrect or missing \u2014 futures used in\
    \ expressions are not properly tracked, allowing invalid future access patterns\
    \ to go undetected."
- file: compiler/passes/src/type_checking/checker.rs
  line: 1220
  summary: "Incorrect handling of Future type matching for input variables \u2014\
    \ `matches!(&input_var.type_(), Type::Future(_))` check is insufficient or misplaced,\
    \ failing to properly validate future parameters in async functions/transitions."
- file: compiler/passes/src/static_analysis/analyze_program.rs
  line: 39
  summary: "Static analysis for async functions/transitions does not include future\
    \ validation \u2014 missing dedicated future checking pass that should verify\
    \ futures are properly consumed and not misused (e.g., placed in tuples or accessed\
    \ as tuple elements)."
