description: The Leo compiler did not validate that loop iteration ranges (start and
  end bounds) are constant expressions. In a ZK circuit language, loops must be unrollable
  at compile time, so variable bounds are invalid. The fix adds a constness check
  in the ASG iteration statement construction and appropriate compiler errors.
expected_findings:
- file: asg/src/statement/iteration.rs
  line: 57
  summary: Missing validation that loop range start/end bounds are constant expressions.
    Variable loop bounds should be rejected since ZK circuits require compile-time
    unrollable loops.
- file: compiler/src/compiler.rs
  line: 224
  summary: No error path for non-constant loop range bounds when parsing/compiling
    programs. Should surface a compiler error when iteration bounds are not const.
