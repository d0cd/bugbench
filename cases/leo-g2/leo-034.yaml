description: The disassembler incorrectly used the locator's program name (`loc.name()`)
  instead of the locator's resource name (`loc.resource()`) when building record identifiers
  for nested stubs. This caused a panic when compiling programs with nested records
  as function inputs, because the wrong name was used to look up the record type.
expected_findings:
- file: compiler/ast/src/stub/function_stub.rs
  line: 240
  summary: 'Wrong locator accessor: uses `loc.name()` (program name) instead of `loc.resource()`
    (record/type name) when constructing the Identifier for a nested record stub,
    causing lookup failures and panics.'
- file: compiler/passes/src/type_checking/checker.rs
  line: 1186
  summary: "Type checker does not properly handle nested records as function I/O \u2014\
    \ the record-as-input validation needs to account for records from external programs\
    \ passed through nested structs."
