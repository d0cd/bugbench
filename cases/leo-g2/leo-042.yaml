description: The SSA (Static Single Assignment) pass incorrectly folded ternary expressions
  when handling early return statements with guard conditions. The fix corrects how
  guard conditions are matched and combined with accumulated ternary expressions in
  rename_program.rs, and updates the ternary display format in ternary.rs to include
  parentheses for correctness.
expected_findings:
- file: compiler/passes/src/static_single_assignment/rename_program.rs
  line: 56
  summary: 'Incorrect ternary folding logic: guard condition matching with (expr,
    acc) pair does not correctly combine nested ternary expressions for early returns'
- file: compiler/passes/src/static_single_assignment/rename_program.rs
  line: 78
  summary: 'Same ternary folding bug in second match arm: guard-based accumulation
    of ternary expressions produces incorrect SSA form for multiple early returns'
- file: compiler/ast/src/expressions/ternary.rs
  line: 31
  summary: Ternary Display implementation missing parentheses around expression, which
    can cause incorrect precedence in nested ternary folding during SSA
