description: The compiler could not handle NonScalar character values (e.g., surrogate
  code points like \u{DDDD}), leading to incorrect behavior or crashes when processing
  strings containing non-Unicode-scalar characters. The fix introduces a CharValue
  enum distinguishing Scalar from NonScalar characters throughout the AST, ASG, parser,
  and compiler, and updates the output file format to label each character accordingly.
expected_findings:
- file: ast/src/expression/value.rs
  line: 17
  summary: Char type lacks distinction between Scalar and NonScalar values, causing
    NonScalar characters (e.g. surrogate code points) to be mishandled or rejected
- file: compiler/src/value/char/char.rs
  line: 31
  summary: Char representation does not account for NonScalar character types, leading
    to incorrect constraint generation for non-Unicode-scalar code points
- file: compiler/src/output/mod.rs
  line: 22
  summary: Output serialization does not distinguish Scalar vs NonScalar characters,
    producing incorrect output format for strings containing surrogate or non-scalar
    code points
