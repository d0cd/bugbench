description: Error messages from the Leo compiler's input and state file parsers did
  not include the file path, making it impossible for users to identify which file
  caused the error. The fix threads file paths through parse_input, read_from methods
  (now returning (String, PathBuf) tuples), and adds set_path methods to error types
  so errors display the originating file.
expected_findings:
- file: compiler/src/compiler.rs
  line: 68
  summary: parse_input does not accept or propagate a file path, so any parsing errors
    lack file context for the user
- file: package/src/inputs/input.rs
  line: 49
  summary: read_from should return the file path alongside the content string so callers
    can attach it to error messages
- file: compiler/src/errors/compiler.rs
  line: 67
  summary: CompilerError variants do not call set_path on inner errors, so file path
    information is lost in error display
