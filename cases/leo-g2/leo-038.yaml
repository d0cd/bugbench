description: Code generation for ExpressionStatements (standalone function calls used
  as statements) was broken. The visit_statements.rs handler for Expression::Call
  within expression statements was incorrect or missing, and the external call instruction
  format in visit_expressions.rs needed to include the '.aleo' suffix for external
  program references. This caused the Leo compiler to generate invalid Aleo instructions
  for standalone call expressions.
expected_findings:
- file: compiler/passes/src/code_generation/visit_statements.rs
  line: 128
  summary: "Expression::Call in ExpressionStatement is not properly handled \u2014\
    \ standalone call expressions used as statements produce incorrect or missing\
    \ code generation output"
- file: compiler/passes/src/code_generation/visit_expressions.rs
  line: 280
  summary: "External call instruction format is incorrect \u2014 should use format\
    \ 'call {external}.aleo/{function}' to properly reference external program calls"
- file: compiler/passes/src/code_generation/visit_expressions.rs
  line: 304
  summary: "Same external call formatting bug \u2014 missing '.aleo' suffix in generated\
    \ call instruction for external programs"
