description: 'The Logos lexer''s #[token] attribute only matches exact string literals,
  but the tokenizer definitions for group::*, signature::*, and Future::* paths incorrectly
  used #[token(r"...[a-zA-Z]...")] with regex metacharacters instead of #[regex(...)].
  This meant these patterns never matched real code like group::GEN or signature::verify,
  preventing them from being classified as IdVariants::Path as the grammar expects.'
expected_findings:
- file: compiler/parser-lossless/src/tokens.rs
  line: 109
  summary: 'Incorrect use of #[token] attribute with regex pattern; #[token] matches
    exact strings only and will not interpret character classes like [a-zA-Z]. Should
    use #[regex] instead to match patterns like group::[a-zA-Z][a-zA-Z0-9_]*.'
