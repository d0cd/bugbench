description: The `leo build` command wrote a generic `main.leo` program name instead
  of the actual program being built, and `leo add` did not prevent adding local dependencies
  with duplicate paths. The fix corrects the program name propagation in build and
  adds duplicate-path detection in add, overwriting the old dependency in favor of
  the new one.
expected_findings:
- file: leo/cli/commands/build.rs
  line: 193
  summary: Uses a generic/incorrect program name (e.g., 'main.leo') instead of the
    actual program name being built; should pass the correct program_name derived
    from the package.
- file: leo/cli/commands/add.rs
  line: 50
  summary: Missing check for duplicate local dependency paths; adding a local dependency
    with the same path as an existing one should detect the conflict and overwrite
    rather than silently duplicating.
