description: Function inlining produced output with variable shadowing because SSA
  (Static Single Assignment) renaming was not applied to the reconstructed block after
  each inline operation. The fix runs the SSA forming visitor with rename-defs on
  the inlined block to ensure all variables have unique names, preventing shadowing
  conflicts.
expected_findings:
- file: compiler/passes/src/function_inlining/ast.rs
  line: 60
  summary: After inlining a function call, the reconstructed block is not passed through
    SSA renaming, allowing variable shadowing when the same variable names exist in
    the caller and callee or across multiple inlined calls.
- file: compiler/compiler/src/compiler.rs
  line: 169
  summary: The compiler pipeline does not account for the fact that function inlining
    can re-introduce non-SSA variable names, requiring an additional SSA pass or inline-time
    renaming to prevent shadowing.
