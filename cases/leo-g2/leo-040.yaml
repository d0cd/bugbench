description: The compiler's flattening pass did not account for conditional context
  when processing `console` statements (e.g., `console.assert()`). Assertions inside
  `if/else` blocks were emitted without being guarded by the branch condition, causing
  them to execute unconditionally. The fix wraps console statement expressions with
  the appropriate branch condition during flattening.
expected_findings:
- file: compiler/passes/src/flattening/flatten_statement.rs
  line: 209
  summary: "Console statements inside conditional blocks are not guarded by the branch\
    \ condition during flattening \u2014 `console.assert(expr)` inside `if cond` should\
    \ become `console.assert(!cond || expr)` but is emitted as-is."
- file: compiler/passes/src/flattening/flatten_statement.rs
  line: 110
  summary: When flattening conditional statements, the reconstruction of the then/else
    blocks does not handle console statements, causing them to bypass the condition
    guard.
