description: The `--nodeploy` flag for `leo node start` was not declared as a proper
  structopt argument, requiring users to pass it via the raw argument separator (`--
  --nodeploy`). The fix adds `#[structopt(long)]` to the field in the Node command
  struct and updates the Aleo dependency revision, making `--nodeploy` a first-class
  CLI flag.
expected_findings:
- file: leo/commands/node.rs
  line: 30
  summary: Missing `#[structopt(long)]` attribute on the `nodeploy` field, causing
    the flag to not be recognized as a proper CLI argument and requiring the `--`
    separator.
