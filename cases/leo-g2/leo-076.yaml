description: 'Multiple parser bugs in the Leo compiler: the lexer panicked or produced
  incorrect errors on unexpected EOF after special characters (backslash, dollar,
  escape sequences, etc.), array dimension parsing incorrectly handled single-dimension
  cases, and variable definition statements with parenthesized names were parsed incorrectly.
  Fixes include proper EOF boundary checks in the lexer, corrected array dimension
  logic in the type parser, and updated definition parsing in the statement parser
  and AST.'
expected_findings:
- file: compiler/parser/src/tokenizer/lexer.rs
  line: 46
  summary: Lexer does not properly guard against EOF when processing escape sequences,
    causing panics on inputs like a trailing backslash, dollar sign, or incomplete
    unicode escape at end of file.
- file: compiler/parser/src/parser/type_.rs
  line: 75
  summary: Array dimension handling has incorrect logic for single-dimension arrays
    (e.g., wrong branch condition `dims.len() == 1`), leading to malformed array types
    or incorrect error messages.
- file: compiler/parser/src/parser/statement.rs
  line: 295
  summary: Definition statement parsing with `peek_is_left_par()` incorrectly handles
    parenthesized variable names, producing wrong AST nodes for let/const declarations
    with tuple destructuring.
