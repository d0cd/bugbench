description: The type checker in the Leo compiler was missing type-checking for multiplication
  (`Mul`) expressions. While other binary arithmetic operations (add, subtract, etc.)
  verified that both operands had compatible types, the `Mul` case was skipped, allowing
  type mismatches and references to non-existent variables in multiplication expressions
  to go undetected. The fix adds the same operand type-compatibility checks to `Mul`
  that other arithmetic operators already had.
expected_findings:
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 172
  summary: 'Missing type-check for Mul binary operation: multiplication expressions
    skip the operand type compatibility check that other arithmetic operators perform,
    allowing type mismatches to pass silently.'
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 183
  summary: The block handling binary operations does not include Mul in its match
    arms for verifying both operands have the same type, leaving multiply expressions
    unchecked.
