description: Leo's ASG (Abstract Semantic Graph) did not check for duplicate variable
  definitions within the same scope, allowing variable shadowing that should have
  been a compile-time error. The fix adds a check in the definition statement handler
  to detect when a variable name already exists in the current scope's variables map,
  and raises a new `duplicate_variable_definition` error.
expected_findings:
- file: asg/src/statement/definition.rs
  line: 130
  summary: 'Missing duplicate variable check: variables are inserted into scope.variables
    without first checking if the name already exists, allowing illegal variable shadowing'
- file: asg/src/error/mod.rs
  line: 192
  summary: 'Missing error variant: no error type existed for duplicate variable definitions,
    so the compiler could never report this class of error'
