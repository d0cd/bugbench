description: The interpreter's cursor duplicated futures in its output because the
  futures vector was extended at every processing step of an Element::Expression,
  rather than only on the final step. The fix adds a conditional check (e.g., `if
  user_initiated`) so that futures are only appended once when processing completes,
  preventing duplicate async call entries in the output.
