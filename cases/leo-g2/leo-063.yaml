description: The `PartialEq` implementation for `Identifier` compared fields beyond
  just the name (e.g., span information), while the `Hash` implementation only hashed
  the name. When hash collisions occurred in `IndexMap`, the fallback to `PartialEq`
  incorrectly treated same-named identifiers as different due to differing spans,
  causing duplicate entries. The fix aligned `PartialEq` with `Hash` to compare only
  the semantically meaningful name field, and similarly fixed equality in assignee
  member matching.
expected_findings:
- file: ast/src/common/identifier.rs
  line: 66
  summary: PartialEq implementation compares more fields than Hash (e.g., span), violating
    the contract that k1 == k2 implies hash(k1) == hash(k2) and vice versa for IndexMap
    correctness. PartialEq should match only on name, consistent with Hash.
- file: ast/src/common/identifier.rs
  line: 95
  summary: Eq/PartialEq derive or manual impl includes span or other non-semantic
    fields, causing IndexMap to treat same-name identifiers as distinct on hash collision
    fallback.
- file: compiler/src/statement/assign/assignee/member.rs
  line: 36
  summary: Member matching via `matches()` may use inconsistent equality logic; should
    use the corrected identifier comparison that ignores spans.
