description: 'The circuit instantiation syntax did not support implied variable definitions,
  where a variable name matching a circuit member could be used as shorthand (e.g.,
  `Foo { bar }` instead of `Foo { bar: bar }`). The fix adds a new `CircuitImpliedVariableDefinition`
  AST node and corresponding grammar rule to support this shorthand syntax across
  the grammar, AST, and ASG layers.'
expected_findings:
- file: grammar/src/expressions/circuit_inline_expression.rs
  line: 14
  summary: "Circuit inline expression parser does not handle implied variable members\
    \ \u2014 only explicit `identifier: expression` pairs are parsed, missing the\
    \ shorthand `identifier` form."
- file: ast/src/expression/circuit_init.rs
  line: 19
  summary: CircuitInitExpression members field uses explicit variable definitions
    only; should accept CircuitImpliedVariableDefinition to support shorthand member
    syntax.
- file: grammar/src/leo.pest
  line: 327
  summary: Grammar rule for circuit variable definition does not include an alternative
    for implied (shorthand) variable syntax where only an identifier is provided.
