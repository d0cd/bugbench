description: The code generation pass for core algorithm function calls (BHP, Poseidon,
  etc.) was missing a trailing newline when emitting AVM bytecode instructions. This
  caused multiple instructions to be concatenated on the same line, producing incorrect/unreadable
  bytecode output. The fix adds a newline character to the generated instruction string.
expected_findings:
- file: compiler/passes/src/code_generation/visit_expressions.rs
  line: 297
  summary: 'Missing newline after writing instruction: the writeln!/write! or string
    formatting for core function call instructions does not append a newline, causing
    consecutive instructions to be concatenated on the same line.'
