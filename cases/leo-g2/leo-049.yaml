description: Tuple access validation in the ASG used incorrect size comparison logic,
  causing failures when the expected tuple type had fewer elements than the actual
  tuple. The fix relaxes the check so expected type size can be equal to or less than
  the actual tuple size, and adds a proper error for mismatched cases.
expected_findings:
- file: asg/src/expression/tuple_init.rs
  line: 94
  summary: 'Incorrect tuple size comparison: the check should allow the expected type
    to have equal or fewer elements than the actual tuple, not require strict equality.'
- file: asg/src/error/mod.rs
  line: 224
  summary: Missing error variant for tuple index out-of-bounds; without this, invalid
    tuple accesses produce unhelpful or incorrect errors.
