description: Comparing two values with mismatched types in Leo's relational operators
  (eq, ge, gt, le, lt) caused a stack overflow. The root cause was that synthesis
  errors from type-mismatched comparisons were formatted using `{:?}` (Debug), which
  triggered infinite recursion. The fix changes error formatting to avoid recursive
  Debug output and adds proper handling for type mismatch cases in relational expressions.
expected_findings:
- file: compiler/src/expression/relational/eq.rs
  line: 102
  summary: Mismatched types fall through to constraint evaluation instead of returning
    a type error, causing a synthesis error whose Debug formatting triggers stack
    overflow
- file: compiler/src/errors/value/boolean.rs
  line: 38
  summary: Using `{:?}` Debug format for synthesis error can cause infinite recursion
    / stack overflow; should use `{}` Display instead
- file: compiler/src/errors/value/integer.rs
  line: 39
  summary: Using `{:?}` Debug format for synthesis error can cause infinite recursion
    / stack overflow; should use `{}` Display instead
