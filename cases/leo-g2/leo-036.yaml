description: During function inlining, variable renaming used `input.identifier().name`
  (the raw symbol name) instead of the full `Identifier` object. This caused incorrect
  variable renaming because the symbol name alone lacks the unique ID needed to distinguish
  variables with the same name across different inlined scopes, leading to name collisions
  when a function is inlined multiple times.
expected_findings:
- file: compiler/passes/src/function_inlining/inline_expression.rs
  line: 58
  summary: Using `.identifier().name` (Symbol) instead of the full Identifier loses
    the unique ID needed for correct variable renaming during inlining. Should map
    to the full identifier to preserve uniqueness.
- file: compiler/passes/src/function_inlining/inline_expression.rs
  line: 74
  summary: 'Same bug: `.identifier().name` strips the unique ID from the identifier,
    causing name collisions when the same function is inlined multiple times.'
