description: The `declared_circuit_reference` parameter (tracking the `self` variable
  in circuit methods) was not propagated into nested scopes such as conditional branches
  and iteration loops. This meant any access or mutation of `self` inside an `if`
  block or `for` loop would fail. The fix threads `declared_circuit_reference` through
  block, conditional, and iteration statement handlers.
