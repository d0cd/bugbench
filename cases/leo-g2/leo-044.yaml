description: 'The Leo parser incorrectly allowed inclusive ending bounds in loop range
  expressions (e.g., `0..=10`), which is not part of the Leo language specification
  per the ABNF grammar and Leo Reference. The fix changes the parser to always set
  `inclusive: false` for loop bounds and updates test cases to reflect the correct
  exclusive-only range syntax.'
