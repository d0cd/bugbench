description: The Leo compiler's expression evaluator failed when applying the not
  (`!`) operator to a mutable boolean variable. The bug was in the enforce_operand
  call in expression.rs which did not properly handle mutable boolean expressions,
  likely missing a case or incorrectly dereferencing the expression. The fix corrects
  the operand enforcement logic and adds a test for not on mutable booleans.
expected_findings:
- file: compiler/src/expression/expression.rs
  line: 138
  summary: "enforce_operand does not properly handle mutable boolean expressions when\
    \ applying the not operator \u2014 the expression dereference or match arm is\
    \ incomplete for the mutable case"
