description: The zip package creation logic excluded the `inputs` directory but failed
  to exclude files within it (e.g., `inputs/<pack_name>.state`). This produced a malformed
  zip with orphaned file paths referencing a nonexistent directory, causing the apm-backend
  server to error when attempting to extract. The fix corrects the path filtering
  condition at line 114 to use `starts_with(INPUTS_DIRECTORY_NAME)` to exclude all
  entries under the inputs directory.
expected_findings:
- file: package/src/root/zip.rs
  line: 114
  summary: 'Incorrect path exclusion logic: the condition only excludes the `inputs`
    directory entry itself but does not exclude files nested inside it (e.g., `inputs/<pack_name>.state`).
    Should use `path.starts_with(INPUTS_DIRECTORY_NAME)` to filter all paths under
    the inputs directory.'
