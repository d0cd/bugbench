description: "In the tokenizer's unexpected_token error handler, the code used byte-level\
  \ string indexing to extract the offending character. Multi-byte UTF-8 characters\
  \ (e.g., \U0001F980) caused a panic because slicing at a byte boundary within a\
  \ multi-byte character is invalid in Rust. The fix uses `.chars().next().unwrap()`\
  \ on the substring to correctly extract the first character regardless of byte width."
expected_findings:
- file: parser/src/tokenizer/mod.rs
  line: 84
  summary: Byte-level string indexing on potentially multi-byte UTF-8 input will panic.
    Should use `&input[index..].chars().next().unwrap()` to safely extract the character
    at the given position.
