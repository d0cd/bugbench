description: The Leo compiler's type checker was missing type checking for circuit
  member accesses (e.g., `<expr>.<identifier>`) and had inconsistencies in how types
  were validated. The fix implements proper circuit member access checking, cleans
  up literal expression handling (renaming ValueExpression to Literal), and fixes
  core type conflict checking to accept the correct argument types.
