description: The `leo test` command reused a single `TestConstraintSystem` object
  across all tests instead of creating a fresh one per test. This caused constraint
  state from earlier tests to leak into later tests, breaking test isolation. The
  fix moves `TestConstraintSystem::new()` inside each test invocation so constraints
  are accumulated independently.
expected_findings:
- file: compiler/src/constraints/constraints.rs
  line: 42
  summary: TestConstraintSystem is created once and shared across multiple test executions;
    it should be freshly allocated before each test to ensure isolation
- file: leo/commands/test.rs
  line: 12
  summary: compile_test_constraints is called with a shared constraint system rather
    than creating a new one per test, causing cross-test state pollution
