description: 'Multiple compiler bugs in the Leo language: canonicalization was not
  applied to all assignment operations (only a subset of cases), array initialization
  did not properly compute const values, and array indexing/range indexing was handled
  incorrectly. The fix broadens canonicalization to run on all assignments, implements
  const_value for array init expressions, and reworks array index/range assignee handling
  with a from_range context flag.'
expected_findings:
- file: ast/src/reducer/canonicalization.rs
  line: 593
  summary: Canonicalization only ran on a subset of compound assignments instead of
    all non-simple assignments; the match guard should trigger for any AssignOperation
    != Assign
- file: asg/src/expression/array_init.rs
  line: 54
  summary: Array init expression was missing const_value implementation, causing incorrect
    evaluation when array initializers with constant elements were used
- file: compiler/src/statement/assign/assignee/mod.rs
  line: 35
  summary: Array assignee context lacked a from_range flag, causing array indexing
    and array range indexing to be handled identically when they require different
    constraint generation
