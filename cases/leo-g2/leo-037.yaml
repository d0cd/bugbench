description: The type checker panicked with an unwrap on `lookup_struct` when a function's
  output type referenced an undefined data type (struct/record). The fix adds an `assert_type_is_defined`
  helper that validates output types exist before the lookup, emitting a proper compiler
  error instead of panicking.
