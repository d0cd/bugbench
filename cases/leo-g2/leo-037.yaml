- file: compiler/passes/src/type_checking/check_program.rs
  line: 243
  summary: 'Missing validation: function output type is not checked for existence
    before being used in lookup_struct, which will panic (unwrap on None) if the type
    is undefined.'
- file: compiler/passes/src/type_checking/check_statements.rs
  line: 201
  summary: "Unreachable arm for Type::Err is incorrect \u2014 an undefined type that\
    \ reaches this point via the unchecked path could trigger this unreachable panic\
    \ instead of a graceful error."
