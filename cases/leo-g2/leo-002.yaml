description: The type checker for MemberAccess expressions assigned `Type::Address`
  to `self.caller` and `self.signer` but never compared that type against the `expected`
  type. This allowed programs using these expressions in contexts expecting a non-address
  type to compile without errors. The fix adds the missing type comparison against
  `expected`.
expected_findings:
- file: compiler/passes/src/type_checking/expression.rs
  line: 89
  summary: 'Missing type check: `self.caller`/`self.signer` sets `ty = Type::Address`
    but never compares it against `expected`, allowing type mismatches to silently
    pass compilation.'
