description: 'The type inference pass incorrectly calculated the type of array spread
  expressions. When encountering a spread like `[...a, 3]` where `a: [u32; 2]`, the
  type checker failed to unwrap the array type to get the element type (`u32`), causing
  a type mismatch error. The fix corrects the pattern match on `Type::Array(element_type)`
  to return the dereferenced inner element type.'
expected_findings:
- file: type-inference/src/objects/frame.rs
  line: 837
  summary: Type inference for array spread does not unwrap the Array type to its element
    type. When a spread expression is used (e.g., `...a`), the match arm for `Type::Array(element_type)`
    should return `*element_type` (the inner element type) instead of returning the
    outer array type.
