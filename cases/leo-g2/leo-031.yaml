description: An extra leading slash in the stateRoot URL path component caused the
  constructed URL to contain a double slash (e.g., `http://localhost:3030/testnet//stateRoot/latest`),
  resulting in a 404 error. The fix removes the leading slash from the path string
  so it is consistent with other query endpoints.
