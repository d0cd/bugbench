description: Compound assignment canonicalization did not preserve access expressions
  (member, tuple, array access) on the right-hand side. For example, `foo.bar += 1`
  was incorrectly desugared to `foo.bar = foo + 1` instead of `foo.bar = foo.bar +
  1`, because the code only cloned the base identifier and discarded the access chain
  when building the expanded expression.
expected_findings:
- file: ast/src/reducer/canonicalization.rs
  line: 470
  summary: Compound assignment desugaring only uses the base identifier (`assignee.identifier.clone()`)
    for the RHS, discarding any member/tuple/array accesses. Should reconstruct the
    full access expression (e.g., `foo.bar`) not just `foo`.
