description: The `leo clean` command did not verify the presence of a project manifest
  before removing directories, risking deletion in non-Leo directories. Additionally,
  it failed with an error if the `outputs` or `build` directories did not exist, instead
  of silently succeeding. The fix adds a manifest check and handles missing directories
  gracefully.
