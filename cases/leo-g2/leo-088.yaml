description: The Leo compiler's flattening pass did not handle unit expressions and
  AccessExpression variants (used when reading structs from mappings in finalize blocks).
  The fix adds AccessExpression to match arms in flatten_statement.rs, fixes expression
  matching logic in flattener.rs, handles empty operand strings in code generation,
  and corrects function display formatting.
expected_findings:
- file: compiler/passes/src/flattening/flatten_statement.rs
  line: 19
  summary: "Missing AccessExpression variant in match arm \u2014 flattening does not\
    \ handle struct member access expressions read from mappings, causing incorrect\
    \ flattening of finalize blocks"
- file: compiler/passes/src/flattening/flattener.rs
  line: 98
  summary: "Incorrect match on last_expression \u2014 fails to properly handle unit\
    \ expressions during flattening, leading to incorrect code generation"
- file: compiler/passes/src/code_generation/visit_statements.rs
  line: 91
  summary: "Missing handling for empty operand string \u2014 when a unit expression\
    \ is flattened, the operand string can be empty, which is not accounted for in\
    \ code generation"
