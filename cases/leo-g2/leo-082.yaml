description: Test code unnecessarily used `include_bytes!` followed by `String::from_utf8_lossy()`
  to load `.leo` source files as strings, when `include_str!` achieves the same result
  directly in a single macro call. The fix replaces all instances of the two-step
  byte-to-string conversion with the simpler `include_str!` macro across nearly all
  compiler integration tests.
expected_findings:
- file: compiler/tests/mod.rs
  line: 64
  summary: Unnecessary use of `include_bytes!` + `String::from_utf8_lossy()` to load
    text files; should use `include_str!` directly, avoiding redundant allocation
    and conversion.
- file: compiler/tests/address/mod.rs
  line: 22
  summary: Pattern `include_bytes!("valid.leo")` followed by UTF-8 conversion is redundant;
    `include_str!` handles this in one step.
- file: compiler/tests/integers/int_macro.rs
  line: 28
  summary: Repeated `include_bytes!` + string conversion pattern in macro-generated
    test code; switching to `include_str!` eliminates unnecessary byte-to-string overhead
    across all integer type tests.
