description: The Leo CLI updater check would cause commands to halt entirely when
  it failed to fetch the latest release version (e.g., due to network issues). The
  fix changes error handling in the updater to gracefully handle fetch failures instead
  of propagating them as fatal errors, allowing CLI commands to continue executing.
expected_findings:
- file: leo/updater.rs
  line: 13
  summary: Updater error handling propagates fetch failures as fatal errors via UpdaterError,
    halting CLI command execution instead of catching and warning on update check
    failures
- file: leo/updater.rs
  line: 27
  summary: Update check function should catch errors from fetching latest release
    version and log a warning rather than returning an error that halts the calling
    CLI command
- file: leo/errors/mod.rs
  line: 19
  summary: Error module may need adjustment to support non-fatal updater error handling
    rather than treating all updater errors as command-halting failures
