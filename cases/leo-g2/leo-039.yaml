description: 'The Leo compiler''s type checker produced unhelpful or missing error
  messages when function calls had mistyped arguments. The fix added span tracking
  (`_span: Span`) to function parameter symbols in `FunctionSymbol` and updated the
  type checking logic in `check_expressions.rs` to use parameter type and span information
  to emit precise ''Expected type X but type Y was found'' error messages at call
  sites.'
