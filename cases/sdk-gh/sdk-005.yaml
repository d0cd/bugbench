description: JavaScript's standard JSON.parse() silently truncates integers larger
  than Number.MAX_SAFE_INTEGER (2^53-1), causing precision loss for large blockchain
  values like block heights and transaction amounts. The fix introduces a custom parseJSON
  utility that parses all integers as BigInt, along with shared polyfills to ensure
  consistent behavior across browser and Node environments.
expected_findings:
- file: sdk/src/network-client.ts
  line: 84
  summary: Standard JSON.parse() used for API responses containing large integers
    (e.g., block heights). Values exceeding Number.MAX_SAFE_INTEGER will be silently
    truncated, causing data corruption. Should use a BigInt-aware JSON parser.
- file: sdk/src/record-provider.ts
  line: 202
  summary: getLatestHeight() returns a number parsed via standard JSON.parse(), which
    may lose precision for block heights exceeding 2^53-1. Should use BigInt-safe
    parsing to preserve integer fidelity.
- file: sdk/src/utils.ts
  line: 1
  summary: Missing BigInt-aware parseJSON utility function. All integer values from
    API responses should be parsed as BigInt to prevent silent precision loss for
    large blockchain numeric values.
