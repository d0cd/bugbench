description: A log statement in the `buildProvingRequest` WASM function was logging
  the full Aleo program bytecode, causing excessive logging volume that created operational
  issues in GCP for deployed services like the USDCx bridge. The fix replaces the
  verbose log with a minimal message logging only the function name.
expected_findings:
- file: wasm/src/programs/manager/proving_request.rs
  line: 63
  summary: 'Excessive logging: log statement includes full program bytecode in the
    format string, which can be extremely large and cause performance/operational
    issues in production logging infrastructure. Should log only the function name,
    not the entire program.'
