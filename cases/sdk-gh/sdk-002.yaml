description: The getFunctionInputs method in the WASM program bindings omitted the
  _nonce field when constructing input representations for record types. This caused
  downstream tools (e.g., aleo.tools) to display incomplete record schemas, missing
  the required nonce. The fix adds the _nonce field to the record input generation
  logic.
