description: The verifyFunctionExecution function in the WASM SDK did not support
  program imports, causing verification to fail for any execution that involved imported
  programs. The fix adds ProcessNative to the imports and modifies the verification
  logic to load imported programs into the process before verifying the execution.
expected_findings:
- file: wasm/src/programs/execution.rs
  line: 107
  summary: 'Missing imports support: verifyFunctionExecution does not load imported
    programs into a Process before verification, causing failures for executions that
    reference imported programs.'
- file: wasm/src/programs/execution.rs
  line: 17
  summary: ProcessNative is not imported, which is needed to construct a Process that
    can hold imported programs for execution verification.
