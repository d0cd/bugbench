description: The `buildExecutionTransaction` function incorrectly built fee transactions
  for `split` and `upgrade` function calls, which should be fee-exempt. The fix adds
  conditional logic in the WASM execution pathway to skip fee computation and inclusion
  when the function being executed is `split` or `upgrade`.
