  line: 174
  summary: 'Missing check: when the function is ''split'' or ''upgrade'', the execution
    transaction should not include a fee, but fees are unconditionally built here.'
- file: wasm/src/programs/manager/proving_request.rs
  line: 84
  summary: "No fee-exemption logic for 'split' and 'upgrade' functions \u2014 proving\
    \ request should conditionally skip fee proving for these special functions."
- file: sdk/src/program-manager.ts
  line: 490
  summary: The TypeScript SDK's execute path does not account for fee-exempt functions
    ('split'/'upgrade'), leading to unnecessary fee construction.
