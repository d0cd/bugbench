description: The SDK's polyfill setup for fetch, Worker, and XMLHttpRequest was incorrect,
  likely using xmlhttprequest-ssl and sync-request packages improperly in the Node.js
  polyfill layer. The fix restructures the polyfill modules and updates the rollup
  external configuration and dependencies to resolve runtime failures when the SDK
  was used in non-browser environments.
