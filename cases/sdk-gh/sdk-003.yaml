description: TypeScript imports in the SDK lacked `.js` file extensions, which broke
  compatibility with Node.js's `nodenext` module resolution strategy. The fix adds
  `.js` extensions to all relative import paths across the SDK source files and adds
  a nodenext e2e test to prevent regression.
