description: The AleoNetworkClient only allowed HTTP headers to be set during construction,
  and the ProgramManager always added a default X-Aleo-SDK-Version header with no
  way to remove it. This caused CORS issues in browser environments. The fix adds
  setHeader/removeHeader methods to both AleoNetworkClient and ProgramManager, plus
  an optional headers parameter to the ProgramManager constructor.
expected_findings:
- file: sdk/src/network-client.ts
  line: 37
  summary: AleoNetworkClient constructor sets headers only at initialization with
    no public API to modify them afterward, causing CORS issues when the default X-Aleo-SDK-Version
    header is added and cannot be removed
- file: sdk/src/program-manager.ts
  line: 90
  summary: ProgramManager constructor creates AleoNetworkClient with default headers
    but provides no way to pass custom headers or modify them post-construction, making
    CORS workarounds impossible
