description: The SDK's worker threads polyfill incorrectly used `import("node:worker_threads")`
  which fails in certain environments. Additionally, the `sync-request` dependency
  was incorrectly placed or versioned in package.json, and template scripts used a
  "dev" command that didn't work properly. The fix corrects the worker_threads import,
  removes/fixes the sync-request dependency, and renames scripts for proper execution.
