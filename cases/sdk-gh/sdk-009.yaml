description: Network requests lacked retry logic, causing transient failures to propagate
  as hard errors. The fix introduces a retryWithBackoff utility in utils.ts that wraps
  network calls (fetchData, submitTransaction, etc.) in network-client.ts with configurable
  exponential backoff and retry attempts.
