  line: 15
  summary: 'Verify retryWithBackoff correctly implements exponential backoff: check
    for off-by-one in retry count, proper delay calculation (e.g., 2^attempt * baseDelay),
    and that non-retryable errors (4xx) are not retried'
- file: sdk/src/network-client.ts
  line: 98
  summary: Ensure retryWithBackoff wrapping of network calls correctly propagates
    errors after exhausting retries and does not swallow meaningful error context
- file: sdk/src/utils.ts
  line: 25
  summary: Check that the retry loop re-throws the last error (not undefined) when
    all retries are exhausted, and that the backoff delay uses proper async waiting
