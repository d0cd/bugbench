description: 'The line comment parser in sanitizer.rs had two termination paths: one
  for comments ending with a newline and one for comments ending at EOF. The EOF path
  was missing the unsafe character validation check, allowing comments with unsupported/unsafe
  characters to pass parsing when they appeared at the end of input. The fix adds
  the same safety character check to the EOF-termination path.'
expected_findings:
- file: console/network/environment/src/helpers/sanitizer.rs
  line: 84
  summary: 'Missing unsafe character check: line comment parsing at EOF does not validate
    that comment characters are safe/supported, unlike the newline-terminated path.
    Unsupported characters in a trailing comment would bypass sanitization.'
