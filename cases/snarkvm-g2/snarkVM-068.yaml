description: The Merkle path gadget implementation contains a bug related to how hash
  inputs are constructed during root computation. The PR description notes unnecessary
  padding due to PoseidonCRH requiring a padded bit implementation with a predetermined
  INPUT_SIZE_FE, and a mismatch between the native Merkle tree's byte-based inputs
  and Poseidon's field-element inputs. The fix addresses incorrect padding or input
  construction in the to_root computation.
