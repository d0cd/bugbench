description: Upgrades the DPC (Decentralized Private Computation) model to introduce
  new state transition types (noop, add, remove, update, split, join, joinsplit) for
  records. The fix simplifies the serial number nonce derivation, reduces outer circuit
  proofs from 4 to 1, adds program ID enforcement between input/output record pairs,
  and updates the PoSW Merkle tree depth.
expected_findings:
- file: dpc/src/circuits/outer_circuit.rs
  line: 84
  summary: Outer circuit previously required verification of 4 separate proofs and
    program commitments; should be reduced to a single proof verification to match
    the simplified DPC model.
- file: dpc/src/circuits/inner_circuit.rs
  line: 58
  summary: Inner circuit missing enforcement that input program ID matches output
    program ID or noop program ID for each (input, output) record pair.
- file: dpc/src/dpc.rs
  line: 60
  summary: DPC state transition logic does not account for the new transition types
    (noop, add, remove, update, split, join, joinsplit), leading to incorrect record
    handling.
