description: CRH and commitment functions were outputting hash values as projective
  curve elements instead of affine curve elements, causing Merkle tree gadget verification
  failures in testnet2. The fix changes `type Output` from `G` (projective) to `G::Affine`
  across Pedersen and Bowe-Hopwood-Pedersen CRH/commitment implementations, and introduces
  a new `CurveGadget` trait combining `GroupGadget<G, F>` with `AllocGadget<G::Affine,
  F>` to support affine allocation in the constraint system.
expected_findings:
- file: algorithms/src/crh/pedersen.rs
  line: 33
  summary: CRH Output type is `G` (projective) but should be `G::Affine`; projective
    output causes Merkle tree inconsistency when the gadget world expects affine representation.
- file: algorithms/src/crh/bowe_hopwood_pedersen.rs
  line: 45
  summary: Bowe-Hopwood-Pedersen CRH Output type is `G` (projective) instead of `G::Affine`,
    inconsistent with how Merkle tree verification expects hash outputs.
- file: algorithms/src/commitment/pedersen.rs
  line: 30
  summary: Pedersen commitment Output type is `G` (projective) but should be `G::Affine`
    to match the affine representation required by downstream Merkle tree gadgets.
