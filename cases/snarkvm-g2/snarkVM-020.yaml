description: The test `test_load_deployments_with_imports` used a non-deterministic
  RNG, causing `deployment_transaction_ids()` lexicographic ordering to vary between
  runs. When the random ordering placed parent programs before their imports, the
  test would fail to exercise (or incorrectly test) recursive import loading. The
  fix uses a fixed RNG seed that ensures the ordering reliably tests the intended
  behavior.
