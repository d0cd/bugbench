description: 'When block_store().insert(block) fails with an error, atomic writes
  were not unpaused on the error path. This left the RocksDB store in a permanently
  paused state, causing an ''assertion failed: !already_paused'' panic on the next
  block insert attempt. The fix ensures atomic writes are unpaused in the error handling
  branch before propagating the error.'
