description: The `BatchHeader` signature was computed over `[batch_id, *timestamp]`,
  which is the same message format used by `BatchCertificate` signatures. This lack
  of domain separation could allow a valid BatchHeader signature to be replayed as
  a BatchCertificate signature (or vice versa), enabling replay attacks. The fix removes
  `timestamp` from the BatchHeader signing message so signatures are computed over
  `[batch_id]` only.
expected_findings:
- file: ledger/narwhal/batch-header/src/lib.rs
  line: 67
  summary: 'Security: BatchHeader signature signs over [batch_id, *timestamp], which
    collides with BatchCertificate''s signature domain. The timestamp should be removed
    from the signed message to prevent cross-context signature replay attacks.'
- file: ledger/narwhal/batch-header/src/lib.rs
  line: 90
  summary: "Security: Second call site also signs over [batch_id, *timestamp] with\
    \ the same domain collision issue \u2014 timestamp must be removed from the signature\
    \ message."
