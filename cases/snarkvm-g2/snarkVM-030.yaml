description: The `check_instruction_opcode` function incorrectly called `Identifier::from_str`
  on instruction opcodes, which requires alphanumeric characters only. Since many
  valid opcodes contain dots (e.g., `is.eq`, `add.w`), this caused any program using
  dotted opcodes to fail during `Package::build`. The fix replaces the `Identifier::from_str`
  validation with a direct `Self::is_reserved_opcode(opcode)` check.
expected_findings:
- file: vm/compiler/src/process/add_program.rs
  line: 279
  summary: "Incorrect use of Identifier::from_str to validate opcodes \u2014 Identifier\
    \ requires alphanumeric characters but opcodes like 'is.eq' contain dots. Should\
    \ use is_reserved_opcode() directly instead."
- file: vm/compiler/src/process/add_program.rs
  line: 436
  summary: "Same incorrect Identifier::from_str validation on opcodes with dots \u2014\
    \ duplicate occurrence of the same bug pattern."
- file: vm/package/mod.rs
  line: 178
  summary: Call site in Package::build that triggers the faulty check_instruction_opcode
    validation, causing build failures for programs with dotted opcodes.
