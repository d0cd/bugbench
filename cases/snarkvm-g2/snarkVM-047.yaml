description: 'The lazy load deployment optimization (PR #2553) was prematurely merged
  and introduced correctness bugs in the Process loading and deployment verification
  pipeline. The revert restores eager loading of deployments via `Process::load()`
  across the synthesizer, ledger, and console modules, ensuring process state is fully
  initialized before use rather than lazily loaded on demand.'
expected_findings:
- file: synthesizer/process/src/deploy.rs
  line: 41
  summary: Lazy `load_deployment` method introduced incorrect deferred initialization
    of deployment state, risking use of uninitialized or stale process data during
    deployment verification.
- file: synthesizer/process/src/finalize.rs
  line: 54
  summary: Finalization logic depends on fully-loaded process stacks; lazy loading
    can cause missing stack state when finalizing fee transitions, leading to incorrect
    finalization results.
- file: synthesizer/process/src/lib.rs
  line: 65
  summary: Process initialization changed from eager `Process::load()` to lazy loading
    pattern, causing downstream consumers to operate on incompletely initialized process
    state.
