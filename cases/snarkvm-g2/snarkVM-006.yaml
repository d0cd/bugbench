description: Ledger::check_next_block only verified that no block with the given height
  already existed, but did not verify the block was the direct successor of the latest
  block. This caused misleading 'invalid previous state root' errors when a block
  with a height higher than expected was provided. The fix adds an early height succession
  check in check_next_block and a redundant height check in advance_to_next_block
  to guard against race conditions.
expected_findings:
- file: ledger/src/check_next_block.rs
  line: 21
  summary: 'Missing validation: should check that the block height equals latest_block.height()
    + 1, not just that no block at this height exists. Blocks with non-successor heights
    produce misleading errors downstream.'
- file: ledger/src/advance.rs
  line: 91
  summary: Missing re-validation of expected block height before advancing. A race
    condition between check_next_block and advance_to_next_block could allow a stale
    check to proceed with an incorrect block height.
