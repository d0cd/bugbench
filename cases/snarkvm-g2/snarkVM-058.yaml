description: The BHP circuit gadget in snarkVM was generating an excessive number
  of non-zero entries in the R1CS constraint system, leading to slower proving times.
  The fix optimizes the field gadget implementation in fp.rs to reduce non-zero entries
  from ~538k to ~475k for the inner circuit, yielding a ~17% speedup in Marlin proving
  time.
