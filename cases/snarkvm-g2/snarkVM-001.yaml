description: Identifier::from_bits_le lacked validation that the decoded bytes form
  a valid UTF-8 string and a valid identifier. This allowed malformed or malicious
  identifiers to be constructed from arbitrary bit patterns during deserialization,
  bypassing the sanity checks enforced by other constructors. The fix adds UTF-8 and
  identifier-validity checks in both the console and circuit from_bits_le implementations.
expected_findings:
- file: console/program/src/data/identifier/from_bits.rs
  line: 24
  summary: 'Missing UTF-8 and identifier validity check: from_bits_le constructs an
    Identifier from raw bits without verifying the resulting bytes are a valid UTF-8
    string and valid identifier name'
- file: circuit/program/src/data/identifier/from_bits.rs
  line: 29
  summary: 'Missing string sanity check in circuit-level from_bits_le: bits are converted
    to an Identifier without validating that the ejected bytes form a valid UTF-8
    identifier string'
