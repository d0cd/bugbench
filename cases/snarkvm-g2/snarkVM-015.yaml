description: In `VM::atomic_speculate`, `enumerate` was used to assign indices to
  `ConfirmedTransaction`s. This produces sequential indices (0, 1, 2...) that don't
  account for aborted transactions, causing index misalignment. The fix replaces `enumerate`
  with a manual counter that correctly tracks the confirmed transaction index across
  gaps left by aborted transactions.
