description: The bond_validator call was not properly extracting the validator address
  from the transition output's Future arguments. This caused the check for exceeding
  MAX_COMMITTEE_SIZE to silently fail, allowing the number of validators to grow beyond
  the intended limit. The fix corrects how the validator address is extracted from
  the Future's arguments.
