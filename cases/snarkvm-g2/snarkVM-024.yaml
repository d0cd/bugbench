description: The `output_type` method for the `commit` instruction incorrectly returned
  the same output type for Pedersen variants as for BHP variants. Pedersen commitments
  produce a Group element, but the match arms grouped all variants together, returning
  the wrong type (likely Field instead of Group). The fix separates the Pedersen variant
  match arms to return the correct output type.
expected_findings:
- file: synthesizer/src/program/instruction/operation/commit.rs
  line: 175
  summary: Match arm incorrectly groups Pedersen commit variants (e.g., Pedersen64,
    Pedersen128) with BHP variants, causing them to return the wrong output type.
    Pedersen commitments should return Group, not Field.
