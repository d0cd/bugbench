description: The `ensure_equals` macro in utilities/src/errors.rs captures variadic
  format arguments ($format_args:tt*) but does not forward them to the format!() invocation,
  causing message placeholders to appear literally instead of being substituted with
  actual values. The fix passes the captured format args through to the formatting
  macro.
