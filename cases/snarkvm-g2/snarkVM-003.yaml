- file: utilities/src/errors.rs
  line: 62
  summary: Macro captures $(, $format_args:tt)* but does not forward them to format!(),
    so format placeholders in $message are never substituted
- file: utilities/src/errors.rs
  line: 197
  summary: 'Same bug in second ensure_equals variant: captured $format_args not passed
    through to the formatting call'
