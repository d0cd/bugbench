description: The `get_map_and_key` function in the RocksDB nested map implementation
  used incorrect indexing when deserializing composite keys, causing wrong map/key
  splits. The fix corrects the byte offset calculation so that nested map lookups
  return the correct map and key pair, with cascading changes to test expectations
  due to corrected storage behavior.
