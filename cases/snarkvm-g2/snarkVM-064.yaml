- file: ledger/store/src/helpers/rocksdb/internal/nested_map.rs
  line: 80
  summary: 'Incorrect byte offset indexing in get_map_and_key: the split point for
    separating the map ID from the key in the serialized RocksDB entry is wrong, leading
    to misinterpreted keys and maps.'
- file: ledger/store/src/helpers/rocksdb/internal/id.rs
  line: 195
  summary: Data ID enum variant numbering may have been misaligned with the indexing
    used in nested_map deserialization, contributing to incorrect map lookups.
