  line: 14
  summary: 'async_trait without ?Send: default `#[async_trait]` adds a `Send` bound
    to futures, which is incompatible with wasm-bindgen. Should use `#[async_trait(?Send)]`.'
- file: ledger/query/src/query.rs
  line: 59
  summary: 'async_trait without ?Send on impl block: must match the trait definition''s
    `?Send` opt-out to avoid requiring `Send` on futures in wasm environments.'
