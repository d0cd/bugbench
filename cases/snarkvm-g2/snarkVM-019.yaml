description: The `async_trait` macro was used without the `?Send` opt-out, which adds
  an implicit `Send` bound on generated futures. This makes the Query trait incompatible
  with wasm-bindgen, which operates in a single-threaded environment where `Send`
  is not available. The fix changes `#[async_trait]` to `#[async_trait(?Send)]` in
  both the trait definition and its implementation.
