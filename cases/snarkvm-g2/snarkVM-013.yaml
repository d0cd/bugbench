description: Match statements in the query module used the hardcoded value `3` for
  the MainnetV0 network ID, when the correct value is `0`. This caused REST API calls
  to credits.aleo to fail on mainnet. The fix corrects the network ID and replaces
  magic numbers with the `MainnetV0::ID` constant to prevent recurrence.
