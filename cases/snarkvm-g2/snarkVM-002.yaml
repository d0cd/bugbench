description: 'The `FinalizeStorage::replace_mapping` method was missing the code to
  update historical maps when mappings were replaced. This meant that mapping queries
  for account, bonded, committee, delegated, and withdraw data would fail on dev validators
  because the historical tracking introduced in PR #3148 did not account for the replace_mapping
  code path. The fix adds the historical map update trigger to replace_mapping, mirroring
  what was already done for other mapping mutation methods.'
