description: The Poseidon sponge used hardcoded, non-standardized MDS matrix parameters
  instead of properly generated ones per field. The fix introduces a `PoseidonMDSField`
  trait that provides standardized MDS matrices and Poseidon parameters for each field
  type, and adds the corresponding trait bound throughout the marlin constraint and
  Fiat-Shamir subsystems.
expected_findings:
- file: marlin/src/fiat_shamir/fiat_shamir_poseidon_sponge.rs
  line: 34
  summary: Poseidon sponge instantiation uses hardcoded parameters instead of deriving
    them from a standardized trait (PoseidonMDSField) on the field type, leading to
    non-standard cryptographic parameters.
- file: fields/src/traits/mod.rs
  line: 40
  summary: "Missing PoseidonMDSField trait definition and export \u2014 field types\
    \ lack a standardized interface for providing MDS matrices and Poseidon round\
    \ parameters."
- file: curves/src/bls12_377/fq.rs
  line: 120
  summary: BLS12-377 Fq field parameters do not implement PoseidonMDSField, so MDS
    matrix constants are hardcoded elsewhere rather than associated with the field
    type.
