description: The block verification logic was using the current block's proof target
  instead of the previous block's proof target when calculating cumulative proof targets.
  This caused an asymmetry between block production and verification, where verification
  could accept or reject blocks incorrectly. The fix changes the proof target lookup
  in verify.rs to reference the previous block, ensuring symmetric behavior.
expected_findings:
- file: ledger/block/src/verify.rs
  line: 373
  summary: 'Wrong block reference for proof target: verification uses current block''s
    cumulative_proof_target() but should use previous_block.cumulative_proof_target()
    to maintain symmetry between block production and verification.'
