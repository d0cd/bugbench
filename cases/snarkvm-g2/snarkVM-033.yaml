description: CI jobs for memory-intensive synthesizer tests were running out of memory
  (OOM) because all tests ran together on insufficiently sized instances. The fix
  moves memory-intensive tests to a dedicated multi-threaded job on 2xlarge instances
  and marks them with `#[ignore = "memory-intensive"]`, while also commenting out
  highest-power test cases whose parameter downloads were failing.
