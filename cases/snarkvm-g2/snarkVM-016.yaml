description: The `Block::verify_authority` function contained an unreachable check
  for the genesis block case. Since the genesis block should never have a `previous_round`
  or `previous_height`, this code path could never be triggered, making it dead code.
  The fix removes this unreachable branch to clarify the verification logic and eliminate
  potentially misleading code identified by a Trail of Bits audit (TOB-ALEO-20).
