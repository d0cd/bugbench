description: 'The block subdag verification was missing two critical checks: (1) the
  next block must have consecutive rounds from the latest round in the ledger, and
  (2) the subdag must be ''atomic'' (linked) and not a combined subdag from multiple
  blocks. Without these checks, a malicious actor could forge blocks with non-consecutive
  rounds or combined subdags, constituting a block forging attack vector.'
expected_findings:
- file: ledger/block/src/verify.rs
  line: 173
  summary: 'Missing check: subdag rounds are not verified to be sequential/consecutive
    from the latest ledger round, allowing blocks with gaps or out-of-order rounds.'
- file: ledger/src/check_next_block.rs
  line: 117
  summary: "Missing check: no verification that the block subdag is 'linked' (atomic),\
    \ allowing a combined subdag from multiple blocks to pass validation \u2014 a\
    \ block forging vulnerability."
