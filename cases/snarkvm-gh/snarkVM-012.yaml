description: Multiple deserialization vulnerabilities discovered via fuzz testing
  allow denial-of-service through crafted network messages. Untrusted size fields
  from deserialized data were used directly in Vec::with_capacity() calls, enabling
  unbounded memory allocation, and unwrap() calls on fallible deserialization operations
  caused panics on malformed input. The fix adds per-case size limits and replaces
  unwraps with proper error propagation.
expected_findings:
- file: dpc/src/transaction/transaction.rs
  line: 120
  summary: Deserialized count used directly in Vec allocation without bounds check;
    a malicious message can specify an enormous count causing OOM/DoS
- file: dpc/src/virtual_machine/execution.rs
  line: 144
  summary: Unbounded Vec::with_capacity from deserialized length field and/or unwrap
    on deserialization result; malformed input causes crash
- file: dpc/src/record/ciphertext.rs
  line: 149
  summary: Missing size validation on deserialized vector length allows overallocation
    from untrusted input during FromBytes deserialization
