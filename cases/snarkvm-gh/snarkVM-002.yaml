language: rust
pr_size: medium
description: snarkVM could not compile when default Cargo features were disabled because
  feature flags and their dependencies were not properly defined. The fix introduces
  new `package` and `file` features with correct conditional compilation gates (`#[cfg(feature
  = "...")]`) on imports and modules in synthesizer and vm crates, and restructures
  Cargo.toml feature definitions so each feature clearly declares its dependencies.
expected_findings:
- file: Cargo.toml
  line: 105
  summary: Missing `package` and `file` feature definitions in Cargo.toml; dependencies
    are not properly gated behind feature flags, causing compilation failure when
    default features are disabled
- file: vm/lib.rs
  line: 23
  summary: Module or import lacks `#[cfg(feature = "file")]` guard, causing compilation
    error when the `file` feature is not enabled
- file: synthesizer/src/lib.rs
  line: 18
  summary: Import is unconditionally included but is only needed for certain features;
    needs `#[cfg]` gate or `#[allow(unused_imports)]` annotation to compile without
    default features
stats: null
