description: Identifier::from_bits_le lacked safety checks to validate that the decoded
  bits form a valid UTF-8 string, allowing potentially malformed or invalid identifiers
  to be constructed during deserialization. The fix adds string sanity validation
  in both the console and circuit implementations of from_bits_le, ensuring only well-formed
  identifiers can be created from bit representations.
expected_findings:
- file: console/program/src/data/identifier/from_bits.rs
  line: 24
  summary: 'Missing validation: from_bits_le parses bytes as UTF-8 but does not enforce
    identifier string sanity checks (e.g., valid characters, non-empty, proper length)
    before constructing the Identifier'
- file: circuit/program/src/data/identifier/from_bits.rs
  line: 29
  summary: 'Missing validation: circuit-level from_bits_le ejects bits and constructs
    identifier without verifying the resulting string satisfies identifier validity
    constraints'
- file: console/program/src/data/identifier/from_bits.rs
  line: 34
  summary: 'Missing validation: second code path for parsing bytes as UTF-8 string
    also lacks identifier sanity checks before returning the Identifier'
