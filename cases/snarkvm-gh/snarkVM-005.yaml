description: Deployment verification uses randomly generated inputs to execute a program
  and then checks that certificates match the resulting assignment. The RNG was not
  deterministically seeded, so the deploy step and verify step could generate different
  random inputs, causing valid deployments to fail verification non-deterministically.
  The fix seeds the RNG deterministically (using rand_chacha) so both steps produce
  identical inputs.
expected_findings:
