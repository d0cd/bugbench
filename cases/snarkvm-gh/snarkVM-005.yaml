  summary: 'Non-deterministic RNG: the random input generation for deployment verification
    is not seeded deterministically, so deploy and verify steps can produce different
    inputs, causing spurious verification failures.'
- file: synthesizer/process/src/stack/deploy.rs
  line: 161
  summary: 'Non-deterministic RNG in verification path: this RNG must use the same
    deterministic seed as the deployment path to ensure identical random inputs are
    generated for both steps.'
