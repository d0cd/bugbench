description: 'Identifier validation in `from_str` was too permissive: it used Unicode
  `is_alphabetic()`/`is_alphanumeric()` checks instead of ASCII-only equivalents,
  allowed identifiers to start with underscores, and did not reject empty strings.
  The fix tightens validation to require non-empty identifiers that start with an
  ASCII letter and contain only ASCII letters, digits, and underscores, aligning the
  `from_str` path with the nom parser.'
expected_findings:
- file: console/program/src/data/identifier/parse.rs
  line: 37
  summary: Identifier validation uses `is_alphabetic()` (Unicode) instead of `is_ascii_alphabetic()`
    for the first character check, and allows identifiers to start with underscore.
    Should require first char to be an ASCII letter only.
- file: console/program/src/data/identifier/parse.rs
  line: 40
  summary: Remaining character validation uses `is_alphanumeric()` (Unicode) instead
    of `is_ascii_alphanumeric()` / `is_ascii_digit()`. Should restrict to ASCII letters,
    ASCII digits, and underscores only.
