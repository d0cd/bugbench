description: "The Block metadata serialization was incorrectly handling the `cumulative_weight`\
  \ field \u2014 it was either missing or not converting the value to a string representation.\
  \ This caused serialization/deserialization round-trip failures for blocks, as large\
  \ numeric values (u128) lose precision in JSON. The fix adds proper `.to_string()`\
  \ serialization for `cumulative_weight` in both human-readable and binary serialize\
  \ paths, with corresponding deserialization updates."
