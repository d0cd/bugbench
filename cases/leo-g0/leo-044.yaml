description: The panic hook in leo's main.rs incorrectly prints panic messages to
  stdout using `println!` instead of stderr. The fix changes `println!` to `eprintln!`
  so that panic output goes to stderr as expected by convention, preventing panic
  messages from contaminating stdout which may be used for program output.
expected_findings:
- file: leo/main.rs
  line: 180
  summary: Panic hook uses `println!` to print to stdout; should use `eprintln!` to
    print to stderr, as panic/error output must not go to stdout.
