description: The deploy and execute CLI commands did not check whether the transaction-generating
  address had sufficient balance before broadcasting, leading to transactions that
  were accepted by the network but later rejected on-chain. The fix adds cost estimation
  and a balance pre-check, refactors execute to work with a generic network, and removes
  the snarkOS dependency.
expected_findings:
- file: leo/cli/commands/deploy.rs
  line: 51
  summary: Missing balance/cost check before broadcasting deployment transaction;
    insufficient funds causes silent on-chain rejection
- file: leo/cli/commands/execute.rs
  line: 88
  summary: Missing balance/cost check before broadcasting execution transaction; also
    hardcoded to specific network instead of being generic
- file: leo/cli/commands/mod.rs
  line: 133
  summary: Shared transaction-building helpers lack cost estimation and balance validation
    before submission
