description: The Leo type checker was missing a validation for empty structs (structs
  declared without any members). This allowed invalid programs to pass type checking.
  The fix adds a check in check_program.rs that verifies structs have at least one
  member and emits an informative error via a new type_checker_error variant if they
  don't.
