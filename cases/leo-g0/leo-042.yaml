description: Bug in the SSA (Static Single Assignment) pass where assignment statements
  were processed in the wrong order. The left-hand side was being renamed before the
  right-hand side, causing the RHS to incorrectly reference the new SSA variable name
  instead of the old one. The fix ensures the RHS is reconstructed first before renaming
  the LHS.
