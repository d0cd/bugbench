description: AST snapshot output files were not prepended with the program name, causing
  programs with imports to overwrite each other's AST output files. The fix prepends
  the program name to the AST JSON output filenames (e.g., 'test.initial_input_ast.json')
  so each program's snapshots are uniquely named.
