description: The Leo compiler had incorrect validation for hex character literals
  and unicode escape sequences. The fix tightens the hex value range check in char_types.rs
  to only allow values <= 127 (valid ASCII range), and fixes the unicode escape brace-closing
  check in the lexer to properly validate the escape syntax.
expected_findings:
- file: input/src/values/char_types.rs
  line: 107
  summary: Hex character range check was incorrect; should reject values > 127 since
    only ASCII-range hex escapes (\x00-\x7F) are valid
- file: parser/src/tokenizer/lexer.rs
  line: 113
  summary: Unicode escape sequence parsing did not properly validate the closing brace,
    allowing malformed \u{...} sequences to pass
