  summary: "Missing import of `AffineCurve`, `One`, and `TEModelParameters` traits\
    \ \u2014 without these, the group implementation cannot construct or recognize\
    \ the `1group` generator element."
- file: compiler/src/group/mod.rs
  line: 4
  summary: "Missing import of `One` trait from curves crate \u2014 the group module\
