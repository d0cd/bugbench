description: The Leo compiler's group type lacked support for the `1group` syntax,
  which represents the affine generator point of the curve. The fix imports the `One`
  and `AffineCurve`/`TEModelParameters` traits from the curves crate and adds handling
  for the `1group` literal in the edwards_bls12 group implementation, enabling users
  to reference the group generator element in their programs.
