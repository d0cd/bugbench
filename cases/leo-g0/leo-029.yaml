description: When running `leo devnet` on a machine with an existing tmux server,
  environment variables (specifically CONSENSUS_VERSION_HEIGHTS) were inherited from
  the server's original environment rather than the current process environment. The
  fix ensures the environment variable is explicitly passed to the tmux session rather
  than relying on tmux server inheritance.
expected_findings:
- file: leo/cli/commands/devnet/mod.rs
  line: 344
  summary: tmux command args do not explicitly pass CONSENSUS_VERSION_HEIGHTS via
    -e flag; relying on tmux server environment inheritance causes stale values when
    a tmux server already exists
