description: The `--skip` option for `leo upgrade` was not functioning correctly,
  preventing users from skipping upgrades of specific programs by name. The fix adds/corrects
  the `--skip` clap argument across multiple upgrade command structs (Upgrade, UpgradeImported,
  UpgradeSingle) and implements the skip-matching logic. Additionally, CLI output
  spacing was improved and integration tests were made more robust by using dynamic
  port allocation.
