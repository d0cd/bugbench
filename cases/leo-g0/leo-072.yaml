description: The SSA (Static Single Assignment) reconstruction pass did not correctly
  handle early return statements that return tuples. When a function contained an
  early return with a tuple value, the SSA renaming logic failed to properly decompose
  and reconstruct the tuple elements, leading to incorrect compiled output. The fix
  updates the return statement transformation in the SSA pass to properly handle tuple
  returns by decomposing them into individual element assignments.
expected_findings:
- file: compiler/passes/src/static_single_assignment/rename_statement.rs
  line: 26
  summary: "ReturnStatement handling does not account for tuple return values \u2014\
    \ when a return expression is a tuple, each element needs to be individually assigned\
    \ and tracked in SSA, but the original code treats the entire tuple as a single\
    \ value."
- file: compiler/passes/src/static_single_assignment/rename_program.rs
  line: 50
  summary: "SSA reconstruction at function level does not properly merge tuple return\
    \ values from different control flow paths \u2014 tuple elements need individual\
    \ phi-like ternary reconstruction, requiring iteration over tuple components (itertools)."
