description: The Leo lexer did not properly handle a single `&` character not followed
  by another `&` to form the `&&` operator. Instead of producing a clear error message,
  the lexer's `eat` function would generate a confusing error about expecting `&`.
  The fix improves the error handling for lone `&` and also simplifies the `fn eat`
  method.
expected_findings:
- file: compiler/parser/src/tokenizer/lexer.rs
  line: 229
  summary: Single-character token consumption for `&` does not handle the case where
    the next character is not `&`; should produce a clear 'unexpected token' error
    instead of blindly expecting `&&`.
- file: compiler/parser/src/tokenizer/lexer.rs
  line: 172
  summary: The `eat` helper function lacks proper error handling when the expected
    character is not found, leading to misleading error messages for incomplete operators
    like lone `&`.
