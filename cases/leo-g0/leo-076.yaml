description: The Leo compiler failed to detect namespace conflicts between circuits,
  functions, aliases, and global constants, and also allowed illegal variable shadowing
  of parameters and global constants. The fix adds cross-namespace collision checks
  in the ASG scope/program resolution and cleans up import resolution to properly
  track and validate global constant definitions.
expected_findings:
- file: asg/src/program/mod.rs
  line: 130
  summary: 'Missing cross-namespace conflict check: defining a circuit/function/alias/global_const
    should verify the name is not already used in any other global namespace (circuits,
    functions, aliases, global consts).'
- file: asg/src/statement/definition.rs
  line: 110
  summary: 'Missing shadowing check: variable definitions should verify the name does
    not shadow a function parameter or a global constant, and raise an error if so.'
- file: asg/src/program/function.rs
  line: 141
  summary: 'Missing check: function parameter names should be validated against global
    constants to prevent illegal shadowing of global consts by function inputs.'
