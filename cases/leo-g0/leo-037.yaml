description: The Leo parser incorrectly parsed negative scalar and field literals
  (e.g., `-1scalar`, `-1field`) as unary negation expressions applied to positive
  literals, instead of treating them as single negative literal values. The fix modifies
  the expression parser to recognize the negative sign as part of the scalar/field
  literal token rather than as a separate unary operator.
expected_findings:
- file: compiler/parser/src/parser/expression.rs
  line: 248
  summary: 'Missing handling for negative scalar/field literals: when parsing a unary
    negation followed by a numeric literal with scalar or field suffix, the parser
    should produce a single negative literal expression instead of a Negate(literal)
    unary expression.'
