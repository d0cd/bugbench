description: The PEG grammar in leo.pest did not correctly handle array slices with
  an omitted lower bound (e.g., `arr[..2]`). The range parsing rule required both
  bounds to be present, causing lower-only slices to fail. The fix updates the grammar
  rule to make the left-hand side of the range operator optional and adjusts the Range
  AST struct in range.rs accordingly.
expected_findings:
- file: grammar/src/leo.pest
  line: 70
  summary: Grammar rule for range/slice does not make the lower bound optional. Expressions
    like `arr[..2]` (omitting the start index) will fail to parse because the rule
    requires an expression on both sides of the `..` operator.
- file: grammar/src/common/range.rs
  line: 20
  summary: Range AST struct does not account for an optional lower bound. The `from`
    field should be `Option<T>` to support slice expressions where the start index
    is omitted (e.g., `arr[..2]`).
