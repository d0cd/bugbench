description: 'Multiple parser and tokenizer bugs in the Leo compiler: off-by-one errors
  in column span calculation for escaped characters in the canonicalizer, incorrect
  character literal parsing in the lexer''s eat_char function (handling escaped, hex,
  and unicode chars), wrong newline offset calculation in the tokenizer, and missing/incorrect
  error messages for malformed annotations and hex integers. The fixes correct span
  arithmetic, character parsing logic, error message formatting, and test framework
  file filtering.'
expected_findings:
- file: compiler/ast-passes/src/canonicalization/canonicalizer.rs
  line: 550
  summary: 'Off-by-one in col_stop calculation: `bytes[col_start - 1] == b''\\''`
    uses wrong index to detect escaped characters, leading to incorrect source spans
    for char/string literals.'
- file: compiler/parser/src/tokenizer/mod.rs
  line: 56
  summary: 'Incorrect line length calculation: `input[line_start..].find(''\n'').unwrap_or(input.len())`
    should use `unwrap_or(input.len() - line_start)` since find returns a relative
    offset from line_start, not an absolute position.'
- file: compiler/parser/src/tokenizer/lexer.rs
  line: 66
  summary: The eat_char function has incorrect logic for parsing escaped, hex, and
    unicode character literals, failing to properly validate or consume multi-byte
    escape sequences.
