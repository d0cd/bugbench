description: The Leo compiler panics when a loop iteration bound literal exceeds the
  range of its integer type, because the Literal::Integer to Value conversion uses
  unwrap() on a parse result that returns Err for out-of-range values. The fix adds
  proper ParseIntError handling in value/mod.rs and validates iteration bound literals
  in the type-checking pass (check_statements.rs), emitting a compiler error instead
  of panicking.
expected_findings:
- file: compiler/ast/src/value/mod.rs
  line: 865
  summary: 'Unsafe unwrap() on integer parse result: if the literal string exceeds
    the integer type''s range, parse will return Err and unwrap() will panic. Should
    use proper error handling (e.g., map_err or match) to produce a compiler error.'
- file: compiler/passes/src/type_checking/check_statements.rs
  line: 349
  summary: 'Missing validation of iteration bound literals: loop bounds that are too
    large for the declared integer type are not checked here, allowing invalid literals
    to reach the panicking code path in Value conversion.'
- file: compiler/passes/src/type_checking/check_statements.rs
  line: 366
  summary: "Missing validation of the upper iteration bound literal: same issue as\
    \ the lower bound \u2014 no check that the literal fits within the integer type's\
    \ range before conversion."
