description: Circuit variables in Leo lacked mutability tracking, meaning all circuit
  member variables were implicitly immutable with no way to make them mutable. The
  fix adds an optional `mut` keyword to circuit variable definitions, threads mutability
  information through the AST and typed representations, and adds an immutability
  check in the circuit variable assignment statement that errors when attempting to
  assign to a non-mutable circuit variable.
expected_findings:
- file: compiler/src/statement/assign/circuit_variable.rs
  line: 33
  summary: 'Missing mutability check: circuit variable assignment does not verify
    the target circuit member is declared as mutable before allowing assignment, permitting
    mutation of immutable circuit fields.'
- file: compiler/src/expression/circuit/circuit.rs
  line: 55
  summary: CircuitMember::CircuitVariable does not carry a mutability flag (is_mutable),
    so downstream code cannot distinguish mutable from immutable circuit fields.
- file: typed/src/circuits/circuit_member.rs
  line: 26
  summary: CircuitMember::CircuitVariable variant lacks an is_mutable boolean field,
    preventing the type system from tracking whether a circuit variable was declared
    with `mut`.
