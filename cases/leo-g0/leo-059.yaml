description: The `leo run` command failed to correctly parse negative number arguments
  (e.g., `-5`) because they were being interpreted as CLI flags by snarkvm. The fix
  adds a `--` separator before program arguments to prevent negative values from being
  misinterpreted as option flags. The PR also renames `Deploy` to `LeoDeploy` for
  consistency.
