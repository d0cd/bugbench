description: 'Signed integer division fails when the denominator is the minimum value
  (e.g., -128 for i8) because the division algorithm computes the two''s complement
  of the denominator, which has no valid inverse for the minimum value. The fix adds
  special-case checks: if the denominator is the minimum value, the result is 1 when
  numerator equals denominator, and 0 otherwise, since division rounds toward zero.'
expected_findings:
- file: gadgets/src/signed_integer/arithmetic/div.rs
  line: 23
  summary: Division algorithm does not handle the case where the denominator is the
    minimum signed value (e.g., -128 for i8), whose two's complement cannot be represented.
    Needs special-case logic for min-value denominators.
- file: gadgets/src/signed_integer/arithmetic/div.rs
  line: 85
  summary: The division macro computes two's complement of the denominator without
    checking if it is the minimum value, which has no valid inverse. This causes incorrect
    results or failures for expressions like `1 / -128`.
- file: compiler/tests/integers/int_macro.rs
  line: 115
  summary: Test assumes all signed integer values have a valid inverse for division,
    but the minimum value (e.g., i8::MIN = -128) does not. Missing test coverage for
    division by the minimum signed value.
