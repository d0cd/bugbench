description: "The pest parser grammar did not require whitespace after the `mut` keyword,\
  \ allowing invalid syntax like `letmut` to be parsed as valid Leo code. The fix\
  \ adds a mandatory space in the `mutable` grammar rule (`\"mut\"` \u2192 `\"mut\
  \ \"`) and also adds support for optional trailing commas after circuit member fields."
expected_findings:
- file: ast/src/leo.pest
  line: 18
  summary: Grammar rule `mutable` matches `"mut"` without requiring trailing whitespace,
    allowing invalid token concatenation like `letmut` to parse successfully. Should
    be `"mut "`.
- file: ast/src/leo.pest
  line: 177
  summary: Circuit member definition does not allow an optional trailing comma after
    the last field, which is inconsistent with common language conventions and causes
    parse errors for trailing commas.
