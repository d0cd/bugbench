description: The Leo compiler did not check for duplicate function definitions. When
  a function (especially `main`) was defined more than once with different signatures,
  instead of reporting an error, the compiler would proceed and potentially cause
  confusing return type mismatch errors. The fix adds a duplicate function definition
  check in the ASG program construction.
expected_findings:
- file: asg/src/program/mod.rs
  line: 266
  summary: 'Missing duplicate function definition check: when iterating over function
    definitions, there is no guard to detect and reject a function name that has already
    been defined, leading to silent overwrites and confusing downstream type errors.'
