description: The compiler lacked proper namespace scoping using Span, which could
  cause constraint name collisions and unhelpful error messages without source location
  information. The fix propagates Span through all constraint enforcement functions
  and error types to ensure unique namespaces per source line and formatted error
  output with file positions.
expected_findings:
- file: compiler/src/constraints/mod.rs
  line: 1
  summary: Constraint enforcement functions do not accept or propagate Span information,
    leading to non-unique constraint namespaces and unformatted error messages.
- file: compiler/src/compiler.rs
  line: 29
  summary: Compiler constructor does not incorporate package_name into a Span-based
    namespace, causing potential constraint collisions across files.
- file: compiler/src/constraints/expression.rs
  line: 2
  summary: Expression constraint functions missing Span parameter, so errors cannot
    report source location and constraint names are not uniquely scoped.
