description: The `leo deploy` command used `BuildOptions::default()` which set `conditional_block_max_depth`
  to `0`, causing a panic when deploying programs containing conditionals in async
  function scope. The fix replaces the hardcoded default with a `#[clap(flatten)]`
  BuildOptions field so the deploy command inherits proper build configuration.
