description: The Leo config file constant was set to "leo.config" instead of "config.toml",
  causing Leo to look for/create the wrong config filename in the ~/.leo/ directory.
  The fix updates the LEO_CONFIG_FILE constant (appearing at two locations in config.rs)
  to use the correct "config.toml" name.
