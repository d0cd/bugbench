description: 'Two related bugs in Leo''s error reporting: (1) UtilError::network_error
  and failed_to_retrieve_from_endpoint were annotated as @formatted (requiring source
  spans) instead of @backtraced, causing failures when no span is available. (2) The
  Formatted error''s Display impl silently swallowed the error message when it couldn''t
  locate the source file, so users received no error output at all.'
expected_findings:
- file: errors/src/common/formatted.rs
  line: 88
  summary: "Display impl for Formatted only prints the error message inside the `if\
    \ let Some(source_file)` branch \u2014 if the source file is not found, the entire\
    \ error message is silently dropped. Should print the error message regardless\
    \ of whether the source file is available."
- file: errors/src/errors/utils/util_errors.rs
  line: 61
  summary: "network_error is annotated as @formatted but has no associated span \u2014\
    \ should be @backtraced since there is no source location to display."
- file: errors/src/errors/utils/util_errors.rs
  line: 138
  summary: "failed_to_retrieve_from_endpoint is annotated as @formatted but has no\
    \ associated span \u2014 should be @backtraced since there is no source location\
    \ to display."
