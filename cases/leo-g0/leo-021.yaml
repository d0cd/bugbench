description: When assigning a mutable variable to another mutable variable in Leo,
  the compiler did not properly handle the value semantics, likely sharing the underlying
  value instead of creating an independent copy. The fix corrects the assignment logic
  in the value representation so that nested mutable variable assignments produce
  independent values.
expected_findings:
- file: compiler/src/value/value.rs
  line: 229
  summary: Mutable-to-mutable variable assignment does not clone/deep-copy the value,
    causing mutations to one variable to incorrectly affect the other.
