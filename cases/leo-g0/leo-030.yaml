description: When importing dependent chains of .aleo programs (e.g., program A imports
  program B which imports program C), the dependency resolution used unordered collections
  (HashMap/HashSet), causing programs to be fetched and processed in arbitrary order.
  This meant a dependent program could be processed before its dependency was available,
  leading to import failures. The fix switches to IndexMap/IndexSet to preserve insertion
  order and adjusts the dependency gathering logic in package.rs to account for existing
  dependencies.
expected_findings:
- file: leo/package/src/program.rs
  line: 21
  summary: Using unordered HashMap/HashSet for program imports loses dependency ordering;
    dependent chains of .aleo programs require insertion-order-preserving collections
    (IndexMap/IndexSet) to ensure dependencies are resolved before dependents.
- file: leo/package/src/package.rs
  line: 341
  summary: Dependency retrieval does not account for already-fetched dependencies
    when building the import chain, causing redundant fetches or missing transitive
    dependencies in dependent .aleo program chains.
