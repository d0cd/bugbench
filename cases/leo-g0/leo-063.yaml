description: The ABNF-to-Markdown converter in grammar/src/main.rs silently skipped
  `%s` case-sensitive string rules because the Rust ABNF package does not support
  parsing them. This caused the generated grammar Markdown to be incomplete, omitting
  case-sensitive string specifications that are part of the ABNF standard. The fix
  adds explicit handling for `%s` prefixed strings in the converter logic.
