description: Network responses such as 'Too Many Requests' error messages were being
  erroneously cached as valid Aleo programs in the .aleo/registry directory. The fix
  adds validation to ensure that fetched content is a valid program before writing
  it to the cache, and consolidates duplicated network retrieval logic between `leo
  query` and the `retriever` module.
expected_findings:
- file: utils/retriever/src/retriever/mod.rs
  line: 310
  summary: 'Missing validation: network-fetched program text is written to cache without
    verifying it parses as a valid Program. Error responses (e.g. ''Too Many Requests'')
    get cached as if they were valid programs.'
- file: leo/cli/commands/query/mod.rs
  line: 74
  summary: Duplicated network retrieval logic that also lacks validation of fetched
    program content before use, allowing invalid/error responses to be treated as
    programs.
