description: 'Multiple bugs in the Leo compiler: (1) Display/fmt implementations for
  Field and Group values failed or produced incorrect output when printing constraint
  values, (2) constant inputs were not properly validated against non-constant declarations
  and vice versa, causing silent type mismatches, and (3) Windows-specific warnings
  from logger/main setup. Fixes include correcting Display trait implementations,
  adding integer type mismatch checks for constant inputs, and cleaning up platform-specific
  code.'
expected_findings:
- file: compiler/src/value/field/field_type.rs
  line: 247
  summary: Display impl uses get_value().ok_or(std::fmt::Error) which fails for allocated
    (non-constant) field values, preventing correct output printing
- file: compiler/src/value/integer/integer.rs
  line: 160
  summary: "Integer type mismatch error not raised correctly for constant inputs \u2014\
    \ should validate that input integer type matches declared type to prevent silent\
    \ mismatches"
- file: compiler/src/value/value.rs
  line: 96
  summary: ConstrainedValue::Field Display implementation delegates to field value's
    fmt but does not handle the case where the underlying value is not yet resolved,
    leading to printing failures
