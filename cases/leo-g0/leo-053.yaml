description: Static functions could not call other static functions within the same
  circuit using `Self::method()` syntax. The static access expression handler did
  not properly resolve the `Self` keyword as a valid circuit identifier when inside
  a static function context. The fix adds `SelfType` parsing support in the grammar
  and AST, and updates the static access resolver to match on `SelfType` and resolve
  it to the enclosing circuit.
expected_findings:
- file: compiler/src/expression/circuit/static_access.rs
  line: 36
  summary: Static access handler does not handle `Self` keyword as a circuit identifier,
    preventing `Self::method()` calls from within static functions. Needs to match
    on SelfType and resolve to the enclosing circuit.
- file: ast/src/leo.pest
  line: 369
  summary: Grammar rule for circuit static access expression does not include `type_self`
    as a valid prefix, so `Self::method()` cannot be parsed.
- file: ast/src/common/keyword_or_identifier.rs
  line: 29
  summary: KeywordOrIdentifier enum lacks a SelfType variant, so the parser cannot
    represent `Self` as a valid keyword in static access expressions.
