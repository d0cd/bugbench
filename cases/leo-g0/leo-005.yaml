description: The `leo query program` command constructed the API URL with `/latest`
  as the default edition suffix, but the `/latest` endpoint was deprecated or changed.
  The fix omits the edition from the URL when the user has not explicitly specified
  one, allowing the API to return the latest program version by default.
expected_findings:
- file: leo/cli/commands/query/program.rs
  line: 63
  summary: URL construction always appends an edition (defaulting to `/latest`) which
    hits a deprecated endpoint. When no edition is specified by the user, the edition
    segment should be omitted from the URL entirely.
