description: Binary expression type resolution in the ASG did not properly handle
  Field and Group types for addition operations. The pattern matching in binary.rs
  was missing match arms for PartialType::Type(Type::Field) (and likely Type::Group),
  causing field and group addition to fail. The fix adds the correct match arms and
  corresponding pass tests.
expected_findings:
- file: asg/src/expression/binary.rs
  line: 134
  summary: 'Missing match arm for Field/Group types in binary expression type resolution:
    addition of field or group values is not handled, causing these valid operations
    to be rejected or mistyped.'
