description: During loop unrolling, local symbol tables were cloned without generating
  fresh NodeIDs, causing all unrolled iterations to share the same scope identities.
  The fix introduces `enter_scope_duped` on SymbolTable and `in_scope_duped` on Duplicator,
  ensuring each reconstructed scope in `reconstruct_block` and `reconstruct_iteration`
  receives unique NodeIDs and independent local tables.
expected_findings:
- file: compiler/passes/src/loop_unrolling/duplicate.rs
  line: 30
  summary: Scope duplication during loop unrolling clones the symbol table without
    generating fresh NodeIDs, causing all unrolled loop iterations to share the same
    scope identity and potentially collide.
- file: compiler/passes/src/loop_unrolling/duplicate.rs
  line: 56
  summary: reconstruct_block does not use scope duplication with fresh IDs; cloned
    scopes from loop unrolling will have conflicting NodeIDs across iterations.
- file: compiler/passes/src/common/symbol_table/mod.rs
  line: 95
  summary: SymbolTable lacks a method to duplicate a local scope with a fresh NodeID;
    enter_scope only creates empty scopes or clones existing ones without ID regeneration.
