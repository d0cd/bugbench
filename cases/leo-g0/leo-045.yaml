description: Leo's parser and canonicalizer allowed 1-element tuple types and single-variable
  parenthesized definitions (e.g., `let (x) = ...`), which are semantically invalid.
  The fix adds a `parened` field to Definition statements to track parenthesization,
  then the canonicalizer rejects single-variable definitions that are parenthesized,
  and 1-element tuple types are disallowed.
expected_findings:
- file: ast-passes/src/canonicalization/canonicalizer.rs
  line: 376
  summary: 'Missing validation: canonicalizer does not check for single-variable parenthesized
    definitions, allowing invalid `let (x) = ...` syntax to pass through'
- file: parser/src/parser/statement.rs
  line: 295
  summary: Parser does not track whether variable names in a definition statement
    are parenthesized, losing information needed to reject 1-element tuple-style definitions
- file: errors/src/ast/ast_errors.rs
  line: 130
  summary: Missing error variant for single-element tuple types and parenthesized
    single-variable definitions
