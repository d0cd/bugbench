description: Leo's custom panic hook remained active when invoking Aleo CLI commands
  (build, deploy, new, run), causing panics originating in the Aleo CLI to be caught
  by Leo's panic handler and producing misleading error output. The fix unsets the
  Leo panic hook before each Aleo CLI invocation across four command files.
expected_findings:
- file: leo/commands/build.rs
  line: 180
  summary: 'Missing panic hook reset: Leo''s custom panic hook is still active when
    invoking the Aleo CLI, which can produce confusing error messages if the Aleo
    CLI panics'
- file: leo/commands/deploy.rs
  line: 50
  summary: Missing panic hook reset before Aleo CLI invocation in deploy command
- file: leo/commands/run.rs
