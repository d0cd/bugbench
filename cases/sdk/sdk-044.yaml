description: The SDK had build and CI failures due to missing dependency configuration
  and code structure issues. The fix adds the rand_chacha dependency to Cargo.toml,
  restructures the transaction module (splitting into delegate/dummy submodules),
  and updates CLI argument handling to enable verbose mode, allowing CI to pass.
