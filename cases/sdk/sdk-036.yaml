description: 'The SDK''s polyfill setup was using xmlhttprequest-ssl for Node.js compatibility,
  which caused issues (referenced in issue #956). The fix replaced the XMLHttpRequest
  polyfill approach with sync-request, updated the fetch polyfill, fixed the Worker
  polyfill''s null check, and adjusted rollup config externals to match the new dependency.
  This ensures proper HTTP request handling in non-browser environments.'
