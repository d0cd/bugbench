description: 'Two bugs fixed: (1) The Execute.js component required non-empty inputs
  via `if (!!inputs)` check, preventing programs with zero inputs from being executed
  on aleo.tools. (2) The CLI updater referenced an incorrect repository name constant,
  breaking the update path.'
expected_findings:
- file: website/src/tabs/develop/Execute.js
  line: 125
  summary: Truthy check `if (!!inputs)` blocks execution when inputs array is empty.
    Programs with zero inputs cannot be run. Should allow empty/falsy inputs to proceed.
- file: cli/helpers/updater.rs
  line: 26
  summary: ALEO_REPO_NAME constant set to incorrect repository name (e.g., 'sdk' instead
    of the correct repo name), causing CLI update checks to target the wrong GitHub
    repository.
