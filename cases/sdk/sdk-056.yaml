description: The `verifyFunctionExecution` method in the WASM SDK did not load imported
  programs into the Process before attempting to verify an execution. This caused
  verification to fail for any program that used imports. The fix adds logic to resolve
  and add all imported programs to the ProcessNative instance before calling verify.
expected_findings:
- file: wasm/src/programs/execution.rs
  line: 107
  summary: 'Missing import resolution: verifyFunctionExecution creates a Process and
    verifies execution without first loading the program''s imports via process.add_program(),
    causing verification failure for programs with dependencies.'
