description: The AleoNetworkClient automatically adds a default `X-Aleo-SDK-Version`
  header on initialization with no way to remove or override it. When ProgramManager
  constructs the network client, this non-standard header triggers CORS preflight
  failures in browser environments. The fix adds setHeader/removeHeader methods and
  an optional headers parameter to ProgramManager's constructor.
expected_findings:
- file: sdk/src/network-client.ts
  line: 37
  summary: Constructor sets default `X-Aleo-SDK-Version` header with no mechanism
    to remove or override it after construction, causing CORS issues in browser contexts.
- file: sdk/src/program-manager.ts
  line: 90
  summary: ProgramManager constructor creates AleoNetworkClient without exposing header
    configuration, propagating the CORS-triggering default header with no way for
    callers to control it.
