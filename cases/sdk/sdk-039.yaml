description: The SDK's KeyProvider was fetching credits.aleo verifying keys from a
  remote server, a pattern left over from Testnet3. After the network transition,
  keys are now embedded in SnarkVM, so the KeyProvider needed to be updated to source
  them locally from SnarkVM instead of making remote fetches, which was causing failures
  for SDK users.
expected_findings:
- file: sdk/src/function-key-provider.ts
  line: 33
  summary: KeyProvider fetches verifying keys from a remote URL instead of sourcing
    them directly from SnarkVM, causing failures when the remote is unavailable or
    returns outdated keys.
- file: wasm/src/programs/verifying_key/credits.rs
  line: 18
  summary: The credits verifying key retrieval function needs to use SnarkVM's built-in
    keys rather than relying on external sources.
- file: sdk/src/program-manager.ts
  line: 597
  summary: Transfer transaction builder passes key parameters assuming remote-fetched
    keys; should use SnarkVM-provided verifying keys directly.
