description: 'Two UI logic bugs in the algebra page: (1) The multiplicative inverse
  calculation required both field elements to be populated, but it only needs one
  input. The condition checked if num1 AND num2 were empty instead of handling the
  single-input ''mulinv'' operation separately. (2) The scalar multiplication random
  button did not trigger a recalculation of the result, so clicking ''Random'' left
  stale output displayed.'
expected_findings:
- file: website/src/tabs/algebra/FieldArithmetic.jsx
  line: 47
  summary: 'Incorrect guard condition: multiplicative inverse (''mulinv'') only requires
    one field element, but the existing condition blocks calculation unless both num1
    and num2 are populated. Should short-circuit for ''mulinv'' when only num1 is
    present.'
- file: website/src/tabs/algebra/GroupArithmetic.jsx
  line: 152
  summary: 'Missing result update: the onScalarRandom handler sets the scalar state
    but does not trigger a recalculation of the group operation result, causing the
    displayed result to be stale after clicking Random.'
- file: website/src/tabs/algebra/GroupArithmetic.jsx
