description: Logging the full Aleo program bytecode in the `buildProvingRequest` call
  produced excessive log output, causing issues in GCP for deployed services like
  the USDCx bridge. The fix replaces the verbose log statement with one that only
  logs the function name instead of the entire program bytecode.
