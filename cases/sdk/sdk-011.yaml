description: The REST API route paths for 'latest height' and 'latest hash' endpoints
  included an extra '/block/' segment, making them inconsistent with the corresponding
  snarkOS endpoints. The fix removes '/block/' from the routes, changing '/testnet3/latest/block/height'
  to '/testnet3/latest/height' and '/testnet3/latest/block/hash' to '/testnet3/latest/hash'.
