description: Circular dependency warnings in Rollup were caused by modules importing
  from each other in a cycle. The fix reorganizes imports and moves declarations (e.g.,
  `logAndThrow` into utils, wasm re-exports) to break the circular chains, and updates
  test config to suppress unrelated warnings. No behavioral change.
expected_findings:
- file: sdk/src/browser.ts
  line: 1
  summary: 'Circular dependency: browser.ts re-exports or imports symbols that form
    a cycle with other modules; logAndThrow should be imported from utils instead.'
- file: sdk/src/constants.ts
  line: 1
  summary: 'Circular dependency: constants.ts imports from wasm.ts which may transitively
    import back, creating a circular module reference.'
- file: sdk/rollup.config.js
  line: 32
  summary: Missing external declaration for 'core-js/proposals/json-parse-with-source.js'
    causes Rollup warning about unresolved dependency.
