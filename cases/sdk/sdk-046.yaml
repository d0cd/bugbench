description: The app failed to load on mobile or slow connections because WASM worker
  initialization was not properly synchronized with app rendering. The fix adds a
  WorkerProvider/WorkerContext to ensure the app waits for the worker to finish initializing
  before rendering, displaying a spinner during initial asset loading.
expected_findings:
- file: website/src/aleo-wasm-hook.js
  line: 1
  summary: "WASM initialization hook lacks synchronization \u2014 app can render before\
    \ the worker is ready, causing failures on slow connections"
- file: website/src/index.jsx
  line: 3
  summary: Missing WorkerProvider wrapper means app components mount without waiting
    for worker initialization to complete
- file: website/src/workers/worker.js
  line: 1
  summary: Worker does not signal readiness back to the main thread, so the app has
    no way to know when initialization is complete
