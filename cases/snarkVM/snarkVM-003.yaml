  \r\nThis allows us to accurately track the performance history.\r\n\r\nBenchmarks\
  \ can be found here - https://provablehq.github.io/snarkVM/dev/bench/\r\n\r\nNote:\
  \ I believe the previous benchmarks were also lost with the repo migration"
