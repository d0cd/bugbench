description: Identifier::from_bits_le was missing string sanity checks during deserialization,
  allowing potentially invalid or malformed identifiers to be constructed from arbitrary
  bits. The fix adds UTF-8 and identifier validity checks in both the console and
  circuit implementations of from_bits_le, ensuring that bit sequences that don't
  represent valid identifiers are rejected.
expected_findings:
- file: console/program/src/data/identifier/from_bits.rs
  line: 24
  summary: 'Missing validation: from_bits_le parses bytes as UTF-8 string without
    checking identifier string sanity (e.g. valid characters, non-empty, length bounds)'
- file: circuit/program/src/data/identifier/from_bits.rs
  line: 29
  summary: 'Missing validation: circuit from_bits_le ejects bits and reconstructs
    identifier without enforcing string sanity checks on the resulting value'
- file: console/program/src/data/identifier/from_bits.rs
  line: 34
  summary: 'Missing validation: second code path for from_bits_le also lacks identifier
    string sanity check after UTF-8 parsing'
