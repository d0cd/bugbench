introducing_pr_title: Add `check_*` methods for transactions
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR adds\
  \ the `VM::check_transaction`, `VM::check_deployment`, and `VM::check_execution`\
  \ functions, each of which returns a `Result`. The `VM::verify_transaction`, `VM::verify_deployment`\
  \ and `VM::verify_execution` functions have been updated to call the corresponding\
  \ `VM::check_*` function and logging the error if one exists.\r\n\r\nThe purpose\
  \ of this distinction is to improve the clarify of transaction verification using\
  \ explicit errors instead of just `warn!` logs."
