introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR adds\
  \ implementations for Keccak and SHA-3. In its current form, all hashing operations\
  \ are supported to our literal types only. In the future, support for boolean and\
  \ byte arrays will be added.\r\n\r\nThis PR adds the following instructions:\r\n\
  ```\r\nhash.keccak256\r\nhash.keccak384\r\nhash.keccak512\r\nhash.sha3_256\r\nhash.sha3_384\r\
  \nhash.sha3_512\r\n```\r\n"
