kind: bug
language: rust
base_commit: 5627c372fa2a57d5d2066aaa65fbf5f967467ef0
fix_commit: 6758aafd3194ef1f2938cfdf22a212b78d4d7dbc
fix_pr_number: 1449
introducing_pr_number: 1210
introducing_pr_title: Allow storage queries for items that are still pending
introducing_pr_body: "I've considered alternative approaches to this, and in the end\
  \ decided to propose 2 new methods for `MapRead`:\r\n- a required `get_batched`,\
  \ which works much like a `MapRead::get`, but on the pending atomic write batch\r\
  \n- a provided `get_speculative` method which first performs a plain `get`, and\
  \ only falls back to `get_batched` if the former doesn't return a value\r\n\r\n\
  One of the existing related tests was extended with the new calls.\r\n\r\nAs for\
  \ alternatives, the existing `get` could be extended with a `bool` parameter indicating\
  \ whether the search should include the pending batch, but that would require a\
  \ lot of changes to the existing calls. Making it the default is also not necessarily\
  \ desirable, as it is a performance penalty.\r\n\r\nOptional tweaks: the new `get_speculative`\
  \ method could first check the pending batch and only then fall back to the \"finalized\"\
  \ records; it's a performance consideration that depends on the expected use cases.\
  \ The new method names could be changed too.\r\n\r\nCloses https://github.com/AleoHQ/snarkVM/issues/1203."
