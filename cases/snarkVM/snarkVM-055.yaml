introducing_pr_title: Use `BTreeMap` in `MerkleTree::update_many` to enforce uniqueness
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR replaces\
  \ `&[(usize, LH::Leaf)]` with `&BTreeMap<usize, LH::Leaf>` in `MerkleTree::update_many`\
  \ to enforce ordering during the update. \r\n\r\n`update_many` requires the leaf\
  \ indices to be sorted in descending order and be unique, so using a `BTreeMap`\
  \ covers both cases.\r\n"
