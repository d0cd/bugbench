introducing_pr_title: '[Feat] Introduces Record Versioning (V1), Sender Ciphertext,
  & Fixes Record Commitment'
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Changelog\r\n\r\nThis PR includes\
  \ the following major changes:\r\n- Introduces `Record::version` with Version 0\
  \ (old) and Version 1 (new)\r\n- Introduces `Record::is_hiding` which is `true`\
  \ on Version 1 and `false` on Version 0\r\n- Updates `Record::to_bits` serialization\
  \ to support record versioning\r\n- Fixes `Record::to_commitment` to use BHP commitments\
  \ on Version 1\r\n- Adds a `sender_ciphertext` which encrypts the `signer` address\
  \ under the `recipient`'s address\r\n    - See `Sender Ciphertext` section below\r\
  \n- Adds `Output::decrypt_sender_ciphertext` to decrypt the `sender_ciphertext`\r\
  \n\r\n### Sender Ciphertext\r\n\r\nThis PR introduces a `sender_ciphertext` which\
  \ allows the recipient to decrypt the sender address using their account view key.\r\
  \n\r\nThe encryption scheme is as follows (where `vk` is the recipient's account\
  \ view key, and `G^r` is the record nonce):\r\n```\r\nrecord_view_key := (G^vk)\
  \ * r == (G^r) * vk\r\nrandomizer := Hash_PSD4( ENCRYPTION_DOMAIN || record_view_key\
  \ || 1field )\r\nsender_ciphertext := ToXCoordinate(signer_address) + randomizer\r\
  \n``` \r\n\r\nTo perform decryption of the sender ciphertext, call `Output::decrypt_sender_ciphertext`\
  \ with your `account_view_key`. If the given account view key does not belong to\
  \ the given output record's owner, the function will return an error.\r\n\r\n##\
  \ API Changes\r\n\r\nThe following APIs are impacted by this PR:\r\n- `Request::InputID`\
  \ now includes for record inputs a ` { \"record_view_key\": record_view_key } `\
  \ entry\r\n- `Transition::Output` now includes for record outputs a ` { \"sender_ciphertext\"\
  : sender_ciphertext } ` entry\r\n\r\n\r\n## Parameter changes\r\n\r\nThis PR also\
  \ adds support for credits parameters and v0 credits parameters. The circuit changes\
  \ will break the existing `credits.aleo` VKs for functions that create or consume\
  \ records.\r\n\r\nWhen a VM is loaded, it determines which credits verifying keys\
  \ to use:\r\n- V0 if the VM height is behind `ConsensusVersion::V8`\r\n- V1 if the\
  \ VM height is on or after `ConsensusVersion::V8`\r\n- V0 if the environment is\
  \ a test or the `test` features is enabled.\r\n\r\nOnce the VM passes the `ConsensusVersion::V8`\
  \ height, it will automatically swap the `credits.aleo` VKs to the latest one."
