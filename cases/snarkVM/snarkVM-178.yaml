introducing_pr_title: '[Test] Snapshot Testing for Constraint Counts.'
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR:\r\n\
  - Introduces `UpdatableCount`, a struct that stores the desired number of constants,\
  \ public variables, private variables, and constraints.\r\n\r\n## Usage\r\n1. Initialize\
  \ an `UpdatableCount` using `count_is!` or `count_less_than!`.\r\n2. Use `UpdatableCount::assert_matches`\
  \ to check that the number of constants, variables, and constraints match.\r\n3.\
  \ Set an environment variable `UPDATE_COUNT=<query>` while running `cargo test`\
  \ to update invocations of `count_is!` and `count_less_than!` with correct numbers\
  \ (on failing cases) in the source files whose name contains the substring `<query>`.\r\
  \n\r\nExample. To update counts in `downcast.rs`, run:\r\n```\r\nUPDATE_COUNT=downcast\
  \ cargo test\r\n```\r\n\r\nIf you would like to see update statistics, enable the\
  \ `nocapture` flag.\r\n```\r\nUPDATE_COUNT=downcast cargo test -- --nocapture\r\n\
  ```\r\n\r\n\r\n## Notes\r\nThe updated counts are only accurate for the concrete\
  \ cases that are tested.\r\nWhen using this feature, you may have to run your tests\
  \ (with `UPDATE_COUNT` set) multiple times to reach a fixed point."
