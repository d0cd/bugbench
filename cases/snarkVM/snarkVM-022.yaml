description: During block deserialization, the number of solutions to deserialize
  was not checked against an upper bound before proceeding. This missing validation
  existed for transactions and aborted IDs but was absent for solutions, potentially
  allowing a malicious payload to specify an extremely large solution count and cause
  resource exhaustion or crashes. The fix adds a bounds check consistent with the
  existing checks for other deserialized collections, and also corrects a comment.
expected_findings:
- file: ledger/puzzle/src/solutions/bytes.rs
  line: 20
  summary: 'Missing bounds check: the number of solutions read during deserialization
    is not validated against a maximum before allocating/iterating, unlike similar
    checks for transactions and aborted IDs'
- file: ledger/block/src/bytes.rs
  line: 36
  summary: Incorrect or missing comment describing the deserialization step for ratifications/solutions;
    inconsistent with the bounds-checking pattern used for other fields
