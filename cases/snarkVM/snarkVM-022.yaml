    We (@fuzzinglabs) found a panic while fuzzing `TransitionLeaf::from_str();`.\r\
    \n\r\n```sh\r\nthread 'main' panicked at 'cannot access key \"version\" in JSON\
    \ number', /home/user/.cargo/registry/src/github.com-1ecc6299db9ec823/serde_json-1.0.87/src/value/index.rs:102:18\r\
    \n```\r\n\r\nThis happens as `serde_json` expect a well-formatted input string,\
    \ and panic if the input string does not correspond to the structure you are trying\
    \ to deserialize.\r\n\r\n## Expected Behavior\r\n\r\nParsing of the input JSON\
    \ string should not crash the program.\r\n\r\n## Your Environment\r\n\r\n- <!--\
    \ snarkVM Version --> SnarkVM commit: dbe7111a79dbe9b16d8ab883542e15207664da43\r\
    \n- <!-- Rust Version --> cargo 1.66.0-nightly (082503982 2022-09-13) \r\n- <!--\
