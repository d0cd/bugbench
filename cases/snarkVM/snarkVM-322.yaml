introducing_pr_body: "## Motivation\r\n\r\nWe want to be able to bond balances in\
  \ the genesis block.\r\n\r\nThis PR modifies `Genesis::Ratify`, such that it contains\
  \ the desired state of the `committee`, `account`, and `bonded` mappings in `credits.aleo`.\
  \ This initial state is checked for consistency before it is directly injected into\
  \ the `FinalizeStore`.\r\n\r\n## Related PRs\r\n\r\nhttps://github.com/AleoHQ/snarkOS/pull/3016\r\
  \n"
