introducing_pr_title: '[Go/No-Go] ARC-0037 - Introduce withdrawal address for stakers'
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR implements\
  \ withdrawal addresses that staker can use claim their unbonded credits in accordance\
  \ to [ARC-0037](https://github.com/AleoHQ/ARCs/discussions/51).\r\n\r\nValidators\
  \ and delegators now need to specify an additional `withdrawal_address` when they\
  \ call `bond_public`. While they are bonded this withdrawal address can not be changed,\
  \ which is important because a core reason for this separation of addresses is so\
  \ that the validator funds are secure even if their \"hot\" keys are compromised.\
  \ This withdraw address will receive the credits that are unbonded by the staker\
  \ in `claim_unbond_public`. \r\n\r\n**This is done with the following changes:**\r\
  \n\r\n- Added a new `withdraw` mapping\r\n   - Key: staker address\r\n   - Value:\
  \ withdrawal address\r\n   \r\n- Updated `bond_public`:\r\n  - Add additional withdrawal\
  \ address as input\r\n  - Check if `withdrawal_address` exists in the `withdraw`\
  \ mapping:\r\n\t - true -> Check that the withdrawal address is consistent with\
  \ the one in the mapping (if it already exists)\r\n\t - false -> Update the withdraw\
  \ mapping.\r\n\r\n- Updated `claim_unbond_public`: \r\n  - This is still called\
  \ by the staker.\r\n  - Withdraw the balance to the `withdrawal_address`\r\n  -\
  \ Remove the withdraw address if the bonded entry no longer exists for the staker\r\
  \n\r\n- Updated`BondedBalances`: \r\n  - Add a withdrawal address field\r\n  - Update\
  \ `atomic_pre_ratify` to process the withdrawal addresses\r\n  - Allows specifying\
  \ withdrawal addresses in the genesis block\r\n\r\n## Test Plan\r\n\r\nTests have\
  \ been added to ensure that:\r\n\r\n- The withdrawal address receives the claimed\
  \ unbonded credits.\r\n- The withdrawal address can't be changed unless the staker\
  \ is completely unbonded.\r\n- Stakers can't call `bond_public` with a different\
  \ withdrawal address that was was set in the `withdraw` mapping.\r\n- The processing\
  \ of `Ratify::Genesis` is correct with the new withdrawal addresses.\r\n\r\n## Additional\
  \ Notes\r\n\r\n- A staker must be completely unbonded before they are able to change\
  \ their withdrawal address\r\n- Withdrawal addresses can't be changed once initial\
  \ stake is bonded\r\n\r\n\r\n## Related PRs\r\n\r\nThe sister PR can be found here\
  \ - https://github.com/AleoHQ/snarkOS/pull/3165"
