introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nAs programming\
  \ standards evolve on Aleo, it would be useful to be able to enforce syntactic restrictions\
  \ at the consensus layer. This PR:\r\n- adds a mechanism for describing versioned\
  \ syntax restrictions and enforces them in `check_transactions`.\r\n- adds a CI\
  \ runner with the `test` feature enabled for the `synthesizer` crate.\r\n\r\n##\
  \ Test Plan\r\n\r\nA test was added verifying that syntax restrictions are not enforced\
  \ before a given version height and that they are enforced after.\r\n"
