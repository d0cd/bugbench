introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\n_Adapted from\
  \ subsumed PRs._\r\n\r\n### ECDSA \r\nThis PR introduces native ECDSA signature\
  \ verification to on-chain (`finalize`) execution to improve interoperability and\
  \ broaden supported signature formats. With on-chain verification, programs can\
  \ trust externally signed messages and approvals without off-chain helpers, enabling\
  \ cross-chain messaging, asset flows, multisig/governance, etc. The initial scope\
  \ focuses on verification with a simple canonical representation and deterministic,\
  \ consensus-safe behavior, while leaving room to add other schemes and encodings\
  \ over time.\r\n\r\nThe list of new `ecdsa.verify.<variant>` instructions are as\
  \ follows:\r\n\r\n- `ecdsa.verify.keccak256`\r\n- `ecdsa.verify.keccak256.raw`\r\
  \n- `ecdsa.verify.keccak256.eth`\r\n- `ecdsa.verify.keccak384`\r\n- `ecdsa.verify.keccak384.raw`\r\
  \n- `ecdsa.verify.keccak384.eth`\r\n- `ecdsa.verify.keccak512`\r\n- `ecdsa.verify.keccak512.raw`\r\
  \n- `ecdsa.verify.keccak512.eth`\r\n- `ecdsa.verify.sha3_256`\r\n- `ecdsa.verify.sha3_256.raw`\r\
  \n- `ecdsa.verify.sha3_256.eth`\r\n- `ecdsa.verify.sha3_384`\r\n- `ecdsa.verify.sha3_384.raw`\r\
  \n- `ecdsa.verify.sha3_384.eth`\r\n- `ecdsa.verify.sha3_512`\r\n- `ecdsa.verify.sha3_512.raw`\r\
  \n- `ecdsa.verify.sha3_512.eth`\r\n\r\nThe variant types allow the users to select\
  \ the underlying hash function used, the serialization type (with `.raw`), and if\
  \ the address being verified is a 20-byte Ethereum address. The `.raw` variants\
  \ indicate if the message should be serialized in it's raw bit form or with Aleo\
  \ specific variant bits; this is necessary to ensure compatibility with external\
  \ signing libraries. By default the `.eth` variants will serialize the message in\
  \ it's raw form, so there is no need for an additional `.eth.raw` suffixed variant.\
  \ Both `.raw` and `.eth` variant messages must be \"byte-aligned\", meaning that\
  \ the length of it's bit representation must be a multiple of 8.\r\n\r\n### Hash\
  \ Functions\r\nTo further interoperability of AVM programs between EVM programs,\
  \ this PR introduces `.native` variants of the `hash.keccak*` and `hash.sha3*` opcodes\
  \ that allow the user to output the hash as a bit array. These opcodes do not implicitly\
  \ perform the BHP hash on the result. The PR also introduces `.raw` variants use\
  \ the raw serialization of the pre-image that does not contain any Aleo specific\
  \ variant bits.\r\n\r\nThe list of new instructions are as follows:\r\n\r\n- `hash.keccak256.native`\r\
  \n- `hash.keccak384.native`\r\n- `hash.keccak512.native`\r\n- `hash.sha3_256.native`\r\
  \n- `hash.sha3_384.native`\r\n- `hash.sha3_512.native`\r\n- `hash.keccak256.native.raw`\r\
  \n- `hash.keccak384.native.raw`\r\n- `hash.keccak512.native.raw`\r\n- `hash.sha3_256.native.raw`\r\
  \n- `hash.sha3_384.native.raw`\r\n- `hash.sha3_512.native.raw`\r\n- `hash.keccak256.raw`\r\
  \n- `hash.keccak384.raw`\r\n- `hash.keccak512.raw`\r\n- `hash.sha3_256.raw`\r\n\
  - `hash.sha3_384.raw`\r\n- `hash.sha3_512.raw`\r\n\r\nNote that all `.raw` variant\
  \ inputs must be byte-aligned.\r\n\r\n## Serialization Operations\r\nThis PR also\
  \ introduces `serialize.*` and `deserialize.*` opcodes which allow encoding and\
  \ decoding AVM values to and from bits respectively.\r\n\r\nThe list of new instructions\
  \ are as follows:\r\n\r\n- `serialize.bits`\r\n- `serialize.bits.raw`\r\n- `deserialize.bits`\r\
  \n- `deserialize.bits.raw`\r\n\r\n\r\n## Development Notes\r\n\r\nThe target branch\
  \ has been changed to `staging` to give a complete picture of the work.\r\nPrior\
  \ branches were frozen for audits.\r\n\r\nThis PR subsumes\r\n- #2938 \r\n- #2928\
  \ \r\n- #2913 "
