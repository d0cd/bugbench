introducing_pr_title: Lineval
introducing_pr_body: "**Requires resampling of genesis and proving keys**\r\n\r\n\
  ## Motivation\r\n\r\nAdd support for lineval (part of Varuna), ~10% faster proving\
  \ time for a proof of transfer and simpler and a base for supporting custom gates.\
  \ Some context on what was done in each round:\r\n- Indexing: slightly updated,\
  \ no more use of bivariate derivatives\r\n- Round 1: no more commitment to `z_a`\
  \ and `z_b`\r\n- Round 2: introduced a new round just checking `z_a(X)*z_b(X)=z_c(X)`,\
  \ the next rounds are all one number higher now.\r\n- Round 3: does lineval instead\
  \ of lincheck. instead of check z_M(X) = z(X)*M(X), we just prove equivalence at\
  \ an evaluation `alpha`\r\n- Round 4: updated to reflect the new indexing\r\n- Round\
  \ 5: no change.\r\n\r\n## Test Plan\r\nManually checked the setup time got worse\
  \ and prover time improved.\r\n\r\nWe will add Sage test vectors in future PRs.\r\
  \n\r\n## Related PRs\r\n\r\nhttps://github.com/AleoHQ/protocol-docs/pull/17"
