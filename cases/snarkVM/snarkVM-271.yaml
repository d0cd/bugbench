introducing_pr_title: '[ZKS-04] Track committee size.'
introducing_pr_body: "This PR:\r\n- tracks the committee size in a `metadata` mapping.\r\
  \n- enforces that the committee size does not exceed `200`.\r\n- enforces that the\
  \ number of **delegators** does not exceed `100_000`.\r\n\r\n\r\nThe [benches/rewards](https://github.com/AleoHQ/snarkVM/tree/benches/rewards)\
  \ branch measures the performance of `atomic_post_ratify` for various numbers of\
  \ delegators distributed uniformly over 200 validators.\r\nOn a 2021 M1 MAX:\r\n\
  ```\r\nDB: `atomic_post_ratify` with 0 delegators and 200 validators\r\n       \
  \                 time:   [18.821 ms 19.708 ms 20.456 ms]\r\n\r\nDB: `atomic_post_ratify`\
  \ with 1000 delegators and 200 validators\r\n                        time:   [88.696\
  \ ms 104.41 ms 131.43 ms]\r\n\r\nDB: `atomic_post_ratify` with 10000 delegators\
  \ and 200 validators\r\n                        time:   [750.47 ms 793.26 ms 838.26\
  \ ms]\r\n\r\nDB: `atomic_post_ratify` with 100000 delegators and 200 validators\r\
  \n                        time:   [4.0215 s 4.3443 s 4.7269 s]\r\n\r\nDB: `atomic_post_ratify`\
  \ with 1000000 delegators and 200 validators\r\n                        time:  \
  \ [37.494 s 37.753 s 38.058 s]\r\n```\r\nUsing memory based storage, we found:\r\
  \n```\r\nMemory: `atomic_post_ratify` with 0 delegators and 200 validators\r\n \
  \                       time:   [53.368 ms 53.403 ms 53.433 ms]\r\n\r\nMemory: `atomic_post_ratify`\
  \ with 1000 delegators and 200 validators\r\n                        time:   [181.87\
  \ ms 182.05 ms 182.29 ms]\r\n\r\nMemory: `atomic_post_ratify` with 10000 delegators\
  \ and 200 validators\r\n                        time:   [1.3540 s 1.3547 s 1.3553\
  \ s]\r\n\r\nMemory: `atomic_post_ratify` with 100000 delegators and 200 validators\r\
  \n                        time:   [13.088 s 13.224 s 13.480 s]\r\n\r\nMemory: `atomic_post_ratify`\
  \ with 1000000 delegators and 200 validators\r\n                        time:  \
  \ [131.51 s 131.59 s 131.68 s]\r\n```\r\n\r\nHelps with addressing Audit Finding:\
  \ **[zksecurity 04] Garbage Collection Can Block Commits From Happening**\r\n"
