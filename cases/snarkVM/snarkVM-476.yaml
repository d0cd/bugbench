fix_pr_title: '[Testnet] Update the genesis targets for `TestnetV0`'
fix_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending the\
  \ time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR updates\
  \ the `GENESIS_COINBASE_TARGET` and `GENESIS_PROOF_TARGET` to 1023 and 256, respectively.\r\
  \n\r\nThe previous values of (31 and 8) were used primarily for load testing, but\
  \ due to the fixed-point arithmetic, the values do not increment properly. \r\n\r\
  \nThe updated genesis/minimum targets are values that have been tested extensively\
  \ in Devnet and Canary net and is the currently the same value declared in `MainnetV0`.\r\
  \n\r\nNote: This PR needs a genesis block resample before it is ready to merge."
