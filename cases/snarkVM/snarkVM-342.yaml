introducing_pr_title: Improve consensus versioning clarity and guarantees
introducing_pr_body: "## Motivation\r\n\r\nAt the time of writing, consensus-relevant\
  \ constants for different networks at different block heights are defined in the\
  \ Environment trait: https://github.com/ProvableHQ/snarkVM/blob/mainnet/console/network/src/\r\
  \n\r\nUpgrades to the values of consensus-relevant constants are specified as e.g.:\r\
  \n- CONSENSUS_V2_HEIGHT and CONSENSUS_V3_HEIGHT\r\n- MAX_CERTIFICATES and MAX_CERTIFICATES_BEFORE_V3\r\
  \n\r\nHowever, ideally we have a system which satisfies the following design criteria:\r\
  \n- A developer should be able to see what are the consensus values at a given height,\
  \ and which changes were introduced at which heights, in order to audit and validate\
  \ the logic changes.\r\n- When introducing a change to a particular value at a given\
  \ height, code changes should be minimal. Meaning a developer should only have to\
  \ specify a {height, value} pair, should be able to retrieve it using something\
  \ like `CONSTANT.get(height)`, or should only have to adjust a `match` arm.\r\n\
  - When introducing a new consensus version, a developer should only have to add\
  \ values to constants which are actually changing.\r\n- We don\u2019t have to necessarily\
  \ express *all* config values in a new format, just the ones which depend on height.\r\
  \n- Constants may only start to be defined from a certain height onwards.\r\n\r\n\
  ## Why we can't have nice things\r\n- Rust does not allow matching directly on runtime\
  \ variables or generics, which is why this PR uses `height if height < CONSENSUS_HEIGHT(X)?\
  \ => { }`.\r\n- Many parts of the code are currently checking that certain values\
  \ don't surpass `MAX_CERTIFICATES` or `MAX_COMMITTEE_SIZE`, which is not semantically\
  \ correct, because those values change over time. To limit the scope of this PR,\
  \ those constants have been left **unchanged**, and a new `N::MAX_COMMITTEE_SIZE`\
  \ array is introduced along with a test that its largest value matches `MAX_CERTIFICATES`.\r\
  \n\r\n## Test Plan\r\n\r\n- Added a bunch of unit tests with documentation of what\
  \ they achieve for the new constants."
