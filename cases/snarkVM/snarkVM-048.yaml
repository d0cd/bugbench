description: The `verify_authority` function in `Block` contained an unreachable check
  for the genesis block case. Because genesis blocks should never have a `previous_round`
  or `previous_height`, the genesis verification branch could never be reached, creating
  dead code that gave a false sense of security coverage for genesis block validation.
