introducing_pr_title: '[Test] Test framework for program execution.'
introducing_pr_body: "This PR extends the test framework to test program execution.\r\
  \nAn example of a program execution test is:\r\n```\r\n/*\r\n- [hello, 0u32, 1u32]\r\
  \n- [hello, 1u32, 2u32]\r\n*/\r\n\r\nprogram hello.aleo;\r\nfunction hello:\r\n\
  \    input r0 as u32.public;\r\n    input r1 as u32.private;\r\n    add r0 r1 into\
  \ r2;\r\n    output r2 as u32.private;\r\n```\r\nThe framework will test `hello`\
  \ with `[0u32, 1u32]` and `[1u32, 2u32]` and check the output against the corresponding\
  \ expectation file.\r\n\r\n\r\nTo regenerate expectations, set the `REWRITE_EXPECTATIONS`\
  \ flag.\r\nTo filter tests, set the `FILTER_TEST` flag with the substring to filter\
  \ by.\r\n"
