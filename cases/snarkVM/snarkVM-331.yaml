introducing_pr_body: "This PR updates the minimum Rust version to v1.81.0 and addresses\
  \ clippy issues associated with the upgrade.\r\nAs a result, this PR:\r\n- removes\
  \ unused features\r\n- refactors code\r\n- updates CI configurations accordingly\r\
  \nThese changes should be carefully reviewed to ensure that behavior is not changed.\r\
  \n\r\nThis PR also introduces an update to the naming convention for `cache_key`s.\
  \ \r\nThe proposed convention is `v<SNARKVM_VERSION>-rust-<RUST_VERSION>-<NAME>`.\r\
  \n@reviewers if we are considering changes to the key naming convention, consider:\r\
  \n  - including a checksum of the `Cargo.lock` file which would capture any dependency\
  \ updates\r\n  - using a variable for Rust version and snarkOS version\r\n\r\n\r\
  \nCI runs are [here](https://app.circleci.com/pipelines/github/ProvableHQ/snarkVM?branch=update%2Frust-version%2Bclippy-ci)\r\
  \n"
