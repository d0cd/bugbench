introducing_pr_title: Compute size of Execution proof without needing to compute the
  proof
introducing_pr_body: "Currently `Execution` storage costs are computed by generating\
  \ a proof for the `Authorization` and checking its size, which creates an undesirable\
  \ double-proving workflow (because the storage cost is an input when computing the\
  \ fee-transaction proof). This PR adds:\r\n- A method which, given a list of batch\
  \ sizes, computes the size of the corresponding (batched) Varuna proof.\r\n- An\
  \ `Authorization::proof_size` method which computes the size of the Varuna proof\
  \ for `self` by calculating the expected batch sizes and then calling the method\
  \ above.\r\n- A consistency check to ensure the inclusion batch size from the method\
  \ above coincides with that in `prepare_verifier_inputs` (for futureproofing)\r\n\
  - An update of existing execution tests to `VarunaVersion::V2` and the addition\
  \ to those tests of a proof-size check (i. e. ensuring that the size of the serialized\
  \ proof, once computed, coincides with the predicted size given the `Authorization`).\
  \ In the tested cases, the predicted size is an exact match.\r\n\r\nSince testing\
  \ has happened only for a limited time of example `Authorization`s available in\
  \ the code, any issues should be reported when this starts being tested in more\
  \ complex, real-world `Authorization`s.\r\n\r\n"
