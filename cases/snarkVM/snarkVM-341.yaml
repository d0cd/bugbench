introducing_pr_body: "Reverts ProvableHQ/snarkVM#2615.\r\n\r\nUnfortunately, that\
  \ PR appears to have broken consensus in snarkOS (at least when running in `--dev`\
  \ mode), which the snarkVM tests haven't detected. I propose to revert it for now,\
  \ and restore it once the issue is identified and we introduce a snarkVM-side test\
  \ which would cover it (if possible).\r\n\r\nI've double-checked it by building\
  \ current snarkOS first with c76a95a74d5d540523989bd781c69054848b1399 (which works)\
  \ and with 8b2dff9e9ecf58a75947f225959cead15a68af0c, which is the very next commit\
  \ (and no longer works)."
