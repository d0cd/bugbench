introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR abstracts\
  \ program, function, finalize, and closure into a generic form, in preparation for\
  \ extracting `program` into its own subcrate of `synthesizer`.\r\n\r\nAs part of\
  \ this, the implementation of `Finalize::add_command` needed to be redesigned, and\
  \ trait methods were used to pass through the necessary property checks performed\
  \ when adding the `command` to `finalize`.\r\n"
