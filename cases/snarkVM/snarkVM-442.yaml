introducing_pr_title: Fix external structs access in external mapping;
introducing_pr_body: "### Summary\r\n\r\nThis PR addresses qualification handling\
  \ for external structs in mapping operations and fixes a consensus-version\u2013\
  specific execution issue affecting external mappings in pre-V13.\r\n\r\n### Changes\r\
  \n\r\n1. **Qualify external struct operands in mapping instructions**\r\n\r\n  \
  \ When external structs are used as operands to mapping instructions, operand types\
  \ are now properly **qualified** if the mapping itself is external. This ensures\
  \ that:\r\n   - Mapping key and value types correctly reflect external struct usage.\r\
  \n   - Any structs nested within mapping key or value types are also qualified as\
  \ external.\r\n   - The type returned from the `get` instruction is qualified when\
  \ required.\r\n\r\n2. **Restore pre-V123behavior for external mapping `get`**\r\n\
  \r\n   In consensus version pre-V13 a `get` from an external mapping is valid as\
  \ long as the key does not contain an external struct, even if the value type does.\
  \ However, such programs fail to execute on v4.4.0.\r\n\r\n   While this issue is\
  \ fixed by (1), the fix must not apply to pre-V13. Therefore:\r\n   - Any types\
  \ that were newly qualified for external mappings are **unqualified** when targeting\
  \ consensus versions prior to V13.\r\n   - This restores correct pre-V13 semantics\
  \ while preserving the fix for V13.\r\n\r\n### Testing\r\n\r\n- Added a comprehensive\
  \ test covering various mapping operations involving external structs.\r\n- Added\
  \ two targeted tests to ensure that type *unqualification* in pre-V12 is applied\
  \ correctly.\r\n\r\n### A Quick Note\r\n\r\nAcross PRs #3107, #3128, and #3138,\
  \ the recurring pattern is that a primary program performs an external call or instruction\
  \ (e.g. get) that returns an external type (external record, struct, future, etc.),\
  \ but type resolution is attempted as if the type were local. Under V12, this causes\
  \ resolution to fail because the returned type is not qualified from the perspective\
  \ of the primary program.\r\n\r\nIn V13, we fix this by qualifying externally-owned\
  \ types at the boundary, using the program that owns the type, so resolution is\
  \ explicit and unambiguous. This allows otherwise valid programs to pass.\r\n\r\n\
  We cannot safely apply the same fix in V12, because changing how external return\
  \ types are resolved would alter which programs are accepted, creating forking risk.\
  \ Therefore, these corrections are intentionally scoped to V13 consensus via static\
  \ checks or execution-time checks."
