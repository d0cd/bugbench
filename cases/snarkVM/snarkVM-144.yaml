introducing_pr_title: Batch proving for Marlin across multiple circuits
introducing_pr_body: "This draft PR introduces batch-proving irrespective of the proof's\
  \ circuits. TL;DR:\r\n\r\n![image](https://user-images.githubusercontent.com/3220730/230962798-d681741e-bbee-4a1e-a40c-813c70092f5a.png)\r\
  \n\r\n\r\n## Motivation\r\n\r\nBetter, faster and just as strong proofs!\r\n\r\n\
  ## Comments\r\n- I slightly changed the `generate_constraints` function in `snark/marlin/tests.rs`\
  \ to actually allocate `num_variables` and not `num_variables + 1`. As a result,\
  \ assuming a fixed random number generator, the single-circuit snark proof has different\
  \ values compared to before this PR.\r\n- We will need to resample proving/verifying\
  \ keys as those data structures changed.\r\n\r\n## Test Plan\r\n\r\nBenchmark snark\
  \ proving single-circuit:\r\n- using 100 sparse constraints and 25 variables\r\n\
  \  - 1 instance: 28.883 ms\r\n  - 10 instances: 57.564 ms\r\n  - 100 instances:\
  \ 346.95 ms\r\n\r\nBenchmark snark proving multi-circuit:\r\n- using 100+i constraints\
  \ of 1+i multiplicative depth and 25+i variables\r\n  - 10 circuits: 122.33 ms\r\
  \n  - 100 circuits: 2.7465 s // this isn't a useful metric, the cost grows as the\
  \ test circuits grow bigger\r\n- using 10000+i constraints of 10000+i multiplicative\
  \ depth and 10025+i variables\r\n  - 10 circuits: 8.9459 s\r\n  - 100 circuits:\
  \ 87.231 s\r\n- using half/half 5000/10000+i constraints of 5000/10000+i multiplicative\
  \ depth and 5000/10025+i variables\r\n  - 10 circuits: 7.0788 s\r\n  - 100 circuits:\
  \ 68.081 s\r\n\r\n\r\n## Related PRs\r\n\r\nFollowing the new spec: https://github.com/AleoHQ/protocol-docs/pull/12"
