introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR introduces\
  \ a new `CanaryV0` network in the same way `TestnetV0` was introduced via https://github.com/AleoNet/snarkVM/pull/2414.\r\
  \n\r\nThis now gives `snarkVM` the ability to run 3 separate networks:\r\n- MainnetV0\r\
  \n- TestnetV0\r\n- CanaryV0\r\n\r\nThe sister PR can be found here - https://github.com/AleoNet/snarkOS/pull/3269"
