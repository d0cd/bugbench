introducing_pr_title: '[Refactor] simplify and unify the storage setup for tests'
introducing_pr_body: "The hybrid nature of our storage makes testing it tricky, and\
  \ there are several spots where we are currently using a mix of in-memory and persistent\
  \ storage, which complicates things further. The changes proposed in this PR are\
  \ something that I've hoped to see in snarkVM for a while now, and since some other,\
  \ concurrent snarkVM work requires a stricter separation between the storage variants,\
  \ it was a good opportunity to finally propose them.\r\n\r\nThe following is a rough\
  \ summary of these changes:\r\n- all the tests now implicitly either use the persistent\
  \ storage or the in-memory one; there is no mixing, unless it's done explicitly\r\
  \n- as far as storage is concerned, all the tests can now run concurrently\r\n-\
  \ the `open_(.*)testing` methods are no longer needed, there is no test special-casing\
  \ for rocksdb either\r\n- the `open` methods no longer require `S` to be `Clone`\r\
  \n- instead of a `static DB`, there is now a `static DATABASES`, which has more\
  \ than a single member only in tests\r\n- the `ledger-with-rocksdb` CI job should\
  \ be runnable again\r\n\r\nWhat this fixes:\r\n- there are currently several storage-related\
  \ tests that use the `serial` attribute, which **doesn't** affect the use of `static`\
  \ objects (specifically `static DB`), meaning the tests involving RocksDB storage\
  \ can get cross-contaminated\r\n- some tests are currently (re)using the same folder\
  \ that's used in `--dev` mode, which can lead to cross-contamination and/or can\
  \ overwrite storage related to development tests\r\n- one of the tests related to\
  \ [stacks](https://github.com/ProvableHQ/snarkVM/pull/2591) failed due to the wrong\
  \ storage type being used\r\n\r\nFuture improvements:\r\n- if the `open` methods\
  \ for the stores didn't rely so much on `StorageMode` (i.e. if we could use an instance\
  \ of actual storage to open the stores), we wouldn't need `static DATABASES` (or\
  \ `DB`, as is the case currently); that being said, I'd prefer it to be done separately\r\
  \n- we currently only store the production genesis block, but doing the same for\
  \ the testnet one would speed up some of the tests (it would allow us to run some\
  \ of the slower tests in `--release` mode)\r\n\r\nRequires: https://github.com/ProvableHQ/aleo-std/pull/12"
