introducing_pr_title: '[Feature] LoggableError trait'
introducing_pr_body: "This PR introduce the `LoggableError` trait which enables to\
  \ easily log `anyhow::Error`s in snarkVM. This allows to have a more uniformed error\
  \ logging mechanisms across snarkOS/snarkVM. \r\nThe PR's changes are also included\
  \ in #2927, but the latter is already very complex and the logging changes are self-contained.\r\
  \n\r\nTo see how `LoggableError` can be used, see the changes in `ledger/store`\
  \  in [71a6665](https://github.com/ProvableHQ/snarkVM/pull/2944/commits/71a6665096ddb86d48edc84235123ce2c464d2da).\r\
  \n\r\n### Notes\r\n* This changes some of the error logging functions introduced\
  \ in #2813, which makes it a breaking change. As far as I know, these functions\
  \ are not (yet) used outside snarkVM and snarkOS."
