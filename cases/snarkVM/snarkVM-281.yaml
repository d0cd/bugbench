introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR unifies\
  \ the target calculations in both `Ledger::construct_block_template` and `Block::verify_solutions`\
  \ into a singular `to_next_targets` helper method. Previously the two implementations\
  \ were disjoint and could lead to differences in expected value. The unified helper\
  \ method reduces the possibility of error and makes it easier to update if there\
  \ are changes in the future.\r\n\r\n## Test Plan\r\n\r\nThe use of a helper method\
  \ also allows us to test the expected behavior outside the monolith of block production.\
  \ Tests have been added to check that the expected values based on hitting/missing\
  \ the target threshold are correct.\r\n\r\n\r\nThis PR is based on and merges into\
  \ https://github.com/AleoHQ/snarkVM/pull/2410.\r\n"
