introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\n- Implements\
  \ a `Poseidon` hash circuit\r\n- Implements `Field::pow` and includes unit tests\r\
  \n- Introduces `Inject::constant` to support syntax such as `Boolean::constant(false)`\r\
  \n- Removes `mode` from function signature of `FromBits` trait methods\r\n- Implements\
  \ an optional secondary little-endian bit representation for `Field`\r\n    - Circuits\
  \ will automatically utilize it when `Field::to_bits_le`, `Field::to_bits_be`, `Field::from_bits_le`,\
  \ or `Field::from_bits_be` are called\r\n"
