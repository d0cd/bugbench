introducing_pr_title: 'ARC-0041: Update credits program to support delegation before
  validator bonding and native commission.'
introducing_pr_body: "## Summary\r\n\r\nCurrently, validators will need to have 10M\
  \ credits in order to self.bond as a validator. The problem is that most or all\
  \ of these validators won't actually have 10M credits. To bring Aleo in line with\
  \ other ecosystems, we want to relax 2 existing constraints:\r\n\r\n1. Delegators\
  \ can delegate to any address (with the same 10,000 credit minimum & maximum of\
  \ 100,000 delegators) even if that address is not in the committee\r\n2. Validators\
  \ only require a self bond of 100 credits to join the committee, given the total\
  \ delegation for them is >= 10M credits.\r\n\r\nAlthough the changes are significant,\
  \ the staking abstraction should closely follow what existed before.\r\n\r\n## Technical\
  \ summary\r\n\r\nThe invariants of the `credits.aleo` program are now as follows:\r\
  \n```\r\n// 1. contains committee[r0] =>\r\n//   a. contains delegated[r0]\r\n//\
  \      - The set of delegated addresses is superset of active validators.\r\n//\
  \ 2. delegated[*] >= 10,000\r\n//   a. contain bonded[*].microcredits >= 10,000\r\
  \n//      - Delegators can bond to any address with the 10,000 credit minimum\r\n\
  // 3. delegated[r0] < 10,000,000 =>\r\n//   a. !contain committee[r0]\r\n//    \
  \  - If the delegated total (which includes the self bond) is less than 10,000,000\
  \ credits, it won't be in the committee\r\n// 4. bond[r0].validator == r0 =>\r\n\
  //   a. contains committee[r0]\r\n//     - Self bonded addresses are always active\
  \ validators. Delegators **can** force validators to unbond by removing sufficient\
  \ delegation\r\n// 5. committee[r0] =>\r\n//   a. bonded[r0].microcredits >= 100\
  \ credits\r\n//      - Self bonded addresses are always active validators with at\
  \ least 100 credits self bonded\r\n//   b. delegated[r0] >= 10,000,000 credits\r\
  \n//      - The total delegated amount for an active validator is at least 10,000,000\
  \ credits\r\n// 6. delegated[r0] == sum bond[*].microcredits by bond[].validator\
  \ == r0\r\n// 7. bond[r0].microcredits < 10,000 =>\r\n//   a. bond[r0].validator\
  \ == r0\r\n//   b. contains committee[r0]\r\n//   - A bond value < 10,000 implies\
  \ self-bonded active validator.\r\n// 8. bond[r0].validator != r0 =>\r\n//   a.\
  \ bond[r0].microcredits >= 10,000\r\n// 9. count bonded[] - count committee[] ==\
  \ metadata[aleo1qgqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqanmpl0]\r\n\
  // 10. count committee[] == metadata[aleo1qqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq3ljyzc]\r\
  \n// 11. 100,000 + count committee[] >= count bonded[] >= count delegated[] >= count\
  \ committee[]\r\n// 12. bond[*].microcredits > 100\r\n// 13. delegated[*] > 10,000\r\
  \n```\r\n\r\n### API Changes\r\n\r\n1. There is now a `bond_validator` function\
  \ that should be used to add a validator to the committee instead of the `bond_public`\
  \ that was used before. This separation function was added due to the change in\
  \ interface to support specifying a commission.\r\n2. The `withdrawal address` is\
  \ now the address that needs to be used for `unbond_public` which applies to all\
  \ stakers. There are 2 primary reasons for this change:\r\n    * Security. Previously\
  \ the validator hot key was used to `unbond_public` and `claim_unbond_public` while\
  \ funds ended up at the address specified in the `withdraw` mapping. This meant\
  \ that it was safe to lose exclusive access to the hot key but stakers still need\
  \ to retain access to it to unlock their funds. \r\n    * Programmability. We anticipate\
  \ the need for compliance features, commission structures and validator pools. To\
  \ broadly enable new use cases, we need a key that can sign certificates in BFT\
  \ ie the validator key and an address that can have programmatically control staked\
  \ funds. The validator key will always need to be a hot private key but the withdraw\
  \ address can be a program so we're giving the withdraw address sufficient authority\
  \ to manage staked funds.\r\n3. `claim_unbond_public` now requires an address for\
  \ claiming. `claim_unbond_public` previously used `self.caller` for the address.\
  \ The result of this change is that anyone can pay the fee and run the transaction\
  \ for someone to claim their unbonded balance. This removes an unnecessary restriction\
  \ to further enhance security for operations (by reducing the reliance on a hot\
  \ key and enabling separation of cold keys) and enable programmability.\r\n\r\n\
  ## Progress\r\n\r\n- [x] Initial `credits.aleo` implementation\r\n- [x] snarkVM\
  \ commission on rewards & staker checks\r\n- [x] snarkVM unit tests\r\n\r\n## Testing\r\
  \n\r\n1. Unit testing in snarkVM will be updated as part of this PR.\r\n2. Before\
  \ merging, we will run an isolated network with these changes.\r\n5. Before merging,\
  \ we will have comprehensive audits of the credits.aleo program and associated snarkVM\
  \ changes.\r\n6. After merging, we will first deploy on canary network before eventually\
  \ running on testnet beta.\r\n"
