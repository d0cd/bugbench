fix_pr_title: Fix atomic checkpointing and rewinds
fix_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending the\
  \ time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis is an alternative\
  \ and cleaner approach to #1577.\r\n\r\nThis PR fixes three issues found in storage\
  \ map checkpointing: \r\n\r\n1. Incorrect checkpoint truncation and state reverting\r\
  \n2. Incorrect number of rewinds (we weren't rewinding to the proper point)\r\n\
  3. Atomic rewinds incorrectly sets the `batch_in_progress` flag to false.\r\n\r\n\
  The first issue was solved by updating the `atomic_batch` from an IndexMap to a\
  \ `Vec`. This Vec incurs additional cost during lookups/iterators, however it lets\
  \ us properly revert state. \r\n\r\nThe second issue was solved by clearing the\
  \ current checkpoint in `atomic_batch_scope` once a value is returned. This ensures\
  \ that in the nested case, we rewind to the start of your current `atomic_batch_scope`\
  \ no matter what happens in your internal operations.\r\n\r\nThe third issue was\
  \ solved very simply, by removing the incorrect logic in `atomic_rewind`\r\n\r\n\
  ## Test Plan\r\n\r\nIndividual tests have been added to the `MemoryMap` and `DataMap`\
  \ to test that the checkpoints were set correctly and that the new checkpoint logic\
  \ works as expected.\r\n\r\nAn integration test was also added to ensure that the\
  \ VM state is still consistent when processing accepted and rejected transactions."
