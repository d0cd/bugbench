introducing_pr_title: Test Framework for `synthesizer`.
introducing_pr_body: "This PR introduces a test framework for the `synthesizer` crate.\r\
  \nThe goal of this framework is to define and run a large number integration tests.\r\
  \nThe framework logs and checks against the expected output to ensure stability.\r\
  \n\r\nSee `test_parser` for two examples of `parser` tests.\r\n- `tests/parser/program`\
  \ defines tests for `Program::parse` at the file granularity.\r\n- `tests/parser/instruction`\
  \ defines tests for `Instruction::parse` at the line granularity.\r\n"
