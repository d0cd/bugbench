introducing_pr_title: '[Feature] Merkle Tree Updates'
introducing_pr_body: "This PR introduces \"single\" and \"batched\" updates to `MerkleTree`.\r\
  \n\r\n### Evaluation\r\nWe ran the benchmarks in `benches/merkle_tree.rs` to evaluate\
  \ the performance of the update operations.\r\nThe evaluation was performed on an\
  \ M1 Max w/ 32 GB RAM.\r\n\r\n#### MerkleTree::new\r\n| # leaves | Time (ms)\r\n\
  | -------- | -------- | \r\n| 1        | 1.9390 |\r\n| 10       | 2.9340 |\r\n|\
  \ 100      | 12.827 |\r\n| 1000     | 23.497 |\r\n| 10000    | 178.71 |\r\n| 100000\
  \   | 1427.2 |\r\n| 1000000  | 12439 |\r\n\r\n\r\n#### `append` vs `update` vs `batch_update`\
  \ \r\nNote that the Merkle Tree is initialized with `1,000,000` leaves.\r\nNote\
  \ that `batch_update` is performed over **unique** leaves.\r\n| # leaves updated/added\
  \ | `append` time (ms) | `update` time (ms) |  `batch_update` time (ms) |\r\n| ----------------------\
  \ | ------------------ | ------------------ | ------------------------- |\r\n| 1\
  \       | 16.262 | 2.5093  | 2.6949 |\r\n| 10      | 17.797 | 19.643  | 3.3254 |\r\
  \n| 100     | 25.940 | 195.45  | 13.110 |\r\n| 1000    | 36.054 | 1926.1  | 27.064\
  \ |\r\n| 10000   | 149.39 | 19214   | 153.66 |\r\n| 100000  | 7912.0 | x       |\
  \ 1366.6 |\r\n| 1000000 | 12790  | x       | _(~864813 unique leaves)_ 11549 |\r\
  \n\r\n\r\n#### Update a single leaf (`update` vs `batch_update`) \r\n\r\nWe evaluated\
  \ `MerkleTree::update` and `MerkleTree::batch_update` for a single leaf on trees\
  \ of varying (initialized) depths. Concretely, we tested depths `d = 1, ..., 15`.\
  \ For all `d`, we found no significant difference in the execution time between\
  \ the standard and batched implementations: `~1.9ms`. Interestingly, the execution\
  \ time did not vary across depths. This could be due to execution of the benchmarks\
  \ being dominated by setup and teardown of the Merkle Tree. \r\n\r\n"
