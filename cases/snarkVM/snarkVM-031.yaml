introducing_pr_title: Metrics for circuits
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\n- Introduces\
  \ two traits `Metrics` and `OutputMode` which are used to define metadata on circuit\
  \ operations.\r\n- Introduces `Count`, which is used to define the number of constants,\
  \ number of variables, and number of constraints for circuit operations.\r\n- Sample\
  \ implementations are available in `circuits/types` and `circuits/core/pedersen`\r\
  \n- Uses the implementations of `Metrics` and `OutputMode` to statically determine\
  \ the number of constants, variables, and constraints for bytecode programs. See\
  \ `bytecode/src/main.rs` for an example of how counts can be determined. \r\n\r\n\
  ## Test Plan\r\n\r\n- Uses implementations of `Metrics` and `OutputMode` in tests\
  \ for `circuits`.\r\n- Unit tests for `Measurement`s.\r\n- Tests of bytecode for\
  \ nontrivial programs.\r\n"
