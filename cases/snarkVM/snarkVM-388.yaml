introducing_pr_title: Run benchmark workflow with `--locked`
introducing_pr_body: "Sometimes errors like the following seem to occur, where the\
  \ benchmark workflow cannot switch to the `gh-pages` branch because the `Cargo.lock`\
  \ file was updated.\r\n\r\n```\r\nRun benchmark-action/github-action-benchmark@v1\r\
  \n/usr/bin/git -c user.name=github-action-benchmark -c user.email=github@users.noreply.github.com\
  \ -c http.https://github.com/.extraheader= fetch ***github.com/ProvableHQ/snarkVM.git\
  \ gh-pages:gh-pages\r\nFrom https://github.com/ProvableHQ/snarkVM\r\n * [new branch]\
  \      gh-pages   -> gh-pages\r\n/usr/bin/git -c user.name=github-action-benchmark\
  \ -c user.email=github@users.noreply.github.com -c http.https://github.com/.extraheader=\
  \ switch gh-pages\r\nerror: Your local changes to the following files would be overwritten\
  \ by checkout:\r\n\tCargo.lock\r\nPlease commit your changes or stash them before\
  \ you switch branches.\r\nAborting\r\nError: Command 'git' failed with args '-c\
  \ user.name=github-action-benchmark -c user.email=github@users.noreply.github.com\
  \ -c http.https://github.com/.extraheader= switch gh-pages': error: Your local changes\
  \ to the following files would be overwritten by checkout:\r\n```\r\n\r\nThis PR\
  \ runs all benchmarks with the `--locked` flag. This will, hopefully, prevent such\
  \ issues in the future."
