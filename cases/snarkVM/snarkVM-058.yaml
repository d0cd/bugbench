introducing_pr_title: Implement `finalize`
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\nThis PR introduces the concept of\
  \ `finalize`, which will perform speculative execution of `finalize` scopes in transactions.\
  \ This will allow us to filter out transactions that will cause double spends and/or\
  \ general operations that will invalidate on-chain state. \r\n\r\nSpeculate iteratively\
  \ executes transactions so we can determine a final ordering of transactions for\
  \ a block. This is done by cache-ing the operational transforms and intermediate\
  \ state changes, s.t. the `FinalizeStore` doesn't see changes until we are ready\
  \ to commit to a final transaction ordering.\r\n\r\nTODO :\r\n- [x] Handle instruction\
  \ panics (Currently instruction panic instead of being caught as an error, so speculate\
  \ can't catch them)\r\n- [x] Integrate `finalize_root` changes from #1162 \r\n-\
  \ [ ] Consider transaction fees during speculative executions. (Can be ignored now\
  \ because `credits.aleo` doesn't have mappings yet)\r\n- [x] Add additional tests\
  \ that handle multiple programs that touch on-chain state.\r\n\r\n## Test Plan\r\
  \n\r\nTests have been added to ensure that finalize operations are correct and that\
  \ `finalize` doesn't break the state changes that occur in `FinalizeStore`.\r\n\r\
  \n## Related PRs\r\n\r\nThis PR is build on (and contains all the changes of):\r\
  \n - #1190 \r\n - #1427\r\n"
