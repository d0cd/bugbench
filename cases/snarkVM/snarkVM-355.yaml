introducing_pr_body: "## Motivation\r\n\r\nUpgrade struct conventions, remove duplication,\
  \ improve ergonomics.\r\n\r\nMerged changes:\r\n- (#180) Implements the `SNARKVerificationGadget`\
  \ trait for the Marlin verification gadget\r\n- (#186) Isolate integer and bits\
  \ gadgets out of the traits::utilities module\r\n- (#188) Migrate `snarkvm-nonnative`\
  \ to `snarkvm-gadgets::nonnative`\r\n- (#189) Migrate `snarkvm-objects` to `snarkvm-dpc::block`\r\
  \n\r\nGeneral changes:\r\n- Renames `dpc/src/base_dpc` to `dpc/src/testnet1`\r\n\
  - Removes duplicate `Assignment` trait in `dpc/src/lib.rs`\r\n- Renames to `snarkos-integration`\
  \ to `.snarkos-integration` and include in workspace for testing\r\n- Adds CI for\
  \ each crate in the workspace\r\n\r\nTrait changes:\r\n- Renames trait `Program`\
  \ to `ProgramScheme`\r\n- Renames trait `Record` to `RecordScheme`\r\n- Renames\
  \ trait `Transaction` to `TransactionScheme`\r\n- Renames trait `RecordSerializerScheme`\
  \ to `RecordEncodingScheme`\r\n- Update trait `SNARK` internal types from `AssignedCircuit`\
  \ to `AllocatedCircuit`, `PreparedVerifcationParameters` to `PreparedVerifyingKey`,\
  \ `Parameters` to `ProvingKey`, and `VerificationParameters` to `VerifyingKey`\r\
  \n\r\nStruct changes:\r\n- Renames struct `DPCRecord` to `Record`\r\n- Renames struct\
  \ `DPCTransaction` to `Transaction`\r\n- Renames struct `DPCTransactions` to `Transactions`\r\
  \n- Renames struct `RecordSerializer` to `RecordEncoding`, and renames internal\
  \ methods `serialize` to `encode` and `deserialize` to `decode`\r\n- Renames struct\
  \ `DeserializedRecord` to `DecodedRecord`\r\n- Renames struct `Parameters` to `ProvingKey`\
  \ for `snarkos-algorithms/snark`\r\n- Renames struct `RecordPayload` to `Payload`\r\
  \n- Moves `AleoAmount` from `snarkvm-objects` to `snarkvm-dpc`\r\n- Removes unused\
  \ `AmountError`\r\n\r\nParameter changes:\r\n- Modularizes parameters into `global/`\
  \ and `testnet1/` directories\r\n- Update all references of `InnerSNARKID` to `InnerCircuitID`,\
  \ `InnerSNARKVerificationKeyCRH` to `InnerCircuitIDCRH`, `inner_snark_verification_key_crh`\
  \ to `inner_circuit_id_crh`, and `inner_snark_vk_crh` to `inner_circuit_id_crh`"
