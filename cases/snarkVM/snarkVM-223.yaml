introducing_pr_body: "## Motivation\r\n\r\nThis PR updates the circuits environment\
  \ design to introduce better support for witnesses.\r\n- Introduces a `witness!`\
  \ macro that takes as input any circuit that implements `Eject` returning circuit\
  \ primitive(s) that support `Inject` to automatically convert to and from the circuit\
  \ environment.\r\n- Adds support for `Vec` and `Tuples` with the `Inject` trait\
  \ to auto inject multiple primitives.\r\n- Updates the linear combination design\
  \ to use an `IndexMap` for better performance characteristics\r\n- Introduces a\
  \ `TypeName` trait to move `fn type_name()` out of `Inject`\r\n\r\nThis PR also\
  \ adds additional benchmarks for linear combination and adds 1 benchmark for Boolean."
