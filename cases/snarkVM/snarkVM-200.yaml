introducing_pr_title: Add Map for rejected and aborted transaction ids
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR adds\
  \ a new `RejectedOrAbortedTransactionID` Map to `BlockStorage`. The key of this\
  \ map is the transaction id of any aborted transaction and the unconfirmed transaction\
  \ id of any rejected transaction. The value is the block hash the transaction id\
  \ was associated with. \r\n\r\nThis will allow us to easily determine if incoming\
  \ transactions were already rejected or aborted. "
