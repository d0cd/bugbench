  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR separates\
  \ the transaction fee into `base fee` and `priority fee` by adding an additional\
  \ priority fee input to the `fee_public` and `fee_private` functions in `credits.aleo`.\
  \ This allows us to have a separation of fees and use them properly for their intended\
  \ purposes.\r\n\r\nAdditionally, this PR pays the validators the transaction priority\
  \ fees via the block reward ratification. "
