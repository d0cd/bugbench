introducing_pr_title: '[Feature] Fallback URL for parameter files'
introducing_pr_body: "The PR adds another URL to fetch parameters from. It also includes\
  \ a few small commits to fix CI. \r\n\r\n### Testing\r\n\r\n1. Rename the first\
  \ entry of `REMOTE_URLS` in `parameters/src/canary.rs` to something like `broken.provable.com`.\r\
  \n2. Remove any cached parameter files `rm -rf ~/.aleo/resources/*` (double check\
  \ that this is the correct location for your setup)\r\n3. Run the test without output\
  \ capture: `cargo test --package=snarkvm-parameters canary::test_credits_bond_public_prover\
  \ -- --nocapture`\r\n\r\nYou will get the following output:\r\n```\r\nrunning 1\
  \ test\r\n\r\n\u26A0\uFE0F  \"bond_public.prover.e2c9caa\" does not exist. Downloading\
  \ and storing it (in \"/Users/kaimast/.aleo/resources/bond_public.prover.e2c9caa\"\
  ).\r\n\r\n   Installation - Downloading \"https://broken.provable.com/canary/bond_public.prover.e2c9caa\"\
  \r\n        Warning - curl::error: Couldn't resolve host name\r\n        Warning\
  \ - Failed to fetch from \"https://broken.provable.com/canary\". Trying next source...\r\
  \n   Installation - Downloading \"https://s3.us-west-1.amazonaws.com/canary.parameters/bond_public.prover.e2c9caa\"\
  \r\n   Installation - 100.00% complete (27 MB total)   Installation - Storing file\
  \ in \"/Users/kaimast/.aleo/resources/bond_public.prover.e2c9caa\"\r\ntest canary::test_credits_bond_public_prover\
  \ ... ok\r\n\r\ntest result: ok. 1 passed; 0 failed; 0 ignored; 0 measured; 220\
  \ filtered out; finished in 1.46s\r\n```"
