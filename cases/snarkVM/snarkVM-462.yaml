introducing_pr_title: Reduce MAPPING_BASE_COST from 10_000 to 1_500
introducing_pr_body: "# Lower GET, GET_OR_USE, & CONTAINS finalize fees\r\n\r\nThe\
  \ goal of this PR is to lower fees safely such that the impact would encourage more\
  \ chain activity without impacting the safety of network.\r\nSpecifically, the PR\
  \ only changes a single value: `MAPPING_BASE_COST` from `10_000` microcredits to\
  \ `500` microcredits\r\n\r\n## Previous work\r\n\r\nThe most comphrensive work IMO\
  \ is this analysis: https://github.com/iamalwaysuncomfortable/analysis/blob/main/aleo_finalize_opcode_benchmark_and_pricing_analysis.ipynb\
  \ as part of this PR: https://github.com/AleoNet/snarkVM/pull/2281\r\n\r\nSome key\
  \ observations taken from this analysis:\r\n * SET & GET are the two most commonly\
  \ used OPCodes\r\n * Most simple operations run in 1 to 5 \xB5s and are priced at\
  \ 500 microcredits\r\n * SET & GET have the same base cost of 10_000 credits with\
  \ different per byte additional costs of 100 & 10 respectively.\r\n * The base assumption\
  \ for the fee model is 1 second of single threaded runtime should cost 100 credits\r\
  \n\r\n## New Benchmarks Approach\r\n\r\nI could not find the actual benchmarks for\
  \ SET/GET in the linked previous work but all of the other opcodes are included.\r\
  \nSo I created [these benchmarks for SET/GET](https://github.com/demox-labs/snarkVM/blob/c6bc485b199fde11124d8c1136d866e6559b5ec2/synthesizer/process/benches/update_key_value.rs)\
  \ . I decided not to include these benchmarks as part of this PR but it can be used\
  \ again when revisiting the fee model and as other DB optimizations land.\r\n\r\n\
  These new benchmarks use rocksdb & specifically benchmark: `finalize_store.update_key_value`\
  \ & `finalize_store.get_value_speculative`.\r\nAlthough this is the core part of\
  \ a SET & GET operation, other overhead exists which is not included in this benchmark\
  \ but the overhead should be roughly equivalent between SET & GET.\r\n\r\nThere\
  \ are probably signficant differences from running benchmarks and running on a live\
  \ node under heavy load but some care has been taken to ensure realistic benchmarks\
  \ including using unique keys for the gets & sets and using rocksdb instead of the\
  \ test finalize store.\r\n\r\n## Results\r\n\r\nAlthough priced similarly, GET &\
  \ SET are extremely different in actual runtime.\r\n\r\nFor primitive types like\
  \ a `U64` a SET costs `11_200` and a GET costs `10_120`. (A base cost of 10_000\
  \ and serialized, a U64 is 12 bytes)\r\nThe SET runtime for a `U64` is `170\xB5\
  s` and the GET runtime is `4.3\xB5s`\r\n\r\n### Benchmark Summary\r\n\r\n- **Type:\
  \ small_struct (422 bytes)**  \r\n  - **Set Time:** ~440.30 \xB5s  \r\n  - **Get\
  \ Time:** ~79.75 \xB5s  \r\n\r\n- **Type: large_struct (6456 bytes)**  \r\n  - **Set\
  \ Time:** ~4690 \xB5s  \r\n  - **Get Time:** ~135.55 \xB5s  \r\n\r\n- **Type: array_1x1\
  \ (43 bytes)**  \r\n  - **Set Time:** ~185.21 \xB5s  \r\n  - **Get Time:** ~4.21\
  \ \xB5s  \r\n\r\n- **Type: array_32x32 (1407 bytes)**  \r\n  - **Set Time:** ~1.23\
  \ ms  \r\n  - **Get Time:** ~17.41 \xB5s  \r\n\r\n- **Type: U8**  \r\n  - **Set\
  \ Time:** ~165.74 \xB5s  \r\n  - **Get Time:** ~4.27 \xB5s  \r\n\r\n- **Type: U16**\
  \  \r\n  - **Set Time:** ~169.60 \xB5s  \r\n  - **Get Time:** ~4.48 \xB5s  \r\n\r\
  \n- **Type: U32**  \r\n  - **Set Time:** ~154.07 \xB5s  \r\n  - **Get Time:** ~4.45\
  \ \xB5s  \r\n\r\n- **Type: U64**  \r\n  - **Set Time:** ~168.84 \xB5s  \r\n  - **Get\
  \ Time:** ~4.34 \xB5s  \r\n\r\n- **Type: U128**  \r\n  - **Set Time:** ~170.26 \xB5\
  s  \r\n  - **Get Time:** ~4.49 \xB5s  \r\n\r\n\r\n\r\n## Conclusions\r\n\r\nGET\
  \ is currently priced similarly to a SET when the in many cases, there is a 40x\
  \ difference in runtime.\r\nWe should lower the base price of GET to `500` to put\
  \ more inline with other primitive operations.\r\n\r\nThe big outlier is structs\
  \ which perhaps deserve their own pricing model but I wanted to keep this change\
  \ as simple as possible.\r\n\r\n<img width=\"830\" alt=\"Screenshot 2024-10-25 at\
  \ 2 12 22\u202FAM\" src=\"https://github.com/user-attachments/assets/963146e8-dca4-4772-a858-0d57b87b70ea\"\
  >\r\n\r\n<img width=\"914\" alt=\"Screenshot 2024-10-25 at 2 10 39\u202FAM\" src=\"\
  https://github.com/user-attachments/assets/be548ec8-c518-449d-88cb-d5a049e5d2a1\"\
  >\r\n\r\n\r\n## Safety\r\n\r\nDespite this change leading to a more consistent but\
  \ still imperfect pricing model, we should consider the potential impact.\r\n\r\n\
  As a validator, we run a 32-core, 64GB memory computer to power our validator. Our\
  \ CPU utilization for the node in the last 7 days has stayed between 5% and 10%\
  \ despite relatively heavy load. It seem at current network activity levels, we\
  \ are unlikely to risk overloading machines.\r\n\r\n<img width=\"1575\" alt=\"Screenshot\
  \ 2024-10-23 at 6 23 57\u202FPM\" src=\"https://github.com/user-attachments/assets/27240c17-d807-46e5-815c-9b0c910f2779\"\
  >\r\n\r\n\r\nIf there are other concerns, I'm unaware of please share.\r\n\r\n##\
  \ Impact\r\n\r\nFor many functions that use public state, we can expect to reduce\
  \ the transaction fee by 35% to 60%. As the team behind the Leo Wallet, the most\
  \ frequent compliant we hear is about the high fees.\r\n\r\nTo pick a couple of\
  \ programs, I'm familiar with:\r\n - token_registry.aleo/transfer_public: 140_173\
  \ -> 92_673\r\n - pondo_protocol.aleo/deposit_public_as_signer: 477_484 -> 211_484\r\
  \n\r\nSince higher fees are still accepted, migration for downstream programs and\
  \ applications isn't required, only highly recommended.\r\n\r\nIt will be difficult\
  \ to raise fees in the future, so we should be aware that if we expect the runtime\
  \ of GET to become more expensive over time, then we should perhaps be more cautious\
  \ with how much we lower the GET base fees."
