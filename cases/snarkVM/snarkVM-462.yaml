fix_pr_title: Do not determine consensus version based on user-submitted height
fix_pr_body: "## Motivation\r\n\r\nThis PR fixes an issue with our consensus version\
  \ determination. We need to determine it based on the verifier's current block height,\
  \ not based on the user's submitted transaction state root height. This issue came\
  \ up during testing the submission of transactions with old state roots. \r\n\r\n\
  Because all we did was to **lower** the execution cost over time, it wasn't necessarily\
  \ a vulnerability, but if we were to copy this type of logic over to other places\
  \ it could create serious issues.\r\n\r\n## Forking risk\r\n\r\nIn order to assure\
  \ that 85564f9d3 does not cause a syncing node to fork , we would have to scan the\
  \ entire history to see if an execution transaction was ever submitted with a V1\
  \ `state_root` to a V2 validator. This seems very likely to have occured just after\
  \ the switch to `V2`. So 4c6d6ae20 just removes the usage of `execution_cost_v1`\
  \ entirely.\r\n\r\n## Test Plan\r\n\r\n- [x] We should test our transaction pregeneration\
  \ again with this. @meddle0x53 \r\n- [ ] We can do a genesis-to-tip sync test with\
  \ this PR just to be sure there is no forking issue."
