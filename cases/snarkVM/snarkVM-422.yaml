introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR minimizes\
  \ the testing consensus block heights to reduce testing runtime and improve devnet\
  \ testing. Currently, devnets need to wait until blocks have exceeded block 19 to\
  \ be on the latest consensus logic, which is quite cumbersome.\r\n\r\n\r\nWe may\
  \ also want to consider allowing devnets to start with the latest `ConsensusVersion`\
  \ from block 0 or 1.\r\n\r\n## Test Plan\r\n\r\nExisting tests should be sufficient\
  \ to evaluate correctnes\r\n"
