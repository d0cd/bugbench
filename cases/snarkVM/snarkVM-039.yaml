description: The match statement in query.rs used the hardcoded value `3` for the
  MainnetV0 network ID, when the correct value is `0`. This caused REST calls to credits.aleo
  to fail on mainnet because the wrong network ID branch was matched. The fix replaces
  the magic number with the `MainnetV0::ID` constant in all three match arms.
