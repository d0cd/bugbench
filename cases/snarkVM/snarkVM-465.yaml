fix_pr_title: Filter records by ownership before decryption in `find_records`
fix_pr_body: "## Motivation\r\n\r\nThis change ensures that `find_records` filters\
  \ out records not owned by the provided view key _before_ attempting decryption.\
  \ Previously billions of records were fetched and decrypted, and then filtered for\
  \ ownership. This adjustment avoids unnecessary computation and adds an extra layer\
  \ of correctness in filtering.\r\n\r\n\r\n## Test Plan\r\n\r\nA new test `test_find_records_filters_by_ownership`\
  \ was added to validate that records not owned by the view key are correctly excluded.\
  \ Existing tests covering `find_records` behavior also continue to pass."
