introducing_pr_title: Properly log rejection reasons and critical error in VM
introducing_pr_body: "## Motivation\r\n\r\nIt is critical for users to understand\
  \ why transactions were rejected. Doing this properly will require a longer discussion\
  \ (see [this issue](https://github.com/ProvableHQ/snarkOS/issues/3934)) but currently\
  \ we don't even surface the information locally.\r\n\r\nThis PR is as small as I\
  \ could make it, adding a few trace! and error! logs - unfortunately it has some\
  \ indenting changes.\r\n\r\nNote that aborted tx reasons are already logged here:\r\
  \n```\r\n                    warn!(\"Speculation safely aborted a transaction -\
  \ {error} ({tx_id})\");\r\n```\r\n\r\n## Test Plan\r\n\r\nCI should suffice."
