introducing_pr_title: Allow external structs.
introducing_pr_body: "Specifically,\r\n\r\n1. Introduce a PlaintextType::ExternalStruct,\
  \ and allow referring to such a type in .aleo code by a Locator.\r\n\r\n2. Allow\
  \ casting to external struct types.\r\n\r\n3. Let two struct types be considered\
  \ the same type as long as they are structurally the same and have the same local\
  \ names. This funky ruleset is effectively here for backwards compatibility. In\
  \ more detail:\r\n\r\n```\r\n/// Equivalence of structs means they have the same\
  \ local names (regardless of whether\r\n/// they're local or external), and their\
  \ members have the same names and equivalent\r\n/// types in the same order, recursively.\r\
  \n///\r\n/// Equivalence of arrays means they have the same length and their element\
  \ types are\r\n/// equivalent.\r\n///\r\n/// This definition of equivalence was\
  \ chosen to balance these concerns:\r\n///\r\n/// 1. All programs from before the\
  \ existence of external structs will continue to work -\r\n/// thus it's necessary\
  \ for a struct created from another program to be considered equivalent\r\n/// to\
  \ a local one with the same name and structure, as in practice that was the behavior.\r\
  \n/// 2. We don't want to allow a fork. Thus we do need to check names, not just\
  \ structural\r\n/// equivalence - otherwise we could get a program deployable to\
  \ a node which is using\r\n/// this check, but not deployable to a node running\
  \ an earlier SnarkVM.\r\n```\r\n\r\nAlso note this other usecase from a user:\r\n\
  \r\n```\r\ncurrently we got in an issue where one mainnet deployed contract imports\
  \ tokenRegistry, and the contract we are writing for A imports that contract and\
  \ A contract. but, A contract and tokenRegistryContract have same struct names so\
  \ we cannot compile that.If we cannot change struct name in A contract, we need\
  \ to wait for snarkVM update, just to compile the contracts\r\n```"
