introducing_pr_title: '[NCC-Y7H] Create compute_function_id helper which enforces
  minimal TLV encoding'
introducing_pr_body: "## Motivation\r\n\r\nAs defense in depth, in case we allow custom\
  \ program_id's in the future, it is good practice to encode the length of each input.\
  \ Some implementation notes:\r\n- requires resampling\r\n- we could also encode\
  \ a \"type\" prefix as extra defense in depth, but the function_id code lives quite\
  \ separate from other code. \r\n- I did not spot other invocations of `A::hash`\
  \ which would warrant an extra TLV encoding. There might be a problem if end-users\
  \ hash containers themselves (in Leo or Aleo instructions), but then it is up to\
  \ them to implement TLV encoding.\r\n- If this design looks good we could rename\
  \ the `program/id` folder to `program/program_id` to distinguish it from `program/function_id`.\r\
  \n- Technically we don't have to pass in network_id when in console mode, as it\
  \ can be derived from the type, but I do it anyway to be consistent with the Circuit\
  \ implementation\r\n\r\n\r\n## Test Plan\r\n\r\nI did not add more tests.\r\n"
