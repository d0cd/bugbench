introducing_pr_number: 2020
introducing_pr_title: '[Feature] Introduces `self.signer`.'
introducing_pr_body: "This PR introduces `self.signer` as a valid operand in a function.\r\
  \n`self.caller` refers to the immediate caller of the function, while the existing\
  \ `self.signer` refers to the user that originated the sequence of calls leading\
  \ up to the currently executing function.\r\n\r\n\r\nSome interesting points:\r\n\
  - By asserting `assert.eq self.caller self.signer;`, a developer can restrict their\
  \ function such that it can only be called by users.\r\n- By asserting `assert.neq\
  \ self.caller self.signer;` a developer can restrict their function such that it\
  \ can only be called by other programs.\r\n\r\n\r\nRelated Work:\r\n- https://github.com/AleoHQ/ARCs/tree/master/arc-0030\r\
  \n- #1178 \r\n- #1969 \r\n- #2030"
