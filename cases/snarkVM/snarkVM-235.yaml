introducing_pr_title: Reduce overhead of programs with deep nested imports
introducing_pr_body: "## Motivation\r\n\r\nWhen we deployed/executed a program with\
  \ many nested imports, this requires *lots* of memory. Why did this happen for nested\
  \ imports? Actually, it would have happened for any large amount of nested function\
  \ calls, imports are the only way in which we support them.\r\n\r\nTwo optimizations:\r\
  \n- we were needlessly cloning trees of stacks, each of which contained all of the\
  \ imported stacks as external_stacks.\r\n- during CheckDeployment, the verifier\
  \ was running `execute_function` instead of `evaluate_function` for each nested\
  \ call, even though it only needs to compute the circuit for the top level circuit.\r\
  \n\r\nI would have assumed during Authorization/Synthesis we could similarly replace\
  \ calls in Call to `execute_function` by `evaluate_function` too, but this fails\
  \ in mysterious ways (after resampling, integer addition fails).\r\n\r\n## Test\
  \ Plan\r\n\r\nAdded a test deploying and executing a program with the maximum of\
  \ 31 nested imports, which is our maximum.\r\n\r\nAlso manually tested four scenario's:\r\
  \n- proving execution: not killed by OOM\r\n- proving deployment: not killed by\
  \ OOM, for 23 nested deployments this went from 1550s to 60s\r\n- verifying execution:\
  \ 100ms for 31 nested deployments\r\n- verifying deployment: now 300ms for 20 nested\
  \ deployments, 400ms for 31 nested deployments\r\n\r\nFun fact, the synthesizer\
  \ only lets me execute a function using 30 nested imports. Together with the base\
  \ function and fee execution, this reaches our limit of 32 transitions per execution.\r\
  \n\r\nI did not extensively test `PackageRun`, I assume the existing test suite\
  \ covers it."
