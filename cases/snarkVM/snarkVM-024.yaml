introducing_pr_number: 2256
introducing_pr_title: Optimize the split into (un)verified solutions
introducing_pr_body: This PR is a follow-up to https://github.com/AleoHQ/snarkVM/pull/2250
  that _limits_ the verification of further solutions once the protocol maximum is
  reached. In theory - since the solutions are being processed in parallel - this
  logic can still result in a few calls to `ProverSolution::verify` being performed
  beyond the `N::MAX_SOLUTIONS` limit, but since we can't known if the next candidate
  is valid in advance, we can't go around it. Nevertheless, this change should result
  in a tangible performance improvement whenever the number of candidate solutions
  is greater than `N::MAX_SOLUTIONS`.
