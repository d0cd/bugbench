introducing_pr_title: Align Rng use in tests
introducing_pr_body: "This PR is an extension of https://github.com/AleoHQ/snarkVM/pull/999.\r\
  \n\r\n1. introduce a `TestRng` that implements both `Rng` and `CryptoRng` (the latter\
  \ of which is only a marker trait, so it's fine for test purposes where we desire\
  \ reproducibility rather than true entropy)\r\n2. replace the uses of `test_rng`\
  \ and `test_crypto_rng` with `TestRng::default`\r\n3. replace the uses of `test_crypto_rng_fixed`\
  \ with `TestRng::fixed`\r\n4. reuse the rngs instead of recreating them in all the\
  \ tests\r\n5. remove all direct uses of `XorShiftRng`\r\n6. replace the uses of\
  \ `thread_rng` in tests and benchmarks with `TestRng::default`\r\n\r\nThe benefits\
  \ are reproducibility in case any of the related tests fails and greater performance."
