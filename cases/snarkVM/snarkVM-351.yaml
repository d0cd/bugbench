introducing_pr_title: '[ARC-0042] Adjust reward algorithms to utilize timestamps'
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR is\
  \ intended to implement and address the concerns highlighted in [ARC-0042](https://github.com/AleoNet/ARCs/discussions/76).\r\
  \n\r\nThe gist is that the current block times are not aligned with our current\
  \ algorithms and causing the following:\r\n1. `block_reward` is emitting at a higher\
  \ inflation rate than the expected 5%\r\n2. `coinbase_reward` is reducing too quickly\
  \ and not over the expected 10 year timeline.\r\n\r\nThis PR addresses the problem\
  \ by using `timestamps` as the peg rather than `block_height`. Both the inflation\
  \ rate and the `coinbase_reward` reduction-over-time are on human timescales; it\
  \ makes sense for us to align the formulas to the human timescale with `timestamps`\
  \ rather than relying on `block_heights`, which are on a network timescale.\r\n\r\
  \n### `block_reward`:\r\n- Rename original to `block_reward_v1`\r\n- Implement `block_reward_v2`\r\
  \n- Use `time_since_last_block` to determine how much reward to emit for that particular\
  \ block in relation to how much inflation that `time_since_last_block` seconds should\
  \ cause.\r\n- This `time_since_last_block` is bound by a block interval of 60 seconds\
  \ to prevent the block reward from becoming too large in the event of a long block\
  \ interval such as a network outage or network upgrade.\r\n\r\n### `coinbase_reward`:\r\
  \n- Rename original to `coinbase_reward_v1`\r\n- Implement `coinbase_reward_v2`\r\
  \n- Use `anchor_block_reward_at_timestamp` instead of `anchor_block_reward_at_height`\r\
  \n- Uses the number of seconds the block is to the 10 year mark to determine the\
  \ reward. The closer we are, the less reward.\r\n\r\nSome emission analysis can\
  \ be seen in the comments below - https://github.com/AleoNet/snarkVM/pull/2569#issuecomment-2456020249\r\
  \n\r\n## **Migration:**\r\n- Introduce `N::CONSENSUS_V2_HEIGHT` to Network trait\
  \ \r\n    - This is the height for each network that snarkVM will swap from the\
  \ `v1` reward impls to the `v2` reward impls.\r\n- SnarkOS will require nodes to\
  \ swap to the new version before height `N::CONSENSUS_V2_HEIGHT`, otherwise there\
  \ may be some issues.\r\n    - Validators need to change to the new version or risk\
  \ possible forking\r\n    - Clients need to change to the new version or risk sync\
  \ halting\r\n\r\nThe migration and reward logic change will occur at the following\
  \ block heights (These heights are subject to change):\r\n\r\n### **Canary** - Block\
  \ 2,900,000 (~Nov 15, 2024 at the current 3.3s block times)\r\n### **Testnet** -\
  \ Block 2,950,000 (~Nov 22, 2024 at the current 3.3s block times)\r\n### **Mainnet**\
  \ - Block 2,800,000 (~Dec 10, 2024 at the current 3.0s block times)\r\n\r\nThese\
  \ numbers were calculated by determining the planned release schedule and backing\
  \ into the block height using the current block speeds and including a buffer between\
  \ release and consensus change. This buffer is intended to give leeway for nodes\
  \ to upgrade before the consensus change. The following table is the approximate\
  \ timeline and buffers for the networks:\r\n\r\n| Network | Release Date | Buffer\
  \ | Consensus V2 |\r\n|---------|--------------|--------|--------------|\r\n| Canary\
  \  | Nov 12, 2024 | 3 days | Nov 15, 2024 |\r\n| Testnet | Nov 19, 2024 | 3 days\
  \ | Nov 22, 2024 |\r\n| Mainnet | Dec 3, 2024  | 7 days | Dec 10, 2024 |\r\n\r\n\
  \r\n## Test Plan\r\n\r\nTests have been added to ensure that the V2 `block_reward`\
  \ and `coinbase_reward` implementations match the expected behavior. \r\n\r\nCI\
  \ can be found [here](https://app.circleci.com/pipelines/github/ProvableHQ/snarkVM?branch=feat%2Fblock_reward_v2-ci).\r\
  \n\r\n"
