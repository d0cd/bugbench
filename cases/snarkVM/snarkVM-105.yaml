introducing_pr_title: Include execution/deployment minimum cost during generation
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR migrates\
  \ the minimum fee calculation from the `ledger` into `synthesizer`, so the minimum\
  \ fee will be required upon generation of the deployment or execution transaction.\
  \ Previously, we had to rely on the `additional_fee_in_microcredits` to pay for\
  \ the `finalize` fees, which doesn't make sense.\r\n\r\n## Test Plan\r\n\r\nThe\
  \ `test_insufficient_finalize_fees` test has been updated to show that transactions\
  \ can't be created if the minimum fee requirement isn't hit.\r\n"
