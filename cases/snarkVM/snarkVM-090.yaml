introducing_pr_title: Implement `get`, `get.or_init`, and `set` commands for `mapping`
  in `finalize`
introducing_pr_body: "This PR,\r\n- implements `get`, `get.or_init`, `set` operations\
  \ for `mappings`. \r\n- supports instruction execution in a finalize block.\r\n\
  - restricts `finalize` contexts from using records.\r\n\r\nThe proposed syntax is:\r\
  \n- `get accounts[r0] into r1;` - Note that this operation fails if the key does\
  \ not exist in the mapping.\r\n- `get.or_init accounts[r0] r1 into r2;` - Note that\
  \ this operation initializes `accounts[r0]` with `r1` if the key does not exist\
  \ in the mapping.\r\n-  `set r0 into accounts[r1]`;\r\n\r\nA mapping's keys and\
  \ values are restricted to plaintext types (literals and structs).\r\n"
