description: The deployment variable and constraint limits (MAX_DEPLOYMENT_VARIABLES
  and MAX_DEPLOYMENT_CONSTRAINTS) were set too low at 1<<20 (~1M), preventing developers
  from deploying programs with richer circuit logic. The fix doubles both limits to
  1<<21 (~2M) and updates tests to verify programs near the new boundary are accepted.
