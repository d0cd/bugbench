fix_pr_title: Add zip_eq safeguards to prevent panic
fix_pr_body: "## Motivation\r\n\r\nCloses https://github.com/AleoHQ/snarkVM/issues/2195\r\
  \nCloses https://github.com/AleoHQ/snarkVM/issues/2216\r\n\r\nFor cases where we\
  \ `zip_eq` on values (derived) from user-input, it is prudent to add an extra check\
  \ that the values are of equal length to prevent panic.\r\nNote that we can't easily\
  \ make a new generic `zip_eq` impl which `ensure!`'s the length because in various\
  \ places in the code we work with iterators which don't know their length at compile-time.\
  \ See also this interesting discussion: https://internals.rust-lang.org/t/should-we-implement-exactsizeiterator-for-chain/12556/7\r\
  \n"
