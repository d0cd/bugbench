introducing_pr_title: Prevent panics
introducing_pr_body: "## Motivation\r\n\r\nGiven that anyone in the network can freely\
  \ pass proof objects (as Execution, containing transitions, containing proofs) into\
  \ the network, we should not panic easily.\r\n\r\nI search for uses of `assert`\
  \ and `unwrap` in the algorithms crate, and for now skipped most of the prover (which\
  \ is not done by validators) or lower level FFT code.\r\n"
