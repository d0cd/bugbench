introducing_pr_title: Fix remaining `cargo doc` warnings
introducing_pr_body: "This is another PR to improve the experience with `cargo doc`.\
  \ \r\n\r\nIt does a few minor changes such as\r\n- Putting references to other structs/modules\
  \ in backticks (``)\r\n- Wrapping links in angled brackets (`<>`) to make cargo\
  \ interpret them as hyperlinks\r\n- Annotating code examples with the correct language\
  \ so they get rendered correctly\r\n\r\nFinally, there was one use of angled brackets\
  \ in a comment, that cargo incorrectly tries to interpret as a hyperlink. I changed\
  \ those to curly braces (`{}`).\r\n\r\nAfter merging this PR, `cargo doc` should\
  \ not generate any warnings or errors anymore."
