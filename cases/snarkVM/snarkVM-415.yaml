introducing_pr_number: 2901
introducing_pr_title: '[Feature] Use v2 REST API and errors'
introducing_pr_body: "This PR changes `Query` to use the new REST API which contains\
  \ serialized errors. Instead of simply error'ing with the status code, it will not\
  \ return an `anyhow::Error` containing the full error chain provided by the node's\
  \ endpoint.\r\n\r\nIt also moves all REST-specific code to a dedicated module, similar\
  \ to how it is already done for static queries."
