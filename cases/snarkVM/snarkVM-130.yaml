introducing_pr_title: Adds committee logic, implements pre-ratify and post-ratify
  logic in finalize scope
introducing_pr_body: "## Motivation\r\n\r\nThis PR introduces the concept of pre-ratify\
  \ and post-ratify logic, which adds support for the genesis committee and dynamic\
  \ committee updates during consensus. As part of this, staking rewards and proving\
  \ rewards are now being tallied into finalize storage.\r\n\r\nAs part of this PR,\
  \ we now enforce that stakers who bond to validators with more than 25% of the total\
  \ stake will *NOT* receive staking rewards. In addition, to reduce the accumulation\
  \ of dust, stakers with less than 10 credit bonded will not receive staking rewards.\r\
  \n\r\nIn addition, the minimum stake TODO has been handled, and the minimum stake\
  \ for a validator has now been raised to 1M credits (as previously ratified).\r\n\
  \r\n## Test Plan\r\n\r\n- Unit tests are added to check that `Ratify::Genesis` (de)serializes\
  \ correctly.\r\n- Unit tests are added to ensure committee helpers are performant\
  \ and correct.\r\n- Unit tests are introduced to ensure committee storage inserts\
  \ and removes correctly.\r\n- Unit tests are added to ensure staking rewards and\
  \ proving rewards are computed correctly.\r\n- Prop tests in committee are updated\
  \ to reflect the new minimum stake and round rules.\r\n- Integration tests for synthesizer\
  \ have been updated to match the new genesis block.\r\n"
