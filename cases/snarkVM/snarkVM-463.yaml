introducing_pr_title: Refactor `compiler` into `synthesizer` crate
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nCloses #1165.\r\
  \n\r\nThis PR refactors `snarkvm-compiler` into `snarkvm-synthesizer` on the root\
  \ directory of `snarkvm`.\r\n\r\n<hr/>\r\n\r\n_From @ljedrz in #1101:_\r\n\r\nMany\
  \ users will likely only be interested in the snarkvm-compiler crate, so it makes\
  \ sense to isolate it.\r\n\r\nAn alternative would be to introduce a compiler feature\
  \ for snarkvm (in a fashion similar to the other features that are currently there),\
  \ but it results in a much larger lockfile (in an empty project using just that\
  \ dependency): 2561 lines, compared to 1548 when importing an isolated snarkvm-compiler\
  \ crate.\r\n\r\nIn addition, the dev-dependencies of snarkvm-parameters are also\
  \ made more granular, making its compilation faster.\r\n\r\n<hr/>\r\n\r\n## Test\
  \ Plan\r\n\r\nCI has been updated to reflect the new module. I can confirm CI executes\
  \ correctly on the refactored crate.\r\n\r\n## Related PRs\r\n\r\nThis PR supersedes\
  \ #1101.\r\n\r\nCloses #1101.\r\n"
