introducing_pr_title: '[ZKS-02] Introduce Committee IDs '
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR introduces\
  \ the concepts of committee IDs, which is a hash of the committee state: `BHP(starting_round\
  \ || members || total_stake)`. \r\n\r\nThis committee ID is used in batch headers\
  \ to refer to a specific committee that was used to create the batch header. Other\
  \ validators will then only sign batch headers/proposals if they see that the committee\
  \ ID used refers to the committee that was expected. This will be an added safety\
  \ guarantee when building the sudag/blocks, because validators will only certify\
  \ batches if they are on the same committee state.\r\n\r\nAudit Finding: **[zksecurity\
  \ 02] Dynamic Committee Feature is Not Safe**\r\n"
