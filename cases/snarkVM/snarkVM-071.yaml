introducing_pr_title: Initial implementation for circuit literals
introducing_pr_body: "## Motivation\r\n\r\nThis PR implements circuit literals for\
  \ snarkVM. This is an early prototype that will see more operator implementations\
  \ for literals. In addition, an initial parser for bytecode is included to sanity\
  \ check the construction for circuit literals.\r\n\r\n## Tests\r\n\r\nAll circuit\
  \ literals include tests that check for correctness and count.\r\n\r\n## Remarks\r\
  \n\r\nThis PR also includes:\r\n- An update to CI which improves CI times to under\
  \ 4 minutes for all jobs (except `snarkvm-gadgets`)\r\n- Minor refactor of the `snarkvm-derives`\
  \ crate into the `utilities/` folder\r\n\r\nBacklog: This PR includes a long backlog\
  \ of work from `testnet2` to prevent breakage. This size of PR is atypical."
