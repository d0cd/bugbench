introducing_pr_title: Parallelize `Deployment` verification
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR speeds\
  \ up `Deployment` verification (in `Stack::verify_deployment`) by synthesizing the\
  \ function circuits and verifying their corresponding certificates in in parallel.\
  \ \r\n\r\nThis optimization is much more noticeable when verifying deployments of\
  \ programs with many large functions, as each function needs to go through the same\
  \ disjoint verification process. \r\n\r\n"
