fix_pr_title: '[Hotfix] Optimize deployment loading on initialization'
fix_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending the\
  \ time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR implements\
  \ optimizations to `load_deployment_and_imports` when a VM is initialized. The previous\
  \ logic was quite naive in that each individual parallel thread would potentially\
  \ perform a deep recursion of imports. The fix was the introduce shared state between\
  \ the threads to ensure that wasted work is limited. "
