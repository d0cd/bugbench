introducing_pr_title: Speed up VM::from via parallelism
introducing_pr_body: "While looking into ledger memory use, I noticed that it took\
  \ plenty of time to load (~127s on my PC, with low CPU utilization), and that there\
  \ was potential for a quick perf win via parallelism.\r\n\r\nThis PR reduces the\
  \ current time needed to load the ledger by ~**80%** (down to ~25s on my PC) by\
  \ parallelizing the loading of the deployments.\r\n\r\nThere may be other wins to\
  \ apply to the loading process, but this simple drive-by is good enough on its own\
  \ for now."
