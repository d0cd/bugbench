issue_bodies:
  '2121': "# Panic (index out of range) when trying to skip_leading_zeros_and_convert_to_bigints\
    \ a zero polynomial (with all coefficients equal to 0, not empty)\r\n\u200B\r\n\
    We (@fuzzinglabs) found an index out of range in the skip_leading_zeros_and_convert_to_bigints\
    \ function, used by commit, making the library crash:\r\n\u200B\r\n```sh\r\nthread\
    \ 'main' panicked at /home/ronan/Desktop/Projects/ALEO/snarkVM/algorithms/src/polycommit/kzg10/mod.rs:462:23\r\
    \n```\r\n\u200B\r\n## Your Environment\r\n\u200B\r\n- rustc 1.73.0 (cc66ad468\
    \ 2023-10-03)\r\n- Ubuntu 23.04\r\n\u200B\r\n## Steps to reproduce\r\n\u200B\r\
    \nDownload:\r\n\u200B\r\n``` sh\r\ngit clone https://github.com/AleoHQ/snarkVM.git\r\
    \n```\r\n\u200B\r\nTesting program:\r\n\u200B\r\n***main.rs***:\r\n\u200B\r\n\
    ``` rust\r\nuse snarkvm_algorithms::fft::polynomial::*;\r\nuse snarkvm_curves::bls12_377::{Fr};\r\
    \nuse snarkvm_algorithms::polycommit::kzg10::*;\r\nuse snarkvm_utilities::rand::TestRng;\r\
    \nuse rand::Rng;\r\n\u200B\r\nfn main() {\r\n    let rng = &mut TestRng::default();\r\
    \n\r\n    let p1 = DensePolynomial::<Fr>::rand(rng.gen_range(0..10), rng); //random\
    \ sample a polynomial of degree less than 10\r\n\r\n    let p = &p1 - &p1; //create\
    \ a polynomial with all coefficients to 0 (important that the vector of coefficients\
    \ is not empty, but filled with 0)\r\n    \r\n    let (number_of_0,p_without_0)\
    \ = skip_leading_zeros_and_convert_to_bigints(&p); //error\r\n}\r\n\u200B\r\n\
    ```\r\n\u200B\r\n***Cargo.toml***:\r\n\u200B\r\n```\r\n[package]\r\nname = \"\
    tests\"\r\nversion = \"0.1.0\"\r\nedition = \"2021\"\r\n\r\n# See more keys and\
    \ their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html\r\
    \n\r\n[dependencies]\r\nrand = \"0.8.5\"\r\nsnarkvm = { path = \"../snarkVM\"\
    \ }\r\nsnarkvm-algorithms = { path = \"../snarkVM/algorithms\" }\r\nsnarkvm-curves\
    \ = { path = \"../snarkVM/curves\" }\r\nsnarkvm-utilities = \"0.15.4\"\r\n\u200B\
    \r\n```\r\n\u200B\r\nBuild and run:\r\n\u200B\r\n``` sh\r\ncargo build\r\ncargo\
    \ run\r\n```\r\n\u200B\r\n## Root cause\r\n\u200Bhttps://github.com/AleoHQ/snarkVM/blob/637e734e19f4b852daae683df4fd36bb17b7fcb9/algorithms/src/polycommit/kzg10/mod.rs#L455C9-L455C92\r\
    \n## Detailed behavior (RUST_BACKTRACE=1)\r\n\u200B\r\n``` sh\r\nthread 'main'\
    \ panicked at /home/ronan/Desktop/Projects/ALEO/snarkVM/algorithms/src/polycommit/kzg10/mod.rs:462:23:\r\
    \nindex out of bounds: the len is 1 but the index is 1\r\nstack backtrace:\r\n\
    \   0: rust_begin_unwind\r\n             at /rustc/cc66ad468955717ab92600c770da8c1601a4ff33/library/std/src/panicking.rs:595:5\r\
    \n   1: core::panicking::panic_fmt\r\n             at /rustc/cc66ad468955717ab92600c770da8c1601a4ff33/library/core/src/panicking.rs:67:14\r\
    \n   2: core::panicking::panic_bounds_check\r\n             at /rustc/cc66ad468955717ab92600c770da8c1601a4ff33/library/core/src/panicking.rs:162:5\r\
    \n   3: <usize as core::slice::index::SliceIndex<[T]>>::index\r\n            \
    \ at /rustc/cc66ad468955717ab92600c770da8c1601a4ff33/library/core/src/slice/index.rs:261:10\r\
    \n   4: core::slice::index::<impl core::ops::index::Index<I> for [T]>::index\r\
    \n             at /rustc/cc66ad468955717ab92600c770da8c1601a4ff33/library/core/src/slice/index.rs:18:9\r\
    \n   5: <alloc::vec::Vec<T,A> as core::ops::index::Index<I>>::index\r\n      \
    \       at /rustc/cc66ad468955717ab92600c770da8c1601a4ff33/library/alloc/src/vec/mod.rs:2675:9\r\
    \n   6: snarkvm_algorithms::polycommit::kzg10::skip_leading_zeros_and_convert_to_bigints\r\
    \n             at /home/ronan/Desktop/Projects/ALEO/snarkVM/algorithms/src/polycommit/kzg10/mod.rs:462:23\r\
    \n   7: tests::polynomial_null\r\n             at ./src/main.rs:19:37\r\n   8:\
    \ tests::main\r\n             at ./src/main.rs:120:5\r\n   9: core::ops::function::FnOnce::call_once\r\
    \n             at /rustc/cc66ad468955717ab92600c770da8c1601a4ff33/library/core/src/ops/function.rs:250:5\r\
    \nnote: Some details are omitted, run with `RUST_BACKTRACE=full` for a verbose\
    \ backtrace.\r\n```"
