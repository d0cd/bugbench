introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR introduces\
  \ the following changes:\r\n- Adds cost solvers for transactions: `deployment_cost()`\
  \ and `execution_cost()`\r\n- Adds a `namespace_cost` for deployments\r\n    - `namespace_cost\
  \ := 10^(10 - num_characters_in_program_id)`\r\n    - In English, programs with\
  \ IDs that are 10 characters or more incur 1 credit.\r\n        - 10 or more characters\
  \ -> 1 credit\r\n        - 9 characters -> 10 credits\r\n        - 8 characters\
  \ -> 100 credits\r\n        - 7 characters -> 1,000 credits\r\n        - 6 characters\
  \ -> 10,000 credits\r\n        - etc."
