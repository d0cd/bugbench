introducing_pr_body: "## Motivation\r\n\r\nUses batch inversion to more efficiently\
  \ compute all selectors at the query point.\r\n\r\nWhen batching e.g. 8 very small\
  \ circuits (10k constraints), prover time reduces to a whopping 50%. At 8 circuits\
  \ of 100k constraints, more akin to our transfer circuit, the speedup is ~5%.\r\n\
  \r\nCloses https://github.com/AleoHQ/snarkVM/issues/1927\r\n"
