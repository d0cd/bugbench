introducing_pr_title: Improve CircleCI setup
introducing_pr_body: "## Motivation\r\n\r\nAs part of https://github.com/ProvableHQ/snarkVM/issues/2996\
  \ , we are doing a few experiments with the CircleCI startup and provisioning logic\
  \ as part of this PR. The idea is to speedup the setup part of the logic and remove\
  \ some issues with hanging builds.\r\n\r\n## Test Plan\r\n\r\nUse the CI and its\
  \ workflows to test that times are better compared to the other PRs at the time.\r\
  \n\r\n## Documentation\r\n\r\nThere are problems with hanging workflows, specifically\
  \ the windows one, rust compilation is slow and there are repetitions, so trying\
  \ to figure out how to fix these issues and we'll document the fixes which work.\r\
  \n\r\n* The windows workflow now doesn't get stuck (tested with over 30 tries)\r\
  \n* SSCache is now used (there are logs to guarantee that and it is used after a\
  \ lot of small updates)\r\n* Runtime is consistently under 25 min; Compilation on\
  \ heavy libs like the synthesizes is now 2+ min faster (sscache hits).\r\n\r\nTo\
  \ make it faster I see a few ways now (no other ideas):\r\n1. Simplify and remove\
  \ bad tests.\r\n2. More partitioning.\r\n3. Maybe bigger compilation optimisation\
  \ with keeping the target folder, but this can lead to broken builds when there\
  \ are big changes, so not a good idea.\r\n"
