description: The REST query client automatically detected and appended an API version
  string (e.g., '/v2') to the base URL, forcing all queries to use v2 even when not
  intended. After backwards compatibility was added to REST API v1, this automatic
  version appending became incorrect. The fix removes the version-detection-and-append
  logic from the constructors, letting users control the base URL directly.
