introducing_pr_title: '[Stress-06] Price Finalize Opcodes Based On Operand Types'
introducing_pr_body: "## Prelude\r\n\r\nThis PR presents initial suggestions for revised\
  \ finalize pricing. This is in no way final or authoritative, but rather a basis\
  \ for community discussion on how pricing of operations in finalize scopes should\
  \ work.\r\n\r\n## Motivation\r\nAll opcodes currently have a fixed pricing regardless\
  \ of inputs. For opcodes that encapsulate simple operations, this is\r\nacceptable.\
  \ However, for opcodes that encapsulate complex computations such as cryptographic\
  \ hashes or mapping reads & writes, runtime is significant and affected non-trivially\
  \ by the size of the opcode's operands.\r\n\r\nThis motivates pricing opcodes based\
  \ on the size of their operands so that network performance is not impacted by inefficient\
  \ or malicious use of complex opcodes.\r\n\r\n\r\n## Analysis\r\n\r\nTo quantify\
  \ the runtime costs of Aleo opcodes, a benchmark analysis of each opcode was performed\
  \ on hardware with \r\nrecommended validator specifications (Intel Xeon Platinum\
  \ 8175 - 128CPU - 128GB RAM)\r\n\r\n[The analysis can be found here](https://github.com/iamalwaysuncomfortable/analysis/blob/main/aleo_finalize_opcode_benchmark_and_pricing_analysis.ipynb)\
  \ (Credit: @miazn - @iamalwaysuncomfortable)\r\n\r\n## Results\r\nKey results from\
  \ the benchmark analysis are summarized below.\r\n\r\n### Simple Opcodes\r\nMost\
  \ opcodes have runtimes under 10000 nanoseconds, with most in the range of 1000-3000\
  \ nanoseconds. \r\n\r\nOutliers include:\r\n* `mul(field,field)` ~ 100000 ns\r\n\
  * `inv` ~ 10000 ns\r\n* `div(field,field)` ~ 15000ns\r\n* `squareroot` ~ 25000ns\r\
  \n* `pow(field)` ~ 15000ns\r\n\r\n### Hashes & Commits\r\n* Each hash family has\
  \ a base runtime which increases in a (mostly) linearly fashion with input size.\r\
  \n* BHP & Poseidon hash families have the highest runtime per byte. The remaining\
  \ hash families have parity in runtime \r\nper byte.\r\n\r\n### Set/Get/Contain\r\
  \n* Sets are the slowest, having a similar runtime per byte as BHP hashes.\r\n*\
  \ Get & Contain are faster, having a similar runtime per byte.\r\n\r\n## Initial\
  \ Pricing Conclusions\r\n\r\n### 1. Pricing should allow finalize scopes to be affordable\
  \ to use\r\n\r\nOne of the core motivations of this PR is to discourage overuse\
  \ of high runtime opcodes in finalize scopes to ensure\r\nnetwork performance and\
  \ stability through pricing these opcodes per byte.\r\n\r\nThe other core motivation\
  \ is to price opcodes fairly so that effective use of this scope for useful applications\
  \ is\r\naffordable for the foreseeable future. This motivates pricing computationally\
  \ cheap opcodes at an affordable flat rate.\r\n\r\nIn pricing both \"simple\" and\
  \ \"complex\" opcodes, this PR suggests that 1 second of runtime in a finalize scope\
  \ should \r\ncost roughly `~100 credits`. \r\n\r\n### 2. Flat Pricing for Simple\
  \ Opcodes\r\nRuntimes for simple opcodes are low enough to justify grouping these\
  \ opcodes together and pricing them at a flat low\r\nrate. The rate in this PR is\
  \ proposed to be `500` microcredits per opcode as an average pricing.\r\n\r\n####\
  \ Outliers\r\nSuggested pricing per byte for outliers mentioned above:\r\n* `mul(field,field)`\
  \ ~ 10000 microcredits\r\n* `inv` ~ 1000 microcredits\r\n* `div(field,field)` ~\
  \ 1500 microcredits\r\n* `squareroot` ~ 2500 microcredits\r\n* `pow(field)` ~ 1500\
  \ microcredits\r\n\r\n### 3. Byte based pricing for complex opcodes (cast, commit,\
  \ hash, set/get/contain)\r\nFor Casts, Commits, Hashes and GET/SET/CONTAIN operations,\
  \ pricing should be based on the number of bytes in the operands. Since each opcode\
  \ has a base cost each should follow an equation of `base_cost + cost_per_byte *\
  \ num_bytes`.\r\n\r\n6 cost tiers are proposed based on benchmark analysis:\r\n\r\
  \n1. BASE Hash Tier: `10,000 + 30*input_bytes` (i.e. 0.8 microcredits for BASE hashes\
  \ over 8192 bytes)\r\n2. BPH Hash Tier: `50,000 + 300*input_bytes` (i.e. 16 microcredits\
  \ for BHP hashes over 8192 bytes)\r\n3. PSD Hash Tier: `40,000 + 75*input_bytes`\
  \ (i.e. 4 microcredits for PSD hashes over 8192 bytes)\r\n4. CAST Tier `500 + 30*input_bytes`\
  \ (i.e. ~0.25 microcredits for CASTs over 8192 bytes)\r\n5. GET/CONTAIN tier: `10,000\
  \ + 10*input_bytes` (i.e. 0.8 microcredits for GETs/CONTAINs over 8192 bytes)\r\n\
  6. SET Tier: `10,000 + 100*input_bytes microcredits/byte` (i.e. 2.4 microcredits\
  \ for SETs over 8192 bytes)\r\n\r\nSET operations are limited to under 10 invocations\
  \ per finalize block, so despite incurring a heavy cost per byte, they are priced\
  \ lower due to their central importance for Aleo applications."
