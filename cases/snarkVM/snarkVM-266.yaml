introducing_pr_title: '[NCC-EVJ] Use `Committee` stakes when determining the timestamp
  of a `Subdag`'
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR updates\
  \ the `Subdag::timestamp` function from a simple median timestamp to a [weighed\
  \ median](https://en.wikipedia.org/wiki/Weighted_median) timestamp that uses the\
  \ committee member stakes as the weights.\r\n\r\nBecause quorum is determined by\
  \ stake and not the number of validators, we must also use stake to determine the\
  \ timestamp. \r\n\r\nAudit Finding: **[NCC EVJ] Timestamp Calculation Does Not Provide\
  \ Byzantine Fault Tolerance**"
