introducing_pr_title: '[Feature] Implements `sign.verify`.'
introducing_pr_body: "This PR introduces the `sign.verify` opcode, allowing developers\
  \ to verify signatures in their programs.\r\nThis PR also introduces the `Literal::Signature`\
  \ which can be specified by the keyword `signature`.\r\n\r\nUsers can invoke signature\
  \ verification in to following way:\r\n- `sign.verify r0 r1 r2`\r\n- `r0` must be\
  \ a `signature`.\r\n- `r1` must be an `address`.\r\n- `r2` can be any value: a literal,\
  \ a struct, or a record.\r\n\r\nUsers can create signatures using the Rust libraries\
  \ in the following way:\r\n```rust\r\nfn main() {\r\n    let rng = &mut TestRng::default();\r\
  \n\r\n    // Generate a random private key.\r\n    let private_key = PrivateKey::<Testnet3>::new(rng).unwrap();\r\
  \n\r\n    // Create a value to be signed.\r\n    let value = Value::from_str(\"\
  0field\").unwrap();\r\n\r\n    // Transform the value into a message (a sequence\
  \ of fields).\r\n    let message = value.to_fields().unwrap();\r\n\r\n    // Produce\
  \ a signature.\r\n    let signature =\r\n        Signature::<Testnet3>::sign(&private_key,\
  \ &message, rng).unwrap();\r\n\r\n    // Verify the signature.\r\n    let address\
  \ = Address::try_from(&private_key).unwrap();\r\n    assert!(signature.verify(&address,\
  \ &message));\r\n}\r\n```\r\n\r\n### Notes for reviewers\r\n- Should the `signature`\
  \ directory be moved to `types` since it is now a `LiteralType`?\r\n- PR is fairly\
  \ large, could be split into two, one adding the `signature` type and one implementing\
  \ `sign.verify`. Let me know if that would make the review easier.\r\n\r\n"
