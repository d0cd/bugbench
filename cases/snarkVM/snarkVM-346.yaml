introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR is\
  \ a routine merge of the the `mainnet` release changes back into `staging`.\r\n\r\
  \nAdditionally, there are some adjustments to the migration heights. Namely, the\
  \ existing heights for `ConsensusVersion::V4` have been pushed to `ConsensusVersion::V5`.\r\
  \n\r\nHere is the tentative block height and estimated time (PT) for each migration:\r\
  \n\r\n| Network | Release Date | Consensus V4 | Estimated Date (V4) | Consensus\
  \ V5 | Estimated Date (V5) |\r\n|---------|--------------|--------------|---------------------|--------------|---------------------|\r\
  \n| Canary  | Apr 8        | 5,730,000    | Noon 4/9/25         | 5,780,000    |\
  \ Morning 4/11/25     |\r\n| Testnet | Apr 8        | 6,625,000    | Afternoon 4/9/25\
  \    | 6,765,000    | Evening 4/15/25     |\r\n| Mainnet | Apr 22       | 6,135,000\
  \    | Occured on 4/3/25   | 7,060,000    | Noon 5/4/25         |"
