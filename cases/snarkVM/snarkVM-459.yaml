fix_pr_title: Re-enable default console features
fix_pr_body: "## Motivation\r\n\r\nWhile https://github.com/ProvableHQ/snarkVM/pull/2900\
  \ fixed wasm compilation, it broke snarkOS compilation, which requires the top-level\
  \ console import to enable default features:\r\n\r\n```\r\n56 |     pub use crate::console::{account::*,\
  \ network::*, program::*};\r\n   |                              ^^^^^^^     ^^^^^^^\
  \     ^^^^^^^ could not find `program` in `console`\r\n   |                    \
  \          |           |\r\n   |                              |           could\
  \ not find `network` in `console`\r\n   |                              could not\
  \ find `account` in `console`\r\n```\r\n\r\n## Test Plan\r\n\r\n- [x] snarkOS compiles\r\
  \n- [x] I believe this PR will not break wasm because wasm doesn't import entire\
  \ snarkVM. Here is a test PR with succeeding CI to prove it: https://github.com/ProvableHQ/sdk/pull/1086\r\
  \n"
