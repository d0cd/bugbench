introducing_pr_title: Implements record design
introducing_pr_body: "## Motivation\r\n\r\n### Changes to Bytecode\r\n- Adds `commit.bhp768`\
  \ and `hash.bhp768`\r\n- Adds macros to improve readability of `Instruction`\r\n\
  \r\n### Changes to Circuit Core\r\n- Implements `Record`, `State`, and `Data`\r\n\
  - Adds `BHP768` and `Elligator2`\r\n- Removes `Ped256`, `Ped512`, `Ped1024`\r\n\r\
  \n### Changes to Circuit Types\r\n- Adds `FromField` and `FromGroup` traits\r\n\
  - Implements `FromField` for `Integer`\r\n- Implements `FromField`, `FromGroup`,\
  \  and `ToField` for `Address`\r\n\r\n### Adds Console\r\n- Adds `Address`, `ComputeKey`,\
  \ `ViewKey`, `PrivateKey`, and `Signature`\r\n- Adds program `State`, `Record`,\
  \ and `Data`\r\n- Adds `Pedersen`, `BHP`, `Elligator2`, and `Poseidon`\r\n\r\n###\
  \ Changes to Utilities\r\n- Adds integer and array support for `ToBits` and `FromBits`"
