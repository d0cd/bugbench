introducing_pr_body: "This PR,\r\n- introduces a limit for the number of imports in\
  \ a program.\r\n- checks that each function in a program makes at most `MAX_TRANSITIONS\
  \ - 1` calls.\r\n- introduces an upper bound in import depth\r\n- caches `get_number_of_function_calls`."
