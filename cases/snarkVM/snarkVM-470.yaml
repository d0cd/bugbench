fix_pr_title: '[Redesign] Remove cached program metadata and add protections against
  large recursion.'
fix_pr_body: "**DO NOT MERGE UNTIL BASE IS UPDATED TO `staging`**\r\n\r\nThe `Stack`\
  \ caches information about a program including the number of calls, the finalize\
  \ cost, and the program depth. If a program is updated, this information is invalid.\
  \ \r\n\r\nThis PR:\r\n- removes the cached data and opts to compute the information\
  \ on the fly. \r\n- adds protections to ensure that runtimes for the calculations\
  \ are bounded.\r\n- uses an iterative method to load a VM from storage. (See **Performance**\
  \ section)\r\nThe resulting code should be **semantically** equivalent.\r\n\r\n\
  ## Performance\r\n\r\nSee [this](https://github.com/ProvableHQ/aleo-program-regressions/tree/master/regressions/profile_process_load_from_store)\
  \ regression test to evaluate the performance of loading a VM from DB on `canary`,\
  \ `testnet`, and `mainnet`. In general, these improvements performed comparably\
  \ or better.\r\n\r\n## Notes\r\n\r\nThe integration expectations change for the\
  \ following reasons:\r\n- `user_callable.out`, `program_callable.out`. Fixed formatting\
  \ of `assert.eq`\r\n- `read_external_mapping.out`. By removing the cache, the finalize\
  \ cost is updated after the test migration height is crossed.\r\n- `branch_with_future.out`,\
  \ `complex_finalization.out`, `future_out_of_order.out`. These expectations are\
  \ also different on `staging` but were not committed earlier. They do not trigger\
  \ a CI failure because `child_outputs` are not checked to be the same."
