description: The code used the wrong committee when calculating the next block timestamp.
  In the subdag match arm around line 239 of advance.rs, the current committee was
  used instead of the next/correct committee for timestamp computation, which could
  lead to incorrect block timestamps and consensus issues. The fix ensures the proper
  committee is used for the timestamp calculation.
