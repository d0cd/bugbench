introducing_pr_title: Refactors `ledger` and `synthesizer` crates into smaller dependencies
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR refactors\
  \ `ledger` and `synthesizer` crates into smaller dependencies. There is notable\
  \ improvements in compile time performance, as well as CI runtime performance.\r\
  \n\r\nIn the process several unnecessary dependencies were removed, further improving\
  \ performance.\r\n\r\n### Changes\r\n\r\nOne notable change was introduced in the\
  \ process for the `Call` instruction. Due to compiler requirements, the `Call::evaluate`\
  \ and `Call::execute` implementations have been traitified and separated from its\
  \ primary implementation. These 2 methods can be found in the `synthesizer/process/src/stack/call/mod.rs`.\r\
  \n\r\nThe following is a summary of the migrations:\r\n- `synthesizer/src/process`\
  \ -> `synthesizer/process`\r\n- `synthesizer/src/block` -> `ledger/block`\r\n- `synthesizer/src/query`\
  \ -> `ledger/query`\r\n- `synthesizer/src/store` -> `ledger/store`\r\n\r\n### Testing\r\
  \n\r\nA new `ledger-test-helpers` crate was introduced in the `ledger/` folder to\
  \ accommodate the new refactor into smaller dependencies. As part of this, many\
  \ prior unit tests have been updated to use the test helper methods defined in the\
  \ new `ledger-test-helpers` crate.\r\n\r\n### Next Steps\r\n\r\nThere remains one\
  \ final remaining refactor that is still necessary. In a follow-on PR, the `synthesizer/coinbase`\
  \ crate will be moved to `ledger/coinbase` to facilitate the correct location for\
  \ this logic (as it is related to `block`)."
