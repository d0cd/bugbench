introducing_pr_title: Updates hash opcode implementation
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR removes\
  \ the following opcodes:\r\n```ts\r\n\"hash_to_group.bhp256\",\r\n\"hash_to_group.bhp512\"\
  ,\r\n\"hash_to_group.bhp768\",\r\n\"hash_to_group.bhp1024\",\r\n\"hash_to_group.ped64\"\
  ,\r\n\"hash_to_group.ped128\",\r\n\"hash_to_group.psd2\",\r\n\"hash_to_group.psd4\"\
  ,\r\n\"hash_to_group.psd8\",\r\n\"hash_to_scalar.psd2\",\r\n\"hash_to_scalar.psd4\"\
  ,\r\n\"hash_to_scalar.psd8\",\r\n```\r\n\r\nIn its place, the following syntax is\
  \ introduced:\r\n```ts\r\nhash.bhp256 r0 into r1 as address;\r\nhash.bhp256 r0 into\
  \ r1 as field;\r\nhash.bhp256 r0 into r1 as group;\r\nhash.bhp256 r0 into r1 as\
  \ i8;\r\nhash.bhp256 r0 into r1 as i16;\r\nhash.bhp256 r0 into r1 as i32;\r\nhash.bhp256\
  \ r0 into r1 as i64;\r\nhash.bhp256 r0 into r1 as i128;\r\nhash.bhp256 r0 into r1\
  \ as u8;\r\nhash.bhp256 r0 into r1 as u16;\r\nhash.bhp256 r0 into r1 as u32;\r\n\
  hash.bhp256 r0 into r1 as u64;\r\nhash.bhp256 r0 into r1 as u128;\r\nhash.bhp256\
  \ r0 into r1 as scalar;\r\nhash.bhp512 ...;\r\nhash.bhp768 ...;\r\nhash.bhp1024\
  \ ...;\r\nhash.ped64 ...;\r\nhash.ped128 ...;\r\nhash.psd2 ...;\r\nhash.psd4 ...;\r\
  \nhash.psd8 ...;\r\n```\r\nThis applies for all `hash` variants.\r\n\r\n## Changes\r\
  \n\r\n- Adds `Integer::from_field_lossy`\r\n- Adds `Scalar::from_field`\r\n- Adds\
  \ `Scalar::from_field_lossy`\r\n- Adds `Literal::downcast`\r\n- Adds `Literal::downcast_lossy`\r\
  \n"
