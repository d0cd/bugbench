introducing_pr_body: "## TODO\r\n- [x] Resolve merge conflicts after all V13 changes\
  \ are merged.\r\n- [x] Complete the VK migration [PR](https://github.com/ProvableHQ/snarkVM/pull/3075).\r\
  \n- [x] Complete the field-based identifier [PR](https://github.com/ProvableHQ/snarkVM/pull/3129)\r\
  \n- [ ] Prepare the deployment cannon.\r\n- [x] Generate redeployments and check\
  \ if any of the new constraint counts exceed the current MAX.\r\n- [x] Upload parameters\
  \ for the `credits.aleo` record translation keys.\r\n- [x] Dynamic futures should\
  \ be displayed on the Explorer in a human readable way.\r\n- [ ] Update developer\
  \ docs.\r\n- [x] Run regressions.\r\n  - [x] Number of programs with records\r\n\
  \    - `mainnet`: 81 programs, 117 records total\r\n    - `testnet`: 1097 programs,\
  \ 1790 records total\r\n    - `canary`: 3 programs, 3 records total\r\n  - [x] The\
  \ modified cost calculation produces the same cost as snarkVM 4.4.0\r\n  - [x] Sync\
  \ test from genesis to tip\r\n\r\n## For Reviewers\r\n- Is local record consumption\
  \ the expected behavior in recursive calls? \r\n\r\nYou may find these questions\
  \ in context by grepping for `@reviewers`.\r\n\r\n## Summary\r\n\r\nImplements [ARC-0009:\
  \ Dynamic Dispatch](https://github.com/ProvableHQ/ARCs/discussions/110) for `ConsensusVersion::V14`.\r\
  \n\r\n---\r\n\r\n## Implementation Overview\r\n\r\n### 1. Console Data Types (`console/program/src/data/dynamic/`)\r\
  \n\r\n**DynamicRecord** represents a static record as a fixed-size Merkle commitment.\r\
  \nIt stores the owner, a Merkle root of the record entries, the nonce, and the version.\r\
  \nThe `from_record()` method builds a depth-5 tree (max 32 entries) using Poseidon8\
  \ for leaf hashes and Poseidon2 for path nodes.\r\nThe optional `data` field holds\
  \ the full entry map when available for extraction.\r\n\r\n**DynamicFuture** represents\
  \ a future as a fixed-size Merkle commitment.\r\nIt stores the program name, network,\
  \ and function name as field elements, plus a Merkle root of the arguments.\r\n\
  The `from_future()` method builds a depth-4 tree (max 16 arguments) using the same\
  \ hash scheme.\r\nField encoding of identifiers enables runtime resolution without\
  \ variable-size strings.\r\n\r\n### 2. Circuit Types (`circuit/program/src/data/dynamic/`)\r\
  \n\r\n**circuit::DynamicRecord** mirrors the console type with circuit-native field\
  \ representations.\r\nIt optionally stores the console data for ejection.\r\nThe\
  \ `from_record()` method performs in-circuit Merkle tree construction.\r\nThe `find()`\
  \ method verifies a Merkle path to a specific entry and returns the entry value.\r\
  \n\r\n**circuit::DynamicFuture** mirrors the console type for circuit verification.\
  \ \r\nIt optionally stores the console arguments for ejection.\r\n\r\n### 3. Request\
  \ and Transition Versioning\r\n\r\n**Request** (`console/program/src/request/`)\
  \ is now versioned.\r\nV1 requests represent static calls with no dynamic flag.\r\
  \nV2 requests add an optional `dynamic` flag and methods `caller_inputs()` and `caller_input_ids()`\
  \ that convert record inputs to their dynamic representations.\r\n\r\n**Transition**\
  \ (`ledger/block/src/transition/`) is now versioned.\r\nV2 transitions include `TransitionCallerMetadata`\
  \ containing the caller's view of inputs and outputs.\r\nThis metadata is essential\
  \ because the caller sees static records while the callee sees dynamic records.\r\
  \nTranslation proofs use this dual view to verify record equivalence.\r\n\r\nBoth\
  \ versions of requests and transitions are supported.\r\n\r\n### 4. Instructions\
  \ (`synthesizer/program/src/logic/instruction/operation/`)\r\n\r\n**call.dynamic**\
  \ (`call/dynamic.rs`) enables runtime function dispatch.\r\nThe first three operands\
  \ specify the program name, network, and function name as field elements.\r\nSubsequent\
  \ operands are the function arguments.\r\nRecords are automatically converted to\
  \ dynamic records at call boundaries.\r\nDestinations receive plaintexts, dynamic\
  \ records, or dynamic futures.\r\n\r\n**get.record.dynamic** (`get_record_dynamic.rs`)\
  \ extracts an entry from a dynamic record.\r\nIn evaluate mode, it retrieves the\
  \ entry from the data map.\r\nIn execute mode, it constructs the expected leaf hash\
  \ and verifies a Merkle path against the record's root.\r\n\r\n### 5. Execution\
  \ (`synthesizer/process/src/stack/call/dynamic.rs`)\r\n\r\n`CallDynamic` implements\
  \ the `evaluate()` and `execute()` methods of the `CallTrait`.\r\nThe implementation\
  \ is similar in structure to the `Call`, however it does differ non-trivially.\r\
  \nThe `resolve_dynamic_target()` method converts field operands to a program ID\
  \ and function name.\r\nDynamic calls to `credits.aleo/fee_private` and `fee_public`\
  \ are blocked.\r\nThe `collect_input_translations()` and `collect_output_translations()`\
  \ methods identify records that require translation proofs.\r\n\r\n### 6. Translation\
  \ Proofs (`synthesizer/process/src/trace/translation/`)\r\n\r\nTranslation proofs\
  \ verify that a dynamic record and static record represent the same underlying data.\r\
  \n\r\n**RecordTranslationData** captures the metadata for one translation: both\
  \ record forms, the function ID, whether it is an input or output, and the computed\
  \ IDs for each form.\r\n\r\n**TranslationAssignment** (`assignment.rs`) defines\
  \ the translation circuit.\r\nThe circuit proves that the owner, nonce, and version\
  \ match, and that the Merkle root of the static record entries equals the dynamic\
  \ record's root.\r\n\r\n**prepare.rs** handles key synthesis for translation circuits,\
  \ with separate paths for regular calls and fee operations.\r\n\r\n### 7. Varuna\
  \ Integration (`algorithms/src/snark/varuna/`)\r\n\r\nTranslation proofs are batched\
  \ with execution proofs in `prove_batch_with_terminator()`.\r\nThe `Translation`\
  \ struct in `synthesizer/process/src/trace/translation/mod.rs` generates verifier\
  \ inputs by matching caller and callee views across transitions.\r\n\r\n### 8. Dynamic\
  \ Mapping Operations (`synthesizer/program/src/logic/command/`)\r\n\r\nThese finalize-time\
  \ commands access mappings using runtime-resolved program IDs.\r\n\r\n**contains.dynamic**\
  \ checks if a key exists in an external mapping.\r\n**get.dynamic** retrieves a\
  \ value from an external mapping, failing if the key is absent.\r\n**get.or_use.dynamic**\
  \ retrieves a value with a fallback default if the key is absent.\r\n\r\nEach command\
  \ takes field operands for the program name, network, and mapping name, plus the\
  \ key operand.\r\n\r\n---\r\n\r\n## Tests (`synthesizer/src/vm/tests/test_v14/`)\r\
  \n\r\n| File | Coverage |\r\n|------|----------|\r\n| `call_dynamic.rs` | Call patterns\
  \ including credits.aleo transfers, AMM swaps, conditional execution, deep call\
  \ hierarchies, circular calls, fee function restrictions, and closure rejection\
  \ |\r\n| `dynamic_futures.rs` | Await ordering, nested futures, finalize failures,\
  \ type/mode mismatches, double-await detection, and skipped await detection |\r\n\
  | `dynamic_mapping_operations.rs` | External and local mapping access, type validation,\
  \ non-existent mappings, and struct values |\r\n| `get_record_dynamic.rs` | Polymorphic\
  \ entry extraction, Merkle verification, boundary indices, and credits.aleo record\
  \ handling |\r\n| `translation.rs` | Input/output translations, chained translations,\
  \ key differentiation across programs, and tampered metadata detection |\r\n| `recursion.rs`\
  \ | Self-recursive calls and double-spend detection across static/dynamic record\
  \ consumption patterns |\r\n| `cast.rs` | Circuit and console `DynamicRecord::from_record()`\
  \ consistency, external and non-external record casting |\r\n| `mixed.rs` | Cost\
  \ estimation with translation proofs, combined translation/cast/extraction scenarios\
  \ |\r\n\r\n---\r\n\r\nAppended: an overview of semver breaking changes from commit\
  \ 44644ef23d\r\n[semver_checks_results.txt](https://github.com/user-attachments/files/24796726/semver_checks_results.txt)"
