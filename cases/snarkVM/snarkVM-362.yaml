introducing_pr_title: '[Chore] Update self-update dependency'
introducing_pr_body: "After #2746 and #2747, it is now easier to upgrade some dependencies.\r\
  \n\r\nThis PR bumps `self_update` to 0.41 (the same version that is used in snarkOS).\
  \ This will mean allow us to only have one version of `self_update` in snarkOS from\
  \ now on.\r\n\r\nIt also updates all crates to `hashbrown` 0.15, `ureq` 3, and `reqwest`\
  \ 0.12, which were already used by some external dependencies.\r\nFinally, the PR\
  \ replaces usage of the deprecated [`TempDir::into_path`](https://docs.rs/tempfile/latest/tempfile/struct.TempDir.html#method.into_path)\
  \ function with `TempDir::keep`. \r\n"
