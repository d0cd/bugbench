issue_bodies:
  '2122': "## \U0001F41B Bug Report\r\nEach `Process` is setup to automatically include\
    \ a `credits.aleo` program stack. This is problematic as users are unable to write\
    \ programs importing `credits.aleo`:\r\n- If they include `import credits.aleo`\
    \ in their `.aleo` file and add a corresponding import file for `credits.aleo`\
    \ then it will pass parsing, but fail during process creation as program stacks\
    \ are enforced to be unique. \r\n- If they don't include `import credits.aleo`\
    \ then parsing will fail. \r\n\r\n## Steps to Reproduce\r\n```\r\nimport credits.aleo;\r\
    \nprogram explore.aleo;\r\n\r\nfunction main:\r\n    input r0 as u32.public;\r\
    \n    input r1 as u32.private;\r\n    add r0 r1 into r2;\r\n    output r2 as u32.private;\r\
    \n```\r\n\r\n\r\n1. Create directory `imports` with copy of `credits.aleo`\r\n\
    2. `snarkvm execute main`\r\n\r\n\r\n## Expected Behavior\r\nResult is ``\u26A0\
    \uFE0F  Program 'credits.aleo' already exists``. But this is a bug as there should\
    \ be some way for users to use `snarkvm execute` on programs that import `credits.aleo`.\r\
    \n\r\n## Environment\r\n- snarkVM Version: 0.16.2\r\n- Rust Version: 1.73.0\r\n\
    - Computer OS: MacOS 13.2.1\r\n"
