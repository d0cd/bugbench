description: The quorum calculation for subdag certificate verification incorrectly
  excluded the author's stake, causing block verification failures. The fix reintroduces
  proper quorum checks that include the author's stake and refactors committee lookback
  construction to use the correct helper method `get_committee_lookback_for_round`.
