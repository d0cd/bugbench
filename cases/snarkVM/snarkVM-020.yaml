fix_pr_title: Fix the ordering of object serialization
fix_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending the\
  \ time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR addresses\
  \ #1334, by enforcing that all objects maintain the same ordering after serialization\
  \ and deserialization. This was necessary due to the requirements of Deployment\
  \ transaction verification.\r\n\r\nThe fix was to add the `preserve_order` feature\
  \ for `serde_json` dependencies.\r\n\r\n## Test Plan\r\n\r\nAdded test to check\
  \ that serialization/deserialization of deployments and executions don't break the\
  \ transaction verification.\r\n"
