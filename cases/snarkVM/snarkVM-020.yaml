  line: 81
  summary: "Missing or incorrect quorum verification for subdag certificates \u2014\
    \ the committee lookback is not computed via the proper helper method, and the\
    \ author's stake is omitted from the quorum calculation."
- file: ledger/src/check_next_block.rs
  line: 106
  summary: Committee lookback constructed directly instead of using `get_committee_lookback_for_round`,
    leading to inconsistent quorum threshold computation.
- file: ledger/src/advance.rs
  line: 257
  summary: Committee lookback for the penultimate round not obtained via the dedicated
    helper method, risking incorrect stake/quorum calculations.
