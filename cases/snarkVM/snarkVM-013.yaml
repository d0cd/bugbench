fix_pr_title: Avoid a panic in combine_for_open
fix_pr_body: "This PR introduces a new allocation, but I don't recall seeing that\
  \ function in the profiles, so it shouldn't be too bad; if we want to remove it,\
  \ the function can be altered to work on `query_to_labels_map` from `batch_open`,\
  \ which would remove several other allocations as well.\r\n\r\nFixes #2246."
