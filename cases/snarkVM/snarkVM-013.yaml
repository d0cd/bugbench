issue_bodies:
  '2246': "# Unwraping panic when `kzg10::KZG10::<E>::check_degrees_and_bounds` return\
    \ an error in `sonic_pc::SonicKZG10::combine_for_open`\r\n\r\n**Author(s):** Ronan\
    \ Thoraval [@Fuzzinglabs](https://github.com/FuzzingLabs/)\r\n**Date:** 14/12/2023\r\
    \n\r\n## ****Executive Summary****\r\n\r\nIn the [`combine_for_open()`](https://github.com/AleoHQ/snarkVM/blob/31d0bb5d0a757f2522449133aa3b0924569bc598/algorithms/src/polycommit/sonic_pc/mod.rs#L266C15-L266C15)\
    \ function, there is an `unwrap()` on the result of [`check_degrees_and_bound()`](https://github.com/AleoHQ/snarkVM/blob/31d0bb5d0a757f2522449133aa3b0924569bc598/algorithms/src/polycommit/kzg10/mod.rs#L423).\
    \ [`check_degrees_and_bound()`](https://github.com/AleoHQ/snarkVM/blob/31d0bb5d0a757f2522449133aa3b0924569bc598/algorithms/src/polycommit/kzg10/mod.rs#L423)\
    \ returns `Ok(())` if the degrees and bound are valid, but return an error otherwise,\
    \ error that we `unwrap()` in [`combine_for_open()`](https://github.com/AleoHQ/snarkVM/blob/31d0bb5d0a757f2522449133aa3b0924569bc598/algorithms/src/polycommit/sonic_pc/mod.rs#L266C15-L266C15)\
    \ making the program to panic.\r\n\r\n## Vulnerability Details\r\n\r\n- **Severity:**\
    \ Critical\r\n- **Affected Component:** Sonic Commitment Scheme\r\n\r\n## Environment\r\
    \n\r\n- **Compiler Version:** cargo 1.73.0 (9c4383fb5 2023-08-26)\r\n- **Distro\
    \ Version:** Ubuntu 23.04\r\n\r\n## Steps to Reproduce\r\n\r\nThere is 3 ways\
    \ to reach the panic :\r\n\r\n1. ``` rust\r\n    use rand::Rng;\r\n    use snarkvm_utilities::rand::TestRng;\r\
    \n    use snarkvm_algorithms::fft::polynomial::*;\r\n    use snarkvm_curves::bls12_377::Fr;\r\
    \n    use snarkvm_algorithms::polycommit::sonic_pc as aleo_sonic;\r\n    use snarkvm_curves::bls12_377::Fq\
    \ as AleoFq;\r\n    pub type EAleo = snarkvm_curves::templates::bls12::Bls12<snarkvm_curves::bls12_377::Bls12_377Parameters>;\r\
    \n    use snarkvm_algorithms::crypto_hash::PoseidonSponge as AleoPoseidonSponge;\r\
    \n    type AleoSONICKZG10 = aleo_sonic::SonicKZG10<EAleo,AleoPoseidonSponge<AleoFq,\
    \ 2, 1>>;\r\n    use snarkvm_algorithms::AlgebraicSponge;\r\n\r\n    let rng =\
    \ &mut TestRng::default();\r\n\r\n    let d = rng.gen_range(2..42);\r\n    //\
    \ We generate a random polynomial of degree d\r\n    let p1 = DensePolynomial::<Fr>::rand(d,\
    \ rng);\r\n    println!(\"P1 = {:?}\",p1);\r\n\r\n    let binding = aleo_sonic::Randomness::empty();\r\
    \n    let rands = vec![&binding];\r\n\r\n\r\n    // First case where the function\
    \ can unwrap() an error is if the polynomial has a degree bound but the ck hasn't\r\
    \n\r\n    let max_degree = 42;\r\n    let srs = AleoSONICKZG10::load_srs(max_degree).unwrap();\r\
    \n    let universal_prover = srs.to_universal_prover().unwrap();\r\n\r\n    //\
    \ The polynomial p1 has degree_bound = 42\r\n    let degree_bound = 42;\r\n  \
    \  let mut fs_rng = AleoPoseidonSponge::<AleoFq, 2, 1>::new();\r\n    let labeled_polynomials\
    \ = vec![aleo_sonic::LabeledPolynomial::new(\"First Case\", p1.clone(), degree_bound,\
    \ None)];\r\n\r\n    let supported_degree = max_degree;\r\n    let supported_lagrange_sizes\
    \ = None;\r\n    let supported_hiding_bound = 0;\r\n    // ck has not enforced_degree_bounds\r\
    \n    let enforced_degree_bounds = None;\r\n\r\n    let (ck,_) = AleoSONICKZG10::trim(&srs,\
    \ supported_degree, supported_lagrange_sizes, supported_hiding_bound, enforced_degree_bounds).unwrap();\r\
    \n    let ck = aleo_sonic::CommitterUnionKey::union(std::iter::once(&ck));\r\n\
    \r\n    // And panics\r\n    let _ = AleoSONICKZG10::combine_for_open(&universal_prover,\
    \ &ck, &labeled_polynomials, rands.clone(), &mut fs_rng); \r\n    ```\r\n\r\n\
    2. ``` rust\r\n    use rand::Rng;\r\n    use snarkvm_utilities::rand::TestRng;\r\
    \n    use snarkvm_algorithms::fft::polynomial::*;\r\n    use snarkvm_curves::bls12_377::Fr;\r\
    \n    use snarkvm_algorithms::polycommit::sonic_pc as aleo_sonic;\r\n    use snarkvm_curves::bls12_377::Fq\
    \ as AleoFq;\r\n    pub type EAleo = snarkvm_curves::templates::bls12::Bls12<snarkvm_curves::bls12_377::Bls12_377Parameters>;\r\
    \n    use snarkvm_algorithms::crypto_hash::PoseidonSponge as AleoPoseidonSponge;\r\
    \n    type AleoSONICKZG10 = aleo_sonic::SonicKZG10<EAleo,AleoPoseidonSponge<AleoFq,\
    \ 2, 1>>;\r\n    use snarkvm_algorithms::AlgebraicSponge;\r\n\r\n    let rng =\
    \ &mut TestRng::default();\r\n\r\n    let d = rng.gen_range(2..42);\r\n    //\
    \ We generate a random polynomial of degree d\r\n    let p1 = DensePolynomial::<Fr>::rand(d,\
    \ rng);\r\n    println!(\"P1 = {:?}\",p1);\r\n\r\n    let binding = aleo_sonic::Randomness::empty();\r\
    \n    let rands = vec![&binding];\r\n\r\n    // Second case where the function\
    \ can unwrap() an error is if the polynomial has a degree bound which is not in\
    \ that of ck\r\n\r\n    let max_degree = 42;\r\n    let srs = AleoSONICKZG10::load_srs(max_degree).unwrap();\r\
    \n    let universal_prover = srs.to_universal_prover().unwrap();\r\n\r\n    //\
    \ The polynomial p1 has degree_bound = 42\r\n    let degree_bound = 42;\r\n  \
    \  let mut fs_rng = AleoPoseidonSponge::<AleoFq, 2, 1>::new();\r\n    let labeled_polynomials\
    \ = vec![aleo_sonic::LabeledPolynomial::new(\"Second Case\", p1.clone(), degree_bound,\
    \ None)];\r\n    \r\n\r\n    let supported_degree = max_degree;\r\n    let supported_lagrange_sizes\
    \ = None;\r\n    let supported_hiding_bound = 0;\r\n    // ck has enforced_degree_bounds,\
    \ but it not contains the degree_bound of p1 (=42)\r\n    let enforced_degree_bounds:\
    \ Option<&[usize]> = Some(&[1]);\r\n\r\n    let (ck,_) = AleoSONICKZG10::trim(&srs,\
    \ supported_degree, supported_lagrange_sizes, supported_hiding_bound, enforced_degree_bounds).unwrap();\r\
    \n    let ck = aleo_sonic::CommitterUnionKey::union(std::iter::once(&ck));\r\n\
    \r\n    // And panics\r\n    let _ = AleoSONICKZG10::combine_for_open(&universal_prover,\
    \ &ck, &labeled_polynomials, rands.clone(), &mut fs_rng);\r\n    ```\r\n\r\n3.\
    \ ``` rust\r\n\r\n    use rand::Rng;\r\n    use snarkvm_utilities::rand::TestRng;\r\
    \n    use snarkvm_algorithms::fft::polynomial::*;\r\n    use snarkvm_curves::bls12_377::Fr;\r\
    \n    use snarkvm_algorithms::polycommit::sonic_pc as aleo_sonic;\r\n    use snarkvm_curves::bls12_377::Fq\
    \ as AleoFq;\r\n    pub type EAleo = snarkvm_curves::templates::bls12::Bls12<snarkvm_curves::bls12_377::Bls12_377Parameters>;\r\
    \n    use snarkvm_algorithms::crypto_hash::PoseidonSponge as AleoPoseidonSponge;\r\
    \n    type AleoSONICKZG10 = aleo_sonic::SonicKZG10<EAleo,AleoPoseidonSponge<AleoFq,\
    \ 2, 1>>;\r\n    use snarkvm_algorithms::AlgebraicSponge;\r\n\r\n    let rng =\
    \ &mut TestRng::default();\r\n\r\n    let d = rng.gen_range(2..42);\r\n    //\
    \ We generate a random polynomial of degree d\r\n    let p1 = DensePolynomial::<Fr>::rand(d,\
    \ rng);\r\n    println!(\"P1 = {:?}\",p1);\r\n\r\n    let binding = aleo_sonic::Randomness::empty();\r\
    \n    let rands = vec![&binding];\r\n\r\n    // Third case where the function\
    \ can unwrap() an error is if the polynomial has a degree bound less than its\
    \ own degree\r\n    \r\n    let max_degree = 42;\r\n    let srs = AleoSONICKZG10::load_srs(max_degree).unwrap();\r\
    \n    let universal_prover = srs.to_universal_prover().unwrap();\r\n\r\n    //\
    \ The polynomial p1 has degree_bound = 1 (less than the degree of p1 (=d>=2))\r\
    \n    let degree_bound = 1;\r\n    let mut fs_rng = AleoPoseidonSponge::<AleoFq,\
    \ 2, 1>::new();\r\n    let labeled_polynomials = vec![aleo_sonic::LabeledPolynomial::new(\"\
    Third Case\", p1.clone(), degree_bound, None)];\r\n\r\n    let supported_degree\
    \ = max_degree;\r\n    let supported_lagrange_sizes = None;\r\n    let supported_hiding_bound\
    \ = 0;\r\n    let binding = [degree_bound];\r\n    let enforced_degree_bounds:\
    \ Option<&[usize]> = Some(&binding);\r\n\r\n    let (ck,_) = AleoSONICKZG10::trim(&srs,\
    \ supported_degree, supported_lagrange_sizes, supported_hiding_bound, enforced_degree_bounds).unwrap();\r\
    \n    let ck = aleo_sonic::CommitterUnionKey::union(std::iter::once(&ck));\r\n\
    \r\n    // And panics\r\n    let _ = AleoSONICKZG10::combine_for_open(&universal_prover,\
    \ &ck, &labeled_polynomials, rands.clone(), &mut fs_rng);\r\n    ``` \r\n\r\n\
    ## Root Cause Analysis\r\n\r\nIn the [`combine_for_open()`](https://github.com/AleoHQ/snarkVM/blob/31d0bb5d0a757f2522449133aa3b0924569bc598/algorithms/src/polycommit/sonic_pc/mod.rs#L266C15-L266C15)function,\
    \ at [line 280-281](https://github.com/AleoHQ/snarkVM/blob/31d0bb5d0a757f2522449133aa3b0924569bc598/algorithms/src/polycommit/sonic_pc/mod.rs#L280C10-L281C23),\
    \ there is an `unwrap()` on a value that can be an error, and so and therefore\
    \ the code panics.\r\n\r\n## Detailed Behavior\r\n\r\n1. ```\r\n    sh\r\n\r\n\
    \    thread 'main' panicked at /home/ronan/Desktop/Projects/ALEO/snarkVM/algorithms/src/polycommit/sonic_pc/mod.rs:525:18:\r\
    \n    called `Result::unwrap()` on an `Err` value: UnsupportedDegreeBound(42)\r\
