    \n    3: core::result::Result<T,E>::unwrap\r\n                at /rustc/cc66ad468955717ab92600c770da8c1601a4ff33/library/core/src/result.rs:1077:23\r\
    \n    4: snarkvm_algorithms::polycommit::sonic_pc::SonicKZG10<E,S>::combine_for_open::{{closure}}\r\
    \n                at /home/ronan/Desktop/Projects/ALEO/snarkVM/algorithms/src/polycommit/sonic_pc/mod.rs:524:13\r\
    \n    5: core::ops::function::impls::<impl core::ops::function::FnOnce<A> for\
    \ &mut F>::call_once\r\n                at /rustc/cc66ad468955717ab92600c770da8c1601a4ff33/library/core/src/ops/function.rs:305:13\r\
    \n    6: core::option::Option<T>::map\r\n                at /rustc/cc66ad468955717ab92600c770da8c1601a4ff33/library/core/src/option.rs:1075:29\r\
    \n    7: <core::iter::adapters::map::Map<I,F> as core::iter::traits::iterator::Iterator>::next\r\
    \n                at /rustc/cc66ad468955717ab92600c770da8c1601a4ff33/library/core/src/iter/adapters/map.rs:103:26\r\
    \n    8: snarkvm_algorithms::polycommit::sonic_pc::SonicKZG10<E,S>::combine_polynomials\r\
    \n                at /home/ronan/Desktop/Projects/ALEO/snarkVM/algorithms/src/polycommit/sonic_pc/mod.rs:798:36\r\
    \n    9: snarkvm_algorithms::polycommit::sonic_pc::SonicKZG10<E,S>::combine_for_open\r\
    \n                at /home/ronan/Desktop/Projects/ALEO/snarkVM/algorithms/src/polycommit/sonic_pc/mod.rs:521:12\r\
    \n    ```\r\n\r\n2. ```\r\n    sh\r\n    thread 'main' panicked at /home/ronan/Desktop/Projects/ALEO/snarkVM/algorithms/src/polycommit/sonic_pc/mod.rs:525:18:\r\
    \n    called `Result::unwrap()` on an `Err` value: UnsupportedDegreeBound(42)\r\
    \n    stack backtrace:\r\n    0: rust_begin_unwind\r\n                at /rustc/cc66ad468955717ab92600c770da8c1601a4ff33/library/std/src/panicking.rs:595:5\r\
    \n    1: core::panicking::panic_fmt\r\n                at /rustc/cc66ad468955717ab92600c770da8c1601a4ff33/library/core/src/panicking.rs:67:14\r\
