introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR builds\
  \ upon #706 to simplify the PC scheme implementation. In the process of doing so,\
  \ it also speeds up things like signature verification as well as the value commitment\
  \ handling.\r\n\r\n![Speed ups for signature operations](https://user-images.githubusercontent.com/3220730/159637990-8ffd9cdc-c148-4a4e-96b0-29f7e746624d.png)\r\
  \n\r\n\r\n## Test Plan\r\n\r\n<!--\r\n    If you changed any code, please provide\
