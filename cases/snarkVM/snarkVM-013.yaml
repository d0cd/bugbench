description: 'After PR #2783 removed the `console` feature from other crates, the
  wasm crate still referenced `snarkvm_console` unconditionally and listed `snarkvm_utilities`
  as a regular dependency instead of a dev-dependency. This caused `cargo clippy --no-default-features`
  to fail with unresolved crate errors. The fix removes the `console` feature gate
  for wasm and moves `snarkvm-utilities` to dev-dependencies.'
expected_findings:
- file: wasm/Cargo.toml
  line: 30
  summary: snarkvm-utilities should be a dev-dependency since it is only used in test
    code, not a regular dependency
- file: wasm/src/lib.rs
  line: 13
  summary: "The `console` feature gate is missing or incorrect \u2014 `snarkvm_console`\
    \ is referenced without being gated behind the removed `console` feature, causing\
    \ build failure when default features are disabled"
