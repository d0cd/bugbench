introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR builds\
  \ upon #1546.\r\n\r\nThis PR introduces complete abstractions for `Stack` and `Registers`.\
  \ By using `impl Trait` on types that the `Program` cannot access, we abstract the\
  \ underlying types so that `Stack` and `Registers` can be introduced at a higher\
  \ level.\r\n\r\n"
