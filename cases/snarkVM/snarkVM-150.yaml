  and `hash_to_scalar` opcodes'
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR introduces\
  \ new `commit_to_group`, `hash_many` (placeholder), `hash_to_group`, and `hash_to_scalar`\
  \ opcodes.\r\n\r\n## Changelog\r\n\r\nAs part of this PR, all `hash.*` and `commit.*`\
  \ opcodes now return a `field` type as the default, and we introduce `commit_to_group`,\
  \ `hash_to_group`, and `hash_to_scalar` for other return types (that are cryptographically\
  \ safe).\r\n\r\nThe existing opcodes `commit.ped64` and `commit.ped128` have had\
  \ their return type changed from `group` to `field`, to adhere to the updated design.\r\
  \n\r\nThe following are the new commitment opcodes:\r\n```rs\r\ncommit_to_group.bhp256\r\
  \ncommit_to_group.bhp512\r\ncommit_to_group.bhp768\r\ncommit_to_group.bhp1024\r\n\
  commit_to_group.ped64\r\ncommit_to_group.ped128\r\n```\r\n\r\nThe following are\
  \ the new hashing opcodes:\r\n```rs\r\nhash_many.psd2 (placeholder)\r\nhash_many.psd4\
  \ (placeholder)\r\nhash_many.psd8 (placeholder)\r\nhash_to_group.bhp256\r\nhash_to_group.bhp512\r\
  \nhash_to_group.bhp768\r\nhash_to_group.bhp1024\r\nhash_to_group.ped64\r\nhash_to_group.ped128\r\
  \nhash_to_group.psd2\r\nhash_to_group.psd4\r\nhash_to_group.psd8\r\nhash_to_scalar.psd2\r\
  \nhash_to_scalar.psd4\r\nhash_to_scalar.psd8\r\n```\r\n\r\n## Testing\r\n\r\nUnit\
  \ tests for all breaking and new opcodes have been added in this PR, to check that\
  \ they adhere to the correct type and calling convention."
