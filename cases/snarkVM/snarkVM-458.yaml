fix_pr_title: Skip proof verification if building with dev_skip_checks
fix_pr_body: "## Motivation\r\n\r\nIn order to accelerate testing of Leo programs,\
  \ we introduce a feature flag `dev_skip_checks` to skip proof verification.\r\n\r\
  \nTo prevent accidental usage, a compilation guard has been added to make it depend\
  \ on `test_consensus_heights`, which in turn snarkOS only sets when using `test_network`.\r\
  \n\r\nAlso fixes a bug in Fee deserialization which disallowed submitting a fee\
  \ without Proof object. This does not create any security vulnerability because\
  \ the VM explicitly checks for existence and validity of fee Execution Proofs.\r\
  \n\r\n## Out of scope ideas for future work\r\n- Note that this approach may give\
  \ false positives in case a devnode and caller have different configurations (block\
  \ height, consensus version, snarkVM commit hash). The only middle road way to get\
  \ around that would be to receive an entire `R1CS` object and for the devnode to\
  \ check that it is satisfied given it's own witness. This can be follow-up work,\
  \ because regardless, we will want to land the proof-less transaction in the VM.\r\
  \n- We have a mix of dev_, dev- and test_ feature flags, we can consider creating\
  \ a formal standard at some point."
