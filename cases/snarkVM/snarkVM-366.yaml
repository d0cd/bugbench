introducing_pr_title: '[ARC-0046] Staking for Puzzle Solution Submissions'
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR is\
  \ implements the new features highlighted in the [ARC-0046 Proposal](https://github.com/AleoNet/ARCs/discussions/97).\r\
  \n\r\nThis is done by:\r\n\r\n1. Tracking the provers and the number of solutions\
  \ they have landed in the current epoch.\r\n2. Aborting solutions from provers that\
  \ exceeds their solution limit.\r\n3. Invalidating blocks that have solutions that\
  \ exceed a prover's solution limit.\r\n4. Implementing a stepwise function to calculate\
  \ the number of solutions a prover can land in an epoch based on the prover stake\
  \ and current block timestamp.\r\n\r\nNote that there is no need for a new `ConsensusVersion`\
  \ if the first enforcement timestamp is after all validators upgrade.\r\n\r\n##\
  \ Test Plan\r\n\r\n<!--\r\n    If you changed any code, please provide us with clear\
  \ instructions on how you verified your changes work.\r\n    Bonus points for screenshots\
  \ and videos!\r\n-->\r\n\r\nTests have been added to ensure solution limits are\
  \ properly calculated based on timestamp."
