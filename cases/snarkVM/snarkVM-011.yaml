fix_pr_title: Abort transactions with duplicated `OutputID`s
fix_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending the\
  \ time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR adds logic\
  \ to `VM::atomic_speculate` to track `OutputID`s and abort transactions that attempt\
  \ to create an `OutputID` that was already included in this block or previous blocks.\r\
  \n\r\nNote: We may want to use `OutputStore::get_speculative` instead of per block\
  \ trackers in `atomic_speculate`.\r\n\r\nRelated to: #2229 \r\nFixes: #2263 \r\n\
  \r\n## Test Plan\r\n\r\nA test has been added to check that different transactions\
  \ can't create outputs with the same OutputID.\r\n\r\nTODO:\r\n- [ ] Unify and clean\
  \ up the `input_id` and `output_id` checks in `atomic_speculate`\r\n"
