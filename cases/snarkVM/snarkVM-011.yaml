description: Package::deploy created a local Process internally, which did not contain
  the imported programs needed by deployment_cost. This caused deployment of programs
  with imports to fail. The fix changes deploy() to accept an external &Process<N>
  parameter so that all imports are available when computing deployment cost.
expected_findings:
- file: vm/package/deploy.rs
  line: 113
  summary: deploy() creates or uses a local Process that lacks imported programs;
    should accept an external &Process<N> parameter so deployment_cost can access
    all imports
- file: vm/package/deploy.rs
  line: 156
  summary: Inner deploy helper also uses a local Process without imports; needs the
    external process passed through to ensure imports are present for cost calculation
- file: vm/package/mod.rs
  line: 165
  summary: "is_main flag set to false when calling deploy, but the process scope is\
    \ wrong \u2014 deploy needs to receive the external Process that already has imports\
    \ loaded"
