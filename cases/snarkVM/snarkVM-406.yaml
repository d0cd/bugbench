introducing_pr_title: '[Fix] Restore PendingBlocks API'
introducing_pr_body: "This PR restores the changes from #2745. \r\n\r\nThe PR is mostly\
  \ unchanged except for a few changes to reduce the reordering of checks, most notably\
  \ the solution ID checks are now performed earlier (see [be754f1](https://github.com/ProvableHQ/snarkVM/pull/2932/commits/be754f1b299003a5ed1b696913c4d4411ef713d8)).\r\
  \n\r\nFinally, the PR adds a `--force` argument to `choco uninstall rust`. It seems\
  \ to help with the flakiness of windows CI ([1f43c5d](https://github.com/ProvableHQ/snarkVM/pull/2932/commits/1f43c5dabd2b9e3c3228a8576723f6409ed4ada8)). "
