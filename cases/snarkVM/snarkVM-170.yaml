introducing_pr_title: Adds support for `cast.lossy` opcode
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR updates\
  \ the `cast` opcode to align with the new design for the `cast.lossy` opcode.\r\n\
  \r\nThe implementation of `cast.lossy` under the hood has been updated to ensure\
  \ there is no fallibility when converting between types, at the cost of lossy truncation.\
  \ To ensure conversions from `field` to `group`/`address` are infallible, `Elligator2`\
  \ is used as a fallback, when recovering from the x-coordinate is invalid.\r\n\r\
  \nIn addition, the following changes are introduced:\r\n- Adds `circuit::Address::zero()`\r\
  \n- Adds `circuit::Group::generator()`\r\n- Adds `circuit::Integer::to_scalar()`\
  \ and `console::Integer::to_scalar()`\r\n- A benchmark for `Elligator2` is added\
  \ to `console/algorithms/benches`.\r\n\r\n## Testing\r\n\r\n- Extensive unit tests\
  \ are added to each casting operator for `cast_lossy` in `console`\r\n- All unit\
  \ tests in `circuit` for `cast` are updated with the new counts\r\n\r\n## Reviewers'\
  \ Note\r\n\r\nThe most important change worth a careful review is that of the `Field\
  \ -> Group` `cast_lossy` implementation in `circuit/program/src/data/literal/cast_lossy/field.rs`.\
  \ You should compare this against the `console` version to understand what the intended\
  \ logic is supposed to be. (The `console` version is human-readable).\r\n\r\nIn\
  \ addition, the impl of [`circuit::Group::from_xy_coordinates()`](https://github.com/AleoHQ/snarkVM/pull/1994/files#diff-e3592a499cc78d2ca1fb836e88e09d17f7f65720adab28ee78788a9f21174795)\
  \ has been changed to prevent triggering a halting case. This logic should also\
  \ be carefully reviewed."
