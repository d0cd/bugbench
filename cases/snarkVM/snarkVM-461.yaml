introducing_pr_title: '[Chore] Upgrade to Rust 1.88'
introducing_pr_body: "This PR upgrades the toolchain to 1.88 and updates all crates\
  \ to use the 2024 edition of Rust.\r\n\r\nTo make `cargo clippy` happy, and improve\
  \ the code quality, there are many simple changes, such as the following:\r\n* Use\
  \ of `is_some_and` and `is_none_or` instead of `map_or(true, ...)`\r\n* Use of `div_ceil`\
  \ instead of manually doing a ceiling division like `(n+7)/8` (we often do this\
  \ when converting from bits to bytes.\r\n* Use of inline arguments for `format!`\
  \ and similar, e.g. `format!(\"foo: {bar}\")` instead of `format!(\"foo: {}\", bar)`\r\
  \n* Deal with `gen` being a reserved keyword. Often this meant changing `rng.gen`\
  \ to `rng.r#gen`. This is why in the next version of `rand` the API changed to `rng.randomg`.\r\
  \n* Use of `repeat_n` when generating a sequence, e.g., `core::iter::repeat_n(42,\
  \ 8)` instead of `core::iter::repeat(42).take(8)`\r\n* Rust 2024 changed the way\
  \ pattern matching works a bit, as described [here](https://doc.rust-lang.org/edition-guide/rust-2024/match-ergonomics.html).\
  \ You will see keywords like `ref` or `mut` removed in `match` expressions.\r\n\r\
  \nFinally, I used this opportunity to simply our CircleCI setup.\r\n* There is now\
  \ a `rust-docker` executor, so we don't have to set the docker image for every job.\r\
  \n* For `run_test` (formerly `run_serial`), the cache key is derived from the workspace\
  \ member's name, which also means fewer spots to change the cache keys and avoids\
  \ potential typos in cache keys.\r\n* I removed `run_parallel` because it is not\
  \ used anyway (it is also not used in snarkOS, by the way).\r\n* Updated `sccache`\
  \ to version 0.10 and disabled incremental builds (`sccache` does not work with\
  \ incremental builds)."
