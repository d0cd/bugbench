introducing_pr_title: Workspace dependencies
introducing_pr_body: "Move a bunch of dependency declarations into workspace declarations,\
  \ including all crates in the workspace and external crates which are dependents\
  \ of more than one crate. \r\n\r\nIn a cargo workspace, dependencies should be workspace\
  \ dependencies when possible so versions and paths can be managed conveniently in\
  \ one location and there's no chance of divergence. \r\n\r\nThere are two commits\
  \ here which can be examined individually. The first commit simply removes some\
  \ redundant macros. \r\n\r\nThese commits build off my other PR so I'm making that\
  \ branch the target for now. "
