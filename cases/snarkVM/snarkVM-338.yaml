introducing_pr_title: '[Perf] Use SmallVec in LinearCombination'
introducing_pr_body: "I think this PR, third in the series (https://github.com/ProvableHQ/snarkVM/pull/2620,\
  \ https://github.com/ProvableHQ/snarkVM/pull/2621), concludes the heap-related optimizations\
  \ that can be applied to synthesis, at least based on the new `large_program` benchmark.\
  \ It is also the simplest - it only substitutes one `Vec` with a `SingleVec`, which\
  \ is optimized for the scenario that is most common/impactful - `LinearCombination`s\
  \ consisting of a single term. I've also run profiling using a `SmallVec<[T; N]>`\
  \ with `N` ranging from `1` to `8`, and it performed favorably to all of them.\r\
  \n\r\nThis change has the following impact:\r\n- total allocs & deallocs **-47%**\r\
  \n- max RAM **-2%**\r\n```\r\nCheckDeployment for do  time:   [867.22 ms 869.05\
  \ ms 871.85 ms]\r\n                        change: [-32.516% -31.569% -30.881%]\
  \ (p = 0.00 < 0.05)\r\n                        Performance has improved.\r\n```"
