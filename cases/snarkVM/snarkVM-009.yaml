description: The `ensure_equals` macro in utilities/src/errors.rs accepts variadic
  format arguments `$(, $format_args:tt)*` but does not forward them to the underlying
  format string. This causes messages to display raw format placeholders (e.g., `{}`)
  instead of interpolated values. The fix passes `$($format_args)*` through to the
  formatting call.
expected_findings:
- file: utilities/src/errors.rs
  line: 62
  summary: "Macro arm captures `$format_args:tt` but does not forward them to the\
    \ format string \u2014 format arguments are silently dropped, producing unformatted\
    \ messages."
- file: utilities/src/errors.rs
