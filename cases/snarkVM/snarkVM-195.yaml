introducing_pr_title: Enable deferred deserialization of Data
introducing_pr_body: I haven't noticed it when we switched the snarkOS `Data` to the
  one from snarkVM, but it appears that the latter had a slightly different implementation
  that by default doesn't enable deferred deserialization. This PR fixes it by dropping
  the variant (which would almost exclusively end up being `0`) and making `FromBytes::read_le`
  always return a buffer.
