introducing_pr_title: '[Test] Execution cost.'
introducing_pr_body: "This PR follows on #2369 with two tests checking that the finalize\
  \ cost is calculated correctly. \r\nThe finalize cost of an execution is the finalize\
  \ cost of its root transition.\r\nThis should be equal to the sum of the cost of\
  \ **all** commands in **each** finalize block in **each** transition in the execution.\r\
  \nAs a by product, this PR also refactors the cost utilities to support `command_cost`\
  \ which returns the cost of a command.\r\n"
