introducing_pr_title: A candidate new CI procedure
introducing_pr_body: "## Motivation\r\n\r\nThis PR replaces the CI procedure for development\
  \ efficiency. \r\n\r\n## Summary of the changes:\r\n\r\n- Move check-style to Circle\
  \ CI, since GitHub CI sometimes has network failures. This change may be reverted\
  \ in the future.\r\n- Increase the Circle CI Rust minimal stack size to 64MB, which\
  \ seems to be needed for certain tests.\r\n- Split the tests as follows: \r\n  \
  \ * Rust-nightly is broken down into individual crates' nightly and an integration-nightly.\
  \ \r\n   * Rust-stable is replaced by an integration test on stable.\r\n   * The\
  \ integration test, which consists of the testnet1 part and the testnet2 part, is\
  \ further split.\r\n   * Names of the tests have been simplified.\r\n- Remove `codecov`\
  \ test temporarily since it is broken at this moment and seems to invariably demand\
  \ a longer test time. It will be brought back later.\r\n\r\nExpected that a full\
  \ test procedure is now about 10m instead of 25m or longer. "
