introducing_pr_title: Abort excess transactions in a proposed block
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR adds\
  \ logic to abort the remaining transactions if the block has already reached the\
  \ transaction limit `Transactions::MAX_TRANSACTIONS`.  \r\n\r\nThis is needed because\
  \ a committed subdag could theoretically include more than `Transactions::MAX_TRANSACTIONS`\
  \ transactions, which would result in block production failure."
