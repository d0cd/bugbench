introducing_pr_title: Avoid duplicate logs in fn staking_rewards
introducing_pr_body: "## Motivation\r\n\r\nThere were cases of massive duplicated\
  \ logs in `fn staking_rewards`, since we have ~100.000 stakers and ~25 validators,\
  \ as described here: https://github.com/ProvableHQ/snarkVM/issues/2689\r\n\r\nThis\
  \ PR addresses it by doing checks before processing all stakers:\r\n* Retrieve and\
  \ log invalid validators (invalid commission rates, > 25% of total stake)\r\n* Retrieve\
  \ and log validators that are not in the committee\r\n\r\nAs a result, these things\
  \ will only be logged once per validator, not per staker. The level of the logs\
  \ remains unchanged.\r\n\r\nCloses https://github.com/ProvableHQ/snarkVM/issues/2689"
