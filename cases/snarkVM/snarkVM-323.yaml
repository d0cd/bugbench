introducing_pr_title: '[Feature] Async and futures.'
introducing_pr_body: "This PR introduces introduces new concepts to the Aleo programming\
  \ model. Much of this work has been inspired by concepts in asynchronous programming.\
  \ We will start by discussing the data type, followed by the syntax, and concluding\
  \ with an example.\r\n\r\nTODO: More testing.\r\n\r\n## Data Types\r\n\r\n### Future\r\
  \n```rust\r\n/// A future.\r\n#[derive(Clone)]\r\npub struct Future<N: Network>\
  \ {\r\n    /// The program ID.\r\n    program_id: ProgramID<N>,\r\n    /// The name\
  \ of the function.\r\n    function_name: Identifier<N>,\r\n    /// The arguments.\r\
  \n    arguments: Vec<Argument<N>>,\r\n}\r\n\r\n/// An argument passed into a future.\r\
  \n#[derive(Clone)]\r\npub enum Argument<N: Network> {\r\n    /// A plaintext value.\r\
  \n    Plaintext(Plaintext<N>),\r\n    /// A future.\r\n    Future(Future<N>),\r\n\
  }\r\n```\r\nA `Future` is equivalent to the call graph of the on-chain execution\
  \ and is explicitly used when finalizing an execution.\r\nInstead of constructing\
  \ the call graph implicitly from the code, the transition/circuit explicitly outputs\
  \ a `Future`, specifying which code blocks to run on-chain and how to run them.\r\
  \n\r\n## Syntax\r\n\r\nThis PR makes the following syntax additions/modifications.\r\
  \n- `future` type. A user can declare a future type by specifying a `Locator` followed\
  \ by the tag `.future`. For example, `credits.aleo/mint_public.future`. A `function`\
  \ can only output a future and a `finalize` block can only take a future in as input.\
  \ A `closure` cannot do either.\r\n- `async` call. A user can make an asynchronous\
  \ call to the finalize block via the `async` keyword. For example, `async mint_public\
  \ r0 r1 into r2;`. Note that the associated function must be specified. This operation\
  \ produces a `Future` as output. `async` takes the place of the `finalize` command,\
  \ which was allowed in the body of a `function` after the `output` statements.\r\
  \n- `await` command. A user can evaluate a future inside of a finalize block using\
  \ the `await` command. For example, `await r0;`. An `await` command can only be\
  \ used in a finalize block. The operand must be a register containing a `Future`.\
  \ \r\n- Indexing a future. A register containing a future can be indexed using the\
  \ existing index syntax. For example, `r0[0u32]`. This would get the input of the\
  \ future at that specific index. Accesses can be nested to match the nested structure\
  \ of a future.\r\n\r\nThere are a number of rules associated with using these components.\r\
  \n1. If a `function` has a `finalize` block, it must have exactly one `async` instruction.\r\
  \n2. If a `function` has a `finalize` block, it's last `output` must be a `future`.\r\
  \n3. If a `function` does not have a `finalize` block, it cannot have an `async`\
  \ instruction`.\r\n4. All futures created by `call`s need to be input to the `async`\
  \ instruction in the order they were produced.\r\n5. An `async` call must reference\
  \ the same `function`.\r\n6. All `call`s must be made before invoking `async`.\r\
  \n7. The input `future`s types in a `finalize` block must match the order in which\
  \ they were created in the `function`.\r\n8. All `future`s in a `finalize` must\
  \ be `await`-ed **and** in the order in which they were specified.\r\n9. Instructions\
  \ can be interleaved between invocations of `call`, `async`, and `await`.\r\n\r\n\
  ## An Example\r\n```aleo\r\nprogram basic_math.aleo;\r\n\r\nmapping uses:\r\n  \
  \  key user as address.public;\r\n    value count as i64.public;\r\n\r\nfunction\
  \ add_and_count:\r\n    input r0 as i64.private;\r\n    input r1 as i64.private;\r\
  \n    add r0 r1 into r2;\r\n    async add_and_count self.caller into r3;\r\n   \
  \ output r2 as i64.private;\r\n    output r3 as basic_math.aleo/add_and_count.future;\r\
  \n\r\nfinalize add_and_count:\r\n    input r0 as address.public;\r\n    get.or_use\
  \ uses[r0] 0i64 into r1;\r\n    add r1 1i64 into r2;\r\n    set r2 into uses[r0];\r\
  \n\r\nfunction sub_and_count:\r\n    input r0 as i64.private;\r\n    input r1 as\
  \ i64.private;\r\n    sub r0 r1 into r2;\r\n    async sub_and_count self.caller\
  \ into r3;\r\n    output r2 as i64.private;\r\n    output r3 as basic_math.aleo/sub_and_count.future;\r\
  \n\r\nfinalize sub_and_count:\r\n    input r0 as address.public;\r\n    get.or_use\
  \ uses[r0] 0i64 into r1;\r\n    add r1 1i64 into r2;\r\n    set r2 into uses[r0];\r\
  \n\r\n/////////////////////////////////////////////////\r\n\r\nimport basic_math.aleo;\r\
  \n\r\nprogram count_usages.aleo;\r\n\r\nfunction add_and_subtract:\r\n    input\
  \ r0 as i64.private;\r\n    input r1 as i64.private;\r\n    call basic_math.aleo/add_and_count\
  \ r0 r1 into r2 r3;\r\n    call basic_math.aleo/sub_and_count r2 r1 into r4 r5;\r\
  \n    assert.eq r0 r4;\r\n    assert.eq r3[0u32] r5[0u32];\r\n    async add_and_subtract\
  \ r3 r5 into r6;\r\n    output r0 as i64.private;\r\n    output r6 as count_usages.aleo/add_and_subtract.future;\r\
  \n\r\nfinalize add_and_subtract:\r\n    input r0 as basic_math.aleo/add_and_count.future;\r\
  \n    input r1 as basic_math.aleo/sub_and_count.future;\r\n    await r0;\r\n   \
  \ assert.eq r0[0u32] r1[0u32];\r\n    await r1;\r\n```\r\n\r\n"
