introducing_pr_title: '[Fix] Execute and verify nested function calls.'
introducing_pr_body: "This PR,\r\n- fixes execution for nested function calls.\r\n\
  - fixes verification for nested function calls.\r\n- adds tests using nested external\
  \ calls and checks their execution order (the order of transitions in an `Execution`).\r\
  \n\r\n**To: Reviewer**\r\nThis PR needs feedback on how to appropriately organize\
  \ the call graph reconstruction logic.\r\n\r\n### What is the correct order?\r\n\
  Suppose that we have the following programs:\r\n- `C`, with transition `c`.\r\n\
  - `B`, with transition `b`.\r\n- `A`, which imports `B` and `C`, and contains transition\
  \ `a` which invokes `B/b` and `C/c`.\r\nSuppose that the call graph looks like:\r\
  \n```\r\nA::a\r\n  --> B::b\r\n  --> C::c\r\n```\r\nThen the finalize blocks need\
  \ to evaluated in the following order: `\r\n```\r\nB::b, C::c, A::a\r\n```\r\nIn\
  \ other words, **finalize blocks are evaluated in order of the transition that finished\
  \ first**.\r\n\r\n\r\nFor a more complex example,\r\nSuppose we have the following\
  \ call graph, where each call is an external call.\r\n```\r\nA::a\r\n--> B::b\r\n\
  \       --> C::c\r\n       --> D::d\r\n--> E::e\r\n       --> B::b\r\n         \
  \     --> C::c\r\n              --> D::d\"\r\n       --> D::d\r\n       --> C::c\r\
  \n```\r\nThe finalize blocks need to be evaluated in the following order: \r\n```\r\
  \nC::c, D::d, B::b, C::c, D::d, B::b, D::d, C::c, E::e, A::a\r\n```"
