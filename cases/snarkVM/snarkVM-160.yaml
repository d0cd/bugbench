introducing_pr_title: Add initial integration of GPU optimizations
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR introduces\
  \ an initial version of GPU optimizations for MSMs and NTTs. This is very much in\
  \ development, as there are many additional optimizations to be made and that these\
  \ optimizations have not been fully audited.\r\n\r\nAt this time, the optimizations\
  \ are only available for Nvidia GPUs with support for Cuda 9 or later.\r\n\r\n###\
  \ Requirements:\r\n- Cuda `sm_70` or later\r\n- [Cuda Toolkit (nvcc)](https://docs.nvidia.com/cuda/index.html#installation-guides)\r\
  \n\r\n### Usage:\r\n\r\n- Simply enable the `cuda` feature in your command or snarkVM\
  \ dependency\r\n\r\n\r\n#### Examples:\r\n\r\n```\r\ncd synthesizer\r\ncargo bench\
  \ --bench coinbase_puzzle --features \"cuda\"\r\n```\r\n\r\nor\r\n\r\n```\r\n[dependencies.snarkvm]\r\
  \nversion = \"<latest_version>\"\r\nfeatures = [\"cuda\"]\r\n```\r\n \r\n "
