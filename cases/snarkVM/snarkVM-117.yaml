introducing_pr_number: 1727
introducing_pr_title: '[Feature] Introduce `ArrayType`.'
introducing_pr_body: "This PR introduces the `ArrayType`.\r\nThis allows users to\
  \ define single-dimensional static arrays, e.g `[u8; 14]`.\r\nThe maximum size of\
  \ an array is artificially set to be `u32::MAX`.\r\nNote that this PR does **not**\
  \ integrate `ArrayType` into the rest of the codebase, just introduces it as an\
  \ isolated module\r\n"
