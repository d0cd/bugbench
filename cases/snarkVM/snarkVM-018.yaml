issue_bodies:
  '1743': "## \U0001F41B Bug Report\r\n\r\nWhenever a program generates `Record` with\
    \ that contains a `Struct`, an extra closing bracket will be added to the end\
    \ of the `Struct`. Same for nested `Struct` recursively.\r\n\r\n## Steps to Reproduce\r\
    \n\r\nAll data to reproduce can be found in this transaction, executing a program\
    \ transition :\r\nhttps://vm.aleo.org/api/testnet3/transaction/at1d08qvu95lzlv92dsjrv8n4lvel8x9rann2t54py4h80vjy0nxcyqhxrpuq\r\
    \n\r\n`transition[0].outputs[0]` decoded with viewkey `AViewKey1hKNmqi83PpwjCTSSUCZT2rX3p3jcktNXzJZnk6rSqq4b`\
    \ returns :\r\n```\r\n{\r\n    owner: aleo1wamjqlka7d0gazlxdys6n8e8zeee3ymedwvw8elvh7529kwd45rq0plgax.private,\r\
    \n    id: {\r\n        collection_number: 25371715469272213720224343178070736482u128.private\r\
    \n    },\r\n    data: {\r\n        privately_minted: {\r\n        positive: 0u64.private,\r\
    \n        negative: 0u64.private\r\n    }\r\n    },\r\n    royalty_fees: 500u16.private,\r\
    \n    publicizable: true.private,\r\n    updatable: true.private,\r\n    metadata_uri:\
    \ {\r\n        part0: 140152554740597502496525853903429913932u128.private,\r\n\
    \        part1: 134617583084312214720973570367896241221u128.private,\r\n     \
    \   part2: 104133346941662617879306115050903128141u128.private,\r\n        part3:\
    \ 153398181356134783820482129834790617088u128.private\r\n    }\r\n    },\r\n \
    \   _nonce: 4657518007057346011967333542044959903015797864849889452602278140358226817257group.public\r\
    \n}\r\n```\r\n\r\n\r\n## Expected Behavior\r\n\r\nReturn value should be:\r\n\
    ```\r\n{\r\n    owner: aleo1wamjqlka7d0gazlxdys6n8e8zeee3ymedwvw8elvh7529kwd45rq0plgax.private,\r\
    \n    id: {\r\n        collection_number: 25371715469272213720224343178070736482u128.private\r\
    \n    },\r\n    data: {\r\n    privately_minted: {\r\n        positive: 0u64.private,\r\
    \n        negative: 0u64.private\r\n    },\r\n    royalty_fees: 500u16.private,\r\
    \n    publicizable: true.private,\r\n    updatable: true.private,\r\n    metadata_uri:\
    \ {\r\n        part0: 140152554740597502496525853903429913932u128.private,\r\n\
    \        part1: 134617583084312214720973570367896241221u128.private,\r\n     \
    \   part2: 104133346941662617879306115050903128141u128.private,\r\n        part3:\
    \ 153398181356134783820482129834790617088u128.private\r\n    },\r\n    _nonce:\
    \ 4657518007057346011967333542044959903015797864849889452602278140358226817257group.public\r\
    \n}\r\n```\r\n\r\n## Environment\r\nTestnet3\r\n"
