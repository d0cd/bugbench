description: Missing test coverage for subgroup membership validation of small order
  curve points. Small order points on elliptic curves can be exploited in cryptographic
  protocols if not properly checked for subgroup membership. The PR adds tests to
  verify that small order points are correctly identified as non-members of the expected
  prime-order subgroup.
