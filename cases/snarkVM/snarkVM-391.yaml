introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\nIn order to get\
  \ `snarkvm-console` to compile under the target x86_64-fortanix-unknown-sgx\r\n\
  it is required to reworked some features in various dependency crates.\r\n\r\n##\
  \ Test Plan\r\n\r\n<!--\r\n    If you changed any code, please provide us with clear\
  \ instructions on how you verified your changes work.\r\n    Bonus points for screenshots\
  \ and videos!\r\n-->\r\n\r\nDid not change any major functionality.\r\nOnly checked\
  \ a full project build with `cargo build` under linux,\r\nand a separate build of\
  \ only `snarkvm-console` under SGX:\r\n\r\n`cargo +nightly b --target x86_64-fortanix-unknown-sgx\
  \ -p snarkvm-console --no-default-features --features \"account, algorithms, collections,\
  \ program, types, network_min\"`\r\n\r\n**Going to use the CI to work through errors**\r\
  \n\r\n## Related PRs\r\n\r\n<!--\r\n    If this PR adds or changes functionality,\
  \ please take some time to\r\n    update the docs at https://github.com/ProvableHQ/snarkVM\
  \ and https://github.com/AleoHQ/protocol-docs,\r\n    and link to your PR here.\r\
  \n-->\r\n\r\nhttps://github.com/ProvableHQ/snarkVM/pull/2778"
