introducing_pr_title: Introduce `StatePath` verification to Transitions.
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR introduces\
  \ `inclusion_proof`s into `Transition`s - `executions` and `additional_fees`.\r\n\
  \r\nThis proof is constructed by batching the state path verification for each input\
  \ record in the transition; note that this proof must be included in each transaction\
  \ if there is at least one input record. In the case that a `Transaction` does not\
  \ have any input records, the `inclusion_proof` can be set to `None`.\r\n"
