introducing_pr_body: "This PR:\r\n1. Introduces `console` and `circuit` implementations\
  \ of `RemChecked` and `RemWrapped`.\r\n2. Introduces the `rem` and `rem.w` instructions.\r\
  \n3. Performs a minor refactor of the `div_wrapped` and `div_checked` circuits.\r\
  \n\r\nNote that `rem` and `rem.w` implement a truncated remainder operations.\r\n\
  This is consistent with Rust's semantics for `checked_rem` and `wrapping_rem` respectively."
