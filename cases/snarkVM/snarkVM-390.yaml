introducing_pr_number: 2895
introducing_pr_title: '[Fix] Ensure endpoint base URLs that end on slashes work as
  expected'
introducing_pr_body: "## Motivation\r\n`http::Uri` adds a slash if there is no path\
  \ after the authority (hostname+port) but does not append a slash to non-empty paths.\
  \ For example, `test.com` gets converted into `test.com/`, but `test.com/foo` will\
  \ remain unchanged.\r\nAll our tests assumed a simple hostname (+port) for the Query\
  \ URL, but nodes might use a URL that includes some prefix, e.g. `example.com/mynode`.\
  \ \r\n\r\nThis PR changes `Query` to handle both cases as expected. It also adds\
  \ a new `Query::build_endpoint` helper function that can be unit tested easier.\r\
  \n\r\n## Test Plan\r\nIn addition to the unit tests, I will also test manually using\
  \ `snarkos developer`."
