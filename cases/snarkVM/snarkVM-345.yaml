introducing_pr_title: '[Perf] Avoid tx root derivation during block generation'
introducing_pr_body: "## Motivation\r\n\r\nTransaction, deployment and execution root\
  \ derivation take up 90% of compute of block generation when excluding transaction\
  \ verification. Fortunately, the ids can be cached at practically 0 cost.\r\n\r\n\
  If this is approved, I'll also apply the change to `to_unconfirmed_id` and potentially\
  \ other calls to `to_deployment_id` and `to_execution_id`.\r\n\r\n## Test Plan\r\
  \n\r\n- [x] Local network succeeds.\r\n- [x] Deployed network with traffic succeeds.\r\
  \n\r\n\r\n"
