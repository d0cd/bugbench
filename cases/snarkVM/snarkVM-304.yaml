introducing_pr_title: Update `is_open` flag to check for new stakers
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR updates\
  \ `credits.aleo` in two ways:\r\n\r\n1. Change `is_open` check to prevent bonds\
  \ from new stakers only. Existing stakers can still bond to the validator if this\
  \ flag is set to false.\r\n    - This helps with validator UX, especially if the\
  \ validator only wants a specific set of delegators. (e.g. a special delegation\
  \ program - https://github.com/AleoHQ/ARCs/discussions/66)\r\n    - This is safe\
  \ because it does not prevent validators from unbonding their delegators with `unbond_delegator_as_validator`.\
  \ \r\n    \r\n2. Remove 10 validator maximum in `credits.aleo`\r\n    - This check\
  \ is now moved to `VM::speculate`. Where `bond_public` calls that would cause the\
  \ committee size to exceed `MAX_COMMITTEE_SIZE` will be rejected.\r\n    - This\
  \ unifies the interface for where the max committee size is set to just the `MAX_COMMITTEE_SIZE`\
  \ variable.\r\n\r\n## Test Plan\r\n\r\nTests have been added to ensure the following:\r\
  \n\r\n1. New delegators can't bond to validators if the `is_open` flag is set to\
  \ `false`.\r\n2. Existing delegators can bond to validators if the `is_open` flag\
  \ is set to `false`.\r\n3. A validator can bond more stake to itself no matter what\
  \ the `is_open` flag is set to.\r\n4. `bond_public` transactions will be rejected\
  \ if the would have caused the committee size to exceed the maximum."
