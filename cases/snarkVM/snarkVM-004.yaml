description: Deployment verification failed for certain programs because the RNG used
  to generate random inputs during deployment and verification was not deterministically
  seeded. This caused the deploy step and the verify step to produce different random
  inputs, leading to mismatched assignments and certificate verification failures.
  The fix introduces a deterministically seeded RNG (via rand_chacha) so that both
  deploy and verify generate identical inputs.
expected_findings:
- file: synthesizer/process/src/stack/deploy.rs
  line: 93
  summary: Non-deterministic RNG used for input generation during deployment; deploy
    and verify steps can produce different random values, causing verification failures.
    Must use a deterministically seeded RNG.
- file: synthesizer/process/src/stack/deploy.rs
  line: 117
  summary: Non-deterministic RNG used during verification input generation; without
    matching the deploy step's seed, generated inputs diverge and certificate checks
    fail.
- file: synthesizer/process/src/stack/deploy.rs
  line: 160
  summary: Non-deterministic RNG used for sub-stack generation during verification;
    must be seeded identically to the deploy step to ensure consistent assignments.
