fix_pr_title: '[Build] Support compilation w/o default features'
fix_pr_body: "## Motivation\r\nFixes #2721. This change enables us to build leaner\
  \ test binaries by disabling unwanted features, and (hopefully) speeds up snarkOS\
  \ compilation slightly.\r\n\r\n## Overview\r\nThis PR introduces two new features,\
  \ `package` and `file`, which are both enabled by default. This change more clearly\
  \ defines dependencies for each feature. It also allows compiling without any default\
  \ features or only the `file` feature.\r\n\r\nFinally, the PR removes `cli` from\
  \ the default features, as this flag depends on `ureq`, `self_update`, and a few\
  \ other large dependencies. `cli` is only needed for the `snarkvm` binary, and it\
  \ would be great if we could disable it in snarkOS.\r\n\r\n## Testing\r\nI manually\
  \ tested each feature compiles by running `cargo check --no-default-features --features=<feature_name>`.\r\
  \n\r\n## Notes\r\nWe should consider removing features flags. snarkVM already has\
  \ a lot of them, and it looks like `file` and its dependencies (`console` and `synthesizer`)\
  \ should always be enabled.\r\nI was not sure if removing existing features would\
  \ break anything, so I did not make such a change."
