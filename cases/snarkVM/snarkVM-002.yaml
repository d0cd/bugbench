description: The Block metadata serialization incorrectly serialized the `cumulative_weight`
  field using `.to_string()`, causing a mismatch between serialization and deserialization.
  The fix corrects the serde implementation in both the human-readable and binary
  serialization paths in `serialize.rs`, with corresponding adjustments in `lib.rs`
  for deserialization or tests.
