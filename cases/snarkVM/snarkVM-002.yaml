fix_pr_title: Add bounded deserialization for CircuitVerifyingKey
fix_pr_body: "`CircuitVerifyingKey::deserialize` was vulnerable to unbounded memory\
  \ allocation when deserializing the `circuit_commitments` vector, allowing malicious\
  \ input to exhaust memory.\n\n## Changes\n\n- **Removed `CanonicalDeserialize` derive**\
  \ and implemented custom deserialization\n- **Bounded `circuit_commitments` to 12\
  \ elements** (3 matrices \xD7 4 polynomials per Varuna protocol)\n- **Returns `SerializationError::InvalidData`**\
  \ when length exceeds bound\n- **Implemented `Valid` trait** for validation pipeline\
  \ compatibility\n- **Added tests** verifying bound enforcement and backwards compatibility\n\
  \n## Implementation\n\n```rust\nimpl<E: PairingEngine> CanonicalDeserialize for\
  \ CircuitVerifyingKey<E> {\n    fn deserialize_with_mode<R: Read>(\n        mut\
  \ reader: R,\n        compress: Compress,\n        validate: Validate,\n    ) ->\
  \ Result<Self, SerializationError> {\n        let circuit_info = CircuitInfo::deserialize_with_mode(&mut\
  \ reader, compress, validate)?;\n        let len = u64::deserialize_with_mode(&mut\
  \ reader, compress, validate)?;\n        \n        const MAX_CIRCUIT_COMMITMENTS:\
  \ u64 = 12;\n        if len > MAX_CIRCUIT_COMMITMENTS {\n            return Err(SerializationError::InvalidData);\n\
  \        }\n        \n        let mut circuit_commitments = Vec::with_capacity(len\
  \ as usize);\n        for _ in 0..len {\n            circuit_commitments.push(sonic_pc::Commitment::deserialize_with_mode(&mut\
  \ reader, compress, Validate::No)?);\n        }\n        // ...\n    }\n}\n```\n\
  \nThe bound preserves backwards compatibility\u2014all valid keys (\u226412 commitments)\
  \ deserialize successfully.\n\n> [!WARNING]\n>\n> <details>\n> <summary>Firewall\
  \ rules blocked me from connecting to one or more addresses (expand for details)</summary>\n\
  >\n> #### I tried to connect to the following addresses, but was blocked by firewall\
  \ rules:\n>\n> - `esm.ubuntu.com`\n>   - Triggering command: `/usr/lib/apt/methods/https\
  \ /usr/lib/apt/methods/https /struct_type/mod-l ep grep -l s d_script_build-ce321e5ae12df09a.build_script_build.b38a6385c61de7f3-cgu.0.rcgu.o\
  \ d_script_build-ce321e5ae12df09a.at8745crjbij63ropox62r1ix.rcgu.o s .rs -REDACTED-linux-gnu/lib/libstd-8df6be531efb3fd0.rlib\
  \ -REDACTED-linux-gnu/lib/libpanic_unwind-e6943c8b7850575a.rlib -REDACTED-linux-gnu/lib/libobject-293bc8e42ad97307.rlib\
  \ -REDACTED-linux-gnu/lib/libmemchr-4ab95264898e2f40.rlib -REDACTED-linux-gnu/lib/libaddr2line-98301de5f7086436.rlib\
  \ -REDACTED-linux-gnu/lib/libgimli-c04b364b33261ab8.rlib -REDACTED-linux-gnu/lib/librustc_demangle-7ab55e5a1abede85.rlib\
  \ -REDACTED-linux-gnu/lib/libstd_detect-f9ea2d02cc19f59b.rlib -REDACTED-linux-gnu/lib/libhashbrown-4b2c04502d3e324b.rlib\
  \ -REDACTED-linux-gnu/lib/librustc_std_workspace_alloc-1aeb559ec68adac8.rlib` (dns\
  \ block)\n> - `parameters.provable.com`\n>   - Triggering command: `/home/REDACTED/work/snarkVM/snarkVM/target/debug/deps/snarkvm_algorithms-fa413e4860477257\
  \ /home/REDACTED/work/snarkVM/snarkVM/target/debug/deps/snarkvm_algorithms-fa413e4860477257\
  \ snark::varuna cfg(docsrs,test) --check-cfg e-cg^D^X ons e-cgu.3.rcgu.o e-cgu.4.rcgu.o\
  \ M/target/debug/bbash e-cgu.6.rcgu.o pointer 8lnh.rcgu.rmeta 1kr1^D^X ons RL u/13/cc1\
  \ nu/lib/librustc_git nu/lib/librustc_add pointer u/13/cc1` (dns block)\n> - `s3.us-west-1.amazonaws.com`\n\
