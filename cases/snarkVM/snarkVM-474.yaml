fix_pr_title: Don't assume solution checksum consistency in check_subdag_transmissions
fix_pr_body: "## Motivation\r\n\r\nThis is a small improvement to https://github.com/AleoNet/snarkVM/pull/2521\
  \ . Due to the fixes introduced, honest validators may mutate a seemingly invalid\
  \ solution to a valid one. As a result, there's a deviation between the checksum\
  \ in the subdag and the block. If such an attack were to happen, it can be easily\
  \ recovered from by implementing this PR.\r\n\r\nThe fix is to ignore the checksum.\
  \ We're already guaranteed only unique solution id's enter the block.\r\n\r\n##\
  \ Test Plan\r\n\r\nTested by simulating malicious validator.\r\n[CI run here](https://app.circleci.com/pipelines/github/ProvableHQ/snarkVM/208/workflows/7b445769-6e16-4261-b737-a004e292d50a)"
