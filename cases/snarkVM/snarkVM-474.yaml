introducing_pr_title: '[Fix] Add checksum to `TransmissionID`'
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR introduces\
  \ the concept of a `TransmissionChecksum`. This checksum is a `Sha3_256` hash on\
  \ the underlying `Transmission` object that is truncated to fit a `u128`. The intention\
  \ is to prevent malicious validators from tampering with solutions or transactions\
  \ and broadcasting these malformed objects to other validators. The addition of\
  \ these checksums, alongside additional snarkOS level checks will allow honest validators\
  \ to detect and disregard the attack from the malicious validators.\r\n\r\n\r\n\
  This PR also unifies the changes from https://github.com/AleoNet/snarkVM/pull/2520,\
  \ as it aims to solve the same attack. The change there updates block production\
  \ to correctly address malicious solutions. This additional fix overwrites the solution\
  \ target with value calculated during solution verification. So even if a malicious\
  \ solution is injected by a malicious validator, honest validators will always process\
  \ them and safely convert them to honest solutions.\r\n\r\nThe CI is run [here](https://app.circleci.com/pipelines/github/ProvableHQ/snarkVM?branch=fix%2Ftransmission-checksum-ci).\r\
  \n\r\n**NOTE**: This updates the block serialization, so it is not backwards compatible\
  \ with the networks (Testnet Beta and Canary) being run. These will require a reset.\r\
  \n\r\n#### Benchmarks\r\nThe benchmarks indicate that the added runtime overhead\
  \ is quite miniscule. `Data::to_checksum` benchmarks (on a 64 GB M1 MAX):\r\n- Solution:\
  \ 10\u03BCs\r\n- `transfer_public` transaction: 82\u03BCs\r\n- Largest possible\
  \ transaction (128 kb): 5.5ms \r\n\r\n## Related PRs\r\n\r\nThe sister PR is https://github.com/AleoNet/snarkOS/pull/3367."
