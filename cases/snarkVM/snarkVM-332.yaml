introducing_pr_title: Refactor CallStack::Synthesize to produce consistent dummy outputs
  for faster nested import deployments
introducing_pr_body: "## Summary\r\n\r\nThis PR refactors the way `CallStack::Synthesize`\
  \ is run, decoupling the `Synthesize` mode from the old `execute_function` approach.\
  \ It produces consistent dummy outputs (inspired by `CheckDeployment`) more rapidly\
  \ and skips sub-circuit construction for nested import calls. The result is significantly\
  \ faster deployments for deeply nested imports, while still generating cryptographically\
  \ coherent record nonces.\r\n\r\n## Motivation\r\n\r\nPreviously, `Authorize` and\
  \ `Synthesize` modes were lumped together. As such, calls in CallStack::Synthesize\
  \ were forced to run a real sub-circuit via `execute_function`. This is slow for\
  \ nested imports and has led to an exponential growth in deployment time w.r.t.\
  \ the import depth.\r\n\r\nThus, this PR refactors the `Synthesize` branch to skip\
  \ full circuit execution and produce \u201Cdummy\u201D outputs with consistent record\
  \ nonces.\r\n\r\n## Security\r\n\r\nThis PR is not meant to impact *any* validator\
  \ operations, because the `CallStack::Synthesize` is only used by provers, not by\
  \ validators/verifiers.\r\n\r\n## Note\r\n\r\nThis PR changes expected future IDs\
  \ in 3 of the `execute_and_finalize` tests. The reason is that previously, Synthesize\
  \ always ran real sub-circuits, consuming RNG draws. With this PR, certain sub-circuits\
  \ are skipped by producing dummy outputs. As a result, the RNG is executed less\
  \ times, leading to different transaction commitments and future IDs.\r\n\r\n##\
  \ Test Plan\r\n\r\nTested the deployment and execution of programs with deep imports\
  \ in a local devnet.\r\n\r\n## Related PRs\r\n\r\n* https://github.com/ProvableHQ/snarkVM/pull/2176\r\
  \n* https://github.com/ProvableHQ/snarkVM/pull/2230"
