introducing_pr_title: Fix committee usage in `atomic_post_ratify`
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR updates\
  \ the `atomic_post_ratify` logic to use the speculative committee changes before\
  \ performing the block reward operations. Previously, the logic was using the `current_committee`\
  \ which did not include the possible committee changes (`bond_public` or `unbond_public`)\
  \ from the transactions. \r\n\r\nA test has been added to ensure that a committee\
  \ can be updated with a `bond_public` and `unbond_public`.\r\n\r\n"
