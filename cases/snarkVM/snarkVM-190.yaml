introducing_pr_title: Capture the full set of finalize operations, track aborted transactions
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR introduces\
  \ a number of safety improvements to snarkVM.\r\n\r\nThis PR captures the full set\
  \ of finalize operations and tracks aborted transactions in each block now.\r\n\r\
  \nIn addition, there was no concept of a ratification ID, which will be problematic\
  \ for Narwhal when these are supported in the future. This PR introduces `ratification_id`\
  \ with the prefix `ar` (See breaking changes below for the migration process).\r\
  \n\r\n## Breaking Changes\r\n\r\nThe following is a list of breaking changes in\
  \ this PR:\r\n- Serialization of `Block`\r\n    - `coinbase` has been renamed to\
  \ `solutions`\r\n    - `transactions` has been moved from after `authority` to after\
  \ `solutions`\r\n    - The prefix for a state root has changed from `ar` to `sr`\r\
  \n        - This allows `ratification_id` to take on the `ar` prefix.\r\n    - The\
  \ prefix for a transition ID has changed from `as` to `au`\r\n        - This is\
  \ to prepare for the future `solution_id` to take on `as`.\r\n\r\nNote: This PR\
  \ requires resampling.\r\n\r\nCloses #2084"
