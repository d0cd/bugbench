description: The `FromBytes` implementations for `FunctionCore`, `ClosureCore`, and
  `FinalizeCore` did not validate that the number of inputs, outputs, instructions,
  and commands deserialized from bytes were within allowed maximums (e.g., `N::MAX_INPUTS`).
  A maliciously crafted byte sequence could specify arbitrarily large counts, leading
  to excessive memory allocation or potential denial-of-service. The fix adds bound
  checks before deserializing each collection.
expected_findings:
- file: synthesizer/program/src/function/bytes.rs
  line: 25
  summary: 'Missing bounds check: `num_inputs` is read from untrusted bytes and used
    to drive a deserialization loop without validating it against `N::MAX_INPUTS`,
    allowing a crafted input to cause excessive allocation'
- file: synthesizer/program/src/closure/bytes.rs
  line: 23
  summary: 'Missing bounds check: `num_inputs` is read from untrusted bytes and used
