introducing_pr_title: '[Fix] Declare public variable 1field once'
introducing_pr_body: "## Motivation\r\n\r\nCloses https://github.com/AleoHQ/snarkVM/issues/2266\r\
  \n\r\nWe were declaring two hardcoded public One variables (in R1CS and ConstraintSystem),\
  \ and adding them twice (in `to_transition_verifier_inputs` and in `verify_batch`.\
  \ This PR:\r\n- skips adding the hardcoded variable from R1CS onto the ConstraintSystem\r\
  \n- removes adding the hardcoded input in `verify_batch`\r\n- adds logic to remove\
  \ `LinearCombination` terms with value 0. Similar to https://github.com/AleoHQ/snarkVM/pull/1796\
  \ but for a different object doing the same thing.\r\n\r\n## Test Plan\r\n\r\nNo\
  \ new tests were added.\r\n\r\nRequires resampling credits and inclusion.\r\n\r\n\
  ## Related PRs\r\n\r\nPrevious attempt: https://github.com/AleoHQ/snarkVM/pull/2110/\r\
  \n"
