introducing_pr_body: "This PR add a number of checks ensuring that futures are used\
  \ correctly.\r\n- futures must be passed into `async` in the order that they were\
  \ produced.\r\n- futures must be awaited in the order that they were produced.\r\
  \n- if a parent function calls a child function with a finalize block, then the\
  \ parent must also contain a finalize block.\r\n"
