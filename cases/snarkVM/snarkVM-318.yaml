introducing_pr_title: Feat/lazy load deployment
introducing_pr_body: "## Motivation (from original PR)\r\n\r\nWe've seen that RSS\
  \ size is correlated with deployments loaded (and staying) in memory. This PR keeps\
  \ MAX_STACKS programs in memory (chosen at `Self::MAX_TRANSMISSIONS_PER_BATCH as\
  \ usize * Self::MAX_CERTIFICATES as usize * 4`).\r\n\r\n## Test Plan\r\n\r\nTested\
  \ by running a local and deployed devnet, deploying programs and executing them.\
  \ Then restarting the network and trying to execute these programs. The Stacks were\
  \ lazily loaded from storage, execution worked. Also tested executing programs that\
  \ are not deployed.\r\n\r\n## Related PRs\r\n\r\nReplaces https://github.com/AleoNet/snarkVM/pull/2519"
