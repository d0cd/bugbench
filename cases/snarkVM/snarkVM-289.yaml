introducing_pr_title: Abort transactions with already spent `InputID`s
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR adds\
  \ logic to `VM::atomic_speculate` to track spent `InputID`s and abort transactions\
  \ that attempt to spend an `InputID` that was already spent in this block. \r\n\r\
  \nNote: We may want to use the `InputStore::get_speculative` instead of per block\
  \ trackers in `atomic_speculate`.\r\n\r\nRelated to: https://github.com/AleoHQ/snarkOS/pull/2852\r\
  \n\r\n## Test Plan\r\n\r\nA test has been added to check that the possible double\
  \ spends are caught and aborted.\r\n"
