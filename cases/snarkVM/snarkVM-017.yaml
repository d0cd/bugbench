issue_bodies:
  '2012': "# Hash operation compilation have a different behavior between Closure\
    \ and Function since recent update\r\n\u200B\r\nWe (@FuzzingLabs) found a probably\
    \ unwanted behavior during a code review on the `Hash` operation.\r\n\u200B\r\n\
    # What is it ?\r\n\r\nSupposing this environment\r\n\u200B\r\n```\r\nprogram foo.aleo;\r\
    \n\u200B\r\nstruct arjQITzQAw:\r\n    qcoZ_qzzye as boolean;\r\n    ynh0UgMeBB\
    \ as address;\r\n    uLpRnfnsg9 as u8;\r\n    D4j4T0s8Kc as boolean;\r\n    MaDEhMWsdd\
    \ as u8;\r\n    HpHdqmODmR as i64;\r\n    rnbm6ct6qw as u16;\r\n```\r\n\u200B\r\
    \nThis compile\r\n```\r\nclosure kmNSyjzeaZ:\r\n    input r0 as boolean;\r\n \
    \   hash.bhp768 5372560835405554868775356124803982999725684598186573362469277964967083823207field\
    \ into r1 as arjQITzQAw;\r\n    output r1.qcoZ_qzzye as boolean;\r\n\u200B\r\n\
    function uftFRlQzED:\r\n    input r0 as boolean.private;\r\n    output r0 as boolean.private;\r\
    \n```\r\n\u200B\r\nThis does not `Failed to execute instruction (call kmNSyjzeaZ\
    \ true into r0;): Cannot hash into a struct`\r\n\u200B\r\n```\r\nclosure kmNSyjzeaZ:\r\
    \n    input r0 as boolean;\r\n    hash.bhp768 5372560835405554868775356124803982999725684598186573362469277964967083823207field\
    \ into r1 as arjQITzQAw;\r\n    output r1.qcoZ_qzzye as boolean;\r\n\u200B\r\n\
    function uftFRlQzED:\r\n    call kmNSyjzeaZ true into r0;\r\n    output r0 as\
    \ boolean.private;\r\n```\r\n\u200B\r\nThis also does not compile: `Failed to\
    \ execute instruction (hash.bhp768 5372560835405554868775356124803982999725684598186573362469277964967083823207field\
    \ into r0 as arjQITzQAw;): Cannot hash into a struct`\r\n```\r\nfunction uftFRlQzED:\r\
    \n    hash.bhp768 5372560835405554868775356124803982999725684598186573362469277964967083823207field\
    \ into r0 as arjQITzQAw;\r\n    output r0.qcoZ_qzzye as boolean.private;\r\n```\r\
    \n\u200B\r\n# What we think\r\n\u200B\r\nWe guessed that since the closure is\
    \ not called, some verification are not made and the compiler accept it.\r\n\u200B\
    \r\n# Why we tried that\r\n\u200B\r\nWe tried that because while updating some\
    \ of our tools, we encountered this commit: 642d50b\r\n\u200B\r\nThis commit changes\
    \ the output-type of the hash operations from `LiteralType` to `PlaintextType`.\
    \ But the `is_valid_destination_type` function stayed mostly the same (https://github.com/AleoHQ/snarkVM/blob/3961438b69c35715b802a24a3f3e301b5020f2a9/synthesizer/program/src/logic/instruction/operation/hash.rs#L107).\r\
    \n\u200B\r\nIt does not return false on a `PlaintextType::Struct(_)`, letting\
    \ to believe that it is a acceptable output-type, despite what is said in the\
    \ documentation.\r\n\u200B\r\nSo we tested the behavior and found this issue.\r\
    \n\u200B\r\nIs it an error that you changed the type to plaintext ? Or is it to\
    \ accommodate for the new array type ?"
