introducing_pr_title: '[Fix] Cache parameter downloads and limit test parallelization'
introducing_pr_body: "## Motivation\r\n\r\nCloses https://github.com/AleoNet/snarkVM/issues/2494\
  \ by:\r\n- caching parameter downloads so we don't get rate limited by AWS.\r\n\
  - limiting parallelization of tests using `-- --test-threads`. The other option\
  \ would be to use `cargo nextest`, but that would add a new dependency.\r\n\r\n\
  Also fixes caching, which previously wasn't actually used. By recommendation from\
  \ [CircleCI](https://circleci.com/docs/configuration-reference/): \"Given the immutability\
  \ of caches, it might be helpful to start all your cache keys with a version prefix\
  \ v1-.... That way you will be able to regenerate all your caches just by incrementing\
  \ the version in this prefix.\"\r\n\r\nTotal runtime is now 30 minutes.\r\n\r\n\
  Future optimization ideas:\r\n- Do not try to download the largest parameters in\
  \ a test, which is several GiB and costs 16 min.\r\n- Get more fine-grained data\
  \ on how much memory each test uses. `nextext` allows configuring of granular test\
  \ profiles depending on their load. My current tests showed most tests just use\
  \ 60 MiB, but that must have been wrong since we see OOM with as little as `--test-threads=4`\
  \ sometimes.\r\n\r\n## Test Plan\r\n\r\n- [Succesful CI run](https://app.circleci.com/pipelines/github/ProvableHQ/snarkVM/240/workflows/48ffb50d-097d-4171-a209-0ba3a9d94605)\r\
  \n- Additionally ran CI multiple times in parallel to see if the issues are resolved.\r\
  \n"
