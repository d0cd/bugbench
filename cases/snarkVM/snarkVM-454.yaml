introducing_pr_title: Ensure acyclic call graph
introducing_pr_body: "## Motivation\r\n\r\nEnsures that cycles are not permitted in\
  \ call graphs, as defense against any possible re-entrancy attack.\r\n\r\nTargets\
  \ the dynamic dispatch feature branch and release. Because cycles are not possible\
  \ until this feature lands, technically the consensus version guard is perhaps not\
  \ needed, but we will need such guards anyhow in the future if we decide to enable\
  \ cycles.\r\n\r\n## Test Plan\r\n\r\nAdded a few special case unit tests and running\
  \ the cycle check against many VM tests."
