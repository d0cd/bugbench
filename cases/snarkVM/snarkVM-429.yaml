introducing_pr_body: "## Motivation\r\n\r\nCloses https://github.com/AleoHQ/snarkOS/issues/3141\r\
  \n\r\nIntroduces:\r\n- `MAX_PROGRAM_SIZE`\r\n- `MAX_STRUCTS`\r\n- `MAX_RECORDS`\r\
  \n- `MAX_CLOSURES`\r\n\r\nSome notes:\r\n- `MAX_STRUCTS`, `MAX_CLOSURES` and `MAX_RECORDS`\
  \ don't add security but don't hurt either and were requested in the issue above.\
  \ Even existing parameters like `MAX_INSTRUCTIONS` can't be fully utilized as it\
  \ will now quickly lead to programs which surpass the size limit.\r\n- I did not\
  \ add custom error types to test on to keep it simple and because we don't use those\
  \ anywhere yet.\r\n\r\nCan't add you as reviewer do doing it manually: @miazn\r\n\
  \r\n## Test Plan\r\n\r\nAdded extensive unit test\r\n"
