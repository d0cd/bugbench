description: The Scan CLI command was not using the correct CDN base URL for the network,
  and the CDN module was using native_tls which is incompatible with the new endpoint
  https://blocks.aleo.org. The fix updates Scan to import and use CDN_BASE_URL from
  the start command module and switches reqwest from native_tls to rustls_tls feature
  throughout the CDN block-fetching code.
expected_findings:
- file: cli/src/commands/developer/scan.rs
  line: 15
  summary: Scan command is not importing/using the shared CDN_BASE_URL constant, likely
    using a hardcoded or incorrect URL for block syncing
- file: node/cdn/Cargo.toml
  line: 41
  summary: Reqwest dependency uses native-tls feature which does not support the TLS
    configuration required by the new CDN endpoint; should use rustls-tls instead
- file: node/cdn/src/blocks.rs
  line: 107
  summary: HTTP client is built without specifying use_rustls_tls(), causing TLS handshake
    failures with the new CDN endpoint
