category: logic
difficulty: medium
severity: medium
language: rust
pr_size: small
description: A transaction was being tracked in the `transmissions_tracker` (metrics)
  even when it failed validation and was not actually added to the mempool. This caused
  metrics to report phantom transmissions, potentially leading to stale transmission
  counts and misleading diagnostics. The fix ensures tracking only occurs after successful
  mempool insertion.
expected_findings:
- file: node/consensus/src/lib.rs
  line: 372
  summary: Transaction is added to transmissions_tracker before mempool insertion
    is confirmed; if a subsequent check fails (e.g., duplicate check), the tracker
    will contain a transmission that was never added to the mempool.
- file: node/consensus/src/lib.rs
  line: 384
  summary: Tracking occurs before the mempool-duplicate check at this point, causing
    metrics to count transactions that are rejected from the mempool.
