description: A sync issue allowed corrupt or invalid blocks to be fast-forwarded into
  canonical storage. The fix adds validation in the consensus agent to check for empty
  canon results and adjusts the sync master logic to properly handle forks, preventing
  invalid blocks from being committed. Additionally, a `max-head` CLI option was added
  for debugging storage trimming.
expected_findings:
- file: consensus/src/consensus/inner/agent.rs
  line: 23
  summary: 'Missing guard for empty canon list: corrupt/invalid blocks could be fast-forwarded
    without proper validation when canon is empty'
- file: network/src/sync/master.rs
  line: 79
  summary: Sync fork handling did not properly filter or validate forks of interest,
    allowing corrupt blocks to propagate through fast-forward sync
