description: This PR separates the ledger module from consensus in the snarkOS node
  architecture. The entangling of ledger and consensus logic caused incorrect resource
  allocation and module boundaries, leading to potential issues in node operation.
  The fix restructures the codebase by extracting consensus into its own crate with
  proper memory pool management and correcting CPU/resource allocation logic.
expected_findings:
- file: cli/src/commands/start.rs
  line: 219
  summary: "Incorrect resource allocation: CPU core distribution between mining and\
    \ node tasks uses wrong calculation \u2014 min(4) for one pool and saturating_sub(4).max(1)\
    \ for another may starve tasks when ledger and consensus are not properly separated."
- file: node/consensus/src/memory_pool/solutions.rs
  line: 52
  summary: 'Redundant read-lock acquisition on unconfirmed_solutions: the contains_key
    check before insert creates a TOCTOU race where another thread could insert the
    same solution between the check and subsequent write lock.'
- file: node/consensus/src/memory_pool/transactions.rs
  line: 41
  summary: 'Same TOCTOU pattern as solutions pool: read lock for contains_key check
    followed by separate write lock for insertion allows duplicate transaction entries
    under concurrent access.'
