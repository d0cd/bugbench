description: During validator syncing, the final block was added to the ledger without
  verifying that its leader certificate reached quorum based on certificates in the
  subsequent block. This caused validators that synced to tip to store a block prematurely,
  then fail repeatedly when consensus tried to construct the same block through the
  standard procedure, halting block advancement until reboot. The fix adds a quorum
  verification step before advancing blocks during sync.
expected_findings:
- file: node/bft/src/sync/mod.rs
  line: 57
  summary: 'Missing quorum check: blocks are added to the ledger during sync without
    verifying that the leader certificate reached quorum based on certificates in
    the subsequent block, allowing unvalidated blocks to be stored'
- file: node/bft/src/sync/mod.rs
  line: 77
  summary: Block advancement proceeds without quorum verification on the latest block
    responses, causing race between sync completion and consensus processing that
    leads to duplicate block errors
- file: node/bft/src/sync/mod.rs
  line: 110
  summary: The sync procedure should validate quorum on each block's leader certificate
    before accepting it, but this validation is missing, allowing the ledger to reach
    an inconsistent state
