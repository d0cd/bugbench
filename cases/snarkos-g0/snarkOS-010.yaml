- file: node/bft/src/bft.rs
  line: 528
  summary: 'Wrong round used for committee lookback: should use the certificate round,
    not (round - 1), for stake calculation'
- file: node/bft/src/sync/mod.rs
  line: 509
  summary: 'Wrong round used for committee lookback in sync module: should retrieve
    committee for the certificate round, not a preceding round'
