description: The BFT committee lookback was retrieved for the wrong round when calculating
  certificate author stakes. The committee should be looked up for the certificate's
  own round, not the round before it. The fix corrects the round parameter in committee
  retrieval calls in both bft.rs and sync/mod.rs.
