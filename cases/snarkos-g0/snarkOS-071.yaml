description: SchnorrParametersGadget was allocated as a witness (via AllocGadget)
  instead of being treated as a constant in the circuit, which is incorrect for publicly-known
  cryptographic parameters. Additionally, precomputed scalar multiplication used Rust's
  default zip behavior which silently truncates to the shorter iterator, potentially
  dropping group elements or scalar bits. The fix changes parameter allocation to
  constant assignment, enforces matching lengths via itertools::zip_eq, and precomputes
  all generator powers in Schnorr setup.
expected_findings:
- file: models/src/gadgets/algorithms/signature.rs
  line: 9
  summary: ParametersGadget is bound to AllocGadget, meaning Schnorr parameters are
    allocated as circuit witnesses instead of constants. This is incorrect for publicly-known
    parameters and should use a constant gadget trait instead.
- file: models/src/gadgets/curves/group.rs
  line: 167
  summary: Precompute scalar multiplication uses standard zip which silently truncates
    to the shorter of scalar_bits and generator powers. Should use zip_eq (or equivalent)
    to enforce that the number of scalar bits matches the number of group elements.
- file: gadgets/src/algorithms/signature/schnorr.rs
  line: 47
  summary: SchnorrParametersGadget uses AllocGadget to allocate parameters as circuit
    variables rather than embedding them as constants, allowing a malicious prover
    to potentially substitute different parameters.
