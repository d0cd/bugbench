description: Block locator deserialization and validation logic were incorrect after
  transitioning to a BTreeMap-based structure. The deserialization loop in block_locators.rs
  incorrectly parsed locator entries, and check_block_locators in ledger.rs used wrong
  bounds calculation with MAXIMUM_LINEAR_BLOCK_LOCATORS, causing block synchronization
  failures.
expected_findings:
- file: ledger/src/helpers/block_locators.rs
  line: 71
  summary: "Deserialization loop incorrectly reads block locator entries \u2014 the\
    \ (de)serialization format does not match the BTreeMap-based block locator structure,\
    \ leading to corrupted or invalid locator data"
- file: ledger/src/state/ledger.rs
  line: 446
  summary: "Incorrect calculation of num_linear_block_headers using std::cmp::min\
    \ with MAXIMUM_LINEAR_BLOCK_LOCATORS \u2014 check_block_locators validation logic\
    \ does not properly handle the BTreeMap-structured block locators"
