id: snarkOS-034
repo: ProvableHQ/snarkOS
base_commit: 1881d68711c158401f0ddf4de43c1a1b129c1186
head_commit: 85bd920d63a76d078499b257c1919d1965a39672
fix_commit: 2b086093d48105c154fa331a1e5ffe4ccc67c15b
category: concurrency
difficulty: hard
severity: high
language: rust
pr_size: medium
description: Concurrent bilateral handshake attempts with a single peer caused a race
  condition where a later duplicate handshake would invalidate a prior successful
  one, erroneously downgrading the peer from connected status to CandidatePeer. The
  fix changes the handshake functions to return Option<ChallengeRequest> instead of
  treating duplicates as errors, and deduplicates outbound connection attempts to
  trusted validators in the gateway.
expected_findings:
- file: node/router/src/handshake.rs
  line: 93
  summary: Handshake function returns io::Result<ChallengeRequest<N>> instead of io::Result<Option<ChallengeRequest<N>>>;
    duplicate handshake attempts are treated as hard errors instead of being gracefully
    handled as None, causing peer status downgrade during concurrent bilateral handshakes.
- file: node/bft/src/gateway.rs
  line: 421
  summary: Missing deduplication of outbound connection attempts to trusted validators;
    bail! on duplicate connection requests instead of silently skipping already-connected
    peers, increasing likelihood of concurrent handshake race conditions.
- file: node/router/src/helpers/peer.rs
  line: 29
  summary: Peer state enum lacks proper handling for the Connecting state transition,
    allowing a concurrent duplicate handshake to overwrite an in-progress connection
    and downgrade the peer to CandidatePeer.
stats: null
