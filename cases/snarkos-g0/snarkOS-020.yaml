description: The BFT primary used `current_round` instead of `certificate_round` for
  committee lookback selection when checking quorum thresholds. Since peers can be
  on different rounds, using `current_round` could select an incorrect committee,
  undermining the safety of the dynamic committee feature. The fix replaces `current_round`
  with `certificate_round` at the two quorum-check sites.
expected_findings:
- file: node/bft/src/primary.rs
  line: 765
  summary: 'Incorrect round variable: `current_round` is used for committee lookback
    but should be `certificate_round`, since batch certificates may come from peers
    on different rounds.'
- file: node/bft/src/primary.rs
  line: 795
  summary: 'Same bug: `current_round` used instead of `certificate_round` for quorum
    threshold committee selection, leading to potentially wrong committee being used
    for validation.'
