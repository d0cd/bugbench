description: In `fetch_missing_certificates`, the function returns early with no results
  when all requested certificate IDs already exist in the `unprocessed_certificate`
  cache, rather than returning those cached certificates. The fix ensures that when
  there are no certificates left to fetch over the network (because they're all cached),
  the already-cached certificates are still returned to the caller so processing can
  complete.
expected_findings:
- file: node/bft/src/primary.rs
  line: 1697
  summary: Early return when no certificates need network fetching discards certificates
    already found in the unprocessed_certificate cache. Should return cached certificates
    instead of an empty result.
- file: node/bft/src/sync/mod.rs
  line: 628
  summary: Related early-return logic in sync module also fails to yield certificates
    that are already available in cache when there are none left to fetch from the
    network.
