description: The `#[cfg(not(any(test, feature = "test")))]` attribute references a
  `feature = "test"` that does not exist in the crate's Cargo.toml, causing clippy
  warnings. The fix removes the non-existent feature check, leaving only `#[cfg(not(any(test)))]`.
