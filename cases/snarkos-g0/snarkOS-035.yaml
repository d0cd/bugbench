language: rust
pr_size: medium
description: 'Two logic bugs: (1) After migrating away from std::env::set_var for
  Rust 2024 safety, log filter strings were still prefixed with ''RUST_LOG='' which
  broke log filtering entirely. (2) A missing ''!'' negation operator caused sync
  mode to be reported incorrectly. The fix removes the RUST_LOG= prefix from filter
  strings and adds the missing negation.'
expected_findings:
- file: cli/src/helpers/logger.rs
  line: 33
  summary: Log filter string still contains 'RUST_LOG=' prefix which is invalid after
    migrating away from environment variable-based configuration; the prefix should
    be removed.
- file: node/src/client/mod.rs
  line: 198
  summary: Missing negation operator ('!') in condition checking sync mode, causing
    the sync status to be reported as the opposite of its actual state.
