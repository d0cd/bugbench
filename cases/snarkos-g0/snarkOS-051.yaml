description: In the wrapped MPSC sender, the metric tracking sent messages was incremented
  even when `try_send` failed, causing inaccurate metrics. The fix ensures the metric
  is only incremented after `try_send` succeeds by moving the increment after the
  `?` error propagation.
expected_findings:
- file: metrics/src/wrapped_mpsc.rs
  line: 62
  summary: Metric is incremented before verifying that try_send succeeded; if try_send
    fails, the metric will still be incremented, producing inaccurate counts of queued
    messages.
