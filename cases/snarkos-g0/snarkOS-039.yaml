description: The gateway's authorized validator check only fetched the committee lookback
  at the latest ledger round, but the storage's current round can be ahead (e.g.,
  current round n+2 vs ledger round n). This caused valid committee members to be
  treated as unauthorized and disconnected, potentially preventing validators from
  reaching quorum (2f+1) and halting consensus. The fix expands the authorized set
  to include committee members from rounds up to the sync range tolerance.
expected_findings:
- file: node/bft/src/gateway.rs
  line: 100
  summary: Authorized validator set only considers the committee at the latest ledger
    round, not the current storage round. When these rounds diverge, legitimate validators
    may be excluded, breaking quorum.
- file: node/bft/ledger-service/src/traits.rs
  line: 51
  summary: Ledger service trait is missing a `get_block_round` method needed to look
    up block rounds by height, which is required to compute the correct range of committees
    for validator authorization.
