category: concurrency
difficulty: hard
severity: critical
language: rust
pr_size: large
description: 'PR #457 wrapped blocking network operations into individual spawned
  tasks, which broke synchronization invariants. Operations that previously ran sequentially
  under shared locks (e.g., sync_handler_lock via try_lock()) were split across independent
  tasks, introducing race conditions in the sync protocol, message handling, and connection
  management. The revert restores the original sequential execution model.'
expected_findings:
- file: network/src/internal/message_handler.rs
  line: 37
  summary: 'Wrapping message handler logic in a spawned task while using try_lock()
    on sync_handler_lock can cause races: the lock may be acquired in parallel tasks
    that should have been sequential, leading to missed sync updates or inconsistent
    state.'
- file: network/src/server.rs
  line: 30
  summary: Spawning server operations as independent tasks breaks the assumption that
    sync_handler_lock.try_lock() serializes access; concurrent tasks may simultaneously
    fail to acquire the lock or acquire it out of order, corrupting sync state.
- file: network/src/external/protocol/sync/sync.rs
  line: 74
  summary: clear_pending() requires &mut self, implying exclusive access to sync state.
    When callers are spawned as independent tasks, multiple tasks may attempt to clear
    pending state concurrently, causing data races or lost updates.
