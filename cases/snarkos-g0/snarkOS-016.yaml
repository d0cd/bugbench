description: The `account sign` command exposed a `--seed` flag that allowed users
  to seed signature nonces, which is cryptographically insecure. Signature nonces
  must be random and must never be seeded, reused, or shared, as doing so can leak
  the private key. The fix removes the `--seed` flag and related functionality entirely.
expected_findings:
- file: cli/src/commands/account.rs
  line: 65
  summary: 'Security: The `--seed` flag on the sign command allows deterministic nonce
    generation for signatures, which is cryptographically insecure and can lead to
    private key leakage if nonces are reused.'
- file: cli/src/commands/account.rs
  line: 119
  summary: 'Insecure API usage: Passing a user-supplied seed to the signature nonce
    generation defeats the purpose of random nonces and violates cryptographic safety
    requirements.'
