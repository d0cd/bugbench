description: The CLI error handling used Display formatting (`{}`) instead of Debug
  formatting (`{:?}`) for error messages when fetching programs. This caused less
  informative error output, hiding useful details like HTTP status codes and response
  URLs. The fix changes the format specifier to use Debug formatting which includes
  the full response details.
