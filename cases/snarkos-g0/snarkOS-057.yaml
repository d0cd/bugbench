description: Lock guards (sync_handler, peer_book, local_address) were held across
  `.await` points in async functions, causing potential deadlocks that halted the
  node during block or transaction propagation. The fix adds explicit `drop()` calls
  to release these locks before reaching async operations.
expected_findings:
- file: network/src/server/connection_handler.rs
  line: 140
  summary: Lock guard `sync_handler` is held across an `.await` point without being
    explicitly dropped, risking deadlock in async context
- file: network/src/server/message_handler.rs
  line: 173
  summary: Lock guard `peer_book` is held across an `.await` point without being explicitly
    dropped, risking deadlock during message handling
- file: network/src/server/server.rs
  line: 298
  summary: Lock guard `local_address` is held across an `.await` point without being
    explicitly dropped, risking deadlock in server loop
