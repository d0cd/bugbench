category: concurrency
difficulty: medium
severity: high
language: rust
pr_size: small
description: 'Two TCP edge cases: (1) concurrent calls to Tcp::disconnect could trigger
  duplicate Disconnect behavior due to missing atomic guard, and (2) a panic in the
  message processing task left the stream reading task alive, causing a connection/memory
  leak. Fixed by adding an AtomicBool to claim disconnect exclusivity and by aborting
  the reading task when the processing channel closes.'
expected_findings:
- file: node/tcp/src/tcp.rs
  line: 302
  summary: 'Race condition: Tcp::disconnect lacks atomic guard, allowing duplicate
    concurrent calls to both execute the Disconnect handler. Should use an AtomicBool
    with compare-and-swap to ensure only one caller proceeds.'
- file: node/tcp/src/protocols/reading.rs
  line: 175
  summary: 'Resource leak: when the mpsc channel is closed (indicating the message
    processing task panicked), the stream reading task is not aborted/dropped, leading
    to a connection and memory leak. The reading task should be terminated when TrySendError::Closed
    is detected.'
- file: node/tcp/src/helpers/connections.rs
  line: 33
  summary: Missing AtomicBool field in connection state to track whether disconnect
    has already been claimed, needed to prevent duplicate disconnect execution.
