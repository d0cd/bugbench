description: The CLI endpoint response handling checked for an exact HTTP 200 status
  code instead of accepting any 2xx success response (200-299). The fix replaces the
  strict equality check with `response.status().is_success()`, which correctly handles
  all successful HTTP status codes like 201, 204, etc.
