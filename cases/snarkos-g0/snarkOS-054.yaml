description: The longest_child_path operation was implemented using iterative in-application
  tree traversal (repeatedly calling get_block_children), causing significant performance
  overhead. The fix replaces this with a native SQLite recursive query that performs
  the path computation in the database engine, avoiding repeated round-trips and leveraging
  SQL's recursive CTE capabilities.
