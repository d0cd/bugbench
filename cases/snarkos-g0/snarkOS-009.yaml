description: The heartbeat logic has no notion of pending connections and may call
  Router::connect multiple times for the same peer while a handshake is in progress.
  This caused frequent spurious WARN-level log messages for cases that are not actual
  errors (already connected or currently connecting). The fix downgrades these warnings
  to debug-level log messages, correctly treating repeated connect attempts as benign.
expected_findings:
- file: node/router/src/lib.rs
  line: 166
  summary: Warn/error log emitted when connecting to a peer that is already in handshake
    as initiator; this is an expected condition given heartbeat behavior and should
    be debug-level, not warn-level.
- file: node/router/src/lib.rs
  line: 199
  summary: Warn/error log emitted when connecting to a peer that is already connected
    or in handshake as responder; should be debug-level since heartbeat legitimately
    triggers this.
- file: node/router/src/lib.rs
  line: 216
  summary: Warn/error log for duplicate connection attempt treated as an error condition
    when it is actually benign; should be downgraded to debug-level.
