description: The quorum check for round advancement was checking for certificates
  at round R+1 instead of round R. When deciding whether to advance from round R to
  R+1, the code incorrectly used `current_round` (the next round) instead of the previous
  round to verify quorum. The bug was partially masked because validators have multiple
  ways to advance their round.
expected_findings:
- file: node/bft/src/primary.rs
  line: 1360
  summary: 'Wrong round used in quorum check: `current_round` refers to R+1 but the
    quorum of certificates should be checked at round R (current_round - 1) when deciding
    whether to advance.'
