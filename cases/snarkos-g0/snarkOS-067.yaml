description: TransmissionID lacked a checksum field, allowing malicious validators
  to perform malformed solution/transaction attacks by sending transmissions that
  could not be integrity-verified. The fix adds a TransmissionChecksum to TransmissionID
  variants (Solution and Transaction) and enforces checksum validation on all incoming
  peer transmissions across the BFT consensus layer.
expected_findings:
- file: node/bft/src/worker.rs
  line: 31
  summary: Missing checksum validation on incoming peer transmissions allows malicious
    validators to send malformed solutions/transactions without detection
- file: node/bft/src/primary.rs
  line: 522
  summary: "TransmissionID::Solution destructuring lacks checksum field \u2014 transmissions\
    \ are processed without verifying integrity via checksum"
- file: node/bft/src/helpers/storage.rs
  line: 691
  summary: TransmissionID::Solution pattern match does not extract or verify a checksum,
    allowing unvalidated transmissions to be stored
