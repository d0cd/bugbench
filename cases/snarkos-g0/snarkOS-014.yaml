category: concurrency
difficulty: hard
severity: high
language: rust
pr_size: medium
description: 'BlockSync''s process_next_block() removed blocks from its internal responses
  map before they were validated and added to the ledger. This created a race window
  where BlockSync was unaware of blocks pending validation in the Sync module, causing
  duplicate block requests. The fix changes to a peek-then-remove pattern: peek_next_block()
  reads without removing, and the block is only removed from responses after successful
  ledger insertion or on error.'
expected_findings:
- file: node/sync/src/block_sync.rs
  line: 322
  summary: process_next_block() removes the block from the responses map eagerly before
    the caller has validated or committed it. This causes BlockSync to lose track
    of in-flight blocks and re-request them. Should be a non-destructive peek instead.
- file: node/bft/src/sync/mod.rs
  line: 314
  summary: Calls block_sync.process_next_block() which destructively removes the block
    from BlockSync's state before validation. If validation succeeds, BlockSync's
    canon is only updated later, creating a window where the block is neither in responses
    nor in canon, triggering duplicate requests.
- file: node/bft/src/sync/mod.rs
  line: 338
  summary: 'Same pattern as line 314: process_next_block() removes the block before
    it is added to the ledger, causing a desync window between Sync and BlockSync''s
    view of which blocks are accounted for.'
