description: Router initialization (TCP bind) was performed too early in the beacon
  node startup sequence, before computing unspent records and before calling enable_handshake.
  This caused the TCP stack to accept inbound connections prematurely, leading to
  'permission denied' errors. The fix reorders router initialization to occur right
  before enable_handshake is called.
expected_findings:
- file: node/src/beacon/mod.rs
  line: 118
  summary: "Router initialization (TCP bind) happens too early in the startup sequence\
    \ \u2014 it should be moved after unspent records computation and placed right\
    \ before enable_handshake to prevent premature inbound connections."
