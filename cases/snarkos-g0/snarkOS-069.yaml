category: concurrency
difficulty: hard
severity: high
language: rust
pr_size: large
description: 'Multiple concurrency safety issues in the BFT consensus layer: event
  handlers were not spawned as separate tasks (risking blocking), sync logic ran too
  frequently causing contention, and signature processing lacked proper async concurrency
  controls. The fix spawns tasks for event handlers, reduces sync frequency via updated
  delay constants, and improves async concurrency for signature processing.'
expected_findings:
- file: node/bft/src/gateway.rs
  line: 71
  summary: Event handlers are processed inline rather than spawned as separate tasks,
    risking blocking the gateway's main event loop under load.
- file: node/bft/src/sync/mod.rs
  line: 80
  summary: Sync logic uses MAX_BATCH_DELAY_IN_MS for its interval, causing it to run
    too frequently and creating unnecessary contention; should use a longer, dedicated
    sync interval.
- file: node/bft/src/primary.rs
  line: 87
  summary: Signature processing lacks proper async concurrency boundaries, allowing
    unbounded concurrent processing that can degrade safety under high throughput.
