description: The snarkOS CLI developer commands (`deploy` and `execute`) did not work
  as expected due to incorrect HTTP request handling after a `ureq` API change, broken
  `--broadcast` flag semantics, and missing protocol/URI normalization for the endpoint
  argument. The fix updates `ureq` usage with proper helper functions, changes `--broadcast`
  to a boolean flag, renames `--query` to `--endpoint`, and adds URI validation.
expected_findings:
- file: cli/src/commands/developer/deploy.rs
  line: 13
  summary: Deploy command uses incorrect endpoint/query parameter handling and broken
    broadcast flag, causing deployment to fail or target the wrong endpoint.
- file: cli/src/commands/developer/execute.rs
  line: 13
  summary: Execute command has the same broken broadcast and endpoint handling as
    deploy, preventing successful transaction execution.
- file: cli/src/commands/developer/mod.rs
  line: 28
  summary: Developer module lacks proper HTTP helper functions and URI parsing for
    the updated ureq API, causing HTTP errors to lose response body information.
