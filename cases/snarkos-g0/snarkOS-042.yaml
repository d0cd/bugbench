description: When the node detected an invalid ledger state, it automatically cleared
  (deleted) the entire ledger without user consent, potentially causing irreversible
  data loss. The fix removes the automatic clearing logic and instead notifies the
  user to manually run the clean command, preventing silent data destruction.
