description: Missing decrement of the outbound peer request counter when processing
  inbound peer responses. Without decrementing the counter, an attacker could send
  many spoofed peer responses to flood other peers, re-enabling a previously patched
  denial-of-service attack vector.
expected_findings:
- file: node/router/src/inbound.rs
  line: 136
  summary: Missing call to `self.router().cache.decrement_outbound_peer_requests(peer_ip)`
    after processing an inbound peer response, allowing the outbound request counter
    to grow unbounded and re-enabling a peer-flooding attack.
