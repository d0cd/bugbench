description: Local constant definitions were being deleted between steps of ConstPropUnrollAndMorphing,
  causing them to be unavailable for subsequent loop unrolling passes. The fix introduces
  a `clear_but_consts` method in the symbol table that retains evaluated constants
  (similar to how global constants are treated) while still clearing variable declarations,
  and updates the const propagation pass to preserve local const declarations instead
  of removing them.
expected_findings:
- file: compiler/passes/src/const_prop_unroll_and_morphing.rs
  line: 49
  summary: Symbol table is fully cleared between const propagation passes, which deletes
    local constants needed for loop unrolling. Should use a selective clear that retains
    evaluated constants.
- file: compiler/passes/src/const_propagation/ast.rs
  line: 555
  summary: Local constant declarations are being removed (set changed=true triggering
    deletion) during const propagation, but they should be retained so subsequent
    unrolling passes can reference them.
