description: The Leo compiler did not support .aleo files as local dependencies. When
  a user specified a local dependency pointing to a .aleo file, the build/debug/deploy/test
  commands would fail because the code only recognized local Leo source packages.
  The fix adds handling for .aleo file paths in dependency resolution across all CLI
  commands and the package/program models, introducing an `is_local` flag on ProgramData
  to distinguish local .aleo dependencies from network-fetched ones.
expected_findings:
- file: leo/package/src/package.rs
  line: 334
  summary: 'Missing handling for local .aleo file dependencies: when a dependency
    path has an .aleo extension and is a file, it should be read directly as bytecode
    rather than treated as a Leo source package.'
- file: leo/package/src/program.rs
  line: 31
  summary: ProgramData lacks an `is_local` field to distinguish locally-provided .aleo
    bytecode from network-fetched bytecode, causing local .aleo dependencies to be
    mishandled downstream.
- file: leo/cli/commands/build.rs
  line: 105
  summary: "Build command does not account for local .aleo dependencies when processing\
    \ dependency bytecode \u2014 network and local .aleo dependencies need to be distinguished\
    \ so local ones skip network fetch logic."
