description: The Leo parser incorrectly handled double negation expressions (e.g.,
  `--5field`). Instead of parsing it as a unary negation operation applied to a negative
  literal value, the parser was misinterpreting the token sequence, likely stripping
  the leading minus from a negative numeric literal string incorrectly. The fix corrects
  the parsing logic in the expression parser to properly distinguish between unary
  negation and negative literal values.
expected_findings:
- file: compiler/parser/src/parser/expression.rs
  line: 268
  summary: 'Incorrect handling of negative literal strings during unary expression
    parsing: when the literal string starts with ''-'', the parser fails to correctly
    parse double negation as a unary negate operation wrapping a negative literal
    value.'
