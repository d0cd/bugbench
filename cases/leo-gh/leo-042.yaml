description: The Leo compiler did not strip or reject leading zeros in field, group,
  and scalar literals before passing them to SnarkVM, which cannot parse such values.
  Additionally, group literals were not validated during type checking, allowing invalid
  group values to pass through. The fix adds leading-zero stripping in the AST literal
  processing and interpreter, and adds group literal validation in the type checker.
expected_findings:
- file: compiler/ast/src/expressions/literal.rs
  line: 117
  summary: Missing leading-zero stripping for field/scalar/group literals. SnarkVM
    cannot parse literals with leading zeros (e.g., '00123field'), so the compiler
    must normalize them before code generation.
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 875
  summary: Group literals are not validated during type checking. Unlike field and
    scalar literals which are checked, group literals pass through without validation,
    allowing invalid group values to reach later compilation stages.
- file: interpreter/src/cursor.rs
  line: 1653
  summary: Interpreter also lacks leading-zero stripping for field/group/scalar literals,
    duplicating the same bug as in the AST literal processing. Values with leading
    zeros will fail when parsed by SnarkVM at runtime.
