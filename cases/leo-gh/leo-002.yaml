description: Duplicate `EnvOptions` flatten in both the parent `LeoDevnode` command
  and its `Start`/`Advance` subcommands caused clap to register the same global args
  twice. This triggered clap's debug assertions, crashing `leo devnode start` in debug
  builds. The fix removes the redundant flatten from subcommands and threads the private
  key from the parent's `EnvOptions` via the `Input` type parameter instead.
expected_findings:
- file: leo/cli/commands/devnode/start.rs
  line: 41
  summary: 'Duplicate flatten: `EnvOptions` with `global = true` fields is flattened
    here in the subcommand while already flattened in the parent `LeoDevnode`, causing
    clap duplicate global arg registration and debug-build crash.'
- file: leo/cli/commands/devnode/advance.rs
  line: 24
  summary: 'Duplicate flatten: `EnvOptions` is flattened in `Advance` subcommand but
    is already flattened in the parent `LeoDevnode` command, triggering clap debug
    assertion failure.'
