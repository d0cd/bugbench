description: The SSA (Static Single Assignment) pass incorrectly attempted to rename
  paths to external global variables when they shared a name with a local variable.
  For example, `child.aleo/foo.get_or_use(...)` assigned to local `let foo` would
  cause the SSA pass to treat the global `foo` reference as a local variable needing
  SSA renaming. The fix adds a guard using `try_local_symbol()` to only apply SSA
  renaming to genuinely local symbols, and also fixes type inference for `get_or_use`
  to properly handle unsuffixed numeric literals.
expected_findings:
- file: compiler/passes/src/static_single_assignment/expression.rs
  line: 211
  summary: SSA renaming does not distinguish between local variables and external
    global paths. When a local variable has the same name as a global (e.g., `foo`
    vs `child.aleo/foo`), the SSA pass incorrectly tries to rename the global path.
    Should guard with `try_local_symbol()` to only rename local symbols.
- file: compiler/passes/src/type_checking/visitor.rs
  line: 309
  summary: Mapping intrinsic type checking (e.g., `get_or_use`) does not properly
    infer types for unsuffixed numeric literals. The type checking pattern for mapping
    operations should propagate the expected type to the default-value argument.
