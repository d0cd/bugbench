description: 'The Leo code formatter had multiple logic bugs: inline comments after
  tokens (commas, semicolons) would swallow subsequent tokens, comments in parameter
  lists were written inline causing line comments to eat following parameter text,
  and `public`/`private`/`constant` modifiers on return types (e.g. `-> public Future`)
  were silently dropped. The fix corrects comment placement logic to avoid consuming
  adjacent tokens and adds proper handling for return type modifiers.'
expected_findings:
- file: leo-fmt/src/format.rs
  line: 107
  summary: Comment handling for COMMENT_LINE/COMMENT_BLOCK after tokens like commas/semicolons
    incorrectly emits the comment inline, causing line comments to swallow subsequent
    tokens on the same logical line
- file: leo-fmt/src/format.rs
  line: 170
  summary: Comments in parameter lists are written inline rather than on their own
    line, causing `//` line comments to eat subsequent parameter text and produce
    malformed output
- file: leo-fmt/src/format.rs
  line: 191
  summary: Return type modifiers (`public`/`private`/`constant`) are not handled when
    formatting function signatures, silently dropping visibility qualifiers like `->
    public Future`
