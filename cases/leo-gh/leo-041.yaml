description: The SourceMap's tracking of multi-byte character positions and newline
  locations was producing incorrect results, leading to wrong source location reporting
  in error messages. The fix replaced the complex BytePos/CharPos position tracking
  system with simple u32 file offsets and introduced a new LineContents type that
  computes line/column information on demand rather than maintaining fragile incremental
  state.
expected_findings:
- file: compiler/span/src/source_map.rs
  line: 75
  summary: SourceMap's multi-byte character and newline tracking logic produces incorrect
    position mappings, causing wrong line/column reporting in diagnostics
- file: compiler/span/src/span.rs
  line: 16
  summary: Span uses BytePos/CharPos wrapper types whose conversion logic between
    byte offsets and character positions is error-prone and produces incorrect results
    for multi-byte characters
- file: errors/src/common/formatted.rs
  line: 88
  summary: Error formatting relies on SourceMap's broken position tracking to compute
    line contents and underline spans, resulting in misaligned or incorrect error
    displays
