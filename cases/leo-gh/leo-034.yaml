description: Name validation checks (for keywords in program names, struct names,
  record names, function names, and fields) were scattered across the type checker
  and incomplete, leading to missing or poorly formatted error messages. The fix consolidates
  all name validation into a dedicated compiler pass (`NameValidation`) that runs
  early and produces well-formatted errors consistently.
