description: The Leo compiler's code generation did not handle duplicate outputs or
  record outputs that were originally received as inputs, causing snarkVM failures.
  The fix adds register cloning in codegen for duplicate and record-input outputs,
  and adds type checking rules to disallow assignment, tuple inclusion, and ternary
  expressions involving external record types.
expected_findings:
- file: compiler/passes/src/code_generation/statement.rs
  line: 86
  summary: 'Missing handling for duplicate output registers and record-input outputs:
    codegen should clone registers (via cast into a new register) when the same value
    is output multiple times or when a record input is used as an output.'
- file: compiler/passes/src/type_checking/expression.rs
  line: 36
  summary: 'Missing type-check validation: assignment to an external record type or
    a member thereof should be prohibited, as external records cannot be output by
    snarkVM.'
- file: compiler/passes/src/type_checking/visitor.rs
  line: 1152
  summary: External record inputs are not tracked or validated at output boundaries,
    allowing them to be returned which causes snarkVM errors. The type checker should
    track external record inputs and reject them as outputs.
