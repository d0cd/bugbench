description: The Leo compiler lacked support for signature literals (e.g., `sign195m229jvzr0...`)
  and optional signature types. The fix adds a Signature variant to LiteralVariant,
  implements parsing by first treating signature-like tokens as identifiers then disambiguating
  in conversions.rs, and enables signatures in optional type positions across the
  type checker and code generator.
expected_findings:
- file: compiler/parser/src/conversions.rs
  line: 651
  summary: Missing conversion logic to distinguish signature literals (starting with
    'sign') from regular identifiers during AST conversion
- file: compiler/passes/src/type_checking/visitor.rs
  line: 1376
  summary: Signature type missing from the set of types allowed in optional type positions
- file: compiler/ast/src/expressions/literal.rs
  line: 44
  summary: LiteralVariant enum lacks a Signature variant, preventing signature literals
    from being represented in the AST
