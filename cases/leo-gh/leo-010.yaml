description: 'Two bugs: (1) UtilError::network_error and UtilError::failed_to_retrieve_from_endpoint
  were marked @formatted (requiring a source span) but are used in contexts without
  associated spans, causing panics or incorrect error display. They should be @backtraced.
  (2) The Display implementation for Formatted silently swallowed the error message
  when it couldn''t find the source file, instead of still printing the message. Fixed
  by making the source file lookup optional and always printing the error message.'
