description: The type checker failed to validate return statements inside constructors.
  Constructors should only return unit, but the checker allowed arbitrary return values
  (e.g., `return true`). The fix adds a scope state check (`is_constructor`) in the
  return-statement type checking path and emits a new error when a non-unit value
  is returned from a constructor.
