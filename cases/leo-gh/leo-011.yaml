description: The type checker for MemberAccess expressions handling `self.caller`
  and `self.signer` set the type to `Type::Address` but failed to compare it against
  the `expected` type. This allowed programs with type mismatches involving these
  expressions to compile successfully without errors. The fix adds the missing type
  comparison check.
