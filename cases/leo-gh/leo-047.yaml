description: The `fill` method in the `WriteTransforming` visitor pass did not traverse
  `Stub` variants (external program definitions). When the compiler encountered programs
  referencing external stubs (e.g., array assignments or inlined functions in external
  programs), it would crash because the stub case was unhandled. The fix adds `Stub`
  traversal to the `fill` method.
