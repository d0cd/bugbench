  summary: "Missing match arm for unsuffixed integer literals used as array indices\
    \ \u2014 codegen fails to emit valid code when a const is declared without a type\
    \ suffix (e.g., `const N = 0;`)"
- file: compiler/passes/src/destructuring/expression.rs
  line: 50
  summary: "Destructuring pass does not handle unsuffixed integer literals as array\
