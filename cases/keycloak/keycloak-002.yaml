description: Dynamic URI path segments in Account Console API calls were not being
  encoded with encodeURIComponent(). This meant that IDs or other dynamic values containing
  special characters (e.g., '/', '#', '?') would break the URI structure, leading
  to failed or misdirected API requests. The fix wraps all dynamic path segments with
  encodeURIComponent().
expected_findings:
- file: themes/src/main/resources/theme/keycloak.v2/account/src/app/content/applications-page/ApplicationsPage.tsx
  line: 100
  summary: Dynamic `clientId` interpolated into URI path without encodeURIComponent(),
    risking malformed API requests when the ID contains special characters.
- file: themes/src/main/resources/theme/keycloak.v2/account/src/app/content/my-resources-page/ResourcesTable.tsx
  line: 91
  summary: Dynamic `resource._id` interpolated into URI path without encodeURIComponent(),
    risking broken requests with special characters in the ID.
- file: themes/src/main/resources/theme/keycloak.v2/account/src/app/content/signingin-page/SigningInPage.tsx
  line: 147
  summary: Dynamic `credentialId` concatenated into URI path without encodeURIComponent(),
    could cause malformed API calls.
