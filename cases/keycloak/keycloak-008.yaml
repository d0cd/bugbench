description: The `useFetch()` hook instantiated a new `AbortController` on every render/call
  instead of inside the `useEffect` callback. This meant the controller referenced
  during cleanup was not the same one passed to the active request, so requests were
  never properly cancelled on unmount or dependency change, leading to potential state-updates-after-unmount
  and stale responses.
expected_findings:
- file: js/apps/admin-ui/src/context/auth/AdminClient.tsx
  line: 38
  summary: AbortController is instantiated outside the effect (on every render). It
    should be created inside the useEffect callback so the cleanup function can abort
    the correct controller instance.
