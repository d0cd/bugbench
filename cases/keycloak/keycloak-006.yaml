description: The `useSetTimeout()` hook used a `didUnmountRef` to track whether the
  component was unmounted, but never reset it to `false` on mount. When React StrictMode
  automatically unmounts and remounts components, the ref remained `true` after remount,
  causing the hook to incorrectly believe the component was still unmounted. The fix
  adds `didUnmountRef.current = false` at the start of the useEffect to properly reset
  mounted state.
expected_findings:
- file: js/apps/admin-ui/src/utils/useSetTimeout.ts
  line: 4
  summary: useEffect cleanup sets `didUnmountRef.current = true` but the effect body
    never resets it to `false` on mount. After React StrictMode's unmount/remount
    cycle, the ref incorrectly remains `true`, breaking timeout scheduling.
