description: Translation keys in the Keycloak Admin Console still contained leftover
  i18n namespace prefixes (e.g., 'common:', 'clients:') after a namespace consolidation.
  These stale prefixes caused translation lookups to fail, resulting in raw keys being
  displayed instead of localized strings. The fix removes the namespace prefixes from
  all affected translation key references.
expected_findings:
- file: js/apps/admin-ui/src/authentication/EmptyExecutionState.tsx
  line: 69
  summary: Translation key passed to `t()` still contains a leftover namespace prefix,
    causing failed i18n lookup and displaying a raw key instead of translated text.
- file: js/apps/admin-ui/src/clients/credentials/Credentials.tsx
  line: 91
  summary: Error handler string template includes a namespace prefix in the translation
    key (e.g., `clients:` prefix in `addError`), which will not resolve correctly
    after namespace removal.
- file: js/apps/admin-ui/src/realm-settings/GeneralTab.tsx
  line: 94
  summary: Translation key in validation message contains a leftover namespace prefix,
    causing the error message to display as a raw key rather than localized text.
