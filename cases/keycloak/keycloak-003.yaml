description: 'The KeyValueInput component always rendered at least one empty key-value
  row even when no attributes were defined, causing issues with form state and submission
  (issue #19254). The fix introduces an EmptyState component when no attributes exist
  and corrects the key-value conversion logic to properly filter out empty entries,
  along with fixing label styling and alignment.'
