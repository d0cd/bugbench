introducing_pr_title: Provide error messages when executing programs
introducing_pr_body: "This PR changes the way error responses are displayed when running\
  \ `snarkos developer execute`: instead of providing only the status code, the specific\
  \ error message is displayed now. I tested it with the case from #2417, and it changed\
  \ the output from\r\n```\r\nhttps://vm.aleo.org/api/testnet3/program/the_liolik_1.aleo:\
  \ status code 500\r\n```\r\nto\r\n```\r\nSomething went wrong: Missing program for\
  \ ID the_liolik_1.aleo\r\n```\r\nwhich is more user-friendly. This applies to all\
  \ other possible errors that would now only return a `500` when using this command.\r\
  \n\r\nCloses #2417."
