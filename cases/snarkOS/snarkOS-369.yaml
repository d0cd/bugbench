introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nhttps://handbook.chorus.one/node-software/monitoring.html#version-metric\r\
  \n\r\n## Test Plan\r\n\r\nBuilt and ran an outer client using:\r\n```\r\n\u276F\
  \ cargo run --release -- start --nodisplay --client --node 0.0.0.0:4130 --verbosity\
  \ 1 --rest 0.0.0.0:3030\r\n```\r\nVerified the endpoint works\r\n```\r\n\u276F curl\
  \ --silent localhost:3030/mainnet/version | jq\r\n{\r\n  \"version\": \"3.8.0\"\
  ,\r\n  \"git_commit\": \"9359abd0546c39e05b22112c768c90738577e212\",\r\n  \"git_branch\"\
  : \"refs/heads/feat-add-version-endpoint\"\r\n}\r\n```\r\n\r\nRelated issue: https://github.com/ProvableHQ/snarkOS/issues/3702\r\
  \n"
