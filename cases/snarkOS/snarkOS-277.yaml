introducing_pr_title: '[HackerOne-2452182] Store `Proposal` and `SignedProposals`
  to disk and remove proposal expiration'
introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR has\
  \ three changes to address https://github.com/AleoHQ/snarkOS/issues/3171: \r\n\r\
  \n1. Reverted _proposal expiration_ introduced in https://github.com/AleoHQ/snarkOS/pull/3202.\r\
  \n    - This approach was unsafe because it violated the non-equivocation properties\
  \ of our BFT protocol.  \r\n    - A community member @ghostant-1017 also highlighted\
  \ this issue in a bug bounty finding [HackerOne-2452182].\r\n\r\n2. The `ProposalCache`\
  \ (`latest_round`, pending `Proposal`, and `SignedProposals`) will be stored to\
  \ a file on shutdown, loaded on bootup, and cleared with `snarkos clean`. \r\n \
  \   - Ensures that honest validators do not create multiple proposals on the same\
  \ round\r\n    - Ensures that we do not sign additional validator proposals on the\
  \ same round after a reboot.    \r\n    - Ensures that the node does not create\
  \ any proposals prior to it's storage round prior to the reboot.\r\n    \r\n3. Periodic\
  \ attempts to increment the round if we met the quorum requirements in storage.\r\
  \n    - In our current processing of `PrimaryPing`s, we try to advance rounds in\
  \ `sync_with_batch_header_from_peer`, however we perform this check PRIOR to processing\
  \ the batch header, meaning it will not be included in the quorum calculation. This\
  \ prevents us from advancing rounds when there are just enough certificates to meet\
  \ quorum for that round (since we omit the last one we receive in the quorum calculation).\r\
  \n    \r\n**Note**: An alternative to this `latest_round` approach is to store all\
  \ of the certificates in `Storage` that have not made it into blocks to the `ProposalCache`\
  \ file. The `latest_round` approach relies on `PrimaryPing`s to advance the storage\
  \ state, but does allow the `ProposalCache` file to be relatively small.\r\n\r\n\
  ### Implications\r\n\r\n- If enough (a majority) of validators reboot their nodes\
  \ at the same time, there could be a halting case.\r\n    - If we signed proposals\
  \ past our ledger round, but all nodes have thrown away their `Storage`, then we\
  \ won't have the signatures required to reconstruct the original proposal state.\
  \ \r\n    - This will need to be remedied by having all validators delete their\
  \ `proposal_cache` file and reboot.\r\n\r\n- Validators looking to swap machines\
  \ will need to migrate their `proposal_cache` file between machines to ensure honest\
  \ behavior.\r\n\r\n## Test Plan\r\n\r\nUnit tests have been added to for the new\
  \ types and to ensure that the new checks hold.\r\n\r\nExtensive local and burn-in\
  \ testing will need to be performed.\r\n\r\n## Related PRs\r\n\r\nReverts: https://github.com/AleoHQ/snarkOS/pull/3202.\r\
  \nAn extension of: https://github.com/AleoHQ/snarkOS/pull/3200\r\n\r\n## TODO\r\n\
  \r\n- [ ] Consider adding new log messages to inform validators of the importance\
  \ of the storage.\r\n"
