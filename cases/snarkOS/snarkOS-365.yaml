introducing_pr_title: '[Chore] Upgrade to rust 1.88'
introducing_pr_body: "This PR changes the Rust version to 1.88 and changes most crates\
  \ to use the 2024 edition of Rust. I am marking this as draft, because I will rebase\
  \ it after the 4.0.0 postrelease merge.\r\n\r\nThere are some open tasks\r\n* Some\
  \ crates use `std::env::set_var` which is unsafe in 2024 \r\n* I needed to change\
  \ quite a few instances of `rng.gen()` to `rng.r#gen()` because `gen` is a reserved\
  \ keyword now. This is just temporary until we upgrade the `rand` crate.\r\n\r\n\
  The PR also cleans up the CircleCI file slightly to make future upgrades easier.\r\
  \n"
