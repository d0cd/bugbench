introducing_pr_title: 'fix: block sync issue'
introducing_pr_body: "If your node is syncing many blocks, it can stop syncing. The\
  \ cause is the following:\r\n* node sends out block request to 3 nodes\r\n* only\
  \ 2 respond, now sync can't continue as the response is not 'complete'\r\n* sync\
  \ proceeds to send all block requests it can so no more are sent out (50 outstanding)\r\
  \n* concurrently another thread removes the peer that was not responding using `remove_block_requests_to_peer`\r\
  \n* now this request IS considered complete, so it's not eligible for timeout handling\r\
  \n* incoming responses are **only** considered if there are BlockResponses coming\
  \ in, but none will ever come in anymore (as we've already sent out and received\
  \ them all) - completely stuck\r\n\r\nThe fix is to check if we have any responses\
  \ that can proceed in `try_block_sync` (this is called every 5 seconds) if we don't\
  \ have any requests to send out. This seems to solve the problem.\r\n\r\nIncluded\
  \ is also a smaller bugfix that will reduce memory somewhat (we were not cleaning\
  \ up the `request_timestamps` when handling `remove_block_response`, keeping these\
  \ longer in the map than necessary - these would be cleaned up 15s later anyway,\
  \ but better to correct this).\r\n\r\n@howardwu Matthew Davids confirms this fix\
  \ works."
