introducing_pr_title: Implement Deploy and Execute CLI commands
introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR implements\
  \ the first iteration of deploying and executing program on the network. \r\n\r\n\
  Deployment and execution of programs is done via four new `developer` CLI commands\
  \ in `snarkOS` - `decrypt`, `deploy`, `execute`, and `scan`. \r\n\r\nThese CLI commands\
  \ currently live in snarkOS, but can also be migrated to the Aleo SDK.\r\n\r\n*Note:\
  \ All the operations are done client-side and do not require sending private keys\
  \ or view keys to third parties.*\r\n\r\n## Usage guide\r\n\r\n### 1. Install snarkOS\r\
  \n\r\n```\r\ncd snarkOS\r\ngit checkout feat/deploy-execute\r\ncargo install --path\
  \ .\r\n```\r\n\r\n### 2. Run the node in development mode\r\n\r\n```\r\nsnarkos\
  \ start --nodisplay --dev 0 --beacon \"\"\r\n```\r\n\r\n### 3. Scan the node for\
  \ spendable records\r\n\r\nThis will likely be the view key associated with the\
  \ development beacon.\r\n\r\n```\r\nsnarkos developer scan -v <VIEW_KEY> --start\
  \ 0 --end 1 --endpoint \"http://localhost:3030\"\r\n```\r\n\r\n### 4. Transfer credits\
  \ (execute the `credits.aleo` program)\r\n\r\nTransfer credits to another account\
  \ so it can't be spent by the beacon producing blocks. \r\n\r\n(The beacon is constantly\
  \ spending records to generate new blocks, so there is a chance your record is spent\
  \ before doing this step)\r\n\r\n```\r\nsnarkos developer execute credits.aleo transfer\
  \ <INPUT_RECORD> <RECIPIENT_ADDRESS> \"<AMOUNT_TO_TRANSFER>u64\" --private-key <PRIVATE_KEY>\
  \ --query \"http://localhost:3030\" --broadcast \"http://localhost:3030/testnet3/transaction/broadcast\"\
  \ \r\n```\r\n\r\nThis step can be replaced with a faucet.\r\n\r\n### 5. Deploy a\
  \ program\r\n\r\nDeploy a program with an unspent record. \r\n\r\n\r\n```\r\nsnarkos\
  \ developer deploy fibonacci.aleo --private-key <PRIVATE_KEY> --query \"http://localhost:3030\"\
  \ --path \"../leo/examples/fibonacci/build/\" --broadcast \"http://localhost:3030/testnet3/transaction/broadcast\"\
  \ --fee 600000 --record <INPUT_RECORD>\r\n```\r\n\r\n\r\n### 6. Execute a function\
  \ of a deployed program\r\n\r\n```\r\nsnarkos developer execute fibonacci.aleo fibonacci\
  \ \"1u8\" --private-key <PRIVATE_KEY> --query \"http://localhost:3030\" --broadcast\
  \ \"http://localhost:3030/testnet3/transaction/broadcast\" \r\n```\r\n\r\n*NOTE:\
  \ Fees (in gates) must be greater than the transaction size in bytes. Fees can be\
  \ excluded from execution transactions, but if one is specified, it must follow\
  \ the above rule. *\r\n\r\n"
