introducing_pr_title: Adds `load_block` for ledger use
introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\n`load_blocks`\
  \ supports any height range, and allows the user to provide a custom function that\
  \ serves as a \"callback\" that the method asynchronously calls while processing\
  \ blocks.\r\n\r\nIn my unit tests, I pass in a `Vec` to append the blocks and check\
  \ them for correctness.\r\n\r\nIn the method `sync_ledger_with_cdn`, I pass in the\
  \ `Ledger` to call `add_next_block` while processing each block.\r\n\r\n"
