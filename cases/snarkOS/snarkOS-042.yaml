description: Block requests on the gateway were not being cached, unlike validator
  requests, which meant they could not be rate-limited or matched to inbound block
  responses. The fix adds caching infrastructure for block requests in the Cache helper
  and updates the gateway event handling to insert/check block requests against the
  cache, mirroring existing validator request caching logic.
expected_findings:
- file: node/bft/src/gateway.rs
  line: 546
  summary: 'Missing cache check/insert for BlockRequest events: block requests are
    processed without rate-limiting or deduplication, unlike validator requests which
    are cached'
- file: node/bft/src/gateway.rs
  line: 988
  summary: Inbound block responses are not validated against cached outbound block
    requests, allowing unsolicited block responses to be processed
- file: node/bft/src/helpers/cache.rs
  line: 33
  summary: Cache struct lacks fields for tracking outbound and inbound block requests,
    preventing rate-limiting and request-response matching for block data
