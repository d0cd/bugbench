introducing_pr_title: '[Fix] Make --node optional to ensure it has an influence even
  when using --dev; renames `--storage_path` to `--storage`'
introducing_pr_body: "## Motivation\r\n\r\nPreviously, when using `--dev`, the node\
  \ ports would automatically be incremented alongside the the dev index. This makes\
  \ it hard to indicate `--peers` on other machines, as you'll need to know the dev\
  \ index / port number before it works. This design is similar to the `--bft` flag.\r\
  \n\r\nThis PR also renames `--storage_path` to `--storage` in the CLI `start` command.\r\
  \n\r\n## Test Plan\r\n\r\nThis only changes a node's behaviour when both `--node`\
  \ and `--dev` are used.\r\n\r\nTested manually locally and on aws.\r\n\r\n## Related\
  \ PRs\r\n\r\nNeeded because we're testing: https://github.com/AleoHQ/snarkOS/pull/3163"
