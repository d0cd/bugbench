introducing_pr_title: '[Optimize] Store pending certificates to proposal cache file'
introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR is an\
  \ extension of https://github.com/AleoHQ/snarkOS/pull/3239 that addresses https://github.com/AleoHQ/snarkOS/issues/3171.\r\
  \n\r\nThis PR adds to the functionality of the `ProposalCache` by adding pending\
  \ certificates (that have not yet been included in ledger) to the list of attributes\
  \ to store to file. \r\n\r\nThis should increase the robustness of reboots because\
  \ nodes should now not need to rely on `PrimaryPings` to catch up to other peers\
  \ in a reboot scenario. Initial testing has observed successful restarts (in the\
  \ honest case) for any number of validators (including scenarios of more than `f+1`\
  \ validators rebooting).\r\n\r\n\r\n## Test Plan\r\n\r\nBurn-in tests and additional\
  \ reboot testing needs to be done to ensure robustness of this change.\r\n\r\n##\
  \ Related PRs\r\n\r\nExtension of https://github.com/AleoHQ/snarkOS/pull/3239\r\n"
