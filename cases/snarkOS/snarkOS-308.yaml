fix_pr_number: 3727
introducing_pr_number: 3720
introducing_pr_title: '[Fix] Prevent potential deadlocks in BlockSync'
introducing_pr_body: "This PR fixes code that can deadlock involving `sync_state`\
  \ and `common_ancestors` in BlockSync. In particular, `BlockSync::update_peer_locators`\
  \ would lock `sync_state` while still holding a lock to `common_ancestors`, and\
  \ `BlockSync::prepare_block_requests` would first lock `sync_state` and then `common-ancestors`.\r\
  \nThe PR changes it so that `BlockSync::update_peer_locators` drops the lock to\
  \ `common_ancestors` before modifying the sync state.\r\n\r\nI also moved block\
  \ requests and responses behind a single lock, as they are often modified together\
  \ and this way there is no possibility of a deadlock. I made sure before that we\
  \ always lock requests before responses, but it is a potential footgun and this\
  \ PR is a good opportunity to fix that."
