introducing_pr_title: Renames `Testnet3` to `MainnetV0`
introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR renames\
  \ Testnet3 to MainnetV0 in preparation for mainnet.\r\n\r\nNote: The network ID\
  \ for `mainnet` is `0` (where as it was `3` on `testnet3`). As such, please update\
  \ your firewall to support these TCP ports:\r\n- 4130 (previously 4133)\r\n- 3030\
  \ (previously 3033)\r\nFollowing this convention will ensure Aleo can better support\
  \ multiple distinct testnets simultaneously after mainnet launch.\r\n\r\nThe sister\
  \ PR can be found here: https://github.com/AleoHQ/snarkVM/pull/2347"
