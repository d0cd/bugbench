introducing_pr_title: Feat/add buildinfo to metrics
introducing_pr_body: "# Add Build Info as Labeled Prometheus Gauge Metrics\r\n\r\n\
  Exposes snarkOS build information as Prometheus gauge metrics with labels, following\
  \ the \"info\" metric best practices.\r\n\r\n## Implementation\r\n\r\nCreates labeled\
  \ gauge metrics for:\r\n- **Version**: `built_info::PKG_VERSION` \r\n- **Git Commit**:\
  \ `built_info::GIT_COMMIT_HASH`\r\n- **Git Branch**: `built_info::GIT_HEAD_REF`\
  \  \r\n- **Features**: `built_info::FEATURES_LOWERCASE_STR`\r\n\r\n## Metrics Output\r\
  \n\r\n```prometheus\r\n# TYPE snarkos_build_info gauge\r\nsnarkos_build_info{version=\"\
  4.2.1\"} 1\r\nsnarkos_build_info{git_commit=\"f2e3c3fa3708d527d1f20ddd418c08db81a1620a\"\
  } 1  \r\nsnarkos_build_info{git_branch=\"feat/add_buildinfo_to_metrics\"} 1\r\n\
  snarkos_build_info{features=\"default,rayon\"} 1\r\n```\r\n\r\n## Technical Details\r\
  \n\r\n- Uses native `::metrics::gauge!` macro with labels\r\n- Follows same pattern\
  \ as snarkVM's `histogram_label` \r\n- Automatically initialized when metrics are\
  \ enabled\r\n- Static build info set once at startup\r\n\r\n## Changes\r\n\r\n-\
  \ Added build script (`build.rs`) for compile-time build information\r\n- Added\
  \ `metrics` dependency (v0.22) for labeled gauge support\r\n- Updated metric names\
  \ in `names.rs` \r\n- Implemented gauge metrics with labels in `lib.rs`\r\n\r\n\
  ## Benefits\r\n\r\n- Track version distribution across deployments\r\n- Correlate\
  \ metrics with specific code changes\r\n- Verify deployments via metrics scraping\r\
  \n"
