introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR updates\
  \ the crate versions from `v3.2.0` to `v3.3.1`.\r\n\r\nThis PR encompasses the upgrade\
  \ to `v3.3.0` and then a subsequent upgrade to v3.3.1. The latter is to include\
  \ additional fix PRs.\r\n\r\nThis corresponds with the latest `crates.io` release\
  \ - https://crates.io/crates/snarkos.\r\n\r\n## Changelog\r\n\r\n- Add additional\
  \ transmission type checks [PR](https://github.com/ProvableHQ/snarkOS/pull/3478)\r\
  \n- Fix sync request timeout off-by-one [PR](https://github.com/ProvableHQ/snarkOS/pull/3477)\
  \ \r\n- Fix execution of complex program functions [PR](https://github.com/ProvableHQ/snarkVM/pull/2596)\r\
  \n- corrected endpoint used in 'snarkos developer scan' [PR](https://github.com/ProvableHQ/snarkOS/pull/3458)\r\
  \n- syncing small sets of blocks should be twice as fast [PR](https://github.com/ProvableHQ/snarkOS/pull/3410)\r\
  \n- Various performance and documentation improvements, such as adding a cache for\
  \ block requests [PR](https://github.com/ProvableHQ/snarkOS/pull/3440)\r\n- Increase\
  \ maximum validator set on mainnet to 25 [PR](https://github.com/ProvableHQ/snarkVM/pull/2595)\r\
  \n- A migration will occur at the following block heights:\r\n\r\n### **Canary**\
  \ - Block 4,560,000 (~Jan 25, 2025 at the current 4s block times)\r\n### **Testnet**\
  \ - Block 4,800,000 (~Jan 31, 2025 at the current 3.4s block times)\r\n### **Mainnet**\
  \ - Block 4,900,000 (~Feb 18, 2025 at the current 3.0s block times)\r\n\r\nThese\
  \ numbers were calculated by determining the planned release schedule and backing\
  \ into the block height using the current block speeds and including a buffer between\
  \ release and consensus change. This buffer is intended to give leeway for nodes\
  \ to upgrade before the consensus change. The following table is the approximate\
  \ timeline and buffers for the networks:\r\n\r\n| Network | Release Date | Buffer\
  \ | Consensus V3 |\r\n|---------|--------------|--------|--------------|\r\n| Canary\
  \  | Jan 21, 2025 | 4 days | Jan 25, 2025 |\r\n| Testnet | Jan 28, 2025 | 3 days\
  \ | Jan 31, 2025 |\r\n| Mainnet | Feb 11, 2025  | 7 days | Feb 18, 2025 |"
