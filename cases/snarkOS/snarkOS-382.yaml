introducing_pr_title: '[Feat] Filter out lower-height peers from PeerResponse messages'
introducing_pr_body: "A follow-up to https://github.com/ProvableHQ/snarkOS/pull/3848,\
  \ completing #3844.\r\n\r\nThis PR enhances the `PeerResponse` messages with optional\
  \ peer heights, which are then used to filter out candidate peers which are lower\
  \ than equal to our node in terms of their current block height.\r\n\r\nEdit: the\
  \ most recent iteration adds a `last_height_seen` field to the `CandidatePeer`,\
  \ and updates it whenever we receive a `PeerResponse`; we later use it in order\
  \ to make sure that at least half of the peers we attempt to connect to (in case\
  \ we have too few of them) are at a greater height than us.\r\n\r\nCloses https://github.com/ProvableHQ/snarkOS/issues/3844\r\
  \nCC https://github.com/ProvableHQ/snarkOS/issues/3580"
