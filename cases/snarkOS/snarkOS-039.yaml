issue_bodies:
  '2935': "# https://hackerone.com/reports/2279584\r\n\r\n## Summary:\r\nThe `Primary`\
    \ recursively fetch certificates from other peer upon receiving new `Propose`\
    \ and `BatchCertificate `. Although it will check the certificate before storing\
    \ into db, the check is at end of the recursion. \r\n\r\nA malicious validator\
    \ can create fake certificate that contains other fake certificate at the same\
    \ round. Then the recursion will never ends and lead to stack overflow. The call\
    \ stack will be like this:\r\n\r\n```\r\nsync_with_certificate_from_peer\r\n \
    \   sync_with_batch_header_from_peer\r\n        sync_with_certificate_from_peer\r\
    \n             ....\r\n```\r\n\r\nThe attacker can crash all other validator in\
    \ this way.\r\n\r\n## Steps To Reproduce:\r\n\r\nSee the commit: https://github.com/Gooong/snarkOS/commit/3e7c6866203c02dd9db225f81d794ad9d2aae146\r\
    \n\r\n1. Clone the repo above\r\n2. Run ./devnet.sh\r\n3. Wait round 5\r\n4. Check\
    \ the log and we will find some node crashed: `fatal runtime error: stack overflow`\r\
    \n\r\n## Proof-of-Concept (PoC)\r\n\r\nHow this bug can be exploited:\r\n\r\n\
    The attacker just broadcast fake certificate. This will cause all other validator\
    \ continously crash and shutdown the network.\r\n\r\n## Supporting Material/References:\r\
    \n\r\nSee the attachment \r\n\r\n## Impact\r\n\r\nCause validators crash and shutdown\
    \ the network.\r\n\r\n## Fix suggestions:\r\n\r\nStrictly check certificate before\
    \ the recursion."
