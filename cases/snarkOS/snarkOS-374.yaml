introducing_pr_title: '[Feature] Immediately send a Ping after generating new blocks'
introducing_pr_body: "## Motivation\r\nIt can take many seconds for a client to detect\
  \ that its transaction was confirmed, because block propagation is sometimes slow.\r\
  \nThis needs to be fixed to improve the user experience.\r\n\r\n## Overview\r\n\
  This PR introduces a `Ping` struct that keeps track of all ping messages (to be)\
  \ sent to other peers. When a new block is received or created, nodes update the\
  \ block locators in `Ping`, which immediately sends new ping messages.\r\nThis should\
  \ reduce block propagation time, as the old approach introduces up to 20 seconds\
  \ of delay for each network hop.\r\n\r\nEvery iteration, Ping's worker task waits\
  \ on a `tokio::Notify` (similar to a condition variable), which gets notified whenever\
  \ the block locators change. It also set a timeout to the earliest time we have\
  \ to send a new ping message to a peer.\r\nIf there are a no peers, the task still\
  \ wakes up every 20 seconds. The latter should not be needed, but I left it in place\
  \ to make sure the task never gets stuck.\r\n\r\nThis change also moves the `Writer`\
  \ implementation from `Validator`/`Client`/`Prover` to `Router`, which deduplicates\
  \ some code and also makes the code more modular.\r\n\r\n## Notes/Considerations\r\
  \n* This change means we now send a ping every block, so roughly every 4 seconds\
  \ or so. This could cause issues, and we can consider changing it to not trigger\
  \ a new ping message on every block. I also have ideas to make `BlockLocators` smaller\
  \ so that Ping messages do not cause a noticeable overhead.\r\n* I did not change\
  \ the `Gateway`/`PrimaryPing` code. The `PrimaryPing` is really only used during\
  \ initial sync. During normal operations, validators build blocks themselves and\
  \ the pings do not affect latency.\r\n\r\n## Result\r\nClient block height is now\
  \ identical to that of validators.\r\n<img width=\"1189\" alt=\"Screenshot 2025-06-22\
  \ at 6 14 34\u202FPM\" src=\"https://github.com/user-attachments/assets/78f8dc7f-a021-4f47-afea-1463ccc063f1\"\
  \ />\r\n"
