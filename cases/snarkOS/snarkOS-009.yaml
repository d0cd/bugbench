introducing_pr_title: '[Refactor] Align peer handling between Router and Gateway'
introducing_pr_body: "The `Router` and the `Gateway` have very similar functionalities,\
  \ so we can benefit from aligning and deduplicating some code between them. This\
  \ PR was mostly inspired by https://github.com/ProvableHQ/snarkOS/issues/3869 (which\
  \ would otherwise require duplicated code), but other than that, it will allow both\
  \ objects to benefit from similar bugfixes and optimizations (e.g. those from https://github.com/ProvableHQ/snarkOS/pull/3540\
  \ and https://github.com/ProvableHQ/snarkOS/pull/3713, which had only targeted the\
  \ `Router`, but apply to the `Gateway` as well).\r\n\r\nThe commits may be read\
  \ individually (the code compiles after each one) or together. The short list of\
  \ changes is as follows:\r\n- decouple the `Peer` from the `Router`\r\n- simplify\
  \ peer handling in the `Gateway` by leveraging the `Peer`\r\n- introduce a `PeerPoolHandling`\
  \ trait which contains methods applicable to both `Router` and `Gateway`\r\n\r\n\
  This integration can be pushed further (CC https://github.com/ProvableHQ/snarkOS/issues/3872),\
  \ but I wanted to limit the scope of changes for a better reviewing experience.\
  \ This PR also doesn't contain https://github.com/ProvableHQ/snarkOS/issues/3869\
  \ just yet, but it will now be trivial to follow up with it.\r\n\r\nCloses https://github.com/ProvableHQ/snarkOS/issues/3873."
