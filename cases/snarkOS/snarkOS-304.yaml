introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR adds\
  \ support for validators to sync.\r\n\r\n**Attention** - This PR performs a version\
  \ bump of snarkOS. All nodes running `./run-client.sh` or `./run-prover.sh` (as\
  \ per our instructions) will **automatically** update. All other nodes must manually\
  \ update themself.\r\n\r\n## Changelog\r\n\r\n- Bumps version from `3` to `4`\r\n\
  - Adds authenticated handshakes\r\n- Adds `Sync` pool for validators and beacons\r\
  \n- Adds `BlockLocators` object\r\n- Adds `BeaconPropose`, `BeaconTimeout`, `BeaconVote`\
  \ messages\r\n- Updates `PuzzleResponse` to send `Header` instead of `Block`\r\n\
  - Updates coinbase target algorithm\r\n- Removes `UnconfirmedBlock` messages\r\n\
  - Removes `Status` from all nodes\r\n\r\n## Tests\r\n\r\n- Adds tests to check that\
  \ block locators are well-formed\r\n- Adds tests to check sync logic behaves as\
  \ expected\r\n- Adds tests to check coinbase retargeting is within bounds\r\n"
