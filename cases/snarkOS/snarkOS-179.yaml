introducing_pr_title: '[ZKS-04] Perform garbage collection on subdag commit'
introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR performs\
  \ garbage collection on subdag commits only. Previously we were performing GC on\
  \ every round advancement, which was relying on the improbability of going 100 rounds\
  \ without committing a subdag. Now we guarantee that we don't throw away older certificates\
  \ in the case we do go more than MAX_GC_ROUNDS without a commit.\r\n\r\nNote: We\
  \ may also consider adding a manual skip of older certificates in the commit phase.\r\
  \n\r\nAudit Finding: **[zksecurity 04] Garbage Collection Can Block Commits From\
  \ Happening**"
