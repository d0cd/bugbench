introducing_pr_title: Correctly resolve addresses when calling Router::disconnect
  directly
introducing_pr_body: "While looking into potentially introducing strong typing to\
  \ avoid IP addresses from being mixed up (though that would be a large change, so\
  \ it might need to wait), I found 3 more mix-ups:\r\n- `Router::disconnect`, like\
  \ all other \"higher-level\" (higher than `Tcp`) objects, should use the listening\
  \ address as the unique connection identifier, and resolve to the actually connected\
  \ address internally\r\n- the `Disconnect` impl for the `TestRouter` was not resolving\
  \ the address (missed this one last time, as no test was hitting it - I'll post\
  \ such a test case soon)\r\n- `Reading::process_message` (in the unhappy path) was\
  \ not resolving the address before calling `Outbound::send`, though it was accidentally\
  \ calling `Router::disconnect` correctly (though technically with the \"wrong\"\
  \ address type, which the 1st point refers to)\r\n\r\nThis should fix the remaining\
  \ occurrences of https://github.com/AleoHQ/snarkOS/issues/2102."
