introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR is based\
  \ on the changes made in https://github.com/AleoHQ/snarkVM/pull/2308.\r\n\r\nWe\
  \ now pass through an optional `bonded_balances` variable to the `START` CLI  to\
  \ specify custom genesis bond state. Note that we still enforce that the validators\
  \ must be from the set of development addresses and the number of validators must\
  \ match the number specified in `dev_num_validators`\r\n\r\nExample Command:\r\n\
  \r\n```\r\nsnarkos start --dev 0 --dev-num-validators 4 --dev-bonded-balances '{\"\
  validator_address_0\":[\"validator_address_0\",validator_amount_0], \"validator_address_1\"\
  :[\"validator_address_1\",validator_amount_1], \"validator_address_2\":[\"validator_address_2\"\
  ,validator_amount_2], \"validator_address_3\":[\"validator_address_3\",validator_amount_3],\
  \ \"delegator_address_0\":[\"validator_address_0\",delegator_amount_0]}'\r\n```\r\
  \n\r\nNote: We may want to make this a `.toml` or JSON file instead."
