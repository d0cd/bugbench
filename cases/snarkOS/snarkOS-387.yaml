introducing_pr_title: '[Feature] Add sync_status REST endpoint'
introducing_pr_body: "This adds a `<network>/sync_status` endpoint to the REST API.\
  \ A call to it will return something like the following:\r\n```json\r\n~> curl http://localhost:3030/mainnet/sync_status\r\
  \n{\r\n  \"is_synced\": false,\r\n  \"ledger_height\": 2443,\r\n  \"sync_mode\"\
  : \"p2p\",\r\n  \"cdn_height\": 8167950,\r\n}\r\n```\r\n\r\n`sync_mode` will switch\
  \ to `p2p` once the initial sync is done. \r\n\r\nIf the node is not connected to\
  \ a CDN, the `cdn_height` field is omitted.\r\n```json\r\n~> curl http://localhost:3030/mainnet/sync_status\r\
  \n{\r\n  \"is_synced\": false,\r\n  \"ledger_height\": 2795,\r\n  \"sync_mode\"\
  : \"p2p\",\r\n  \"p2p_height\": 8638987\r\n}\r\n```\r\n\r\np2p height is only added\
  \ to the response once a peer is connected "
