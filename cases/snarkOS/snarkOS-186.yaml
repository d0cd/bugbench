introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis adds (feature\
  \ gated) metrics support using `metrics` crate. Also adds sample docker-compose\
  \ and grafana dashboard (in `node/metrics`).\r\n\r\nPlease check the code calculating\
  \ the latency histograms (and all other gauges) for correctness.\r\n\r\nDashboard:\r\
  \n\r\n![Screenshot from 2023-09-12 11-05-13](https://github.com/AleoHQ/snarkOS/assets/532423/5a482d6e-d007-42d6-8a17-b395bb88a9cd)\r\
  \n\r\n![Screenshot from 2023-09-12 11-05-47](https://github.com/AleoHQ/snarkOS/assets/532423/23490606-4b23-420f-a7c9-0db9e006ae69)\r\
  \n\r\n![Screenshot from 2023-09-12 11-05-53](https://github.com/AleoHQ/snarkOS/assets/532423/bbf1e952-8103-4e48-bf04-4458451fe4b7)\r\
  \n\r\n## Test Plan\r\n\r\nRun snarkOS\r\nConnect your prometheus (you can use the\
  \ included prometheus.yml) to snarkOS. \r\nConnect your grafana to prometheus.\r\
  \nImport the dashboard\r\n\r\n## Related PRs\r\n\r\nShould only be merged after\
  \ https://github.com/AleoHQ/snarkVM/pull/1974 is in (and then Cargo.toml updated\
  \ to correct snarkVM revision/version)\r\n"
