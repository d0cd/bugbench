introducing_pr_title: '[Feat] Track peer height for cache purposes'
introducing_pr_body: "This PR extends the `ConnectedPeer` object with a new member\
  \ representing its last known block height, as informed by its `BlockLocators`,\
  \ and uses it to sort the entries in the persistent peer cache, and those sent in\
  \ response to `PeerRequest` messages.\r\n\r\nFor now I've omitted the last part\
  \ of the proposed implementation, as I think it was intended to be related to the\
  \ `PeerRequest` messages we _receive_, not provide. That being said, this is something\
  \ that could be considered a hardening feature separate from these changes, and\
  \ as such, it could be introduced in another PR.\r\n\r\nCC https://github.com/ProvableHQ/snarkOS/issues/3844\r\
  \nCC https://github.com/ProvableHQ/snarkOS/issues/3580"
