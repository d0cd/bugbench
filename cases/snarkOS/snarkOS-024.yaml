issue_bodies:
  '3404': "## \U0001F41B Bug Report\r\n\r\nWhen a validator syncs, it sends out a\
    \ duplicate block request for a certain height, despite already having received\
    \ a response for that height from the earlier request.\r\n\r\nSpecifically, it\
    \ requests blocks of a certain range (e.g., `1` to `n+m` with `m>1`), and then\
    \ advances to block `n`. Then, it sends out a block request for height `n+1` again,\
    \ despite it already being in the initial block range request.\r\n\r\nThe bug\
    \ slows down the syncing of validators.\r\n\r\n## Steps to Reproduce\r\n\r\nRun\
    \ the `./devnet.sh` script with 4 validators, turn off 1 validator. Let it run\
    \ for ~30 blocks. Then, start the fourth validator and let it sync. Consider adding\
    \ logs to snarkOS for sync profiling.\r\n\r\n## Expected Behavior\r\n\r\nThe validator\
    \ should use the block already sent to it and advance to it (and further).\r\n\
    \r\n## Your Environment\r\n\r\n- snarkOS branch `kp/profile/sync/` in `ProvableHQ/snarkOS`\r\
    \n- macOS\r\n\r\n## Debugging notes\r\n\r\n- In `sync_storage_with_blocks`, there\
    \ are two places where we advance with blocks - without and with BFT checks.\r\
    \n- The issue is for cases where we advance with BFT checks. `sync_storage_with_block`\
    \ [does not always](https://github.com/AleoNet/snarkOS/blob/2349f3edab28ff57cf551f3b96febba5aa120b8b/node/bft/src/sync/mod.rs#L422-L423)\
    \ update the canon ledger. Thus, `self.canon` can't necessarily tell until which\
    \ height we already parsed responses.\r\n- While the block is still in `self.latest_block_responses`,\
    \ this member is in `Sync` and not in `BlockSync`. A refactor should consider\
    \ the entire syncing logic, and how `Sync` and `BlockSync` relate."
