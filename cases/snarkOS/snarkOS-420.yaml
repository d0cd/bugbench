fix_pr_title: Enable devprintln on test_network
fix_pr_body: "## Motivation\r\n\r\nThe `test_network` feature is for integration testing,\
  \ offering custom consensus heights and low proof targets. It is now available through\
  \ a Leo command as well.\r\n\r\nI think it would be useful for as much low level\
  \ logging information to be offered to users by default, by enabling dev_println.\r\
  \n\r\n## Test Plan\r\n\r\n- [x] Run a network to see if the logs are appetizable.\r\
  \n  - It can be quite spammy, but most users will only test a few transactions,\
  \ and for them it may be super useful to actually see the low level reason for transactions\
  \ failing to verify. We can revert this PR if we get some bug reports of people\
  \ asking about the new logs.\r\n\r\n## Related PRs / issues\r\n\r\nhttps://github.com/ProvableHQ/snarkVM/issues/2875"
