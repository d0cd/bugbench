introducing_pr_title: Add static query to snarkos developer execute
introducing_pr_body: "## Motivation\r\n\r\nAfter a sync with @vicsn we are moving\
  \ to using `snarkos developer execute` instead of the cannon for testing. One of\
  \ the steps is to pregenerate transactions using the genesis state root and on the\
  \ latest consensus version.\r\n\r\nThis can be done by passing them as the `--query`\
  \ parameter to the command. Here is an example:\r\n\r\n```\r\nsnarkos developer\
  \ execute \\\r\n  --query '{\"state_root\": \"sr1287g435kqmlu6w8fzpp9dyggfwxyyaeymg89p3nzefq86xxst5pq9eht34\"\
  , \"height\": 249}' \\\r\n  --private-key <PK> \\\r\n  credits.aleo transfer_public\
  \ aleo1rhgdu77hgyqd3xjj8ucu3jj9r2krwz6mnzyd80gncr5fxcwlh5rsvzp9px 1000u64 \\\r\n\
  \  --network 1  \\\r\n  --store file.txt \\\r\n  --store-format string\r\n```\r\n\
  \r\nThis now works and these transaction can be sent later with:\r\n\r\n```\r\n\
  curl http://localhost:3030/testnet/transaction/broadcast -X POST -H \"Content-Type:\
  \ application/json\" -d @file.txt\r\n```\r\n\r\nWe will be able to pre-generate\
  \ many transfer_public (and not only) transactions that we can send later while\
  \ running the tests.\r\n\r\n## Test Plan\r\n\r\nUsed `devnet.sh`, got a state root\
  \ (`curl localhost:3030/testnet/stateRoot/latest`) and a height for the test, ran\
  \ the new command, broadcasted the transaction and checked that it was available\
  \ : DONE.\r\n\r\nWrote a small unit test for the new static query parsing logic.\
  \ Ran all the CLI unit tests.\r\n"
