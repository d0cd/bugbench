introducing_pr_title: Upgrade nodes in CI tests
introducing_pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nTo test upgrading\
  \ snarkos versions in a network we run a special denvet test as described in #4026\r\
  \n\r\n## Test Plan\r\n\r\nRun the CI and the new test passes.\r\n\r\n## Documentation\r\
  \n\r\nThe test works following the steps:\r\n\r\n1. Download latest snarkOS release\
  \ source from GitHub.\r\n2. Build it via `cargo install --locked --path . --features\
  \ test_network` into a separate prefix (SNARKOS_RELEASE_DIR).\r\n3. Probe latest_consensus_version\
  \ for release and PR binaries.\r\n4. Compute CONSENSUS_VERSION_HEIGHTS for release\
  \ and PR.\r\n5. Rebuild release snarkOS with its heights.\r\n6. Rebuild PR snarkOS\
  \ with its heights.\r\n7. Start a devnet with the release binary.\r\n8. Restart\
  \ nodes one-by-one to the PR binary.\r\n\r\nAdded a new workflow for the new test,\
  \ extracting it from the devnet tests, as it is time-taking with all the compilations\
  \ and waiting on the consensus version.\r\n\r\n"
