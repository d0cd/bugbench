introducing_pr_body: "This PR contains a test ensuring that our connections don't\
  \ leak memory. Other than aiding the earlier disconnect-related fixes, it already\
  \ helped detect the two following issues in `staging`:\r\n- `Router::spawn` should\
  \ **not** be used for short, \"self-destructing\" tasks (at least not in its current\
  \ shape); this was reverted\r\n- the accounting of connecting peers needs to be\
  \ tighter for outbound connections; this was adjusted as a drive-by\r\n\r\n`cargo\
  \ update` was also run, because this PR alters the lockfile and there's already\
  \ a pending dependabot PR which this will take care of."
