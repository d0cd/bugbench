introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR updates\
  \ the `Scan` CLI command to support the correct network. In addition, this PR updates\
  \ the CDN TLS version to use `Reqwest::rust_tls` instead of `Reqwest::native_tls`.\
  \ `native_tls` does not support the configuration of the new endpoint `https://blocks.aleo.org/v0/...`,\
  \ so the change is necessary.\r\n\r\n\r\nCI is run [here](https://app.circleci.com/pipelines/github/ProvableHQ/snarkOS?branch=fix%2Fcdn-CI)."
