introducing_pr_title: '[Feature] Batch proposal spend limits'
introducing_pr_body: "This PR introduces spend limit checks on batch proposals at\
  \ construction and prior to signing. ~~This requires some changes to batch construction:\
  \ the workers are now drained only _after_ the transmissions have been checked for\
  \ inclusion in a batch. This, to avoid reinserting transmissions into the memory\
  \ pool once the spend limit is surpassed.~~ I have modified the `Ready` queue to\
  \ support `O(1)` operations at the front, as well as inclusion checks and regular\
  \ inserts, so the batch proposal logic could be simplified. We no longer need to\
  \ defer draining and can instead optimistically remove the transmission from the\
  \ queue for processing. There's an occasional `O(n)` cost to reset the internally\
  \ tracked offset but this should happen at most once per epoch, when solutions are\
  \ cleared from the queue. It was also necessary to expose a `compute_cost` function\
  \ on the `LedgerService` trait\u2014its internals might still be moved into snarkVM.\
  \ \r\n\r\nThis changeset will need to be refined and tested, hence the draft. CI\
  \ is currently expected to fail.\r\n\r\nRelated PRs: \r\n- https://github.com/ProvableHQ/snarkVM/pull/2601\
  \ (required for merge)\r\n- https://github.com/ProvableHQ/snarkVM/pull/2565 (previous\
  \ discussion)\r\n\r\n"
