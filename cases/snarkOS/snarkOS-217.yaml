introducing_pr_title: '[Fix] Update fetch redundancy as a factor of committee size'
introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR updates\
  \ the `NUM_REDUNDANT_REQUESTS` to a dynamic number based on the number of validators\
  \ in the committee set.\r\n\r\nThe current formula for maximum allowed request redundancy\
  \ is  `1 + (num_validators_in_committee_lookback / 3)`. This can be adjusted if\
  \ it is too lenient or too aggressive.\r\n\r\nAdditionally, the `num_pending_requests`\
  \ that was used to measure redundancy is now adjusted to the number of sent `Event::TransmissionRequest`/`Event::CertificateRequest`.\
  \ Previously we were using the number of callbacks, which was not a good gauge of\
  \ how many request messages were actually being sent out to peers.\r\n\r\n## Related\
  \ PRs\r\n\r\nRelated to #3135 and #3139"
