introducing_pr_title: Fix remaining synchronization bugs
introducing_pr_body: "This PR reverts the revert of PR #3543 and fixes two issues\
  \ we detected during stress tests. \r\n\r\nThe changes are structured as follows:\r\
  \n\r\n* [db40b35](https://github.com/kaimast/snarkOS/pull/3/commits/db40b35d8d8ef374ea5970878c76b106560fd442)\
  \ reverts the revert (undos commit). These changes have already been reviewed for\
  \ the reverted PR.\r\n* [7f6762b](https://github.com/ProvableHQ/snarkOS/pull/3626/commits/7f6762b4bd4d1e951013afe3f0a2cc31f6b77c61)\
  \ ensures that, for validators, BFT's sync module processes new blocks, instead\
  \ of them being processed by the generic BlockSync module.\r\n* [434a406](https://github.com/kaimast/snarkOS/pull/3/commits/434a406a97b40821e8e5d49704a6b6a543ea97e8)\
  \ fixes another bug, that is unlikely to happen on mainnet but popped up during\
  \ stress testing (see the description on \"pending blocks\" below).\r\n\r\n## Pending\
  \ Blocks\r\nCurrently, validators have two different sync modes. For older blocks\
  \ (>=100 rounds ago) they sync like clients performing only some of the DAG checks,\
  \ for more recent blocks (<100 rounds ago) validators check that there are enough\
  \ votes for each new block's leader certificate in some subsequent block. This check\
  \ happens in `snarkos_node_bft::sync::sync_storage_with_block`.\r\n\r\nChecking\
  \ for sufficient votes means that, in addition to blocks added to the ledger, there\
  \ is also a set of \"pending blocks\" which cannot be added to the ledger yet because\
  \ they did not reach the availability threshold yet.\r\nThe generic BlockSync module,\
  \ however, is unaware of these pending blocks which can cause issues, as outlined\
  \ below.\r\n\r\n### Detected Issue and Proposed Fix\r\nIn the common case, there\
  \ is only one pending block. However, during stress testing we triggered a case\
  \ where a majority of validators restart after resetting their ledgers, and the\
  \ most recent block did not receive sufficient votes. Here, there exists a block\
  \ `i-1` and a block `i`, where block `i` does not contain sufficient votes for `i-1`.\r\
  \nUsually, a subsequent block, here w.l.o.g. block `i+1`, contains sufficient votes\
  \ to add all its pending predecessors to the ledger.\r\n\r\nThe issue we found is\
  \ that, in this scenario, BlockSync considers itself more than one block behind\
  \ and, thus, not fully synced. The network then cannot make progress to create block\
  \ i+1 because most validators are still syncing, but without `i+1` block `i-1` never\
  \ gets added to the ledger.\r\nThe final commit in this PR considers pending blocks\
  \ as part of the sync state to address this.\r\n\r\n## Testing Plan\r\nWe already\
  \ ran stresstests on this branch and did not detect any errors. However, I want\
  \ to perform another run of stresstest to be on the safe side.\r\n\r\n## Notes\r\
  \nThere is a larger PR in the works to perform the checks on pending blocks on all\
  \ nodes, not just validators, and move more of the DAG checks into snarkVM. However,\
  \ I want to merge this version first, as the delta to the last PR is fairly small,\
  \ and the larger PR requires more extensive testing and benchmarking."
