head_commit: f50937e602347332cfa7021fba439c630d083efe
fix_commit: f50937e602347332cfa7021fba439c630d083efe
category: logic
difficulty: medium
severity: critical
language: rust
pr_size: medium
description: Certificate validity was not checked before recursively fetching previous
  certificates in the BFT consensus layer. An attacker could send an invalid certificate
  that triggers unbounded recursive fetching, crashing the validator node. The fix
  moves the certificate validity check earlier in the processing flow, before any
  recursive operations.
expected_findings:
- file: node/bft/src/primary.rs
  line: 955
  summary: 'Missing early certificate validity check: incoming certificates should
    be validated before recursively fetching previous certificates to prevent DoS
    via crafted invalid certificates'
- file: node/bft/src/helpers/storage.rs
  line: 494
  summary: Certificate storage operations proceed without prior validity verification,
    enabling recursive fetch of previous certificates from an unvalidated source certificate
