introducing_pr_body: "This PR exposes the functionality introduced to snarkVM in https://github.com/ProvableHQ/snarkVM/pull/2742\
  \ via the REST API.\r\n\r\nCreating a checkpoint at location `/home/aleo_ledger_checkpoints/1`:\r\
  \n```\r\ncurl -X POST http://localhost:3030/mainnet/db_backup?path=/home/aleo_ledger_checkpoints/1\r\
  \n```\r\n\r\nRolling back to (or, more precisely, switching to) the aforementioned\
  \ checkpoint:\r\n```\r\nsnarkos --storage=/home/aleo_ledger_checkpoints/1\r\n```\r\
  \nAlternatively, the original ledger can be removed, and manually substituted with\
  \ the checkpoint.\r\n\r\nIn addition to the [root issue](https://github.com/ProvableHQ/snarkVM/issues/2707):\r\
  \n- the checkpoint's location can have any name - it only needs to be a non-existent\
  \ one\r\n- (almost - depends on the hard link limits of the filesystem) any number\
  \ of checkpoints can be created locally\r\n\r\nFiling as a draft, pending community\
  \ feedback wrt the scope."
