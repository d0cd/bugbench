introducing_pr_title: '[Feature] Support endpoints for querying historical data for
  the `delegated`, `bonded`, and `unbonding` mappings.'
introducing_pr_body: "This PR exposes endpoints for querying previous states of the\
  \ `delegated`, `bonded`, and `unbonding` mappings in credits.aleo.\r\n\r\nIf the\
  \ history feature is enabled, the node will log data (via a feature-enabled snarkVM)\
  \ and expose the `// GET /{network}/block/{blockHeight}/history/{mapping}` endpoint\
  \ for users to query.\r\n\r\nNote. The entirety of this PR is gated under the history\
  \ feature.\r\n\r\n[CI ran succesfully here](https://app.circleci.com/pipelines/github/ProvableHQ/snarkOS/13349/workflows/91ed0034-7233-4094-88cc-027e7e33bfff)"
