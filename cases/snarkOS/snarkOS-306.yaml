introducing_pr_title: '[Feature] Program Upgradability.'
introducing_pr_body: "This PR introduces updates needed to support program upgradability.\
  \ Concretely:\r\n- updates to the deployment cost to account for constructors.\r\
  \n- updates to the REST API to account for multiple program editions.\r\n- updates\
  \ to `snarkos developer` to support upgrades.\r\n\r\n## Testing with `snarkos developer`\r\
  \n\r\n@reviewers open question on where this should be documented.\r\n\r\n1. Start\
  \ up a `testnet` devnet using `devnet.sh`. Be sure to use the `test_network` feature.\r\
  \n2. Set up a test program. In a new directory, create:\r\n```\r\n// program.json\r\
  \n{\r\n  \"program\": \"test_program.aleo\",\r\n  \"version\": \"0.1.0\",\r\n  \"\
  description\": \"\",\r\n  \"license\": \"\",\r\n  \"dependencies\": null,\r\n  \"\
  editions\": {}\r\n}\r\n```\r\n```\r\n// main.aleo\r\nprogram test_program.aleo;\r\
  \n\r\nfunction main:\r\n    input r0 as u32.public;\r\n    input r1 as u32.private;\r\
  \n    add r0 r1 into r2;\r\n    output r2 as u32.private;\r\n\r\nconstructor:\r\n\
  \    assert.eq true true;  \r\n```\r\n3. Deploy the initial program.\r\n```\r\n\
  snarkos developer deploy --private-key APrivateKey1zkp8CZNn3yeCseEtxuVPbDCwSyhGW6yZKUYKfgXmcpoGPWH\
  \ --network 1 --priority-fee 0 --broadcast http://localhost:3030/testnet/transaction/broadcast\
  \ --query http://localhost:3030 test_program.aleo\r\n```\r\nNote, your `snarkos`\
  \ will need to have the `test_network` feature enabled.\r\n4. Check the edition.\r\
  \n```\r\ncurl http://localhost:3030/testnet/program/test_program.aleo/latest_edition\r\
  \n```\r\n5. Update the edition in `program.json` for `test_program.aleo` to 1.\r\
  \n```\r\n{\r\n  \"program\": \"test_program.aleo\",\r\n  \"version\": \"0.1.0\"\
  ,\r\n  \"description\": \"\",\r\n  \"license\": \"\",\r\n  \"dependencies\": null,\r\
  \n  \"editions\": {\r\n    \"test_program.aleo\": 1\r\n  }\r\n}\r\n```\r\n6. Deploy\
  \ again.\r\n```\r\nsnarkos developer deploy --private-key APrivateKey1zkp8CZNn3yeCseEtxuVPbDCwSyhGW6yZKUYKfgXmcpoGPWH\
  \ --network 1 --priority-fee 0 --broadcast http://localhost:3030/testnet/transaction/broadcast\
  \ --query http://localhost:3030 test_program.aleo\r\n```\r\n7. Check the edition.\r\
  \n```\r\ncurl http://localhost:3030/testnet/program/test_program.aleo/latest_edition\r\
  \n```"
