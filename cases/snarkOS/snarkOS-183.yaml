introducing_pr_title: '[ZKS-00] Implement block-per-anchor instead of block-per-subdag'
introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR implements\
  \ the `block-per-anchor` model to replace the current` block-per-subdag` model.\
  \ This is done by using the `is_linked` method and recursively finding sub-sub-dag\
  \ anchors (to commit as blocks) in the top level committed Subdag.\r\n\r\n\r\nAudit\
  \ Finding: **[zksecurity 00] Commit Flow Can Lead to Safety Violation**"
