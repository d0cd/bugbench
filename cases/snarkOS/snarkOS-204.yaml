introducing_pr_title: Don't stop the node abruptly when syncing with CDN
introducing_pr_body: "This PR ensures that the CDN sync process can be interrupted\
  \ cleanly. I've tested it several times and haven't encountered any issues.\r\n\r\
  \nnote: normally I'd prefer to signal the sync to stop and then conclude the shutdown\
  \ from within the signal handler, but due to the sync being done via an async stream,\
  \ it is much simpler for the signal handler to notify the stream so that it calls\
  \ the shutdown instead."
