description: The REST API's `is_synced` field incorrectly reported `true` while a
  client was still fetching blocks from CDN. This occurred because `BlockSync` is
  initialized as synced and only transitions to 'syncing' upon receiving block locators
  from peers, which doesn't happen during CDN fetches. The fix adds a `!cdn_sync`
  guard so `is_synced` returns `false` while CDN sync is in progress.
expected_findings:
- file: node/rest/src/routes.rs
  line: 158
  summary: 'Incomplete sync check: `is_synced` only checks `is_block_synced()` but
    does not account for ongoing CDN sync, causing it to incorrectly report true during
    CDN fetching. Should be `!cdn_sync && rest.routing.is_block_synced()`.'
