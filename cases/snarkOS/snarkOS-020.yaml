introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR introduces\
  \ the `cuda` feature flag to certain relevant snarkOS crates. The use of this new\
  \ feature flag enables the use of snarkVM level CUDA optimizations for MSMs and\
  \ NTTs. This will enable nodes to use GPU optimizations during operation.\r\n\r\n\
  The `run_prover.sh` script has been updated to support CUDA, and the README has\
  \ been updated to reflect the changes. The other scripts have not yet been updated\
  \ until more testing is completed.\r\n\r\nAt this time, the optimizations are only\
  \ available for Nvidia GPUs with support for Cuda 9 or later.\r\n\r\n### Requirements:\r\
  \n- Cuda sm_70 or later\r\n- [Cuda Toolkit (nvcc)](https://docs.nvidia.com/cuda/index.html#installation-guides)\r\
  \n\r\n\r\nNote that this is still **UNDER ACTIVE DEVELOPMENT** as there are many\
  \ additional optimizations to be made (and audits to be conducted).\r\n\r\n## Related\
  \ PRs\r\n\r\nhttps://github.com/ProvableHQ/snarkOS/pull/2130\r\n"
