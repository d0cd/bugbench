introducing_pr_title: '[Feat] Add a network delay script'
introducing_pr_body: "This PR introduces a script which can be used to introduce kernel-level\
  \ network delays, in order to test local nodes under more real-life network conditions\
  \ (i.e. with some base latency), how the nodes run under high network stress, or\
  \ when one or more of the nodes are less reliable than the rest.\r\n\r\nThe usage\
  \ is described in the script itself.\r\n\r\nNotes:\r\n- the script is Linux-only\r\
  \n- it requires `sudo` to run (since we're adjusting kernel settings)\r\n- these\
  \ changes are ephemeral, and don't persist across OS restarts\r\n- it doesn't matter\
  \ if the nodes are already running or not\r\n- the active config can be changed\
  \ at any time\r\n- every execution starts with a clear slate, i.e. to add an extra\
  \ port, you need to include it with the ones from before\r\n\r\nCloses https://github.com/ProvableHQ/snarkOS/issues/4047."
