introducing_pr_title: '[Fix] Clean up devnet peering and other CI script improvements'
introducing_pr_body: "### Motivation\r\nI ran into a few more issues with the devnet\
  \ script while working on #4033. This PR isolates those changes into a separate\
  \ PR. \r\n\r\n### Overview of Changes\r\n* [c5c738f](https://github.com/ProvableHQ/snarkOS/pull/4043/commits/c5c738f412e31fa50b6b8948fdcea95923bc8673)\
  \ reworks how devnet nodes connect to each other. See longer description below.\r\
  \n* [c1280fc](https://github.com/ProvableHQ/snarkOS/pull/4043/commits/c1280fcd36d3f0270af0d59f77fdea809a21555d)\
  \ ensure that a node failing during devnet setup shuts down the script.\r\n* [70f7302](https://github.com/ProvableHQ/snarkOS/pull/4043/commits/70f7302ec6d4acae90af17f27451f47896829f49)\
  \ fixes all warnings for `shellcheck -x .ci/*.sh`.\r\n* [3638c79](https://github.com/ProvableHQ/snarkOS/pull/4043/commits/3638c7963e862fcd2da03f426105a39aa9f746e8)\
  \ adds a CI job that runs `shellcheck` on all CI scripts. This allows us to catch\
  \ bugs in the scripts earlier\r\n\r\n### Devnet Changes\r\n* Each client now connects\
  \ to two validators\r\n* Validators add clients to their trusted peers (requires\
  \ passing the new `--dev-num-clients`\r\n* Most peering code has been removed from\
  \ `devnet_ci.sh` \r\n"
