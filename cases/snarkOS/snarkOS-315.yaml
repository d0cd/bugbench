introducing_pr_number: 3697
introducing_pr_title: '[Feature] process transactions based on the priority fee'
introducing_pr_body: "This PR introduces a priority queue for transactions containing\
  \ a nonzero priority fee. This is drained before the pre-existing transactions queue\
  \ when sending transactions to the BFT.\r\n\r\nA few notes on the current design:\r\
  \n\r\n1. Priority fees for transactions already in the mempool cannot be updated.\r\
  \n2. There is no protection against starvation: if the priority pool stays full\
  \ enough, transmissions from the standard queue will not be sent to the BFT.\r\n\
  3. Batch building is **not** atomic w.r.t. the memory pool. \r\n\r\n\r\nSupersedes\
  \ #3695. "
