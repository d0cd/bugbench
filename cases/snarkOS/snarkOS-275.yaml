introducing_pr_title: '[Feature] Introduce rolling Message versions '
introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR updates\
  \ the Message::Version used in the router to be based on a rolling migration. This\
  \ allows for smoother behavior whenever there is a breaking migration that requires\
  \ nodes to upgrade versions. The intention is to allow the following:\r\n\r\n1.\
  \ At block height `X`, the protocol upgrades to message version from `Y-1` to `Y`.\r\
  \n2. Client A upgrades and starts using message version `Y`.\r\n3. Client B has\
  \ not upgraded and still uses message version `Y-1`.\r\n4. Until block `X`, they\
  \ stay connected and can communicate.\r\n5. After block `X`, Client A will reject\
  \ messages from Client B.\r\n\r\nThis behavior will allow smoother upgrades by allowing\
  \ client nodes to stay connected and process blocks up until the actual migration\
  \ height rather than immediately after peers upgrade. \r\n\r\nNote that this does\
  \ not touch Validator's `Event::Version` because we want those to stay fixed and\
  \ in lock-step, at least until this change is fully tested.\r\n\r\n## Test Plan\r\
  \n\r\nBasic validator + clients devnet has been run locally, but more extensive\
  \ testing needs to be done to test general cases. A couple to consider are:\r\n\r\
  \n- Local network\r\n  - [x] Client nodes + Prover nodes with this PR @kpandl \r\
  \n- Canary network\r\n  - [x] this PR snarkOS client @kpandl \r\n\r\n"
