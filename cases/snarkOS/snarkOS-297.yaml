introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nPreviously we\
  \ were skipping incoming REST transactions and solutions if the node was not synced.\
  \ This adds a bit of leniency, so that these solutions/transactions will be processed\
  \ as long as the node is within `SYNC_LENIENCY` of being synced.\r\n\r\nCurrently\
  \ the `SYNC_LENIENCY` is set to 10 blocks.\r\n"
