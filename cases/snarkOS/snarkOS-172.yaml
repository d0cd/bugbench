introducing_pr_title: Use previous committee for quorum and membership checks
introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR updates\
  \ the quorum checks and committee membership checks for each certificate and proposal\
  \ to the the previous certificate. This is required because if we use the current\
  \ committee instead of the previous, new committee changes could cause invalid certificate\
  \ state.\r\n\r\nExample:\r\nIf a committee is changed in round 5, then certificates\
  \ from round 5 must be checked with a committee in round 4.  In addition, round\
  \ 6 must also use the committee in round 4, because round 5 can't be committed without\
  \ round 6. \r\n\r\nPreviously we were not testing committee changes, so using the\
  \ use of `current_committee` was fine because the quorum requirements would be the\
  \ same."
