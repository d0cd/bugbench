fix_pr_title: '[Fix] Detach the BFT metrics from events'
fix_pr_body: "This PR decouples the connection-related BFT metrics from events, in\
  \ order to provide a clearer picture regardless of any potential slowdowns.\r\n\r\
  \nFixes https://github.com/ProvableHQ/snarkOS/issues/4145."
