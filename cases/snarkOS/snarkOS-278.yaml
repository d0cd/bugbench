introducing_pr_title: Deduplicate blocksync
introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThere are two\
  \ different code paths that perform block synchronization: one for validators, and\
  \ one for clients/provers.\r\nIn the case of validators, there exist two different\
  \ instances of `BlockSync`. \r\n\r\nThis PR aims to address this by moving code\
  \ that specific to validators or clients. It also improves documentation of the\
  \ block synchronization logic.\r\nFinally, the PR serves as the basis for upcoming\
  \ changes to block synchronization that will harden security and improve performance\
  \ of the protocol.\r\n\r\n## Overview\r\n\r\nThe following is an outline of the\
  \ structs affected by this PR. It also highlights which structs received significant\
  \ changes. \r\n\r\n![Outline](https://github.com/user-attachments/assets/81ea8960-b707-44d1-b15f-e9e10ab5f24f)\r\
  \n\r\n## Changes\r\n\r\nThere have been a multiple updates to this PR, and I would\
  \ prefer if it gets squashes before a merge to not clutter the commit history too\
  \ much.\r\n\r\nBelow is a list of the first set of commits that implemented the\
  \ vast majority of the PR.\r\n*  [509c266](https://github.com/ProvableHQ/snarkOS/pull/3543/commits/509c2666b39db5d9edf1dfc6ba913eaf56fb925e)\
  \ changes the validator code to only use one instance of `BlockSync`.\r\n*  [258ffcb](https://github.com/ProvableHQ/snarkOS/pull/3543/commits/258ffcb2e82033f0a1cffd7f85831dffcf1e4bb2)\
  \ and [173e8e4](https://github.com/ProvableHQ/snarkOS/pull/3543/commits/173e8e4c311c417e92a513885082343dfcadd9f9)\
  \ perform minor clean-ups and improve code documentation/comments.\r\n* [4adaf15](https://github.com/ProvableHQ/snarkOS/pull/3543/commits/4adaf15234b2b4575cad1c5d343f76669d34bc0b)\
  \ removes duplicated code from testing, because we need to pass `BlockSync` every\
  \ time due to the very first commit.\r\n* Finally, [0c75996](https://github.com/ProvableHQ/snarkOS/pull/3543/commits/0c75996490770d0ef6de5d263e97146714293cfb)\
  \ significantly refactors BlockSync and moves all client specific code to the client.\r\
  \n\r\n## Test Plan\r\n\r\nExisting tests should suffice, as this PR does not change\
  \ any functionality. \r\n\r\n\r\n"
