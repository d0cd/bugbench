introducing_pr_title: Spam connections and forged block locators fix
introducing_pr_body: "## Motivation\r\n\r\nThe motivation behind this PR is to have\
  \ a mechanism of banning peer IPs as outlined [here](https://github.com/AleoNet/snarkOS/pull/3388)\
  \ to mitigate cases that might stall client/validators.\r\n\r\n## Approach\r\nA\
  \ banned peers list was implemented to store peers acting maliciously that are banned\
  \ for 300 seconds. If a peer sends more than 10 connection requests in under 10\
  \ seconds they get banned and if a peer does not respond to block requests within\
  \ 600 seconds ( can be changed ) they get banned.\r\n\r\n## Test Plan\r\n\r\nThis\
  \ was tested on an isolated network with a different ip/machine per peer. Plan is\
  \ to test this out on the Canary network with the relevant attacks.\r\n\r\n## Related\
  \ PRs\r\n\r\nhttps://github.com/AleoNet/snarkOS/pull/3366\r\nhttps://github.com/AleoNet/snarkOS/pull/3388\r\
  \n"
