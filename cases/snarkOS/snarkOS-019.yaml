description: The build script (build.rs) was missing an additional locktick check
  when resolving configuration values. The code at two parallel locations (around
  lines 167 and 211) processes environment variable overrides for TOML configuration
  values but failed to perform a necessary lock validation step, which could cause
  build inconsistencies or incorrect configuration resolution. The fix adds the missing
  locktick check at both code paths.
expected_findings:
- file: build.rs
  line: 167
  summary: Missing locktick check before processing env variable overrides for TOML
    values; configuration could be resolved without proper lock validation
- file: build.rs
  line: 211
  summary: Missing locktick check in second code path that overrides TOML values with
    env variables; same validation gap as line 167
