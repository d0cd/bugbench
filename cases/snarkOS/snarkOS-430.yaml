introducing_pr_body: "## Motivation\r\n\r\nAdd feature flag to be able to lower coinbase\
  \ and proof targets for testing purposes. This feature flag will lower the proof\
  \ and coinbase targets to 8 and 32 respectively.\r\n\r\nThe feature flag needed\
  \ to be cascaded to all dependencies of snarkVM to be sure everything uses same\
  \ constants.\r\n\r\nTo use, compile with --features test_targets\r\ne.g.\r\n\r\n\
  `cargo install --locked --features test_targets --path .`\r\n\r\n## Test Plan\r\n\
  \r\ntested by using tx-cannon and adding println to verify correct targets, and\
  \ by checking the genesis block.\r\n\r\nOnly `testnet` and `canary` in `--dev` mode\
  \ have lower targets.\r\n\r\n[CI link](https://app.circleci.com/pipelines/github/ProvableHQ/snarkOS/13686/workflows/2efc80fc-9c83-47cf-88c0-67b27ee9ab53)\r\
  \n\r\n## Related PRs\r\n\r\nReplaces: https://github.com/AleoNet/snarkOS/pull/3378"
