introducing_pr_title: Cache transmissions for faster processing
introducing_pr_body: "## Motivation\r\n\r\nThe `prepare_advance_to_next_quorum_block`\
  \ function incurs significant processing time, which contributes to increased block\
  \ times. Based on a flamegraph analysis, time-consuming operations are the deserialization\
  \ of objects, or more general, retrieving transmissions from storage.\r\n\r\nTherefore,\
  \ this PR introduces an LRU cache for transmissions inside the `BFTPersistentStorage`.\
  \ The transmissions are inserted into the cache in the `insert_transmissions` function,\
  \ alongside with the insertion into the persistent storage. The `get_transmission`\
  \ function will first try to retrieve the transmissions from the LRU cache, and\
  \ if it fails, try to retrieve it from the persistent storage.\r\n\r\n## Test Plan\r\
  \n\r\nRan it locally, and also ran a load test (high tps of `transfer_public` executions)\
  \ on aws. Thereby, we observed a ~50% reduction in block times.\r\n\r\nPlease note:\
  \ The cache aims to cover two rounds of transmissions. As such, it can store `MAX_COMMITTEE_SIZE\
  \ * MAX_TRANSMISSIONS_PER_BATCH * 2 = 1500`  transmissions. At the current `MAX_TRANSACTION_SIZE`\
  \ of 128 kB, this results in approximately 188 MB additional memory use."
