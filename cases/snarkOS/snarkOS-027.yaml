fix_pr_title: ' Limit parallel processing for clients'
fix_pr_body: "## Motivation\r\n\r\nClients run out of memory because they have no\
  \ limit on how many transactions or solutions they verify in parallel. This PR proposes\
  \ to queue them (just like the validator does in Consensus) and limit how much parallel\
  \ verification we do.\r\n\r\nWe can do a lot of clever things to increase the processing\
  \ speed, like check how many constraints the incoming transactions have, await on\
  \ a channel to rapidly start verifying, but the focus for now is simplicity and\
  \ safety.\r\n\r\nEven though it was [recently suggested clients should have at least\
  \ 128 GiB of memory](https://github.com/AleoNet/snarkOS/pull/3351), the current\
  \ implementation uses \"only\" up to 30 GiB for transaction verification. The right\
  \ number is up for debate.\r\n\r\n## Test Plan\r\n\r\n[CI passed](https://app.circleci.com/pipelines/github/ProvableHQ/snarkOS?branch=max_concurrent_deploy_verification_2-ci)\r\
  \nRan a local network shooting some executions.\r\nIn canary, more serious concurrent\
  \ traffic can be shot at the network.\r\n\r\n## Related PRs\r\n\r\nPotentially closes:\
  \ https://github.com/AleoNet/snarkOS/issues/3341\r\nReplaces: https://github.com/AleoNet/snarkOS/pull/2970"
