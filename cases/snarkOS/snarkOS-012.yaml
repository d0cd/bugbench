fix_pr_title: '[Feature] Do not sync when peer consensus version differs'
fix_pr_body: "This PR fixes #3822. It adds a `latest_consensus_version` to a block\
  \ response to prevent nodes that did not upgrade from block advancement.\r\n\r\n\
  If the peers use different versions of snarkOS, it will either fail to deserialize\
  \ the block response, or abort when it detects that the version do not match.\r\n\
  \r\n**Note:** This requires upgrading the message version, as the format for `BlockResponse`\
  \ changed."
