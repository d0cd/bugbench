issue_bodies:
  '3822': "## \U0001F680 Feature\n\nCurrently, if a node does not upgrade in time\
    \ for a new consensus version, they may continue to produce blocks, and other\
    \ clients may continue to sync from these nodes, until the point where they end\
    \ up switching syncing to the canonical chain. Ideally, both honest and dishonest\
    \ honest don't advance anymore as soon as the mismatch is observed.\n\nWe should\
    \ decide which of the following options are feasible, and in which order we'll\
    \ implement them.\n\n# TL;DR starting goal\nIndividual BlockSync Block responses\
    \ should note the `ConsensusVersion` of `blockresponse.last().height`, so the\
    \ requester can disconnect if it doesn't match their expectation of what the ConsensusVersion\
    \ should be at that height.\n\n# Theoretical overview\n\n## Consensus and Certificate\
    \ Sync\n1. Validators sign off on each other's advertised consensus version and/or\
    \ recent block (height hash) in their certificate.\n2. Validators optimistically\
    \ announce their current consensus version and/or recent block (height, hash)\
    \ in their handshake or a P2P message. Note that \"rolling message versions\"\
    \ like we implement for clients might be tricky due to intricacies of how certificates\
    \ work.\n\n## Block Sync\n1. Honest approach: blocks or sync messages announce\
    \ the consensus version, so the requester can check this\n2. Dishonest approach:\
    \ we actually fetch and compare blocks from multiple nodes, which is a longer-term\
    \ effort\n"
