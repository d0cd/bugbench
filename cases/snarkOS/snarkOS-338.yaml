introducing_pr_title: '[Feat] Limit peer pool size, remove banned peers from the pool'
introducing_pr_body: "This PR is larger than I expected, so I decided to also create\
  \ an [issue](https://github.com/ProvableHQ/snarkOS/issues/3904) for the remaining\
  \ bits.\r\n\r\nThe changes are as follows:\r\n- https://github.com/ProvableHQ/snarkOS/commit/650bcd8ed55bab870a8bf9bde1a056bf24e169ce\
  \ - a prerequisite for aligned peer removal, and a useful change on its own; it\
  \ just replaces the `Router`'s `Resolver` with the one from the `Gateway`, using\
  \ it for both entities\r\n- https://github.com/ProvableHQ/snarkOS/commit/0d553b3884cb4f5d505d7a930730c040f92a40ba\
  \ - makes peer removal distinct from its status downgrade, and aligns it between\
  \ the `Gateway` and the `Router`, moving all auxiliary cleanups to the `Disconnect`\
  \ trait which already handles those\r\n- https://github.com/ProvableHQ/snarkOS/commit/edabb73ce7ba92a21e868fc96e87bf9c5fc3d6d9\
  \ - causes bans to prune the related peers from the pool\r\n- https://github.com/ProvableHQ/snarkOS/commit/2a58ca2bfcf6c3cfdbcc4a3f4b66fa474d4bacb5\
  \ - disallows outbound connections to IP-banned peers; it's already done in the\
  \ handshake, but this makes it more performant\r\n- https://github.com/ProvableHQ/snarkOS/commit/52f0934b5bcee3a3086d5f8464ea8efa98f8b8de\
  \ - removes any banned IPs from inbound peer lists\r\n- https://github.com/ProvableHQ/snarkOS/commit/dfd553c7d7e2b5f22b5a19d94d04f84f09b623af\
  \ - aligns the way candidate peers are inserted in both the `Gateway` and the `Router`,\
  \ and makes it so that validator peer lists go through the peer pool before any\
  \ connection attempts are made to them (in order for the heartbeat to fully control\
  \ that process)\r\n- https://github.com/ProvableHQ/snarkOS/commit/07763e54f2e25ecfc002832ac07ccbb8779eeeca\
  \ - applies candidate peer slashing when new entries are about to breach the peer\
  \ pool size limit\r\n\r\nOpen points: \r\n- the exact values for the new limits\r\
  \n- this approach doesn't guard us from breaching the peer pool size limit when\
  \ we receive a direct connection from an unknown peer; if we want to do so, I propose\
  \ to do it as a follow-up, as it may also be a larger change than one might expect\
  \ (if it is to be performant and idiomatic)\r\n- there is a minor difference between\
  \ how the `Gateway` and the `Router` filtered `dev` addresses (`!is_local_ip` vs\
  \ `!is_bogon_ip`); I left the latter for now, but this may need to be distinguished\
  \ based on `Self::OWNER` if we see any test/devnet issues\r\n\r\nCloses https://github.com/ProvableHQ/snarkOS/issues/3872.\r\
  \nCC https://github.com/ProvableHQ/snarkOS/issues/3888."
