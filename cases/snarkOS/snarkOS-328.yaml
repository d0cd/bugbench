introducing_pr_body: "## New Features\r\n* `BlockSync` now measures sync speed, which\
  \ is reported in the `sync/status` endpoint and shown in the TUI.\r\n* Measures\
  \ changes in sync speed. This will help to reduce sync burstiness in the future.\r\
  \n* Enables measuring BFT sync speeds.\r\n* Adds a simple benchmark for the REST\
  \ API (fetching random blocks). The idea is that improving the speed for the block\
  \ endpoints will also help sync performance.\r\n\r\n## Fixes/Improvements\r\n* Throughput\
  \ calculation is now based on system time (using `$SECONDS`) for higher accuracy.\
  \ `sleep` might sleep longer than the given time, and time spent calling `curl`\
  \ did not count towards the total time with the previous approach.\r\n* Do not count\
  \ initial connection handshake as sync time. These currently take up to 30 seconds\
  \ and distort results.\r\n* Make the scripts runnable on macOS (so we can test them\
  \ easier)"
