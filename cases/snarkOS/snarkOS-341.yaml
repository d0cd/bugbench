introducing_pr_number: 3727
introducing_pr_title: Simplify BlockSync
introducing_pr_body: "### Removes the dedicated responses map\r\nThis part simplifies\
  \ the BlockSync code a lot because we do not need to update two maps when removing\
  \ requests.\r\nOne limitation is that `has_pending_responses` is now slower, but\
  \ it is only called once every sync iteration.\r\n\r\n### Merges `check_block_response`\
  \ and `insert_block_response`\r\nBy merging these two functions, we avoid potential\
  \ race conditions as, because, before, each locked the requests map independently. "
