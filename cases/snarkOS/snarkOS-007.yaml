issue_bodies:
  '3921': 'When querying a block height that the node does not have (yet), it returns
    a "500 Internal Error" instead of "404 Not Found".


    This is problematic because it implies that the query was incorrect, or that there
    was an actual internal error. It also makes it harder to differentiate between
    missing blocks and server errors.

    '
