  \ to `staging` after the other PR is merged.\r\n\r\n* The REST API now returns the\
  \ error chain as JSON\r\n* It will (try to) set the HTTP status code correctly\r\
  \n* CLI can now parse the returned error\r\n* This PR also adds a few new command\
  \ line flags (to help remove noise from the devnet CI logs)\r\n     - `--nobanner`\
  \ hides the Aleo banner at startup\r\n     - `--noupdater` does not check for updates"
