introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\n- Boots up dev\
  \ nodes on a block cached with the parameter's metadata (instead of their verifying\
  \ key)\r\n- Removes `Ready::retain_unconfirmed` and handles filtering at batch proposal\
  \ now (speed)\r\n- Removes check for `self.storage.contains_transmission` when filtering\
  \ at batch proposal (speed)\r\n- Reduces the worker pings to once per 10 seconds\
  \ (load)\r\n- Adds a few missing `spawn_blocking` (load)\r\n- Fixes `WorkerPing`\
  \ `To/FromBytes` to encode `u16` instead of `u32` (safety)\r\n- Adds a cache to\
  \ track when a primary has already signed batch proposals from peers (safety)\r\n\
  \r\nFixes Audit Finding: **[zksecurity 01] Lack of Dag Containment Could Lead To\
  \ Safety Violation** with https://github.com/AleoHQ/snarkOS/commit/31a5fe2140150dc7249c7e512112a4d465c6da84"
