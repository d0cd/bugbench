fix_pr_title: '[Logs] Downgrade `tracing-subscriber` due to breaking color changes'
fix_pr_body: "`tracing-subscriber` recently introduced a change to ANSI escape codes,\
  \ such as those used to add color to log output. This breaks the UX and makes logs\
  \ harder to read.\r\n\r\nThe upstream change was to prevent escape code injection.\
  \ However, as fas as I know, we never directly log untrusted user input. Even if\
  \ we do, at the worst case, such an attack can clear the terminal or change its\
  \ title bar.  See this [upstream issue](https://github.com/tokio-rs/tracing/issues/3378)\
  \ for more detail.\r\n\r\nThe proposed PR rolls back `tracing-subscriber` and ignores\
  \ the security warning in `cargo audit`. Hopefully this will be fixed upstream at\
  \ some point."
