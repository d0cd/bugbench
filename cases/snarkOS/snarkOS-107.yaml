introducing_pr_body: "Sets up some basic test helpers and test cases for the primary's\
  \ first round. Testing N rounds requires a more complex state setup. Some key considerations:\r\
  \n- the core structures are seeded with the necessary state to compute the various\
  \ methods tested in each case,\r\n- the gateway is largely ignored, though its resolver\
  \ needs to be seeded with the committee's socket addresses, otherwise some checks\
  \ will fail in various methods,\r\n- I've deduplicated some of the core state setup\
  \ code, perhaps this can be further reduced in future, when the primary is refactored...\
  \ just food for thought. "
