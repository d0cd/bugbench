issue_bodies:
  '2894': "# https://hackerone.com/reports/2272999\r\n\r\n## Summary:\r\nThe  router\
    \ does not check if the PeerResponse is a direct response of a previous PeerRequest\
    \  https://github.com/AleoHQ/snarkOS/blob/testnet3/node/router/src/inbound.rs#L120\r\
    \n\r\nA malicious peer can directly send `PeerResponse` to other peers with high\
    \ frequency. In this way, the other peers' `candidate_peers` will be full of malicious\
    \ peer. Gradually, the good peer's connected peers are all malicious. Finally\
    \ the good peers are disjoint with each oher and whole network is controlled by\
    \ the malicious peers.\r\n\r\n## Steps To Reproduce:\r\n1. Clone https://github.com/AleoHQ/snarkOS\
    \ and checkout `testnet3`\r\n2. Add the following code at: node/router/src/heartbeat.rs\
    \ `heartbeat` function\r\n\r\n```\r\n    /// Handles the heartbeat request.\r\n\
    \    fn heartbeat(&self) {\r\n        self.safety_check_minimum_number_of_peers();\r\
    \n        self.log_connected_peers();\r\n\r\n        //////////////////// ADD\
    \ CODE HERE ////////////////////\r\n        // We can directly send PeerResponse\
    \ to other peers (without previous PeerRequest). We can send PeerResponse with\
    \ high frequency. Attacker can leverage this to attck the whole network.\r\n \
    \       for peer_ip in self.router().connected_peers().into_iter() {\r\n     \
    \       let ip = \"1.1.1.1:111\";\r\n            let malicious_addr: SocketAddr\
    \ = ip\r\n                .parse()\r\n                .expect(\"Unable to parse\
    \ socket address\");\r\n            self.send(peer_ip, Message::PeerResponse(\
    \ PeerResponse { peers: vec![malicious_addr; 100] }));\r\n        }\r\n      \
    \  /////////////////// ADD CODE HERE ////////////////////\r\n\r\n        // Remove\
    \ any stale connected peers.\r\n        self.remove_stale_connected_peers();\r\
    \n        // Remove the oldest connected peer.\r\n       ....\r\n```\r\n3. add\
    \ log at node/router/src/inbound.rs `peer_response` function\r\n\r\n```\r\n  \
    \  /// Handles a `PeerResponse` message.\r\n    fn peer_response(&self, _peer_ip:\
    \ SocketAddr, peers: &[SocketAddr]) -> bool {\r\n        // Filter out invalid\
    \ addresses.\r\n        //////////////////// ADD LOG HERE ////////////////////\r\
    \n        warn!(\"received peer_response {:?}\", peers);\r\n        ////////////////////\
    \ ADD LOG HERE ////////////////////\r\n        let peers = peers.iter().copied().filter(|ip|\
    \ self.router().is_valid_peer_ip(ip)).collect::<Vec<_>>();\r\n        // Adds\
    \ the given peer IPs to the list of candidate peers.\r\n        self.router().insert_candidate_peers(&peers);\r\
    \n        true\r\n    }\r\n```\r\n\r\n4. run ./devnet.sh\r\n5. check log, we will\
    \ find something like\r\n```\r\nWARN received peer_response [1.1.1.1:111, 1.1.1.1:111,\
    \ 1.1.1.1:111, 1.1.1.1:111\r\n```\r\n\r\n6. Attack success: Though the good peer\
    \ haven't made `PeerRequest`, it received malicious `PeerResponse`.\r\n\r\n##\
    \ Proof-of-Concept (PoC)\r\n\r\nHow this bug can be exploited:\r\n\r\n1. The malicious\
    \ peer starts sending a high frequency of PeerResponse messages directly to other\
    \ peers. The PeerResponse messages contain information about the other peers which\
    \ are all controlled by the hacker.\r\n\r\n2. The other peers receive these PeerResponse\
    \ messages and update their candidate_peers list with the information provided\
    \ by the malicious peer.\r\n\r\n3. Due to the high frequency of messages and the\
    \ continuous updates, the candidate_peers list of the other peers becomes populated\
    \ mainly or entirely with malicious peer entries.\r\n\r\n4. As the good peers'\
    \ candidate_peers list becomes filled with malicious peers, the chances of connecting\
    \ to other good peers decrease significantly.\r\n\r\n5. Over time, the good peers'\
    \ connections are predominated by malicious peers, reducing the opportunities\
    \ for good peers to communicate with each other.\r\n\r\n6. Eventually, the good\
    \ peers become disjointed from each other, as their connections are primarily\
    \ with malicious peers.\r\n\r\n7. With the network effectively controlled by malicious\
    \ peers, they can manipulate communication, block transactions, tamper with data,\
    \ or perform other malicious activities without detection or intervention from\
    \ the good peers.\r\n\r\n## Supporting Material/References:\r\n![screenshot-20231205-014632](https://github.com/AleoHQ/snarkOS/assets/136848162/7d8779a0-1f1d-450f-abd4-c3892a7733e3)\r\
    \n\r\n## Impact\r\n\r\nThis bug have signigicant impact on all kinds of node:\
    \ Prover, Validator and Client. The bug allows a malicious peer to flood the network\
    \ with fake peer information, causing good peers to connect primarily with malicious\
    \ peers. This gives the malicious peer control over the network and disrupts communication\
    \ among the good peers. The malicious peers can tamper with transactions, manipulate\
    \ data, and potentially launch further attacks. This undermines trust in the network\
    \ and compromises its security and reliability.\r\n\r\n## Fix Suggestions:\r\n\
    \r\nIn the short term, verify every `PeerResponse ` is a real response of `PeerRequest`.\
    \ In the middle or long term, consider formulating specification about the network\
    \ layer. Also, consider using battle tested framework like `devp2p` and `libp2p`."
