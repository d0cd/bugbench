fix_pr_title: Reject unsolicited `PeerResponse` messages
fix_pr_body: "This PR naively caches sent peer requests until a response is received,\
  \ the goal being to detect when an unsolicited `PeerResponse` message is sent in\
  \ order to influence a node's peer lists. \r\n\r\nTBD:\r\n\r\n- [x] ~~protocol violating\
  \ nodes are currently disconnected and added to the candidate peers. Might be good\
  \ to restrict them instead?~~ (follow up)\r\n- [x] ~~is the naive cache sufficient\
  \ or do we need to track multiple requests to the same peer at a time?~~ Consolidated\
  \ with existing cache.\r\n\r\nI'd recommend reviewing commit by commit as the first\
  \ commit is a file rename.\r\n\r\nFixes #2894.\r\n\r\nDrafted as it has only been\
  \ tested on a local network."
