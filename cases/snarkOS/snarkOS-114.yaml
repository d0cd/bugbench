introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nAdds additional\
  \ safety and perf improvements on narwhal:\r\n- Invoke `propose_batch` if `is_ready\
  \ = true`\r\n- Ensure there are sufficient connected validators before invoking\
  \ `propose_batch`\r\n- Improves safety on `increment_to_next_round` logic\r\n- Uses\
  \ `spawn_blocking` on a handful of expensive operations\r\n\r\nThere is also a general\
  \ improvement to logging hygiene and visibility.\r\n"
