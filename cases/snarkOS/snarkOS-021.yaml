fix_pr_title: Reduce stale transmissions
fix_pr_body: "## Motivation\r\n\r\nCloses https://github.com/ProvableHQ/snarkOS/issues/3514\r\
  \n\r\nAlso fixes a potential bug introduced by https://github.com/ProvableHQ/snarkOS/pull/3471\
