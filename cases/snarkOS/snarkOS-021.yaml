introducing_pr_title: Adding transaction types and aborted transactions/solutions
  to metrics
introducing_pr_body: "## Motivation\r\nIt's useful to have more granular metrics as\
  \ to what types of transactions are included in blocks, as well as aborted transactions\
  \ and solutions.\r\n\r\nThis pr adds 6 new metrics:\r\n```\r\n1. Accepted Deploy\r\
  \n2. Accepted Execute\r\n3. Rejected Deploy\r\n4. Rejected Execute\r\n5. Aborted\
  \ Transactions\r\n6. Aborted Solutions\r\n```\r\n\r\nI did not yet remove the existing\
  \ confirmed transactions (which we can get by summing the accepted deploys and executes),\
  \ but that would probably be best to avoid duplicate data (can sum in post processing\
  \ for analysis).\r\n## Test Plan\r\n<img width=\"1200\" alt=\"Screenshot 2024-04-11\
  \ at 3 42 45 PM\" src=\"https://github.com/AleoHQ/snarkOS/assets/93600681/4c39de53-e6e6-49d3-a0c9-90366e348ada\"\
  >\r\nStill testing to get all types recorded\r\n"
