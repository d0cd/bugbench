fix_pr_title: comments about quorum threshold changed from (2f + 1) to (N - f)
fix_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your\
  \ changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nIn `snarkvm_ledger_committee`,\
  \ `quorum_threshold` is correctly calculated as `N - f`.\r\nSince `N` is not always\
  \ `3f + 1` (it could be `3f + 2` or `3f + 3`),\r\nthe quorum threshold is not always\
  \ `2f + 1`.\r\n\r\nNOTE: no need for CI to pass since only comments were changed.\r\
  \n\r\n"
