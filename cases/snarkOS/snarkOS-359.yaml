introducing_pr_body: "## Motivation\r\n\r\nCloses https://github.com/ProvableHQ/snarkOS/issues/3984\r\
  \nCloses https://github.com/ProvableHQ/snarkOS/issues/3985\r\nDeprecates rotate_external_peers\
  \ which is no longer needed now that we have custom bootstrap peers.\r\n\r\nTackled\
  \ them together in order to reduce the aggregate diff.\r\n\r\n## Test Plan\r\n\r\
  \n- [x] Letting a local devnet produce a few blocks, turning off a validator, revive\
  \ it as a client with --trusted-peers-only to see if it connects and syncs from\
  \ just a single validator.\r\n\r\n## Documentation\r\n\r\nValidator onboarding docs\
  \ will be adjusted accordingly.\r\n\r\n## Backwards compatibility\r\n\r\nThe deprecated\
  \ flags are still present to ensure nodes can still start with them, so as not to\
  \ break any existing workflows."
