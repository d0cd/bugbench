introducing_pr_title: '[Fix] Update sync height in bft::Sync correctly'
introducing_pr_body: "I noticed two potential issues in `snarkos_node_bft::Sync`.\r\
  \n\r\nFirst, when performing the long-range (non-BFT) sync, it would not update\
  \ the sync height and, thus, block sync would try to sync older blocks that we already\
  \ received.\r\n\r\nSecond, there seems to be a case where it would switch to BFT\
  \ sync even if the node is still behind more than GC blocks. This could only happen\
  \ if you received a block right after a non-BFT sync, so it might have never been\
  \ triggered in production.\r\n\r\nThe PR aims to fix both of these issues. It is\
  \ very short and just changes the behavior of `Sync::try_advancing_block_synchronization`\
  \ slightly, so hopefully it can get merged quickly."
