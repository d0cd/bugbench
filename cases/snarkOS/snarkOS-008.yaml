fix_pr_title: '[Fix] Do not tack transmissions that are added to the mempool'
fix_pr_body: "I found one instance in the code where a transaction can be added to\
  \ the `transmissions_tracker` (when metrics are enabled) but will not be added to\
  \ the mempool.\r\n\r\nThis might fix #3907. The PR also adds a few more comments\
  \ to the code that should help the next person looking into this."
