issue_bodies:
  '3907': "## \U0001F41B Bug Report\n\nWhen running stresstests against the latest\
    \ staging branch, we observe lots of stale transmissions [in the metrics](https://aleostresstest.grafana.net/d/prerelease-devnet/prereleasedevnet?orgId=1&from=2025-10-02T10:45:55.528Z&to=2025-10-02T12:12:57.506Z&timezone=browser&viewPanel=panel-66):\n\
    - snarkos_consensus_stale_unconfirmed_solutions\n- snarkos_consensus_stale_unconfirmed_transactions\n\
    \nWe can ignore solutions (which are spammed a lot), but in the test there are\
    \ also up to 500 stale transactions. We should investigate why and resolve this.\
    \ Note that in production, there is a low but non-zero continuous amount of stale\
    \ transmissions, so hopefully fixing the tests will fix production too.\n\nEither\
    \ the metric is still broken, or we have to fix the disappearance of transmissions.\
    \ Given that 98% of transmissions land (based on comparison of *confirmed* and\
    \ *unconfirmed* metrics), the metric is probably at fault.\n\nRelated issue: https://github.com/ProvableHQ/snarkOS/issues/3514\n\
    \n<img width=\"1363\" height=\"423\" alt=\"Image\" src=\"https://github.com/user-attachments/assets/70aef2a6-0a01-490c-a4da-6b3329b86174\"\
    \ />\n\n<img width=\"1717\" height=\"820\" alt=\"Image\" src=\"https://github.com/user-attachments/assets/0ca41812-0c2e-405e-aadb-36c0363f2e28\"\
    \ />"
