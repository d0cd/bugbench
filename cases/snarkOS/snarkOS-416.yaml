fix_pr_title: '[Perf] Use snarkVM''s block caching'
fix_pr_body: "This is a companion PR for [snarkVM #2971](https://github.com/ProvableHQ/snarkVM/pull/2971).\r\
  \n\r\nIt removes the cache in `snarkos-node-bft-ledger-service` and instead uses\
  \ the native mechanism in snarkVM. This allows cached blocks to be available for\
  \ components that use the `Ledger` object directly and not through `LedgerService`.\r\
  \n\r\nThis PR also fixes an issue with the `devnet_ci.sh` script, where the wrong\
  \ `network_id` might be used for cleanup."
