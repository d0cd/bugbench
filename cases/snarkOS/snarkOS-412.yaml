fix_pr_body: "This PR resolves the following point from https://github.com/ProvableHQ/snarkOS/issues/3926:\r\
  \n> validator routers should store just a single router peer per validator address\
  \ in the current committee.\r\n\r\nThe related method is moved from `Gateway` to\
  \ `PeerPoolHandling`, as it is now applicable to the `Router` as well."
