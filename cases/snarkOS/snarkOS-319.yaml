introducing_pr_body: "This PR adds a benchmark workflow using Github Actions (similar\
  \ to the one in snarkVM). It measures sync performance. The benchmarks only run\
  \ for commits on staging and when manually triggered. \r\n\r\n## Graphs\r\nResults\
  \ for benchmark runs can be found on the [Dashboard](https://provablehq.github.io/snarkOS/dev/bench/).\
  \ The dashboard will only contain runs from this PR's branch and staging. See a\
  \ screenshot of the current graph for p2p sync below.\r\n\r\n<img width=\"80%\"\
  \ alt=\"Picture of the p2p sync graph\" src=\"https://github.com/user-attachments/assets/4eca5539-15fd-4bfb-a1bf-2b4cb9c54cda\"\
  \ />\r\n\r\nThe graph also contains additional information for each run, such as\
  \ the git commit used to create the snapshot, in the tooltip.\r\n<img width=\"80%\"\
  \ alt=\"Picture of the tooltip with extra data\" src=\"https://github.com/user-attachments/assets/cc84f6e9-6005-43a1-afa9-7bfd442a282c\"\
  \ />\r\n\r\n## Workflow Summaries\r\nAlternatively, you can go to the workflow summary\
  \ to see results. That is useful when manually triggering runs of the benchmarks.\
  \ See [here](https://github.com/ProvableHQ/snarkOS/actions/runs/17249923552/attempts/1#summary-48949336576)\
  \ for an example of such a summary.\r\n\r\n"
