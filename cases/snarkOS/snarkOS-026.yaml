issue_bodies:
  '3379': "## \U0001F41B Bug Report\r\n\r\nLower level crates enable metrics by default,\
    \ making the higher level `metrics` feature useless. See the appended diff for\
    \ an improved setup [diff.txt](https://github.com/user-attachments/files/16597419/diff.txt).\r\
    \n\r\nThis simple cleanup is not high priority by itself, but it is key that features\
    \ are handled uniformly so that we don't mess up implementing consensus-critical\
    \ features like [test_targets](https://github.com/AleoNet/snarkOS/pull/3378)\r\
    \n\r\n## Expected Behavior\r\n\r\nIdeally the top-level `Cargo.toml` has metrics\
    \ in its `default` feature list, which can be used to enable or disable all metrics\
    \ functionality\r\n"
