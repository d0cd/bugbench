introducing_pr_title: 'Update for ARC-41: handle credits.aleo changes'
introducing_pr_body: "This PR should be merged after the snarkVM ARC-41 changes: https://github.com/AleoNet/snarkVM/pull/2453\r\
  \n\r\n## Summary from snarkVM\r\n\r\nCurrently, validators will need to have 10M\
  \ credits in order to self.bond as a validator. The problem is that most or all\
  \ of these validators won't actually have 10M credits. To bring Aleo in line with\
  \ other ecosystems, we want to relax 2 existing constraints:\r\n\r\nDelegators can\
  \ delegate to any address (with the same 10,000 credit minimum & maximum of 100,000\
  \ delegators) even if that address is not in the committee\r\nValidators only require\
  \ a self bond of 100 credits to join the committee, given the total delegation for\
  \ them is >= 10M credits.\r\nAlthough the changes are significant, the staking abstraction\
  \ should closely follow what existed before.\r\n\r\n## Technical changes\r\n\r\n\
  \  - These changes only require adding support for adding the commission to the\
  \ struct within the committee mapping when generating the genesis block.\r\n  -\
  \ We may also have to bump snarkVM/snarkOS versions"
