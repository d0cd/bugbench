fix_pr_title: '[Refactor] Tighten up high-level connection/peer handling'
fix_pr_body: "We currently have several high-level connection/peer-related collections,\
  \ which provides us with a good overview when reading the objects, but isn't without\
  \ potential issues: it involves multiple lock operations whenever a peer is added\
  \ or removed, which can easily lead to race conditions.\r\n\r\nThis PR is an attempt\
  \ to get rid of these issues altogether by collapsing several collections of simple\
  \ items in favor of a single collection of more complex ones. The basic summary\
  \ of the changes is this:\r\n```diff\r\n# InnerRouter<N: Network> {\r\n#    (...)\r\
  \n-    /// The map of connected peer IPs to their peer handlers.\r\n-    connected_peers:\
  \ RwLock<HashMap<SocketAddr, Peer<N>>>,\r\n-    /// The set of handshaking peers.\
  \ While `Tcp` already recognizes the connecting IP addresses\r\n-    /// and prevents\
  \ duplicate outbound connection attempts to the same IP address, it is unable to\r\
  \n-    /// prevent simultaneous \"two-way\" connections between two peers (i.e.\
  \ both nodes simultaneously\r\n-    /// attempt to connect to each other). This\
  \ set is used to prevent this from happening.\r\n-    connecting_peers: Mutex<HashMap<SocketAddr,\
  \ Option<Peer<N>>>>,\r\n-    /// The set of candidate peer IPs.\r\n-    candidate_peers:\
  \ RwLock<HashSet<SocketAddr>>,\r\n-    /// The set of restricted peer IPs.\r\n-\
  \    restricted_peers: RwLock<HashMap<SocketAddr, Instant>>,\r\n+    /// The collection\
  \ of both candidate and connected peers.\r\n+    peer_pool: RwLock<HashMap<SocketAddr,\
  \ Peer<N>>>,\r\n```\r\n\r\nA short summary of the other changes involved:\r\n- the\
  \ `Peer` becomes an `enum` with 3 possible variants: `Candidate`, `Connecting`,\
  \ and `Connected`\r\n- the `Peer` is no longer `Clone` (to avoid any possibility\
  \ of unintentional duplication)\r\n- new concrete types, `CandidatePeer` and `ConnectedPeer`,\
  \ are isolated for added type safety\r\n- the completion of the high-level network\
  \ handshake and the high-level disconnect now only involve accessing a single collection\r\
  \n- the `Resolver` is only ever modified indirectly, through the `Peer`\r\n- the\
  \ `Resolver` no longer needs to map from the listener address to the connected address\
  \ (the `peer_pool` can do it)\r\n\r\nI tried to limit the scope of the logic changes\
  \ to minimum, and confirmed that they are working by running all the tests locally,\
  \ plus the devnet script.\r\n\r\nFixes https://github.com/ProvableHQ/snarkOS/issues/3705."
