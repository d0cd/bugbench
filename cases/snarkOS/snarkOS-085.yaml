introducing_pr_title: '[Narwhal] proptest design iteration'
introducing_pr_body: "This PR changes snarkos-narwhal's proptesting approach towards\
  \ more composable way. Instead of writing a new struct that mimics the input data\
  \ of test target, only to be able to `#[derive(Arbitrary)]` - we now use more context-specific\
  \ approach:\r\n\r\n- compose module-internal strategy-fns for failure cases and\
  \ specify them in proptest arguments e.g.  `#[strategy(too_small_committee())]`\r\
  \n- compose public strategy-fns for success cases, so that other strategies depending\
  \ on valid structs can be composed as well; if there's a single type of valid struct\
  \ that makes sense, or if too much flexibility hurts the shrinking performance,\
  \ then implement `Arbitrary` as a canonical strategy for the type.\r\n\r\nThe biggest\
  \ benefits are the improved composability and not having to use `#[filter(TestInput::is_valid())]`\
  \ everywhere. This PR also adds few more proptests to validate this. \r\n\r\nFew\
  \ limitations and workarounds I ran into: \r\n- as we cannot implement `Arbitrary`\
  \ for foreign types (e.g. the ones in `snarkvm-narwhal`) we then need to fallback\
  \ to strategy-fns or wrap them into local types. Both have their use cases.\r\n\
  - `Strategy` requires that the generated value implements `Debug`, this isn't the\
  \ case in all our test targets so a custom test implementation may be needed.\r\n\
  - In some cases, we want to make sure that generated values share some input value\
  \ (e.g. use the same `Storage`) - the natural way would be using `any_with(input_value)`\
  \ strategy, but that requires that input value implements `Default`. "
