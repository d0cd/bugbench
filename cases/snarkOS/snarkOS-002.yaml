introducing_pr_title: More fine-grained CDN sync
introducing_pr_body: "The current future-stream-based approach is pretty concise,\
  \ but there are some issues with it:\r\n- adjusting its logic is tricky\r\n- error-handling\
  \ is inconvenient\r\n- it's hard to keep track of the number of pending blocks and\
  \ predict the buffering behavior in general\r\n- the backoff logic is more complicated\
  \ than it needs to be\r\n- despite best efforts, a shutdown may still cause storage\
  \ issues\r\n- some downloads can be very slow due to competition for shared objects\r\
  \n\r\nIn this PR I propose that we instead switch to a simpler approach where we\
  \ spawn a background task responsible for making concurrent requests to the CDN,\
  \ and we can control both the number of desired concurrent requests and the number\
  \ of pending blocks that we keep in memory.\r\n\r\nIn my local runs, it performs\
  \ at least as fast as the current code, while providing us with a much greater degree\
  \ of control over and insight into the progress. In addition, despite many restarts\
  \ I haven't run into any storage failures."
