introducing_pr_title: Add support for account new --save-to-file
introducing_pr_body: "## Motivation\r\nWhen creating ephemeral networks for integration\
  \ testing, it is convenient to be able to generate accounts programmatically and\
  \ save the account information into files, especially the private-key-file for a\
  \ new account.\r\n\r\nTherefore, we introduce the command line switch `--save-to-file`.\r\
  \n\r\n```\r\nsnarkos account new --save-to-file /path/to/test-account-1\r\n```\r\
  \n\r\nThis feature, will create good synergy with the existing feature to use the\
  \ command-line switch `--private-key-file`.\r\n\r\nThe PR is split into two commits\r\
  \n\r\n1. Add the feature to use --save-to-file for account new\r\n1. Add tempfile\
  \ as a dependency\r\n\r\n## Test Plan\r\n\r\nMake sure that you can use the switches\
  \ `--save-to-file` and `--private-key-file` together when using the command-line\
  \ interface (cli).\r\n\r\n## Related PRs\r\n\r\n"
