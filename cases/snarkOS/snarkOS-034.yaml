issue_bodies:
  '3152': "## \U0001F41B Bug Report\r\n\r\n<!-- What's the bug in snarkOS that you\
    \ found? How serious is this bug and what is affected? -->\r\nSnarkOS reports\
    \ protocol violation and disconnects when peers send known solutions.\r\n\r\n\
    The inbound function returns error when it receives a known solution:\r\nhttps://github.com/AleoHQ/snarkOS/blob/8be6ac9a3d2c119d2a2282ba74a0d0886a30a521/node/router/src/inbound.rs#L212-L213\r\
    \n\r\nHowever, it will be regarded as a protocol violation:\r\nhttps://github.com/AleoHQ/snarkOS/blob/8be6ac9a3d2c119d2a2282ba74a0d0886a30a521/node/src/client/router.rs#L116-L122\r\
    \n\r\n## Steps to Reproduce\r\n\r\n<!-- How do I reproduce this issue in snarkOS?\
    \ Are there error messages or stack traces that would help debug this issue? -->\r\
    \nRun node with verbosity 5, observe the logs.\r\n\r\n```\r\n2024-03-04T17:36:59.558190Z\
    \  WARN snarkos_node::client::router: Disconnecting from '147.192.99.28:4133'\
    \ - Skipping 'UnconfirmedSolution' from '147.192.99.28:4133'                 \
    \                               \r\n```\r\n\r\n```\r\n2024-03-04T17:12:27.078139Z\
    \ TRACE snarkos_node_router::inbound: Received 'Disconnect' from '195.90.201.199:4133'\r\
    \n2024-03-04T17:12:27.078194Z  WARN snarkos_node::client::router: Disconnecting\
    \ from '195.90.201.199:4133' - ProtocolViolation\r\n```\r\n\r\n\r\n## Expected\
    \ Behavior\r\n\r\n<!-- What was supposed to happen in snarkOS? What happened instead?\
    \ -->\r\nDon't return error there. Trace and skip.\r\n\r\n## Your Environment\r\
    \n\r\n- <!-- snarkOS Version -->\r\n- <!-- Rust Version -->\r\n- <!-- Computer\
    \ OS -->\r\n"
