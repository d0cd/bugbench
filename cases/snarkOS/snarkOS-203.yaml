introducing_pr_title: '[Optimize] Add guards for processing unconfirmed solutions'
introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR adds\
  \ a few changes to improve syncing and reduce network spam:\r\n\r\n1. Clients perform\
  \ solution verification in `POST /broadcast/solution` prior to solution propagation.\r\
  \n    - This reduces the propagation of invalid solutions on the network.\r\n2.\
  \ Nodes do not process incoming unconfirmed solutions if they are syncing.\r\n \
  \   - This reduces the resource load of nodes and lets them focus on syncing.\r\n\
  3. Nodes do not process incoming unconfirmed transactions if they are syncing\r\n\
  \    - This reduces the resource load of nodes and lets them focus on syncing.\r\
  \n"
