introducing_pr_title: '[Feat] Introduce NodeType::BootstrapClient'
introducing_pr_body: "This PR introduces a new `NodeType::BootstrapClient`, which\
  \ is a light node that can serve peer lists to all kinds of nodes. It also adjusts\
  \ the `OnConnect` behavior of other node types to immediately request a list of\
  \ peers when connecting to one.\r\n\r\nI tested these changes by starting a `--dev\
  \ N --bootstrap-client` node, and connecting to it in both non-validator and validator\
  \ handshake mode from other `--dev` nodes that had it specified as one of their\
  \ `TEST_BOOTSTRAP_PEERS`; I also hardcoded the `mainnet` network once to ensure\
  \ that the latest validator committee is downloaded and deserialized correctly.\r\
  \n\r\nOpen points / suggestions:\r\n- the `bootstrap_peers` function could now be\
  \ removed in favor of introducing candidate peers at node's startup (`CandidatePeer`\
  \ could have an `Option<NodeType>` member, which could also be useful when refreshing\
  \ peers etc)\r\n- the `Event::ChallengeRequest` object is lacking a `NodeType` member,\
  \ making it both incompatible with the `Message::ChallengeRequest` one and forcing\
  \ us to determine the node type based on our list of bootstrap nodes\r\n\r\nStress-tests\
  \ also succeeded after several iterations.\r\n\r\nCloses https://github.com/ProvableHQ/snarkOS/issues/3868."
