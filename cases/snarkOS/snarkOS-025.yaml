fix_pr_title: Fix requests per second, proper error responses, compilation related
  to the curl-sys library
fix_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your\
  \ changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nFixes https://github.com/AleoNet/snarkOS/issues/3402.\
  \ This PR includes a patch for https://github.com/AleoNet/snarkOS/issues/3403, in\
  \ order to get this code to compile.\r\n\r\n## Test Plan\r\n\r\nManually tested\
  \ with low rps, verified that the requests per second did not become 1 after the\
  \ burst quota was exhausted.\r\n\r\n## Additional Details\r\nThis is our patch fix,\
  \ so feel free to adapt this code as necessary. We use `per_nanosecond` instead\
  \ of `per_second` for the replenishment rate, with the goal of replenishing the\
  \ burst rate in full every second. Our primary concern was the rps, which is why\
  \ the 429 (Too many requests) error in particular is handled but other errors are\
  \ defaulted to a 500 (Internal Server Error). Furthermore, related to issue #3403,\
  \ I had to bump the rust version in order to get snarkos to compile.\r\n"
