introducing_pr_title: Initial property test support
introducing_pr_body: "This PR adds the `test-strategy` and `proptest` dependencies\
  \ for convenient property testing, and initial proptests for `Committee` and `Gateway`\
  \ structs. More tests will be added in following PRs, so this is ready for review.\r\
  \n\r\nNote that `test-strategy` has not yet officially released the support for\
  \ async proptests, so the dependency points directly to Github for now (I haven't\
  \ bumped into any quality issues)."
