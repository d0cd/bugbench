introducing_pr_title: '[Fix] Dedup validator heartbeat conns & don''t downgrade peers
  on connection duplicates'
introducing_pr_body: "This is a twofold fix to a handshake-related logic assertion\
  \ hit in a `debug` build:\r\n1. https://github.com/ProvableHQ/snarkOS/pull/3900/commits/1881d68711c158401f0ddf4de43c1a1b129c1186\
  \ - deduplicates outbound connection attempts to trusted validators (also removes\
  \ redundant connection checks that are done in `PeerPoolHandling::connect`); this\
  \ reduces the likelihood of the issue\r\n2. https://github.com/ProvableHQ/snarkOS/pull/3900/commits/85bd920d63a76d078499b257c1919d1965a39672\
  \ - the root fix; it causes duplicate handshake attempts to not register as errors,\
  \ which allows us to not downgrade a peer's status when they occur at the \"wrong\"\
  \ time (it can happen when we have concurrent bilateral handshake attempts with\
  \ a single peer - a latter one can currently invalidate a former one, downgrading\
  \ the peer to `CandidatePeer` status instead of allowing that handshake to conclude)\r\
  \n\r\nFixes https://github.com/ProvableHQ/snarkOS/issues/3897"
