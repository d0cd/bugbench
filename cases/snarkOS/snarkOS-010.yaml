issue_bodies:
  '3893': "## \U0001F41B Bug Report\n\nFrequently, when starting two nodes that connect\
    \ to each other, I get warnings like the following.\n```\n2025-09-27T16:53:48.694791Z\
    \  WARN snarkos_node_router: Unable to connect to '127.0.0.1:4130' - already connecting\
    \ to node at 127.0.0.1:4130\n```\n\nWith the recent peering changes, this now\
    \ also generates the following errors which are misleading.\n```\n2025-09-27T16:53:48.704736Z\
    \ ERROR tcp{name=\"0\"}: snarkos_node_tcp::protocols::handshake: handshake with\
    \ 127.0.0.1:52182 failed: Dropping connection request from '127.0.0.1:4131' (untrusted)\n\
    2025-09-27T16:53:48.704800Z ERROR tcp{name=\"0\"}: snarkos_node_tcp::protocols::handshake:\
    \ handshake with 127.0.0.1:4130 failed: the peer disconnected before sending \"\
    Message::ChallengeResponse\", likely due to peer saturation or shutdown\n2025-09-27T16:53:48.704888Z\
    \ ERROR tcp{name=\"0\"}: snarkos_node_tcp::tcp: Unable to initiate a connection\
    \ with 127.0.0.1:4130: the peer disconnected before sending \"Message::ChallengeResponse\"\
    , likely due to peer saturation or shutdown\n```\n\n### Expected Behavior\nAttempting\
    \ to connect to a peer that is already connecting to us should not create a warning\
    \ or error of any kind. "
