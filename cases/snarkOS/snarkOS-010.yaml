fix_pr_title: '[Feature] Improve (dis-)connect handling between peers'
fix_pr_body: "Fixes #3893. The PR is quite large, below is a high-level overview of\
  \ the changes.\r\n \r\n### Better Connection Handling\r\nThe main purpose of this\
  \ PR is to propagate errors during handshakes \"up\", so the error is logged at\
  \ the appropriate location. It also enables filtering out benign errors such as\
  \ \"Already connecting\". \r\n\r\nThis is achieved by using a concrete `ConnectionError`\
  \ type instead of `anyhow::Error`. Previously, the code also used `Option` or booleans\
  \ to indicate a duplicate connection, which did not make the code very readable.\
  \ To replace those, the new disconnect reasons, mentioned below, are very useful.\r\
  \n\r\n### New Disconnect Reasons\r\nThe PR adds a four new disconnect reasons \"\
  already connecting\", \"already connected\", \"connecting to myself\", \"no untrusted\
  \ external peers allowed\". This avoids those confusing `peer disconnected before\
  \ sending `Message::ChallengeResponse` messages.\r\n\r\nWe previously added support\
  \ for unknown disconnect reasons (see #4018), so this can be added without causing\
  \ problems.\r\n\r\n### Significant Reduction of Connection-Related Warnings\r\n\
  Nodes still generated a significant number of warnings even with these changes.\
  \ One culprit was that the heartbeat logic sometimes reattempted failed connections\
  \ too frequently. The PR now adds a mandatory 10-second cooldown period between\
  \ connection attempts.\r\nIn the future, we should consider increasing the cooldowns\
  \ with every failed attempt.\r\n\r\nAdditionally, I also expanded the notion of\
  \ a grace period at startup, where nodes do not log errors, such as \"no connected\
  \ validators\". Now, nodes do not generate warnings in the first minute about not\
  \ being fully connected.\r\nWe already did this for the stake-related checks, but\
  \ not for other router/gateway errors. \r\n\r\nTo test these changes, the PR adds\
  \ a new check to `devnet_ci.sh` that limits the number of warnings a node is allowed\
  \ to generate. For now, I limited them to 10 per node.\r\nThere are some connections\
  \ related errors at startup that we cannot remove easily; nodes all start concurrently\
  \ and then fail to connect to each other at the first attempt.\r\n"
