introducing_pr_title: Disallow unknown peers as validator
introducing_pr_body: "## Motivation\r\n\r\nExtension to https://github.com/ProvableHQ/snarkOS/issues/3888\r\
  \n\r\nValidator gateways will already only connect to other validators in the current\
  \ committee. We didn't extend this logic to the Router because the Router messages\
  \ aren't signed. However we can at least stick to trusted connections only.\r\n\r\
  \nNotes:\r\n- this will be a pain for validators who have some managed nodes which\
  \ frequently rotate, but if anyone complains we can tackle https://github.com/ProvableHQ/snarkOS/issues/3899\r\
  \n- even though gateways also broadcast transmissions via the `WorkerPing`, this\
  \ PR may reduce validator transmission propagation overall and increase transmission\
  \ inclusion latency, reducing the chance that transmissions land in a proposal.\
  \ However, the validator onboarding guide _already_ implies not to connect to other\
  \ validator's clients.\r\n\r\n\r\n## Test Plan\r\n\r\n- [x] CI passes\r\n"
