introducing_pr_title: '[Fix] Perform block advancement after quorum check'
introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR updates\
  \ the final stage of validator syncing by adding an additional quorum check. Instead\
  \ of blindly adding the block to ledger, we now check that each block's leader certificate\
  \ reached quorum based on the certificates in the subsequent block. \r\n\r\nThis\
  \ solves 2 problems:\r\n\r\n### Naive validator sync\r\n1. A validator synced up\
  \ to tip and added the last block (`X`) without performing any quorum checks. \r\
  \n2. The validator would start processing consensus messages and process incoming\
  \ certificates.\r\n3. It would reach a commit state and try to construct `X` through\
  \ the standard non-sync procedure. \r\n4. However the ledger already stored `X`.\r\
  \n5. An error would repeat, halting block advancement on this node until the node\
  \ was rebooted.\r\n\r\n```\r\n`Unable to advance to the next block - Failed to speculate\
  \ on transactions - Failed to post-ratify - Next round {} must be greater than current\
  \ round {}`\r\n```\r\n\r\nThe change now skips adding the latest block because we\
  \ can't guarantee the block meets the quorum. So we will process the block through\
  \ consensus instead of the sync process.\r\n\r\n### Malicious validator sync\r\n\
  \r\nThe malicious sync case is defined in a hackerOne finding: https://github.com/AleoHQ/snarkOS/issues/3226\r\
  \n\r\nThe new quorum checks should ensure that we are not processing blocks blindly.\r\
  \n"
