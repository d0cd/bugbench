introducing_pr_title: Label tmux windows in devnet as validators or clients
introducing_pr_body: "## Overview\r\nThis PR labels the tmux windows spawned by `devnet.sh`\
  \ more clearly. Each validator spawns in a window labeled `validator-i` (where i\
  \ is its index) and each client in a window labeled `client-i`.\r\n\r\nThe change\
  \ makes it a little easier to figure out which windows run validators, not clients.\
  \ The labels are also identical to the files in which each node's log is stored.\r\
  \n\r\nFinally, the PR also makes log verbosity a constant, so you can change it\
  \ (albeit only by modifying the file) to increase log output when you are debugging.\r\
  \n\r\n## Test Plan\r\n`devnet.sh` is only used for local development and not in\
  \ production. CI also has its own devnet script at `.circle/devnet_ci.sh`.\r\nSo,\
  \ I ran the script locally and verified it works as expected, which should be sufficient\
  \ for a change like this."
