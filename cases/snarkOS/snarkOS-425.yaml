introducing_pr_title: '[Fix] Configure metrics compilation in root toml'
introducing_pr_body: "The `cli` crate currently enables metrics as a default feature,\
  \ this PR moves the feature's configuration to the root level toml, enables it by\
  \ default and introduces a `metrics` feature on `cli`. In addition, `snarks-node-metrics`\
  \ is made optional. \r\n\r\nCorrect configuration can be verified with a reverse-search\
  \ for the metrics crate by feature:\r\n- `cargo tree -e features -i snarkos-node-metrics`\
  \ (which should show matches, metrics being enabled by default)\r\n- `cargo tree\
  \ -e features -i snarkos-node-metrics --no-default-features` (which should show\
  \ no matches)\r\n\r\nFixes #3379. \r\n\r\nThe last commit realigns the dependencies\
  \ in the tcp crate, lmk if I should drop it or move it someplace else. \r\n\r\n\
  Edit: prometheus metric sanity check was also successful with a small devnet. "
