fix_pr_title: '[Feature] Make height metric available during CDN sync'
fix_pr_body: "## Motivation\r\n\r\nPreviously, metrics would show height 0 during\
  \ CDN sync.\r\nThis PR fixes it - a node syncing through CDN will export the current\
  \ sync height through the metrics.\r\n\r\n## Test Plan\r\n\r\nRun `snarkos start\
  \ --client --nodisplay --rest 0.0.0.0:3030 --bft 0.0.0.0:5000 --node 0.0.0.0:4130\
  \ --verbosity 0 --metrics --network 0`. Once the node is syncing, open `http://localhost:9000/metrics`.\r\
  \n\r\nUnder `snarkos_bft_height_total`, it should show the current syncing height.\
  \ Previously, it showed only 0."
