introducing_pr_body: "## Motivation\r\n\r\nSignatures can be created/verified programmatically\
  \ both from [AleoHQ/sdk](https://github.com/AleoHQ/sdk) (web-ui via [aleo.tools](https://aleo.tools/account))\
  \ and within [leo](https://developer.aleo.org/leo/language/#signatures) but not\
  \ from the official snarkOS CLI.\r\n\r\nThis PR creates two straightforward commands\
  \ for working with Aleo signatures:\r\n\r\n- `snarkos account sign <--private-key-file\
  \ <privateKeyFile>|--private-key <privateKey>> -m <message> -s [seed] [--raw]`\r\
  \n    outputs an Aleo signature of the message, signed with the private key.\r\n\
  - `snarkos account verify -s <signature> -m <message> -a <address> [--raw]`\r\n\
  \    outputs `verified` or `invalid` if the signature is verified or invalid respectfully.\r\
  \n\r\nBy default, all messages are snarkVM values so signatures are compatible with\
  \ the [`signature::verify`](https://developer.aleo.org/leo/operators#signatureverify)\
  \ leo operator. If the `--raw` flag is passed, the message will be parsed as bytes,\
  \ which is compatible with the [AleoHQ/sdk].\r\n\r\nThis PR also includes \"lite\"\
  \ documentation in the form of an FAQ entry ([rendered here](https://github.com/AleoHQ/snarkOS/blob/ddd901ba256d40b315f16f79d09a5a1f2d7117c1/README.md#4-how-do-i-use-the-cli-to-sign-and-verify-a-message))\
  \ for how to sign/verify messages.\r\n\r\n## Test Plan\r\n\r\nNo code outside of\
  \ the new features were changed and test coverage is as follows:\r\n\r\n- Signature\
  \ creation (unseeded)\r\n- Seeded signature creation\r\n- Valid signature verification\r\
  \n- Invalid signature verification (message is incorrect)\r\n- Invalid signature\
  \ verification (address is incorrect)\r\n- All of the above using plaintext messages\
  \ (rather than aleo values)\r\n\r\n## Related PRs\r\n\r\nNo related work\r\n"
