fix_pr_title: Build check skip dot folders
fix_pr_body: "## Motivation\r\n\r\nFixes [#4077](https://github.com/ProvableHQ/snarkOS/issues/4077)\r\
  \n\r\nI had the same problem trying to commit with the pre-commit hook and now it\
  \ passes. Also the dot folders are not from the list of `DIRS_TO_SKIP` they are\
  \ skipped by default as they are dot folders. \r\n\r\n## Test Plan\r\n\r\nNow the\
  \ pre-commit hook works, so it is fixed. I can not push branches to `ProvableHQ/snarkOS`\
  \ anymore so this fix comes form a fork.\r\n"
