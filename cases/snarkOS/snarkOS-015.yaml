  summary: Sync state is being updated during block request generation; this should
    only happen when processing responses, block locators, or disconnects.
- file: node/sync/src/block_sync.rs
  line: 715
  summary: Sync state update in request path can leave node in incorrect sync state
    when greatest peer height decreases mid-request.
- file: node/sync/src/block_sync.rs
  line: 740
  summary: 'Missing handling for peer disconnect: greatest peer height is not cleared
    when no block locators remain, causing stale sync state.'
