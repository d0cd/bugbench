description: The node's sync state was incorrectly updated during block request generation
  instead of only when processing responses, new block locators, or disconnects. When
  a peer disconnected and no block locators remained, the greatest peer height was
  not cleared, leaving the node in a stale sync state instead of transitioning to
  'unsynced'. A new `clear_greatest_peer_height` function was added and sync state
  updates were moved to the correct lifecycle points.
expected_findings:
- file: node/sync/src/block_sync.rs
