introducing_pr_title: '[Fix] Limit number of deployments in mempool.'
introducing_pr_body: "A new approach to https://github.com/AleoHQ/snarkOS/pull/2999\
  \ with a focus on simplicity and readability.\r\n\r\nAt 10 deployments at most in\
  \ the deployments_queue, we won't run out of memory (the network message size is\
  \ at most 300 MB).\r\n\r\nAnd we will never verify more than 1 deployment sequentially\
  \ if there are any executions around, making sure we won't take too much compute\
  \ time.\r\n\r\nWe always interweave the verification of some executions and deployments."
