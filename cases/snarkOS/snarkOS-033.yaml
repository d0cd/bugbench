fix_pr_title: '[Test] Add unit test for validator Router connections'
fix_pr_body: "## Motivation\r\n\r\nDue to the recently introduced `--allow-external-peers`\
  \ flag, validator Routers do not by default accept connections from other validator\
  \ Routers. We noticed on tests with only validators that the `snarkos_router_connected_total`\
  \ metric returned 0.\r\n\r\nTo make this behavior clear, added a unit test `test_validator_connection`.\
  \ In order for validator's Routers to connect to one another, their address has\
  \ to be explicitly passed via `--peers`.\r\n\r\nNote that if we want to change that\
  \ behaviour, we need to either:\r\n- add Gateway features to Router (e.g. a `Resolver`\
  \ to track whether we are not connected to the same address twice)\r\n- do a bigger\
  \ refactor to merge Gateway and Router so the validator has just one TCP stack\r\
  \n\r\n## Related PRs\r\n\r\nCloses https://github.com/AleoHQ/snarkOS/issues/3196\r\
  \nCorrects yet another regression from https://github.com/AleoHQ/snarkOS/pull/3163\r\
  \nImproves on https://github.com/AleoHQ/snarkOS/pull/3192"
