introducing_pr_title: '[Feat] Introduce a persistent validator cache'
introducing_pr_body: "This PR introduces a persistent validator cache, similarly to\
  \ https://github.com/ProvableHQ/snarkOS/pull/3820.\r\n\r\nAs a drive-by, there is\
  \ also a reduction of `Arc`s within the `Gateway`, which will reduce the number\
  \ of atomic operations on each clone and drop by 7. This also makes it harder to\
  \ misuse the new `PeerPoolHandling` trait by making separating the peer pool from\
  \ the `Gateway` impossible (CC https://github.com/ProvableHQ/snarkOS/pull/3879).\r\
  \n\r\nNote: the associated issue states that\r\n```\r\nthe same validator can't\
  \ have two ip addresses\r\n```\r\n\r\nI'm assuming this means that we can't have\
  \ two connected `Gateway` `Peer`s that have the same Aleo address. This, however,\
  \ would be a more general change, as it would also affect the way the peer lists\
  \ should be handled.\r\n\r\nI've tested it locally on new validators and after a\
  \ restart - both `cached_router_peers` and `cached_gateway_peers` files are created\
  \ and processed, and the addresses are the ones I expected. Manually altering them\
  \ confirmed that the cache would work for other (non-`dev`) addresses too.\r\n\r\
  \nCloses https://github.com/ProvableHQ/snarkOS/issues/3869."
