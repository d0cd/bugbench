fix_pr_title: '[CI] Ensure devnet does not generate errors'
fix_pr_body: "Fixes #4030.\r\n\r\nThis PR makes two changes:\r\n* [c9267f9](https://github.com/ProvableHQ/snarkOS/pull/4035/commits/c9267f96b84522fe08926b49f2510dcfcbd7d2ac)\
  \ avoids errors about lacking sufficient validator connections within the first\
  \ minute of a node's uptime. As of now, validators will virtually always print this\
  \ error at startup, potentially confusing users.\r\n* [a3606d1](https://github.com/ProvableHQ/snarkOS/pull/4035/commits/a3606d122d77b11d508682caa814c086953a3a32)\
  \ adds a simple check (using `grep`) that no errors were generated when running\
  \ the devnet tests. "
