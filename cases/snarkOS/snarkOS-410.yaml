issue_bodies:
  '4030': '`.ci/devnet_ci.sh` should check that node logs contain no errors, except
    for, maybe, a few select ones. This will allow us catching potential problematic
    code easier in the future and avoid introducing ERROR messages in cases where
    a node is not actually encountering a serious problem.


    Right now, the only error printed is `Not connected to a quorum of validators`.
    This one we could allow, or change it, so the error is not printed until the node
    has been running for a few minutes.


    The implementation could be as easy as `grep "ERROR" *.log | wc -l`.'
