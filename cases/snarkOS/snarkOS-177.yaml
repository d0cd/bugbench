introducing_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining\
  \ your changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR reduces\
  \ network overhead by reducing the number of duplicate certificate and transmission\
  \ requests sent to peers. Previously these duplicate requests were unbounded, but\
  \ now it is limited to the `REDUNDANCY_FACTOR`.\r\n\r\nIn addition, the pending\
  \ request callbacks can now be expired and removed."
