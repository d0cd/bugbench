introducing_pr_title: '[Fix] Improve endpoint handling in CLI'
introducing_pr_body: "This PR mirrors fixes from [snarkOS #2895](github.com/ProvableHQ/snarkVM/pull/2895).\
  \ In particular, to ensure endpoint URLs are valid for a variety of supported hostnames/prefixes.\r\
  \n\r\nThe PR also ensure the error formatting in REST module is correct when there\
  \ are issues with the given endpoint path. The resulting errors are not perfect\
  \ yet, e.g., an invalid program ID still returns this rather cryptic error below,\
  \ but improved error handling can be tackled in a future PR.\r\n\r\n```\r\n~> curl\
  \ http://localhost:3030/v2/testnet/program/foobar\r\n{\"message\":\"Invalid path\
  \ \\\"/program/foobar\\\": unknown error: Failed to parse string. Parsing Error:\
  \ VerboseError { errors: [(\\\"\\\", Nom(Tag))] }\",\"error_type\":\"bad_request\"\
  ,\"chain\":[\"Failed to parse string. Parsing Error: VerboseError { errors: [(\\\
  \"\\\", Nom(Tag))] }\"]}\u23CE\r\n\r\n```"
