issue_bodies:
  '3479': "## \U0001F41B Bug Report\n\nDuring stress tests, it became possible for\
    \ all clients to not be connected to any validators, causing the clients to halt.\n\
    \n## Steps to Reproduce\n\nStart a network with 16 validators and 2 clients per\
    \ validator. All nodes have all other nodes as peer.\n\nOver 4 test runs,  clients\
    \ reliably halt within 4 hours.\n\nNote that clients only have 21 peer slots.\
    \ So the above test causes 32 clients to fill that up instead of the 16 validators).\n\
    \nheartbeat.rs should be fixed.\n\n## Expected Behavior\n\nThe affected logic\
    \ is all in files called heartbeat.rs\n\n### Option 1\n\nClients should stay connected\
    \ to nodes in their trusted peers list which advertise themselves as validator.\
    \ In more detail:\nClients should not disconnect from nodes in their trusted peers\
    \ list which are also validators. Given the current \"core client\" model, this\
    \ should in production only be a single validator. However, other nodes can advertise\
    \ themselves as validators, so there are edge cases to take into consideration.\n\
    \n### Option 2\nAnother option is for peer rotation to *continue* when the clients\
    \ are not synced. \n\n\n"
