fix_pr_title: Prioritize removing clients over validators in the heartbeat logic
fix_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your\
  \ changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis pull request\
  \ fixes #3479 and cleans up the heartbeat logic a little. The logic now prioritizes\
  \ disconnecting nodes over validators to improve connectivity between validators\
  \ and ensure new blocks propagate to clients. \r\n\r\n## Test Plan\r\n\r\nAfter\
  \ talking to Victor I decided against adding tests for this PR and believe we can\
  \ rely on code review to ensure correctness of the changes. The code can only affect\
  \ liveness of the protocol, not safety, and tests would add lot of additional code\
  \ that might need to be refactored later.\r\n\r\n## Notes\r\nThere are few things\
  \ that might need to be improved in the future.\r\n- `remove_oldest_connected_peer`does\
  \ not actually remove the peer with the oldest TCP connection, but the one that\
  \ we have not received any message from in the longest time.\r\n- Some parts of\
  \ the code use \_\"ip\" to refer to a socket address (which is a tuple of IP and\
  \ network port). I already changed some variable names from peer_ip to peer_addr,\
  \ to address this.\r\n- Virtually all the logic resides in the trait declaration\
  \ right now. We should either actually specialize the different implementations,\
  \ or simplify the code by converting Heartbeat to a struct.\r\n"
