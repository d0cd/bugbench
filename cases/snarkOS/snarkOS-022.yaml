description: The quorum check for BFT round advancement was using the current (next)
  round instead of the previous round. When deciding whether to advance from round
  R to R+1, the code checked for a quorum of certificates at round R+1 (which doesn't
  exist yet) instead of round R. The bug was partially masked because validators have
  multiple code paths for round advancement.
expected_findings:
- file: node/bft/src/primary.rs
  line: 1360
  summary: 'Wrong round used for quorum check: `current_round` refers to the round
    being advanced TO (R+1), but the quorum of certificates should be checked at the
    previous round (R). Should use `current_round - 1` or equivalent.'
