fix_pr_title: 'docs(node-network): add crate README'
fix_pr_body: "## Motivation\r\n\r\nThis PR adds a README.md to the `snarkos-node-network`\
  \ crate to document its purpose and responsibilities.\r\nThe goal is to make the\
  \ networking layer easier to understand for contributors by clearly describing peer\
  \ management, connection lifecycle handling, bootstrap peer discovery, and address\
  \ resolution.\r\n\r\n\r\n## Test Plan\r\n\r\nThis change is documentation-only.\r\
  \n- Verified the README renders correctly in GitHub.\r\n- Confirmed no code or build\
  \ artifacts were modified.\r\n\r\n## Documentation\r\n\r\nThis PR introduces crate-level\
  \ documentation for `snarkos-node-network`.\r\nNo additional external documentation\
  \ updates are required at this time.\r\n\r\n## Backwards compatibility\r\n\r\nThis\
  \ PR does not affect runtime behavior or consensus logic.\r\nNo backwards compatibility\
  \ concerns and no `ConsensusVersion` changes are required.\r\n\r\nFixes #4023 \r\
  \n\r\n@raychu86 \r\n"
