issue_bodies:
  '2990': "# https://hackerone.com/reports/2310746\r\n\r\n## Summary:\r\n\r\nCurrently,\
    \ Aleo does not speculate on `Transaction::Fee`:\r\n\r\n```\r\n              \
    \      // There are no finalize operations here.\r\n                    // Note:\
    \ This will abort the entire atomic batch.\r\n                    Transaction::Fee(..)\
    \ => Err(\"Cannot speculate on a fee transaction\".to_string()),\r\n```\r\n\r\n\
    However, malicious can propose a `BatchPropose` with `Fee` transaction. Other\
    \ validators won't check if a `BatchPropose` contains a `Fee` transaction and\
    \ will sign the proposal. Once the `Certificate` with `Fee` transaction is committed,\
    \ it will block the execution of the block. All the validators will be blocked.\r\
    \n\r\n## Steps To Reproduce:\r\n\r\n1. Clone snarkOS\r\n2. Checkout testnet3:\
    \ `git checkout 052457bddbf736f88227c543646890f8588a0efb`\r\n3. Apply the patch\
    \ unchecked_fee_transaction.patch in the attachment: `git apply unchecked_fee_transaction.patch`\r\
    \n4. Run ./devnet.sh (To make it easy to reproduce, run all 4 validators with\
    \ the patch)\r\n5. Wait some round and find the network stuck:\r\n![image](https://github.com/AleoHQ/snarkOS/assets/136848162/91662699-a4f6-403a-bc85-872d4fe49b39)\r\
    \n\r\n\r\nAlso see the attached sample log `sample_log.zip`\r\n[sample_log.zip](https://github.com/AleoHQ/snarkOS/files/13897085/sample_log.zip)\r\
    \n\r\n\r\n## Proof-of-Concept (PoC)\r\n\r\nSee above\r\n\r\n## Fix Suggestions:\r\
    \n\r\nCheck if a `BatchPropose` contains `Transaction::Fee` before signing.\r\n\
    \r\n## Impact\r\n\r\nA malicious validator can broadcast certificate with `Transaction::Fee`\
    \ and block the whole network"
