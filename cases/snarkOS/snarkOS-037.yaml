fix_pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your\
  \ changes. Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR performs\
  \ basic checks on transmissions fetched from batch proposals. We now check that\
  \ the transmission id's match and that the transmission is not a `Fee` transaction.\
  \ \r\n\r\nThis fix does not address all the issues, but is an added mitigation for\
  \ the malicious Fee transmission case. This is an incremental fix for #3098.\r\n\
  \r\n## Related PRs\r\n\r\nThis PR is related to #3098, and is a simpler approach\
  \ that addresses one case of the problem.\r\n\r\nThis PR fixes #2990, but is insufficient\
  \ for #2991."
