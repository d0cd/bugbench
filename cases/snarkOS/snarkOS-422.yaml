fix_pr_title: Remove debug ERRORs from the default verbosity
fix_pr_body: "## Motivation\r\n\r\nWe've been testing snarkOs a lot and our tests\
  \ are trying to detect problems with this new verbosity change we are getting a\
  \ lot of ERROR logs of the type:\r\n\r\n```\r\n2025-06-27T08:51:53.757689Z ERROR\
  \ tcp{name=\u201C0\u201D}: handshake with 18.237.141.71:4130 failed: \u201818.237.141.71:4130\u2019\
  \ disconnected before sending \u201CMessage::ChallengeResponse\u201D\r\n```\r\n\r\
  \nSo we talked with @vicsn to set the logging back to `off` when the verbosity is\
  \ not `>= 6`.\r\n\r\n## Test Plan\r\n\r\nCan be seen by running `devnet.sh` without\
  \ this fix and with it.\r\n"
