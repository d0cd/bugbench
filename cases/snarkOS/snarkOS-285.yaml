introducing_pr_title: Introduce --rotate-external-peers flag to improve bootstrap
  client peering
introducing_pr_body: "## Motivation\r\n\r\nCurrently, the bootstrap client connections\
  \ fill up too quickly, making it cumbersome for new clients/provers to join the\
  \ network. By letting bootstrap clients flush their peers more frequently, new clients\
  \ have an opportunity to connect.\r\n\r\nNaming nits are welcome, we can also go\
  \ for:\r\n- `--flush-external-peers`\r\n- `--evict-external-peers`\r\n- `--bootstrap-client`\r\
  \n\r\nA complementary change would be to increase the number of bootstrap peers.\r\
  \n\r\n### Why not just increase max peers with a --max-peers flag?\r\n\r\n1. It\
  \ does not fully solve the underlying problem, a bootstrap node with more peers\
  \ can fill up just as well\r\n2. It should be hard to mess up configuration for\
  \ average joe. Having a larger number of peers has not been sufficiently tested\
  \ and will likely lead to performance degredation, so if possible the option should\
  \ not be available.\r\n3. Also note that unfortunately doing this cleanly requires\
  \ a lot of code changes because the existing `MAXIMUM_NUMBER_OF_PEERS` variable\
  \ is a compile-time variable and tighly coupled with other logic. Probably because\
  \ @ljedrz  mentions \"~20 peers in a P2P setting being a desirable number is a popular\
  \ notion\".\r\n\r\n## Test Plan\r\n\r\nAfter approval this should be deployed and\
  \ tested.\r\n\r\n## Related PRs\r\n\r\nAims to tackle:\r\n- https://github.com/AleoNet/snarkOS/issues/2960\r\
  \n- https://github.com/AleoNet/snarkOS/issues/3011\r\n- https://github.com/AleoNet/snarkOS/issues/3284"
