introducing_pr_title: '[Build] Remove unused dependencies'
introducing_pr_body: "## Overview\r\nThis PR removes unused dependencies from crates\
  \ in snarkOS. I used `cargo machete` to determine which dependencies are unused.\
  \ While unused code is removed at link-time, removing them outright reduces compile\
  \ times slightly and decreases the size of `Cargo.toml` files. \r\n\r\nThe second\
  \ commit also adds a CI job that runs `cargo machete` to detect any unused dependencies\
  \ on new commits to prevent future bloat. We can only merge the first commit if\
  \ we decide to not automatically test for unused dependencies.\r\n\r\n## Notes and\
  \ \"Future Work\"\r\nThere are a few places (mostly the top-level snarkOS crate)\
  \ where we add indirect dependencies as direct dependencies, solely to enable features\
  \ on them.\r\nMost of these superfluous dependencies are not needed. For example,\
  \ `snarkos` depends on `snarkos-node` so it can enable the `locktick` feature on\
  \ it. But that feature is also enabled by `snarkos-cli` which actually uses the\
  \ `snarkos-node` dependency.\r\nHowever, I did not want to add any more changes\
  \ to this PR, so I simply set some dependencies to be ignored by `cargo machete`\
  \ using the `package.metadata.cargo-machete.ignored` field in `Cargo.toml`.\r\n\r\
  \nThere is also a feature on `snarkos-node` called `parallel` that does not seem\
  \ to be used anywhere, but I did not want to remove it in this PR either.\r\n\r\n"
