description: Large block deserialization was performed synchronously on the tokio
  async runtime thread, blocking the event loop and causing latency/stalls in the
  BFT gateway. The fix offloads the CPU-intensive deserialization of blocks to a rayon
  thread pool, preventing the async runtime from being blocked by heavy computation.
expected_findings:
- file: node/bft/src/gateway.rs
  line: 657
  summary: Block deserialization performed on async runtime thread; CPU-intensive
    work should be offloaded to a blocking/rayon thread pool to avoid starving the
    tokio executor
- file: node/bft/src/gateway.rs
  line: 1002
  summary: Synchronous block deserialization on the async task blocks the event loop;
    should use rayon::spawn or spawn_blocking for large block parsing
- file: node/bft/src/gateway.rs
  line: 1118
  summary: Heavy deserialization work running inline on async thread; needs to be
    moved to a compute thread pool to prevent runtime stalls
