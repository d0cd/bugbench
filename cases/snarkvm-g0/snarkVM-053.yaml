description: Off-by-one error in input validation for `ClosureCore::add_input` and
  `FinalizeCore::add_input`. The boundary check `self.inputs.len() < N::MAX_INPUTS`
  uses the wrong comparison operator, allowing one more input than the intended maximum.
  The fix corrects the comparison to properly enforce the MAX_INPUTS limit, and adds
  corresponding validation tests.
