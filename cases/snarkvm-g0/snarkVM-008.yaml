description: During block deserialization, bounds checks existed for transactions,
  aborted transaction IDs, and aborted solution IDs, but the check for the number
  of solutions was missing. An attacker could craft a malicious payload with an unbounded
  number of solutions, potentially causing memory exhaustion or denial of service.
  The fix adds the missing bounds check in the solutions deserialization path and
  corrects a misleading comment in block deserialization.
expected_findings:
- file: ledger/puzzle/src/solutions/bytes.rs
  line: 20
  summary: Missing bounds check on number of solutions during deserialization. Other
    similar deserialization paths (transactions, aborted IDs) have bounds checks,
    but solutions does not, allowing potentially unbounded allocation.
- file: ledger/block/src/bytes.rs
  line: 36
  summary: Incorrect/misleading comment in deserialization code that does not match
    the actual operation being performed (comment says ratifications but context may
    differ).
