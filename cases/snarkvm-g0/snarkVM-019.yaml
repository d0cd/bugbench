description: New opcodes (including hash.keccak256 and likely other hash/commit variants)
  were missing from the register type validation checklists in initialize.rs. Without
  these entries, the new opcodes would fail validation or be incorrectly rejected.
  The fix adds the missing opcode strings to three separate checklist blocks around
  lines 570, 607, and 639.
