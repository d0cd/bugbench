language: rust
pr_size: medium
description: When loading programs from storage, the VM iterated over them in lexicographical
  order, which could cause a program to be loaded before its imports (dependencies).
  The fix adds a method to expose the deployment store from the transaction store
  and modifies the VM initialization to recursively load each program's imports before
  loading the program itself.
expected_findings:
- file: synthesizer/src/vm/mod.rs
  line: 709
  summary: Programs are loaded from storage in lexicographical order without resolving
    import dependencies first. A program may be processed before its imports have
    been loaded, causing the VM to fail initialization.
- file: synthesizer/src/store/transaction/mod.rs
  line: 263
  summary: The deployment store is not exposed publicly, preventing callers from accessing
    program deployment data needed to resolve and pre-load import dependencies.
