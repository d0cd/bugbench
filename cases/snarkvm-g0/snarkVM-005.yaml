description: 'After PR #2783 removed the `console` feature from other crates, the
  wasm crate still referenced `snarkvm_console` unconditionally and listed `snarkvm_utilities`
  as a regular dependency instead of a dev-dependency. This caused build failures
  when compiling without default features. The fix removes the `console` feature from
  the wasm crate and moves `snarkvm_utilities` to dev-dependencies since only tests
  depend on it.'
