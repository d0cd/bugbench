description: 'Block subdag verification was missing two critical checks: (1) ensuring
  that the next block has consecutive rounds from the latest round in the ledger,
  and (2) ensuring that the subdag is ''atomic'' and not a combination of subdags
  from multiple blocks (via an is_linked check). Without these checks, block forging
  attacks were possible. The fix adds round sequentiality verification in verify.rs
  and subdag atomicity checks in check_next_block.rs.'
expected_findings:
- file: ledger/block/src/verify.rs
  line: 173
  summary: 'Missing validation: subdag rounds are not checked for sequential ordering,
    allowing blocks with non-consecutive rounds to pass verification'
- file: ledger/src/check_next_block.rs
  line: 117
  summary: 'Missing validation: no check that the block subdag is atomic (is_linked),
    allowing a combined subdag from multiple blocks to be accepted as valid'
- file: ledger/src/check_next_block.rs
  line: 136
  summary: 'Missing validation: no check ensuring consecutive rounds between the latest
    ledger round and the next block''s subdag rounds'
