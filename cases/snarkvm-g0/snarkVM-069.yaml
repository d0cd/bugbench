description: The inner circuit was monolithically designed to support only fixed 2-in
  2-out transitions. This PR splits it into separate input circuit, output circuit,
  and value check proof components to support variable M-in N-out transitions per
  transition, fixing the architectural constraint that limited transaction flexibility.
