description: "CircuitVerifyingKey::deserialize used a derived CanonicalDeserialize\
  \ that performed unbounded allocation for the circuit_commitments vector. A malicious\
  \ input could specify an arbitrarily large length, exhausting memory. The fix replaces\
  \ the derive with a custom deserialization that bounds circuit_commitments to 12\
  \ elements (3 matrices \xD7 4 polynomials per Varuna protocol)."
