description: TransmissionID lacked a checksum, allowing malicious validators to tamper
  with solutions or transactions and broadcast malformed objects to other validators
  undetected. The fix introduces a TransmissionChecksum (truncated Sha3_256 hash)
  on Transmission objects and adds it to TransmissionID variants, enabling honest
  validators to detect and disregard tampered transmissions. Additionally, the solution
  target is now overwritten with the value calculated during verification to prevent
  malicious solution injection.
expected_findings:
- file: ledger/narwhal/transmission-id/src/lib.rs
  line: 27
  summary: TransmissionID::Solution variant lacks a checksum field, allowing malicious
    validators to substitute tampered solutions without detection
- file: ledger/src/helpers/bft.rs
  line: 46
  summary: Transmission-to-TransmissionID mapping does not verify or include a checksum,
    so tampered transmissions pass through unchecked
- file: ledger/puzzle/src/solution/mod.rs
  line: 25
  summary: Solution target field is not overwritten with the verified value during
    block production, allowing injection of malicious solutions with arbitrary targets
