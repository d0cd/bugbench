description: The `FromBytes` implementations for `FunctionCore`, `ClosureCore`, and
  `FinalizeCore` read `num_inputs`, `num_outputs`, `num_instructions`, and `num_commands`
  counts from untrusted byte streams without validating them against `N::MAX_INPUTS`,
  `N::MAX_OUTPUTS`, `N::MAX_INSTRUCTIONS`, or `N::MAX_COMMANDS`. An attacker could
  craft malicious bytes with excessively large counts, leading to denial-of-service
  via excessive memory allocation or other undefined behavior. The fix adds bound
  checks immediately after reading each count.
expected_findings:
- file: synthesizer/program/src/function/bytes.rs
  line: 25
  summary: 'Missing bounds check: `num_inputs` is read from untrusted bytes and used
    to drive a deserialization loop without validating it does not exceed `N::MAX_INPUTS`.'
- file: synthesizer/program/src/closure/bytes.rs
  line: 23
  summary: 'Missing bounds check: `num_inputs` is read from untrusted bytes and used
