description: 'The record ciphertext encoding and inner circuit had multiple issues:
  program ID was not publicly exposed in records, record members were not individually
  encoded as field elements (causing unnecessary constraints), and the inner circuit
  included unnecessary transition ID and function type checks inflating constraint
  counts. The fix restructures record encoding, exposes program ID publicly, and removes
  redundant circuit checks, reducing constraints from ~253K to ~244K.'
