description: The Circuit::reset methods did not reset the `in_witness` flag to `false`,
  leaving the circuit in an inconsistent state if a reset/rollback occurred while
  in witness mode. The fix adds `in_witness = false` to all three reset variants so
  the circuit returns to a consistent non-witness state.
