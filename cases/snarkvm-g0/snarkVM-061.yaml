description: The PendingBlocks API was missing or had been inadvertently removed/regressed,
  breaking the ledger's ability to properly handle pending blocks. The fix restores
  the PendingBlock type and its associated validation logic in check_next_block, including
  earlier solution ID checks via ensure_equals, and adds assertions in the store helpers
  to guard against invalid map operations.
expected_findings:
- file: ledger/src/check_next_block.rs
  line: 15
  summary: Missing PendingBlock type and ensure_equals-based validation checks; solution
    ID checks should be performed earlier in the validation pipeline to fail fast
    on invalid blocks.
- file: ledger/src/lib.rs
  line: 37
  summary: PendingBlock is not exported from the ledger crate, making the PendingBlocks
    API unavailable to consumers.
- file: ledger/store/src/helpers/rocksdb/internal/map.rs
  line: 117
  summary: Missing assertions in store map operations that should guard against invalid
    state during insert/remove, risking silent data corruption.
