description: The code lacked tests verifying subgroup membership and nonmembership
  for small order curve points, which is critical for elliptic curve cryptographic
  security. The fix adds tests to circuit/types/group/src/lib.rs to validate that
  small order points (which are not in the prime-order subgroup) are correctly rejected,
  ensuring the group operations are safe against small subgroup attacks.
