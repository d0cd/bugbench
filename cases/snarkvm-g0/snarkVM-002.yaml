description: Deployment verification failed for certain programs because the RNG used
  to generate random inputs was not deterministically seeded. During deployment, random
  inputs are generated, the program is executed, and certificates are checked against
  the resulting assignment. Without a deterministic seed, the verification step could
  produce different random inputs than the deployment step, causing a mismatch. The
  fix seeds the RNG deterministically using rand_chacha so both deploy and verify
  paths produce identical inputs.
expected_findings:
- file: synthesizer/process/src/stack/deploy.rs
  line: 93
  summary: RNG is not deterministically seeded. The deploy and verify code paths must
    use the same random inputs, but a non-deterministic RNG causes them to diverge,
    leading to verification failure for programs with certain input types (e.g. cast
    from field to scalar).
- file: synthesizer/process/src/stack/deploy.rs
  line: 117
  summary: Verification path also needs a deterministically-seeded RNG matching the
    deployment path to ensure the same random inputs are generated.
- file: synthesizer/process/src/stack/deploy.rs
