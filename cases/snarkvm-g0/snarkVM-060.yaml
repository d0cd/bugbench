description: The `LoggableError` trait in snarkVM's utilities module provided error
  logging behavior that was redundant with calling `flatten_error` directly followed
  by a logging macro. The fix removes the trait entirely, replacing all call sites
  with explicit `flatten_error` calls passed to `error!` or similar macros, simplifying
  the error handling API surface.
expected_findings:
- file: utilities/src/errors.rs
  line: 13
  summary: The `LoggableError` trait implementation adds unnecessary abstraction over
    `flatten_error` + logging macros; the trait should be removed in favor of direct
    `flatten_error` calls.
- file: ledger/store/src/helpers/rocksdb/internal/map.rs
