description: The `test_consensus_heights` feature flag was incorrectly scoped to also
  modify `MAX_CERTIFICATES`, when it should only lower consensus version heights.
  The cfg attribute on `MAX_CERTIFICATES` in both canary_v0.rs and testnet_v0.rs included
  `feature = "test_consensus_heights"`, causing it to change under that feature. The
  fix removes the `test_consensus_heights` feature from the cfg guard on `MAX_CERTIFICATES`.
expected_findings:
- file: console/network/src/canary_v0.rs
  line: 174
  summary: 'Incorrect cfg attribute: `MAX_CERTIFICATES` should not be gated on the
    `test_consensus_heights` feature. The `#[cfg(not(any(test, feature = "test")))]`
    (or similar) guard incorrectly includes `test_consensus_heights`, causing MAX_CERTIFICATES
    to change when only consensus heights should be affected.'
- file: console/network/src/testnet_v0.rs
  line: 174
  summary: 'Incorrect cfg attribute: `MAX_CERTIFICATES` should not be gated on the
    `test_consensus_heights` feature. The `#[cfg(not(any(test, feature = "test")))]`
    (or similar) guard incorrectly includes `test_consensus_heights`, causing MAX_CERTIFICATES
    to change when only consensus heights should be affected.'
