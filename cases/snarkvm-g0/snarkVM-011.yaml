description: After the ARC41 protocol change, prebonding to any address became valid
  behavior, but the code still logged a message at `error!` level when a validator
  was not in the committee. This created misleading error noise in logs for what is
  now expected behavior. The fix downgrades the log level from `error!` to `trace!`.
