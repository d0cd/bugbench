description: Scalar::eject_mode() was not correctly computing the circuit mode from
  its internal bits_le representation. The fix delegates eject_mode() to self.bits_le.eject_mode(),
  which properly aggregates the modes of the constituent Boolean bits, starting from
  Mode::Constant and lifting as needed. This was exposed by refactored ternary tests.
