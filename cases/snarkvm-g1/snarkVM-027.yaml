description: "The string equality check in the circuit types was incorrect \u2014\
  \ it did not properly verify that two strings had equal byte sizes before comparing\
  \ their content. This could cause incorrect equality results in zero-knowledge circuit\
  \ evaluations. The fix updates the equality logic and adjusts from_bits helpers\
  \ and field imports to support the corrected comparison."
