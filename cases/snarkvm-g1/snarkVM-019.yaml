  summary: 'Incorrect `is_fee_required` condition: the boolean logic for determining
    whether a fee is required is wrong, causing fee amount validation to be skipped
    for transactions that should require fees. Should check `!(execution.len() ==
    1 && transaction.contains_split())` to only exempt single split executions.'
