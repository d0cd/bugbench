description: The `is_fee_required` variable in `Ledger::check_transaction_basic` was
  incorrectly derived, causing the fee amount check to be skipped for transactions
  that should require fees. The fix corrects the boolean condition to properly check
  whether the transaction is a single `split` execution (which doesn't require a fee),
  using `!(execution.len() == 1 && transaction.contains_split())`, ensuring fee validation
  is applied to all other transactions including deployments and non-split executions.
