description: The StringType in snarkVM was broken but still allowed in program deployments.
  The fix disables StringType from consensus version V12 onward by adding `contains_string_type()`
  checks across all data types (ArrayType, PlaintextType, RecordType, RegisterType,
  StructType, ValueType) and program components (closures, constructors, functions,
  finalize scopes, mappings, instructions), rejecting any deployment or verification
  that uses string types at V12+.
expected_findings:
- file: synthesizer/src/vm/verify.rs
  line: 238
  summary: 'Missing check: deployments containing StringType should be rejected from
    consensus version V12 onward to prevent broken string type usage on-chain.'
- file: synthesizer/program/src/lib.rs
  line: 966
  summary: Program validation does not check for string types in its components (closures,
    functions, constructors, finalize scopes, mappings), allowing broken StringType
    to be deployed.
- file: console/program/src/data_types/plaintext_type/mod.rs
  line: 64
  summary: PlaintextType (and other data types like ArrayType, RecordType, StructType)
    lack a `contains_string_type()` method needed to gate broken StringType usage
    at consensus boundaries.
