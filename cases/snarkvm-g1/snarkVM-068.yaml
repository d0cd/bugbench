description: The Boolean::not implementation in snarkVM's circuit types had incorrect
  logic for negating boolean values in zero-knowledge circuits. The fix corrects the
  NOT operation's behavior across different circuit modes (Constant, Public, Private)
  and adds comprehensive test coverage for all boolean operations (AND, OR, XOR, NAND,
  NOR, NOT, EQUAL, TERNARY).
