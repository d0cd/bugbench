description: When executing closures in the snarkVM synthesizer, the console caller
  and signer were not being set/propagated into the closure execution context. This
  meant closures could not access `self.caller` or `self.signer`, causing transactions
  using these values inside closures to abort. The fix sets the caller and signer
  on the console before closure execution.
