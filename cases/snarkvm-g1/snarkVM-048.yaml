description: The ECIES Poseidon encryption was implemented using a compact (byte-based)
  approach instead of the correct field-based version, causing cryptographic incompatibility.
  The fix reverts the encryption scheme back to operating over field elements, which
  required updating constraint counts, genesis parameters, and SNARK verification
  key checksums across both testnets.
