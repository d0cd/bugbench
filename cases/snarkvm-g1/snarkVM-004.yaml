description: The Package::deploy function was creating a new internal Process instead
  of accepting an external one, causing deployment of programs with imports to fail.
  The deployment_cost function assumes the Process contains all imported programs,
  but a freshly created Process would not have them. The fix changes deploy to accept
  an external `&Process<N>` parameter so imports are available during cost calculation.
expected_findings:
- file: vm/package/deploy.rs
  line: 113
  summary: Function signature creates/uses an internal Process instead of accepting
    an external `&Process<N>` that already contains imported programs, causing deployment_cost
    to fail for programs with imports.
- file: vm/package/deploy.rs
  line: 156
  summary: Process parameter should be passed from the caller rather than constructed
    locally, since deployment_cost requires the Process to contain all imported programs.
- file: vm/package/mod.rs
  line: 165
  summary: Call site does not pass an external Process to deploy, so imported programs
    are not available when computing deployment cost.
