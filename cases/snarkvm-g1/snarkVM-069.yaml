description: The CUDA implementation of MSM (Multi-Scalar Multiplication) in `blst_p1_add_affines_into_projective`
  did not handle edge cases in elliptic curve point addition, such as adding zero/identity
  points or adding a point to itself (doubling). The fix adds proper checks for these
  edge cases in the CUDA kernel and includes corresponding tests.
expected_findings:
- file: algorithms/src/msm/variable_base/blst_377_cuda/blst_377_ops.cu
  line: 430
  summary: 'Missing edge case handling in affine-to-projective point addition: does
    not account for zero/identity points or point doubling cases, which can produce
    incorrect MSM results on GPU'
- file: algorithms/src/msm/variable_base/cuda.rs
