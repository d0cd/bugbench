description: The Display trait implementation for BigInteger was not producing a correct
  radix-10 decimal string representation. Instead of converting the multi-limb integer
  to a proper base-10 string, it likely output raw limb data or an incorrect format.
  The fix adds the num-bigint crate as a dependency and rewrites the Display implementation
  to properly convert the internal limb representation to a decimal string.
