  summary: BigInteger Display trait implementation outputs incorrect representation
    instead of radix-10 decimal string. The fmt::Display impl needs to convert limbs
    to a proper base-10 integer string using a big-integer library.
- file: utilities/src/biginteger/biginteger.rs
