category: logic
difficulty: medium
severity: critical
language: rust
pr_size: large
description: Missing limits on the number of imports, program depth, and function
  call depth in snarkVM programs allowed potential resource exhaustion attacks. The
  fix introduces upper bounds for imports per program, a maximum program/import depth,
  limits each function to at most MAX_TRANSITIONS - 1 calls, and caches the call count
  computation.
expected_findings:
- file: synthesizer/program/src/lib.rs
  line: 295
  summary: 'Missing validation: no limit enforced on the number of imports a program
    can declare, allowing unbounded import chains and potential DoS.'
- file: synthesizer/process/src/stack/helpers/initialize.rs
  line: 27
  summary: No check on function call depth or program depth during stack initialization,
    allowing deeply nested or excessively recursive program structures.
- file: console/network/src/lib.rs
  line: 160
  summary: Missing MAX_PROGRAM_DEPTH constant to bound import/program nesting depth,
    enabling arbitrarily deep program chains.
