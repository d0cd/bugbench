description: The block header Metadata was missing the `last_coinbase_target` field,
  which is required for correctly calculating subsequent coinbase targets. The fix
  adds this field throughout the Metadata struct, its serialization/deserialization,
  genesis initialization, and updates the ANCHOR_TIME constant and genesis block size
  assertions accordingly.
expected_findings:
- file: synthesizer/src/block/header/metadata/mod.rs
  line: 37
  summary: Missing `last_coinbase_target` field in Metadata struct prevents correct
    calculation of subsequent coinbase targets; this u64 field must be tracked alongside
    the existing `coinbase_target`.
- file: synthesizer/src/block/header/metadata/genesis.rs
  line: 25
  summary: Genesis metadata does not initialize `last_coinbase_target`, which should
    be set to `N::GENESIS_COINBASE_TARGET` to provide the baseline for future target
    calculations.
- file: console/network/src/lib.rs
  line: 87
  summary: ANCHOR_TIME constant value needs updating to 25 to align with the new coinbase
    target tracking mechanism.
