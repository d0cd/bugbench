description: The quorum calculation for subdag certificate verification incorrectly
  excluded the author's stake, causing legitimate blocks to fail verification. The
  fix reintroduces the correct quorum calculation that includes the author's stake
  and adds proper certificate verification checks for all certificates in a block
  subdag, while also refactoring committee_lookback construction to use the helper
  method.
