description: 'The ledger''s advance logic used the wrong committee when calculating
  the next block timestamp. In the `Some(subdag)` match arm of advance.rs, the current
  committee was used instead of the correctly updated committee for timestamp calculation,
  which could lead to incorrect timing in block production. This was identified as
  zkSecurity audit finding #02 related to the Dynamic Committee feature.'
