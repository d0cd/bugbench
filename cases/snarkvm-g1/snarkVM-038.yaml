description: The inclusion proof logic was using the wrong path for state path computation.
  Instead of using the local transition path (via `task.local`), it was using a different
  (likely global or transaction-level) path. The fix updates execute.rs and fee.rs
  to derive state paths from the local transition path, and updates mod.rs imports
  to include `TransitionPath`.
