description: Group::new was not enforcing that injected points are on the curve and
  in the correct subgroup by default, which is a soundness/security issue in a zero-knowledge
  circuit environment. The fix makes Group::new checked by default, adds E::assert_neq
  for efficient inequality assertions (e.g., division-by-zero guards), and refactors
  Field::div with a separate div_unchecked variant for performance-critical internal
  use like BHP hashing.
expected_findings:
- file: circuit/types/group/src/helpers/from_xy_coordinates.rs
  line: 18
  summary: Group point injection from (x, y) coordinates was not enforcing that the
    point is on the curve and in the correct subgroup, allowing potentially invalid
    group elements in circuit computations.
- file: circuit/types/group/src/lib.rs
  line: 56
  summary: "Group::new injected points without on-curve and subgroup membership checks,\
    \ which is unsound in a ZK circuit \u2014 malicious witnesses could introduce\
    \ invalid group elements."
- file: circuit/types/field/src/div.rs
  line: 57
  summary: Field::div implementation was less efficient than necessary; should separate
    checked division (with assert_neq zero) from unchecked division used internally
    by trusted callers like BHP hashing.
