description: The Merkle tree implementation incorrectly used `checked_next_power_of_two()`
  on `leaves.len()` in three locations (new, append, and a helper), which mishandles
  edge cases such as when the number of leaves is already a power of two or is zero.
  The fix corrects the power-of-two leaf padding calculation to ensure proper tree
  construction and proof verification.
