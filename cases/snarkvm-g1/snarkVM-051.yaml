description: When a program imports `credits.aleo` and is executed via `snarkvm execute`,
  the process would fail with a duplicate name error. This occurred because `credits.aleo`
  is automatically added as a built-in program, but the import resolution logic did
  not check whether it was already present before adding it again. The fix adds a
  guard to skip adding `credits.aleo` when it has already been loaded into the process/package.
expected_findings:
- file: synthesizer/process/src/lib.rs
  line: 115
  summary: 'Missing guard: when adding imported programs to the process, there is
    no check to skip `credits.aleo` which is already loaded as a built-in, causing
    a duplicate name error.'
- file: vm/package/mod.rs
  line: 155
  summary: 'Missing guard: the package build/import resolution does not skip `credits.aleo`
    when it is already present, leading to a duplicate program error on import.'
- file: vm/package/mod.rs
  line: 273
  summary: 'Missing guard: another code path in the package module that adds imported
    programs without checking if `credits.aleo` is already loaded.'
