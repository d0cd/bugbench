description: The Committee sorting logic incorrectly included the `is_open` flag in
  the `sorted_unstable_by` comparator at three locations, causing committee member
  ordering to depend on whether a validator is open to delegators. The fix removes
  `is_open` from the sort key so that ordering is determined solely by stake and address,
  ensuring deterministic and correct committee ordering for consensus.
