description: "The Block metadata serialization/deserialization of `cumulative_weight`\
  \ was incorrect \u2014 it was being serialized as a raw numeric type instead of\
  \ as a string. This causes precision loss or parse failures for large values. The\
  \ fix adds `.to_string()` conversion during serialization (and corresponding string-parsing\
  \ during deserialization) in both human-readable and binary serde paths, with matching\
  \ test updates in lib.rs."
