description: The `current_block_height` method panics when called on an empty block
  store. The code computes `u32::try_from(self.tree.read().number_of_leaves()).unwrap().saturating_sub(1)`
  without first checking whether the store has any blocks, leading to either a panic
  or an invalid height of 0. The fix adds a guard for the empty block store case,
  likely returning an error or `None` instead of panicking.
expected_findings:
- file: ledger/store/src/block/mod.rs
  line: 1197
  summary: 'Missing empty-store guard: `current_block_height` will panic or return
    invalid height 0 when the block store has no leaves. Should check for empty store
    before computing height.'
- file: ledger/store/src/block/mod.rs
  line: 1384
  summary: 'Same missing empty-store guard in the second implementation of `current_block_height`:
    no check for zero leaves before calling `saturating_sub(1)`.'
