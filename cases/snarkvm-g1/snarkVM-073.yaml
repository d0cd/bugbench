description: This PR is primarily a code quality and CI hardening change rather than
  a true bug fix. It introduces `use_small_heuristics = "Max"` in `.rustfmt.toml`
  for improved formatting, fixes various clippy warnings (e.g., non-shorthand field
  patterns, redundant patterns), and adds `-Dwarnings` to RUSTFLAGS in CI to enforce
  warning-free builds.
expected_findings:
- file: .github/workflows/ci.yml
  line: 12
  summary: Missing `-Dwarnings` in RUSTFLAGS allows clippy and compiler warnings to
    pass CI silently without failing the build
- file: .rustfmt.toml
  line: 5
  summary: Missing `use_small_heuristics = "Max"` causes rustfmt to use default heuristics,
    resulting in inconsistent line-width utilization and reduced readability
