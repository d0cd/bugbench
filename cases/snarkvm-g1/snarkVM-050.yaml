description: G2Prepared::read_le preallocated a Vec using a size read from untrusted
  input, allowing a malicious payload to trigger massive memory allocation (denial
  of service). The fix replaces the preallocation with Vec::new(), so the vector grows
  organically instead of trusting the declared size.
expected_findings:
- file: curves/src/templates/bls12/g2.rs
  line: 65
  summary: 'Untrusted preallocation: Vec::with_capacity uses a size from deserialized
    input without bounds checking, enabling a DoS via excessive memory allocation.
    Should use Vec::new() or impose a limit.'
