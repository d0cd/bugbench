description: The `shl_checked` circuit incorrectly rejected valid signed integer shift-left
  operations. For signed integers like `-1i8 << 7u8`, the intermediate value `2^7
  = 128` overflows i8, but the final result `-128i8` is valid. The fix adds signed/unsigned
  branching to allow the minimum signed value as a valid shift result and updates
  the checked_shl trait implementation to handle this edge case correctly.
expected_findings:
- file: circuit/types/integers/src/shl_checked.rs
  line: 69
  summary: 'Missing signed/unsigned distinction: shl_checked does not account for
    the case where a signed shift-left produces the minimum value (e.g., -128i8),
    which is valid but whose intermediate power-of-two overflows'
- file: console/types/integers/src/bitwise.rs
  line: 154
  summary: checked_shl implementation does not handle signed integer edge case where
    the shift result is the minimum signed value (e.g., -1i8 << 7 = -128i8 is valid)
- file: vm/compiler/src/program/instruction/operation/macros.rs
  line: 707
  summary: shift_exceeds_bitwidth check in VM compiler macro does not properly handle
    signed integer shift-left edge cases, rejecting valid operations
