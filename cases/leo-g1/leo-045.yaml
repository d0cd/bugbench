description: The Leo compiler's array equality comparison (`eq.rs`) did not validate
  that the two arrays being compared have the same length. This could lead to incorrect
  comparison results or a panic at runtime. The fix adds a length check before element-wise
  comparison and introduces a new compiler error for mismatched array lengths.
expected_findings:
- file: compiler/src/expression/relational/eq.rs
  line: 57
  summary: 'Missing length check: array equality comparison proceeds without verifying
    both arrays have the same length, which can produce incorrect results or panic
    on length mismatch.'
