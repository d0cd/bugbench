description: 'Three bugs found during documentation work: (1) `eq` and `ne` operators
  had incorrect precedence, not matching other relational comparators in the PEG grammar/AST.
  (2) Protected keyword list in `leo.pest` was incomplete, missing keywords like `address`.
  (3) Successful compilation of `lib.leo` files produced no console output because
  the result was bound to `_program` (discarded).'
expected_findings:
- file: ast/src/ast.rs
  line: 45
  summary: 'Operator precedence bug: `operation_eq` (and likely `operation_ne`) should
    be at the same precedence level as other relational comparators, not in a separate
    group.'
- file: ast/src/leo.pest
  line: 9
  summary: 'Incomplete protected names list: missing Leo keywords such as `address`
    which should be reserved and not usable as identifiers.'
- file: leo/commands/build.rs
  line: 55
  summary: 'Silent success: `let _program =` discards the compilation result without
    printing a success message to the console for `lib.leo` builds.'
