description: The group and field type implementations caused a stack overflow due
  to infinite recursion in their allocation/conversion methods. The fix restructured
  `to_allocated` in group/mod.rs and field/mod.rs to properly handle already-allocated
  values without recursing, and updated the constraint value handling to avoid triggering
  the recursive path.
expected_findings:
- file: compiler/src/group/mod.rs
  line: 35
  summary: 'Infinite recursion: `to_allocated` method likely calls itself recursively
    for group types instead of properly returning already-allocated values, causing
    stack overflow'
- file: compiler/src/field/mod.rs
  line: 150
  summary: 'Infinite recursion: re-allocating an already-allocated FieldType via FpGadget::alloc
    triggers recursive conversion back through the same code path, causing stack overflow'
- file: compiler/src/group/edwards_bls12.rs
  line: 133
  summary: Group allocation path using FpGadget/GroupGadget may recurse infinitely
    when converting between edwards_bls12 group representations
