description: The Leo compiler did not parse definitions for imported programs, causing
  nested imports to fail with unrecognized errors. The fix ensures that when an import
  is processed, its definitions (including any further nested imports) are also parsed
  by default across the definition and import store modules.
expected_findings:
- file: compiler/src/definition/definitions.rs
  line: 13
  summary: 'Missing recursive definition parsing: imported program definitions are
    not being collected, so nested imports are invisible to the compiler'
- file: compiler/src/import/store/import.rs
  line: 10
  summary: Dependencies for the current import are not having their definitions parsed,
    preventing transitive/nested import resolution
- file: compiler/src/import/store/symbol.rs
  line: 11
  summary: Imported symbols are stored without parsing the imported file's own definitions,
    breaking nested import chains
