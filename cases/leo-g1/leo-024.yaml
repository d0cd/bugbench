description: "During canonicalization of compound assignments (e.g., `a.0.1 += 1`\
  \ \u2192 `a.0.1 = a.0.1 + 1`), the access chain (field/tuple accesses) was being\
  \ iterated in reversed order, producing incorrect AST output. The fix removed the\
  \ unnecessary reversal in the access iteration in canonicalization.rs, and added\
  \ test cases for compound assignments with tuple/member accesses."
expected_findings:
- file: ast/src/reducer/canonicalization.rs
  line: 472
  summary: 'Access chain iteration is reversed when it should not be: `assignee.accesses.iter()`
    was likely `.rev()` or the accesses were collected in reverse order, causing compound
    assignment canonicalization to produce an incorrect access order (e.g., `a.1.0`
    instead of `a.0.1`)'
