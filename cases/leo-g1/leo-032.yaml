description: The Leo compiler's type checking used strict equality (`eq_flat`) when
  comparing Future types inside tuples, causing valid programs with futures in tuples
  to be rejected. The fix introduces `eq_flat_relaxed` which allows matching futures
  even when one is not explicit or when struct program origins differ, and applies
  this relaxed check consistently across the type checker, symbol table, and flattening
  passes.
expected_findings:
- file: compiler/passes/src/type_checking/checker.rs
  line: 174
  summary: Type equality check for futures uses strict comparison (`eq_flat`) instead
    of relaxed comparison (`eq_flat_relaxed`), causing false type mismatch errors
    when futures appear in tuples.
- file: compiler/passes/src/common/symbol_table/mod.rs
  line: 119
  summary: Struct member type comparison uses strict equality which fails for members
    containing Future types that differ only in explicitness or program origin.
- file: compiler/passes/src/type_checking/check_program.rs
  line: 143
  summary: Pattern match on expected vs actual return types uses strict equality,
    rejecting valid future-in-tuple return types.
