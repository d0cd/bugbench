description: The Leo parser was not correctly parsing package names as identifiers,
  allowing invalid characters and keywords to be used as package names in import statements.
  The fix changes the parser to use `expect_loose_identifier()` for package name parsing,
  ensuring only valid identifiers are accepted, and adds tests for invalid characters
  and keyword rejection.
