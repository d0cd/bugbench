description: 'The Leo compiler was hardcoded to a specific network type instead of
  being generic over the Network trait, preventing support for different networks.
  The fix refactors the compiler and parser to use generic type parameters (e.g.,
  `Compiler<''_, N: Network>`, `ParserContext<''_, N: Network>`) throughout the codebase,
  replacing concrete network types with trait-bounded generics.'
expected_findings:
- file: compiler/compiler/src/compiler.rs
  line: 58
  summary: Compiler struct is not generic over the Network trait; hardcoded to a specific
    network type, preventing multi-network support.
- file: compiler/parser/src/parser/context.rs
  line: 43
  summary: ParserContext is not parameterized by Network, so address literals and
    network-specific parsing are locked to a single network.
- file: compiler/parser/src/parser/expression.rs
  line: 36
  summary: Expression parsing uses concrete network type for address validation instead
    of a generic Network bound, preventing correct parsing for alternative networks.
