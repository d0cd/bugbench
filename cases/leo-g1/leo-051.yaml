description: Using HashMap (and in some places BTreeMap) for storing program elements
  like annotations, inputs, imports, and symbol table entries caused non-deterministic
  iteration order. This meant running the compiler multiple times on the same Leo
  program could produce different ASTs. The fix replaces all HashMap/HashSet usages
  with IndexMap/IndexSet, which preserve insertion order and ensure deterministic
  compilation.
expected_findings:
- file: ast/src/program.rs
  line: 20
  summary: HashMap used for program elements (imports, circuits, functions) causes
    non-deterministic AST ordering across compilations; should use an order-preserving
    map like IndexMap.
- file: symbol-table/src/symbol_table.rs
  line: 19
  summary: HashMap/HashSet in symbol table causes non-deterministic symbol resolution
    order; should use IndexMap/IndexSet for deterministic behavior.
- file: imports/src/parser/import_parser.rs
  line: 17
  summary: HashMap/HashSet for import tracking causes non-deterministic import processing
    order; should use IndexMap/IndexSet.
