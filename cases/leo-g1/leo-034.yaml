description: The SCCACHE_RECACHE environment variable was left enabled (uncommented)
  in ci.yml, causing the build cache to be cleared on every CI run, slowing builds.
  Additionally, the leo-disassembler crate was missing from compiler dev-dependencies,
  causing test compilation failures. The fix comments out the recache flag and adds
  the missing dependency.
expected_findings:
- file: .github/workflows/ci.yml
  line: 184
  summary: 'SCCACHE_RECACHE: 1 is uncommented, causing the sccache to be cleared on
    every CI run. This should be commented out after cache was cleared.'
- file: compiler/compiler/Cargo.toml
  line: 45
  summary: Missing dev-dependency on leo-disassembler crate, which is needed by compile.rs
    and execute.rs test files that import disassemble_from_str.
