description: 'The Leo compiler''s assignee resolution in assignment statements did
  not handle nested access on mutable values. When a mutable variable (e.g., a function
  parameter `mut a: [u32; 2]`) was indexed for assignment (`a[i] = a[j]`), the compiler
  failed because it did not unwrap the `ConstrainedValue::Mutable` wrapper before
  resolving the nested array index. The fix adds a match arm for `Mutable(mutable_value)`
  to unwrap and recurse into the inner value.'
expected_findings:
- file: compiler/src/statement/assign/assignee.rs
