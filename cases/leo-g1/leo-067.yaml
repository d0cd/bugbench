description: 'The fee calculation in deploy and execute commands did not account for
  consensus version based on block height. The fix introduces height-aware fee selection:
  if the current block height exceeds CONSENSUS_V2_HEIGHT, the newer (cheaper) fee
  calculation (execution_cost_v2) is used; otherwise, the original fee applies. A
  block height query was also added to support this logic.'
expected_findings:
- file: leo/cli/commands/deploy.rs
  line: 160
  summary: "Base fee calculation does not consider consensus height \u2014 should\
    \ branch on whether current height exceeds CONSENSUS_V2_HEIGHT to select the appropriate\
    \ fee model"
- file: leo/cli/commands/execute.rs
  line: 193
  summary: Execution cost calculation uses only the v1 cost model without checking
    block height against CONSENSUS_V2_HEIGHT to potentially use the cheaper v2 cost
- file: leo/cli/commands/mod.rs
  line: 210
  summary: FeeOptions struct lacks a base_fee field needed to allow user override
    of the automatically calculated height-dependent fee
