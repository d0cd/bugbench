description: The Leo compiler's type checker did not prevent imports nested beyond
  one level. Programs could import other programs that themselves contained imports,
  leading to potentially unbounded nesting. The fix adds an `is_imported` flag to
  the type checker that is set when traversing imported programs, and raises an error
  if another import statement is encountered within an already-imported program.
expected_findings:
- file: compiler/passes/src/type_checking/check_program.rs
  line: 287
  summary: 'Missing validation: when visiting imports of an imported program, there
    is no check to disallow nested imports beyond one level. Should error if `self.checker.is_imported`
    is true.'
- file: compiler/passes/src/type_checking/checker.rs
  line: 39
  summary: Missing `is_imported` field on TypeChecker to track whether the current
    program being checked is itself an import, needed to prevent nested import chains.
- file: compiler/ast/src/program/mod.rs
  line: 34
  summary: Import declarations lack Span information, making it impossible to report
    proper error locations when disallowing nested imports. The imports map should
    store `(Program, Span)` tuples instead of bare `Program` values.
