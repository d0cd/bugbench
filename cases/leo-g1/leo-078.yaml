description: The Leo parser and ABNF grammar were misaligned regarding equality operators
  (== and !=). The parser did not correctly handle equality expressions, preventing
  chained equality comparisons like `(a == b) == c` from working properly. The fix
  aligned the ABNF grammar with the parser implementation and corrected equality operator
  parsing in the expression parser.
expected_findings:
- file: parser/src/parser/expression.rs
  line: 187
  summary: Equality operator parsing (Token::Eq, Token::Ne) was incorrectly handled,
    preventing proper boolean-result equality expressions and chained comparisons.
- file: grammar/abnf-grammar.txt
  line: 453
  summary: ABNF grammar for package-name and expression rules was misaligned with
    the actual parser implementation, causing inconsistencies in accepted syntax.
