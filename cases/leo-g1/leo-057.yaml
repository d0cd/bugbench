description: The Leo language ABNF grammar for circuit definitions did not properly
  enforce member variable ordering (before member functions) and did not support semicolons
  or trailing commas as delimiters for member variable declarations. The fix updates
  the grammar/parser to require member variables before member functions and accept
  both semicolons and commas as separators.
