description: Duplicate `EnvOptions` flatten in both the parent `LeoDevnode` command
  and its `Start`/`Advance` subcommands caused clap's debug assertions to detect duplicate
  global arg registration, crashing `leo devnode start` in debug builds. The fix removes
  the redundant flatten from the subcommands and instead passes the private key from
  the parent's `EnvOptions` through the subcommand's `Input` type.
expected_findings:
- file: leo/cli/commands/devnode/start.rs
  line: 41
  summary: 'Duplicate flatten: `EnvOptions` with `global = true` fields is already
    flattened in the parent `LeoDevnode` command; flattening it again here causes
    clap to detect duplicate global arg registration and panic in debug builds.'
- file: leo/cli/commands/devnode/advance.rs
  line: 24
  summary: 'Duplicate flatten: `EnvOptions` is flattened here in the `Advance` subcommand
    but is already flattened in the parent `LeoDevnode`, causing duplicate global
    arg registration.'
