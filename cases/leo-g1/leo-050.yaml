description: The `get_indicator_value` method in statement.rs called `.unwrap()` on
  an `Option` indicator boolean value that could be `None` when a `console.log` statement
  appeared inside a conditional block. The fix replaces the `.unwrap()` with an `.unwrap_or(false)`
  to safely default to `false` when the indicator value is not present, preventing
  a panic at runtime.
expected_findings:
- file: compiler/src/statement/statement.rs
  line: 143
  summary: 'Unsafe `.unwrap()` on `Option` indicator value: when `console.log` is
    called inside a conditional, the indicator boolean gadget value can be `None`,
    causing a panic. Should use `.unwrap_or(false)` instead.'
