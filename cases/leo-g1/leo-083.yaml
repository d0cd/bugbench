description: The Leo compiler did not serialize and output the compiled circuit to
  a file after building. The fix adds a circuit serialization pipeline (CircuitSynthesizer,
  SerializedCircuit, SerializedField, SerializedIndex) and integrates it into the
  build command so that the compiled R1CS circuit is written to an output file.
expected_findings:
- file: leo/commands/build.rs
  line: 102
  summary: Build command did not serialize the compiled circuit to an output file
    after constraint generation, causing users to have no way to inspect or export
    the circuit.
- file: compiler/src/compiler.rs
  line: 140
  summary: generate_constraints call did not expose or return the constraint system
    in a form that could be serialized for circuit output.
