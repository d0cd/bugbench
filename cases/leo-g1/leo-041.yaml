description: The Leo compiler's type checker did not validate that user-specified
  types (in function parameters, circuit members, and variable definitions) were actually
  defined, allowing undefined/unrecognized types to pass type checking silently. The
  fix adds validation checks in multiple type-checking passes and introduces a new
  `undefined_type` error to catch these cases.
expected_findings:
- file: compiler/passes/src/type_checking/checker.rs
  line: 317
  summary: 'Missing type validation helper: the type checker lacks a method to assert
    that a referenced type identifier corresponds to a defined circuit/type, allowing
    undefined types to pass unchecked.'
- file: compiler/passes/src/type_checking/check_program.rs
  line: 43
  summary: Missing validation that function input parameter types are defined. An
    undefined type used as a parameter type will not be caught during type checking.
- file: compiler/passes/src/type_checking/check_statements.rs
  line: 61
  summary: Missing validation that the type annotation in a variable definition refers
    to a defined type. Undefined types in let/const definitions are silently accepted.
