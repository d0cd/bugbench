  summary: 'Parser incorrectly accepts tuple destructuring in definition statements
    (`let (x, y): type = expr;`) which does not conform to the ABNF grammar and should
    be rejected or deferred to pattern matching.'
- file: compiler/parser/src/parser/type_.rs
  line: 65
  summary: Tuple type parsing logic is overly complex in the parser; validation for
    tuple types (e.g. disallowing tuples in certain positions) should be handled in
    the type checker instead for better error messages.
