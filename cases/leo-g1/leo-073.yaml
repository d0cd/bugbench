description: 'The Leo parser incorrectly allowed tuple destructuring syntax `let (x,
  y): type = expr;` which did not match the ABNF grammar and posed a future compatibility
  hazard. The fix simplifies tuple parsing by moving validation logic into the type
  checker for better error messages, and removes the non-conforming destructuring
  syntax from the parser.'
