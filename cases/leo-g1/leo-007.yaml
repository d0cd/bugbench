category: api
difficulty: easy
severity: critical
language: rust
pr_size: medium
description: "The `leo account sign` command exposed a `--seed` flag that allowed\
  \ users to seed the nonce used in cryptographic signatures. This is a security vulnerability\
  \ because signature nonces must be random and unique \u2014 reusing or controlling\
  \ them can leak the private key. The fix removes the `--seed` parameter from the\
  \ Sign command variant definition, pattern matching, and signature generation call\
  \ sites."
expected_findings:
- file: leo/cli/commands/account.rs
  line: 88
  summary: 'Security: The Sign command variant includes a `seed` field that allows
    user-controlled nonce seeding for cryptographic signatures, which can lead to
    private key leakage if nonces are reused'
- file: leo/cli/commands/account.rs
  line: 262
  summary: 'Security: The seed value is passed to the signature generation function,
    allowing deterministic/user-controlled nonces which undermines signature security'
