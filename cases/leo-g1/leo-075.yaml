description: The parser incorrectly treated ordering operators (>, >=, <, <=) as left-associative
  by parsing them in a loop, allowing expressions like `a > b > c`. According to the
  Leo grammar, ordering operators are non-associative and should only allow a single
  comparison (e.g., `a > b`). The fix changes the parsing from a loop to a single
  conditional check, rejecting chained comparisons as parse errors.
expected_findings:
- file: compiler/parser/src/parser/expression.rs
  line: 152
  summary: Ordering expression parser uses a loop (associative parsing) for operators
    that should be non-associative per the grammar. Should use a single conditional
    instead of a loop to disallow chaining like `a > b > c`.
