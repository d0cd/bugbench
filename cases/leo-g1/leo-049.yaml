description: The Leo compiler incorrectly treated circuit inputs as constants when
  converting values via `to_usize` (e.g., for array index access). This caused incorrect
  constraint generation in the resulting zero-knowledge circuits, as runtime inputs
  were being folded as compile-time constants. The fix updates the handling in array
  access and related expression evaluation paths, along with a snarkVM dependency
  bump that includes a necessary ternary/conditional-select fix.
expected_findings:
- file: compiler/src/expression/array/access.rs
  line: 29
  summary: Array index access incorrectly treats input variables as constants when
    calling to_usize, producing wrong circuit constraints for runtime-provided indices
- file: compiler/src/expression/conditional/conditional.rs
  line: 20
  summary: Conditional/ternary expression handling needs updated CondSelectGadget
    usage to properly distinguish inputs from constants in select operations
