description: The Leo CLI's transaction query command lacked support for the `/transaction/unconfirmed`
  endpoint, meaning users could not query unconfirmed transactions. For rejected transactions,
  the default query only returned the fee transaction rather than the original. The
  fix adds an `--unconfirmed` flag and refactors mutually-exclusive argument handling
  to use `clap::ArgGroup` instead of manual conflict declarations.
expected_findings:
- file: leo/cli/commands/query/transaction.rs
  line: 20
  summary: 'Missing `--unconfirmed` query flag and ArgGroup definition: the struct''s
    clap attribute does not define an argument group to enforce mutual exclusivity
    among transaction query modes (confirmed, unconfirmed, default).'
- file: leo/cli/commands/query/transaction.rs
  line: 91
  summary: The command execution logic does not handle the unconfirmed transaction
    endpoint (`/transaction/unconfirmed`), so unconfirmed transaction queries silently
    fall through or fail.
