description: The `leo init` and `leo new` CLI commands did not create input files,
  and file extensions were incorrect or inconsistent. The fix updates input files
  to use the `.in` extension stored under `{root}/inputs/{package_name}.in`, adds
  `InputsFile` creation to the `init` and `new` commands, and updates the compiler
  to use `parse_inputs` for the new file format.
