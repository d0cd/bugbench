description: The parser example program did not use the error Handler to check whether
  parsing produced errors before outputting the AST. This meant that even when parse
  errors occurred, the (potentially incomplete or incorrect) AST was still printed.
  The fix imports and uses leo_errors::emitter::Handler to gate AST output on a successful
  parse.
expected_findings:
- file: parser/examples/parser.rs
  line: 15
  summary: "Missing import of leo_errors::emitter::Handler \u2014 without the Handler,\
    \ parse errors cannot be checked before emitting AST output"
- file: parser/examples/parser.rs
  line: 55
  summary: AST output is emitted unconditionally after parsing without checking Handler
    for accumulated errors; should gate output on handler.had_errors() or equivalent
