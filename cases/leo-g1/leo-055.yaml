description: The Leo language PEG grammar (`leo.pest`) did not properly constrain
  the `address` rule, allowing invalid addresses such as `address()` (empty) or addresses
  with wrong prefixes/lengths. The fix tightens the pest rule to require the `aleo`
  prefix followed by exactly one digit and 58 alphanumeric characters, and adds corresponding
  error messaging and test cases.
expected_findings:
- file: ast/src/leo.pest
  line: 206
  summary: "The `address` pest rule is too permissive \u2014 it does not enforce the\
    \ required `aleo1...` prefix, length (63 chars), or character constraints, allowing\
    \ empty or malformed addresses to parse successfully."
