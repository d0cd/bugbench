description: Multi-dimensional array dimensions were processed in the wrong order
  in the Leo compiler. For a type like `[bool; (2, 3)]`, nested array literals `[[true;
  2]; 3]` were incorrectly accepted while the correct form `[[true; 3]; 2]` was rejected.
  The fix reverses the dimension iteration order in expression construction and corrects
  dimension comparisons in input value validation and array initialization.
expected_findings:
- file: compiler/src/expression/array/array.rs
  line: 46
  summary: "Array initializer uses `dimensions.first()` to get the outer dimension,\
    \ but for tuple-indexed multi-dimensional arrays the dimension order is reversed\
    \ \u2014 should iterate dimensions in reverse to match nested array semantics."
- file: compiler/src/expression/array/array.rs
  line: 69
  summary: 'Same dimension-ordering bug in inline array expression: `dimensions.first()`
    retrieves the wrong dimension for nested multi-dimensional arrays.'
- file: typed/src/expression.rs
  line: 501
  summary: Dimensions iterator was not reversed (`.rev()`) when constructing nested
    array expressions, causing the innermost dimension to be used as the outermost
    and vice versa.
- file: compiler/src/value/value.rs
  line: 112
  summary: Nested array type dimension validation compares dimensions in the wrong
    order, accepting incorrectly-shaped arrays and rejecting correct ones.
