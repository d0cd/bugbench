description: When importing a circuit (or function) under an alias, the symbol table
  registered it under the original name instead of the alias name. This caused an
  undefined user type error when referencing the alias. The fix updates the symbol
  table insertion logic to use the alias name when one is provided, and adds proper
  validation for undefined import names and star imports.
expected_findings:
- file: symbol-table/src/symbol_table.rs
  line: 149
  summary: Imported circuits are inserted into the symbol table using the original
    name from the source program rather than the alias name specified in the import
    statement, causing alias references to fail with undefined type errors.
- file: imports/src/parser/import_parser.rs
  line: 37
  summary: Import parser does not properly propagate alias information when inserting
    imported symbols, so downstream symbol table construction loses track of the alias
    mapping.
