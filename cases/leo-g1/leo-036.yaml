description: The Leo compiler's type checker did not verify that struct initialization
  expressions matched the expected type. This allowed returning a struct/record of
  the wrong type without a compile-time error. The fix adds a check that compares
  the struct type being initialized against the expected type and emits a type mismatch
  error when they differ.
expected_findings:
- file: compiler/passes/src/type_checking/checker.rs
  line: 321
  summary: 'Missing type validation: struct init expressions are not checked against
    the expected type, allowing type mismatches (e.g., returning a record where unit
    is expected) to go undetected.'
