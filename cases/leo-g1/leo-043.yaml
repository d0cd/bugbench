description: 'Multiple type checking bugs in the Leo compiler: incorrect handling
  of Group type in binary expressions (e.g., multiply by group not properly requiring
  scalar), missing validation for comparing different types, and improper handling
  of negation on unsigned integers. The fix adds proper type-mismatch checks in the
  type checker''s expression validation, improves error tracking in the emitter, and
  adds new test cases for these edge cases.'
expected_findings:
- file: compiler/passes/src/type_checker/check_expressions.rs
  line: 58
  summary: 'Missing or incorrect type check for Group binary operations: multiplication
    with Group should enforce the other operand is Scalar, not allow arbitrary types'
- file: compiler/passes/src/type_checker/checker.rs
  line: 77
  summary: Type equality check function does not properly handle comparison between
    differing types (e.g., comparing i8 with u8 or negating unsigned integers), allowing
    invalid operations to pass type checking
- file: leo/errors/src/emitter/mod.rs
  line: 27
  summary: Error emitter does not track the last emitted error code, preventing proper
    exit status reporting when type errors occur
