description: The Leo parser did not validate that function call expressions must begin
  with an identifier, allowing arbitrary expressions (like numeric literals or binary
  operations) to be parsed as function calls. This caused confusing behavior when
  parenthesized sub-expressions were misinterpreted as function call arguments. The
  fix adds a check in the parser to ensure the callee of a function call is always
  an Identifier, and adds corresponding unreachable guards in later compiler passes.
