description: Leo's compiler could not resolve circuit definitions from within a circuit
  function because scope resolution only searched the immediate circuit scope, not
  the file-level scope where circuit definitions live. The fix threads a `declared_circuit_reference`
  string through the compiler's enforce functions so that circuit lookups fall back
  to the program-level scope.
expected_findings:
- file: compiler/src/expression/circuit/circuit.rs
  line: 39
  summary: Circuit definition lookup uses current scope instead of file/program scope.
    When inside a circuit function, the lookup scope is too narrow and fails to find
    sibling circuit definitions.
- file: compiler/src/function/function.rs
  line: 47
  summary: Missing `declared_circuit_reference` parameter to propagate the enclosing
    circuit's scope information, preventing correct scope resolution for nested circuit
    references.
- file: compiler/src/statement/statement.rs
  line: 38
  summary: Statement enforcement does not pass circuit scope context, so statements
    within circuit functions cannot resolve circuit definitions at file scope.
