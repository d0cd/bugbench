description: 'Three related import-handling bugs in the Leo language parser: (1) The
  `PackageAccess::Star` AST variant was a unit variant that discarded span/location
  information, making it impossible to report accurate source positions for star imports.
  (2) Empty import lists like `import bar.();` were silently accepted by the parser
  instead of producing an error. (3) The ABNF grammar definition did not match the
  intended import syntax. The fix adds a `span` field to the `Star` variant, adds
  a new `invalid_import_list` syntax error for empty lists, and updates the grammar.'
