description: The pest grammar rule for the subtraction operator did not properly handle
  spacing around the '-' character, causing parsing ambiguity between subtraction
  expressions (e.g., 'a - b') and negation or other uses of the minus sign. The fix
  adjusts the grammar rule to require appropriate whitespace context around the subtraction
  operator.
