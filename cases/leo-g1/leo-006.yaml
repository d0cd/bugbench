description: When deploying a Leo program that imports other on-chain programs, the
  deployment process did not fetch and include those network dependencies. The fix
  adds logic to query and resolve imported program dependencies from the network before
  constructing and submitting deployment transactions, affecting both deploy and execute
  flows.
expected_findings:
- file: leo/cli/commands/deploy.rs
  line: 88
  summary: 'Missing network dependency resolution: handle_deploy does not fetch imported
    program dependencies before creating the deployment transaction, which will cause
    deployment to fail for programs with imports.'
- file: leo/cli/commands/execute.rs
  line: 349
  summary: 'Missing network dependency resolution before execute: imported programs
    are not fetched from the network prior to transaction construction, causing execution
    failures for programs with dependencies.'
- file: leo/cli/commands/common/query.rs
  line: 88
  summary: Query endpoint response handling may not properly support fetching program
    dependencies from the network (missing or incomplete endpoint for dependency resolution).
