description: The type checker in Leo's compiler panics when encountering an unknown/undefined
  variable because it assumes all variables have known types during type inference.
  The fix adds graceful error handling (likely early returns or error emissions) in
  the expression type-checking pass so that unknown variables produce a compiler error
  instead of a panic.
