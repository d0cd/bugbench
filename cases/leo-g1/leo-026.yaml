description: The error message displayed when no private key argument is provided
  to 'account import' (with --discreet false) incorrectly implied the key could be
  set via an environment variable. The fix updates the message to clearly state the
  user must either pass the private key as a CLI argument or use the '--discreet'
  flag for secure interactive input.
