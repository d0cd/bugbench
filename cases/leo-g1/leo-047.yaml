description: 'The ternary expression (condition ? if_true : if_false) in the ASG never
  checked that the if_true and if_false branches had the same type, allowing type
  mismatches to silently pass through. The fix adds a type equality check after constructing
  both branch expressions and introduces a new `ternary_different_types` error in
  the error module.'
expected_findings:
- file: asg/src/expression/ternary.rs
  line: 79
  summary: 'Missing type check: after constructing if_true and if_false expressions
    for the ternary, their types are never compared to ensure they match. A ternary
    with mismatched branch types will silently compile.'
- file: asg/src/expression/ternary.rs
  line: 105
  summary: "Missing type check: same issue in a second code path \u2014 ternary branches\
    \ are constructed without verifying type equality between if_true and if_false."
