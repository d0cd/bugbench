description: 'The Leo interpreter had multiple bugs in binary operations: (1) address
  and struct equality comparisons were not implemented, causing runtime failures when
  comparing these types, (2) the modulo operator was incorrectly allowed for signed
  integer types where it should be rejected, and (3) an assert failure message had
  swapped operands. The fix adds address/struct comparison support, restricts mod
  to unsigned types, and corrects the assert message.'
expected_findings:
- file: compiler/ast/src/interpreter_value/evaluate.rs
  line: 141
  summary: 'Missing Address equality comparison: the eq operation does not handle
    (Address(x), Address(y)) pairs, causing a runtime error when comparing addresses'
- file: compiler/ast/src/interpreter_value/evaluate.rs
  line: 776
  summary: 'Missing Address comparison in neq or related comparison function: should
    handle (Address(x), Address(y)) but the match arm is absent'
- file: interpreter/src/cursor.rs
  line: 489
  summary: 'Assert failure message has swapped operands: reports ''{y} != {x}'' instead
    of ''{x} != {y}'', producing a misleading error message'
