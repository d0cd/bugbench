description: Circuit init and circuit access expressions did not implement constant
  value propagation, causing the constant folding pass to fail to evaluate circuit-related
  constant expressions. The fix adds proper `const_value()` implementations for these
  expression types and introduces a `ConstValue::Circuit` variant with a map-based
  lookup for member values.
expected_findings:
- file: asg/src/expression/circuit_access.rs
  line: 83
  summary: circuit_access::const_value() returns None instead of looking up the member's
    constant value from the target circuit, preventing constant folding through circuit
    member access
- file: asg/src/expression/circuit_init.rs
  line: 70
  summary: circuit_init::const_value() returns None instead of collecting member constant
    values into a ConstValue::Circuit, preventing constant folding of circuit initialization
    expressions
- file: asg/src/const_value.rs
  line: 14
  summary: ConstValue enum lacks a Circuit variant to represent constant circuit values,
    so circuit expressions cannot participate in constant folding
