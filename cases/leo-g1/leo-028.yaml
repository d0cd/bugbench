description: Position commands in the finalize executor were handled without incrementing
  the instruction index, causing an infinite loop. The executor would repeatedly fetch
  the same Position command since control flow never advanced past it. The fix increments
  the instruction index when a Position command is encountered, consistent with how
  other commands advance the program counter.
