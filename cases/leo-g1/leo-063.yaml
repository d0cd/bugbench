description: The import parser used `Self::default()` when recursively parsing nested
  imports, which created a fresh parser state with no record of previously-visited
  imports. This allowed circular/recursive imports to cause infinite recursion. The
  fix replaces `Self::default()` with `self.clone()` to propagate the set of already-seen
  imports into the recursive call.
expected_findings:
- file: imports/src/parser/import_parser.rs
  line: 55
  summary: Using `Self::default()` discards the set of already-visited imports, allowing
    recursive imports to loop infinitely. Should use `self.clone()` to carry forward
    visited-imports state.
