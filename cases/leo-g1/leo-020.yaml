description: The compiler's value selection/conditional logic was missing a match
  arm for the case where both branches of a conditional (if/else) expression return
  tuples. This caused a runtime error when using conditionals that return tuple types.
  The fix adds a `(ConstrainedValue::Tuple, ConstrainedValue::Tuple)` match arm to
  recursively resolve tuple elements.
