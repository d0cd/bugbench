description: The Leo compiler's type checker accepted string literals even though
  snarkVM does not yet support strings, leading to compilation failures downstream.
  The fix adds a type checker error that rejects string literals at the type-checking
  phase, preventing users from using an unsupported feature.
expected_findings:
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 609
  summary: String literals are accepted by the type checker without validation that
    strings are actually supported by the target VM. Should emit an error for unsupported
    string types.
- file: compiler/passes/src/type_checking/checker.rs
  line: 390
  summary: Type checker does not reject string types, allowing them to pass through
    even though the backend (snarkVM) does not support strings.
