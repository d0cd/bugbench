description: The Leo compiler lacked a custom panic hook, causing users to see raw,
  unhelpful Rust panic output when encountering a critical bug in release mode. The
  fix adds a `set_panic_hook()` function called at the start of `main` that registers
  a user-friendly panic handler (with environment info and a GitHub bug-report link)
  for release builds while leaving debug-mode panics unchanged.
expected_findings:
- file: leo/main.rs
  line: 175
  summary: 'Missing custom panic hook: the main function does not register a panic
    handler, so release-mode panics produce raw Rust output instead of a user-friendly
    error message with bug-reporting instructions.'
