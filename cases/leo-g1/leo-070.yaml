description: CircleCI test scripts did not execute all examples and failed to propagate
  errors when an example errored, silently passing CI. The fix adds proper error handling
  (`|| exit`) to shell scripts, corrects the EXAMPLES path in the CI config, and ensures
  all example run scripts use consistent error-checked invocations.
expected_findings:
- file: .circleci/test-examples.sh
  line: 1
  summary: "Test script does not iterate over all examples and lacks error propagation\
    \ \u2014 CI passes even when examples fail."
- file: .circleci/config.yml
  line: 131
  summary: EXAMPLES path is incorrect (`/home/circleci/project/project/examples` has
    duplicated `project` segment), causing example tests to not be found.
- file: .circleci/leo-clean.sh
  line: 1
  summary: Shell script commands lack `|| exit` error guards, so failures in `leo
    new` or `leo clean` are silently ignored.
