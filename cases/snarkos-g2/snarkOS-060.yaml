description: Peer connections were being lost over time (attrition) due to issues
  in the peer event handling and connection lifecycle management in the snarkOS network
  layer. The fix restructures peer event processing, updates the PeerHandle and Peer
  types, and corrects how the peer_book manages active connections to prevent premature
  disconnection.
expected_findings:
- file: network/src/peers/peer_book.rs
  line: 64
  summary: Peer book event handling logic fails to properly maintain peer connections,
    leading to peer attrition over time
- file: network/src/peers/peer/receiver.rs
  line: 20
  summary: Peer receiver does not correctly handle PeerEvent/PeerEventData lifecycle,
    causing peers to be dropped prematurely
- file: network/src/peers/peer/connector.rs
  line: 37
  summary: Peer connector missing proper event_target propagation, causing connection
    events to be lost
