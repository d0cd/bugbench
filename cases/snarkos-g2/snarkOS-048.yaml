description: This PR adds persistent peer storage to snarkOS, threading storage through
  the peer book, peer creation, and related networking components. The change ensures
  peer quality metrics and connection data survive restarts by persisting them via
  the existing storage layer. Without this, peer metadata was lost on node restart,
  degrading peer selection quality.
expected_findings:
- file: network/src/peers/peer_book.rs
  line: 35
  summary: PeerBook now requires DynStorage but callers adding peers without storage
    data pass None, potentially losing existing stored peer metrics on re-add
- file: network/src/peers/peer/peer.rs
  line: 32
  summary: Peer::new accepts Option<&snarkos_storage::Peer> but defaults quality metrics
    to zero when None is passed, discarding any previously persisted peer data if
    storage lookup is skipped by caller
- file: rpc/src/rpc_impl_protected.rs
  line: 276
  summary: RPC add_peer call passes None for stored peer data, bypassing persistent
    storage lookup and potentially resetting quality metrics for known peers
