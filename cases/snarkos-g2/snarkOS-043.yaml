description: The expiry time comparison in the seen_blocks/seen_transactions deduplication
  logic in peers.rs used an incorrect comparison direction, causing messages to be
  incorrectly suppressed or propagated. The fix corrects the SystemTime comparison
  operator so that expired entries are properly detected and messages are re-propagated
  when appropriate.
