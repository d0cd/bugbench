description: 'PR #220 introduced an equality comparator gadget for boolean and uint
  types that was buggy enough to require a full revert. The flawed implementation
  changed circuit constraints (as evidenced by updated parameter checksums and genesis
  blocks), which in a zero-knowledge proof system like snarkOS can compromise soundness
  or cause verification failures. The fix was a complete revert of the equality gadget
  changes across models, DPC circuits, and regenerated parameters.'
