description: The PendingBlock API from snarkVM was not being properly used in snarkOS,
  likely after a refactor or dependency update removed or bypassed it. This PR updates
  the snarkVM dependency revision and restores correct usage of the PendingBlock API
  across the BFT, consensus, sync, and ledger-service layers, updating trait definitions,
  implementations, and call sites accordingly.
