fix_commit: 40a2459ff0782d7065066583d9a377932ea75b55
category: concurrency
difficulty: hard
severity: high
language: rust
pr_size: medium
description: Peers were promoted from 'connecting' to 'connected' status during the
  handshake, before the lower-level networking layer had finished its connection setup.
  This race condition could cause the higher-level layer to treat a peer as fully
  connected while the lower-level TCP layer was still finalizing. The fix delays peer
  promotion to only occur via the OnConnect callback, which fires after the lower-level
  layer has completed all its work, and persists the Peer object (not just the address)
  in connecting_peers.
expected_findings:
- file: node/router/src/handshake.rs
  line: 108
  summary: Peer is promoted from 'connecting' to 'connected' during the handshake,
    before the lower-level TCP layer has finished its setup. This promotion should
    be deferred to the OnConnect callback to avoid a race condition between the two
    networking layers.
- file: node/router/src/lib.rs
  line: 87
  summary: The connecting_peers collection stores only addresses (HashSet) instead
    of Peer objects (HashMap). Storing Peer objects is needed so that the OnConnect
    handler can retrieve the peer data and complete the promotion at the correct time.
- file: node/src/client/router.rs
  line: 69
  summary: The on_connect handler does not promote the peer from 'connecting' to 'connected';
    this promotion was incorrectly happening earlier in the handshake instead of here
    where the lower-level layer has confirmed the connection is ready.
