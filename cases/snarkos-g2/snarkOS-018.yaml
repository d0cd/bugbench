description: In the Bullshark BFT consensus implementation, odd and even round advancement
  logic was missing a quorum check for 2f+1 certificates. When the previous even round
  leader was unseen, the code would immediately return true to advance rounds, allowing
  a malicious node to send a batch header with a round number beyond the GC limit,
  causing honest nodes to prematurely increment their BFT round. The fix adds an `is_ready`
  quorum check at each round advancement decision point.
expected_findings:
- file: node/bft/src/bft.rs
  line: 370
  summary: 'Missing quorum check: odd round advancement returns true when previous
    even round leader is unseen without verifying 2f+1 certificates threshold, allowing
    premature round increment exploitable by malicious nodes'
- file: node/bft/src/bft.rs
  line: 226
  summary: Even round advancement path lacks is_ready quorum check before allowing
    the round to advance when a leader certificate is found
- file: node/bft/src/bft.rs
  line: 323
  summary: Round advancement path missing is_ready quorum verification, allowing advancement
    without sufficient certificate count
