description: The proposal cache path was always computed by going one directory level
  above the ledger path (using parent()), which is only correct for the default directory
  structure. When a custom storage path is configured, this causes the proposal cache
  to be written outside the user's configured directory. The fix conditionally uses
  the parent directory only for default paths and stores the cache directly in the
  configured directory for custom paths.
