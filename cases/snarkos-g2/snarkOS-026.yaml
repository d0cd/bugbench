description: JSON-RPC request deserialization failed when the `id` field was a numerical
  value instead of a string. The code was deserializing directly into the typed RPC
  request struct, which couldn't handle the polymorphic nature of JSON-RPC's `id`
  field (string or number). The fix parses the request body into `serde_json::Value`
  first before converting to the typed struct, and updates the `json-rpc-types` dependency
  to fix string Value deserialization.
expected_findings:
- file: src/rpc/rpc.rs
  line: 141
  summary: 'Incorrect deserialization: `serde_json::from_slice` deserializes directly
    into the RPC request type, which fails when the JSON-RPC `id` field is a number
    instead of a string. Should first parse into `serde_json::Value` to handle polymorphic
    id field.'
- file: Cargo.toml
  line: 71
  summary: Outdated `json-rpc-types` dependency (version prior to 1.0.2) has a bug
    where `serde_json::Value` string deserialization requires escaping, preventing
    proper borrowed str casting.
