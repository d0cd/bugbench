description: Missing early certificate validity check in BFT consensus. The primary
  node would recursively fetch previous certificates before validating the incoming
  certificate, allowing an attacker to send crafted invalid certificates that crash
  the validator. The fix adds a validity check on the incoming certificate before
  proceeding with recursive fetching of prior certificates.
expected_findings:
- file: node/bft/src/primary.rs
  line: 955
  summary: 'Missing certificate validity check: incoming certificates should be validated
    before recursively fetching previous certificates, otherwise malformed certificates
    can trigger crashes in validators.'
- file: node/bft/src/helpers/storage.rs
  line: 494
  summary: Storage helper lacks utility support (cfg_into_iter, cfg_iter, cfg_sorted_by)
    needed for certificate validation logic that should run before recursive fetch.
