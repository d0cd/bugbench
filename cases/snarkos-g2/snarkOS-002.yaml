description: Direct use of rayon parallel reduce operations in bowe_hopwood_pedersen.rs
  blocked wasm32 compilation, since wasm targets do not support threading. The fix
  wraps the reduce calls into a macro that conditionally dispatches to parallel (rayon)
  or sequential reduce depending on the compilation target.
