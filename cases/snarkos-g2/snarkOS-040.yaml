description: The ledger and consensus modules were tightly coupled, and the memory
  pool's solution/transaction handling used separate read-lock checks (contains_key)
  followed by write operations, creating TOCTOU race conditions under concurrent access.
  The fix separates ledger from consensus into distinct crates and restructures the
  locking to be more atomic.
expected_findings:
- file: node/consensus/src/memory_pool/solutions.rs
  line: 52
  summary: 'TOCTOU race: read lock for contains_key check is released before subsequent
    write, allowing concurrent duplicate insertions of unconfirmed solutions.'
- file: node/consensus/src/memory_pool/transactions.rs
  line: 41
  summary: 'TOCTOU race: read lock for contains_key check is released before subsequent
    write, allowing concurrent duplicate insertions of unconfirmed transactions.'
