description: 'The PendingBlocks feature introduced in PR #3681 caused halting problems
  during stress testing of the BFT consensus system. The entire PR was reverted along
  with corresponding snarkVM changes to restore system liveness. The root cause was
  likely a deadlock or livelock in the block synchronization and pending block handling
  logic.'
