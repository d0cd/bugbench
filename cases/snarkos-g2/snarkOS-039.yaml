description: "The `parallel` feature was not enabled or propagated to `snarkos-node-ledger`,\
  \ causing block validation checks during ledger loading to run serially instead\
  \ of in parallel. The fix adds the `parallel` feature flag to the ledger crate's\
  \ Cargo.toml and propagates it from the parent node crate, and updates block range\
  \ retrieval in `get.rs` to use parallel iteration, dramatically reducing bootup\
  \ time (e.g., 7.5s \u2192 142ms for 500 blocks)."
expected_findings:
- file: node/ledger/Cargo.toml
  line: 41
  summary: "Missing `parallel` feature flag in ledger crate \u2014 without this, the\
    \ rayon-based parallel iteration is never activated, causing serial block validation"
- file: node/ledger/src/get.rs
  line: 53
  summary: Block range retrieval uses serial iteration instead of parallel (rayon)
    iteration, causing O(n) serial block checks during ledger load when parallelism
    is available
- file: node/Cargo.toml
  line: 76
  summary: Parent node crate does not propagate the `parallel` feature to the ledger
    dependency, so even if the feature exists in the ledger crate it is never activated
