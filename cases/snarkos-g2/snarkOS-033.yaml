description: The `locktick` feature gate was not consistently applied across all relevant
  code locations. Missing `#[cfg(feature = "locktick")]` annotations in `node/bft/src/helpers/telemetry.rs`
  and `node/cdn/src/blocks.rs`, and missing feature declaration in `node/cdn/Cargo.toml`,
  meant that locktick telemetry code would either fail to compile or not be properly
  gated behind the feature flag.
