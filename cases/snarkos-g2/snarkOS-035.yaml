description: Block synchronization of large blocks was performed synchronously on
  the async runtime, blocking the event loop and causing peer connection stalls and
  sync failures. The fix adds rayon for parallel block processing and spawns heavy
  block-sync work onto background threads using clone+spawn patterns in the client
  and validator routers.
expected_findings:
- file: node/src/client/router.rs
  line: 115
  summary: Block sync handler runs CPU-heavy block processing inline on the async
    runtime; should spawn onto a blocking thread pool to avoid starving the executor
- file: node/src/validator/router.rs
  line: 111
  summary: Validator block sync handler blocks the async runtime with heavy block
    verification; needs to be offloaded to a background thread
- file: node/router/src/inbound.rs
  line: 76
  summary: Inbound block processing lacks parallelism for large blocks; sequential
    processing causes sync bottleneck
