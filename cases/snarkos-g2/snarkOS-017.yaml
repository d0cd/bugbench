description: During validator bootup, nodes would call `try_block_sync` before receiving
  any `PrimaryPing` messages. Since nodes need to consider themselves synced to send
  `PrimaryPing` in the first place, this created a bootstrapping problem where nodes
  incorrectly marked themselves as synced and started processing proposals/certificates
  instead of actually syncing. The fix adds a grace period sleep before entering the
  block sync loop to allow initial PrimaryPing messages to arrive.
expected_findings:
- file: node/bft/src/sync/mod.rs
  line: 102
  summary: 'Missing grace period before `try_block_sync`: during initial bootup, this
    code path can execute before any PrimaryPing messages are received, causing nodes
    to incorrectly determine they are synced when they are actually far behind other
    validators.'
