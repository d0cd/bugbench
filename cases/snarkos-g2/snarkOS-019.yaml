description: The `commit_leader_certificate` function unconditionally performed garbage
  collection, including during bootup sync. GC during bootup can block commits from
  being processed, as it should only run during actual BFT consensus. The fix adds
  a guard condition to skip GC when the node is still in bootup sync mode.
expected_findings:
- file: node/bft/src/bft.rs
  line: 624
  summary: Garbage collection is performed unconditionally in `commit_leader_certificate`
    without checking whether the node is in bootup sync. GC during bootup can block
    commits from happening and should be gated to only run during actual BFT consensus.
