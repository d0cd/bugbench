description: The BFT gateway's cache of validator requests was not cleared when a
  validator disconnected. This caused stale cached data to persist, potentially leading
  to incorrect consensus behavior or resource leaks when validators reconnect. The
  fix adds a cache-clearing call in the disconnect handler in gateway.rs and introduces
  a new method in cache.rs to clear entries associated with a disconnected peer.
expected_findings:
- file: node/bft/src/gateway.rs
  line: 1085
  summary: 'Missing cache invalidation: when a validator disconnects, cached validator
    requests for that peer are not cleared, leaving stale entries that can cause incorrect
    behavior on reconnection'
- file: node/bft/src/helpers/cache.rs
  line: 119
  summary: No method exists to clear cached validator requests for a specific peer,
    preventing proper cleanup on disconnect
