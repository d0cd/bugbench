description: A sync issue allowed corrupt or invalid blocks to be fast-forwarded into
  canon, potentially corrupting storage state. The fix adds validation checks in the
  consensus agent to skip empty/invalid canon entries and adjusts the sync master
  to handle fork detection more robustly. A `max-head` CLI option was also added for
  debugging storage trim operations.
expected_findings:
- file: consensus/src/consensus/inner/agent.rs
  line: 23
  summary: 'Missing guard for empty canon list: corrupt or invalid blocks could be
    fast-forwarded without this `canon.is_empty()` check, leading to invalid chain
    state.'
- file: network/src/sync/master.rs
  line: 79
  summary: Sync logic did not properly handle forks containing corrupt blocks, allowing
    them to be accepted during fast-forward synchronization.
