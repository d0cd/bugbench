description: 'Primary tests were failing because test setup did not inject connected
  peers into the gateway. The fix removes the #[cfg(not(test))] guard in gateway.rs
  that was skipping peer connectivity checks during tests, and updates the test helpers
  in primary.rs to properly register accounts as connected peers before running assertions.'
