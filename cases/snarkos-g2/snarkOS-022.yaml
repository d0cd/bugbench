    tests, masking a real dependency that primary operations require connected peers
    to function correctly.'
- file: node/narwhal/src/primary.rs
  line: 1290
  summary: Test iterates over accounts but does not inject them as connected peers
    in the gateway, causing primary operations to fail when peer connectivity is actually
    checked.
- file: node/narwhal/src/primary.rs
