description: The `propose_batch` function in the BFT primary can be invoked concurrently
  from a dedicated proposer task and from `try_increment_to_the_next_round` on different
  threads. Without synchronization, parallel invocations could propose different batches
  for the same round, violating the BFT protocol. The fix adds a Tokio mutex to serialize
  calls to `propose_batch`.
expected_findings:
- file: node/bft/src/primary.rs
  line: 94
  summary: 'Missing synchronization: `propose_batch` can be called concurrently from
    multiple tasks/threads without a lock, allowing duplicate batch proposals for
    the same round (race condition).'
