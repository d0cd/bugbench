description: The Merkle tree implementation used hardcoded `[0u8; 128]` buffers for
  hashing and performed hashing in Projective coordinates in PedersenCRH, producing
  incorrect hash results. The fix removes the hardcoded buffers, migrates from a HEIGHT
  to DEPTH convention, and corrects the coordinate representation used during hashing
  to ensure Merkle tree correctness.
expected_findings:
- file: algorithms/src/merkle_tree/merkle_tree.rs
  line: 73
  summary: Hardcoded `[0u8; 128]` buffer used for Merkle tree hashing instead of properly
    serialized data, causing incorrect hash computation.
- file: algorithms/src/crh/pedersen.rs
  line: 47
  summary: PedersenCRH hashing uses Projective coordinates instead of Affine coordinates,
    producing incorrect hash outputs that break Merkle tree correctness.
- file: algorithms/src/merkle_tree/merkle_path.rs
  line: 54
  summary: Merkle path verification uses hardcoded buffer and HEIGHT-based convention,
    leading to incorrect proof verification for certain tree configurations.
