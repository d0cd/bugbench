description: The `get_public_balance` function failed to handle a `null` JSON response
  when querying the balance of a non-existent account. The code assumed the API always
  returns a string, causing a confusing JSON parse error. The fix adds a check for
  `null` responses and produces a clear error message indicating the account was not
  found.
