description: Block requests on the gateway were not cached or rate-limited, unlike
  validator requests which already had caching. This allowed unbounded block requests
  without tracking, making it impossible to match inbound block responses to outbound
  requests. The fix adds a block request cache in the Cache struct and integrates
  it into the gateway's event handling, also refactoring verbose if/else branching
  to match statements.
expected_findings:
- file: node/bft/src/helpers/cache.rs
  line: 33
  summary: 'Missing cache data structure for BlockRequest: outbound block requests
    are not tracked, so they cannot be rate-limited or matched to inbound responses.'
- file: node/bft/src/gateway.rs
  line: 546
  summary: Block request events are not being inserted into any cache before sending,
    unlike validator requests which are cached. This means block requests bypass rate
    limiting.
- file: node/bft/src/gateway.rs
  line: 988
  summary: Inbound block responses are not validated against a cache of outbound block
    requests, allowing unsolicited block responses to be processed.
