description: The miner's failure counter was incremented for all mining errors, including
  expected terminations caused by receiving a canon block. After 10 such terminations
  (which happen regularly during normal operation), the miner would permanently stop.
  The fix distinguishes between actual failures and expected miner termination by
  checking the error type (ConsensusError), only counting genuine failures toward
  the limit.
expected_findings:
- file: network/src/sync/miner.rs
  line: 97
  summary: All mining errors increment the failure counter indiscriminately. Expected
    miner termination (due to receiving a canon block) should not be counted as a
    failure; the error type should be checked (e.g., ConsensusError) to distinguish
    real failures from normal termination.
