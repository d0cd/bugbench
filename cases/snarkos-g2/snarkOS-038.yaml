description: The `snarkos developer transfer` command referenced the old `transfer`
  function in `credits.aleo`, which was renamed to `transfer_private`. This caused
  the CLI command to fail against the updated program. The fix renames the module,
  struct, and function references from `transfer` to `transfer_private` across the
  developer CLI commands.
