description: The node's sync state was incorrectly updated during block request generation,
  causing misleading sync status and log messages (e.g., showing 'synced' when not
  connected to any peers). The fix restricts sync state changes to response processing,
  new block locator receipt, and peer disconnects, and adds a `clear_greatest_peer_height`
  function to properly transition to 'unsynced' when a peer disconnects with no remaining
  block locators.
