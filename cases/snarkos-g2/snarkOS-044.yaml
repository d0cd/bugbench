description: The `check_block_locators` function initialized `previous_block_height`
  to `u32::MAX`, causing block locator validation to incorrectly accept or reject
  locators due to a flawed initial height comparison. The fix corrects this initialization
  and also introduces a maximum connection limit for sync nodes to prevent resource
  exhaustion.
expected_findings:
- file: ledger/src/state/ledger.rs
  line: 509
  summary: 'Incorrect initialization: `previous_block_height` is set to `u32::MAX`,
    which causes the first block height comparison in the locator check loop to produce
    wrong results. Should be initialized to the actual starting block height or a
    sentinel that correctly handles the first iteration.'
- file: src/network/peers.rs
  line: 168
  summary: "Missing limit on the number of connected sync nodes \u2014 no cap is enforced,\
    \ allowing unbounded sync node connections which can degrade performance and stability."
