description: Atomic shutdown flag used `Ordering::Relaxed` for both loads and stores,
  which does not guarantee cross-thread cache synchronization. The fix changes stores
  to `Ordering::Release` and loads to `Ordering::Acquire`, establishing a proper happens-before
  relationship so that when a thread observes `shutdown == true`, it also sees all
  preceding writes from the storing thread.
expected_findings:
- file: node/bft/ledger-service/src/ledger.rs
  line: 334
  summary: Shutdown flag loaded with `Ordering::Relaxed` instead of `Ordering::Acquire`;
    Relaxed provides no cross-thread synchronization guarantees, so the shutdown signal
    may not be observed promptly or consistently.
- file: node/src/prover/mod.rs
  line: 152
  summary: Shutdown flag stored with `Ordering::Relaxed` instead of `Ordering::Release`;
    without Release semantics, preceding writes may not be visible to threads that
    load the flag, risking stale or inconsistent state.
- file: node/cdn/src/blocks.rs
  line: 171
  summary: Shutdown flag loaded with `Ordering::Relaxed` instead of `Ordering::Acquire`;
    lacks synchronization to pair with the Release store, so shutdown may not be seen
    across threads.
