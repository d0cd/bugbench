description: The --bft CLI flag for configuring the BFT socket bind address and port
  was only respected when running in dev mode, being ignored in normal (testnet/canary/mainnet)
  operation. The fix applies the user-specified BFT address in all node start paths,
  similar to how --rest is already handled across all node types (client, prover,
  validator).
expected_findings:
- file: cli/src/commands/start.rs
  line: 328
  summary: BFT address from --bft flag is not applied when starting a validator node
    outside of dev mode; the flag value is silently ignored, defaulting to a hardcoded
    address.
- file: cli/src/commands/start.rs
  line: 507
  summary: BFT address from --bft flag is not used in the non-dev node start path;
    should respect user-provided --bft value just like --rest is respected.
