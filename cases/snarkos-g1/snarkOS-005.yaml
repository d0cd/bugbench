description: The downgrade_peer_to_candidate function was called unconditionally during
  handshake failures, even when the peer was not in the ConnectingPeer state. This
  could incorrectly downgrade already-connected peers to candidate status, disrupting
  existing connections. The fix adds a guard to only downgrade peers that are ConnectingPeer,
  and treats the duplicate-address condition as a non-error early return.
expected_findings:
- file: node/bft/src/gateway.rs
  line: 1275
  summary: 'Unconditional call to downgrade_peer_to_candidate: should only downgrade
    if the peer is a ConnectingPeer, otherwise the call may corrupt the state of an
    already-connected peer.'
- file: node/router/src/handshake.rs
  line: 147
  summary: 'Unconditional call to downgrade_peer_to_candidate on handshake abort:
    should guard with a check that the peer is a ConnectingPeer before downgrading.'
- file: node/src/bootstrap_client/handshake.rs
  line: 139
  summary: 'Unconditional call to downgrade_peer_to_candidate: should only downgrade
    ConnectingPeer peers, not peers in other states.'
