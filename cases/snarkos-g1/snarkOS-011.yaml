description: A format string placeholder (e.g., `{e}`) was used inside a plain string
  literal outside of a formatting macro like `format!` or `eprintln!`, so the error
  variable was never interpolated into the output. The fix wraps the string in the
  appropriate formatting macro or uses `format!` to properly interpolate the variable.
