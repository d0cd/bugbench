- file: consensus/src/miner.rs
  line: 44
  summary: Miner struct stores stale canon state at construction time; should fetch
    fresh canon info from consensus.storage.canon() on each mining iteration instead
    of caching it
- file: consensus/src/miner.rs
  line: 75
  summary: Mining logic uses cached/stale block height rather than querying consensus.storage.canon().await
    for the current canon height
- file: consensus/src/miner.rs
