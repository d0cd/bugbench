id: snarkOS-030
repo: ProvableHQ/snarkOS
base_commit: fce07799ced78b2e18f0c503ee5e816cb89506b4^
head_commit: fce07799ced78b2e18f0c503ee5e816cb89506b4
fix_commit: fce07799ced78b2e18f0c503ee5e816cb89506b4
category: concurrency
difficulty: easy
severity: medium
language: rust
pr_size: small
description: A write lock was used where a read lock is sufficient in the ledger state,
  reducing concurrency by unnecessarily holding an exclusive lock. Additionally, a
  single-branch `select!` macro was used in the network server where a plain `.await`
  suffices, adding unnecessary complexity.
expected_findings:
- file: ledger/src/state/ledger.rs
  line: 377
  summary: 'Unnecessary write lock: `self.latest_block_hashes.write()` should be `self.latest_block_hashes.read()`
    since this code path only reads the data, not mutates it. Using a write lock here
    blocks concurrent readers unnecessarily.'
- file: src/network/server.rs
  line: 139
  summary: 'Single-branch `select!` is unnecessary: when there is only one future
    to await, use `.await` directly instead of wrapping it in a `select!` macro.'
stats: null
visibility: public
needs_manual_review: true
