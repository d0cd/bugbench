description: The ChallengeRequest deserialization in both BFT events and router messages
  strictly required a 40-byte commit hash from peers via `<[u8; 40]>::read_le()`.
  When peers did not send a commit hash (or sent an invalid one), the read would fail
  and the entire handshake would be rejected, preventing connections to nodes that
  omit this optional field. The fix wraps the read in error handling to treat the
  commit hash as optional.
expected_findings:
- file: node/bft/events/src/challenge_request.rs
  line: 60
  summary: Strict `<[u8; 40]>::read_le(&mut reader)` will fail the entire deserialization
    if the peer omits the commit hash. This should gracefully handle the missing/invalid
    case instead of propagating the error.
- file: node/router/messages/src/challenge_request.rs
  line: 59
  summary: 'Same issue in the router messages variant: `<[u8; 40]>::read_le(&mut reader)`
    fails hard when peers don''t send a commit hash, breaking the handshake. Should
    treat commit hash as optional.'
