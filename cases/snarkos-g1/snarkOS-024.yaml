description: When a new epoch started, the solutions from the previous epoch were
  not being correctly cleared. The bug was in the timing/logic of capturing the old
  epoch number (via `self.ledger.latest_epoch_number()`) relative to when the ledger
  state advanced, causing the epoch-transition check to fail and stale solutions to
  persist.
