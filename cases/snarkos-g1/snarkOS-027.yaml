description: The initial block sync time estimate became inaccurate after a node restart
  mid-sync because it did not account for the ledger height at the time of restart.
  The fix calculates the average time per block based on the height differential from
  the ledger height at restart rather than from zero, producing an accurate estimate
  even after restarts.
expected_findings:
- file: snarkos/ledger/mod.rs
  line: 261
  summary: 'Time remaining calculation does not account for node restart: the elapsed
    time and block count should be relative to the ledger height at restart, not the
    original sync start, otherwise the estimate is wildly inaccurate after a restart.'
