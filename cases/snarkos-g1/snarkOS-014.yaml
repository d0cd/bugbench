description: The REST server's rate limiter used an incorrect replenishment rate calculation,
  causing requests per second to drop to 1 after the burst quota was exhausted instead
  of maintaining the configured RPS. The fix replaces the `per_second` rate with `per_nanosecond((1_000_000_000
  / rest_rps))` to correctly replenish the full burst rate every second. A secondary
  fix adds proper HTTP error responses (e.g., 429 Too Many Requests) instead of silently
  failing.
expected_findings:
- file: node/rest/src/lib.rs
  line: 111
  summary: 'Rate limiter replenishment rate is misconfigured: using `per_second` causes
    RPS to drop to 1 after burst quota is exhausted. Should use `per_nanosecond((1_000_000_000
    / rest_rps))` to correctly replenish the burst allowance over one second.'
- file: node/rest/src/lib.rs
  line: 112
  summary: "Missing proper HTTP error responses when rate limit is exceeded \u2014\
    \ should return 429 (Too Many Requests) instead of a generic or missing error\
    \ response."
