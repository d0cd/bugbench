description: The router's outbound send path did not proactively disconnect inactive
  peers, leading to erroneous send attempts to peers that were no longer active. The
  fix adds proactive disconnect calls in the heartbeat, outbound, and routing logic,
  and removes redundant request handling to ensure stale peers are cleaned up before
  sends are attempted.
expected_findings:
- file: node/router/src/outbound.rs
  line: 52
  summary: Missing check to proactively disconnect inactive peers before attempting
    to send, causing erroneous sends to stale peer connections
- file: node/router/src/heartbeat.rs
  line: 65
  summary: Oldest peer should be disconnected via self.router().disconnect() rather
    than just being removed from the peer list, to ensure proper cleanup of the connection
- file: node/router/src/routing.rs
  line: 59
  summary: Routing logic does not proactively disconnect peers that are no longer
    active, allowing stale entries to persist and cause failed sends
