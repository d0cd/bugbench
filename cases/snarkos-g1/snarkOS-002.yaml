description: The GroupEncryption PublicKey's FromBytes implementation incorrectly
  read the affine x-coordinate when deserializing. The fix corrects the deserialization
  logic in `from_x_coordinate` to properly reconstruct the public key from its byte
  representation, and adds a round-trip serialization test.
