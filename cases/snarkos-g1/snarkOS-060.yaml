description: Collections in deserialization code were preallocated using `IndexSet::with_capacity()`
  and `IndexMap::with_capacity()` based on untrusted size values read from the wire.
  A malicious or malformed serialized Event could specify an enormous capacity, causing
  an out-of-memory panic during deserialization. The fix replaces `with_capacity(num)`
  calls with `new()` to avoid trusting the deserialized size.
expected_findings:
- file: node/narwhal/events/src/worker_ping.rs
  line: 54
  summary: Preallocating IndexSet with untrusted deserialized size via `with_capacity()`
    can cause OOM panic; should use `IndexSet::new()` instead
- file: node/sync/locators/src/block_locators.rs
  line: 264
  summary: Preallocating IndexMap with untrusted deserialized size via `with_capacity()`
    can cause OOM panic; should use `IndexMap::new()` instead
- file: node/sync/locators/src/block_locators.rs
