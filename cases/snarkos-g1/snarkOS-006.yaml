description: 'The transaction broadcast endpoint incorrectly rejected broadcasts when
  the node was not within SYNC_LENIENCY, causing hours of downtime for wallets and
  end-users during sync disruptions. The fix separates the broadcast logic from the
  sync check: transactions are still broadcast to the network even when the node is
  behind, but the node itself won''t process them locally if not synced.'
expected_findings:
- file: node/rest/src/routes.rs
  line: 629
  summary: Transaction broadcast is gated on SYNC_LENIENCY check, preventing clients
    from broadcasting when node is behind. Should allow broadcast regardless of sync
    state.
- file: node/rest/src/routes.rs
  line: 642
  summary: Sync leniency check blocks the entire broadcast flow instead of only blocking
    local transaction processing. Broadcast to peers should proceed independently.
- file: node/rest/src/routes.rs
  line: 707
  summary: Similar SYNC_LENIENCY guard preventing transaction propagation to other
    nodes when the local node is not synced.
