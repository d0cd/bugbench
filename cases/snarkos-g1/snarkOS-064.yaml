description: The devnet peering logic in cli/src/helpers/dev.rs incorrectly determined
  how nodes connect to each other, causing unreliable devnet startup. The fix reworks
  peer connections so each client connects to two validators and adjusts the port
  calculation logic. Additionally, CI shell scripts had various shellcheck warnings
  and lacked error handling for node failures during devnet setup.
expected_findings:
- file: cli/src/helpers/dev.rs
  line: 13
  summary: 'Incorrect peer connection logic: devnet nodes are not connecting to the
    right peers. Clients should connect to two validators, and the peer address calculation
    needs reworking.'
- file: scripts/devnet.sh
  line: 74
  summary: 'Missing error handling: if a node fails during devnet setup, the script
    does not detect the failure and shut down, leading to a silently broken devnet.'
- file: .ci/devnet_ci.sh
  line: 16
  summary: Node verbosity and peering configuration in CI devnet script does not match
    the corrected devnet peer topology, leading to CI failures.
