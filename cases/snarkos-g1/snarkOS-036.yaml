language: rust
pr_size: medium
description: The metrics feature was incorrectly configured as a default feature in
  the `cli` crate's Cargo.toml rather than at the workspace root level, and `snarkos-node-metrics`
  was not marked as optional. This meant the metrics feature couldn't be properly
  toggled at the workspace level. The fix moves the feature configuration to the root
  Cargo.toml, makes `snarkos-node-metrics` optional, and introduces a proper `metrics`
  feature on the `cli` crate that propagates correctly.
expected_findings:
- file: cli/Cargo.toml
  line: 17
  summary: Metrics feature defined only at the cli crate level with direct default
    enablement; should be propagated from the workspace root to allow proper feature
    toggling across the project.
- file: Cargo.toml
  line: 56
  summary: Root Cargo.toml missing default feature set for metrics; needs 'snarkos-node-metrics',
    'snarkos-node/metrics', and 'snarkos-cli/metrics' in the default features list
    to properly gate metrics compilation.
- file: cli/Cargo.toml
  line: 50
  summary: snarkos-node-metrics dependency is not marked as optional, causing it to
    always be compiled regardless of feature flags.
