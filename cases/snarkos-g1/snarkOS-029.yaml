description: Block locators computed powers of two in the wrong direction, causing
  incorrect block height sampling during chain synchronization. The fix switches the
  direction so that block locators correctly space out block heights exponentially
  (powers of two) from the current tip backwards, which is essential for efficient
  chain sync between peers.
expected_findings:
- file: ledger/src/state/ledger.rs
  line: 47
  summary: Block locator heights computed with powers of two in wrong direction -
    should count backwards from tip, not forwards from genesis
- file: src/network/ledger.rs
  line: 464
  summary: Block locator construction uses incorrect direction for power-of-two spacing,
    leading to wrong block heights being requested during sync
- file: src/environment/mod.rs
  line: 81
  summary: Maximum fork depth constant may interact with reversed block locator direction,
    causing sync issues beyond the fork limit
