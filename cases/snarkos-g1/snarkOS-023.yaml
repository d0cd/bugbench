description: Subdag certificates were being prematurely committed to the DAG before
  confirming that the corresponding block was successfully produced. If block production
  failed for any reason, the already-committed certificates would cause subsequent
  block production to operate on corrupted state. The fix ensures certificates are
  only committed after successful block production.
expected_findings:
- file: node/narwhal/src/bft.rs
  line: 482
  summary: Subdag certificates are committed to the DAG before verifying block production
    succeeded. If block production fails, these prematurely committed certificates
    corrupt subsequent DAG state.
- file: node/narwhal/src/bft.rs
  line: 507
  summary: "Missing error handling (bail/ensure) around block commitment \u2014 certificates\
    \ should only be marked as canonicalized in the DAG after confirming the block\
    \ was successfully produced."
