description: Block deserialization (a CPU-intensive operation) was performed directly
  on the async runtime thread in the BFT gateway, blocking the executor and starving
  other async tasks. The fix moves deserialization of large blocks to a rayon thread
  pool using spawn_blocking or rayon::spawn, keeping the async runtime responsive.
