description: The `seen_outbound_block_requests` cache was not being cleared when a
  peer disconnected. This caused stale entries to persist, preventing the node from
  re-issuing block requests to a peer that reconnects. The fix adds a call to clear
  the peer's entries from `seen_outbound_block_requests` in the `Cache::clear_peer_entries`
  method, which is invoked on peer disconnect.
expected_findings:
- file: node/router/src/helpers/cache.rs
  line: 196
  summary: 'Missing cache invalidation: `seen_outbound_block_requests` is not cleared
    in `clear_peer_entries`, so stale outbound block request records persist after
    peer disconnect, preventing re-requests on reconnect.'
- file: node/router/src/lib.rs
  line: 514
  summary: "On peer disconnect, `clear_peer_entries` is called but it does not cover\
    \ all relevant caches \u2014 `seen_outbound_block_requests` entries for the disconnected\
    \ peer are never removed."
