description: 'Two bugs in bft::Sync::try_advancing_block_synchronization: (1) During
  long-range (non-BFT) sync, the sync height was never updated, causing block sync
  to redundantly re-sync already-received blocks. (2) A condition could incorrectly
  switch to BFT sync even when the node was still behind by more than GC blocks, triggered
  if a block arrived right after a non-BFT sync completed.'
expected_findings:
- file: node/bft/src/sync/mod.rs
  line: 161
  summary: 'Missing sync height update after non-BFT long-range sync completes: the
    sync height is not advanced, causing redundant block re-fetching'
- file: node/bft/src/sync/mod.rs
  line: 140
  summary: 'Incorrect condition for switching to BFT sync: should verify the node
    is within GC blocks of the tip before transitioning, otherwise premature BFT sync
    can occur'
