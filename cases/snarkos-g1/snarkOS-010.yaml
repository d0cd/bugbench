description: 'The BlockLocators validation logic had two incorrect checks: one for
  verifying that the checkpoints map covers as many blocks as possible, and another
  for checking overlapping checkpoints and recents. Additionally, the `new_unchecked()`
  constructor was incorrectly exposed as public, bypassing validation. A redundant
  validation check in BlockSync was also removed since deserialization already performs
  it.'
