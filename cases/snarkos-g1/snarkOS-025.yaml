description: When the validator is ahead of the CDN (start height > CDN height), the
  code incorrectly treated this as an error condition, triggering a false 'Storage
  corruption detected!' message and panicking. The fix changes this case to return
  Ok(completed_height) instead of propagating an error, recognizing that being ahead
  of the CDN is a valid state.
expected_findings:
- file: node/cdn/src/blocks.rs
  line: 72
  summary: When start_height > CDN height, this path returns an error causing a false
    'storage corruption' panic. Should return Ok(*completed_height) since the validator
    being ahead of CDN is not an error condition.
