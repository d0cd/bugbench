description: The REST API route for fetching blocks did not return a 404 status code
  when a requested block was missing. Instead of properly handling the not-found case
  and returning an HTTP 404 response, the handler likely returned an internal server
  error or unwrapped an Option/Result incorrectly. The fix adds proper 404 handling
  for missing blocks in the route handler.
