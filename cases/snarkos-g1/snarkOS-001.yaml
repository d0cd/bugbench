description: An RwLock deadlock occurred during block response processing where a
  read lock on `process` (held during block verification via `check_execution_internal`)
  prevented a pending write lock (needed by `atomic_speculate`/`atomic_finalize`)
  from being acquired, causing a deadlock due to Rust's write-preferring RwLock semantics.
  Additionally, block request starvation occurred because long-running block response
  processing blocked new sync requests. The fix restructures lock scoping and request
  handling to avoid holding conflicting locks and prevent starvation.
expected_findings:
- file: node/sync/src/block_sync.rs
  line: 233
  summary: 'Potential RwLock deadlock: a read lock on `process` may be held while
    a write lock is pending, causing deadlock under Rust''s write-preferring RwLock.
    The read lock scope should be narrowed or dropped before the write lock is requested.'
- file: node/sync/src/block_sync.rs
  line: 612
  summary: 'Block request starvation: long-running block response processing holds
    resources that prevent new block sync requests from being issued, causing the
    sync pipeline to stall.'
- file: node/sync/src/block_sync.rs
  line: 692
  summary: 'Lock contention: block processing path holds a lock across an extended
    operation, creating a window where concurrent sync operations deadlock or starve
    waiting for lock availability.'
