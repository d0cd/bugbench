pr_body: "Previously, all PUT requests to prebuilt dashboards (those with a `prebuilt_id`)\
  \ were rejected with a 409. This was too restrictive \u2014 users need to be able\
  \ to set global filters (projects, environments, period, filters) on prebuilt dashboards.\n\
  \nNow only requests that include `widgets` in the payload are rejected for prebuilt\
  \ dashboards. All other properties pass through to the serializer normally."
