pr_title: 'fix(dashboards): Pass translated options to CompactSelect dropdown'
pr_body: "Fixes a regression from https://github.com/getsentry/sentry/pull/108217\r\
  \n\r\nThe global filter for `user.geo.subregion` was displaying raw integer codes\
  \ (e.g. `21`, `154`) in the dropdown instead of human-readable subregion names (e.g.\
  \ \"North America\", \"Northern Europe\").\r\n\r\nThe `translateKnownFilterOptions`\
  \ function was correctly translating the labels, but the untranslated `options`\
  \ were being passed to `useStagedCompactSelect`, whose `compactSelectProps` are\
  \ spread into the `CompactSelect` dropdown \u2014 bypassing the translated options\
  \ entirely.\r\n\r\nThe fix passes `translatedOptions` to `useStagedCompactSelect`\
  \ so the dropdown renders the human-readable names. Adds a test to verify subregion\
  \ codes are translated in the dropdown and prevents future regressions.\r\n\r\n\
  <img width=\"287\" height=\"308\" alt=\"image\" src=\"https://github.com/user-attachments/assets/25aebb5e-dee8-4678-8f4d-f964bb2e0140\"\
  \ />\r\n\r\n\r\nFixes DAIN-1294"
