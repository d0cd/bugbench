description: The `useStagedCompactSelect` hook was receiving the original untranslated
  `options` instead of `translatedOptions`, causing the CompactSelect dropdown to
  render raw integer subregion codes (e.g. `21`, `154`) instead of human-readable
  names (e.g. "North America"). The fix passes the already-computed `translatedOptions`
  to the hook so its `compactSelectProps` spread the correct labels into the dropdown.
