description: The feature flag `organizations:preprod-build-distribution-pr-comments`
  was defined without `api_expose=True`, so it was never included in the organization
  features API response. This caused the frontend `<Feature>` component to never see
  the flag, preventing the PR comments toggle from rendering on the settings page.
  The fix adds the missing `api_expose=True` parameter.
