description: 'The whats-new sidebar component had multiple edge cases in its mark-seen
  logic: an accidental cache write with an empty value, missing guard to prevent unnecessary
  POST calls when all broadcasts were already seen, and a useEffect dependency on
  the useMutation return that could cause redundant re-runs. Additionally, test mocks
  used string query parameters while the implementation passed numbers, preventing
  correct request matching.'
expected_findings:
- file: static/app/views/navigation/primary/whatsNew.tsx
  line: 75
  summary: useEffect for marking broadcasts as seen lacks a guard for when unseenPostIds
    is empty, causing unnecessary POST calls to the mark-seen endpoint even when all
    broadcasts are already seen
  line_side: pre_fix
- file: static/app/views/navigation/primary/whatsNew.tsx
  line: 68
  summary: 'setQueryData call in mutation''s onMutate is missing query parameters
    ({show: ''latest'', limit: ''3''}), causing an optimistic cache write to the wrong
    cache key (empty/mismatched), so the local seen-state update is lost'
  line_side: pre_fix
- file: static/app/views/navigation/primary/whatsNew.tsx
  line: 140
  summary: 'useApiQuery for fetching broadcasts is missing query parameters ({show:
    ''latest'', limit: ''3''}), causing a cache key mismatch with the mutation''s
    optimistic update and potentially fetching incorrect/unfiltered data'
  line_side: pre_fix
