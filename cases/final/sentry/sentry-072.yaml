pr_body: "Add test coverage to whats new button and move the fetch handler to the\
  \ parent component. This is in preparation to making the change to broadcasts so\
  \ that the endpoint always returns the last 3 broadcasts, regardless if they were\
  \ seen or not which will prevent the empty state from being shown (poor ux given\
  \ the importance of the primary sidebar button)\r\n\r\nRequires https://github.com/getsentry/sentry/pull/110286"
