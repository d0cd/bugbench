pr_title: 'fix(dashboards): Use correct table item limit for categorical bar charts
  in widget viewer'
pr_body: "Categorical bar chart widgets in the Widget Viewer modal were showing fewer\
  \ bars than configured and a smaller table.\r\n\r\nThe Widget Viewer was treating\
  \ CATEGORICAL_BAR like time series charts (LINE, AREA, BAR), giving them `HALF_TABLE_ITEM_LIMIT`\
  \ (10 rows) for the table and falling back to `DEFAULT_TABLE_LIMIT` (5) for the\
  \ chart's data fetch. Instead, CATEGORICAL_BAR should behave like TABLE widgets\
  \ for the table limit and use the widget's configured `limit` for the chart.\r\n\
  \r\n- Add `CATEGORICAL_BAR` to the `FULL_TABLE_ITEM_LIMIT` condition in all three\
  \ query branches (Issue, Release, Discover)\r\n- Pass `widget.limit` as `tableItemLimit`\
  \ to the chart container so it fetches the correct number of bars\r\n\r\nCloses\
  \ DAIN-1256"
