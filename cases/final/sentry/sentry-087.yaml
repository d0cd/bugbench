pr_title: 'feat(autofix): Show Cursor GitHub access modal on verify-branch error'
pr_body: '## Summary

  - Adds a new `AutofixCursorGithubAccessModal` component that guides users to install
  the Cursor GitHub App when Cursor can''t access a repository

  - Updates both `useAutofix` and `useExplorerAutofix` hooks to detect the new `cursor_github_access`
  failure type and show the modal instead of a generic error toast


  Depends on backend PR: #109692


  AIML-2569


  ## Test plan

  - [x] Frontend test passes: `CI=true pnpm test static/app/components/events/autofix/autofixCursorGithubAccessModal.spec.tsx`

  - [x] Modal renders with correct title, body, and link to `https://github.com/apps/cursor`

  - [x] When backend returns `cursor_github_access` failure_type, modal is shown instead
  of generic error toast'
