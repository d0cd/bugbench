description: Sequential `if` statements in useAutofix each call `openModal` for different
  error types. Because `openModal` overwrites the previously opened modal, when multiple
  error conditions are true simultaneously only the last modal is displayed, silently
  hiding earlier errors. The fix likely converts the chain to `else if` or adds early
  returns so only one modal opens.
