pr_title: 'fix(gsAdmin): handle missing abuse reason in customer stats'
pr_body: 'The customer stats chart filters abuse data points by checking `point.by.reason
  === ''none''`, but the API can also return abuse entries where `reason` is `undefined`
  or an empty string. These entries were silently dropped from the abuse bucket in
  the chart, leading to underreported abuse volumes.


  This adds a falsy check (`!point.by.reason`) alongside the existing `''none''` comparison,
  so all abuse entries without a specific reason are correctly aggregated into the
  "Abuse" series on the stats chart.'
