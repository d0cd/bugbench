description: handleChartTypeChange called useSetMetricVisualize (singular) instead
  of useSetMetricVisualizes (plural), replacing the entire visualizes array with a
  single-element array containing only the first visualize. This caused all aggregate/visualization
  selections except the first to be dropped when changing chart type (line/area/bar).
  The fix switches to the plural hook and maps over all visualizes.
