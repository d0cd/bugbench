pr_title: 'fix(tracemetrics): Preserve all visualizes when changing chart type'
pr_body: "Changing the chart type (line/area/bar) in the metrics view was dropping\
  \ all aggregate/visualization selections except the first one.\r\n\r\n`handleChartTypeChange`\
  \ called `useSetMetricVisualize` (singular), which replaced the entire visualizes\
  \ array with a single-element array containing only the updated first visualize.\
  \ Switching to `useSetMetricVisualizes` (plural) and mapping over all visualizes\
  \ preserves the full list while updating the chart type on each.\r\n\r\nFixes LOGS-607"
