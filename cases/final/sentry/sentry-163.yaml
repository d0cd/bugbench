description: AI agent integrations were incorrectly filtered by platform (e.g., 'python-flask',
  'node-express') instead of by language alone (e.g., 'python', 'javascript'). This
  caused valid integrations to be hidden from users whose projects used a recognized
  language but a platform variant not in the filter list. The fix removes the platform-level
  filters and retains only language-based filtering.
expected_findings:
- file: static/app/views/insights/pages/agents/onboarding.tsx
  line: 257
  summary: Node integrations were filtered by platform-specific checks (isNodePlatform,
    isFullStackJsPlatform, hasServerSideNode) instead of language alone, causing SERVER_SIDE_NODE_INTEGRATIONS
    like Vercel AI and Mastra to be hidden for JavaScript projects whose platform
    wasn't in the node/meta-framework filter list
  line_side: pre_fix
- file: static/app/views/insights/pages/conversations/onboarding.tsx
  line: 289
  summary: "Same platform-level filtering bug duplicated in conversations onboarding\
    \ \u2014 non-node JS platforms had server-side integrations incorrectly filtered\
    \ out via SERVER_SIDE_NODE_INTEGRATIONS set"
  line_side: pre_fix
- file: static/app/views/insights/pages/agents/utils/agentIntegrations.tsx
  line: 55
  summary: SERVER_SIDE_NODE_INTEGRATIONS set existed solely to support the incorrect
    platform-level filtering, excluding Vercel AI and Mastra from non-node JS platforms
  line_side: pre_fix
