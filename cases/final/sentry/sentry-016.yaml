pr_title: 'fix(grouping): Fix "kitchen" time parameterization regex'
pr_body: "Our regex for parameterizing \"kitchen\" time (time as it would appear on\
  \ a digital clock, like `12:31 pm`) makes the am/pm part optional. Included within\
  \ that optional addition is a space between the time and the am/pm, but that space\
  \ is currently being ignored, because all of our parameterization regexes are evaluated\
  \ using the `(?x)` prefix, which tells the regex engine to ignore the comments and\
  \ whitespace we use to make our various regexes readable. This can be seen in our\
  \ one existing test case, `3:04PM`, which has no space.\r\n\r\nThis PR fixes that\
  \ by replacing the space with `\\s`, which isn't ignored. To make the existing case\
  \ still pass, though, it also makes said space optional. Finally, it adds a bunch\
  \ of new test cases, showcasing the various formats allowed by the regex."
pr_commit_messages:
- make space optional in kitchen time regex
- add test cases
