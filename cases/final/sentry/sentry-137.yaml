pr_title: 'fix(gettingStartedDocs): Update LangGraph example to use StateGraph API'
pr_body: "Update the LangGraph code snippet in the agent monitoring getting started\
  \ guide.\n\n`instrumentLangGraph` works by wrapping the `.compile()` method on a\
  \ `StateGraph` to intercept the compilation step and inject tracing. This means\
  \ it must be called before `.compile()` is invoked.\n\n`createReactAgent` calls\
  \ `.compile()` internally and returns the already-compiled graph \u2014 there's\
  \ no hook point between graph construction and compilation. By the time you get\
  \ the return value, the compile step has already happened, making it too late for\
  \ `instrumentLangGraph` to do its job.\n\nIn short: `createReactAgent` hides the\
  \ compile step, but `instrumentLangGraph` needs to wrap that exact step. They are\
  \ fundamentally incompatible with the current SDK API.\n\nThe fix replaces `createReactAgent`\
  \ with the lower-level `StateGraph` + `MessagesAnnotation` pattern, which keeps\
  \ the compile step explicit and accessible."
pr_commit_messages:
- 'fix(gettingStartedDocs): Update LangGraph example to use StateGraph API'
- 'fix(gettingStartedDocs): Add missing END edge to LangGraph example'
