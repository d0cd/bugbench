description: The resolution box displayed raw proxy-user email addresses (e.g. 'linear-app-abc123@proxy-user.sentry.io')
  instead of the human-readable integration app name (e.g. 'Linear') when an issue
  was resolved via an integration like Linear. The fix checks the matching activity's
  sentry_app.name and prefers it over the proxy actor.
