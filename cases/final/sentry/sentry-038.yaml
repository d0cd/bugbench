pr_title: 'fix(preprod): Check code signature in is_installable_artifact'
pr_body: 'XCARCHIVE artifacts without a valid code signature were incorrectly treated
  as installable because `is_installable_artifact()` only checked for `installable_app_file_id`
  and `build_number`. This caused PR comments to be posted on Cocoa SDK PRs even though
  the uploaded builds aren''t actually installable.


  The code signature check already existed in `get_artifact_install_info()` but not
  in `is_installable_artifact()`, which the PR comment task uses to filter sibling
  artifacts. This moves the check into `is_installable_artifact()` and removes the
  now-redundant check from `get_artifact_install_info()`.


  Refs EME-917'
