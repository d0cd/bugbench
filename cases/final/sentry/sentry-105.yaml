pr_title: 'debug(span-buffer): more precise metrics for ttl expiration'
pr_body: "this is to investigate expired segments\r\n\r\nprevious code had inflated\
  \ count for `segment_expired_before_flush` metric, because it was also counting\
  \ a race condition when after `ingested_count` is fetched, another consumer flushes\
  \ a segment, deleting its data key and metadata keys (as expected). This would appear\
  \ to have the same symptoms as expired segments (no data and no metadata in redis)\r\
  \n\r\ncurrent approach calculates ingested time backwards conservatively for a segment,\
  \ and compares it to redis ttl. This would narrow down the case of expired segments"
pr_commit_messages:
- more precise loggin
- 'stop double counting empty segments:'
- track segment expiration without race condition
- Merge branch 'master' into vic/more_precise_logging
- resolve mc
- type checking
