description: The `segment_expired_before_flush` metric was inflated because it unconditionally
  counted all cases where both data and metadata keys were missing from Redis, including
  a race condition where another consumer legitimately flushed and deleted the segment
  between reads. The fix estimates segment age from the queue deadline score and Redis
  TTL to only count true TTL expirations. Additionally, a new `_apply_per_trace_limit`
  method is defined but never called in this diff, constituting dead code.
