  summary: Unconditional metric increment for `segment_expired_before_flush` does
    not distinguish between true TTL expiration and a benign race condition where
    another consumer already flushed the segment. Should estimate segment age and
    compare against Redis TTL before counting as expired.
  line_side: pre_fix
