description: The trace timeline feature's `useTraceTimelineEvents` hook was querying
  the `issuePlatform` API without filtering out hidden issue types (e.g., LLM Detected
  issues still in development), causing them to appear in the '1 other issue' count.
  The fix adds a `HIDDEN_OCCURRENCE_TYPE_IDS` exclusion filter to the API query and
  introduces a `HIDDEN_ISSUE_TYPES` constant as a single source of truth for issue
  types that should never be shown in the UI.
expected_findings:
- file: static/app/views/issueDetails/traceTimeline/useTraceTimelineEvents.tsx
  line: 83
  summary: 'Missing filter: issuePlatform API query does not exclude hidden issue
    types (HIDDEN_OCCURRENCE_TYPE_IDS), causing in-development issue types like LLM
    Detected to appear in the trace timeline'
- file: static/app/types/group.tsx
  line: 348
  summary: No centralized constant for hidden issue type IDs to use in API query filtering;
    VISIBLE_ISSUE_TYPES exists but no corresponding exclusion list for occurrence
    type IDs
