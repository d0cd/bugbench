pr_title: 'fix(stories): Fix HMR for .stories.tsx and .mdx files in Scraps'
pr_body: "Two separate problems were causing hot reload to break in the Scraps storybook.\n\
  \n**Circular dependency crash**\n\n`storybook.tsx` was self-importing via the barrel\
  \ (`import * as Storybook from './'`) and importing `makeStorybookDocumentTitle`\
  \ from `storyExports.tsx`, which itself imports the barrel. This cycle (`barrel\
  \ \u2192 storybook \u2192 barrel`, `storybook \u2192 storyExports \u2192 barrel\
  \ \u2192 storybook`) caused rspack's HMR to surface a crash on reload:\n\n```\n\
  TypeError: Cannot read properties of undefined (reading 'ThemeSwitcher')\n```\n\n\
  Fixed by replacing barrel imports in `storybook.tsx` and `apiReference.tsx` with\
  \ direct imports from the modules they actually need. The `view/` layer files (`storyExports.tsx`,\
  \ `storyHeader.tsx`) are not part of any cycle because the barrel doesn't re-export\
  \ from `view/`.\n\n**HMR only working once**\n\nThe context references were `const`,\
  \ so after the first HMR cycle the captured module reference became stale. The new\
  \ context module had no accept handler registered, causing all subsequent saves\
  \ to be silently dropped:\n\n```\nHMR Ignored an update to unaccepted module ./app/components/core/checkbox/checkbox.mdx\n\
  ```\n\nor in some cases triggering \"unexpected require from disposed module\".\n\
  \nFixed by switching from `require.context` to `import.meta.webpackContext` (rspack's\
  \ recommended ESM API) with `let` references. On each HMR update the `onUpdate`\
  \ callback re-captures fresh context references and re-registers accept handlers\
  \ against the new context IDs \u2014 otherwise after the first replacement the old\
  \ handler is gone and HMR goes dead.\n\nA `useSyncExternalStore`-based version counter\
  \ threads the HMR signal into React Query, so the active story refetches cleanly\
  \ after each save rather than requiring a manual page refresh."
pr_commit_messages:
- 'fix(stories): Fix HMR for .stories.tsx and .mdx files in Scraps'
- 'fix(stories): Remove unused export from makeStorybookDocumentTitle'
