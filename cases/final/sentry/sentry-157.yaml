pr_title: 'fix(seer): Add auth signing to grouping record delete-by-hash requests'
pr_body: "`call_seer_to_delete_these_hashes()` was making unsigned POST requests directly\
  \ via `seer_grouping_connection_pool.urlopen()` to Seer's `/v0/issues/similar-issues/grouping-record/delete-by-hash`\
  \ endpoint. This bypassed Seer's `auth_and_json_middleware`, which logged `\"No\
  \ auth header found for request to {url}\"` and let the request through without\
  \ authentication (see [HackerOne report](https://hackerone.com/reports/3552693)).\n\
  \nThis switches to `make_signed_seer_api_request()` which adds the `Authorization:\
  \ Rpcsignature rpc0:{signature}` header, matching how every other Seer call in the\
  \ codebase works (e.g., `make_similar_issues_request()` in the sibling `similar_issues.py`\
  \ module).\n\nAlso broadens exception handling to catch `TimeoutError` and `MaxRetryError`\
  \ in addition to `ReadTimeoutError`, consistent with the patterns in `similar_issues.py`.\n\
  \nNote: `call_seer_to_delete_project_grouping_records()` (GET-based delete) still\
  \ needs a coordinated fix with the Seer side to convert from GET to POST before\
  \ it can be signed \u2014 tracked by the existing TODO in the code."
pr_commit_messages:
- 'fix(seer): Add auth signing to grouping record delete-by-hash requests'
- "fix(seer): Use actual exception type in error reason instead of hardc\u2026"
- 'ref(seer): Remove redundant ReadTimeoutError from exception tuple'
