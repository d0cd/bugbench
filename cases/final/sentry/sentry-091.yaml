description: "The `OrganizationPreprodRetentionEndpoint` had `SessionAuthentication`\
  \ listed before token authentication classes. When a request carried both session\
  \ cookies and a Bearer token, session auth would win, set `request.auth = None`,\
  \ and trigger an SSO check \u2014 returning a spurious `401 sso-required` error,\
  \ preventing CLI token-based access entirely. The fix reorders `authentication_classes`\
  \ to place token classes first (matching the framework's `DEFAULT_AUTHENTICATION`\
  \ order) and adds the missing `OrgAuthTokenAuthentication`."
