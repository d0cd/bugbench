  line: 49
  summary: 'authentication_classes ordering is wrong: SessionAuthentication precedes
    UserAuthTokenAuthentication, so session auth wins over Bearer tokens and triggers
    spurious SSO 401 errors. Token auth classes should come first, and OrgAuthTokenAuthentication
    is missing entirely.'
