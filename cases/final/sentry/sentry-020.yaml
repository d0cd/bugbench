pr_title: 'fix(preprod): Prevent diff mode buttons from being cut off on small viewports'
pr_body: "When the browser window height is reduced, the Split/Wipe/Onion segmented\n\
  control at the bottom of the diff image display gets clipped and becomes\ninaccessible.\n\
  \nThe root cause is `DiffImageDisplay`'s outer Flex using `height=\"100%\"`\ninstead\
  \ of flex properties. Since it sits inside a column flex parent\n(`SnapshotMainContent`)\
  \ that also contains a header row and separator,\n`height=\"100%\"` makes it compete\
  \ for the full parent height, causing\ncontent overflow.\n\nTwo changes:\n- Replace\
  \ `height=\"100%\"` with `flex=\"1\" minHeight=\"0\"` so the container\n  fills\
  \ remaining space and can shrink below its content size\n- Add `flexShrink={0}`\
  \ to the SegmentedControl wrapper so the buttons\n  are never compressed away"
