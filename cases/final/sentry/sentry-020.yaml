description: The deprecated TOP_N display type used a legacy rendering path that didn't
  abbreviate y-axis values, causing large numbers to display unformatted. The fix
  maps TOP_N to AREA in the widget builder (for gradual migration on re-save) and
  in the widget card (for immediate correct rendering).
