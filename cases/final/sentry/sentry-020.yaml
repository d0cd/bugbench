description: The DiffImageDisplay component used `height="100%"` instead of proper
  flex properties (`flex="1" minHeight="0"`), causing the outer container to compete
  for the full parent height and clip the SegmentedControl buttons on small viewports.
  The fix also adds `flexShrink={0}` to the button wrapper to prevent it from being
  compressed away.
