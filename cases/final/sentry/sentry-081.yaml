pr_title: 'fix(seer): Set explicit timeouts for AI translate endpoints'
pr_body: "This PR addresses `ReadTimeoutError`s occurring when calling Seer AI translate\
  \ endpoints, specifically `/v1/assisted-query/translate` and `/v1/assisted-query/translate-agentic`.\n\
  \nThe issue arose after migrating to `urllib3` connection pools (commit `8500e95`),\
  \ which introduced a default 5-second read timeout. Previously, the `requests` library\
  \ would wait indefinitely.\n\nTo prevent these timeouts, explicit timeouts have\
  \ been added:\n- `make_translate_query_request` now uses a 30-second timeout.\n\
  - `make_translate_agentic_request` now uses a 10-second timeout.\n\nThis ensures\
  \ that Seer has sufficient time to process complex AI queries without the Sentry\
  \ backend prematurely timing out.\n\n<!--\n\n  Sentry employees and contractors\
  \ can delete or ignore the following.\n\n-->\n\n### Legal Boilerplate\n\nLook, I\
