description: The OrganizationWorkflowIndexEndpoint's filter_workflows method calls
  parse_workflow_query() without catching InvalidSearchQuery exceptions. When a user
  supplies an unexpected or invalid query key, the unhandled exception bubbles up
  as a 500 Internal Server Error instead of returning a proper 400 Bad Request response.
