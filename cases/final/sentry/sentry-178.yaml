description: Autofix Celery tasks (generate_summary_and_run_automation, generate_issue_summary_only,
  run_automation_only_task) crash with Group.DoesNotExist when a group is deleted
  between task queueing and execution. The fix adds a shared helper that catches the
  exception and returns early with a warning log, following existing patterns in tasks/email.py
  and tasks/merge.py.
