pr_title: 'fix(preprod): Fix object key in image endpoint'
pr_body: "Fixes an issue in `ProjectPreprodArtifactImageEndpoint`:\r\n\r\n**Object\
  \ key**: The endpoint was constructing the objectstore key as `{org_id}/{project_id}/{image_id}`,\
  \ but `get_preprod_session()` already includes usecase, org and project as part\
  \ of the URL. The previous construction caused all lookups from the frontend to\
  \ fail with 404 as they resulted in invalid URLs (org and project ID were included\
  \ both as scopes and part of the object key itself in the resulting objectstore\
  \ URL)\r\nThis makes it consistent with the object key used by sentry-cli on latest\
  \ master.\r\n\r\nHaven't tested this locally, ideally you can confirm this works."
pr_commit_messages:
- "fix(preprod): Remove redundant org/project prefix from objectstore im\u2026"
