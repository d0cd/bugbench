description: The endpoint constructed the objectstore key as `{org_id}/{project_id}/{image_id}`,
  but `get_preprod_session()` already scopes URLs by usecase, org, and project. This
  caused org and project IDs to appear twice in the resulting objectstore URL, making
  all image lookups from the frontend fail with 404. The fix passes only `image_id`
  as the key.
