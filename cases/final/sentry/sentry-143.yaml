pr_title: 'fix(grouping): Fix hex parameterization lookahead bug'
pr_body: "When we parameterize messages for grouping, and we encounter a value we\
  \ suspect might be hex (but which lacks the `0x` prefix), we only parameterize it\
  \ as hex if it contains a number, to prevent parameterizing words that happen to\
  \ consist of only hex letters. To enforce this, our regex pattern set uses a lookahead\
  \ like this: `(?=.*[0-9])` - there can be other stuff first, but there must be a\
  \ number. This turns out to be too permissive, though, in that the \"other stuff\
  \ first\" can include the end of the hex value and any amount of other stuff before\
  \ we get to the number. Thus in a string like `deadbeef dogs are number 1`, we'll\
  \ match `deadbeef` as hex even though it contains only letters.\r\n\r\nTo fix this\
  \ problem, this PR changes the lookahead to be `(?=[a-f]*[0-9])` - there can be\
  \ other _hex letters_ first, but there must be a number.  This prevents the lookahead\
  \ from consuming anything past the hex string we're trying to match, and thus correctly\
  \ recognizes `deadbeef` as not matching the pattern."
pr_commit_messages:
- fix lookahead for hex patterns
