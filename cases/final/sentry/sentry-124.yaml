pr_title: 'fix(insights): handle nullable sentry.normalized_description'
pr_body: "`sentry.normalized_description` can be `null` from the backend, but the\
  \ `SpanResponseRaw` type previously typed it as `string`. This caused runtime errors\
  \ when the value was null \u2014 most notably, the SQLish parser was being called\
  \ with `null` input, causing a TypeError that was being captured as a Sentry error.\n\
  \nThis PR updates the type to correctly reflect that `sentry.normalized_description`\
  \ is nullable, and adds `?? ''` fallbacks at all call sites that pass it to components\
  \ expecting a non-null `string`.\n\nFixes DAIN-1290"
