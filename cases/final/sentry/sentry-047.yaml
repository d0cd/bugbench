description: The selenium plugin was being imported and loaded for all backend test
  shards, including non-acceptance tests that don't use selenium. The fix adds a SENTRY_SKIP_SELENIUM_PLUGIN
  environment variable to backend CI workflows and gates the plugin import in the
  pytest init module on that variable, avoiding the overhead of loading the large
  selenium plugin unnecessarily.
