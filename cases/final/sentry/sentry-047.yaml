description: A Snuba query filter uses `Op.IN` for a scalar (single) value instead
  of the correct `Op.EQ` operator. While some query engines silently accept `IN` with
  a scalar, this is semantically incorrect and may cause unexpected behavior or query
  errors depending on the Snuba/ClickHouse version.
