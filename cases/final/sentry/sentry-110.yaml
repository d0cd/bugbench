description: Several non-table prebuilt dashboard widget queries (LINE and BIG_NUMBER
  types) were missing the required `fields` key in their query definitions. The backend
  `DashboardWidgetQuerySerializer.validate()` requires both `fields` and `conditions`
  for new queries, but 11 affected queries only defined `aggregates` and `columns`,
  causing validation errors when saving these prebuilt configs. The fix adds `fields`
  (mirroring `aggregates` for non-table widgets) to all affected definitions.
