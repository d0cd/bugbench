pr_body: "Add the missing `fields` key to LINE and BIG_NUMBER widget query\r\ndefinitions\
  \ in the frontend assets prebuilt dashboard configs.\r\n\r\nThe backend `DashboardWidgetQuerySerializer.validate()`\
  \ requires both\r\n`fields` and `conditions` for new queries, but several non-table\
  \ widget\r\ndefinitions only defined `aggregates` and `columns`, omitting `fields`.\r\
  \nThis caused validation errors when these prebuilt configs were saved.\r\n\r\n\
  For non-table widgets (no group-by), `fields` mirrors `aggregates`.\r\nThe fix adds\
  \ this redundant-but-required key to all 11 affected queries\r\nacross `frontendAssets.ts`\
  \ (2 widgets) and `frontendAssetsSummary.ts`\r\n(9 widgets). All other prebuilt\
  \ configs were audited and already had\r\n`fields` defined.\r\n\r\nFixes DAIN-1298"
