    plain EventsStats case (single aggregate, no grouping) so metadata for ungrouped
    series is never extracted
  line_side: pre_fix
- file: static/app/views/dashboards/utils.tsx
  line: 124
  summary: normalizeUnit falls through to multiplier 1 for 'size' dataType instead
