description: The objectstore proxy endpoint used the default OrganizationPermission,
  which requires org:write/org:admin scopes, instead of OrganizationReleasePermission.
  This caused CI tools and sentry-cli authenticating with project:releases or org:ci
  tokens to be rejected from file upload/download operations. The fix swaps the permission
  class to match all other comparable endpoints.
