description: The span buffer merging logic silently skips SUNIONSTORE when a parent
  segment exceeds max-segment-bytes, but this critical decision was not logged. Sampled
  metrics alone were insufficient to surface these events in dashboards, so explicit
  logging was added before the merge step to provide reliable observability into oversized
  subsegment handling.
