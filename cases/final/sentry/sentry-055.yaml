description: The IPv6 regex pattern used for message parameterization in grouping
  was too permissive, matching `::` syntax from C++, Rust, and Ruby (e.g., `SomeClass::someMethod`)
  as valid IPv6 addresses. The fix adds negative lookbehind and lookahead assertions
  around IPv6 patterns to ensure only valid IPv6 characters can appear adjacent to
  matches.
expected_findings:
- file: src/sentry/grouping/parameterization.py
  line: 57
  summary: 'IPv6 regex pattern missing boundary guards: `::` alone is valid IPv6,
    so patterns like `SomeClass::someMethod` falsely match as IP addresses. Needs
    negative lookbehind/lookahead to reject non-IPv6 characters adjacent to the match.'
- file: src/sentry/grouping/parameterization.py
  line: 78
  summary: Second IPv6 regex pattern also lacks boundary guards, causing the same
    false-positive parameterization of language-level `::` syntax as IP addresses.
