pr_title: 'fix(dashboards): Register agents_traces_table display type in backend'
pr_body: "The frontend defines `DisplayType.AGENTS_TRACES_TABLE = 'agents_traces_table'`\
  \ but the backend `DashboardWidgetDisplayTypes` does not include this value. The\
  \ DRF serializer uses `ChoiceField(choices=DashboardWidgetDisplayTypes.as_text_choices())`,\
  \ so it rejects `\"agents_traces_table\"` as an invalid choice when saving the AI\
  \ Agents Overview dashboard.\n\nAdds `AGENTS_TRACES_TABLE = 14` to `DashboardWidgetDisplayTypes`\
  \ and its corresponding entry in the `TYPES` list. No migration needed since `display_type`\
  \ is a `BoundedPositiveIntegerField` \u2014 the choices are only used for validation,\
  \ not the DB schema.\n\nRefs DAIN-1301"
