pr_title: 'build(deps): Fix GHSA-fjxv-7rqg-78g4 vulnerable form-data in api-docs'
pr_body: 'Resolves the prototype pollution vulnerability [GHSA-fjxv-7rqg-78g4](https://github.com/advisories/GHSA-fjxv-7rqg-78g4)
  in the `form-data` npm package within the `api-docs` workspace.


  The vulnerable version (`form-data@4.0.1`) is introduced as a transitive dependency
  via `json-refs@3.0.15`. Dependabot cannot auto-fix this because it requires updating
  a transitive dependency, which pnpm''s Dependabot integration does not support.


  The fix adds a `pnpm.overrides` entry in `api-docs/package.json` to force `form-data>=4.0.2`
  across the workspace, resolving it to `4.0.5` (latest).


  Co-Authored-By: Claude <noreply@anthropic.com>'
