description: Seer API wrapper call sites in the autofix module were not passing viewer_context
  (organization_id and user_id), meaning Seer had no authorization context about who
  triggered the request. The fix propagates SeerViewerContext to all relevant call
  sites so Seer can enforce org/user-level access control.
