description: The rspack config applied `builtin:swc-loader` (with `@swc/plugin-emotion`)
  to react-select's pre-compiled ESM output. Since react-select ships already-compiled
  code where emotion's `keyframes` tagged template literals have been Babel-compiled
  to `_taggedTemplateLiteral`, re-processing by SWC's emotion plugin produces malformed
  output that triggers emotion's 'illegal escape sequence' development warning. The
  fix excludes react-select from the SWC loader rule.
