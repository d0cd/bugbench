pr_title: 'fix(build): Exclude react-select from SWC loader to fix emotion warning'
pr_body: 'Exclude `react-select` from the `builtin:swc-loader` rule in rspack config.


  React-select ships pre-compiled ESM where emotion''s `keyframes` tagged template
  literal has already been Babel-compiled to use `_taggedTemplateLiteral`. When `@swc/plugin-emotion`
  re-processes this already-compiled code, it produces output that triggers emotion''s
  development-mode "illegal escape sequence in your template literal" warning in `serializeStyles`.


  Since react-select''s ESM is fully pre-compiled (JSX already compiled to `jsx()`
  calls, imports resolved), it doesn''t need SWC processing at all.'
pr_commit_messages:
- 'fix(build): Exclude react-select from SWC loader to fix emotion warning'
