description: 'The dashboard widget API lacked backend validation for layout dimensions,
  allowing invalid values like `w: 12` on a 6-column grid to be persisted. The fix
  replaces a custom `LayoutField` with a `LayoutSerializer` using DRF''s built-in
  `IntegerField` validators to reject out-of-range dimensions at the API level.'
