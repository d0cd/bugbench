pr_title: 'fix(pageFilters): Expand sentinel selection before unchecking a project'
pr_body: "When All Projects or My Projects was staged (not yet committed) and the\n\
  user clicked an individual project checkbox to uncheck it, the toggle\nlogic would\
  \ add the project ID alongside the sentinel value (e.g. `[-1,\n1]`). Because `-1`\
  \ was still present, the selection still resolved to\n`kind='all'`, leaving the\
  \ checkbox visually checked and suppressing the\nselection limit warning.\n\nThe\
  \ fix expands the sentinel to explicit IDs before removing the clicked\nproject:\n\
  - `kind='all'` \u2192 expand to all project IDs, then remove the clicked one\n-\
  \ `kind='my'` \u2192 expand to member project IDs, then remove the clicked one\n\
  - anything else \u2192 existing `toggleOption` path unchanged\n\nAlso adds three\
  \ new tests covering the selection limit warning for the\nflows that exposed this\
  \ bug: clicking All Projects then unchecking a\nproject, and the parametrized My/All\
  \ Projects active + uncheck cases."
pr_commit_messages:
- "test(pageFilters): Add selection limit warning tests for My/All Proje\u2026"
- 'fix(pageFilters): Expand sentinel selection before unchecking a project'
