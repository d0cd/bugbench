description: 'A refactor of the button busy state and form SubmitButton UX (PR #109869)
  introduced a visual/functional regression in button rendering. The changes wrapped
  button content in a Flex layout, altered the display property to ''inherit'' in
  styles, and modified the form Subscribe selector to include isDefaultValue, which
  together broke the button''s appearance and form submission UX. The revert restores
  correct behavior.'
