pr_title: 'ref(seer): Propagate viewer_context to autofix Seer call sites'
pr_body: "Pass `SeerViewerContext` to all Seer API wrapper call sites in the autofix\
  \ module.\n\nPR #109697 added an optional `viewer_context` parameter to all Seer\
  \ API wrapper functions. This PR updates autofix call sites:\n\n- **`_call_autofix()`**:\
  \ Pass `organization_id` + `user_id` (when not anonymous)\n- **`update_autofix()`**:\
  \ Pass `organization_id` only\n- **`utils.py`** (`get_autofix_state`, `bulk_get/set_project_preferences`):\
  \ Pass `organization_id` only\n- **`issue_summary.py`** (`_call_seer`, `_generate_fixability_score`):\
  \ Pass `organization_id` from group\n- **`project_seer_preferences` endpoint**:\
  \ Pass both `organization_id` and `user_id`\n- **`tasks/seer.py`** (`cleanup_seer_repository_preferences`):\
  \ Pass `organization_id` only\n- **Skipped**: `_fetch_user_preference` (only has\
  \ `project_id`, no org context)\n\nNo behavior change \u2014 `viewer_context` defaults\
  \ to `None` which preserves existing behavior.\n\nCo-Authored-By: Claude <noreply@anthropic.com>"
