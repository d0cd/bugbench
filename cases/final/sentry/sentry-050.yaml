pr_title: 'fix(gen-ai): Gracefully handle malformed JSON in AI message parsing'
pr_body: "This PR addresses the issue of `SyntaxError` exceptions occurring when parsing\
  \ AI messages, specifically in the `transformPartsMessages` function within the\
  \ AI Agents insight UI.\r\n\r\nThe root causes identified were:\r\n1.  **PII-filtered\
  \ content**: Relay replaces sensitive data with the literal string `[Filtered]`,\
  \ which is not valid JSON.\r\n2.  **Malformed JSON escape sequences**: Some AI SDKs\
  \ or user-provided content can contain invalid escape sequences (e.g., `\\p`) that\
  \ cause `JSON.parse` to fail.\r\n\r\n**Changes Made:**\r\n-   **`parseJsonWithFix`\
  \ (`utils.tsx`)**: Modified to gracefully handle the above failure modes. It now\
  \ explicitly checks for `[Filtered]` content and returns `null` for `parsed` data,\
  \ and also wraps the `fixJson` fallback in an additional `try/catch` block to prevent\
  \ unrepairable malformed JSON from throwing. In both cases, it returns `{parsed:\
  \ null, fixedInvalidJson: true}`.\r\n-   **`transformPartsMessages` (`aiInput.tsx`)**:\
  \ Exported this function for improved testability.\r\n-   **`utils.spec.tsx`**:\
  \ Updated existing tests for `parseJsonWithFix` to accurately reflect the new graceful\
  \ handling of `[Filtered]` content and bad escape sequences.\r\n-   **`aiInput.spec.tsx`\
  \ (new file)**: Added a comprehensive test suite for `transformPartsMessages`, covering\
  \ valid JSON transformations, passthrough of non-parts messages, and specific test\
  \ cases for the `[Filtered]` placeholder and malformed escape sequences to ensure\
  \ the fixes work as expected.\r\n\r\nThese changes prevent the UI from crashing\
  \ due to unparseable AI message data, providing a more robust user experience.\r\
  \n\r\nCloses TET-2021"
