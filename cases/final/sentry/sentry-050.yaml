description: The artifact image endpoint uses a blanket `except Exception` handler
  that returns 500 and logs to Sentry even when the objectstore image simply doesn't
  exist (a normal condition). The fix adds a specific `except RequestError` clause
  that returns 404 for missing images, reducing error monitoring noise and returning
  the correct HTTP status.
