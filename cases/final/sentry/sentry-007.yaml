description: "The fix for Y-axis formatting introduced a subtle bug: calling `toLocaleString()`\
  \ without options on the result of `formatFloat(..., 4)` silently truncates numbers\
  \ to 3 decimal places (the default `maximumFractionDigits` for `toLocaleString()`),\
  \ discarding the 4-digit precision that `formatFloat` was explicitly asked to preserve.\
  \ Additionally, the formatting is inconsistent \u2014 integer values get comma formatting\
  \ via one path while non-integer values go through `toLocaleString()`, producing\
  \ visually inconsistent output."
