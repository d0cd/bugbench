description: "The comparison data download query fires as soon as metric IDs are available,\
  \ without waiting for the async Celery comparison task to reach SUCCESS state. This\
  \ causes the download endpoint to return 404 (file not yet created), React Query\
  \ caches the error, and when the task later completes the query never re-fires \u2014\
  \ leaving the user with a persistent 'Comparison not found' error. The fix gates\
  \ the download query's `enabled` condition on `mainArtifactComparison?.state ===\
  \ SizeAnalysisComparisonState.SUCCESS`."
