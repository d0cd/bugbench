description: When all threshold max values were cleared in the widget builder, the
  entire thresholds config was set to null, discarding the preferredPolarity setting.
  This caused the polarity to silently reset to the default ('lower is better') when
  the user re-entered threshold values. The fix preserves preferredPolarity in the
  thresholds config even when all max values are cleared.
