pr_title: 'fix(objectstore): Use OrganizationReleasePermission for Objectstore endpoint'
pr_body: 'Use `OrganizationReleasePermission` instead of the default `OrganizationPermission`
  for the objectstore proxy endpoint.


  The default `OrganizationPermission` requires `org:write`/`org:admin` scopes, which
  is too restrictive for a file upload/download endpoint. CI tools and sentry-cli
  typically authenticate with `project:releases` or `org:ci` tokens, which would be
  rejected. All other comparable endpoints (ChunkUpload, ArtifactBundles, ArtifactLookup,
  debug files) use `OrganizationReleasePermission`, which accepts these scopes.'
