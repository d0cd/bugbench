pr_title: 'fix(workflow_engine): Skip workflow processing for inactive projects'
pr_body: "Fixes SENTRY-5JH0\r\n\r\nProjects pending deletion or being deleted may\
  \ have already had their detectors removed, causing `Detector.DoesNotExist` errors\
  \ later on in the pipeline when looking for the issue stream detector. This PR adds\
  \ an early check in `build_workflow_event_data_from_event()` to raise `ProjectNotActiveError`\
  \ and ignores that error in the task definition."
pr_commit_messages:
- 'fix(workflow_engine): Skip workflow processing for inactive projects'
- Cover other cases as well
- No longer fetch project twice, just check the event project
- Fix test by adding init file
- Update test to mock event
- Add Group.DoesNotExist to the ignore_and_capture
