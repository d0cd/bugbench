description: 'Table widgets on dashboards displayed too few rows (3 or 5 instead of
  20) because a prior refactor (PR #107954) started respecting widget.limit for all
  display types, inadvertently exposing stale limit values left over from when a Table
  widget was previously a different chart type (e.g., Top N with limit: 3). The fix
  ensures Table display types always use the hardcoded TABLE_ITEM_LIMIT (20) and strips
  the stale limit from the derived tableWidget in the viewer modal.'
