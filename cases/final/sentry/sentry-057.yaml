- file: src/sentry/workflow_engine/tasks/utils.py
  line: 92
  summary: 'Missing project-status guard: `build_workflow_event_data_from_event` proceeds
    without checking whether the project is active/pending-deletion, leading to `Detector.DoesNotExist`
    crashes when detectors have already been cleaned up'
  line_side: pre_fix
- file: src/sentry/workflow_engine/tasks/workflows.py
  line: 98
  summary: Task entry point does not catch or handle the case where the project is
    inactive, allowing the `Detector.DoesNotExist` exception to propagate as an unhandled
    error instead of being gracefully ignored
  line_side: pre_fix
- file: src/sentry/workflow_engine/tasks/actions.py
  line: 84
  summary: '`trigger_action` path does not exclude `Project.DoesNotExist` and `Group.DoesNotExist`
    from its error handling, meaning these transient-state exceptions are not properly
    ignored or captured'
  line_side: pre_fix
