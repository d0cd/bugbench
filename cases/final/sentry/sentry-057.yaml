description: Projects pending deletion or already being deleted could still have events
  routed through the workflow engine pipeline. Because their detectors had already
  been removed, `build_workflow_event_data_from_event()` would crash with unhandled
  `Detector.DoesNotExist` exceptions. The fix adds an early project-status check that
  raises a dedicated `ProjectNotActiveError`, which calling tasks gracefully ignore.
