description: The query validator's check for MRI (Metrics Resource Identifier) usage
  outside PerfMetrics called `get_column_from_aggregate` without handling columns
  it doesn't recognize. When both tracemetric and custom-metrics flags were enabled,
  unknown columns caused the validator to error instead of gracefully passing through.
  The fix wraps these calls in try/except blocks so unrecognized columns are assumed
  to not be MRIs.
expected_findings:
- file: src/sentry/snuba/snuba_query_validator.py
  line: 279
  summary: Call to `get_column_from_aggregate` lacks error handling for unrecognized
    columns; will raise when trace metrics columns are encountered with custom-metrics
    enabled
- file: src/sentry/snuba/snuba_query_validator.py
  line: 332
  summary: Same unhandled `get_column_from_aggregate` call in a second validation
    path; unrecognized trace metric columns will cause an unexpected error
