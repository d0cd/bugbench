pr_title: 'fix(attachments): Skip rate limiting for attachments already in objectstore'
pr_body: "Attachments with a `stored_id` have already been written to objectstore\
  \ during ingestion, before `save_attachment` is called. The rate limits exist to\
  \ protect filestore from write abuse (INC-766, INC-754), but there is no filestore\
  \ write to protect when `stored_id` is set \u2014 `putfile` reads from objectstore\
  \ rather than writing to it. Rate limiting these attachments only discards already-stored\
  \ data without any benefit.\n\nWrap the rate limit checks in `if not attachment.stored_id`\
  \ so they only run for attachments whose payload still needs to be written.\n\n\
  Refs FS-296"
