description: "The authentication_classes on OrganizationPreprodRetentionEndpoint listed\
  \ SessionAuthentication before token authentication classes. When a request carried\
  \ both session cookies and a Bearer token, session auth would win, set request.auth\
  \ to None, and trigger the SSO check \u2014 returning a spurious 401 sso-required\
  \ error, blocking CLI token-based access. The fix adds OrgAuthTokenAuthentication\
  \ and reorders authentication_classes so token classes precede SessionAuthentication,\
  \ matching the project's DEFAULT_AUTHENTICATION ordering."
expected_findings:
- file: src/sentry/preprod/api/endpoints/organization_preprod_retention.py
  line: 49
  summary: 'authentication_classes ordering is wrong: SessionAuthentication precedes
    token auth classes, so session auth wins when both cookies and Bearer token are
    present, causing spurious 401 sso-required errors. Token authentication classes
    (OrgAuthTokenAuthentication, UserAuthTokenAuthentication) must come before SessionAuthentication.'
