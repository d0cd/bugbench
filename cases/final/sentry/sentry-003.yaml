pr_title: 'fix(preprod): Update existing PR comment instead of posting a new one'
pr_body: 'Each new commit pushed to a PR creates a new `CommitComparison` row. The
  previous code only locked and searched the current commit''s row for an existing
  `comment_id`, so new commits always created a duplicate GitHub comment.


  This changes the lock scope from a single `CommitComparison` row to all rows matching
  the PR (`organization_id` + `head_repo_name` + `pr_number`), ordered by `id` to
  prevent deadlocks. `_find_existing_comment_id` now searches across all locked rows,
  so a `comment_id` stored by a previous commit is found and reused.


  Refs EME-937'
pr_commit_messages:
- 'fix(preprod): Update existing PR comment instead of posting a new one'
- 'fix(preprod): Guard against StopIteration in PR comment task'
