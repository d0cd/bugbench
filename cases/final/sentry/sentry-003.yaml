description: The workflow processor incorrectly reports a missing Environment as an
  error via logger.exception/error and re-raises the exception. Missing environments
  are expected during deletion and nearly impossible otherwise, so this should be
  an info-level log without re-raising. The double-reporting (logging the error AND
  letting it escape) also causes noisy duplicate alerts in Sentry.
expected_findings:
- file: src/sentry/workflow_engine/processors/workflow.py
  line: 386
  summary: 'Incorrect error severity: missing Environment is logged as error/exception
    and re-raised, but this is an expected condition during deletion. Should be logger.info
    instead, and the exception should not be re-raised.'
