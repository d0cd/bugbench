description: Categorical bar chart widgets in the Widget Viewer modal were incorrectly
  treated as time series charts (LINE, AREA, BAR), receiving HALF_TABLE_ITEM_LIMIT
  (10 rows) instead of the full table limit. The fix adds CATEGORICAL_BAR to the FULL_TABLE_ITEM_LIMIT
  condition in all three query branches and passes widget.limit as tableItemLimit
  to the chart container.
