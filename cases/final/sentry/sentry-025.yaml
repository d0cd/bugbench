description: The ContinuousProfilingBillingRequirementBanner component was rendered
  as a sibling outside the DescriptionWrapper, breaking the intended layout. The fix
  moves the banner inside DescriptionWrapper and updates the CSS selector from :not(:last-child)
  to :not(:last-child):has(*) to avoid adding bottom margin when the wrapper is empty.
