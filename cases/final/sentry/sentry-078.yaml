pr_title: 'fix(webhooks): Eliminate head-of-line blocking in sequential mailbox drain'
pr_body: "Previously, `drain_mailbox` returned immediately when any single webhook\
  \ delivery failed, blocking all subsequent messages in that mailbox until the next\
  \ scheduled retry cycle (up to 3 minutes away). A single transient 500 or timeout\
  \ could delay dozens of unrelated, healthy webhooks.\n\nThis changes `drain_mailbox`\
  \ to skip failed messages and continue delivering the remaining messages in the\
  \ mailbox \u2014 matching the behavior already present in the parallel drain path\
  \ (`drain_mailbox_parallel`). Failed messages are individually rescheduled via the\
  \ existing `schedule_next_attempt()` mechanism, so they will be retried on a future\
  \ cycle.\n\nA `current_id` variable now tracks the highest ID processed so far,\
  \ ensuring that failed records (which stay in the database with a future `schedule_for`)\
  \ are not re-fetched within the same drain invocation.\n\nThe ordering semantics\
  \ change from strict to best-effort, which is safe because:\n- The parallel drain\
  \ already uses best-effort ordering without issues\n- GitHub webhook types (push,\
  \ PR, issue events) are idempotent\n- Region silos handle duplicate/out-of-order\
  \ events"
pr_commit_messages:
- "fix(webhooks): Eliminate head-of-line blocking in sequential mailbox \u2026"
- "fix(tests): Update schedule test assertions for new drain-continue be\u2026"
- 'fix(webhooks): Gate skip-on-failure behavior behind a provider allowlist'
