description: The sequential `drain_mailbox` function returned immediately upon any
  single `DeliveryFailed` exception, causing head-of-line blocking where one transient
  failure (e.g. a 500 response) would delay all subsequent unrelated webhooks in that
  mailbox until the next retry cycle (up to 3 minutes). The fix makes the function
  skip failed messages and continue delivering the rest, matching the parallel drain
  path's behavior, with a provider-based allowlist to preserve strict ordering for
  providers that need it.
