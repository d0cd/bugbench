description: The GitLab integration was not catching ApiForbiddenError and ApiUnauthorizedError,
  causing unhandled exceptions to propagate as noise. The fix adds these error types
  to the existing exception handler tuples and adds an explicit catch for IntegrationConfigurationError
  in the SCM repository base class.
