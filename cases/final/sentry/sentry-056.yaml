pr_title: 'fix(dashboards): Add backend validation for widget layout dimensions'
pr_body: 'Replace the custom `LayoutField` with a `LayoutSerializer` using DRF''s
  built-in `IntegerField` validators to reject invalid widget dimensions at the API
  level.


  Widgets created via external tools (e.g. LLMs) can have invalid dimensions like
  `w: 12` where the grid maximum is `6`. This change prevents such layouts from being
  persisted. The `LayoutSerializer` also lets drf-spectacular auto-generate accurate
  OpenAPI documentation with field types and constraints, removing the need for manual
  `@extend_schema_field` annotations.


  Frontend clamping counterpart: https://github.com/getsentry/sentry/pull/109825


  Refs DAIN-1266'
