description: The dashboard API accepted arbitrary widget layout dimensions without
  server-side validation, allowing external clients (e.g. LLMs, scripts) to persist
  invalid layouts such as width exceeding the grid maximum of 6 columns. The fix replaces
  the permissive custom LayoutField with a LayoutSerializer that uses DRF IntegerField
  validators to enforce dimension constraints at the API boundary.
