pr_title: 'fix(dashboards): resolve infinite render loop in ChartLegend overflow detection'
pr_body: "Fixes an infinite render loop in the new `ChartLegend` component that caused\
  \ a \"Maximum update depth exceeded\" React error when the legend was near the overflow\
  \ boundary.\r\n\r\n## Root cause\r\n\r\n`ChartLegend` uses a layout effect to measure\
  \ item widths and decide which items overflow into a dropdown. The trigger button\
  \ (\"+N more\") width was read from React state via `useDimensions`. Two `useLayoutEffect`\
  \ callbacks fire in the same React commit \u2014 one from `useDimensions` and one\
  \ from `ChartLegend` itself \u2014 but React queues state updates from layout effects\
  \ rather than applying them immediately. `ChartLegend`'s effect always read `triggerWidth`\
  \ from the *previous* render.\r\n\r\nAt the exact boundary condition where `triggerWidth=0`\
  \ says items fit but `triggerWidth=79` says they don't, this 1-render lag creates\
  \ a permanent oscillation: showing the trigger makes items not fit, hiding it makes\
  \ them fit, repeat forever.\r\n\r\n## Fix\r\n\r\nRead `triggerRef.current?.getBoundingClientRect().width`\
  \ directly inside the layout effect instead of via state. React guarantees refs\
  \ are attached before layout effects run, so this always reflects the current DOM\
  \ state with no lag. The dep array changes from `[..., triggerWidth, ...]` to `[...,\
  \ firstOverflowIndex, ...]` so the effect re-runs whenever the trigger appears or\
  \ disappears.\r\n\r\nFixes DAIN-1295"
pr_commit_messages:
- "fix(dashboards): resolve infinite render loop in ChartLegend overflow\u2026"
