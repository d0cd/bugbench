description: LLM Detected issues (still in development) were appearing in the trace
  timeline's '1 other issue' display because the issuePlatform API query in useTraceTimelineEvents
  did not filter out hidden issue types. The fix adds a HIDDEN_ISSUE_TYPES constant
  as a single source of truth and derives HIDDEN_OCCURRENCE_TYPE_IDS to exclude these
  types from the trace timeline query.
expected_findings:
- file: static/app/views/issueDetails/traceTimeline/useTraceTimelineEvents.tsx
  line: 83
  summary: 'Missing filter: issuePlatform API query does not exclude hidden issue
    types (e.g., LLM Detected), causing development-stage issues to appear in the
    trace timeline'
- file: static/app/types/group.tsx
  line: 348
  summary: No centralized constant for hidden issue types; VISIBLE_ISSUE_TYPES excludes
    them but there is no reusable HIDDEN_ISSUE_TYPES or HIDDEN_OCCURRENCE_TYPE_IDS
    for API query filtering
