description: The broadcasts data was assumed to always be an array, but could be a
  non-array value (e.g., null, undefined, or an object), causing a crash when `.map()`
  was called on it. The fix adds `Array.isArray()` guards at three locations where
  the broadcasts data is mapped over, falling back to an empty array when the value
  is not an array.
