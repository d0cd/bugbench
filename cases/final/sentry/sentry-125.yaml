description: LLM Detected issue types (still in development) were excluded from search
  results but not from the trace timeline's issuePlatform API query, causing them
  to appear in the '1 other issue' display. The fix introduces a HIDDEN_ISSUE_TYPES
  constant as a single source of truth and uses a derived HIDDEN_OCCURRENCE_TYPE_IDS
  set to filter the trace timeline query.
