pr_body: "## Summary\r\n- LLM Detected issues (still in development) were appearing\
  \ in the trace timeline's \"1 other issue\" display even though they're excluded\
  \ from search\r\n- Add `HIDDEN_ISSUE_TYPES` constant as single source of truth for\
  \ hidden issue types\r\n- Derive `HIDDEN_OCCURRENCE_TYPE_IDS` from this constant\
  \ to filter the issuePlatform API query\r\n- Refactor `VISIBLE_ISSUE_TYPES` to use\
  \ `HIDDEN_ISSUE_TYPES` for consistency\r\n- Filter these issues from the `issuePlatform`\
  \ API query used by the trace timeline feature\r\n\r\n## Test plan\r\n- [x] Added\
  \ unit test for `useTraceTimelineEvents` hook verifying hidden types are excluded\
  \ from query\r\n- [x] Manual verification: find an issue with an LLM Detected issue\
  \ in its trace, confirm it no longer appears in \"1 other issue\"\r\n\r\nBefore:\
  \ [this issue](https://sentry.sentry.io/issues/6741533525/?project=1) shows an LLM\
  \ Detected issue\r\n<img width=\"1002\" height=\"321\" alt=\"Screenshot 2026-03-03\
