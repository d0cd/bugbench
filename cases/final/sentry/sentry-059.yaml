description: 'Migration 1040_drop_fk_projecttemplate declares an incorrect dependency
  ordering with monitors migration 0008_fix_processing_error_keys. The dependency
  chain is inverted: migration 0008 needs to run after 1040 (not before), and 0008
  itself implicitly depends on migration 0964. On clean installations where the project
  template table was never created, the incorrect ordering causes the migration to
  fail because it tries to drop a foreign key on a nonexistent table before the guard
  migration runs.'
