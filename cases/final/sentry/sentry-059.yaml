  line: 29
  summary: 'Migration dependency ordering is incorrect: this migration''s dependencies
    should ensure it runs before monitors/0008, not after. On fresh installs the referenced
    project template table may not exist, and the wrong ordering means no guard handles
    this case.'
  line_side: pre_fix
- file: src/sentry/monitors/migrations/0008_fix_processing_error_keys.py
  line: 216
  summary: This migration declares a dependency on 0964 but implicitly requires 1040
    to have already run; the dependency should be explicit to ensure correct ordering
    on clean databases.
  line_side: pre_fix
