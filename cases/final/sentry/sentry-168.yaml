pr_title: 'fix(traces-explorer): remove chart-specific restrictions on deletion logic'
pr_body: "Continues #105982. Builds on #110153 for a more reactive Compare Queries\
  \ button.\r\n\r\nPreviously:\r\n\r\n* Deletions: the UI required there to be >=1\
  \ _chart_ in the visualization toolbar. It would only show deletion icons for charts\
  \ if there were multiple charts.\r\n  * Though, interestingly, you could manually\
  \ modify the URL to add just equation(s): [https://sentry.sentry.io/explore/traces/?aggregateField=%7B%22groupBy%22%3A%22%22%7D&[\u2026\
  ]ttribute_count_total%2Cnumber%5D%29%22%5D%7D&statsPeriod=24h](https://sentry.sentry.io/explore/traces/?aggregateField=%7B%22groupBy%22%3A%22%22%7D&aggregateField=%7B%22yAxes%22%3A%5B%22equation%7Cavg%28tags%5Battribute_count_total%2Cnumber%5D%29%22%5D%7D&statsPeriod=24h).\
  \ \U0001F604 \r\n* Query comparison: the button is always enabled, and since at\
  \ least one first chart is guaranteed to exist, uses it\r\n\r\nNow:\r\n\r\n* Deletions:\
  \ the UI _\"can we delete this?\"_ logic is simplified to just whether there's >=1\
  \ of any visualization.\r\n* Query comparison: the button is enabled when there\
  \ is at least one chart\r\n\r\nFixes EXP-802."
pr_commit_messages:
- "fix(traces-explorer): remove chart-specific restrictions on deletion \u2026"
