description: The deletion logic in the traces explorer visualization toolbar was incorrectly
  restricted to only counting charts when determining whether a visualization could
  be deleted. This meant equations alone couldn't satisfy the minimum-visualization
  requirement, and the query comparison button assumed a chart always existed. The
  fix generalizes the check to count all visualization types (charts and equations).
expected_findings:
- file: static/app/views/explore/toolbar/toolbarVisualize.tsx
  line: 92
  summary: canDelete only counts VisualizeFunction items (charts), ignoring equations.
    This prevents deletion when the only other visualization is an equation, and wrongly
    assumes a chart always exists.
  line_side: pre_fix
- file: static/gsApp/utils/formatCurrency.tsx
  line: 15
  summary: formatCurrency wraps displayPrice result in unnecessary template literal,
    coercing it to string type when it already returns a string, which could mask
    type errors
  line_side: pre_fix
- file: static/gsApp/hooks/organizationMembershipSettingsForm.tsx
  line: 278
  summary: Replay permissions settings were gated behind 'granular-replay-permissions'
    feature flag check, preventing the UI from rendering for organizations that should
    have access to these controls
  line_side: pre_fix
- file: static/app/views/settings/organizationGeneralSettings/organizationSettingsForm.tsx
  line: 375
  summary: Replay permission settings wrapped in feature flag check that incorrectly
    hid the granular replay permissions UI, preventing users from configuring replay
    access controls
  line_side: pre_fix
- file: tests/sentry/seer/autofix/test_coding_agent.py
  line: 810
  summary: extract_result_url_from_events was incorrectly called as a client method
    instead of a standalone module-level function, and polling used get_session_status
    instead of list_session_events
  line_side: pre_fix
- file: tests/sentry/workflow_engine/migrations/test_0107_fix_email_action_fallthrough_type.py
  line: 123
  summary: "translate_rule_data_actions_to_notification_actions returns raw dicts,\
    \ not Action objects \u2014 the result was compared directly without wrapping\
    \ each dict in Action()"
  line_side: pre_fix
- file: tests/sentry/web/frontend/test_oauth_authorize.py
  line: 63
  summary: OAuth redirect URLs used non-normalized form (https://example.com?) missing
    the trailing slash before query parameters, indicating a URL normalization bug
  line_side: pre_fix
