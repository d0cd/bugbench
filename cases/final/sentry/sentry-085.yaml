description: Sentry's own SDK initialization was forwarding malformed unhandled-rejection
  events that serialize as [null,null], creating noise in their issue tracker. The
  fix adds a beforeSend filter in initializeSdk.tsx that inspects the error's type,
  value, and mechanism to drop these non-actionable events.
