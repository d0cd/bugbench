description: Duration formatting functions in charts.tsx assumed all duration values
  were in milliseconds, but trace metrics can report durations in other units (days,
  weeks, etc.). This caused values like 95 weeks to be displayed as 95 milliseconds.
  The fix normalizes the input value to milliseconds using DURATION_UNIT_MULTIPLIERS
  before passing it to the downstream formatting helpers.
expected_findings:
- file: static/app/utils/discover/charts.tsx
  line: 55
  summary: "tooltipFormatterUsingAggregateOutputType 'duration' case divides value\
    \ by 1000 assuming it is always in milliseconds, but the value's actual unit may\
    \ be days, weeks, etc. \u2014 must multiply by the unit's duration multiplier\
    \ first"
- file: static/app/utils/discover/charts.tsx
  line: 119
  summary: "axisLabelFormatterUsingAggregateOutputType 'duration' case passes raw\
    \ value to axisDuration without converting to milliseconds \u2014 values in non-ms\
    \ units (weeks, days) render incorrectly on the y-axis"
- file: static/app/utils/discover/charts.tsx
  line: 195
  summary: "getDurationUnit computes range min/max/avg directly from raw series values\
    \ without unit conversion \u2014 duration categorization is wrong when data is\
    \ not in milliseconds"
