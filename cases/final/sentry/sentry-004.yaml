description: The truncation limit for GitHub Copilot's `problem_statement` field was
  set to 29,900 raw characters, but JSON encoding expansion (escaping newlines, quotes,
  backslashes) could push the serialized payload beyond the 30,000 character API limit,
  causing request rejections. The fix lowers the truncation threshold to 25,000 characters
  to provide sufficient headroom.
