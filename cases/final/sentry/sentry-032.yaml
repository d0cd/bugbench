description: The restart handler was changed from calling `aiAutofix.reset()` (which
  clears state before requiring a second click) to directly calling `startStep('root_cause')`
  without resetting first. This means stale autofix state (partial results, error
  flags, in-progress steps) may persist across restarts. Additionally, `onReset` is
  now always defined rather than conditionally `undefined`, so the reset button is
  always enabled even when `runState` is falsy and there is nothing to reset.
