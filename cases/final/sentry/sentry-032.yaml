  line: 152
  summary: useHandleRestart calls `startStep('root_cause')` without first calling
    `aiAutofix.reset()`. Stale autofix state (partial results, error flags, in-progress
    steps) will persist into the new run, potentially causing incorrect or confusing
    behavior.
  line_side: pre_fix
- file: static/app/components/events/autofix/v3/drawer.tsx
  line: 48
  summary: '`onReset` is now always defined (handleRestart is never undefined), removing
    the guard that previously disabled the reset button when `runState` is falsy.
    Users can trigger a restart when no autofix session is active.'
  line_side: pre_fix
