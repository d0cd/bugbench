description: The Redis buffer's _dump_value/_load_value methods only handled primitive
  types (str, datetime, date, int, float) but the buffer's `extra` argument can contain
  dict values. Passing a dict would raise a TypeError. The fix adds recursive dict
  serialization via JSON with a depth limit of 3, and corresponding deserialization
  in _load_value.
expected_findings:
- file: src/sentry/buffer/redis.py
  line: 266
  summary: "_dump_value type signature excludes dict \u2014 passing a dict (e.g. via\
    \ the `extra` kwarg) raises TypeError at the else branch. Should accept dict[str,\
    \ Any] and serialize recursively."
  line_side: pre_fix
- file: src/sentry/buffer/redis.py
  line: 282
  summary: Missing 'elif isinstance(value, dict)' branch means dict values fall through
    to the TypeError raise on line 283. Buffer callers that pass nested extra data
    will crash.
  line_side: pre_fix
