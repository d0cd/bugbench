pr_title: 'fix(traces): Filter unreleased issue types from trace API'
pr_body: "When developing a new performance issue type, we add it with `released =\
  \ False`, which allows us to test and calibrate without exposing the resulting \"\
  test issues\" to users.\r\n\r\nLast week I observed events of unreleased issue types\
  \ were appearing in multiple trace-related views in prod:\r\n\r\n- Trace waterfall\r\
  \n- Trace preview timeline + \"1 other issue\" display on issue details\r\n- Event\
  \ graph in issue details\r\n\r\nUsers could see issues in traces that should have\
  \ been hidden. Unreleased issue types are not returned in `/issues/` api responses,\
  \ but the same filtering was not applied to the trace API.\r\n\r\nI implemented\
  \ these 2 prs: https://github.com/getsentry/sentry/pull/109857 and https://github.com/getsentry/sentry/pull/109929\
  \ (which can be reverted once this is landed, since the changes in this pr are a\
  \ better and more broad solution).\r\n\r\n## Solution\r\n\r\nAdd backend filtering\
  \ to the trace API (`/organizations/{org}/trace/{trace_id}/`) using the same visibility\
  \ system that the issues API uses. The trace query now calls `grouptype_registry.get_visible(organization)`\
  \ to filter performance occurrences by visible issue types, which:\r\n\r\n1. Includes\
  \ all `released=True` issue types\r\n2. Includes unreleased types only if the org\
  \ has the corresponding `organizations:issue-{slug}-visible` feature flag enabled\r\
  \n\r\n## Changes\r\n\r\n- `src/sentry/snuba/trace.py`: Add `organization` param\
  \ to `_perf_issues_query` and filter by visible occurrence type IDs\r\n- `src/sentry/api/endpoints/organization_trace.py`:\
  \ Thread organization through to the query\r\n- Update all callers (autofix, trace\
  \ summary, seer explorer) to pass organization\r\n\r\n## Notes\r\n\r\n- This only\
  \ works for performance issues, which have the `occurrence_type_id` field on the\
  \ events\r\n- This allows reverting PR #109929 which added frontend filtering as\
  \ a stopgap\r\n- The `get_visible()` call is already used in the issues search endpoint,\
  \ so performance characteristics are known\r\n- Sentry SDK span already exists for\
  \ monitoring (`GroupTypeRegistry.get_visible`)"
pr_commit_messages:
- Hide LLM Detected issues from trace timeline
- remove unnecessary test
- Filter unreleased issue types from trace API
