description: ProjectRedirect model had a hardcoded max_length of 50 for its slug field,
  while Project allows slugs up to PROJECT_SLUG_MAX_LENGTH (which is larger). This
  mismatch caused errors when redirecting projects with slugs longer than 50 characters.
  The fix unifies both models to use the same PROJECT_SLUG_MAX_LENGTH constant.
expected_findings:
- file: src/sentry/models/projectredirect.py
