description: Impersonated superuser sessions bypass data secrecy enforcement because
  `is_active_superuser()` returns False during impersonation, skipping the `get_superuser_scopes()`
  path that checks data secrecy. This allows impersonating users to access organizations
  that have data secrecy enabled, defeating the access control. The fix adds explicit
  guards in both `from_request_org_and_scopes()` and `from_request()` to detect impersonation
  via `request.actual_user` and raise `DataSecrecyError`.
expected_findings:
- file: src/sentry/auth/access.py
  line: 916
  summary: 'Missing impersonation guard: when `is_active_superuser()` is False due
    to impersonation, the data secrecy check in `get_superuser_scopes()` is skipped,
    allowing impersonated sessions to access data-secrecy-protected orgs. Need to
    check `request.actual_user` and call `should_allow_superuser_access()` before
    proceeding.'
  line_side: pre_fix
- file: src/sentry/auth/access.py
  line: 1015
  summary: 'Same missing impersonation guard in `from_request()`: impersonated sessions
    bypass data secrecy check on this code path as well. Need to add `request.actual_user`
    check with `DataSecrecyError` here too.'
  line_side: pre_fix
