description: ProjectRedirect model's slug field used Django's default max_length of
  50, while Project allows slugs up to PROJECT_SLUG_MAX_LENGTH (which is larger).
  This caused database errors when redirecting projects with slugs longer than 50
  characters. The fix unifies both models to use the same constant.
