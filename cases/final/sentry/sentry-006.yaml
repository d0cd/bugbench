description: When groups referenced by trace events are missing from the database,
  the trace view crashes entirely instead of gracefully degrading. The fix adds None
  to the result type for group lookups so that missing groups are handled as absent
  values, allowing the trace to continue rendering without the missing group data.
expected_findings:
- file: src/sentry/snuba/trace.py
  line: 114
  summary: Group lookup assumes group always exists; missing groups will raise an
    exception or cause a KeyError, breaking the entire trace view. Should handle None/missing
    groups gracefully.
- file: src/sentry/snuba/trace.py
  line: 132
  summary: Result type does not include None for group, so downstream code has no
    way to handle missing groups without crashing.
