pr_title: 'fix(jira): Update error handling to handle more form errors'
pr_body: "When Jira returns with {\"errorMessages\": [\"Issue does not exist or you\
  \ do not have                                                 \r\n  permission to\
  \ see it.\"], \"errors\": {}}, surface it as a field-level IntegrationFormError\
  \                \r\n                                                          \
  \                                    \r\nCurrently we're not processing the response\
  \ to an `ApiInvalidRequestError` and it's remaining as an ApiError.\r\n  The fix\
  \ consolidates the error handling for  into a single ApiError block. Also adds the\
  \ raise_error() call\r\n  in get_issue() so the mapped exception actually reaches\
  \ the caller.\r\n\r\n  Fixes SENTRY-5H66\r\n  Co-Authored-By: Claude <noreply@anthropic.com>"
