description: The `resolve_fingerprint_variable` helper unconditionally parameterizes
  the `{{ message }}` variable value, but this parameterization should only apply
  when the variable is used for fingerprinting/grouping, not when it's used to build
  custom event titles via `expand_title_template`. This causes custom titles to display
  parameterized (sanitized) messages instead of the original human-readable values.
