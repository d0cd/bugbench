pr_title: 'fix(grouping): Stop parameterizing message variable in custom titles'
pr_body: "Fingerprint rules can be used not only to affect grouping but also to set\
  \ custom titles for events, using the same variables as are used for fingerprinting.\
  \ When the `{{ message }}` variable appears in a fingerprint, we parameterize the\
  \ value, as we do in other places where we use the message for grouping. This parameterization\
  \ is currently over-applied, though, in that it's also happening when the `{{ message\
  \ }}` variable is used in custom titles. (We don't parameterize error messages in\
  \ non-custom titles, so we shouldn't be doing it in custom titles, either.)\r\n\r\
  \nThis fixes that by adding a new optional `parameterize_message` parameter to our\
  \ `resolve_fingerprint_variable` helper. It defaults to `True`, so in most places\
  \ there's no change in behavior, but it allows us to prevent the parameterization\
  \ when we're calling it from `expand_title_template`. As can be seen in the snapshot,\
  \ neither the fingerprint nor the hash changes, but the title now uses the original\
  \ values from the message.\r\n\r\nThis is the other half of the fix for https://github.com/getsentry/sentry/issues/109301.\
  \ (The first half was done in https://github.com/getsentry/sentry/pull/109713.)"
pr_commit_messages:
- add `parameterize_message` parameter to `resolve_fingerprint_variable`
- don't parameterize messages in custom titles
- update snapshot
