pr_title: 'fix(detectors): Make mobile build threshold validation require at least
  one'
pr_body: 'Make high or low priority threshold required (not just high) on mobile build
  monitor creation.


  Previously the high priority threshold was unconditionally `required`, blocking
  users who only wanted to set a low priority threshold. The backend (`createPreprodConditions()`)
  already handles missing thresholds gracefully, so only the frontend validation needed
  to change.


  - Replace per-field `required` with a cross-field `validate` function that checks
  if at least one threshold (high or low) is filled

  - Show the validation error only on the high priority field to avoid duplicate tooltips

  - Remove the required asterisk since neither field is individually required


  Refs EME-927'
