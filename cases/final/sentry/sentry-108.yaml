pr_title: 'fix(workflows): Don''t report missing Environment as an error'
pr_body: "Missing environments are expected on deletion, and should be nearly impossible\
  \ in other cases.\r\nAs such, it can be useful context in a log, but isn't something\
  \ we should by itself treat as an error.\r\n\r\nAdditionally, we're re-raising here,\
  \ and we rarely want to report an exception _and_ let it escape.\r\n\r\nFixes SENTRY-5KW4.\r\
  \n"
