pr_body: "Remove special-case measurement formatting that replaced full aggregate\
  \ expressions like `p75(measurements.lcp)` with just `LCP` in chart legends.\r\n\
  \r\nPreviously, if multiple aggregates of a Web Vitals like `p75(measurements.lcp)`\
