description: The formatTimeSeriesLabel function had special-case logic that replaced
  full aggregate expressions like `p75(measurements.lcp)` with just the measurement's
  friendly name (e.g., 'LCP'). When multiple aggregates of the same measurement appeared
  on one chart (e.g., p75 and p50), their legends became identical and indistinguishable.
  The fix removes this special-case formatting so the full expression is preserved.
