description: The Widget Viewer Modal never received the dashboard's user-selected
  time series interval (widgetInterval), so opening a widget in full screen reverted
  the chart to its default interval and triggered an unnecessary data re-fetch. The
  fix threads the widgetInterval prop through WidgetViewerModalOptions, WidgetCardChartContainer,
  and the dashboard detail view so the modal preserves the chosen granularity.
expected_findings:
- file: static/app/views/dashboards/detail.tsx
  line: 308
  summary: 'Missing prop: widgetInterval is not passed to the Widget Viewer Modal
    options, causing the modal to lose the user-selected interval'
- file: static/app/components/modals/widgetViewerModal.tsx
  line: 136
  summary: WidgetViewerModalOptions interface lacks widgetInterval property, so the
    modal cannot receive the dashboard's interval override
- file: static/app/views/dashboards/widgetCard/widgetCardChartContainer.tsx
  line: 57
  summary: WidgetCardChartContainer props missing widgetInterval, preventing the interval
    from being forwarded to chart queries inside the modal
