pr_title: 'fix(difs): Use PROTECT for shared debug files'
pr_body: "`ProjectDebugFile.file` can now be shared by multiple rows.\r\n\r\nUpdate\
  \ the Django relation from `CASCADE` to `PROTECT` so ORM deletes match the intended\
  \ ownership model. Keep deleting the backing `File` as a best-effort cleanup step\
  \ after deleting a `ProjectDebugFile`, but leave it in place when another `ProjectDebugFile`\
  \ still references it.\r\n\r\nThis prepares us for [#106947](https://github.com/getsentry/sentry/issues/106947),\
  \ where the solution will be to allow multiple `ProjectDebugFile`s to share a single\
  \ `File` row.\r\n\r\nThe database should already reject deleting a referenced `File`;\
  \ this change makes Django raise `ProtectedError` instead of relying on a DB-level\
  \ failure path."
pr_commit_messages:
- 'fix(difs): Use PROTECT for shared debug files'
