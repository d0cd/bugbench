pr_title: 'fix(dashboards): Allow table widgets to have a limit up to 20'
pr_body: "The backend widget serializer validates widget limits by display type, but\
  \ had no\nspecific case for table widgets \u2014 they fell through to the default\
  \ max of 10. The\nfrontend hardcodes a table limit of 20 (via `TABLE_ITEM_LIMIT`\
  \ in `sortableWidget.tsx`),\nso saving or updating table widgets with the default\
  \ limit would fail validation.\n\nAdds `TABLE` as a recognized display type with\
  \ `max_allowed = 20` in the validation chain."
