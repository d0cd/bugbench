pr_body: "Fixes https://github.com/getsentry/sentry/issues/110284\r\n\r\nThe behavior\
  \ of this condition was changed from `has_reappeared` to `has_escalated` 7 months\
  \ ago: https://github.com/getsentry/sentry/pull/96012 but the label was not updated\
  \ correctly. It should read \"An issue has escalated\" (like it does in the new\
  \ alerts UI).\r\n\r\nThere can be a separate discussion about whether we want to\
  \ support a condition which has the old behavior (only triggering when transitioning\
  \ from archived to escalating), but for now this label change will clarify the actual\
  \ behavior."
