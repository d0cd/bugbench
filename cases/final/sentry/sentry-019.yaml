pr_title: 'fix(billing): Fix category display names in pending changes'
pr_body: "## Summary\n- Fix `getPlanCategoryName` and `getSingularCategoryName` fallback\
  \ to use human-readable `titleName`/`displayName` from `DATA_CATEGORY_INFO` instead\
  \ of raw camelCase category keys (e.g. `sizeAnalyses`) when `categoryDisplayNames`\
  \ is missing from the plan\n- This fixes the pending changes display on both `/settings/billing/overview/`\
  \ and `_admin` showing raw keys like \"Reserved sizeAnalyses change to 100\" instead\
  \ of \"Reserved size analysis builds change to 100\"\n- The fallback is triggered\
  \ when `categoryDisplayNames` doesn't include a category, e.g. due to feature flag\
  \ gating (`organizations:expose-category-size-analysis`)\n\n## Test plan\n- [x]\
  \ Added test for size analysis pending changes in billing overview (`pendingChanges.spec.tsx`\
  \ \u2014 22 tests pass)\n- [x] Added test for size analysis pending changes in admin\
  \ view (`gsAdmin/pendingChanges.spec.tsx` \u2014 13 tests pass)\n- [x] Updated existing\
  \ admin test assertions that previously expected raw category keys (`spansIndexed`\
  \ \u2192 `stored spans`, `replays` \u2192 `session replays`)"
