pr_title: 'fix(github): Swallow error when getting back an error response for codeowners
  file'
pr_body: "Currently we don't differentiate between a JSON response and the raw bytes\
  \ response when getting back a codeowner file leading to[ bad state issues](https://sentry.slack.com/archives/CD4NYFD34/p1772658791476249).\
  \ This PR will raise an error if we get an error response (status code >= 400) from\
  \ github.\r\n\r\nThe callers of get_file will then swallow this exception so this\
  \ error will not get propagated up but that's ok imo since we just want to prevent\
  \ the bad state case."
pr_commit_messages:
- swallow error when getting back an error response for codeowners file
