description: The GitHub integration's get_file method does not distinguish between
  a successful raw bytes response and a JSON error response when fetching CODEOWNERS
  files. When the GitHub API returns an error (status >= 400), the response body is
  treated as file content, leading to bad state where error JSON is stored as if it
  were a valid CODEOWNERS file. The fix adds an explicit check for error status codes
  and raises an exception that callers already swallow.
expected_findings:
- file: src/sentry/integrations/github/client.py
  line: 916
  summary: get_file method does not check HTTP status code when codeowners=True, treating
    error responses (status >= 400) as valid file content by directly decoding response
    bytes
  line_side: pre_fix
- file: static/app/views/issueDetails/actions/index.tsx
  line: 431
  summary: The Unresolve/Unarchive button was gated on resolveCap.enabled for both
    actions and used a single button for both states. The 'Unarchive' action should
    be shown when isIgnored (not when resolveCap.enabled), and 'Unresolve' should
    only appear when isResolved. This caused the Unarchive button to be incorrectly
    hidden when resolve capability was disabled, and conflated two distinct state
    transitions.
  line_side: pre_fix
- file: static/app/views/detectors/hooks/useMetricDetectorSeries.tsx
  line: 38
  summary: useMetricDetectorSeries did not extract or return the server-provided unit
    and outputType from the API response metadata. Chart formatters relied solely
    on client-inferred output types (from the aggregate function name), which are
    incorrect for custom metrics where the server knows the actual unit (e.g., 'day',
    'kibibyte'). This caused charts to display values with wrong formatting.
  line_side: pre_fix
- file: static/app/views/dashboards/utils/prebuiltConfigs/frontendAssets/frontendAssetsSummary.ts
  line: 62
  summary: Widget query objects were missing the 'fields' property while having 'aggregates'
    and 'columns'. The fields array is required for proper widget rendering and data
    fetching; its absence caused widgets to not display data correctly since fields
    drives the query execution.
  line_side: pre_fix
- file: static/gsAdmin/components/customers/customerStats.tsx
  line: 210
  summary: Condition only checks for reason === 'none' but fails when point.by.reason
    is missing/falsy, causing abuse data points with no reason to be miscategorized
  line_side: pre_fix
- file: static/gsAdmin/components/customers/customerStats.tsx
  line: 218
  summary: Unconditionally pushes a new data object for abuse data instead of accumulating
    into existing dateIndex entry, causing duplicate/incorrect chart data when multiple
    abuse points share the same date
  line_side: pre_fix
