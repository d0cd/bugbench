description: 'The TitleWithLink styled component used `width: 100%` which made the
  entire row a click target, causing users to accidentally navigate when clicking
  empty space next to the linked error title in trace view. Additionally, a `<p>`
  tag was incorrectly used inside an inline/link context in IssueSeerBadge, which
  is invalid HTML nesting (block element inside inline element).'
expected_findings:
