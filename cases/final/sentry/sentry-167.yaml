pr_body: "follow up to https://github.com/getsentry/sentry/pull/110374\r\n\r\nFor\
  \ self-hosted users, 0008 migration is already applied. 1040 was added last month,\
  \ so the migration order cannot be done in the order that is expected in the dependency\
  \ graph. This reverts the migration dependency, and fixes clean migrations so that\
  \ 0008 no longer uses `sentry_project.template_id` which was breaking for clean\
  \ installs of getsentry\r\n\r\nfixes https://github.com/getsentry/self-hosted/issues/4222"
