description: Migration 0008_fix_processing_error_keys has an incorrect dependency
  on a later migration (1040), causing the migration graph to require sentry_project.template_id
  before it exists. For self-hosted clean installs, 0008 runs before the column is
  created, breaking the migration. The fix reverts the dependency ordering and removes
  the use of template_id from the data migration function.
