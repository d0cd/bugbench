description: Renames hybrid cloud resolvers from 'region' to 'cell' terminology but
  leaves all service method signatures and callsites still using `region_name` parameters.
  The ByCellName resolver defaults parameter_name to 'cell_name' but includes a hard-coded
  fallback to 'region_name', meaning the fallback path is always exercised. The ByRequestingRegionName
  and ByReplyingRegionName subclasses inherit the hard-coded 'region_name' fallback
  which is semantically wrong for their custom parameter names.
expected_findings:
- file: src/sentry/hybridcloud/rpc/resolvers.py
  line: 47
  summary: 'ByCellName.resolve() hard-codes fallback to ''region_name'' which is fragile:
    subclasses like ByRequestingRegionName/ByReplyingRegionName inherit this fallback
    even though their parameter names are ''requesting_region_name''/''replying_region_name'',
    not ''region_name''. If the primary parameter_name is ever absent, the fallback
    will KeyError instead of checking the subclass-appropriate legacy name.'
  line_side: pre_fix
- file: src/sentry/relocation/services/relocation_export/service.py
  line: 13
  summary: "ByRequestingRegionName and ByReplyingRegionName now inherit from ByCellName\
    \ with its hard-coded 'region_name' fallback, but these subclasses use 'requesting_region_name'\
    \ and 'replying_region_name' \u2014 the inherited fallback path is semantically\
    \ incorrect for these subclasses and would produce a KeyError if ever reached."
  line_side: pre_fix
- file: src/sentry/sentry_apps/services/hook/service.py
  line: 55
  summary: 'Inconsistent call style: uses positional arg `@regional_rpc_method(ByCellName())`
    instead of keyword `resolve=ByCellName()` used everywhere else in the codebase.'
  line_side: pre_fix
