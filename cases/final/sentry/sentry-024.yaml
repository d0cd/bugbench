description: Integration tests for pre-prod EAP didn't inherit from the correct base
  test case classes (TestCase, SnubaTestCase), so they were never discovered or run
  by the test runner. Additionally, the tests used the async Kafka producer (SingletonProducer)
  which only flushes on process exit, meaning TraceItems never reached Snuba during
  test runs. The fix adds proper base class inheritance, switches to the synchronous
  store_occurrences HTTP endpoint pattern, and adds missing __init__.py files.
