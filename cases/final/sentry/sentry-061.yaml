description: Integration test classes did not inherit from the required base test
  case classes (SnubaTestCase, TestCase), so the test discovery framework never collected
  or ran them. Additionally, the tests used the async Kafka producer (SingletonProducer)
  which only flushes on process exit, meaning data never reached Snuba during test
  runs. Missing __init__.py files further prevented proper test module discovery.
