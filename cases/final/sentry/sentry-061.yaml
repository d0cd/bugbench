pr_title: 'fix(tests): Fix pre-prod eap integration tests'
pr_body: "These tests didn't inherit from the base testcase, and so were never running.\
  \ I noticed this when using them as a base for similar tests for my project.\r\n\
  \r\nOnce these tests ran in CI they ended up failing. The tests were producing TraceItems\
  \ via the async Kafka producer, but SingletonProducer only flushes on process exit,\
  \ so data never reached Snuba during test runs. Fix by intercepting the Kafka produce\
  \ call to\r\ncapture the serialized TraceItem and inserting it via the synchronous\
  \ HTTP endpoint (store_occurrences), which is the standard pattern used by all other\
  \ Snuba integration tests.\r\n\r\nAlso add in missing `__init__.py` files.\r\n"
