pr_title: 'fix(tests): Prerequisite test fixes for xdist parallelization'
pr_body: "Test fixes that are required for xdist, but not necessarily xdist-specific.\r\
  \n\r\n### 1. Fix nondeterministic widget ordering (`test_organization_dashboard_details.py`)\r\
  \n\r\n`DashboardWidget.order` is a `BoundedPositiveIntegerField(null=True)`. Four\
  \ widgets in the test fixtures were created without `order=`, leaving them NULL.\
  \ The query uses `ORDER BY (order, id)` \u2014 PostgreSQL's ordering of NULL values\
  \ is nondeterministic, causing intermittent assertion failures on widget position.\r\
  \n\r\n**Fix:** Add explicit `order=0,1,2,3` to the four widget fixtures.\r\n\r\n\
  ### 2. Add `django_db` marker to `test_buffer.py`\r\n\r\n`flush_segments()` calls\
  \ `Project.objects.get_from_cache()` which requires DB access. Without the `django_db`\
  \ marker, this causes \"Database access not allowed\" errors under parallel execution.\
  \ This is a rare case \u2014 almost all Sentry tests inherit from `TestCase` (which\
  \ implicitly grants DB access), but `test_buffer.py` is one of the few function-based\
  \ test files that relies on pytest-django's marker system.\r\n\r\n**Fix:** Add `pytestmark\
  \ = [pytest.mark.django_db]`."
pr_commit_messages:
- 'fix(tests): Prerequisite test fixes for xdist parallelization'
