description: The regex for parameterizing kitchen-style time strings (e.g. '12:31
  pm') uses the (?x) verbose flag, which causes literal spaces in the pattern to be
  ignored. This meant the optional space between the time and the am/pm designator
  was silently dropped, so inputs like '3:04 PM' (with a space) would not be fully
  parameterized. The fix replaces the literal space with \s and makes it optional.
expected_findings:
