pr_title: 'fix(tracemetrics): Handle unit for "value" column in frontend'
pr_body: "We can get the unit and type for aggregates from the events and events-stats\
  \ endpoints, but getting raw `value` is more difficult. This is because an aggregate\
  \ has the unit in its definition (i.e. `avg(value,name,type,unit)`), but consider\
  \ an `events` query where only the `id` and `value` is requested, i.e. without an\
  \ aggregation.\r\n\r\nFor events requests we pass in the metric information in the\
  \ filter conditions (i.e. `metric.name:name metric.type:type metric.unit:unit`).\
  \ Since we have this information on the frontend, we can just augment the meta from\
  \ the response and inject the unit with similar logic from the backend"
