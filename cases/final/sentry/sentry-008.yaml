description: The OAuth2 authorization page's Approve button was immediately clickable
  on page load, making it vulnerable to double-clickjacking and UI redressing attacks.
  The fix adds a delay mechanism before enabling the Approve button, but the implementation
  uses `pointermove` as the sole trigger to start the enable timer, which blocks keyboard-only
  and some touch users from ever approving. Additionally, the timer uses a 1-second
  delay instead of the intended 3 seconds, and `pointerdown` could let an attacker's
  overlaid click initiate the enable timer.
