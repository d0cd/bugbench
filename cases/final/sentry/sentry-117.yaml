pr_title: 'bug(infra): Fix backend-with-coverage job to have odiff binary'
pr_body: "Last week https://github.com/getsentry/sentry/pull/109381 was merged which\
  \ added the odiff binary to the backend CI workflow as it was a new required dependency\
  \ for CI tests.\r\n\r\nUnfortunately, we missed adding this to the `backend-with-coverage`\
  \ job which is used to upload selective testing coverage metrics. This caused all\
  \ runs of backend with coverage to fail, resulting in no coverage data being uploaded.\
  \ \r\n\r\nThis fixes the `backend-with-coverage` workflow to install the odiff binary\
  \ which should fix tests.\r\n\r\nManual run to confirm this fixes: https://github.com/getsentry/sentry/actions/runs/22696037548"
