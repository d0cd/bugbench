pr_title: 'fix(trace): Prefer standalone span indicators over pageload span indicators'
pr_body: "Fix trend line placement for standalone LCP spans in the trace waterfall.\r\
  \n\r\nWhen both a pageload span and a standalone LCP span are present, the trace\
  \ waterfall should prefer the standalone span's indicator instead of leaving the\
  \ pageload-derived indicator in place.\r\n\r\nThis branch now does two things. First,\
  \ standalone span measurements replace an existing indicator of the same type so\
  \ the more specific LCP span wins. Second, the indicator timestamp still applies\
  \ the measurement offset from the provided origin rather than assuming standalone\
  \ spans always occur exactly at span start. That matters for both the node-start\
  \ path and the `performance.timeOrigin` path used by EAP trace data.\r\n\r\nThe\
  \ updated tests cover standalone indicator priority and the trace-origin case so\
  \ we don't regress the offset calculation again.\r\n\r\nRefs EXP-824"
pr_commit_messages:
- "fix(trace): Prefer standalone span indicators over pageload span indi\u2026"
- 'test(trace): Add test for standalone LCP span indicator priority'
- 'fix(trace): Apply standalone LCP measurement offsets'
- 'test(trace): Model standalone LCP spans as siblings of pageload span'
