description: The deprecated TOP_N display type was still being used as-is in saved
  dashboards, routing through a legacy rendering path that lacks y-axis value abbreviation.
  This caused large numbers like 150000000 to display unformatted. The fix maps TOP_N
  to AREA in both the widget builder (for gradual migration on re-save) and the widget
  card (for immediate correct rendering).
expected_findings:
- file: static/app/views/dashboards/widgetBuilder/hooks/useWidgetBuilderState.tsx
  line: 1232
  summary: DisplayType.TOP_N is not mapped to DisplayType.AREA in deserializeDisplayType,
    allowing deprecated TOP_N to persist and use legacy rendering without y-axis abbreviation
- file: static/app/views/dashboards/widgetCard/index.tsx
  line: 43
  summary: TOP_N display type is handled via its own legacy code path with custom
    query manipulation instead of being treated as AREA, causing unformatted y-axis
    values
