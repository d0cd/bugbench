  line: 122
  summary: UseMutationOptions uses `any` for TData and TContext type parameters instead
    of threading generic types through, causing callback argument types to degrade
    to `unknown`/`any` and breaking type safety
  line_side: pre_fix
- file: static/app/components/core/form/field/autoSaveField.tsx
  line: 157
  summary: AutoSaveField function signature lacks TData and TContext generic parameters,
