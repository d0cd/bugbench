description: The AutoSaveField component's mutationOptions prop did not thread generic
  type parameters through to the underlying mutation callbacks (onMutate, onSuccess,
  onError, onSettled). This caused the context type returned by onMutate and other
  callback arguments to degrade to `unknown`, breaking type safety for consumers of
  the component.
expected_findings:
