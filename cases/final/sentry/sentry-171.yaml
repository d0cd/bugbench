description: The `usePopulateLinkedDashboards` hook queries for prebuilt dashboards
  by ID but does not include the `showHidden` filter, causing the API to exclude hidden
  dashboards (such as mobile vitals detail dashboards) from results. This breaks detail
  links for any dashboard marked as hidden. The fix adds `showHidden` to the query
  parameters so hidden dashboards are resolved correctly.
