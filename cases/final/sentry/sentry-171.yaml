pr_title: 'fix(dashboards): Include hidden dashboards in linked dashboard lookup'
pr_body: "Add `showHidden` filter to the prebuilt dashboard ID query in\r\n`usePopulateLinkedDashboards`\
  \ so that hidden dashboards (i.e the detail dashboards)\r\nare included when resolving\
  \ linked dashboard detail links.\r\n\r\nWithout this filter, the API excludes hidden\
  \ dashboards from results,\r\ncausing detail links for mobile vitals dashboards\
  \ to break since those\r\ndashboards are marked as hidden.\r\n\r\nFixes DAIN-1339"
