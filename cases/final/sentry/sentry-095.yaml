pr_title: 'fix(copilot): Use `state` field instead of `status` for task lifecycle'
pr_body: "The GitHub Copilot Tasks API returns task lifecycle values (`queued`, `in_progress`,\
  \ `completed`, `failed`, `timed_out`) in the `state` field, while the `status` field\
  \ is always an empty string. Our polling code was checking `task_status.status ==\
  \ \"completed\"` which was never true, so Copilot tasks would stay stuck in RUNNING\
  \ state forever after completion \u2014 the PR URL and completion state were never\
  \ synced back to Sentry.\n\nValidated by hitting the live Copilot API: created a\
  \ task, polled until completion, and confirmed that `state` carries the lifecycle\
  \ values while `status` is always `\"\"`. The partner API spec we were given listed\
  \ `status` as the field, but the actual API uses `state`.\n\nChanges:\n- Add `state`\
  \ field to `GithubCopilotTask` model (keep `status` for forward-compat)\n- Switch\
  \ polling logic to check `task_status.state` instead of `task_status.status`\n-\
  \ Update test mocks to match real API response shapes (`state`, `in_progress`, `github_resource`,\
  \ `updated_at`)\n\n\nAgent transcript: https://claudescope.sentry.dev/share/7RfoUCo3OmihUbUrznGRpJ0bE9LXTfcbFamSXhLirtc"
