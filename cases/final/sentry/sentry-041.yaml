pr_title: 'fix(settings): remove double url normalization'
pr_body: "Got reports that interacting with settings page filters on pages like `/settings/members`\
  \ redirected users to `/settings/organization`.\r\n\r\n28ffbf4d49e (#110000) deleted\
  \ the RR3 `test-compat` branch from `useNavigate` but kept its `normalizeUrl()`\
  \ call, unintentionally adding it to the RR6 code path. The original RR6 path (introduced\
  \ in 57035b3773c / #70632) passed `to` directly to `locationDescriptorToTo()` without\
  \ normalization.\r\n\r\nI also removed the `applies url normalization for customer-domains`\
  \ test in `useNavigate.spec.tsx` because the assertion added in 28ffbf4d49e validated\
  \ the bugged behavior. The original version tested the RR3 path via `routeContext.router.push`,\
  \ which is now deleted.\r\n\r\nKeeping the original commits here that remove `pathname`\
  \ from `useNavigate` calls since that is still correct, but not the root cause."
pr_commit_messages:
- 'fix(settings): remove double url normalization'
