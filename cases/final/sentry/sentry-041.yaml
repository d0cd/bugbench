description: When the React Router 3 compatibility branch was removed from useNavigate,
  the normalizeUrl() call that served the RR3 path was left behind. This caused double
  URL normalization on the React Router 6 code path, stripping path suffixes from
  settings page navigations (e.g., /settings/members redirecting to /settings/organization).
  The fix removes the redundant normalizeUrl() call and the test that validated the
  now-incorrect behavior.
