description: The `authentication_classes` on `OrganizationPreprodRetentionEndpoint`
  listed `SessionAuthentication` before token-based auth classes. When a request carried
  both session cookies and a Bearer token, session auth would win, set `request.auth
  = None`, and trigger a spurious `401 sso-required` error, preventing CLI token authentication
  from working. The fix reorders authentication classes so token auth runs first and
  adds the missing `OrgAuthTokenAuthentication`.
expected_findings:
- file: src/sentry/preprod/api/endpoints/organization_preprod_retention.py
  line: 49
  summary: 'authentication_classes ordering is incorrect: SessionAuthentication precedes
    token auth classes, causing session auth to win over Bearer tokens and return
    spurious 401 sso-required. Token classes should come first, matching DEFAULT_AUTHENTICATION
    ordering.'
- file: src/sentry/preprod/api/endpoints/organization_preprod_retention.py
  line: 49
  summary: "Missing OrgAuthTokenAuthentication from authentication_classes \u2014\
    \ org-scoped auth tokens cannot authenticate against this endpoint."
