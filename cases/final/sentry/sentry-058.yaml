description: The `failure_rate()` and `failure_count()` span query formulas returned
  None when no spans matched the conditional aggregation filter, causing the frontend
  to render '(no value)'. The fix wraps the conditional aggregation in `failure_rate`
  with a BinaryFormula that provides `default_value_double=0.0` (multiply by 1.0 identity),
  and adds `default_value_double=0.0` directly to the `failure_count` BinaryFormula.
expected_findings:
- file: src/sentry/search/eap/spans/formulas.py
  line: 230
  summary: "Conditional aggregation for failure_rate numerator has no default value\
    \ \u2014 when no spans match the status filter, this returns None instead of 0,\
    \ propagating null through the divide formula to the frontend."
  line_side: pre_fix
- file: src/sentry/search/eap/spans/formulas.py
  line: 757
  summary: "BinaryFormula for failure_count lacks `default_value_double=0.0` \u2014\
    \ when no spans match the failure status filter, the result is None instead of\
    \ 0."
  line_side: pre_fix
