pr_body: "Fixes [SENTRY-5KXR](https://sentry.sentry.io/issues/7316164948/events/d048e0931b4145518538677740efd446/)\r\
  \n\r\nThe response type is TagValueSerializerResponse which appears to incorrectly\
  \ have `int` count rather than `int | None`. Based on TagValue and TagValueSerializer,\
  \ values and counts can be none. Updates the type and handle this edge case in our\
  \ rpc by dropping them.\r\n\r\nAlso follows the pattern of skipping the feature\
  \ flags query if we got results from tags, matching what we do for get_event_filter_key_values"
