pr_title: 'fix(dashboards): Open Explore in aggregate mode for widgets with aggregates'
pr_body: 'The ''Open in Explore'' context menu option on dashboard widgets was always
  opening in samples mode, even for widgets that use aggregates (like counts, averages,
  etc.). This meant users had to manually switch to the aggregate tab every time.


  Now the link checks if any widget query has aggregates defined and opens Explore
  in aggregate mode when they do, falling back to samples mode only when no aggregates
  are present.


  Refs LINEAR-BROWSE-417'
