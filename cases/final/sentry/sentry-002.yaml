description: After migrating to urllib3 connection pools, a default 5-second read
  timeout was introduced, causing ReadTimeoutErrors on Seer AI translate endpoints
  that require longer processing times. The fix adds explicit timeout parameters (30s
  for translate, 10s for agentic) to the request functions to prevent premature timeouts.
