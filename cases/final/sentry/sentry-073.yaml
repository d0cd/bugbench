pr_title: 'fix(agents): Add error boundary around ModelsTable'
pr_body: 'Wrap `ModelsTable` with `<ErrorBoundary mini>` on the agent models landing
  page so that rendering errors (e.g. null `modelId` hitting `.toLowerCase()`) are
  contained within the table instead of crashing the entire page.


  This follows the existing pattern of wrapping table consumers at the call site.
  The widget footer error boundary was added in #110506 but `ModelsTable` (a standalone
  `GridEditable` table) was unprotected.


  Refs #110505'
pr_commit_messages:
- 'fix(agents): Add error boundary around ModelsTable'
- Merge branch 'master' into priscila/fix/models-table-error-boundary
