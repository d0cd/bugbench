description: "The ModelsTable component on the agent models landing page was rendered\
  \ without an ErrorBoundary wrapper, inconsistent with the established codebase pattern\
  \ of wrapping table consumers with <ErrorBoundary mini>. A rendering error inside\
  \ ModelsTable\u2014such as calling .toLowerCase() on a null modelId\u2014would propagate\
  \ and crash the entire page instead of being contained to the table section."
