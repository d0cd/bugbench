pr_title: 'fix(explore): disable drop transition on group-by sortable items'
pr_body: "Disable the dnd-kit drop transition on group-by sortable items in the explore\
  \ toolbar to fix a visual animation glitch when reordering.\r\n\r\nThe state update\
  \ on drop already handles visual reordering instantly. The dnd-kit drop transition\
  \ conflicts with this, causing items to briefly animate from a stale position. Setting\
  \ `transition: null` in `useSortable` matches the pattern already used in `SortableVisualizeFieldWrapper`\
  \ and `SortableQueryField`.\r\n\r\nI'd noticed & fixed this same kind of bug when\
  \ QAing #110648. Example place where this one pops up: Explore > Traces.\r\n\r\n\
  https://github.com/user-attachments/assets/b7cb46ba-d39e-449a-9d5e-c0a32a35ef5e\r\
  \n\r\n\r\nFixes EXP-842. \r\n\r\nMade with [Cursor](https://cursor.com)"
