description: 'Two useSortable hook calls in the group-by sortable components are missing
  `transition: null`, causing a visual animation glitch when reordering. The dnd-kit
  drop transition conflicts with the immediate state update on drop, briefly animating
  items from a stale position. The fix follows an established pattern already used
  in SortableVisualizeFieldWrapper and SortableQueryField.'
