description: The `resolve_fingerprint_variable` helper unconditionally parameterizes
  the `{{ message }}` variable, even when called from `expand_title_template` to build
  custom event titles. This causes custom titles to display parameterized (sanitized)
  message values instead of the original event message, inconsistent with how non-custom
  titles behave. The fix adds an optional `parameterize_message` flag (defaulting
  to True) and passes False from the title-expansion call site.
