pr_title: 'fix(dashboards): Clamp invalid widget layouts to prevent browser crash'
pr_body: 'Add frontend clamping for widget layout dimensions that exceed the 6-column
  grid bounds.


  Widgets created via external tools (e.g. LLMs) can have dimensions like `w: 12`
  where the maximum is `6`. This causes an infinite re-render loop in react-grid-layout
  when entering edit mode, crashing the browser. The new `clampWidgetLayout()` function
  normalizes dimensions before they reach the grid library, and logs invalid layouts
  to Sentry for observability.


  Backend validation counterpart: https://github.com/getsentry/sentry/pull/109826


  Refs DAIN-1265'
