pr_title: 'feat(snapshots): Fix sidebar rendering for uploads with lots of images'
pr_body: "Remove pagination from the snapshot details API endpoint and simplify the\
  \ frontend to load all images in a single request.\n\nThe snapshot sidebar previously\
  \ used `useInfiniteApiQuery` with an `IntersectionObserver`-based infinite scroll\
  \ to paginate through images 20 at a time. This caused layout instability \u2014\
  \ the sidebar's scrollbar would jump as new pages loaded, making it difficult to\
  \ browse uploads with many images. Since snapshot metadata (image keys, display\
  \ names, dimensions) is lightweight and the endpoint already loads the full manifest\
  \ from object storage in one call, paginating the response added complexity without\
  \ meaningful performance benefit.\n\nChanges:\n- **Backend**: Replace `self.paginate()`\
  \ with a direct `Response()`, removing the `OffsetPaginator` dependency. Increase\
  \ `maxProperties` from 1,000 to 50,000 to support larger uploads.\n- **Frontend**:\
  \ Switch from `useInfiniteApiQuery` to `useApiQuery`, remove the `IntersectionObserver`\
  \ sentinel and loading spinner, and pass the total image count to the search placeholder\
  \ (`\"Search 537 images...\"`).\n- **Tests**: Update pagination tests to verify\
  \ all images are returned in a single response, remove invalid-pagination and limit-too-large\
  \ test cases that no longer apply."
pr_commit_messages:
- 'feat(snapshots): Fix sidebar rendering for uploads with lots of images'
