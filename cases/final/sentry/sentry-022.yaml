pr_title: 'partial-revert(llm-detection): Revert frontend issue type filtering'
pr_body: "partially reverts https://github.com/getsentry/sentry/pull/109929 - the\
  \ issue type filtering is now done at the api (https://github.com/getsentry/sentry/pull/110356)\
  \ which makes the frontend filtering redundant.\r\n\r\nremoves:\r\n- `addOccurrence()`\
  \ method and its `HIDDEN_OCCURRENCE_TYPE_IDS` filtering\r\n- The test for `addOccurrence`\
  \ filtering\r\n- All `addOccurrence()` calls \u2192 back to `occurrences.add()`\r\
  \n\r\nkeeps:\r\n- `EAPOccurrence.issue_type` field name (bug fix)\r\n- anrRootCause.tsx\
  \ handling of both `type` and `issue_type`\r\n    - Unfortunately, `TraceOccurrence`\
  \ = `TracePerformanceIssue | EAPOccurrence`. `TracePerformanceIssue` uses `type`\
  \ while `EAPOccurrence` now uses `issue_type` so both fields need to be checked\
  \ on a `TraceOccurrence`.\r\n"
