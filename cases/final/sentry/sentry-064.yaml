pr_title: 'fix(preprod): Mark App Store signed builds as not installable (EME-917)'
pr_body: "App Store code signatures can only be installed by Apple (via TestFlight/App\
  \ Store). When a build has an `app-store` codesigning type, we should treat it as\
  \ not installable so it doesn't appear in PR comments, install pages, or update\
  \ checks with a broken install link.\n\n`is_installable_artifact()` is the single\
  \ source of truth for installability \u2014 all downstream consumers (`get_artifact_install_info()`,\
  \ PR comments task, `find_latest_installable_artifact()`, etc.) already use this\
  \ function, so the one-line check propagates everywhere.\n\nRefs EME-917"
pr_commit_messages:
- 'fix(preprod): Mark App Store signed builds as not installable (EME-917)'
