pr_title: 'fix(components): [SearchQueryBuilder] cap FilterWrapper width to 2xl less
  than parent'
pr_body: "The query editor adds \"free text\" input areas before, between, and after\
  \ all filters. When a filter takes up full width of the parent then those free texts\
  \ have to wrap onto their own lines. This change prevents filters from taking up\
  \ that last 2xl-token-width of space, so wrapping never happens. There's now always\
  \ a hefty number of pixels for folks to click and start typing free text.\r\n\r\n\
  <table>\r\n<thead>\r\n<tr>\r\n<th>Before</th>\r\n<th>After</th>\r\n</tr>\r\n</thead>\r\
