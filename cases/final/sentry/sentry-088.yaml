description: The FilterWrapper component in SearchQueryBuilder could grow to fill
  the entire parent width, forcing free-text input areas to wrap onto separate lines.
  The fix caps FilterWrapper's max-width to be 2xl (a design token) less than the
  parent, ensuring there is always inline space for users to click and begin typing
  free text.
