pr_title: 'fix(preprod): Include display param in builds API on initial load'
pr_body: "On the Releases Mobile Builds tab, the `display` query parameter (defaulting\
  \ to `size`) was missing from the initial API request to `/organizations/{org}/builds/`.\
  \ It only appeared after the user toggled the display selector, which added `display`\
  \ to the URL \u2014 at which point `normalizeDateTimeParams` would pass it through\
  \ via its `...otherParams` spread.\n\nExplicitly include `activeDisplay` in the\
  \ query object so the backend always receives the current display value, including\
  \ on first load."
