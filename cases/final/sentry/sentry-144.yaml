description: The `display` query parameter (derived from `activeDisplay` state) was
  not included in the builds API query object sent to `/organizations/{org}/builds/`.
  On initial page load, the backend never received the display value and fell back
  to an unintended default. The parameter only appeared in subsequent requests because
  `normalizeDateTimeParams` spread `...otherParams` from the URL once user interaction
  added it to the query string.
