  summary: 'Unhandled Group.DoesNotExist: Group.objects.get() will raise if the group
    has been deleted, crashing the entire trace serialization. Wrap in try/except
    and handle the missing group gracefully.'
  line_side: pre_fix
- file: src/sentry/snuba/trace.py
