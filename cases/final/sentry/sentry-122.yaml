description: Group.objects.get() calls in _serialize_rpc_issue() did not handle Group.DoesNotExist
  exceptions. When a group referenced by a trace event was missing from the database,
  the unhandled exception would propagate up and break the entire trace view instead
  of gracefully degrading. The fix catches DoesNotExist, returns None, and filters
  out None values from the serialized results.
