description: The `git_pr_number` field was defined with `FieldValueType.STRING` instead
  of `FieldValueType.INTEGER` in the field definitions map. This type mismatch allowed
  the frontend to accept wildcard/string patterns (e.g., `*2209*`) for PR number searches,
  which the backend correctly rejects since PR numbers are always integers. The fix
  changes the field value type to INTEGER so frontend validation aligns with backend
  expectations.
