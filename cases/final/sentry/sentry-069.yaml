description: React memoization was broken in the logs infinite table due to two object-identity
  instability issues. The `useMemo` hook for `_meta` in `useLogsQuery.tsx` had an
  incomplete dependency array (only `pageCount`), causing it to serve stale metadata
  when page content changed. Additionally, `MutableSearch` was instantiated inside
  the render/hook body, creating new references each cycle and defeating downstream
  memoization for highlight terms, leading to unnecessary re-renders in the infinite-scroll
  table.
expected_findings:
- file: static/app/views/explore/logs/useLogsQuery.tsx
  line: 663
  summary: 'Incomplete useMemo dependency array: `_meta` useMemo depends only on `pageCount`
    but should depend on the actual page data content (`data.pages`), causing stale
    metadata to be served when page content changes without altering the count.'
  line_side: pre_fix
- file: static/app/views/explore/logs/useLogsQuery.tsx
  line: 659
  summary: MutableSearch instantiated inside hook body creates a new object reference
    each render cycle, breaking downstream React.memo comparisons for highlight terms.
    Should be memoized or extracted.
  line_side: pre_fix
- file: static/app/views/explore/logs/tables/logsInfiniteTable.tsx
  line: 256
  summary: Props derived from unstable `meta` and `highlightTerms` references defeat
    React.memo on log row components, causing the entire infinite-scroll table to
    re-render on every cycle.
  line_side: pre_fix
