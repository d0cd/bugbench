pr_body: "The route error page previously linked users to open a GitHub issue when\
  \ something went wrong. This replaces that with more actionable guidance:\r\n\r\n\
  - Links to the Zendesk troubleshooting guide for common browser-related issues\r\
  \n- Adds a support contact section with a checklist of useful diagnostic details\
  \ to include (browser logs, affected users, browser/version, consistency, affected\
  \ URLs)\r\n- Fulfills the existing (10year old \U0001F605 ) `TODO` to show additional\
  \ resource links \r\n\r\nNOTE: I used inline styles on purpose - this is the error\
  \ page that must render when CSS/JS bundles fail to load, so I wanted the formatting\
  \ degrade gracefully.\r\n\r\nbefore\r\n<img width=\"1021\" height=\"183\" alt=\"\
