description: Batching multiple Redis keys with different hash tags ({project:trace:span_id})
  into a single UNLINK command causes ClusterCrossSlotError in Redis Cluster, because
  multi-key commands require all keys to map to the same hash slot. The fix unlinks
  each distributed payload key individually within the pipeline instead of passing
  them all at once.
