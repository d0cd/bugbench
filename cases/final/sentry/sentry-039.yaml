description: The breakpoint chart component accesses properties from `occurrenceEvidenceData`
  without guarding against it being undefined, causing `aggregate_range_1` and `aggregate_range_2`
  to become `undefined`. This leads to `NaN` values propagating through `getIntervalLine`,
  breaking chart rendering. Additionally, duplicate type definitions exist across
  files and zoom functionality was non-functional.
