pr_title: 'fix(dashboards): Only trigger echarts dispatch sync for visible widgets'
pr_body: "Uses an intersection observer to register echarts instances to groups when\
  \ the charts are visible in the viewport. This way, we don't dispatch cursor sync\
  \ calls to widgets that are not visible, bypassing some of the load echarts needs\
  \ to do to properly place the crosshairs\r\n\r\nThis only impacts hover performance\
  \ when a user has scrolled and triggered all of the widgets to load in, which we\
  \ expect users to scroll on this page. I crudely profiled this interaction by initializing\
  \ all of the widgets on the page and then hovering over and around a single timeseries\
  \ chart to show a difference in magnitude over multiple events. This was done with\
  \ a production build locally (i.e. `NODE_ENV=production pnpm dev-ui`) and I consistently\
  \ witnessed better performance with the new strategy.\r\n\r\nThese screenshots following\
  \ are filtered to `mousemove` events\r\n\r\nBefore:\r\n<img width=\"1100\" height=\"\
  246\" alt=\"Screenshot 2026-03-13 at 4 39 21\u202FPM\" src=\"https://github.com/user-attachments/assets/58907d5b-65cd-46a4-853c-b870490da564\"\
  \ />\r\n\r\nAfter:\r\n<img width=\"1068\" height=\"291\" alt=\"Screenshot 2026-03-13\
  \ at 4 39 02\u202FPM\" src=\"https://github.com/user-attachments/assets/b51c2cfa-f381-475a-af44-e0750343ed7c\"\
  \ />\r\n"
pr_commit_messages:
- 'fix(dashboards): Only trigger echarts dispatch sync for visible widgets'
