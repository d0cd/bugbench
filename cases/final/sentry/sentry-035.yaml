description: Duration formatting functions in the alerts chart code assumed all duration
  values were in milliseconds, but metrics can report durations in other units (days,
  weeks, etc.). This caused incorrect rendering of y-axis labels and tooltips. The
  fix normalizes the incoming duration to milliseconds before passing it to the formatting
  helpers that expect ms input.
