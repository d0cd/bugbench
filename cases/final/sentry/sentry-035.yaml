pr_title: 'fix(tracemetrics): Properly handle duration scaling in alerts'
pr_body: "These formatters were expecting that the durations provided were always\
  \ in `ms` since downstream there's a helper that expected seconds. I've just updated\
  \ the code so we normalize anything (days, weeks, etc) to `ms` which then we can\
  \ pass properly to the helpers for the tooltip and yAxis formatter functions.\r\n\
  \r\nYou can test like this:\r\n- Go to https://sentry-test.sentry.io/issues/alerts/new/metric/?aggregate=sum%28value%29&dataset=events_analytics_platform&eventTypes=trace_item_metric&project=nar-node&referrer=alert_stream\r\
  \n- Select `page.load_time` as your metric. I've sent in a number of values as `weeks`\
  \ but it renders as `ms`\r\n  - e.g. you can check `min(page.load_time)` \r\n- Doing\
  \ the same on this branch on the Sentry test org shows the yAxis as `weeks` and\
  \ the tooltip says years (which is right, I just made a script that sent 95 weeks\
  \ as the minimum value)"
pr_commit_messages:
- 'fix(tracemetrics): Properly handle duration scaling'
