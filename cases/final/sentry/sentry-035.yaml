description: 'Widget layouts created via external tools (e.g. LLMs) could have dimensions
  exceeding the 6-column grid maximum (e.g. w: 12). These out-of-bounds values caused
  an infinite re-render loop in react-grid-layout when entering edit mode, crashing
  the browser. The fix adds a clampWidgetLayout() function to normalize dimensions
  before they reach the grid library.'
