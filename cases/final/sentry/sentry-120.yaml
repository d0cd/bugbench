description: The dashboard management view's navigation handlers (onCreate, onPreview/loadDashboard)
  forwarded the search query parameter used for filtering the dashboard list into
  the destination URL. This caused widgets inside individual dashboards to misinterpret
  the search parameter as a data filter, corrupting widget queries. The fix strips
  the search parameter before navigating.
