description: Seer API wrapper functions accepted an optional viewer_context parameter
  (added in a prior PR) but none of the autofix call sites were passing it, meaning
  all Seer requests lacked organization and user context for access control. The fix
  propagates SeerViewerContext with organization_id and user_id to every autofix-related
  Seer API call site.
