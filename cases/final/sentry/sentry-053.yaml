description: 'The artifact image endpoint uses a blanket `except Exception` to catch
  all errors from objectstore, returning 500 and logging at exception level even when
  the image simply doesn''t exist (a normal condition). The fix adds specific handling
  for `RequestError` from `objectstore_client`: a 404 status returns a clean 404 response
  without logging, while other statuses still log and return 500.'
