description: The CompactSelect listbox component unconditionally reserved scrollbar
  gutter space regardless of whether the content actually overflowed. This caused
  unnecessary empty padding on the right side of dropdown menus that didn't need a
  scrollbar. The fix adds overflow-state detection so the gutter is only reserved
  after a scrollbar has actually appeared.
expected_findings:
- file: static/app/components/core/compactSelect/listBox/index.tsx
  line: 1
  summary: 'Scrollbar gutter is always reserved via CSS `scrollbar-gutter: stable`
    (or equivalent) without checking whether the list content actually overflows.
    Should conditionally apply gutter reservation only when overflow is detected.'
