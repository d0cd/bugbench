pr_title: 'fix(preprod): Return 404 instead of 500 for missing objectstore images'
pr_body: "The artifact image endpoint catches all exceptions with a blanket `except\
  \ Exception`, logs at `exception` level (sending it to Sentry), and returns a 500.\
  \ A missing image in objectstore is an expected condition \u2014 it should return\
  \ 404, not generate noise in error monitoring.\n\nThis adds specific handling for\
  \ `RequestError` from `objectstore_client`: status 404 returns a clean 404 response\
  \ without logging, while other unexpected statuses still log and return 500. The\
  \ generic `Exception` fallback is preserved for non-objectstore errors.\n\nFixes\
  \ SENTRY-5KRY"
