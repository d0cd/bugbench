description: The artifact image endpoint uses a blanket `except Exception` to handle
  all errors, returning 500 and logging at exception level even when the objectstore
  image simply doesn't exist (a normal condition). This generates false-positive error
  noise in Sentry monitoring. The fix adds specific handling for `RequestError` from
  `objectstore_client`, returning 404 for missing images and reserving 500 for truly
  unexpected failures.
