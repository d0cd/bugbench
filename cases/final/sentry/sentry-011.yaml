description: Special-case formatting in dashboard chart legends replaced full aggregate
  expressions like `p75(measurements.lcp)` with just `LCP`, making it impossible to
  distinguish between different percentiles (e.g., p75 vs p50) of the same measurement
  on the same chart. The fix removes the measurement-specific formatting so the full
  aggregate name is preserved in legends.
