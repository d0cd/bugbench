pr_title: 'fix: only disable SubmitButton while form is in submitting state'
pr_body: the idea to also disable the SubmitButton if it's equal to the defaultValue
  falls apart for creation forms that have good default value set that you'd just
  want to submit. We want to keep the button enabled at all times, only disable it
  to avoid duplicate form submissions.
