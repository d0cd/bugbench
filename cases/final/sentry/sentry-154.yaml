pr_title: 'fix(dashboards): Treat TOP_N display type as AREA'
pr_body: "`TOP_N` is an outdated display type that some users still have saved in\
  \ their\r\ndashboards (e.g. from the General Template). It uses a legacy rendering\
  \ path\r\nthat doesn't abbreviate y-axis values, causing large numbers like `150000000`\r\
  \nto display unformatted.\r\n\r\nTested with https://sentry.sentry.io/dashboard/128570/\r\
  \nBefore\r\n<img width=\"572\" height=\"279\" alt=\"image\" src=\"https://github.com/user-attachments/assets/192ff600-435e-418b-9004-73333681cbeb\"\
  \ />\r\n\r\nAfter\r\n<img width=\"419\" height=\"292\" alt=\"image\" src=\"https://github.com/user-attachments/assets/b7318394-a9f1-4910-ba75-965b06002f86\"\
  \ />\r\n\r\n\r\nThis PR maps `TOP_N` \u2192 `AREA` in two places:\r\n\r\n- **Widget\
  \ builder**: `deserializeDisplayType` now converts `TOP_N` to `AREA`,\r\n  so when\
  \ users open an old TOP_N widget, the type selector shows \"Area\". When\r\n  they\
  \ re-save, the widget is persisted as AREA \u2014 gradually migrating users off\r\
  \n  the deprecated type.\r\n\r\n- **Widget card**: Instead of the old TOP_N-specific\
  \ query manipulation (trimming\r\n  aggregates, setting a results limit), it simply\
  \ converts the display type to\r\n  AREA so the widget renders through the standard\
  \ area chart path with proper\r\n  formatting.\r\n\r\nFixes DAIN-1267"
pr_commit_messages:
- 'fix(dashboards): Treat TOP_N display type as AREA'
