pr_title: 'fix(grouping): Handle grouphash cache invalidation errors gracefully'
pr_body: "To reduce calls to the database during ingest, we cache both `GroupHash`\
  \ objects and booleans tracking the existence of secondary grouphashes. They only\
  \ stay in the cache for a minute (longer didn't seem to improve our hit rate), but\
  \ even so, the data there can become stale if the corresponding database row is\
  \ updated or deleted. We therefore hook into the `save`, `update`, and `delete`\
  \ ORM methods, and have them invalidate the relevant cache entries when they run.\r\
  \n\r\nThis system works just fine, but we've recently run into a problem where bad\
  \ `hash` data in the `GroupHash` table is causing the cache invalidation to crash,\
  \ thereby crashing the entire `delete` process, resulting in the records not getting\
  \ successfully deleted. To fix this problem, this PR wraps the relevant `cache.delete_all`\
  \ call in a `try-except`. (We obviously don't want the invalidation to fail, but\
  \ data possibly being stale (for fewer than 60 seconds) is way better than a whole\
  \ database call erroring out.) The same fix is also applied to our `cache.delete`\
  \ and `cache.delete_all` calls in the `save` hook and the overridden `update` method,\
  \ respectively."
