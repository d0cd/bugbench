description: The modal's document-level keydown listener unconditionally closes the
  modal on any ESC press, ignoring whether a child overlay (e.g., CompactSelect dropdown)
  has already handled and prevented the event. The fix adds an `e.defaultPrevented`
  check so the modal respects events already consumed by React Aria's `useOverlay`.
