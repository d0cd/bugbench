pr_title: 'fix(modal): Skip ESC close when event is already handled by child'
pr_body: "When a `CompactSelect` dropdown is open inside a modal, pressing ESC closes\
  \ the entire modal instead of just closing the dropdown. In drawers, this already\
  \ works correctly \u2014 ESC first closes the dropdown, then on a subsequent press,\
  \ closes the drawer.\n\nThe modal uses a raw `document.addEventListener('keydown',\
  \ ...)` that unconditionally closes on any ESC press. React Aria's `useOverlay`\
  \ (used by CompactSelect) handles ESC by calling `e.preventDefault()` on the native\
  \ event before it reaches the document-level listener. Adding an `e.defaultPrevented`\
  \ check to the modal's handler makes it respect events already consumed by child\
  \ overlays."
