description: The PEG.js grammar for SQL-ish string parsing did not include Unicode
  control characters in its accepted character ranges, causing the parser to crash
  on valid telemetry input containing characters like \u0000. The fix extends the
  GenericToken rule's character ranges to accept these characters, but the reviewer
  flagged that the new range overlaps with characters already matched by the Whitespace
  rule, which could cause ambiguous parsing.
