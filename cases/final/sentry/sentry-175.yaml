pr_title: 'fix(data-browsing): Allow SQLish to parse some Unicode control characters'
pr_body: 'Some Unicode control characters like `\^@` show up in telemetry strings.
  Most likely this is an accident, or some kind of instrumentation bug, or something
  else, but I don''t think it''s good to _crash_ in those cases, so I added that character
  range to the grammar. I''ll talk to the Relay team separately whether those characters
  should be stripped out, but in the meantime this closes a bug.


  I also updated the grouping so that different characters create different errors,
  for ease of debugging.

  '
