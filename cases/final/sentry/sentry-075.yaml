pr_title: 'fix(tracemetrics): Hide explicit none types in UI'
pr_body: "We expected `none` to only apply to metrics that _do not_ have unit set\
  \ on them, but it turns out we can also store the \"none\" string as a unit. For\
  \ now we're going to treat them the same way, so this PR adjusts the events request\
  \ to additionally had `metric.unit:none` to the existing `!has:metric.unit` check,\
  \ as well as updates the select rows to _not_ show `none` even though it is explicitly\
  \ defined.\r\n\r\nWe will regroup and figure out if we should keep this behaviour\
  \ or separate them."
