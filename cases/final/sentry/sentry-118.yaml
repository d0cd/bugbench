description: Variables `cache_key` and `cache_expiry` were assigned inside an `if
  use_caching:` conditional block but referenced in a separate, later `if use_caching:`
  block. While logically safe at runtime (both blocks gate on the same condition),
  mypy's `possibly-undefined` check treats each conditional independently and flags
  the second use as potentially undefined. The fix hoists the assignments above the
  first conditional so they are unconditionally defined.
