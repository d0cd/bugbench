pr_title: 'fix(grouping): Resolve mypy possibly-undefined errors in grouphash caching'
pr_body: 'Hoist `cache_key` and `cache_expiry` assignments out of the first `if use_caching:`
  block in `_grouphash_exists_for_hash_value` and `_get_or_create_single_grouphash`.


  mypy''s `--enable-error-code possibly-undefined` couldn''t track that the variables
  were guaranteed to be assigned by the time the second `if use_caching:` block ran,
  since it treats each conditional independently. Both values are side-effect-free
  to compute (a string format and an options dict lookup), so computing them unconditionally
  has no meaningful impact on the non-caching path.'
