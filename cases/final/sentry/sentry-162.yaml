description: Two call sites were passing potentially undefined description strings
  to the SQLish formatter without guarding against empty/undefined values. A prior
  PR (#110186) fixed most occurrences but missed these two locations in fieldRenderers.tsx
  and lineChartListWidget.tsx. The reviewer also noted that using nullish coalescing
  (`??`) conflates `null` and `undefined`, losing the semantic distinction between
  '(no value)' and '(empty string)' for non-DB/RESOURCE spans.
