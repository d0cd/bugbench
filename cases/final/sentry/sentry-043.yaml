pr_title: 'fix(ci): Exclude .venv from pyc cache cleanup'
pr_body: "So in `action.yml` we have two steps where we first:\r\n- restore the virtual\
  \ environment form cache (`action-setup-venv`)\r\nand then immediately after\r\n\
  - clears Python cache, essentially negating the first step\r\n\r\nDeleting these\
  \ forces Python to recompile every installed package on first import during every\
  \ CI run, undermining the purpose of the venv cache.\r\n\r\nWe add `-not -path './.venv/*'`\
  \ to both `find` commands so we only clear pycache dirs and not the venv."
