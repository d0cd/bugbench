pr_title: Fix duplicate header in VERIFY_EMAIL flow
pr_body: "When executing the VERIFY_EMAIL action (for example via the admin API),\
  \ the confirmation page showed \"Your account has been updated.\" twice, once as\
  \ the page header and once as the body.\r\n\r\nThe root cause is that `AuthenticationManager.finishedRequiredActions()`\
  \ rendered the `ACCOUNT_UPDATED` info page without setting a messageHeader attribute.\r\
  \n\r\nThe `info.ftl` template falls back to `message.summary` when `messageHeader`\
  \ is not set, which produced the duplicated message.\r\n\r\nChange summary:\r\n\
  - Add a new message key `accountUpdatedTitle` with value \"Account Updated\".\r\n\
  - Add a Messages constant (`ACCOUNT_UPDATED_TITLE`) for the new key.\r\n- Update\
  \ `AuthenticationManager` to set the `messageHeader` attribute to the message key\
  \ (`ACCOUNT_UPDATED_TITLE`) instead of passing a resolved message string. Passing\
  \ the key lets the template render a distinct header (localized via the message\
  \ key) and keeps the body message separate.\r\n\r\nResult:\r\n- Header now reads\
  \ \"Account Updated\"\r\n- Body now reads \"Your account has been updated.\"\r\n\
  - Prevents the same message appearing both in the header and the body.\r\n\r\nNotes:\r\
  \n- This addresses the same underlying issue reported in #41701\r\n\r\nFix #46105\r\
  \n\r\n### Before\r\n\r\n<img width=\"2532\" height=\"1170\" alt=\"image\" src=\"\
  https://github.com/user-attachments/assets/daaf36b4-8d08-4177-8003-2e736118b587\"\
  \ />\r\n\r\n\r\n### After\r\n\r\n<img width=\"2532\" height=\"1170\" alt=\"image\"\
  \ src=\"https://github.com/user-attachments/assets/00756988-b69b-431c-8d17-afe2dd326c45\"\
  \ />\r\n"
