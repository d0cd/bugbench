description: The OID4VCI test client was incorrectly constructing credential offer
  URLs by manually appending the nonce to the endpoint path (e.g., `getOid4vcCredentialOffer(nonce)`
  with a trailing slash). The correct approach is to use the `CredentialOfferURI`
  object returned from the credential-offer-uri endpoint, which already contains the
  properly constructed URL via `getCredentialOfferUri()`. Multiple call sites were
  also manually concatenating `issuer + "/" + nonce` instead of using the model's
  accessor.
