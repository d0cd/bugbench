description: The DefaultEmailSenderProvider retrieves replyTo and from email addresses
  from configuration but does not validate them before use. The fix adds a validation
  method for replyTo addresses (and fixes a typo), ensuring that malformed or invalid
  email addresses are caught before being passed to the mail API.
