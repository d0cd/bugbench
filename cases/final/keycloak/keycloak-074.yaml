description: Several test files were still using old-style event assertions (direct
  JUnit/Hamcrest matchers like `Assertions.assertTrue` and `hamcrest.Matchers.is`)
  instead of the project's new test framework API (`EventAssertion`, `EventMatchers`).
  This PR migrates the remaining inconsistent assertions to the unified pattern, completing
  the framework adoption started earlier.
