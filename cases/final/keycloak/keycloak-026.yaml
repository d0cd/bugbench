description: ReflectionUtils.listMethods() collected methods in wrong order (subclass
  before superclass) and failed to deduplicate overridden methods, causing superclass
  @TestSetup methods to run after subclass ones and overridden methods to execute
  twice. The fix builds the class hierarchy top-down and removes superclass methods
  when a subclass declares an override with the same signature.
expected_findings:
- file: test-framework/core/src/main/java/org/keycloak/testframework/injection/ReflectionUtils.java
  line: 24
  summary: "Method collection iterates class hierarchy bottom-up, causing subclass\
    \ methods to appear before superclass methods \u2014 violates expected Java inheritance\
    \ ordering (superclass first)"
- file: test-framework/core/src/main/java/org/keycloak/testframework/injection/ReflectionUtils.java
  line: 24
  summary: 'No deduplication of overridden methods: when a subclass overrides a superclass
    @TestSetup method, both versions are collected, causing the override to execute
    twice'
