description: The GitHub Actions workflow for Cypress tests lacked a repository guard,
  causing tests to run on every fork push and PR. This overwhelmed CI budget and polluted
  fork PRs with unnecessary Cypress Cloud comments. The fix adds a `github.repository
  == 'keycloak/keycloak'` condition to restrict Cypress jobs to the main repo only.
expected_findings:
- file: test-framework/core/src/main/java/org/keycloak/testframework/injection/ReflectionUtils.java
  line: 27
  summary: "listMethods() did not deduplicate overridden methods \u2014 when a subclass\
    \ overrides a superclass method annotated with the same annotation, both the superclass\
    \ and subclass versions were added to the list, causing the method to run twice"
  line_side: pre_fix
- file: test-framework/core/src/main/java/org/keycloak/testframework/injection/ReflectionUtils.java
  line: 29
  summary: "Superclass methods were appended after subclass methods, producing incorrect\
    \ execution order \u2014 superclass setup methods should run before subclass methods\
    \ but the old code processed the current class first then walked up the hierarchy\
    \ appending parents afterward"
  line_side: pre_fix
