pr_title: Run Cypress tests only on the main repo
pr_body: "Only runs the Cypress tests on the main repo. This prevents forks from running\
  \ on `push` and overwhelming our budget and adding comments to PRs that do not modify\
  \ the front-end. This PR also:\r\n\r\n- ~Fetches the record key from the secrets\
  \ for security.~ (this doesn't work, removed it)\r\n- Passes the GitHub token to\
  \ detect new build vs re-run build in the Cypress Cloud."
