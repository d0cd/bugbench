description: When duplicate protocol mappers were submitted during client creation
  or update, Keycloak did not catch the resulting ModelDuplicateException, causing
  an unhandled internal server error (HTTP 500) instead of returning a proper error
  response (e.g., HTTP 409 Conflict). The fix adds catch blocks for ModelDuplicateException
  in RepresentationToModel and wraps it as an ErrorResponseException in the admin
  REST endpoints.
