description: The `useSetTimeout()` hook does not reset `didUnmountRef` to `false`
  when the component remounts. With React StrictMode's automatic unmount/remount cycle
  (enabled via the new Root API), the ref retains its stale `true` value from the
  previous unmount, causing the hook to incorrectly believe the component is unmounted
  and skip scheduled timeouts.
expected_findings:
- file: js/apps/admin-ui/src/utils/useSetTimeout.ts
  line: 4
  summary: "useEffect cleanup sets didUnmountRef to true on unmount but never resets\
    \ it to false on mount \u2014 under React StrictMode remounting, the ref starts\
    \ in a stale 'unmounted' state, preventing timeouts from firing"
