description: The GitHub Actions workflow for Cypress tests lacked a repository guard
  condition, causing the tests to run on all forks on push events. This overwhelmed
  the CI budget and added unwanted Cypress Cloud comments to PRs that did not modify
  the front-end. The fix adds `github.repository == 'keycloak/keycloak'` conditions
  to restrict Cypress jobs to the main repo only.
expected_findings:
- file: .github/workflows/js-ci.yml
  line: 190
  summary: 'Missing repository guard: Cypress test job runs on forks because the `if`
    condition does not check `github.repository == ''keycloak/keycloak''`, causing
    unnecessary CI runs and budget waste'
- file: .github/workflows/js-ci.yml
  line: 243
  summary: 'Missing repository guard: second Cypress job also lacks `github.repository
    == ''keycloak/keycloak''` check, allowing fork pushes to trigger expensive test
    runs'
