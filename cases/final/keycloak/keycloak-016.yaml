description: A flaky integration test in LevelOfAssuranceFlowTest suffered from a
  race condition where test assertions executed before the UI or server state had
  fully settled. The fix adds WaitUtils calls to synchronize the test with the asynchronous
  page/state transitions, resolving the intermittent failures.
expected_findings:
- file: js/apps/admin-ui/src/context/auth/AdminClient.tsx
  line: 41
  summary: AbortController is created outside the useEffect hook, meaning a single
    controller instance is shared across all renders instead of creating a fresh one
    per effect invocation. This causes a race condition where a stale controller from
    a previous render can abort requests from the current effect, or the cleanup function
    cannot properly abort the in-flight request since the controller reference has
    been replaced.
  line_side: pre_fix
