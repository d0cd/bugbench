description: The `useFetch()` hook instantiated a new `AbortController` on every render/call
  rather than inside the `useEffect` cleanup lifecycle. This meant the controller
  referenced by the cleanup function was stale, so aborting on unmount or dependency
  change never cancelled the in-flight request. The fix moves the `AbortController`
  construction inside the effect.
expected_findings:
- file: js/apps/admin-ui/src/context/auth/AdminClient.tsx
  line: 38
  summary: "AbortController instantiated outside useEffect \u2014 a new controller\
    \ is created on every render, so the cleanup function's reference is stale and\
    \ `abort()` never cancels the actual in-flight request. Move `new AbortController()`\
    \ inside the effect body."
