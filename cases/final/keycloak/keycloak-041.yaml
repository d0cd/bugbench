  summary: 'Missing @IfBuildProperty guard: OIDC client controller is unconditionally
    registered, exposing client CRDs in production when they should be gated behind
    a build property'
- file: operator/src/main/java/org/keycloak/operator/controllers/KeycloakSAMLClientController.java
  line: 22
  summary: 'Missing @IfBuildProperty guard: SAML client controller is unconditionally
    registered, exposing client CRDs in production when they should be gated behind
    a build property'
- file: operator/scripts/create-olm-bundle.sh
