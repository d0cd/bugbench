description: The Keycloak operator's OIDC and SAML client controllers were unconditionally
  enabled in production, exposing client CRDs that should not be available by default.
  The fix gates both controllers behind an `@IfBuildProperty` annotation so they only
  activate when `test.operator.client-controllers=true` is set, and removes client
  CRDs from the OLM bundle.
