description: The PreAuthorizedCodeGrantRequest for the OID4VCI flow was incorrectly
  constructed, deviating from the established pattern of using dedicated request types
  per grant. The fix reverted to a dedicated request approach and preserved authorization_details
  on the request, correcting parameter handling in the AbstractHttpPostRequest hierarchy.
