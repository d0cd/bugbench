pr_title: 'Issuer 45649: patch CVE-2026-0707. Add validation on Authorization Header
  with Bearer'
pr_body: "Closes [#45649](https://github.com/keycloak/keycloak/issues/45649)\r\n\r\
  \nAdd validation on Authorization Header to fix https://github.com/advisories/GHSA-gv94-wp4h-vv8p:\r\
  \n\r\n- case-insensitive validation of the Bearer scheme\r\n- strict enforcement\
  \ of a single ASCII space separator\r\n- rejection of non-standard whitespaces\r\
  \n- validate token value by [RFC6750](https://datatracker.ietf.org/doc/html/rfc6750#section-2.1):\r\
  \n\r\n```\r\nb64token    = 1*( ALPHA / DIGIT /\"-\" / \".\" / \"_\" / \"~\" / \"\
  +\" / \"/\" ) *\"=\"\r\ncredentials = \"Bearer\" 1*SP b64token\r\n```\r\n"
