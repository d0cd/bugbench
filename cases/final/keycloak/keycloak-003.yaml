description: The Authorization header parsing in AppAuthManager used naive indexOf('
  ') to split the Bearer token, lacking case-insensitive scheme validation, strict
  whitespace enforcement, and RFC 6750 token format validation. This allowed malformed
  or crafted Authorization headers to bypass validation (CVE-2026-0707 / GHSA-gv94-wp4h-vv8p).
  The fix adds case-insensitive Bearer matching, enforces a single ASCII space separator,
  rejects non-standard whitespace characters, and validates the token value against
  the RFC 6750 b64token grammar.
