description: Keycloak's reverse proxy support handled X-Forwarded-For, X-Forwarded-Host,
  X-Forwarded-Port, and X-Forwarded-Proto but did not support the X-Forwarded-Prefix
  header. This meant deployments behind reverse proxies that rewrite the context path
  (e.g., serving Keycloak under /auth/) could not dynamically resolve the correct
  base path, requiring manual hostname-path configuration as a workaround.
expected_findings:
- file: services/src/main/java/org/keycloak/services/resources/admin/fgap/MgmtPermissions.java
  line: 167
  summary: "hasOneAdminRole() directly returned identity.hasOneClientRole() without\
    \ fallback logic for lightweight tokens \u2014 when a new realm is imported, its\
    \ admin client roles may not yet be in the master admin role's composites, causing\
    \ admin authorization to fail"
  line_side: pre_fix
- file: model/infinispan/src/main/java/org/keycloak/models/cache/infinispan/RealmCacheSession.java
  line: 494
  summary: "Realm cache session did not check whether the master admin role's composites\
    \ were stale after realm import \u2014 cached admin role missed newly imported\
    \ realm's client roles, so the role cache was never invalidated"
  line_side: pre_fix
