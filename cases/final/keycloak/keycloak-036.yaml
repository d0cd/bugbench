description: When a new realm is created or imported in Keycloak, the Infinispan cache
  layer in RealmCacheSession did not invalidate cached admin roles, causing stale
  role data to be served. The fix adds admin role invalidation logic when a new realm
  is detected, and adjusts permission checks in MgmtPermissions to handle imported
  realms correctly (including a lightweight token check).
expected_findings:
- file: model/infinispan/src/main/java/org/keycloak/models/cache/infinispan/RealmCacheSession.java
  line: 493
  summary: "Missing admin role cache invalidation when a new realm is added \u2014\
    \ cached admin roles become stale after realm creation/import"
- file: services/src/main/java/org/keycloak/services/resources/admin/fgap/MgmtPermissions.java
  line: 159
  summary: MgmtPermissions does not account for newly imported realms; missing lightweight
    token check causes permission evaluation to use stale or incorrect role state
