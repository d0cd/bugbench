pr_title: 'fix: exposing more property names'
pr_body: "closes: #46569\r\n\r\nThese refinements seem to cover most situations, and\
  \ generalizes advertising wildcards that can be mapped from other properties. What\
  \ still doesn't work well:\r\n- you can have something with a mapFrom that maps\
  \ to a null value, but we'll still report it in the property names. Most of the\
  \ time this is not a problem as you are allowed to do things like putting an empty\
  \ property in a properties file \"foo=\".\r\n- we need to explicitly \"connect\"\
  \ wildcards with defaults to a primary property - that seems fine for db properties,\
  \ but we may eventually want something more automatic.\r\n- we're only looking at\
  \ a single mapFrom level to see what other wildcards are in use.\r\n\r\n<!---\r\n\
  Please read https://github.com/keycloak/keycloak/blob/main/CONTRIBUTING.md and follow\
  \ these guidelines when contributing to Keycloak\r\n-->\r\n"
