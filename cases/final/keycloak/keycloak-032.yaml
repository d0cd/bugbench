description: Configuration property names were not fully exposed when properties used
  mapFrom mappings or wildcard expansion. The fix generalizes wildcard advertising
  for properties mapped from other options and connects wildcard properties with defaults
  to their primary property, though single-level mapFrom traversal and null-value
  mapFrom edge cases remain as known limitations.
