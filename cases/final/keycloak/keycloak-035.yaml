pr_title: Fix token type hint injection vulnerability in TokenIntrospectionEndpoint
pr_body: "## Description\r\n\r\nThis PR addresses a security vulnerability in the\
  \ `TokenIntrospectionEndpoint` where unsanitized user input from the `token_type_hint`\
  \ parameter was being reflected directly into error responses.\r\n\r\n### Changes\
  \ Made\r\n\r\n- Changed error message to static string to prevent reflection of\
  \ user input\r\n- Added `event.detail(Details.TOKEN_TYPE, tokenTypeHint)` for server-side\
  \ auditing\r\n- Added `event.error(Errors.INVALID_REQUEST)` before throwing exception\r\
  \n- Prevents potential log injection and issues in downstream systems\r\n\r\n###\
  \ Before\r\n```json\r\n{\r\n  \"error\": \"invalid_request\",\r\n  \"error_description\"\
  : \"Unsupported token type [ATTACKER_INPUT].\"\r\n}\r\n```\r\n\r\n\r\n### After\
  \ \r\n```json\r\n{\r\n  \"error\": \"invalid_request\",\r\n  \"error_description\"\
  : \"Unsupported token type.\"\r\n}\r\n```\r\n\r\nThe token_type_hint value is now\
  \ properly logged in the server's audit logs via event.detail() for debugging purposes,\
  \ without exposing it in the client-facing error response.\r\n\r\nSecurity Impact\r\
  \nThis fix prevents:\r\n\r\nLog injection attacks through malicious token_type_hint\
  \ values\r\nPotential issues in downstream systems that render the error_description\r\
  \nInformation leakage through error message reflection\r\nCloses #46689\r\n\r\n\
  Signed-off-by: Shashank Goel goelshashank13@gmail.com"
