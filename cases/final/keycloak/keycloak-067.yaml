  summary: 'Unquoted variable in conditional: `$GITHUB_EVENT_NAME` should be quoted
    as `"$GITHUB_EVENT_NAME"` to prevent syntax errors when the variable is empty
    or unset, and the else/fallback branch likely has incorrect logic for non-pull_request
    events.'
