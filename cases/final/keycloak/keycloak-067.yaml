description: The shell script's conditional check for the GitHub event name fails
  when the event is not 'pull_request'. The variable $GITHUB_EVENT_NAME is likely
  unquoted in the test expression, causing a syntax error or incorrect behavior when
  the variable is empty or set to a non-pull_request value, leading the deprecation
  check to either crash or skip/run incorrectly for non-PR events (e.g., push, schedule).
