pr_title: Fix duplicate client-uuid path parameter in OpenAPI spec
pr_body: "Closes #46015\r\n\r\nThe endpoint `GET /admin/realms/{realm}/clients/{client-uuid}/roles/{role-name}/composites/clients/{client-uuid}`\
  \ contains two path parameters with the same name `{client-uuid}`, which produces\
  \ an invalid OpenAPI specification.\r\n\r\nThis breaks OpenAPI code generators like\
  \ [oapi-codegen](https://github.com/oapi-codegen/oapi-codegen) that rely on unique\
  \ parameter names per path.\r\n\r\n## Solution\r\n\r\nRename `{client-uuid}` to\
  \ `{targetClientUuid}` in `RoleContainerResource.java`.\r\n\r\n`{clientUuid}` is\
  \ not sufficient because most code generators normalise `{client-uuid}` (from the\
  \ parent path) to `clientUuid` as well, which would still produce a collision. `{targetClientUuid}`\
  \ makes the semantics clear: it refers to the client whose roles are being queried\
  \ as composites, not the client that owns the role.\r\n\r\n## Impact\r\n\r\nThis\
  \ is a non-breaking change:\r\n- The actual URL path segment value doesn't change\r\
  \n- Only the OpenAPI parameter name changes, making the spec valid\r\n"
pr_commit_messages:
- Fix duplicate client-uuid path parameter in OpenAPI spec
