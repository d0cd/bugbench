description: The Apache Santuario XML Security library version 3.0.4 contained a bug
  (SANTUARIO-617) that broke SAML encryption when using RSA-OAEP with MGF1. The fix
  upgrades the xmlsec dependency from 3.0.4 to 3.0.6 and adds a test case to verify
  RSA-OAEP-MGF1P encryption works correctly.
