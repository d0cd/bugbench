description: Docker container builds for the Keycloak operator were not setting the
  `nofile` ulimit correctly, leading to potential file descriptor exhaustion at runtime.
  The fix centralizes the `--ulimit nofile=1024000` flag into the operator image build
  scripts and configuration properties rather than patching individual Dockerfiles,
  and updates documentation and minikube startup commands accordingly.
expected_findings:
- file: operator/scripts/olm-testing.sh
  line: 17
  summary: Docker build command missing or using incorrect --ulimit nofile value;
    should specify --ulimit nofile=1024000 to prevent file descriptor limits from
    causing runtime failures
- file: operator/src/main/resources/application.properties
  line: 30
  summary: Operator build configuration missing the ulimit setting that should be
    applied by default during image building
