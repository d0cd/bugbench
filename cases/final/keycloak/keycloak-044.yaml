description: Dynamic URI path segments (client IDs, session IDs, resource IDs, credential
  IDs) were interpolated directly into API endpoint URLs without calling encodeURIComponent().
  This means special characters in these values could break requests or enable path
  traversal. The fix wraps all dynamic URI segments with encodeURIComponent() across
  seven Account Console page components.
expected_findings:
- file: docs/guides/server/containers.adoc
  line: 196
  summary: Documentation recommended using `ulimit` inside a Dockerfile RUN command,
    which is unreliable and not the correct approach; the fix recommends using `--ulimit`
    in the docker build command instead
  line_side: pre_fix
- file: operator/scripts/olm-testing.sh
  line: 20
  summary: Docker build command missing `--ulimit nofile=1024000` flag, causing potential
    file descriptor limit issues during container builds
  line_side: pre_fix
