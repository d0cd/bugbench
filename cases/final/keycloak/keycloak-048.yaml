description: "When executing the VERIFY_EMAIL action, the confirmation page displayed\
  \ 'Your account has been updated.' twice \u2014 once as the page header and once\
  \ as the body text. The root cause was that AuthenticationManager.finishedRequiredActions()\
  \ rendered the ACCOUNT_UPDATED info page without setting a messageHeader attribute,\
  \ causing the info.ftl template to fall back to message.summary for the header,\
  \ duplicating the body message. The fix adds a distinct accountUpdatedTitle message\
  \ key and passes it as the messageHeader attribute."
