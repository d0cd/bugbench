description: The `useFetch()` hook instantiated a new `AbortController` on every call
  rather than inside the effect callback. This meant each render created a fresh controller,
  so when the effect cleanup ran `controller.abort()`, it aborted the newest controller
  (which may not yet be associated with an in-flight request) instead of the one tied
  to the active fetch, causing requests to never be properly cancelled on unmount
  or dependency changes.
expected_findings:
- file: js/apps/admin-ui/src/context/auth/AdminClient.tsx
  line: 38
  summary: AbortController is instantiated outside the effect (at the call-site level
    of useFetch), so a new controller is created on every render. It should be created
    inside the effect so that cleanup aborts the correct controller tied to the in-flight
    request.
