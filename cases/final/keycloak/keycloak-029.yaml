description: ImmutableAttributeValidator compared email attribute values case-sensitively,
  causing false validation errors when an external identity provider (e.g., LDAP)
  returned the email with different casing than what was stored. The fix normalizes
  email values to lowercase before comparison, consistent with how usernames are already
  handled.
expected_findings:
- file: js/apps/admin-ui/src/context/auth/AdminClient.tsx
  line: 41
  summary: AbortController is created outside the useEffect hook, meaning a single
    controller instance is shared across all renders. On re-render, a new controller
    is created but the previous effect's cleanup still references the old one, so
    the abort signal never cancels in-flight requests from stale effects, causing
    potential state updates on unmounted/stale components.
  line_side: pre_fix
