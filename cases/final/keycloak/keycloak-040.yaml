description: AdminClientSupplier did not declare a dependency on ManagedRealm when
  resolving realm references, causing the test framework to fail when an admin client
  was injected targeting a managed realm. The fix adds ManagedRealm as an explicit
  dependency via the supplier's dependency builder, keyed by the annotation's realmRef
  value.
expected_findings:
- file: test-framework/core/src/main/java/org/keycloak/testframework/admin/AdminClientSupplier.java
  line: 25
  summary: 'Missing dependency declaration: AdminClientSupplier should declare a dependency
    on ManagedRealm (keyed by realmRef) so the framework provisions the realm before
    the admin client'
- file: test-framework/core/src/main/java/org/keycloak/testframework/annotations/InjectAdminClient.java
  line: 26
  summary: InjectAdminClient annotation lacks a realmRef() attribute, preventing the
    admin client from being scoped to a specific ManagedRealm
