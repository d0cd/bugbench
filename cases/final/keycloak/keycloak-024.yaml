description: Configuration description strings in CIMD client policy classes incorrectly
  stated that domain matching uses regex patterns, when the actual implementation
  uses wildcard pattern matching (e.g. '*.example.org'). The fix corrects the help
  text to accurately describe the wildcard-based matching behavior.
