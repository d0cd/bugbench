description: The `byteArrayToResolverProviderId` method in `ArtifactBindingUtils`
  did not validate that the input byte array had at least 4 bytes before accessing
  elements for the type code and endpoint index, causing an `ArrayIndexOutOfBoundsException`
  on malformed SAML artifacts. The fix adds a length check throwing `IllegalArgumentException`
  for arrays shorter than 4 bytes, and the callers in `SamlService` now catch `IllegalArgumentException`
  alongside `ArtifactResolverProcessingException` to handle malformed input gracefully.
expected_findings:
- file: services/src/main/java/org/keycloak/protocol/oauth2/cimd/clientpolicy/condition/ClientIdUriSchemeConditionFactory.java
  line: 47
  summary: "Domain matching used regex patterns instead of wildcard pattern matching,\
    \ requiring users to manually escape special characters like dots \u2014 error-prone\
    \ and a potential security risk if regex is misused or bypassed"
  line_side: pre_fix
- file: services/src/main/java/org/keycloak/protocol/oauth2/cimd/clientpolicy/executor/AbstractClientIdMetadataDocumentExecutorFactory.java
  line: 92
  summary: "Same regex-based domain matching issue in the executor factory \u2014\
    \ domains checked via regex instead of safe wildcard pattern matching, risking\
    \ bypass through unescaped special characters"
  line_side: pre_fix
