description: EmbeddedKeycloakServer did not handle `dependencyCurrentProject()` dependencies
  correctly. It always resolved versions via `Maven.getArtifact()`, which fails for
  artifacts from the current Maven module that haven't been published to any repository.
  The fix extracts dependency resolution into `MavenProjectUtil.updateDependencyDetails()`
  which branches on `dependencyCurrentProject()` to use the local module's coordinates
  instead.
expected_findings:
- file: test-framework/core/src/main/java/org/keycloak/testframework/server/EmbeddedKeycloakServer.java
  line: 23
  summary: "Dependency resolution ignores `dependencyCurrentProject()` flag \u2014\
    \ always calls `Maven.getArtifact()`, which fails for current-module dependencies\
    \ that are not yet in a Maven repository. Should branch on `dependency.dependencyCurrentProject()`\
    \ and resolve from the local project instead."
  line_side: pre_fix
