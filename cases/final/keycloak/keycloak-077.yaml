pr_title: Fix @TestSetup method ordering with inheritance
pr_body: "## Summary\n\n`ReflectionUtils.listMethods()` had two bugs when class inheritance\
  \ was involved:\n\n1. **Wrong execution order**: Subclass `@TestSetup` methods were\
  \ added before superclass methods. Expected behavior is superclass first, matching\
  \ standard Java inheritance semantics (like constructors and JUnit lifecycle callbacks).\n\
  \n2. **Method overriding not respected**: When a subclass overrides a superclass\
  \ method annotated with `@TestSetup`, both methods were collected \u2014 causing\
  \ the subclass method to execute twice instead of only the override running once.\n\
  \n### Fix\n\nThe fix modifies `listMethods()` to:\n- Build the class hierarchy top-down\
  \ (superclass first) so superclass methods are ordered before subclass methods\n\
  - When a subclass declares a method with the same name and parameter types as a\
  \ superclass method, remove the superclass version so only the override executes\n\
  \n### Test plan\n\n- [x] Unit tests added for `ReflectionUtils.listMethods()` covering:\n\
  \  - Superclass `@TestSetup` runs before subclass (different method names)\n  -\
  \ Overridden method only runs once (same name), with correct declaring class\n \
  \ - Multi-level inheritance ordering (grandparent \u2192 parent \u2192 child)\n\
  \  - Edge cases: no annotated methods, single class, child with plain base\n- [\
  \ ] Existing test-framework tests pass: `mvn test -pl test-framework/core`\n\nCloses\
  \ #46667"
pr_commit_messages:
- Fix @TestSetup method ordering with inheritance
