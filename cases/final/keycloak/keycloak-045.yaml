description: When configuring Keycloak with a full hostname URL (as opposed to the
  simple hostname), the baseUri was not normalized to end with a trailing slash. The
  quarkus logic already ensured this for simple hostnames, but the full URL path skipped
  this normalization, causing inconsistent URI handling. The fix adds a check to append
  '/' if the URI doesn't already end with one.
expected_findings:
- file: services/src/main/java/org/keycloak/url/HostnameV2ProviderFactory.java
  line: 105
  summary: 'Missing trailing slash normalization: when a full hostname URL is provided,
    the URI should be normalized to end with ''/'' to match the behavior of the simple
    hostname path. Without this, downstream URI resolution may produce incorrect URLs.'
