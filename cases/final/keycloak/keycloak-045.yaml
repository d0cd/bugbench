description: The Keycloak operator shipped client CRDs (KeycloakOIDCClientController
  and KeycloakSAMLClientController) unconditionally in production, even though they
  were not ready for general use. The fix gates these controllers behind a build property
  (`@IfBuildProperty`) so they are disabled by default, only enabled explicitly for
  testing, and removes the client CRDs from the OLM production bundle.
