description: Single-file realm export used the general user provider which queries
  all federated sources (e.g. LDAP), causing non-imported external users with IDs
  longer than 36 characters to be included in the export. The fix switches to UserStoragePrivateUtil
  to query only the local storage provider, aligning single-file export behavior with
  the existing directory export path.
