pr_title: Correct client sessions pagination in admin UI
pr_body: "Fixes #46009\r\n\r\n`ClientSessions` uses a server-paginated loader, but\
  \ `SessionsTable` was not marked as paginated.\r\n\r\nThis caused client-side slicing\
  \ of the first response and incorrect data on next pages.\r\n\r\nThis change sets\
  \ `isPaginated` on `ClientSessions` so page transitions use backend pagination consistently.\r\
  \n"
