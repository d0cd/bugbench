description: After a previous refactoring that consolidated i18n namespaces in the
  Keycloak Admin Console, several translation keys still contained leftover namespace
  prefixes (e.g., 'common:key' or 'clients-help:key'). These stale prefixes cause
  translation lookups to fail, showing raw keys instead of translated strings in the
  UI. The fix mechanically removes the namespace prefixes across ~20 files.
expected_findings:
- file: js/apps/admin-ui/src/clients/credentials/Credentials.tsx
  line: 91
  summary: Translation key in addError() still contains a namespace prefix that was
    removed in a prior refactor; the lookup will fail and display the raw key to users.
  line_side: pre_fix
- file: js/apps/admin-ui/src/events/EventsSection.tsx
  line: 312
  summary: Translation key passed to t() retains a stale namespace prefix, causing
    the event type chip label to render as an untranslated key string.
  line_side: pre_fix
- file: js/apps/admin-ui/src/realm-settings/GeneralTab.tsx
  line: 94
  summary: Validation message translation key includes a leftover namespace prefix,
    so the 'invalid realm name' error message will display as a raw i18n key.
  line_side: pre_fix
