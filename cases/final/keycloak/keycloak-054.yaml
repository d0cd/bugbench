description: Keycloak's embedded `Keycloak` class did not reset JVM-wide state (system
  properties, PropertyMappers, Profile, Configuration, etc.) when `stop()` was called,
  so starting a second instance in the same VM inherited stale configuration from
  the first run. The fix extracts a centralized `reset()` method into KeycloakMain
  and calls it from `stop()` via try/finally. However, the refactoring drops the `ConfigArgsConfigSource.setCliArgs()`
  call that was previously part of the test reset sequence.
expected_findings:
- file: quarkus/tests/junit5/src/main/java/org/keycloak/Keycloak.java
  line: 219
  summary: "stop() only calls closeApplication() without resetting system properties,\
    \ PropertyMappers, Profile, PersistedConfigSource, or Configuration \u2014 subsequent\
    \ Keycloak instances in the same VM will inherit stale state from the prior run."
  line_side: pre_fix
- file: quarkus/runtime/src/test/java/org/keycloak/quarkus/runtime/configuration/AbstractConfigurationTest.java
  line: 80
  summary: "Incomplete refactoring: the previous resetConfiguration() called ConfigArgsConfigSource.setCliArgs()\
    \ between PropertyMappers.reset() and PersistedConfigSource clear, but the new\
    \ KeycloakMain.reset() omits this step \u2014 CLI arg config source may retain\
    \ stale args across resets."
  line_side: pre_fix
