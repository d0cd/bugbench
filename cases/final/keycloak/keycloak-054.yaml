pr_body: "closes: #45921\r\n\r\nReuses the test logic we already have for resetting\
  \ the system state between runs.\r\n\r\nThis assumes that the Keycloak instance\
  \ takes responsibility for restoring the state of the system properties. That can\
  \ be tweaked if needed - in particular we can try to track specifically what we\
  \ / quarkus can manipulate and just clear that.\r\n\r\nFinally the alternative to\
  \ this whole approach would be to fork the test execution instead.\r\n\r\n<!---\r\
