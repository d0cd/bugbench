description: The Keycloak admin client's HTTP agent did not handle `FormData` payloads
  correctly. When a `FormData` body was passed, it was likely JSON-serialized and
  sent with an incorrect `Content-Type` header, causing multipart/form-data requests
  (e.g., key uploads) to fail. The fix adds an `instanceof FormData` check to skip
  JSON serialization and allow the runtime to set the proper content type.
expected_findings:
- file: js/libs/keycloak-admin-client/src/resources/agent.ts
  line: 209
  summary: 'Missing handling for FormData payloads: the request agent unconditionally
    serializes payloads as JSON, which corrupts FormData bodies and sets the wrong
    Content-Type header.'
- file: js/libs/keycloak-admin-client/src/resources/clients.ts
  line: 979
  summary: No uploadKey method exists to support FormData-based key upload requests,
    meaning clients cannot upload keys via the admin API.
