description: The Apache Santuario XML Security library (xmlsec) had a bug tracked
  as SANTUARIO-617 that affected XML encryption operations in Keycloak's SAML implementation.
  The fix upgrades the xmlsec dependency from its previous version to 3.0.6, which
  contains the upstream fix. A test for AES_256_GCM with RSA_OAEP encryption was also
  updated to cover the corrected behavior.
