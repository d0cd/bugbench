description: The version compatibility matrix generation in the CI workflow produced
  multiline output that was incorrectly masked by GitHub Actions secret masking, causing
  mixed-cluster-compatibility-tests to fail on the 26.5 branch. The fix extracts matrix
  generation into a separate job/workflow to avoid multiline secret masking interference
  and corrects how the matrix content is passed between workflow steps.
