description: When configuring Keycloak with a full hostname URL (as opposed to a simple
  hostname), the baseUri was not normalized to end with a trailing slash. The Quarkus
  logic already ensures trailing-slash normalization for simple hostnames, but the
  full-URL code path skipped this step, leading to inconsistent URI handling and potential
  path-resolution issues downstream.
