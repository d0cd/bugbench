description: 'The KeyValueInput component did not handle empty attribute entries correctly.
  When no attributes existed, it displayed a row with empty key/value fields instead
  of an empty state, causing form submission issues with empty entries (issue #19254).
  The fix adds an empty state UI, corrects the key-value conversion logic to properly
  filter/handle empty entries, and fixes label alignment and font styling.'
