pr_body: "closes: #46459\r\n\r\nWe're getting bitten again by quarkus needing a property\
  \ advertised. \r\n\r\nWe may want to eventually consider more systematic approaches\
  \ to things like this:\r\n- should there be an option / property mapper flag to\
  \ indicate it should always be advertised?\r\n- alternatively should we just go\
  \ ahead and advertise all quarkus to keys even if there might not be a value? -\
  \ trying this out did break an existing test, not sure if this would be a good idea\
  \ for backport.\r\n- and do we even need dummy/hidden keycloak options for something\
  \ like this.\r\n\r\n<!---\r\nPlease read https://github.com/keycloak/keycloak/blob/main/CONTRIBUTING.md\
  \ and follow these guidelines when contributing to Keycloak\r\n-->\r\n"
