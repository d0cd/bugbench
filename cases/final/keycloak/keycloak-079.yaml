description: The `targetServerType` JDBC option was not being advertised as a Quarkus
  configuration property because the property mapping logic only advertises options
  that have a value or default. The fix adds a default value of "primary" to `DatabaseOptions`
  and adjusts the `DatabasePropertyMappers` to ensure the property is always exposed,
  allowing users to configure targetServerType as intended.
expected_findings:
- file: quarkus/runtime/src/main/java/org/keycloak/quarkus/runtime/configuration/mappers/DatabasePropertyMappers.java
  line: 125
  summary: targetServerType property mapper does not ensure the property is always
    advertised to Quarkus; without a default value or explicit advertisement flag,
    the option is silently dropped and users cannot configure it
  line_side: pre_fix
- file: quarkus/config-api/src/main/java/org/keycloak/config/DatabaseOptions.java
  line: 117
  summary: Missing default value for targetServerType option means the property mapping
    logic never advertises it as a Quarkus config key; needs a default (e.g. "primary")
    to trigger advertisement
  line_side: pre_fix
