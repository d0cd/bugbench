description: The Authorization header parsing in AppAuthManager used a naive space-based
  split (indexOf(' ')) without validating that the scheme is actually 'Bearer'. This
  allowed attackers to supply malformed or alternative authorization schemes that
  would be incorrectly accepted as bearer tokens, bypassing authentication checks
  (CVE-2026-0707). The fix adds explicit validation that the header starts with 'Bearer
  ' before extracting the token.
expected_findings:
- file: quarkus/runtime/src/main/java/org/keycloak/quarkus/runtime/configuration/mappers/PropertyMappers.java
  line: 375
  summary: "wildcardMapFrom used a single-valued HashMap, so when multiple wildcard\
    \ mappers mapped from the same option key, only the last one was stored \u2014\
    \ silently dropping earlier mappings and causing configuration properties to be\
    \ missing"
  line_side: pre_fix
- file: quarkus/runtime/src/main/java/org/keycloak/quarkus/runtime/configuration/PropertyMappingInterceptor.java
  line: 135
  summary: "Wildcard-mapped-from resolution only handled non-wildcard mappers (the\
    \ else branch), missing the case where a wildcard mapper itself maps from another\
    \ wildcard \u2014 causing derived configuration properties to not be advertised"
  line_side: pre_fix
- file: quarkus/config-api/src/main/java/org/keycloak/config/DatabaseOptions.java
  line: 163
  summary: Datasource connected options listed DB_URL (which is not needed) but was
    missing DB_POOL_MAX_SIZE, DB_SQL_JPA_DEBUG, and DB_SQL_LOG_SLOW_QUERIES, so those
    properties were not discovered for named datasources
  line_side: pre_fix
