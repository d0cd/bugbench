description: Keycloak's Quarkus configuration layer failed to expose certain property
  names, particularly wildcards mapped from other properties. The fix generalizes
  how wildcard properties are advertised by looking at mapFrom relationships, adding
  connected options for database/transaction properties, and expanding PropertyMappingInterceptor
  to collect mapped wildcard property names.
expected_findings:
- file: quarkus/runtime/src/main/java/org/keycloak/quarkus/runtime/configuration/mappers/PropertyMappers.java
  line: 195
  summary: getWildcardsMappedFrom does not traverse mapFrom relationships to discover
    additional wildcard property names that should be advertised
- file: quarkus/runtime/src/main/java/org/keycloak/quarkus/runtime/configuration/PropertyMappingInterceptor.java
  line: 28
  summary: Property name iteration does not include wildcard properties reachable
    via mapFrom mappings, causing them to be omitted from the exposed property name
    list
- file: quarkus/runtime/src/main/java/org/keycloak/quarkus/runtime/configuration/mappers/PropertyMapper.java
  line: 694
  summary: getMapFrom accessor exists but callers do not use it to resolve transitive
    property name exposure for wildcards
