  line: 32
  summary: 'Missing validation: Authorization header is parsed via indexOf('' '')
    without verifying the scheme is ''Bearer'', allowing malformed headers to bypass
    auth checks (CVE-2026-0707)'
- file: services/src/main/java/org/keycloak/services/managers/AppAuthManager.java
