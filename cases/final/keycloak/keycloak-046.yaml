description: The Authorization header parsing in AppAuthManager.java lacked proper
  validation when extracting Bearer tokens. Malformed or crafted Authorization headers
  could bypass authentication checks because the code split on space without verifying
  the scheme prefix or handling edge cases like missing/extra whitespace, enabling
  CVE-2026-0707. The fix adds strict validation that the header starts with 'Bearer
  ' before extracting and using the token value.
