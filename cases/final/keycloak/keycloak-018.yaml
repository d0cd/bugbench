description: Cypress CI tests were running on all forks on push events, overwhelming
  the CI budget and adding unwanted comments to PRs that don't modify the front-end.
  The fix adds a repository check (`github.repository == 'keycloak/keycloak'`) to
  the workflow conditions so Cypress tests only run on the main repo.
