description: The TokenIntrospectionEndpoint reflected unsanitized user input from
  the `token_type_hint` parameter directly into error response messages, creating
  a potential injection vulnerability. The fix replaces the dynamic error message
  with a static string and logs the token type hint server-side via event.detail()
  for auditing without exposing it to clients.
expected_findings:
- file: services/src/main/java/org/keycloak/protocol/oidc/endpoints/TokenIntrospectionEndpoint.java
  line: 99
  summary: Unsanitized user input (tokenTypeHint) is interpolated directly into the
    error response message, enabling log injection and potential reflection attacks
    in downstream systems. The error message should use a static string instead.
