pr_title: "fix: use configured VC types and ISO 8601 dates in OID4VC credential \u2026"
pr_body: "- Closes https://github.com/keycloak/keycloak/issues/46051\r\n\r\nThis pull\
  \ request updates how the types of verifiable credentials are handled and improves\
  \ date serialization in the OID4VC implementation. The main changes ensure that\
  \ credentials can have multiple types, align the code with the credential configuration\
  \ model, and improve date formatting for JSON serialization. Additionally, related\
  \ tests have been updated to reflect these changes.\r\n\r\n**Credential type handling\
  \ improvements:**\r\n* Changed the assignment of the `type` field in `VerifiableCredential`\
  \ to support multiple credential types from `credentialScopeModel.getSupportedCredentialTypes()`\
  \ instead of a single scope value.\r\n* Updated tests in `OID4VCICredentialOfferMatrixTest.java`\
  \ to expect a list of credential types rather than a single type, ensuring consistency\
  \ with the new model. [[1]](diffhunk://#diff-e93f6d53b5d5a6549cd32b55b4c6dde7b22905f71a5657b65538a55bbc8b222fL465-R465)\
  \ [[2]](diffhunk://#diff-e93f6d53b5d5a6549cd32b55b4c6dde7b22905f71a5657b65538a55bbc8b222fL475-R475)\r\
  \n\r\n**Date serialization enhancements:**\r\n* Added `@JsonFormat(shape = JsonFormat.Shape.STRING)`\
  \ annotations to the `issuanceDate` and `expirationDate` fields in `VerifiableCredential`\
  \ to ensure proper JSON serialization as strings.\r\n* Imported the necessary `JsonFormat`\
  \ annotation in `VerifiableCredential.java`.\u2026issuance\r\n\r\n- Use credentialScopeModel.getSupportedCredentialTypes()\
  \ instead of credentialConfig.getScope() for setting VC type in OID4VCIssuerEndpoint\r\
  \n- Add @JsonFormat(shape = STRING) to issuanceDate and expirationDate in VerifiableCredential\
  \ for W3C VC Data Model compliant ISO 8601 serialization\r\n- Update OID4VCICredentialOfferMatrixTest\
  \ to assert VC type from credential definition instead of scope name\r\n\r\n<!---\r\
  \nPlease read https://github.com/keycloak/keycloak/blob/main/CONTRIBUTING.md and\
  \ follow these guidelines when contributing to Keycloak\r\n-->\r\n"
