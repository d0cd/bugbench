description: The OID4VC credential issuance endpoint was setting the VerifiableCredential
  type field to a single scope value instead of using the configured credential types
  from credentialScopeModel.getSupportedCredentialTypes(), resulting in credentials
  with incorrect type metadata. Additionally, date fields in VerifiableCredential
  lacked @JsonFormat annotations, causing non-ISO 8601 serialization in issued credentials.
expected_findings:
- file: services/src/main/java/org/keycloak/protocol/oid4vc/issuance/OID4VCIssuerEndpoint.java
  line: 1555
  summary: 'Credential type set from wrong source: should use credentialScopeModel.getSupportedCredentialTypes()
    (list of configured types) instead of single scope value'
- file: services/src/main/java/org/keycloak/protocol/oid4vc/model/VerifiableCredential.java
  line: 72
  summary: Date fields missing @JsonFormat annotation for ISO 8601 serialization,
    causing non-standard date output in issued verifiable credentials
