description: "Prometheus requires all meters with the same name to have identical\
  \ tag key sets, but the Keycloak user event metrics listener was conditionally including\
  \ tag keys \u2014 omitting them when the value was absent. This caused inconsistent\
  \ tag key sets across counters with the same metric name, leading to Prometheus\
  \ ingestion failures or silent data loss. The fix always includes configured tag\
  \ keys, using an empty string as the default value when the actual value is null."
