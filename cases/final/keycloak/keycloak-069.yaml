description: The `targetServerType` JDBC parameter was not always being passed through
  to the database connection URL. The property mapping logic only advertised the option
  under certain conditions, so even when a user explicitly set `targetServerType`,
  it could be silently dropped. The fix adds a default value of "primary" to the `DatabaseOptions`
  definition so the property mapper always processes and forwards the parameter.
expected_findings:
- file: quarkus/config-api/src/main/java/org/keycloak/config/DatabaseOptions.java
  line: 117
  summary: "targetServerType option lacks a default value, causing the property mapping\
    \ logic to skip it when not explicitly set \u2014 JDBC targetServerType parameter\
    \ is silently dropped from the connection URL"
  line_side: pre_fix
- file: quarkus/runtime/src/main/java/org/keycloak/quarkus/runtime/configuration/mappers/DatabasePropertyMappers.java
  line: 125
  summary: Property mapper for targetServerType is conditionally applied rather than
    always forwarding the value to the JDBC URL, meaning user-specified values can
    be ignored
  line_side: pre_fix
