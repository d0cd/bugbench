description: ClientAccessTypeCondition in Keycloak did not handle RESOURCE_OWNER_PASSWORD_CREDENTIALS_REQUEST
  events, creating a policy enforcement gap. Clients could bypass access-type-based
  client policies by using the Resource Owner Password Credentials (direct access
  grant) flow. The fix adds the missing case to the switch statement and updates the
  lax security profile configuration.
