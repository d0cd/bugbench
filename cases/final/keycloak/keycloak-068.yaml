pr_title: Fix deny unsupported FGAPv2 token-exchange audience checks
pr_body: 'Fixes #46718


  `ClientPermissionsV2.canExchangeTo()` currently throws `UnsupportedOperationException`,
  which causes `V1TokenExchangeProvider.validateAudience()` to fail with HTTP 500
  when FGAPv2 is enabled and a cross-client `audience` is requested.


  This change makes `canExchangeTo()` deny gracefully by returning `false`, so unsupported
  checks produce an authorization denial instead of an uncaught server error.


  A focused unit test (`ClientPermissionsV2Test`) was added to verify the method returns
  `false` and no longer throws.

  '
