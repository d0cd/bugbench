description: ClientAccessTypeCondition did not handle the RESOURCE_OWNER_PASSWORD_CREDENTIALS_REQUEST
  event type, causing client policies to not be enforced for direct access grant (password
  grant) flows. The fix adds a case for this event in the condition's switch statement
  and updates the lax security profile policies to include it.
