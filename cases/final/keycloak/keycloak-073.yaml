pr_title: Fix how the admin ui obtains its logo
pr_body: "## Description\r\nFixes the admin UI theming bug where custom logos from\
  \ theme properties were not being displayed, making admin theming inconsistent with\
  \ login and account themes.\r\n## Problem\r\nThe PageHeader.tsx component was incorrectly\
  \ prioritizing empty preview logos over actual theme logos. The logic `customLogo\
  \ || joinPath(environment.resourceUrl, logo)` meant that even empty strings from\
  \ the LogoContext would override the valid theme logo from `environment.logo`.\r\
  \n## Solution\r\nUpdated the logo source logic to only use custom logo when it has\
  \ a meaningful value:\r\n```typescript\r\nsrc: (customLogo && customLogo.trim())\
  \ ? customLogo : joinPath(environment.resourceUrl, logo)\r\n```\r\n\r\nFixes #45733\r\
  \n"
