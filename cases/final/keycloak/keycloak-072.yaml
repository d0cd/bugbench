description: The organization group documentation incorrectly showed token claims
  including the parent group path (e.g. '/Engineering/Backend') instead of just the
  mapped subgroup. The fix corrects the example JSON in the docs to omit the parent
  group from the groups claim, matching actual Keycloak behavior.
