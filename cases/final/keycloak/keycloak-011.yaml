pr_title: 'fix: adding admin role invalidation when a new realm is found'
pr_body: "closes: #45966\r\n\r\nIn order to not require a restart on a new realm import\
  \ there are two changes.\r\n\r\nWhenever an admin performs an operation on the new\
  \ realm, the new logic in RealmSessionCache will invalidate the master admin role\
  \ if needed.\r\n\r\nThen for that to be applicable to the current operation, it\
  \ needs to also be taken into account for the MgmtPermissions role logic - the newly\
  \ invalidated admin role is checked for new roles.\r\n\r\n<!---\r\nPlease read https://github.com/keycloak/keycloak/blob/main/CONTRIBUTING.md\
  \ and follow these guidelines when contributing to Keycloak\r\n-->\r\n"
