description: The Authorization header parsing in AppAuthManager used indexOf(' ')
  to split the header without validating that it actually starts with 'Bearer'. This
  allowed malformed or crafted Authorization headers to bypass validation or cause
  unexpected behavior, constituting CVE-2026-0707. The fix adds proper validation
  that the header prefix is 'Bearer ' before extracting the token value.
