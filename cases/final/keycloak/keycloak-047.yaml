pr_body: "Closes #19254. Also makes the following changes:\r\n\r\n#### Font style\
  \ now matches other form labels\r\nBefore | After\r\n--- | ---\r\n![](https://user-images.githubusercontent.com/695720/228617433-a17fea2c-a001-4796-ab5d-d8def5be8601.png)\
  \ | ![](https://user-images.githubusercontent.com/695720/228617832-69edfaaa-2d0b-440b-98d6-4283ec138af4.png)\r\
  \n\r\n#### Labels are now aligned horizontally with their inputs\r\nBefore | After\r\
  \n--- | ---\r\n![](https://user-images.githubusercontent.com/695720/228619818-cda13299-cb6e-41a7-957d-34b870688ff4.png)\
  \ | ![](https://user-images.githubusercontent.com/695720/228619662-efbfef5f-244e-46ec-9090-311283c83515.png)\r\
  \n\r\n#### Empty state when there are no attributes\r\nI've added an empty state\
  \ instead of showing a row with empty values. This makes things look a bit better\
  \ and adds more intend to the users action. This also solves the issue that caused\
  \ ##19254.\r\n\r\n![](https://user-images.githubusercontent.com/695720/228620514-56aef392-1915-4bfc-abf8-47182db5f73f.png)\r\
  \n\r\n#### Form validation for entries\r\nI've also added proper form validation\
  \ for the entries, if either key or value is left empty an error will be shown:\r\
  \n\r\n![](https://user-images.githubusercontent.com/695720/228621426-9641ad72-f7f6-4379-98ce-91b51f0bdfb8.png)\r\
  \n\r\n@xianli123 since this PR makes some UX/UI change, could I ask you to validate\
  \ it as well?\r\n\r\n"
