description: "The KeyValueInput component did not handle the empty state correctly\
  \ \u2014 when no attributes were defined, it rendered a row with empty values instead\
  \ of an empty state, causing UI issues and potentially triggering errors when interacting\
  \ with the empty row. The key-value-convert utility also failed to properly handle\
  \ empty or undefined attribute arrays during conversion, leading to unexpected form\
  \ state."
expected_findings:
- file: services/src/main/java/org/keycloak/services/managers/AppAuthManager.java
  line: 67
  summary: Using regex WHITESPACES.split() to parse the Authorization header allows
    tokens with multiple spaces or tabs between the type and token value to be accepted,
    bypassing proper validation of the header format
  line_side: pre_fix
- file: services/src/main/java/org/keycloak/services/managers/AppAuthManager.java
  line: 68
  summary: "Splitting on whitespace and checking split.length != 2 fails to reject\
    \ tokens containing embedded spaces/whitespace \u2014 e.g. 'Bearer tok en' splits\
    \ into 3 parts but 'Bearer  token' (double space) splits into 3 with an empty\
    \ element, producing inconsistent validation"
  line_side: pre_fix
