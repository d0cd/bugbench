description: The `byteArrayToResolverProviderId` method in `ArtifactBindingUtils`
  accesses byte array indices 0-3 without first verifying the array has at least 4
  elements, causing an `ArrayIndexOutOfBoundsException` when a short or malformed
  SAML artifact is received. The fix adds a minimum length check of 4 bytes (for the
  mandatory type code and endpoint index) and the callers in `SamlService` now also
  catch `IllegalArgumentException` to handle the validation failure gracefully.
expected_findings:
- file: server-spi-private/src/main/java/org/keycloak/protocol/saml/util/ArtifactBindingUtils.java
  line: 11
  summary: "Missing bounds check: byteArrayToResolverProviderId accesses ar[0]\u2013\
    ar[3] without verifying ar.length >= 4, causing ArrayIndexOutOfBoundsException\
    \ on short input"
- file: services/src/main/java/org/keycloak/protocol/saml/SamlService.java
  line: 387
  summary: Catch block only catches ArtifactResolverProcessingException but not IllegalArgumentException,
    so a malformed artifact with too-short byte array will propagate as an unhandled
    exception
- file: services/src/main/java/org/keycloak/protocol/saml/SamlService.java
  line: 1218
  summary: "Same missing IllegalArgumentException catch as the other SAML artifact\
    \ handling path \u2014 malformed artifacts crash instead of returning an error\
    \ response"
