description: Docker image builds for the Keycloak operator were slow or failing because
  the `--ulimit nofile` flag was not passed to `docker build` commands. A previous
  fix (#44233) tried to work around this by embedding `ulimit` calls inside Dockerfile
  `RUN` commands, which was fragile. This PR moves the ulimit setting to the build
  command level via `--ulimit nofile=1024000` in scripts and `quarkus.docker.additional-args`
  in application.properties, and also fixes an incorrect script path and missing `--cpus=max`
  in the README.
