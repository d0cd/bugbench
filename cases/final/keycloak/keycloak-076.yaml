  summary: Config description incorrectly says 'regex' but the implementation uses
    wildcard pattern matching; users providing regex patterns will get unexpected
    behavior
  line_side: pre_fix
- file: services/src/main/java/org/keycloak/protocol/oauth2/cimd/clientpolicy/executor/AbstractClientIdMetadataDocumentExecutorFactory.java
  line: 89
  summary: Config description incorrectly says 'regex' but the implementation uses
    wildcard pattern matching; same misleading text as the condition factory
  line_side: pre_fix
