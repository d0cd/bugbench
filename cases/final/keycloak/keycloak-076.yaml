description: Configuration description strings in two CIMD client-policy factory classes
  incorrectly stated that domain matching uses regex when it actually uses wildcard
  pattern matching (e.g. '*.example.org'). This misleads administrators configuring
  the policy into writing regex syntax instead of glob/wildcard syntax.
