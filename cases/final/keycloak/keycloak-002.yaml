description: The batch-oriented `copyOf` and `populateClientSessions` methods in ImmutableSession
  processed user sessions in buffered batches via `getAllAsync` and collection-based
  queries, but this approach produced incorrect results in clusterless, multi-site,
  and volatile session configurations. The fix refactors to per-session processing
  (`getAsync` + `map` instead of `buffer` + `getAllAsync` + `flatMap`), eliminating
  the batch indirection and a missing `setRealm` context call in the test.
expected_findings:
- file: model/infinispan/src/main/java/org/keycloak/models/sessions/infinispan/remote/RemoteUserSessionProvider.java
  line: 311
  summary: Batch buffering with `.buffer(batchSize)` followed by `flatMap` to `ImmutableSession.copyOf(collection)`
    causes incorrect session results in remote/external-store configurations; should
    process sessions individually via `.map` + `.filter(nonNull)`.
  line_side: pre_fix
- file: model/infinispan/src/main/java/org/keycloak/models/sessions/infinispan/remote/RemoteUserSessionProvider.java
  line: 322
  summary: '`getAllAsync(Set.copyOf(sessionId))` fetches a batch map then passes `entity.values()`
    to the collection-based `copyOf`, but this batch-then-flatten pattern can lose
    or misassociate client sessions; should use `getAsync(sessionId)` per session.'
  line_side: pre_fix
- file: tests/base/src/test/java/org/keycloak/tests/model/UserSessionProviderTest.java
  line: 894
  summary: Missing `kcSession.getContext().setRealm(realm)` before calling `readOnlyStreamUserSessions`;
    without it, the realm context is null and the call fails in configurations that
    rely on the session context (e.g., remote Infinispan).
  line_side: pre_fix
