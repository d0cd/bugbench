description: The `useSetTimeout()` hook did not reset `didUnmountRef` to `false` when
  the component remounted. With React StrictMode (and the new Root API), React automatically
  unmounts and remounts components in development, causing the ref to stay `true`
  after remount, which made all subsequent timeout scheduling silently fail.
expected_findings:
- file: js/apps/admin-ui/src/utils/useSetTimeout.ts
  line: 7
  summary: 'Missing state reset on mount: useEffect cleanup sets `didUnmountRef.current
    = true` but the effect never resets it to `false` on mount, so after React StrictMode
    remounts the component, the ref permanently indicates unmounted.'
