pr_title: Fix FGAP deny evaluation for manage-group-membership
pr_body: 'Fixes #46693


  Add the missing Users FGAP scope alias from manage-group-membership to Groups manage-membership
  so group-level deny policies are considered when evaluating user group membership
  updates.


  Add a regression test that verifies protected group members are denied membership
  changes, unrelated users remain manageable, and forbidden requests do not mutate
  memberships.'
