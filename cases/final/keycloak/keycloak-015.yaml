description: The FGAP (Fine-Grained Admin Permissions) schema was missing a scope
  alias from the Users resource type's 'manage-group-membership' scope to the Groups
  resource type's 'manage-membership' scope. This meant group-level deny policies
  were silently ignored when evaluating user group membership updates, allowing membership
  changes that should have been denied by group-scoped policies.
expected_findings:
- file: js/apps/admin-ui/src/utils/useSetTimeout.ts
  line: 7
  summary: The useEffect cleanup function sets didUnmountRef.current = true but never
    resets it to false on re-mount. After a component remounts (e.g., in React StrictMode
    or Fast Refresh), didUnmountRef remains true, causing scheduled timeouts to be
    incorrectly treated as unmounted and never fire.
  line_side: pre_fix
