description: When a new realm is created or imported, the Infinispan cache layer in
  RealmCacheSession did not invalidate admin role entries, causing stale cached permissions.
  This meant newly created realms could have incorrect or missing admin role assignments.
  The fix adds admin role cache invalidation on realm creation/import and adjusts
  permission checks in MgmtPermissions (FGAP) to account for lightweight token usage.
expected_findings:
- file: model/infinispan/src/main/java/org/keycloak/models/cache/infinispan/RealmCacheSession.java
  line: 493
  summary: "Missing admin role cache invalidation when a new realm is added \u2014\
    \ stale cached roles will persist, causing permission errors for the new realm"
  line_side: pre_fix
- file: services/src/main/java/org/keycloak/services/resources/admin/fgap/MgmtPermissions.java
  line: 159
  summary: Permission check does not account for lightweight token usage or imported
    realms, potentially granting incorrect admin access
  line_side: pre_fix
