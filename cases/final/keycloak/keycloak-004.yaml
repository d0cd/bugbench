description: SAML/XML digital signatures were broken due to unexpected linebreaks
  in Base64-encoded signature values. The JDK (JDK-8264194) and Apache Santuario (SANTUARIO-482)
  changed default line break behavior in XML security output. The fix sets the system
  properties 'com.sun.org.apache.xml.internal.security.ignoreLineBreak' and the Apache
  Santuario equivalent to suppress linebreaks in XML signature generation.
expected_findings:
- file: saml-core/src/main/java/org/keycloak/saml/common/util/SystemPropertiesUtil.java
  line: 32
  summary: Missing system property to ignore line breaks in XML security Base64 output.
    The property 'com.sun.org.apache.xml.internal.security.ignoreLineBreak' (and/or
    the Apache Santuario equivalent 'org.apache.xml.security.ignoreLineBreaks') must
    be set to 'true' to prevent linebreaks from breaking SAML signature validation.
