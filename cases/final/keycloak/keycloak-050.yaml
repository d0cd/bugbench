description: XML/SAML signature verification fails on certain JDK versions due to
  changed linebreak handling in Base64-encoded signatures. The JDK and Apache Santuario
  libraries changed default behavior around linebreaks in XML digital signatures (JDK-8264194,
  SANTUARIO-482), breaking SAML authentication flows. The fix sets the system properties
  'com.sun.org.apache.xml.internal.security.ignoreLineBreak' and the Apache equivalent
  to ensure consistent signature validation.
