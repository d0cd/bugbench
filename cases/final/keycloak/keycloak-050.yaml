description: The OAuthClient.preAuthorizedCodeGrantRequest() method in the OID4VCI
  test utility was incorrectly constructing or executing the pre-authorized code grant
  flow. The fix revisits the request building logic across several OID4VCI request
  classes to ensure proper OAuth token exchange using pre-authorized codes, likely
  fixing incorrect parameters, endpoint resolution, or request inheritance in the
  test client hierarchy.
