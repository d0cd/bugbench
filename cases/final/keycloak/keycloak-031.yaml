description: The Authorization header parsing in AppAuthManager.java used indexOf('
  ') to split the header value without validating that the scheme is 'Bearer' or that
  a non-empty token follows. This pattern is repeated in three locations, allowing
  malformed Authorization headers to bypass authentication checks (CVE-2026-0707).
  The fix adds explicit Bearer prefix validation and non-empty token checks.
