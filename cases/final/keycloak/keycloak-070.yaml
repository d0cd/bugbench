description: The `remove()` method in both `InfinispanSingleUseObjectProvider` and
  `RemoteInfinispanSingleUseObjectProvider` relied on the return value of Infinispan's
  `cache.remove(key)` to retrieve the previous entry. During Infinispan cluster state
  transfers (topology changes), this return value can be silently lost, causing Keycloak
  to incorrectly report OAuth2 authorization codes as already consumed ('Code already
  used' error). The fix replaces the pattern with a get-before-remove approach that
  captures the value first.
expected_findings:
- file: model/infinispan/src/main/java/org/keycloak/models/sessions/infinispan/InfinispanSingleUseObjectProvider.java
  line: 95
  summary: 'Unsafe reliance on `cache.remove(key)` return value: Infinispan does not
    guarantee returning the previous value during state transfers, causing legitimate
    single-use tokens to appear already consumed. Use get-before-remove instead.'
  line_side: pre_fix
- file: model/infinispan/src/main/java/org/keycloak/models/sessions/infinispan/remote/RemoteInfinispanSingleUseObjectProvider.java
  line: 66
  summary: 'Same unsafe pattern in remote provider: `withReturnValue().remove(key)`
    can lose the return value during Infinispan state transfers. Should use `getWithMetadata`
    followed by `removeWithVersion` for reliable value retrieval.'
  line_side: pre_fix
