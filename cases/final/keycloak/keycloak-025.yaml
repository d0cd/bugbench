description: The `useFetch()` hook instantiates a new `AbortController` on every call
  (i.e., every render) rather than inside the `useEffect` callback. This means the
  controller referenced in the effect's cleanup function is not the same one passed
  to the fetch request, so calling `abort()` on unmount or dependency change never
  actually cancels the in-flight request. Moving the `AbortController` construction
  inside the effect ensures the cleanup closes over the correct instance.
expected_findings:
- file: test-framework/core/src/main/java/org/keycloak/testframework/injection/ReflectionUtils.java
  line: 27
  summary: "listMethods() only calls getDeclaredMethods() on the starting class but\
    \ skips it when walking superclasses, so the class itself is processed first (wrong\
    \ order) and superclass methods are appended after \u2014 resulting in incorrect\
    \ execution order (subclass before superclass) for annotated lifecycle methods"
  line_side: pre_fix
- file: test-framework/core/src/main/java/org/keycloak/testframework/injection/ReflectionUtils.java
  line: 30
  summary: When a subclass overrides a superclass method (both annotated), the superclass
    walk unconditionally adds duplicate entries without checking if a method with
    the same name/signature was already collected, causing overridden methods to execute
    twice
  line_side: pre_fix
