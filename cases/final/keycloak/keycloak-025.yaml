pr_title: Ensure requests are cancelled properly in `useFetch()`
pr_body: This fixes a bug in the `useFetch()` hook which caused requests not to be
  cancelled properly. This was caused by the fact that the `AbortController` would
  be instantiated on every call, when instead it should only be created inside the
  effect.
