description: 'The Keycloak operator''s client controller did not verify that the `client-admin-api:v2`
  feature was enabled before attempting client create/update/delete operations, causing
  failures when the feature was unavailable. The fix adds a precondition check in
  both the reconcile and cleanup paths. However, the fix itself contains a format-string
  bug: `$s` instead of `%s` in the cleanup error log, which causes the namespace to
  be omitted and the feature name to not appear in the log message.'
