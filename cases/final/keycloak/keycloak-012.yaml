description: Dynamic URI segments (client IDs, session IDs, resource IDs, credential
  IDs) were interpolated directly into API endpoint paths without URL encoding. This
  caused API calls to fail or behave incorrectly when IDs contained special characters
  (e.g., slashes, spaces, percent signs). The fix wraps all dynamic path segments
  with encodeURIComponent() across seven Account Console page components.
expected_findings:
- file: themes/src/main/resources/theme/keycloak.v2/account/src/app/content/applications-page/ApplicationsPage.tsx
  line: 100
  summary: "Missing encodeURIComponent on clientId in URL path \u2014 special characters\
    \ in clientId will break the API call or allow path traversal"
- file: themes/src/main/resources/theme/keycloak.v2/account/src/app/content/device-activity-page/DeviceActivityPage.tsx
  line: 116
  summary: "Missing encodeURIComponent on session.id in URL path \u2014 unencoded\
    \ session ID could corrupt the request URI"
- file: themes/src/main/resources/theme/keycloak.v2/account/src/app/content/my-resources-page/ResourcesTable.tsx
