description: Translation keys in the Keycloak Admin Console still contained leftover
  namespace prefixes (e.g., "common:key" or "clients:key") after a prior namespace
  consolidation refactor. These stale prefixes caused the i18n `t()` function to fail
  key lookups, resulting in untranslated strings or raw keys displayed in the UI.
  The fix removes the namespace prefixes from all remaining translation key references
  across ~20 files.
expected_findings:
- file: js/apps/admin-ui/src/authentication/EmptyExecutionState.tsx
  line: 69
  summary: Translation key passed to t() still contains a namespace prefix that should
    have been removed during namespace consolidation
- file: js/apps/admin-ui/src/clients/credentials/Credentials.tsx
  line: 91
  summary: addError() call uses a translation key with a leftover namespace prefix,
    causing error messages to display as raw keys
- file: js/apps/admin-ui/src/realm-settings/GeneralTab.tsx
  line: 94
  summary: Validation message translation key contains stale namespace prefix, resulting
    in untranslated error shown to users
