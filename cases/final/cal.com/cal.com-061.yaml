pr_title: 'fix: use path.sep in redirect-apps template exclusion for Windows compatibility'
pr_body: " ## What I did\r\n\r\n  On Windows, `path.join(\"templates\", \"link-as-an-app\"\
  )` returns `templates\\link-as-an-app` (backslash), but the template exclusion check\
  \ in `packages/app-store-cli/src/build.ts` uses a\r\n  hardcoded forward slash:\r\
  \n\r\n  ```ts\r\n  !app.path.startsWith(\"templates/\")\r\n\r\n  This causes template\
  \ apps like link-as-an-app to leak into redirect-apps.generated.ts when the build\
  \ script runs on Windows.\r\n\r\n  Fix: Replace \"templates/\" with `templates${path.sep}`\
  \ so the check works on both Windows and Unix.\r\n\r\n  Checklist for Contributors\r\
  \n\r\n  Testing\r\n\r\n  The changes in this PR are covered in the following automated\
  \ tests:\r\n\r\n  - stories\r\n  - unit tests\r\n  - integration tests\r\n  - end-to-end\
  \ tests\r\n\r\n  Manual testing\r\n\r\n  1. On Windows, run yarn app-store:build\r\
  \n  2. Check packages/app-store/redirect-apps.generated.ts \u2014 link-as-an-app\
  \ should no longer appear\r\n\r\n  Documentation\r\n\r\n  - Add or update documentation\
  \ reflecting your changes\r\n  - If you are deprecating/removing a feature, make\
  \ sure to update\r\n  https://github.com/calcom/cal.com/blob/main/MIGRATION.md"
