description: When users sign up via a team invite token, their membership is auto-accepted
  rather than left in a pending state. The onboarding redirect logic only checked
  for pending invites via `hasPendingInviteByUserId`, so users who joined via invite
  link were not detected as having team membership and were sent to the wrong onboarding
  page instead of personal onboarding. The fix broadens the check to any team membership
  (pending or accepted).
