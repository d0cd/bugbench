description: Users with personal email addresses (e.g., Gmail) could enter the organization
  creation flow, complete the entire form, and only encounter a 'need company email'
  error at checkout with no way to fix it inline. Additionally, the Zustand-persisted
  store cached the old email address after a user changed it in profile settings,
  effectively locking them out of the upgrade path. The fix adds isCompanyEmail validation
  at the start of the upgrade flow with both a server-side redirect and a client-side
  warning.
expected_findings:
- file: apps/web/app/(use-page-wrapper)/settings/organizations/new/page.tsx
  line: 1
  summary: 'Missing server-side guard: non-admin users with personal (non-company)
    emails can reach the organization creation page without an isCompanyEmail check,
    only to fail at checkout'
- file: apps/web/modules/ee/organizations/components/CreateANewOrganizationForm.tsx
  line: 1
  summary: 'Missing client-side validation: form renders without checking isCompanyEmail,
    and Zustand store caches stale email addresses, allowing users with personal emails
    to fill out the entire form before hitting an unrecoverable error'
