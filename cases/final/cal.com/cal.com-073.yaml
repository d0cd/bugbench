pr_body: "## What does this PR do?\r\n\r\nAdds a `displayLocations` property to the\
  \ `OptInFeatureConfig` interface to control where opt-in features are displayed\
  \ (settings page, banner, or both), and applies this filtering at the callers' side.\r\
  \n\r\n## How to test locally\r\n\r\n```\r\nupdate \"Feature\" set enabled = true\
  \ where slug='bookings-v3';\r\n```\r\n\r\nRun it to globally enable the flag, and\
  \ then go to the settings page to see the \"Features\" menu.\r\n\r\n---\r\n\r\n\
  **Changes:**\r\n- Added `OptInFeatureDisplayLocation` type with values `\"settings\"\
  ` | `\"banner\"`\r\n- Added optional `displayLocations` property to `OptInFeatureConfig`\
  \ interface\r\n- Added helper functions:\r\n  - `getFeatureDisplayLocations()` -\
  \ returns display locations with default of `['settings']`\r\n  - `shouldDisplayFeatureAt()`\
  \ - checks if a feature should display at a specific location\r\n  - `getOptInFeaturesForLocation()`\
  \ - filters features by location\r\n- Updated `getOptInFeaturesForScope()` to accept\
  \ an optional `displayLocation` parameter for filtering\r\n- Simplified `HAS_*_OPT_IN_FEATURES`\
  \ constants to use `getOptInFeaturesForScope(scope, \"settings\").length > 0`\r\n\
  - Updated `FeatureOptInService.listFeaturesForUser()` to filter by 'settings' location\r\
  \n- Updated `FeatureOptInService.listFeaturesForTeam()` to filter by 'settings'\
  \ location\r\n- Updated `useFeatureOptInBanner` hook to check for 'banner' location\
  \ before showing\r\n\r\n**Default behavior:** If `displayLocations` is omitted,\
  \ features default to `['settings']` only.\r\n\r\n## Mandatory Tasks (DO NOT REMOVE)\r\
  \n\r\n- [x] I have self-reviewed the code (A decent size PR without self-review\
  \ might be rejected).\r\n- [x] I have updated the developer docs in /docs if this\
  \ PR makes changes that would require a [documentation change](https://cal.com/docs).\
  \ N/A - internal config change only.\r\n- [x] I confirm automated tests are in place\
  \ that prove my fix is effective or that my feature works.\r\n\r\n## How should\
  \ this be tested?\r\n\r\n1. Verify the helper functions work as expected:\r\n  \
  \ - `getFeatureDisplayLocations({ slug: \"test\", ... })` should return `[\"settings\"\
  ]` (default)\r\n   - `getFeatureDisplayLocations({ slug: \"test\", displayLocations:\
  \ [\"banner\"] })` should return `[\"banner\"]`\r\n   - `shouldDisplayFeatureAt(feature,\
  \ \"settings\")` should return `true` for features without `displayLocations`\r\n\
  \   - `getOptInFeaturesForScope(\"user\", \"banner\")` should only return user-scoped\
  \ features with `\"banner\"` in their `displayLocations`\r\n\r\n2. Verify caller-side\
  \ filtering:\r\n   - `listFeaturesForUser()` and `listFeaturesForTeam()` should\
  \ only return features with 'settings' in displayLocations\r\n   - Banner hook should\
  \ only show features with 'banner' in displayLocations\r\n   - `HAS_*_OPT_IN_FEATURES`\
  \ constants should only be true if there are features with 'settings' location\r\
  \n\r\n## Checklist\r\n\r\n- [x] My code follows the style guidelines of this project\r\
  \n- [x] I have commented my code, particularly in hard-to-understand areas\r\n-\
  \ [x] My changes generate no new warnings\r\n\r\n---\r\n\r\n### Human Review Checklist\r\
  \n- [ ] Verify the default behavior (defaulting to `['settings']`) matches requirements\r\
  \n- [ ] Confirm the filtering logic is applied correctly in all callers (service\
  \ methods, banner hook, constants)\r\n- [ ] Verify the banner hook correctly prevents\
  \ showing features without 'banner' in displayLocations\r\n- [ ] Note: The test\
  \ mock returns all features regardless of `displayLocation` parameter - the filtering\
  \ logic in `getOptInFeaturesForScope` isn't directly tested. Consider if this is\
  \ acceptable or if tests should be added.\r\n\r\n**Link to Devin run:** https://app.devin.ai/sessions/a064ee43a56d458caf2892b55959f1ea\r\
  \n**Requested by:** @eunjae-lee"
