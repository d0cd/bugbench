description: Flaky e2e tests for the slots API endpoints were using booking UIDs derived
  from `eventTypeId` (e.g., `booking-uid-${eventTypeId}`), which could collide across
  parallel test runs or repeated executions, causing non-deterministic failures. The
  fix makes booking UIDs unique per test invocation to ensure proper test isolation.
