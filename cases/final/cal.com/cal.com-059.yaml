pr_title: 'fix: replace fragile CSS selector with data-testid in locale E2E tests'
pr_body: "## What does this PR do?\r\n\r\nFixes flaky locale E2E tests (`de->ar` and\
  \ `de->pt-BR`) that intermittently fail due to a brittle CSS path selector (`.bg-default\
  \ > div > div:nth-child(2)`) used to click the language dropdown on the general\
  \ settings page.\r\n\r\nCI link: https://github.com/calcom/cal.com/actions/runs/22797255454/job/66133803675?pr=28305\r\
  \n\r\n<img width=\"1201\" height=\"586\" alt=\"Screenshot 2026-03-07 at 7 10 01\u202F\
  PM\" src=\"https://github.com/user-attachments/assets/057693e0-702a-4e17-a5d4-a0a0f7ce11e0\"\
  \ />\r\n\r\nThe root cause is that react-select's internal Input wrapper element\
  \ (`<div data-value=\"\" class=\"text-emphasis ...\">`) overlaps the `singleValue`\
  \ display and intercepts pointer events, causing a `TimeoutError`. This is a race\
  \ condition dependent on render timing and CI machine load.\r\n\r\n**Changes:**\r\
  \n- Add `data-testid=\"locale-select\"` to the language `<Select>` in `general-view.tsx`\r\
  \n- Replace fragile CSS selectors with `getByTestId(\"locale-select\")` in both\
  \ failing tests\r\n- Replace `text=Portugu\xEAs (Brasil)` text selector with `getByTestId(\"\
  select-option-pt-BR\")` for consistency\r\n\r\n> Note: Import reordering in `general-view.tsx`\
  \ is auto-formatting by biome, not a functional change.\r\n\r\n## Mandatory Tasks\
  \ (DO NOT REMOVE)\r\n\r\n- [x] I have self-reviewed the code (A decent size PR without\
  \ self-review might be rejected).\r\n- [x] I have updated the developer docs in\
  \ /docs if this PR makes changes that would require a [documentation change](https://cal.com/docs).\
  \ N/A\r\n- [x] I confirm automated tests are in place that prove my fix is effective\
  \ or that my feature works.\r\n\r\n## How should this be tested?\r\n\r\n1. Add the\
  \ `ready-for-e2e` label to trigger E2E tests in CI\r\n2. Verify the `locale.e2e.ts`\
  \ tests pass, specifically:\r\n   - `authorized user sees changed translations (de->ar)\
  \ \u203A should return correct translations and html attributes`\r\n   - `authorized\
  \ user sees changed translations (de->pt-BR) [locale1] \u203A should return correct\
  \ translations and html attributes`\r\n3. These tests previously failed intermittently\
  \ \u2014 they should now be stable since `getByTestId` clicks the `<span>` wrapper\
  \ around the entire react-select control, avoiding the internal element overlap\
  \ issue.\r\n\r\n### Reviewer note\r\n\r\nThe `data-testid=\"locale-select\"` prop\
  \ is consumed by the `ControlComponent` in `packages/ui/components/form/select/components.tsx`\
  \ (line 94), which places it on a `<span>` wrapping the react-select control. Please\
  \ verify that clicking this `<span>` reliably opens the dropdown \u2014 this was\
  \ not E2E tested locally.\r\n\r\n## Checklist\r\n\r\n- [x] My code follows the style\
  \ guidelines of this project\r\n- [x] I have checked that my changes generate no\
  \ new warnings\r\n- [x] My PR is small and focused (<10 lines changed, 2 files)\r\
  \n\r\n---\r\n\r\nLink to Devin Session: https://app.devin.ai/sessions/7e19e154b3ba4886ae5aa72c2dca48e5\
  \  \r\nRequested by: @romitg2"
