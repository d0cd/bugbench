pr_title: 'fix: remove TeamsCTA from teams loading skeleton'
pr_body: "\r\nci failure 1: https://github.com/calcom/cal.com/actions/runs/22792132011/job/66121206332?pr=28319#step:12:108\r\
  \nci failure 2:https://github.com/calcom/cal.com/actions/runs/22801759841/job/66144602635?pr=28320#step:12:110\r\
  \n<img width=\"880\" height=\"166\" alt=\"Screenshot 2026-03-07 at 2 04 45\u202F\
  PM\" src=\"https://github.com/user-attachments/assets/a970d223-c7ce-40dc-a36e-1997493adcd7\"\
  \ />\r\n\r\n\r\n### problem: \r\n-  The E2E test failed because two elements with\
  \ data-testid=\"new-team-btn\" existed in the DOM simultaneously.\r\n- The first\
  \ button came from skeleton.tsx, which renders <TeamsCTA /> while the page is loading.\
  \ The second button came from page.tsx (via server-page.tsx), which also renders\
  \ <TeamsCTA /> when the actual content loads. During the transition from skeleton\
  \ to real page, both buttons briefly coexisted in the DOM, causing Playwright's\
  \ strict mode to fail when trying to click a single element.\r\n\r\n\r\n- also as\
  \ all users don't have team plan, having TeamsCTA in skeleton also allows users\
  \ to bypass upgrade banner, so only show this +new team button for users with team\
  \ plan (don't show during skeleton)\r\n\r\n### solution: \r\nRemove the CTA from\
  \ the skeleton so only the actual page renders the button for only users with team\
  \ plan otherwise we'll show upgrade banner. \r\n"
pr_commit_messages:
- 'fix: resolve duplicate new-team-btn selector in teams E2E test'
- 'fix: assert single new-team-btn element instead of using .first()'
- 'fix: revert test changes, only remove CTA from skeleton'
