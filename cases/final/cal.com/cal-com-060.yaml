description: Teams created from the Settings page were incorrectly treated as onboarding
  flows because the useCreateTeam hook always assumed onboarding context. This caused
  wrong redirects and flow handling for /settings/teams/new. The fix adds an isOnboarding
  parameter (defaulting to true for backward compat) and passes false from all Settings
  team-creation views.
expected_findings:
- file: apps/web/modules/onboarding/hooks/useCreateTeam.ts
  line: 1
  summary: "useCreateTeam hook lacks an isOnboarding parameter \u2014 it always treats\
    \ team creation as an onboarding flow, causing incorrect redirects when called\
    \ from Settings views"
- file: apps/web/modules/settings/teams/new/create-new-team-view.tsx
  line: 1
  summary: 'Settings team-creation view calls useCreateTeam without passing isOnboarding:
    false, so the team is incorrectly handled as an onboarding flow'
