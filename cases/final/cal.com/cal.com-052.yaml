pr_title: 'fix: correct bookingUrl for EU instance in API responses'
pr_body: "## What does this PR do?\r\n\r\nFixes incorrect `bookingUrl` field returned\
  \ by `api.cal.eu/v2/event-types` for non-organization users.\r\n\r\n### Problem\r\
  \n- EU API returns `https://cal.com/user/event` instead of `https://app.cal.eu/user/event`\r\
  \n- `cal.eu` redirects to marketing page, not booking pages\r\n- Bookings are served\
  \ from `app.cal.eu`\r\n\r\n### Solution\r\nUpdated [getOrgFullOrigin()](cci:1://file:///Users/dhairyashilshinde/work/cal.com/packages/features/ee/organizations/lib/orgDomains.ts:146:0-160:1)\
  \ to detect when `WEBSITE_URL` and `WEBAPP_URL` are on different root domains. When\
  \ they differ (EU case), use `WEBAPP_URL` instead.\r\n\r\n| Deployment | WEBAPP_URL\
  \ | WEBSITE_URL | Result |\r\n|------------|------------|-------------|--------|\r\
  \n| US | `app.cal.com` | [cal.com](cci:7://file:///Users/dhairyashilshinde/work/cal.com:0:0-0:0)\
  \ | `cal.com/user/event` \u2705 |\r\n| EU | `app.cal.eu` | [cal.com](cci:7://file:///Users/dhairyashilshinde/work/cal.com:0:0-0:0)\
  \ | `app.cal.eu/user/event` \u2705 |\r\n\r\n### Changes\r\n- [packages/features/ee/organizations/lib/orgDomains.ts](cci:7://file:///Users/dhairyashilshinde/work/cal.com/packages/features/ee/organizations/lib/orgDomains.ts:0:0-0:0)\
  \ - Updated [getOrgFullOrigin()](cci:1://file:///Users/dhairyashilshinde/work/cal.com/packages/features/ee/organizations/lib/orgDomains.ts:146:0-160:1)\
  \ logic\r\n- [packages/features/ee/organizations/lib/orgDomains.test.ts](cci:7://file:///Users/dhairyashilshinde/work/cal.com/packages/features/ee/organizations/lib/orgDomains.test.ts:0:0-0:0)\
  \ - Added EU test case\r\n\r\n## Type of change\r\n- [x] Bug fix (non-breaking change\
  \ which fixes an issue)\r\n\r\n## How should this be tested?\r\n1. Run `yarn test\
  \ packages/features/ee/organizations/lib/orgDomains.test.ts` - all 10 tests pass\r\
  \n2. After deployment to EU, verify `GET api.cal.eu/v2/event-types` returns correct\
  \ `bookingUrl`"
