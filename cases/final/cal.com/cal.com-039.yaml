pr_title: 'fix: reduce forcedSlowMode rate limit from 30s to 1s'
pr_body: '## What does this PR do?


  Reduces the rate limit on Team and Organization DELETE endpoints in API v2 from
  1 request per 30 seconds to 1 request per 1 second (30x increase in allowed frequency).
  This is a follow-up to #27258 which initially added rate limiting to these endpoints.


  **Changes:**

  - API v2 DELETE endpoint throttle decorators: Changed `ttl` and `blockDuration`
  from `30000` to `1000` (milliseconds)


  **Endpoints affected:**

  - `DELETE /v2/teams/:teamId`

  - `DELETE /v2/organizations/:orgId/teams/:teamId`

  - `DELETE /v2/organizations/:orgId/organizations/:managedOrganizationId`


  ### Updates since last revision


  - Reverted changes to `packages/lib/rateLimit.ts` per reviewer request - only API
  v2 controller throttle decorators are modified


  ## Mandatory Tasks (DO NOT REMOVE)


  - [x] I have self-reviewed the code (A decent size PR without self-review might
  be rejected).

  - [x] I have updated the developer docs in /docs if this PR makes changes that would
  require a [documentation change](https://cal.com/docs). N/A - configuration change
  only.

  - [x] I confirm automated tests are in place that prove my fix is effective or that
  my feature works. Existing test infrastructure from #27258 covers these endpoints.


  ## How should this be tested?


  1. Make a DELETE request to any of the affected endpoints

  2. Immediately make another DELETE request to the same endpoint

  3. The second request should be rate limited with a 429 response

  4. Wait 1 second and try again - should succeed


  ## Human Review Checklist


  - [ ] Verify the rate limit values (1 req/1s with 1s block duration) are appropriate
  for DELETE operations

  - [ ] Note: `packages/lib/rateLimit.ts` still has `forcedSlowMode` with `duration:
  "30s"` - confirm this is intentional (API v2 throttle decorators are separate from
  the general rate limiter)


  ---


