pr_title: 'fix: update docker-compose volume mount for PostgreSQL 18+ compatibility'
pr_body: "## What does this PR do?\r\n\r\nUpdates the volume mount path in `packages/prisma/docker-compose.yml`\
  \ from `/var/lib/postgresql/data` to `/var/lib/postgresql` to fix compatibility\
  \ with PostgreSQL 18+.\r\n\r\nPG 18 changed its data directory layout to use `/var/lib/postgresql/18/main`\
  \ instead of `/var/lib/postgresql/data` (see [docker-library/postgres#1259](https://github.com/docker-library/postgres/pull/1259)).\
  \ The old mount path causes the container to fail the healthcheck and `yarn dx`\
  \ to error out.\r\n\r\n- Fixes #28281\r\n\r\n## Visual Demo (For contributors especially)\r\
  \n\r\n**Before (container crash loop):**\r\n```\r\n@calcom/prisma:db-up: \u2718\
  \ Container prisma-postgres-1 Error dependency postgres failed to start\r\n@calcom/prisma:db-up:\
  \ dependency failed to start: container prisma-postgres-1 is unhealthy\r\n```\r\n\
  \r\n**After (healthy container):**\r\n```\r\n$ docker ps --filter \"name=prisma\"\
  \r\nNAMES               STATUS                    PORTS\r\nprisma-postgres-1   Up\
  \ 35 seconds (healthy)   0.0.0.0:5450->5432/tcp\r\n```\r\n\r\n## Mandatory Tasks\
  \ (DO NOT REMOVE)\r\n\r\n- [x] I have self-reviewed the code (A decent size PR without\
  \ self-review might be rejected).\r\n- [x] I have updated the developer docs in\
  \ /docs if this PR makes changes that would require a [documentation change](https://cal.com/docs).\
  \ N/A \u2014 one-line config fix, no docs needed.\r\n- [x] I confirm automated tests\
  \ are in place that prove my fix is effective or that my feature works. N/A \u2014\
  \ docker-compose config change, verified manually by running `yarn dx`.\r\n\r\n\
  ## How should this be tested?\r\n\r\n1. Run `docker compose -f packages/prisma/docker-compose.yml\
  \ down -v` to clear any existing volumes\r\n2. Run `yarn dx`\r\n3. Confirm the postgres\
  \ container starts healthy: `docker ps --filter \"name=prisma\"` should show status\
  \ as `healthy`\r\n\r\nNo environment variables or test data needed \u2014 this only\
  \ affects the local dev database setup.\r\n\r\n**Note:** Existing users with volumes\
  \ from older PG versions will need to run `docker compose down -v` once to clear\
  \ the incompatible volume. This is a local dev database so no data is lost \u2014\
  \ `yarn dx` re-seeds everything.\r\n"
