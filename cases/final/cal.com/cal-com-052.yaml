    collide across tests sharing the same database, causing unique constraint failures
    when cleanup is incomplete or event type IDs overlap
- file: apps/api/v2/src/modules/slots/slots-2024-09-04/controllers/e2e/user-event-type-slots.controller.e2e-spec.ts
