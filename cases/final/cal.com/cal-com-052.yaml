description: E2E tests for API v2 slots controllers used deterministic booking UIDs
  derived from event type IDs (e.g. `booking-uid-${seatedEventTypeId}`), causing unique
  constraint violations when tests shared a database shard or when earlier tests failed
  before cleanup. The fix replaces all hardcoded UIDs with `randomString()` to eliminate
  collisions regardless of test ordering or parallelism.
