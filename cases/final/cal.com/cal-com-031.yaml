description: Test files under Foundation-owned directories (e.g. packages/features/bookings/lib/)
  incorrectly required Foundation team approval due to broad CODEOWNERS glob patterns
  matching test files. The fix adds override patterns at the end of CODEOWNERS (later
  rules take precedence) with no owners assigned for **/*.spec.*, **/*.e2e.*, **/*.test.*,
  and **/*.integration-test.* to clear ownership from test files.
expected_findings:
- file: .github/CODEOWNERS
  line: 37
  summary: Overly broad ownership patterns (e.g. `packages/features/bookings/lib/**/*`)
    match test files, causing unnecessary Foundation approval requirements for test-only
    PRs. Add empty-owner override patterns for test file globs at the end of the file.
