description: The Zoho CRM token expiry calculation added 60*60 (3600) to Date.now(),
  which returns epoch milliseconds. This resulted in tokens expiring after ~3.6 seconds
  instead of 1 hour, causing excessive token refresh API calls to Zoho servers. The
  fix multiplies by 1000 to correctly represent one hour in milliseconds.
expected_findings:
- file: packages/app-store/zohocrm/lib/CrmService.ts
  line: 236
  summary: 'Unit mismatch: Date.now() returns milliseconds but 60*60 is seconds. Should
    be 60*60*1000 to add one hour in milliseconds. Current code expires token after
    ~3.6 seconds.'
