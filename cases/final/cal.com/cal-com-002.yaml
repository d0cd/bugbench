description: The CI 'Setup Database' job used third-party GitHub Actions (tj-actions/pg-dump
  and tj-actions/pg-restore) that rely on the host runner's pg_dump/psql binaries
  (v16 on Ubuntu 24.04). After upgrading the Postgres service container to v18, these
  client tools refused to operate due to a version mismatch. The fix replaces the
  third-party actions with direct `docker run postgres:18` commands so the client
  tools always match the server version.
expected_findings:
- file: .github/actions/cache-db/action.yml
  line: 32
  summary: "Version mismatch: tj-actions/pg-dump@v2.3 uses the host runner's pg_dump\
    \ (v16), which is incompatible with the Postgres 18 service container \u2014 should\
    \ use a matching client version"
- file: .github/actions/cache-db/action.yml
