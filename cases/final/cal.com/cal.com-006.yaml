pr_body: "## What does this PR do?\r\n\r\nFixes flaky locale E2E test failures where\
  \ `getByTestId('locale-select')` resolved to 2 elements in Playwright strict mode.\r\
  \n\r\nci link 1: https://github.com/calcom/cal.com/actions/runs/22842158041/job/66250594998?pr=28340#step:12:113\r\
  \nci link 2: https://github.com/calcom/cal.com/actions/runs/22851659166/job/66281710111?pr=28305#step:12:125\r\
  \n<img width=\"994\" height=\"301\" alt=\"Screenshot 2026-03-09 at 1 34 09\u202F\
  PM\" src=\"https://github.com/user-attachments/assets/a8f69925-738e-4a12-95f0-3f5b2a08800c\"\
  \ />\r\n\r\n\r\nThe `de->ar` and `de->pt-BR` locale change tests were failing because\
  \ they used `waitForLoadState(\"domcontentloaded\")`, which fires before React hydration\
  \ completes. During Next.js App Router streaming, the server-rendered `locale-select`\
  \ element can briefly coexist with its hydrated counterpart in the DOM, causing\
  \ Playwright's strict mode to reject the ambiguous locator.\r\n\r\nSwitching to\
  \ `waitForLoadState(\"networkidle\")` ensures all JS has loaded and React hydration\
  \ has settled before the test interacts with the select element.\r\n\r\n## How should\
  \ this be tested?\r\n\r\n- Run the locale E2E tests: `PLAYWRIGHT_HEADLESS=1 yarn\
  \ e2e locale.e2e.ts`\r\n- The `de->ar` and `de->pt-BR` test cases (lines ~394 and\
  \ ~455) should pass consistently without \"resolved to 2 elements\" errors.\r\n\r\
