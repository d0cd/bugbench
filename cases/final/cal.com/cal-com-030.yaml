description: The icon migration from `<Icon>` to `@coss/ui/icons` changed the default
  icon size from 16px to 24px (lucide-react's default), causing icons to render 50%
  larger than intended. Additionally, conflicting `self-end sm:self-baseline` CSS
  classes on the Download button overrode the parent's `items-center` alignment, causing
  vertical misalignment. Fixed by defaulting `size=16` in the `createIcon` wrapper
  and removing the conflicting alignment classes.
