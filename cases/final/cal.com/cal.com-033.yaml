pr_title: 'fix: return 400 instead of 500 for invalid email in iCal generation'
pr_body: "## What does this PR do?\r\n\r\nFixes a 500 error that occurs when rescheduling\
  \ phone-only bookings.\r\n\r\n**Request path:**\r\n```\r\nPOST /api/book/event\r\
  \n  \u2192 RegularBookingService.rescheduleBooking()\r\n    \u2192 handleSeats (for\
  \ seated bookings)\r\n      \u2192 combineTwoSeatedBookings() / moveSeatedBookingToNewTimeSlot()\r\
  \n        \u2192 sendRescheduledEmailsAndSMS()\r\n          \u2192 AttendeeRescheduledEmail.getNodeMailerPayload()\r\
  \n            \u2192 generateIcsFile()\r\n              \u2192 generateIcsString()\r\
  \n                \u2192 ics.createEvent() \u2192 Yup ValidationError (500)\r\n\
  ```\r\n\r\nThe `ics` library throws a Yup ValidationError when an attendee has a\
  \ phone number instead of an email. Since Yup ValidationError is not an `Error`\
  \ instance, it falls through error handling to a generic 500.\r\n\r\n**Fix:** Catch\
  \ the ValidationError at the source (`generateIcsString.ts`) and convert it to `ErrorWithCode.BadRequest`,\
  \ returning a proper 400 status code.\r\n\r\n## Mandatory Tasks (DO NOT REMOVE)\r\
  \n\r\n- [x] I have self-reviewed the code (A decent size PR without self-review\
  \ might be rejected).\r\n- [x] I have updated the developer docs in /docs if this\
  \ PR makes changes that would require a [documentation change](https://cal.com/docs).\
  \ N/A\r\n- [x] I confirm automated tests are in place that prove my fix is effective\
  \ or that my feature works.\r\n"
