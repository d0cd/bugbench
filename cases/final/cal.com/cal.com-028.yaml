pr_body: '## What does this PR do?


  Updates the "Learn More" button link on the teams page (`/teams`) to point to the
  marketing site (`cal.com/teams`) instead of the video link (`go.cal.com/teams-video`).


  This change redirects users to the marketing page for teams information rather than
  a video.


