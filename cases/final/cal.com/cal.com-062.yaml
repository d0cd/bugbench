pr_title: 'fix: move i18n to a dev dependency in atoms package.json'
pr_body: "## What does this PR do?\r\n\r\nwhen a user tries to install the latest\
  \ version of atoms `2.3.6` they end up with the following error\r\n```\r\nERR_PNPM_WORKSPACE_PKG_NOT_FOUND\
  \ In : \"@calcom/i18n@workspace:*\" is in the dependencies but no package named\
  \ \"@calcom/i18n\" is present in the workspace\r\n\r\nThis error happened while\
  \ installing the dependencies of @calcom/atoms@2.3.6\r\n```\r\nthe reason for this\
  \ is because when this gets published to npm, the `workspace:*` protocol in dev\
  \ dependency is supposed to be resolved by the package manager (Yarn/pnpm) to an\
  \ actual version number. But since `@calcom/i18n` is an internal-only package \u2014\
  \ it's never published to npm. So there's no valid version to resolve it to, and\
  \ it ends up in the published package.json as the raw `workspace:*` string. When\
  \ an external customer installs `@calcom/atoms@2.3.6`, pnpm sees `@calcom/i18n@workspace:*`\
  \ and tries to find it in their workspace \u2014 which doesn't exist\r\n\r\nthe\
  \ fix here is to move `@calcom/i18n` from dependencies to devDependencies. It's\
  \ only needed at build time to resolve the JSON imports and types \u2014 the actual\
  \ translation data is already bundled into the output. It should never be a runtime\
  \ dependency for external consumers."
