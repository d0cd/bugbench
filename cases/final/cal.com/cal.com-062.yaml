description: The internal workspace package `@calcom/i18n` was listed as a regular
  dependency in the published `@calcom/atoms` package.json. Since `@calcom/i18n` is
  never published to npm, the unresolved `workspace:*` protocol string causes installation
  failures for all external consumers. The fix moves it to devDependencies where workspace
  protocols are stripped at publish time.
