pr_title: 'fix: clic app icon is not showing'
pr_body: '## What does this PR do?


  Fixes the Clic app icon not showing in the app store by adding the missing `icon.svg`
  and reorganizing screenshot files to follow the expected static folder structure.


  - Fixes #27009


  ## Summary of Changes


  - **Bug Fix**: Added `packages/app-store/clic/static/icon.svg` - the icon was missing,
  causing it not to display in the store

  - **File Reorganization**: Moved and renamed screenshot files from root (`preview*.png`)
  to `static/` folder (`1.jpg`-`4.jpg`) to match the expected app store structure

  - **Config Update**: Updated `DESCRIPTION.md` to reference the new file names


  ## Mandatory Tasks (DO NOT REMOVE)


  - [x] I have self-reviewed the code (A decent size PR without self-review might
  be rejected).

  - [x] I have updated the developer docs in /docs if this PR makes changes that would
  require a [documentation change](https://cal.com/docs). N/A - no docs changes needed.

  - [x] I confirm automated tests are in place that prove my fix is effective or that
  my feature works. N/A - visual/asset change, CI passes.


  ## How should this be tested?


  1. Navigate to the Cal.com app store

  2. Find the Clic app integration

  3. Verify the app icon is now visible on the card

  4. Click into the app details and verify the 4 preview screenshots display correctly


  ## Human Review Checklist


  - [ ] Verify the Clic app icon displays correctly in the app store listing

  - [ ] Verify all 4 preview screenshots load correctly on the app detail page (files
  were renamed and moved to `static/` folder)

  - [ ] Confirm the SVG icon renders properly at different sizes


