description: The cache-db-key GitHub Action computed a hash for database cache invalidation
  using only Prisma schema, migrations, and packages/prisma/*.ts files, but omitted
  the seed scripts (scripts/seed*.ts). When seed scripts changed, the cache key remained
  the same, causing CI to restore a stale seeded database. The fix adds scripts/seed*.ts
  to the hashFiles() input so seed data changes properly invalidate the cache.
