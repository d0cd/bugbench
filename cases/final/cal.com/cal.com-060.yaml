pr_title: 'feat(companion): add Daily.co video deep linking support'
pr_body: '## What does this PR do?


  Adds native video call support to the Cal.com companion app by integrating the Daily.co
  React Native SDK and configuring deep linking for `app.cal.com/video/*` URLs.


  When users tap a Cal.com video link on their mobile device, the app will now open
  natively and join the video call using the Daily SDK instead of opening in a web
  browser.


  **Changes:**

  - Added `@daily-co/react-native-daily-js` SDK and required dependencies

  - Configured iOS/Android permissions for camera, microphone, and background audio

  - Set up deep linking via iOS Associated Domains and Android Intent Filters

  - Created new video call screen at `app/video/[bookingUid].tsx` that fetches the
  booking to get the Daily meeting URL and joins the call

  - Added utility functions for video URL handling in `deep-links.ts`


  ## Updates since last revision


  - Moved URL validation logic outside try/catch block entirely to satisfy React Compiler
  requirements (the compiler doesn''t support any logical expressions inside try/catch)

  - Fixed URL validation bug: Cal.com video URLs were incorrectly checking for `/video/`
  in the hostname instead of the pathname

  - Added strict hostname matching to prevent domain spoofing (e.g., `cal.com.evil.com`
  is now rejected)

  - **Fixed NativeEventEmitter crash**: The Daily SDK was crashing the app on startup
  because it tries to initialize native modules at import time. Now uses dynamic imports
  (`await import()`) to defer SDK loading until the video screen is actually rendered.
  Added fallback UI with "Open in Browser" button for environments where native modules
  aren''t available (Expo Go, web).

  - **Fixed React Compiler build error**: The `"use no memo"` directive alone wasn''t
  sufficient to exclude the file from React Compiler. Added a `sources` filter in
  `babel.config.js` to explicitly exclude `app/video/[bookingUid].tsx` from compilation
  since dynamic `import()` expressions are not yet supported by the compiler.


  ## Mandatory Tasks (DO NOT REMOVE)


  - [x] I have self-reviewed the code (A decent size PR without self-review might
  be rejected).

  - [x] I have updated the developer docs in /docs if this PR makes changes that would
  require a [documentation change](https://cal.com/docs). N/A - no docs changes needed.

  - [ ] I confirm automated tests are in place that prove my fix is effective or that
  my feature works.


  ## How should this be tested?


  1. Build the companion app for iOS or Android (requires a **development build**,
  not Expo Go)

  2. Open a Cal.com video URL (e.g., `https://app.cal.com/video/{bookingUid}`) on
  the device

  3. Verify the app opens and attempts to join the video call

  4. Test camera/microphone toggle controls

  5. Test leaving the call

  6. Test in Expo Go to verify the fallback UI appears with "Open in Browser" button


  **Important notes:**

  - Deep linking requires the app to be installed on a real device or emulator

  - iOS Universal Links require the `apple-app-site-association` file to be hosted
  on `app.cal.com/.well-known/`

  - The booking must have a valid Daily meeting URL in the `meetingUrl` or `location`
  field

  - Video calls will NOT work in Expo Go - a development build with native modules
  is required


  ## Checklist for reviewers


  - [ ] Verify the booking API returns the Daily meeting URL correctly in `meetingUrl`
  or `location` field

  - [ ] Verify deep link configuration is correct for production

  - [ ] Test on actual iOS and Android devices with a development build

  - [ ] Review the dynamic import pattern in `loadDailySDK()` - this defers SDK loading
  to prevent startup crashes

  - [ ] Note: `app.cal.com` is hardcoded in `deep-links.ts` and video screen URL validation
  - self-hosted instances will need adjustment

  - [ ] Review the ~600 line video call screen for edge cases (error handling, participant
  state management)

  - [ ] Consider if unit tests should be added for the video URL utility functions


