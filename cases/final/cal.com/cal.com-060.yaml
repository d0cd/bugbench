description: Permissive hostname validation using `hostname.includes('cal.com')` allows
  domain spoofing attacks where an attacker-controlled domain like `cal.com.evil.com`
  passes the check. The fix replaces `.includes()` with strict exact-match or `.endsWith('.')`
  checks for both Cal.com and Daily.co domains.
