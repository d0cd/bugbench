description: 22 app-store _metadata.ts files imported package.json via `import _package
  from "./package.json"` to read the description field. In Vitest's module runner,
  JSON imports trigger RPC-based module fetches that cause unhandled rejection errors
  when test workers shut down before fetches resolve. The fix inlines the description
  string literals directly, removing the problematic JSON imports.
expected_findings:
- file: packages/app-store/jitsivideo/_metadata.ts
  line: 3
  summary: JSON import `import _package from "./package.json"` triggers Vitest RPC-based
    module fetch that causes unhandled rejection errors on worker shutdown; inline
    the description string instead
- file: packages/app-store/googlecalendar/_metadata.ts
  line: 3
  summary: JSON import from package.json causes Vitest RPC fetch errors during test
    teardown; description should be inlined as a string literal
- file: packages/app-store/stripepayment/_metadata.ts
  line: 3
  summary: JSON import from package.json causes Vitest RPC fetch errors during test
    teardown; description should be inlined as a string literal
