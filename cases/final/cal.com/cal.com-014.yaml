pr_title: 'fix: await unawaited calendar.events.patch call in updateEvent'
pr_body: '## What does this PR do?


  Fixes an unhandled promise rejection in the Google Calendar service that could crash
  the API when hitting Google Calendar quota limits.


  In the `updateEvent` method, the `calendar.events.patch` call (used to update the
  event description with the hangout link) was not awaited. This meant if the patch
  request failed (e.g., due to quota exceeded errors), the promise rejection would
  occur after the function returned, bypassing the try/catch block and causing an
  unhandled rejection.


  **Error that was occurring:**

  ```

  unhandledRejection: Quota exceeded for quota metric ''Queries'' and limit ''Queries
  per minute'' of service ''calendar-json.googleapis.com''

  ```


  ## Mandatory Tasks (DO NOT REMOVE)


  - [x] I have self-reviewed the code (A decent size PR without self-review might
  be rejected).

  - [x] I have updated the developer docs in /docs if this PR makes changes that would
  require a documentation change. N/A - no documentation changes needed.

  - [x] I confirm automated tests are in place that prove my fix is effective or that
  my feature works. N/A - existing error handling tests cover this; the fix ensures
  errors are now caught by the existing try/catch.


  ## How should this be tested?


  1. The fix ensures that any errors from the `calendar.events.patch` call are now
  properly caught by the surrounding try/catch block

  2. To reproduce the original issue, you would need to hit Google Calendar API quota
  limits during an event update with a Google Meet link

  3. With this fix, quota errors will be caught and logged rather than causing an
  unhandled rejection


  ## Human Review Checklist


  - [x] Verify the existing try/catch block (line 434-440) will properly catch errors
  from the now-awaited patch call

  - [ ] Consider if waiting for the patch has any unintended side effects (it shouldn''t
  - this is the correct behavior)


