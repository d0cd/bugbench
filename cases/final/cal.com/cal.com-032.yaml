pr_title: 'fix: ensure metadata key is always present in BOOKING_CREATED webhook payload'
pr_body: '## What does this PR do?


  Fixes a bug where the `metadata` key was completely missing from BOOKING_CREATED
  webhook payloads for bookings that require confirmation.


  **Root cause:** In `handleConfirmation.ts`, when there''s no video call URL, `metadata`
  was set to `undefined`, which causes the key to be omitted from JSON serialization
  entirely.


  **Fix:** Change `undefined` to `{}` so the `metadata` key is always present (as
  an empty object when there''s no video call URL).


  This aligns with the behavior in `RegularBookingService.ts` which always includes
  the metadata key.


  ## Mandatory Tasks (DO NOT REMOVE)


  - [x] I have self-reviewed the code (A decent size PR without self-review might
  be rejected).

  - [x] I have updated the developer docs in /docs if this PR makes changes that would
  require a documentation change. N/A - no documentation changes needed.

  - [ ] I confirm automated tests are in place that prove my fix is effective or that
  my feature works.


  ## How should this be tested?


  1. Create an event type with `requiresConfirmation: true`

  2. Create a booking for this event type (preferably via Platform/OAuth client)

  3. Set up a webhook subscriber for BOOKING_CREATED

  4. Confirm the booking

  5. Verify the webhook payload contains a `metadata` key (should be `{}` if no video
  call URL, or `{ videoCallUrl: "..." }` if present)


  **Before fix:** The `metadata` key is completely absent from the payload

  **After fix:** The `metadata` key is always present (at minimum as an empty object
  `{}`)


