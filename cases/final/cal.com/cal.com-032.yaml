description: In handleConfirmation.ts, the metadata field in the BOOKING_CREATED webhook
  payload was set to `undefined` when no video call URL existed. Since JSON.stringify
  omits keys with undefined values, downstream webhook consumers expecting a `metadata`
  key would fail or behave incorrectly. The fix changes the fallback from `undefined`
  to `{}` to ensure the key is always present.
