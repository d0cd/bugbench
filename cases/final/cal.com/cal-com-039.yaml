description: BookingDetailsSheet was missing attendee phone number display and showed
  raw IANA timezone identifiers (e.g. 'America/New_York') instead of localized human-readable
  names (e.g. 'Eastern Standard Time'). The fix adds conditional rendering of attendee.phoneNumber
  and replaces the raw timezone string with formatToLocalizedTimezone() to match the
  existing bookings-single-view.tsx behavior.
