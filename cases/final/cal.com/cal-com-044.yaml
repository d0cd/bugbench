description: The feedback dialog was positioned flush against the right edge of the
  viewport on desktop, causing it to overlap with the Intercom chat widget and potentially
  be obscured. The fix adjusts the dialog's right-side positioning to include an offset,
  preventing the overlap while keeping the dialog visible. The same offset was applied
  to the success state for consistency.
