description: "The `hasTeamLimits` / `teamHasLimits` check at line 422 of EventLimitsTab.tsx\
  \ incorrectly evaluates team booking limits for managed child event types. Managed\
  \ children have no direct team association\u2014only the parent event type does\u2014\
  so the badge indicating team-wide limits will never appear for these children, even\
  \ when `includeManagedEventsInLimits` is enabled on the parent's team. The fix needs\
  \ to traverse the parent relationship to check the parent's team limits instead."
expected_findings:
- file: apps/web/modules/event-types/components/tabs/limits/EventLimitsTab.tsx
  line: 404
  summary: The event limits tab had no logic to traverse the parent event type's team
    when checking for team booking limits, so managed child event types (which lack
    a direct team association) would never show the team-wide limits badge even when
    includeManagedEventsInLimits is enabled on the parent's team.
  line_side: pre_fix
- file: apps/web/modules/shell/Kbar.tsx
  line: 262
  summary: useRegisterActions(actions) called without a dependency array, so the registered
    kbar actions for event types never update when the underlying data changes (e.g.,
    after fetching new event types).
  line_side: pre_fix
- file: packages/features/eventtypes/components/tabs/limits/EventLimitsTab.tsx
  line: 422
  summary: "The hasTeamLimits/teamHasLimits check directly accesses the event type's\
    \ team association, but managed child event types have no direct team\u2014only\
    \ the parent does\u2014so the team limits badge never appears for managed children\
    \ even when includeManagedEventsInLimits is enabled on the parent's team"
  line_side: pre_fix
- file: packages/features/eventtypes/repositories/eventTypeRepository.ts
  line: 640
  summary: The EventLimitsTab query for parent event type's team did not include the
    team relation with bookingLimits and includeManagedEventsInLimits, so managed
    child event types could never see their parent's team booking limits
  line_side: pre_fix
- file: packages/features/watchlist/lib/repository/WatchlistRepository.ts
  line: 184
  summary: Watchlist detail query only fetches `bookingReports` but not `globalBookingReports`,
    so global-scoped booking reports are silently omitted from watchlist entry details
  line_side: pre_fix
- file: packages/features/webhooks/lib/service/BookingWebhookService.ts
  line: 364
  summary: No-show webhook task payload is double-serialized via `JSON.stringify()`
    before being passed to `tasker.create`, which already serializes its input, resulting
    in a malformed string payload
  line_side: pre_fix
- file: packages/features/webhooks/lib/repository/WebhookRepository.ts
  line: 277
  summary: 'The `findByOrgIdAndTrigger` query omits an `active: true` filter, causing
    inactive/disabled webhooks to be included in subscriber results and receive deliveries'
  line_side: pre_fix
