pr_body: "## What does this PR do?\r\n\r\nTeam limits are hidden in the team settings:\
  \ `/settings/teams/6/settings`\r\n\r\nIf team limits are enabled, show a badge inside\
  \ the the event type settings:\r\n\r\n#### Collective & Round Robin & Parent Managed\
  \ event type (if managed events are included)\r\n--> Clicking it opens a new tab\
  \ to `/settings/teams/6/settings`\r\n<img width=\"454\" height=\"114\" alt=\"Screenshot\
  \ 2026-01-22 at 1 26 45\u202FPM\" src=\"https://github.com/user-attachments/assets/7fac3ba4-1d5e-433d-bdf3-2a701f335120\"\
  \ />\r\n\r\nChildren Managed event types: \r\n--> Not clickable but tooltip\r\n\r\
  \n<img width=\"520\" height=\"127\" alt=\"Screenshot 2026-01-22 at 1 29 10\u202F\
  PM\" src=\"https://github.com/user-attachments/assets/b02038d5-b6c1-4031-83d3-7996ecd75279\"\
  \ />\r\n\r\n- Fixes PRI-329\r\n"
