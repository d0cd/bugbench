description: The companion Chrome extension's content script eagerly set iframe.src
  to the companion URL on every page load, triggering a network request to companion.cal.com
  even when the sidebar was never opened. The fix defers setting iframe.src until
  the user actually opens the sidebar, and guards the message event listener against
  the uninitialized iframe URL.
expected_findings:
- file: companion/extension/entrypoints/content.ts
  line: 38
  summary: 'Unnecessary eager load: iframe.src is set to COMPANION_URL at initialization
    time, causing a network request on every page visit even when the sidebar is never
    opened. Should defer setting src until the sidebar is actually shown.'
- file: companion/extension/entrypoints/content.ts
  line: 70
  summary: 'Missing guard: message event listener calls new URL(iframe.src) without
    checking if iframe has been loaded, which will throw when iframe.src is empty
    or about:blank.'
