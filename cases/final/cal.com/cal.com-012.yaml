  my feature works.


  ## How should this be tested?


  1. Enable a feature that shows the opt-in banner (e.g., a feature flag that triggers
  `FeatureOptInBannerWrapper`)

  2. Ensure the Intercom widget is also visible on the page

  3. Verify the banner appears correctly and doesn''t overlap/conflict with the Intercom
  widget

  4. Test banner interactions (dismiss button, opening the dialog)


