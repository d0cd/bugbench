pr_title: 'fix: use createPortal for FeatureOptInBanner to avoid Intercom widget conflict'
pr_body: '## What does this PR do?


  Renders the `FeatureOptInBanner` component using React''s `createPortal` to `document.body`
  instead of inline rendering. This prevents z-index/stacking context conflicts with
  the Intercom widget, which is also positioned at the bottom of the viewport.


  ## Updates since last revision


  Added SSR guard (`typeof document !== "undefined"`) before accessing `document.body`
  in `createPortal` to prevent crashes in SSR/test environments where `document` is
  undefined. This addresses the Cubic AI review feedback.


