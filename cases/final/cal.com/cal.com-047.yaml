pr_title: "fix: allow hyphens, dots, and underscores in Dialpad meeting URL vali\u2026"
pr_body: "\u2026dation\r\n\r\nThe Dialpad conferencing integration's URL regex only\
  \ accepted alphanumeric characters in the meeting room path ([a-zA-Z0-9]+), causing\
  \ valid personal meeting URLs containing hyphens, dots, or underscores to fail validation.\r\
  \n\r\nFor example, https://meetings.dialpad.com/user-name is rejected despite being\
  \ a valid Dialpad personal meeting link. The sample URL shown in the error message\
  \ (alphanumeric only) passes, but real-world room names commonly use hyphens and\
  \ other characters.\r\n\r\nUpdated the urlRegExp character class from [a-zA-Z0-9]\
  \ to [a-zA-Z0-9._-] to match all valid Dialpad meeting room slugs.\r\n\r\nFixes\
  \ issue introduced in #15444.\r\n\r\n## What does this PR do?\r\nFixes a bug in\
  \ the Dialpad conferencing integration where the URL \r\nvalidation regex rejects\
  \ valid personal meeting room URLs containing \r\nhyphens, dots, or underscores.\
  \ The urlRegExp character class in \r\nconfig.json was updated from [a-zA-Z0-9]\
  \ to [a-zA-Z0-9._-].\r\n\r\n## Visual Demo (For contributors especially)\r\n<img\
  \ width=\"722\" height=\"285\" alt=\"CleanShot 2026-03-03 at 17 27 00\" src=\"https://github.com/user-attachments/assets/5b52474f-3a00-4757-b927-e79a1f9e4020\"\
  \ />\r\n\r\n## Mandatory Tasks (DO NOT REMOVE)\r\n- [X] I have self-reviewed the\
  \ code (A decent size PR without self-review might be rejected).\r\n- [X] I have\
  \ updated the developer docs in /docs if this PR makes changes that would require\
  \ a [documentation change](https://cal.com/docs). If N/A, write N/A here and check\
  \ the checkbox.\r\n- [X] I confirm automated tests are in place that prove my fix\
  \ is effective or that my feature works.\r\n\r\n## How should this be tested?\r\n\
  1. Install the Dialpad app from the Cal.com App Store\r\n2. Add Dialpad as a location\
  \ to any event type\r\n3. Enter a meeting URL with a hyphen, e.g. https://meetings.dialpad.com/mmit-russ\r\
  \n4. Before fix: \"Invalid URL for dialpad\" error\r\n5. After fix: URL accepted\
