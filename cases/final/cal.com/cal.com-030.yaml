pr_title: 'fix: add type property to @ApiQuery decorators in slots controller'
pr_body: '## What does this PR do?


  Fixes missing query parameter types in the Swagger documentation for the `getAvailableSlots`
  endpoint. The `@ApiQuery` decorators were missing the `type` property, which resulted
  in empty `schema: {}` objects in the generated OpenAPI spec, causing query parameters
  to not display properly in the Swagger UI.


  Added `type: String` or `type: Number` to all 12 `@ApiQuery` decorators based on
  their expected data types:

  - `type: Number` for `duration` and `eventTypeId`

  - `type: String` for all other parameters (`timeZone`, `format`, `usernames`, `eventTypeSlug`,
  `username`, `teamSlug`, `organizationSlug`, `end`, `start`, `bookingUidToReschedule`)


  ## Mandatory Tasks (DO NOT REMOVE)


  - [x] I have self-reviewed the code (A decent size PR without self-review might
  be rejected).

  - [x] I have updated the developer docs in /docs if this PR makes changes that would
  require a documentation change. N/A - this fixes auto-generated API docs.

  - [x] I confirm automated tests are in place that prove my fix is effective or that
  my feature works. N/A - documentation metadata change only.


  ## How should this be tested?


  1. Regenerate the OpenAPI spec by running the API v2 app

  2. Check `docs/api-reference/v2/openapi.json` for the `/v2/slots` GET endpoint

  3. Verify that query parameters now have proper type schemas (e.g., `"schema": {
  "type": "string" }`) instead of empty `"schema": {}`

  4. Optionally, view the Swagger UI at `/docs` endpoint and confirm query parameters
  are displayed correctly


