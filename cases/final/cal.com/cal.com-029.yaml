  needed.

  - [x] I confirm automated tests are in place that prove my fix is effective or that
  my feature works. N/A - simple URL change, no logic to test.


  ## How should this be tested?


  1. Log in as a user without a team plan

  2. Navigate to `/routing` (routing forms page)

  3. Verify the "Learn more" button in the upgrade tip now links to `https://cal.com/routing`
  instead of the previous video link


