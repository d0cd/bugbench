description: Flaky e2e tests caused by non-unique booking UIDs derived solely from
  eventTypeId. Multiple test cases sharing the same eventTypeId would generate identical
  `booking-uid-${eventTypeId}` values, causing test interference when run in parallel
  or sequence. The fix makes each test's booking UID unique to prevent collisions.
