pr_title: 'fix: only record organizerUuid in audit when organizer actually changes'
pr_body: "## What does this PR do?\n\nThis PR fixes the reassignment audit logging\
  \ to only record `organizerUuid` when the organizer actually changes. Previously,\
  \ `organizerUuid` was always recorded with `{ old: ..., new: ... }` even when the\
  \ organizer didn't change (e.g., in fixed host scenarios where only the round-robin\
  \ attendee changes but the organizer remains the same).\n\nThe principle is: **we\
  \ shouldn't record a field in audit if it hasn't changed**.\n\n### Changes:\n- Made\
  \ `organizerUuid` optional in the `ReassignmentAuditActionService` schema\n- Updated\
  \ `roundRobinManualReassignment.ts` to only include `organizerUuid` when `hasOrganizerChanged`\
  \ is true\n- Updated `roundRobinReassignment.ts` with the same conditional logic\n\
  - Updated accessor methods (`getDisplayJson`, `getPreviousAndNewAssigneeUser`) to\
  \ handle optional `organizerUuid` with optional chaining\n- Updated tests to expect\
  \ `organizerUuid` to be undefined in fixed host scenarios\n\n### Updates since last\
  \ revision:\n- Removed unnecessary nullish coalescing (`?? null`) for organizer\
  \ uuids since `uuid` is a required string field on User in the Prisma schema\n\n\
  ## Mandatory Tasks (DO NOT REMOVE)\n\n- [x] I have self-reviewed the code (A decent\
  \ size PR without self-review might be rejected).\n- [x] I have updated the developer\
  \ docs in /docs if this PR makes changes that would require a [documentation change](https://cal.com/docs).\
  \ N/A - no documentation changes needed.\n- [x] I confirm automated tests are in\
  \ place that prove my fix is effective or that my feature works.\n\n## How should\
  \ this be tested?\n\n1. Run the unit tests: `TZ=UTC yarn test packages/features/ee/round-robin/roundRobinManualReassignment.test.ts\
  \ packages/features/ee/round-robin/roundRobinReassignment.test.ts packages/features/booking-audit/lib/actions/__tests__/ReassignmentAuditActionService.test.ts`\n\
  2. All 33 tests should pass\n\n### Manual verification:\n1. Trigger a manual round-robin\
  \ reassignment where the organizer changes \u2192 verify `organizerUuid` is recorded\
  \ in audit\n2. Trigger a reassignment with a fixed host (organizer stays the same,\
  \ only attendee changes) \u2192 verify `organizerUuid` is NOT recorded, only `hostAttendeeUpdated`\
  \ is recorded\n\n## Human Review Checklist\n\n- [ ] Verify downstream consumers\
  \ of `ReassignmentAuditDisplayData` can handle null values for `previousOrganizerUuid`\
  \ and `newOrganizerUuid` (they were already nullable in the type)\n- [ ] Verify\
  \ the `getPreviousAndNewAssigneeUser` logic correctly handles the case when `organizerUuid`\
  \ is undefined (falls back to null for host UUIDs)\n- [ ] Confirm the conditional\
  \ spread pattern `...(hasOrganizerChanged ? { organizerUuid: ... } : null)` correctly\
  \ omits the field when false\n\n## Checklist\n\n- [x] My code follows the style\
  \ guidelines of this project\n- [x] I have checked if my changes generate no new\
  \ warnings\n\n---\n\nLink to Devin run: https://app.devin.ai/sessions/4ccb270fee5143dba8a31ae76fa0756c\n\
  Requested by: @hariombalhara"
