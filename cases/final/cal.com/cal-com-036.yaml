description: The botid client-side protection in initBotId used an exact path '/api/book/event',
  which failed to match locale-prefixed URLs like '/en/api/book/event' or '/fr/api/book/event'.
  The fix changes the path pattern to '*/api/book/event' so the x-is-human challenge
  header is attached regardless of any path prefix.
