description: CODEOWNERS patterns were too broad, causing test files (*.spec.*, *.e2e.*,
  *.test.*, *.integration-test.*) under Foundation-owned directories to require Foundation
  team approval. The fix adds override patterns at the end of CODEOWNERS with no owners
  assigned, leveraging GitHub's last-match-wins precedence to clear ownership for
  test files.
