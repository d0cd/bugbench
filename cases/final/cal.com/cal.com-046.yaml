pr_title: 'fix: add "Use a different email" button to verify-email page'
pr_body: "Closes #28393\r\n\r\n## What does this PR do?\r\n\r\nAdds a \"Use a different\
  \ email\" button to the `/auth/verify-email` page. Previously, users who signed\
  \ up with a wrong email had no way to go back \u2014 the session cookie persisted\
  \ and kept redirecting them to the \"Check your email\" screen. The new button signs\
  \ the user out and navigates them back to `/signup`.\r\n\r\n- Fixes #28393\r\n\r\
  \n## Visual Demo (For contributors especially)\r\n\r\n#### Image Demo:\r\n<img width=\"\
  1091\" height=\"618\" alt=\"image\" src=\"https://github.com/user-attachments/assets/db7d01f1-88cc-464c-9f11-3ec066ed1462\"\
  \ />\r\n\r\n\r\n<!-- Attach your image here -->\r\n\r\n## Mandatory Tasks (DO NOT\
  \ REMOVE)\r\n\r\n- [x] I have self-reviewed the code (A decent size PR without self-review\
  \ might be rejected).\r\n- [x] I have updated the developer docs in /docs if this\
  \ PR makes changes that would require a [documentation change](https://cal.com/docs).\
  \ N/A\r\n- [x] I confirm automated tests are in place that prove my fix is effective\
  \ or that my feature works.\r\n\r\n## How should this be tested?\r\n\r\n1. Enable\
  \ the `email-verification` feature flag\r\n2. Go to `/signup` and sign up with an\
  \ email you don't have access to\r\n3. You'll be redirected to `/auth/verify-email`\r\
  \n4. Click the \"Use a different email\" button\r\n5. You should be signed out and\
  \ redirected to `/signup` where you can try again with the correct email\r\n\r\n\
  ## Checklist\r\n\r\n- [x] I have read the [contributing guide](https://github.com/calcom/cal.com/blob/main/CONTRIBUTING.md)\r\
  \n- [x] My code follows the style guidelines of this project\r\n- [x] I have checked\
  \ that my changes generate no new warnings\r\n- [x] My PR is small and focused (2\
  \ files, ~22 lines changed)"
