description: The companion Chrome extension's content script eagerly set iframe.src
  to the companion URL during initialization on every page load, causing an unnecessary
  network request to companion.cal.com on every page the user visits, even though
  the sidebar starts hidden. The fix defers setting iframe.src until the user actually
  opens the sidebar, and guards the message event listener against operating on an
  unloaded iframe.
expected_findings:
- file: companion/extension/entrypoints/content.ts
  line: 38
  summary: 'Unnecessary eager load: iframe.src is set to COMPANION_URL during page
    initialization even though the sidebar starts hidden, causing a network request
    on every page visit. Should defer setting src until the sidebar is actually opened.'
- file: companion/extension/entrypoints/content.ts
  line: 70
  summary: 'Missing guard: message event listener calls new URL(iframe.src) which
    will throw when iframe.src is an empty string or about:blank, needs an early return
    when iframe hasn''t been loaded yet.'
