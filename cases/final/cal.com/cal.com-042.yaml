  require a [documentation change](https://cal.com/docs). N/A - no documentation changes
  needed.

  - [x] I confirm automated tests are in place that prove my fix is effective or that
  my feature works. N/A - database index addition, no functional changes.


  ## How should this be tested?


  This is a database index addition. To verify:

  1. Run the migration: `yarn workspace @calcom/prisma db-migrate`

  2. Confirm the index exists: `\d "SecondaryEmail"` in psql should show `SecondaryEmail_email_emailVerified_idx`


