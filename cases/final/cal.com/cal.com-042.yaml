pr_title: 'fix: add composite index on SecondaryEmail for email verification queries'
pr_body: '## What does this PR do?


  Adds a composite index on `SecondaryEmail(email, emailVerified)` to optimize a slow
  query that was causing ~300ms latency and ~4% consistent CPU usage.


  The query in question checks if a booker''s email belongs to a verified user (used
  in `checkIfBookerEmailIsBlocked.ts`). It uses an OR with EXISTS subquery pattern
  that was performing table scans on SecondaryEmail due to the missing index on `emailVerified`.


  **Note:** The migration uses `IF NOT EXISTS` so the index can be added manually/concurrently
  in production to avoid table locking.


