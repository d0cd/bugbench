pr_body: "## What does this PR do?\r\nFixes #27050\r\nFixes responsive layout issues\
  \ on the Event Types page where the search bar and \"New\" button would overlap\
  \ with the page title at tablet viewport sizes (approx. 768px).\r\n\r\nChanges:\r\
  \nAdded flex-wrap and gap-4 to the header in ShellMainAppDir.tsx to allow safe wrapping\
  \ of elements.\r\nAdded min-w-0 and flex-1 to the title container to ensure text\
  \ truncates properly instead of overflowing.\r\nUpdated the Subtitle visibility:\
  \ it is now hidden on medium screens (md:hidden) and reappears on large screens\
  \ (lg:block) to provide necessary horizontal space for the search controls on tablets.\r\
  \n\r\n#### Video Demo (if applicable):\r\nLoom Link - https://www.loom.com/share/dec6ca75f0354bcb838f28fffbc04525\r\
  \n\r\nBefore: At 768px width, the Search input would render on top of the \"Event\
  \ Types\" title and description text. After: The layout now respects boundaries.\
  \ The subtitle is hidden to save space, and if the screen is too narrow, the search\
  \ bar wraps to the next line or the title truncates, ensuring no visual overlap.\r\
  \n\r\n## Mandatory Tasks (DO NOT REMOVE)\r\n I have self-reviewed the code (A decent\
  \ size PR without self-review might be rejected).\r\n N/A (Documentation changes\
  \ not required for this CSS fix).\r\n I confirm automated tests are in place that\
  \ prove my fix is effective or that my feature works. (Manual verification of responsive\
  \ layout; existing E2E tests ensure no regression in functionality).\r\n\r\n## How\
  \ should this be tested?\r\nLogin and navigate to the Event Types page (/event-types).\r\
  \nResize your browser window to approximately 768px width (or use DevTools Device\
  \ Mode -> iPad Mini/Tablet).\r\nVerify:\r\nThe Search bar and \"New\" button do\
  \ not overlap with the \"Event Types\" heading.\r\nThe subtitle text (\"Configure\
  \ different events...\") is hidden in this specific viewport range to save space.\r\
  \nThe Heading text partially truncates if space is extremely tight, rather than\
  \ bleeding under the buttons.\r\nResize window to Desktop (>1024px).\r\nVerify:\r\
  \nThe subtitle reappears.\r\nThe layout looks standard as before.\r\n\r\n## Checklist\r\
  \n My code follows the style guidelines of this project\r\n I have checked if my\
  \ changes generate no new warnings"
