pr_body: "### What does this PR do?\r\n\r\nFixes a broken command in the Local Development\
  \ documentation.\r\n\r\nThe guide previously instructed users to run cp apps/api/.env.example\
  \ apps/api/{version}/.env. However, the file apps/api/.env.example does not exist.\
  \ The  .env.example files are located within the specific version subdirectories\
  \ (v1 and v2).\r\n\r\nThis PR updates the command to copy from the correct source\
  \ path: cp apps/api/{version}/.env.example apps/api/{version}/.env\r\n\r\n### What\
  \ changed - \r\n\r\n**Before (Fails):**\r\n\r\ncp apps/api/.env.example apps/api/{version}/.env\r\
  \ncp: apps/api/.env.example: No such file or directory\r\n\r\n**After (Works):**\r\
  \n\r\ncp apps/api/{version}/.env.example apps/api/{version}/.env\r\n\r\n### Mandatory\
  \ Tasks (DO NOT REMOVE)\r\n\r\n-  I have self-reviewed the code (A decent size PR\
  \ without self-review might be rejected).\r\n-  N/A - This PR is a documentation\
  \ fix.\r\n-  N/A - Documentation fix only.\r\n\r\n### How should this be tested?\r\
  \n\r\n1. Open \r\n2. docs/developing/local-development.mdx.\r\n3. Verify the cp\
  \ command in the \"API\" section now points to a valid source file path.\r\n4. Try\
  \ running the command in your terminal (replacing {version} with v1 or v2) to confirm\
  \ it works.\r\n\r\n### Checklist"
