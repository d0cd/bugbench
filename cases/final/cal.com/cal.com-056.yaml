pr_body: "closes #28417 \r\n\r\nThe documentation referenced `getRedirectUrl` but\
  \ the actual component prop is `getScheduleUrl`, causing the callback to silently\
  \ not fire.\r\n\r\n## What does this PR do?\r\n\r\nFixes the `ListSchedules` atom\
  \ documentation to use the correct prop name `getScheduleUrl` instead of `getRedirectUrl`.\
  \ The implementation at [`packages/platform/atoms/list-schedules/wrappers/ListSchedulesPlatformWrapper.tsx`\
  \ ](https://github.com/calcom/cal.com/blob/main/packages/platform/atoms/list-schedules/wrappers/ListSchedulesPlatformWrapper.tsx)and\
  \ the example app both use `getScheduleUrl`, but the docs had `getRedirectUrl`,\
  \ a prop that doesn't exist on the component. This causes the redirect callback\
  \ to never fire, and schedule links fall back to `#`.\r\n\r\n- Fixes #28417 \r\n\
  \r\n## Mandatory Tasks (DO NOT REMOVE)\r\n\r\n- [x] I have self-reviewed the code\
  \ (A decent size PR without self-review might be rejected).\r\n- [x] I have updated\
  \ the developer docs in /docs if this PR makes changes that would require a documentation\
  \ change. This PR *is* the docs fix.\r\n- [x] I confirm automated tests are in place\
  \ that prove my fix is effective or that my feature works. N/A \u2014 docs-only\
  \ change.\r\n\r\n## How should this be tested?\r\n\r\n1. Use the `ListSchedules`\
  \ atom with `getScheduleUrl` prop as shown in the updated docs\r\n2. Confirm the\
  \ callback fires and schedule links navigate correctly\r\n3. Compare prop name against\
  \ the actual interface in [`ListSchedulesPlatformWrapper.tsx` (line [](18)](https://github.com/calcom/cal.com/blob/main/packages/platform/atoms/list-schedules/wrappers/ListSchedulesPlatformWrapper.tsx#L18))\r\
  \n\r\n## Checklist\r\n\r\n- [x] I have read the [contributing guide](https://github.com/calcom/cal.com/blob/main/CONTRIBUTING.md)\r\
  \n- [x] My code follows the style guidelines of this project\r\n- [x] I have checked\
  \ that my changes generate no new warnings"
