pr_title: 'fix: remove fastmail.com and proton.me from blocked relay domains'
pr_body: '## Summary


  Removes `fastmail.com` and `proton.me` from the blocked relay domains list because
  these are primary mailbox domains, not relay-only domains. Blocking these domains
  would incorrectly reject legitimate users.


  ## Problem


  The blocked relay domains list included:

  - `fastmail.com` - Fastmail''s primary email domain used by millions of legitimate
  users

  - `proton.me` - Proton Mail''s primary domain (the code even had a comment acknowledging
  this was problematic)


  These are not throwaway/relay-only domains. Blocking them creates false positives
  that prevent legitimate users from signing up.


  ## Solution


  - Removed `fastmail.com` from the blocked list. Fastmail''s masked emails use subdomain
  addressing (`user+alias@fastmail.com`) which cannot be reliably distinguished from
  regular addresses.

  - Removed `proton.me` from the blocked list. Proton''s alias service (SimpleLogin)
  domains are already blocked separately (`simplelogin.com`, `simplelogin.co`, `aleeas.com`,
  `slmail.me`).

  - Added explanatory comments to document why these domains should not be blocked.


  ## Testing


  - Manual verification that the blocked domains list no longer includes primary mailbox
  domains

  - Existing relay domains (DuckDuckGo, Firefox Relay, SimpleLogin, AnonAddy, etc.)
  remain blocked'
