description: BookingDetailsSheet flickered when switching bookings because selectedBookingUid
  updated before the new booking was available in the store, causing getSelectedBooking()
  to return null and unmount the sheet. Additionally, calendar event clicks triggered
  Radix Dialog's onInteractOutside handler which only checked for data-booking-list-item,
  closing the sheet unnecessarily. Fixed by caching the last valid booking in a useRef
  and expanding the onInteractOutside check to include calendar events.
expected_findings:
- file: apps/web/modules/bookings/components/BookingDetailsSheet.tsx
  line: 63
  summary: getSelectedBooking() returns null during booking transitions when new UID
    is set but booking data hasn't loaded into store yet, causing sheet to unmount
    and remount (flicker). Should retain previous booking during transition.
- file: apps/web/modules/bookings/components/BookingDetailsSheet.tsx
  line: 234
  summary: onInteractOutside handler only checks for data-booking-list-item attribute,
    missing data-booking-calendar-event. Clicking a calendar event while sheet is
    open triggers close+reopen instead of smooth switch.
- file: apps/web/modules/calendars/weeklyview/components/event/Event.tsx
  line: 109
  summary: Calendar Event component lacks data-booking-calendar-event attribute, so
    BookingDetailsSheet's onInteractOutside cannot distinguish calendar event clicks
    from true outside clicks.
