description: Flaky integration test caused by race conditions when parallel tests
  share a Postgres database. Raw Prisma queries in the test body (findUnique, attendee.delete)
  could fail with P2025 or BOOKING_NOT_FOUND errors when cascade deletes from other
  test suites removed records mid-execution. The fix removes the unnecessary prisma.booking.findUnique
  from beforeEach and stores booking.id directly in testData to eliminate the racy
  lookups.
