description: Custom questions in the BookingDetailsSheet were rendered in arbitrary
  order based on Object.entries(booking.responses) iteration, which follows JS object
  key insertion order rather than the configured order. The fix iterates over the
  event type's bookingFields array instead, looking up each field's answer from responses
  to ensure consistent, author-configured ordering. Additionally, boolean fields now
  display localized Yes/No instead of raw true/false strings.
