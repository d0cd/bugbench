pr_body: "## What does this PR do?\r\n\r\nAlso, adds Remove buttons\r\n<img width=\"\
  1140\" height=\"1436\" alt=\"image\" src=\"https://github.com/user-attachments/assets/04f4bb14-999d-48d0-8941-ee29e2cbfe00\"\
  \ />\r\n\r\n\r\nFixes the 413 response code issue caused by large base64 image payloads\
  \ in the organization onboarding flow by using the existing `ImageUploader` and\
  \ `BannerUploader` components instead of sending raw images to the server.\r\n\r\
  \n**Changes:**\r\n- Replace manual file input handling with `ImageUploader` component\
  \ for logo uploads\r\n- Replace manual file input handling with `BannerUploader`\
  \ component for banner uploads (1500x500 dimensions)\r\n- Remove unused state variables\
  \ (`_logoFile`, `_bannerFile`)\r\n- Simplify handlers to receive already-processed\
  \ image strings from the uploader components\r\n- Fix translation hints to show\
  \ correct 5MB max file size (was incorrectly showing 10MB)\r\n\r\n**Benefits:**\r\
  \n- Images are cropped and resized on the client-side before being stored, preventing\
  \ large payloads\r\n- Provides better UX with cropping functionality (consistent\
  \ with team onboarding)\r\n- Removes need for server-side image processing endpoint\r\
  \n- Aligns with existing patterns used in team onboarding flow\r\n\r\n**Note:**\
  \ We initially considered adding a server-side endpoint to resize images, but settled\
  \ on this better approach of using the existing ImageUploader components which handle\
  \ cropping/resizing on the client side.\r\n\r\n## Mandatory Tasks (DO NOT REMOVE)\r\
  \n\r\n- [x] I have self-reviewed the code (A decent size PR without self-review\
  \ might be rejected).\r\n- [x] I have updated the developer docs in /docs if this\
  \ PR makes changes that would require a [documentation change](https://cal.com/docs).\
  \ N/A - no documentation changes needed.\r\n- [ ] I confirm automated tests are\
  \ in place that prove my fix is effective or that my feature works.\r\n\r\n## How\
  \ should this be tested?\r\n\r\n1. Go to organization onboarding flow (`/onboarding/organization/brand`)\r\
  \n2. Upload a large logo image (e.g., 2000x2000px PNG)\r\n3. Verify the cropping\
  \ dialog appears and allows adjusting the image\r\n4. Save the cropped image and\
  \ verify the preview displays correctly\r\n5. Upload a large banner image\r\n6.\
  \ Verify the banner cropping dialog appears with 3:1 aspect ratio\r\n7. Complete\
  \ the onboarding flow and verify no 413 errors occur\r\n8. Compare with team onboarding\
  \ (`/onboarding/teams/details`) to ensure consistent UX\r\n\r\n## Checklist\r\n\r\
  \n- [x] My code follows the style guidelines of this project\r\n- [x] I have checked\
  \ if my changes generate no new warnings\r\n- [x] My PR is not too large\r\n\r\n\
  ## Human Review Checklist\r\n\r\n- [ ] Verify ImageUploader and BannerUploader components\
  \ adequately reduce image payload size to prevent 413 errors\r\n- [ ] **Check banner\
  \ dimension mismatch**: Code uses 1500x500 but translation hint says \"1500x150px\"\
  \ - confirm which is correct\r\n- [ ] Test with very large images (5MB+) to ensure\
  \ the flow handles them gracefully\r\n- [ ] Verify cropping UX is acceptable for\
  \ organization branding use case\r\n\r\n---\r\n\r\nLink to Devin run: https://app.devin.ai/sessions/8539eb900b8041e294d3e192a990a8e3\r\
  \nRequested by: @hariombalhara"
