  require a [documentation change](https://cal.com/docs). N/A - no documentation changes
  needed.

  - [ ] I confirm automated tests are in place that prove my fix is effective or that
  my feature works.


  ## How should this be tested?


  1. Navigate to a team page with multiple event types (e.g., `i.cal.com/engineering`)

  2. Open browser DevTools Network tab

  3. Observe that event type pages are no longer being prefetched/prerendered when
  they come into view

  4. Verify that clicking on an event type still navigates correctly to the event
  type page


