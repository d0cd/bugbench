pr_title: 'fix: disable prefetch on team page event type links to prevent Google rate
  limits'
pr_body: '## What does this PR do?


  Disables Next.js Link prefetching on the team page (`/team/[slug]`) to prevent excessive
  server-side rendering of event type pages when viewing a team''s profile.


  When a team has many event types, Next.js automatically prefetches all linked event
  type pages when they come into the viewport. This triggers server-side rendering
  for each page, which can make Google Calendar API calls and cause rate limiting
  issues.


  This follows the existing pattern in `users-public-view.tsx` which already has `prefetch={false}`
  on event type links with the comment: "Don''t prefetch till the time we drop the
  amount of javascript in [user][type] page which is impacting score for [user] page"


