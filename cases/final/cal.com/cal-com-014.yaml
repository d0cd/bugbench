description: "OAuth callback endpoints lacked CSRF protection \u2014 the OAuth state\
  \ parameter was decoded without any nonce or HMAC verification, allowing an attacker\
  \ to craft malicious OAuth callbacks. Additionally, the Stripe callback used raw\
  \ `state.returnTo` for redirects instead of `getSafeRedirectUrl`, creating an open-redirect\
  \ vulnerability. The fix adds HMAC-signed nonce generation in `encodeOAuthState`\
  \ and mandatory verification in `decodeOAuthState`, and replaces the unsafe Stripe\
  \ redirect with `getSafeRedirectUrl`."
expected_findings:
- file: packages/app-store/_utils/oauth/decodeOAuthState.ts
  line: 1
  summary: 'Missing CSRF protection: OAuth state is decoded and trusted without any
    nonce or HMAC verification, allowing forged OAuth callbacks'
- file: packages/app-store/stripepayment/api/callback.ts
  line: 41
  summary: 'Open redirect: raw `state.returnTo` is used for redirect without sanitization
    via `getSafeRedirectUrl`, allowing attacker-controlled redirect targets'
- file: packages/app-store/_utils/oauth/encodeOAuthState.ts
  line: 1
  summary: 'No nonce generated: OAuth state is encoded without a cryptographic nonce,
    so callbacks cannot be verified as legitimate'
