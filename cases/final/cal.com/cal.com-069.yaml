pr_body: "## What does this PR do?\r\n\r\nUses `ErrorWithCode` instead of a generic\
  \ `Error` in the Stripe `collectCard` method, so failures return HTTP 400 instead\
  \ of 500.\r\n\r\nChanges:\r\n- Add `CollectCardFailure` error code (distinct from\
  \ `ChargeCardFailure` for actual payment charges)\r\n- Map `CollectCardFailure`\
  \ to HTTP 400 in `getHttpStatusCode`\r\n- Add unit test coverage\r\n\r\n## Mandatory\
