description: "The VerticalTabItem in the My Account \u2192 Settings navigation used\
  \ `w-fit` for its width class, causing the hover highlight to only span the text\
  \ width rather than the full sidebar width. This created inconsistent hover styling\
  \ compared to other navigation items. The fix replaced `w-fit` with `w-full` to\
  \ ensure the hover state covers the entire row."
