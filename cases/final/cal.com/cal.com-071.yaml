description: The companion app's cross-origin iframe was missing the `allow="clipboard-write;
  clipboard-read"` attribute, causing `navigator.clipboard.writeText()` to fail silently
  or throw. The Clipboard API requires explicit Permissions Policy delegation for
  cross-origin iframes. The fix adds the required `allow` attribute to the iframe
  element in content.ts.
