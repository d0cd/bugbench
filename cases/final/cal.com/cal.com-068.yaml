pr_title: 'fix: use FeatureOptInService for bookings-v3 check'
pr_body: "## What does this PR do?\n\nSwitches the bookings-v3 feature check to use\
  \ `FeatureOptInService` so the bookings page correctly respects org/team/user opt-ins.\
  \ The `booking-audit` feature remains a per-user flag via `FeaturesRepository`.\n\
  \n### Changes\n\n- Added `resolveFeatureStates` method to `FeatureOptInService`\
  \ that takes only `userId` and `featureIds` (simpler API that internally fetches\
  \ org/team IDs)\n- Simplified `listFeaturesForUser` to take only `userId` parameter\n\
  - Moved `getUserOrgAndTeamIds` logic from the tRPC router into the service as a\
  \ private method\n- Updated bookings page to use `resolveFeatureStates` for `bookings-v3`\
  \ check\n- Parallelized `getUserFeaturesStatus` and `resolveFeatureStates` calls\
  \ with `Promise.all` for better performance\n\n## Mandatory Tasks (DO NOT REMOVE)\n\
  \n- [x] I have self-reviewed the code (A decent size PR without self-review might\
  \ be rejected).\n- [x] I have updated the developer docs in /docs if this PR makes\
  \ changes that would require a [documentation change](https://cal.com/docs). N/A\
  \ - internal API change only.\n- [ ] I confirm automated tests are in place that\
  \ prove my fix is effective or that my feature works.\n\n## How should this be tested?\n\
  \n1. Enable `bookings-v3` feature at org, team, or user level\n2. Navigate to the\
  \ bookings page\n3. Verify the bookings-v3 UI is shown when the feature is enabled\
  \ at any level (org/team/user)\n4. Verify the feature respects the opt-in hierarchy\
  \ (org disabled \u2192 feature disabled even if user enabled)\n\n## Human Review\
  \ Checklist\n\n- [ ] Verify `resolveFeatureStates` correctly fetches org/team membership\
  \ via `getUserOrgAndTeamIds`\n- [ ] Verify `effectiveEnabled` is the correct property\
  \ to check for feature enablement\n- [ ] Verify the `Promise.all` parallelization\
  \ doesn't introduce any issues\n\n## Checklist\n\n- [x] I have read the [contributing\
  \ guide](https://github.com/calcom/cal.com/blob/main/CONTRIBUTING.md)\n- [x] My\
  \ code follows the style guidelines of this project\n- [x] I have checked if my\
  \ changes generate no new warnings\n\n---\n\n**Link to Devin run:** https://app.devin.ai/sessions/86dd8e0c9de44252b110ea20ab741780\n\
  **Requested by:** eunjae@cal.com (@eunjae-lee)"
