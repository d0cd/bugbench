description: The seed-app-store script unconditionally recalculates each app's `enabled`
  flag via `shouldEnableApp` on every run, overwriting previously-configured enabled
  states. During Docker restarts or database reseeds, apps like Google Calendar/Meet
  would be unintentionally disabled because keys could resolve to `undefined` on subsequent
  runs. The fix preserves the existing `enabled` value from the database when the
  app already exists.
expected_findings:
- file: scripts/seed-app-store.ts
  line: 50
  summary: Seed script recalculates `enabled` from scratch using `shouldEnableApp`
    without checking if the app already has an existing enabled state in the database,
    causing previously-enabled apps to be disabled on re-seed.
