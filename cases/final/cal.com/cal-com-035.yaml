description: Flaky e2e tests used deterministic booking UIDs (`booking-uid-${seatedEventTypeId}`)
  which caused unique constraint violations when prior test data wasn't fully cleaned
  up between runs. The fix replaces the deterministic ID with `randomString()` to
  guarantee uniqueness across test runs.
