description: The signup flow's getServerSideProps accesses verificationToken.team
  and its metadata without first checking whether team is present on the verification
  token. When a verification token has no associated team, this causes a server-side
  crash (TypeError on null/undefined property access). The fix adds an early null
  guard for verificationToken.team with a redirect to /auth/error, and safely handles
  team metadata parsing with a null default.
