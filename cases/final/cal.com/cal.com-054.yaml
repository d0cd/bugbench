description: The variable `app` was annotated with `AppMetaSchema`, which is a Zod
  runtime schema object, not a TypeScript type. This causes type errors because a
  Zod schema cannot be used as a type annotation. The fix imports the inferred type
  `AppMetaType` and uses `Partial<AppMetaType>` as the correct annotation.
