pr_title: 'fix: corrects type annotation for app metadata parsing'
pr_body: "## Problem:: \r\n```ts\r\nlet app: AppMetaSchema;\r\n```\r\n AppMetaSchema\
  \ is a Zod schema object (a runtime value), not a TypeScript type. This causes type\
  \ errors since you cannot use a Zod schema directly as a type annotation.\r\n\r\n\
  <img width=\"1165\" height=\"289\" alt=\"Screenshot 2026-03-06 at 10 27 11\u202F\
  PM\" src=\"https://github.com/user-attachments/assets/25ebabd3-b631-49f8-b388-d7d837099b35\"\
  \ />\r\n<img width=\"793\" height=\"217\" alt=\"Screenshot 2026-03-06 at 10 27 55\u202F\
  PM\" src=\"https://github.com/user-attachments/assets/c97500ef-a423-4090-aad8-22c9a567a589\"\
  \ />\r\n\r\n\r\n## solution: \r\n- use correct type for type annotation. \r\n```ts\r\
  \nimport { AppMetaSchema, type AppMetaType } from \"@calcom/types/AppMetaSchema\"\
  ;\r\n...\r\nlet app: Partial<AppMetaType>;\r\n...\r\n```"
