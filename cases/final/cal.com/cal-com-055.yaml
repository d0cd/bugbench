description: The booking page and signup page terms text used the ambiguous word 'our'
  instead of the app name (e.g., 'Cal.com's') when referring to Terms and Privacy
  Policy. This was misleading when the booking page was embedded in third-party sites,
  as users couldn't tell whose terms applied. The fix replaces the hardcoded 'our'
  with APP_NAME in the locale string and component references.
