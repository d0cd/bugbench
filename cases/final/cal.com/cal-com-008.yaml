description: "The getIP function returned incorrect IPs (Cloudflare edge IPs or 127.0.0.1)\
  \ when running behind a Cloudflare \u2192 Vercel proxy chain. The root cause was\
  \ that the function only checked cf-connecting-ip and x-real-ip headers but never\
  \ checked x-forwarded-for, which reliably carries the real client IP as the first\
  \ entry through the CF \u2192 Vercel hop. The fix rewrites the header resolution\
  \ to check headers in correct priority order: cf-connecting-ip \u2192 true-client-ip\
  \ \u2192 x-forwarded-for \u2192 x-real-ip."
expected_findings:
- file: packages/lib/getIP.ts
  line: 1
  summary: "getIP checks only cf-connecting-ip and x-real-ip but missing x-forwarded-for\
    \ header; in CF \u2192 Vercel setups x-real-ip resolves to Cloudflare's edge IP,\
    \ not the real client IP"
- file: apps/web/app/api/auth/forgot-password/route.ts
  line: 17
  summary: Dead-code workaround manually checking x-forwarded-for can never trigger
    because getIP always returns at least 127.0.0.1, masking the upstream header resolution
    bug
