pr_body: "## What does this PR do?\n\nUpdates the API key creation modal and developer\
  \ settings sidebar based on user feedback:\n\n1. **Text update**: Changed the platform\
  \ link text from \"Create a marketplace or platform instead.\" to \"Create an OAuth\
  \ app and allow user to schedule.\"\n2. **URL update**: Changed the link destination\
  \ from `cal.com/platform` to `cal.com/integrate`\n3. **Sidebar reorder**: Moved\
  \ OAuth above API keys in the developer settings sidebar navigation\n\n## Mandatory\
  \ Tasks (DO NOT REMOVE)\n\n- [x] I have self-reviewed the code (A decent size PR\
  \ without self-review might be rejected).\n- [x] I have updated the developer docs\
  \ in /docs if this PR makes changes that would require a [documentation change](https://cal.com/docs).\
  \ N/A - no documentation changes needed.\n- [x] I confirm automated tests are in\
  \ place that prove my fix is effective or that my feature works. N/A - text/UI ordering\
  \ changes only.\n\n## How should this be tested?\n\n1. Navigate to Settings \u2192\
  \ Developer \u2192 API Keys\n2. Click \"Create an API key\" button\n3. Verify the\
  \ modal shows the updated text: \"Create an OAuth app and allow user to schedule.\"\
  \n4. Verify clicking the text links to `https://cal.com/integrate`\n5. In the developer\
  \ settings sidebar, verify OAuth appears above API keys\n\n## Human Review Checklist\n\
  \n- [ ] Verify `https://cal.com/integrate` is the correct destination URL\n- [ ]\
  \ Verify the new text accurately describes the OAuth integration flow\n- [ ] Confirm\
  \ the sidebar order (OAuth above API keys) is intentional\n\n---\n\n**Link to Devin\
  \ run**: https://app.devin.ai/sessions/f3158f87af0a4ee7982f79c10734e945\n**Requested\
  \ by**: @PeerRich"
