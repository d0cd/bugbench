pr_title: 'fix: make linting required for CI'
pr_body: '## What does this PR do?


  Makes linting a required CI check by removing `continue-on-error: true` from the
  lint workflow. Also fixes 2 existing lint errors that were blocking this change.


  **Changes:**

  - Remove `continue-on-error: true` from lint workflow so CI fails on lint errors

  - Fix lint errors: avoid importing from `@trpc/server` in lib package (causes circular
  dependencies)

  - Add `trpcErrorUtils.ts` to handle TRPC errors using duck typing

  - Update pre-commit hook to show warnings but not block commits


  ## Updates since last revision


  - Added `message` field validation to `isTRPCErrorLike` type guard to ensure the
  predicate is sound and aligned with the `TRPCErrorLike` interface


  ## Mandatory Tasks (DO NOT REMOVE)


  - [x] I have self-reviewed the code (A decent size PR without self-review might
  be rejected).

  - [x] I have updated the developer docs in /docs if this PR makes changes that would
  require a [documentation change](https://cal.com/docs). N/A - no documentation changes
  needed.

  - [x] I confirm automated tests are in place that prove my fix is effective or that
  my feature works.


  ## How should this be tested?


  1. Run `yarn lint` locally - should pass without errors

  2. Run `yarn test packages/lib/server/defaultResponder.test.ts` - should pass

  3. Make a commit with staged files - should show warnings but not block the commit

  4. Push to trigger CI - lint job should now fail if there are lint errors


  ## Human Review Checklist


  - [ ] Verify the TRPC error code to HTTP status mapping in `trpcErrorUtils.ts` matches
  TRPC''s actual mappings

  - [ ] Confirm the duck typing approach (`err.name === "TRPCError"`) is acceptable
  for detecting TRPC errors

  - [ ] Verify the pre-commit behavior change (warnings shown but not blocking) is
  the desired behavior


  ## Checklist


  - [x] I have read the [contributing guide](https://github.com/calcom/cal.com/blob/main/CONTRIBUTING.md)

  - [x] My code follows the style guidelines of this project

  - [x] I have commented my code, particularly in hard-to-understand areas

  - [x] I have checked if my changes generate no new warnings


  ---


  Link to Devin run: https://app.devin.ai/sessions/a1c0d5fdf055423bb42aac8e6a2260ce

  Requested by: Volnei Munhoz (@volnei)'
