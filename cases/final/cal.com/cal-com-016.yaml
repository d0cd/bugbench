description: The name field preprocessor in schema.ts did not attempt to parse JSON
  strings before applying variant conversion. When a `firstAndLastName` variant name
  was passed as a JSON string via URL prefill (e.g., `name={"firstName":"John","lastName":"Doe"}`),
  it was treated as a literal string rather than being parsed into an object, causing
  incorrect name handling.
expected_findings:
- file: packages/features/form-builder/schema.ts
  line: 144
  summary: 'Missing JSON parse attempt: when the name response is a string, it should
    be checked for valid JSON containing a `firstName` field before being passed as
    a raw string to variant conversion. A JSON string like `{"firstName":"John","lastName":"Doe"}`
    gets treated as a literal name instead of being parsed into an object.'
