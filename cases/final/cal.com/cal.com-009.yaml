description: The getDisplayJson method in ReassignmentAuditActionService unconditionally
  included previousOrganizerUuid and newOrganizerUuid fields with null values even
  when the organizer didn't change (e.g., fixed-host reassignment). This produced
  misleading null entries in audit output. The fix conditionally includes these fields
  only when organizerUuid is present in the audit data.
expected_findings:
- file: apps/web/modules/bookings/components/BookingDetailsSheet.tsx
  line: 265
  summary: Custom responses were filtered by field name using shouldShowFieldInCustomResponses
    on raw response entries, losing the connection to bookingFields metadata. This
    meant field labels, types (e.g., boolean), and ordering were determined by response
    keys rather than the authoritative bookingFields definition.
  line_side: pre_fix
- file: apps/web/modules/bookings/components/BookingDetailsSheet.tsx
  line: 855
  summary: Boolean field answers were rendered via String(answer), displaying 'true'/'false'
    instead of localized 'Yes'/'No' labels, because the rendering logic had no access
    to the field type information from bookingFields.
  line_side: pre_fix
