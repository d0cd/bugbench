pr_body: "## What does this PR do?\n\nUpdates the `getDisplayJson` method in `ReassignmentAuditActionService`\
  \ to only include `previousOrganizerUuid` and `newOrganizerUuid` fields when the\
  \ organizer actually changed during reassignment.\n\nPreviously, these fields were\
  \ always returned with `null` values even in fixed-host scenarios where the organizer\
  \ didn't change. Now they are omitted entirely when `organizerUuid` is not set in\
  \ the audit data, following the principle that we shouldn't display audit fields\
  \ that weren't actually changed.\n\n## Mandatory Tasks (DO NOT REMOVE)\n\n- [x]\
  \ I have self-reviewed the code (A decent size PR without self-review might be rejected).\n\
  - [x] I have updated the developer docs in /docs if this PR makes changes that would\
  \ require a [documentation change](https://cal.com/docs). N/A - no documentation\
  \ changes needed.\n- [x] I confirm automated tests are in place that prove my fix\
  \ is effective or that my feature works.\n\n## How should this be tested?\n\n1.\
  \ Run the unit tests:\n   ```bash\n   TZ=UTC yarn test packages/features/booking-audit/lib/actions/__tests__/ReassignmentAuditActionService.test.ts\n\
  \   ```\n2. All 16 tests should pass\n\n### Manual verification:\n- When viewing\
  \ audit data for a reassignment where the organizer changed \u2192 `previousOrganizerUuid`\
  \ and `newOrganizerUuid` should be present\n- When viewing audit data for a fixed-host\
  \ reassignment (only attendee changed) \u2192 `previousOrganizerUuid` and `newOrganizerUuid`\
  \ should NOT be present in the display data\n\n## Human Review Checklist\n\n- [\
  \ ] Verify downstream consumers of `ReassignmentAuditDisplayData` handle the now-optional\
  \ `previousOrganizerUuid` and `newOrganizerUuid` fields correctly (they may be `undefined`\
  \ instead of `null`)\n- [ ] Confirm any UI components that display this audit data\
  \ gracefully handle missing organizer UUID fields\n\n## Checklist\n\n- [x] My code\
  \ follows the style guidelines of this project\n- [x] I have checked if my changes\
  \ generate no new warnings\n\n---\n\nLink to Devin run: https://app.devin.ai/sessions/4ccb270fee5143dba8a31ae76fa0756c\n\
  Requested by: @hariombalhara"
