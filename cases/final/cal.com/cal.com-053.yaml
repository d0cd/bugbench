pr_body: "## What does this PR do?\r\n\r\nFixes incorrect Norwegian translations in\
  \ booking and cancellation flows.\r\n\r\n- Fixes #28389\r\n\r\n**Key changes:**\r\
  \n- \"Hendelse/Arrangement\" \u2192 \"Booking\" (more accurate for booking context)\r\
  \n- \"\xC5rsak\" \u2192 \"Grunn\" (better word for \"reason\")\r\n- \"Omberammet\
  \ av\" \u2192 \"Tidspunkt endret av\" (correct rescheduling term)\r\n- \"Avbestilling\"\
  \ \u2192 \"Kansellering\" (correct cancellation term)\r\n- \"Glem det\" \u2192 \"\
  Avbryt\" (proper UI cancel term)\r\n- \"Gjester\" \u2192 \"Deltakere\" (participants,\
  \ not guests)\r\n\r\n## Visual Demo\r\n\r\n#### i8n fix\r\n\r\n## Mandatory Tasks\
