  \ automated tests are in place. **N/A** - Translation changes\r\n\r\n## How should\
  \ this be tested?\r\n\r\n1. Set language to Norwegian (`no`) in settings\r\n2. Test\
  \ booking cancellation - verify \"Grunn for kansellering\" appears\r\n3. Test rescheduling\
  \ - verify \"Tidspunkt endret av\" and \"Grunn for endring av tidspunkt\" appear\r\
  \n4. Verify \"Booking\" is used instead of \"Hendelse/Arrangement\"\r\n\r\n**Expected:**\
  \ All Norwegian text uses consistent and correct booking terminology.\r\n\r\n##\
