description: BookerEmbed crashes at runtime because code references `process.env`
  in browser/embed contexts where the Node.js `process` global is undefined. The fix
  guards `process` access with `typeof process !== 'undefined'` checks in Booker.tsx
  (for the `isE2E` check) and in `isFeatureEnabledForVisitor` (for feature-flag env
  reads), preventing the ReferenceError that broke the embed.
expected_findings:
- file: packages/features/bookings/Booker/utils/isFeatureEnabledForVisitor.ts
  line: 8
  summary: Unguarded `process.env` access in a utility that runs client-side in embed
    contexts; `process` is undefined in the browser so this throws a ReferenceError.
    Must guard with `typeof process !== 'undefined'` before reading env vars.
  line_side: pre_fix
- file: apps/web/modules/bookings/components/Booker.tsx
  line: 1
  summary: Unguarded `process.env` access for the `isE2E` check will throw ReferenceError
    in browser/embed contexts where the Node.js `process` global does not exist; needs
    a `typeof process !== 'undefined'` guard.
  line_side: pre_fix
