description: The SheetFooter in the Booking Details drawer used `sm:-my-6` which applied
  negative top and bottom margins, pulling the footer up into the body content area
  and causing text overlap on smaller screens. The fix removed the negative vertical
  margins from SheetFooter (keeping only horizontal negative margins for edge-to-edge
  stretch) and added `pb-0` to SheetContent so the footer sits flush at the bottom.
