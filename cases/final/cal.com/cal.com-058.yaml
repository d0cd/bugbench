pr_title: 'fix: preserve UI config across iframe resets for element-click embeds'
pr_body: "## What does this PR do?\r\n\r\nRegression from - https://github.com/calcom/cal.com/pull/25569\r\
  \n\r\nFixes a bug where UI config (like `hideEventTypeDetails`, `cssVarsPerTheme`,\
  \ `styles`) is lost for element-click embeds.\r\n\r\n**The Bug**: For element-click\
  \ embeds, `ui()` is called on page load before the iframe exists, so the config\
  \ is queued in `iframeDoQueue`. When the user clicks to open the modal, `loadInIframe()`\
  \ calls `iframeReset()` which clears the queue\u2014destroying the UI config before\
  \ it reaches the iframe.\r\n\r\n**The Fix**: Modified `iframeReset()` to preserve\
  \ UI-related instructions in the queue instead of clearing them entirely. This ensures\
  \ that queued `ui()` calls survive iframe resets and are applied when the iframe\
  \ becomes ready.\r\n\r\n**Changes:**\r\n1. Updated `iframeReset()` to filter the\
  \ queue and keep only UI instructions (`method === \"ui\"`)\r\n2. Added E2E test\
  \ assertion to verify `hideEventTypeDetails` is applied in element-click embeds\r\
  \n\r\nThis affects all UI config set before the first click: `hideEventTypeDetails`,\
  \ `cssVarsPerTheme`, `styles`, etc. Inline embeds are not affected because `createIframe()`\
  \ is called immediately during init.\r\n\r\n## Mandatory Tasks (DO NOT REMOVE)\r\
  \n\r\n- [x] I have self-reviewed the code (A decent size PR without self-review\
  \ might be rejected).\r\n- [x] I have updated the developer docs in /docs if this\
  \ PR makes changes that would require a documentation change. N/A - internal fix,\
  \ no API changes.\r\n- [x] I confirm automated tests are in place that prove my\
  \ fix is effective or that my feature works.\r\n\r\n## How should this be tested?\r\
  \n\r\n**Automated test**: The E2E test `should open embed iframe on click - Configured\
  \ with hide eventType details` now verifies that `[data-testid=\"event-meta\"]`\
  \ is hidden when `hideEventTypeDetails: true` is set via the `ui()` call. This test\
  \ should fail on main and pass with this fix.\r\n\r\n**Manual testing**:\r\n1. Create\
  \ an element-click embed with UI config:\r\n```html\r\n<button data-cal-link=\"\
  username/event\" data-cal-namespace=\"test\">Book</button>\r\n<script>\r\n  Cal.ns[\"\
  test\"](\"ui\", { hideEventTypeDetails: true });\r\n</script>\r\n```\r\n\r\n2. Click\
  \ the button to open the modal\r\n3. Verify that `hideEventTypeDetails` is applied\
  \ (event type details should be hidden)\r\n\r\n**Before fix**: UI config is lost,\
  \ event type details are visible\r\n**After fix**: UI config is preserved, event\
  \ type details are hidden\r\n\r\n## Checklist\r\n\r\n- [x] My code follows the style\
  \ guidelines of this project\r\n- [x] I have commented my code, particularly in\
  \ hard-to-understand areas\r\n- [x] I have checked if my changes generate no new\
  \ warnings\r\n\r\n## Human Review Checklist\r\n\r\n- [ ] Verify E2E test passes\
  \ with `ready-for-e2e` label\r\n- [ ] Confirm inline embeds still work correctly\
  \ (queue filtering shouldn't affect them)\r\n- [ ] Verify multiple `ui()` calls\
  \ are handled correctly when replayed from queue\r\n\r\n---\r\n\r\nLink to Devin\
  \ run: https://app.devin.ai/sessions/9c0a66d5e2ef41b7890dfa5bec931c80\r\nRequested\
  \ by: @joeauyeung"
