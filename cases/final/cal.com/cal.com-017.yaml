description: Day.js requires the `utc` plugin to be loaded before the `timezone` plugin
  for correct timezone formatting. The original code loaded them in the wrong order,
  causing `dayjs().tz().format()` to output UTC times labeled with the user's local
  timezone abbreviation (e.g., showing UTC time but labeling it 'IST').
