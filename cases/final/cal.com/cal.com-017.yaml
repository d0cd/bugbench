pr_title: 'fix: load dayjs utc plugin before timezone plugin'
pr_body: "## What does this PR do?\r\nFixes the Day.js plugin loading order in [packages/dayjs/index.ts](cci:7://file:///Users/pro/cal.com/packages/dayjs/index.ts:0:0-0:0)\
  \ to correctly handle timezone formatting.\r\n\r\nDay.js requires the `utc` plugin\
  \ to be loaded **before** the `timezone` plugin to correctly apply timezone offsets\
  \ during formatting (see [Day.js documentation](https://day.js.org/docs/en/plugin/timezone)).\r\
  \n\r\nThis fixes an issue where the Bookings Dashboard displayed UTC time but labeled\
  \ it with the user's timezone.\r\n\r\nref #28193\r\n\r\n## Visual Demo\r\nN/A -\
  \ fixing a formatting behavior.\r\n\r\n## How was this tested?\r\nLocally verified\
  \ that `dayjs('2024-01-01T06:45:00Z').tz('Asia/Kolkata').format('h:mm A z')` now\
  \ correctly outputs `12:15 PM IST` instead of `12:15 PM z`. Also ran `yarn test`\
  \ and `yarn build --filter=@calcom/dayjs` successfully.\r\n\r\n## Type of change\r\
  \n- [x] Bug fix (non-breaking change which fixes an issue)\r\n"
