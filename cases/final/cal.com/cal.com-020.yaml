pr_title: 'fix: enable client-side navigation for Routing sidebar tab'
pr_body: "## What does this PR do?\n\nClicking the **Routing** tab in the sidebar\
  \ caused a full hard page refresh, while all other sidebar tabs (Event Types, Bookings,\
  \ Availability, Teams, Workflows) navigated smoothly via client-side routing.\n\n\
  **Root cause:** The sidebar links to `/routing`, but there was no actual Next.js\
  \ page file at that path. Instead, `/routing` was handled by a chain of `beforeFiles`\
  \ rewrites in `next.config.ts`:\n- `/routing` \u2192 `/routing/forms`\n- `/routing/forms`\
  \ (via `/routing/:path*`) \u2192 `/apps/routing-forms/forms`\n\nSince rewrites are\
  \ server-side only, Next.js `<Link>` couldn't find a client-side route for `/routing`\
  \ and fell back to a full page load.\n\n**Fix:**\n1. Added an actual page file at\
  \ `app/(use-page-wrapper)/routing/page.tsx` that renders the same `Forms` component\n\
  2. Added a `layout.tsx` that wraps the page with `Shell` and `FormProvider` \u2014\
  \ matching the layout used by the original `/apps/routing-forms/forms/` route. Without\
  \ this, `Forms` crashes because it calls `useFormContext()` which requires a `FormProvider`\
  \ ancestor.\n3. Removed the now-unnecessary `/routing` \u2192 `/routing/forms` rewrite\n\
  4. Moved the `/routing/:path*` \u2192 `/apps/routing-forms/:path*` rewrite from\
  \ `beforeFiles` to `afterFiles` so it only applies to sub-routes that don't have\
  \ filesystem pages (e.g. `/routing/form-edit/:id`). In `beforeFiles`, the `:path*`\
  \ pattern matches zero or more segments, so bare `/routing` was being intercepted\
  \ before the new filesystem page could be served.\n\n### Updates since last revision\n\
  \n- Added `layout.tsx` with `Shell` + `FormProvider` to fix E2E test failures where\
  \ `data-testid=\"subtitle\"` and `routing-forms-list` were missing (the `Forms`\
  \ component requires `FormProvider` context and `Shell` wrapping).\n- Moved `/routing/:path*`\
  \ rewrite from `beforeFiles` to `afterFiles`. This was the remaining cause of E2E\
  \ failures \u2014 `:path*` matches zero segments, so the `beforeFiles` rewrite was\
  \ still intercepting bare `/routing` requests before the filesystem page could be\
  \ served. In `afterFiles`, the rewrite only kicks in when no matching filesystem\
  \ route exists.\n\n## Visual Demo\n\nBefore\n\nhttps://github.com/user-attachments/assets/525134e5-8405-4386-afd9-749d3bc21a33\n\
  \nAfter\n\nhttps://github.com/user-attachments/assets/65a72ca2-a89f-4908-810e-d85d76802cd1\n\
  \n## Mandatory Tasks (DO NOT REMOVE)\n\n- [x] I have self-reviewed the code (A decent\
  \ size PR without self-review might be rejected).\n- [x] I have updated the developer\
  \ docs in /docs if this PR makes changes that would require a [documentation change](https://cal.com/docs).\
  \ N/A\n- [x] I confirm automated tests are in place that prove my fix is effective\
  \ or that my feature works. N/A \u2014 manual verification required (click Routing\
  \ tab in sidebar).\n\n## How should this be tested?\n\n1. Log in to the app\n2.\
  \ Click through sidebar tabs: Event Types, Bookings, Availability, Teams, **Routing**,\
  \ Workflows\n3. Verify that clicking **Routing** now performs a smooth client-side\
  \ transition (no full page reload / white flash) \u2014 matching the behavior of\
  \ all other tabs\n4. Verify `/en/routing` and `/fr/routing` load properly (no crash,\
  \ subtitle visible)\n5. Create a new routing form, click the back button, and verify\
  \ you return to the forms list\n\n## Review checklist\n\n- [ ] Verify the `layout.tsx`\
  \ import path for `FormProvider` (`../apps/routing-forms/[...pages]/FormProvider`)\
  \ resolves correctly in all environments\n- [ ] Confirm the hardcoded `Cal.com Forms`\
  \ string in `page.tsx` metadata is acceptable or should use `t()` for localization\n\
  - [ ] Check that locale-prefixed routes (`/en/routing`, `/fr/routing`) work end-to-end\
  \ after the rewrite changes\n- [ ] Verify the `afterFiles` rewrite placement doesn't\
  \ cause unexpected behavior for edge cases (e.g., if the page fails to build, would\
  \ the rewrite fallback cause issues?)\n- [ ] Consider whether auth/session checks\
  \ in `layout.tsx` should be moved to `page.tsx` per project conventions (Cubic AI\
  \ flagged this at 8/10 confidence)\n\n<!-- Link to Devin run: https://app.devin.ai/sessions/271d67c63d1446d5a9e562f453348ab3\
  \ -->\n<!-- Requested by: @Ryukemeister -->"
