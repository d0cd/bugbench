description: The workflow email link replacement function in utils.ts does not handle
  anchor tags where the href attribute contains only a bare protocol stub ('http://'
  or 'https://') with no actual URL. This causes broken links in workflow emails.
  The fix extracts the real URL from the anchor's visible text content, but the reviewer
  flagged that the extracted URL is not sanitized before being inserted into the href
  attribute, creating a potential injection risk.
