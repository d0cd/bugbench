description: When updating a managed event type with ~85+ assigned users, the mutation
  payload includes full ChildrenEventType objects with large base64 avatar data URLs,
  profile, username, and membership fields. This causes the request body to exceed
  the 1MB server limit and fail, even though the server's Zod schema only requires
  owner.{id, name, email, eventTypeSlugs} and hidden. The fix strips children down
  to server-required fields in handleSubmit before sending the mutation.
expected_findings:
- file: packages/platform/atoms/event-types/hooks/useEventTypeForm.ts
  line: 287
  summary: 'Payload bloat: full ChildrenEventType objects (including potentially large
    base64 avatar data URLs, profile, username, membership) are passed directly to
    the mutation without stripping to server-required fields, causing ''Body exceeded
    1mb limit'' errors for managed event types with many users'
- file: packages/platform/atoms/event-types/hooks/useEventTypeForm.ts
  line: 379
  summary: The children array in the form values is sent as-is to the API; should
    be stripped to only owner.{id, name, email, eventTypeSlugs} and hidden before
    submission
