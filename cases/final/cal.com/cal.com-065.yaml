pr_title: 'fix: rename OOO controller file to match NestJS Swagger plugin convention'
pr_body: "##  Problem\r\n\r\n  The OOO (Out of Office) controller endpoints were missing\
  \ response type schemas in the generated OpenAPI spec\r\n\r\n##  Root Cause\r\n\r\
  \n  The NestJS Swagger CLI plugin uses controllerFileNameSuffix (default: ['.controller.ts'])\
  \ to identify controller files for AST transformation. The OOO controller was named\
  \ organizations-users-ooo-controller.ts (using -controller.ts), which didn't match\
  \ the expected .controller.ts suffix.\r\n\r\n  This caused the plugin to skip injecting\
  \ openapi.ApiResponse decorators, resulting in empty response schemas:\r\n  responses:\
  \ { 200: { description:  } }\r\n\r\n##  Solution\r\n\r\n  Renamed the controller\
  \ file to follow the standard NestJS convention:\r\n```\r\n  - organizations-users-ooo-controller.ts\
  \ \u2192 organizations-users-ooo.controller.ts\r\n```\r\n  This allows the Swagger\
  \ plugin to properly process the controller and inject response types automatically,\
  \ eliminating the need for explicit @ApiOkResponse decorators.\r\n\r\n"
pr_commit_messages:
- "fix: rename OOO controller file to match NestJS Swagger plugin conven\u2026"
- 'fix: update organization module import'
- 'feat: generate openapi docs'
