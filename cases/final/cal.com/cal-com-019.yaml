description: The payment page hardcoded the English string 'mins' for the event duration
  unit instead of using the i18n translation function `t()`. Non-English users saw
  untranslated text on the payment page. The fix replaces the hardcoded 'mins' with
  a localized string like `t("minute_time")`.
