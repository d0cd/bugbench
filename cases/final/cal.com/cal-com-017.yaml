description: The booking rejection endpoint's GET handler explicitly blocked rejection
  requests, returning a 'Rejection requires POST method' error. Apple Mail and many
  mobile email clients do not support HTML forms, so clicking the reject button in
  the organizer email followed the form action URL as a plain GET request instead
  of POST, causing all rejections from those clients to fail. The fix allows the GET
  handler to also process rejection actions.
