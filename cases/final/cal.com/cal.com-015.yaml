description: The OIDC callback route destructured only `code` and `state` from the
  authentication response query parameters, discarding the `iss` (issuer) parameter
  that Keycloak v18+ and other compliant providers include per RFC 9207. When the
  incomplete parameter set was forwarded to `openid-client`, the library's validation
  rejected it with 'invalid response encountered' because the expected `iss` claim
  was missing. The fix passes all query parameters through instead of selectively
  extracting a subset.
