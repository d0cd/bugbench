pr_title: 'fix: replace by_team_admins with by_team_admin in dynamic i18n keys'
pr_body: "## What does this PR do?\n\nFixes a typo in dynamic i18n key construction\
  \ where `\"by_team_admins\"` (plural) was being used instead of `\"by_team_admin\"\
  ` (singular). The code was dynamically building i18n keys like:\n\n```tsx\ni18nKey={`${lockedText}_${isManagedEventType\
  \ ? \"for_members\" : \"by_team_admins\"}`}\n```\n\nThis resulted in keys like `locked_by_team_admins`\
  \ which don't exist in the locale files. The correct key `locked_by_team_admin`\
  \ does exist.\n\n### Files changed:\n- `EventAppsTab.tsx` - 2 occurrences\n- `EventWebhooksTab.tsx`\
  \ - 2 occurrences  \n- `EventWorkflowsTab.tsx` - 2 occurrences\n\n## Mandatory Tasks\
  \ (DO NOT REMOVE)\n\n- [x] I have self-reviewed the code (A decent size PR without\
  \ self-review might be rejected).\n- [x] I have updated the developer docs in /docs\
  \ if this PR makes changes that would require a [documentation change](https://cal.com/docs).\
  \ N/A - no documentation changes needed.\n- [x] I confirm automated tests are in\
  \ place that prove my fix is effective or that my feature works. N/A - this fixes\
  \ a typo in i18n key references.\n\n## How should this be tested?\n\n1. Navigate\
  \ to a managed event type's Apps, Webhooks, or Workflows tab as a team member (not\
  \ admin)\n2. Verify the lock/unlock alert messages display correctly translated\
  \ text instead of the raw key\n\n## Human Review Checklist\n\n- [ ] Verify `locked_by_team_admin`\
  \ and `unlocked_by_team_admin` keys exist in locale files\n- [ ] Verify description\
  \ keys like `apps_locked_by_team_admin_description`, `webhooks_locked_by_team_admin_description`,\
  \ `workflows_locked_by_team_admin_description` exist\n\n## Checklist\n\n- [x] My\
  \ code follows the style guidelines of this project\n- [x] I have checked if my\
  \ changes generate no new warnings\n- [x] My PR is not too large\n\n---\n\n> **Link\
  \ to Devin run**: https://app.devin.ai/sessions/25df77faa90743d797703572d8f28f95\n\
  > **Requested by**: ali@cal.com"
