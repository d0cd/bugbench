description: "When hasValidLicense is true, the license step is excluded from the\
  \ wizard steps array (leaving only 2 entries), but defaultStep still returns the\
  \ hardcoded value SETUP_VIEW_SETPS.APPS (3), causing steps[3-1] \u2192 steps[2]\
  \ \u2192 undefined and a TypeError crash. Additionally, the onSuccess handler called\
  \ nav.onNext() twice to skip the absent license step, pushing navigation past array\
  \ bounds."
expected_findings:
- file: apps/web/modules/auth/setup-view.tsx
  line: 30
  summary: Hardcoded defaultStep returns SETUP_VIEW_SETPS.APPS (3) without accounting
    for the license step being conditionally excluded from the array, causing out-of-bounds
    access when only 2 steps exist
- file: apps/web/modules/auth/setup-view.tsx
  line: 55
  summary: onSuccess handler calls nav.onNext() twice to skip the license step, but
    since that step is already excluded from the array, the double call navigates
    past the end of the steps array
