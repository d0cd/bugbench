pr_title: 'fix: exclude third-party video apps from areCalendarEventsEnabled setting'
pr_body: "## What does this PR do?\n\nWhen `areCalendarEventsEnabled` is set to `false`\
  \ in the Platform API, video meeting creation for third-party video apps (like Daily.co)\
  \ was being skipped entirely. This caused the `meetingUrl` field in webhook payloads\
  \ to contain the location identifier (`integrations:daily`) instead of the actual\
  \ video meeting URL.\n\nThis PR adds a `skipCalendarEvent` option to `EventManager.create()`\
  \ that:\n- Skips calendar event creation when true\n- Skips CRM event creation when\
  \ true (CRM events are tied to calendar events)  \n- **Still creates video meetings**\
  \ for third-party video apps like Daily.co\n\nThe calling code in `handleConfirmation.ts`\
  \ and `RegularBookingService.ts` now uses this option when `areCalendarEventsEnabled`\
  \ is false, ensuring video meetings are still created while respecting the platform\
  \ customer's preference to manage their own calendar events.\n\n## Updates since\
  \ last revision\n\n- Addressed PR review feedback:\n  - Removed redundant inline\
  \ comments from `RegularBookingService.ts`, `handleConfirmation.ts`, and `EventManager.ts`\n\
  \  - Changed E2E test approach: now spies on `createAllCalendarEvents` and `createAllCRMEvents`,\
  \ verifying both are called 0 times when `areCalendarEventsEnabled` is false\n-\
  \ **Webhook payload location fix**: Updated webhook payload building in `RegularBookingService.ts`\
  \ to use `metadata?.videoCallUrl || evt.location` for the location field, ensuring\
  \ webhook payloads contain the actual video URL when available.\n- **Platform UI\
  \ documentation**: Added a localized message in the OAuth client settings form explaining\
  \ that when calendar events are disabled, Google Meet and Microsoft Teams links\
  \ cannot be generated (because their link generation is tied to calendar event creation),\
  \ while other video apps like Cal Video will continue to work.\n\n## Mandatory Tasks\
  \ (DO NOT REMOVE)\n\n- [x] I have self-reviewed the code (A decent size PR without\
  \ self-review might be rejected).\n- [x] I have updated the developer docs in /docs\
  \ if this PR makes changes that would require a [documentation change](https://cal.com/docs).\
  \ N/A - this is a bug fix that doesn't change the documented API behavior.\n- [x]\
  \ I confirm automated tests are in place that prove my fix is effective or that\
  \ my feature works.\n\n## How should this be tested?\n\n1. Create a platform booking\
  \ with `areCalendarEventsEnabled: false` and a Daily.co video location (`integrations:daily`)\n\
  2. Confirm the booking via `POST /v2/bookings/:bookingUid/confirm`\n3. Verify that:\n\
  \   - A Daily.co video meeting is created (booking reference should exist)\n   -\
  \ The webhook payload contains the actual video URL in `metadata.videoCallUrl` instead\
  \ of `integrations:daily`\n   - The webhook payload's `location` field contains\
  \ the actual video URL (not `integrations:daily`)\n   - No calendar events are created\n\
  4. Navigate to Platform Settings > OAuth Clients > Edit an OAuth client and verify\
  \ the limitation message appears below the \"Enable calendar events\" toggle\n\n\
  ## Human Review Checklist\n\n- [ ] Verify the E2E test approach (spying on `createAllCalendarEvents`\
  \ and `createAllCRMEvents`, expecting 0 calls for each) correctly verifies both\
  \ calendar and CRM events are skipped\n- [ ] Verify that video meetings are still\
  \ created when `areCalendarEventsEnabled` is false (the `createVideoEvent` path\
  \ is not affected by `skipCalendarEvent`)\n- [ ] Verify that skipping CRM events\
  \ when calendar events are skipped is correct behavior\n- [ ] Review the OR logic\
  \ in RegularBookingService: `shouldSkipCalendarEvents = !areCalendarEventsEnabled\
  \ || skipCalendarSyncTaskCreation`\n- [ ] Verify the webhook location fallback logic\
  \ is correct: `metadata?.videoCallUrl || evt.location`\n- [ ] Verify the UI message\
  \ accurately describes the Google Meet/MS Teams limitation\n- [ ] Confirm no tests\
  \ were broken by the webhook location change\n\n---\n\n\nLink to Devin run: https://app.devin.ai/sessions/38cfee4e13274d3ba5d252504e176f87\n\
  Requested by: @supalarry"
