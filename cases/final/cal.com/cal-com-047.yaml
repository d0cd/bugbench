description: "A guard condition `if (!isSyncedFromUrlToStoreRef.current) return` was\
  \ placed at the React effect level instead of inside the Zustand subscription callback.\
  \ This caused the entire effect\u2014including the `store.subscribe()` call\u2014\
  to be skipped on initial render, so the subscription that syncs `selectedBookingUid`\
  \ to the URL was never created. The fix moves the guard inside the callback so the\
  \ subscription is always established while still preventing premature URL overwrites\
  \ during URL\u2192Store sync."
expected_findings:
