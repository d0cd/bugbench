description: The team creation page displayed a duplicate label ('Name') on the name
  input field. The TextField component auto-generated a label from its `name="name"`
  prop via `label = t(name)`, while an explicit `<Label>` component already rendered
  'Team name' above it. The fix adds the `noLabel` prop to TextField to suppress the
  auto-generated label.
