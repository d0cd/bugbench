pr_body: "## What does this PR do?\nBefore the empty screen didn't mention how to\
  \ create calls (Cal.ai Workflows). Now we have a Button to create a Cal.ai workfow\
  \ and improved the text\n\nBefore:\n<img width=\"439\" height=\"299\" alt=\"Screenshot\
  \ 2026-01-26 at 10 46 01 AM\" src=\"https://github.com/user-attachments/assets/c6b0f86e-6f85-4643-8a32-714600baabbc\"\
  \ />\n\n\nAfter: \n<img width=\"464\" height=\"333\" alt=\"Screenshot 2026-01-26\
  \ at 10 44 33 AM\" src=\"https://github.com/user-attachments/assets/92354ace-bb9a-4b21-8c69-a3bebc5ecff9\"\
  \ />\n\n### Updates since last revision\n- Fixed accessibility issue: Use Button's\
  \ `href` prop directly instead of nesting a Link inside Button (addresses Cubic\
  \ AI review feedback). This prevents invalid button>anchor HTML nesting and ensures\
  \ proper keyboard/accessibility behavior.\n- Removed unused `Link` import\n\n##\
  \ Mandatory Tasks (DO NOT REMOVE)\n\n- [x] I have self-reviewed the code (A decent\
  \ size PR without self-review might be rejected).\n- [x] I have updated the developer\
  \ docs in /docs if this PR makes changes that would require a [documentation change](https://cal.com/docs).\
  \ N/A - no docs changes needed.\n- [x] I confirm automated tests are in place that\
  \ prove my fix is effective or that my feature works.\n\n## How should this be tested?\n\
  \n1. Navigate to Insights > Call History page\n2. Ensure there are no calls in the\
  \ history (or use a fresh account)\n3. Verify the empty screen shows the updated\
  \ description text and \"Create a Cal.ai workflow\" button\n4. Click the button\
  \ and verify it navigates to `/workflow/new?action=calAi&templateWorkflowId=wf-11`\n\
  \n## Human Review Checklist\n- [ ] Verify the Button with `href` prop renders as\
  \ a proper link element\n- [ ] Verify the workflow creation URL is correct and functional\n\
  - [ ] Verify the `create_first_workflow` translation displays correctly\n\n<!--\
  \ Link to Devin run: https://app.devin.ai/sessions/7d00db20bd00434396df1fd14c189156\
  \ -->"
