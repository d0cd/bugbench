pr_title: 'fix: query Host table directly to determine isCurrentUserHost flag'
pr_body: "## What does this PR do?\n\nFixes a bug where the \"Assigned\" badge wasn't\
  \ showing for some users who were assigned to Round Robin or Collective team event\
  \ types, even though they were hosts.\n\n**Root cause**: The `findTeamEventTypes`\
  \ repository method limits hosts to 5 (`take: 5`) for display purposes. The previous\
  \ implementation determined `isCurrentUserHost` by checking this limited array:\n\
  ```typescript\nisCurrentUserHost: eventType.hosts?.some((host) => host.user.id ===\
  \ ctx.user.id) ?? false\n```\n\nIf a team had more than 5 hosts and the current\
  \ user wasn't in the first 5 returned, the badge wouldn't show.\n\n**Fix**: Query\
  \ the Host table directly with a single batch query to get all event type IDs where\
  \ the current user is a host, then use a Set for O(1) lookups:\n```typescript\n\
  const userHostEntries = await prisma.host.findMany({\n  where: {\n    userId: ctx.user.id,\n\
  \    eventTypeId: { in: eventTypeIds },\n  },\n  select: { eventTypeId: true },\n\
  });\nconst eventTypeIdsWhereUserIsHost = new Set(userHostEntries.map((h) => h.eventTypeId));\n\
  ```\n\nRelated to: https://github.com/calcom/cal.com/pull/27036\n\n**Link to Devin\
  \ run:** https://app.devin.ai/sessions/6d5fe50d66fb4d9d9a18fe0a667ec06f\n**Requested\
  \ by:** ali@cal.com\n\n## Mandatory Tasks (DO NOT REMOVE)\n\n- [x] I have self-reviewed\
  \ the code (A decent size PR without self-review might be rejected).\n- [x] I have\
  \ updated the developer docs in /docs if this PR makes changes that would require\
  \ a [documentation change](https://cal.com/docs). N/A - no documentation changes\
  \ needed.\n- [ ] I confirm automated tests are in place that prove my fix is effective\
  \ or that my feature works.\n\n## How should this be tested?\n\n1. Create a team\
  \ with a Round Robin or Collective event type\n2. Add more than 5 hosts to the event\
  \ type\n3. Log in as a user who is a host but NOT in the first 5 hosts (by creation\
  \ order or however Prisma orders them)\n4. Navigate to the Event Types listing page\n\
  5. Verify the \"Assigned\" badge (blue) appears next to the event type\n\n## Human\
  \ Review Checklist\n\n- [ ] Verify the new query is efficient (single batch query\
  \ with WHERE IN on indexed columns `userId` and `eventTypeId`)\n- [ ] Confirm the\
  \ Set-based lookup correctly determines host status\n- [ ] Consider if there are\
  \ other places in the codebase that might have similar issues with the `take: 5`\
  \ limit on hosts (e.g., `findAllByUpId` also has `take: 5` on hosts)\n\n## Checklist\n\
  \n- [x] My code follows the style guidelines of this project\n- [x] I have checked\
  \ if my changes generate no new warnings"
