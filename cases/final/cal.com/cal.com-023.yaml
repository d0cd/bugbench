pr_title: 'fix: enable alby app in E2E tests to fix payment-apps test failures'
pr_body: '## What does this PR do?


  Fixes consistently failing E2E tests in `payment-apps.e2e.ts` caused by PR #27012.


  PR #27012 introduced logic to disable apps without valid keys during database seeding.
  This caused the alby payment app tests to fail because the alby app was disabled
  in the App table when its environment keys weren''t configured in CI.


  This fix adds an `ensureAppEnabled` helper function that enables the app in the
  App table before running the tests, treating it as a mock/test setup step.


  **Failing tests fixed:**

  - "Should be able to edit alby price, currency"

  - "Should display App is not setup already for alby"


