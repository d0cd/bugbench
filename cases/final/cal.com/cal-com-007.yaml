description: The react-phone-input-2 library's built-in phone masks for Argentina
  (+54) and Finland (+358) were too short, silently truncating valid phone numbers.
  Argentine mobile numbers require 11 national digits but the mask only allowed 10,
  and some Finnish mobile numbers have 10 digits but the mask only allowed 9. The
  fix adds custom mask overrides for these two countries.
