description: The `truncateOnWord` function ignored its `maxLength` parameter and instead
  used a hardcoded value of 148 when truncating text. This meant callers like the
  OpenGraph metadata generator, which passed a limit of 158 characters, were incorrectly
  truncated to 148 characters. The fix replaces the hardcoded value with the `maxLength`
  parameter.
expected_findings:
- file: packages/lib/text.ts
  line: 8
  summary: "Hardcoded truncation length: `text.substring(0, 148)` ignores the `maxLength`\
    \ parameter passed to the function \u2014 should be `text.substring(0, maxLength)`"
