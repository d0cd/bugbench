description: The Leo compiler's type checker panics when an unknown/undefined variable
  is passed as a function argument. The code uses `.for_each()` with `.unwrap()` on
  the result of `visit_expression()`, which returns `None` for unknown variables.
  The fix converts the closure to a `for` loop with the `?` operator for early return,
  replacing `.unwrap()` calls with direct use of the already-unwrapped value.
expected_findings:
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 677
  summary: Closure with `.for_each()` prevents use of `?` for error propagation; `visit_expression`
    can return `None` for unknown variables, and downstream `.unwrap()` calls will
    panic instead of emitting a compiler error.
  line_side: pre_fix
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 691
  summary: "Calling `.unwrap()` on the result of `visit_expression` \u2014 panics\
    \ when the expression contains an unknown variable. Should propagate the `None`\
    \ as a type-checking error."
  line_side: pre_fix
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 709
  summary: "Same `.unwrap()` on `ty` in the else branch \u2014 panics on unknown variables\
    \ instead of gracefully handling the error."
  line_side: pre_fix
