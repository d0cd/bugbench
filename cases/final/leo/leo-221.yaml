description: The deploy and execute CLI commands did not fetch and include network
  dependencies (imported programs) before submitting deployment/execution transactions.
  This caused deployments of programs with imports to fail because the required dependency
  programs were not resolved from the network and included in the transaction.
expected_findings:
- file: leo/cli/commands/deploy.rs
  line: 88
  summary: Missing step to fetch and add imported program dependencies from the network
    before calling handle_deploy. Programs that import other on-chain programs will
    fail to deploy without resolving these dependencies first.
  line_side: pre_fix
- file: leo/cli/commands/execute.rs
  line: 349
  summary: Missing network dependency resolution before executing transactions. Imported
    programs must be fetched from the network endpoint before the transaction can
    be constructed.
  line_side: pre_fix
- file: leo/cli/commands/common/query.rs
  line: 88
  summary: HTTP 200 response handling for program queries may need updating to support
    fetching dependency programs from the network.
  line_side: pre_fix
