description: 'The `self` variable (declared_circuit_reference) was not passed into
  nested scopes such as conditional branches and for loops inside circuit functions.
  This caused accessing or mutating `self` inside an `if` block or loop within a circuit
  method to fail. The fix threads the `declared_circuit_reference: &str` parameter
  through the block, conditional, and iteration statement execution functions.'
expected_findings:
- file: compiler/src/statement/statement.rs
  line: 90
  summary: Conditional statement execution does not forward `declared_circuit_reference`,
    so `self` is inaccessible inside `if` blocks in circuit functions.
- file: compiler/src/statement/statement.rs
  line: 108
  summary: Iteration statement execution does not forward `declared_circuit_reference`,
    so `self` is inaccessible inside `for` loops in circuit functions.
- file: compiler/src/statement/conditional/conditional.rs
  line: 52
  summary: Function signature missing `declared_circuit_reference` parameter; nested
    conditional scopes cannot resolve `self`.
