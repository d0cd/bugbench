description: The SSA pass incorrectly folded ternary expressions when handling early
  return statements with guard conditions. The guard matching logic in rename_program.rs
  failed to properly combine expression and accumulator values when a guard was present,
  producing incorrect SSA output. The fix corrects the match arms for Some(guard)
  cases and adds parentheses to ternary Display to prevent precedence issues in nested
  ternaries.
