  line_side: pre_fix
- file: compiler/ast/src/expressions/ternary.rs
  line: 31
  summary: Missing parentheses in ternary Display impl causes incorrect parsing/precedence
    when ternaries are nested during SSA folding
  line_side: pre_fix
