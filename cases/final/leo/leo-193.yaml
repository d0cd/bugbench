description: The Leo compiler's type checker did not validate that loop bounds must
  be literal values. Non-literal expressions (variables, function calls) were silently
  accepted as loop bounds, which is unsound in a ZK circuit language where loop bounds
  must be statically known. The fix adds else-branches to the existing literal checks
  to emit a new type-checker error for non-literal bounds.
expected_findings:
- file: compiler/passes/src/type_checking/check_statements.rs
  line: 323
  summary: 'Missing else-branch on start bound check: when `input.start` is not a
    `Expression::Literal`, no error is emitted. Non-literal loop start bounds are
    silently accepted, which is unsound for ZK compilation where iteration count must
    be statically determinable.'
  line_side: pre_fix
- file: compiler/passes/src/type_checking/check_statements.rs
  line: 330
  summary: "Missing else-branch on stop bound check: same pattern as start \u2014\
    \ when `input.stop` is not a literal, no error is emitted, allowing non-literal\
    \ stop bounds to pass type checking."
  line_side: pre_fix
