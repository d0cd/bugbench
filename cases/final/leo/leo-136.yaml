description: When recursively parsing imports, the parser used `Self::default()` to
  create a fresh import parser, losing track of already-visited imports. This caused
  infinite recursion on circular import graphs. The fix changes it to `self.clone()`
  so the parser carries forward the set of already-seen imports and can detect cycles.
expected_findings:
- file: imports/src/parser/import_parser.rs
  line: 55
  summary: Using `Self::default()` here discards the set of already-visited imports,
    so circular/recursive imports will recurse infinitely. Should use `self.clone()`
    to propagate visited-import state and detect cycles.
  line_side: pre_fix
