pr_body: "\r\n\r\nleo package names should allow numbers except for the first digit.\r\
  \n\r\n```rust\r\n// Valid\r\n\"foo\"\r\n\"foo-bar\"\r\n\"foo-bar-baz\"\r\n\"foo1\"\
  \r\n\"foo-1\"\r\n\r\n\r\n// Invalid\r\n\"\"\r\n\"-\"\r\n\"-foo\"\r\n\"foo--bar\"\
  \r\n\"foo*bar\"\r\n\"foo,bar\"\r\n\"1-foo\"\r\n```\r\n\r\nCloses #833"
