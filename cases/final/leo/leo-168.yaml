pr_body: "I did some code clean-up around array zero element checking.\r\nAlso did\
  \ a check for 1 element type tuples. They are now disallowed.\r\nAlso adds a field\
  \ to Definition statements to know if they are parened.\r\nThen during canonicalization,\
  \ this is disallowed if there is only one variable name.\r\n\r\nCloses #1405."
