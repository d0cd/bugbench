description: Function input parameters were not inserted into the type table during
  type checking. This caused failures when the compiler needed to look up the type
  of a function input in certain contexts, such as when assigning to an input variable
  inside an else branch. The fix adds the missing type_table.insert call for each
  function input.
expected_findings:
- file: compiler/passes/src/type_checking/checker.rs
  line: 1241
  summary: Function inputs are iterated and validated but never inserted into the
    type table. After validating each input_var, there should be a `self.type_table.insert(input_var.identifier().id(),
    input_var.type_().clone())` call so downstream type lookups (e.g. assignment type
    checking) can resolve input parameter types.
  line_side: pre_fix
