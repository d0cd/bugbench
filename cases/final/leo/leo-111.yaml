description: The `Execute` CLI struct defined `endpoint` as a positional clap argument
  (no `long` attribute), which meant clap would greedily consume input arguments intended
  for the `INPUTS` Vec<String> as the endpoint parameter. The fix changes `endpoint`
  to a named `--endpoint` long option with a default value, properly separating it
  from positional inputs.
expected_findings:
- file: leo/cli/commands/execute.rs
  line: 30
  summary: "Missing `long` attribute on clap field: `endpoint` is defined as an optional\
    \ positional argument, which conflicts with the preceding `INPUTS` Vec<String>\
    \ \u2014 clap will parse the first input as the endpoint instead of a program\
    \ input. Should use `#[clap(long)]` to make it a named option."
  line_side: pre_fix
- file: leo/cli/commands/execute.rs
  line: 85
  summary: "The `endpoint` argument is assembled after `set_current_dir` and uses\
    \ `.unwrap()` on `Option<String>` without the `long` flag distinguishing it from\
    \ positional args, compounding the parsing ambiguity \u2014 if no endpoint is\
    \ provided by the user, inputs silently get misrouted."
  line_side: pre_fix
