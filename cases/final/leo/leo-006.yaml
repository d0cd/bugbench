- file: compiler/passes/src/type_checking/expression.rs
  line: 89
  summary: 'Missing type check: `self.caller`/`self.signer` sets `ty = Type::Address`
    but never unifies or compares it against `expected`, allowing type mismatches
    to pass silently.'
