description: 'The package name validation function (`is_package_name_valid`) enforced
  the wrong character rules: it allowed dashes and required lowercase, but rejected
  underscores. Aleo instructions require identifier-style names (ASCII alphanumeric
  + underscores only). The fix replaces the dash-oriented validation with underscore-oriented
  validation and removes the lowercase requirement. A secondary cleanup removes a
  redundant `as usize` cast in `source_map.rs`.'
expected_findings:
- file: leo/package/src/package.rs
  line: 72
  summary: 'Wrong allowed separator: validation permits dashes (`current != ''-''`)
    but rejects underscores. Should allow underscores instead, since Aleo identifiers
    use underscores, not dashes.'
  line_side: pre_fix
- file: leo/package/src/package.rs
  line: 64
  summary: First-character check guards against leading dash but should guard against
    leading underscore, since dashes are no longer valid in package names.
  line_side: pre_fix
- file: compiler/span/src/source_map.rs
  line: 415
  summary: 'Redundant `as usize` cast: variable `i` is already `usize`, so `i as usize`
    is a no-op cast that adds unnecessary noise.'
  line_side: pre_fix
