description: The Leo compiler did not properly track or validate constant declarations
  at the program scope level, allowing global constants to shadow each other without
  emitting an error. The fix adds a `consts` field to `ProgramScope`, threads it through
  the parser, visitor, and all compiler passes (type checking, loop unrolling, function
  inlining, code generation), and adds validation to detect and reject global constant
  shadowing.
expected_findings:
- file: compiler/ast/src/program/program_scope.rs
  line: 18
  summary: ProgramScope is missing a `consts` field to track constant declarations,
    which means global constants are not properly represented in the AST and cannot
    be checked for shadowing.
- file: compiler/passes/src/type_checking/check_program.rs
  line: 54
  summary: Type checker does not iterate over or validate program-scope constant declarations,
    so shadowed global constants go undetected.
- file: compiler/parser/src/parser/file.rs
  line: 138
  summary: Parser does not collect const declarations into the program scope, so global
    constants are silently dropped or mishandled during parsing.
