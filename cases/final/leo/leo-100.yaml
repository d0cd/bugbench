description: The pest parser grammar did not require whitespace after keywords like
  'mut', 'let', 'const', 'static', 'circuit', 'if', 'for', 'return', 'function', and
  'test', allowing syntactically invalid programs such as 'letmut a:u32 = 1+1' to
  parse successfully. The fix appends a mandatory space to each keyword literal in
  the grammar and also adds optional trailing-comma support for circuit field definitions.
expected_findings:
- file: ast/src/leo.pest
  line: 18
  summary: Keyword rule 'mutable' matches bare "mut" without requiring trailing whitespace,
    so 'letmut' or 'mutx' would parse as valid identifiers
  line_side: pre_fix
- file: ast/src/leo.pest
  line: 36
  summary: Keyword rules 'const_' and 'let_' match bare strings without trailing whitespace,
    allowing invalid concatenations like 'letconst' to parse
  line_side: pre_fix
- file: ast/src/leo.pest
  line: 177
  summary: '''circuit_field_definition'' rule uses ''NEWLINE*'' as terminator instead
    of optional comma, preventing idiomatic trailing-comma syntax and coupling field
    termination to newlines'
  line_side: pre_fix
