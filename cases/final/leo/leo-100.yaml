pr_title: require spacing after keywords and add optional comma after circuit fields
pr_body: "Fixes issue where pest parser does not check for space after keywords.\r\
  \n```\r\nletmut a:u32 = 1+1; // old\r\nlet mut a: u32 = 1+1; //new\r\n```\r\nAdds\
  \ optional comma after circuit fields\r\n```\r\ncircuit Foo {\r\n    a: field  //old\
  \   \r\n}\r\n\r\ncircuit Foo {\r\n    a: field,   //new\r\n}\r\n```"
