description: The disassembler incorrectly used the locator's program name (`loc.name()`)
  instead of the locator's resource name (`loc.resource()`) when building record identifiers
  for nested stubs. This caused a panic when compiling programs with nested records
  as function inputs/outputs, because the record name resolved to the wrong identifier.
  The fix corrects the identifier source and updates the type checker to properly
  handle nested records as function I/O.
expected_findings:
- file: compiler/ast/src/stub/function_stub.rs
  line: 240
  summary: 'Wrong method called on locator: `loc.name()` returns the program name,
    but `loc.resource()` should be used to get the actual record type name for the
    stub identifier.'
- file: compiler/passes/src/type_checking/checker.rs
  line: 1186
  summary: "Type checker overly restricts record types as function inputs \u2014 nested\
    \ records from external programs should be allowed as inputs to non-transition\
    \ functions, not just transitions."
