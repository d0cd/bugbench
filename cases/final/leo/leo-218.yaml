description: The Leo compiler was not using Span-based unique namespaces for constraint
  generation, which could lead to namespace collisions between constraints produced
  by different lines of code. This PR threads Span through all constraint enforcement
  functions and error types, ensuring each source location produces uniquely-namespaced
  constraints and properly formatted error messages with source locations.
expected_findings:
- file: compiler/src/constraints/mod.rs
  line: 1
  summary: "Constraint enforcement functions lack Span parameter for unique namespace\
    \ generation \u2014 constraints from different source lines can collide, potentially\
    \ causing soundness issues in generated ZK proofs"
  line_side: pre_fix
- file: compiler/src/compiler.rs
  line: 29
  summary: Compiler::new() does not incorporate source span information into constraint
    namespace, meaning all constraints share a flat namespace derived only from package_name
  line_side: pre_fix
- file: compiler/src/constraints/expression.rs
  line: 2
  summary: Expression constraint functions (enforce_and, etc.) do not accept or propagate
    Span, so constraints generated from different expressions may share identical
    names
  line_side: pre_fix
