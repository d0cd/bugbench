description: The Leo type checker did not verify that types referenced in variable
  definitions, function parameters, and circuit member accesses were actually defined.
  This allowed programs using undefined/unrecognized types to pass type checking without
  error. The fix adds a validation helper in the checker and calls it at each relevant
  site (expressions, statements, program definitions), emitting a new `undefined_type`
  error when an unrecognized type is encountered.
expected_findings:
- file: compiler/passes/src/type_checking/checker.rs
  line: 317
  summary: Missing helper function to validate that a referenced type (Identifier)
    is actually defined in the type checker's known types. Without this check, undefined
    types silently pass validation.
  line_side: pre_fix
- file: compiler/passes/src/type_checking/check_program.rs
  line: 43
  summary: Function input parameter types are not validated against known/defined
    types, allowing functions with undefined parameter types to pass type checking.
  line_side: pre_fix
- file: compiler/passes/src/type_checking/check_statements.rs
  line: 61
  summary: Variable definition statements do not check that the declared type is a
    recognized/defined type, allowing variables with undefined types to pass type
    checking.
  line_side: pre_fix
