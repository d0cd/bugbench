  line: 19
  summary: 'Wrong main file path: `MAIN_FILE` references deprecated `src/lib.leo`
    instead of `src/main.leo`, causing all package imports to fail to resolve'
  line_side: pre_fix
- file: imports/src/parser/parse_package.rs
  line: 72
  summary: Import directory resolution uses path logic tied to the deprecated `lib.leo`
