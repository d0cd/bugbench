pr_title: Fixes import bug found in Aleo Studio
pr_body: "## Motivation\r\n\r\nOriginally found by Yuri's team. \r\nThis bug appeared\
  \ somewhere between v1.2.0 and v1.3.0 and wasn't covered by tests.\r\n\r\n## Steps\
  \ to reproduce\r\n\r\nUse this code:\r\n```ts\r\nimport u8u32.u8_u32;\r\nfunction\
  \ main() { }\r\n```\r\n\r\nThen add dependency:\r\n```\r\nleo add justice-league/u8u32\r\
  \n```\r\n\r\nAnd finally run the code:\r\n```\r\nleo build\r\n```\r\n\r\n## Error\
  \ log\r\n\r\n```\r\n\r\nError:     --> package/src/main.leo:3:5\r\n     |\r\n  \
  \ 3 |     u8_u32\r\n     |     ^^^^^^\r\n     |\r\n     = Cannot find imported package\
  \ `u8u32` in source files or import directory.\r\n```\r\n\r\n## Changes to UX\r\n\
  \r\nWe forgot to change imported file: `src/lib.leo` was deprecated long time ago,\
  \ and we still had code that relied on that file to exist. This has been changed\
  \ to import main file `src/main.leo` instead.\r\n\r\n## Test Plan\r\n\r\nTests for\
  \ imports currently disabled, and they didn't cover scenario for importing from\
  \ Aleo PM. We should consider adding test or CI which would cover this case. \r\n\
  \r\nTBD\r\n\r\n"
pr_commit_messages:
- fixes imports bug found in Aleo Studio
