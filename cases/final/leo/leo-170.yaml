description: The `leo account sign` command exposed a `--seed` flag that allowed users
  to seed the nonce used during signature generation. Reusing or controlling signature
  nonces is a well-known cryptographic vulnerability that can lead to private key
  recovery in Schnorr-based signature schemes. The fix removes the `--seed` flag entirely
  to prevent accidental nonce reuse.
