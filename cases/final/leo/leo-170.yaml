pr_title: Remove --seed flag from account sign command
pr_body: "## Motivation\r\n\r\nThe `--seed` flag in the `leo account sign` command\
  \ is insecure as `nonce`s in signatures are not intended to be seeded, reused, or\
  \ shared. This PR removes that functionality to prevent anyone from accidentally\
  \ using insecure functionality.\r\n\r\n## Related PRs\r\n\r\n- Same fix for snarkOS\
  \ cli: https://github.com/AleoNet/snarkOS/pull/3382"
