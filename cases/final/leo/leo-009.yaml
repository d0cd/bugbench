description: The compiler did not check for duplicate function definitions. When a
  function (e.g., `main`) was defined more than once with different signatures, instead
  of reporting an error, it silently proceeded, causing confusing return type mismatch
  errors. The fix adds a duplicate function definition check at the ASG level and
  emits a clear error.
expected_findings:
- file: asg/src/program/mod.rs
  line: 266
  summary: 'Missing duplicate function definition check: when inserting a function
    into the program scope, there is no guard to detect if a function with the same
    name has already been defined, allowing silent overwrites and downstream type
    mismatches.'
