description: The refactor to clap::ArgGroup (commit 50324fb) removed explicit conflicts_with_all
  constraints, assuming ArgGroup's requires() would enforce mutual exclusion between
  mode flags (--confirmed/--unconfirmed) and non-ID source flags (--from-io/--from-transition/--from-program).
  Clap does not automatically derive these cross-group conflicts, so users could combine
  incompatible flags without error. The third commit restored conflicts_with_all as
  a workaround.
