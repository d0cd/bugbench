pr_title: '[Feature] Support querying unconfirmed transactions'
pr_body: "This PR enables the command line interface to access the `/transaction/unconfirmed`\
  \ endpoint using `leo query transaction --unconfirmed <ID>`.\r\n\r\n`--unconfirmed`\
  \ still returns the original transaction if it was already confirmed, which is useful\
  \ because the default query returns only the fee transaction for rejected transactions.\r\
  \n`--confirmed` returns, both, the original and fee transaction. The PR changes\
  \ its help text to be a little clearer that the returned data is different from\
  \ the default query.\r\n\r\nThe second commit ([01923c4](https://github.com/ProvableHQ/leo/commit/01923c4f11eb8530032adf022ba0739bf69336f7))\
  \ refactors the transaction query arguments to use `clap::ArgGroup` instead of manually\
  \ listing all conflicts. In my opinion, that makes the code much easier to read\
  \ as the transaction query arguments are getting more complex. \r\n\r\nThis PR is\
  \ a clone https://github.com/ProvableHQ/leo/pull/28655"
