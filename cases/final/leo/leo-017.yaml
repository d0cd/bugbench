description: Leo's type checker did not recognize that nested array syntax (`[[u8;
  2]; 3]`) and tuple array syntax (`[u8; (3, 2)]`) represent the same multidimensional
  array type. Functions returning a multidimensional array would fail type checking
  if the return type declaration used a different syntax form than the return value's
  inferred type. The fix adds a `match_array_types` method to `Type` that normalizes
  both representations before comparison, and integrates this check into the return
  statement and value constraint logic.
expected_findings:
- file: compiler/src/statement/return_/return_.rs
  line: 30
  summary: Return type check does not account for equivalent array type representations
    (nested vs tuple syntax); needs fallback to structural array type matching
  line_side: pre_fix
- file: typed/src/types/type_.rs
  line: 58
  summary: 'Missing `match_array_types` method on Type: no way to compare `[[u8; 2];
    3]` and `[u8; (3, 2)]` as equivalent types'
  line_side: pre_fix
- file: compiler/src/value/value.rs
  line: 108
  summary: Array value constraint resolution does not normalize array type syntax,
    causing false type mismatch errors for multidimensional arrays
  line_side: pre_fix
