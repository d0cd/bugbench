description: During loop unrolling, local symbol tables were cloned without generating
  fresh NodeIDs, causing multiple unrolled iterations to share the same scope identities.
  The fix introduces `enter_scope_duped` on SymbolTable and `in_scope_duped` on Duplicator,
  ensuring each reconstructed scope gets a unique NodeID and independent local table.
expected_findings:
- file: compiler/passes/src/loop_unrolling/duplicate.rs
  line: 30
  summary: Scope duplication during loop unrolling clones the symbol table without
    generating fresh NodeIDs, causing scope identity collisions across unrolled iterations.
    Should use a duplication method that allocates new NodeIDs.
- file: compiler/passes/src/loop_unrolling/duplicate.rs
  line: 56
  summary: reconstruct_block enters a cloned scope instead of a properly duplicated
    scope with fresh NodeID, leading to shared scope identities between unrolled loop
    bodies.
- file: compiler/passes/src/common/symbol_table/mod.rs
  line: 95
  summary: Missing `enter_scope_duped` method that would properly duplicate a local
    scope from an existing one while generating a fresh NodeID internally, maintaining
    correct parent/child relationships.
