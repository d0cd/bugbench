description: Leo's type checker did not enforce a restriction on nested imports (imports
  beyond one level of nesting). Programs could import other programs that themselves
  contained imports, leading to unexpected behavior. The fix adds an `is_imported`
  flag to the type checker that tracks whether the current program is an import, and
  emits a new error when a nested import is encountered, while also threading Span
  information through the import AST for proper error location reporting.
expected_findings:
- file: compiler/passes/src/type_checking/checker.rs
  line: 39
  summary: 'Missing `is_imported` flag on the TypeChecker: there is no mechanism to
    track whether we are currently inside an imported program, so nested imports cannot
    be detected or rejected.'
  line_side: pre_fix
- file: compiler/passes/src/type_checking/check_program.rs
  line: 287
  summary: When visiting imported programs, the type checker does not check whether
    the imported program itself contains imports (nested imports). Should set an `is_imported`
    flag before recursing and emit an error if a nested import is found.
  line_side: pre_fix
- file: compiler/ast/src/program/mod.rs
  line: 34
  summary: The `imports` field stores `IndexMap<ProgramId, Program>` without an associated
    `Span`, making it impossible to report the source location of an offending nested
    import. Should be `IndexMap<ProgramId, (Program, Span)>`.
  line_side: pre_fix
