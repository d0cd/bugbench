description: 'The Leo compiler failed to reject tuple definitions where the number
  of elements on the left-hand side (destructuring pattern) did not match the number
  of elements on the right-hand side. For example, `let (g,h,i): (u8,u8,u8) = (1u8);`
  should be a compile error due to arity mismatch but was accepted. The fix adds proper
  validation of tuple definition arity.'
