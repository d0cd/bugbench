description: 'The `leo clean` command had two bugs: it proceeded to delete directories
  without first checking that a Leo project manifest exists, risking deletion in non-project
  directories. Additionally, `remove_dir_all` was called with hard error propagation
  via `.map_err()?`, causing the command to fail if the `outputs` or `build` directories
  did not already exist, instead of handling their absence gracefully.'
expected_findings:
- file: leo/cli/commands/clean.rs
  line: 37
  summary: 'Missing manifest existence check: `clean` proceeds directly to remove
    directories without verifying that a Leo manifest file exists in the current directory,
    risking file deletion in arbitrary non-project directories.'
  line_side: pre_fix
- file: leo/cli/commands/clean.rs
  line: 40
  summary: 'Hard failure on missing directory: `std::fs::remove_dir_all(&outputs_path).map_err(...)`
    propagates an error when the `outputs` directory does not exist; should silently
    succeed instead of failing.'
  line_side: pre_fix
- file: leo/cli/commands/clean.rs
  line: 45
  summary: 'Same issue for build directory: `std::fs::remove_dir_all(&build_path).map_err(...)`
    fails when `build` directory is absent instead of handling the missing directory
    gracefully.'
  line_side: pre_fix
