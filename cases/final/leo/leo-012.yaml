description: The `leo query program` command always included an edition (e.g., `/latest`)
  in the API URL when fetching program data. The `/latest` endpoint was deprecated
  or changed, causing queries to fail. The fix omits the edition from the URL when
  the user has not explicitly specified one, allowing the API to return the latest
  version by default.
expected_findings:
- file: leo/cli/commands/query/program.rs
  line: 63
  summary: API URL construction always includes edition (e.g., `/latest`) even when
    user did not specify one. The `/latest` endpoint is deprecated; edition should
    be omitted from the URL when not explicitly provided to fetch the latest program
    version.
