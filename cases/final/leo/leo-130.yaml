- file: asg/src/expression/ternary.rs
  line: 87
  summary: 'Incorrect condition: `expected_type.is_none()` causes the if_false branch
    to skip proper type inference when the expected type is unknown, leading to missed
    or wrong type errors for ternary expressions with implicit types'
