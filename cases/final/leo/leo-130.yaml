description: The ternary expression type checker in the ASG incorrectly handled the
  case when the expected type was unknown (None). When `expected_type.is_none()` was
  true, the false branch of the ternary was not properly type-resolved, causing implicit
  and explicit type mismatches to go undetected or produce incorrect errors.
