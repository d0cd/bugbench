description: 'The Leo parser incorrectly allowed inclusive loop ending bounds (e.g.,
  `for i in 0..=10`), which was not part of the current language specification per
  the ABNF grammar and Leo Reference. The fix sets `inclusive: false` in the loop
  range parsing logic at two locations in statement.rs, and updates corresponding
  test cases.'
