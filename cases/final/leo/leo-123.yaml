pr_body: "Original PR: https://github.com/ProvableHQ/leo/pull/28879\r\n\r\n## Motivation\r\
  \n\r\nI got 5 futures as output when I ran my transition that returns a record and\
  \ a future:\r\n```\r\n\u2714 Command? \xB7 #set_program war_game.leo\r\n\r\n\r\n\
  \u2714 Command? \xB7 #into war_game.aleo/create_game(1u32, 1i8, 2i8, 3i8, 5u128,\
  \ 29u128, 91u128)\r\n\r\nwar_game.aleo/create_game(1u32, 1i8, 2i8, 3i8, 5u128, 29u128,\
  \ 91u128)\r\n\u2714 Command? \xB7 #run\r\n\r\n\r\n   0:  async call to credits.aleo/transfer_public_as_signer\r\
  \n   1:  async call to credits.aleo/transfer_public_as_signer\r\n   2:  async call\
  \ to war_game.aleo/finalize_create_game\r\n   3:  async call to war_game.aleo/finalize_create_game\r\
  \n   4:  async call to war_game.aleo/finalize_create_game\r\n```\r\nThis happens\
  \ because it takes multiple steps to process the Element::Expression.\r\nI added\
  \ the check to only extend the futures vector once on the last step.\r\n\r\n## Test\
  \ Plan\r\n\r\nAfter the change:\r\n```\r\n\u2714 Command? \xB7 #set_program war_game.leo\r\
  \n\r\n\r\n\u2714 Command? \xB7 #into war_game.aleo/create_game(1u32, 1i8, 2i8, 3i8,\
  \ 5u128, 29u128, 91u128)\r\n\r\nwar_game.aleo/create_game(1u32, 1i8, 2i8, 3i8, 5u128,\
  \ 29u128, 91u128)\r\n\u2714 Command? \xB7 #run\r\n\r\n\r\n   0:  async call to war_game.aleo/finalize_create_game\r\
  \n```\r\nFixes #28880"
pr_commit_messages:
- Fix duplicate futures in interpreter.
- Modify interpreter testing to check for futures too
