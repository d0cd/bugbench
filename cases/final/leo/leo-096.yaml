description: The array range access expression handler in the ASG used `.unwrap()`
  on Option values when resolving slice start/stop indices, causing a Rust panic (crash)
  when invalid or out-of-range slice indices were provided. The fix replaces the unwrap
  calls with proper pattern matching (`Some(Some(ConstValue::Int(inner_value)))`)
  to handle invalid cases gracefully and produce proper compiler errors instead of
  panicking.
expected_findings:
- file: asg/src/expression/array_range_access.rs
  line: 148
  summary: Unsafe .unwrap() on array slice start index resolution; will panic on invalid
    input instead of returning a compiler error. Should use pattern matching to handle
    None/invalid cases.
  line_side: pre_fix
- file: asg/src/expression/array_range_access.rs
  line: 192
  summary: Unsafe .unwrap() on array slice stop index resolution; will panic on invalid
    input instead of returning a compiler error. Should use pattern matching to handle
    None/invalid cases.
  line_side: pre_fix
