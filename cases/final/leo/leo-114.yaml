pr_title: '[Feat] Cost estimation'
pr_body: "Resolves #27974 and #27939.\r\n\r\n## Overview:\r\n- A cost breakdown is\
  \ now included on all on-chain deployments and executions. To access the cost breakdown\
  \ without broadcasting the transaction use the `--dry-run` flag. \r\n- New automatic\
  \ check to determine if the transaction generating address has enough balance to\
  \ pay for the deployment/execution. This helps mitigate case where transactions\
  \ are broadcasted successfully but then later rejected on-chain. \r\n- `snarkOS`\
  \ dependency removed, making compile times of the leo compiler significantly faster.\r\
  \n- Refactor `leo execute` to work with generic network. Previously, all executions\
  \ were forced to adhere to the underlying snarkVM dependency. \r\n\r\n## Cost reduction\
  \ tips:\r\n- Deployment:\r\n\t- Synthesis\r\n\t\t- Remove expensive operations (Ex:\
  \ SHA3), or unnecessary imports\r\n\t- Storage\r\n\t\t- Use fewer instructions\r\
  \n\t- Namespace\r\n\t\t- Lengthen the program name (each additional character makes\
  \ it 10x cheaper)\r\n- Execution:\r\n\t- Storage\r\n\t\t- Use fewer nested transition\
  \ functions and smaller input and output datatypes\r\n\t- On-chain execution\r\n\
  \t\t- Remove operations that are expensive computationally (Ex: hash functions)\
  \ or storage-wise (Ex: Mapping insertions)"
