description: The Leo compiler's type checker accepted string literals even though
  snarkVM does not yet support strings, leading to failures downstream when compiling
  to the VM. The fix adds a type-checker error that rejects string literals at the
  type-checking pass, and updates the checker to emit a 'strings are not yet supported'
  error when a Literal::String is encountered.
expected_findings:
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 609
  summary: "Literal::String arm in type checker does not reject unsupported string\
    \ literals \u2014 should emit an error since snarkVM does not support strings\
    \ yet."
- file: compiler/passes/src/type_checking/checker.rs
  line: 390
  summary: Type checker assert_type and related methods do not account for string
    types being unsupported; should reject Type::String as invalid.
