pr_title: Code generation missing newline
pr_body: "I noticed that newlines aren't appended in the code generation pass for\
  \ simple function calls (Ex: BHP, Poseidon). This leads to inconsistent display\
  \ of AVM bytecode. For example compiling\r\n```\r\nprogram helloworld.aleo {\r\n\
  \  transition main(public a: u32, b: u32) -> u128 {\r\n      let result: u128 =\
  \ Poseidon2::hash_to_u128(1field);\r\n      let result2: u128 = Poseidon2::hash_to_u128(22field);\r\
  \n      let result3: u128 = BHP256::hash_to_u128(1u128);\r\n      return result\
  \ + result2 + result3;\r\n  }\r\n}\r\n```\r\nyields: \r\n\r\n```\r\nprogram helloworld.aleo;\r\
  \n\r\n\r\n\r\nfunction main:\r\n    input r0 as u32.public;\r\n    input r1 as u32.private;\r\
  \n    hash.psd2 1field into r2 as u128;    hash.psd2 22field into r3 as u128;  \
  \  hash.bhp256 1u128 into r4 as u128;    add r2 r3 into r5;\r\n    add r5 r4 into\
  \ r6;\r\n    output r6 as u128.private;\r\n```"
pr_commit_messages:
- add newline
