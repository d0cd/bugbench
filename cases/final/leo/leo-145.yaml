description: The Leo compiler's code generation pass for core algorithm function calls
  (BHP, Poseidon, etc.) used `write!` instead of `writeln!` when emitting bytecode
  instructions, causing multiple instructions to be concatenated on the same line.
  The fix adds the missing newline by switching to `writeln!`, producing correctly
  formatted AVM bytecode output.
