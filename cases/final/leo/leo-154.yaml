description: The ABNF grammar and parser were misaligned on equality operators (==,
  !=), causing incorrect parsing of equality expressions. The fix aligns the grammar
  spec with the parser implementation, corrects equality/comparison operator handling
  in the expression parser, updates package-name validation to check against language
  keywords, and updates all equality/inequality test cases to use the corrected semantics.
expected_findings:
- file: parser/src/parser/expression.rs
  line: 187
  summary: "Equality operator parsing logic is incorrect \u2014 the eat_any for Token::Eq/Token::Ne\
    \ does not properly handle operator precedence or produces wrong AST nodes for\
    \ equality comparisons"
  line_side: pre_fix
- file: grammar/abnf-grammar.txt
  line: 453
  summary: "ABNF grammar rule for package-name is too permissive \u2014 allows names\
    \ that conflict with language keywords; should incorporate keyword exclusion"
  line_side: pre_fix
- file: parser/src/lib.rs
  line: 25
  summary: KEYWORD_TOKENS was not publicly exported, preventing package publish command
    from validating package names against reserved keywords
  line_side: pre_fix
