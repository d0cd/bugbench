pr_title: Fix an issue with indexing an array with a const initialized with an unsuffixed
  integer
pr_body: "Closes #28677\r\n\r\nFairly simple change to handle the case where the integer\
  \ is unsuffixed, in codegen.\r\n\r\n~I took the liberty to also disallow array indices\
  \ from being anything other than `u8`, `u16`, or `u32`. We seem to be implicitly\
  \ casting to a `u32` in codegen (because the VM expects it) which seems unsafe unless\
  \ the array index type is one of these three types. We should encourage explicit\
  \ casting for other integer types if needed.~"
