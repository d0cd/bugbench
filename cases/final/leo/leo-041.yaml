description: Field and group types caused a stack overflow during constraint synthesis
  due to missing `to_allocated` conversion methods. Without explicit allocation, the
  constraint system would recurse infinitely when evaluating field/group values. The
  fix adds `to_allocated` methods on FieldType and GroupType that properly allocate
  gadgets in the constraint system namespace.
expected_findings:
- file: compiler/src/group/mod.rs
  line: 35
  summary: Missing `to_allocated` method on GroupType causes infinite recursion during
    constraint synthesis when a group value needs to be converted to an allocated
    gadget variable
  line_side: pre_fix
- file: compiler/src/field/mod.rs
  line: 150
  summary: FieldType allocation path can recurse infinitely when an already-allocated
    field value is re-allocated without a base-case check in the conversion logic
  line_side: pre_fix
- file: compiler/src/group/edwards_bls12.rs
  line: 133
  summary: EdwardsBls12 group gadget allocation missing proper handling for already-allocated
    values, contributing to the recursive stack overflow
  line_side: pre_fix
