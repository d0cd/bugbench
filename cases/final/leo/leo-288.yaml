description: 'The leo-fmt formatter had multiple formatting bugs: it doubled `::`
  before const arg lists (e.g., `from_bits_raw::::[[u8; 32]]` instead of `from_bits_raw::[[u8;
  32]]`), mangled comments inside struct expressions, and caused trailing inline comments
  to drift to incorrect positions. The fix corrects the `::` emission logic, struct
  member comment handling, and trailing comment placement, while also adding line-wrapping
  support at 100-character width.'
expected_findings:
- file: leo-fmt/src/format.rs
  line: 332
  summary: 'Double `::` emission before const arg lists: the formatter emits `::`
    unconditionally even when one is already present, producing `::::` instead of
    `::`.'
- file: leo-fmt/src/format.rs
  line: 362
  summary: 'Struct comment mangling: comments between struct members are not properly
    preserved or positioned during formatting, causing them to be lost or misplaced.'
- file: leo-fmt/src/output.rs
  line: 231
  summary: 'Trailing inline comment drift: column tracking does not account for newlines
    correctly, causing trailing comments to be appended at wrong positions.'
