pr_body: "<!--\r\n    Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes.\r\n\r\n    Help us understand your motivation\
  \ by explaining why you decided to make this change.\r\n\r\n    Happy contributing!\r\
  \n-->\r\n\r\n## Motivation\r\n\r\nFixes the following critical array indexing bug:\r\
  \n```js\r\nlet sample: [bool; (2, 3)] = [true; (2, 3)]; // compiles\r\nlet sample:\
  \ [bool; (2, 3)] = [[true; 2]; 3]; // compiles but is actually incorrect\r\nlet\
  \ sample: [bool; (2, 3)] = [[true; 3]; 2]; // errors but is actually correct\r\n\
  \r\nlet sample: [bool; (2, 3, 4)] = [true; (2, 3, 4)]; // compiles\r\nlet sample:\
  \ [bool; (2, 3, 4)] = [[[true; 2]; 3]; 4]; // compiles but is actually incorrect\r\
  \nlet sample: [bool; (2, 3, 4)] = [[[true; 4]; 3]; 2]; // errors but is actually\
  \ correct\r\n\r\nconsole.log(\u201C{}\u201C, sample);\r\n```\r\n"
pr_commit_messages:
- Fix critical array indexing bug
- Fixes array indices for both nested and tuple cases
