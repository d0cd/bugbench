description: The `nodeploy` flag on the `leo node start` command was not annotated
  with `#[structopt(long)]`, so structopt did not recognize it as a CLI flag. Users
  had to pass it as a raw trailing argument via `-- --nodeploy` instead of the expected
  `--nodeploy`. The fix adds the missing structopt attribute and updates the upstream
  Aleo dependency revision.
