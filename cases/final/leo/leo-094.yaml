description: The Leo compiler's ASG (Abstract Semantic Graph) did not check for duplicate
  variable definitions within the same scope, allowing variable shadowing that should
  have been an error. The fix adds a duplicate-variable check in the definition statement
  handler and a corresponding error variant in the error module.
expected_findings:
- file: asg/src/statement/definition.rs
  line: 130
  summary: 'Missing duplicate variable check: variables are inserted into scope without
    first verifying that a variable with the same name does not already exist, allowing
    invalid variable shadowing.'
  line_side: pre_fix
- file: asg/src/error/mod.rs
  line: 192
  summary: No error variant exists for duplicate variable definitions, so the compiler
    cannot report this class of error to the user.
  line_side: pre_fix
