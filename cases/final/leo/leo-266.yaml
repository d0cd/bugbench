description: The `leo test` CLI command was missing `--network` and `--endpoint` options
  that other Leo commands (like `leo run`, `leo execute`) already supported. The fix
  adds a `#[clap(flatten)]` attribute to include the shared network/endpoint options
  struct in the Test command's clap definition, and wires those options through to
  the command's execution logic.
