description: The Leo type checker did not validate that struct declarations contain
  at least one member. Empty structs are invalid in the Aleo/snarkVM execution model,
  but the compiler silently accepted them, leading to confusing downstream errors
  or invalid programs. The fix adds an explicit type-checker error when a struct is
  declared with no members.
