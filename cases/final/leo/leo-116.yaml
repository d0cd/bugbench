pr_title: Feature/circuit self
pr_body: "fixes #87.\r\n\r\nAdds support for the `self.[member]` syntax within circuit\
  \ functions.\r\nThe `self` keyword references the circuit's members.\r\n```rust\r\
  \ncircuit Foo {\r\n    b: bool\r\n  \r\n    function bar() -> bool {\r\n       \
  \ return self.b \r\n    }\r\n    \r\n    function baz() -> bool {\r\n        return\
  \ self.bar()\r\n    }\r\n}\r\n\r\nfunction main() -> bool {\r\n    let c = Foo {\
  \ b: true };\r\n\r\n    return c.baz() //true\r\n}\r\n```"
