description: This PR adds `self` keyword support for accessing circuit members and
  methods. The identifier check in `identifier.rs` conflates `Self` (type-level reference)
  and `self` (instance-level reference) into a single boolean check, which could cause
  incorrect resolution when one is used where the other is expected. Additionally,
  `is_in_scope` takes `&String` parameters instead of `&str`, which is a Rust anti-pattern
  that unnecessarily restricts callers.
expected_findings:
- file: types/src/common/identifier.rs
  line: 13
  summary: "Conflating `Self` and `self` in a single check (`self.name == \"Self\"\
    \ || self.name == \"self\"`) is incorrect \u2014 these are semantically different\
    \ (type-level vs instance-level reference) and should be distinguished to prevent\
    \ incorrect scope resolution."
  line_side: pre_fix
- file: compiler/src/constraints/program.rs
  line: 14
  summary: "`is_in_scope` takes `&String` instead of `&str` \u2014 this is a Rust\
    \ anti-pattern that forces unnecessary allocation at call sites and should accept\
    \ `&str` for broader compatibility."
  line_side: pre_fix
- file: compiler/src/constraints/expression.rs
  line: 34
  summary: '`SELF_KEYWORD` is defined as a static but the identifier check in `identifier.rs`
    uses hardcoded string literals instead of referencing this constant, creating
    an inconsistency that could lead to divergent behavior if the keyword spelling
    changes.'
  line_side: pre_fix
