description: The type checker did not validate struct initialization expressions against
  the expected type. When a function expected a specific return type (e.g., unit),
  returning a struct init expression would not trigger a type error. The fix adds
  a check comparing the expected type against the actual struct type in the struct
  init expression visitor.
