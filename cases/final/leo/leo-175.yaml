description: The `leo run` command failed to parse negative number arguments correctly
  because they were being interpreted as CLI flags by snarkVM. The fix adds a '--'
  separator when constructing the snarkVM command arguments, ensuring negative values
  like '-5' are treated as positional arguments rather than option flags. A secondary
  rename of `Deploy` to `LeoDeploy` was included for consistency.
