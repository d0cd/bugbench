pr_title: Custom panic hook
pr_body: "closes #1205 \r\n\r\nThis is a small PR that adds a custom panic hook to\
  \ the leo compiler. This allows us to control the output in the event that a user\
  \ encounters a critical bug while using leo. This is pretty standard practice in\
  \ most compilers.\r\n\r\nThe function `set_panic_hook` now gets called at the beginning\
  \ of `main` before anything in the compiler is run. If the binary was built in debug\
  \ mode then this call does nothing and panics still operate exactly like normal,\
  \ but if it was built in release mode then it registers a custom panic hook with\
  \ some info about the environment and a link to [our bug template](https://github.com/AleoHQ/leo/issues/new?labels=bug,panic&template=bug.md&title=[Bug])\
  \ on github. I tried to model the panic message after the [rust internal panic message](https://github.com/AleoHQ/leo/issues/1205#issuecomment-1061299410),\
  \ but feel free to change it however you see fit (or we can just wait to merge and\
  \ discuss it in a meeting).\r\n\r\ndebug build (no panic hook registered, so the\
  \ same as normal):\r\n```\r\nE:\\Work\\Aleo\\leo_repos\\leo>cargo run -- build\r\
  \n   Compiling leo-lang v1.5.3 (E:\\Work\\Aleo\\leo_repos\\leo)\r\n    Finished\
  \ dev [unoptimized + debuginfo] target(s) in 1.23s\r\n     Running `target\\debug\\\
  leo.exe build`\r\nthread 'main' panicked at 'explicit panic', leo/main.rs:209:5\r\
  \nnote: run with `RUST_BACKTRACE=1` environment variable to display a backtrace\r\
  \nerror: process didn't exit successfully: `target\\debug\\leo.exe build` (exit\
  \ code: 101)\r\n```\r\n\r\nrelease build (custom panic hook registered):\r\n```\r\
