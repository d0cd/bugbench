description: The Leo parser and compiler accepted unicode escape sequences without
  curly braces (e.g., '\u123') when only the braced form ('\u{123}') is valid. The
  fix adds a check in the lexer to require '{' after '\u' in character and string
  literals, and updates the compiler's char display to use the correct escaped format.
expected_findings:
- file: parser/src/tokenizer/lexer.rs
  line: 299
  summary: 'Missing validation: unicode escape sequences after ''\u'' must require
    a ''{'' character. Without this check, malformed escapes like ''\u123'' are silently
    accepted.'
- file: compiler/src/value/char/char.rs
  line: 162
  summary: Unicode character display should use escape_default() to ensure proper
    '\u{XXXX}' formatting with curly braces in output.
