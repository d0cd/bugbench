pr_title: Import Bug Fixes
pr_body: "Resolves #919.\r\n\r\nThe following `import bar.*;` now generates:\r\n```json\r\
  \n\"access\": {\r\n    \"Star\": {\r\n        \"span\": {\r\n            \"line_start\"\
  : 1,\r\n            \"line_stop\": 1,\r\n            \"col_start\": 12,\r\n    \
  \        \"col_stop\": 13,\r\n            \"path\": \"src/main.leo\",\r\n      \
  \      \"content\": \"import bar.*;\"\r\n        }\r\n    }\r\n}\r\n```\r\n\r\n\
  Resolves #913.\r\nGrammar has been changed as @bendyarm suggested.\r\n\r\nResolves\
  \ #918.\r\nThe following `import bar.();` now gives an error `Error: Error(FormattedError\
  \ { line_start: 1, line_stop: 1, col_start: 8, col_stop: 11, path: \"src/main.leo\"\
  , content: \"import bar.();\", message: \"Cannot import empty list\" })`."
pr_commit_messages:
- no empty import lists, star is a span, grammar fix
- merge master, add a parser test to try and improve code coverage
