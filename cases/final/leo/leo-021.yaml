description: 'Three import-related bugs: (1) the `PackageAccess::Star` AST variant
  did not carry a `Span`, so star imports (`import bar.*`) lost source location information
  in the AST output; (2) the parser accepted empty import lists (`import bar.()`)
  without error instead of rejecting them; (3) the ABNF grammar did not match the
  intended import syntax, requiring a restructuring of the import-declaration rule.'
expected_findings:
- file: ast/src/imports/package_access.rs
  line: 21
  summary: PackageAccess::Star variant is missing a Span field, causing star imports
    to lose source location information in the generated AST
  line_side: pre_fix
- file: parser/src/parser/file.rs
  line: 136
  summary: parse_package_accesses does not check for and reject empty parenthesized
    import lists like `import bar.()`, allowing invalid syntax to parse without error
  line_side: pre_fix
- file: grammar/abnf-grammar.txt
  line: 965
  summary: import-declaration grammar rule does not correctly separate package-path
    from package-access, causing the grammar to not match the actual intended import
    syntax
  line_side: pre_fix
