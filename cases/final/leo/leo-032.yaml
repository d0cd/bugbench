description: The `leo test` command reused a single `TestConstraintSystem` instance
  across all test functions, causing constraint pollution between tests. Constraints
  accumulated from earlier tests would leak into later ones, producing incorrect pass/fail
  results. The fix creates a fresh `TestConstraintSystem` before each test function
  runs.
