pr_title: fix leo test to run tests in isolation
pr_body: "## Motivation\r\n\r\nFixes #131 \r\n\r\nThe `leo test` command should run\
  \ each test in isolation with a new `TestConstraintSystem` object.\r\n\r\nPreviously,\
  \ this object was created once and passed into the compiler as a reference.\r\n\
  Now, the compiler creates a new object before each test is run. A reference of the\
  \ new object is used when parsing the program to generate constraints."
