pr_title: Prefer IndexMap over HashMap
pr_body: "<!--\r\n    Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes.\r\n\r\n    Help us understand your motivation\
  \ by explaining why you decided to make this change.\r\n\r\n    Happy contributing!\r\
  \n-->\r\n\r\n\r\n## Motivation\r\n\r\nPer @ljedrz request in #471 IndexMap is a\
  \ more efficient version of BTreeMap.\r\n\r\nHashMap is slower and does not map\
  \ pairs in a predictable ordered fashion. This can have unintended consequences.\
  \ For example, running the compiler multiple times on the same Leo program might\
  \ produce different ASTs. While the differing ASTs should not produce different\
  \ circuits, the undefined behavior caused by HashMap hurts determinism. \r\n\r\n"
pr_commit_messages:
- use index map in ast module
