description: The `leo build` command was hardcoding `main.leo` as the program name
  in its output instead of writing the actual program being built. Additionally, `leo
  add` did not prevent adding local dependencies with duplicate paths, leading to
  inconsistent dependency state. The fix writes the correct program name during build
  and deduplicates local dependency paths by overwriting stale entries.
expected_findings:
- file: leo/cli/commands/build.rs
  line: 193
  summary: Build output references a generic/hardcoded program name (`main.leo`) instead
    of the actual program being compiled; should use the resolved program name.
- file: leo/cli/commands/add.rs
  line: 50
  summary: 'Missing deduplication check: adding a local dependency does not detect
    or handle duplicate paths, allowing inconsistent dependency entries in the manifest.'
