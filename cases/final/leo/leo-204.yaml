description: The CircleCI configuration contained a duplicated 'project' directory
  segment in the EXAMPLES path (`/home/circleci/project/project/examples` instead
  of `/home/circleci/project/examples`), causing CI example tests to silently fail
  to locate example projects. Additionally, the `test-examples.sh` script did not
  iterate over all examples and lacked error propagation (`set -e` or exit-on-failure),
  so CI passed even when examples failed to compile or run.
expected_findings:
- file: .circleci/config.yml
  line: 131
  summary: 'Incorrect path: `export EXAMPLES=/home/circleci/project/project/examples`
    has a duplicated ''project'' segment; should be `/home/circleci/project/examples`'
  line_side: pre_fix
- file: .circleci/config.yml
  line: 149
  summary: 'Same duplicated path bug: `export EXAMPLES=/home/circleci/project/project/examples`
    appears in a second job definition'
  line_side: pre_fix
- file: .circleci/test-examples.sh
  line: 1
  summary: "Script does not iterate over all examples and lacks error propagation\
    \ (e.g. `set -e`) \u2014 CI silently passes even when example programs fail to\
    \ compile or run"
  line_side: pre_fix
