description: The Leo compiler's code generation pass incorrectly handled ExpressionStatements
  containing function calls. The visit_statements handler for Expression::Call did
  not properly emit call instructions when a call was used as a standalone statement,
  and the external call formatting in visit_expressions also needed correction to
  generate valid Aleo instructions.
