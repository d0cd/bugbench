description: Leo was using arbitrary default edition values (e.g., edition 0) for
  programs instead of fetching the actual edition from the Aleo network. This caused
  issues with snarkVM's V8+ constructor check rejecting edition 0 programs without
  constructors. The fix ensures network dependencies fetch their real edition from
  the network, while local (undeployed) programs default to edition 1 to avoid the
  V8 check.
expected_findings:
- file: leo/package/src/program.rs
  line: 24
  summary: Program edition lookup logic does not fetch or cache the latest edition
    from the network, causing stale or default (edition 0) values to be used for deployed
    dependencies.
- file: leo/cli/commands/common/util.rs
  line: 137
  summary: Utility function for printing/resolving program source does not account
    for the actual on-chain edition, potentially passing incorrect edition to downstream
    consumers.
- file: leo/cli/commands/deploy.rs
  line: 251
  summary: Deploy command does not fetch actual edition from the network for dependencies,
    risking deployment with incorrect edition and bypassing V8 constructor requirements
    check.
