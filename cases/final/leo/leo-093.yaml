description: The Leo compiler did not enforce the snarkVM/Aleo protocol limit of 15
  transitions per program. Users could write programs with more than 15 transitions
  that would compile successfully but fail at deployment time. The fix adds a compile-time
  check in the type checker's visit_program pass to count transitions and emit an
  error if the limit is exceeded.
expected_findings:
- file: compiler/passes/src/type_checking/check_program.rs
  line: 27
  summary: visit_program does not validate that the number of transitions in the program
    is within the protocol limit of 15. Programs exceeding this limit will fail at
    deployment against snarkVM.
  line_side: pre_fix
- file: errors/src/emitter/mod.rs
  line: 239
  summary: last_err() only surfaces the most recent error but does not distinguish
    between fatal errors emitted during early passes vs. later validation. The error
    propagation pattern (handler.last_err().map_err(|e| *e)?) used across loop_unrolling,
    symbol_table, and type_checking may mask earlier errors when a new validation
    check (transition count) is added.
  line_side: pre_fix
