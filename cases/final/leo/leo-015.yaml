pr_title: 'fix: drop `redundant filter_map` in remove_unreachable'
pr_body: "## Motivation\r\n\r\nThe block reconstruction pipeline used `scan` to stop\
  \ at the first return, but then applied `filter_map(Some)` which is a no-op because\
  \ `scan` already removes `None` values. This added an extra unnecessary iteration.\r\
  \nRemoved the redundant `filter_map(Some)` call after `scan`, preserving behavior\
  \ while reducing unnecessary iteration.\r\n\r\n\r\n"
