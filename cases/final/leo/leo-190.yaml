description: The compiler's static access resolution did not handle the `Self` keyword
  as a valid circuit identifier when resolving nested static function calls. When
  a static function like `Foo::baz()` tried to call `Self::bar()`, the compiler failed
  because `Self` was not recognized in the circuit identifier match expression. The
  fix adds `Self` / `SelfType` as a recognized variant throughout the AST parsing
  pipeline and resolves it to the enclosing circuit type during static access compilation.
expected_findings:
- file: compiler/src/expression/circuit/static_access.rs
  line: 36
  summary: "Static access resolution does not handle `Self` as a valid circuit identifier\
    \ expression \u2014 `Self::method()` calls from within a static function will\
    \ fail to resolve"
  line_side: pre_fix
- file: ast/src/leo.pest
  line: 369
  summary: Grammar rule for circuit identifiers in static access expressions does
    not include `type_self` as a valid alternative, preventing `Self::` syntax from
    parsing in static contexts
  line_side: pre_fix
- file: ast/src/common/keyword_or_identifier.rs
  line: 29
  summary: KeywordOrIdentifier enum lacks a SelfType variant, so the `Self` keyword
    cannot flow through the AST as a valid identifier in expression positions
  line_side: pre_fix
