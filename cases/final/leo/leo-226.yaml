description: The Leo compiler's code generation for futures was incorrect in multiple
  passes. The visit_program pass only checked `function.finalize.is_some()` without
  also checking for non-empty futures, causing functions with futures to miss finalize
  block generation. Additionally, visit_expressions didn't properly construct output
  operands (destination registers) for future-returning calls, and the flattener lacked
  a UnitExpression variant needed for future-related unit-typed expressions.
expected_findings:
- file: compiler/passes/src/code_generation/visit_program.rs
  line: 209
  summary: 'Missing futures check: condition should be `!self.futures.is_empty() ||
    function.finalize.is_some()` but only checks `function.finalize.is_some()`, causing
    functions with futures to skip finalize block generation'
- file: compiler/passes/src/code_generation/visit_expressions.rs
  line: 540
  summary: Output operands for call expressions do not correctly handle future types
    in destination registers, leading to incorrect codegen for future-returning function
    calls
- file: compiler/passes/src/flattening/flattener.rs
  line: 31
  summary: Missing UnitExpression variant in flattener enum prevents proper handling
    of unit-typed expressions produced by future-related calls
stats: null
