description: The Leo compiler's ASG (Abstract Semantic Graph) did not enforce const
  variable immutability. Variables declared as `const` could be reassigned without
  any error being raised. The fix adds a validation check in the definition statement
  handler that verifies const declarations are assigned constant values, and introduces
  a new `invalid_const_assign` error type for violations.
expected_findings:
- file: asg/src/statement/definition.rs
  line: 75
  summary: 'Missing enforcement of const variable semantics: definitions declared
    as `Declare::Const` are not checked to ensure assigned values are actually constant,
    allowing mutable values to be assigned to const variables without error.'
