description: The type checker did not validate circuit member access expressions (e.g.,
  `<expr>.<identifier>`), allowing type-incorrect member accesses to pass compilation
  silently. The PR adds the missing type-checking logic for circuit member accesses
  and cleans up related error-emission patterns across the type checker.
