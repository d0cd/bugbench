description: 'Multiple parser and lexer bugs causing incorrect handling of edge cases:
  array dimension parenthesization, character/string escape sequences at EOF, variable
  definition parsing with tuples, and Self type canonicalization in definitions. The
  fixes correct lexer EOF boundary checks, parser array-dimension logic, and ensure
  definition types propagate correctly through AST passes.'
expected_findings:
- file: compiler/parser/src/tokenizer/lexer.rs
  line: 46
  summary: Lexer fails to handle EOF gracefully during character/string escape sequence
    parsing, causing panics or unhelpful errors on malformed input ending at EOF
  line_side: pre_fix
- file: compiler/parser/src/parser/type_.rs
  line: 75
  summary: "Array dimension parsing incorrectly handles single-dimension case \u2014\
    \ the condition should not wrap single dimensions in unnecessary parenthesization\
    \ or misparse the dimension count"
  line_side: pre_fix
- file: compiler/parser/src/parser/statement.rs
  line: 295
  summary: Variable definition parsing with parenthesized tuple patterns does not
    correctly handle the definition type and variable name extraction, leading to
    parse failures on valid let-bindings
  line_side: pre_fix
