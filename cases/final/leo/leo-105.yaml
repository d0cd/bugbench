description: The Leo parser did not validate that function calls must lead with an
  identifier, allowing arbitrary expressions (like integer literals) to be parsed
  as function names. This caused confusing behavior where expressions like `1000u128
  (10u128 ** token_info.decimals)` were incorrectly parsed as function calls. The
  fix adds a check in the parser's expression handling to ensure the callee of a function
  call is always an identifier.
expected_findings:
- file: compiler/parser/src/parser/expression.rs
  line: 446
  summary: 'Missing validation: function call parsing does not check that the callee
    expression is an Identifier, allowing literals and other non-identifier expressions
    to be treated as function names.'
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 453
  summary: No guard against non-identifier function names reaching type checking;
    a non-identifier callee in a CallExpression would cause unexpected behavior in
    downstream passes.
