description: Examples used hyphenated directory names (hello-world, pedersen-hash,
  square-root) which were inconsistent with Leo package naming requirements that expect
  underscores. The PR renames example directories, fixes a typo in the fibonacci description
  ('fibonnaci'), updates .gitignore files, and adjusts an import in the compiler's
  value.rs to include GroupValue.
