description: The Leo parser's import member-access path only accepted simple identifiers
  via `expect_ident()`, which rejected folder/file names containing dashes. The fix
  extends the parser at the member-access site to consume dash-separated segments
  and concatenate them into a single name, allowing imports like `nested.c-d` to resolve
  correctly.
