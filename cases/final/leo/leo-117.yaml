description: Error messages for input file and state file parsing did not include
  the file path, making it difficult for users to identify which file caused the error.
  The fix threads file path information through error types and uses tracing to display
  errors with proper context. Callers of `read_from()` were already receiving a `(String,
  PathBuf)` tuple but some discarded the path component.
expected_findings:
- file: compiler/src/compiler.rs
  line: 68
  summary: parse_input does not propagate the file path into error messages; parsing
    failures will show errors without indicating which input/state file caused them
  line_side: pre_fix
- file: package/src/inputs/pairs.rs
  line: 57
  summary: Discards the PathBuf from read_from() via `.0`, losing file path context
    that should be included in downstream error messages
  line_side: pre_fix
- file: leo/commands/build.rs
  line: 110
  summary: Input file path returned by read_from() is not forwarded to the compiler's
    parse_input, so any parse errors lack file location context
  line_side: pre_fix
