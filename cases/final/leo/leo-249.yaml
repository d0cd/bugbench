description: Compound assignment operators `<<=`, `>>=`, and `**=` bypassed type-checking
  because they were represented as distinct 'complex assign' AST nodes that did not
  route through the binary operation type-checker. The fix removes the complex assignment
  notion from the AST and has the parser desugar them into simple assignments with
  the corresponding binary operation (e.g., `x <<= y` becomes `x = x << y`), ensuring
  proper type-checking.
expected_findings:
- file: compiler/ast/src/statements/assign/mod.rs
  line: 34
  summary: AssignStatement carries compound assign operation variants (ShlAssign,
    ShrAssign, PowAssign) that bypass the type-checker for binary operations, allowing
    type errors to go undetected.
- file: compiler/parser/src/parser/statement.rs
  line: 55
  summary: Parser emits complex assign statements directly without desugaring them
    into a simple assignment plus binary expression, which means the type-checking
    pass never validates the operand types for shift/pow assigns.
- file: compiler/passes/src/static_single_assignment/rename_statement.rs
  line: 70
  summary: SSA rename pass handles complex assignments separately, reconstructing
    them without converting to binary expressions, perpetuating the type-check gap
    for shift-assign and pow-assign operations.
