description: The type checker for MemberAccess expressions handling `self.caller`
  and `self.signer` resolved the type to `Type::Address` but never compared it against
  the `expected` type parameter. This allowed programs using these expressions in
  contexts expecting incompatible types to compile without errors. The fix adds the
  missing type comparison/unification with `expected`.
