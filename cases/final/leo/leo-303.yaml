description: The WriteTransforming and FunctionInlining compiler passes did not traverse
  stub declarations (external program interfaces), causing function inlining to fail
  when functions were defined in external Leo stubs. The fix adds Stub variant handling
  to WriteTransforming's visitor and adds a post_order_with_filter on FunctionInlining
  to properly traverse stubs while limiting processing to the current program.
expected_findings:
- file: compiler/passes/src/write_transforming/visitor.rs
  line: 31
  summary: 'Missing Stub variant handling: WriteTransforming''s fill/visitor does
    not traverse Stub declarations, so external program stubs are skipped during write
    transformation'
- file: compiler/passes/src/function_inlining/program.rs
  line: 30
  summary: FunctionInlining does not use post_order_with_filter to traverse stubs;
    it should filter by current program and still visit stub function bodies for inlining
