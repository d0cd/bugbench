description: The `BinaryOperation::Ne` match arm in the pest AST-to-typed-AST conversion
  (`typed/src/expression.rs`) recursively calls itself instead of constructing the
  correct not-equals typed expression, causing infinite recursion and a stack overflow.
  The fix corrects the match arm to properly build the Ne expression node, and adds
  test coverage for the != operator across all integer types.
