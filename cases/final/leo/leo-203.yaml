description: The compiler was hardcoded to a specific network type (MainnetV0) instead
  of being generic over the Network trait. This prevented Leo from supporting different
  networks. The fix refactors the parser and compiler to accept a generic network
  type parameter throughout the codebase.
expected_findings:
- file: compiler/compiler/src/compiler.rs
  line: 58
  summary: Compiler struct is not generic over the Network trait, hardcoding it to
    a single network type instead of accepting any type implementing Network
- file: compiler/parser/src/parser/context.rs
  line: 43
  summary: ParserContext is not parameterized by a Network type, preventing the parser
    from handling network-specific address parsing generically
- file: compiler/parser/src/parser/expression.rs
  line: 36
  summary: Expression parsing uses concrete network type for address validation instead
    of being generic over the Network trait
