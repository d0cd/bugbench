description: Code generation for `ExpressionStatement`s was incorrect, causing them
  to not emit proper instructions. Additionally, dead code elimination was incorrectly
  handling `ExpressionStatement`s containing function calls, potentially eliminating
  side-effectful expressions. The fix corrects both the code generation visitor and
  the DCE pass to properly handle `ExpressionStatement`s.
expected_findings:
- file: compiler/passes/src/code_generation/visit_statements.rs
  line: 167
  summary: "ExpressionStatement code generation incorrectly handles the expression\
    \ output \u2014 `self.visit_expression(&input.expression).1` may not properly\
    \ emit or return the generated instructions for standalone expression statements."
- file: compiler/passes/src/dead_code_elimination/eliminate_statement.rs
  line: 151
  summary: Dead code elimination does not properly preserve ExpressionStatements that
    contain function calls with side effects, potentially eliminating them when they
    should be kept.
