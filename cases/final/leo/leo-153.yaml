description: The `leo build` command was writing a generic `main.leo` instead of the
  actual program being built, and `leo add` allowed adding local dependencies with
  duplicate paths without detecting or resolving the conflict. The fix writes the
  correct program name during build and overwrites old dependencies when duplicate
  paths are detected.
