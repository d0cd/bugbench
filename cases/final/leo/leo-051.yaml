description: The compiler's assignee resolution for mutable variables did not properly
  recurse into nested structures (e.g., array index access on a mutable parameter).
  When assigning to `a[i]` where `a` is a `mut` parameter, the `ConstrainedValue::Mutable`
  wrapper was not being unwrapped during assignee traversal, causing mutations to
  nested elements (array indices, tuple members) to silently fail or error. The fix
  adds recursive unwrapping of the Mutable variant in the assignee resolution logic.
expected_findings:
- file: compiler/src/statement/assign/assignee.rs
  line: 34
  summary: ConstrainedValue::Mutable is matched but the inner mutable_value is not
    recursively resolved for nested access patterns (array index, tuple index). Nested
    mutation like `a[i] = expr` fails because the assignee resolver stops at the Mutable
    wrapper instead of descending into the contained value.
  line_side: pre_fix
