description: The return indicator for function statements was stored as Option<Boolean>,
  allowing None values that caused incorrect return propagation in functions with
  multiple return paths or conditional returns. When all indicators were None, the
  compiler silently returned the last result, masking multiple-return errors and producing
  incorrect circuit constraints for inlined functions with conditional branches.
expected_findings:
- file: compiler/passes/src/function_inlining/inline_expression.rs
  line: 61
  summary: Parameter-to-argument map keyed by full Identifier (includes span) instead
    of just the Symbol name, causing lookups to fail when a function is inlined multiple
    times with different call-site spans
  line_side: pre_fix
- file: compiler/passes/src/function_inlining/inline_expression.rs
  line: 77
  summary: Looking up parameter replacements by full Identifier instead of by name
    Symbol, so arguments with matching names but different spans are not found in
    the map
  line_side: pre_fix
- file: compiler/parser/src/parser/expression.rs
  line: 251
  summary: Negation of literals only handled integers (via inner_is_integer guard),
    failing to produce negative literals for field, group, and scalar types, causing
    them to be parsed as unary negate expressions instead
  line_side: pre_fix
