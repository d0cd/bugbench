category: logic
difficulty: medium
severity: high
language: rust
pr_size: small
description: The Leo compiler did not parse definitions for imported files, causing
  nested imports (imports within imported files) to be unrecognized. The fix ensures
  that all import definitions are parsed by default when processing an import, so
  transitive dependencies are properly resolved.
expected_findings:
- file: compiler/src/import/store/import.rs
  line: 10
  summary: 'Missing call to parse definitions for imported files: when fetching dependencies
    for an import, the definitions of the imported program are not being parsed, causing
    nested imports to fail.'
- file: compiler/src/definition/definitions.rs
  line: 13
  summary: "Definitions are not being collected for imported programs \u2014 the definition\
    \ pass should be invoked for all imports, not just the top-level program."
- file: compiler/src/import/store/symbol.rs
  line: 11
  summary: When storing an imported symbol, the import's own definitions (including
    its nested imports) are not being processed before symbol resolution.
