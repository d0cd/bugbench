description: The deployment confirmation prompt was displaying the program name with
  a duplicate '.aleo' suffix (e.g., 'puzzle_arc_38.aleo.aleo'). The program name variable
  already included the '.aleo' extension, but the format string was appending it again.
  The fix removes the redundant '.aleo' from the format string.
