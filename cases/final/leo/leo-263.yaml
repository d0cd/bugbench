description: The `CallExpression` AST node stored its function target as a general
  `Expression` (likely `Box<Expression>`) when it should have been an `Identifier`.
  This overly permissive type allowed invalid AST states and complicated downstream
  compiler passes that all had to extract or match against the identifier pattern.
  The fix narrows the `function` field to `Identifier`, propagating the type change
  through the parser, code generation, type checking, and all other compiler passes.
expected_findings:
- file: compiler/ast/src/expressions/call.rs
  line: 24
  summary: The `function` field uses `Expression` (or `Box<Expression>`) where it
    should be `Identifier`, allowing structurally invalid call expressions in the
    AST.
- file: compiler/parser/src/parser/expression.rs
  line: 441
  summary: Parser constructs CallExpression with an Expression for the function field
    instead of directly using the parsed Identifier.
- file: compiler/passes/src/type_checking/expression.rs
  line: 813
  summary: Type checking must extract an identifier from a general Expression for
    call targets, adding unnecessary complexity and potential for unhandled expression
    variants.
