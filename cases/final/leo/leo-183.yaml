pr_title: Adds error when function defined more than once
pr_body: "Closes #829.\r\n\r\n## Motivation\r\n\r\nDescribed in the issue. \r\nShort:\
  \ we don't fail if main is defined more than once and it causes return type mismatch\
  \ for main function (if there's more than one main with different signature).\r\n\
  \r\n## Test Plan\r\n\r\nContains a test for this scenario. Should fail on ASG level.\r\
  \n"
