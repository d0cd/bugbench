description: The Leo compiler did not check for duplicate function definitions, silently
  accepting programs with multiple definitions of the same function (e.g., main).
  This caused confusing downstream errors such as return type mismatches instead of
  a clear duplicate-definition error at the ASG level.
expected_findings:
- file: asg/src/program/mod.rs
  line: 266
  summary: 'Missing duplicate-function check: when inserting a function into the program
    scope, there is no guard to detect that a function with the same name was already
    defined. Should error on duplicate instead of silently overwriting.'
  line_side: pre_fix
