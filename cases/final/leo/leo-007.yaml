description: 'Three related import-handling bugs in the Leo compiler parser: (1) PackageAccess::Star
  variant lacked span information, producing incomplete AST output; (2) the import
  grammar was incorrect; (3) empty import lists like `import bar.();` were not rejected
  by the parser. The fix adds span tracking to the Star variant, corrects the ABNF
  grammar, adds an ''invalid_import_list'' error, and validates non-empty import lists
  in the parser.'
expected_findings:
- file: ast/src/imports/package_access.rs
  line: 21
  summary: 'PackageAccess::Star variant is missing span information (should be `Star
    { span: Span }` instead of bare `Star`) causing incomplete AST serialization for
    star imports'
- file: parser/src/parser/file.rs
  line: 136
  summary: "parse_package_accesses does not validate against empty import lists \u2014\
    \ `import foo.();` should be rejected with an error but is silently accepted"
- file: grammar/abnf-grammar.txt
  line: 965
  summary: "Import declaration grammar rule is incorrect \u2014 does not properly\
    \ separate package-name from package-path, leading to grammar inconsistencies"
