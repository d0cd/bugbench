pr_title: Implement proper local scope duplication
pr_body: "Original PR: https://github.com/ProvableHQ/leo/pull/28903\r\n\r\n### Description\r\
  \nPreviously, during loop unrolling, local symbol tables were cloned but not duplicated\
  \ with fresh NodeIDs.\r\n\r\nThis change introduces proper duplication of local\
  \ scopes:\r\n\r\n- `SymbolTable::enter_scope_duped` now duplicates a local table\
  \ from an existing scope, generating a fresh `NodeID` internally and maintaining\
  \ parent/child relationships.\r\n- In loop unrolling, `Duplicator::in_scope_duped`\
  \ was updated to wrap the duplication logic and provide the new scope ID to its\
  \ closure, eliminating the need for manually generating NodeIDs externally.\r\n\
  - In loop unrolling, `reconstruct_block` and `reconstruct_iteration` now use `in_scope_duped`,\
  \ ensuring that each reconstructed scope has unique IDs and independent local tables.\r\
  \n\r\nCloses https://github.com/ProvableHQ/leo/issues/28743"
pr_commit_messages:
- fix duplication of children in the symbol during loop unrolling.
- Change duplication to make deep copies of the children
