description: The Leo compiler's ASG construction for iteration (loop) statements did
  not validate that loop range bounds are constant expressions. In a ZK circuit language,
  loop bounds must be known at compile time since they determine circuit structure.
  The fix adds a constness check in the iteration statement ASG builder and introduces
  a corresponding compiler error for non-constant loop bounds.
expected_findings:
- file: asg/src/statement/iteration.rs
  line: 57
  summary: Missing validation that iteration range start/stop expressions are constant.
    Loop bounds in a ZK circuit language must be compile-time constants; variable
    or input-dependent bounds should be rejected.
