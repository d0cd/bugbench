  summary: 'Missing InputsFile creation: `leo init` scaffolds a project but does not
    generate the required input file, leaving the inputs directory empty and causing
    downstream commands (prove, run) to fail when they expect an input file to exist.'
  line_side: pre_fix
- file: leo/commands/new.rs
  line: 77
  summary: "Missing InputsFile creation: `leo new` has the same omission as `leo init`\
