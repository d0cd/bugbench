description: The `leo init` and `leo new` CLI commands did not create input files
  when scaffolding a new project, leaving users without the required inputs directory
  structure. The fix updates both commands to generate an input file at `{root}/inputs/{package_name}.in`,
  standardizes file extensions across the codebase, and updates the compiler's input
  parsing to match the new paths.
