description: The Leo compiler's `to_usize` conversion was incorrectly treating circuit
  inputs (witnesses) as constants, which would produce incorrect constraint systems
  in zero-knowledge proofs. The fix involved updating the snarkVM dependency to a
  version that properly handles inputs as allocated variables rather than constants,
  with an additional fix for ternary/conditional select operations.
expected_findings:
- file: compiler/src/expression/array/access.rs
  line: 29
  summary: Array index access uses to_usize which incorrectly treats input variables
    as constants, breaking circuit constraint generation for dynamic array indexing
- file: compiler/src/expression/conditional/conditional.rs
  line: 20
  summary: Conditional/ternary expression evaluation uses CondSelectGadget which mishandles
    non-constant inputs, requiring updated snarkVM gadget implementation
- file: Cargo.toml
  line: 70
  summary: snarkVM dependency version pinned to version with bug where allocated inputs
    are treated as constants in to_usize and conditional select operations
