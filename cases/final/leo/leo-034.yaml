description: Duplicate struct/record member error diagnostics pointed to the entire
  struct/record span instead of the specific duplicate member's span. The code used
  `.all()` on the iterator which could not identify which specific member was duplicated,
  and passed `input.span()` (the whole struct) to error constructors instead of the
  individual member's `*span`.
