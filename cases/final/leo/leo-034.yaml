description: The `--nodeploy` flag for `leo node start` was not declared as a structopt
  CLI option, forcing users to pass it via the raw argument separator (`-- --nodeploy`).
  The fix adds a `#[structopt(long)]` attribute so `--nodeploy` is recognized as a
  first-class CLI flag, and updates the aleo dependency to a revision that supports
  it.
expected_findings:
- file: leo/commands/node.rs
