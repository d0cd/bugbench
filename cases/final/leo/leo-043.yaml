description: The Leo compiler's type checker did not validate struct initialization
  expressions against the expected type. This allowed code to return a struct or record
  where a different type (e.g., unit) was expected, passing type checking without
  error. The fix adds an explicit check comparing the struct init expression's type
  against the expected type.
