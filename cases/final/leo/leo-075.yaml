  summary: "Duplicate `#[clap(flatten)]` of `EnvOptions` \u2014 same issue as in `start.rs`.\
    \ The `EnvOptions` is already flattened in the parent `LeoDevnode` struct with\
    \ `global = true` fields, so flattening again in the subcommand triggers clap's\
