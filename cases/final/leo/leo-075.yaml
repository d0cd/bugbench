description: Duplicate `#[clap(flatten)]` of `EnvOptions` in both the parent `LeoDevnode`
  command and its `Start`/`Advance` subcommands. Because `EnvOptions` fields use `global
  = true`, clap's debug assertions detected duplicate global arg registration, crashing
  `leo devnode start` in debug builds. The fix removes the redundant flatten from
  the subcommands and threads the private key from the parent's `EnvOptions` through
  the `Input` associated type.
