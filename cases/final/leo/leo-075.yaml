description: The Leo compiler's type checking used strict equality (`eq_flat`) for
  type comparisons, which failed when futures appeared inside tuples. The fix introduces
  `eq_flat_relaxed`, a relaxed type equality method that properly handles non-explicit
  futures and structs with differing program origins, and applies it across the type
  checker, flattening pass, and symbol table.
