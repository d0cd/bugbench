description: "The Leo interpreter had multiple issues with binary operations: (1)\
  \ equality/inequality comparisons were missing for Address and Struct types, causing\
  \ runtime errors when comparing these types, (2) the modulo operator incorrectly\
  \ accepted signed integer types (i8\u2013i128) despite Leo's specification only\
  \ supporting mod for unsigned integers, and (3) assertion failure messages were\
  \ uninformative, making debugging difficult."
expected_findings:
- file: compiler/ast/src/interpreter_value/evaluate.rs
  line: 141
  summary: "Missing Address and Struct arms in equality comparison match \u2014 comparing\
    \ addresses or structs will fall through to an error case instead of returning\
    \ a valid boolean result"
  line_side: pre_fix
- file: compiler/ast/src/interpreter_value/evaluate.rs
  line: 754
  summary: "Modulo (%) incorrectly implemented for signed integer types (I8\u2013\
    I128); Leo only supports mod for unsigned integers, so these arms should not exist\
    \ and will produce incorrect results for programs that should be rejected"
  line_side: pre_fix
- file: interpreter/src/cursor.rs
  line: 489
  summary: "Assert failure error message lacks context \u2014 should include the actual\
    \ values that failed comparison to aid debugging (currently just says 'assert\
    \ failure')"
  line_side: pre_fix
