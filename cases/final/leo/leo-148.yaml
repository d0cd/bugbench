description: The Leo compiler did not validate that a function's declared return type
  matched the output register type, allowing type mismatches to silently pass. The
  fix adds a type check in output_bytes.rs that compares the return type against the
  output register type, raising a new ValueError when they do not match.
expected_findings:
- file: compiler/src/output/output_bytes.rs
  line: 63
  summary: 'Missing type check: the output register type is not validated against
    the function''s declared return type, allowing silent type mismatches at the output
    boundary'
- file: compiler/src/errors/output_bytes.rs
  line: 14
  summary: No error variant exists for output register type vs return type mismatch,
    so the compiler cannot report this class of type error
