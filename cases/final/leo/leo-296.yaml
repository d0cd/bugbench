description: 'The interpreter incorrectly relied on calling the full type checker
  to resolve types, which caused failures (issue #28722). The fix removes the type
  checker dependency and instead implements manual type inference by threading an
  optional `expected_ty` through expression frames. Additionally, scalar comparisons
  and external struct handling were broken and are now fixed.'
expected_findings:
- file: interpreter/src/interpreter.rs
  line: 65
  summary: "The interpreter calls the type checker to resolve types, but this is incorrect\
    \ \u2014 it causes failures when the type checker encounters constructs the interpreter\
    \ should handle differently. Type resolution should be done manually via expected\
    \ type propagation."
- file: compiler/ast/src/interpreter_value/evaluate.rs
  line: 90
  summary: 'Missing Scalar comparison support: scalar values (Scalar(x), Scalar(y))
    are not handled in comparison operations, causing runtime failures for scalar
    comparisons.'
- file: compiler/passes/src/const_propagation/visitor.rs
  line: 142
  summary: "Unsuffixed literals are not handled in const propagation \u2014 they should\
    \ be recognized and returned as None (unevaluable) rather than causing errors\
    \ or incorrect behavior."
