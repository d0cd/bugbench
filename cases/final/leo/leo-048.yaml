pr_body: "# Fixes and Closes:\r\nCloses #986.\r\nCloses #987.\r\nCloses #997.\r\n\
  Closes #1049.\r\nCloses #1058.\r\n\r\nChanges:\r\n\r\n- Runs Canonicalization on\
