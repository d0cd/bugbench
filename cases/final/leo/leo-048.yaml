description: The Leo compiler's canonicalization pass only ran on non-simple assignments
  (gated by `assign.operation != AssignOperation::Assign`), causing compound assignments
  and certain expressions to bypass required transformations. Additionally, array
  initialization lacked const-value propagation, and array index assignment used an
  incorrect `from_range` context flag that broke dynamic array mutation.
expected_findings:
- file: ast/src/reducer/canonicalization.rs
  line: 593
  summary: "Canonicalization guard `assign.operation != AssignOperation::Assign` is\
    \ too restrictive \u2014 canonicalization must run on ALL assignments, not just\
    \ compound ones, otherwise certain assignment forms (e.g. involving arrays or\
    \ strings) are never canonicalized."
  line_side: pre_fix
- file: asg/src/expression/array_init.rs
  line: 54
  summary: 'Missing const-value propagation for array-init expressions: `const_value()`
    is not implemented, so constant-folding cannot evaluate `[expr; N]` at compile
    time, leading to incorrect ASG output.'
  line_side: pre_fix
- file: compiler/src/statement/assign/assignee/mod.rs
  line: 35
  summary: 'The `from_range: bool` field on the assignee context conflates array-index
    and array-range-index code paths, causing incorrect code generation for dynamic
    array mutation assignments.'
  line_side: pre_fix
