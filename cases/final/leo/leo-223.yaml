description: A regression in the Leo interpreter caused tests not to run because the
  source file collection logic did not properly associate main Leo files with their
  modules. The fix restructures `Interpreter::new` to accept `(PathBuf, Vec<PathBuf>)`
  tuples pairing each main file with its modules, and introduces `collect_leo_paths`/`collect_aleo_paths`
  utilities to correctly gather and associate files from package programs.
expected_findings:
- file: interpreter/src/interpreter.rs
  line: 65
  summary: Interpreter::new signature accepts flat file list without module association,
    causing modules to be incorrectly partitioned and not linked to their main files
- file: leo/cli/commands/test.rs
  line: 63
  summary: Test command collects Leo source files without distinguishing main files
    from modules, so the interpreter receives an incorrect file set and tests fail
    to run
- file: leo/cli/commands/build.rs
  line: 139
  summary: Build command uses a flat source directory scan instead of recursively
    collecting and pairing main files with their modules
