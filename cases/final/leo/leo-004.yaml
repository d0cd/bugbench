description: The ASG's binary expression type-checking did not properly handle Field
  and Group types for addition operations, causing valid field/group addition expressions
  to be rejected by the compiler. The fix adds pattern matching arms for PartialType::Type(Type::Field)
  (and likely Type::Group) in the binary expression resolver, allowing these types
  to pass through type resolution correctly.
