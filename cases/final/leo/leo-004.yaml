description: The Leo PEG grammar did not correctly handle the lower-bound-omitted
  array slice syntax (`arr[..2]`). The range rule likely required both operands, causing
  `arr[..N]` slices to fail at the parsing stage. The fix adjusts the grammar to make
  the left-hand side of the range operator optional.
expected_findings:
- file: grammar/src/leo.pest
  line: 70
  summary: Range grammar rule does not allow omitting the left operand; `arr[..2]`
    fails to parse because both sides of `range_operator` are required
  line_side: pre_fix
- file: grammar/src/common/range.rs
  line: 20
  summary: "Range AST node derived from the PEG grammar inherits the same limitation\
    \ \u2014 its `from` field is not Optional, so a lower-omitted slice cannot be\
    \ represented"
  line_side: pre_fix
