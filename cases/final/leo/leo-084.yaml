description: Position commands in the finalize executor were returned without incrementing
  the instruction index, causing an infinite loop. The executor would repeatedly fetch
  the same Position command since control flow never advanced past it. The fix increments
  the instruction index when encountering a Position command, aligning with how other
  commands advance control flow.
