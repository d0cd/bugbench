description: Collection of parser and tokenizer bugs in the Leo compiler including
  incorrect column-stop calculation in the canonicalizer (off-by-one byte indexing
  for escape sequences), wrong error emission in the parser for non-identifier tokens,
  broken character literal parsing in the lexer (escape, hex, unicode handling), incorrect
  span/line tracking in the tokenizer, and a test framework bug that silently skipped
  test files or mismatched expected outputs.
expected_findings:
- file: compiler/ast-passes/src/canonicalization/canonicalizer.rs
  line: 550
  summary: 'Incorrect col_stop calculation: byte-level check `bytes[col_start - 1]
    == b''\\''` uses wrong index or logic for determining escaped character span boundaries,
    causing wrong source spans for char literals in canonicalized AST.'
  line_side: pre_fix
- file: compiler/parser/src/tokenizer/lexer.rs
  line: 66
  summary: "eat_char function has incorrect control flow for escaped/hex/unicode character\
    \ parsing \u2014 fails to properly handle edge cases like overlong unicode escapes\
    \ (e.g. \\u{110000}) and unterminated escape sequences, producing wrong tokens\
    \ or panics."
  line_side: pre_fix
- file: compiler/parser/src/tokenizer/mod.rs
  line: 56
  summary: "Span calculation `input[line_start..].find('\\n').unwrap_or(input.len())`\
    \ is incorrect \u2014 when no newline is found, it should use the remaining length\
    \ from line_start, not total input length, producing wrong column numbers in error\
    \ spans."
  line_side: pre_fix
