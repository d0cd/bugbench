description: 'The Display implementations for AST nodes in the Leo compiler produced
  incorrect output: binary, cast, ternary, and unary expressions did not parenthesize
  sub-expressions based on operator precedence, statements had incorrect semicolon
  placement, and various formatting details were wrong. The fix introduces a precedence()
  method on Expression and uses it in Display implementations to conditionally wrap
  sub-expressions in parentheses, along with correcting semicolon and formatting logic
  throughout the AST printer.'
expected_findings:
- file: compiler/ast/src/expressions/binary.rs
  line: 179
  summary: Binary expression Display does not compare sub-expression precedence to
    decide whether parentheses are needed, leading to ambiguous or incorrect output
    like `a + b * c` printed without grouping.
- file: compiler/ast/src/expressions/cast.rs
  line: 33
  summary: Cast expression Display does not check `self.expression.precedence()` to
    determine if the inner expression needs parentheses, producing incorrect output
    for lower-precedence sub-expressions.
- file: compiler/ast/src/expressions/ternary.rs
  line: 33
  summary: Ternary expression Display does not check condition precedence to wrap
    it in parentheses when needed, producing ambiguous output for nested ternary or
    low-precedence conditions.
- file: compiler/ast/src/statement/mod.rs
  line: 81
  summary: Statement Display implementation does not correctly determine which statements
    require a trailing semicolon, resulting in semicolons after block statements or
    missing semicolons after expression statements.
