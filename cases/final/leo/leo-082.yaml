pr_title: Fix an issue with SSA trying to replace global vars.
pr_body: "- Fix to SSA where in some cases, it was trying to SSA paths to external\
  \ global variables when they have the same name as a local variable.\r\n  - The\
  \ issue was especially apparent for external mapping accesses inside loops such\
  \ as:\r\n  ```leo\r\n  for i in 0u32..2u32 {\r\n      let foo = child.aleo/foo.get_or_use(i,\
  \ 42);\r\n      assert(foo == 42);\r\n  }\r\n  ```\r\n  where the name `foo` of\
  \ a local variable matches the global name `foo` from `child.aleo`.\r\n- Fix type\
  \ inference for `get_or_use` so that unsuffixed numerics work.\r\n- Tidy up how\
  \ intrinsics are type checked in general. For vector and mapping ops specifically,\
  \ make all of those intrinsics follow the same pattern.\r\n- The test I added stresses\
  \ both cases.\r\n\r\nCloses #29134"
