description: The SSA (Static Single Assignment) pass incorrectly attempted to rename
  paths to external global variables when they shared the same name as a local variable.
  This was especially problematic for external mapping accesses inside loops (e.g.,
  `child.aleo/foo.get_or_use(...)` where `foo` is also a local variable name). The
  fix adds a guard (`try_local_symbol()`) to only apply SSA renaming to genuinely
  local symbols. A secondary fix corrects type inference for `get_or_use` so unsuffixed
  numeric literals work correctly.
expected_findings:
- file: compiler/passes/src/static_single_assignment/expression.rs
  line: 211
  summary: SSA renaming applied to all symbol paths without checking if they are local
    variables. Paths to external global variables (e.g., `child.aleo/foo`) should
    be excluded from SSA renaming; need to guard with `try_local_symbol()` before
    replacing.
  line_side: pre_fix
- file: compiler/passes/src/type_checking/visitor.rs
  line: 309
  summary: Mapping intrinsic type checking (e.g., `get_or_use`) does not properly
    infer types for unsuffixed numeric arguments. The argument destructuring and type
    propagation pattern needs to match other intrinsics to allow type inference to
    flow correctly.
  line_side: pre_fix
