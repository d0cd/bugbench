description: The AST reconstructor pass failed to properly rename variables in certain
  expression contexts during function inlining. This caused incorrect variable references
  after inlining, potentially leading to wrong program behavior. The fix corrects
  the renaming logic in the reconstructor to handle these cases (such as struct init
  expressions and tuple returns from inlined functions).
