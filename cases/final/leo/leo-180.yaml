description: The CallExpression AST node stored its function target as a generic Expression,
  but Leo only supports calling named functions (not arbitrary expressions). This
  overly permissive type allowed the parser to accept invalid call expressions and
  forced every compiler pass to pattern-match or destructure the Expression to extract
  the function name, risking panics or silent mishandling if a non-Identifier expression
  appeared. The fix narrows the field to Identifier, enforcing the invariant at the
  type level.
expected_findings:
- file: compiler/ast/src/expressions/call.rs
  line: 24
  summary: "CallExpression.function is typed as Expression but should be Identifier\
    \ \u2014 the overly broad type defeats static guarantees and forces every consumer\
    \ to destructure/match to get the function name"
  line_side: pre_fix
- file: compiler/parser/src/parser/expression.rs
  line: 441
  summary: CallExpression is constructed with a general Expression for the function
    field; should directly use the parsed Identifier to enforce that only named function
    calls are representable
  line_side: pre_fix
- file: interpreter/src/cursor.rs
  line: 815
  summary: "Interpreter must destructure the Expression to extract the function name\
    \ and program \u2014 fragile pattern that would break or panic on unexpected expression\
    \ variants"
  line_side: pre_fix
