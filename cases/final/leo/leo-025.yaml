description: The Leo compiler's type checker panicked when encountering an unknown/undefined
  variable because it assumed all variables would be resolved during type inference.
  The fix adds graceful error handling at multiple sites in check_expressions.rs where
  function arguments are iterated, emitting a proper compiler error instead of panicking.
expected_findings:
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 677
  summary: 'Missing error handling for unknown variables: iterating over function
    arguments assumes all variable types are known, which causes a panic if an undefined
    variable is passed as an argument.'
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 691
  summary: 'Same assumption violation: function argument type lookup can panic on
    unknown variables instead of emitting a compiler error.'
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 709
  summary: 'Same assumption violation: function argument type lookup can panic on
    unknown variables instead of emitting a compiler error.'
