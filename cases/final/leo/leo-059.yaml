description: The Pedersen hash example initialized its generator parameters with `[0group;
  256]` (the group identity/zero element), making the hash trivially degenerate since
  all commitments would collapse to zero. The fix adds `1group` syntax to the Leo
  compiler (via the `One` trait on `EdwardsGroupType`) to expose the curve's affine
  generator point, and updates the example to use `[1group; 256]`.
