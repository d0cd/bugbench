description: The Leo compiler's value assignment logic in value.rs did not handle
  the case of assigning a mutable variable to another mutable variable. This caused
  incorrect behavior for nested mutable let bindings. The fix adds the missing case
  handling around line 229 in value.rs to properly propagate mutability during variable-to-variable
  assignment.
expected_findings:
- file: compiler/src/value/value.rs
  line: 229
  summary: 'Missing match arm or condition for mutable-to-mutable variable assignment:
    when both source and target are mutable, the value/mutability is not properly
    propagated during assignment.'
