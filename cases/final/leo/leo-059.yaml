  summary: "Pedersen hash parameters initialized with `[0group; 256]` (identity element)\
    \ instead of generator points \u2014 this makes the hash function cryptographically\
    \ degenerate, producing zero for all inputs"
  line_side: pre_fix
- file: compiler/src/group/edwards_bls12.rs
  line: 33
  summary: "Missing `One` trait implementation for `EdwardsGroupType` \u2014 the group\
    \ type has no way to produce the affine generator point, preventing `1group` literal\
    \ syntax"
  line_side: pre_fix
- file: compiler/src/group/mod.rs
  line: 25
  summary: The `GroupType<F>` trait bound does not require `One`, so group implementations
    are not required to provide a generator/identity-one element
  line_side: pre_fix
