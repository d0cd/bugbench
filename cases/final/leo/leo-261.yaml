description: The Leo language renamed its 'struct' concept to 'circuit' to better
  reflect the domain (zero-knowledge circuits). This required updating the PEG grammar
  (leo.pest), AST node types, constraint generation, type definitions, display implementations,
  and type conversions throughout the compiler. Without this change, the language
  syntax and internal representations were inconsistent with the intended circuit-based
  terminology.
expected_findings:
- file: compiler/src/leo.pest
  line: 73
  summary: "Grammar rule should use 'circuit' keyword instead of 'struct' \u2014 the\
    \ pest grammar defines the parser and drives AST generation"
- file: compiler/src/types.rs
  line: 145
  summary: "Type definitions use 'Struct' naming where 'Circuit' is the correct domain\
    \ term \u2014 struct types should be renamed to Circuit, CircuitObject, CircuitMember"
- file: compiler/src/ast.rs
  line: 174
  summary: "AST nodes reference 'type_struct' pest rule which no longer exists after\
    \ grammar rename to 'type_circuit' \u2014 AST must match grammar rules"
