description: The Leo CLI's `run` and `execute` commands incorrectly accepted input
  files as arguments, which was not the intended interface. The fix removes the input
  file parameters from the CLI command structs in execute.rs and run.rs, updates the
  CLI dispatch logic in cli.rs, and adjusts the CI test scripts to no longer pass
  input file arguments.
