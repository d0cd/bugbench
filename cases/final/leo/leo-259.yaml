description: The Leo compiler did not support mutating circuit member variables via
  the `self` keyword in circuit methods (e.g., `self.a = new`). The fix introduces
  a `KeywordOrIdentifier` AST node so assignees can be either `self` or an identifier,
  threads a `declared_circuit_reference` string through function and statement enforcement
  to track the enclosing circuit context, and updates the assignment logic to resolve
  `self` to the correct circuit variable for mutation.
expected_findings:
- file: compiler/src/statement/assign/assign.rs
  line: 19
  summary: "Assignment enforcement does not handle `self` as a valid assignee target\
    \ \u2014 only plain identifiers are supported, so `self.field = expr` silently\
    \ fails or errors"
- file: compiler/src/expression/function/function.rs
  line: 35
  summary: Circuit method invocation does not propagate the caller's circuit reference
    into the method body, so `self` inside the method cannot resolve to the calling
    instance
- file: compiler/src/function/function.rs
  line: 47
  summary: Function enforcement signature lacks a `declared_circuit_reference` parameter,
    preventing circuit context from being available when enforcing statements that
    mutate self
