description: The code generation pass iterates over `self.futures` by reference (`&self.futures`),
  which leaves the collection populated after the loop. This means futures accumulate
  across calls and are never consumed, producing incorrect or duplicated future inputs
  in the generated finalize block. The fix uses `drain(..)` to consume and clear the
  collection during iteration.
expected_findings:
