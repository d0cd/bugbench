description: The Leo compiler was missing validation to reject records containing
  other records (nested records), which is not allowed. Additionally, code generation
  for records containing circuits was incorrect. The fix adds type-checking passes
  to detect nested records and emits proper errors, and fixes the codegen for circuit
  members in records.
