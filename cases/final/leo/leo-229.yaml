  line: 24
  summary: 'Missing validation: record types should be checked for nested record members,
    but no such check exists in the type checker'
- file: compiler/passes/src/type_checking/checker.rs
  line: 332
  summary: No check exists to emit an error when a record or circuit member is itself
    a record type, allowing invalid nested records to pass type checking
- file: compiler/passes/src/code_generation/visit_program.rs
