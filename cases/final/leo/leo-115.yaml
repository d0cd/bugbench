description: The Leo compiler's type checker produced unhelpful error messages when
  function calls had mistyped arguments. The fix adds Span tracking to function parameter
  symbols (in FunctionSymbol) and updates the expression type checker to emit more
  descriptive error messages that indicate the expected vs actual types at the call
  site.
expected_findings:
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 455
  summary: Function call type checking does not produce informative error messages
    when argument types don't match parameter types; should report expected vs actual
    types with source spans.
- file: compiler/passes/src/symbol_table/function_symbol.rs
  line: 38
  summary: Function parameter symbol lacks a Span field to track the source location
    of the parameter's declared type, preventing informative error messages on type
    mismatch.
