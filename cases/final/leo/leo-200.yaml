description: Fee calculation in deploy and execute commands did not account for consensus
  block height. The code always used the old, more expensive fee calculation instead
  of conditionally switching to the cheaper V2 fee calculation when the block height
  exceeds CONSENSUS_V2_HEIGHT. The fix adds height-based branching to select the appropriate
  fee computation.
expected_findings:
- file: leo/cli/commands/deploy.rs
  line: 160
  summary: "Base fee calculation does not check consensus height \u2014 should branch\
    \ on CONSENSUS_V2_HEIGHT to use cheaper fee when applicable"
- file: leo/cli/commands/execute.rs
  line: 193
  summary: "Execution cost calculation does not consider block height \u2014 should\
    \ use execution_cost_v2 when height exceeds CONSENSUS_V2_HEIGHT"
- file: leo/cli/commands/mod.rs
  line: 210
  summary: "Fee options struct lacks height-aware base fee field \u2014 needs to support\
    \ conditional fee selection based on consensus version"
