description: Circuit init and circuit access expressions did not implement constant
  value propagation, causing constant folding to fail for circuit types. The fix adds
  a Circuit variant to ConstValue and implements const_value() for circuit_access
  and circuit_init expressions, using a map of identifier names for efficient member
  lookups.
