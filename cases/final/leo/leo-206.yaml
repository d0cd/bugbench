description: The Leo compiler's type checker did not distinguish between real function
  definitions and external function stubs when checking for variable shadowing. This
  caused false 'shadowed variable' errors when importing external functions whose
  input parameter names overlapped with local variables. The fix adds an `is_stub`
  flag to the type checker to skip shadowing checks during stub traversal.
expected_findings:
- file: compiler/passes/src/type_checking/checker.rs
  line: 57
  summary: 'Missing `is_stub` flag on the type checker: the checker has no way to
    distinguish stub traversal from real function traversal, causing shadowing checks
    to be incorrectly applied to external function input parameters.'
- file: compiler/passes/src/type_checking/check_program.rs
  line: 28
  summary: When entering a function or transition for type checking, `is_stub` is
    not reset to false, so the checker cannot correctly gate shadowing checks based
    on whether we are inside a stub.
- file: compiler/ast/src/stub/function_stub.rs
  line: 315
  summary: Stub function inputs may not carry proper identifier information (`arg_name`),
    preventing the type checker from correctly handling input names during stub processing.
