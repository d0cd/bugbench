description: The code generation pass for Leo's finalize blocks used the wrong output
  type, causing incorrect Aleo instructions to be emitted. The fix corrects how the
  output type is resolved for finalize blocks in visit_statements.rs, ensuring the
  finalize-specific return type is used instead of the parent function's return type.
  The PR also modernizes format strings across the AST codebase to use Rust's inline
  variable capture syntax.
