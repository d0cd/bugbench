description: When parsing nested imports, the import parser created a fresh default
  instance via `Self::default()` instead of cloning the current parser state with
  `self.clone()`. This caused the parser to lose track of already-visited imports,
  leading to infinite recursion (stack overflow) when circular import chains were
  encountered. The fix clones the current parser so that visited-import state is preserved
  across recursive calls.
expected_findings:
- file: imports/src/parser/import_parser.rs
  line: 55
  summary: Using `Self::default()` to create the sub-parser discards visited-import
    tracking state, enabling infinite recursion on circular imports. Should use `self.clone()`
    to carry forward already-seen imports.
