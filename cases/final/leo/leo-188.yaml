description: The AST canonicalization pass did not replace `Self` references in static
  call expressions (e.g., `Self::function_name()`) with the actual circuit/type name.
  This meant that `Self` in static call position survived into later compiler phases
  unchanged, causing resolution failures. The fix extends the canonicalization reducer
  to handle `Self` in static calls, analogous to the existing handling for other `Self`
  type positions.
expected_findings:
- file: ast/src/reducer/canonicalization.rs
  line: 47
  summary: "Missing canonicalization of `Self` in static call expressions \u2014 `Self::method()`\
    \ is not rewritten to `ActualType::method()`, causing downstream resolution failures"
  line_side: pre_fix
- file: ast/src/reducer/reconstructing_director.rs
  line: 50
  summary: The reconstructing director's expression reduction does not account for
    canonicalized static call targets, allowing un-canonicalized `Self` identifiers
    to pass through unchanged
  line_side: pre_fix
- file: ast/src/types/type_.rs
  line: 70
  summary: Type equality check does not handle `SelfType` canonicalization, so `Self`
    and the actual named type may compare as unequal
  line_side: pre_fix
