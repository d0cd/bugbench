description: The `leo devnet --storage` flag was not functioning correctly, likely
  due to the storage directory option not being properly wired through the CLI command
  to the underlying snarkOS process invocation. The fix corrects the flag handling
  in the devnet command module and utilities, and adds integration tests to verify
  the behavior.
expected_findings:
- file: crates/leo/src/cli/commands/devnet/mod.rs
  line: 52
  summary: The --storage CLI flag was not correctly propagated or parsed, causing
    the storage directory configuration to be ignored when launching the devnet.
- file: crates/leo/src/cli/commands/devnet/utilities.rs
  line: 73
  summary: The storage path was not being passed to the spawned snarkOS subprocess
    Command, so the --storage flag had no effect on the launched nodes.
