description: The compiler's value selection logic (used for conditional/ternary expressions)
  was missing a match arm for the (Tuple, Tuple) case in value.rs. When a function
  tried to conditionally return one of two tuples, the missing match arm caused a
  runtime error. The fix adds a (ConstrainedValue::Tuple, ConstrainedValue::Tuple)
  match arm that recursively selects between corresponding tuple elements.
expected_findings:
- file: compiler/src/value/value.rs
  line: 457
  summary: Missing match arm for (ConstrainedValue::Tuple, ConstrainedValue::Tuple)
    in the conditional select/enforce logic. Selecting between two tuple values at
    runtime will panic or error because this variant pair is unhandled.
