description: 'Logos lexer''s #[token] attribute only matches exact string literals
  and does not interpret regex metacharacters. The definitions for group::*, signature::*,
  and Future::* incorrectly used #[token(r"...[a-zA-Z]...")] instead of #[regex(r"...")],
  so the patterns never matched real code like group::GEN, signature::verify, or Future::await.
  The fix changes #[token] to #[regex] for these three entries.'
expected_findings:
- file: compiler/parser-lossless/src/tokens.rs
  line: 109
  summary: 'Incorrect use of #[token] with a regex pattern string; #[token] matches
    the literal string and does not interpret regex metacharacters. Should be #[regex(...)]
    so that character classes like [a-zA-Z] are evaluated as regex.'
