pr_title: '[Fix] Fixes the random flying bug with duplicates'
pr_body: "Fixes the well known #1398.\r\n\r\n## Motivation\r\n\r\nThis bug was distracting\
  \ us when verifying correctness of the CIs. \U0001F606 \r\nStatistically it appeared\
  \ once in a hundred runs ~ roughly 1% of all runs.\r\n\r\n## Implementation and\
  \ Whys\r\n\r\nAfter few hours of debugging I found that the bug was in keys comparison\
  \ inside IndexMap crate, and we use it as a storage for all top-level objects, so\
  \ the bug randomly appeared at different compiler stages: mostly in parser and canonicalization.\r\
  \n\r\nIt happened because of the hash collisions that rarely appeared on `indexmap.insert()`\
  \ call. In that case IndexMap was falling back to `PartialEq` implementation, and\
  \ it was only \"partially\" implemented causing wrong behavior. Hash trait implementation\
  \ was implemented correctly though.\r\n\r\n## Tests\r\n\r\nWays of testing are described\
  \ in #1398 in comments section. Locally tested on a 1000 runs which should be enough\
  \ to say that it's a success.\r\n\r\nOh and thanks to @Protryon for the tip with\
  \ collisions and eq impl."
pr_commit_messages:
- fixes the random flying bug with duplicates
- fixes PartialEq use in circuit member assign
