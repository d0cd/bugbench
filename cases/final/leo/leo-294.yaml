description: The monomorphization pass failed to const-evaluate const generic arguments
  before generating monomorphized names. When a const generic like `Foo::[2 * N]`
  was substituted to `Foo::[2 * 8]`, it could not be monomorphized because `2 * 8`
  is an expression, not a literal. The fix adds const-evaluation of all const arguments
  prior to monomorphization and also fixes array equality comparison logic.
expected_findings:
- file: compiler/passes/src/monomorphization/ast.rs
  line: 31
  summary: 'Const arguments are not const-evaluated before monomorphization: expressions
    like `2 * 8` are passed through as-is instead of being reduced to literals (e.g.,
    `16`), causing monomorphization to fail when const generics involve non-trivial
    expressions.'
- file: compiler/ast/src/types/type_.rs
  line: 74
  summary: Array/composite type equality comparison (`eq_flat_relaxed`) does not properly
    handle unevaluated const expressions, leading to type mismatches when comparing
    structurally equivalent types with different expression forms of the same const
    value.
