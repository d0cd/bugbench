pr_title: Fix the AssignmentMissing error involving non-constant addresses
pr_body: "## Motivation\r\n\r\nThis PR is aimed to fix #1161 and #1162. \r\n\r\nTo\
  \ do conditional selections of addresses, additional allocations for witnesses are\
  \ needed. Such allocations use `alloc_helper`, which fails if the constraint system\
  \ is in the setup mode.\r\n\r\nThis PR does the following: during the setup, the\
  \ default address is being used as the placeholder.\r\n\r\n## Test Plan\r\n\r\n\
  I compiled Leo and ran it within Aleo Studio with the two programs in #1161 and\
  \ #1162. It appears to run correctly.\r\n\r\nCan someone see if the fuzzer is now\
  \ satisfied with this change?\r\n\r\n## Related PRs\r\n\r\n#1161 and #1162."
