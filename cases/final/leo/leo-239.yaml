description: The Leo compiler used the `static` keyword for circuit member functions,
  which did not properly distinguish between functions that need read access to circuit
  instance members (`self`) versus those that mutate them (`mut self`). This PR transitions
  the language to use `self` and `mut self` keywords, enforcing proper mutability
  checks on circuit member access and assignment.
expected_findings:
- file: compiler/src/expression/circuit/static_access.rs
  line: 56
  summary: "Static access resolution does not account for `self`/`mut self` function\
    \ variants \u2014 circuit member functions accessed via `::` should only match\
    \ functions without self parameter (true static functions)"
- file: compiler/src/statement/assign/circuit_variable.rs
  line: 61
  summary: Circuit variable assignment does not check whether the function was called
    with `mut self`, allowing mutation of circuit members without the required mutability
    qualifier
- file: compiler/src/function/function.rs
  line: 42
  summary: Function input processing does not handle `SelfKeyword` and `MutSelfKeyword`
    input variants, failing to bind the circuit instance to `self` in the function
    scope
