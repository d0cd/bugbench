description: The 'leo build' command failed to compile programs because the Compiler::init()
  call in the build command was using an outdated signature that no longer matched
  the compiler's API. The fix updated the Compiler initialization in build.rs to pass
  the correct parameters (including InputValue and Program types), added proper error
  handling for current directory access, and updated tests to match the new model.
