- file: compiler/passes/src/type_checking/check_statements.rs
  line: 322
  summary: 'Missing validation: loop bounds are not checked to be literals. Non-literal
    expressions (variables, function calls) are silently accepted as loop bounds when
    they should produce a type-checker error.'
