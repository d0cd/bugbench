description: The Leo compiler's type checker did not validate that loop bounds must
  be literal values, allowing non-literal expressions (e.g., variables) as loop bounds
  without producing a compiler error. The fix adds an explicit check in the statement
  type-checking pass that emits a new error when a loop bound is not a literal expression.
