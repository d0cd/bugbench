description: The stateRoot query endpoint included a leading slash in its path segment,
  producing a double-slash URL like `http://localhost:3030/testnet//stateRoot/latest`.
  This caused a 404 error because the node's HTTP server does not normalize double
  slashes. The fix removes the leading slash to be consistent with other query commands.
