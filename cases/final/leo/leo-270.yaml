description: The write-transforming compiler pass was not correctly capturing intermediate
  statements generated during expression transformation. When array writes involved
  struct initialization, the generated statements were silently dropped, leading to
  incorrect compiled output. The fix ensures all intermediate statements are properly
  accumulated and returned alongside the transformed expression.
expected_findings:
- file: compiler/passes/src/write_transforming/expression.rs
  line: 215
  summary: Statements generated during expression write-transformation are not being
    captured/returned. The return value should include the accumulated `statements`
    vector, but they are being discarded, causing incorrect codegen for array writes
    with struct initialization.
