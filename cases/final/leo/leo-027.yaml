description: The type checker did not properly validate member access on structs,
  allowing invalid member accesses to pass type checking. The fix corrects the type
  checking logic in check_expressions.rs to properly resolve and validate the type
  of struct member accesses, and adjusts the parser span for member access expressions.
expected_findings:
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 143
  summary: 'Incorrect type checking for struct member access: the match arm for Some(Member
    { type_, .. }) does not properly validate or propagate the member''s type, allowing
    invalid accesses to compile.'
  line_side: pre_fix
- file: compiler/parser/src/parser/expression.rs
  line: 389
  summary: 'Incorrect span computation for member access expression: span should cover
    the full expression including the accessed member name.'
  line_side: pre_fix
