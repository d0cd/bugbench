description: The Leo compiler's type checker did not enforce the Aleo VM limit of
  15 transitions per program. Programs with more than 15 transitions would compile
  successfully but fail at deployment time. The fix adds a transition count check
  in the type checking pass and introduces a new error type, along with a `last_err()`
  method on the error handler to properly propagate accumulated errors after compiler
  passes complete.
expected_findings:
- file: compiler/passes/src/type_checking/check_program.rs
  line: 27
  summary: 'Missing validation: visit_program does not check whether the number of
    transition functions exceeds the VM limit of 15, allowing invalid programs to
    compile.'
- file: compiler/passes/src/type_checking/mod.rs
  line: 39
  summary: "Errors emitted during type checking (such as too-many-transitions) are\
    \ not propagated after the pass completes \u2014 needs a last_err() check to surface\
    \ accumulated errors."
- file: errors/src/emitter/mod.rs
  line: 239
  summary: Missing last_err() method on Handler to retrieve the last emitted error,
    needed for post-pass error propagation in compiler passes.
