pr_body: "Fix paths on zip package\r\n\r\n## Motivation\r\n\r\nThe `apm-backend` server\
  \ fails when it receives the wrong zip file of the package. The `apm-backend` throws\
  \ an error when it tries to create a file on nonexistent path\r\n\r\nIt follows\
  \ due to `Zip.write` generates zip file with wrong file path in it. It exclude `inputs`\
  \ folder, but include `inputs/<pack_name>.state` file. It writes zip file like this:\r\
  \n```\r\n- inputs/<pack_name>.state\r\n- Leo.toml\r\n- src/\r\n- src/main.leo\r\n\
  ```\r\n"
