description: The Leo compiler did not support the `self` keyword within circuit functions,
  preventing circuits from referencing their own members or calling their own methods.
  The fix introduces a `SELF_KEYWORD` constant, scope-checking logic (`is_in_scope`),
  and expression-resolution paths that resolve `self.member` and `self.method()` references
  against the enclosing circuit's definition.
expected_findings:
- file: compiler/src/constraints/expression.rs
  line: 34
  summary: 'Missing handling for `self` keyword in expression resolution: circuit
    member/function access via `self.x` is not recognized, causing compile errors
    for valid circuit self-references.'
- file: compiler/src/constraints/program.rs
  line: 14
  summary: No scope-checking utility exists to determine whether a variable reference
    (like `self`) is valid within the current circuit scope, preventing proper resolution
    of self-referential expressions.
- file: types/src/common/identifier.rs
  line: 13
  summary: Identifier type does not recognize `self` or `Self` as special keywords,
    so the parser cannot distinguish self-references from regular identifiers in circuit
    contexts.
