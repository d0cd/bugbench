pr_body: "Original PR: https://github.com/ProvableHQ/leo/pull/28854\r\n\r\n## Motivation\r\
  \n\r\nWhen running `leo devnet` on a machine that already has a `tmux` server running,\
  \ the environment variables of the existing server are used. This results in `CONSENSUS_VERSION_HEIGHTS`\
  \ not being properly set.\r\n\r\n## Test Plan\r\n\r\nI tested this locally. Before\
  \ this change, I was getting the wrong `CONSENSUS_VERSION_HEIGHTS` (it was being\
  \ set to whatever it was set to when I started my `tmux` server).\r\nAfter this\
  \ change, the `devnet` starts with the correct consensus version heights.\r\n\r\n\
  ## Related PRs\r\n\r\nN/A"
