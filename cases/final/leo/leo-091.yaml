description: The compiler panicked with 'called Option::unwrap() on a Err value' when
  a loop iteration bound literal was too large for its integer type (e.g., a value
  exceeding u8::MAX used as a u8 bound). The Literal::Integer to Value conversion
  used .unwrap() on an integer parse result without handling the error case. The fix
  adds proper error propagation via ParseIntError in the value conversion and validates
  iteration bound literals in the type checker before attempting conversion.
expected_findings:
- file: compiler/ast/src/value/mod.rs
  line: 865
  summary: Unsafe .unwrap() on integer parse result in Literal::Integer to Value conversion.
    If the literal string is too large for the target integer type, this panics instead
    of returning a proper error.
  line_side: pre_fix
- file: compiler/passes/src/type_checking/check_statements.rs
  line: 349
  summary: Missing validation that iteration start-bound literal value fits within
    the declared integer type before converting Literal to Value.
  line_side: pre_fix
- file: compiler/passes/src/type_checking/check_statements.rs
  line: 366
  summary: Missing validation that iteration stop-bound literal value fits within
    the declared integer type before converting Literal to Value.
  line_side: pre_fix
