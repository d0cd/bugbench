description: Multiple compiler pass bugs in Leo's destructuring, option lowering,
  and type checking passes. Destructuring failed to handle tuple equality/inequality
  expansion and ternary reconstruction; option lowering crashed when `additional`
  was unexpectedly `None` and failed to register new expressions in the type table;
  type checking incorrectly wrapped result types of binary and unary expressions.
expected_findings:
- file: compiler/passes/src/destructuring/visitor.rs
  line: 106
  summary: 'Missing handling for binary expressions (==, !=) on tuples: tuple equality/inequality
    should be expanded into a fold of element-wise comparisons, and assert_eq/assert_neq
    on tuples should be expanded into per-element asserts.'
- file: compiler/passes/src/option_lowering/ast.rs
  line: 161
  summary: Newly created expressions during option lowering are not inserted into
    the type_table, causing lookups to fail later in the same pass when those expressions
    are referenced.
- file: compiler/passes/src/type_checking/ast.rs
  line: 769
  summary: Binary/unary expression result types are being incorrectly wrapped (e.g.,
    double-wrapped in Optional), causing downstream type mismatches. The raw result
    type should be returned without additional wrapping.
