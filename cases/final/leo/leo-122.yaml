description: Leo sets a custom panic hook for its own error reporting, but this hook
  remained active when invoking the Aleo CLI from within Leo commands (build, deploy,
  new, run). This caused Aleo CLI panics to be caught by Leo's handler, producing
  confusing or incorrect error messages. The fix calls `std::panic::take_hook()` to
  remove Leo's panic hook before invoking the Aleo CLI.
