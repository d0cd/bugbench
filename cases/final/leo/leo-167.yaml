description: The code generation mapping for commit core functions (BHP256/512/768/1024,
  Pedersen64/128) in the Leo compiler AST was incorrect, causing commit_to_address,
  commit_to_field, and commit_to_group operations to generate wrong Aleo instructions.
  The generated instructions had incorrect operand handling for the scalar randomizer
  argument, producing invalid output across all commit variants.
