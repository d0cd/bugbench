description: The Leo lexer and compiler did not reject unicode escape sequences missing
  curly braces (e.g., `\u123` instead of `\u{123}`). This allowed syntactically invalid
  unicode escapes to be silently accepted by the parser and compiler, producing incorrect
  behavior. The fix adds stricter validation to require the `\u{...}` format.
expected_findings:
- file: parser/src/tokenizer/lexer.rs
  line: 299
  summary: 'Missing error path: when `\u` is encountered and the next character is
    NOT `{`, the lexer falls through silently instead of emitting a parse error for
    malformed unicode escape syntax.'
  line_side: pre_fix
- file: compiler/src/value/char/char.rs
  line: 162
  summary: Display implementation for char values does not use the canonical `\u{...}`
    escape format, potentially round-tripping invalid representations.
  line_side: pre_fix
