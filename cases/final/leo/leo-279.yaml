description: The `--clear` flag on the `leo add` CLI command has been broken and non-functional
  for some time. Rather than fixing or immediately removing the flag, the fix hides
  it from the CLI help output using clap's `hide = true` attribute, effectively deprecating
  it since `leo remove` already covers the intended use case.
