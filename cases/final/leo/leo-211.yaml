description: 'Multiple bugs in the Leo compiler: (1) shadowing error spans pointed
  to the shadowed definition rather than the shadowing one (#1858), (2) token parsing
  failed to consume all characters until `;` or whitespace (#1840), (3) the `Const`
  enum variant in FunctionInput didn''t match the actual syntax (#1828), and (4) the
  ABNF grammar and parser keyword lists were out of sync (#1806). Fixes correct the
  error span target, token consumption logic, enum variant naming, and keyword list
  alignment.'
