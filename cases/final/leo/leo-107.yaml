description: The `select` (conditional ternary) operation on ConstrainedValue did
  not have a match arm for two Tuple variants, causing a runtime error when a function
  returned a tuple from a conditional expression. The fix adds a `(ConstrainedValue::Tuple,
  ConstrainedValue::Tuple)` arm that recursively selects element-wise between the
  two tuples.
