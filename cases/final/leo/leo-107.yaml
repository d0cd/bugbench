  summary: 'Missing match arm in conditional select: when both branches return tuples,
    the select operation fails at runtime because there is no handler for (ConstrainedValue::Tuple,
    ConstrainedValue::Tuple). Need to add element-wise recursive selection over tuple
    members.'
