description: Tuple access in the ASG could panic or produce incorrect results when
  the expected tuple type size didn't match the actual tuple size. The fix adds proper
  validation in tuple_init.rs to ensure the expected type size is less than or equal
  to the actual tuple size, and introduces a new error variant in error/mod.rs for
  reporting mismatched tuple sizes.
expected_findings:
- file: asg/src/expression/tuple_init.rs
  line: 94
  summary: 'Missing bounds check: tuple initialization does not validate that expected
    type size is <= actual tuple size, leading to potential out-of-bounds access or
    incorrect behavior when accessing tuples with mismatched sizes.'
  line_side: pre_fix
- file: asg/src/error/mod.rs
  line: 224
  summary: No error variant exists to report when a tuple's expected type size exceeds
    the actual tuple size, so the mismatch goes undetected.
  line_side: pre_fix
