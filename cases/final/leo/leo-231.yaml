description: The Leo compiler incorrectly supported a 'char' type and char literals
  that should not exist in the language. The fix removes the char type from the AST,
  parser, tokenizer, type checker, and grammar, along with associated examples and
  tests that relied on char values.
expected_findings:
- file: compiler/ast/src/types/type_.rs
  line: 27
  summary: The Type enum includes a 'Char' variant that should not be a supported
    type in Leo; it needs to be removed.
- file: compiler/parser/src/tokenizer/token.rs
  line: 25
  summary: The tokenizer defines a Char token type and conversion to AST Char, but
    char literals should not be supported in the language.
- file: compiler/parser/src/parser/expression.rs
  line: 313
  summary: The expression parser handles char literal tokens and produces Char value
    AST nodes, but char expressions should not be parseable.
