description: 'Multiple type checking bugs in the Leo compiler where the type checker
  failed to properly validate operand types in certain expressions. Fixes include:
  correctly rejecting group*group multiplication (should require scalar), catching
  comparisons between different types, and rejecting negation of unsigned integers.
  The error emitter was also enhanced to track the last emitted error code for proper
  exit status reporting.'
expected_findings:
- file: compiler/passes/src/type_checker/check_expressions.rs
  line: 58
  summary: 'Missing type check: binary expressions involving Group type do not properly
    validate that the other operand is a scalar for multiplication, allowing invalid
    group*group operations'
- file: compiler/passes/src/type_checker/checker.rs
  line: 77
  summary: 'Type equality assertion is incomplete: does not properly emit errors or
    handle all cases when two types are not equal, allowing comparisons between differing
    types (e.g., i8 vs u8) to pass'
- file: leo/errors/src/emitter/mod.rs
  line: 27
  summary: Error emitter does not track the last emitted error code, causing incorrect
    or missing exit status codes when compilation fails due to type errors
