pr_body: "This was apparently disabled, but it did not start with a block comment.\r\
  \n\r\nThis commit fixes it to start with a block comment as required.\r\n\r\nThis\
  \ commit also makes it a failing test, which is appropriate because in the\r\ncurrent\
  \ version of Leo we do not allow untyped literals (i.e. lone numerals as\r\nexpressions),\
  \ and it is thus a good negative test for the current version of\r\nLeo. When we\
  \ extend Leo to allow untyped literals, we can simply flip the\r\nexpectation of\
  \ this test from Fail to Pass.\r\n"
