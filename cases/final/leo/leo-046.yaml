pr_title: 'fix conditional logging bug #407'
pr_body: "<!--\r\n    Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes.\r\n\r\n    Help us understand your motivation\
  \ by explaining why you decided to make this change.\r\n\r\n    Happy contributing!\r\
  \n-->\r\n\r\n## Motivation\r\n\r\nThis PR is aimed at #407 which was previously\
  \ addressed but not completely resolved.\r\n\r\nPreviously, calling a `console`\
  \ method inside of a conditional statement sometimes threw an Option unwrap error.\r\
  \n\r\n**Code**\r\n```rust\r\nfunction main(a: u32, b: u32) {\r\n    if a == b {\r\
  \n        console.log(\"{}=={}\", a, b); // This line previously failed.\r\n   \
  \ }\r\n}\r\n```\r\n\r\n**Error message**\r\n```bash\r\nthread 'main' panicked at\
  \ 'called `Option::unwrap()` on a `None` value'\r\n```\r\n\r\n## Overview\r\n\r\n\
  The source of this error was a method [`get_indicator_value`](https://github.com/AleoHQ/leo/blob/bf2280e400a788917d5687cd61e7a95d58c783b2/compiler/src/statement/statement.rs#L143)\
  \ that previously called `eq` on the indicator boolean value - an allocated boolean\
  \ in the constraint system. In the above case, the indicator is `a==b` - whose value\
  \ depends on program input `a` and `b`. This method is essential since we must evaluate\
  \ `a==b` to determine whether the console statement should be logged.\r\n\r\nDuring\
  \ the `leo build` phase this is legal since program inputs `a` and `b` are checked\
  \ before synthesizing the program circuit.  \r\nDuring the `leo setup` phase this\
  \ is illegal since program inputs `a` and `b` are not provided to the program circuit\
  \ when synthesizing for CRS generation.   \r\nThus `a` and `b` cannot be compared\
  \ and the indicator `a==b` cannot be evaluated. This normal for all program circuit\
  \ code that generates constraints. However, it causes an issue for console statements\
  \ that essentially call `eq` on a `None` allocated value.\r\n\r\n## Solution\r\n\
  \r\nThe fix is to ignore console statements during the `leo setup` phase. This is\
  \ easier said than done since leo phases are called in sequence `build -> setup\
  \ -> prove -> run`. Where console statements could be useful to log in later phases.\r\
  \n\r\n**Quick fix (This PR)**\r\nModify `get_indicator_value` to call `unwrap_or(false)`\
  \ on indicator values. This works because the default `false` value will only be\
  \ selected during the setup phase - since input values are not provided. \r\n\r\n\
  **Long term fix**\r\nAdd an additional compiler phase to filter out console statements\
  \ before `leo setup` - and possibly put them back afterward. \r\n\r\n## Test Plan\r\
  \n\r\n<!--\r\n    If you changed any code,\r\n    please provide us with clear instructions\
  \ on how you verified your changes work.\r\n    Bonus points for screenshots and\
  \ videos!\r\n-->\r\n\r\nI've added a test for evaluating equality between two integers\
  \ and conditionally printing the result. It tests both equality and inequality.\r\
  \n"
