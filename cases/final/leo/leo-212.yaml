description: The keywords `mut`, `type`, and `input` were kept in the tokenizer/parser
  even though they were removed from the grammar. This caused a bug where `mut` (and
  likely `type` and `input`) could not be used as valid identifiers, as special error-handling
  code incorrectly rejected them. The fix removes these keywords from the token definitions,
  lexer, and parser, and removes the special `mut`-rejection code in the statement
  parser.
expected_findings:
- file: compiler/parser/src/tokenizer/token.rs
  line: 109
  summary: Keywords `Mut`, `Type`, and `Input` are defined as token variants but are
    no longer in the language grammar, causing them to be incorrectly reserved instead
    of being usable as identifiers.
- file: compiler/parser/src/parser/statement.rs
  line: 219
  summary: Special-case code rejects `mut` keyword usage, but `mut` is a valid identifier
    in the current grammar. This code incorrectly prevents using `mut` as a variable
    name.
- file: compiler/parser/src/tokenizer/lexer.rs
  line: 420
  summary: Lexer matches `mut`, `type`, and `input` strings as keyword tokens instead
    of identifiers, preventing their use as valid identifiers per the current grammar.
