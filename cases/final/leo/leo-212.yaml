description: 'The Leo compiler''s type checker had multiple bugs: it failed to reject
  comparisons between different types (e.g., i8 vs u8), allowed invalid negation of
  unsigned integers, and incorrectly handled Group type in binary expressions (multiplication,
  division, etc.) by not properly restricting which operations are valid on group
  elements. The fix tightens type-checking rules in check_expressions.rs and improves
  error propagation via a last-emitted-error tracker in the emitter.'
expected_findings:
- file: compiler/passes/src/type_checker/check_expressions.rs
  line: 58
  summary: 'Group type binary operation check is incomplete: the match arm `(Some(Type::Group),
    Some(other))` does not correctly reject invalid operations like group multiplication,
    allowing type-unsound expressions to pass the type checker.'
  line_side: pre_fix
- file: compiler/passes/src/type_checker/checker.rs
  line: 77
  summary: Type equality assertion does not catch comparisons between differing integer
    types (e.g., i8 == u8), allowing semantically invalid equality checks to pass
    without error.
  line_side: pre_fix
- file: tests/compiler/integers/i8/min.leo
  line: 6
  summary: Negation of minimum signed integer value (-128i8) was not handled correctly
    by the type checker, potentially causing incorrect compilation or runtime panic.
  line_side: pre_fix
