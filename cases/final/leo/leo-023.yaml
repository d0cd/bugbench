pr_title: '[Bugfix] Remove Format Strings and Fix ABNF Console Statements'
pr_body: "Replaces the FormatString nodes and their children from the AST with a ConsoleArgs\
  \ node.\r\nThis node goes through the AST and ASG.\r\nAt the compiler level, the\
  \ string-literal is then parsed before being printed.\r\nAdds escapes for `{` and\
  \ `}` via doubling up the bracket to escape them.\r\nFor example, the following\
  \ `console.log(\"{}` test {{}} {{ hiya }} \", 1u32);` prints `1 test {} { hiya }\
  \ `. \r\nCloses #1167.\r\n\r\nChanges so at the parser level that a `string-literal`\
  \ can now be empty.\r\nIt now errors out at canonicalization for trying to make\
  \ a zero-size array.\r\n\r\nAdded a README for AST(WIP) and Parser.\r\nThis goes\
  \ towards #1159.\r\n\r\n"
