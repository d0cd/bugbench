description: The Leo compiler's type checker failed to disallow record instantiation
  inside async functions. While inputs and outputs of async functions were already
  validated, the struct literal expression visitor did not check whether the type
  being instantiated was a record in an async context, leading to invalid Aleo assembly
  generation. The fix adds a scope check in the expression type-checker to emit a
  proper error when a record is instantiated in an async function.
expected_findings:
- file: compiler/passes/src/type_checking/expression.rs
  line: 892
  summary: 'Missing check: when visiting a struct literal expression, the type checker
    should verify that records are not instantiated inside async function scope. Without
    this guard, invalid Aleo assembly is silently generated.'
