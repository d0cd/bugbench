description: The hex character literal parser incorrectly restricted valid hex escape
  values to ASCII range (<=127) instead of the full byte range (<=255), causing valid
  hex literals like '\x9A' to be rejected. Additionally, the lexer's unicode escape
  parsing had an incorrect boundary check when validating the closing '}' delimiter.
expected_findings:
- file: input/src/values/char_types.rs
  line: 107
  summary: "Incorrect upper bound: `if number <= 127` should be `<= 255` (0xFF) \u2014\
    \ hex escapes \\xNN must accept the full single-byte range, not just ASCII"
  line_side: pre_fix
- file: parser/src/tokenizer/lexer.rs
  line: 113
  summary: "Incorrect string slice boundary check for unicode escape closing delimiter\
    \ \u2014 `string[string.len() - 1..]` may misidentify the closing '}' position\
    \ when the escape sequence content varies in length"
  line_side: pre_fix
