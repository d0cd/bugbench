description: The Leo compiler's canonicalization pass failed to replace `Self` with
  the actual circuit name in static method calls, causing compilation failures or
  incorrect behavior when using `Self::method()` syntax. The fix adds Self canonicalization
  for static call expressions in the AST reducer. Additional changes address Rust
  1.54 clippy warnings across the codebase.
expected_findings:
- file: ast/src/reducer/canonicalization.rs
  line: 47
  summary: "Missing canonicalization of `Self` type in static call expressions \u2014\
    \ `Self::foo()` is not rewritten to `ActualCircuitName::foo()`, causing downstream\
    \ resolution failures."
- file: ast/src/reducer/reconstructing_director.rs
  line: 50
  summary: The reconstructing director's expression reduction does not account for
    the new canonicalization of static call targets involving `Self`.
