description: The ternary expression type-checking in the Leo compiler's ASG incorrectly
  handled the propagation of expected types to the if_false branch. When expected_type
  was None (implicit/unknown), the false branch did not correctly infer its type from
  the true branch or context, causing spurious type mismatch errors for valid ternary
  expressions.
