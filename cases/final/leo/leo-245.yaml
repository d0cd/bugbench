description: The `get_inner_mut()` method on `ConstrainedValue` only unwrapped a single
  layer of `Mutable()` wrapper. When a mutable variable was assigned to another mutable
  variable (`let mut y = x`), the result was `Mutable(Mutable(value))`, causing a
  'no implementation' error on subsequent operations. The fix adds a recursive call
  to fully strip all nested `Mutable` wrappers before cloning.
expected_findings:
- file: compiler/src/value/value.rs
  line: 229
  summary: 'Missing recursive unwrap: `get_inner_mut()` only strips one `Mutable()`
    layer. When mutable values are assigned to mutable variables, nested `Mutable(Mutable(value))`
    is left partially wrapped, causing ''no implementation'' errors on arithmetic.
    Add `inner.get_inner_mut()` before the clone.'
  line_side: pre_fix
