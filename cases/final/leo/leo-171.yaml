description: Leo's for-loop iteration statement accepted variable (non-constant) expressions
  as loop bounds. In a ZK circuit language, loop ranges must be compile-time constants
  because the circuit size is fixed; allowing variable bounds could produce unsound
  constraints or fail at proving time. The fix adds a compile-time check in the ASG
  that rejects non-constant loop range expressions.
expected_findings:
- file: asg/src/statement/iteration.rs
  line: 57
  summary: Missing validation that loop iteration bounds (start/stop) are constant
    expressions. Variable loop ranges are unsound in a ZK circuit language where circuit
    size must be fixed at compile time.
  line_side: pre_fix
- file: compiler/src/compiler.rs
  line: 224
  summary: Compiler does not propagate or surface errors when non-constant loop bounds
    are used, allowing invalid programs to proceed past parsing.
  line_side: pre_fix
