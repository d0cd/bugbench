description: The `leo run` command incorrectly depended on the snarkVM CLI subprocess
  instead of using `snarkvm::VM` directly, causing test failures and fragile behavior.
  Additionally, `leo new` unnecessarily created `.env` files by default. The fix refactors
  `leo run` to invoke the snarkVM library API directly, removes default `.env` creation
  from `leo new`, and updates CLI option handling to provide default devnet parameters
  via help messages.
expected_findings:
- file: leo/cli/commands/run.rs
  line: 16
  summary: The `run` command delegates to snarkVM CLI as a subprocess instead of calling
    `snarkvm::VM` directly, creating a brittle external dependency that breaks tests
    and is unnecessary.
- file: leo/cli/commands/new.rs
  line: 16
  summary: Package::initialize unconditionally creates a `.env` file with default
    private key, which is unnecessary and potentially a security concern for new projects.
- file: leo/cli/commands/common/options.rs
  line: 78
  summary: CLI options for private_key/endpoint/network require `.env` file to be
    present rather than providing sensible defaults (e.g., default devnet parameters),
    making the tool harder to use without the env file.
