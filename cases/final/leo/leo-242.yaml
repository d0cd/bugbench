pr_title: Omit edition from the URL to fetch latest program with leo query program
pr_body: "Original PR: https://github.com/ProvableHQ/leo/pull/28896\r\n\r\nAs the\
  \ title says. It looks like `/latest` endpoint has been deprecated or was changed,\
  \ but at the same time, if we omit it - we are able to fetch the latest version.\r\
  \n\r\nSo, this patch changes the current logic to omit `edition` in the URL if user\
  \ has not specified one, in order to fetch the latest one.\r\n\r\nResolves: https://github.com/ProvableHQ/leo/issues/28786"
