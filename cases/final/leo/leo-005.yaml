description: The Leo compiler's assignee resolution did not handle the case where
  a mutable variable (wrapped in ConstrainedValue::Mutable) was accessed with nested
  indexing (e.g., a[i] = ...). The code failed to unwrap the Mutable wrapper before
  resolving array/tuple element access, causing assignments to elements of mutable
  arrays to silently fail or error. The fix adds a match arm for ConstrainedValue::Mutable
  to properly unwrap and recurse into the inner value.
expected_findings:
- file: compiler/src/statement/assign/assignee.rs
  line: 34
  summary: 'Missing match arm for ConstrainedValue::Mutable when resolving nested
    assignees: mutable array/tuple element assignment (e.g., a[i] = value) fails because
    the Mutable wrapper is not unwrapped before nested access resolution.'
