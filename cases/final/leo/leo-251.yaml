description: 'The Leo compiler incorrectly allowed expression statements (e.g., `expr;`)
  which should not be valid in the language. This caused issues tracked in #1795 and
  #1811. The fix removes the ExpressionStatement AST node entirely, adds a parser
  error (EPAR0370043) when encountering expression statements, and updates all AST
  passes (visitor, reconstructor, type checker) to no longer handle the removed variant.'
expected_findings:
- file: compiler/parser/src/parser/statement.rs
  line: 70
  summary: Parser should reject expression statements (`expr;`) instead of parsing
    them into an ExpressionStatement AST node. These are no longer valid Leo syntax.
- file: compiler/ast/src/statements/statement.rs
  line: 36
  summary: "The Statement enum includes an Expression variant that should not exist\
    \ \u2014 expression statements are not a valid Leo construct and this variant\
    \ enables invalid programs to pass parsing."
- file: compiler/passes/src/type_checker/check_statements.rs
  line: 123
  summary: Type checker handles ExpressionStatement without flagging it as invalid,
    allowing expression statements to pass type checking when they should be rejected
    earlier.
