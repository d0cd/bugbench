description: The Leo parser incorrectly accepted inclusive range syntax (e.g., `..=`)
  for loop ending bounds, which is not part of the Leo language specification per
  the ABNF grammar. The fix removes the inclusive range parsing path from the loop
  statement parser and updates tests to reflect that inclusive loop bounds are now
  a parse error.
