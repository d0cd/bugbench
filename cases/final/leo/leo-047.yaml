pr_title: Bug/abnf-circuit-grammar
pr_body: "Resolves #842 and resolves #892.\r\nMember variables are now required to\
  \ be before member functions.\r\nThey also support a trailing command and semi-colon.\r\
  \nThere's also a hacky fix to allow an optional comma at the end of the last member\
  \ variable.\r\nDo note you can mix and match semi-colons and commas at the moment.\
  \ If this concerns people I can change it to allow only one approach at a time.\r\
  \n\r\nI changed all our tests(asides parser tests) to use semi-colons after member-variables.\
  \ This way if people look at the tests they see semi-colons."
pr_commit_messages:
- require comma or semi-colon for now
- optional comma at end of member variables
- hacky, but optional comma only allowed on last member variable
- rename grammar rule as suggested
- update grammar readme after master merge
- don't allow mixing of semi-colons and commas
- clippy fix
