description: 'The type inference pass incorrectly calculated the type of array spread
  expressions. When encountering a spread like `...a` where `a: [u32; 2]`, the code
  destructured `Type::Array(element_type)` and returned the inner element type (`u32`)
  instead of preserving the array type information needed to correctly compute the
  spread''s contribution to the enclosing array literal. This caused valid code like
  `let b: [u32; 3] = [...a, 3]` to fail type checking.'
expected_findings:
- file: type-inference/src/objects/frame.rs
  line: 837
  summary: "Type::Array(element_type) => Ok(*element_type) incorrectly unwraps the\
    \ array type for spread expressions \u2014 should return the full array type (including\
    \ length) so the enclosing array literal can compute its total size correctly"
  line_side: pre_fix
