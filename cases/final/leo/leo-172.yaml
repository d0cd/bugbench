pr_title: '[Fix] Network retrieval refactor'
pr_body: "Resolves #27977 and #27982. \r\n\r\nDetails:\r\n- Modularizes network retrievals.\
  \ This way we are not maintaining two separate components for network retrievals,\
  \ as previously we had both `leo query` and `retriever`.\r\n- Previously network\
  \ requests yielding responses like `Too Many Requests! Wait for 355256s` were being\
  \ erroneously inserted into the `.aleo/registry` cache of network dependencies.\
  \ This PR ensures that all fetched aleo programs are valid programs."
