description: Network error responses (e.g., 'Too Many Requests') from API calls were
  being cached as valid Aleo programs in the .aleo/registry directory, corrupting
  the dependency cache. The fix adds validation that fetched content parses as a valid
  program before writing to cache, and refactors network retrieval into a single shared
  module to eliminate duplicated retrieval logic between `leo query` and the retriever.
