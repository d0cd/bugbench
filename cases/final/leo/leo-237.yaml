pr_title: Add Storage Support and Storage Lowering Pass
pr_body: "Closes #28888\r\nCloses #28889\r\n\r\nThis PR introduces a **new storage\
  \ system** in Leo, including a **storage lowering pass**, storage vector support,\
  \ and updated semantics for `get`/`set` operations to allow them for vectors (no\
  \ change for mappings). These changes enable persistent program state via storage\
  \ variables while maintaining a clean high-level syntax.\r\n\r\n---\r\n\r\n### \U0001F527\
  \ Language Features Introduced\r\n\r\nLeo now supports **storage declarations**\
  \ for singleton variables and single-dimensional storage vectors. The two core operations\
  \ from `mapping`: `get` and `set`, are now also available for vectors.\r\n\r\n```leo\r\
  \nstorage counter: u32;        // singleton storage variable\r\nstorage points:\
  \ [Point];     // storage vector\r\n\r\ncounter = 5u32;\r\nlet old = counter.unwrap_or(0u32);\
  \ // reading `counter` yields an optional\r\npoints.push(Point { x: 1field, y: 2field\
  \ });\r\nlet first = points.get(0u32).unwrap(); // `get()` returns an optional\r\
  \npoints.set(0u32, Point { x: 3field, y: 4field });\r\ncounter = none; // Unset\
  \ `counter`\r\n```\r\n\r\n\u26A0\uFE0F Only types that support `optional` can be\
  \ used in storage. Illegal types include `signature`, tuples, `address`, `Future`,\
  \ and records. Multidimensional storage vectors are also disallowed and vectors\
  \ inside mappings are not supported.\r\n\r\n---\r\n\r\n### \U0001F9F1 Core Vector\
  \ Functions\r\n\r\nNew vector operations are supported for storage vectors, similar\
  \ to Rust:\r\n\r\n- `push(value)`: append an element\r\n- `pop()`: remove last element\r\
  \n- `swap_remove(index)`: remove element by swapping with last\r\n- `len()`: return\
  \ current length\r\n- `clear()`: sets the vector length to 0 - does not actually\
  \ remove any elements\r\n\r\nExample:\r\n\r\n```leo\r\nstorage vec: [u32];\r\n\r\
  \nvec.push(10u32);\r\nlet x = vec.pop();\r\nlet y = vec.len();\r\nvec.swap_remove(0u32);\r\
  \nvec.clear();\r\n```\r\n\r\nThese operations only work on **storage vectors** and\
  \ are lowered to mapping operations internally.\r\n\r\n---\r\n\r\n### \U0001F9E0\
  \ Storage Lowering Pass\r\n\r\nThe `storage_lowering` pass is the centerpiece of\
  \ this PR. It rewrites high-level storage constructs into **explicit mapping operations**:\r\
  \n\r\n- Each `storage` variable becomes a `Mapping` keyed appropriately.\r\n- Singleton\
  \ storage:\r\n\r\n```leo\r\nstorage counter: u32;\r\n```\r\n\r\nis lowered to:\r\
  \n\r\n```leo\r\nmapping counter__: bool => u32;\r\nMapping::set(counter__, false,\
  \ 5u32);\r\nlet old = counter__.contains(false) ? counter__.get_or_use(false, 0u32)\
  \ : 0u32;\r\n```\r\n\r\n- Storage vectors are lowered into **two mappings**:\r\n\
  \r\n```leo\r\nstorage vec: [u32];\r\n```\r\n\r\nis lowered to:\r\n\r\n```leo\r\n\
  mapping vec__: u32 => u32;       // vector elements\r\nmapping vec__len__: bool\
  \ => u32; // length\r\n```\r\n\r\nVector operations such as `.push()`, `.pop()`,\
  \ `.len()`, `.get()`, `.set()`, and `.swap_remove()` are transformed into mapping\
  \ operations that manipulate both the element mapping and length mapping.\r\n\r\n\
  ---\r\n\r\n### \U0001F6AB Rejected Usages and Limitations\r\n\r\nCurrently, the\
  \ following are disallowed or limited:\r\n\r\n- \u274C Types that do not support\
  \ optional (`signature`, tuples, `address`, `Future`, records)\r\n- \u274C Multidimensional\
  \ storage vectors\r\n- \u274C Storage variables cannot be accessed from outside\
  \ the program\r\n- \u274C Vector operations on non-vector types\r\n- \u274C `get`/`set`\
  \ operations on non-vector and non-mapping types\r\n"
