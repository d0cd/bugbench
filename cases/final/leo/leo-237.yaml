description: 'The storage lowering pass that converts storage variables and vectors
  into mappings has multiple issues: (1) `legalize_path` constructs mapping names
  by concatenating path segments without checking the resulting length against the
  Aleo VM''s 31-character identifier limit, producing invalid Aleo IR for longer variable
  names; (2) `Type::Vector(_) => panic!(...)` in code generation crashes the compiler
  instead of emitting a diagnostic when a vector type isn''t fully lowered; (3) the
  `swap_remove` implementation was broken (confirmed by reviewer), and `sub_wrapped`
  was needed because subtraction could panic in ternary expressions unlike branching
  `if` statements.'
expected_findings:
- file: compiler/passes/src/storage_lowering/ast.rs
  line: 437
  summary: "Broken `swap_remove` implementation: when a vector has 1 element, swap_remove(v,\
    \ 0) fails. The lowered mapping operations do not correctly handle the single-element\
    \ edge case, and the removed element's slot is not properly managed \u2014 reviewer\
    \ confirmed the bug and it was subsequently fixed."
  line_side: pre_fix
- file: compiler/passes/src/code_generation/program.rs
  line: 337
  summary: '`legalize_path` constructs mapping names from storage variable identifiers
    by concatenating path segments without checking the resulting length against the
    31-character Aleo identifier limit enforced in `visitor.rs`, potentially producing
    invalid Aleo IR that silently fails compilation.'
  line_side: pre_fix
- file: compiler/passes/src/storage_lowering/ast.rs
  line: 162
  summary: Lowering of vector length decrement uses `$len_var - 1` which can panic
    in a ternary expression (unlike an `if` branch with true branching); needs `sub_wrapped`
    to avoid runtime panic when the length variable is zero.
  line_side: pre_fix
