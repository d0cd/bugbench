description: The devnet command resolves the snarkOS installation path but does not
  check whether the user has write permissions to that location before attempting
  to install or update snarkOS. This causes a confusing error at install time. The
  fix adds an explicit writability check on the resolved path before proceeding.
expected_findings:
- file: leo/cli/commands/devnet/mod.rs
  line: 126
  summary: 'Missing write-permission check: after resolving the snarkOS path to its
    canonical form, the code proceeds to install/write without verifying the directory
    is writable by the current user. Should check write permissions and return a clear
    error if the location is not writable.'
