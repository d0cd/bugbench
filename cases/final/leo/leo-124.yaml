- file: compiler/passes/src/static_single_assignment/rename_program.rs
  line: 56
  summary: 'Incorrect ternary folding: the match arm for Some(guard) does not correctly
    combine expr and acc when constructing the ternary for early return guards'
- file: compiler/passes/src/static_single_assignment/rename_program.rs
  line: 78
  summary: Same incorrect guard-matching logic for ternary folding in a second code
    path handling early returns
- file: compiler/ast/src/expressions/ternary.rs
  line: 31
  summary: Missing parentheses in ternary Display impl causes incorrect parsing/precedence
    when ternaries are nested during SSA folding
