description: The Leo parser's lexer incorrectly handled block comments, producing
  malformed token output. The bug was in the block comment length calculation logic
  in lexer.rs around line 396, where the end-of-line (eol) detection within block
  comments led to incorrect span computation. The fix corrects the length calculation
  and updates test expectations for proper block comment parsing.
