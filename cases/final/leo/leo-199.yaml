description: The type checker in `visit_function` called `.unwrap()` on `lookup_struct`
  without verifying the type exists first, causing a panic (crash) when a function
  references an undefined data type. The fix introduces an `assert_type_is_defined`
  helper in the checker that validates type existence before the lookup, converting
  the panic into a proper compiler error.
expected_findings:
- file: compiler/passes/src/type_checking/check_program.rs
  line: 243
  summary: 'Missing existence check before unwrapping `lookup_struct` result: undefined
    types cause an unwrap panic instead of a compiler error'
  line_side: pre_fix
- file: compiler/passes/src/type_checking/check_statements.rs
  line: 201
  summary: Unreachable arm for Type::Err does not account for undefined types that
    could now flow through after the type-existence check
  line_side: pre_fix
