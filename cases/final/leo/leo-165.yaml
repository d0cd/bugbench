description: The Leo parser accepted arbitrary tokens as package names in import statements
  instead of requiring valid identifiers. This allowed invalid characters and keywords
  in package names, which could cause downstream failures or confusing error messages.
  The fix changes the parser to use identifier parsing for package names and adds
  proper rejection of invalid inputs.
