- file: parser/examples/parser.rs
  line: 15
  summary: "Missing import of Handler from leo_errors::emitter \u2014 without it,\
    \ parse errors cannot be checked before outputting the AST"
  line_side: pre_fix
- file: parser/examples/parser.rs
  line: 55
  summary: 'Missing error check after parsing: should verify Handler has no errors
    before printing AST output, otherwise parse errors are silently ignored and invalid
    AST is emitted'
  line_side: pre_fix
