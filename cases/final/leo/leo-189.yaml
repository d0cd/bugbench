description: The Leo parser example (parser/examples/parser.rs) outputs the AST even
  when parse errors occur. The fix adds an import of Handler from leo_errors::emitter
  and introduces an error check after parsing, ensuring that when the parser encounters
  errors the AST is not emitted as output.
