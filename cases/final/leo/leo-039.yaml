description: The Leo compiler's CharValue type treated all characters as Unicode scalar
  values without distinguishing non-scalar code points (surrogates like U+DDDD). This
  meant the AST, constraint system, and output serialization had no way to represent
  or correctly handle non-scalar characters, potentially leading to under-specified
  ZK constraints and incorrect output for programs using surrogate code points.
expected_findings:
- file: ast/src/chars/char_value.rs
  line: 1
  summary: "CharValue enum lacks Scalar/NonScalar variant distinction \u2014 all characters\
    \ are treated as Unicode scalar values, but surrogate code points (U+D800\u2013\
    U+DFFF) are not scalar values and need separate handling"
  line_side: pre_fix
- file: compiler/src/value/char/char.rs
  line: 31
  summary: Char constraint allocation does not encode whether the character is a scalar
    or non-scalar code point, so ZK circuit constraints may be under-specified for
    non-scalar character inputs
  line_side: pre_fix
- file: compiler/src/output/mod.rs
  line: 47
  summary: Output serialization writes all char values identically without labeling
    them as scalar vs non-scalar, producing ambiguous output for surrogate code points
  line_side: pre_fix
