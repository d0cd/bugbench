pr_body: "Closes #1012 - we can now handle NonScalar values.\r\nCloses #1029 - I had\
  \ to change how this worked with the NonScalar change anyways.\r\nCloses #1030 -\
  \ Strings are now written as arrays of objects that label them as scalar or non-scalar,\
  \ with the only data inside being the number representing the character code. i.e.\
  \ ```[ \"character\": { \"Scalar\": 101 }, ... ]```\r\nCloses #998 - output file\
  \ is now the latest post of expected output by @0rphon in the issue.\r\n\r\nIt depends\
  \ on #1034 - I wanted this if only to make sure to test more cases thoroughly."
