description: Network error responses (e.g., 'Too Many Requests') from API calls were
  being cached as valid Aleo programs in the .aleo/registry directory, corrupting
  the dependency cache. The fix adds validation that fetched content parses as a valid
  program before writing to cache, and refactors network retrieval into a single shared
  module to eliminate duplicated retrieval logic between `leo query` and the retriever.
expected_findings:
- file: utils/retriever/src/retriever/mod.rs
  line: 310
  summary: Network response is cached without validating that it is a valid Aleo program.
    Error responses (e.g., rate-limit messages) get written to the registry cache,
    corrupting dependencies.
- file: leo/cli/commands/query/mod.rs
  line: 74
  summary: Duplicated network retrieval logic that does not validate fetched program
    content before use, allowing invalid/error responses to propagate.
- file: utils/disassembler/src/lib.rs
  line: 86
  summary: disassemble_from_str does not validate that the input string is a parseable
    program before processing, missing an opportunity to catch corrupted cache entries
    early.
