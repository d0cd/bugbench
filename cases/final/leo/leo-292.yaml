description: Native tests shared mutable state (e.g., signer address) across test
  runs, causing non-deterministic failures and incorrect results when tests depended
  on specific state. The fix introduces test isolation so each test gets its own state,
  adds rayon for parallel execution, and adds CheatCode::set_signer to allow per-test
  signer configuration.
expected_findings:
- file: compiler/compiler/src/test_execution.rs
  line: 43
  summary: 'Test execution function lacks isolation: tests share state across runs,
    leading to interference when run concurrently or sequentially with state-dependent
    assertions.'
- file: interpreter/src/lib.rs
  line: 146
  summary: Interpreter state (including private_key/signer) was not scoped per-test,
    causing shared mutable state across test invocations.
- file: interpreter/src/cursor.rs
  line: 274
  summary: Cursor holds signer Address state that was previously shared across tests
    rather than being isolated per test execution context.
