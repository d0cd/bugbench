description: The subtraction operator rule in the Leo PEG parser grammar (ast/src/leo.pest)
  did not properly handle whitespace around the '-' character, causing parsing failures
  or ambiguity with negation. The fix corrects the spacing rule for the subtraction
  operator. Additionally, deprecated example projects (fibonacci and square-root)
  were removed.
expected_findings:
- file: ast/src/leo.pest
  line: 114
  summary: Subtraction operator rule `operation_sub = { "-" }` does not properly handle
    whitespace/spacing around the minus sign, leading to parsing issues when spaces
    surround the operator (e.g., `a - b` vs `a-b`).
