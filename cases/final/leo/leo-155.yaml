description: The ABNF-to-Markdown converter omitted handling for `%s` (case-sensitive
  string literals), which is part of the ABNF standard (RFC 7405). The Rust `abnf`
  crate does not parse `%s` prefixes, so the converter silently dropped case-sensitivity
  annotations, producing incorrect grammar documentation. The fix adds explicit `%s`
  rendering in the converter and updates the generated Markdown.
