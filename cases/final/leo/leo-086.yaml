description: Importing chains of dependent `.aleo` programs failed because the package
  system did not preserve import ordering. The fix switches from unordered collections
  to IndexMap/IndexSet to maintain dependency order, and adjusts dependency resolution
  in the package to correctly handle existing dependencies when processing dependent
  chains.
expected_findings:
- file: leo/package/src/program.rs
  line: 21
  summary: Using unordered HashMap/HashSet for program imports loses dependency ordering;
    should use IndexMap/IndexSet to preserve the order of dependent program chains.
- file: leo/package/src/package.rs
  line: 341
  summary: Existing dependencies are not properly accounted for when resolving chained
    imports, causing dependent programs to fail to resolve their own imports.
