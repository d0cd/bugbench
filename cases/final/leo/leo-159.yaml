description: Error messages for input file and state file parsing errors did not include
  the file path, making it difficult for users to identify which file caused the error.
  The fix propagates file paths through the compiler's error handling chain and uses
  tracing to print errors with correct file context.
expected_findings:
- file: compiler/src/compiler.rs
  line: 68
  summary: parse_input does not accept or propagate the file path to error types,
    so parser errors lose file location context
- file: package/src/inputs/input.rs
  line: 49
  summary: read_from returns only the file content string but not the file path, preventing
    downstream error messages from including the source file location
- file: package/src/inputs/state.rs
  line: 49
  summary: read_from for state files similarly does not return the file path, so state
    file errors lack file context
