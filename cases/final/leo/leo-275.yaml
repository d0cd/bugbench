description: The devnet CLI command's `--yes` flag was missing the short option `-y`,
  and one of the two confirmation prompts was not using the `yes` flag to skip the
  prompt. The fix adds `short = 'y'` to the clap attribute and ensures both confirmation
  checks honor the flag.
