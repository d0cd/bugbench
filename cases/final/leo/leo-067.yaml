description: The zip package creation logic excluded the `inputs` directory but did
  not exclude files within it (e.g., `inputs/<pack_name>.state`). This produced a
  malformed zip containing file entries under a directory that was itself excluded,
  causing the apm-backend server to fail when attempting to create files at nonexistent
  paths. The fix adds a `path.starts_with(INPUTS_DIRECTORY_NAME)` check to filter
  out all entries under the inputs directory.
expected_findings:
- file: package/src/root/zip.rs
  line: 114
  summary: 'Missing path exclusion: files inside the `inputs/` directory are not filtered
    out when building the zip, even though the directory itself is excluded. Should
    check `path.starts_with(INPUTS_DIRECTORY_NAME)` to skip all entries under the
    inputs directory.'
