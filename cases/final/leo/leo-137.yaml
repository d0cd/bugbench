pr_title: Improvements to tuples
pr_body: "1. Simplifies parsing of tuples moving more logic into the type checker\
  \ instead for better error messages.\r\n2. Nixes `let (x, y): type = expr;` as this\
  \ is a future compatibility hazard, especially when combined with tuples. Instead,\
  \ this should be supported via pattern matching of tuple expressions. This fixes\
  \ the code to match the ABNF grammar."
