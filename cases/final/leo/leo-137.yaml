  line: 103
  summary: 'Parser accepts tuple destructuring in let-bindings (`let (x, y): type
    = expr;`) which violates the ABNF grammar and creates a future compatibility hazard
    with tuple pattern matching.'
  line_side: pre_fix
- file: compiler/ast/src/statements/definition/mod.rs
  line: 29
  summary: DefinitionStatement AST node supports a `variable_name` field that allows
    tuple destructuring patterns, which should not be permitted at the parser level
    per the grammar spec.
  line_side: pre_fix
- file: compiler/passes/src/type_checking/check_statements.rs
  line: 45
  summary: "Type checker lacks validation for tuple types in definition statements\
    \ \u2014 logic that should have been here was incorrectly handled in the parser,\
    \ leading to poor error messages."
  line_side: pre_fix
