description: The `alloc_helper` function for address values failed when the constraint
  system was in setup mode because conditional selections of addresses required witness
  allocations that aren't available during setup. The fix uses a default address as
  a placeholder during the setup phase, allowing the constraint system to proceed
  without an AssignmentMissing error.
