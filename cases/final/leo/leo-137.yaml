description: 'The parser accepted tuple destructuring syntax (`let (x, y): type =
  expr;`) that violated the language''s ABNF grammar, creating a future compatibility
  hazard with tuple pattern matching. The fix simplifies tuple parsing by moving validation
  logic into the type checker for better error messages and removes the non-conformant
  syntax.'
