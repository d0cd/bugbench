description: The code generation pass incorrectly treated inline functions as closures
  in the produced bytecode. The match on `self.is_transition_function` only distinguished
  between transitions (Aleo `function`) and everything else (Aleo `closure`), but
  failed to handle the `Inline` variant, which should produce no bytecode at all.
  The fix switches the match to `function.variant` and returns early for `Variant::Inline`.
expected_findings:
- file: compiler/passes/src/code_generation/visit_program.rs
  line: 174
  summary: 'Missing check for inline function variant: the boolean `self.is_transition_function`
    only distinguishes transitions from non-transitions, causing inline functions
    to be emitted as closures. Should match on `function.variant` and skip code generation
    entirely for `Variant::Inline`.'
  line_side: pre_fix
