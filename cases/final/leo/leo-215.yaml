description: The custom panic hook in leo/main.rs prints panic messages to stdout
  via `println!` instead of stderr via `eprintln!`. This violates the Unix convention
  that diagnostic/error output should go to stderr, and can corrupt structured stdout
  output (e.g., when piping Leo's output to another program).
