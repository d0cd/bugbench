description: The interpreter duplicated futures in its output when processing transitions
  that return records and futures. The futures vector was being extended on every
  intermediate processing step of an Element::Expression, rather than only on the
  final step. The fix adds a guard (`user_initiated` check) to only extend the futures
  vector once on the last step of expression processing.
expected_findings:
- file: interpreter/src/cursor.rs
  line: 1315
  summary: 'Missing guard on futures accumulation: futures are extended on every intermediate
    processing step of Element::Expression, causing duplicates. Should only extend
    futures on the final (user-initiated) step.'
