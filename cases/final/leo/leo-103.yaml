description: The Leo compiler's code generation pass produced incorrect bytecode for
  external function calls. The visit_expressions.rs file had a bug in how external
  call expressions were translated to Aleo instructions (around line 551), and visit_statements.rs
  incorrectly handled the destination register for async instructions (line 167).
  The fix corrected both the call expression codegen and the async instruction output
  formatting.
expected_findings:
- file: compiler/passes/src/code_generation/visit_expressions.rs
  line: 551
  summary: External call codegen produces incorrect instruction format; the generated
    call instruction for external functions is malformed or missing required components
- file: compiler/passes/src/code_generation/visit_statements.rs
  line: 167
  summary: Async instruction destination register is incorrectly written via writeln!;
    the 'into' clause for the async instruction references wrong or missing destination
    register
