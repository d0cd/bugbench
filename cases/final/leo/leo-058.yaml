description: The type inference pass incorrectly calculated the type of array spread
  expressions. When spreading an array (e.g., `[...a, 3]`), the type checker failed
  to unwrap the array type to extract the element type, causing valid spread expressions
  to be rejected. The fix corrects the pattern match in the frame object to properly
  extract the element type from `Type::Array`.
expected_findings:
- file: type-inference/src/objects/frame.rs
  line: 837
  summary: Type inference for array spread does not correctly unwrap the Array type
    to its element type; should match Type::Array(element_type) and return the inner
    element type.
