pr_body: "## Motivation\r\n\r\nAllows package publishing on Windows. \r\n\r\nHow:\
  \ paths were not escaped properly on Windows, library that we use (called `zip`)\
  \ has deprecated method for that but reasons for deprecation are still not clear\
  \ - they use this method in their examples with explicit `#[allow(deprecated)]`.\
  \ And this method is recommended to solve Windows issue.\r\n\r\n## Test Plan\r\n\
  \r\nTested by @damons and @0rphon on Windows machines."
