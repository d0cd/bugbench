description: The Leo compiler's array equality comparison did not check whether the
  two arrays had the same length before comparing elements. This could produce incorrect
  results when comparing arrays of different sizes. The fix adds a length check in
  the equality expression handler and a corresponding compiler error for mismatched
  array lengths.
