pr_body: "<!--\r\n    Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes.\r\n\r\n    Help us understand your motivation\
  \ by explaining why you decided to make this change.\r\n\r\n    Happy contributing!\r\
  \n-->\r\n\r\n## Motivation\r\n\r\nThis pr allows circuit variables to be mutated\
  \ using the self keyword:\r\n```rust\r\ncircuit Foo {\r\n    mut a: u8,\r\n\r\n\
  \    function set_a(new: u8) {\r\n        self.a = new; // Changes the value of\
  \ `f.a = new`\r\n\r\n        console.assert(self.a == new);\r\n    }\r\n}\r\n\r\n\
  function main() {\r\n    let mut f  = Foo { a: 0u8 };\r\n\r\n    f.set_a(1u8); //\
  \ Changes the value of `f.a = 1`\r\n\r\n    console.assert(f.a == 1u8);\r\n```\r\
  \n\r\nBoth user testing and slack discussion indicate that Leo should support this\
  \ functionality.\r\n\r\n## Test Plan\r\n\r\n<!--\r\n    If you changed any code,\r\
  \n    please provide us with clear instructions on how you verified your changes\
  \ work.\r\n    Bonus points for screenshots and videos!\r\n-->\r\n\r\nTest mutating\
  \ circuit variable using the self keyword changes the variable inside the circuit\
  \ function.\r\nTest mutating circuit variable using the self keyword changes the\
  \ variable outside the circuit function.\r\nTest mutating an immutable circuit variable\
  \ errors.\r\nTest mutating a circuit function errors.\r\nTest mutating a static\
  \ circuit function errors.\r\n"
