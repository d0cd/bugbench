description: Duplicate `#[clap(flatten)]` of `EnvOptions` in both the parent `LeoDevnode`
  command and its `Start`/`Advance` subcommands. Because `EnvOptions` fields use `global
  = true`, clap's debug assertions detected duplicate global arg registration, crashing
  `leo devnode start` in debug builds. The fix removes the redundant flatten from
  the subcommands and threads the private key from the parent's `EnvOptions` through
  the `Input` associated type.
expected_findings:
- file: leo/cli/commands/devnode/start.rs
  line: 41
  summary: Duplicate `#[clap(flatten)]` of `EnvOptions` here conflicts with the same
    flatten in the parent `LeoDevnode` command, since `EnvOptions` fields are marked
    `global = true`. This causes clap to panic on duplicate global arg registration
    in debug builds.
  line_side: pre_fix
- file: leo/cli/commands/devnode/advance.rs
  line: 24
  summary: "Duplicate `#[clap(flatten)]` of `EnvOptions` \u2014 same issue as in `start.rs`.\
    \ The `EnvOptions` is already flattened in the parent `LeoDevnode` struct with\
    \ `global = true` fields, so flattening again in the subcommand triggers clap's\
    \ duplicate global arg assertion."
  line_side: pre_fix
