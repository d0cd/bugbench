description: Several Display trait implementations in the Leo compiler AST had incorrect
  formatting logic. Tuple expressions and function outputs with multiple returns were
  not properly comma-separated (missing itertools usage), function output modes were
  not correctly displayed when Mode::None, and struct display was missing proper formatting
  with braces and newlines.
expected_findings:
- file: compiler/ast/src/functions/mod.rs
  line: 139
  summary: Function output Display for tuple returns does not properly format multiple
    outputs with comma separation; should use `self.output.iter().format(", ")` to
    join them.
- file: compiler/ast/src/functions/output.rs
  line: 45
  summary: Output Display incorrectly handles Mode::None case; should conditionally
    omit the mode prefix when mode is None rather than printing it.
- file: compiler/ast/src/struct/mod.rs
  line: 135
  summary: "Struct Display implementation has incorrect formatting \u2014 missing\
    \ proper brace and newline formatting in the writeln! call for the struct header."
