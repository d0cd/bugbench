category: api
difficulty: medium
severity: medium
language: rust
pr_size: small
description: Leo sets a custom panic hook for its own error reporting, but this hook
  remained active when invoking the Aleo CLI from within Leo commands (build, deploy,
  new, run). This caused Aleo CLI panics to be caught by Leo's handler, producing
  confusing or incorrect error messages. The fix calls `std::panic::take_hook()` to
  remove Leo's panic hook before invoking the Aleo CLI.
expected_findings:
- file: leo/commands/build.rs
  line: 180
  summary: 'Missing panic hook removal: Leo''s custom panic hook is still active when
    invoking the Aleo CLI, which will produce confusing error output if Aleo panics.'
- file: leo/commands/deploy.rs
  line: 50
  summary: Missing panic hook removal before Aleo CLI invocation; Leo's panic hook
    will intercept Aleo panics with incorrect context.
- file: leo/commands/run.rs
  line: 86
  summary: Missing panic hook removal before Aleo CLI invocation; Leo's panic hook
    will intercept Aleo panics with incorrect context.
