description: The parser retained `mut`, `type`, and `input` as reserved keywords after
  they were removed from the Leo grammar. This caused `mut` (and the others) to be
  incorrectly rejected as identifiers. Additionally, special-case error handling code
  for `mut` usage compounded the problem by emitting a misleading error when `mut`
  was used as a perfectly valid identifier.
expected_findings:
- file: compiler/parser/src/parser/statement.rs
  line: 219
  summary: "parse_variable_name contains special-case logic that rejects `mut` as\
    \ a keyword, but `mut` is no longer in the grammar and should be a valid identifier\
    \ \u2014 this incorrectly rejects valid code"
  line_side: pre_fix
- file: compiler/parser/src/tokenizer/token.rs
  line: 109
  summary: '`mut`, `type`, and `input` are still listed as keyword tokens but are
    no longer part of the grammar; they should be removed so the lexer treats them
    as regular identifiers'
  line_side: pre_fix
- file: compiler/parser/src/tokenizer/lexer.rs
  line: 420
  summary: Lexer matches `mut`/`type`/`input` strings and emits keyword tokens instead
    of identifiers, preventing their use as variable names
  line_side: pre_fix
