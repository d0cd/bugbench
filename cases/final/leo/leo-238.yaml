pr_title: Remove `mut`, `type`, and `input` keywords
pr_body: "As discussed, these are no longer in the grammar. If and when we need them,\
  \ we\r\nwill re-add them.\r\n\r\nThis also removes some extra code that gives a\
  \ specific error when `mut` is\r\nused. However, that is in fact another bug, because\
  \ `mut` is a valid identifier\r\nin the current grammar, and thus this extra code\
  \ unjustly rejects code that uses\r\n`mut` as an identifier.\r\n\r\nAdjust some\
  \ tests and expectations."
