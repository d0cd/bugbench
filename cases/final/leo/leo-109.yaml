description: 'When constructing function stubs in the AST, the `program` symbol was
  not being passed through, causing external struct references inside async functions
  to lose their originating program context. The fix adds a `program: Symbol` parameter
  to the relevant stub construction methods so that external structs can be correctly
  resolved to their source program.'
expected_findings:
- file: compiler/ast/src/stub/function_stub.rs
  line: 258
  summary: 'Missing `program: Symbol` parameter: function stub construction does not
    track which program an external struct belongs to, causing resolution failures
    in async functions.'
  line_side: pre_fix
- file: compiler/ast/src/stub/function_stub.rs
  line: 274
  summary: 'Missing `program: Symbol` parameter in second stub construction path:
    same issue as line 258, external struct program context is lost.'
  line_side: pre_fix
