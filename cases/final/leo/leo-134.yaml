description: The Leo compiler incorrectly allowed 1-element tuple types and parenthesized
  single-variable definitions like `let (x) = ...`. The fix adds a `parened` field
  to Definition AST nodes to track whether variables are parenthesized, then rejects
  single-variable parenthesized definitions during canonicalization and disallows
  1-element tuple types.
expected_findings:
- file: ast-passes/src/canonicalization/canonicalizer.rs
  line: 376
  summary: 'Missing validation: single-variable definitions wrapped in parentheses
    (e.g., `let (x) = ...`) should be rejected as invalid 1-element tuples, but no
    check exists for the `parened` state.'
- file: parser/src/parser/statement.rs
  line: 295
  summary: Parser does not track whether definition variables are parenthesized, losing
    information needed to reject 1-element tuple variable declarations during canonicalization.
- file: ast/src/statements/definition/mod.rs
  line: 33
  summary: Definition AST node lacks a `parened` field to distinguish `let x` from
    `let (x)`, preventing downstream validation of 1-element tuple declarations.
