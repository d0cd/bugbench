description: The Leo compiler's type checker accepted string literals even though
  snarkVM does not yet support strings, leading to failures downstream when compiling
  to the VM. The fix adds a type-checker error that rejects string literals at the
  type-checking pass, and updates the checker to emit a 'strings are not yet supported'
  error when a Literal::String is encountered.
