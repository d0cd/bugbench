description: 'Multiple bugs in Leo example projects: example directory names used
  hyphens instead of underscores (causing path resolution failures), a typo in the
  fibonacci description (''fibonnaci''), incorrect input values, and a missing import
  (GroupValue) in the compiler''s value.rs. The fix renames example directories to
  use underscores, corrects the typo, updates example inputs/configs, and adds the
  missing import.'
expected_findings:
- file: examples/fibonacci/Leo.toml
  line: 1
  summary: 'Typo in description: ''fibonnaci'' should be ''fibonacci'''
- file: compiler/src/value/value.rs
  line: 26
  summary: Missing 'GroupValue' in the import from leo_typed, which is needed for
    value representation
- file: examples/hello-world/Leo.toml
  line: 1
  summary: Example directory uses hyphenated name 'hello-world' instead of 'hello_world',
    causing path/package name mismatch
