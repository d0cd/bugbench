description: Nested imports were not recognized because the compiler did not parse
  definitions for imported programs. The fix ensures that when an import is processed,
  its definitions (including transitive/nested imports) are fully parsed and stored,
  so downstream code can resolve symbols from deeply nested import chains.
expected_findings:
- file: compiler/src/definition/definitions.rs
  line: 13
  summary: "Definitions are not being parsed for imported programs \u2014 only the\
    \ top-level program's definitions are resolved, causing nested import symbols\
    \ to be missing"
  line_side: pre_fix
- file: compiler/src/import/store/import.rs
  line: 10
  summary: When fetching dependencies for an import, the code does not recursively
    parse the imported program's definitions, so transitive imports are invisible
  line_side: pre_fix
- file: compiler/src/import/store/symbol.rs
  line: 11
  summary: Imported symbol storage does not account for symbols that come from nested
    imports within the imported file
  line_side: pre_fix
