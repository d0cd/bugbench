description: The dead code elimination (DCE) pass failed to eliminate useless associated
  function calls and was not enabled by default. The fix revamps the DCE pass to properly
  detect and remove expression statements containing pure function calls whose results
  are unused, and changes the CLI default to enable DCE automatically.
expected_findings:
- file: compiler/passes/src/dead_code_elimination/eliminate_statement.rs
  line: 17
  summary: DCE's StatementReconstructor did not handle expression statements containing
    side-effect-free associated function calls, leaving dead code in the output.
- file: leo/cli/commands/mod.rs
  line: 143
  summary: The `enable_dce` CLI flag defaults to false, meaning dead code elimination
    is not applied unless explicitly opted in, leaving unnecessary code in compiled
    output.
- file: compiler/passes/src/dead_code_elimination/eliminate_expression.rs
  line: 16
  summary: ExpressionReconstructor lacks logic to identify pure (side-effect-free)
    function calls, preventing the eliminator from removing unused call expressions.
