description: The Leo formatter did not wrap long binary expression chains exceeding
  100 characters, producing unreadable single-line output. The fix adds logic in format.rs
  to detect binary op chains that exceed the line width limit and wraps them with
  operator-leading style, placing each operator and operand on a new indented line.
