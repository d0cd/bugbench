description: 'The Leo language had a ''char'' type and associated literals that needed
  to be removed per language design decisions (issue #1824). This PR removes the char
  type from the AST, parser, tokenizer, type checker, grammar specification, and updates
  examples and tests accordingly. The palindrome example (which relied on char) was
  deleted entirely.'
