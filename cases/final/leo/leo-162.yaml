description: Comparing two values with mismatched types in Leo's relational operators
  (eq, ge, gt, le, lt) caused a stack overflow. The synthesis error's Debug formatting
  (`{:?}`) triggered recursive evaluation, leading to infinite recursion. The fix
  changes error formatting from `{:?}` to `{}` (Display) and adds proper type-mismatch
  handling in relational expression evaluation to return a compiler error instead
  of recursing.
expected_findings:
- file: compiler/src/expression/relational/eq.rs
  line: 102
  summary: Mismatched types fall through to constraint evaluation which triggers a
    synthesis error; the error handler's Debug formatting causes infinite recursion
    / stack overflow. Should detect type mismatch and return a proper error before
    reaching constraint evaluation.
- file: compiler/src/errors/value/boolean.rs
  line: 38
  summary: Using `{:?}` (Debug) to format the synthesis error can trigger recursive
    formatting leading to stack overflow. Should use `{}` (Display) instead.
- file: compiler/src/errors/value/integer.rs
  line: 39
  summary: Using `{:?}` (Debug) to format the synthesis error can trigger recursive
    formatting leading to stack overflow. Should use `{}` (Display) instead.
