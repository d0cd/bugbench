description: The Leo compiler's type checker incorrectly rejected composite data types
  (circuits/structs) as arguments to core algorithm functions like BHP hash/commit,
  Pedersen hash/commit, and Poseidon hash. The fix redesigns the type checking methodology
  for core functions to properly validate and accept composite data types alongside
  primitive types.
expected_findings:
- file: compiler/passes/src/type_checking/checker.rs
  line: 174
  summary: Core function type checking logic does not account for composite data types
    (circuits/structs), incorrectly restricting inputs to primitive types only.
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 51
  summary: Type validation for core function call arguments fails to handle composite
    types, causing valid programs using structs with BHP/Pedersen/Poseidon to be rejected.
- file: compiler/core/src/algorithms/mod.rs
  line: 95
  summary: Core algorithm type definitions only enumerate primitive types as valid
    inputs, missing composite type support.
