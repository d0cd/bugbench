pr_title: Fix signed integer division
pr_body: "## Motivation\r\n\r\nFixes #138 \r\nThe current signed integer division\
  \ fails when dividing the minimum value.\r\nExample failure: `let result: i8 = 1\
  \ / -128;`\r\n\r\nThe reason for the failure is that the division algorithm evaluates\
  \ the two's complement of the denominator during calculation.\r\n`-128` has no inverse.\r\
  \n\r\nHowever, since our division algorithm rounds to 0 we know the result when\
  \ the denominator is the minimum the result will be 0 or 1.\r\n* `let result: i8\
  \ = -128 / -128; // = 1`\r\n* `let result: i8 =  x / -128; // = 0`\r\n\r\nWe add\
  \ two additional checks to the division algorithm to implement the above cases.\r\
  \nThe gadget tests and compiler tests have been updated for all signed integers."
pr_commit_messages:
- fix division by zero error detect
- check for negation overflow in division test
- fix division max value bug
