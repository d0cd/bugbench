pr_title: Fixes conditional and early returns
pr_body: "<!--\r\n    Thank you for submitting the PR! We appreciate you spending\
  \ the time to work on these changes.\r\n\r\n    Help us understand your motivation\
  \ by explaining why you decided to make this change.\r\n\r\n    Happy contributing!\r\
  \n-->\r\n\r\n## Motivation\r\n\r\nFixes #427 #430 \r\n\r\nThis pr refactors how\
  \ leo functions return. When parsing a function's statements, each return statement's\
  \ value and indicator are stored. The `indicator` is a boolean value that is set\
  \ based on its branch conditions - For example, a statement inside of a true if\
  \ branch would have its `indicator` set to `true`.\r\n\r\nPreviously, this indicator\
  \ boolean was optionally returned `Option<Boolean>`. Now it is mandatory for every\
  \ statement `Boolean`. This helps fix return propagation bugs where functions with\
  \ multiple return values may produce an incorrect result. In addition, it allows\
  \ the compiler to identify incorrect programs that may have multiple return statements\
  \ in the same scope and no return statements in scopes that expect a return.\r\n\
  \r\n## Test Plan\r\n\r\n<!--\r\n    If you changed any code,\r\n    please provide\
  \ us with clear instructions on how you verified your changes work.\r\n    Bonus\
  \ points for screenshots and videos!\r\n-->\r\n\r\nSome tests were refactored to\
  \ test result propagation.\r\nNew tests were added for #427 #430 bug cases.\r\n\r\
  \n\r\n## Related PRs\r\n\r\n<!--\r\n    If this PR adds or changes functionality,\r\
  \n    please take some time to update the docs at https://github.com/AleoHQ/leo,\r\
  \n    and link to your PR here.\r\n-->\r\n\r\nThis draft PR will likely fail due\
  \ to 1.0.5 binary executable bug #465"
