description: Importing chains of dependent `.aleo` programs failed because the package
  system did not preserve import ordering. The fix switches from unordered collections
  to IndexMap/IndexSet to maintain dependency order, and adjusts dependency resolution
  in the package to correctly handle existing dependencies when processing dependent
  chains.
