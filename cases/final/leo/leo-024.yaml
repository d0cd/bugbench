description: The Leo language tokenizer/parser was missing symbol definitions for
  ampersand (`&`) and at (`@`) characters. This meant input files using these symbols
  (e.g., for address literals or reference types) would fail to parse. The fix adds
  the missing `Ampersand` and `At` symbol entries in the symbol table and corresponding
  token-to-symbol mappings in the tokenizer.
