  summary: 'Missing symbol definition: `Ampersand` and `At` symbols are not defined
    in the symbol table, causing the tokenizer to fail on `&` and `@` characters in
    input files.'
  line_side: pre_fix
- file: parser/src/tokenizer/token.rs
  line: 200
  summary: 'Missing token-to-symbol mapping: `Token::At` (and likely `Token::Ampersand`)
    lack mappings to their corresponding symbol constants, so they cannot be converted
    during parsing.'
  line_side: pre_fix
