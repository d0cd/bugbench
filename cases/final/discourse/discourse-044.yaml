pr_title: 'FIX: Topic has localization''s inconsistent locale matching'
pr_body: "`Topic#has_localization?` used `localizations.exists?` for exact matching,\
  \ while `get_localization` uses `LocaleNormalizer.is_same?` for fuzzy matching.\
  \ This meant `has_localization?(\"ja\")` returns `false` when only `\"ja_JP\"` exists,\
  \ even though `get_localization(\"ja\")` finds it.\r\n\r\nThis PR moves `has_localization?`\
  \ into the `Localizable` concern, removing overrides from both Topic and Post making\
  \ things more consistent."
