description: Topic#has_localization? used exact locale matching via localizations.exists?,
  while get_localization used fuzzy matching via LocaleNormalizer.is_same?. This inconsistency
  caused has_localization?("ja") to return false when only "ja_JP" existed, even though
  get_localization("ja") would successfully find it. The fix consolidates has_localization?
  into the shared Localizable concern to use the same fuzzy matching.
