pr_title: 'FIX: Validate auth_redirect against registered client in delegated auth'
pr_body: "When a UserApiKeyClient has a registered auth_redirect, the delegated auth\
  \ flow in redirect_to_login_if_required wasn't checking the request's auth_redirect\
  \ against it. This meant a different redirect URL could be used with the client's\
  \ public key as long as it matched the global allowed_user_api_auth_redirects wildcards.\r\
  \n\r\nNow, we'll look up the UserApiKeyClient by public key and enforce that auth_redirect\
  \ exactly matches the client's registered one, before also (already) checking the\
  \ global allowlist."
