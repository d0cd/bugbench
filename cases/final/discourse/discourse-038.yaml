description: An admin could set the `pg_function` field on an EmbeddingDefinition
  to an arbitrary SQL fragment, which was then string-interpolated into raw SQL queries
  in DiscourseAi::Embeddings::Schema, enabling SQL injection. The fix adds a validation
  on the `pg_function` attribute to restrict it to safe, known PostgreSQL function
  names.
