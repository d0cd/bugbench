pr_body: "When triggering the @ or # autocomplete on `/search` and then hitting the\
  \ browser back button, the autocomplete menu persists.\r\n\r\nWe aren't storing\
  \ the instances of the menu anywhere, so we're not destroying them during navigation...\
  \ this keeps track of them so we can clean them up in `@on(\"willDestroyElement\"\
  )` with the search input. \r\n\r\n\r\nBefore:\r\n\r\n\r\nhttps://github.com/user-attachments/assets/2842c88b-2541-41dc-80db-651859a33529\r\
