description: The `pg_function` attribute on `EmbeddingDefinition` lacked input validation,
  allowing an admin to set it to an arbitrary SQL fragment. This value was string-interpolated
  into raw SQL queries in `DiscourseAi::Embeddings::Schema`, creating a SQL injection
  vector. The fix adds a validation constraint to restrict `pg_function` to known-safe
  PostgreSQL function names.
