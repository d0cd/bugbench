description: 'The search autocomplete menus (@ and # modifiers) created via applySearchAutocomplete()
  were not being tracked or destroyed when the search component was torn down during
  page navigation. This caused stale autocomplete popups to persist after hitting
  the browser back button. The fix stores references to the autocomplete instances
  and cleans them up in the willDestroyElement lifecycle hook.'
