description: "The PR reformats raw ISO-8601 timestamps into human-readable dates for\
  \ email, but DateTime.parse + strftime does not convert the time to the specified\
  \ timezone \u2014 it formats the UTC value and then labels it with the event's timezone\
  \ (e.g. 'October 1, 2026 10:00 AM (Europe/Madrid)' when the actual Madrid time is\
  \ 12:00 PM). The old code at least showed the raw UTC string, making the mismatch\
  \ less misleading. Additionally, the user-supplied `url` attribute is placed into\
  \ an href with only HTML-entity escaping, which does not prevent javascript: scheme\
  \ injection."
expected_findings:
- file: plugins/discourse-calendar/plugin.rb
  line: 516
  summary: DateTime.parse(starts_at).strftime formats the UTC time without converting
    to the target timezone (`tz`). The displayed time will be wrong for any non-UTC
    timezone, yet is labeled as if it were in that timezone.
  line_side: pre_fix
- file: plugins/discourse-calendar/plugin.rb
  line: 525
  summary: "Same timezone-unaware formatting for `ends_at` \u2014 formatted_end shows\
    \ UTC time labeled with the event's timezone."
  line_side: pre_fix
- file: plugins/discourse-calendar/plugin.rb
  line: 548
  summary: User-supplied `url` is placed into href attribute with only CGI.escape_html,
    which does not sanitize the URL scheme. A `javascript:` URI would pass through,
    though most email clients mitigate this.
  line_side: pre_fix
