description: WCAG accessibility stylesheet had hardcoded or missing CSS custom property
  values for button states, causing buttons to not change color on hover/focus/active
  states. The fix switches to using Discourse's CSS variable system (e.g., --d-button-default-icon-color)
  so button colors properly reflect state changes and meet WCAG contrast requirements.
