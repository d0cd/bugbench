pr_title: 'FIX: Exclude user names from topic search when enable_names is disabled'
pr_body: 'The "search within topic" feature in `Search` unconditionally includes `COALESCE(u.name,
  '''')` in its ILIKE query, making user real names searchable even when `SiteSetting.enable_names`
  is disabled. This leaks name information through search results.


  Fix this by conditionally appending the name column to the search fields only when
  `SiteSetting.enable_names` is true, matching the behavior of the global user search
  path.'
