pr_title: 'FIX: Filter hidden posts from raw topic markdown endpoint'
pr_body: "The `/raw/:topic_id` endpoint was exposing hidden posts to users who shouldn't\
  \ see them, while `/raw/:topic_id/:post_number` correctly filtered them via `guardian.can_see?`.\r\
  \n\r\nThis inconsistency meant anonymous users and regular users could see hidden\
  \ post content when fetching a whole topic as markdown.\r\n\r\nAlso refactors `markdown_num`\
  \ into smaller private methods for clarity."
