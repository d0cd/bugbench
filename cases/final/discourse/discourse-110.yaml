pr_title: 'FIX: NavItem active state ignoring routeParam'
pr_body: "When `NavItem` was used with `@routeParam`, the `active` getter fell through\
  \ to `router.isActive(route)` which only checks the route name without considering\
  \ the dynamic segment value. This caused all nav items sharing the same route but\
  \ with different params to appear active simultaneously.\r\n\r\nThis was visible\
  \ in the chat-integration plugin's admin UI where all provider pills (e.g. Slack,\
  \ Discord, Telegram) were marked active regardless of which provider was being viewed.\r\
  \n\r\nThe fix passes `routeParam` to `router.isActive(route, routeParam)` when `routeParam`\
  \ is present so the active check correctly distinguishes between different dynamic\
  \ segment values."
pr_commit_messages:
