description: The previous commit (e8287d2) that renamed the Data Explorer plugin routes
  from /admin/plugins/explorer to /admin/plugins/discourse-data-explorer failed to
  add redirects for non-GET API endpoints (POST, PUT, DELETE). This meant API consumers
  hitting legacy URLs for creating, updating, deleting, or running queries would get
  404s. The fix adds the missing legacy route mappings for all HTTP methods.
