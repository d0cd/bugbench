id: discourse-053
repo: discourse/discourse
base_commit: 6a17f541b86b8e458f4aa768b7c3b420abd385ca^
head_commit: 9dad3615
fix_commit: 6a17f541b86b8e458f4aa768b7c3b420abd385ca
category: api-misuse
difficulty: medium
severity: medium
language: ruby
pr_size: tiny
description: The `has_templates?` page object method used Capybara's `all(...).count`
  to verify template counts, which evaluates immediately without waiting for the DOM
  to settle. This causes flaky system tests when the DOM re-renders after filtering,
  as the element count is checked before new elements appear. The fix replaces the
  eager `all(...).count` pattern with Capybara's built-in waiting matcher `has_css?(...,
  count:)` which retries until the expected count is found or the wait timeout expires.
