description: In TopicsController#update_tags, a false return from PostRevisor#revise!
  was unconditionally treated as a failure (422), but revise! returns false both when
  revision fails AND when nothing changed. The fix checks topic.errors to distinguish
  'no-op' (return 200) from 'actual failure' (return 422).
