description: Flaky test caused by a race condition where the test clicks an image
  immediately after setting state via `this.set()` without waiting for the Ember re-render
  to complete. The fix adds `settled()` before the click action and wraps the lightbox
  initialization with `waitForPromise` so Ember's test waiters properly track the
  async work.
expected_findings:
- file: plugins/chat/test/javascripts/components/chat-message-collapser-test.gjs
  line: 284
  summary: 'Race condition: clicking the image after `this.set()` without first calling
    `settled()` to wait for re-render, causing flaky test failures'
- file: frontend/discourse/app/lib/lightbox.js
  line: 20
  summary: Missing `waitForPromise` wrapper around async lightbox initialization,
    preventing Ember test waiters from tracking this async work and causing `settled()`
    to resolve prematurely
