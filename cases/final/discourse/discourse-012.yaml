pr_title: 'FIX: Return 200 from `update_tags` when no tag changes are needed'
pr_body: "When editing the first post of a wiki topic, the composer calls `updateTags`\
  \ even when there are no tags on the topic. jQuery serializes `{ tags: [] }` as\
  \ an empty request body (no `tags` param), so the server receives no tags param.\r\
  \n\r\nIn `TopicsController#update_tags`, this results in `PostRevisor#revise!` being\
  \ called with `{ tags: [] }` on a topic that already has no tags. The revisor correctly\
  \ detects nothing has changed and returns `false`, but the controller was treating\
  \ any `false` return as a failure and responding with 422. Since the topic has no\
  \ validation errors, `create_errors_json` doesn't know how to handle the object\
  \ and falls through to a generic error.\r\n\r\nThis fix distinguishes between \"\
  nothing changed\" (topic has no errors \u2192 return 200) and \"revision actually\
  \ failed\" (topic has errors \u2192 return 422)."
pr_commit_messages:
- 'FIX: Return 200 from update_tags when no tag changes are needed'
