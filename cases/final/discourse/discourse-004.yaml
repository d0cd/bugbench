description: Category custom field checkbox values stored as the string "true" in
  the database were converted to boolean for FormKit checkboxes, but when saved back,
  Ruby's boolean-to-string conversion produced "t" instead of "true", breaking subsequent
  reads. The fix makes the FormKit checkbox accept additional truthy string values
  ("t", "true") and ensures the server-side controller explicitly converts boolean
  custom field values back to their canonical string representation.
expected_findings:
- file: app/controllers/categories_controller.rb
  line: 206
  summary: "Category custom field boolean values are not normalized to string before\
    \ saving \u2014 Ruby will convert `true` to \"t\" instead of preserving the original\
    \ \"true\" string, corrupting the stored value on re-save"
- file: frontend/discourse/app/form-kit/components/fk/control/checkbox.gjs
  line: 4
  summary: "Checkbox checked state only compares with strict equality to `true` boolean\
    \ \u2014 does not handle truthy string values like \"true\" or \"t\" that may\
    \ come from the database"
