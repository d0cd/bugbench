description: The /raw/:topic_id endpoint returned hidden posts to all users including
  anonymous visitors, while the single-post endpoint /raw/:topic_id/:post_number correctly
  filtered them via guardian.can_see?. The fix adds the same visibility check when
  building the full-topic markdown, ensuring hidden posts are excluded for unauthorized
  users.
