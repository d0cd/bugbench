pr_title: 'FIX: don''t cache localized color scheme name'
pr_body: "Hoping the third time is the charm for fixing a flaky color scheme spec,\
  \ this one specifically:\r\n\r\nhttps://github.com/discourse/discourse/blob/main/spec/system/admin_color_palettes_config_area_spec.rb#L302\r\
  \n\r\nIt seems the issue was that the localized name for the light color scheme\
  \ was getting cached, so it would be wrong depending on test order and therefore\
  \ flaky. This resolves the translated name on every call and adjusts accordingly. "
