fix_commit: 855fe26066362fc9b415eabfb227a76b90ae8f01
category: logic
difficulty: medium
severity: medium
language: ruby
pr_size: small
description: The localized (translated) name of the light color scheme was being cached,
  causing it to return a stale value when the locale changed between calls. This produced
  flaky test failures depending on test execution order. The fix ensures the translated
  name is resolved on every access rather than being memoized.
expected_findings:
- file: app/models/color_scheme.rb
  line: 409
  summary: The base color scheme's translated name was memoized via @base_color_scheme,
    caching the I18n.t result. When the locale changed between calls, the stale cached
    name was returned instead of the freshly translated one.
  line_side: pre_fix
- file: plugins/discourse-ai/assets/javascripts/discourse/initializers/ai-search-discoveries.js
  line: 9
  summary: The condition checks `can_use_ai_discover_persona` which gets cached/memoized,
    but the fix changes to `can_use_ai_discover_agent` - however the real bug is in
    the discoveries service where the reply endpoint used GET instead of POST
  line_side: pre_fix
- file: plugins/discourse-ai/assets/javascripts/discourse/services/discobot-discoveries.js
  line: 98
  summary: 'The discovery reply request was missing `type: ''POST''` (defaulting to
    GET), and lacked cancellation of pending timeouts before resetting, and didn''t
    clear lastQuery on failure - causing stale cached results and flaky behavior'
  line_side: pre_fix
- file: plugins/discourse-ai/config/routes.rb
  line: 35
  summary: The discoveries/reply endpoint was using GET instead of POST, which is
    incorrect for an action that triggers side effects (generating AI replies). The
    cached/memoized GET response could return stale results when locale changes.
  line_side: pre_fix
- file: plugins/discourse-ai/package.json
  line: 4
  summary: Package dependency used workspace protocol with pinned version 0.0.0 instead
    of npm registry wildcard, causing incorrect dependency resolution
  line_side: pre_fix
- file: plugins/discourse-ai/lib/summarization/fold_content.rb
  line: 158
  summary: Accessed bot.persona.response_format which referenced the old cached persona
    interface; the memoized/cached persona name could return stale translated values
    across locale changes
  line_side: pre_fix
- file: plugins/discourse-ai/spec/lib/modules/ai_bot/playground_spec.rb
  line: 24
  summary: Model and namespace references use stale 'AiPersona'/'Personas::Persona'
    naming instead of the renamed 'AiAgent'/'Agents::Agent', causing lookup failures
    after the persona-to-agent rename
  line_side: pre_fix
- file: plugins/discourse-ai/spec/requests/admin/ai_personas_controller_spec.rb
  line: 3
  summary: Controller spec references the old AiPersonasController and routes (ai-personas)
    instead of the renamed AiAgentsController and routes (ai-agents), causing route
    resolution and API failures
  line_side: pre_fix
- file: plugins/discourse-ai/spec/lib/modules/automation/llm_triage_spec.rb
  line: 15
  summary: Triage automation passes 'triage_persona_id' parameter instead of 'triage_agent_id',
    breaking the persona-to-agent parameter rename throughout the automation pipeline
  line_side: pre_fix
- file: pnpm-lock.yaml
  line: 160
  summary: "ember-source pinned at ~6.6.0 which shipped a @glimmer/validator (0.94.8)\
    \ with a memoization bug \u2014 the translated name of the light color scheme\
    \ was cached and never invalidated when the locale changed, causing stale values\
    \ across locale switches. Upgrading to ~6.10.0 (pulling in @glimmer/validator\
    \ 0.95.0) fixes the tracking/invalidation so the translated name is recomputed\
    \ on every access."
  line_side: pre_fix
