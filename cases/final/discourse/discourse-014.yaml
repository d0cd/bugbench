description: After moving suggested-topic tabs into the table header (commit b89e514),
  the tabs became invisible on mobile because the table header is hidden on mobile
  via CSS. The fix forces the tabs to remain visible on mobile by overriding the header
  visibility for the tabs container and injects the moreTopicsTabs service into the
  topic-list component so it can conditionally render them.
