  line: 20
  summary: 'Resource leak: applySearchAutocomplete() creates autocomplete menus but
    the returned instances are not stored, so they cannot be destroyed on navigation'
- file: frontend/discourse/app/lib/search.js
  line: 244
  summary: applySearchAutocomplete does not return the created modifier instances,
    preventing callers from tracking and cleaning them up
