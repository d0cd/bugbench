description: 'The original PR #36853 added support for running `multisite:migrate`
  concurrently, but this introduced stability and performance issues in production.
  This revert undoes the concurrent migration support in `db/fixtures/600_themes.rb`
  and `lib/tasks/db.rake` while the team investigates the root cause.'
expected_findings:
- file: lib/tasks/assets.rake
  line: 34
  summary: The `assets:precompile:build_plugins` task was removed from the `assets:precompile:before`
    dependency chain, causing plugins to not be built during precompilation. This
    was moved into `assemble_ember_build.rb` as part of the concurrent migration support,
    breaking the build pipeline ordering and causing instability.
  line_side: pre_fix
- file: lib/content_security_policy/default.rb
  line: 8
  summary: The `Default.new` initializer dropped the `base_url:` parameter, removing
    the `script_assets` method that generated proper CSP script-src directives with
    CDN/S3 URLs. This caused the CSP to lose all script source allowlisting for assets,
    extra-locales, highlight-js, javascripts, plugins, theme-javascripts, and svg-sprite
    directories.
  line_side: pre_fix
- file: lib/plugin/instance.rb
  line: 966
  summary: Changed `js_asset_exists?` from checking source directory existence (`File.exist?`
    on `assets/javascripts`) to using `Plugin::JsManager.js_asset_exists?` which checks
    for compiled `.js`/`.hbs`/`.gjs` files via glob. During concurrent multisite migrations,
    the compiled assets may not yet exist, causing plugins to be incorrectly detected
    as having no JS assets.
  line_side: pre_fix
