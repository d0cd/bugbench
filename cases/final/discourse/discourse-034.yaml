description: 'The search page''s autocomplete menus (triggered by @ or #) are not
  destroyed when navigating away because their instances are never stored. The fix
  tracks autocomplete modifier instances returned by applySearchAutocomplete so they
  can be properly cleaned up in the willDestroyElement lifecycle hook.'
expected_findings:
