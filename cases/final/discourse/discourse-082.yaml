description: Non-admin users with group-level query access could pass `limit=ALL`
  to remove the row limit entirely on data explorer JSON queries, or pass an arbitrarily
  large integer to bypass the cap. The CSV path also lacked proper validation of non-integer
  limit values. The fix unifies limit handling through `fetch_limit_from_params` which
  rejects non-integer values and enforces `QUERY_RESULT_MAX_LIMIT`.
expected_findings:
- file: plugins/discourse-data-explorer/app/controllers/discourse_data_explorer/query_controller.rb
  line: 178
  summary: 'Security: `params[:limit] == "ALL" ? "ALL" : params[:limit].to_i` passes
    the unbounded string "ALL" directly to the query engine, completely removing the
    row limit. Additionally, the `.to_i` path applies no maximum cap, so any arbitrarily
    large integer bypasses QUERY_RESULT_MAX_LIMIT.'
  line_side: pre_fix
- file: plugins/discourse-data-explorer/app/controllers/discourse_data_explorer/query_controller.rb
  line: 171
  summary: 'Missing input validation: CSV path uses `.to_i` which silently converts
    non-numeric strings like "ALL" to 0 instead of rejecting them with a 400 error.
    Inconsistent validation between CSV and JSON paths.'
  line_side: pre_fix
- file: plugins/discourse-data-explorer/assets/javascripts/discourse/components/query-result.gjs
  line: 294
  summary: Hardcoded limit value `"1000000"` for CSV download should use the server-defined
    QUERY_RESULT_MAX_LIMIT constant to stay in sync with the backend cap.
  line_side: pre_fix
