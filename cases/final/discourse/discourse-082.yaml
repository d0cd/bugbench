pr_title: 'FIX: Enforce max limit for data explorer queries'
pr_body: "Non-admin users with group-level query access could pass `limit=ALL` or\
  \ an arbitrarily large integer to bypass the row limit cap on data explorer queries.\r\
  \n\r\nThis commit removes support for the `ALL` value for the `limit` query param\
  \ since it is unbounded.\r\n\r\nWe consider this a security hardening fix instead\
  \ of a security flaw since there are many conditions for this code path to be exploited\
  \ and those conditions are quite rare."
pr_commit_messages:
- 'FIX: enforce QUERY_RESULT_MAX_LIMIT for data explorer queries'
