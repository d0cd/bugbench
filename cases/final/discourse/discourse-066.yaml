description: The accepted and not_accepted endpoints in the policy controller lacked
  proper authorization checks, exposing user lists for private policies to any logged-in
  user who could see group members. The fix extracts a shared `ensure_can_see_policy_users`
  before_action that enforces private policy visibility restrictions consistent with
  the serializer behavior.
