description: An empty Ember route file (queries.js) was removed during a prior commit,
  breaking Ember's module resolver lookup for the `adminPlugins.explorer.queries`
  route. Without the file, the resolver's suffix trie fell back to `queries/index.js`,
  preventing old Data Explorer query URLs from properly redirecting to the new plugin
  path. The fix restores the empty route file so the resolver finds the correct handler.
