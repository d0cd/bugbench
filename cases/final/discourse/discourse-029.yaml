description: The server-side code that determines the initial value of `enabled_for`
  on the upcoming changes page did not account for localized staff group names. This
  caused the staff group to not be pre-selected on page load when the group name was
  localized, even though it was actually enabled. The fix updates the server-side
  matching logic to handle localized group names consistently with the UI changes
  from the previous commit.
