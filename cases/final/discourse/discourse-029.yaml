description: In PostCreator, the `on(:topic_created)` and `on(:post_created)` event
  triggers are called sequentially without exception isolation. If any registered
  hook for `topic_created` raises an exception, execution halts and `post_created`
  never fires, silently breaking all downstream listeners. The fix wraps the `topic_created`
  trigger in exception handling so that `post_created` is guaranteed to fire regardless.
