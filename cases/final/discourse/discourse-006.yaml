pr_title: 'DEV: Add missing return in getConsolePrefix'
pr_body: "## Summary\r\n\r\n- `getConsolePrefix` in `deprecated.js` called `consolePrefix()`\
  \ but never returned the result, so it always returned `undefined`\r\n- This caused\
  \ deprecation warnings to be missing their source-identifying prefix (e.g. `[THEME\
  \ 123 'test-theme']`)\r\n- The bug was masked because `filter(Boolean)` stripped\
  \ the `undefined` value, so warnings still fired \u2014 just without the prefix\r\
  \n- Adds a test that verifies the console prefix is included in deprecation warnings"
