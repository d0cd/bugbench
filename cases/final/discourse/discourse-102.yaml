pr_title: 'FIX: Redirect data explorer API calls to the new endpoint'
pr_body: "Followup e8287d22b08587fa77dbb72c1c8f2d56304b184d\r\n\r\nThe above commit\
  \ didn't cover redirecting API calls like\r\nPOST /admin/plugins/explorer/queries/:id/run.\
  \ This commit\r\nmakes sure all the route redirects are there, here is the\r\nlist:\r\
  \n\r\n- GET /admin/plugins/explorer \u2014 redirect \u2192 /admin/plugins/discourse-data-explorer\r\
  \n- GET /admin/plugins/explorer/queries \u2014 redirect \u2192 /admin/plugins/discourse-data-explorer/queries\r\
  \n- GET /admin/plugins/explorer/queries/:id \u2014 redirect \u2192 /admin/plugins/discourse-data-explorer/queries/%{id}\r\
  \n- GET /admin/plugins/explorer/schema \u2014 query#schema\r\n- GET /admin/plugins/explorer/groups\
  \ \u2014 query#groups\r\n- POST /admin/plugins/explorer/queries \u2014 query#create\r\
  \n- PUT /admin/plugins/explorer/queries/:id \u2014 query#update\r\n- DELETE /admin/plugins/explorer/queries/:id\
  \ \u2014 query#destroy\r\n- POST /admin/plugins/explorer/queries/:id/run \u2014\
  \ query#run\r\n\r\nAlso added specs to cover legacy routes\r\n"
pr_commit_messages:
- 'FIX: Redirect data explorer API calls to the new endpoint'
