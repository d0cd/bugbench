description: After renaming the Data Explorer plugin routes from /admin/plugins/explorer
  to /admin/plugins/discourse-data-explorer, the initial commit only redirected browser-facing
  GET routes but missed redirecting API mutation endpoints (POST, PUT, DELETE). This
  broke API consumers still hitting the old POST /admin/plugins/explorer/queries/:id/run
  and similar endpoints.
expected_findings:
- file: app/controllers/posts_controller.rb
  line: 495
  summary: The rescue ONPDiff::DiffLimitExceeded block in show_revision swallows diff
    computation errors and returns a 422 to the client instead of letting the diff
    render normally, which is no longer necessary after the underlying diff limitation
    was resolved
  line_side: pre_fix
- file: app/controllers/posts_controller.rb
  line: 506
  summary: The rescue ONPDiff::DiffLimitExceeded block in latest_revision similarly
    catches and suppresses diff errors that should no longer occur, returning a misleading
    422 error to API consumers
  line_side: pre_fix
- file: app/controllers/admin/staff_action_logs_controller.rb
  line: 60
  summary: The begin/rescue ONPDiff::DiffLimitExceeded block wrapping DiscourseDiff
    catches exceptions that are no longer raised, adding unnecessary complexity and
    hiding potential rendering issues in staff action log diffs
  line_side: pre_fix
- file: config/locales/server.en.yml
  line: 1818
  summary: Reddit onebox client_id and client_secret site settings were exposed as
    configurable settings but the underlying Reddit onebox authentication was removed/broken,
    so these orphaned settings needed to be cleaned up
  line_side: pre_fix
- file: frontend/discourse/app/components/async-content.gjs
  line: 55
  summary: The condition `value && !this.#isPromise(value)` silently skips the promise
    type check when `value` is falsy (null, undefined, 0, false, empty string), allowing
    non-promise falsy values to bypass the error instead of throwing. The `value &&`
    guard should be removed so non-promise values always raise.
  line_side: pre_fix
- file: frontend/discourse/app/loader-shims.js
  line: 119
  summary: Backward-compatibility shim redirected 'discourse/lib/transformer/registry'
    to old path instead of properly relocating the file, masking that the module wasn't
    moved to its canonical location
  line_side: pre_fix
- file: frontend/discourse/app/lib/plugin-connectors.js
  line: 215
  summary: connectorsFor unnecessarily accepted and forwarded outletArgs to the debug
    callback, coupling connector resolution to debug tooling state
  line_side: pre_fix
- file: frontend/discourse/app/templates/discovery/custom.gjs
  line: 4
  summary: BlockOutlet wrapper with hasBlocks guard suppressed the admin info message
    when any blocks were registered, incorrectly gating the custom-homepage plugin
    outlet behind the block system
  line_side: pre_fix
- file: frontend/discourse/tests/unit/controllers/topic-test.js
  line: 625
  summary: "The behavior transformer test for 'topic-controller:finished-editing'\
    \ was using withPluginApi to register a transformer that could block finishedEditingTopic,\
    \ but this test (and the associated transformer registration pattern) was incomplete\
    \ \u2014 it only covered the editing flow without accounting for the API mutation\
    \ endpoints (POST/PUT/DELETE) that also needed redirect handling after the route\
    \ rename."
  line_side: pre_fix
- file: lib/composer_messages_finder.rb
  line: 8
  summary: Guardian visibility check on @topic caused it to be set to nil, which broke
    the downstream posted_too_much_in_topic? rate-limit check (passing nil topic_id)
    and other methods that relied on @topic being set
  line_side: pre_fix
- file: lib/composer_messages_finder.rb
  line: 58
  summary: Using @topic&.id instead of @details[:topic_id] meant the rate-limit check
    received nil when the guardian check nullified @topic, bypassing the new-user
    reply limit
  line_side: pre_fix
- file: lib/composer_messages_finder.rb
  line: 160
  summary: Guardian visibility check on the flagged post caused the method to silently
    return, preventing composer warnings about replying to flagged posts from being
    shown
  line_side: pre_fix
- file: plugins/discourse-data-explorer/assets/javascripts/admin/templates/admin-plugins/show/explorer/index.gjs
  line: 154
  summary: Query list rows used a direct <a> tag with getURL+concat to build /admin/plugins/discourse-data-explorer/queries/
    links, which was part of the route renaming that only handled browser-facing GET
    navigation but left API mutation endpoints (POST, PUT, DELETE) on the old /admin/plugins/explorer
    path without redirects
  line_side: pre_fix
- file: plugins/discourse-rss-polling/app/jobs/jobs/discourse_rss_polling/poll_feed.rb
  line: 144
  summary: extract_api_credentials strips api_key and api_username from feed URL query
    params and moves them to HTTP headers, breaking authentication for feeds that
    expect credentials as query parameters (e.g. internal Discourse feeds via FinalDestination)
  line_side: pre_fix
- file: plugins/discourse-solved/assets/javascripts/discourse/initializers/extend-for-solved-button.gjs
  line: 17
  summary: addTrackedTopicProperties does not properly set up tracked properties and
    the setAcceptedSolution method on the topic model, causing accepted_answer and
    has_accepted_answer state changes to not reactively update the UI
  line_side: pre_fix
