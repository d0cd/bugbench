description: The AI helper assistant controller used a single unioned authorization
  check that granted access to both composer and post AI helper endpoints if the user
  had permission for either one. The fix splits the before_action into context-specific
  permission checks, ensuring composer-only users cannot access post helper endpoints
  and vice versa.
