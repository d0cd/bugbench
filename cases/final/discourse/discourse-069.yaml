pr_body: "Follow-up to 9f7d0d34c6dc3892eade6b2619f82935a67e324e\r\n\r\nOn login-required\
  \ sites, the anonymous site payload omits `email_configured`, so the falsy check\
  \ in the `GlobalNotice` component treated the missing field as \"not configured\"\
  \ and showed the SMTP warning banner on the login page. Switch to a strict `===\
  \ false` check."
