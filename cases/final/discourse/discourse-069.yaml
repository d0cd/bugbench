description: On login-required sites, the anonymous site payload omits the `email_configured`
  field entirely. The GlobalNotice component used a falsy check (e.g., `!this.site.email_configured`)
  which treated `undefined` the same as `false`, causing the SMTP configuration warning
  banner to incorrectly appear on the login page. The fix switches to a strict `===
  false` comparison so that a missing/undefined value no longer triggers the banner.
expected_findings:
- file: config/locales/client.de.yml
  line: 297
  summary: The locale string emails_are_disabled_no_smtp was used by the GlobalNotice
    component's SMTP warning banner, which incorrectly appeared on login-required
    sites because the component used a falsy check (!this.site.email_configured) that
    treated undefined the same as false, triggering the banner when email_configured
    was simply absent from the anonymous site payload.
  line_side: pre_fix
- file: config/locales/server.en.yml
  line: 1818
  summary: Reddit onebox client ID and secret site setting descriptions were exposed
    in locale files but the Reddit onebox authentication feature was removed, leaving
    stale/incorrect setting descriptions
  line_side: pre_fix
- file: frontend/discourse/app/components/async-content.gjs
  line: 55
  summary: "Falsy check `value &&` incorrectly allowed non-promise falsy values (like\
    \ undefined, null, false) to skip the error validation, silently passing through\
    \ instead of throwing. This mirrors the same class of bug as using a truthy/falsy\
    \ check where a strict comparison is needed \u2014 undefined was treated the same\
    \ as a valid falsy value."
  line_side: pre_fix
- file: frontend/discourse/app/lib/plugin-connectors.js
  line: 215
  summary: connectorsFor passed outletArgs to debugOutletCallback unnecessarily, coupling
    debug state into connector resolution flow
  line_side: pre_fix
- file: frontend/discourse/app/templates/discovery/custom.gjs
  line: 4
  summary: BlockOutlet wrapping with hasBlocks conditional could suppress the custom
    homepage admin message when no blocks were registered, causing incorrect rendering
    logic
  line_side: pre_fix
- file: frontend/discourse/app/templates/application.gjs
  line: 88
  summary: BlockOutlet components inserted into the application template introduced
    unintended rendering dependencies on the block system, which could interfere with
    page layout when blocks were not properly initialized
  line_side: pre_fix
- file: plugins/chat/assets/javascripts/discourse/components/chat/routes/channel-info-settings.gjs
  line: 94
  summary: The canToggleChannelState getter only allowed reopening closed channels,
    but incorrectly blocked reopening for archived and read-only channels with a disabled
    button and tooltip instead of simply showing the open button for all non-open
    states
  line_side: pre_fix
- file: plugins/discourse-chat-integration/lib/discourse_chat_integration/provider/teams/teams_provider.rb
  line: 104
  summary: The avatar URL passed to Teams Adaptive Cards lacked a protocol prefix;
    `small_avatar_url` returns a protocol-relative URL (e.g. `//host/path`) which
    is not a valid absolute URL for the Teams card image field, resulting in broken
    avatar images.
  line_side: pre_fix
- file: plugins/discourse-gamification/assets/javascripts/discourse/components/modal/recalculate-scores-form.gjs
  line: 77
  summary: The `haveAvailability` was computed as a local const inside the getter
    from `this.args.model` rather than being a tracked property, causing it to not
    be reactive to model changes and potentially evaluating incorrectly when the remaining
    count updates after initial render.
  line_side: pre_fix
