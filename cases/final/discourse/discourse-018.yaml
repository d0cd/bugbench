pr_title: 'FIX: Strip subfolder prefix before SERVER_SIDE_ONLY check in routeTo'
pr_body: "On subfolder setups, clicking server-side-only links (e.g. upload download\
  \ links on the admin user exports page) resulted in a \"page doesn't exist\" error\
  \ instead of downloading the file.\r\n\r\nWhen Discourse runs in a subfolder (e.g.\
  \ /forum), URLs like `/forum/uploads/short-url/abc.csv.gz` were not matching the\
  \ SERVER_SIDE_ONLY regex patterns (e.g. `/^\\/uploads\\//`) because the pathname\
  \ still included the subfolder prefix at the point of the check. This caused `routeTo`\
  \ to hand the URL to Ember's router instead of redirecting to the server, hitting\
  \ the catch-all \"unknown\" route.\r\n\r\nThe fix strips the subfolder prefix using\
  \ `withoutPrefix()` before checking against SERVER_SIDE_ONLY patterns. The original\
  \ path (with prefix) is still passed to `redirectTo`, which correctly handles both\
  \ prefixed and unprefixed URLs via `getURL()`.\r\n\r\nThis only surfaced for the\
  \ admin user exports page because most upload links in post content go through `click-track.js`\
  \ which calls `redirectTo()` directly for `.attachment` links, bypassing `routeTo()`\
  \ and its SERVER_SIDE_ONLY check entirely.\r\n\r\nhttps://meta.discourse.org/t/396783"
pr_commit_messages:
- 'FIX: Strip subfolder prefix before SERVER_SIDE_ONLY check in routeTo'
