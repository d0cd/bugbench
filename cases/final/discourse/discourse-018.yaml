description: In subfolder Discourse setups, the `routeTo` function checked the full
  pathname (including the subfolder prefix like `/forum`) against SERVER_SIDE_ONLY
  regex patterns (e.g. `/^\/uploads\//`), causing the match to fail. This routed server-side-only
  URLs (like file download links) through Ember's client router instead of redirecting
  to the server, producing a 'page doesn't exist' error. The fix strips the subfolder
  prefix with `withoutPrefix()` before the regex check.
