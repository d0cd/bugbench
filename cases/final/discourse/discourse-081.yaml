description: 'Poll option `li` elements in the poll plugin''s stylesheet lacked `display:
  flex` layout, causing child elements like @mention pills to visually overlap the
  option marker or checkbox in cooked topic view. The fix adds flexbox properties
  to poll option list items so markers and content are laid out side by side with
  proper spacing.'
