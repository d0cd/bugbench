pr_title: 'FIX: Poll option mention overlap'
pr_body: "Created first in own fork here: https://github.com/elRicharde/discourse/pull/1\r\
  \n\r\nPoll option list items had no layout container, allowing @mention pills to\
  \ overlap the option marker or checkbox.\r\n\r\nThis change makes poll options flex\
  \ rows so marker and content are always laid out side by side.\r\n\r\nCSS only,\
  \ no behavior or markup changes.\r\n\r\nRepro:\r\nCreate a poll with options that\
  \ include @mentions (mention pills).\r\nIn the cooked topic view, the option marker/checkbox\
  \ can overlap the mention pill.\r\n\r\nFix:\r\nMake poll option list items a flex\
  \ row so the marker/checkbox and the option content\r\nare laid out side by side\
  \ with consistent spacing.\r\n\r\nScreenshots show the overlap before the change.\r\
  \n\r\nScreenshot 2026-02-08 093307 Screenshot 2026-02-08 093403 image"
