description: 'Passkey registration failed in two ways: (1) the CBOR public key extraction
  naively sliced all remaining bytes after the credential ID, breaking when authenticators
  included extension data like hmac-secret in their attestation response, and (2)
  pubKeyCredParams used COSE::Algorithm.registered_algorithm_ids which includes symmetric
  HMAC algorithms that strict authenticator firmware rejects with NotAllowedError.
  The fix uses CBOR::Unpacker streaming decode to read exactly one CBOR object and
  replaces the blanket algorithm list with an explicit allowlist of asymmetric signature
  algorithms.'
expected_findings:
- file: lib/discourse_webauthn/registration_service.rb
  line: 118
  summary: Naive byte slicing after credential ID assumes all remaining bytes are
    the public key; fails when authenticators append extension data (e.g. hmac-secret)
    to the attestation object
- file: lib/discourse_webauthn.rb
  line: 4
  summary: Using COSE::Algorithm.registered_algorithm_ids includes symmetric HMAC
    algorithms invalid for WebAuthn pubKeyCredParams, causing strict authenticators
    to reject the request with NotAllowedError
- file: lib/discourse_webauthn/registration_service.rb
  line: 159
  summary: Missing rescue for COSE::MalformedKeyError causes unhandled exceptions
    to return HTTP 500 instead of a proper error response
