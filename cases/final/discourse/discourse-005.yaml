description: The Discourse subscriptions plugin's webhook endpoint did not enforce
  the presence of a webhook secret, allowing requests to be processed even when the
  secret was blank. The fix adds a guard that returns 403 Forbidden when the webhook
  secret is not configured, preventing unauthenticated webhook payloads from being
  accepted.
