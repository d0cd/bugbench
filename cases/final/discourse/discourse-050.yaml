description: "During a two-phase table rename migration (ai_personas \u2192 ai_agents),\
  \ the intermediate step creates ai_agents as a PostgreSQL VIEW. Since views don't\
  \ expose primary key metadata, ActiveRecord raises UnknownPrimaryKey on every request\
  \ to the AiAgent model. The fix explicitly sets `self.primary_key = \"id\"` on the\
  \ model, which is a no-op after the post-migration completes the actual rename_table."
