pr_title: 'FIX: Set explicit primary key on AiAgent model'
pr_body: "\r\n\r\n- The ai_personas \u2192 ai_agents rename uses a two-phase migration:\
  \ a regular migration creates `ai_agents` as a VIEW, and a post-migration does the\
  \ actual `rename_table`\r\n- Between these phases, PostgreSQL views don't expose\
  \ primary key metadata, causing `ActiveRecord::UnknownPrimaryKey` on every request\r\
  \n- Explicitly setting `self.primary_key = \"id\"` on the model resolves the error\
  \ during the transitional period and is a no-op after the post-migration runs\r\n\
  \r\n"
