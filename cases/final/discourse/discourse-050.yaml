description: DMenu components were using the deprecated `@class` attribute instead
  of the correct `@triggerClass` attribute, causing styling to not be applied to the
  trigger element. Additionally, a CSS rule was too broad and incorrectly styled dropdown
  elements in the categories area. The fix migrates to `@triggerClass` and narrows
  the CSS selector with `:not()` exclusions.
expected_findings:
- file: frontend/discourse/admin/components/admin-flag-item.gjs
  line: 178
  summary: "Incorrect DMenu attribute: `@class` should be `@triggerClass` \u2014 `@class`\
    \ does not apply styling to the DMenu trigger element"
- file: frontend/discourse/admin/components/api-key-item.gjs
  line: 127
  summary: "Incorrect DMenu attribute: `@class` should be `@triggerClass` \u2014 same\
    \ migration issue as other DMenu usages"
- file: app/assets/stylesheets/common/base/uc-modernize-foundation-theme.scss
  line: 72
  summary: 'CSS selector too broad: missing `:not()` exclusions for `.user-menu-tab`,
    `.user-menu-tab-active`, and `.dropdown-select-box-header`, causing unintended
    styling on categories dropdown'
