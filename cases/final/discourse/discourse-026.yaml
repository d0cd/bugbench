description: The server-side code that computes the initial value of `enabled_for`
  for the upcoming changes page did not account for localized staff group names. This
  meant that when the staff group name was translated, it would not match on page
  load and the staff group would appear unselected even though it was enabled. The
  fix updates the server-side list service to compare against localized group names.
expected_findings:
- file: app/services/upcoming_changes/list.rb
  line: 60
  summary: "enabled_for lookup does not account for localized staff group names \u2014\
    \ should compare against translated group name, not just the default English name"
- file: lib/upcoming_changes.rb
  line: 181
  summary: Setting groups resolution does not normalize localized staff group names,
    causing mismatch when locale is non-English
