- file: frontend/discourse/app/services/scroll-direction.js
  line: 34
  summary: "Missing teardown: willDestroy removes routeDidChange but not routeWillChange\
    \ \u2014 add `this.router.off(\"routeWillChange\", this.routeWillChange)` to prevent\
    \ a leaked listener"
