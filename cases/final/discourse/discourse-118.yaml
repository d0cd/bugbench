category: logic
difficulty: medium
severity: high
language: ruby
pr_size: small
description: "A previous commit added a server-side trust level check for the 'delete\
  \ all posts' admin action, but the check was incorrect \u2014 it was overly restrictive\
  \ or applied the wrong condition, preventing legitimate staff use of the feature.\
  \ This revert removes the faulty guard in PostGuardian to restore correct behavior."
expected_findings:
- file: app/controllers/topics_controller.rb
  line: 306
  summary: An overly restrictive `.secured(guardian)` scope was added to the Post
    query used for retrieving posts (e.g., for the 'delete all posts' admin action),
    which applies PostGuardian trust level checks that incorrectly filtered out posts
    that staff should legitimately be able to access and delete.
  line_side: pre_fix
- file: config/locales/client.en.yml
  line: 801
  summary: Reviewable unknown title incorrectly referred to 'review queue items' instead
    of 'reviewables', part of the faulty trust-level guard commit that mischaracterized
    the reviewable system's scope
  line_side: pre_fix
- file: config/locales/client.en.yml
  line: 826
  summary: trust_level_bonus title incorrectly scoped to 'Flags created by higher
    trust level users' instead of 'Reviewable items created by higher trust level
    users', reflecting the overly restrictive trust-level check that conflated flags
    with all reviewable types
  line_side: pre_fix
- file: config/locales/client.ur.yml
  line: 3336
  summary: Locale strings for 'delete_posts_count' and 'delete_posts_confirmation'
    were part of the faulty trust-level-gated 'delete all posts' feature that was
    overly restrictive, preventing legitimate staff use of the admin action. These
    strings are removed as part of the revert.
  line_side: pre_fix
- file: config/site_settings.yml
  line: 455
  summary: 'The `disallowed_groups: "0"` directive on flag_post_allowed_groups incorrectly
    prevented the ''everyone'' group (id 0) from being selectable, making group-based
    permission settings overly restrictive and blocking legitimate staff configuration.'
  line_side: pre_fix
- file: frontend/discourse/admin/components/site-settings/group-list.gjs
  line: 13
  summary: The group-list component computed property depended on `setting.disallowed_groups`
    and filtered out groups matching that list, implementing the faulty restriction
    that prevented valid groups from appearing in the group selector UI.
  line_side: pre_fix
- file: frontend/discourse/app/components/async-content.gjs
  line: 55
  summary: The `value &&` short-circuit causes falsy (but valid) non-promise values
    like `null`, `0`, or `false` to bypass the type validation check, silently accepting
    non-promise data instead of throwing an error
  line_side: pre_fix
- file: frontend/discourse/app/components/d-editor.gjs
  line: 199
  summary: "The toolbarEvent is created unconditionally and passed to `button.action()`\
    \ for non-custom actions, but non-custom toolbar button actions expect the `button`\
    \ object itself as the argument, not a toolbarEvent \u2014 this causes toolbar\
    \ buttons without a customAction to malfunction"
  line_side: pre_fix
- file: frontend/discourse/app/components/toolbar-popup-menu-options.gjs
  line: 36
  summary: "Using `content.condition !== false` incorrectly includes menu options\
    \ whose condition is `undefined`, `null`, or `0` (any falsy-but-not-false value),\
    \ when they should be excluded \u2014 only explicitly truthy conditions should\
    \ cause the option to appear"
  line_side: pre_fix
- file: frontend/discourse/app/models/category.js
  line: 852
  summary: The groupsById lookup used AUTO_GROUPS hardcoded entries which could shadow
    server-provided localized group names, causing permission keys to use wrong group
    names and making the staff-only fallback fail on localized sites
  line_side: pre_fix
- file: frontend/discourse/app/models/user.js
  line: 795
  summary: Changed group filtering from name-based comparison to ID-based comparison
    for moderators, which altered the semantics of automatic group detection and could
    incorrectly filter groups when IDs don't match the constant
  line_side: pre_fix
- file: frontend/discourse/app/static/prosemirror/extensions/emoji.js
  line: 155
  summary: Incorrect guard added to emoji shortcut input rule that blocks emoji shortcuts
    when enableEmojiShortcuts option is falsy, preventing the feature from working
    correctly
  line_side: pre_fix
- file: frontend/discourse/app/static/prosemirror/lib/text-manipulation.js
  line: 193
  summary: 'Overly complex list toggle logic with a flawed lift-then-wrap approach
    for switching list types: the two-step dispatch (lift then wrapInList) reads stale
    state from this.view.state after the first dispatch, causing unreliable list type
    conversion'
  line_side: pre_fix
- file: frontend/discourse/tests/unit/controllers/topic-test.js
  line: 625
  summary: The removed behavior transformer test (`topic-controller:finished-editing`)
    registered a transformer via `withPluginApi` that could unconditionally block
    `finishedEditingTopic`, representing the faulty guard logic that was overly restrictive
    and prevented legitimate use of the feature.
  line_side: pre_fix
- file: lib/guardian/topic_guardian.rb
  line: 350
  summary: Overly restrictive can_see_topic? guard in can_perform_action_available_to_group_moderators?
    blocks legitimate TL4/group moderator use of actions like 'delete all posts',
    since this check was inserted before the trust level and category group moderator
    checks
  line_side: pre_fix
