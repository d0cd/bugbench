description: The chat thread lookup service did not check whether the thread's original
  message had been deleted, allowing deleted threads to remain accessible via the
  API. The fix adds an `original_message_not_deleted` policy check in the LookupThread
  service and a corresponding 404 handler in the controller.
expected_findings:
- file: plugins/chat/app/services/chat/lookup_thread.rb
  line: 27
  summary: 'Missing policy check: service should verify the thread''s original message
    is not deleted before returning thread data'
- file: plugins/chat/app/controllers/chat/api/channel_threads_controller.rb
  line: 44
  summary: 'Missing failure handler: controller does not handle the case where a looked-up
    thread''s original message has been deleted'
