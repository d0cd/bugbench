pr_title: 'FIX: Links to old DE queries were not redirecting'
pr_body: "Followup 174ad83901a6641248de133d267dc6ae2364d818\r\n\r\nWe had the empty\
  \ route file `plugins/discourse-data-explorer/assets/javascripts/discourse/routes/admin-plugins/explorer/queries.js`\r\
  \nin the PR for the above commit but removed it before merge....\r\nhowever it was\
  \ actually necessary to properly redirect\r\nold DE query links (not a direct URL\
  \ in the browser address bar)\r\nto the new query page e.g. `/admin/plugins/explorer/queries/:id`\r\
  \nto `/admin/plugins/discourse-data-explorer/queries/:id`\r\n\r\nThis commit adds\
  \ the empty route file back to make this work.\r\n\r\nThe root cause here is that\
  \ when Ember's resolver looks up a route\r\nhandler for `adminPlugins.explorer.queries`,\
  \ it searches for a module with\r\nthe suffix routes `/admin-plugins/explorer/queries`.\
  \ Since no file\r\nqueries.js exists at that path, the resolver's suffix trie falls\
  \ back to\r\n`routes/admin-plugins/explorer/queries/index` \u2014 finding queries/index.js\r\
  \nand using its class (`AdminPluginsExplorerQueriesIndexRoute`) as the\r\nhandler\
  \ for the parent queries route.\r\n\r\nThis means when the router transitions to\r\
  \n`adminPlugins.explorer.queries.details` it first enters the parent\r\nqueries\
  \ route, which runs the index handler's `beforeModel` \u2014\r\nredirecting to `/admin/plugins/discourse-data-explorer/queries`\
  \ and\r\naborting the transition before the details route is ever reached."
pr_commit_messages:
- 'FIX: Links to old DE queries were not redirecting'
