description: Test specs used imprecise relative date expressions (likely `1.month.ago`)
  in `freeze_time` calls, which produce different results depending on the current
  calendar date due to variable month lengths. The fix replaces these with the explicit
  `31.days.ago` to ensure deterministic behavior regardless of when the tests run.
