description: Calling `map!` on `revision.modifications["raw"]` or `revision.modifications["cooked"]`
  without a nil check causes a NoMethodError when only one modification type exists.
  The fix adds the safe navigation operator (`&.`) before `map!` so nil values are
  gracefully skipped.
