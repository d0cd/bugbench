- file: plugins/chat/test/javascripts/components/chat-message-collapser-test.gjs
  line: 284
  summary: "Missing `await settled()` before `click()` \u2014 after `this.set()` the\
    \ component has not re-rendered yet, so the click targets stale DOM, causing flaky\
    \ failures"
  line_side: pre_fix
- file: frontend/discourse/app/lib/lightbox.js
  line: 20
  summary: Async lightbox work is not wrapped in `waitForPromise`, making it invisible
    to Ember's test settled state and causing `settled()` to resolve before the lightbox
    operation completes
  line_side: pre_fix
