pr_title: 'FIX: disable "Open channel" button on archived and read-only chat channels'
pr_body: "The channel settings page used a simple `isOpen` / `else` conditional to\
  \ render the close/open channel toggle. Any non-open channel (closed, read-only,\
  \ archived) would show an \"Open channel\" button. Clicking it on an archived or\
  \ read-only channel would open the \"Close channel\" modal instead, which then failed\
  \ with a server error because the guardian only allows `closed \u2192 open` transitions.\r\
  \n\r\nReplace the `else` branch with an explicit `isClosed` check so only closed\
  \ channels get an active \"Open channel\" button. For archived and read-only channels,\
  \ render a disabled button wrapped in a `DTooltip` that explains why reopening is\
  \ not possible.\r\n\r\nHere's how the tooltip looks like\r\n\r\n<img width=\"1590\"\
  \ height=\"1343\" alt=\"2026-02-25 @ 08 57 34\" src=\"https://github.com/user-attachments/assets/7220065a-6c03-480c-bb91-b24da04ae496\"\
  \ />\r\n\r\n\r\nhttps://meta.discourse.org/t/396707"
