pr_title: 'FIX: Allow selecting tags when creating or editing webhooks'
pr_body: "Commit 9e99066b07 changed TagChooser to pass tag objects instead of tag\
  \ name strings, but the webhook model sends these objects directly to the backend,\
  \ where `permit(tag_names: [])` silently stripped the non-scalar values, so no tags\
  \ were saved.\r\n\r\nWe'll still be taking in `tag_names` on the API, with a deprecation\
  \ note. The frontend should start sending `tag_ids` which is the new way forward.\r\
