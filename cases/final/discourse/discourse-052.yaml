description: On login-required sites, the anonymous site payload omits the `email_configured`
  field entirely. The GlobalNotice component used a falsy check (e.g., `!this.site.email_configured`)
  which treated `undefined` the same as `false`, causing the SMTP warning banner to
  incorrectly appear on the login page. The fix switches to a strict `=== false` comparison
  so that a missing/undefined value no longer triggers the banner.
expected_findings:
- file: frontend/discourse/app/components/global-notice.gjs
  line: 172
  summary: Falsy check on `email_configured` treats `undefined` (missing from anonymous
    payload on login-required sites) as `false`, incorrectly showing SMTP banner.
    Should use strict `=== false` comparison.
