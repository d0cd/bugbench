pr_title: 'FIX: Enforce Guardian checks in `ComposerMessagesFinder`'
pr_body: "`ComposerMessagesController#index` accepts `topic_id` and `post_id` parameters\
  \ and passes them directly to `ComposerMessagesFinder`, which loads the topic and\
  \ post without verifying the current user can see them. This means any authenticated\
  \ user can probe arbitrary topic and post IDs to trigger composer hints that should\
  \ only appear for accessible content. In particular, `ComposerMessagesFinder#check_dont_feed_the_trolls`\
  \ reveals whether a post has active flags, leaking moderation state. `ComposerMessagesFinder#check_dominating_topic`\
  \ and `ComposerMessagesFinder#check_get_a_room` can also create `UserHistory` records\
  \ referencing topics the user has no access to.\n\nAdd a `Guardian#can_see?` check\
  \ in the `ComposerMessagesFinder` constructor that nils out the topic when the user\
  \ cannot see it. This is safe because the class already handles a nil topic everywhere\
  \ \u2014 it is the normal state when no `topic_id` is provided. Add a second `Guardian#can_see?`\
  \ check in `ComposerMessagesFinder#check_dont_feed_the_trolls` after the post is\
  \ loaded, returning early when the user cannot see the post."
pr_commit_messages:
- 'FIX: Enforce Guardian checks in `ComposerMessagesFinder`'
