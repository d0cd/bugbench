pr_title: 'FIX: Loading more invites on the user invites page'
pr_body: 'The `loadMore` method in `UserInvitedShowController` was accessing `.invites`
  on the Promise returned by `Invite.findInvitedBy()` before awaiting it, causing:


  ```

  TypeError: inviteList is not iterable (cannot read property undefined)

  ```


  The fix splits the await and property access into separate statements so the Promise
  resolves first.


  Also adds a system spec to cover the load-more pagination behavior, which was previously
  untested.'
