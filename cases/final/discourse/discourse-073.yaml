description: The `loadMore` method accessed `.invites` on the unresolved Promise returned
  by `Invite.findInvitedBy()` instead of awaiting it first, causing a TypeError ('inviteList
  is not iterable') when users tried to load more invites. The fix separates the await
  and property access into distinct statements so the Promise resolves before accessing
  its result.
