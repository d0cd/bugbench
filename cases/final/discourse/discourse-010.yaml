description: The rollup plugin compiler incorrectly attempts to render JS assets for
  plugins with empty JS directories that lack a valid asset manifest. Additionally,
  discourse.rb had incorrect fallback logic to the old compilation system, and js_manager.rb
  used class-level memoization (@@) instead of instance-level (@), causing shared
  state issues across instances.
expected_findings:
- file: lib/discourse.rb
  line: 461
  summary: 'Incorrect fallback condition: logical_path check allows falling back to
    old compilation system when it should not under ROLLUP_PLUGIN_COMPILER mode'
- file: lib/discourse.rb
  line: 485
  summary: Same incorrect logical_path fallback condition duplicated for another code
    path
- file: lib/plugin/js_manager.rb
  line: 2
  summary: Class variable @@manifest_data used for memoization instead of instance
    variable @manifest_data, causing shared mutable state across instances
