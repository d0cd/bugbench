description: A previous commit (b89e514) moved the suggested-topics tabs to render
  inside the table header. Because mobile styles hide the table header entirely, the
  tabs became invisible on mobile. The fix forces the tabs to display on mobile and
  adjusts border styling so they render correctly outside the hidden header.
expected_findings:
- file: app/assets/stylesheets/common/foundation/base.scss
  line: 159
  summary: "Missing border-bottom rule for .topic-list-header tr \u2014 after suggested-topics\
    \ tabs were moved inside the table header (which mobile styles hide entirely),\
    \ the tabs became invisible on mobile because no display override was added"
  line_side: pre_fix
- file: app/assets/stylesheets/mobile/suggested-topics.scss
  line: 0
  summary: Mobile styles hide the table header entirely (display:none on thead), which
    also hides the suggested-topics tabs that were moved inside it in commit b89e514;
    the fix adds a .topic-list-header tr border-bottom rule in base.scss to ensure
    tabs render correctly
  line_side: pre_fix
- file: frontend/discourse/app/components/horizontal-overflow-nav.gjs
  line: 18
  summary: The setup() method created a MutationObserver on the element that triggered
    watchScroll on child list changes, but this caused the suggested-topics tabs (moved
    into the table header) to be re-observed incorrectly; the observer was unnecessary
    since onResize already handles scroll watching, and the setup indirection prevented
    scrollToActive from being called directly via didInsert.
  line_side: pre_fix
- file: frontend/discourse/app/lib/tracked-tools.js
  line: 220
  summary: The autoTrackedArray decorator was exported under the wrong canonical name;
    it was defined as autoTrackedArray and aliased as trackedArray, but the codebase
    convention and all consumers expected trackedArray as the primary name, causing
    confusion and inconsistent imports across the codebase.
  line_side: pre_fix
- file: frontend/discourse/app/components/post/menu/buttons/admin.gjs
  line: 5
  summary: The shouldRender check included context.currentUser?.canChangePostOwner
    which pulled the permission check from the current user model rather than from
    the post's own capabilities (canManage, can_wiki, canEditStaffNotes), coupling
    the admin button visibility to an unrelated user-level permission.
  line_side: pre_fix
- file: lib/guardian/post_guardian.rb
  line: 363
  summary: The can_change_post_owner? method incorrectly allowed users in change_post_ownership_allowed_groups
    to change post ownership without proper staff-level checks, and the logic always
    fell through to return false after the group check due to missing early return
    consolidation.
  line_side: pre_fix
- file: lib/discourse_diff.rb
  line: 89
  summary: The revision-content divs included --previous and --current CSS modifier
    classes that, when the suggested-topics tabs were moved inside the table header,
    caused mobile styles (which hide the table header) to also hide the tabs, making
    them invisible on mobile.
  line_side: pre_fix
- file: lib/site_settings/type_supervisor.rb
  line: 162
  summary: The depends_on values were being converted to symbols via .map(&:to_sym),
    causing type mismatches when compared against string-based dependency keys elsewhere
    in the system.
  line_side: pre_fix
- file: plugins/discourse-assign/assets/javascripts/discourse/components/remind-assigns-frequency.gjs
  line: 4
  summary: Using `@computed` from `@ember/object` instead of `discourseComputed` from
    `discourse/lib/decorators`; Ember's native `@computed` does not pass dependent
    key values as arguments to the decorated method, causing properties to be accessed
    incorrectly via `this` instead of received arguments across multiple Discourse
    plugin files.
  line_side: pre_fix
- file: plugins/discourse-solved/app/models/discourse_solved/category_type.rb
  line: 60
  summary: Category type icon uses `ICON_VARIANTS.sample` which randomly selects from
    emoji variants on each call, producing non-deterministic icons instead of a consistent
    fixed icon (`square-check`).
  line_side: pre_fix
- file: plugins/discourse-calendar/assets/javascripts/discourse/components/modal/post-event-bulk-invite.gjs
  line: 13
  summary: Using deprecated `autoTrackedArray` import from `discourse/lib/tracked-tools`
    instead of the renamed `trackedArray` API.
  line_side: pre_fix
- file: plugins/discourse-subscriptions/app/controllers/discourse_subscriptions/admin/subscriptions_controller.rb
  line: 55
  summary: Using ActiveModel::Type::Boolean.new.cast on params[:refund] causes the
    string 'false' to be cast to boolean false, skipping the refund when the param
    is present but set to 'false'. The param presence alone should determine whether
    to refund.
  line_side: pre_fix
- file: plugins/discourse-subscriptions/assets/javascripts/discourse/components/campaign-banner.gjs
  line: 128
  summary: Using native @computed with ES getter syntax (get bannerInfoStyle) in a
    classic Ember component does not properly track dependent keys; should use @discourseComputed
    which passes dependent values as arguments.
  line_side: pre_fix
