description: "The ProseMirror quote node spec lacked a `displayName` attribute, so\
  \ during the markdown\u2192ProseMirror\u2192markdown round-trip the display name\
  \ was discarded and only the username survived. Additionally, the markdown-it quote\
  \ parser did not emit `data-display-name` on the aside token, and the serializer\
  \ did not output the display name or `username:` param when a display name was present."
expected_findings:
- file: frontend/discourse/app/static/prosemirror/extensions/quote.js
  line: 14
  summary: Quote node spec is missing a `displayName` attribute, causing display names
    to be lost during ProseMirror round-trips
- file: frontend/discourse-markdown-it/src/features/quotes.js
  line: 42
  summary: markdown-it aside token does not propagate the parsed display name as `data-display-name`,
    so ProseMirror never receives it
- file: frontend/discourse/app/static/prosemirror/extensions/quote.js
  line: 35
  summary: Quote serializer does not emit display name and `username:` param when
    a display name is present, falling back to username only
