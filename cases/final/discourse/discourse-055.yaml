pr_title: 'FIX: Remove unnecessary TrackedArray wrapper in route-action helper'
pr_body: "The original commit modernized deprecated Ember array methods across bundled\
  \ plugins, replacing methods like `.pushObject()`, `.removeObject()`, `.firstObject`,\
  \ `.lastObject`, etc. with their modern equivalents. During this refactoring, a\
  \ `TrackedArray` was introduced in `route-action.js` where it provides no benefit\
  \ \u2014 the array is created, used for a single `.find()` call, and immediately\
  \ discarded."
