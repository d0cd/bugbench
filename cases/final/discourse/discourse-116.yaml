pr_title: 'FIX: Tag group form not updating when switching between tag groups'
pr_body: 'The `TagGroupsForm` component''s `buffered` getter used `@cached @dependentKeyCompat`,
  which doesn''t invalidate when classic component attrs change. When clicking between
  tag groups in the sidebar, the `BufferedProxy` kept wrapping the old model, so the
  form displayed stale data.


  Switched to `@computed("model")` so the `BufferedProxy` is properly recreated when
  the model changes. This is consistent with other computed properties in the same
  component (e.g., `@computed("buffered.permissions")`).


  Added a system test that navigates between two tag groups and verifies the form
  updates.'
