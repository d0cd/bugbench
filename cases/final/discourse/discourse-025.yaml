description: The HighlightedCode component was scoped under the admin namespace (discourse/admin/components/highlighted-code),
  preventing clean usage from non-admin contexts like the styleguide. The fix moves
  it to the core app namespace (discourse/components/highlighted-code) and updates
  all import paths, leaving a deprecated re-export at the old location.
