pr_title: 'FIX: Only allow translation of posts that the user can see'
pr_body: "`schedule_topic` in `TranslationController` is only authorized at the topic\r\
  \nlevel, not filtering posts by the caller's ability to see posts.\r\n\r\nThis allows\
  \ a user in `content_localization_allowed_groups` to enqueue\r\ntranslation jobs\
  \ for posts they cannot see.\r\n\r\nThis PR adds `Post.secured(guardian)` to `find_untranslated_posts`\
  \ so only\r\npost types visible to the requesting user are scheduled."
