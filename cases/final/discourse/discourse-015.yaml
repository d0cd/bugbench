pr_title: 'FIX: Redirect old data explorer URLs to the new ones'
pr_body: "Followup e14af1c251c6206ec627bd7a72c52c914fe4c1d9\r\n\r\nPeople often bookmark\
  \ data explorer queries or add them to their\r\nsidebar. In the previous commit,\
  \ we changed the URLs for queries to\r\nfollow the admin plugin URL guidelines,\
  \ but didn't redirect old URLs to\r\nthe new ones.\r\n\r\nThis commit adds those\
  \ redirects, so that old URLs will still\r\nfunction and users won't lose access\
  \ to their bookmarked queries.\r\n\r\nAlso changes the Edit label to View on the\
  \ query list to make\r\nit clearer that you can Run or Edit the query in the same\
  \ place.\r\n"
