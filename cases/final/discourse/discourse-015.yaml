description: The PR replaces a full Rails engine mount at the legacy `/admin/plugins/explorer`
  path with only three GET redirect routes. This means POST/PUT/DELETE requests to
  old URLs (e.g., running queries via API, updating queries, deleting queries) will
  now return 404 instead of being redirected or handled. External API consumers and
  scripts using the old `/admin/plugins/explorer/queries/:id/run` POST endpoint will
  silently break. Additionally, the old `?id=` query-parameter URL format that was
  previously redirected client-side is no longer handled.
expected_findings:
- file: app/controllers/webhooks_controller.rb
  line: 41
  summary: Safe navigation operator `&.[]` on `error_code` silently returns nil when
    error_code is nil, causing unknown/missing bounce error codes to always be misclassified
    as hard bounces instead of being properly handled
  line_side: pre_fix
- file: app/controllers/webhooks_controller.rb
  line: 283
  summary: Early return `return false if signature.blank? || timestamp.blank?` in
    `valid_sendgrid_signature?` silently rejects webhooks with missing auth headers
    before any logging or proper error handling, masking configuration or delivery
    issues
  line_side: pre_fix
- file: app/controllers/uploads_controller.rb
  line: 115
  summary: The `request_site_current_user` save/delete/restore pattern unnecessarily
    removes the current user key from the request env before entering `with_connection`,
    then evaluates `current_user` inside an inner begin block where the key is absent,
    causing incorrect user context resolution in multisite cross-site upload downloads
  line_side: pre_fix
