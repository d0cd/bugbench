description: Test specs used `freeze_time 31.days.ago` which causes failures depending
  on the current date and month length. For example, going back 31 days from March
  3rd lands in January, not February, breaking assertions that assume a specific month.
  The fix replaces the brittle relative date with a more stable time reference.
