pr_title: 'FIX: send RSS polling API credentials as headers instead of query params'
pr_body: "Previously, when polling an RSS feed from a login-required Discourse site,\
  \ the `api_key` and `api_username` query parameters were passed through in the URL.\
  \ While #37840 fixed the HEAD\u2192GET issue, API key authentication via query parameters\
  \ still fails because `api_parameter_allowed?` rejects the request \u2014 the route's\
  \ `path_parameters` aren't populated when `current_user` is evaluated in this context,\
  \ causing the RouteMatcher to fail the action check.\r\n\r\nThis extracts API credentials\
  \ from the feed URL query string and sends them as `Api-Key` / `Api-Username` headers\
  \ instead. Header-based API authentication doesn't go through `api_parameter_allowed?`\
  \ and works reliably regardless of route matching state.\r\n\r\nAlso adds warn-level\
  \ logging throughout the feed fetching pipeline: HTTP failures now log the status\
  \ code, empty/unparseable responses are surfaced, and RSS parse errors include the\
  \ exception message. Previously all of these failed silently, making diagnosis require\
  \ console access."
