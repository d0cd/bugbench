- file: frontend/discourse/app/controllers/exception.js
  line: 64
  summary: Accessing `this.thrown.reason` without null guard causes 'undefined is
    not an object' error when `this.thrown` is undefined
  line_side: pre_fix
- file: frontend/discourse/app/controllers/exception.js
  line: 90
  summary: Accessing `this.thrown.desc` without null guard causes 'undefined is not
    an object' error when `this.thrown` is undefined
  line_side: pre_fix
- file: plugins/chat/app/services/chat/list_channel_pins.rb
  line: 16
  summary: The `pins` model is not marked as optional, causing the service to fail
    when a channel has no pinned messages instead of returning an empty list
