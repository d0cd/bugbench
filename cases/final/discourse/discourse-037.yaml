description: A CSS selector for limiting width and preventing wrapping on select-kit
  dropdown headers was scoped too broadly, applying to all `.select-kit .select-kit-header
  .selected-name .name` elements instead of only the group dropdown on the /g page.
  The fix narrows the selector to target only `.user-primary-navigation .group-dropdown`
  so other select-kit dropdowns are not affected.
