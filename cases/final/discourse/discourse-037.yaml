pr_body: "## Summary\r\n\r\nThe original commit added `id` attributes to badge grouping\
  \ section titles using the `dasherize` helper. However, `dasherize` only handles\
  \ camelCase conversion - it does not sanitize special characters that would result\
  \ in invalid HTML IDs. This fix replaces `dasherize` with `slugify`, which properly\
  \ strips all non-word characters to produce valid, usable HTML IDs.\r\n\r\n## Source\r\
