description: "The ProseMirror quote node spec did not store a displayName attribute,\
  \ so the markdown\u2192ProseMirror\u2192markdown round-trip discarded the user's\
  \ display name and fell back to just the username. Additionally, when the display\
  \ name contained no commas the split result was left as an array instead of being\
  \ joined into a string."
