description: Test specs used `freeze_time 31.days.ago` which produces inconsistent
  dates depending on the current month (not all months have 31 days), causing flaky
  test failures around month boundaries. The fix replaces the relative 31-day offset
  with a stable date expression that avoids month-length ambiguity.
