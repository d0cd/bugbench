pr_title: 'FIX: Preserve display name in quotes when using the rich text editor'
pr_body: "When `display_name_on_posts` is enabled and `prioritize_username_in_ux`\
  \ is disabled, quoting a post in markdown mode correctly attributes the quote to\
  \ the user's full name (e.g. `[quote=\"Robin Ward, post:1, topic:2, username:eviltrout\"\
  ]`). However, the rich text editor lost the display name during the markdown\u2192\
  ProseMirror\u2192markdown round-trip, falling back to just the username.\r\n\r\n\
  The ProseMirror quote node only stored `username` in its attributes. When BBCode\
  \ with a `username:` param was parsed, the display name was discarded. On serialization,\
  \ only the username survived.\r\n\r\nThis commit:\r\n- Adds a `displayName` attribute\
  \ to the ProseMirror quote node spec\r\n- Emits `data-display-name` on the markdown-it\
  \ aside token so the ProseMirror parser can pick it up\r\n- Updates the serializer\
  \ to output the display name and `username:` param when present\r\n- Fixes a latent\
  \ issue where `displayName` remained as an array instead of being joined into a\
  \ string when the name contains no commas\r\n\r\nhttps://meta.discourse.org/t/397049/12"
pr_commit_messages:
- 'FIX: Preserve display name in quotes when using the rich text editor'
- fix the specs
