description: 'Passkey registration fails in two ways: (1) the authenticator data parser
  naively slices all bytes after the credential ID as the public key, so authenticators
  that include CBOR extension data (e.g. hmac-secret) cause a CBOR/COSE decode failure
  (HTTP 500); (2) pubKeyCredParams is populated from COSE::Algorithm.registered_algorithm_ids
  which includes HMAC symmetric algorithms that strict authenticator firmware rejects
  with NotAllowedError. The fix uses CBOR::Unpacker streaming decode to read exactly
  one CBOR object and replaces the blanket algorithm list with an explicit asymmetric-only
  allow-list.'
