pr_title: 'FIX: passkey registration failing when extension data included'
pr_body: "**Currently, passkey registration has two bugs:**\r\n  1. Registration fails\
  \ with an HTTP 500 for authenticators that include extension data (i.e. `hmac-secret`\
  \ in their attestation response) because we slice all bytes after the credential\
  \ ID the public key.\r\n  2. Registration fails with `NotAllowedError` on some hardware\
  \ keys (i.e. Solo 2) because `pubKeyCredParams` includes invalid HMAC symmetric\
  \ algorithms from the `COSE` gem, which strict authenticator firmware rejects.\r\
  \n\r\n**This fix:**\r\n  1. Uses `CBOR::Unpacker` streaming decode to read exactly\
  \ one `CBOR` object from the byte stream, stopping before any trailing extension\
  \ data. Also adds `COSE::MalformedKeyError` to the rescue block so future failures\
  \ return a proper error response.\r\n  2. Replaces the blanket `COSE::Algorithm.registered_algorithm_ids`\
  \ with an explicit list of asymmetric signature algorithms valid for `WebAuthn`.\r\
  \n\r\nMeta bug report: https://meta.discourse.org/t/cant-set-up-passkey-on-any-discourse/397642/"
pr_commit_messages:
- 'FIX: passkey registration failing when extension data included'
- 'FIX: skip unsupported algorithms'
