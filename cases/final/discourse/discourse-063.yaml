description: The server-side code that determines the initial value of `enabled_for`
  for the upcoming changes page did not account for localized staff group names. When
  the staff group name was translated to a non-English locale, the string comparison
  failed and the staff group was not marked as selected on page load, even though
  it was enabled. The fix updates the server-side list service and upcoming changes
  library to match localized group names.
expected_findings:
- file: config/locales/client.de.yml
  line: 5619
  summary: The enabled_for_staff filter used %{staffGroupName} interpolation which
    passes the localized staff group name, causing string comparison to fail when
    the group name is translated to a non-English locale
  line_side: pre_fix
- file: config/locales/client.ja.yml
  line: 5193
  summary: The enabled_for_options for upcoming changes lacked a dedicated 'staff'
    key, instead relying on specific_groups_with_group_names which compared against
    localized group names. When the staff group name was translated (e.g. to Japanese),
    the string comparison failed and the staff group was not recognized as selected
    on page load.
  line_side: pre_fix
- file: frontend/discourse/admin/components/admin-config-areas/upcoming-changes.gjs
  line: 24
  summary: The staffGroupName getter retrieved the localized group name via site.groupsById,
    which caused string comparison failures for non-English locales when determining
    whether the staff group was selected as enabled_for on the upcoming changes page.
  line_side: pre_fix
- file: frontend/discourse/admin/controllers/admin-config/upcoming-changes.js
  line: 5
  summary: The upcoming changes controller used a simple string-based changeNamesFilter
    for matching group names, which failed when staff group names were localized to
    non-English strings. The entire controller was removed as the filtering/matching
    logic was moved server-side to properly handle localized group names.
  line_side: pre_fix
- file: frontend/discourse/admin/templates/admin-config/upcoming-changes.gjs
  line: 25
  summary: The template passed changeNamesFilter and onClearChangeNamesFilter to AdminConfigAreasUpcomingChanges,
    relying on client-side string comparison that did not account for localized staff
    group names when determining the initial enabled_for value.
  line_side: pre_fix
- file: frontend/discourse/app/lib/notification-types/upcoming-change-available.js
  line: 38
  summary: The linkHref constructed a changeNamesFilter query param using potentially
    localized change names, which would fail to match on the server side when group
    names were translated to a non-English locale
  line_side: pre_fix
- file: frontend/discourse/app/lib/notification-types/upcoming-change-automatically-promoted.js
  line: 42
  summary: The linkHref constructed a changeNamesFilter query param using potentially
    localized change names, causing the same localization mismatch issue where the
    staff group would not be found when the name was translated
  line_side: pre_fix
- file: frontend/discourse/tests/integration/components/prosemirror-editor/quote-test.js
  line: 31
  summary: Quote parsing with display name and separate username parameter did not
    properly handle localized/translated display names when matching against group
    names, causing string comparison to fail for non-English locales
  line_side: pre_fix
- file: lib/discourse_updates.rb
  line: 156
  summary: The entries processing block that checks related_site_setting and sets
    setting_enabled was missing from the method, meaning the server never computed
    whether settings were enabled for upcoming changes entries. Without this processing,
    localized staff group names could not be properly matched when determining the
    initial enabled_for value on the upcoming changes page.
  line_side: pre_fix
- file: plugins/discourse-ai/app/models/llm_model.rb
  line: 318
  summary: The depends_on logic in lookup_custom_param silently returns nil for provider
    params when a dependency is not 'active', causing valid parameter values to be
    dropped unexpectedly (e.g., disable_temperature returning nil when enable_reasoning
    is off)
  line_side: pre_fix
- file: plugins/discourse-ai/app/controllers/discourse_ai/admin/ai_llms_controller.rb
  line: 241
  summary: sanitize_dependent_params! silently clears user-set provider params when
    their parent dependency is inactive (nil, false, 'default', or empty string),
    causing data loss on save
  line_side: pre_fix
- file: plugins/discourse-data-explorer/plugin.rb
  line: 53
  summary: user_can_access_query? returned false when query had no group assignments
    (query.groups was empty), making groupless queries inaccessible to non-admin users.
    Missing query.groups.blank? check.
  line_side: pre_fix
- file: plugins/discourse-chat-integration/lib/discourse_chat_integration/provider/teams/teams_provider.rb
  line: 104
  summary: Avatar URL for Teams adaptive card was missing the 'http:' protocol prefix,
    resulting in a protocol-relative URL that Teams cannot resolve for displaying
    user avatars.
  line_side: pre_fix
- file: plugins/discourse-subscriptions/app/controllers/discourse_subscriptions/hooks_controller.rb
  line: 23
  summary: Blank webhook secret check causes all Stripe webhooks to be rejected with
    403 when no secret is configured, rather than allowing the Stripe SDK to handle
    verification
  line_side: pre_fix
- file: script/backport.rb
  line: 91
  summary: Cherry-picking an entire commit range at once causes silent failures without
    identifying which specific commit has conflicts, and the RunResult data class
    adds unnecessary abstraction that obscures error handling
  line_side: pre_fix
- file: plugins/poll/app/controllers/discourse_poll/polls_controller.rb
  line: 51
  summary: Loading poll with includes(:post) and then calling guardian.ensure_can_see!
    raises a 403 for private category polls even when the user has poll voter visibility,
    instead of delegating access control to can_see_voters?
  line_side: pre_fix
