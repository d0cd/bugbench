description: When polling RSS feeds from a login-required Discourse site, API credentials
  were passed as query parameters in the URL. The `api_parameter_allowed?` check rejected
  these because route `path_parameters` aren't populated in the feed-polling context,
  causing authentication to always fail. The fix extracts credentials from the URL
  query string and sends them as `Api-Key`/`Api-Username` headers, which bypass the
  route-matching check.
