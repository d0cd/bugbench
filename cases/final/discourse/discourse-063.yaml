pr_title: 'FIX: Make sure staff group is selected on UC page load when localized'
pr_body: "Followup 401f49c5fc30f947759e43e4d4d260c2af435071\r\n\r\nIn the previous\
  \ commit I made it so that localized staff group names\r\nwere taken into account\
  \ in the UI and when selecting Staff for Enabled\r\nfor on the upcoming change page.\r\
  \n\r\nHowever, I didn't update the server side which gets the initial value\r\n\
  of enabled_for to be used on page load. This meant that if the staff group name\
  \ was\r\nlocalized, the staff group would not be selected on page load even if it\
  \ was enabled.\r\n\r\nc.f. https://meta.discourse.org/t/issue-with-enabling-upcoming-changes/395881/26?u=martin\r\
  \n"
