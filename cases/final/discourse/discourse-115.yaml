description: Tag normalization was inconsistent across creation paths. The bulk_create
  service performed its own normalization (strip, downcase, space-to-dash) then compared
  against clean_tag's output, rejecting tags like 'test--tag' because clean_tag squeezed
  dashes but the local normalization did not. The frontend tag-utils also lacked dash
  squeezing. The fix centralizes all cleanup through DiscourseTagging.clean_tag and
  adds a truncate parameter to allow bulk_create to handle length validation separately.
expected_findings:
- file: app/services/tags/bulk_create.rb
  line: 70
  summary: 'Duplicate normalization logic: this method normalizes tags manually (strip,
    downcase, gsub spaces) then compares against clean_tag output, but the local normalization
    omits squeeze(''-'') that clean_tag performs. Tags with consecutive dashes like
    ''a--b'' are incorrectly rejected because normalized_input retains ''--'' while
    clean_tag squeezes to ''-''.'
  line_side: pre_fix
- file: app/services/tags/bulk_create.rb
  line: 86
  summary: 'Overly strict comparison: comparing tag_name (from clean_tag, which strips
    special chars and squeezes dashes) against normalized_input (which only handles
    whitespace and casing) causes valid tags containing special characters or consecutive
    dashes to be rejected as invalid.'
  line_side: pre_fix
- file: frontend/discourse/select-kit/services/tag-utils.js
  line: 76
  summary: 'Missing dash squeeze: after stripping special characters with the preceding
    regex, consecutive dashes can remain (e.g. ''a!-!b'' becomes ''a--b''). Should
    add .replace(/-{2,}/g, ''-'') to match the server-side clean_tag behavior.'
  line_side: pre_fix
