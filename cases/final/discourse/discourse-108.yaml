description: The `newFeatures` tracked property was initialized to `null`, causing
  `Object.keys(null)` to throw a TypeError when the dashboard feed request fails on
  first load. The fix initializes it to `{}` and resets it in the catch block so stale
  data is cleared on retry failures.
expected_findings:
- file: frontend/discourse/admin/components/dashboard-new-features.gjs
  line: 14
  summary: 'Null crash: `newFeatures` is initialized to `null` (or left uninitialized),
    but later passed to `Object.keys()` which throws TypeError on null. Should default
    to `{}`.'
  line_side: pre_fix
- file: frontend/discourse/admin/components/dashboard-new-features.gjs
  line: 47
  summary: 'Missing reset in catch block: when the feed request fails, `newFeatures`
    retains its previous value (or stays `null`), leaving stale data on retry failures.
    Should reset to `{}` in the error handler.'
  line_side: pre_fix
