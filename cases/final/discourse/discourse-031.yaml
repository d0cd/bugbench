description: The `accepted` and `not_accepted` policy endpoints lacked proper visibility
  restrictions for private policies. Any logged-in user could enumerate which users
  accepted or declined a private policy, since the inline checks only verified `can_see_groups_members?`
  but never checked the `private?` flag on the policy itself. The fix extracts a `before_action`
  that denies non-admin access to private policy user lists.
