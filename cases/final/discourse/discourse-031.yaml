  summary: "Missing before_action for visibility on `accepted` and `not_accepted`\
    \ endpoints \u2014 no check prevents non-admins from viewing private policy user\
    \ lists"
  line_side: pre_fix
- file: plugins/discourse-policy/app/controllers/discourse_policy/policy_controller.rb
  line: 32
  summary: Inline permission check in `accepted` only verifies `can_see_groups_members?`
    but does not check `post_policy.private?`, allowing any user to see private policy
    acceptances
  line_side: pre_fix
- file: plugins/discourse-policy/app/controllers/discourse_policy/policy_controller.rb
