description: 'The search page''s autocomplete menus (triggered by @ or #) were not
  being tracked or destroyed during page navigation. When the user triggered autocomplete
  and then navigated away (e.g., browser back button), the menu persisted on screen.
  The fix stores references to autocomplete modifier instances so they can be properly
  cleaned up in the willDestroyElement lifecycle hook.'
