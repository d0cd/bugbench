description: The Dropbox onebox handlers only recognized the legacy `/s/` sharing
  URL format, causing the newer `/scl/fi/` format URLs to not be transformed into
  direct-download links via dl.dropboxusercontent.com. The fix extracts a shared helper
  that handles both URL formats, adds `raw=1` for `/scl/` URLs, and eliminates the
  side-effect mutation of `@url`.
