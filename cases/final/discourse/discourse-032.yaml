pr_title: 'FIX: Support Dropbox /scl/ URL format in video and image oneboxes'
pr_body: "Dropbox has introduced a new sharing URL format using `/scl/fi/` instead\
  \ of the legacy `/s/` path. This updates VideoOnebox and ImageOnebox to:\r\n\r\n\
  - Detect and transform new `/scl/` format URLs\r\n- Convert to dl.dropboxusercontent.com\
  \ domain\r\n- Ensure raw=1 parameter is present for direct download\r\n- Maintain\
  \ backward compatibility with legacy `/s/` format\r\n- Also...added test coverage\
  \ for both old and new Dropbox formats. All existing tests continue to pass.\r\n\
  \r\nCo-Authored-By: Claude Sonnet 4.5"
