pr_title: 'FIX: Correct visit counter calculations for stacked report data'
pr_body: "What is the problem?\r\n\r\nWhen the `reporting_improvements` flag is enabled,\
  \ the visits report returns stacked chart data with separate desktop and mobile\
  \ series. The `Report` model's `valueAt` and `valueFor` methods operate directly\
  \ on `this.data`, which in stacked mode is an array of series objects (each with\
  \ a `label` and nested `data` array) rather than a flat array of `{ x, y }` points.\
  \ This means the dashboard activity metrics counters (today, yesterday, 7-day, 30-day)\
  \ fail to compute correct values for the visits report.\r\n\r\nAdditionally, the\
  \ legacy warning banner in `admin-report-new.gjs` rendered outside the `showHeader`\
  \ conditional, causing it to appear even when headers are hidden (e.g. in counters\
  \ mode on the dashboard).\r\n\r\nWhat is the solution?\r\n\r\nA new `combinedData`\
  \ getter on the JS `Report` model detects stacked data (entries with a `label` property)\
  \ and flattens all series into a single array, summing `y` values for matching dates.\
  \ The `valueAt` and `valueFor` methods now use `combinedData` instead of `data`\
  \ directly. The legacy warning in `admin-report-new.gjs` is moved inside the `showHeader`\
  \ block. A system test is added to verify visit counters display correctly with\
  \ the flag both on and off."
pr_commit_messages:
- 'FIX: Correct visit counter calculations for stacked report data'
