description: After tabs were moved to render inside the table header (commit b89e514),
  they became invisible on mobile because the table header is hidden on mobile via
  CSS. The fix forces the tabs to remain visible on mobile by overriding the header's
  display property and injects the moreTopicsTabs service so the component can conditionally
  render tabs.
