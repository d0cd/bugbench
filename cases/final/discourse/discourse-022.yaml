  \ refresh Kimi K2.5 token limits and pricing\n- Broaden effort parameter description\
  \ (no longer Opus-only)\n- Update eval LLM config, locales, and specs accordingly\n\
  \nMost important thing here is the beta header removal, having it causes\nfeatures\
  \ to break since they are no longer supported\n"
