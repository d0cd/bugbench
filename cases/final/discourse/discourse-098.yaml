pr_title: 'FIX: tag edit page crashing when slug_generation_method is none'
pr_body: "When slug_generation_method is \"none\" (the default for CJK locales), tags\
  \ are created with empty slugs, same as what happens with categories.\r\n\r\nThe\
  \ tag settings page crashes because TagSettingsSerializer returned the raw empty\
  \ slug, and the Ember router can't construct a URL with an empty :tag_slug parameter.\r\
  \n\r\nAll other tag serializers already use slug_for_url which provides a `\"#{id}-tag\"\
  ` fallback for empty slugs (similar to `\"#{id}-category\"` for categories). This\
  \ aligns TagSettingsSerializer with the rest.\r\n\r\n<img width=\"430\" height=\"\
  538\" alt=\"Screenshot 2026-03-10 at 12 38 49\u202FAM\" src=\"https://github.com/user-attachments/assets/f8486333-e4b5-4916-b2d9-dda29f50eaa7\"\
  \ />\r\n\r\nRelated: https://meta.discourse.org/t/slug-none/397789"
