description: TagSettingsSerializer returned the raw empty slug instead of using slug_for_url,
  which provides a fallback format ("#{id}-tag") for tags with empty slugs. This caused
  the tag edit page to crash in CJK locales where slug_generation_method is "none",
  because the Ember router cannot construct a URL with an empty :tag_slug parameter.
  The fix aligns TagSettingsSerializer with all other tag serializers that already
  use slug_for_url.
