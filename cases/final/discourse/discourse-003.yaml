description: The accept_answer service in discourse-solved crashed with a 'user not
  found' error when trying to send notifications for accepted solutions where the
  post or topic author had been deleted. The fix adds guard clauses checking User.exists?(post.user_id)
  before attempting to notify the post author and topic creator, preventing the error
  for deleted users.
expected_findings:
- file: plugins/discourse-solved/app/services/discourse_solved/accept_answer.rb
  line: 69
  summary: 'Missing existence check: code attempts to notify post author without verifying
    the user still exists, causing error when user has been deleted. Should guard
    with `!User.exists?(post.user_id)`.'
- file: plugins/discourse-solved/app/services/discourse_solved/accept_answer.rb
  line: 91
  summary: 'Missing existence check: code attempts to notify topic creator without
    verifying the user still exists. Same deleted-user guard needed as the post author
    notification path.'
