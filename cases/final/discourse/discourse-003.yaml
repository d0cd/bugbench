pr_title: 'FIX: Scope thread lookup by channel_id in chat thread messages service'
pr_body: "What is the problem?\n\n- The chat plugin routes thread message requests\
  \ through\n  `/chat/api/channels/:channel_id/threads/:thread_id/messages`, where\n\
  \  `channel_id` is part of the URL hierarchy.\n- `Chat::ListChannelThreadMessages`\
  \ ignores the `channel_id` route\n  parameter entirely, looking up threads globally\
  \ via `thread_id` alone\n  in `fetch_thread`.\n- This violates REST hierarchy semantics\
  \ \u2014 a request with a mismatched\n  `channel_id` still succeeds \u2014 and is\
  \ inconsistent with every other\n  thread-scoped service (`Chat::LookupThread`,\n\
  \  `Chat::UpdateUserThreadLastRead`, etc.) which all scope by both IDs.\n- Additionally,\
  \ unlike peer services, it does not enforce that threading\n  is enabled for the\
  \ channel.\n\nWhat is the solution?\n\n- Add `channel_id` to the service contract\
  \ with presence validation.\n- Scope `fetch_thread` by both `thread_id` and `channel_id`\
  \ so\n  mismatched pairs return a 404.\n- Add a `threading_enabled_for_channel`\
  \ policy check after\n  `can_view_thread`, matching the pattern in `Chat::LookupThread`\n\
  \  (with `thread.force` support for forced threads like AI bot DMs).\n- Add the\
  \ corresponding `on_failed_policy` handler in\n  `Chat::Api::ChannelThreadMessagesController`.\n\
  - Update `ChatSDK::Thread#messages` to resolve and pass `channel_id`\n  to the service,\
  \ and handle the new policy failure."
