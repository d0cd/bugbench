pr_title: 'FIX: Exclude notify_moderators PMs from personal message rate limit'
pr_body: "When a user flags a post with \"Something Else\", Discourse creates a private\
  \ message to moderators containing the flag details. This PM is created with the\
  \ flagger as the topic owner, which causes it to count against the user's `max_personal_messages_per_day`\
  \ rate limit.\r\n\r\nThis means users who have exhausted their daily PM quota cannot\
  \ flag posts with the \"Something Else\" reason, even though the flag itself has\
  \ its own independent rate limits (`max_flags_per_day` with trust level multipliers).\
  \ The error message (\"You've reached the maximum messages allowed per day\") is\
  \ also confusing in a flagging context.\r\n\r\nThis fix excludes topics with the\
  \ `notify_moderators` subtype from the PM per-day rate limit check in `Topic#limit_private_messages_per_day`.\
  \ Flag-generated PMs are system-initiated side effects, not user-initiated messages,\
  \ and should not count against the personal message quota.\r\n\r\nhttps://meta.discourse.org/t/257002"
