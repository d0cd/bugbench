description: The Topic#limit_private_messages_per_day method counts all PMs against
  the user's daily quota, including system-initiated notify_moderators PMs created
  when a user flags a post with 'Something Else'. This incorrectly blocks flagging
  when the user has exhausted their PM limit, even though flags have their own independent
  rate limits. The fix excludes topics with the notify_moderators subtype from the
  personal message rate limit check.
