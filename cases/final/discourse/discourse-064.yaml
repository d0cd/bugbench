description: 'When #37763 moved plugin script tag generation from ember-cli to Rails,
  the data attributes (data-discourse-plugin, data-preinstalled, data-official) were
  dropped from the generated script tags. Additionally, the test loader''s `script.dataset
  = element.dataset` was a silent no-op since dataset is a readonly DOMStringMap property,
  so data attributes were never copied to dynamically created script elements. This
  caused setup-tests.js to misidentify all test runs as core tests, enabling strict
  deprecation handling that broke private plugin test suites.'
expected_findings:
- file: frontend/discourse/public/assets/scripts/discourse-test-load-dynamic-js.js
  line: 1
  summary: 'Silent no-op: `script.dataset = element.dataset` does nothing because
    `dataset` is a readonly property on HTMLElement. Must copy attributes individually
    (e.g., iterate `element.dataset` entries and assign each to `script.dataset`).'
- file: frontend/discourse-plugins/index.js
  line: 1
  summary: Plugin script tag generation moved to Rails but data attributes (data-discourse-plugin,
    data-preinstalled, data-official) were not carried over to the new generation
    path.
- file: app/helpers/application_helper.rb
  line: 1
  summary: Script tags generated here are missing the plugin metadata data attributes
    that downstream test infrastructure relies on to distinguish plugin tests from
    core tests.
