description: "The ProseMirror quote node spec lacked a `displayName` attribute, so\
  \ during the markdown\u2192ProseMirror\u2192markdown round-trip the display name\
  \ was silently discarded and only the username survived. Additionally, the markdown-it\
  \ aside token did not emit `data-display-name`, preventing the ProseMirror parser\
  \ from capturing it, and a latent bug left `displayName` as an array instead of\
  \ a joined string when the name contained no commas."
expected_findings:
- file: frontend/discourse/app/static/prosemirror/extensions/quote.js
  line: 14
  summary: "ProseMirror quote node spec is missing a `displayName` attribute \u2014\
    \ the round-trip will lose the display name because the node has no place to store\
    \ it"
- file: frontend/discourse-markdown-it/src/features/quotes.js
  line: 42
  summary: When parsing BBCode quote with a `username:` param, the display name portion
    is not extracted and attached to the aside token as `data-display-name`, causing
    it to be silently dropped
- file: frontend/discourse-markdown-it/src/features/quotes.js
  line: 91
  summary: Display name split into array but never joined back to a string when the
    name contains no commas, leaving `displayName` as an array instead of a string
