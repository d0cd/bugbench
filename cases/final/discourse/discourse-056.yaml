description: Several DMenu component usages incorrectly used `@class` instead of `@triggerClass`
  to style the trigger element, causing the class to be applied to the wrong DOM element.
  Additionally, a CSS rule in the modernize-foundation theme was missing exclusions
  for dropdown-related elements, causing unintended style overrides on categories
  dropdowns.
