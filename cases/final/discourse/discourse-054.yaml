description: DMenu component usages incorrectly passed styling classes via `@class`
  instead of the correct `@triggerClass` property, causing trigger buttons to lose
  their intended CSS classes. Additionally, a CSS selector in the modernize-foundation
  theme was missing exclusions for dropdown select box headers, causing unintended
  style overrides on the categories dropdown.
expected_findings:
- file: frontend/discourse/admin/components/admin-flag-item.gjs
  line: 178
  summary: "Incorrect DMenu property: `@class` should be `@triggerClass` \u2014 @class\
    \ does not apply classes to the DMenu trigger element"
- file: frontend/discourse/admin/components/api-key-item.gjs
  line: 127
  summary: "Incorrect DMenu property: `@class` should be `@triggerClass` \u2014 trigger\
    \ button will not receive the intended btn-default class"
- file: app/assets/stylesheets/common/base/uc-modernize-foundation-theme.scss
  line: 72
  summary: CSS :not() selector missing `.dropdown-select-box-header` exclusion, causing
    unintended style overrides on the categories dropdown
