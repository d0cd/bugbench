pr_title: 'FIX: Also ensure CategoryBoxes that use description_excerpt have them localized'
pr_body: "When accessing a category on the frontend via Category.findById() (e.g.\
  \ in theme components, sidebar, category dropdowns), the data comes from /site.json\
  \ which is serialized by SiteCategorySerializer.\r\n\r\nSiteCategorySerializer already\
  \ localizes name and description, but description_text and description_excerpt (inherited\
  \ from BasicCategorySerializer) always return values from the original model, bypassing\
  \ localization.\r\n\r\nThis means any UI (e.g. `<CategoryBoxes>`) that reads `description_excerpt`\
  \  global category store (rather than from /categories.json, which localizes at\
  \ the query level via CategoryList) will show non-localized descriptions even when\
  \ the user's locale differs from the category's locale.\r\n\r\nThis change adds\
  \ `description_text` and `description_excerpt` overrides to `SiteCategorySerializer`\
  \ that use the localized description when available.\r\n  \r\n  ### before\r\n \
  \ \r\n  (this is a custom theme component that's added to `/latest` to repro, this\
  \ is not `/categories`)\r\n  \r\n<img width=\"1140\" height=\"369\" alt=\"Screenshot\
  \ 2026-02-19 at 9 51 13\u202FPM\" src=\"https://github.com/user-attachments/assets/d1832486-dc73-45dc-be71-32306b6e0412\"\
  \ />\r\n\r\n### after\r\n\r\n<img width=\"1140\" height=\"369\" alt=\"Screenshot\
  \ 2026-02-19 at 9 51 39\u202FPM\" src=\"https://github.com/user-attachments/assets/81798d2d-7c40-44cb-afa9-c0c3dba83787\"\
  \ />\r\n\r\n"
