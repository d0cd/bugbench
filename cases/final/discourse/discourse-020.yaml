description: "Test specs used `freeze_time 31.days.ago` which is fragile across month\
  \ boundaries \u2014 when the current month has fewer than 31 days, the relative\
  \ date arithmetic produces unexpected results causing spec failures. The fix replaces\
  \ the brittle relative date with a stable value that avoids month-length edge cases."
