description: When a user explicitly clicks 'Translate Post' on a bot post, the translation
  job is queued but silently skipped because the detect_translate_post and detect_translate_topic
  jobs unconditionally return early for bot content. The fix adds a setting-aware
  check so bot content can be translated when explicitly requested or when the ai_translation_include_bot_content
  setting is enabled, and moves that setting into the correct ai-features settings
  group.
expected_findings:
- file: plugins/discourse-ai/app/jobs/regular/detect_translate_post.rb
  line: 17
  summary: Unconditional early return skips bot posts even when translation is explicitly
    requested by a user; should check ai_translation_include_bot_content setting or
    allow explicit requests to bypass the bot filter
- file: plugins/discourse-ai/app/jobs/regular/detect_translate_topic.rb
  line: 17
  summary: Unconditional early return skips bot topics even when translation is explicitly
    requested; same logic gap as detect_translate_post
- file: plugins/discourse-ai/app/controllers/discourse_ai/translation/translation_controller.rb
  line: 90
  summary: Posts query uses secured(guardian) which may exclude bot posts from translation
    results even when user explicitly requests topic translation
