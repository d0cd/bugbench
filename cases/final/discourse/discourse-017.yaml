pr_title: 'FIX: honor the asc=false query param on group sort'
pr_body: "Reported here: https://meta.discourse.org/t/honor-the-asc-querystring-parameter-on-group-sort/397541\r\
  \n\r\nPreviously there was no way to sort group members by `last_seen_at` in descending\
  \ order via URL, as the `&asc` param always returned ascending. This change allows:\r\
  \n\r\n* `/g/trust_level_0?order=last_seen_at&asc=true` \u2014 ascending \r\n* `/g/trust_level_0?order=last_seen_at&asc=false`\
  \ \u2014 descending \r\n* `/g/trust_level_0?order=last_seen_at&asc=` \u2014 descending"
