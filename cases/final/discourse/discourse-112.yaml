pr_title: 'FIX: passkey authentication fails for EdDSA-based authenticators'
pr_body: "**Previously**, passkey authentication called `cose_algorithm.hash_function`\
  \ to verify signatures, but `COSE::Algorithm::EdDSA` does not implement `hash_function`\
  \ (EdDSA has the hash built into the algorithm). This caused a `NoMethodError 500`\
  \ for any user who registered a passkey with an EdDSA-based authenticator.\n\n**This\
  \ commit** uses the COSE gem's own `cose_algorithm.verify` method, which correctly\
  \ dispatches signature verification for all algorithm types \u2014 including EdDSA,\
  \ which passes nil as the digest internally.\n"
