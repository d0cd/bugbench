description: Passkey authentication called `cose_key.to_pkey.verify(cose_algorithm.hash_function,
  ...)` to verify WebAuthn signatures, but `COSE::Algorithm::EdDSA` does not implement
  `hash_function` (EdDSA incorporates the hash internally). This caused a `NoMethodError`
  500 for any user with an EdDSA-based passkey authenticator. The fix uses `cose_algorithm.verify`,
  which correctly dispatches verification for all algorithm types.
