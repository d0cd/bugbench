description: The Discourse subscriptions webhook controller did not validate that
  a webhook secret was configured before processing incoming Stripe webhooks. Without
  this check, an empty or blank webhook secret would allow unverified webhook payloads
  to be processed, bypassing signature verification. The fix adds a guard clause returning
  403 Forbidden when the webhook secret is blank.
