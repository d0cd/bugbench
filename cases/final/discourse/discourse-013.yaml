description: 'Two bugs in the vote-button Glimmer component: (1) the `topic` reference
  was cached as a plain instance property at construction time instead of being a
  reactive getter, so navigating between topics kept the stale label and vote state;
  (2) the ''Remove vote'' dropdown item was rendered unconditionally, showing on closed
  topics even when the user had never voted. Fixed by converting `topic` to a getter
  over `this.args.topic`, adding an `onShowMenu` action that resets tracked state
  when reopened, and gating the remove-vote item on `this.topic.user_voted`.'
expected_findings:
- file: plugins/discourse-topic-voting/assets/javascripts/discourse/components/vote-button.gjs
  line: 17
  summary: 'Stale cached reference: `topic = this.args.topic` captures the topic at
    construction time. In Ember/Glimmer, navigating between topics may reuse the component
    with new args, so this should be a getter (`get topic() { return this.args.topic;
    }`) to stay reactive.'
- file: plugins/discourse-topic-voting/assets/javascripts/discourse/components/vote-button.gjs
  line: 180
  summary: 'Missing guard: the ''Remove vote'' dropdown item is rendered unconditionally.
    It should be wrapped in `{{#if this.topic.user_voted}}` so it only appears when
    the user has actually voted on the current topic.'
