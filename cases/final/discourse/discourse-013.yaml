pr_title: 'FIX: Pass tag name instead of id to composer in Horizon sidebar button'
pr_body: "The sidebar \"New Topic\" button in Horizon was passing `this.tag?.id` (a\
  \ numeric ID) to `composer.openNewTopic()`, which expects a comma-separated string\
  \ of tag names. This caused two issues:\r\n\r\n- For non-staff users, `filterTags()`\
  \ tried to access `.content` on a number, throwing \"Cannot read properties of undefined\
  \ (reading 'filter')\" and preventing the composer from opening entirely.\r\n- For\
  \ staff users, `filterTags()` passed the number through, resulting in the numeric\
  \ ID being displayed as the tag name in the composer.\r\n\r\nSwitching to `this.tag?.name`\
  \ aligns with the pattern used by the discovery list controller and the composer's\
  \ expected API.\r\n\r\nAlso adds a system spec covering the tag page \u2192 new\
  \ topic flow.\r\n\r\nRef - t/178629"
