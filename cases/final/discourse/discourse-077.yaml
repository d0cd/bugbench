pr_title: 'FIX: Restore plugin data attributes on script tags lost in #37763'
pr_body: "- Restores `data-discourse-plugin`, `data-preinstalled`, and `data-official`\
  \ attributes on plugin `<script>` tags that were lost when #37763 moved script tag\
  \ generation from ember-cli to Rails\r\n- Fixes `discourse-test-load-dynamic-js.js`\
  \ where `script.dataset = element.dataset` was a silent no-op (dataset is a readonly\
  \ property), preventing data attributes from being copied to dynamically created\
  \ script elements\r\n- Without these attributes, `setup-tests.js` treats all test\
  \ runs as core tests and always enables `configureRaiseOnDeprecation()`, causing\
  \ private plugin tests to fail on deprecation warnings they should be exempt from"
