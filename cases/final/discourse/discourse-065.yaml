description: The reviewable-claimed-topic component used a site-setting-based guard
  instead of a user-based guard to control visibility of claim/unclaim actions. This
  caused the claim and unclaim text to be incorrectly suppressed even when SiteSetting.force_old_reviewable_ui
  was false, due to a missed update from a prior strategy change that deprecated that
  site setting.
