pr_title: 'DEV: Fix the `lock` step when using contracts'
pr_body: "Recently, the `lock` step from our Ruby service framework has been extended\
  \ to be able to work with keys from the global context when the key isn\u2019t present\
  \ in the `params`.\r\n\r\nThe implementation is flawed because we usually get a\
  \ contract object in the `params` key of the context, and currently we call `public_send(key)`\
  \ on it. This actually raises an error when the key doesn\u2019t exist on the contract.\r\
  \n\r\nThe fix is rather simple, we just use `try` instead, that way if the method\
  \ doesn\u2019t exist, it returns `nil`, allowing us to get the key from the global\
  \ context as expected."
