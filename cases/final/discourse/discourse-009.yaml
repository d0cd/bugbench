description: The `lock` step in the Ruby service framework uses `public_send(key)`
  on a contract object to retrieve a lock key. When the key doesn't exist on the contract,
  `public_send` raises a `NoMethodError` instead of falling through to the global
  context lookup. The fix replaces `public_send(key)` with `try(key)`, which returns
  `nil` for missing methods, allowing the fallback to the global context to work as
  intended.
