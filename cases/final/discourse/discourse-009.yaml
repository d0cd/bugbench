description: Test specs used relative date `freeze_time 31.days.ago` which causes
  flaky failures depending on the current date due to variable month lengths. The
  fix replaces the relative 31-day offset with a more stable value (e.g., 32.days.ago
  or a fixed date) to avoid month-boundary edge cases in date arithmetic.
