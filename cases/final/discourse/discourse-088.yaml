pr_title: 'FIX: Check topic visibility in templates `use` action'
pr_body: "What is the problem?\r\n\r\n- The discourse-templates plugin lets users\
  \ mark topics as\r\n  templates and track usage counts via `TemplatesController#use`\r\
  \n- The `use` action checks that the caller is logged in and passes the\r\n  global\
  \ `can_use_templates?` gate, then verifies the topic is a valid\r\n  template via\
  \ `Topic#template?`\r\n- However, `Topic#template?` for category templates only\
  \ checks whether\r\n  the topic's category is in the configured template categories\
  \ list \u2014\r\n  it does not check whether the calling user can see that category\r\
  \n- If an admin configures both a public and a restricted category as\r\n  template\
  \ sources, a regular user with access to the public category\r\n  passes the global\
  \ gate and can then call the `use` endpoint with a\r\n  topic ID from the restricted\
  \ category and succeed\r\n\r\nWhat is the solution?\r\n\r\n- Add `guardian.ensure_can_see!(topic)`\
  \ to `TemplatesController#use`\r\n"
pr_commit_messages:
