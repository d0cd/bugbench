description: The TemplatesController#use action checks that the user is logged in
  and passes the global can_use_templates? gate, but does not verify the user has
  visibility into the topic's category. This allows a regular user to call the use
  endpoint with a topic ID from a restricted category they cannot access, bypassing
  category-level access controls. The fix adds guardian.ensure_can_see!(topic) to
  enforce visibility.
