description: The category edit workflow recomputed form state from the category model
  on every render cycle, causing unnecessary re-renders and visible UI glitches such
  as checkbox flashing on save. The fix extracts form data computation into an `initFormData()`
  method called once at route load, so the FormKit form receives a stable initial
  snapshot rather than a reactive object that triggers repeated reconciliation.
expected_findings:
- file: frontend/discourse/admin/controllers/edit-category/tabs.js
  line: 14
  summary: Form data is recomputed from the category model on every render instead
    of being captured once at initialization, causing redundant re-renders and checkbox
    flashing.
  line_side: pre_fix
- file: frontend/discourse/admin/routes/edit-category/tabs.js
  line: 16
  summary: Route does not call controller.initFormData() on model setup, so the controller
    never snapshots form state at load time and instead recomputes it reactively.
  line_side: pre_fix
- file: frontend/discourse/admin/routes/new-category/tabs.js
  line: 50
  summary: Same missing initFormData() call in the new-category route, meaning the
    new-category flow also suffers from repeated form-state recomputation.
  line_side: pre_fix
