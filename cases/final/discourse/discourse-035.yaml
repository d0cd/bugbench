description: The Horizon sidebar 'New Topic' button passed `this.tag?.id` (a numeric
  database ID) to `composer.openNewTopic()`, which expects tag names as strings. This
  caused a runtime TypeError for non-staff users (crashing the composer) and displayed
  numeric IDs instead of tag names for staff users. The fix switches to `this.tag?.name`.
expected_findings:
- file: themes/horizon/javascripts/discourse/components/sidebar-new-topic-button.gjs
  line: 55
  summary: 'Wrong property passed: `this.tag?.id` passes a numeric ID but `openNewTopic()`
    expects a tag name string. Should be `this.tag?.name`.'
