description: The TagChooser refactor (9e99066b07) changed its `_onChange` callback
  to pass tag objects instead of plain name strings. The watched-word form still called
  `.join(",")` on these objects, producing `[object Object]` instead of tag names,
  completely breaking the watched-word tag action. The fix required updating both
  the frontend serialization and the backend controller to handle tag objects/IDs.
