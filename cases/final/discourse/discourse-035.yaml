pr_title: 'FIX: Watched word tag action broken after TagChooser refactor'
pr_body: "TagChooser's `_onChange` was changed to pass tag objects instead of\r\n\
  name strings (9e99066b07), which broke watched words as\r\n`tags.join(\",\")` on\
  \ objects produced `[object Object]` fails\r\nvalidation.\r\n\r\nInstead of restoring\
  \ the old string-based approach, this switches to\r\nsending tag objects with ids\
  \ to the backend. The controller resolves\r\nexisting tags by ID (we should always\
  \ ref by id) and creates new\r\nones via `DiscourseTagging.find_or_create_tags!`.\
  \ The legacy\r\n`replacement` param still works for backward compatibility."
pr_commit_messages:
- 'FIX: Create watched words with tag'
