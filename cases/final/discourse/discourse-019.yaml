description: NavItem's active getter called router.isActive(route) without passing
  the routeParam dynamic segment value, causing all nav items sharing the same route
  but with different params to appear active simultaneously. The fix passes routeParam
  to router.isActive(route, routeParam) when routeParam is present so the active check
  correctly distinguishes between different dynamic segment values.
expected_findings:
- file: frontend/discourse/app/components/nav-item.gjs
  line: 65
  summary: "router.isActive(route) does not pass routeParam \u2014 should be router.isActive(route,\
    \ routeParam) when routeParam is present, otherwise all nav items on the same\
    \ route show as active regardless of dynamic segment value"
