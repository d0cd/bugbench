pr_body: "(best viewed with white-space disabled)\r\n\r\nThis partially reverts c333888\r\
  \n\r\n* removed unnecessary `schedule(\"afterRender\")` - that was already delayed\
  \ within `next()`\r\n* made `DMenuInstance` accept object as `autoUpdate` option\
  \ to allow configuring floating-ui; this also replaces the separate `updateOnScroll`\
