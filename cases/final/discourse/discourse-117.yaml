description: WCAG accessibility stylesheet used hardcoded or incorrect CSS variable
  values for button icon colors, causing buttons to not visually change color on hover/active/focus
  states. The fix switches to proper Discourse theme variables that respond to button
  interaction states, restoring correct WCAG-compliant color feedback.
