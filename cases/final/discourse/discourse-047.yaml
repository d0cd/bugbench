description: The channel info settings page unconditionally renders mute toggle and
  notification settings for all open channels, even when the current user is not following
  the channel. This exposes non-functional settings UI to users who haven't joined
  the channel. The fix adds `following` membership checks to gate the mute section,
  notifications section, and the entire settings section.
expected_findings:
- file: plugins/chat/assets/javascripts/discourse/components/chat/routes/channel-info-settings.gjs
  line: 418
  summary: "Settings section rendered based only on `@channel.isOpen` without checking\
    \ if the user is following the channel \u2014 should gate on membership.following\
    \ to avoid showing non-functional mute/notification controls to unfollowed users"
  line_side: pre_fix
- file: plugins/chat/assets/javascripts/discourse/components/chat/routes/channel-info-settings.gjs
  line: 136
  summary: "shouldRenderNotificationsLevelSection only checks `!this.isChannelMuted`\
    \ but does not verify the user is following the channel \u2014 notifications settings\
    \ are meaningless for unfollowed channels"
  line_side: pre_fix
- file: plugins/chat/assets/javascripts/discourse/components/chat/routes/channel-info-settings.gjs
  line: 124
  summary: "Mute toggle section is always rendered inside the settings block with\
    \ no guard on whether the user follows the channel \u2014 muting an unfollowed\
    \ channel is a no-op"
  line_side: pre_fix
