description: The webhook hooks controller did not validate that the webhook secret
  was present before processing incoming Stripe webhooks. A blank or unset webhook
  secret would allow unauthenticated webhook payloads to be processed, bypassing signature
  verification. The fix adds a guard clause returning 403 Forbidden when the webhook
  secret is blank.
