description: A test for the mobile sidebar slide-out was missing a pretender mock
  for the `/categories/hierarchical_search` endpoint, causing intermittent CI failures
  when the component issued a GET request that had no handler. The fix adds the missing
  `hierarchical_search` mock to the test's pretender setup.
expected_findings:
- file: app/controllers/groups_controller.rb
  line: 285
  summary: Using `params[:asc].to_s == "true"` treats any truthy string value like
    "1" as DESC instead of ASC, breaking the ascending sort parameter
  line_side: pre_fix
- file: plugins/discourse-ai/lib/completions/tool_definition.rb
  line: 108
  summary: Array type parameters always get an items schema defaulting to :string
    even without item_type, and non-array parameters with item_type set are incorrectly
    excluded from getting items
  line_side: pre_fix
- file: plugins/discourse-ai/lib/ai_tool_scripts/presets/image_generation/openai.js
  line: 62
  summary: Returning the image short_url in the tool result leaks the internal upload
    URL back to the LLM, which may cause it to re-reference or hallucinate with the
    URL instead of relying on the already-rendered custom raw markdown
  line_side: pre_fix
