description: During the popper.js to floating-ui migration, the `autoUpdate` call
  in select-kit was passed `this._bodyElement()` as the floating element argument
  instead of the actual floating dropdown element. This caused incorrect positioning
  behavior because floating-ui's `autoUpdate` expects the floating element (the positioned
  dropdown) as its second argument, not the body/reference container.
