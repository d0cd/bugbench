description: The destroy post action endpoint leaked post content to users who no
  longer had access. By calling the undo/destroy post action within the `post_undo_action_window_mins`
  window after a post was made inaccessible, an attacker could retrieve the post's
  content from the response. The fix adds an access check before returning the post
  data.
expected_findings:
- file: app/controllers/post_actions_controller.rb
  line: 51
  summary: "Missing access check before returning post data in destroy action \u2014\
    \ allows users who can no longer see a post to retrieve its content by undoing\
    \ a post action within the undo window"
  line_side: pre_fix
- file: plugins/chat/app/controllers/chat/api/search_controller.rb
  line: 21
  summary: Raising InvalidAccess (403) instead of NotFound (404) for inaccessible
    channels leaks the existence of private channels to unauthorized users
  line_side: pre_fix
