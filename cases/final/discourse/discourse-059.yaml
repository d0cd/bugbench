description: "The channel settings page used an `isOpen`/`else` conditional to render\
  \ the close/open channel toggle, causing archived and read-only channels to incorrectly\
  \ show an active 'Open channel' button. Clicking it would trigger the 'Close channel'\
  \ modal, which then failed with a server error because the guardian only permits\
  \ `closed \u2192 open` transitions. The fix replaces the `else` branch with an explicit\
  \ `isClosed` check and renders a disabled button with a tooltip for archived and\
  \ read-only channels."
expected_findings:
- file: plugins/chat/assets/javascripts/discourse/components/chat/routes/channel-info-settings.gjs
  line: 1
  summary: 'Logic error: the `else` branch of the `isOpen` check matches all non-open
    statuses (closed, archived, read-only), but only closed channels should get an
    active ''Open channel'' button. Should use explicit `isClosed` check instead of
    a catch-all `else`.'
