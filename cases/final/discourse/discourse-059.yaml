pr_body: "It was possible to get the content of a post you no longer have access to\
  \ by destroying a post action during the interval where the post has been made unaccessible\
  \ and during the `post_undo_action_window_mins` limit.\r\n\r\nWe consider this security\
  \ in depth but not really exploitable."
