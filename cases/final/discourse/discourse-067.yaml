pr_title: 'FIX: Allow "watching first post" notification to fire when tags edit notifications
  are disabled'
pr_body: "When `disable_tags_edit_notifications` support was added to `NotifyTagChange`,\
  \ the entire job was gated with an early return:\r\n\r\n```\r\nreturn if SiteSetting.disable_tags_edit_notifications\
  \ && !args[:force]\r\n```\r\n\r\nThis blocks all notifications from the job including\
  \ `notify_first_post_watchers` (the bug), which is semantically different from a\
  \ \u201Ctag edit\u201D notification. The setting was meant to suppress \u201Cthe\
  \ tags on this topic changed\u201D notifications (`notify_post_users`), but inadvertently\
  \ also suppressed \u201Ca topic now matches your watched tag\u201D notifications\
  \ (`notify_first_post_watchers`).\r\n\r\nThe `PostRevisor` also gates the job enqueue:\r\
  \n\r\n```\r\nif !SiteSetting.disable_tags_edit_notifications\r\n  Jobs.enqueue(:notify_tag_change,\
  \ ...)\r\nend\r\n```\r\n\r\nSo when `disable_tags_edit_notifications = true`, the\
  \ `NotifyTagChange` job is never even enqueued, and WFP notifications are completely\
  \ silenced for tag additions.\r\n\r\nThis PR fixes the issue."
pr_commit_messages:
- "FIX: Allow \"watching first post\" notification to fire when tags edit \u2026"
