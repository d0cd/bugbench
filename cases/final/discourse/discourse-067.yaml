description: 'The `disable_tags_edit_notifications` site setting was used as an overly
  broad gate in two locations: an early-return in the NotifyTagChange job suppressed
  all notifications (including unrelated ''watching first post'' notifications), and
  the PostRevisor skipped enqueuing the job entirely when the setting was enabled.
  The fix narrows the guard so only tag-edit notifications are suppressed while first-post-watcher
  notifications still fire.'
