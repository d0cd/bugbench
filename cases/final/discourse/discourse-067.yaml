  line: 8
  summary: Early return on `disable_tags_edit_notifications` gates the entire `execute`
    method, inadvertently suppressing `notify_first_post_watchers` which is semantically
    unrelated to tag-edit notifications. The guard should only wrap `notify_post_users`,
    not the whole method.
  line_side: pre_fix
- file: lib/post_revisor.rb
  line: 0
  summary: The `NotifyTagChange` job enqueue is fully gated by `!SiteSetting.disable_tags_edit_notifications`,
    preventing first-post-watcher notifications from ever firing when the setting
    is enabled. The job should still be enqueued so first-post-watcher logic runs
    regardless of the tag-edit notification setting.
  line_side: pre_fix
