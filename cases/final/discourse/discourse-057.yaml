description: "Test specs use `freeze_time 31.days.ago` which is brittle across month\
  \ boundaries \u2014 months with fewer than 31 days cause the relative date to land\
  \ on unexpected dates, producing flaky test failures. The fix replaces the relative\
  \ day offset with a stable absolute date or a safer relative offset."
