description: The initial route migration from /admin/plugins/explorer to /admin/plugins/discourse-data-explorer
  only redirected GET requests, leaving POST, PUT, and DELETE API endpoints (create,
  update, destroy, run) still pointing to the old paths. This commit adds the missing
  legacy route redirects and direct route mappings so all API calls work under both
  old and new URL prefixes.
