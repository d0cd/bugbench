description: During wire dependency injection, LegacyStatsGetter captured dual-writer
  mode flags as static booleans before auto-migration had a chance to set Mode5, causing
  them to always be false. This made validateOnDelete always append stale legacy SQL
  dashboard counts, preventing deletion of folders that were actually empty in unified
  storage. The fix replaces the static boolean captures with a *setting.Cfg pointer
  so the dual-writer mode is read dynamically at query time.
expected_findings:
- file: pkg/storage/unified/federated/stats.go
  line: 81
  summary: 'Stale capture: dual-writer mode booleans (DisableSQLFallbackDashboards
    etc.) are stored as static values at construction time rather than read dynamically
    from Cfg, so they never reflect Mode5 set by auto-migration after startup'
- file: pkg/storage/unified/client.go
  line: 24
  summary: "Static boolean for dual-writer mode passed to federated client constructor\
    \ instead of Cfg pointer \u2014 value is always false because auto-migration hasn't\
    \ run yet at wire DI time"
- file: pkg/storage/unified/client.go
