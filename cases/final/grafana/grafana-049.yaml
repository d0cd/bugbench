pr_title: 'Roles: Fix delegated permission check for provisioning'
pr_body: 'This PR adds the necessary provisioning permissions so that basic Viewer/Editor
  roles and permission checks on rolebindings and roles work: the authlib client can
  send the Check request to the RBAC server instead of denying [at the gate](https://github.com/grafana/authlib/blob/main/authz/client.go#L166).'
