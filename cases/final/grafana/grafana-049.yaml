- file: public/app/features/panel/components/VizTypePicker/VisualizationSuggestions.tsx
  line: 299
  summary: 'Incorrect boolean parameter in applySuggestion call: the third argument
    (false) prevents the options panel from opening in the no-data / newVizSuggestions=false
    path, leading to a crash when switching panel types'
