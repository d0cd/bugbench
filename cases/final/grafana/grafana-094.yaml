description: The CommunityDashboardSection component was firing tracking/interaction
  events without including the `featureVariant` property, making analytics data incomplete.
  The fix adds the missing `featureVariant` field to the tracking calls so that suggested-dashboard
  interaction events carry the correct feature variant for analytics segmentation.
