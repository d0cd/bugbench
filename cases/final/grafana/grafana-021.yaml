description: The VisualizationSuggestionCard component used a <button> element as
  its outer wrapper, which caused invalid HTML nesting when the card's content (e.g.,
  a table visualization) itself contained a <button>. The fix changes the outer element
  from <button> to <div>, eliminating the nested-button console warning while preserving
  click handling.
expected_findings:
- file: public/app/features/panel/components/VizTypePicker/VisualizationSuggestionCard.tsx
  line: 26
  summary: Outer <button> element will produce invalid HTML (nested <button>) when
    child content contains interactive elements like buttons inside table visualizations.
    Should use a <div> with role='button' or an onClick handler instead.
