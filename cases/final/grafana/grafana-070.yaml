pr_title: 'Zanzana: Fix missing cache update in GetStore'
pr_body: "## Summary\r\nThis PR fixes a bug in the `GetStore` logic where discovered\
  \ stores were not being added to the in-memory cache. \r\n\r\n### Problem\r\nWhen\
  \ `EnsureNamespace` calls `GetStore`, if the store isn't in the in-memory map, it\
  \ calls `ListStores` on OpenFGA. If it finds the store there, it returns it but\
  \ forgets to add it to the in-memory map. This causes every subsequent `Check` request\
  \ for the same namespace to trigger another `ListStores` call. In environments with\
  \ many namespaces or frequent restarts, this leads to a massive volume of reads\
  \ and unnecessary reconciliation cycles.\r\n\r\n### Solution\r\n- Updated `GetStore`\
  \ to cache the `ID` and `Name` in the `s.stores` map after a successful `ListStores`\
  \ lookup.\r\n- Added a regression test in `server_store_test.go` to verify the fix.\r\
  \n\r\n## Test plan\r\n- Run the new regression test: `go test -v ./pkg/services/authz/zanzana/server/\
  \ -run TestGetStore_Cache`\r\n- Manual verification: Observe reduced `ListStores`\
  \ calls in OpenFGA logs after the first discovery of a namespace.\r\n\r\n"
