pr_title: 'Alerting: Fix alert list panel dashboard refresh subscription issue'
pr_body: "**What is this fix?**\r\n\r\nIn `public/app/plugins/panel/alertlist/UnifiedAlertList.tsx`,\
  \ the dashboard reference was stored in a local let variable and set via useEffectOnce.\
  \ \r\nWhen the effect responsible for subscribing to the dashboard events and fetching\
  \ the initial data runs due to a dependency change, the dashboard variable had already\
  \ been re-declared as undefined by the new render, so the call for `dashboard?.events.subscribe`\
  \ failed silently and the event subscription was lost.\r\n\r\n**Changes**\r\n- Stored\
  \ dashboard in a useRef instead of a local let\r\n- Split event subscription and\
  \ data fetch into separate effects to avoid unecessary unsubscribe/resubscribe cycles\r\
  \n\r\n\r\nhttps://github.com/user-attachments/assets/e7794777-110e-4a84-afb7-5606468c9b47\r\
  \n\r\n\r\n**Which issue(s) does this PR fix?**:\r\n\r\n<!--\r\n\r\n- Automatically\
  \ closes linked issue when the Pull Request is merged.\r\n\r\nUsage: \"Fixes #<issue\
  \ number>\", or \"Fixes (paste link of issue)\"\r\n\r\n-->\r\n\r\nFixes #118548\r\
  \n\r\n**How to test these changes**\r\n\r\n- Step 1: Create test alert rule\r\n\
  \  1. Go to Alerting > Alert rules > New alert rule\r\n  2. Set the rule type to\
  \ Grafana-managed\r\n  3. Add a query using the TestData datasource with the \"\
  Random Walk\" scenario\r\n  4. Add a Reduce expression (e.g., Last) and a Threshold\
  \ expression (e.g., IS ABOVE 0 \u2014 this will always fire)\r\n  5. Set the evaluation\
  \ interval to something short (e.g., every 10s, for 0s)\r\n  6. Save the rule and\
  \ wait for it to start firing\r\n\r\n- Step 2: Create dashboard with alert list\r\
  \n  1. Create a new dashboard\r\n  2. Add an Alert list panel\r\n  3. In the panel\
  \ options:\r\n    - Under Filter, enable all alert states (Firing, Pending, Normal,\
  \ Recovering)\r\n    - Optionally set a datasource filter to \"Grafana\" if needed\r\
  \n    - Disable \"Dashboard alerts only\" so you see all alerts\r\n  4. Set the\
  \ dashboard auto-refresh to something frequent (e.g., 5s or 10s)\r\n  5. Save the\
  \ dashboard\r\n\r\n- Step 3: Trigger new instances\r\n  1. In a separate browser\
  \ tab, create a second alert rule that will also appear in the alert list\r\n  \
  \ \r\n- Step 4: Observe\r\n  1. Go back to the dashboard tab, the new alert should\
  \ show up after the auto-refresh interval\r\n"
