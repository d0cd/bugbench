pr_title: '[release-12.3.6] Security: Upgrade @grafana/llm to 1.0.3 to fix CVE-2026-25536'
pr_body: "Backport 219e4b3907ddec33735bc72d6e7bfd2c8d09b814 from #120154\r\n\r\n---\r\
  \n\r\n## Summary\r\n- Bumps `@grafana/llm` from 1.0.2 to 1.0.3 in root `package.json`\
  \ and loki plugin\r\n- `@grafana/llm@1.0.3` declares `@modelcontextprotocol/sdk@^1.26.0`,\
  \ fixing CVE-2026-25536 (cross-client data leak via shared server/transport reuse,\
  \ CVSS 7.1 HIGH)\r\n\r\n## Context\r\n`@modelcontextprotocol/sdk` is a transitive\
  \ dependency via `@grafana/llm`, used in the Loki datasource plugin. This is a **runtime**\
  \ dependency.\r\n\r\nOnce merged, this needs backporting to:\r\n- `v12.4.x` (currently\
  \ has @modelcontextprotocol/sdk@1.25.3 via @grafana/llm@1.0.2)\r\n- `v12.3.x` (currently\
  \ has @modelcontextprotocol/sdk@1.24.3 via @grafana/llm@1.0.1)\r\n\r\n## Test plan\r\
  \n- [ ] Verify `yarn why @modelcontextprotocol/sdk` shows >= 1.26.0\r\n- [ ] CI\
  \ passes\r\n- [ ] Add `backport v12.4.x` and `backport v12.3.x` labels after merge\r\
  \n"
pr_commit_messages:
- 'Security: Upgrade @grafana/llm to 1.0.3 to fix CVE-2026-25536 (#120154)'
