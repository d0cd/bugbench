description: micro-memoize's default maxSize:1 cache caused thrashing when multiple
  external Alertmanagers alternated calls to parseAmConfigRoute and memoK8sRouteToRoute,
  producing new object references every render and triggering an infinite re-render
  loop via useAsync. The fix replaces micro-memoize with WeakMap-based caches that
  eliminate eviction entirely.
