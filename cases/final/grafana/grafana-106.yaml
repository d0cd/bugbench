pr_title: 'Alerting: Fix infinite loading in route preview for multiple AM'
pr_body: "\r\n\r\n\r\n\r\n\r\n\r\n**Problem**\r\n\r\nparseAmConfigRoute and memoK8sRouteToRoute\
  \ in useNotificationPolicyRoute.ts use micro-memoize with the default maxSize: 1.\
  \ When multiple external Alertmanagers are configured, their selectFromResult callbacks\
  \ alternate calls to parseAmConfigRoute, evicting each other's cache entries. This\
  \ produced new object references on every render, triggering an infinite re-render\
  \ loop via useAsync in useAlertmanagerNotificationRoutingPreview.\r\n\r\n*Before\
  \ fix*\r\n\r\nhttps://github.com/user-attachments/assets/d5c38869-33dd-4075-86f0-35d582f63257\r\
  \n\r\n\r\n\r\n**Fix**\r\n\r\n- Replaced the memoization strategy with WeakMap-based\
  \ caches. This eliminates eviction entirely, giving us unlimited entries with O(1)\
  \ lookup and automatic GC when keys are released. Some orgs run 600+ external Alertmanagers,\
  \ making a fixed cap impractical. The cache invalidation API provided by micro-memoize\
  \ was not in use in this area of the code, so there is no functional regression.\r\
  \n- Added regression tests to verify referential stability across multiple concurrent\
  \ route objects.\r\n\r\n*After fix*\r\n\r\nhttps://github.com/user-attachments/assets/5a4c393c-0199-4261-81c2-1bf06afcb8a2\r\
  \n\r\n\r\n**Which issue(s) does this PR fix?**:\r\n\r\nRelated to https://github.com/grafana/grafana/issues/120142\r\
  \n\r\n**Special notes for your reviewer:**\r\n\r\nPlease check that:\r\n- [ ] It\
  \ works as expected from a user's perspective.\r\n- [ ] If this is a pre-GA feature,\
  \ it is behind a feature toggle.\r\n- [ ] The docs are updated, and if this is a\
  \ [notable improvement](https://grafana.com/docs/writers-toolkit/contribute/release-notes/#how-to-determine-if-content-belongs-in-whats-new),\
  \ it's added to our [What's New](https://grafana.com/docs/writers-toolkit/contribute/release-notes/)\
  \ doc.\r\n"
pr_commit_messages:
- Fix infinite loading in route preview for multiple AM
- Simplify type of k8sRouteToRouteCache map
