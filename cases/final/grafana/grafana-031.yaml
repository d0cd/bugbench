description: The legacy dashboard API did not properly handle Kubernetes-style dashboard
  payloads. When a v2 schema dashboard was saved through the legacy API path, the
  k8s wrapper was not detected or unwrapped, and internal IDs were not correctly managed
  via the deprecated internal ID selector, causing dashboards to fail to save or to
  be saved incorrectly.
expected_findings:
- file: pkg/api/dashboard.go
  line: 414
  summary: 'Missing detection of v2 schema elements in k8s-style wrapper: legacy API
    endpoint does not check whether the incoming payload uses k8s format before processing,
    leading to incorrect handling of dashboard saves'
  line_side: pre_fix
- file: pkg/registry/apis/dashboard/legacy/sql_dashboards.go
  line: 154
  summary: getLegacyIDSelector does not extract the deprecated internal ID from resource
    labels, preventing legacy API from resolving dashboards by their internal numeric
    ID when using k8s payloads
  line_side: pre_fix
- file: public/app/features/dashboard-scene/serialization/transformSceneToSaveModel.ts
  line: 174
  summary: Internal dashboard ID is unconditionally deleted from the save model, but
    this must be coordinated with the backend's DeprecatedInternalID support to ensure
    updates (not creates) happen for existing dashboards via the legacy path
  line_side: pre_fix
