description: The pyroscope auto-label in the GitHub Actions PR commands configuration
  referenced the old label name `datasource/grafana-pyroscope` instead of the renamed
  `datasource/Pyroscope`. This caused PRs touching pyroscope datasource code to receive
  the wrong (stale) label. The fix updates the label string to match the new naming
  convention.
