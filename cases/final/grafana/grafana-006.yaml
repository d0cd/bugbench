description: The legacy dashboard API did not properly handle Kubernetes-style dashboard
  payloads with internal IDs. Dashboards could not be saved or updated via the legacy
  API when using k8s objects because internal IDs were not extracted for lookups,
  the SQL layer lacked support for querying by deprecated internal ID, and internal
  IDs could leak into persisted specs. The fix adds proper internal ID extraction,
  SQL query support for DeprecatedInternalID, overwrite conflict handling, and strips
  internal IDs before saving.
expected_findings:
- file: pkg/api/dashboard.go
  line: 546
  summary: saveDashboardViaK8s does not extract or handle legacy internal IDs from
    the spec, causing k8s-style payloads with internal IDs to fail when saving through
    the legacy API
- file: pkg/registry/apis/dashboard/legacy/sql_dashboards.go
  line: 154
  summary: "Missing getLegacyIDSelector function to extract internal ID from label\
    \ selectors \u2014 the SQL layer cannot look up dashboards by deprecated internal\
    \ ID"
- file: public/app/features/dashboard-scene/serialization/transformSceneToSaveModel.ts
  line: 174
  summary: Internal dashboard ID is not stripped before saving, allowing legacy internal
    IDs to leak into k8s-style dashboard specs
