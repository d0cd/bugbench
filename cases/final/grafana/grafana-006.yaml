description: 'The GitHub Actions E2E test workflow had two issues: the `required-playwright-tests`
  job did not correctly handle the case where tests were skipped (failing due to missing
  playwright report), and tests were incorrectly skipped on pushes to main when they
  should always run. The fix consolidates gating behind a single `run-e2e-tests` output
  and adjusts conditional steps.'
