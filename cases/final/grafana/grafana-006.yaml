pr_title: 'GHA: Fix E2E tests not skipping correctly'
pr_body: "My previous PR https://github.com/grafana/grafana/pull/119277 fixed an issue\
  \ in the `detect-changes` logic, so the tests will correctly by skipped if neither\
  \ of the backend or frontend files are touched. Unfortunately, the `required-playwright-tests`\
  \ job did not correctly guard against if the tests were skipped, and it would fail\
  \ on not being able to produce a playwright report.\r\n\r\nAlso, the tests were\
  \ being skipped on pushes to main because\r\n\r\nAs a refresher, the goals are:\r\
  \n- only run E2E tests if backend or frontend code changes.\r\n- `required-playwright-tests`\
  \ is a required check, so if the tests are skipped it must still pass.\r\n- E2E\
  \ tests should always run on pushes to main.\r\n\r\nThis PR fixes both issues by\
  \ creating a single common `run-e2e-tests` output that runs are gated behind, and\
  \ adjusts `required-playwright-tests` to correct gate the steps if the tests were\
  \ skipped."
pr_commit_messages:
- 'GHA: Fix E2E tests not skipping correctly'
