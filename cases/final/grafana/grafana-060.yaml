description: The ProfileButton test renders the real NewsContainer without mocking
  the network fetch layer. When the fetch to grafana.com/blog/news.xml completes before
  test teardown, RSS pubDate strings passed to moment's dateTime() without a format
  trigger a deprecation console.warn, which jest-fail-on-console converts into a test
  failure. The fix adds a mock for loadFeed returning an empty items array.
