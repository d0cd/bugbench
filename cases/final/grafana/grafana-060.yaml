pr_title: 'Testing: Fix flaky ProfileButton test by mocking news feed'
pr_body: "Mocks `loadFeed` in the `ProfileButton` test so it returns an empty items\
  \ array instead of making a real network request to `grafana.com/blog/news.xml`.\r\
  \n\r\nThe test is flaky because it renders the real `NewsContainer` without mocking\
  \ the fetch layer. When the fetch completes before the test finishes, `feedToDataFrame`\
  \ passes RSS `pubDate` values (e.g. `\"Mon, 09 Mar 2026 14:04:35\"`) to `dateTime()`\
  \ without a format string, which triggers a moment.js deprecation `console.warn`.\
  \ `jest-fail-on-console` (enabled in CI) then fails the test.\r\n\r\nWhether the\
  \ fetch completes in time is non-deterministic \u2014 the test passes when the network\
  \ is slow and fails when it's fast.\r\n"
