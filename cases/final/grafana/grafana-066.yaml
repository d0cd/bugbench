pr_title: 'Heatmap: Prevent BucketExpansionFactor divide by 0'
pr_body: "For bucket expansion factor calculation in heatmap, with data where minimum\
  \ y is zero, division by zero was occurring, resulting in nothing being rendered\
  \ when y axis max value was set to auto. This PR skips factors that are invalid\
  \ and uses the next valid bucket to calculate the factor with a fallback of 1.\r\
  \n\r\nAlso added test coverage and broke the calculation into a separate function.\r\
  \n\r\nBefore:\r\n![Jan-30-2026 12-05-55](https://github.com/user-attachments/assets/c9f15d30-0d99-497d-a3d3-96553da8e2fa)\r\
  \n\r\nAfter:\r\n![Jan-30-2026 12-04-35](https://github.com/user-attachments/assets/9d0beb1d-2a19-4dba-9073-b231ece09975)\r\
  \n\r\nFeature flag: `heatmapRowsAxisOptions`\r\n\r\nFor test data, see the original\
  \ issue or reach out to me directly, thanks!\r\n\r\nFixes https://github.com/grafana/hyperion-planning/issues/16"
