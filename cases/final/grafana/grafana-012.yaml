pr_title: 'Provisioning: fix HTML entity encoding in connection selector repo names'
pr_body: "## What\r\n\r\nFixes repository names in the GitHub App connection dropdown\
  \ showing raw HTML entities (`&#x2F;`) instead of `/` during repository creation.\r\
  \n\r\n**Before:**\r\n> Internal Dogfooding app \xB7 grafana`&#x2F;`grafana-play,\
  \ grafana`&#x2F;`git-ui-sync-demo +1 more\r\n<img width=\"1186\" height=\"198\"\
  \ alt=\"Screenshot 2026-03-12 at 16 28 38\" src=\"https://github.com/user-attachments/assets/59d25cce-6a97-44a2-af14-de7d4e12aab5\"\
  \ />\r\n\r\n\r\n**After:**\r\n> Internal Dogfooding app \xB7 grafana/grafana-play,\
  \ grafana/git-ui-sync-demo +1 more\r\n\r\n<img width=\"1327\" height=\"293\" alt=\"\
  Screenshot 2026-03-13 at 09 12 21\" src=\"https://github.com/user-attachments/assets/22f39703-c4bf-43b9-9431-2505a7ff61e3\"\
  \ />\r\n\r\n\r\n## Why\r\n\r\ni18next HTML-escapes all interpolated values by default.\
  \ Its escape function converts `/` \u2192 `&#x2F;` (among other characters). When\
  \ the connection dropdown builds the truncated repo list (3+ repos), the joined\
  \ repo names pass through `t()` interpolation and get escaped. Since the result\
  \ is rendered as React text content \u2014 not `dangerouslySetInnerHTML` \u2014\
  \ the escaped entities appear literally instead of being decoded.\r\n\r\nThe non-truncated\
  \ path (\u22642 repos) returns the string directly without `t()`, so it was unaffected.\r\
  \n\r\n## How\r\n\r\nPass `interpolation: { escapeValue: false }` to the `t()` call\
  \ in `useConnectionOptions`. This is safe because React's JSX text rendering already\
  \ auto-escapes output, making the i18next escaping redundant here.\r\n\r\n## Test\
  \ plan\r\n- [ ] Open the repository creation wizard\r\n- [ ] Select a GitHub App\
  \ connection that has 3+ accessible repositories\r\n- [ ] Verify the dropdown description\
  \ shows `owner/repo` with normal slashes, not `owner&#x2F;repo`\r\n- [ ] Verify\
  \ connections with \u22642 repos still display correctly"
