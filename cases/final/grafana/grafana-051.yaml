pr_body: "**What is this feature?**\r\n\r\nThis pull request enhances the `Combobox`\
  \ component by adding a mechanism to reset the search input and its filtered options.\
  \ The main changes introduce a new `resetSearch` function to the `useOptions` hook,\
  \ integrate it into the `Combobox` logic to reset the search when the dropdown closes,\
  \ and add corresponding test coverage.\r\n\r\n**Why do we need this feature?**\r\
  \n\r\nSo the correct option is selected\r\n\r\n**Who is this feature for?**\r\n\r\
