description: The Combobox component did not reset its internal search/filter state
  when the dropdown was closed and reopened. This caused the filtered option list
  to persist stale results, leading to the wrong option being selected on subsequent
  openings. The fix introduces a `resetSearch` function in the `useOptions` hook that
  clears the search input and restores the full option list when the dropdown closes.
expected_findings:
- file: packages/grafana-ui/src/components/Combobox/useOptions.ts
  line: 123
  summary: The useOptions hook did not expose a resetSearch function, so there was
    no way to clear the internal search/filter state (userTypedSearch) when the dropdown
    was closed, causing stale filtered results to persist on reopen.
