description: "Two distinct bugs: (1) In datasource check, the plugin-installability\
  \ cache stored the negated value (!isAvailableInRepo) while the function returned\
  \ the non-negated value, causing the first call to return the correct result but\
  \ all subsequent cached calls to return the opposite. (2) In the check scheduler,\
  \ logger.With() was reassigned to the outer 'logger' variable inside a loop over\
  \ namespaces, causing structured log fields to accumulate across iterations \u2014\
  \ each iteration appended another 'namespace' key to the same logger, polluting\
  \ log output and making debugging misleading."
expected_findings:
- file: apps/advisor/pkg/app/checks/datasourcecheck/check.go
  line: 161
  summary: 'Cache-vs-return mismatch: cache stores `!isAvailableInRepo` but function
    returns `isAvailableInRepo`, so first call is correct but all subsequent cached
    calls return the inverted boolean.'
  line_side: pre_fix
- file: apps/advisor/pkg/app/checkscheduler/checkscheduler.go
  line: 115
  summary: 'Logger mutation in loop: `logger = logger.With("namespace", namespace)`
    reassigns the outer variable, accumulating fields across loop iterations. Should
    use a loop-scoped variable (`nsLogger :=`).'
  line_side: pre_fix
- file: apps/advisor/pkg/app/checkscheduler/checkscheduler.go
  line: 147
  summary: 'Same logger mutation bug in the ticker loop: `logger = logger.With("namespace",
    namespace)` contaminates the logger for subsequent namespace iterations.'
  line_side: pre_fix
