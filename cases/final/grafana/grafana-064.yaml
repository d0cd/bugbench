description: The heatmap panel's prepareHeatmapData function does not filter out empty
  data frames before processing, causing a crash when the panel receives no data.
  The fix adds a filter to exclude empty frames early in the pipeline.
expected_findings:
- file: public/app/plugins/panel/heatmap/fields.ts
  line: 89
  summary: 'Missing guard for empty frames: prepareHeatmapData processes all frames
    without checking if they contain data, causing a crash when a frame has no fields
    or zero-length fields. Should filter out empty frames before further processing.'
  line_side: pre_fix
