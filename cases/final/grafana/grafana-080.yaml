description: The channelNotifier.Watch goroutine uses a select statement with both
  a raw event channel and a ticker. When the ticker fires and the raw channel also
  has pending events, Go's select randomly picks one, causing partial batch reads
  where lower-RV events remain unread while higher-RV events are emitted first, violating
  ResourceVersion ordering. The fix adds a non-blocking drain loop after the ticker
  fires to read all pending events from the raw channel into the buffer before sorting
  and emitting.
