pr_title: 'Notifier: fix channelNotifier emitting events out of RV order'
pr_body: "## Summary\n- Fix sporadic `TestIntegrationKvStorageBackend_WatchWriteEvents_ConcurrentWrites/channelNotifier`\
  \ failure where events arrive out of ResourceVersion order\n- The `channelNotifier.Watch`\
  \ goroutine reads events one at a time via `select`, but when the ticker fires Go\
  \ randomly picks between the raw channel and the ticker \u2014 so a tick can process\
  \ a partial batch while lower-RV events are still unread in the channel\n- Added\
  \ a non-blocking drain loop after the ticker fires to read all pending events from\
  \ the raw channel into the buffer before sorting and emitting\n\n## Failed job\n\
  https://github.com/grafana/grafana-enterprise/actions/runs/22999732337/job/66781017600?pr=11123\n\
  \n## Root cause\n\nThe failing assertion was:\n```\n\"2032057171813322759\" is not\
  \ greater than \"2032057171817517058\"\nevents must arrive in ascending RV order:\
  \ event[95].RV=2032057171813322759 should be > event[94].RV=2032057171817517058\n\
  ```\n\nThese two snowflake RVs differ by ~4,194,299 (~2\xB2\xB2, i.e. ~1ms in the\
  \ timestamp portion). Both events were generated nearly simultaneously by concurrent\
  \ writers and were well past the 1-second settle threshold \u2014 the settle delay\
  \ wasn't the problem.\n\nThe issue was that Go's `select` randomly chose the ticker\
  \ case while event[95] (lower RV) was still sitting unread in the `raw` channel.\
  \ The goroutine sorted and emitted a partial batch containing event[94] (higher\
  \ RV), then on the next tick emitted event[95] \u2014 producing out-of-order output.\n\
  \nThe drain loop ensures all events already in the channel are read into the buffer\
  \ before sorting, so the sort always operates on the complete set of available events.\n\
  \n## Test plan\n- [x] Ran the failing test 100 times (200/200 passed) with no flakiness\n\
  - [x] Ran all watch/notifier integration tests (21/21 passed)\n\n\U0001F916 Generated\
  \ with [Claude Code](https://claude.com/claude-code)"
