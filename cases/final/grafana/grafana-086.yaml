pr_title: Fix flaky integration tests by retrying health check on startup
pr_body: "## Summary\n- `StartGrafanaEnvWithDB` in `pkg/tests/testinfra/testinfra.go`\
  \ used a single `http.Get` with no timeout or retry to check `/api/health`, causing\
  \ tests to hang indefinitely if the server wasn't ready yet\n- Replace with a retry\
  \ loop (100ms interval, 30s deadline, 2s per-request timeout)\n- Fixes flaky timeout\
  \ in `TestIntegrationProvisioning_SyncQuotaHandling` observed in CI\n\n## Test plan\n\
  - [ ] Existing integration tests in `pkg/tests/apis/provisioning` pass\n- [ ] No\
  \ behavioral change for tests where the server starts quickly (retry loop exits\
  \ on first attempt)\n\n\U0001F916 Generated with [Claude Code](https://claude.com/claude-code)"
pr_commit_messages:
- Fix flaky integration tests by retrying health check on startup
- Log returned status codes and errors for troubleshooting.
- Ignore error returned by Body.Close().
