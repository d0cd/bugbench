description: The render-readiness observer was only initialized for Report and Embedded
  dashboard routes, missing the case where a Normal route is accessed via the /render/d/...
  path with render authentication. This meant render-authenticated Normal dashboards
  skipped initializeReportRenderReadinessObserver(), causing the renderer to fall
  back on timeout/network heuristics, increasing risk of timeouts and 500 errors.
