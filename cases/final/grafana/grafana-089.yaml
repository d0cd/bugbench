pr_title: 'Dashboards: fix missing render-readiness observer on render-authenticated
  /render/d/... route'
pr_body: "\r\n**What is this PR?**\r\n\r\nThis PR fixes a render-readiness wiring\
  \ gap for `/render/d/...` callback flows.\r\n\r\nIn the callback flow used by renderer:\r\
  \n- route resolves to `DashboardRoutes.Normal`\r\n- auth context is `authenticatedBy\
  \ === 'render'`\r\n\r\nBefore this change, render-target detection only treated\
  \ these as render targets:\r\n- `DashboardRoutes.Report`\r\n- `DashboardRoutes.Embedded`\r\
  \n\r\nSo render-authenticated `Normal` could skip `initializeReportRenderReadinessObserver()`.\r\
  \n\r\n---\r\n\r\n**Why do we need this?**\r\n\r\nThis is a correctness bug in render\
  \ readiness classification:\r\n- `/render/d/...` is a render flow.\r\n- route-only\
  \ gating excluded the render-authenticated `Normal` path.\r\n- missing observer\
  \ can increase reliance on timeout/network heuristics.\r\n\r\nIn boundary scenarios,\
  \ this increases timeout/500 risk.\r\n\r\n---\r\n\r\n**Verification summary**\r\n\
  \r\nLocal integration smoke (same renderer/environment settings) used a data-less\
  \ dashboard (`render-readiness-ab`) with `numbers + sleepEachRow` queries:\r\n\r\
  \n**before fix around ~13s,** \r\n\r\n<img width=\"1408\" height=\"742\" alt=\"\
  fix_before\" src=\"https://github.com/user-attachments/assets/5e4d40ee-535d-446f-8f8e-ff389c493fe2\"\
  \ />\r\n\r\n---\r\n\r\n**after fix around ~7s**\r\n\r\n<img width=\"1411\" height=\"\
  751\" alt=\"fix_after\" src=\"https://github.com/user-attachments/assets/46d782b5-4ecd-4cd1-a9a9-ce403c1313bf\"\
  \ />\r\n\r\n---\r\nIf users configure rendering timeout near the observed baseline\
  \ latency (for example, 13s), the baseline frequently returns HTTP 500 at the timeout\
  \ boundary, while the candidate fix completes with HTTP 200 more consistently. \r\
  \n\r\nThis reduces follow-up failures in downstream automation/reporting flows that\
  \ expect an image response.\r\n\r\n<img width=\"1318\" height=\"486\" alt=\"timeout\"\
  \ src=\"https://github.com/user-attachments/assets/51b9a706-d47c-4373-a8b4-3177059587c2\"\
  \ />\r\n\r\n---\r\n\r\n**Which issue(s) does this PR fix?**\r\n\r\nFixes #120354\
  \ \r\n\r\n---\r\nPlease check that:\r\n- [x] It works as expected from a user's\
  \ perspective.\r\n- [ ] If this is a pre-GA feature, it is behind a feature toggle.\r\
  \n- [ ] The docs are updated, and if this is a [notable improvement](https://grafana.com/docs/writers-toolkit/contribute/release-notes/#how-to-determine-if-content-belongs-in-whats-new),\
  \ it's added to our [What's New](https://grafana.com/docs/writers-toolkit/contribute/release-notes/)\
  \ doc.\r\n"
