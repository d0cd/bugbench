description: The new RadialGauge component handled the multi-series (vizCount) case
  for determining displayed text in 'Auto' mode, but failed to account for the single-series
  case where a field has a custom displayName (e.g. set via an 'Organize fields' transform).
  This caused the displayName to be silently dropped, showing the default field name
  instead.
