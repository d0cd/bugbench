pr_title: 'Gauge: Fix regression for single series w/ displayName'
pr_body: "Relates to https://github.com/grafana/support-escalations/issues/21170\r\
  \n\r\nIn the legacy gauge panel, values are passed through the shared utility https://github.com/grafana/grafana/blob/5395511c8ffecae6489e60cfa961cd3bdff1dd83/public/app/plugins/panel/bargauge/BarGaugePanel.tsx#L173-L182\
  \ from BarGaugePanel, but in the new Gauge, we were handling the vizCount case but\
  \ not the displayName case.\r\n\r\nTo test:\r\n\r\n- In the \"Gauge Panel (new)\"\
  \ gdev dashboard, only the multi-viz panels should show field labels still.\r\n\
  - If you go into any of the single-panel gauges there and add a display name to\
  \ the value field using an \"Organize fields\" transform, that name should automatically\
  \ appear (I believe all the panels on this dashboard are \"Auto\" mode, which is\
  \ what we changed here.\r\n- If you cycle through the other text modes (value and\
  \ name, value, name, none) they should continue to work as expected."
