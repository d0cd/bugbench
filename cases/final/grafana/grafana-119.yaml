pr_body: "# PATCH PR ON SLOW:\r\n\r\nThe \"Updated By\" column in dashboard version\
  \ history was showing incorrect user names. The IAM display API returns `keys` in\
  \ request order but `display` items ordered by database ID. The previous index-based\
  \ lookup between these arrays mapped the wrong display name to the wrong user key.\r\
  \n\r\n- Replace index-based array lookup with identity-based Map\r\n- Add regression\
  \ tests for misaligned display data"
