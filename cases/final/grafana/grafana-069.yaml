description: The test's mock alertmanager server was not returning the actual stored
  config, so the config hash comparison that prevents unnecessary updates in production
  was ineffective in the test. This caused a spurious update call whose CreatedAt
  timestamp varied depending on test execution speed, producing flaky results.
expected_findings:
- file: pkg/services/ngalert/remote/alertmanager_test.go
  line: 436
  summary: Mock server handler always returned a generic success response for all
    requests including GET /config, instead of returning the previously stored config.
    This made the config hash comparison ineffective, causing the idempotency check
    to always see a spurious update.
  line_side: pre_fix
- file: pkg/services/ngalert/remote/alertmanager_test.go
  line: 749
  summary: Idempotency assertion compared raw config body strings (got1 vs got2) instead
    of tracking update counts. Since the mock always accepted POSTs without reflecting
    stored config on GET, the second ApplyConfig would still send an update, and comparing
    body strings masked the real issue of whether an unnecessary update occurred.
  line_side: pre_fix
