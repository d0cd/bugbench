pr_title: 'Alerting: Fix flaky test'
pr_body: "Since we weren't returning the actual config from the test server, an update\
  \ call was being made when in the real code it would have verified the hash had\
  \ not changed and sent no update.\r\n\r\nThe flakiness was caused by the updated\
  \ config having a new `CreatedAt` timestamp. If the test was fast, the updated config\
  \ was identical. If the test was slow, the update config has a newer `CreatedAt`\
  \ value."
