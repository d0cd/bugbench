pr_title: 'Table: fix data links tooltip overflow with viewport-constrained scrolling'
pr_body: "**What is this feature?**\r\nAdds viewport-constrained scrolling to the\
  \ data links tooltip in Table panels so links that extend beyond the screen edge\
  \ are scrollable instead of clipped.\r\n\r\n**Why do we need this feature?**\r\n\
  When a Table panel has many data links configured, the tooltip silently overflows\
  \ the viewport, users can't reach links rendered off-screen with no indication the\
  \ list is incomplete.\r\n\r\n**Who is this feature for?**\r\nGrafana users who configure\
  \ multiple data links on Table panel columns.\r\n\r\n**Which issue(s) does this\
  \ PR fix?**\r\nFixes #115608 (Table panel path only, ContextMenu path is a separate\
  \ PR)\r\n\r\n**Special notes for your reviewer:**\r\n- Scroll constraints moved\
  \ into `getStyles()` / `tooltipWrapper` using Grafana's `useStyles2` + Emotion `css()`\
  \ pattern, no inline style overrides\r\n- `DataLinksActionsTooltip.test.tsx` updated\
  \ to verify overflow styles on the floating container\r\n- No new dependencies added\r\
  \n- 142 test suites pass\r\n\r\nPlease check that:\r\n- [x] It works as expected\
  \ from a user's perspective.\r\n- [ ] If this is a pre-GA feature, it is behind\
  \ a feature toggle.\r\n- [ ] The docs are updated.\r\n"
pr_commit_messages:
- "fix(ContextMenu): constrain height to viewport using floating-ui size\u2026"
- 'revert: remove ContextMenu changes, splitting into separate PR'
