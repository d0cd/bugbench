description: The `find` command in `pkgs-with-tests-named.sh` recursively searches
  subdirectories when locating `*_test.go` files, causing packages to be incorrectly
  included in CI test results when matching test functions only exist in subdirectory
  packages. The fix adds `-maxdepth 1` to respect Go's package semantics where only
  files in the same directory belong to a package.
expected_findings:
- file: scripts/ci/backend-tests/pkgs-with-tests-named.sh
  line: 60
  summary: Missing `-maxdepth 1` on `find` command causes recursive search into subdirectories,
    incorrectly matching test files that belong to child packages rather than the
    target package
