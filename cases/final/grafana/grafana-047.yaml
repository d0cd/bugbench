description: 'The parquet buffer implementation had multiple issues preventing it
  from working correctly: the reader was not properly resolving file paths (using
  reader.folder incorrectly), and the writer lacked a nil check before writing, causing
  migration failures. Additionally, there was no fallback mechanism when SQLite-based
  migration failed due to OOM from cache_size memory usage, so a retry path using
  parquet buffering was added.'
expected_findings:
- file: pkg/storage/unified/parquet/writer.go
  line: 104
  summary: 'Missing nil check on writer: w.writer could be nil when Write is called,
    causing a nil pointer dereference during migration'
- file: pkg/storage/unified/parquet/reader.go
  line: 49
  summary: 'Incorrect folder path resolution in parquet reader: reader.folder not
    properly used when constructing file paths, causing file-not-found errors during
    migration read-back'
- file: pkg/storage/unified/migrations/resource_migration.go
  line: 94
  summary: No fallback when SQLite-based migration fails with OOM; should retry using
    parquet buffer as an alternative data-buffering strategy
