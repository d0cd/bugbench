pr_title: 'Air: Faster builds with CGO_ENABLED=0, disabled optimizations and fixed
  SOURCE_DATE_EPOCH'
pr_body: "There were three separate improvements:\r\n- Fixing the build timestamp\
  \ with `SOURCE_DATE_EPOCH` made incremental rebuilds faster, using a different timestamp\
  \ on every build is not cache friendly. \r\n\r\n- Explicitly using `CGO_ENABLED=0`\
  \ decreased build times in general:\r\n```\r\nBenchmark 1: CGO_ENABLED=0 go build\
  \ -a -o ./bin/grafana1 ./pkg/cmd/grafana\r\n  Time (mean \xB1 \u03C3):     77.583\
  \ s \xB1  0.176 s    [User: 603.266 s, System: 79.937 s]\r\n  Range (min \u2026\
  \ max):   77.416 s \u2026 77.903 s    10 runs\r\n\r\nBenchmark 2: go build -a -o\
  \ ./bin/grafana2 ./pkg/cmd/grafana\r\n  Time (mean \xB1 \u03C3):     106.098 s \xB1\
  \  4.169 s    [User: 636.559 s, System: 84.545 s]\r\n  Range (min \u2026 max): \
  \  102.243 s \u2026 112.151 s    10 runs\r\n```\r\n\r\n- Disabling optimizations\
  \ with `'all=-N -l'` further decreases build times, at least on my machine by ~10s\
  \ on a full build:\r\n```\r\nBenchmark 1: CGO_ENABLED=0 go build -a -tags=arrow_json_stdlib\
  \ -o ./bin/grafana1 ./pkg/cmd/grafana\r\n  Time (mean \xB1 \u03C3):     76.300 s\
  \ \xB1  0.712 s    [User: 594.104 s, System: 79.977 s]\r\n  Range (min \u2026 max):\
  \   75.529 s \u2026 77.595 s    10 runs\r\n\r\nBenchmark 5: CGO_ENABLED=0 go build\
  \ -a -buildvcs=false -trimpath -tags arrow_json_stdlib -gcflags \"all=-N -l\" -o\
  \ ./bin/grafana2 ./pkg/cmd/grafana\r\n  Time (mean \xB1 \u03C3):     64.601 s \xB1\
  \  0.886 s    [User: 445.124 s, System: 74.809 s]\r\n  Range (min \u2026 max): \
  \  63.063 s \u2026 66.215 s    10 runs\r\n```"
