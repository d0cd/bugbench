pr_title: 'Alerting: Fix rule label/annotation key template failure fallback'
pr_body: "**What is this feature?**\r\n\r\nThis PR fixes alert rule label/annotation\
  \ key handling for empty keys in unified alerting.\r\n\r\n- Adds fallback during\
  \ expansion for literal empty keys by replacing `\"\"` with a built-in key (`__empty_label_key__`)\
  \ so alerts are still processed instead of being rejected later.\r\n- Adds rule\
  \ validation to reject empty label keys at rule creation/update time.\r\n- Updates\
  \ and adds tests for the above behavior and clarifies that labels are not template\
  \ expanded with a test.\r\n\r\n**Why do we need this feature?**\r\n\r\nWe saw alert\
  \ instances being dropped/rejected when label keys were empty. This can happen with\
  \ existing malformed rules and previously allowed invalid inputs. The result is\
  \ confusing failures during state persistence/sending.\r\n\r\nThis change makes\
  \ behavior deterministic:\r\n- Prevent new invalid empty keys via validation.\r\n\
  - Safely handle existing empty-key rules with a fallback key at expansion time.\r\
  \n\r\n**Who is this feature for?**\r\n\r\nGrafana Alerting users and operators running\
  \ Grafana-managed alert rules, especially instances affected by malformed/empty\
  \ rule label keys.\r\n\r\n**Which issue(s) does this PR fix?**:\r\n\r\nFixes #\r\
  \n\r\n**Special notes for your reviewer:**\r\n\r\nPlease check that:\r\n- [x] It\
  \ works as expected from a user's perspective.\r\n- [ ] If this is a pre-GA feature,\
  \ it is behind a feature toggle.\r\n- [ ] The docs are updated, and if this is a\
  \ [notable improvement](https://grafana.com/docs/writers-toolkit/contribute/release-notes/#how-to-determine-if-content-belongs-in-whats-new),\
  \ it's added to our [What's New](https://grafana.com/docs/writers-toolkit/contribute/release-notes/)\
  \ doc.\r\n"
