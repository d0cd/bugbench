description: The test used `user.clear()` to reset a Downshift-based Combobox input
  before typing a new value, but Downshift's stateReducer clears the input when the
  menu opens. Timing differences between local and CI environments caused `user.type()`
  to append to the stale value (e.g., 'mainfeature-branch' instead of 'feature-branch').
  The fix replaces the unreliable `user.clear()` with a click to open the menu, letting
  the stateReducer clear the input reliably before typing.
