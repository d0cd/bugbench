description: Empty label/annotation keys were accepted during alert rule creation
  and update, causing alerts to be silently dropped or rejected during state persistence
  and sending. The fix adds validation to reject empty keys at the API boundary and
  a runtime fallback that replaces empty keys with a sentinel value ('__empty_label_key__')
  so existing malformed rules degrade gracefully instead of failing.
