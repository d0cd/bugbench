description: "The @grafana/llm dependency at version 1.0.2 pulls in @modelcontextprotocol/sdk\
  \ < 1.26.0, which is affected by CVE-2026-25536 \u2014 a cross-client data leak\
  \ via shared server/transport reuse (CVSS 7.1 HIGH). The fix bumps @grafana/llm\
  \ to 1.0.3, which declares @modelcontextprotocol/sdk >= 1.26.0."
