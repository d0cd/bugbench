description: In the legacy suggestions path (when `newVizSuggestions` is false), the
  `applySuggestion` call for the no-data scenario passes `false` for the 'open options'
  parameter instead of `true`. This prevents the options pane from opening when a
  suggestion is selected, which subsequently causes a crash when the user switches
  panel types because the panel state is inconsistent.
expected_findings:
- file: public/app/features/panel/components/VizTypePicker/VisualizationSuggestions.tsx
  line: 299
  summary: 'Wrong boolean argument: `applySuggestion(suggestion, index, false, true)`
    should pass `true` for the third parameter (openOptions) so that selecting a suggestion
    in the no-data scenario correctly opens the options pane and avoids an inconsistent
    panel state that crashes on type switch.'
