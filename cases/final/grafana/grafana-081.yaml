pr_body: "**What is this feature?**\r\n\r\nFixes the Pure Git provisioning wizard\
  \ to properly auto-detect the default branch when creating a repository, preventing\
  \ the \"branch not found\" error that was blocking users.\r\n\r\n**Why do we need\
  \ this feature?**\r\n\r\nWhen setting up Pure Git through the wizard, the backend\
  \ test is called before the user reaches the branch selector. The frontend was hardcoding\
  \ `'main'` as a fallback for empty branch, which failed for repositories using `'master'`\
  \ or other defaults, permanently blocking users on step 1.\r\n\r\n\r\n**Which issue(s)\
  \ does this PR fix?**:\r\n\r\nFixes https://github.com/grafana/grafana/issues/119117\r\
  \n"
