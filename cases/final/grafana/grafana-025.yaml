pr_title: 'Provisioning: Do not enforce git suffix for pure git repositories'
pr_body: "## Summary\n\nThe Git type mutator unconditionally appended `.git` to every\
  \ repository URL, and nanogit itself also appended `.git` internally. This broke\
  \ providers like **Azure DevOps** where `.git` is a literal path segment (e.g. `/_git/MyRepo`),\
  \ not a suffix convention.\n\nThis PR removes the `.git` appending from the Git\
  \ mutator and uses nanogit's `WithoutGitSuffix()` option so the URL is stored and\
  \ used exactly as the user provides it.\n\nPartially fixes https://github.com/grafana/grafana/issues/120149\n\
  Depends on https://github.com/grafana/nanogit/pull/207 (already merged, available\
  \ in nanogit v0.7.0).\n\n## What changed\n\n| File | Change |\n|------|--------|\n\
  | `git/mutator.go` | Removed `.git` suffix appending. Mutator now only trims whitespace\
  \ and trailing slashes. |\n| `git/repository.go` | Added `SkipGitSuffix` field to\
  \ `RepositoryConfig`. When set, passes `options.WithoutGitSuffix()` to nanogit.\
  \ |\n| `git/extra.go` | Sets `SkipGitSuffix: true` when building Git type repositories.\
  \ |\n| `types.go` + generated files | Updated URL example comment to not include\
  \ `.git`. |\n| `git/mutator_test.go` | Updated test expectations to reflect no `.git`\
  \ appending. |\n\n## Why `SkipGitSuffix` is only set for the Git type\n\n`git.NewRepository`\
  \ is shared by both the **Git** and **GitHub** extras:\n\n```mermaid\nflowchart\
  \ TD\n    subgraph gitExtra [\"Git Extra (git/extra.go)\"]\n        GE[\"Build()\"\
  ] -->|\"SkipGitSuffix: true\"| NR[\"git.NewRepository\"]\n    end\n\n    subgraph\
  \ ghExtra [\"GitHub Extra (github/extra.go)\"]\n        GHE[\"Build()\"] -->|\"\
  SkipGitSuffix: false (default)\"| NR\n    end\n\n    NR -->|\"SkipGitSuffix?\"|\
  \ Decision{SkipGitSuffix?}\n    Decision -->|true| NoSuffix[\"nanogit: use URL as-is\"\
  ]\n    Decision -->|false| AddSuffix[\"nanogit: append .git\"]\n```\n\nThe **GitHub\
  \ mutator** strips `.git` from the stored URL, then relies on nanogit to add it\
  \ back internally (GitHub's Git HTTP API requires it). If we applied `WithoutGitSuffix()`\
  \ to GitHub repos too, they would break. So we only enable it for the pure Git type\
  \ through the `RepositoryConfig.SkipGitSuffix` field.\n\n## Backward compatibility\
  \ with existing repositories\n\nExisting Git type repositories that were created\
  \ before this change already have `.git` in their stored URL (the old mutator added\
  \ it). These continue to work:\n\n```mermaid\nflowchart LR\n    subgraph before\
  \ [\"Before this PR\"]\n        B1[\"User: .../MyRepo\"] -->|mutator| B2[\"Stored:\
  \ .../MyRepo.git\"]\n        B2 -->|nanogit| B3[\"Used: .../MyRepo.git\"]\n    end\n\
  \n    subgraph afterOld [\"After this PR \u2014 existing repo\"]\n        A1[\"\
  Stored: .../MyRepo.git\"] -->|\"mutator (no change)\"| A2[\"Still: .../MyRepo.git\"\
  ]\n        A2 -->|\"nanogit + WithoutGitSuffix\"| A3[\"Used: .../MyRepo.git \u2705\
  \"]\n    end\n\n    subgraph afterNew [\"After this PR \u2014 new repo\"]\n    \
  \    N1[\"User: .../MyRepo\"] -->|\"mutator (trim only)\"| N2[\"Stored: .../MyRepo\"\
  ]\n        N2 -->|\"nanogit + WithoutGitSuffix\"| N3[\"Used: .../MyRepo \u2705\"\
  ]\n    end\n```\n\n- **Existing repos** already have `.git` in the stored URL. The\
  \ mutator no longer adds it, but doesn't strip it either. nanogit with `WithoutGitSuffix()`\
  \ uses the URL as-is, so `.git` is preserved. These repos keep working.\n- **New\
  \ repos** store the URL exactly as provided. nanogit uses it as-is too. Users who\
  \ need `.git` (standard Git servers) include it in the URL. Users who don't (Azure\
  \ DevOps) omit it.\n- **Broken repos** (e.g. Azure DevOps repos where the old mutator\
  \ added `.git`) need a manual URL update to remove the `.git` suffix. This is expected\
  \ since those repos were non-functional anyway.\n\n## Test plan\n\n- [x] Mutator\
  \ tests updated and passing \u2014 URLs are no longer modified with `.git` suffix\n\
  - [x] Build passes for the full provisioning app\n- [ ] Verify Azure DevOps repository\
  \ URLs work without `.git` appending\n- [ ] Verify standard Git provider URLs (GitHub,\
  \ GitLab, Bitbucket) still work when user includes `.git` in URL\n- [ ] Verify existing\
  \ repositories with `.git` in stored URL continue to function\n- [ ] Verify GitHub\
  \ type repositories are unaffected (nanogit still appends `.git` for them)\n\n\n\
  Made with [Cursor](https://cursor.com)"
