  line: 546
  summary: "saveDashboardViaK8s does not extract or handle legacy internal IDs from\
    \ the spec \u2014 k8s-style payloads with internal IDs fail when saving through\
    \ the legacy API"
- file: pkg/registry/apis/dashboard/legacy/sql_dashboards.go
  line: 154
  summary: "Missing getLegacyIDSelector function to extract internal ID from label\
    \ selectors \u2014 the SQL layer cannot look up dashboards by deprecated internal\
    \ ID"
- file: public/app/features/dashboard-scene/serialization/transformSceneToSaveModel.ts
