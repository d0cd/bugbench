description: "The FR digest 'Community Interest' section was counting all GitHub comments\
  \ \u2014 including those from bots and organization members \u2014 instead of only\
  \ external community comments. The fix fetches comment author metadata and filters\
  \ to only count comments where `authorAssociation` is `NONE` or `CONTRIBUTOR`, excluding\
  \ `[bot]` accounts."
