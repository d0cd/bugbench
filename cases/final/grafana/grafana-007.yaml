description: The legacy dashboard API did not properly handle Kubernetes-style dashboard
  payloads containing internal IDs. Dashboards could not be saved or updated via the
  legacy API when using k8s objects because internal IDs were not extracted for lookups,
  the SQL layer lacked a query path for deprecated internal IDs, and internal IDs
  could leak into persisted specs. The fix adds internal ID extraction, SQL query
  support for DeprecatedInternalID, overwrite conflict handling, and strips internal
  IDs before saving.
expected_findings:
