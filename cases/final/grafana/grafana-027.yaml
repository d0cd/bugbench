description: The alertmanager and test receivers code contained unnecessary patchNewSecureFields
  and patchSettingsFromSecureSettings functions that manually copied dingding secure
  fields between settings maps. This patching logic became redundant after the upstream
  grafana/alerting library was updated to read from both settings and secureSettings
  natively, and the extra patching could mask or interfere with the library's own
  field resolution.
expected_findings:
- file: pkg/services/ngalert/notifier/alertmanager.go
  line: 444
  summary: "Unnecessary call to patchNewSecureFields/patchSettingsFromSecureSettings\
    \ on receivers before passing to API \u2014 upstream alerting library now handles\
    \ secureSettings merging natively, so this patching is redundant and should be\
    \ removed"
- file: pkg/services/ngalert/notifier/testreceivers.go
  line: 26
  summary: "Test receivers path also applies redundant secure field patching before\
    \ constructing APIReceiver \u2014 should pass receivers through without manual\
    \ field copying since the library reads both settings and secureSettings"
