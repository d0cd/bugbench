pr_title: 'Alerting: Fix long text overflow in rule details sidebar'
pr_body: '**What is this feature?**


  Fix long text values (e.g. URLs in annotations) overflowing horizontally in the
  rule details sidebar. Content now wraps instead of causing a horizontal scrollbar.


  **Why do we need this feature?**


  Long annotation values like URLs were causing the entire details panel to scroll
  horizontally, making it hard to read other content on the page.


  **Who is this feature for?**


  Users who view alert rule details that contain long annotations or other long text
  values.


  **Which issue(s) does this PR fix?**:


  Fixes #


