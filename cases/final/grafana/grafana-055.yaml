description: The status subresource's key function was incorrectly configured in the
  API server app installer, causing status PATCH/PUT operations on namespaced resources
  (like advisor checks) to fail. The isClusterScoped check used to select the key
  function for status stores was duplicated and likely applying the wrong key function,
  breaking status subresource updates.
expected_findings:
- file: pkg/services/apiserver/appinstaller/server.go
  line: 160
  summary: "Status subresource store uses incorrect key function derivation \u2014\
    \ the isClusterScoped check based on CreateStrategy and NamespaceScoped may select\
    \ the wrong keyfunc, causing status updates to fail for namespaced resources"
  line_side: pre_fix
- file: pkg/services/apiserver/appinstaller/server.go
  line: 182
  summary: "Duplicated isClusterScoped logic for a second status store has the same\
    \ keyfunc bug \u2014 status subresource PATCH/PUT will construct wrong storage\
    \ keys for namespaced resources"
  line_side: pre_fix
