description: During dependency injection, the LegacyStatsGetter captured dual-writer
  mode flags as static booleans before auto-migration had run, so they were always
  false. This caused validateOnDelete to always include stale legacy SQL dashboard
  counts, preventing deletion of folders that were actually empty in unified storage.
  The fix replaces the static booleans with a *setting.Cfg pointer so the dual-writer
  mode is read dynamically at query time.
expected_findings:
- file: pkg/storage/unified/federated/stats.go
  line: 6
  summary: 'Stale state capture: dual-writer mode booleans are stored as static fields
    at construction time, but auto-migration sets Mode5 later during startup. These
    fields will always be false, causing legacy SQL fallback to always be included
    in stats queries.'
- file: pkg/storage/unified/client.go
  line: 23
  summary: Static boolean passed to federated client constructor instead of cfg pointer.
    The resolved boolean value is captured before auto-migration runs, so it will
    never reflect the actual dual-writer mode.
- file: pkg/storage/unified/federated/client.go
  line: 5
  summary: Client constructor accepts pre-resolved booleans for disable-SQL-fallback
    flags rather than accepting *setting.Cfg and reading the mode dynamically, causing
    initialization-order dependency.
