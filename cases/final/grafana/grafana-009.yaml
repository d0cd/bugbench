description: The AnnotationPlugin's canvasRegionRendering prop was set to incorrect
  values in both the CandlestickPanel and TimeSeriesPanel components, introduced in
  a recent commit. The fix removes the erroneous prop value overrides (2 lines deleted,
  0 added), restoring correct default behavior.
expected_findings:
- file: pkg/storage/unified/client.go
  line: 73
  summary: Dual-writer mode for dashboards and folders was evaluated once at client
    creation time and stored as static booleans, so if auto-migration later set Mode5,
    the fallback disable flags would remain stale and legacy SQL queries would still
    run
  line_side: pre_fix
- file: pkg/storage/unified/federated/stats.go
  line: 9
  summary: LegacyStatsGetter stored pre-computed boolean flags (DisableSQLFallbackDashboards/Folders)
    instead of reading the current config, preventing it from detecting dynamic mode
    changes after creation
  line_side: pre_fix
