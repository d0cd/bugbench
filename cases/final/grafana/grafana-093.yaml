description: 'Two bugs fixed: (1) `getPrevRepeatValues` returned `[]` instead of `undefined`
  when repeatedRows/repeatedTabs were uninitialized, causing `isEqual([], [])` to
  be true when `$__all` resolved to empty options, which skipped initialization and
  left an infinite spinner. (2) The v2-to-v1 response transformer accessed incorrect
  property paths (`spec.query.spec.datasource` and `spec.query.spec.group` instead
  of `spec.query.datasource` and `spec.query.group`), losing datasource references
  for panel queries and query variables.'
