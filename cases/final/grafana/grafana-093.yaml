pr_title: 'Dashboards: Fix infinite spinner on repeating rows when $_all resolves
  to empty options'
pr_body: "**What is this feature?**\r\n\r\nThis PR fixes two issue\r\n\r\n1. **Fix\
  \ infinite spinner on repeating rows/tabs when variable options are empty:** `getPrevRepeatValues`\
  \ now returns `undefined` instead of `[]` when `repeatedRows`/`repeatedTabs` has\
  \ never been initialized. This helps avoid a case where `$__all` returns an empty\
  \ array (when variable options are empty), which matches the previous uninitialized\
  \ state (`[]`), causing `isEqual([], [])` to skip initialization entirely and leaving\
  \ the repeater stuck on an infinite spinner.\r\n\r\n2. **Fix incorrect datasource\
  \ property paths in v2 -> v1 response transformation:** The v2 -> v1 conversion\
  \ was accessing `spec.query.spec.datasource` and `spec.query.spec.group` instead\
  \ of the correct `spec.query.datasource` and `spec.query.group`, causing datasource\
  \ references to be lost for both panel queries and query variables.\r\n\r\n\r\n"
