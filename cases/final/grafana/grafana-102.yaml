pr_body: "## Summary\n\nFixes #119488 \u2014 \"Folders: Can't delete empty folder\
  \ in 12.4.0\"\n\nAfter upgrading to 12.4 from a prior version, users cannot delete\
  \ folders that appear empty. The root cause is a **timing issue** between the federated\
  \ client creation and auto-migration:\n\n1. During wire DI, the `LegacyStatsGetter`\
  \ captured `DisableSQLFallbackDashboards` as a static boolean \u2014 always `false`\
  \ because Mode5 hasn't been set yet\n2. Auto-migration runs later during service\
  \ startup and sets Mode5, but the boolean was already captured\n3. When deleting\
  \ a folder, `validateOnDelete` \u2192 `GetStats()` always appended legacy SQL dashboard\
  \ counts (stale records from pre-migration that were never cleaned up)\n4. This\
  \ caused \"folder is not empty\" even though the dashboard was already deleted from\
  \ unified storage\n\nThe fix replaces the static booleans with a `*setting.Cfg`\
  \ pointer, reading the dual-writer mode at query time so auto-migration changes\
  \ are picked up immediately.\n\n## Changes\n\n- **`federated/stats.go`**: Replace\
  \ `DisableSQLFallbackDashboards`/`DisableSQLFallbackFolders` booleans with `*setting.Cfg`\
  \ and dynamic mode-checking methods\n- **`federated/client.go`**: Update `NewFederatedClient`\
  \ to accept `*setting.Cfg` instead of two booleans\n- **`client.go`**: Simplify\
  \ call site, remove eagerly-computed boolean logic\n- **`federated/stats_test.go`**:\
  \ Update existing tests + add `DynamicModeChange` test verifying the fix\n\n## Test\
  \ plan\n\n- [x] All existing `TestIntegrationDirectSQLStats` tests pass\n- [x] New\
  \ `DynamicModeChange` test verifies that changing cfg mode after `LegacyStatsGetter`\
  \ creation is reflected in subsequent `GetStats` calls\n- [ ] Manual verification:\
  \ upgrade from 12.3 \u2192 12.4, create folder+dashboard in 12.3, delete dashboard\
  \ then folder in 12.4"
