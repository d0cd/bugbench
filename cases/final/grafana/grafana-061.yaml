pr_body: "Part of https://github.com/grafana/grafana/issues/120149\r\n\r\n## Summary\r\
  \n- Updates the Pure Git \"Repository URL\" field description to mention that most\
  \ servers require the URL to end with `.git`.\r\n- Helps users avoid 404 errors\
  \ when configuring Pure Git repositories.\r\n\r\nCloses https://github.com/grafana/nanogit/issues/207\r\
  \n\r\n## Test plan\r\n- [ ] Open the provisioning wizard, select Pure Git, and verify\
  \ the Repository URL field description now reads: *\"The Git repository URL. Most\
  \ servers require the URL to end with .git (e.g. https://host/owner/repo.git).\"\
  *\r\n\r\nMade with [Cursor](https://cursor.com)"
