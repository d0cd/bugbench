pr_body: The broadcast loop in `stream()` could deadlock when unsubscribing slow consumers
  by sending to `b.unsubscribe`, which is only drained by the same goroutine. With
  >100 slow consumers, the buffered channel fills and the send blocks forever. Fix
  by collecting slow consumers and removing them inline after the broadcast loop.
