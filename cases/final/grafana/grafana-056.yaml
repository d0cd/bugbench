description: The broadcast loop in `stream()` deadlocks when unsubscribing slow consumers
  because it sends to `b.unsubscribe`, a buffered channel that is only drained by
  the same goroutine. When the number of slow consumers exceeds the channel buffer
  (>100), the send blocks forever, halting all event broadcasting. The fix collects
  slow consumers during the broadcast loop and removes them inline afterward, avoiding
  the self-deadlocking channel send.
