description: The heatmap panel's prepareHeatmapData function crashes when frames exist
  but contain no actual data (e.g., frame.length is 0 or fields have empty values
  arrays). The existing guard only checked for an empty frames array, not for frames
  with zero-length data. The fix adds a filter to exclude empty frames before further
  processing.
