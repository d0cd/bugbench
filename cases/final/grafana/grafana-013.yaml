description: Graphite metric name variable queries running through the backend mode
  failed to correctly populate the 'text' and 'value' fields for metric names. The
  data frame construction had changed, and the code was not using the 'displayNameFromDS'
  value to set the series name, causing variable queries to return incorrect or missing
  metric names. The fix updates the field extraction to use 'displayNameFromDS' when
  constructing the variable query results.
