description: The codebase contained dead patching logic (`patchNewSecureFields`, `patchSettingsFromSecureSettings`)
  that copied DingDing notification URLs between `settings` and `secureSettings` maps
  before passing receivers to the alerting subsystem. The upstream `grafana/alerting`
  library was updated to read from both maps natively, making this patching redundant.
  Removing it eliminates unnecessary complexity and potential confusion about where
  secure field resolution actually happens.
