pr_title: 'Fix Dockerfile: remove reference to deleted build.go'
pr_body: '## What is this feature?


  Fixes Docker build failures caused by PR #119297 which removed `build.go` but left
  a reference to it in the Dockerfile.


  ## What problem does this solve?


  PR #119297 removed the `build.go` file but the Dockerfile still references it in
  a COPY command on line 126, causing Docker builds to fail with:

  ```

  ERROR: failed to build: failed to solve: failed to compute cache key: "/build.go":
  not found

  ```


  ## How does this fix it?


  Removes `build.go` from the COPY instruction in the Dockerfile.


  ## Changes


  - Remove `build.go` from `COPY embed.go Makefile build.go package.json ./` on line
  126


  ## Related Issues


  Fixes the Docker build broken by 05c9ed18d66 ("chore: cleanup makefile (#119297)")'
pr_commit_messages:
- 'Fix Dockerfile: remove reference to deleted build.go'
- Test Dockerfile changes when Makefile is changed
- Remove unnecessary deps from Dockerfile and add missing copy/add
