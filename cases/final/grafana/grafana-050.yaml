description: The unified storage migration service's Run method only checked DisableDataMigrations
  before proceeding with migrations, but did not verify the storage type. This caused
  migrations to run for non-unified storage types like unified-grpc and unified-kv-grpc,
  which should not execute these migrations. The fix adds a guard condition to skip
  migrations when the storage type is anything other than 'unified'.
expected_findings:
- file: pkg/storage/unified/migrations/service.go
  line: 59
  summary: 'Missing storage-type guard: migrations run unconditionally for all storage
    types. The condition only checks DisableDataMigrations but should also verify
    that UnifiedStorageType() == "unified" before proceeding, otherwise non-unified
    storage backends (unified-grpc, unified-kv-grpc) will incorrectly execute migrations.'
  line_side: pre_fix
