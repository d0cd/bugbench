description: 'Two bugs: (1) `getPrevRepeatValues` in both RowItemRepeater and TabItemRepeater
  returned an empty array `[]` when repeatedRows/repeatedTabs was uninitialized, causing
  `isEqual([], [])` to be true when `$__all` resolved to empty options, which skipped
  initialization and left an infinite spinner. The fix returns `undefined` instead.
  (2) The v2-to-v1 response transformer accessed `spec.query.spec.datasource` and
  `spec.query.spec.group` instead of the correct `spec.query.datasource` and `spec.query.group`,
  silently dropping datasource references.'
expected_findings:
- file: public/app/features/dashboard-scene/scene/layout-rows/RowItemRepeater.tsx
  line: 125
  summary: getPrevRepeatValues returns `[]` when repeatedRows is uninitialized; this
    matches `$__all` resolving to empty options via `isEqual([], [])`, preventing
    initialization and causing infinite spinner. Should return `undefined` instead.
- file: public/app/features/dashboard-scene/scene/layout-tabs/TabItemRepeater.tsx
  line: 104
  summary: 'Same bug as RowItemRepeater: getPrevRepeatValues returns `[]` instead
    of `undefined` for uninitialized repeatedTabs, causing identical infinite spinner
    when `$__all` resolves to empty options.'
- file: public/app/features/dashboard/api/ResponseTransformers.ts
  line: 989
  summary: 'Incorrect property path: accesses `spec.query.spec.datasource` and `spec.query.spec.group`
    instead of `spec.query.datasource` and `spec.query.group`, causing datasource
    references to be silently lost during v2-to-v1 dashboard conversion.'
