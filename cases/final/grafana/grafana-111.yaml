pr_title: 'Alerting: Fix stale alertmanager selection issue when switching organizations'
pr_body: "**Problem**\r\n\r\nThe Alerting UI stored the selected Alertmanager in a\
  \ single global localStorage key (alerting-alertmanager) shared across all organizations.\
  \ When a user switched orgs or renamed the datasource, the stale key referred to\
  \ an AM that no longer existed in the current context, causing the UI to render\
  \ an error with a disabled dropdown that offered no way to recover.\r\n\r\n*Before\
  \ the fix*\r\n\r\nhttps://github.com/user-attachments/assets/d073b04e-6e0d-4009-af9a-e057063fb879\r\
  \n\r\n\r\n**Fix**\r\n\r\nRefactored the localStorage key to be scoped per organization\
  \ (alerting-alertmanager-org-{orgId}), preventing cross-org contamination. Additionally,\
  \ when the desired AM is unavailable, the context now gracefully falls back to the\
  \ Grafana built-in Alertmanager (instead of returning undefined) and cleans up the\
  \ stale key, ensuring users are never left in a broken state.\r\n\r\n*After the\
  \ fix*\r\n\r\nhttps://github.com/user-attachments/assets/f823ccc4-f542-4db4-bd5a-86776a5515e4\r\
  \n\r\n\r\n\r\n**Which issue(s) does this PR fix?**:\r\n\r\nFixes https://github.com/grafana/grafana/issues/83320\r\
  \n\r\n**Special notes for your reviewer:**\r\n\r\nPlease check that:\r\n- [ ] It\
  \ works as expected from a user's perspective.\r\n- [ ] If this is a pre-GA feature,\
  \ it is behind a feature toggle.\r\n- [ ] The docs are updated, and if this is a\
  \ [notable improvement](https://grafana.com/docs/writers-toolkit/contribute/release-notes/#how-to-determine-if-content-belongs-in-whats-new),\
  \ it's added to our [What's New](https://grafana.com/docs/writers-toolkit/contribute/release-notes/)\
  \ doc.\r\n"
