  \ do not add this label to smaller PRs for the feature.\r\n\r\n-->\r\n\r\n**What\
  \ is this feature?**\r\n\r\nWith the introduction of the multi value operators here\
  \ [1](https://github.com/grafana/grafana/pull/91837) and [2](https://github.com/grafana/grafana/pull/92995)\
  \ and the introduction of the `promQLScope` feature toggle related to scopes, PromDS\
  \ would properly manipulate expressions containing this new operator, but it was\
  \ not backwards compatible for pre-scopes dashboards that would try to use this\
  \ new `one-of` operator.\r\n\r\nBasically, this would work fine if you would've\
  \ had scopes ff turned on and would've used `one-of`, because it went down a codepath\
  \ that dealt with it [here](https://github.com/grafana/grafana/blob/main/packages/grafana-prometheus/src/datasource.ts#L798).\
  \ but if you would turn off the ff and try to use `one-of` it would crash due to\
  \ going down the older existing prometheus logic which did not account for this\
  \ new operator.\r\n\r\nThis became evident with the merge of [this](https://github.com/grafana/grafana/pull/112035)\
  \ PR that took out the said scopes ff.\r\n\r\nSince the `one-of` operator is basically\
  \ a nice UI packaging of the regex operator this should be a simple remap between\
  \ `=| one-of op` and `=~ regex op`.\r\n\r\nI have brought back the `remapOneOf`\
  \ method added and removed a while ago for this backward comp support, while everything\
  \ else remains as it was on the BE side\r\n\r\n**Why do we need this feature?**\r\
  \n\r\nFixes `one-of` operator which is now currently broken for everyone except\
