description: The legacy dashboard API did not properly handle k8s-style dashboard
  payloads. When a v2 schema dashboard was submitted without a k8s wrapper, the API
  failed to detect and unwrap it, and the SQL layer lacked support for selecting dashboards
  by their deprecated internal ID. The frontend also needed to strip the internal
  ID before saving to prevent it from being persisted.
