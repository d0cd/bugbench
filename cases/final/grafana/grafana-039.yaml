description: Dashboard reference was stored in a local `let` variable set via `useEffectOnce`,
  causing it to be re-declared as `undefined` on re-renders. This meant `dashboard?.events.subscribe`
  failed silently and the event subscription was lost, breaking dashboard refresh
  for the alert list panel. Fixed by storing the dashboard in a `useRef` and splitting
  event subscription from data fetching into separate effects.
expected_findings:
- file: public/app/plugins/panel/alertlist/UnifiedAlertList.tsx
  line: 121
  summary: 'Stale reference: local `let dashboard` variable is re-declared as undefined
    on each render, so the event subscription in the effect closure captures a stale/undefined
    value. Should use `useRef` to persist the dashboard reference across renders.'
- file: public/app/plugins/panel/alertlist/UnifiedAlertList.tsx
  line: 173
  summary: Event subscription and data fetch are combined in a single effect with
    dependencies that trigger unnecessary unsubscribe/resubscribe cycles. These should
    be split into separate effects to avoid losing the subscription.
