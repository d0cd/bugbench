pr_title: Fix pkgs-with-tests-named.sh matching tests from subdirectories
pr_body: '## Summary

  - `scripts/ci/backend-tests/pkgs-with-tests-named.sh` uses `find` to locate `*_test.go`
  files for each package, but `find` is recursive by default

  - This causes packages to be incorrectly included in results when the matching test
  function (e.g. `TestIntegration*`) only exists in a subdirectory package

  - For example, `pkg/extensions/apiserver/registry/iam/globalrole` was included because
  `TestIntegration*` functions exist in its `legacy/` subdirectory, not in the package
  itself

  - Fix: add `-maxdepth 1` to the `find` command to match Go''s package semantics
  (only files in the same directory belong to a package)


  ## Test plan

  - [x] Run `./scripts/ci/backend-tests/pkgs-with-tests-named.sh -b TestIntegration`
  and verify `globalrole` no longer appears (its `legacy/` subdirectory should still
  appear)

  - [x] Verify the script still correctly finds packages that do have matching test
  functions'
