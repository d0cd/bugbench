pr_title: 'Dashboards: Resolve display names by identity in version history'
pr_body: "Fixes #119219\r\n\r\n*Problem*\r\n\r\nThe \"Updated By\" column in the dashboard\
  \ version history page shows wrong user names when multiple users have edited a\
  \ dashboard. The names appear swapped or shuffled across versions. This affects\
  \ both UI-saved and API-saved dashboards.\r\n\r\nThe frontend resolves user identity\
  \ keys to display names via the IAM display API (`/display`). The response contains\
  \ `keys` (in request order) and `display` (ordered by `u.id ASC` in the database).\
  \ The code used an index-based lookup between these two misaligned arrays, mapping\
  \ the wrong display name to the wrong user key.\r\n\r\n*Solution*\r\n\r\nReplace\
  \ the index-based array lookup with an identity-based `Map` using each display item's\
  \ `identity` field (`type:name`). Also add an `internalId` fallback for legacy numeric\
  \ keys.\r\n\r\n*How to test*\r\n\r\n1. Create a dashboard and save a few versions\
  \ as User A\r\n2. Log in as User B (with a different/higher DB ID) and save a new\
  \ version\r\n3. Open Settings > Versions -- each version should show the correct\
  \ user name "
pr_commit_messages:
- 'fix(dashboard): resolve display names by identity in version history'
- 'test(dashboard): add test for createdBy fallback on initial version'
