description: During the transition from internal numeric dashboard IDs to UIDs, the
  internal ID was dropped from the dashboard model and scene serialization paths.
  However, the analytics/usage insights system still relied on `dashboard.id` (the
  internal numeric ID) to emit dashboard view events and query analytics, causing
  usage insights data to stop being recorded. The fix restores the deprecated internal
  ID field through the serialization pipeline so analytics processors can continue
  referencing it.
expected_findings:
- file: public/app/features/dashboard/state/analyticsProcessor.ts
  line: 2
  summary: "Analytics emitDashboardViewEvent requires dashboard.id (internal numeric\
    \ ID) but this field was removed from the dashboard model \u2014 usage insights\
    \ will silently produce no data"
- file: public/app/features/query/state/queryAnalytics.ts
  line: 66
  summary: dashboardId is set from dashboard.id which is no longer populated after
    the UID migration, causing query analytics events to lack dashboard identification
- file: public/app/features/dashboard-scene/scene/DashboardScene.tsx
  line: 112
  summary: DashboardScene state no longer carries the deprecated internal id field,
    breaking downstream analytics consumers that depend on it
