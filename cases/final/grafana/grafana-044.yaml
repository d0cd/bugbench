description: 'The `typesVersions` field was added to `@grafana/alerting`''s package.json
  as a backward-compatibility shim for a downstream consumer using `moduleResolution:
  "node"`. Now that the root cause has been fixed upstream, this workaround is unnecessary
  and inconsistent with how other `@grafana/*` packages are defined. The revert removes
  the dead compatibility hack.'
