pr_body: "**What is this feature?**\r\n\r\nThis PR reverts the `typesVersions` addition\
  \ to `@grafana/alerting` from #120020.\r\n\r\n#### Why\r\n\r\nThe root cause (grafana-assistant-app\
  \ using `moduleResolution: \"node\"`) has been fixed upstream by switching to `moduleResolution:\
  \ \"bundler\"` in https://github.com/grafana/grafana-assistant-app/pull/5338.\r\n\
  \r\nRemoving `typesVersions` keeps `@grafana/alerting` consistent with how the other\
  \ `@grafana/*` packages are defined.\r\n\r\n**Special notes for your reviewer:**\r\
  \n\r\nPlease check that:\r\n- [ ] It works as expected from a user's perspective.\r\
  \n- [ ] If this is a pre-GA feature, it is behind a feature toggle.\r\n- [ ] The\
  \ docs are updated, and if this is a [notable improvement](https://grafana.com/docs/writers-toolkit/contribute/release-notes/#how-to-determine-if-content-belongs-in-whats-new),\
  \ it's added to our [What's New](https://grafana.com/docs/writers-toolkit/contribute/release-notes/)\
  \ doc.\r\n"
