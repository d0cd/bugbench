pr_title: 'Elasticsearch: Fix variable queries broken by empty meta object'
pr_body: "Fixes: grafana/support-escalations#21157\r\n\r\n`convertFieldsToVariableFields`\
  \ guarded Scenario 2 with `if (meta)`, which is truthy for `{}`. Any query where\
  \ meta was reset to an empty object (e.g. on query-type tab switch) skipped the\
  \ legacy Scenario 4 fallback and returned the raw JSON blob field as variable values.\r\
  \n\r\nFix the guard to `if (meta?.textField || meta?.valueField)` and reset meta\
  \ to `undefined` (not `{}`) on structural query changes."
