- file: public/app/features/panel/components/VizTypePicker/VisualizationSuggestionCard.tsx
  line: 26
  summary: Outer <button> element causes invalid nested button HTML when child content
    (e.g. table suggestions) contains its own <button> elements; should be a <div>
    with role="button" or similar
