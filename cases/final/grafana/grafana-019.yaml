description: The panel editor lacked logic to automatically resolve Mixed datasource
  mode back to a single datasource when all non-expression queries converge on the
  same source. The fix adds a uniform-datasource check but the helper function returns
  the datasource object by reference rather than a shallow copy, risking unintended
  mutation of shared state, and the auto-resolve logic may misbehave when only expression
  queries remain or when Mixed mode was intentionally configured.
expected_findings:
- file: public/app/features/dashboard-scene/panel-edit/PanelEditNext/PanelDataPaneNext.tsx
  line: 69
  summary: "getUniformDatasource returns a direct reference to the datasource object\
    \ rather than a shallow copy \u2014 callers that mutate the result will corrupt\
    \ shared state; should return { ...datasource } instead"
  line_side: pre_fix
- file: public/app/features/dashboard-scene/panel-edit/PanelEditNext/PanelDataPaneNext.tsx
  line: 217
  summary: resolveUniformDatasource may switch datasource even when all remaining
    queries are expressions (no 'real' queries left), since filtering out all queries
    could return an ambiguous result rather than preserving Mixed mode
  line_side: pre_fix
- file: public/app/features/dashboard-scene/panel-edit/PanelEditNext/PanelDataPaneNext.tsx
  line: 56
  summary: "Auto-resolve from Mixed to single datasource is unconditional \u2014 there\
    \ is no way for a user to intentionally keep Mixed mode when queries happen to\
    \ share the same source, changing semantics for deliberately Mixed-configured\
    \ panels"
  line_side: pre_fix
