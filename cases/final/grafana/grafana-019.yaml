pr_title: 'QueryEditor: Resolve Mixed datasource back to single when all queries share
  the same source'
pr_body: "## Description\r\nWhen a panel enters Mixed datasource mode (because queries\
  \ target different datasources), it should automatically switch back to the single\
  \ datasource when all non-expression queries end up using the same one.\r\n\r\n\
  ## Changes\r\n* Extracted a pure helper `getUniformDatasource()` that filters out\
  \ expression queries and checks whether all remaining queries share the same datasource\
  \ UID\r\n* Added `resolveUniformDatasource()` private method that checks if the\
  \ panel is in Mixed mode and, if all queries are now uniform, switches back to the\
  \ single datasource\r\n* Hooked `resolveUniformDatasource()` into `updateQueries()`,\
  \ `deleteQuery()`, and `changeDataSource()` - the three operations where the query\
  \ set can become uniform\r\n\r\n## Risks\r\n* If a panel is intentionally kept in\
  \ Mixed mode with identical-datasource queries (unlikely but possible), this will\
  \ auto-resolve it back to single mode. But this matches legacy behavior in the old\
  \ query editor, so we should be fine.\r\n\r\n## Demo\r\nN/A \u2014 behavioral change,\
  \ no visible UI difference.\r\n\r\n## Testing Instructions\r\n* Open a panel editor\
  \ (with the new panel edit experience enabled)\r\n* Add two queries targeting the\
  \ same datasource (e.g. Prometheus)\r\n* Change one query's datasource to a different\
  \ one (e.g. Loki) - the panel should switch to Mixed mode\r\n* Change it back to\
  \ Prometheus - the panel should automatically resolve back to single Prometheus\
  \ mode\r\n* Delete the differing query instead - same result, panel resolves back\
  \ to single mode\r\n* Verify that expression queries (`__expr__`) don't interfere\
  \ with the resolution logic\r\n\r\n## Reviewer Checklist\r\n- [ ] Tests are added\
  \ where applicable\r\n- [ ] Issue is linked to PR\r\n- [ ] Code pulled and tested\r\
  \n- [ ] Code is meaningfully improved if applicable"
