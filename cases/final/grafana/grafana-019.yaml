description: The VisualizationSuggestionCard component used a <button> element as
  its outer wrapper. When rendering suggestions that contain interactive elements
  like tables with buttons, this created invalid nested <button> HTML, triggering
  a browser console warning. The fix changes the outer element from <button> to <div>.
