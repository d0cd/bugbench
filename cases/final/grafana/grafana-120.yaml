description: When the legacy database is not available, the dual writer service lacks
  a fallback migration status reader. This PR adds a configuration-based MigrationStatusReader
  that derives status from config rather than querying the legacy DB, which is necessary
  for API Server scenarios where legacy storage may not exist or resources haven't
  been migrated.
