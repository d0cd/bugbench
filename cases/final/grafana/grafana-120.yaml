pr_body: "**What is this feature?**\r\n\r\nAdds a dual writer status reader based\
  \ on cfg when legacy is not available. \r\n\r\n**Why do we need this feature?**\r\
  \n\r\nAPI Server would need to query legacy DB for resources that are global or\
  \ might not even have been migrated from legacy.\r\n\r\n**Who is this feature for?**\r\
