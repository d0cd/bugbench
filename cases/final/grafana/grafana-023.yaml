pr_title: 'Alerting: Add learning from corrections guideline to AGENTS.md'
pr_body: "**What is this feature?**\r\n\r\n## Summary\r\n\r\nAdd a \"Learning from\
  \ Corrections\" section to the alerting AGENTS.md that instructs agents to propose\
  \ updates to the file when a developer corrects a recurring mistake during vibe\
  \ coding.\r\n\r\n## Details\r\n\r\n- Agents should assess whether a correction represents\
  \ a recurring pattern worth documenting\r\n- Updates are only **proposed**, never\
  \ auto-applied => the developer must explicitly approve\r\n- Skip proposing if the\
  \ correction is a one-off, already documented, or a personal preference\r\n\r\n\
  ## Motivation\r\n\r\nTurns developer corrections into persistent knowledge, creating\
  \ a feedback loop that prevents the same mistakes from recurring across sessions\
  \ while keeping the developer in control of what gets documented.\r\n\r\n\r\n**Special\
  \ notes for your reviewer:**\r\n\r\nPlease check that:\r\n- [ ] It works as expected\
  \ from a user's perspective.\r\n- [ ] If this is a pre-GA feature, it is behind\
  \ a feature toggle.\r\n- [ ] The docs are updated, and if this is a [notable improvement](https://grafana.com/docs/writers-toolkit/contribute/release-notes/#how-to-determine-if-content-belongs-in-whats-new),\
  \ it's added to our [What's New](https://grafana.com/docs/writers-toolkit/contribute/release-notes/)\
  \ doc.\r\n"
