description: The `team_member.external` database column is nullable, but the Go code
  scans it directly into a `bool`. When the column value is NULL, `sql.Scan` returns
  an error because a nil value cannot be assigned to a non-pointer bool. The fix replaces
  the `bool` scan target with `sql.NullBool` and extracts `.Bool` after scanning,
  matching the existing pattern used for `is_provisioned` in team.go.
