pr_title: 'IAM: Handle NULL team_member.external column to fix dashboard loading'
pr_body: '## Summary

  - Fix `team_member.external` column scan failure when the column contains NULL values

  - The column was defined as `Nullable` in the DB migration but was scanned directly
  into a Go `bool`, causing `sql.Scan` errors

  - Use `sql.NullBool` for scanning, matching the existing pattern used for `is_provisioned`
  in `team.go`

  - This caused "could not get user teams" errors and prevented all dashboards from
  loading after upgrading to v12.4


  Fixes #119313'
