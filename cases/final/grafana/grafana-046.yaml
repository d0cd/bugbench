description: "The panel editor failed to automatically switch back from Mixed datasource\
  \ mode to a single datasource when all non-expression queries ended up targeting\
  \ the same datasource. The fix adds a helper to detect uniform datasources across\
  \ queries and hooks resolution logic into updateQueries(), deleteQuery(), and changeDataSource()\
  \ \u2014 the three operations where the query set can become uniform."
