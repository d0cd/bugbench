description: When creating a new dashboard variable, the `isNewElement` flag that
  drives auto-focus on the variable name input was always false after type selection.
  The root cause is that `addVariable()` triggers `selectObject()` via `newObjectAddedToCanvas()`,
  which resets the element's new-object state before the edit form renders, so `autoFocus={isNewElement}`
  never fires. The fix ensures the new-element flag is correctly propagated through
  the variable creation flow so the name input receives focus after type selection.
