pr_title: 'DynamicDashboards: Fix auto-focus variable name input on creation'
pr_body: "This PR ensures that, after creating a new variable and choosing its type,\
  \ the variable name input field is auto-focused.\r\n\r\n\U0001F4CD **Problem**\r\
  \nCreating a new variable is a 2-step process: first selecting the type (clicking\
  \ a card), then filling in the variable details. After step 2, the [`isNewElement`](https://github.com/grafana/grafana/blob/main/public/app/features/dashboard-scene/settings/variables/VariableEditableElement.tsx#L29)\
  \ flag \u2014 which drives `autoFocus` on the name input \u2014 was always false.\r\
  \n\r\nThe root cause:\r\n- in [`VariableTypeSelection.onAddVariable`](https://github.com/grafana/grafana/blob/main/public/app/features/dashboard-scene/settings/variables/VariableAddEditableElement.tsx#L71-L86),\
  \ `dashboardEditActions.addVariable()` already triggers [`DashboardEditPane.performAction()`](https://github.com/grafana/grafana/blob/main/public/app/features/dashboard-scene/edit-pane/DashboardEditPane.tsx#L170-L185)\
  \ \u2192 `newObjectAddedToCanvas()`, which calls `selectObject()` and then `markAsNewElement()`\
  \ on the new selection.\r\n- but immediately after, an explicit `editPane.selectObject()`\
  \ call created a new `ElementSelection` instance, resetting `_isNewElement` back\
  \ to false.\r\n\r\n\U0001F4A1 **Approach**\r\n\r\nRemoving the redundant `selectObject`\
  \ call in `onAddVariable`. The `addedObject` mechanism in `dashboardEditActions`\
  \ already handles both selection and the `isNewElement` flag \u2014 this is consistent\
  \ with how every other \"add\" flow works (panels, tabs, rows, annotations, links).\r\
  \n\r\n\U0001F9EA **How to test**\r\n- Open any dashboard in edit mode\r\n- Open\
  \ the edit pane, go to Variables\r\n- Click Add variable\r\n- Click any variable\
  \ type card (e.g. \"Query\")\r\n- Verify the Name input field is auto-focused (cursor\
  \ blinking in the field)\r\n- Verify undo (Ctrl+Z) still works correctly after adding\
  \ a variable"
