description: The dual writer's error handling lacked per-resource-type context in
  log messages and had no Prometheus metric to track background synchronization errors.
  This made it difficult to diagnose which resource types were experiencing issues
  with unified storage. The fix adds a new error counter metric and enriches log lines
  with the resource's GroupVersionResource.
