pr_body: "## Summary\n\n- The `team_filter` validation step in both digest workflows\
  \ had a hardcoded `ALLOWED_TEAMS` list (`alerting dashboard`) that was out of sync\
  \ with the actual config\n- This blocked manual `workflow_dispatch` triggers for\
  \ newly onboarded teams (e.g. `dataviz`)\n- Removed the static allowlist \u2014\
  \ team validity is already handled at runtime by the config file\n\n## Test plan\n\
  \n- [ ] Run FR weekly digest with `team_filter: dataviz` via workflow_dispatch\n\
  - [ ] Run PR weekly digest with `team_filter: dataviz` via workflow_dispatch\n-\
  \ [ ] Run both with empty team_filter (all teams)\n\n\nMade with [Cursor](https://cursor.com)"
