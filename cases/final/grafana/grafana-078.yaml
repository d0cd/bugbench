description: Two GitHub Actions digest workflows contained a hardcoded ALLOWED_TEAMS
  allowlist (e.g. 'alerting dashboard') used to validate the team_filter input. This
  list was out of sync with the actual runtime config, blocking workflow_dispatch
  triggers for newly onboarded teams like 'dataviz'. The fix removes the static allowlist
  since team validity is already enforced at runtime by the config file.
