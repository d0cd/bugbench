description: The Pure Git provisioning wizard hardcoded 'main' as the fallback branch
  when the user hadn't yet selected one, causing a 'branch not found' error for repositories
  using 'master' or other default branches. The fix changes the fallback to an empty
  string, allowing the backend to auto-detect the repository's actual default branch.
