description: "A deferred function capturing a Prometheus histogram observation was\
  \ defined after an early return path, meaning the duration metric was never recorded\
  \ for that code path. This caused the status label to be misleading \u2014 the histogram\
  \ observation with the correct status was skipped entirely on certain outcomes,\
  \ producing inaccurate observability data."
expected_findings:
- file: pkg/services/setting/service.go
  line: 273
  summary: "Deferred histogram observation is defined after this early return, so\
    \ this code path never records the duration metric \u2014 the defer must be placed\
    \ before any return statements to ensure all outcomes are captured"
  line_side: pre_fix
