pr_body: "## Summary\n- PR #118592 replaced the hardcoded `folder.MaxNestedFolderDepth`\
  \ constant with a configurable `cfg.MaxNestedFolderDepth` but missed the `NewAPIService`\
  \ constructor used by the multi-tenant enterprise folder service\n- The `maxNestedFolderDepth`\
  \ field defaulted to Go's zero value (`0`), causing every nested folder create/update\
  \ to fail with `\"folder max depth exceeded, max depth is 0\"`\n- Sets `maxNestedFolderDepth`\
  \ using `setting.NewCfg().MaxNestedFolderDepth` (default: 4), consistent with how\
  \ tests already handle this\n\n## Test plan\n- [x] `go build ./pkg/registry/apis/folders/...`\
  \ compiles successfully\n- [x] `go test ./pkg/registry/apis/folders/... -short`\
  \ passes\n- [ ] Verify in cloud MT environment that nested folder creation no longer\
  \ errors\n\n\U0001F916 Generated with [Claude Code](https://claude.com/claude-code)"
