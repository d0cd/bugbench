description: getFolderByUidFacade throws a generic `new Error('One of the folder responses
  is undefined')` when parallel folder API calls return 403, discarding the original
  FetchError that carries the HTTP status code. Callers rely on `getStatusFromError(e)`
  to detect 403 and gracefully degrade, but it returns undefined for plain Error instances,
  causing dashboard load to fail entirely for users with dashboard-level but no folder-level
  access.
