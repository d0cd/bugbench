description: Long text values such as URLs in alert rule annotations overflowed horizontally
  in the rule details sidebar, causing unwanted horizontal scrollbars. The fix adds
  CSS word-wrapping properties (overflow-wrap/word-break) to the DetailText component
  and the Details panel so that long strings wrap instead of overflowing.
