pr_title: 'Folders: Fix dashboard load failure when user lacks folder access with
  foldersAppPlatformAPI enabled'
pr_body: "When `foldersAppPlatformAPI` is enabled, `getFolderByUidFacade` makes 3\
  \ parallel folder API calls. If the user has dashboard-level access but no folder\
  \ access, all 3 return 403 with `data: undefined`. The function then throws `new\
  \ Error('One of the folder responses is undefined')` \u2014 a plain `Error` with\
  \ no HTTP status.\r\n\r\nThe callers in `v1.ts`/`v2.ts` use `getStatusFromError(e)`\
  \ to detect 403 and gracefully continue without folder metadata. But `getStatusFromError`\
  \ returns `undefined` for `Error` instances, so `undefined !== 403` causes it to\
  \ throw `\"Failed to load folder\"` and abort the dashboard load.\r\n\r\n**Fix**:\
  \ Throw the original `FetchError` from the RTK Query response (which carries `status:\
  \ 403`) instead of a generic `Error`. This restores the 403 detection that PR #109160\
  \ relies on, and the dashboard renders normally without folder metadata."
