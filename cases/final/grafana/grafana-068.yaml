pr_title: '[release-12.4.2] Plugins: Forward PLUGIN_UNIX_SOCKET_DIR to plugin processes
  to fix tmp dir in restricted environments '
pr_body: "Backport https://github.com/grafana/grafana/commit/e406d17a929f311ad57e5c247bc947897a683936\
  \ from https://github.com/grafana/grafana/pull/119955\r\n\r\n-----\r\n\r\n**Problem**\r\
  \n\r\nSince Grafana 12.4.0, plugin processes ignore the PLUGIN_UNIX_SOCKET_DIR environment\
  \ \r\nvariable. Temp files are always written to `/tmp`, which fails in \r\nKubernetes\
  \ pods where `/tmp` is read-only:\r\n`open /tmp/plugin2778441730: read-only file\
  \ system`\r\n\r\n**Root cause**\r\n\r\nPR #113412 made host env stripping the default\
  \ for plugin processes. \r\nPlugins only receive vars listed in `permittedHostEnvVarNames`.\
  \ PLUGIN_UNIX_SOCKET_DIR \r\nwas not on that list, so plugin processes never received\
  \ it and fell \r\nback to `/tmp`.\r\n\r\n**Fix**\r\n\r\nAdd `PLUGIN_UNIX_SOCKET_DIR\
  \ ` to `permittedHostEnvVarNames` in \r\n`pkg/plugins/envvars/envvars.go`. No new\
  \ config flags. No behavior \r\nchange for users who don't set TMPDIR.\r\n\r\n**Tests\
  \ added**\r\n\r\n- `TestPermittedHostEnvVars_respects PLUGIN_UNIX_SOCKET_DIR` \u2014\
  \ PLUGIN_UNIX_SOCKET_DIR is forwarded when set\r\n- `TestPermittedHostEnvVarNames_includes\
  \ PLUGIN_UNIX_SOCKET_DIR` \u2014 PLUGIN_UNIX_SOCKET_DIR is in the permitted list\r\
  \n- `TestPermittedHostEnvVars_ PLUGIN_UNIX_SOCKET_DIRUnset` \u2014 PLUGIN_UNIX_SOCKET_DIR\
  \ is absent when unset\r\n\r\nFixes #119424\r\nRelated: #113412"
pr_commit_messages:
- "Plugins: Forward PLUGIN_UNIX_SOCKET_DIR to plugin processes to fix te\u2026"
