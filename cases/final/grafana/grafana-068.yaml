description: 'PR #113412 made host environment variable stripping the default for
  plugin processes, but failed to include PLUGIN_UNIX_SOCKET_DIR in the permitted
  list. This caused plugin processes to lose the configured socket directory and fall
  back to /tmp, which fails in restricted environments like Kubernetes pods with read-only
  /tmp.'
