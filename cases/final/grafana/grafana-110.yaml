pr_title: '[release-12.4.1] A11y MenuItem: Fix voice over announce 1 of 1 for Keyboard
  shortcuts'
pr_body: "Backport 379a592d39f13565af88026c602e4af68dc7dc3b from #118170\n\n---\n\n\
  **What is this feature?**\r\n\r\nFixes VoiceOver announcing \"1 of 1\" for the Keyboard\
  \ shortcuts item in the Help dropdown, while other items correctly announce \"X\
  \ of Y\" (e.g. \"4 of 6\").\r\n\r\nCallers can still override via the `role` prop.\
  \ Existing usage is unchanged: all `MenuItem` with `url` in this repo are inside\
  \ `Menu`, so no orphan menuitems are introduced.\r\n\r\n**Why do we need this feature?**\r\
  \n\r\nThe Help menu mixes link items (`<a href=\"...\">`) and the Keyboard shortcuts\
  \ button. Previously, only the button got `role=\"menuitem\"`; links kept the default\
  \ (no role, exposed as \"link\"). VoiceOver counts list position by role, so it\
  \ treated the single menuitem as its own list of one (\"1 of 1\") and the links\
  \ as a separate list.\r\n\r\n**Who is this feature for?**\r\n\r\nall users\r\n\r\
  \n**Which issue(s) does this PR fix?**:\r\n\r\nFixes https://github.com/grafana/grafana/issues/117832\r\
  \n\r\n**Special notes for your reviewer:**\r\n\r\nPlease check that:\r\n- [ ] It\
  \ works as expected from a user's perspective.\r\n- [ ] If this is a pre-GA feature,\
  \ it is behind a feature toggle.\r\n- [ ] The docs are updated, and if this is a\
  \ [notable improvement](https://grafana.com/docs/writers-toolkit/contribute/release-notes/#how-to-determine-if-content-belongs-in-whats-new),\
  \ it's added to our [What's New](https://grafana.com/docs/writers-toolkit/contribute/release-notes/)\
  \ doc.\r\n"
pr_commit_messages:
- "A11y MenuItem: Fix voice over announce 1 of 1 for Keyboard shortcuts \u2026"
