pr_title: 'CI: Fix Go module cache key for integration tests'
pr_body: "## Summary\n\nAdd `cache-dependency-path: \"**/*.sum\"` to all 6 `actions/setup-go`\
  \ steps in the integration test workflow.\n\n### Problem\n\nThe integration test\
  \ workflow uses `actions/setup-go` with `cache: true` but without `cache-dependency-path`.\
  \ This causes the cache key to only hash the root `go.sum` file, missing the 48\
  \ other `go.sum` files and `go.work.sum` across the 39-module Go workspace.\n\n\
  `actions/setup-go` computes a cache key like:\n\n```\nsetup-go-<runner.os>-<runner.arch>-go-<version>-<hash-of-dependency-files>\n\
  ```\n\nWithout `cache-dependency-path`, only the root `go.sum` is hashed. This leads\
  \ to:\n\n- **Stale hits**: A sub-module's `go.sum` changes (new dependency) but\
  \ the root `go.sum` doesn't. The cache key matches an old archive missing the new\
  \ modules, so Go re-downloads them anyway.\n- **False misses**: The root `go.sum`\
  \ changes (e.g. `go mod tidy`) but actual dependencies are the same. The key doesn't\
  \ match, so the entire GOMODCACHE is re-downloaded from scratch across all 36+ shard\
  \ jobs.\n\n### How `actions/setup-go` caching works\n\n```mermaid\nflowchart TD\n\
  \    A[\"Compute cache key from:\\n- runner.os\\n- runner.arch\\n- Go version\\\
  n- hash of dependency files\"] --> B{\"Exact key match\\nin GitHub cache?\"}\n \
  \   B -->|Yes| C[\"Restore GOMODCACHE + GOCACHE\\nfrom cache archive\"]\n    C -->\
  \ D[\"cache-hit = true\\n(no downloads needed)\"]\n    B -->|No| E{\"Partial prefix\\\
  nmatch?\"}\n    E -->|Yes| F[\"Restore best partial match\\n(some downloads needed)\"\
  ]\n    E -->|No| G[\"No cache restored\\n(full download of ~400 modules)\"]\n  \
  \  F --> H[\"Post-job: save updated\\ncache under new key\"]\n    G --> H\n```\n\
  \n**Before (root `go.sum` only):** The dependency hash misses changes in 48 sub-module\
  \ `go.sum` files and `go.work.sum`, causing frequent stale hits or false misses.\n\
  \n**After (`**/*.sum`):** The dependency hash covers all 49 `go.sum` files and `go.work.sum`,\
  \ so the cache key accurately reflects the full workspace dependency state.\n\n\
  ### Fix\n\nSet `cache-dependency-path: \"**/*.sum\"` so the cache key hashes all\
  \ 49 `go.sum` files **and** `go.work.sum`, accurately reflecting the full workspace\
  \ dependency state and improving cache hit rates.\n\nSee [actions/setup-go: Caching\
  \ in multi-module repositories](https://github.com/actions/setup-go/blob/main/docs/advanced-usage.md#caching-in-multi-module-repositories)\
  \ for the recommended pattern.\n\n## Test plan\n\n- [ ] Verify cache hit behavior\
  \ on a follow-up push to this PR (second run should show `cache-hit: true` in the\
  \ `Setup Go` step logs)\n- [ ] Compare `Setup Go` step duration between this PR\
  \ and a recent `main` run\n- [ ] Confirm no `go: downloading ...` output during\
  \ test execution when cache is warm"
