  line: 558
  summary: authorize() checked folder permissions using the file metadata's claimed
    folder (parsed.Meta.GetFolder()) instead of the actual existing resource's folder,
    allowing users to bypass folder permissions by declaring a different folder in
    file content
  line_side: pre_fix
- file: pkg/storage/unified/migrations/service_test.go
