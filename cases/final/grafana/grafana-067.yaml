  summary: SkipsMigrations test cases ('storage type is not unified', 'data migrations
    disabled') do not set cfg.Target to an eligible value, so after the new target-eligibility
    guard they pass vacuously due to the target check rather than the condition they
    claim to test
  line_side: pre_fix
