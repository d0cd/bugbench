pr_body: "**What is this feature?**\r\n\r\nFix for a flaky test that fails in CI but\
  \ passes locally.\r\n\r\n**Why do we need this feature?**\r\n\r\nThe \"submits job\
  \ with custom branch\" test uses `user.clear()` on a Downshift-based Combobox, which\
  \ is unreliable. The stateReducer clears the input when the menu opens, but timing\
  \ differences between local and CI environments cause `user.type()` to append to\
  \ the old value instead of replacing it (e.g., \"mainfeature-branch\" instead of\
  \ \"feature-branch\").\r\n"
