description: When the `newVizSuggestions` feature flag is disabled and data is available,
  the PanelEditor incorrectly shows the vizPicker instead of the default panel with
  options open. The fix changes the `isVizPickerOpen` condition to only open the viz
  picker when the panel plugin is truly unconfigured (`pluginId === UNCONFIGURED_PANEL_PLUGIN_ID`),
  rather than using a broader condition that was always triggering.
