  line: 49
  summary: 'Incorrect path argument passed to parquet reader: `reader.folder` is wrong
    here, likely should use the resolved file path. This causes the reader to fail
    to locate parquet data during migration.'
  line_side: pre_fix
- file: pkg/storage/unified/parquet/writer.go
  line: 104
  summary: "Nil-check on `w.writer` is insufficient or inverted \u2014 the writer\
    \ can reach this point uninitialized, causing a nil pointer dereference or silent\
    \ data loss during parquet buffer writes."
  line_side: pre_fix
- file: pkg/storage/unified/migrations/resource_migration.go
  line: 109
  summary: No fallback when `migrateAllOrgs` fails with SQLite buffer. In memory-constrained
    environments the SQLite cache_size causes OOM kills with no recovery path. Should
    retry with parquet buffer on failure.
  line_side: pre_fix
