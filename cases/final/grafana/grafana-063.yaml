pr_title: 'Unified: fix parquet and use it as fallback in migrations'
pr_body: "**What is this feature?**\r\n\r\nFixes a couple of issues in the parquet\
  \ buffer that were blocking its usage and failing the migration.\r\n\r\nIf SQLite\
  \ migration fails, it will retry with the parquet buffer. It's also possible to\
  \ configure it to always run migrations directly with parquet.\r\n\r\n**Why do we\
  \ need this feature?**\r\n\r\nUsing the SQLite cache_size might not be possible\
  \ in all environments since it uses memory over disk. We could have migrations that\
  \ get OOM killed always.\r\n\r\nLeaving it as a fallback since migrations with parquet\
  \ is considerable slower when SQLite is not blocking,  ~43s (SQLite only) vs ~2min13\
  \ (Parquet buffer) with complex SQLite file from @ryantxu.\r\n\r\n**Who is this\
  \ feature for?**\r\n\r\nSQLite OSS migration \r\n\r\n**Special notes for your reviewer:**\r\
  \n\r\nPlease check that:\r\n- [X] It works as expected from a user's perspective.\r\
  \n- [X] If this is a pre-GA feature, it is behind a feature toggle.\r\n- [X] The\
  \ docs are updated, and if this is a [notable improvement](https://grafana.com/docs/writers-toolkit/contribute/release-notes/#how-to-determine-if-content-belongs-in-whats-new),\
  \ it's added to our [What's New](https://grafana.com/docs/writers-toolkit/contribute/release-notes/)\
  \ doc.\r\n"
pr_commit_messages:
- 'Unified: fix parquet and use it by default'
- 'Unified: fix parquet and use it as fallback'
- 'Unified: adjust parquet test'
- 'Unified: re-use transaction on retry and let migrator rollback'
