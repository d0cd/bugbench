description: 'The parquet buffer had multiple issues preventing its use as a migration
  backend: the parquet reader was passing incorrect folder/path arguments (reader.folder
  at lines 49 and 144), the parquet writer had a flawed nil-check guard on w.writer
  (line 104), and the migration orchestrator lacked fallback logic when SQLite-based
  migration failed due to OOM. The fix corrects the parquet reader/writer bugs and
  adds retry-with-parquet as a fallback when SQLite migration fails.'
