description: The Jaeger data source client panics with an index-out-of-range error
  when the trace API returns an empty result set (e.g., trace not found). The code
  accesses the first element of the response slice without checking whether the slice
  is empty. The fix adds a guard that returns an appropriate response instead of panicking.
