pr_title: 'Provisioning: Gate FixFolderMetadata jobs on feature flag'
pr_body: "## Summary\n\n- Gate `FixFolderMetadata` jobs behind the `provisioningFolderMetadata`\
  \ feature flag \u2014 when disabled the API returns `400 Bad Request` instead of\
  \ silently accepting a no-op job.\n- Inline the `PullRequest` action check (previously\
  \ in `validateJobAction`) directly into `authorizeJob`, removing the indirection.\n\
  - Update existing tests that create `FixFolderMetadata` jobs to enable the feature\
  \ flag.\n\n## Test plan\n\n- [x] Unit: `TestPullRequestJobRejected` \u2014 PullRequest\
  \ returns BadRequest, Pull passes through (now tests via `authorizeJob`).\n- [x]\
  \ Unit: `TestFixFolderMetadataFeatureGate` \u2014 rejected when flag disabled, allowed\
  \ when enabled.\n- [x] Integration: `TestIntegrationProvisioning_FixFolderMetadataJobAuthorization`\
  \ \u2014 flag enabled: admin \u2713 (202), editor \u2713 (202), viewer \u2717 (403).\n\
  - [x] Integration: `TestIntegrationProvisioning_FixFolderMetadataJobFlagDisabled`\
  \ \u2014 flag disabled: admin gets 400 Bad Request.\n- [x] `TestIntegrationProvisioning_FixFolderMetadataJob`\
  \ updated to enable the feature flag.\n- [x] `TestIntegrationProvisioning_JobsAuthorization`\
  \ updated to enable the feature flag.\n- [x] `TestIntegrationProvisioning_JobPermissions`\
  \ updated to enable the feature flag.\n\nPartially addresses grafana/git-ui-sync-project#714"
