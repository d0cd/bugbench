description: The FixFolderMetadata job action was accepted and processed even when
  the provisioningFolderMetadata feature flag was disabled, allowing users to trigger
  functionality that should have been gated. The fix adds a feature-flag check in
  authorizeJob so that requests return 400 Bad Request when the flag is off, and inlines
  the PullRequest action validation that was previously in a separate validateJobAction
  method.
