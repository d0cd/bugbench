pr_body: "## Summary\n- Fixed a race condition in the broadcaster where `select` could\
  \ process an unsubscribe before its corresponding subscribe, leaving the subscriber\
  \ channel unclosed and causing `TestBroadcasterUnsubscribe` to hang for 30 minutes\
  \ in CI\n- When handling an unsubscribe, drain all pending subscribe messages first\
  \ \u2014 the subscribe is always buffered before the unsubscribe since they're called\
