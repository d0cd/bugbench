description: The `navId` prop on `AlertingPageWrapper` in the notification detail
  page was set to `"alerts-notifications"`, which does not exist in the navigation
  index. This caused the breadcrumb to render as "Page not found > [title]" instead
  of the correct hierarchy. The fix changes the `navId` to `"alerts-history"` to match
  the parent History page in the nav tree.
