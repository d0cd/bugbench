pr_title: 'Alerting: Fix Page not found in breadcrumb on notification detail page'
pr_body: "**What is this feature?**\r\n\r\n## Summary\r\n\r\n- Fix \"Page not found\"\
  \ breadcrumb on the notification detail page (`/alerting/notifications-history/view/:uuid/:timestamp?`)\r\
  \n- The `navId` was set to `\"alerts-notifications\"` which doesn't exist in the\
  \ nav index, causing the breadcrumb to render as \"Page not found > [title]\"\r\n\
  - Changed to `\"alerts-history\"` to match the parent History page, rendering correctly\
  \ as \"Alerting > History > [title]\"\r\n\r\n## Test plan\r\n\r\n1. Navigate to\
  \ **Alerting > History > Notifications** tab\r\n2. Click **View** on any notification\
  \ entry\r\n3. Verify the breadcrumb shows **Alerting > History > [notification title]**\
  \ instead of **Page not found > [title]**\r\n4. Click **History** in the breadcrumb\
  \ and verify it navigates back to the History page\r\n\r\n**Why do we need this\
  \ feature?**\r\n\r\nit's a bug\r\n\r\nPlease check that:\r\n- [ ] It works as expected\
  \ from a user's perspective.\r\n- [ ] If this is a pre-GA feature, it is behind\
  \ a feature toggle.\r\n- [ ] The docs are updated, and if this is a [notable improvement](https://grafana.com/docs/writers-toolkit/contribute/release-notes/#how-to-determine-if-content-belongs-in-whats-new),\
  \ it's added to our [What's New](https://grafana.com/docs/writers-toolkit/contribute/release-notes/)\
  \ doc.\r\n"
