description: The Pyroscope datasource passes the wrong unit to `exemplar.CreateExemplarFrame`
  when building exemplar frames for cumulative profile types. Cumulative profiles
  require a different display unit than delta profiles, but the code unconditionally
  uses `displayUnit`, producing exemplars with incorrect unit labels.
