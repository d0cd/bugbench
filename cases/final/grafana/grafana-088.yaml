description: When the `newVizSuggestions` feature flag is disabled and data is available,
  the panel editor incorrectly opens the viz picker instead of showing the default
  panel with options. The `isVizPickerOpen` state was set solely based on whether
  the plugin ID matched `UNCONFIGURED_PANEL_PLUGIN_ID`, without considering the feature
  flag state.
expected_findings:
- file: public/app/features/dashboard-scene/panel-edit/PanelEditor.tsx
  line: 238
  summary: 'Missing feature flag guard: `isVizPickerOpen` is set to true whenever
    `pluginId === UNCONFIGURED_PANEL_PLUGIN_ID`, but should also require `newVizSuggestions`
    feature flag to be enabled. When the flag is off and data is present, this incorrectly
    forces the viz picker open instead of showing the default panel with options.'
