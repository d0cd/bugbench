description: Alert rule label/annotation keys that were empty strings caused alert
  instances to be silently dropped or rejected during state persistence and sending.
  The fix adds a fallback in the template expansion code that replaces empty keys
  with a sentinel prefix ('__empty_label_key__'), and adds validation at the API layer
  to reject empty label keys at rule creation/update time.
