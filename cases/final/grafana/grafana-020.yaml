pr_body: "currently `make build-go` always adds `-trimpath`. this is bad for debugging.\r\
  \n\r\nthe PR changes two things:\r\n1. when `GO_BUILD_DEV` is disabled, it adds\
  \ `-trimpath`\r\n2. when `GO_BUILD_DEV` is enabled, it adds `-gcflags \"all=-N -l\"\
  ` (needed for debugging).\r\n\r\n(i also adjusted `.air.toml`, as the debug-gcflags\
  \ now happen automatically based on `GO_BUILD_DEV`)\r\n\r\n`all=-N -l` was added\
  \ in the past in https://github.com/grafana/grafana/pull/101779, but as code got\
  \ refactored, the settings did not survive.\r\n\r\nthere are a couple weaknesses\
  \ with this approach:\r\n1. it relies on `GO_BUILD_DEV`, which seems to be basically\
  \ unused now\r\n2. if someone were to use both `GO_BUILD_DEV` and `GO_BUILD_GCFLAGS`,\
  \ the second would override the first\r\n3. "
