  summary: "Missing handling for empty label keys during template expansion \u2014\
    \ empty string keys cause downstream rejection during state persistence/sending;\
    \ needs fallback to a sentinel key"
- file: pkg/services/ngalert/api/validation/api_ruler_validation.go
