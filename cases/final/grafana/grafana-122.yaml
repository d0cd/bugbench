- file: pkg/registry/apis/iam/legacy/team_binding.go
  line: 119
  summary: Scanning nullable column `team_member.external` into a non-nullable Go
    type will panic/error on NULL rows. Use sql.NullString or a pointer type to handle
    NULL values.
  line_side: pre_fix
- file: pkg/registry/apis/iam/legacy/user.go
  line: 266
  summary: Scanning nullable column `external` into a non-nullable Go type will fail
    when the column is NULL. Use sql.NullString or a pointer type.
  line_side: pre_fix
