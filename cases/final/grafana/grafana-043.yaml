description: The dashboard version history page resolved user display names by array
  index, but the IAM /display API returns `keys` in request order and `display` sorted
  by database ID. This index mismatch caused user names to appear swapped across versions.
  The fix replaces the index-based array lookup with an identity-based Map keyed on
  each display item's `identity` field.
expected_findings:
- file: public/app/features/dashboard-scene/settings/VersionsEditView.tsx
  line: 133
  summary: 'Index-based lookup between misaligned arrays: `keys[i]` does not correspond
    to `display[i]` because the API returns display entries sorted by `u.id ASC`,
    not in request order. Should use identity-based Map instead of positional indexing.'
