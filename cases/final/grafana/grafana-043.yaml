description: When the newVizSuggestions feature flag is enabled, clicking 'configure'
  on a new panel clears the user-entered title. The old suggestion flow intentionally
  blanked the title, but the new flow should preserve it. The fix removes the title-clearing
  logic so the panel title persists through configuration, matching dynamic dashboard
  behavior.
