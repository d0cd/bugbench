description: Using lodash `cloneDeep` on a `MutableDataFrame` silently drops the `.length`
  prototype getter (which has no setter), producing a cloned frame with incorrect
  length. This caused the Prometheus table view in Explore to break with a type error.
  The fix removes the unnecessary `cloneDeep` call and passes `tableResult` directly
  to `applyFieldOverrides`.
