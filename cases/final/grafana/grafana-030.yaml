pr_body: "## Summary\r\n\r\nFixes https://github.com/grafana/support-escalations/issues/21097\
  \ and https://github.com/grafana/grafana/issues/119657\r\n\r\nPrometheus table view\
  \ was broken because `cloneDeep` in `PrometheusQueryResultsContainer` silently dropped\
  \ `MutableDataFrame.length` (a prototype getter with no setter), producing a frame\
  \ with incorrect length.\r\n\r\n## Changes\r\n- `PrometheusQueryResultsContainer.tsx`:\
  \ Remove `cloneDeep`, pass `tableResult` directly to `applyFieldOverrides`\r\n\r\
  \n## Screenshot\r\n\r\nThe table now shows correctly, without error.\r\n<img width=\"\
  1593\" height=\"1123\" alt=\"Screenshot 2026-03-10 at 5 01 19\u202FPM\" src=\"https://github.com/user-attachments/assets/ace6203e-f730-4b3d-9d96-d1d4208ca69b\"\
  \ />\r\n\r\n\r\n## Test plan\r\n- [ ] Prometheus table view in Explore renders rows\
  \ correctly - for multiple queries\r\n- [ ] `yarn test public/app/features/explore/RawPrometheus/`\r\
  \n- [ ] `yarn test public/app/features/explore/utils/decorators.test.ts`\r\n"
