description: 'PR #118592 replaced the hardcoded folder.MaxNestedFolderDepth constant
  with a configurable cfg.MaxNestedFolderDepth but missed updating the NewAPIService
  constructor used by multi-tenant enterprise folder service. The maxNestedFolderDepth
  field defaulted to Go''s zero value (0), causing every nested folder create/update
  to fail with ''folder max depth exceeded, max depth is 0''. The fix sets maxNestedFolderDepth
  using a new DefaultMaxNestedFolderDepth constant (4) in NewAPIService.'
