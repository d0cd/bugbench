description: The VisualizationSuggestionCard component used a <button> element as
  its root container. When suggestion content (e.g., a table visualization) included
  its own <button> elements, this created invalid nested <button> HTML, triggering
  browser console warnings. The fix changes the outer element from <button> to <div>
  with appropriate interactive attributes.
