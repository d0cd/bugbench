description: The PR weekly digest workflow passes the full PR JSON payload (thousands
  of PRs for grafana/grafana) through GitHub Actions outputs and environment variables,
  which are subject to the shell ARG_MAX limit. This causes the workflow to crash
  with 'Argument list too long'. The fix writes the PR data to a temporary file in
  the fetch step and reads it back in the processing step, avoiding the shell argument
  length limit.
