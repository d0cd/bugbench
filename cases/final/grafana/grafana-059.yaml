- file: .github/workflows/external-pr-weekly-digest.yml
  line: 1
  summary: Passing large PR digest JSON through GitHub Actions outputs/env vars will
    exceed ARG_MAX on repos with many PRs; should use a temp file or artifact instead
  line_side: pre_fix
- file: .github/workflows/scripts/pr-digest.mts
  line: 1
  summary: Script receives PR data via command-line argument or environment variable
    which is subject to OS argument length limits; should read from a file instead
  line_side: pre_fix
