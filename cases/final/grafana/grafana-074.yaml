description: The isSnowflake function used a non-deterministic time-based heuristic
  (comparing against 'one hour from now') to distinguish snowflake IDs from legacy
  microsecond timestamps. This caused flaky tests and could misclassify values near
  the boundary. The fix replaces it with a deterministic numeric threshold (rv >=
  1e18) based on digit count.
