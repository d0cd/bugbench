pr_title: 'unified-storage: make isSnowflake deterministic and fix test flake'
pr_body: "Previously, the `isSnowflake` function was non-deterministic and kind of\
  \ brittle: it would compare the given `rv` with a timestamp one hour in the future.\
  \ If the caller passed a microsecond RV 1h01nsec in the future, it would be considered\
  \ a snowflake even though the actual integer number is still a lot smaller than\
  \ an actual snowflake ID.\r\n\r\nIn this commit `isSnowflake` becomes deterministic\
  \ by checking if the given `rv` has 19 digits (every valid snowflake in the time\
  \ range we care about has 19 digits). If it doesn't it's considered a legacy microsecond\
  \ RV.\r\n\r\nThis was causing some flakes in the KV store's GC tests where a timestamp\
  \ of \"1 hour from now\" was being used and led to RVs being considered snowflake\
  \ IDs _sometimes_.\r\n\r\nFor reference, these were the flakes:\r\n\r\n```\r\n===\
  \ RUN   TestIntegrationGarbageCollectionGroupResource/can_garbage_collect_a_deleted_resource\r\
  \n    storage_backend_gc_test.go:170:\r\n                Error Trace:    /Users/rc/src/grafana/grafana/pkg/storage/unified/resource/storage_backend_gc_test.go:170\r\
  \n                Error:          Not equal:\r\n                               \
  \ expected: 0\r\n                                actual  : 2\r\n               \
  \ Test:           TestIntegrationGarbageCollectionGroupResource/can_garbage_collect_a_deleted_resource\r\
  \n\r\n=== RUN   TestIntegrationGarbageCollectionGroupResource/pagination_does_not_delete_resources_that_were_recreated\r\
  \n    storage_backend_gc_test.go:472:\r\n                Error Trace:    /Users/rc/src/grafana/grafana/pkg/storage/unified/resource/storage_backend_gc_test.go:472\r\
  \n                Error:          Not equal:\r\n                               \
  \ expected: 2\r\n                                actual  : 7\r\n               \
  \ Test:           TestIntegrationGarbageCollectionGroupResource/pagination_does_not_delete_resources_that_were_recreated\r\
  \n```"
