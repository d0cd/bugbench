description: getFolderByUidFacade throws a generic Error('One of the folder responses
  is undefined') when parallel folder API calls return 403 due to lack of folder access.
  Callers rely on getStatusFromError() to detect 403 and gracefully degrade, but that
  function returns undefined for plain Error instances (only works with FetchError
  carrying an HTTP status), causing the dashboard load to abort. The fix throws the
  original FetchError from the RTK Query response instead of a generic Error, preserving
  the 403 status for downstream detection.
expected_findings:
