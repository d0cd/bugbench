pr_body: "## Description\r\n<!--- A high level description of what this PR is doing\
  \ -->\r\nIt's _really_ hard to see in local, but in ops and other instances, there's\
  \ a pronounced card flicker 1) on load (the cards render, go away, then come back),\
  \ and 2) on any action (delete, hide, duplicate, etc). \r\n\r\nAnother benefit is\
  \ that it fixes this reported bug! \u2B07\uFE0F \r\nResolves https://github.com/grafana/grafana/issues/119992\r\
  \n\r\n## Changes\r\n<!--- Describe your changes in detail -->\r\n* Remove the `isLoading`\
  \ check and loading component render. The card data lives in `queryRunner.state.queries`\
  \ and is always synchronously available. It has no dependency on whether queries\
  \ are currently executing, so the `isLoading` state probably isn't necessary. \r\
  \n\r\n## Risks\r\n<!--- Describe what risks you've considered i.e. what features\
  \ are most likely to break -->\r\nN/A\r\n\r\n## Demo\r\n<!--- Attach a demo gif/video\
  \ or screenshots of the changes if applicable -->\r\nHard to demo, better seen testing\
  \ locally!\r\n\r\n## Testing Instructions\r\n<!--- Provide step by step instructions\
  \ and the dashboard if applicable -->\r\n* Pull down and run `main` locally and\
  \ add network throttling (slow 4g or something)\r\n* You'll notice the cards flicker\
  \ on load, and flicker on engaging with any action.\r\n* Pull down this branch,\
  \ and see that they don't do that anymore!\r\n\r\n## Reviewer Checklist\r\n<!---\
  \ The reviewer should make sure the following has been done -->\r\n- [x] Tests are\
  \ added where applicable\r\n- [x] Issue is linked to PR\r\n- [x] Code pulled and\
  \ tested\r\n- [x] Code is meaningfully improved if applicable"
