expected_findings:
- file: apps/advisor/pkg/app/checks/datasourcecheck/check.go
  line: 160
  summary: "pluginCanBeInstalledCache stores the negated value (!isAvailableInRepo\
    \ instead of isAvailableInRepo), causing the cached result to be the opposite\
    \ of the correct answer \u2014 first call returns true but cached call returns\
    \ false for plugins available in repo"
  line_side: pre_fix
- file: apps/advisor/pkg/app/checkscheduler/checkscheduler.go
  line: 115
  summary: Logger is reassigned (logger = logger.With) inside a loop over namespaces,
    causing namespace labels to accumulate across iterations. Each iteration appends
    a new namespace key to the same logger, polluting log entries for subsequent namespaces
  line_side: pre_fix
- file: packages/grafana-ui/src/components/Table/TableNG/Filter/FilterPopup.tsx
  line: 115
  summary: Debug console.log statement left in production code that logs on every
    outside click of the filter popup
  line_side: pre_fix
- file: packages/grafana-ui/src/components/RadialGauge/RadialArcPath.tsx
  line: 114
  summary: foreignObject width and height use vizWidth/vizHeight which can be smaller
    than boxSize, causing gradient clipping in the radial gauge
  line_side: pre_fix
- file: packages/grafana-ui/src/components/Table/TableNG/Cells/AutoCell.tsx
  line: 20
  summary: getStyles function is not memoized, causing expensive CSS-in-JS recalculation
    on every render of table cells
  line_side: pre_fix
- file: pkg/services/dashboards/database/database.go
  line: 694
  summary: Hardcoded DELETE FROM playlist_item fails after unified storage migration
    renames table to playlist_item_legacy
  line_side: pre_fix
- file: pkg/services/authz/zanzana/server/server.go
  line: 191
  summary: Missing `reg` (Prometheus registry) argument in reconciler constructor
    call causes compilation or runtime error
  line_side: pre_fix
- file: pkg/services/ngalert/api/validation/api_ruler_validation.go
  line: 195
  summary: validateLabels does not reject empty string label keys, allowing invalid
    alert rule labels
  line_side: pre_fix
- file: public/app/features/alerting/unified/triage/hooks/useTriageSavedSearches.ts
  line: 54
  summary: loadDefaultTriageSavedSearch returns null when no user default exists instead
    of falling back to the predefined default search (grouped by folder), leaving
    users with no default triage view
  line_side: pre_fix
- file: public/app/features/alerting/unified/triage/scene/SummaryStats.tsx
  line: 53
  summary: countRules filters by alertstateFilter using includes() which skips counting
    rules whose alertstate isn't in the filter, and lacks optional chaining on counts[alertstate]
    which could crash if alertstate is an unexpected value
  line_side: pre_fix
- file: public/app/features/dashboard-scene/panel-edit/PanelEditNext/QueryEditor/hooks/useSelectedQueryDatasource.ts
  line: 55
  summary: useAsync dependency array is missing selectedQuery?.refId, causing stale
    cached datasource when returning from alerts/transformation view to a query with
    no explicit datasource
  line_side: pre_fix
- file: yarn.lock
  line: 14435
  summary: Outdated centrifuge dependency at version 5.5.2 needs bumping to 5.5.3
    for transitive dependency updates
  line_side: pre_fix
