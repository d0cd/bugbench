description: The notifier code contained unnecessary functions (patchNewSecureFields,
  patchSettingsFromSecureSettings) that manually copied DingDing secure fields from
  secureSettings into settings before passing receivers to the alerting library. The
  upstream grafana/alerting library was updated to read from both settings and secureSettings
  directly, making this patching logic dead code that added complexity and risked
  masking future field-handling changes.
expected_findings:
- file: pkg/services/ngalert/notifier/alertmanager.go
  line: 444
  summary: 'Unnecessary secure field patching: receivers are passed through patchNewSecureFields/patchSettingsFromSecureSettings
    before PostableAPIReceiversToAPIReceivers, but the alerting library now reads
    from both settings and secureSettings natively'
- file: pkg/services/ngalert/notifier/testreceivers.go
  line: 26
  summary: Same unnecessary DingDing secure field patching applied in test receivers
    path; should use PostableAPIReceiversToAPIReceivers directly
