pr_body: "## Description\r\n`QueryEditorRenderer` was using `queryError` from our\
  \ context to surface the error state but that is not working correctly on initial\
  \ render. This fixes it by using the `data.errors` array.\r\n\r\n## Demo\r\n<img\
  \ width=\"1308\" height=\"414\" alt=\"CleanShot 2026-03-02 at 15 04 49\" src=\"\
  https://github.com/user-attachments/assets/e18c4156-a779-41b9-a091-572c78c3c00a\"\
  \ />\r\n\r\n## Testing Instructions\r\n* Create a new dashboard\r\n* Change the\
  \ datasource of the first query to be something that will error, (ie `gdev-influxdb-flux`\
  \ errors for me)\r\n* On main, you won't get the error in the query editor content,\
  \ but on this branch you should. \r\n\r\n## Reviewer Checklist\r\n<!--- The reviewer\
  \ should make sure the following has been done -->\r\n- [ ] Tests are added where\
  \ applicable\r\n- [ ] Issue is linked to PR\r\n- [ ] Code pulled and tested\r\n\
  - [ ] Code is meaningfully improved if applicable"
