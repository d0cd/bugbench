description: When the `newVizSuggestions` feature flag is disabled and there is no
  data, clicking a visualization suggestion passed an incorrect boolean argument to
  `applySuggestion`, preventing the options panel from opening. This caused a crash
  when subsequently switching panel types. The fix corrects the boolean parameter
  in the onClick handler.
