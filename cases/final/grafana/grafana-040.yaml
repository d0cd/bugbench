description: The segmented toggle button in the QueryEditor sidebar derived its state
  from the specific cardType, which included transformations and expressions. When
  clicking on a transformation or expression card, the toggle state became incorrect.
  The fix simplifies the toggle value to only distinguish between Alert and Query
  views, ignoring other card types.
