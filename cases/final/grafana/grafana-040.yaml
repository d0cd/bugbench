description: Graphite metric name variable queries running through the backend mode
  incorrectly set the 'text' and 'value' fields when constructing data frames. The
  data frame construction API changed, requiring the use of 'displayNameFromDS' to
  correctly populate series names, but the code was still using the old field access
  pattern, causing variable queries to return wrong or empty metric names.
