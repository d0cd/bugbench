pr_title: Fix SQLite retry test failing in full package run
pr_body: "## Summary\n- `TestIntegrationRun_SQLiteRetryReleasesLock` fails with \"\
  attempt to write a readonly database\" when running as part of the full `pkg/storage/unified/migrations`\
  \ package, but passes alone\n- Root cause: `TestIntegrationMigrations` sets `SQLITE_TEST_DB`\
  \ to a temp directory and creates the global `testSQLStore` singleton via testinfra.\
  \ When the test finishes, the temp directory is deleted but the singleton still\
  \ references the stale engine. Subsequent tests calling `db.InitTestDB` try to truncate\
  \ tables on that stale engine and fail.\n- Fix: add `t.Cleanup(db.CleanupTestDB)`\
  \ to reset the singleton after the migration test suite completes\n\n## Test plan\n\
  - [x] Ran `TestIntegrationMigrations` and `TestIntegrationRun_SQLiteRetryReleasesLock`\
  \ together \u2014 both pass\n- [x] Ran full package (`go test ./pkg/storage/unified/migrations/`)\
  \ \u2014 all 102 tests pass\n\n\U0001F916 Generated with [Claude Code](https://claude.com/claude-code)"
