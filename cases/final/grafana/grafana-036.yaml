description: The `runMigrationTestSuite` function sets `SQLITE_TEST_DB` to a temp
  directory and creates the global `testSQLStore` singleton via testinfra, but never
  resets the singleton on cleanup. When `t.TempDir()` deletes the temp DB file, the
  stale engine reference causes subsequent tests calling `db.InitTestDB` to fail with
  'attempt to write a readonly database' when truncating tables.
