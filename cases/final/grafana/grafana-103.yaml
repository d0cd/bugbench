pr_body: "**What is this feature?**\r\n\r\nThis pull request makes a small fix to\
  \ the `MultiCombobox` component in `MultiCombobox.tsx`. The change corrects the\
  \ calculation of the number of hidden selected items by using the length of `visibleItems`\
  \ instead of `shownItems`.\r\n\r\n**Why do we need this feature?**\r\n\r\nSo the\
  \ number of truncated items is correct.\r\n\r\n**Who is this feature for?**\r\n\r\
