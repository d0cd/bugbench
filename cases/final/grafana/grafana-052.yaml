description: The internal numeric dashboard ID was removed or deprecated as part of
  a UID migration, but the analytics/usage-insights pipeline still depended on it.
  This caused usage insights to break because `dashboardId` was no longer propagated
  through the analytics event flow. The fix restores the internal ID field throughout
  the dashboard scene, serialization, and analytics processor so that usage insights
  continue to function.
expected_findings:
- file: public/app/features/dashboard/state/analyticsProcessor.ts
  line: 2
  summary: "Analytics emitDashboardViewEvent no longer receives the numeric dashboard\
    \ `id` field \u2014 usage insights break because dashboardId is missing from emitted\
    \ events"
  line_side: pre_fix
- file: public/app/features/query/state/queryAnalytics.ts
  line: 66
  summary: dashboardId assignment uses `dashboard.id` which was deprecated/removed
    from the type, so this field is now undefined in analytics events
  line_side: pre_fix
- file: public/app/features/dashboard-scene/scene/DashboardScene.tsx
  line: 112
  summary: "The deprecated internal `id` field was removed from DashboardScene state\
    \ but is still needed downstream by analytics processors \u2014 removing it breaks\
    \ the analytics data pipeline"
  line_side: pre_fix
