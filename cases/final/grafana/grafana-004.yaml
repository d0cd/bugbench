description: The segmented toggle button's value was derived from `cardType`, which
  can take on values like transformation or expression in addition to Alert/Query.
  When a user clicked a transformation or expression card, `cardType` took a value
  the toggle didn't expect, corrupting its displayed state. The fix simplifies the
  derivation to only distinguish between alert view and query view.
