description: In the heatmap bucket expansion factor calculation, dividing by yMin
  when it is zero causes a divide-by-zero error, resulting in the entire heatmap failing
  to render when the y-axis max is set to auto. The fix extracts the calculation into
  a separate function that skips invalid (zero) bucket values and falls back to a
  factor of 1.
