pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your changes.\
  \ Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR reorders router initialization\
  \ to take place after computing the unspent records.\r\n\r\nIt was observed that\
  \ the TCP stack accepts inbound connects despite **not** calling `enable_handshake`.\
  \ By moving the router to bind right before `enable_handshake` is called at runtime,\
  \ this mitigates some of the `permission denied` bug that some had previously ran\
  \ into.\r\n"
