description: The `--bft` CLI flag for customizing the BFT bind address and port was
  only respected when `--dev` mode was enabled. In production mode, the BFT socket
  address was always set to a hardcoded default, ignoring the user-supplied value.
  The fix ensures the `--bft` flag is applied regardless of whether dev mode is active,
  replicated across all three network variant implementations (mainnet, testnet, canary).
