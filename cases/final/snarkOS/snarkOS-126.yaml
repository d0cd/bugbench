description: Async locks (Mutex and RwLock) were held across await points or for excessively
  long scopes in the network server, message handler, and peer book, causing lock
  contention and potential deadlocks that halted the node. The fix narrows lock scopes,
  drops guards before awaiting, and restructures critical sections to prevent node
  stalling.
expected_findings:
- file: network/src/server/mod.rs
  line: 75
  summary: RwLock read guard on peer_book is held across an await boundary; this blocks
    writers and can cause node halting under contention. Guard should be dropped before
    awaiting.
  line_side: pre_fix
- file: network/src/message/channel.rs
  line: 105
  summary: Mutex lock on writer held across await point (`self.writer.lock().await`
    followed by async write operations); prolonged hold time under load causes contention
    and stalls peer communication.
  line_side: pre_fix
- file: network/src/server/message_handler.rs
  line: 171
  summary: "Lock scope in message handler is too broad \u2014 lock guard is acquired\
    \ at block entry and held through multiple await points and branching logic, increasing\
    \ deadlock risk when concurrent messages arrive."
  line_side: pre_fix
