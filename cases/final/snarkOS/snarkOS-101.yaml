pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your changes.\
  \ Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR updates the `Router`\
  \ `connect` and `insert_restricted_peer` logic.\r\n\r\n## Tests\r\n\r\nThis PR introduces\
  \ a test framework for `Router` by implementing a `TestRouter`. Currently, only\
  \ the `Handshake` and `Disconnect` capabilities are needed in testing, however the\
  \ `Reading` and `Writing` traits are implemented with `Inbound`, `Outbound`, and\
  \ `Heartbeat` traits as stubs to support extensibility in the future.\r\n"
