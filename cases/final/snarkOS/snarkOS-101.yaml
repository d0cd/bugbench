description: The Router's connect logic had duplicated connection-attempt code paths
  (at least three locations in lib.rs) with inconsistent or missing restricted-peer
  checks. The fix consolidates the connect and insert_restricted_peer logic so that
  restricted peers are properly rejected before a TCP connection is attempted, and
  adds a test framework to verify connect/disconnect behavior.
