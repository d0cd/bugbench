description: Large refactoring PR that migrates modules from snarkVM, modularizes
  node logic for different node types, and introduces prover logic. This is a structural
  reorganization, not a bug fix. No diff is available to identify a specific defect.
expected_findings:
- file: .circleci/config.yml
  line: 25
  summary: apt-get commands missing DEBIAN_FRONTEND=noninteractive, which can cause
    CI to hang on interactive prompts during package installation
  line_side: pre_fix
- file: .circleci/config.yml
  line: 141
  summary: Clippy invoked with nightly toolchain without -D warnings flag, so lint
    warnings do not fail the build and bugs can slip through
  line_side: pre_fix
- file: environment/src/helpers/mod.rs
  line: 17
  summary: The old environment helpers module (block_locators, NodeType, Resources,
    Status) is being removed and replaced as part of a large structural reorganization
    that modularizes node logic into separate beacon/client/prover/validator types
    with dedicated router, ledger, and message crates
  line_side: pre_fix
- file: snarkos/store/rocksdb/map.rs
  line: 19
  summary: Import path uses outdated snarkvm::compiler module for Map/MapRead traits
    instead of the correct snarkvm::synthesizer::store::helpers path, causing compilation
    failure after snarkVM API migration
  line_side: pre_fix
- file: snarkos/store/block.rs
  line: 17
  summary: BlockDB struct is missing state_root_map, reverse_state_root_map, and coinbase_proof_map
    fields required by the BlockStorage trait, making the storage implementation incomplete
    for the updated snarkVM consensus requirements
  line_side: pre_fix
- file: snarkos/main.rs
  line: 17
  summary: Main entry point directly couples CLI parsing, logger init, thread pool
    config, and async runtime setup in a monolithic block, preventing modular node
    types (validator, prover, client) from having distinct startup paths
  line_side: pre_fix
