description: Block requests on the gateway were not being cached or rate-limited,
  unlike other request types (e.g. validator requests). This allowed peers to send
  unlimited block requests without throttling, and made it impossible to match inbound
  block responses to prior outbound requests. The fix adds caching for both inbound
  and outbound block requests, mirroring the existing pattern for validator requests.
