  summary: 'Wrapping message handling in a spawned task while using try_lock() on
    sync_handler_lock creates a race condition: concurrent tasks compete for the lock
    non-deterministically, and try_lock failures silently skip sync operations'
  line_side: pre_fix
- file: network/src/server.rs
