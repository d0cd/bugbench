description: 'PR #457 wrapped blocking network operations into individual spawned
  tasks, which introduced race conditions around sync_handler_lock.try_lock() and
  broke message ordering guarantees. Splitting previously sequential operations (channel
  reads, message handling, sync, propagation) into independent tasks caused non-deterministic
  lock contention and lost synchronization invariants. The revert restores the original
  sequential execution model.'
