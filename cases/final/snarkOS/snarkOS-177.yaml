description: 'The TCP node failed to detect self-connections in two ways: (1) inbound
  connections were never checked for self-connects, allowing the node to accept a
  connection from itself, and (2) outbound self-connect detection only handled the
  loopback case (matching ports on 127.0.0.1) but missed the case where the node connects
  to its own non-loopback IP. A new `is_self_connect()` method centralizes the logic,
  checking ports on loopback and IPs otherwise.'
expected_findings:
- file: node/tcp/src/tcp.rs
  line: 171
  summary: 'Missing self-connect check on inbound connections: `can_add_connection()`
    is checked but the node never verifies if the incoming connection is from itself,
    allowing self-connects through the accept handler.'
  line_side: pre_fix
- file: node/tcp/src/tcp.rs
  line: 289
  summary: 'Incomplete self-connect detection: `addr.ip().is_loopback() && addr.port()
    == listening_addr.port()` only catches self-connects on loopback addresses. When
    the node''s listening address is a non-loopback IP, connecting to that same IP
    is not detected as a self-connect.'
  line_side: pre_fix
