description: The simple_node BFT example used MockLedgerService, which became incompatible
  as the BFT subsystem evolved to require a real ledger with genesis block, committee
  balances, and translucent state. The fix replaces MockLedgerService with TranslucentLedgerService
  backed by a proper genesis ledger, restoring the example to a working state.
