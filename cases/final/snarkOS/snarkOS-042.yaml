description: "The orphan block metric counter was not being incremented when orphan\
  \ blocks were detected during the consensus commit process. Two code paths \u2014\
  \ handling `BlockStatus::Unknown` and `ForkDescription::Orphan` \u2014 logged debug\
  \ messages about orphan blocks but failed to increment the `metrics::blocks::ORPHANS`\
  \ counter, making orphan block occurrences invisible to monitoring."
