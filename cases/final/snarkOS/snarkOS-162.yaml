pr_title: '[fix] Fixes related to block locators.'
pr_body: "Rectify documentation of `BlockLocators` about validation during serialization.\
  \ Also introduce more explicit notion of well-formedness, since subsequent documentation\
  \ refers to that.\r\n\r\nMake `BlockLocators::new_unchecked()` constructor, which\
  \ does not perform validation, non-public, leveraging language-level protection.\
  \ Also document that it is only used in tests.\r\n\r\nAs discussed on Slack, fix\
  \ the check that the checkpoints map cover as many blocks as possible. Also explain\
  \ the check.\r\n\r\nAs discussed on Slack, fix the check about overlapping checkpoints\
  \ and recents. Also explain the check.\r\n\r\nRemove a redundant check to validate\
  \ block locators in `BlockSync`, as discussed on Slack, since deserialization already\
  \ checks that.\r\n\r\nAdd TODOs related to either generalizing some of the code\
  \ to `RECENT_INTERVAL > 1`, or removing such TODOs if we decide to hardwire `RECENT_INTERVAL`\
  \ to 1 and eliminate that constant.\r\n"
