pr_title: '[Fix] Add grace period before starting block sync'
pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your changes.\
  \ Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR simply adds an additional\
  \ grace period for the nodes to wait before attempting to call `try_block_sync`.\
  \ \r\n\r\nIdeally, `try_block_sync` isn't called until the first `PrimaryPing` message\
  \ is received, however in the initial bootup of validators, the nodes need to consider\
  \ themselves synced to send the `PrimaryPing` in the first place. Hence, the heuristic\
  \ wait approach.\r\n\r\nThis is needed because we've observed that during bootup,\
  \ nodes were (occasionally) incorrectly setting themselves as synced and when they\
  \ were in fact much further behind than the other validators. This caused them to\
  \ incorrectly start processing proposals and certificates from the other validators\
  \ instead of actually syncing. \r\n\r\nHere is an example of an observed sequence\
  \ of logs that should not happen:\r\n\r\n```\r\nDEBUG Skipping batch proposal (node\
  \ is syncing)\r\nINFO No connected validators\r\nDEBUG Fetched {} missing previous\
  \ certificates for round {} from '{}'\r\nDEBUG Primary is not ready to propose the\
  \ next round\r\nDEBUG Primary is safely skipping a batch proposal (please connect\
  \ to more validators)\r\n```\r\n\r\nUpon further debugging, this seems to happen\
  \ when the validator node call `try_block_sync` before receiving block locators\
  \ from peers via a `Event::PrimaryPing`. The call to `try_block_sync` makes the\
  \ node think it's synced since there are no block locators to sync from, and thus\
  \ starts processing proposals/certificates from peers.\r\n\r\n"
pr_commit_messages:
