description: During validator bootup, nodes could incorrectly set themselves as synced
  before receiving any PrimaryPing messages, causing them to process proposals and
  certificates instead of properly syncing. The fix adds a grace period sleep before
  calling try_block_sync, giving time for an initial PrimaryPing to arrive and establish
  accurate sync state.
