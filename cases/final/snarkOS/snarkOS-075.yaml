description: The snarkVM `store` operation on `credits.aleo` was broken, causing the
  REST API's program endpoint to fail or return incorrect results when querying the
  credits program. The fix updates the snarkVM dependency to a hotfix revision and
  adjusts the REST route handler to use the correct program retrieval method via `rest.ledger.get_program(id)`
  with proper `ConsensusStorage` type constraints.
