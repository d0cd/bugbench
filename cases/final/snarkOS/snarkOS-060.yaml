description: The snarkVM `store` function had a bug affecting `credits.aleo` program
  retrieval. The fix updates the snarkVM dependency to a new revision containing the
  hotfix and adjusts the REST API layer (removing `ConsensusStorage` type parameters
  and changing program retrieval in routes.rs) to work with the corrected store behavior.
