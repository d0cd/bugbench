    that returns incorrect or stale data for `credits.aleo`; needs to use the corrected
    snarkVM store API
  line_side: pre_fix
- file: node/rest/src/lib.rs
  line: 28
  summary: ConsensusStorage type constraint may be overly specific or outdated after
    snarkVM store refactor, causing type mismatch or preventing use of the corrected
