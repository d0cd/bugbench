description: An error log message was being emitted unconditionally during CDN block
  sync, even when no sync progress had been made. This misled callers into thinking
  something was wrong. The fix adds a condition to only log the error when the sync
  actually made progress.
expected_findings:
- file: node/cdn/src/blocks.rs
  line: 55
  summary: Error log is emitted unconditionally after sync integrity check; it should
    only be logged when the sync has actually made progress, otherwise it misleads
    callers.
