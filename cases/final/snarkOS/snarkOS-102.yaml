description: Block locator deserialization used the loop iteration index instead of
  the actual block height when associating block headers with their locator entries
  in the BTreeMap. This caused headers to be mapped to incorrect heights after deserialization.
  Additionally, the check_block_locators validation function was entirely commented
  out, meaning malformed block locators would pass validation unchecked.
expected_findings:
- file: ledger/src/helpers/block_locators.rs
  line: 82
  summary: "Bug: `block_headers_bytes.push((index, buffer))` uses loop counter `index`\
    \ instead of `height` \u2014 deserialized block headers will be keyed by iteration\
    \ index (0, 1, 2\u2026) rather than actual block height, corrupting the BTreeMap\
    \ lookup in lines 90-95."
  line_side: pre_fix
- file: ledger/src/state/ledger.rs
  line: 449
  summary: "Entire check_block_locators validation logic is commented out \u2014 the\
    \ function always returns Ok(true), allowing any malformed or malicious block\
    \ locator set to pass validation. This is a P2P protocol safety issue."
  line_side: pre_fix
