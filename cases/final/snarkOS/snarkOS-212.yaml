description: This PR separates the ledger module from the consensus module in the
  snarkOS node architecture. The refactoring fixes architectural coupling issues where
  consensus and ledger responsibilities were intertwined, potentially causing incorrect
  state management. Key changes include introducing a dedicated node/consensus crate,
  restructuring memory pool handling with proper read-lock semantics, and correcting
  resource allocation for CPU-bound tasks.
expected_findings:
- file: cli/src/commands/start.rs
  line: 219
  summary: 'Resource allocation bug: CPU and thread counts for consensus vs ledger
    tasks were not properly separated, leading to suboptimal or incorrect resource
    distribution (e.g., num_cpus::get().min(4) for one pool and saturating_sub(4).max(1)
    for another).'
- file: node/consensus/src/memory_pool/solutions.rs
  line: 52
  summary: "Memory pool solution handling: redundant or incorrect read-lock check\
    \ on unconfirmed_solutions before adding \u2014 the contains_key guard may miss\
    \ concurrent insertions, requiring the lock scope to be restructured."
- file: node/consensus/src/memory_pool/transactions.rs
  line: 41
  summary: "Memory pool transaction handling: similar pattern to solutions \u2014\
    \ read lock for contains_key check followed by separate write lock for insertion\
    \ creates a TOCTOU window where duplicate transactions could be added."
