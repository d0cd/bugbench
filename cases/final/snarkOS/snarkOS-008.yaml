description: The `to_vec` method on the digest tree recursively cloned each layer
  of the tree, which caused a stack overflow when the tree was sufficiently deep (i.e.,
  large numbers of blocks). The fix replaces the recursive clone with `take_children()`
  to move ownership instead of cloning, and adds comments warning against implementing
  Clone on the deep tree structure.
expected_findings:
- file: storage/src/storage/digest_tree.rs
  line: 16
  summary: 'DigestTree should not derive or implement Clone: recursive cloning of
    a deeply nested tree will overflow the stack'
  line_side: pre_fix
- file: consensus/src/consensus/inner/commit.rs
  line: 281
  summary: Use take_children() (move) instead of cloning children to avoid recursive
    deep-copy that causes stack overflow on large digest trees
  line_side: pre_fix
