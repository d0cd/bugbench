description: The challenge request deserialization in both BFT events and router messages
  would fail the handshake if the peer did not send a valid 40-byte commit hash. The
  fix changes the `read_le` call to gracefully handle missing or invalid commit hash
  bytes by using a match/fallback instead of propagating the error, allowing connections
  with peers that omit the field.
expected_findings:
- file: node/bft/events/src/challenge_request.rs
  line: 60
  summary: Deserializing snarkos_sha via `<[u8; 40]>::read_le` will fail the entire
    handshake if the peer does not send a commit hash. Should gracefully handle missing/invalid
    bytes instead of propagating the error.
- file: node/router/messages/src/challenge_request.rs
  line: 59
  summary: Deserializing snarkos_sha via `<[u8; 40]>::read_le` will fail the entire
    handshake if the peer does not send a commit hash. Should gracefully handle missing/invalid
    bytes instead of propagating the error.
