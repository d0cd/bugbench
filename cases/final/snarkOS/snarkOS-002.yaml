description: This is a large refactoring/migration PR that reorganizes node logic
  into separate modules and migrates code from snarkVM. No diff is available for analysis,
  making it impossible to identify specific code-level issues. The PR is a structural
  reorganization rather than a targeted bug fix.
expected_findings:
- file: .circleci/config.yml
  line: 28
  summary: apt-get install missing DEBIAN_FRONTEND=noninteractive, causing CI jobs
    to potentially hang on interactive prompts, and missing --no-install-recommends
    and dist-upgrade
  line_side: pre_fix
- file: .circleci/config.yml
  line: 62
  summary: RUST_MIN_STACK set too low (8MB) causing potential stack overflows during
    tests; needs to be 64MB (67108864)
  line_side: pre_fix
- file: .circleci/config.yml
  line: 19
  summary: Outdated sccache version 0.2.13 with incorrect URL format (missing 'v'
    prefix) causing download failures in CI setup
  line_side: pre_fix
- file: snarkos/ledger/mod.rs
  line: 85
  summary: "Ledger::from() constructor embeds HTTP server routes, peer management,\
    \ and server initialization directly inside the ledger, tightly coupling networking/API\
    \ concerns with ledger state management \u2014 any server startup failure leaves\
    \ the ledger in a partially constructed state"
  line_side: pre_fix
- file: snarkos/ledger/mod.rs
  line: 165
  summary: Block production (advance_to_next_block) and peer broadcasting logic embedded
    directly in the Ledger struct, mixing consensus block proposal with network propagation;
    the read-lock for propose_next_block and write-lock for add_next_block are not
    held atomically, creating a race window
  line_side: pre_fix
- file: node/store/src/rocksdb/map.rs
  line: 19
  summary: Import path for Map/MapRead traits referenced wrong module (snarkvm::compiler
    instead of snarkvm::synthesizer::store::helpers), indicating an API migration
    from the old compiler module to the new synthesizer module
  line_side: pre_fix
- file: snarkos/main.rs
  line: 17
  summary: Main entry point used monolithic snarkos crate (snarkos::CLI, snarkos::logger)
    instead of the new modular snarkos_cli crate, and included unnecessary runtime
    configuration that should be handled by the CLI framework
  line_side: pre_fix
- file: snarkos/store/block.rs
  line: 17
  summary: Block storage struct missing state_root_map, reverse_state_root_map, and
    coinbase_proof_map fields, making it incomplete relative to the BlockStorage trait
    requirements after snarkVM migration
  line_side: pre_fix
