description: 'The client sync mechanism suffered from two stall conditions: (1) an
  RwLock deadlock where a write lock on `process` was held while a nested code path
  attempted to acquire a read lock on the same RwLock, and (2) block request starvation
  where sync requests could not make progress during block response processing. The
  fix restructures lock acquisition order and adds yielding/scoping to prevent deadlock
  and ensure block requests are not starved.'
expected_findings:
- file: node/sync/src/block_sync.rs
  line: 233
  summary: 'RwLock deadlock: write lock on `process` is held while a nested call path
    attempts to acquire a read lock on the same RwLock, causing deadlock during block
    response processing.'
- file: node/sync/src/block_sync.rs
  line: 612
  summary: 'Block request starvation: sync block requests can stall indefinitely because
    the response processing path holds resources without yielding, preventing new
    block requests from being issued.'
- file: node/sync/src/block_sync.rs
  line: 692
  summary: Missing synchronization or scoping around lock acquisition that contributes
    to the deadlock scenario when block response processing takes significant time.
