description: 'Bootnode addresses in the snarkOS config struct were serializable and
  deserializable, allowing users (or attackers with config file access) to override
  hardcoded bootnodes via the config file. This could enable eclipse attacks by pointing
  a node to malicious bootnodes. The fix adds #[serde(skip_serializing, skip_deserializing)]
  to the bootnode fields so they are no longer read from or written to the config
  file.'
expected_findings:
- file: snarkOS/config.rs
  line: 82
  summary: "Bootnode field is serializable/deserializable via serde, allowing user-controlled\
    \ override of bootstrap nodes through the config file \u2014 should be skipped\
    \ to prevent eclipse attacks"
  line_side: pre_fix
- file: snarkOS/config.rs
  line: 158
  summary: "Second bootnode-related field is also serializable/deserializable, same\
    \ issue \u2014 config file should not control bootnode selection"
  line_side: pre_fix
