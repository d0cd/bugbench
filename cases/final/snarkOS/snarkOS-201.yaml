description: The TCP connection handler did not check whether an outgoing or incoming
  connection was to the node itself, causing self-connects on testnet. The fix adds
  an `is_self_connect(addr)` check at three connection points (lines 171, 289, 395)
  alongside the existing `can_add_connection()` guard, rejecting connections where
  the remote address matches the node's own address while still allowing loopback
  for testing.
expected_findings:
- file: node/tcp/src/tcp.rs
  line: 171
  summary: 'Missing self-connect guard: the connection acceptance path should check
    `is_self_connect(addr)` to prevent a node from accepting a connection from itself.'
- file: node/tcp/src/tcp.rs
  line: 289
  summary: 'Missing self-connect guard: outgoing connection path lacks `is_self_connect(addr)`
    check, allowing the node to connect to its own listening address.'
- file: node/tcp/src/tcp.rs
  line: 395
  summary: 'Missing self-connect guard: another connection handling path should reject
    connections where the remote address matches the node''s own address.'
