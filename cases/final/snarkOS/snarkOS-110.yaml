- file: node/sync/src/block_sync.rs
  line: 451
  summary: 'Potential deadlock: the `responses` write lock is still held at this point
    when `remove_block_requests_to_peer` is called, which internally acquires another
    write lock. The lock must be explicitly dropped before this call.'
