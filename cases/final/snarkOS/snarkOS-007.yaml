description: The inbound/outbound cache for solutions and transactions was keyed solely
  by solution commitment or transaction ID, without incorporating the peer IP address.
  This meant that when multiple distinct peers relayed the same solution or transaction,
  the cache incorrectly treated subsequent relays as duplicates from the same source,
  potentially triggering disconnection logic against innocent peers.
expected_findings:
- file: node/router/src/helpers/cache.rs
  line: 34
  summary: Cache data structure stores solution/transaction entries without per-IP
    granularity. The cache key should incorporate the peer IP so that the same solution
    received from different peers is not treated as a duplicate transmission from
    a single peer.
  line_side: pre_fix
- file: node/router/src/inbound.rs
  line: 225
  summary: "The `seen_before` check for inbound solutions does not account for peer\
    \ IP \u2014 a solution relayed by a different peer will be incorrectly flagged\
    \ as a duplicate, potentially causing that peer to be disconnected."
  line_side: pre_fix
- file: node/router/src/inbound.rs
  line: 250
  summary: 'Same per-IP cache issue for inbound transactions: `seen_before` treats
    identical transactions from different peers as duplicates from a single source.'
  line_side: pre_fix
