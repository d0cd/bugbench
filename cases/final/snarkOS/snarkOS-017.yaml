description: The transaction broadcast REST endpoint incorrectly applied the SYNC_LENIENCY
  check, preventing nodes that were behind on sync from broadcasting transactions
  to the network. This caused hours of downtime for wallets and end-users during any
  client outage or sync disruption. The fix allows broadcasting to proceed regardless
  of sync state, while still preventing the out-of-sync node from processing the transaction
  locally.
expected_findings:
- file: node/rest/src/routes.rs
  line: 629
  summary: "SYNC_LENIENCY guard is applied too broadly \u2014 it blocks transaction\
    \ broadcasting even though broadcast should succeed regardless of the node's sync\
    \ state."
- file: node/rest/src/routes.rs
  line: 642
  summary: "Transaction processing logic does not distinguish between local processing\
    \ and network broadcast \u2014 an out-of-sync node should still be allowed to\
    \ relay transactions to peers."
- file: node/rest/src/routes.rs
  line: 707
  summary: Broadcast path is gated on sync leniency check, preventing valid transaction
    propagation when the node is behind.
