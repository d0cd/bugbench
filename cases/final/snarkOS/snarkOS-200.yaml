description: The cache `refresh` method was called before the fetch operation, creating
  an edge-case where the refresh could clear the last seen timestamp prematurely.
  The fix reorders the operations so that `refresh` is called after the fetch, ensuring
  the timestamp is preserved until the data has been retrieved.
expected_findings:
- file: node/router/src/helpers/cache.rs
  line: 231
  summary: 'Incorrect ordering: cache refresh is called before the fetch, which can
    clear the last seen timestamp before it is used. The refresh should happen after
    the fetch to avoid losing timestamp data.'
