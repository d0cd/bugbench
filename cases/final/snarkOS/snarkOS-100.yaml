pr_title: Sync tweaks
pr_body: "This PR:\r\n* Splits reconnections to disconnected nodes between the highest\
  \ claimed block count, and random. This provides us a higher chance to pull a longer\
  \ chain, but still providing noise and distributing blocks.\r\n* Makes aggro sync\
  \ rounds last up to 60 seconds, removed interim block locator hash update (was pointless\
  \ since we just restart after 15, now 60 seconds)\r\n* Allows chain-scanning behavior\
  \ in aggro sync (was disabled in a regression)\r\n* Adjusts block locator hashes\
  \ to put proportional hashes first, and makes quadratic hashes look at the the blocks\
  \ closer to the origin of the chain.\r\n\r\n"
