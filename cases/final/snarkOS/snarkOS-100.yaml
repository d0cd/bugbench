description: The aggro sync mode had a regression that disabled chain-scanning behavior,
  reducing the node's ability to discover and sync longer chains. The PR re-enables
  chain-scanning in aggro sync, adjusts block locator hash ordering to prioritize
  proportional hashes over quadratic ones (moving quadratic hashes closer to chain
  origin), extends aggro sync rounds from 15 to 60 seconds, and splits peer reconnection
  strategy between highest-block-count peers and random peers for better chain discovery.
