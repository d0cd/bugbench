description: The rate limiter in the REST server used `.per_second()` which caused
  requests per second to drop to 1 after the burst quota was exhausted. The fix switches
  to `.per_nanosecond((1_000_000_000 / rest_rps) as u64)` to correctly replenish the
  full burst rate every second, and adds proper HTTP 429 error responses for rate-limited
  requests.
expected_findings:
- file: node/rest/src/lib.rs
  line: 111
  summary: 'Incorrect rate limiter API usage: `.per_second()` does not correctly replenish
    the burst quota, causing RPS to drop to 1 after burst is exhausted. Should use
    `.per_nanosecond((1_000_000_000 / rest_rps))` to distribute replenishment evenly.'
- file: node/rest/src/lib.rs
  line: 112
  summary: 'Missing proper HTTP error response for rate-limited requests: should return
    429 (Too Many Requests) instead of a generic error when the rate limit is exceeded.'
