description: The prover node was using `propagate_to_validators` instead of `propagate`
  when broadcasting `UnconfirmedSolution` messages. This restricted solution propagation
  to only validator peers, preventing solutions from reaching the full network. The
  fix reverts to `propagate` which broadcasts to all connected peers, restoring correct
  network-wide solution dissemination.
expected_findings:
- file: node/src/prover/mod.rs
  line: 0
  summary: Prover node used propagate_to_validators instead of propagate for UnconfirmedSolution
    messages, restricting solution broadcast to only validators instead of all peers
  line_side: pre_fix
- file: cli/src/commands/start.rs
  line: 329
  summary: Separate trusted_validators list was maintained and passed to node initialization,
    enabling validator-only solution propagation (propagate_to_validators) instead
    of broadcasting to all peers (propagate)
  line_side: pre_fix
- file: node/router/messages/src/helpers/node_type.rs
  line: 22
  summary: Prover node type was classified as 'a light node' rather than 'a full node',
    causing it to use propagate_to_validators instead of propagate for UnconfirmedSolution
    messages, restricting solution dissemination to only validators instead of all
    connected peers
  line_side: pre_fix
- file: node/narwhal/ledger-service/src/prover.rs
  line: 1
  summary: The prover ledger service module was part of a node architecture where
    the prover used propagate_to_validators instead of propagate for UnconfirmedSolution
    broadcasts, restricting solution dissemination to only validator peers instead
    of the full network
  line_side: pre_fix
- file: node/router/src/outbound.rs
  line: 109
  summary: The propagate_to_validators method restricts broadcast to only validator
    peers; prover nodes incorrectly used this instead of propagate() for UnconfirmedSolution,
    preventing solutions from reaching the full network
  line_side: pre_fix
- file: node/src/client/router.rs
  line: 193
  summary: UnconfirmedSolution is propagated using propagate_to_validators instead
    of propagate, restricting solution dissemination to only validator peers instead
    of broadcasting to all connected peers
  line_side: pre_fix
