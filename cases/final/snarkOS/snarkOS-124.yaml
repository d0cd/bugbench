description: BlockSync had no upper limit on the number of outstanding block requests,
  allowing unbounded requests that overloaded the network and degraded sync performance.
  The fix introduces a MAX_BLOCK_REQUESTS constant (set to 50) to cap outstanding
  requests, and refactors the num_blocks_behind API to support this limiting logic
  across router implementations.
expected_findings:
- file: node/sync/src/block_sync.rs
  line: 157
  summary: 'No limit on outstanding block requests in prepare_block_requests: the
    number of concurrent pending requests can grow unboundedly, overloading the network
    and degrading sync performance.'
- file: node/router/src/outbound.rs
  line: 28
  summary: num_blocks_behind returns insufficient information to enforce request limits;
    needs to also expose outstanding request count or integrate with MAX_BLOCK_REQUESTS
    cap.
