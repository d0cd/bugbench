description: The GroupEncryption PublicKey FromBytes implementation incorrectly deserialized
  the affine point by only reading/using the x-coordinate (via from_x_coordinate)
  instead of properly reading the full affine representation that ToBytes wrote. This
  caused public keys to fail round-trip serialization. The fix corrects the FromBytes
  implementation to properly read the affine coordinates and adds a round-trip serialization
  test.
expected_findings:
- file: algorithms/src/encryption/group.rs
  line: 29
  summary: 'Incorrect deserialization: FromBytes uses from_x_coordinate to reconstruct
    the affine point, but this doesn''t match what ToBytes serializes. The full affine
    point bytes should be read, not just the x-coordinate.'
