pr_title: '[Fix] Updates conditions to advance from odd and even rounds '
pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your changes.\
  \ Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR updates the conditions\
  \ to advance from odd and even rounds by adding a quorum check. Previously, in odd\
  \ rounds the code would return \u2018true\u2019 if the previous even round leader\
  \ was unseen [1]. In some scenarios, this would cause nodes to pre-maturely increment\
  \ rounds before seeing \u20182f+1\u2019 certificates, the quorum threshold to increment\
  \ rounds in Bullshark. For example, if the leader in even round \u2018r\u2019 was\
  \ unseen, in odd round \u2018r+1\u2019 a malicious node could send a batch header\
  \ with a round number beyond the GC limit. When nodes try to sync with the batch\
  \ header [2], they will increment their BFT to the next round since the previous\
  \ leader was unseen. \r\n\r\n[1] https://github.com/AleoHQ/snarkOS/blob/mainnet/node/bft/src/bft.rs#L370\
  \ \r\n[2] https://github.com/AleoHQ/snarkOS/blob/mainnet/node/bft/src/primary.rs#L1249\
  \ \r\n"
