description: The `get_blocks` REST endpoint used inclusive bounds for both start and
  end block heights, but the API contract specifies an exclusive end. This caused
  off-by-one behavior where one extra block was returned (or the range semantics were
  inconsistent with the documented interface). The fix updates the range handling
  so the start is inclusive and the end is exclusive.
