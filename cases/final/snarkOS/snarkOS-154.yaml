description: The REST API route handler for program editions did not return 0 for
  the latest credits.aleo edition and failed to return HTTP 404 for missing programs
  or invalid editions. The fix updates the route logic in routes.rs to special-case
  credits.aleo (returning edition 0) and properly return 404 errors, with improved
  error response handling in error.rs.
