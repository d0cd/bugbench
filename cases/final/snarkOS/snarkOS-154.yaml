- file: node/rest/src/routes.rs
  line: 354
  summary: "Route handler does not special-case credits.aleo to return edition 0,\
    \ and fails to return 404 for missing programs/editions \u2014 returns incorrect\
    \ data or wrong HTTP status instead."
- file: node/rest/src/helpers/error.rs
  line: 111
  summary: Error responses for missing resources are not properly formatted or logged,
    leading to unclear API behavior when programs or editions are not found.
