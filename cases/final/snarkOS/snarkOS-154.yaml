pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your changes.\
  \ Happy contributing! -->\r\n\r\n## Motivation\r\n\r\n1. An expected behavior of\
  \ the `--bft` flag is to allow changing the bound IP and port\r\n2. This change\
  \ enables a single PC to run `testnet`, `canary`, and `mainnet` nodes in parallel\
  \ without resorting to virtualization\r\n3. This change provides [multihome](https://en.wikipedia.org/wiki/Multihoming)\
  \ support to snarkOS. Some servers may have more than one public IP address and\
  \ a user may desire to bind to only one of those addresses.\r\n\r\n## Test Plan\r\
  \n\r\nWe have been running validators with modified BFT ports without issue. This\
  \ change does not add new features to snarkOS\r\n\r\n## Related PRs\r\n\r\nn/a\r\
  \n"
