description: The --bft CLI flag for setting the BFT bound IP/port was ignored unless
  the node was started in dev mode. This meant users could not customize BFT networking
  in production (testnet/canary/mainnet), preventing multi-node setups on a single
  machine and multihoming configurations. The fix propagates the user-supplied --bft
  value through the non-dev startup paths.
