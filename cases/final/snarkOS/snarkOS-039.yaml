description: Tokio mpsc channels were used directly throughout the codebase without
  metrics instrumentation, leading to unreliable metrics reporting on channel queue
  depths and message throughput. The fix introduces a wrapped_mpsc module in the metrics
  crate that decorates tokio channels with automatic metrics tracking, and replaces
  all bare channel usage across consensus, network, and storage.
expected_findings:
- file: metrics/src/lib.rs
  line: 22
  summary: 'Missing metrics instrumentation module: bare tokio::sync::mpsc channels
    are used throughout the codebase without any metrics wrapping, so channel queue
    depths and throughput are not tracked'
  line_side: pre_fix
- file: network/src/node.rs
  line: 15
  summary: Uses bare tokio mpsc channels instead of metrics-instrumented wrapped channels,
    causing metrics reporting gaps for network message passing
  line_side: pre_fix
- file: storage/src/storage/async_adapter.rs
  line: 17
  summary: Storage async adapter uses uninstrumented tokio mpsc channels, missing
    metrics on storage command queue depth
  line_side: pre_fix
- file: metrics/src/wrapped_mpsc.rs
  line: 1
  summary: 'New wrapped channel implementation: verify it correctly delegates all
    mpsc methods (send, recv, try_send, try_recv, close) and properly increments/decrements
    gauge metrics on send and receive to avoid counter drift on errors or drops.'
  line_side: pre_fix
- file: network/src/sync/blocks/interface.rs
  line: 95
  summary: 'Channel replacement site: confirm the wrapped_mpsc swap preserves the
    same bounded/unbounded channel semantics and buffer sizes as the original tokio::sync::mpsc
    usage.'
  line_side: pre_fix
