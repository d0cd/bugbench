description: The REST API's `is_synced` endpoint incorrectly reported `true` while
  the client was still fetching blocks from CDN. This happened because `BlockSync`
  initializes as synced and only transitions to syncing upon receiving block locators
  from peers, which doesn't occur during CDN fetches. The fix adds a `!cdn_sync` guard
  so `is_synced` returns `false` during CDN synchronization.
