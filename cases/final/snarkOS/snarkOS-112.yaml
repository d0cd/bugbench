description: The `--seed` flag on the `account sign` command allowed users to seed
  the nonce used in signatures, which is cryptographically insecure. Reusing or sharing
  signature nonces can lead to private key recovery (analogous to the ECDSA nonce
  reuse attack). The fix removes the `--seed` flag entirely to prevent accidental
  use of this insecure functionality.
