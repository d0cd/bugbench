description: 'PR #3920 refactored on_connect across four node types but dropped the
  resolve_to_listener step. The peer_addr parameter is the connection-level socket
  address (ephemeral port), which differs from the listener address when the remote
  peer initiated the connection. Without resolving first, get_connected_peer fails
  to find the peer and pings are never sent, breaking peer connectivity for inbound
  connections.'
expected_findings:
- file: node/bft/src/primary.rs
  line: 613
  summary: 'check_transaction_basic is called after transaction ownership is moved
    to transaction_spent_cost_in_microcredits, but in the buggy code the order is
    reversed: spent cost is computed first (consuming the transaction by reference),
    then validity check happens after, meaning invalid transactions waste compute
    on cost calculation and the transaction is passed by reference instead of by value
    as the new API requires'
  line_side: pre_fix
- file: node/bft/ledger-service/src/ledger.rs
  line: 408
  summary: "transaction_spend_in_microcredits takes transaction by reference (&Transaction)\
    \ instead of by value (Transaction), and uses deprecated helper functions (deploy_compute_cost_in_microcredits,\
    \ execute_compute_cost_in_microcredits) with incorrect cost computation logic\
    \ \u2014 for deployments it doesn't properly separate constructor cost from total\
    \ cost at V10+, and for executions it incorrectly includes storage cost pre-V10\
    \ and adds an unnecessary spend limit check at V11+. Fee transactions bail instead\
    \ of returning 0."
  line_side: pre_fix
