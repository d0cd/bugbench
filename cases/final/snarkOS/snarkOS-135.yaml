description: 'Two TCP edge cases: (1) concurrent calls to Tcp::disconnect could both
  execute disconnect logic because there was no atomic guard preventing duplicate
  execution, and (2) if the message processing task (Reading::process_message) panicked,
  the stream reading task was not dropped, causing a connection and memory leak. The
  fix adds an AtomicBool to claim disconnect exclusively and ensures the reading task
  is aborted when the processing channel closes.'
expected_findings:
- file: node/tcp/src/tcp.rs
  line: 302
  summary: 'Missing atomic guard on disconnect: concurrent calls to Tcp::disconnect
    can both execute the disconnect handler because there is no mechanism to claim
    exclusive execution'
  line_side: pre_fix
- file: node/tcp/src/protocols/reading.rs
  line: 175
  summary: 'Resource leak: when the message processing task panics (mpsc channel closes),
    the stream reading task continues running, leaking the connection and associated
    memory'
  line_side: pre_fix
- file: node/tcp/src/helpers/connections.rs
  line: 85
  summary: Connections struct lacks an AtomicBool field to track whether a disconnect
    has already been claimed for a given peer
  line_side: pre_fix
