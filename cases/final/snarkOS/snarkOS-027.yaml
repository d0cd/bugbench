description: Locks (sync_handler, peer_book, local_address) were held across `.await`
  points in async connection/message handling code, which could cause the node to
  halt due to deadlock-like conditions. The fix explicitly drops these locks before
  awaiting async operations like writing blocks to channels.
expected_findings:
- file: network/src/server/connection_handler.rs
  line: 140
  summary: Lock guard `sync_handler` is held across an `.await` point; must be explicitly
    dropped before the await to prevent halting/deadlock
  line_side: pre_fix
- file: network/src/server/message_handler.rs
  line: 173
  summary: Lock guard `peer_book` is held across an `.await` point; must be explicitly
    dropped before the await to prevent halting
  line_side: pre_fix
- file: network/src/server/mod.rs
  line: 96
  summary: "Lock held while calling `channel.write(&Block::new(data.clone())).await?`\
    \ \u2014 holding a lock across this await can block the entire server"
  line_side: pre_fix
