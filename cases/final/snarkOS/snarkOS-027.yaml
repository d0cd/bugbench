description: The proposal cache path was always computed by navigating one directory
  above the ledger path (using parent()), assuming the default directory structure.
  When a custom storage path is configured, this assumption is invalid and causes
  the proposal cache to be stored in an unexpected location outside the user's configured
  directory. The fix conditionally uses the parent directory only for default paths,
  and stores the cache directly in the configured directory for custom paths.
expected_findings:
- file: node/bft/src/helpers/proposal_cache.rs
  line: 30
  summary: Proposal cache path unconditionally uses parent() of ledger path, which
    only works for the default directory layout. When a custom storage path is configured,
    the parent directory is arbitrary and the cache should be stored in the configured
    directory instead.
