description: "The message propagation function updates the seen_blocks/seen_transactions\
  \ dedup maps for ALL peers \u2014 including the sender \u2014 before checking `if\
  \ peer != &sender`. This causes the sender's 'last seen' entry to be set to the\
  \ current time even though the message is never sent to the sender, incorrectly\
  \ suppressing the sender from receiving the same block or transaction in future\
  \ propagations from different peers. The fix restructures the loop to only check\
  \ and update seen maps for non-sender peers."
expected_findings:
- file: src/network/peers.rs
  line: 425
  summary: "The match block updating seen_blocks/seen_transactions executes for all\
    \ peers including the sender, but the sender-exclusion check (`if peer != &sender`)\
    \ is only applied later \u2014 this silently poisons the dedup map for the sender\
    \ peer, causing it to miss future propagations of the same block/transaction."
  line_side: pre_fix
- file: src/network/peers.rs
  line: 432
  summary: Expiry check `now.saturating_sub(*last_seen) < BLOCK_BROADCAST_INTERVAL`
    runs and updates timestamp for the sender peer even though the message is never
    sent to the sender, creating a stale dedup entry that suppresses future legitimate
    sends.
  line_side: pre_fix
