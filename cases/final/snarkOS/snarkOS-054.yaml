description: The `Proposal::read_le` deserialization path did not validate that transmission
  IDs in the batch header matched the keys in the transmissions map, violating a struct
  invariant that `Proposal::new` enforced. A malformed or malicious serialized proposal
  could bypass this invariant check, potentially causing inconsistent BFT state. The
  fix adds the missing validation in `read_le` and also fixes test code that was constructing
  proposals with mismatched ordering due to HashMap non-determinism.
expected_findings:
- file: node/bft/src/helpers/proposal.rs
  line: 221
  summary: 'Missing invariant check: `read_le` constructs a Proposal without verifying
    that `batch_header.transmission_ids()` matches `transmissions.keys()`, unlike
    the `new()` constructor which enforces this. A deserialized proposal can violate
    the struct invariant.'
  line_side: pre_fix
- file: node/bft/src/helpers/proposal.rs
  line: 194
  summary: Missing type annotation on `batch_header` means the compiler cannot infer
    the concrete `BatchHeader<N>` type, which could lead to ambiguous deserialization
    in generic contexts.
  line_side: pre_fix
