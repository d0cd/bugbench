description: A format string placeholder (e.g., `{e}`) was used inside a regular string
  literal rather than inside a formatting macro like `format!` or `eprintln!`. This
  caused the literal text `{e}` to appear in the output instead of the interpolated
  error value. The fix wraps the string in the appropriate formatting macro or uses
  proper string interpolation.
