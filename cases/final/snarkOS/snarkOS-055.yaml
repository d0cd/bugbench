pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your changes.\
  \ Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nthe problem is  that when\
  \ the current round is sent to the bft using `bft_sender.send_primary_round_to_bft(current_round).await`,\
  \ if this returns true, the primary starts to propose batches. The problem is that\
  \ it also returns true when the storage fails to increment to next round. If this\
  \ returns false, it fixes the issue (well the one I was seeing, where the 4th node\
  \ syncs but can't participate in consensus)\r\n\r\n## Test Plan\r\n\r\nsteps to\
  \ reproduce (without the fix):\r\n* clear the local ledger\r\n* start 3 nodes and\
  \ wait for about 30 rounds\r\n* start 4th node\r\n* notice that it syncs up, but\
  \ not quite, and doesn't participate in consensus and keeps on resending an old\
  \ batch\r\n\r\nwith the fix:\r\n* 4th node syncs and starts to participate in consensus\r\
  \n\r\n## Related PRs\r\n\r\nhttps://github.com/AleoHQ/snarkOS/pull/3074\r\n"
pr_commit_messages:
- 'fix: don''t try to propose a batch when we''re not yet synced'
