description: Cache request counters in both BFT and router cache helpers used a too-narrow
  integer type (likely u8 or u16) for tracking outbound validator/puzzle request counts
  per socket address. Under heavy request volume the counter could overflow and wrap
  around, bypassing rate-limiting or causing incorrect cache behavior. The fix widens
  these counters to u32.
expected_findings:
- file: node/bft/src/helpers/cache.rs
  line: 39
  summary: 'Integer overflow risk: seen_outbound_validators_requests counter uses
    a type too narrow (e.g. u8/u16) that can wrap around under normal load; should
    be u32'
- file: node/router/src/helpers/cache.rs
  line: 48
  summary: 'Integer overflow risk: seen_outbound_puzzle_requests counter uses a type
    too narrow (e.g. u8/u16) that can wrap around under normal load; should be u32'
