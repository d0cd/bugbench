description: The validator requests cache map in the BFT gateway was never cleared
  for a peer on disconnect. Since the cache lacked time-based expiry, entries accumulated
  indefinitely, causing unbounded memory growth. The fix adds cache eviction for a
  peer's entries when that peer disconnects, leveraging the bounded committee size
  to prevent infinite growth.
expected_findings:
- file: node/bft/src/gateway.rs
  line: 1085
  summary: 'Missing cache cleanup: when a peer disconnects, the validator requests
    cache entries for that peer are not cleared, leading to unbounded memory growth'
- file: node/bft/src/helpers/cache.rs
  line: 119
  summary: Cache structure lacks a method to remove entries associated with a specific
    peer, preventing cleanup on disconnect
