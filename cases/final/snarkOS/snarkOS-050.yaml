pr_title: Delay the promotion of the peer from connecting to connected
pr_body: "## Motivation\r\n\r\nReplaces https://github.com/AleoNet/snarkOS/pull/3332\r\
  \nOriginal message:\r\n\r\nA re-opening of https://github.com/AleoNet/snarkOS/pull/2690;\
  \ there is also https://github.com/AleoNet/snarkOS/pull/2729 which I had considered\
  \ to be a simpler alternative, but I believe that both changes are desirable (with\
  \ this one going in first) for a more foolproof setup.\r\n\r\nThe Aleo network stack\
  \ is two-tiered, and both the lower- and higher-level layers recognize that connections\
  \ may have been started but not fully finalized yet, which corresponds to the \"\
  connecting\" and \"connected\" states of connections and peers respectively.\r\n\
  \r\nThis PR ensures that the lower networking layer is the first one to conclude\
  \ its connection setup, which is done by marking the (higher-level) peers as \"\
  connected\" only via OnConnect, which is triggered only after the lower-level layer\
  \ has concluded all its work. To do this, the Peer object (instead of just the address)\
  \ is persisted in the connecting_peers collection past the handshake, and moved\
  \ to connected_peers only during OnConnect::on_connect.\r\n\r\n## Test Plan\r\n\r\
  \nThe existing tests are adjusted to account for this; I've also tested it locally\
  \ in a --dev network.\r\n\r\nFixes https://github.com/AleoNet/snarkOS/issues/3331\
  \ and all other potential issues of its kind (i.e. attempting to treat a connection\
  \ as fully established before the lower-level TCP stack recognizes it as such)."
