description: Outbound TCP connections in the TCP module did not bind to the address
  configured via the `--node` flag before connecting. On multi-homed hosts, this caused
  peers to use the wrong source IP address, leading to incorrect socket address propagation
  during handshakes and preventing concurrent connections to co-located nodes.
expected_findings:
- file: node/tcp/src/tcp.rs
  line: 225
  summary: Outbound TCP connection does not bind to the configured local address before
    connecting. Should create a socket, bind it to `self.config().listener_ip`, then
    connect, rather than using a plain `TcpStream::connect` which lets the OS pick
    the source address.
