pr_title: Fix two committee retrievals.
pr_body: "When calculating stake of (authors of) certificates, the lookback committee\
  \ must be the one for the round of the certificates, not the one before it, although\
  \ currently they happen to be equal.\r\n\r\nA longer explanation/discussion was\
  \ on Slack.\r\n\r\nAlso make some comments (about that code) more clear.\r\n"
