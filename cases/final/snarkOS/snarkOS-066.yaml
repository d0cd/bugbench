description: When calculating the stake of certificate authors, the code retrieved
  the lookback committee for the round before the certificate round instead of the
  certificate round itself. Although currently the two happen to be equal, this is
  semantically incorrect and could lead to wrong stake calculations if the lookback
  logic changes. The fix corrects the round parameter in committee lookback retrievals
  in both bft.rs and sync/mod.rs.
