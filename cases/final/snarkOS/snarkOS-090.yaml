description: "The node's peer IP validation only used `is_bogon_ip`, which is insufficient\
  \ \u2014 it failed to reject other invalid peer addresses (e.g., loopback, link-local,\
  \ or other non-routable IPs). The fix replaces all `is_bogon_ip` checks with a more\
  \ comprehensive `is_valid_peer_ip` filter across the gateway, router, and TCP layers,\
  \ closing a vector where invalid peers could establish connections."
