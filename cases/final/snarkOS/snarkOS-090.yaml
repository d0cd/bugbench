- file: node/tcp/src/lib.rs
  line: 37
  summary: is_bogon_ip only checks for bogon ranges but does not validate against
    other invalid peer addresses (unspecified, loopback, multicast, link-local). Should
    be replaced with comprehensive is_valid_peer_ip check.
  line_side: pre_fix
- file: node/bft/src/gateway.rs
  line: 264
  summary: "Peer IP filtering uses is_bogon_ip which is insufficient \u2014 does not\
    \ reject unspecified, loopback, or other non-routable addresses that should never\
    \ be valid peer IPs."
  line_side: pre_fix
- file: node/router/src/lib.rs
  line: 215
  summary: Router imports and uses is_bogon_ip for peer validation, missing broader
    invalid IP categories that a network node should reject.
  line_side: pre_fix
