language: rust
pr_size: medium
description: The BFT sync module performed recursive certificate fetching from peers
  without checking whether the node was already synced. This caused nodes that were
  still syncing to unnecessarily fetch certificates recursively, potentially leading
  to network congestion, resource exhaustion, or sync failures. The fix adds an `is_synced`
  guard before recursive certificate fetching and also filters out aborted transmission
  IDs in storage services.
expected_findings:
- file: node/bft/src/sync/mod.rs
  line: 557
  summary: 'Missing `is_synced` guard: recursive certificate fetching proceeds even
    when the node is not yet synced, which can cause excessive network requests and
    sync failures.'
- file: node/bft/storage-service/src/memory.rs
  line: 120
  summary: Aborted transmission IDs are not filtered out before processing, allowing
    invalid/aborted transmissions to be included in results.
- file: node/bft/storage-service/src/persistent.rs
  line: 171
  summary: Same missing filter for aborted transmission IDs in the persistent storage
    implementation.
