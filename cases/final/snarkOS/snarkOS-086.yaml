description: This is a large structural refactoring PR that migrates modules from
  snarkVM, modularizes node logic by node type, and introduces prover logic. With
  no diff available, the actual code changes cannot be inspected for correctness.
  The PR appears to be an architectural reorganization rather than a targeted bug
  fix.
expected_findings:
- file: .circleci/config.yml
  line: 61
  summary: RUST_MIN_STACK set to 8388608 (8MB) is too small, causing stack overflows
    during tests; needs to be 67108864 (64MB)
  line_side: pre_fix
- file: Cargo.toml
  line: 157
  summary: opt-level = 3 in dev/test profiles causes excessively slow compilation
    and strips debug information, hindering development; should be opt-level = 2
  line_side: pre_fix
- file: node/ledger/src/lib.rs
  line: 53
  summary: Ledger struct changed from using Arc<Self> return type and separate Peers
    type to a simpler ownership model with Router, fixing the architecture to use
    a proper message-passing router instead of direct peer socket management
  line_side: pre_fix
- file: node/ledger/src/lib.rs
  line: 89
  summary: new_with_genesis incorrectly returned Arc<Self> and lacked router parameter,
    preventing proper integration with the new node router system for message propagation
  line_side: pre_fix
- file: node/ledger/src/lib.rs
  line: 148
  summary: address() returned a reference &Address<N> instead of owned Address<N>,
    and peers() exposed raw socket-based Peers type instead of using the Router abstraction
    for peer management
  line_side: pre_fix
- file: snarkos/network/mod.rs
  line: 155
  summary: 'Transaction mempool logic is inverted: checks if transaction ID already
    exists in ledger (contains_transaction_id returns true) and then tries to add
    it to mempool anyway, instead of checking that it does NOT already exist'
  line_side: pre_fix
- file: snarkos/network/mod.rs
  line: 159
  summary: Transaction rebroadcast happens inside a spawned task that captures peer
    by reference via closure, but peer.ip is borrowed across an await boundary in
    the spawned task, potentially causing lifetime issues
  line_side: pre_fix
- file: snarkos/network/mod.rs
  line: 108
  summary: Naive block sync only requests one block at a time (latest_height + 1)
    with no batch or range request mechanism, making sync extremely slow and prone
    to stalling if any single block response is lost
  line_side: pre_fix
