description: Metrics reporting for mpsc channels was unreliable because bare tokio::mpsc
  channels were used throughout the codebase without instrumentation. The fix introduces
  a wrapped_mpsc module that wraps tokio mpsc channels to automatically track and
  report metrics (e.g., queue depth, send/receive counts), and replaces all bare channel
  usage across consensus, network, and storage crates with the instrumented wrapper.
