pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your changes.\
  \ Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nCloses #1369 without introducing\
  \ new dependencies with jsonrpc-* crates.\r\n\r\nThere is an issue with parsing\
  \ numerical value with json rpc id field. The work around implemented is to first\
  \ parse into `serde_json::Value` as suggested [here](https://github.com/serde-rs/serde/issues/1413).\r\
  \n\r\nAnother [PR](https://github.com/DoumanAsh/json-rpc-types/pull/2) to the temp\
  \ dependency json-rpc-type fixes the issue of how `serde_json::Value` string deserialization\
  \ requires escaping and cannot therefore be cast to a borrowed str type. \r\n\r\n\
  ## Test Plan\r\n\r\n<!-- If you changed any code, please provide us with clear instructions\
  \ on how you verified your changes work. -->\r\n\r\n```\r\n curl -s -H \"Content-Type:\
  \ application/json\" -X POST --data '{\"jsonrpc\":\"2.0\",\"method\":\"latestblockheight\"\
  ,\"params\":[],\"id\":\"1\"}' localhost:3032\r\n \r\n curl -s -H \"Content-Type:\
  \ application/json\" -X POST --data '{\"jsonrpc\":\"2.0\",\"method\":\"latestblockheight\"\
  ,\"params\":[],\"id\":1}' localhost:3032\r\n```\r\n\r\n## Related PRs\r\n\r\n<!--\r\
  \n    If this PR adds or changes functionality,\r\n    please take some time to\
  \ update the docs at https://github.com/AleoHQ/snarkOS,\r\n    and link to your\
  \ PR here.\r\n-->\r\n #1496 \r\n#1537 \r\n"
