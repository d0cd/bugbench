description: The node did not validate peer IP addresses before accepting connections,
  allowing bogon IPs (private, reserved, loopback ranges) and unspecified IPs to be
  treated as valid peers. The fix adds `is_bogon_ip` and `is_unspecified_ip` helper
  functions in the TCP layer and applies filtering in the gateway and router inbound
  paths to reject connections from invalid IP addresses.
expected_findings:
- file: node/bft/src/gateway.rs
  line: 264
  summary: 'Missing validation: peer IP addresses are accepted without checking if
    they are bogon (private/reserved/loopback) IPs, allowing potentially malicious
    or invalid peers to connect.'
- file: node/router/src/lib.rs
  line: 215
  summary: 'Missing IP validation: connections are processed without filtering out
    bogon or unspecified IP addresses, which could allow peers from private/reserved
    networks.'
- file: node/router/src/inbound.rs
  line: 255
  summary: 'Missing peer IP filtering in inbound message handling: no check for bogon
    or unspecified IPs before processing incoming peer messages.'
