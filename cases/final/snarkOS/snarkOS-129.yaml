description: The JSON-RPC request deserialization failed when the `id` field contained
  a numerical value instead of a string. The existing code attempted to deserialize
  directly into the target struct, but serde could not handle the polymorphic id field
  (which per JSON-RPC spec can be a string, number, or null). The fix introduces an
  intermediate parse step through `serde_json::Value` before converting to the final
  request type, and updates the json-rpc-types dependency to handle `serde_json::Value`
  string deserialization correctly.
expected_findings:
- file: src/rpc/rpc.rs
  line: 141
  summary: Direct deserialization of JSON-RPC request fails for numeric id values;
    should first parse into serde_json::Value then convert, to handle the polymorphic
    id field per JSON-RPC spec
  line_side: pre_fix
- file: Cargo.toml
  line: 71
  summary: json-rpc-types dependency version does not handle serde_json::Value string
    deserialization correctly (Value-based strings require escaping and cannot be
    borrowed as &str); needs update
  line_side: pre_fix
