pr_title: '[ZKS-02] Update the set of authorized validators '
pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your changes.\
  \ Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR updates the set of\
  \ authorized validators to include current committee members along with committee\
  \ members from rounds up until the sync range tolerance, which is currently set\
  \ at one block before nodes are considered out-of-sync. \r\n\r\nPreviously, the\
  \ code would fetch the committee lookback at the latest ledger round, but this is\
  \ not always the same as the committee lookback from the storage\u2019s current\
  \ round. For example, if the latest ledger round is \u2018n\u2019 but the current\
  \ round is \u2018n+2\u2019, the committees may disagree. In some cases, this may\
  \ lead to validators being disconnected who should still be considered as authorized\
  \ to participate in consensus. \r\n\r\nOne of the implications of the previous logic\
  \ is that if these committees differ substantially and affect (2f+1), then a validator\
  \ will be unable to connect to a quorum of nodes in the current committee and halt.\
  \ \r\n\r\nAudit Finding: **[zksecurity 02] Dynamic Committee Feature is Not Safe**"
