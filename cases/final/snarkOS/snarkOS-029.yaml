description: 'BlockLocators validation had two incorrect checks: (1) the check verifying
  that the checkpoints map covers as many blocks as possible was wrong, and (2) the
  check for overlapping checkpoints and recents was incorrect. Additionally, the `new_unchecked()`
  constructor that bypasses validation was incorrectly exposed as public API. The
  fix corrects both validation conditions and restricts the unsafe constructor''s
  visibility.'
