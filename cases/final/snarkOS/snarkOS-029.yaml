description: The gateway fetched the authorized validator committee using the latest
  ledger round instead of accounting for the storage's current round and sync range
  tolerance. When the current round diverges from the latest ledger round, the committee
  lookback returns stale membership, causing legitimate validators to be disconnected.
  If enough validators are affected to break the 2f+1 quorum, consensus halts.
expected_findings:
- file: node/bft/src/gateway.rs
  line: 100
  summary: Authorized validator set is derived from a single committee lookback at
    the latest ledger round, but should include committees across the sync range tolerance
    to account for round divergence between ledger and storage.
  line_side: pre_fix
- file: node/bft/ledger-service/src/ledger.rs
  line: 108
  summary: get_block_round is missing or not used to translate block heights to rounds
    for the extended committee lookback range, preventing the gateway from checking
    committees across the sync tolerance window.
  line_side: pre_fix
