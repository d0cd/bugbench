description: The NUM_REDUNDANT_REQUESTS was a static constant that didn't scale with
  the number of validators in the committee, causing either too many or too few redundant
  fetch requests depending on network size. Additionally, the pending request count
  used callbacks rather than actual sent TransmissionRequest/CertificateRequest events,
  giving an inaccurate measure of redundancy. The fix replaces the constant with a
  dynamic formula (1 + num_validators / 3) and switches to counting actual sent request
  events.
expected_findings:
- file: node/bft/src/helpers/pending.rs
  line: 13
  summary: Static NUM_REDUNDANT_REQUESTS constant does not account for committee size;
    should be a dynamic calculation based on the number of validators in the committee
    lookback set.
- file: node/bft/src/worker.rs
  line: 90
  summary: Redundancy check uses callback count (num_pending_requests) instead of
    actual sent TransmissionRequest/CertificateRequest events, leading to inaccurate
    redundancy measurement.
- file: node/bft/src/sync/mod.rs
  line: 410
  summary: Sync module uses static redundancy limit rather than dynamic max_redundant_requests
    based on committee size, causing suboptimal fetch behavior for varying network
    sizes.
