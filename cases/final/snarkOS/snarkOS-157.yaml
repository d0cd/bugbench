description: When CDN sync fails, the error handler unconditionally checks ledger
  integrity and returns errors even when no sync progress was made (completed_height
  == start_height). This causes misleading error logs and spurious integrity-check
  failures when the sync fails immediately without downloading any blocks. The fix
  wraps the integrity checks in a guard that only runs them if the sync actually made
  progress.
expected_findings:
- file: node/cdn/src/blocks.rs
  line: 58
  summary: 'Missing progress guard: ledger integrity check runs even when sync made
    no progress (completed_height == start_height), producing misleading errors and
    potentially returning false Err results to the caller.'
  line_side: pre_fix
- file: node/cdn/src/blocks.rs
  line: 61
  summary: 'Spurious error return: comparing node_height to completed_height and returning
    an error is misleading when no blocks were actually synced, since completed_height
    equals start_height and the ledger state hasn''t changed.'
  line_side: pre_fix
