description: "The codebase contained election certificate logic added as a potential\
  \ fix for a BFT safety violation (ZKS-00: Commit Flow Can Lead to Safety Violation).\
  \ This approach was incorrect \u2014 the actual fix belongs in snarkVM, not snarkOS\
  \ \u2014 so the unnecessary election certificate code needed to be reverted to restore\
  \ vanilla Bullshark consensus behavior. Leaving the extra code path risked introducing\
  \ subtle consensus divergence."
