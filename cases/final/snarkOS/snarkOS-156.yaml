pr_title: '[Fix] Create a better log message when not connected to any peers.'
pr_body: "This is a simpler attempt at fixing #3885. The PR does not fix the issue\
  \ of nodes starting as `synced`, but I will leave that for another PR.\r\n\r\nThe\
  \ core change is that the sync state is never changed during block request generation,\
  \ but only when processing responses, new block locators, or disconnects. For disconnects,\
  \ there is a new function `SyncStatus::clear_greatest_peer_height` that is used\
  \ when a peer disconnects and no block locators are remaining.\r\nWhen invoking\
  \ that function, the node's sync state will switch to `unsynced` until it receives\
  \ new block locators.\r\n\r\nThe PR also adds more documentation to this delicate\
  \ part of the codebase. Hopefully, the comments make the changes easy to review."
pr_commit_messages:
- 'fix(node/sync): do not set sync status when issuing block requests'
- 'fix(sync): update greatest peer height on disconnect'
- 'feat(node/sync): add `unsynced` state, for when a node has no peers'
