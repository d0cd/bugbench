pr_title: Serialize invocations of propose_batch
pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your changes.\
  \ Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThe propose_batch function\
  \ is called 1) from a dedicated task started in start_handlers, and 2) from try_increment_to_the_next_round\
  \ - so potentially from different threads. If those threads start it in parallel,\r\
  \nit might send different batches for the same round, breaking the protocol. This\
  \ patch adds a lock enforcing\r\nthat doesn't happen.\r\n\r\n## Test Plan\r\n\r\n\
  Without this patch, the recipient produces a warning on the duplicate batches:\r\
  \n\r\n2023-10-30T11:33:02.170998Z  WARN snarkos_node_bft::primary: Cannot sign a\
  \ batch from '10.0.0.36:5002' - Malicious peer - proposed another batch for the\
  \ same round (5)\r\n\r\nWith the fix, the warning should never appear.\r\n\r\n##\
  \ Related PRs\r\n\r\nUnlike #2813 , this patch waits on a lock, rather than using\
  \ try_lock - the difference shouldn't matter to the dedicated task, but other threads\
  \ call try_increment_to_the_next_round while handling an incoming network event,\
  \ and propose_batch erroring out leads to that event being dropped, which is probably\
  \ less efficient that waiting...\r\n"
