description: The proposal cache storage path was hardcoded to the default Aleo ledger
  directory, ignoring the `--storage` CLI option. The fix threads the `StorageMode`
  parameter through BFT, Primary, and into the `proposal_cache_path()` function so
  that custom storage paths are respected.
expected_findings:
- file: node/bft/src/helpers/proposal_cache.rs
  line: 26
  summary: proposal_cache_path() does not accept a StorageMode parameter, causing
    it to always use the default ledger directory regardless of CLI --storage option
- file: node/bft/src/primary.rs
  line: 108
  summary: Primary struct does not store or propagate StorageMode, so it cannot pass
    custom storage configuration to the proposal cache
- file: node/bft/src/bft.rs
  line: 41
  summary: BFT module does not accept or forward StorageMode, breaking the chain from
    CLI config to proposal cache path
