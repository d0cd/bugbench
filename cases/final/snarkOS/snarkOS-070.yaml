description: The propose_batch function in the BFT primary could be invoked concurrently
  from two independent call sites (start_handlers task and try_increment_to_the_next_round)
  without synchronization. This race condition allowed different batches to be proposed
  for the same round, violating BFT protocol invariants. The fix adds a Tokio mutex
  to serialize propose_batch invocations.
