category: concurrency
difficulty: hard
severity: high
language: rust
pr_size: small
description: 'Two TCP edge cases: (1) concurrent calls to Tcp::disconnect could both
  execute disconnect behavior due to lack of atomic synchronization, and (2) if Reading::process_message
  panicked, the stream reading task was not dropped, causing a connection and memory
  leak. Fixed by adding an AtomicBool to claim disconnect exclusivity and by aborting
  the reader task when the message processing channel closes.'
expected_findings:
- file: node/tcp/src/tcp.rs
  line: 302
  summary: 'Race condition: Tcp::disconnect lacks atomic guard, allowing duplicate
    concurrent calls to both execute disconnect behavior. Should use an atomic compare-and-swap
    to claim exclusive disconnect execution.'
- file: node/tcp/src/protocols/reading.rs
  line: 175
  summary: 'Resource leak: when the message processing task panics (channel closes),
    the stream reading task is not aborted/dropped, leaking the connection and associated
    memory. Should detect TrySendError::Closed and terminate the reader task.'
- file: node/tcp/src/helpers/connections.rs
  line: 15
  summary: Connection state missing AtomicBool field to track whether disconnect has
    already been initiated for a given connection, enabling the race condition in
    Tcp::disconnect.
