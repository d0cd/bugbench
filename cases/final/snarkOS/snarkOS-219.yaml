description: Peer connection and disconnection handling used anyhow::Error, Option,
  and booleans to signal connection failures, causing errors during handshakes to
  not propagate properly and producing confusing log messages like 'peer disconnected
  before sending ChallengeResponse'. The fix introduces a concrete ConnectionError
  type and new disconnect reasons (already connecting, already connected, self-connect,
  no untrusted external peers) to properly classify and propagate connection errors.
expected_findings:
- file: node/router/src/handshake.rs
  line: 46
  summary: Handshake error handling uses anyhow::Error instead of a concrete ConnectionError
    type, preventing proper error classification and propagation of benign connection
    failures like duplicate connections.
- file: node/bft/src/gateway.rs
  line: 54
  summary: Gateway connect logic does not distinguish between different connection
    failure modes (already connecting, self-connect, etc.), leading to misleading
    disconnect log messages.
- file: node/router/src/heartbeat.rs
  line: 23
  summary: Heartbeat connection logic lacks proper error classification for peer connection
    attempts, causing benign connection rejections to be logged as unexpected errors.
