description: The sync node selection logic did not correctly identify and select a
  sync node during the first handshake. The handshake functions needed to return version
  information (changing their return type to a 3-tuple) so the server could properly
  evaluate peers for sync node selection. The fix also adds GetSync message handling
  and corrects the bootnode test to match the updated handshake return signature.
