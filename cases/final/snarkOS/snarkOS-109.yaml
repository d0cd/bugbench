description: The SYNC_LENIENCY check was applied too broadly, preventing transaction
  broadcasts when a node was behind on sync. This caused hours of downtime for wallets
  and end-users during any client outage or sync disruption. The fix ignores SYNC_LENIENCY
  for broadcast operations, allowing the transaction to propagate to other nodes even
  if the local node won't process it.
