description: The signed_proposals cache in the BFT primary lacked a round check, allowing
  malicious validators to trick peers into double-signing proposals by submitting
  proposals with rounds behind the already-signed round. The fix adds a check to disconnect
  from peers that request signatures on proposals behind the signed_round, preventing
  DAG safety violations.
