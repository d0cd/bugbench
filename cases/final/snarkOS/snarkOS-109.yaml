pr_title: Ignore SYNC_LENIENCY for broadcast
pr_body: "This PR modifies the transaction broadcasting behavior to allow clients\
  \ to broadcast transactions even when their node is behind. If we don't do this,\
  \ any client outage or sync disruption can cause hours of downtime for wallets and\
  \ end-users.\r\n\r\nIf the node is not within the sync leniency, then the node will\
  \ not process the transaction themselves, but still allow other nodes to do so.\r\
  \n\r\nFor honest users, it is desired behaviour for the broadcast to succeed.\r\n\
  For dishonest users, it is not desired behaviour, but we may assume they could use\
  \ a custom node implementation anyway.\r\n\r\n## Alternatives considered\r\n- Only\
  \ broadcast when `check_transaction=false`. This will likely offer a worse UX but\
  \ less spam on the network. UX has priority at this point."
pr_commit_messages:
- Ensure /transaction/broadcast always broadcasts
