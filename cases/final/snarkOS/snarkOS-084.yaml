description: The sync layer had a bug where corrupt or invalid blocks could be fast-forwarded
  into the canonical chain, bypassing validation. This was fixed as a drive-by in
  a larger PR that replaced RocksDB with SQLite storage. The fix appears in network/src/sync/master.rs
  and consensus/src/consensus/inner/agent.rs, adding proper validation checks before
  accepting blocks during sync.
