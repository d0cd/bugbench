pr_title: Sqlite implementation
pr_body: "This PR adds sqlite implementation to snarkOS.\r\n\r\nOriginally this was\
  \ slated as an opt-in feature, but due to performance gains, higher stability, and\
  \ cleaner code, we are moving forward on replacing rocksdb with sqlite.\r\n\r\n\
  This PR includes:\r\n* Sqlite storage implementation\r\n* Rocksdb -> Sqlite automatic\
  \ migration for first-time runs with an existing rocksdb database, and no existing\
  \ sqlite database.\r\n* Drive-by-fix for a sync issue for corrupt/invalid blocks\
  \ being fast-forwarded (#1089)\r\n* `max-head` CLI option to trim the top of storage\
  \ (used in debugging #1089).\r\n"
