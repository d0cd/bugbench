description: The fork point check used the parent hash instead of the latest received
  block hash when scanning for forks to revert. This caused the node to revert and
  end up on the same chain in fresh-fork scenarios off old canonical blocks, effectively
  making fork resolution ineffective. The fix changes the fork path lookup to use
  the correct hash.
