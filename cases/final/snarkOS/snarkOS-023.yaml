pr_title: Fix fork point check
pr_body: "This PR changes the point for which to scan for forks for reversion to the\
  \ latest received block in a prospective fork, as opposed to the parent hash.\r\n\
  \r\nThis prevents us from reverting and ending up on the same chain that we are\
  \ on in fresh-fork scenarios off old canon blocks.\r\n\r\nThis also indicates some\
  \ nodes that should be syncing are mining -- which is likely due to the race condition\
  \ present in node status."
