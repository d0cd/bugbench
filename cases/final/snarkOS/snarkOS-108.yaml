description: When receiving already-seen transactions or solutions from peers, the
  code used bail!() which treats duplicates as protocol violations, potentially disconnecting
  honest peers. Receiving duplicates is normal in a P2P network. The fix replaces
  bail!() with trace!() logging and skipping the duplicate, allowing the peer connection
  to continue normally.
expected_findings:
- file: node/router/src/inbound.rs
  line: 210
  summary: Incorrect use of bail!() for seen/duplicate UnconfirmedTransaction; this
    is a normal P2P condition and should skip (trace + continue) rather than bail,
    which is treated as a protocol violation
- file: node/router/src/inbound.rs
  line: 236
  summary: Incorrect use of bail!() for seen/duplicate UnconfirmedSolution; duplicates
    are expected in P2P networks and should be skipped with a trace log rather than
    bailing as a protocol violation
