pr_title: '[Fix] Set up log filters correctly'
pr_body: "I recently changed log filter to not use environment variables anymore (because\
  \ `std::env::set_var` is unsafe in Rust 2024). For this to work correctly, the log\
  \ filter cannot be prefixed with `RUST_LOG=` anymore. This caused the issue reported\
  \ in #3710.\r\n\r\nThis PR also fixes the sync mode being reported incorrectly and\
  \ makes `tracing` a workspace dependency. The former was caused by a missing `!`.\
  \ The latter is just to avoid different versions of tracing causing logging issues,\
  \ and adding workspace gradually instead of in one large commit, seems easier to\
  \ manage.\r\n\r\nFinally, I added a test to the devnet_ci script that tests for\
  \ nodes creating any log messages. This is a good sanity check to have and does\
  \ not add a noticeable overhead to testing."
pr_commit_messages:
- 'fix(cli): ensure logs are filtered and shown correctly'
- 'chore: workspace deps for tokio-util and tracing'
- 'fix(rest): report CDN sync correctly'
- 'ci: check that devnet creates non-empty log files'
