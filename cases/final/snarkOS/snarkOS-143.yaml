description: The old block sync process used a cyclical request-response pattern with
  random peer selection, leading to poor sync performance and missed forks. The new
  'aggro sync' continuously requests all missing blocks from each responding peer
  and repeats until no responses arrive, dramatically improving throughput at the
  cost of increased duplicate block reception.
