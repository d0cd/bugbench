pr_title: Aggro Sync
pr_body: "This PR massively increases network-bound sync performance and significantly\
  \ reduces any chances of forks not being considered.\r\n\r\nThe old sync process:\r\
  \n1. Request sync hashes from peers based on block locator hashes\r\n2. Randomly\
  \ request each novel sync block from a random peer who has it\r\n3. Repeat\r\n\r\
  \nThe new sync process:\r\n1. Request sync hashes from peers based on block locator\
  \ hashes\r\n2. For each peer that responds, broadcast back their highest sync hash,\
  \ request all blocks we don't have at that instant\r\n3. Repeat step # 2 until no\
  \ one responds for a while\r\n\r\nThis has the following effects:\r\n* Continuous\
  \ sync process eliminates cyclical performance observed/expected in old sync process.\r\
  \n* Increase in the number of received duplicate blocks (from effectively zero to\
  \ scaling linearly by number of peers)\r\n* An effective, naive negotiation for\
  \ any peers on really distant forks to still be able to send blocks.\r\n* Pulling\
  \ forks that are ultimately suboptimal, in their entirety.\r\n\r\nMy current node\
  \ synced to canon tip from origin in ~18 hours of runtime -- unclean test. Has ~40K\
  \ forked blocks from the process (not forks, blocks not in canon)."
