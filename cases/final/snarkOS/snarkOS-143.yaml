description: 'The network sync process was inefficient: it randomly requested each
  novel sync block from a random peer in a cyclical fashion, leading to poor sync
  performance and missed forks. The fix replaces the sync algorithm with an aggressive
  continuous approach that broadcasts back each peer''s highest sync hash and requests
  all missing blocks, eliminating cyclical bottlenecks and ensuring distant forks
  are fully pulled.'
expected_findings:
- file: network/src/sync/blocks/batched.rs
  line: 14
  summary: Old batched sync strategy randomly selects peers for each block, causing
    inefficient round-trips and cyclical performance; should be replaced with aggressive
    continuous sync that requests all missing blocks from each responding peer.
- file: network/src/sync/blocks/interface.rs
  line: 30
  summary: Sync interface does not re-request blocks from peers after initial response,
    missing opportunity for continuous sync and allowing distant forks to go unconsidered.
- file: network/src/sync/mod.rs
  line: 26
  summary: Sync module structure lacks the aggressive sync mode needed for continuous
    block fetching; the old approach resets the full sync cycle instead of iterating
    on peer responses.
