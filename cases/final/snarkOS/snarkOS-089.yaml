description: The Miner struct cached canon blockchain state (block height, etc.) at
  construction time, causing it to use stale data across mining iterations. The fix
  removes cached fields from the Miner struct so that each mining iteration fetches
  fresh canon information from storage via `consensus.storage.canon().await`.
expected_findings:
- file: consensus/src/miner.rs
  line: 44
  summary: Miner struct stores only address and consensus but previously cached canon
    state fields that became stale across mining iterations. Fresh canon data should
    be fetched each iteration rather than stored at construction time.
- file: testing/src/mining/mod.rs
  line: 31
  summary: Canon block height must be fetched fresh from storage (`consensus.storage.canon().await`)
    each time rather than relying on a potentially stale cached value from the Miner
    struct.
