description: The snarkOS CLI main function always exited with code 0 even when a command
  failed, because the error branch only printed the error message without signaling
  failure. The fix adds `std::process::exit(1)` in the `Err` arm so that scripts and
  CI pipelines can detect command failures via the exit code.
