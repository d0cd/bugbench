description: The peer disconnection handler failed to clear the `seen_outbound_block_requests`
  cache, causing stale entries to persist after a peer disconnected. This could prevent
  the node from re-requesting blocks from a reconnected peer or from other peers,
  leading to synchronization issues. The fix adds a call to clear the relevant cache
  entries in `Cache::clear_peer_entries` and invokes it during peer disconnect.
