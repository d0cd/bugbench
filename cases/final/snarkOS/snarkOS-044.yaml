  line: 196
  summary: 'Missing cleanup of `seen_outbound_block_requests` in `clear_peer_entries`:
    stale outbound block request entries persist after peer disconnect, preventing
    future block requests to that peer.'
- file: node/router/src/lib.rs
  line: 514
  summary: Peer disconnect handler should call cache clearing logic to invalidate
    peer-specific cached entries including outbound block requests.
