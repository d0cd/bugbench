description: The CLI endpoint response handler only accepted HTTP 200 status codes
  as successful responses, ignoring other valid 2xx success codes (e.g., 201 Created,
  202 Accepted, 204 No Content). The fix replaces the exact status code check with
  `response.status().is_success()`, which matches any status in the 200-299 range.
