expected_findings:
- file: .circleci/config.yml
  line: 399
  summary: Missing comma in YAML list between 'display' and 'node' workspace members
    causes invalid CircleCI matrix configuration for Windows workflow
  line_side: pre_fix
- file: snarkos/ledger/mod.rs
  line: 35
  summary: Ledger struct tightly couples networking (peers, server) with ledger/consensus
    logic, preventing modular node types (beacon, validator, prover, client) from
    being implemented independently
  line_side: pre_fix
- file: snarkos/ledger/mod.rs
  line: 55
  summary: Ledger initialization passes genesis signer address separately to InternalLedger
    rather than extracting consensus into its own module that manages beacon/validator
    sets, block trees, and memory pools independently
  line_side: pre_fix
- file: snarkos/main.rs
  line: 20
  summary: Main function had hardcoded runtime configuration with non-standard thread
    pool sizing and manual rayon setup, replaced with simplified CLI-driven entry
    point delegating to snarkos_cli
  line_side: pre_fix
- file: snarkos/lib.rs
  line: 39
  summary: Monolithic lib.rs bundled store, network, node, and ledger modules in a
    single crate instead of modularizing into separate crates (node/store), making
    the architecture rigid and tightly coupled
  line_side: pre_fix
- file: snarkos/store/rocksdb/map.rs
  line: 19
  summary: Import path references snarkvm::compiler which was reorganized to snarkvm::synthesizer::store::helpers,
    indicating dependency on outdated/incorrect snarkVM API
  line_side: pre_fix
