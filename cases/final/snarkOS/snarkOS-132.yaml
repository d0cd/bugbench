description: The codebase used a deprecated `BlockHeaderHash` type alias instead of
  the canonical `Digest` type from snarkos_storage. This PR removes all occurrences
  of `BlockHeaderHash`, replacing them with `Digest` across network messages, sync
  logic, serialization, tests, and storage validation. The change also updates related
  imports (e.g., removing unused `BlockHeader` imports from snarkvm_dpc).
