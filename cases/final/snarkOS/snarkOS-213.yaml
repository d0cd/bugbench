description: The `snarkos developer` subcommands (deploy, execute, transfer_private)
  incorrectly exposed a `--storage-path` CLI option that was not applicable to developer/offline
  operations. This caused user confusion or errors when the option was used. The fix
  removes the `storage_path` field and its usage from all three command structs.
