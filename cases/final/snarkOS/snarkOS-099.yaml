description: The `dev execute` command assumed a V2 API endpoint, failing when used
  against a V1 API. The fix detects the API version from the endpoint URL, adjusts
  error parsing (JSON for V2, plain strings for V1), and handles V1's use of HTTP
  500 instead of 404 for missing transactions when using `--wait`.
expected_findings:
- file: cli/src/commands/developer/execute.rs
  line: 152
  summary: 'Missing API version detection: code assumes V2 endpoint behavior (e.g.,
    JSON error responses, 404 for missing transactions) without checking whether the
    endpoint is V1, which returns string errors and 500 status codes.'
- file: cli/src/commands/developer/mod.rs
  line: 43
  summary: 'No version-aware endpoint parsing: the developer module lacks logic to
    parse and differentiate V1 vs V2 API endpoints, causing incorrect request/response
    handling for V1 APIs.'
- file: cli/src/commands/developer/scan.rs
  line: 28
  summary: Block range parsing has redundant branches both fetching latest block height;
    should be simplified and made version-aware for correct V1 API interaction.
