description: The rate limiter was configured using `per_second` which caused the replenishment
  rate to drop to 1 request per second after the burst quota was exhausted, instead
  of maintaining the configured RPS. The fix uses `per_nanosecond((1_000_000_000 /
  rest_rps) as u64)` to correctly replenish the full burst rate every second. A secondary
  fix addresses proper HTTP error responses (429 for rate limiting) and a compilation
  issue with import ordering.
