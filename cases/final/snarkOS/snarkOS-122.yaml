description: The handshake commit hash was encoded as a variable-length string, causing
  any string starting with '?' to be treated as unknown. This led to test failures
  when property-testing generated strings containing '?'. The fix changes the SHA
  to always be encoded as a fixed 40-byte array and replaces the hardcoded 'unknown'
  string with a constant `UNKNOWN_SHA`, ensuring only the exact unknown sentinel value
  is recognized.
expected_findings:
- file: node/router/messages/src/challenge_request.rs
  line: 27
  summary: Commit hash stored as a String and serialized with variable-length encoding;
    should use a fixed-size [u8; 40] array to avoid ambiguous encoding/decoding of
    the unknown sentinel value.
- file: node/bft/events/src/challenge_request.rs
  line: 44
  summary: String-based SHA representation allows any '?'-prefixed string to be misinterpreted
    as unknown; needs fixed-size array encoding with an explicit UNKNOWN_SHA constant.
- file: node/network/src/lib.rs
  line: 79
  summary: get_repo_commit_hash returns a raw string without length validation; should
    return an Option or fixed-size array to prevent malformed SHA values from propagating
    into the handshake protocol.
