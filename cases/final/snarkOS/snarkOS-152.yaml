  line: 23
  summary: 'Missing empty-canon guard: corrupt/invalid blocks could be fast-forwarded
    into the canonical chain when canon is empty, leading to chain corruption'
- file: network/src/sync/master.rs
  line: 79
  summary: Sync logic did not properly handle forks of interest, allowing invalid
    blocks to bypass validation during fast-forward sync
