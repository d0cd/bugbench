description: A sync issue allowed corrupt or invalid blocks to be fast-forwarded into
  the canonical chain. The fix adds a guard in the consensus agent to check if the
  canon chain is empty before processing, and improves fork detection logging in the
  sync master. Additionally, the PR replaces RocksDB with SQLite for improved performance
  and stability.
