description: The `longest_child_path` function was implemented using iterative calls
  to `get_block_children` in application code, causing many individual database round-trips
  to traverse the block tree. The fix replaces this with a dedicated SQLite recursive
  query that computes the longest child path in a single database operation, significantly
  improving performance.
expected_findings:
- file: storage/src/storage/sync.rs
  line: 131
  summary: 'Performance: `get_block_children` called iteratively in a loop to compute
    longest_child_path causes O(n) database round-trips; should use a single recursive
    SQL query instead'
- file: storage/src/storage/sync.rs
  line: 196
  summary: 'Performance: repeated `get_block_children` calls for tree traversal; this
    entire traversal logic should be pushed down into the database layer as a recursive
    query'
- file: consensus/src/consensus/inner/mod.rs
  line: 68
  summary: Missing depth limit parameter (OLDEST_FORK_THRESHOLD) for longest_child_path
    call, allowing unbounded traversal
