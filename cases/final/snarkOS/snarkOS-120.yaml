description: 'PR #4043 introduced a new `--dev-num-clients` flag and restructured
  devnet peering, but left several CI scripts broken and a panic-on-error in the CLI.
  Key issues include: (1) `.unwrap()` instead of `?` in `start.rs` causing a panic
  instead of graceful error propagation, (2) a copy-paste bug in `devnet_ci.sh` where
  the client-log loop prints validator logs using the wrong variable, (3) missing
  `--dev-num-clients=0` flags in benchmarks, (4) wrong dev indexes for clients in
  `bench_p2p_sync.sh` causing port/storage collisions, and (5) a missing `sleep` creating
  a busy-wait loop.'
expected_findings:
- file: cli/src/commands/start.rs
  line: 667
  summary: "parse_development() called with .unwrap() instead of `?` \u2014 panics\
    \ on error instead of propagating it gracefully, crashing the node with an unhelpful\
    \ message"
  line_side: pre_fix
- file: .ci/devnet_ci.sh
  line: 418
  summary: "Copy-paste bug: client log-printing loop reuses $validator_index variable\
    \ and prints validator log files instead of client logs \u2014 entire client section\
    \ is a duplicate of the validator section above"
  line_side: pre_fix
- file: .ci/bench_p2p_sync.sh
  line: 107
  summary: 'Client started with `--dev 0` which conflicts with validator index space
    (0-39 reserved for validators after PR #4043); needs --dev=$num_validators and
    explicit --node/--rest/--storage flags to avoid port and storage collisions'
  line_side: pre_fix
