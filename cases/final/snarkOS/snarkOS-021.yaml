description: 'When a peer handshake failed, the pending_connections counter was never
  decremented because: (1) no FailHandshake event was emitted from the error path
  in connector.rs, and (2) the Disconnect event''s PeerStatus check was unreliable
  since set_disconnected() was called before the event was sent, making the status
  always Disconnected rather than Connecting. This caused pending_connections to grow
  monotonically, eventually preventing new peer connections and causing peer attrition.'
expected_findings:
- file: network/src/peers/peer/connector.rs
  line: 39
  summary: 'Missing FailHandshake event emission: when inner_connect() fails, no PeerEvent::FailHandshake
    is sent, so pending_connections is never decremented for failed handshakes'
  line_side: pre_fix
- file: network/src/peers/peer_book.rs
  line: 75
  summary: 'Race condition in pending_connections decrement: status check `status
    == PeerStatus::Connecting` is unreliable because set_disconnected() is called
    before the Disconnect event is sent, so status is always Disconnected here'
  line_side: pre_fix
- file: network/src/peers/peer/connector.rs
  line: 104
  summary: 'PeerStatus passed in Disconnect event is stale: set_disconnected() on
    line 99 changes status before the event carrying the old status is sent, creating
    a TOCTOU bug'
  line_side: pre_fix
