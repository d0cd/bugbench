description: The MineContext struct captured block_height and canon_header once at
  construction time, causing the miner to use stale canonical chain state across multiple
  mining iterations. The fix removes these cached fields and instead fetches fresh
  canonical information from storage at the start of each mine_block() call, passing
  the block number explicitly through establish_block() and add_coinbase_transaction().
expected_findings:
- file: consensus/src/miner.rs
  line: 44
  summary: MineContext stores block_height and canon_header as struct fields set once
    during prepare(), causing stale chain state when the canonical chain advances
    between mining iterations
  line_side: pre_fix
- file: consensus/src/miner.rs
  line: 75
  summary: establish_block() reads self.block_height which was cached at construction
    time rather than fetching the current canonical block height from storage
  line_side: pre_fix
- file: consensus/src/miner.rs
  line: 95
  summary: add_coinbase_transaction() uses self.block_height from stale cached state
    instead of the current chain tip height
  line_side: pre_fix
