description: The SQLite migration code incorrectly attempted to carry over previous
  commit state when migrating blocks, which caused migration failures. The fix removes
  the commit state carryover logic from the migration loop, and additionally optimizes
  the block tree fetch and fork scanning into single SQL queries.
expected_findings:
- file: storage/src/migrate.rs
  line: 19
  summary: Migration incorrectly carries over previous commit state for blocks; this
    causes migration to fail or produce corrupt state when upgrading storage
- file: storage/src/storage/sync.rs
  line: 293
  summary: Fork scanning logic is not storage-owned and uses multiple queries instead
    of a single optimized query, leading to inefficiency and incorrect fork detection
- file: storage/src/storage/sqlite/sync.rs
  line: 523
  summary: Block tree fetch uses multiple queries instead of a single SQL query, causing
    performance issues and potential inconsistency in tree construction
