description: Block synchronization stalled when processing large blocks because block
  handling was performed synchronously on the router's main task, blocking progress.
  The fix adds the rayon dependency and offloads heavy block processing to a parallel
  thread pool, preventing the sync pipeline from being blocked by large blocks.
expected_findings:
- file: node/src/client/router.rs
  line: 115
  summary: Block processing is done synchronously via self.clone() on the main task;
    large blocks will block the entire sync pipeline. Should offload to a rayon/spawn_blocking
    thread pool.
  line_side: pre_fix
- file: node/src/validator/router.rs
  line: 111
  summary: Same synchronous block processing pattern as client router; large blocks
    block the validator's sync progress.
  line_side: pre_fix
