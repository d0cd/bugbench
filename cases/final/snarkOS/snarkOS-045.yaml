description: MineContext cached block_height and canon_header at construction time,
  causing all subsequent mining iterations to use stale blockchain state. The fix
  removes these cached fields and instead fetches fresh canon information (block height
  and header) at the start of each mine_block call, ensuring the miner always works
  with the current chain tip.
expected_findings:
- file: consensus/src/miner.rs
  line: 47
  summary: MineContext stores block_height and canon_header as struct fields set once
    at construction. These become stale across mining iterations, causing the miner
    to build blocks on outdated chain state.
  line_side: pre_fix
- file: consensus/src/miner.rs
  line: 75
  summary: add_coinbase_transaction uses self.block_height (cached at init) for the
    coinbase block number instead of fetching the current canon height, producing
    transactions with incorrect block numbers after the first iteration.
  line_side: pre_fix
- file: consensus/src/miner.rs
  line: 95
  summary: establish_block does not accept a current block_number parameter, propagating
    the stale cached height through to coinbase transaction creation.
  line_side: pre_fix
- file: consensus/src/miner.rs
  line: 44
  summary: Miner struct caches consensus state at construction; mining loop will use
    stale canon height instead of fetching fresh chain tip each iteration
  line_side: pre_fix
- file: consensus/tests/consensus_dpc.rs
  line: 40
  summary: "Canon height fetched once outside the mining loop \u2014 should be re-queried\
    \ each iteration to reflect new blocks"
  line_side: pre_fix
- file: testing/src/mining/mod.rs
  line: 31
  summary: 'Stale canon height: `miner.consensus.storage.canon().await` is called
    once rather than refreshed per mining iteration'
  line_side: pre_fix
