description: TransmissionID lacked a checksum field, allowing malicious validators
  to submit malformed solutions or transactions that would be accepted by peers without
  integrity verification. The fix adds a TransmissionChecksum to TransmissionID variants
  and enforces checksum validation on all incoming peer transmissions across the BFT
  consensus layer.
