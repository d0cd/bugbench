pr_title: '[Fix] Add checksum to `TransmissionID`'
pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your changes.\
  \ Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR is the sister PR of\
  \ https://github.com/AleoNet/snarkVM/pull/2521, which introduces the `TransmissionChecksum`\
  \ and adds additional solution guards during block creation. In the snarkOS world,\
  \ additional checks are added to enforce that incoming peer transmissions have the\
  \ correct `TransmissionChecksum`. This prevents malicious validators from performing\
  \ a malformed solution/transaction attack.\r\n\r\nThe CI is run [here](https://app.circleci.com/pipelines/github/ProvableHQ/snarkOS?branch=fix%2Ftransmission-checksum-ci).\r\
  \n\r\n## Related PRs\r\n\r\nhttps://github.com/AleoNet/snarkVM/pull/2521\r\n"
