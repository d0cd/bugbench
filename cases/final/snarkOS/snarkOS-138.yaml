description: After calling advance_to_next_block(), the ledger's latest_epoch_number()
  already reflects the new epoch. Comparing block.epoch_number() > self.ledger.latest_epoch_number()
  is therefore always false, so stale solutions are never cleared on epoch boundaries.
  The fix is to capture the previous epoch number before advancing the ledger.
expected_findings:
- file: node/consensus/src/lib.rs
  line: 150
  summary: 'Epoch staleness check is dead code: advance_to_next_block() updates the
    ledger before this comparison, so block.epoch_number() can never exceed latest_epoch_number().
    Capture the old epoch number before advancing.'
  line_side: pre_fix
