description: The BFT sync module failed to update the sync height after completing
  a long-range (non-BFT) block sync, causing the node to redundantly re-request blocks
  it had already received. Additionally, a race condition allowed premature switching
  to BFT sync when the node was still more than GC blocks behind, if a new block arrived
  immediately after a non-BFT sync round completed.
