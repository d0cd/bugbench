description: Transmissions were being tracked in the metrics `transmissions_tracker`
  even when they failed to be added to the mempool (e.g., duplicate or invalid transactions).
  This caused stale transmission metrics to accumulate for transactions that were
  never actually in the mempool. The fix moves the tracking call to only execute after
  a successful mempool insertion, and adds clarifying comments and stale-age constants
  in the metrics module.
expected_findings:
- file: node/consensus/src/lib.rs
  line: 372
  summary: Transmission is tracked in transmissions_tracker before confirming it was
    successfully added to the mempool. The tracking call should only happen after
    the mempool insertion succeeds, otherwise rejected transactions are incorrectly
    tracked in metrics.
  line_side: pre_fix
- file: node/consensus/src/lib.rs
  line: 384
  summary: 'Same issue: metrics tracking of the transmission occurs unconditionally
    rather than being gated on successful mempool addition.'
  line_side: pre_fix
