description: The ToBytes implementation for EventOrBytes<N> in the BFT event codec
  was incorrect, causing serialization/deserialization roundtrip property tests to
  fail. The fix corrects the byte encoding logic in codec.rs and updates the proptest
  assertion in primary_ping.rs to properly validate the roundtrip.
