description: The longest_child_path implementation used an application-level HashMap
  cache (block_children_cache) that required repeated round-trips to the database
  for each tree level, leading to poor performance. The fix replaces it with a single
  recursive SQL CTE query and also corrects an off-by-one error in the canon hash
  fetch (OLDEST_FORK_THRESHOLD + 1 should be just OLDEST_FORK_THRESHOLD).
expected_findings:
- file: storage/src/storage/sync.rs
  line: 131
  summary: Cache-based longest_child_path iterates level-by-level with get_block_children
    calls and an unreliable app-level cache; should be replaced with a single recursive
    database query for correctness and performance
  line_side: pre_fix
- file: consensus/src/consensus/inner/mod.rs
  line: 68
  summary: 'Off-by-one: get_block_hashes called with OLDEST_FORK_THRESHOLD + 1 fetches
    one extra block beyond the intended threshold; should be just OLDEST_FORK_THRESHOLD'
  line_side: pre_fix
- file: storage/src/storage/sqlite/sync.rs
  line: 158
  summary: insert_block eagerly populates block_children_cache but this cache can
    become stale and is never invalidated on block removal, risking incorrect fork
    resolution
  line_side: pre_fix
