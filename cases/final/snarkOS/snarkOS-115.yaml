description: The logger setup code in snarkOS attempts to create/open a log file without
  first ensuring that the parent directories exist. If the configured log file path
  contains intermediate directories that haven't been created yet, the file creation
  fails. The fix adds a call to recursively create the parent directories (e.g., `std::fs::create_dir_all`)
  before opening the log file.
expected_findings:
- file: cli/src/helpers/logger.rs
  line: 51
  summary: 'Missing `create_dir_all` for log file parent directories: if the log path
    includes non-existent intermediate directories, file creation will fail with a
    ''No such file or directory'' error.'
