pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your changes.\
  \ Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThere was a bug when loading\
  \ the ledger from the disk where the node panic with something like this:\r\n\r\n\
  ```\r\n2021-12-10T08:15:42.383837Z DEBUG Validating the ledger up to block 501 (100%)\r\
  \nthread 'main' panicked at 'assertion failed: `(left == right)`\r\n  left: `AleoLocator\
  \ { hrp: \"al\", data: Fp256(2180413841631221483869035365579606912076225239550174444205460207040035170284)\
  \ }`,\r\n right: `AleoLocator { hrp: \"al\", data: Fp256(6625747389475706972641387426803392449301567419990991643240503084430759780944)\
  \ }`', /Users/MrX/src/snarkOS/storage/src/state/ledger.rs:212:9\r\nnote: run with\
  \ `RUST_BACKTRACE=1` environment variable to display a backtrace\r\n```\r\n\r\n\
  After observing many logs I thought this might be related to the local ledger length:\
  \ the ledger having `n * 501 + 1` blocks.\r\n\r\nAfter debugging, it seems it is\
  \ exactly the case:\r\n\r\nSay we have a ledger with 502 blocks (0 - 501). The first\
  \ batch loads blocks 0-500, and\r\n\r\nhttps://github.com/AleoHQ/snarkOS/blob/dad0f8a6318c8133b4a87217bb9da488bfc50218/storage/src/state/ledger.rs#L191\r\
  \n\r\nwill set the start block of the next batch to 501. However:\r\n\r\nhttps://github.com/AleoHQ/snarkOS/blob/dad0f8a6318c8133b4a87217bb9da488bfc50218/storage/src/state/ledger.rs#L149\r\
  \n\r\n`501 == 501` so the last block will not get loaded. Fortunately,\r\n\r\nhttps://github.com/AleoHQ/snarkOS/blob/dad0f8a6318c8133b4a87217bb9da488bfc50218/storage/src/state/ledger.rs#L210-L212\r\
  \n\r\nactually caught this error and panicked.\r\n\r\nThis PR made the ledger able\
  \ to load that final block when starting.\r\n\r\n\r\n## Test Plan\r\n\r\n<!-- If\
  \ you changed any code, please provide us with clear instructions on how you verified\
  \ your changes work. -->\r\n\r\nI prepared two local ledgers with 500 and 501 blocks\
  \ and tested the new code against both ledger to make sure it still works.\r\n\r\
  \n## Related PRs\r\n\r\n<!--\r\n    If this PR adds or changes functionality,\r\n\
  \    please take some time to update the docs at https://github.com/AleoHQ/snarkOS,\r\
  \n    and link to your PR here.\r\n-->\r\n\r\nNone\r\n"
