description: Off-by-one boundary error in ledger block loading. When the ledger contains
  exactly n*501+1 blocks (one block past a batch boundary), the final block is not
  loaded during validation, causing a panic due to a block hash mismatch assertion.
  The fix corrects the loop boundary conditions in three while-loops that iterate
  over block batches.
expected_findings:
- file: storage/src/state/ledger.rs
  line: 146
  summary: 'Off-by-one in batch loop: `while start_block_height <= latest_block_height`
    skips the last block when it falls exactly one past a batch boundary; the loop''s
    end-of-batch calculation excludes the final partial batch of size 1'
  line_side: pre_fix
- file: storage/src/state/ledger.rs
  line: 161
  summary: 'Same batch-boundary off-by-one: loop condition `while start_block_height
    <= latest_block_height` fails to process the last block when ledger length is
    n*BATCH_SIZE+1'
  line_side: pre_fix
- file: storage/src/state/ledger.rs
  line: 190
  summary: 'Same batch-boundary off-by-one in third validation loop: last block is
    not loaded when it sits exactly at the batch boundary, leading to assertion failure
    on block locator mismatch'
  line_side: pre_fix
