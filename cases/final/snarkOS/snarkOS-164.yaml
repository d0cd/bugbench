description: 'PR #3681 introduced a PendingBlocks feature in the BFT sync and worker
  modules that caused halting/liveness failures during stress testing. The issue stems
  from the tight coupling between snarkOS PendingBlocks logic and corresponding snarkVM
  changes; when the snarkVM side was reverted due to the halting problems, the snarkOS
  feature became incompatible. This revert removes the PendingBlocks machinery to
  restore node liveness.'
