  summary: 'PendingBlocks integration in BFT sync introduces halting risk: the sync
    loop can stall under load when pending block handling interacts with authority/certificate
    processing'
  line_side: pre_fix
- file: node/bft/src/worker.rs
  line: 560
  summary: Transaction handling changes tied to PendingBlocks can cause the worker
    to halt when pending block queue backs up under stress
  line_side: pre_fix
