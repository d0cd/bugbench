description: A deadlock occurs in `insert_block_response` because a write lock on
  the `responses` map is held while calling `remove_block_requests_to_peer`, which
  internally attempts to acquire another lock (likely on the requests map). The fix
  explicitly drops the `responses` write lock before making the nested call.
expected_findings:
- file: node/bft/src/primary.rs
  line: 273
  summary: propose_batch holds a re-entrancy lock (propose_lock) but process_batch_propose_from_peer
    and process_batch_signature_from_peer were spawned as concurrent tasks, creating
    potential deadlocks when they try to access shared state (proposed_batch, signed_proposals)
    concurrently with the proposal path
  line_side: pre_fix
- file: node/bft/src/primary.rs
  line: 531
  summary: signed_proposals cache stores the signature and uses a write lock with
    complex entry logic, but the batch propose handler was spawned in a separate task
    (line ~992), meaning multiple concurrent handlers could race on the signed_proposals
    write lock and proposed_batch, risking deadlock with the propose_batch lock
  line_side: pre_fix
- file: node/bft/src/primary.rs
  line: 992
  summary: process_batch_propose_from_peer is spawned in a separate tokio task, allowing
    concurrent execution that can deadlock when multiple batch proposals try to acquire
    locks on signed_proposals and proposed_batch simultaneously
  line_side: pre_fix
