pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your changes.\
  \ Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR drops the `responses`\
  \ lock in `insert_block_response` before the `remove_block_requests_to_peer` call\
  \ to prevent  a deadlock condition where the `response.write()` is called before\
  \ the previous lock was released.\r\n"
