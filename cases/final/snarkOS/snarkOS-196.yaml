description: Corrupt or invalid blocks were being fast-forwarded during sync, causing
  chain integrity issues. The fix adds a guard in the consensus agent to check for
  empty canon results before proceeding with block commits, and adjusts the sync master
  logic to properly handle forks of interest. A `max-head` CLI option was also added
  for storage trimming as a debugging aid.
