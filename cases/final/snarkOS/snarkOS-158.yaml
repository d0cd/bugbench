description: The recursive CTE `total_tip` in `longest_child_path` was seeded with
  the wrong column (`preferred_tip.sub` instead of `preferred_tip.parent`) and an
  off-by-one initial remaining count (`length - 1` instead of `length`), causing the
  function to return an incorrect block chain path. The final SELECT also incorrectly
  used a UNION with `preferred_tip` rows, further corrupting the result.
expected_findings:
- file: src/network/ledger.rs
  line: 238
  summary: Unconfirmed blocks are keyed by previous_block_hash but removed using block.hash(),
    so the lookup never finds the entry and the forked block is never actually removed
    from the map
  line_side: pre_fix
- file: src/network/ledger.rs
  line: 400
  summary: 'Same bug in add_block success path: contains_key and remove use block.hash()
    instead of block.previous_block_hash(), failing to clean up the unconfirmed_blocks
    map'
  line_side: pre_fix
- file: src/network/ledger.rs
  line: 460
  summary: 'Same bug in fork-removal loop: removed blocks are looked up by hash()
    instead of previous_block_hash(), leaving stale entries in unconfirmed_blocks'
  line_side: pre_fix
