description: The `snarkos developer execute` command only accepted private keys as
  plaintext CLI arguments via `--private-key`, risking exposure in shell history and
  process listings. The fix adds a `--private-key-file` flag that reads the private
  key from a file, reducing cleartext exposure in production and troubleshooting environments.
