description: The BFT consensus layer processes incoming batch certificates by recursively
  fetching all previous certificates before validating the incoming one. A malicious
  peer can craft a chain of certificates with non-decreasing rounds, causing infinite
  recursive fetching that crashes the validator via resource exhaustion. The fix adds
  an early validity check (quorum threshold and committee membership) before the recursive
  sync call.
expected_findings:
- file: node/bft/src/primary.rs
  line: 955
  summary: 'Missing certificate validation before recursive fetch: sync_with_certificate_from_peer
    is called without first checking that the certificate has valid quorum and committee
    membership, enabling a DoS attack via malformed certificate chains'
  line_side: pre_fix
- file: node/bft/src/helpers/storage.rs
  line: 494
  summary: sync_with_certificate_from_peer recursively fetches previous certificates
    from untrusted input without any upfront validation of the incoming certificate's
    signers or quorum
  line_side: pre_fix
