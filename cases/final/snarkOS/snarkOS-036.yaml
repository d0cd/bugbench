description: PedersenCRH was hashing elliptic curve points using projective coordinates
  instead of affine coordinates, which are non-unique representations and produce
  incorrect/non-deterministic hash outputs. Additionally, the Merkle tree used hardcoded
  `[0u8; 128]` buffers instead of proper serialization via `ToBytes`, causing incorrect
  padding and potential hash collisions. The fix also migrates the tree parameterization
  from HEIGHT to DEPTH convention for correctness.
expected_findings:
- file: algorithms/src/crh/pedersen.rs
  line: 47
  summary: "PedersenCRH hashes elliptic curve points in projective coordinates, which\
    \ are not unique representations \u2014 two equal points can have different projective\
    \ coords, producing different hashes. Must convert to affine before hashing."
  line_side: pre_fix
- file: algorithms/src/merkle_tree/merkle_tree.rs
  line: 73
  summary: Merkle tree node hashing uses hardcoded `[0u8; 128]` buffer instead of
    proper `ToBytes` serialization, causing incorrect padding and potential hash collisions
    for inputs shorter or longer than 128 bytes.
  line_side: pre_fix
- file: algorithms/src/merkle_tree/merkle_path.rs
  line: 54
  summary: Merkle path verification uses the same hardcoded `[0u8; 128]` buffer pattern
    for hashing, inconsistent with actual node sizes and causing incorrect proof verification
    for certain inputs.
  line_side: pre_fix
