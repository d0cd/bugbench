description: Nodes would recursively fetch missing certificates from peers even while
  syncing via blocks. The bug was a missing `is_synced` guard check in the certificate
  fetching path, causing nodes to enter a wasteful cycle of requesting certificates
  instead of focusing on block sync. The fix adds an `is_synced` check to short-circuit
  recursive certificate fetching when the node should be syncing via blocks.
expected_findings:
- file: node/bft/src/sync/mod.rs
  line: 557
  summary: 'Missing `is_synced` guard: recursive certificate fetching proceeds even
    when the node is not synced and should be syncing via blocks instead'
- file: node/sync/src/block_sync.rs
  line: 453
  summary: The `is_block_synced` state update logic may momentarily report the node
    as synced, allowing certificate fetching to trigger before block sync completes
