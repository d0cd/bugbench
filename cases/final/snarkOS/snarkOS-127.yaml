pr_title: Don't count miner termination as failures
pr_body: "The node's miner stops attempting to mine after 10 failures; however, miner\
  \ termination due to the node receiving a canon block is currently counted as a\
  \ failure too, even though it's expected to happen regularly and shouldn't contribute\
  \ to that counter.\r\n\r\nThis should fix https://github.com/AleoHQ/snarkOS/issues/1177."
