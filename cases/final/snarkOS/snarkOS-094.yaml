description: The `commit_leader_certificate` function performed garbage collection
  during bootup sync, when it should only run GC during actual BFT consensus. GC during
  bootup can block commits from being processed, stalling the node's ability to catch
  up with the network. The fix gates garbage collection on whether the node is in
  active consensus versus bootup sync.
