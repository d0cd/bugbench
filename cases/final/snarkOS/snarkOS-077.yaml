description: The challenge request deserialization strictly required a 40-byte snarkOS
  commit hash via `<[u8; 40]>::read_le`, causing handshake failures with peers that
  omit or send an invalid commit hash. The fix makes the commit hash field optional
  during deserialization so that connections succeed even when the field is absent
  or malformed.
expected_findings:
- file: node/bft/events/src/challenge_request.rs
  line: 60
  summary: Strict deserialization of snarkos_sha as `<[u8; 40]>::read_le` will fail
    and reject the entire handshake if the peer does not send a commit hash. Should
    handle missing/invalid hash gracefully instead of propagating the read error.
  line_side: pre_fix
- file: node/router/messages/src/challenge_request.rs
  line: 59
  summary: Same strict `<[u8; 40]>::read_le` deserialization for snarkos_sha in the
    router message variant. Missing or short data from peers that don't send a commit
    hash will cause handshake rejection.
  line_side: pre_fix
