pr_title: '[Fix] Allow handshake with peers that do not send commit hash'
pr_body: "When testing local builds, I noticed I wasn't able to connect to some canary\
  \ bootstrap peers because they are not sending the snarkOS commit hash.\r\n\r\n\
  This PR ensures handshake still succeed if no, or an invalid, commit hash is sent.\
  \ We can reject such connections in the future, but, as of now, there are still\
  \ too many nodes that do not send it."
