description: When a validator node's local block height exceeds the CDN height, the
  CDN sync function returned an error that was misinterpreted as storage corruption,
  causing a panic. The fix changes the early-return path to return the completed height
  as Ok() instead of propagating an error, since being ahead of the CDN is a normal
  condition, not corruption.
expected_findings:
- file: node/cdn/src/blocks.rs
  line: 72
  summary: When start_height > CDN height, this returns an error that propagates as
    a 'storage corruption' panic. Should return Ok(completed_height) instead, since
    the node being ahead of CDN is not an error condition.
  line_side: pre_fix
