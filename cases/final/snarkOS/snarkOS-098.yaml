pr_title: Fixes an erroneous message when the validator is ahead
pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your changes.\
  \ Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR fixes an erroneous\
  \ `error!` message when the validator boots up and is ahead of the CDN.\r\n```\r\
  \n2022-11-30T23:16:32.771608Z  WARN The given start height (124429) must be less\
  \ than the CDN height (124400)\r\n2022-11-30T23:16:32.771680Z ERROR Storage corruption\
  \ detected! Run `snarkos clean` to reset storage\r\nthread 'main' panicked at 'Failed\
  \ to parse the node: The given start height (124429) must be less than the CDN height\
  \ (124400)', cli/src/commands/start.rs:103:67\r\n```\r\n\r\nThe error message triggers\
  \ when the validator is ahead of the CDN. In this case, there is no corruption to\
  \ storage, and the error message should not trigger.\r\n\r\n"
pr_commit_messages:
