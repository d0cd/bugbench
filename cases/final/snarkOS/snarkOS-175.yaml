description: The `on_connect` implementations across gateway and router files used
  the raw peer connection address instead of resolving it to the peer's listener address.
  When a peer initiates a connection, the connection address differs from the listener
  address, causing pings to be sent to the wrong address and breaking peer communication.
  The fix adds `resolve_to_listener()` calls to correctly map connection addresses
  to listener addresses.
expected_findings:
- file: node/bft/src/gateway.rs
  line: 1193
  summary: Using raw `peer_addr` without resolving to listener address; when the peer
    initiated the connection, `peer_addr` is the ephemeral connection address, not
    the listener address. Should use `resolve_to_listener(&peer_addr)` to get the
    correct address for sending pings.
- file: node/src/client/router.rs
  line: 65
  summary: Using raw `peer_addr` without resolving to listener address via `self.router().resolve_to_listener(peer_addr)`.
    Pings will be sent to the wrong address when the peer initiated the connection.
- file: node/src/prover/router.rs
  line: 60
  summary: Using raw `peer_addr` without resolving to listener address via `self.router().resolve_to_listener(peer_addr)`.
    Same bug pattern as in client and validator routers.
- file: node/src/validator/router.rs
  line: 66
  summary: Using raw `peer_addr` without resolving to listener address via `self.router().resolve_to_listener(peer_addr)`.
    Same bug pattern across all router implementations.
