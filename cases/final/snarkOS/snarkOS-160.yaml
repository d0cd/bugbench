pr_title: Update syncing logic to fix duplicate block requests
pr_body: "## Motivation\r\n\r\nAs issue #3404 described, validators send out duplicate\
  \ block requests when syncing. This PR updates the syncing logic to make sure we\
  \ only remove a block response after it was added to the ledger or if we encountered\
  \ an error.\r\n\r\nFor background, currently, syncing works as follows: `BlockSync`\
  \ requests the blocks, and stores it in the internal `responses` map. `Sync` calls\
  \ `block_sync.process_next_block(current_height)` to get the next block to process.\
  \ This removes it from `BlockSync`\u2019s `responses` and returns it to `Sync`.\
  \ `Sync` performs the checks, and if successful, adds the block to the `ledger`.\
  \ This also updates BlockSync\u2019s `canon`.\r\n\r\nThe issue is that `BlockSync`\u2018\
  s view of the `canon` is only updated after `Sync` is done processing blocks (and\
  \ adding to the ledger). There\u2019s a window where `BlockSync` is unaware of blocks\
  \ that are pending validation in `Sync`. Thus, it re-requests them.\r\n\r\nThis\
  \ PR adjusts the block processing interface to the `Sync` module as follows:\r\n\
  * `process_next_block` READS a block from a particular height\r\n* `remove_block_response`\
  \ REMOVES a block from a particular height, which MUST be called after advancing\
  \ completed or failed\r\n\r\nNote: in the latest commit, `process_next_block` was\
  \ renamed to `peek_next_block`, following the reviewer discussion.\r\n\r\n## Test\
  \ Plan\r\n\r\nRan it locally and verified it removes the duplicate block request.\r\
  \nAlso ran it with light load in a cloud devnet, and verified syncing works for\
  \ validators and clients.\r\n\r\nThe following figure shows a syncing process before\
  \ the fix, with a longer pause until a duplicate request is generated:\r\n![syncing_not_fixed](https://github.com/user-attachments/assets/3ed9c893-a7c8-4a0e-a857-f639506c7370)\r\
  \n\r\nThe following figure shows the syncing process with the fix (note there is\
  \ no double request and no delay, as such, the syncing is much faster):\r\n![syncing_fixed](https://github.com/user-attachments/assets/30b12a9a-a349-4f11-929d-40de47960587)\r\
  \n\r\nCloses #3404"
