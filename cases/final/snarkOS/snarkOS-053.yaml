description: 'After PR #3163 introduced stricter peering rules requiring validators
  to only connect to trusted peers, the test helper for constructing a validator router
  was still passing `false` for the allow-external-connections parameter. This caused
  router tests to flake because test peers were not in the validator''s trusted set,
  so connections would be rejected. The fix sets the parameter to `true` so validators
  in tests can connect to any peer.'
