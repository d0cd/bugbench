description: The `--seed` flag on the `account sign` command allowed users to seed
  the nonce used in signatures, which is cryptographically insecure. Reusing or sharing
  signature nonces can lead to private key recovery. The fix removes the `--seed`
  flag entirely from the sign command to prevent accidental use of this insecure functionality.
expected_findings:
- file: cli/src/commands/account.rs
  line: 65
  summary: 'Security: The `--seed` parameter on the sign command allows users to seed
    signature nonces, which is cryptographically insecure and can lead to private
    key compromise if nonces are reused.'
- file: cli/src/commands/account.rs
  line: 119
  summary: 'Security: The sign function uses the user-provided seed to deterministically
    generate a nonce for the signature. Signature nonces must be random and never
    reused; deterministic/seeded nonces enable private key recovery attacks.'
