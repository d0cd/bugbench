pr_title: '[Fix] Harden the router''s resolver'
pr_body: "While investigating a potential issue with some trusted peers being periodically\
  \ dropped, I've noticed a lot of instances of `Unable to resolve the (...) address`\
  \ in the log extracts from different networks. I believe most of them are triggered\
  \ unnecessarily, but we need to be sure, and this PR aims to address this.\r\n\r\
  \nThe proposed changes are as follows:\r\n- 1e8dc493916cce871686dcdb71bc1db2b6d3091a\
  \ - changes the dual-lock setup of the resolver to a single-lock one in order to\
  \ avoid any possibility of mismatch between the address maps; it should also slightly\
  \ improve its performance\r\n- 260e84bc2d9949e53c4beaa270c905834859c711 - the `inbound`\
  \ method is \"fed\" from a lower-level queue which doesn't have an awareness of\
  \ the address resolver, so the entries that fail to resolve there are basically\
  \ guaranteed to be post-disconnect \"stragglers\" and may be ignored (instead of\
  \ triggering potentially many redundant disconnect attempts, which result in further\
  \ resolver-related warnings)\r\n- 6bb8a74b95149d4df04033586e6e0237d6de21fe - this\
  \ swaps the order of disconnect-related operations, altering the resolver only after\
  \ a peer is no longer marked as connected; this will avoid situations where an outbound\
  \ message is greenlit to be sent to a peer (who is marked as connected) only to\
  \ fail at address resolution right afterwards, triggering a bogus warning\r\n- bccf29a99753eaf4e1b204666e7051651451677a\
  \ - this is a loosely-related drive-by; we should clear any peer-related cache before\
  \ marking them as a candidate for connections, in order to avoid a (highly unlikely)\
  \ scenario where the peer is reconnected to while having outdated cache entries,\
  \ or even having new and applicable cache entries cleared\r\n- 7ee66b44d318dc1363f633cd4ce8052958c89d92\
  \ - when a peer sends us a `Message::Disconnect`, we shouldn't report it as a protocol\
  \ violation; this is mostly a cleanup of one or two misleading logs\r\n- b673d7b1b8ccd9ce49f8202a3056674341f5dc2c\
  \ - since I've seen some instances of the heartbeat process reporting lingering\
  \ inactive peers, we should have a fallback cleanup of high-level connection artifacts\
  \ in case the resolver can't find the physically connected address\r\n\r\nUpdate:\
  \ the PR was rebased due to a conflict, and while these commit hashes have changed,\
  \ their contents or order haven't."
pr_commit_messages:
- 'fix: ensure that the resolver''s maps may only be modified in tandem'
- "logs: no longer WARN if queued messages can no longer be attributed t\u2026"
- 'fix: remove connected peer entries before the resolver ones'
- "fix: clear peer cache entries before re-registering it as a candidate\u2026"
- "fix: don't report protocol violation when a peer performs a clean dis\u2026"
- 'fix: perform a fallback connection artifact cleanup if necessary'
- 'api: make the return value of Inbound::inbound more meaningful'
- 'logs: add a TRACE log whenever an inbound message is dropped'
- "fix: hold the write guards for longer when inserting/removing connect\u2026"
- 'cleanup: remove Resolver::new (in favor of Default::default)'
- 'docs: add a doc comment for the Resolver'
- 'api: reduce the visibility of the Resolver'
- "Revert \"fix: hold the write guards for longer when inserting/removing\u2026"
