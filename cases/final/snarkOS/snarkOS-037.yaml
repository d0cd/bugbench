description: When recursively fetching imported programs, the code fetched the latest
  edition only for the top-level program and then passed that same edition value down
  to all recursive import loads. Each imported program has its own independent edition
  number, so reusing the top-level edition causes programs to be loaded with incorrect
  editions, leading to potential runtime failures or wrong program versions being
  executed.
expected_findings:
- file: cli/src/commands/developer/execute.rs
  line: 158
  summary: Edition is fetched once for the top-level program_id but then passed into
    load_program which recursively loads all imports with this same edition value.
    Each imported program needs its own edition lookup.
  line_side: pre_fix
- file: cli/src/commands/developer/execute.rs
  line: 242
  summary: 'load_program accepts a single `edition: u16` parameter instead of an endpoint,
    preventing it from looking up the correct edition for each program it processes
    recursively.'
  line_side: pre_fix
- file: cli/src/commands/developer/execute.rs
  line: 257
  summary: Recursive call to load_program passes the parent's edition to child imports,
    causing all nested imports to use the top-level program's edition rather than
    their own.
  line_side: pre_fix
