pr_title: '[Fix] Use correct edition when recursively fetching programs'
pr_body: "This PR replaces #4002 and fixes #3758.\r\n\r\n### Changes\r\n* [83757e8](https://github.com/ProvableHQ/snarkOS/pull/4037/commits/83757e887b8bf2f9cef5fb91fea3b030e0082e27)\
  \ ensure the correct edition for each import is fetched. The current behavior only\
  \ fetches the latest edition for the top-level program and then incorrectly reuses\
  \ that value.\r\n*  [c74b12d](https://github.com/ProvableHQ/snarkOS/pull/4037/commits/c74b12d9e240d242a08c56c5e6c4b10314b49d4e)\
  \ improves a doc comment.\r\n* [7ba6481](https://github.com/ProvableHQ/snarkOS/pull/4037/commits/7ba6481aee92e2764c1fba54748c0df92e2aa576)\
  \ changes the default endpoint/base_url to `https://api.explorer.provable.com/v2/`.\
  \ The `v2` component is needed (otherwise the explorer returns a 404 error) and\
  \ refers to the explorer version, not the snarkOS API version.\r\n* [2db8047](https://github.com/ProvableHQ/snarkOS/pull/4037/commits/2db8047e32ca9b93728a1039d55f0ad12100d0b0)\
  \ adds a new flag `--skip-funds-check`, so you can test these changes without requiring\
  \ actual funds in your account. This flag is only intended for testing purposes\
  \ and marked as hidden.\r\n\r\n### Testing\r\nEnsure the following works to verify\
  \ the correctness of these changes:\r\n```\r\n~> snarkos developer execute --private-key\
  \ APrivateKey1zkp8CZNn3yeCseEtxuVPbDCwSyhGW6yZKUYKfgXmcpoGPWH \\\r\n    token_registry.aleo\
  \ transfer_public 1field \\\r\n    aleo1rhgdu77hgyqd3xjj8ucu3jj9r2krwz6mnzyd80gncr5fxcwlh5rsvzp9px\
  \ 1000u128 \\\r\n    --broadcast https://api.explorer.provable.com/v1/mainnet/transaction/broadcast\
  \ --skip-funds-check\r\n\r\n\U0001F4E6 Creating execution transaction for 'token_registry.aleo/transfer_public'...\r\
  \n\u2705 Created execution transaction for 'token_registry.aleo/transfer_public'\r\
  \n\u231B Execution at1n73ffv5eewcnkfkfd7acyyaslnwvrjnewygu9wxudufev4veeqyq2juge7\
  \ ('token_registry.aleo/transfer_public') has been broadcast to https://api.explorer.provable.com/v1/mainnet/transaction/broadcast.\r\
  \nat1n73ffv5eewcnkfkfd7acyyaslnwvrjnewygu9wxudufev4veeqyq2juge7```"
