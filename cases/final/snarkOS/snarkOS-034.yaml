description: In `fetch_missing_certificates`, the function returns early without results
  if all certificate IDs already exist in the `unprocessed_certificate` cache. This
  causes the validator to never finish processing when all missing certificates arrive
  via other channels (e.g., `process_batch_certificate_from_peer`) before the fetch
  completes. The fix ensures cached certificates are returned when there are no remaining
  certificates to fetch from the network.
expected_findings:
- file: node/bft/src/primary.rs
  line: 1697
  summary: Early return logic in fetch_missing_certificates ignores certificates already
    present in the unprocessed_certificate cache, causing the function to return empty-handed
    when all certificates were received from other sources before the network fetch.
- file: node/bft/src/sync/mod.rs
  line: 628
  summary: Related fetch/sync logic that does not account for certificates already
    cached in unprocessed_certificate, contributing to the early termination without
    returning available certificates.
