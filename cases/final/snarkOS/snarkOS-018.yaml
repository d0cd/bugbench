id: snarkOS-018
repo: ProvableHQ/snarkOS
base_commit: 1cd070fc0752cd1c74ad3f2522e5fd9fd6e4912e^
head_commit: 770c8b63cb5d5040c038296bc27e7066179b868e
fix_commit: 1cd070fc0752cd1c74ad3f2522e5fd9fd6e4912e
category: code-smell
difficulty: medium
severity: medium
language: rust
pr_size: small
description: The PR switches the default storage backend from RocksDB to SQLite, removing
  the feature-gated `sqlite` option and making SQLite unconditional. However, the
  RocksDB code is left as a commented-out block rather than deleted, and the validator
  guard now permanently blocks `--validate-storage` since SQLite is the only backend
  and the validator was never implemented for it.
expected_findings:
- file: Cargo.toml
  line: 4
  summary: Storage backend defaults to RocksDB via feature flag instead of SQLite,
    requiring a feature-gated sqlite option rather than making SQLite the unconditional
    default
  line_side: pre_fix
- file: Cargo.toml
  line: 116
  summary: Dev profile uses aggressive optimization (opt-level 3, lto thin) which
    is inappropriate for development builds, slowing down compile times unnecessarily
  line_side: pre_fix
- file: ledger/Cargo.toml
  line: 67
  summary: Default storage backend hardcoded to RocksDB via `default = ["rocks"]`
    feature flag; the switch to SQLite requires removing this RocksDB default
  line_side: pre_fix
- file: ledger/src/state/ledger.rs
  line: 310
  summary: Block locator validation in check_block_locators has critical checks commented
    out (block height decrementing, block hash verification, block header verification),
    making the function a no-op that accepts invalid locators
  line_side: pre_fix
- file: ledger/src/lib.rs
  line: 25
  summary: Old ledger module directly exported a tightly-coupled storage backend (pub
    mod storage), which was replaced by the new sync/network architecture that decouples
    storage concerns
  line_side: pre_fix
- file: src/network/mod.rs
  line: 17
  summary: Old network module had direct coupling to ledger internals (LedgerRequest,
    LedgerRouter) rather than going through a proper sync abstraction layer
  line_side: pre_fix
- file: src/lib.rs
  line: 17
  summary: Monolithic crate root with all modules declared inline in src/lib.rs, replaced
    during restructuring into subcrates (snarkos/, rpc/, parameters/, profiler/)
  line_side: pre_fix
- file: run-miner.sh
  line: 3
  summary: Hardcoded miner address in shell script exposes a specific Aleo address
    and uses an inflexible restart loop pattern
  line_side: pre_fix
- file: src/network/server.rs
  line: 44
  summary: Storage backend hardcoded to RocksDB instead of SQLite - the server uses
    RocksDB directly (rocksdb::RocksDB) for both the ledger initialization and RPC
    server, but the PR switches the default to SQLite, meaning this RocksDB usage
    should have been replaced
  line_side: pre_fix
- file: storage/Cargo.toml
  line: 7
  summary: Default features still include rocksdb_storage alongside sqlite_storage,
    and the sqlite feature is gated behind an optional flag rather than being the
    unconditional default, leaving dead/commented-out RocksDB code paths
  line_side: pre_fix
- file: storage/src/storage/sqlite/sync.rs
  line: 481
  summary: SQL column name typo 'tranasction_id' instead of 'transaction_id' in get_transaction_location
    JOIN clause, causing runtime SQL error whenever transaction locations are queried
  line_side: pre_fix
- file: storage/src/storage/sqlite/sync.rs
  line: 895
  summary: "validate() is unimplemented!() in the SQLite SyncStorage impl \u2014 since\
    \ SQLite is now the sole backend (RocksDB removed), --validate-storage will always\
    \ panic at runtime"
  line_side: pre_fix
