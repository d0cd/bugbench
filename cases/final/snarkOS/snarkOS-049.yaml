description: The initial block sync time estimate became inaccurate after a node restart
  mid-sync because elapsed time was divided by the absolute block height (from zero)
  rather than the number of blocks synced since restart. The fix computes average
  ms/block using the height differential from the ledger height at restart, but introduces
  a potential division-by-zero when height equals ledger_height.
expected_findings:
- file: snarkos/ledger/mod.rs
  line: 264
  summary: 'Division by absolute block height (`height as u64`) instead of blocks-synced-since-restart
    (`height - ledger_height`): after a restart the elapsed time covers only blocks
    synced this session, but dividing by total height produces a near-zero per-block
    estimate and wildly inaccurate time remaining.'
  line_side: pre_fix
- file: snarkos/ledger/mod.rs
  line: 264
  summary: 'Potential division by zero: if `height == ledger_height` (first block
    of sync), `(height - ledger_height)` is zero, causing a panic on the division
    in the fixed code. The original code also had this risk at height 0 but it was
    less likely in practice.'
  line_side: pre_fix
