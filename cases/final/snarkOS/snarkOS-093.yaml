pr_title: '[Fix] Clear cached validator requests on disconnect'
pr_body: "This PR clears the validator requests cache map for a particular peer on\
  \ disconnect. This ensures the collection is periodically cleaned up despite not\
  \ having a time-based expiry and is sufficient to avoid infinite growth as the committee\
  \ size is bounded (but the IP may change).\r\n\r\nA small aside for future discussion:\
  \ when time permits, we may want to revisit our approach to cache invalidation both\
  \ in the gateway and the router. One option would be to use an LRU with a fixed\
  \ size that we clear on specific state transitions (e.g. on round increment). \r\
  \n"
