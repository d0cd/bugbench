pr_title: '[Fix] Handle missing account in `snarkos dev execute`'
pr_body: "### Bug / Current Behavior\r\n\r\nFetching the balance for a missing account\
  \ creates a confusing error message.\r\n(The private key and account ID here are\
  \ newly generated solely testing and do not exist on any of the chains)\r\n\r\n\
  ```\r\n~> snarkos developer execute --dry-run --private-key APrivateKey1zkpB4H8Y2r2cG6H84VPntqJURSzt2iDE2WKF8NCSN3KzeyP\
  \ credits.aleo transfer_public aleo134qladey67xw5080t089z4yqj6ynzdlnz9n5cs9m3wmpxe6mc59qcv26dz\
  \ 1u64\r\n\U0001F4E6 Creating execution transaction for 'credits.aleo/transfer_public'...\r\
  \n\r\n\u26A0\uFE0F Failed to check for sufficient funds to send transaction\r\n\
  \     \u21B3 Failed to parse JSON response\r\n     \u21B3 json: invalid type: null,\
  \ expected a string at line 1 column 4\r\n\r\nUse `--help` for instructions on how\
  \ to use this command\r\n```\r\n\r\n### New Behavior\r\n\r\nWith the changes in\
  \ this PR, the CLI now handles `null` being returned correctly. It might be better\
  \ for nodes to return 404 in such cases, but changing the REST API would be more\
  \ complicated and might break existing use cases.\r\n\r\n```\r\n~> snarkos developer\
  \ execute --dry-run --private-key APrivateKey1zkpB4H8Y2r2cG6H84VPntqJURSzt2iDE2WKF8NCSN3KzeyP\
  \ credits.aleo transfer_public aleo134qladey67xw5080t089z4yqj6ynzdlnz9n5cs9m3wmpxe6mc59qcv26dz\
  \ 1u64\r\n\U0001F4E6 Creating execution transaction for 'credits.aleo/transfer_public'...\r\
  \n\r\n\u26A0\uFE0F No public balance found for sending account `aleo134qladey67xw5080t089z4yqj6ynzdlnz9n5cs9m3wmpxe6mc59qcv26dz`.\
  \ It may not exist.\r\n\r\nUse `--help` for instructions on how to use this command\r\
  \n```\r\n\r\n### Misc\r\n* [c1990f2](https://github.com/ProvableHQ/snarkOS/pull/4003/commits/c1990f2fe1af50e75e82781476b7e0269dd3d244)\
  \ disables logs for rustls, which can be very verbose\r\n"
pr_commit_messages:
- 'fix(cli): handle invalid accounts correctly'
