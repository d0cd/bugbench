category: logic
difficulty: easy
severity: medium
language: rust
pr_size: small
description: 'Bootnode addresses were being serialized and deserialized from the config
  file, allowing users to accidentally or maliciously override the canonical bootnode
  list. The fix adds #[serde(skip_serializing, skip_deserializing)] attributes to
  the bootnode fields so they are always derived programmatically rather than read
  from config.'
expected_findings:
- file: snarkOS/config.rs
  line: 82
  summary: "Bootnode field is missing #[serde(skip_serializing, skip_deserializing)]\
    \ \u2014 bootnodes should not be persisted to or loaded from the config file,\
    \ as stale or malicious values could be injected."
- file: snarkOS/config.rs
  line: 158
  summary: Bootnode-related field is missing serde skip attributes, allowing config
    file to override the canonical bootnode list.
