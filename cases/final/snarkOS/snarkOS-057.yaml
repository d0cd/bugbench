description: The proptest for BlockResponse was generating the same block every time
  instead of using randomized inputs, defeating the purpose of property-based testing.
  The fix added proper proptest strategies (any, BoxedStrategy, Strategy) and the
  snarkvm-ledger-test-helpers crate to generate varied block data across test runs.
