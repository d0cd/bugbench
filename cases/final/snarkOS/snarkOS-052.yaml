pr_title: '[Fix] Correct downgrade_peer_to_candidate for non-Gateway use'
pr_body: "When we abort a validator handshake attempt due to already being connected\
  \ to the given Aleo address, we should neither error out (because it's not an error),\
  \ nor we should downgrade any peer that's not a `ConnectingPeer` (which is the intended\
  \ downgrade target) on a broken handshake. This could only happen to a validator\
  \ due to that extra handshake condition, but we should apply this to other nodes\
  \ too as a means of future-proofing.\r\n\r\nFixes https://github.com/ProvableHQ/snarkOS/issues/3944."
