severity: high
language: rust
pr_size: medium
description: The Node was not being properly dropped during shutdown because spawned
  background tasks continued to hold references (Arc) to the node, preventing resource
  cleanup. The fix adds tokio oneshot channels across the node trait and implementations
  (client, validator, prover) to signal background tasks to terminate, allowing the
  Node to be dropped correctly.
expected_findings:
- file: node/src/traits.rs
  line: 58
  summary: Node shutdown trait method lacks a mechanism to signal spawned background
    tasks to terminate, preventing the Node from being dropped due to outstanding
    Arc references
- file: node/src/node.rs
  line: 70
  summary: Node struct missing a shutdown signal (oneshot channel) to coordinate graceful
    termination of background tasks that hold references to the node
- file: node/src/validator/mod.rs
  line: 96
  summary: Validator spawns background tasks without a shutdown signal channel, causing
    tasks to outlive the intended node lifetime and prevent proper drop
