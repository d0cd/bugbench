description: 'The client sync mechanism suffered from two stall conditions: (1) an
  RwLock deadlock where a write lock on `process` was held while a nested code path
  attempted to acquire a read lock on the same RwLock, and (2) block request starvation
  where sync requests could not make progress during block response processing. The
  fix restructures lock acquisition order and adds yielding/scoping to prevent deadlock
  and ensure block requests are not starved.'
