pr_title: 'fix(sync): Fix client sync RwLock deadlock and client block request stall'
pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your changes.\
  \ Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nWe have observed two different\
  \ kinds of stalls while we conduct client-sync acceptance tests on canarynet. These\
  \ issues are most noticeable and reproducible when block response processing takes\
  \ a sufficient amount of time. These two issues can be classified as follows:\r\n\
  \r\n- process.write deadlock during block response\r\n- block request starvation\r\
  \n\r\n## `process.write` Deadlock\r\n\r\n### Background\r\n\r\nThere are two places\
  \ during block sync where `process` is write locked ([`atomic_speculate`](https://github.com/AleoNet/snarkVM/blob/mainnet-staging/synthesizer/src/vm/finalize.rs#L268)\
  \ and [`atomic_finalize`](https://github.com/AleoNet/snarkVM/blob/mainnet-staging/synthesizer/src/vm/finalize.rs#L573)),\
  \ and two places where `process` is read locked ([`check_execution_internal`](https://github.com/AleoNet/snarkVM/blob/mainnet-staging/synthesizer/src/vm/verify.rs#L307)\
  \ and [`check_fee_internal`](https://github.com/AleoNet/snarkVM/blob/mainnet-staging/synthesizer/src/vm/verify.rs#L338)).\
  \ Both of the write locks occur in the same [`try_advancing_with_block_responses`](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/sync/src/block_sync.rs#L338-L359)\
  \ in series in [`check_next_block`](https://github.com/AleoNet/snarkVM/blob/mainnet-staging/ledger/src/check_next_block.rs#L73)\
  \ and [`add_next_block`](https://github.com/AleoNet/snarkVM/blob/mainnet-staging/synthesizer/src/vm/mod.rs#L424).\r\
  \n\r\nThis code is primarily run during a [`BlockResponse`](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/router/src/inbound.rs#L134)\
  \ message that invokes [`advance_with_sync_blocks`](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/src/client/router.rs#L218-L227).\
  \ It has a [guard before calling `try_advancing_with_block_responses`](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/sync/src/block_sync.rs#L325-L328)\
  \ to ensure no block responses are trying to write in parallel (thus creating a\
  \ deadlock).\r\n\r\nWe have observed that [this particular area in `atomic_post_ratify`](https://github.com/AleoNet/snarkVM/blob/mainnet-staging/synthesizer/src/vm/finalize.rs#L1238-L1241)\
  \ can take quite a while (more than 5 seconds) while [holding the write lock](https://github.com/AleoNet/snarkVM/blob/mainnet-staging/synthesizer/src/vm/finalize.rs#L268)\
  \ in `atomic_speculate`.\r\n\r\nClient nodes have [this loop that kicks off the\
  \ block requests](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/src/client/mod.rs#L168-L179)\
  \ firing every 5 seconds that coincidentally also calls [`try_advancing_with_block_responses`\
  \ but without guards](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/sync/src/block_sync.rs#L233-L240)\
  \ to check if another try_advance is running from the aforementioned block responses.\r\
  \n\r\nIf an `atomic_speculate` took long enough and continued into the 5 second\
  \ client sync loop while no block requests were active, this issue would occur and\
  \ result in a permanent stall without block advancement until the node is restarted.\r\
  \n\r\n### Fix\r\n\r\nWe added a guard to the `try_block_sync` and stopped running\
  \ into this issue\r\n\r\n## Block Request Starvation\r\n\r\n### Background\r\n\r\
  \nIn order for block requests to be created for a given height it must meet the\
  \ following criteria (outlined in [`check_block_request`](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/sync/src/block_sync.rs#L538-L555)):\r\
  \n- Height must be greater than current canon height\r\n- A request for this height\
  \ must not already exist\r\n- A response for this height must not already exist\r\
  \n- A request timestamp for this height must not already exist\r\n\r\nExisting block\
  \ requests, responses, and timestamps are removed given the following (issue relevant)\
  \ criteria:\r\n- A peer disconnects and [all associated block requests and timestamps\
  \ are removed](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/sync/src/block_sync.rs#L638-L657)\r\
  \n- The [next block is advancing](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/sync/src/block_sync.rs#L339)\
  \ and [the request is \"complete\"](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/sync/src/block_sync.rs#L605)\
  \ by having an empty peer ips set but not if the request is missing, [even though\
  \ peer requests can be removed when the peer ips are empty](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/sync/src/block_sync.rs#L647-L650)\r\
  \n- A [peer provides a block response](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/sync/src/block_sync.rs#L507-L533),\
  \ which removes the peer ip from the request set without removing the request.\r\
  \n- A [request is timed out or for a block that has been added already](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/sync/src/block_sync.rs#L661-L704)\r\
  \n\r\nIf the last peer for a block request disconnects and the [block request and\
  \ timestamp is removed](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/sync/src/block_sync.rs#L647-L653),\
  \ a block response will be left in a cycle where [new requests will not be created](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/sync/src/block_sync.rs#L548)\
  \ and [the request will not be considered complete](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/sync/src/block_sync.rs#L605)\
  \ for continuing block advancement. This condition results in a permanent stall\
  \ without block advancement until the node is restarted.\r\n\r\nIf that alone is\
  \ fixed, the node will still reach a state where [request timestamps are retained\
  \ until timeout](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/sync/src/block_sync.rs#L684-L685)\
  \ as an \"incomplete request\" would be one where the request's peer set exists\
  \ and is not empty OR one where the peer set has been removed (technically empty\
  \ and not incomplete). This condition results in repeated temporary stalls until\
  \ the block request is timed out as [new block requests will not be created until\
  \ the `request_timestamp` is timed out](https://github.com/AleoNet/snarkOS/blob/mainnet-staging/node/sync/src/block_sync.rs#L552)\r\
  \n\r\n### Fix\r\n\r\nBy flipping the `unwrap_or(false)` to `unwrap_or(true)` in\
  \ `requests.get(height).map(|(_, _, peer_ips)| peer_ips.is_empty()).unwrap_or(false)`,\
  \ we are treating the empty `peer_ips` set as a \"completed\" peer request and allowing\
  \ both block advancement to continue and real incomplete blocks to be removed\r\n\
  \r\n## Test Plan\r\n\r\nWe have successfully deployed this and synced 7 clients\
  \ (1 alone on a 3995WX, 2 on a shared 2xEPYC 9354, and 4 on standalone GCP 16vCPU\
  \ 64GB `e2-standard-16` instances) through canary blocks 28,000 through 35,000 that\
  \ were particularly stressful on clients.\r\n\r\nLast week we ran a 100 client sync\
  \ test with constant stalling as low as block 8000\r\n![image](https://github.com/AleoNet/snarkOS/assets/4142480/436c85d5-6908-4afc-b2b2-45402600985b)\r\
  \n\r\nToday we have two pairs of 100 clients syncing the troublesome blocks right\
  \ now\r\n![image](https://github.com/AleoNet/snarkOS/assets/4142480/6a6cca1d-70e0-434e-be59-f38f4b28dfb9)\r\
  \n\r\nThe stall in this screenshot is discovering and fixing the temporary stall\
  \ issue\r\n![image](https://github.com/AleoNet/snarkOS/assets/4142480/df7dafc4-5619-4483-b119-978726507a5a)\r\
  \n\r\nNote that the servers running these clients are still properly syncing without\
  \ stalls despite both being under spec and running 10 clients each...\r\n\r\n##\
  \ Related PRs\r\n\r\n- Helps with #3063\r\n- Fixes #2916 \r\n- Fixes #2978 \r\n"
pr_commit_messages:
- 'fix(sync): fix client sync mutex deadlock and client block request stall'
