description: In `fetch_missing_certificates`, the function returns early with no results
  when all requested certificate IDs already exist in the `unprocessed_certificate`
  cache, ignoring the cached certificates entirely. This causes the validator to stall
  and never finish processing when all missing certificates arrive via other channels
  (e.g., `BatchCertificate` messages from peers) before the fetch completes.
expected_findings:
- file: node/bft/src/primary.rs
  line: 1697
  summary: Early return when no certificates need fetching over the network discards
    certificates already present in the unprocessed_certificate cache. Should return
    the cached certificates instead of an empty result.
  line_side: pre_fix
- file: node/bft/src/sync/mod.rs
  line: 628
  summary: 'Similar early-return logic in sync path: when all certificates are already
    cached, the function should still return the cached certificates rather than terminating
    with no results.'
  line_side: pre_fix
