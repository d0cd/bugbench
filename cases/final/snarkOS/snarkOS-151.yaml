pr_title: Fix missing certificate fetching
pr_body: "<!-- Thank you for filing a PR! Help us understand by explaining your changes.\
  \ Happy contributing! -->\r\n\r\n## Motivation\r\n\r\nThis PR fixes an edge case\
  \ in `fetch_missing_certificates` where the call will terminate early without results\
  \ if all of the certificate IDs already exist in the `unprocessed_certificate` cache.\
  \ The fix ensures that we no longer ignore certificates in the cache if there are\
  \ no certificates to send via the network.\r\n\r\n### Example\r\n\r\nThe following\
  \ scenario is an example of how the edge case could occur:\r\n\r\n1. Validator node\
  \ receives `BatchCertificate` via `process_batch_certificate_from_peer` \r\n   \
  \ - This adds the certificate to the `unprocessed_certificate` cache\r\n3. Validator\
  \ node starts processing the data and requests missing transmissions/certificates\r\
  \n4. Validator node receives **ALL** other `BatchCertificates` of the missing certificates\
  \ in step 3 from other sources (like the `BatchCertificate` message in **Step 1**)\r\
  \n5. Validator never finishes processing the `BatchCertificate` in **Step 1**\r\n\
  6. Validator is now stuck in a loop of being unable to process incoming certificates\
  \ with a `Missing previous certificate ...` message\r\n\r\n## Related PRs\r\n\r\n\
  https://github.com/ProvableHQ/snarkOS/pull/3439\r\n"
pr_commit_messages:
- Fix missing certificate fetching
