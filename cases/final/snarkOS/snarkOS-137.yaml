description: The logger setup in snarkOS opens a log file via File::options().append(true).create(true).open(logfile)
  without first ensuring parent directories exist. If the --logfile path contains
  non-existent intermediate directories, the process panics with 'No such file or
  directory'. The fix adds std::fs::create_dir_all for the parent directory before
  opening the file.
expected_findings:
- file: cli/src/helpers/logger.rs
  line: 51
  summary: 'Missing create_dir_all before File::options().open(): if the logfile path
    has non-existent parent directories, this will panic. Need to call std::fs::create_dir_all(logfile.parent())
    first.'
  line_side: pre_fix
