pr_body: "## Motivation\r\n\r\nRe-introduces https://github.com/AleoNet/snarkOS/pull/3269\r\
  \n\r\nPreviously https://github.com/AleoNet/snarkOS/pull/3272 reverted a number\
  \ of PRs to ensure they can be tested properly. The time has come to test the PRs,\
  \ so we're doing a partial revert revert.\r\n\r\nWith https://github.com/AleoNet/snarkOS/pull/3269\
  \ back in place they can all be tested on Canary.\r\n\r\nAfter the sister PR https://github.com/AleoNet/snarkVM/pull/2468\
  \ is merged, we should update the ref again.\r\n\r\n## Related PRs\r\n\r\nhttps://github.com/AleoNet/snarkOS/pull/3281\
  \ - clone\r\nhttps://github.com/AleoNet/snarkVM/pull/2470 - sister PR\r\n"
