description: The Router::connect method in snarkOS incorrectly treated repeated connection
  attempts to the same peer as warning-level errors, generating noisy log output.
  Since the heartbeat logic has no notion of pending connections, it naturally calls
  connect multiple times for the same peer during handshake. The fix downgrades these
  from warn! to debug! log level and stops treating them as error conditions.
expected_findings:
- file: node/router/src/lib.rs
  line: 166
  summary: Connection to already-connected/handshaking peer logged as warn! and treated
    as error; should be debug-level since heartbeat legitimately retries connections
- file: node/router/src/lib.rs
  line: 199
  summary: Duplicate connection attempt case logged at warn! level instead of debug!;
    this is expected behavior given heartbeat has no pending-connection state
- file: node/router/src/lib.rs
  line: 216
  summary: Already-handshaking-as-initiator case treated as warning/error; should
    be a benign debug message since repeated connect calls are normal
