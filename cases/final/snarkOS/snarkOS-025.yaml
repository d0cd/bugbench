- file: node/cdn/src/blocks.rs
  line: 171
  summary: "Shutdown flag loaded with `Ordering::Relaxed` in a loop \u2014 without\
    \ `Acquire` ordering, this load may never observe the `true` written by another\
    \ thread, causing the loop to continue indefinitely."
  line_side: pre_fix
