  summary: "Shutdown flag loaded with `Ordering::Relaxed` \u2014 should use `Ordering::Acquire`\
    \ to ensure visibility of the store from the signaling thread."
  line_side: pre_fix
- file: node/src/prover/mod.rs
  line: 152
  summary: "Shutdown flag stored with `Ordering::Relaxed` \u2014 should use `Ordering::Release`\
    \ so that the store is visible to threads loading with `Acquire`."
