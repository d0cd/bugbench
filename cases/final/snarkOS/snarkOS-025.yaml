description: The shutdown flag uses `Ordering::Relaxed` for both loads and stores
  across multiple files. While `Relaxed` is atomic, it provides no inter-thread synchronization
  guarantees, meaning a thread could miss a shutdown signal or see stale state indefinitely.
  The fix changes stores to `Ordering::Release` and loads to `Ordering::Acquire`,
  establishing a proper happens-before relationship between the thread that triggers
  shutdown and threads that check for it.
