description: The inbound and outbound caches for solutions and transactions were keyed
  only by solution commitment or transaction ID, without considering the peer IP address.
  This meant that receiving the same solution/transaction from a different peer would
  be incorrectly treated as a duplicate, potentially causing legitimate peers to be
  disconnected for sending what appeared to be redundant transmissions. The fix changes
  the cache key to include both the peer IP and the solution commitment/transaction
  ID.
expected_findings:
- file: node/router/src/inbound.rs
  line: 225
  summary: Cache lookup for inbound solutions does not incorporate peer IP address,
    causing legitimate retransmissions from different peers to be flagged as duplicates
    and potentially disconnecting peers
- file: node/router/src/inbound.rs
  line: 250
  summary: Cache lookup for inbound transactions does not incorporate peer IP address,
    same duplicate-detection bug as solutions
- file: node/router/src/outbound.rs
  line: 168
  summary: Outbound cache check does not account for per-peer IP tracking, causing
    incorrect seen_before results when the same item is sent to different peers
