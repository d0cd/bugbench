pr_title: 'fix(node/router): handle repated connects to same peer better'
pr_body: "The heartbeat logic has no notion of pending connections, so it might call\
  \ `Router::connect` multiple times for the same peer while the handshake is happening.\r\
  \n\r\nThis change prevents frequent warnings being generated when a node attempts\
  \ to connect to a peer, that it already connected or is currently connecting to,\
  \ by not considering those cases an error.\r\n\r\nIn particular, it removes warnings\
  \ like the following (they are still logged as debug messages):\r\n```\r\nWARN Dropping\
  \ connection attempt to '127.0.0.1:4134' (already shaking hands as the initiator)\r\
  \n```\r\n\r\n## Test Plan\r\nI ran a local devnet to verify this works as expected.\r\
  \n\r\nReviewers, let me know if you think this should also be stress tested. It\
  \ really only changes the log output but is a networking change, nevertheless.\r\
  \n\r\n## Notes\r\n An alternative solution would be to add more state to the heartbeat\
  \ logic. Currently, heartbeat has little state and, for example, discards the return\
  \ value `Router::connect` instead of checking the result.\r\n\r\nIt seemed less\
  \ invasive to make these changes in `Router` and keep `Heartbeat` unchanged.\r\n"
pr_commit_messages:
