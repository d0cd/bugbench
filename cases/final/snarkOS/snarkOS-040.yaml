description: BlockSync's process_next_block() eagerly removed block responses from
  its internal map before Sync finished validating and adding them to the ledger.
  This created a window where BlockSync was unaware of pending blocks and would re-request
  them, causing duplicate block requests during syncing. The fix introduces a peek_next_block()
  that leaves responses in the map until they are successfully added to the ledger
  or encounter an error.
expected_findings:
- file: node/sync/src/block_sync.rs
  line: 322
  summary: process_next_block() removes the block response from the internal map before
    the caller has validated and committed it to the ledger, creating a window for
    duplicate requests
- file: node/bft/src/sync/mod.rs
  line: 314
  summary: Calls process_next_block() which eagerly removes the block from BlockSync's
    responses; should peek instead and only remove after successful ledger addition
- file: node/bft/src/sync/mod.rs
  line: 338
  summary: 'Same eager-removal issue: block is removed from responses map before validation
    completes, causing BlockSync to re-request already-pending blocks'
