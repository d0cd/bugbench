description: The old block sync algorithm randomly requested each novel sync block
  from a random peer, causing cyclical performance degradation and missed forks. The
  fix replaces this with an 'aggro sync' approach that continuously broadcasts back
  the highest sync hash to each responding peer and requests all missing blocks, eliminating
  the inefficient random selection pattern and ensuring distant forks are always considered.
expected_findings:
- file: network/src/sync/blocks/base.rs
  line: 1
  summary: Old sync logic randomly requests individual blocks from random peers instead
    of requesting all missing blocks from each responding peer, causing O(n) round-trips
    and missed forks
- file: network/src/sync/blocks/interface.rs
  line: 30
  summary: "Sync interface does not support continuous/aggressive sync mode \u2014\
    \ lacks mechanism to broadcast back highest sync hash and request all missing\
    \ blocks from responding peers"
- file: network/src/sync/blocks/batched.rs
  line: 14
  summary: Batched sync block handling uses HashMap-based random peer selection that
    leads to cyclical sync performance and can miss blocks from peers on distant forks
