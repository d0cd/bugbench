description: Deserialization of Events preallocates collections using an attacker-controlled
  size field (e.g. `IndexSet::with_capacity(num_transmission_ids)`, `IndexMap::with_capacity(num_recents)`).
  A maliciously crafted message with an enormous count value causes an immediate panic
  due to memory allocation failure, enabling a denial-of-service attack. The fix replaces
  `with_capacity(n)` calls with plain `new()` so collections grow organically.
expected_findings:
- file: node/narwhal/events/src/worker_ping.rs
  line: 54
  summary: 'Preallocation with untrusted size: `IndexSet::with_capacity(num)` uses
    a deserialized count to allocate memory, allowing a crafted message to trigger
    an OOM panic. Should use `IndexSet::new()` instead.'
  line_side: pre_fix
- file: node/sync/locators/src/block_locators.rs
  line: 264
  summary: 'Preallocation with untrusted size: `IndexMap::with_capacity(num_recents)`
    in `BlockLocators::read_le` uses a deserialized count to allocate memory, enabling
    OOM panic from malicious input.'
  line_side: pre_fix
- file: node/sync/locators/src/block_locators.rs
  line: 274
  summary: 'Preallocation with untrusted size: `IndexMap::with_capacity(num_recents)`
    in second deserialization path uses a deserialized count to allocate memory, enabling
    OOM panic from malicious input.'
  line_side: pre_fix
