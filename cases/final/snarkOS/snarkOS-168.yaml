pr_title: '[HackerOne-2279770] Prevent handshake based signature forgery'
pr_body: "Fixes #2983.\r\n\r\nIntuition: \r\n1. an attacker could locally craft a\
  \ preimage that matches the `ChallengeRequest::nonce` value range. \r\n2. the target\
  \ then signs the nonce during the handshake.\r\n3. the attacker is able to reuse\
  \ the signed nonce in any other non-handshake interactions as an authenticity proof.\r\
  \n\r\nIn order to mitigate this issue, this PR removes the possibility of brute\
  \ forcing the preimage locally by generating a `response_nonce` that is signed alongside\
  \ the initial `nonce` and sent in the `ChallengeResponse` so the signature can be\
  \ verified. \r\n"
pr_commit_messages:
- 'fix: prevent handshake based sig forgery'
- 'feat: bump `Event` and `Message` versions'
