description: The toolkit (WASM target) failed to compile because the pedersen CRH
  code unconditionally used parallel/rayon features unavailable in WASM, and the cargo
  config and WASM module lacked proper crate-type and target-arch guards. The fix
  adds `#[cfg(feature = "pedersen-parallel")]` conditionals around parallel code paths
  in pedersen.rs, sets `crate-type = ["cdylib"]` in .cargo/config, and adds `#[cfg(target_arch
  = "wasm32")]` in the WASM module.
expected_findings:
- file: algorithms/src/crh/pedersen.rs
  line: 7
  summary: 'Missing #[cfg(feature = "pedersen-parallel")] guard: parallel/rayon imports
    are unconditional, causing compilation failure on WASM targets that lack threading
    support'
- file: algorithms/src/crh/pedersen.rs
  line: 69
  summary: 'Missing #[cfg(feature = "pedersen-parallel")] guard on parallel code path:
    rayon parallel iterator usage should be feature-gated to avoid WASM compilation
    errors'
- file: toolkit/src/wasm/mod.rs
  line: 1
  summary: 'Missing #[cfg(target_arch = "wasm32")] guard on WASM module, allowing
    non-WASM builds to pull in wasm-only dependencies'
