pr_title: Don't increment the related metric if try_send fails
pr_body: "Found while investigating https://github.com/AleoHQ/snarkOS/issues/1183,\
  \ but not directly related to it.\r\n\r\nThis PR ensures that `Sender::try_send`\
  \ has succeeded before incrementing the related metric, as its failure means that\
  \ the related message did not get queued."
