pr_title: '[Fix] Clear seen_outbound_block_requests on peer disconnect'
pr_body: "This PR clears a peer's `seen_outbound_block_requests` when it gets disconnected.\r\
  \n\r\nThere may be other cache collections (in `Router`) that require this sort\
  \ of adjustment, and this depends on whether they too need to be invalidated once\
  \ the peer is disconnected. Once this PR is merged, this will only require additional\
  \ lines to be added to `Cache::clear_peer_entries`.\r\n\r\nFixes https://github.com/AleoNet/snarkOS/issues/3326."
