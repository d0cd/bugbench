description: When a peer disconnects, the `Cache::clear_peer_entries` method fails
  to clear the `seen_outbound_block_requests` collection for that peer. This leaves
  stale entries that can prevent block requests from being re-sent to reconnected
  peers or other peers, causing block synchronization to stall.
