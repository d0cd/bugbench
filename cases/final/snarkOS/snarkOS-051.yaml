description: During validator bootup, nodes would call `try_block_sync` too early
  before receiving an initial `PrimaryPing` message, causing them to incorrectly consider
  themselves synced when they were actually far behind other validators. The fix adds
  a grace period (sleep) before the first `try_block_sync` call to allow time for
  the initial `PrimaryPing` to arrive, preventing premature sync status and incorrect
  proposal/certificate processing.
expected_findings:
