description: 'The inbound PeerResponse handler checks whether a peer has an outstanding
  outbound request via a counter-based cache, but never decrements the counter after
  processing a valid response. Because the counter only increases, `contains_outbound_peer_request()`
  always returns true after the first legitimate exchange, effectively disabling the
  unsolicited PeerResponse rejection and re-enabling a known peer-flooding attack
  (issue #2894).'
expected_findings:
- file: node/router/src/inbound.rs
  line: 136
  summary: 'Missing `self.router().cache.decrement_outbound_peer_requests(peer_ip)`
    call: inbound peer responses do not decrement the outbound request counter, allowing
    unbounded peer response flooding'
  line_side: pre_fix
