  summary: Migration loop carries over previous commit state, which is invalid after
    schema change and can corrupt the migrated database or cause migration failure
  line_side: pre_fix
- file: storage/src/storage/sqlite/sync.rs
  line: 523
  summary: Block tree query uses multiple round-trips instead of a single SQLite query,
    causing inefficiency and potential inconsistency if state changes between queries
  line_side: pre_fix
