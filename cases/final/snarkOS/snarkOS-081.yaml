description: When a validator disconnects from the BFT network, its cached requests
  were not being cleared. This could lead to stale cached data being used when the
  validator reconnects or resources not being freed, potentially causing incorrect
  consensus behavior. The fix adds a cache-clearing method in cache.rs and calls it
  from the disconnect handler in gateway.rs.
expected_findings:
- file: node/bft/src/gateway.rs
  line: 1085
  summary: 'Missing cache invalidation on peer disconnect: when a validator disconnects,
    cached validator requests should be cleared to prevent stale data from persisting
    and causing incorrect behavior on reconnect.'
  line_side: pre_fix
- file: node/bft/src/helpers/cache.rs
  line: 119
  summary: Cache structure lacks a method to clear entries associated with a specific
    peer/validator, allowing stale entries to accumulate after disconnections.
  line_side: pre_fix
