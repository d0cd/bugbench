description: Block request timestamps were only cleaned up on timeout, but never when
  a block request became obsolete (i.e., its height was below the current canonical
  block height). This caused stale request entries to accumulate indefinitely. The
  fix adds an is_obsolete check comparing each request's height against the current
  block height, removing entries that are no longer needed.
