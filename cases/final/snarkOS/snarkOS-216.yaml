description: The REST API broadcast endpoints for transactions and solutions used
  a single API version path, causing compatibility issues for users. The fix introduces
  API_VERSION_V1 and API_VERSION_V2 constants and updates the broadcast routes to
  accept both versions, making the broadcast more lenient and user-friendly.
