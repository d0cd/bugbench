  summary: Transaction broadcast route only supports a single API version; should
    accept both V1 and V2 paths for backward compatibility
- file: node/rest/src/routes.rs
  line: 649
  summary: Solution broadcast route lacks multi-version API support; users on older
    API version will get errors
