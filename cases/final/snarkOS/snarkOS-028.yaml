description: When calculating the stake of certificate authors, the code retrieved
  the lookback committee for the round before the certificate round instead of the
  certificate round itself. The fix corrects the round parameter in committee lookback
  retrievals in both bft.rs and sync/mod.rs, ensuring the correct committee is used
  for stake calculations.
