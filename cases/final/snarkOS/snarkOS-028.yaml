    before the certificate round instead of the certificate round itself)'
- file: node/bft/src/bft.rs
  line: 528
  summary: 'Off-by-one: second committee lookback retrieval also uses the wrong round;
    should use the certificate''s round'
- file: node/bft/src/sync/mod.rs
