description: The longest_child_path operation used an application-level in-memory
  cache (HashedMap) to store block children, which was inefficient and required repeated
  Rust-side BFS traversal. This PR replaces that with a single SQL recursive CTE query
  in the SQLite backend, removing the cache entirely. It also fixes an off-by-one
  error in get_block_hashes where OLDEST_FORK_THRESHOLD was incremented by 1 unnecessarily.
expected_findings:
- file: storage/src/storage/sync.rs
  line: 131
  summary: Iterative longest_child_path performs O(depth) DB queries with a naive
    in-memory cache that grows unbounded and is never invalidated; should be replaced
    with a single recursive SQL query
  line_side: pre_fix
- file: consensus/src/consensus/inner/mod.rs
  line: 68
  summary: 'Off-by-one: `OLDEST_FORK_THRESHOLD as u32 + 1` fetches one extra block
    hash; should be `OLDEST_FORK_THRESHOLD as u32`'
  line_side: pre_fix
- file: storage/src/storage/sqlite/sync.rs
  line: 158
  summary: insert_block eagerly populates block_children_cache but the cache is never
    invalidated on block removal, risking stale child references
  line_side: pre_fix
