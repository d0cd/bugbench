description: When a node is still syncing, it would process certificate and batch
  header requests from peers, triggering recursive certificate fetching that could
  overwhelm the node. The fix introduces an `IS_SYNCING` const generic parameter to
  guard `sync_with_certificate_from_peer` and `sync_with_batch_header_from_peer`,
  bailing early when the node is not synced and the call isn't part of the sync process.
  Additionally, `update_is_block_synced` was called prematurely before pending sync
  requests/responses completed, causing incorrect sync status.
expected_findings:
- file: node/bft/src/primary.rs
  line: 1429
  summary: 'Missing sync-state guard: `sync_with_certificate_from_peer` recursively
    fetches certificates from peers even when the node is still syncing, which can
    overwhelm the node. Needs an `is_synced()` check to bail early for non-sync callers.'
  line_side: pre_fix
- file: node/bft/src/primary.rs
  line: 1480
  summary: 'Missing sync-state guard: `sync_with_batch_header_from_peer` similarly
    lacks a check for whether the node is synced, allowing recursive fetching during
    sync that should be blocked for peer-initiated requests.'
  line_side: pre_fix
- file: node/sync/src/block_sync.rs
  line: 456
  summary: 'Premature sync status update: `update_is_block_synced(0, MAX_BLOCKS_BEHIND)`
    is called unconditionally even when there are still pending requests or responses
    in flight, causing the node to incorrectly report as synced.'
  line_side: pre_fix
