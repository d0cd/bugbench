  summary: 'API version not detected: code assumes V2 behavior (JSON errors, 404 for
    missing tx) but V1 endpoints return plain-string errors and HTTP 500, causing
    parse failures and broken --wait polling.'
  line_side: pre_fix
- file: cli/src/commands/developer/mod.rs
  line: 191
  summary: 'Missing endpoint version parsing: no logic to distinguish V1 vs V2 API,
    so all helper functions (block range fetching, transaction waiting) use V2 assumptions
    that fail against V1 nodes.'
  line_side: pre_fix
- file: cli/src/commands/developer/scan.rs
  line: 145
  summary: parse_block_range has redundant branches both fetching latest block height;
    should be simplified and made version-aware to handle V1/V2 response format differences.
