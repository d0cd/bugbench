pr_title: '[Fix] Ensure `dev execute` works with a v1 API'
pr_body: "The PR detects the API version in a given endpoint and adjust its logic\
  \ accordingly. Depends on https://github.com/ProvableHQ/snarkVM/pull/3036.\r\n\r\
  \n### Overview of changes\r\n* Adds a new `parse_custom_endpoint` method with unit\
  \ tests.\r\n* Expects errors as JSON for V2 and as strings for V1.\r\n* Improvements\
  \ to the `devnet_ci.sh` script, such as better log messages and a new test for the\
  \ V2 API.\r\n* Ensures that `--wait` works correctly for V1, which returns `500`\
  \ not `404` for a missing transaction.\r\n\r\n### Notes\r\n* Some of the version\
  \ parsing logic is also done in the corresponding snarkVM PR. I wanted to add as\
  \ little on the snarkVM side as possible, though, so the `cli` does its own parsing\
  \ of the version number.\r\n* I simplified `parse_block_range` as it had two different\
  \ branches that were fetching the latest block height."
pr_commit_messages:
- 'fix(cli): ensure `dev execute` works with a v1 API'
- 'fix(cli): never append an endpoint version'
- 'misc(cli): determine API version from response'
- 'misc(cli): update comment'
