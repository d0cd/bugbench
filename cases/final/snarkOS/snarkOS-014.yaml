description: The `downgrade_peer_to_candidate` function was called unconditionally
  during handshake failure/abort, incorrectly downgrading peers that were not in the
  `ConnectingPeer` state. This could cause already-established peer connections to
  be improperly demoted. The fix adds a guard to only downgrade peers that are `ConnectingPeer`,
  and changes the duplicate-address handshake abort from an error to a non-error return.
expected_findings:
- file: node/bft/src/gateway.rs
  line: 1275
  summary: 'Unconditional call to downgrade_peer_to_candidate: should check that the
    peer is a ConnectingPeer before downgrading, otherwise already-connected peers
    may be incorrectly demoted.'
- file: node/router/src/handshake.rs
  line: 147
  summary: 'Unconditional call to downgrade_peer_to_candidate: should only downgrade
    if the peer is a ConnectingPeer, not an already-established connection.'
- file: node/src/bootstrap_client/handshake.rs
  line: 139
  summary: 'Unconditional call to downgrade_peer_to_candidate: missing guard to verify
    peer is a ConnectingPeer before downgrading.'
