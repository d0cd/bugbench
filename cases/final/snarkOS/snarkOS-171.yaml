description: The metrics feature was configured only as a default in the cli crate's
  Cargo.toml, rather than being propagated from the workspace root. This meant metrics
  compilation depended on how the workspace was built, and snarkos-node-metrics was
  unconditionally included instead of being gated behind the feature flag. The fix
  moves metrics feature configuration to the root Cargo.toml, makes snarkos-node-metrics
  optional, and introduces a proper feature chain through cli.
expected_findings:
- file: cli/Cargo.toml
  line: 17
  summary: Metrics feature defined here but not propagated from workspace root; should
    be a non-default feature in cli gated by a root-level feature, with snarkos-node-metrics
    made optional
  line_side: pre_fix
- file: Cargo.toml
  line: 56
  summary: Root Cargo.toml default features do not include metrics feature propagation
    to cli and node crates, causing metrics to silently be enabled only when cli is
    built directly with defaults
  line_side: pre_fix
- file: cli/src/commands/start.rs
  line: 137
  summary: '#[cfg(feature = "metrics")] guard here depends on cli crate''s own feature
    flag which may not be set when built as a workspace dependency without the root-level
    feature configuration'
  line_side: pre_fix
