description: The digest tree's `to_vec` method used `clone()` to copy each layer of
  the tree, which recursively cloned all child nodes via a derived `Clone` implementation.
  With sufficiently large numbers of blocks, this deep recursion caused a stack overflow.
  The fix replaces cloning with `take_children()` to move ownership instead of recursively
  copying, and removes the `Clone` derive from the tree structures.
