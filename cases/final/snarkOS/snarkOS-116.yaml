description: Hard-coded genesis blockchain parameters (record commitment, serial number,
  memo, predicate VK bytes, account) were embedded as raw byte array constants in
  storage/src/genesis.rs. The fix removes these hard-coded values and replaces them
  with proper parameter structs that load from binary .genesis files at runtime via
  include_bytes!, improving maintainability and correctness.
expected_findings:
- file: account/src/lib.rs
  line: 77
  summary: Account::address() returns &Address<N> (a reference) instead of Address<N>
    (by value), forcing callers to dereference with * and preventing the address from
    being passed directly where an owned value is needed
  line_side: pre_fix
- file: node/router/src/lib.rs
  line: 97
  summary: Router struct lacks an `address` field, meaning the node's address is unavailable
    for the periodic telemetry report (initialize_report), which is needed for network
    monitoring
  line_side: pre_fix
