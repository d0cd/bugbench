pr_title: '[Fix] Adjust proposal cache path when using custom storage paths'
pr_body: 'When using the default directory structure for Aleo resources and storage,
  the proposal cache is stored one level above the ledger path (`aleo_ledger_dir`).
  However, when a custom path is used, we can''t make any assumptions about what might
  be above the configured ledger path and so we should store the proposal cache where
  the user expects it: in the configured directory.'
