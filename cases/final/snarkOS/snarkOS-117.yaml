description: When a custom storage path is configured, the proposal cache path incorrectly
  navigates one directory level above the configured ledger path (behavior only correct
  for the default directory structure). This could cause the proposal cache to be
  written to an unexpected or inaccessible location. The fix conditionally adjusts
  the path logic so that custom paths store the cache in the user-configured directory.
