description: The Bowe-Hopwood Pedersen CRH implementation used a parallel reduce operation
  (likely via rayon) directly, which blocked WASM builds since WASM targets do not
  support threading/parallelism. The fix wraps the reduce operation in a macro that
  conditionally dispatches to parallel or sequential execution depending on the build
  target.
