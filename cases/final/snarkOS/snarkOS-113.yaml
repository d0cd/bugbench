description: The `check_block_locators` function had an incorrect initialization for
  `previous_block_height`, which would cause block locator validation to fail or produce
  incorrect results during sync. The fix initializes `previous_block_height` to `u32::MAX`
  to ensure the descending-order check works correctly. Additionally, a limit on the
  number of connected sync nodes was introduced to prevent resource exhaustion.
