description: 'Off-by-one error in ledger loading from disk: when the ledger has exactly
  n * BATCH_SIZE + 1 blocks (e.g., 502 blocks with batch size 501), the last block
  just past the batch boundary is not loaded. This causes an assertion failure (panic)
  comparing mismatched block locators. The fix corrects the batch iteration logic
  in three while loops to properly handle the final partial batch at the boundary.'
expected_findings:
- file: storage/src/state/ledger.rs
  line: 146
  summary: 'Off-by-one in batch loop: `while start_block_height <= latest_block_height`
    does not process the last block when it falls exactly one past a batch boundary.
    The loop body increments past the boundary without processing the remaining block.'
- file: storage/src/state/ledger.rs
  line: 161
  summary: 'Same batch boundary off-by-one: the while loop skips the final block when
    block count is n * BATCH_SIZE + 1, leading to incomplete ledger state validation.'
- file: storage/src/state/ledger.rs
  line: 190
  summary: 'Same batch boundary off-by-one in third loop: last block after batch boundary
    not loaded, causing assertion failure comparing stale vs expected block locators.'
