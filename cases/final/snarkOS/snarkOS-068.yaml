pr_title: '[Feature] CLI developer fixes'
pr_body: "Depends on [snarkVM#2838](https://github.com/ProvableHQ/snarkVM/pull/2838).\r\
  \n\r\nThis PR includes an update to `ureq` and a set of improvements to the command\
  \ line interface. #3748 should be merged before this one.\r\n\r\n## ureq update\r\
  \nThe `ureq` API changed slightly so I added helpers functions to `snarkos-cli`\
  \ to get the behavior we want. In particular, the existing code does not only want\
  \ the HTTP status code but also the response body when an error occurs.\r\nThere\
  \ is now a `http_get` and a `http_get_json` function that perform result/error conversion\
  \ to achieve this behavior.\r\n\r\n## CLI rework\r\nI changed some of the `snarkos\
  \ developer` had a multitude of bugs. `deploy` and `execute` did not work as expected.\r\
  \nThe PR not only fixes those commands, but also makes them align more with the\
  \ ones in Leo's CLI. One difference is that `--broadcast` does not take an argument\
  \ anymore, and `--query` was renamed to `--enpdoint`. \r\nEndpoint is now also passed\
  \ as a `http::Uri` and handles missing protocol schemes better.\r\n\r\nFinally,\
  \ I changed the `parse` function for each command to `execute`, as there is already\
  \ `parse_from` method provided by `clap`. `execute` is also a more fitting term\
  \ as the command will run, not just be parsed.\r\n\r\n### New CLI features\r\nWhile\
  \ trying to reproduce #3578 I added a set of new features that make it easier to\
  \ use the `developer` command and simplify or CI scripts.\r\n\r\n* `snarkos dev`\
  \ is now an alias for `snarkos developer`.\r\n* `snarkos dev execute` now has a\
  \ `--wait` flag that blocks until the issued transaction is confirmed (or rejected).\r\
  \n* Transactions can now be issued with `--dev-key i` where i is the index of a\
  \ devnet validator.\r\n* `snarkos dev query transaction` allows getting transaction\
  \ information similar to `leo query transaction`.\r\n* Execution always works now,\
  \ even with newer consensus version (fixing #3758).\r\n* Priority fees are set to\
  \ 0 by default and the `--priority-fee` flag can be omitted.\r\n* The protocols\
  \ scheme (\"http\" or \"https\") can be omitted for the endpoint, and will default\
  \ to HTTP.\r\n* Logging can be enabled (useful for debugging) by setting `--verbosity`\
  \ like you would for `snarkos start`. When the flag it is not set, logging will\
  \ be disabled entirely and not set to `INFO` like with `snarkos start`.\r\n\r\n\
  ## `sccache` update\r\nI updated sccache in this branch to 0.10, like we did for\
  \ snarkOS, because I saw some issues with CI. Not sure if that was what fixed it\
  \ or if it was just the usual flakiness, but it seemed a good time to do the update.\r\
  \n"
