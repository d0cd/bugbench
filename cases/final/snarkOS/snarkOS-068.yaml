description: The snarkOS developer CLI commands (deploy, execute) were broken and
  did not work as expected. The ureq HTTP client library was updated with breaking
  API changes requiring new helper functions (http_get, http_get_json) to properly
  handle error responses with both status codes and response bodies. Additionally,
  endpoint handling was improved by parsing URLs as http::Uri and renaming --query
  to --endpoint.
