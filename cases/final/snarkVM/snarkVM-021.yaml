description: The boolean well-formedness check in LinearCombination::is_boolean_type()
  used `.all()` instead of `.any()` when testing whether terms violate the boolean
  property. With `.all()`, the check only flagged the linear combination as invalid
  if ALL terms were non-boolean; a single valid term among invalid ones would cause
  the entire check to pass, allowing malformed booleans through ZK circuit validation.
expected_findings:
- file: circuit/environment/src/helpers/linear_combination.rs
  line: 99
  summary: 'Logic inversion: `.all(|(v, _)| !(v.value().is_zero() || v.value().is_one()))`
    should be `.any(...)`. Using `.all()` means the error branch only triggers when
    every term is non-boolean, so a mix of valid and invalid terms passes the check
    incorrectly.'
  line_side: pre_fix
