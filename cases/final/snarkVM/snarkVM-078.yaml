  \ back in place they can all be tested on Canary.\r\n\r\n## Related PRs\r\nhttps://github.com/AleoNet/snarkVM/pull/2469\
  \ - clone\r\nhttps://github.com/AleoNet/snarkOS/pull/3282 - sister PR"
