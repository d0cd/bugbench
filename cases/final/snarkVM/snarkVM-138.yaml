description: The `get_map_and_key` function in the RocksDB nested map implementation
  used unsafe direct indexing when deserializing composite keys from the database.
  This could panic on out-of-bounds access when neighboring non-nested maps stored
  keys that didn't match the expected nested key format. The fix replaces direct indexing
  with bounds-checked `.get()` calls that return proper errors, and adds `break` statements
  in DB iterators to stop when encountering keys from adjacent non-nested maps.
expected_findings:
- file: ledger/store/src/helpers/rocksdb/internal/nested_map.rs
  line: 80
  summary: "Unsafe direct indexing in get_map_and_key: uses array index operator instead\
    \ of bounds-checked .get(), which will panic if the serialized key bytes are shorter\
    \ than expected \u2014 should use .get() with proper error propagation."
  line_side: pre_fix
- file: ledger/store/src/helpers/rocksdb/internal/nested_map.rs
  line: 150
  summary: DB iterator lacks a break condition when encountering keys belonging to
    a different (non-nested) map sharing the same RocksDB column family, causing get_map_and_key
    to be called on incompatible key formats.
  line_side: pre_fix
