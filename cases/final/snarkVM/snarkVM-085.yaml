description: The `async_trait` macro on the Query trait and its impl defaulted to
  requiring `Send` bounds on generated futures, which is incompatible with wasm-bindgen's
  single-threaded execution model. The fix adds `?Send` to the `async_trait` attribute
  so the futures no longer carry a `Send` bound, allowing compilation under wasm targets.
