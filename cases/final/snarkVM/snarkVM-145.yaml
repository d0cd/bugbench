description: The CommitInstruction::new constructor did not validate the destination
  register's type, allowing potentially invalid destination types to be accepted.
  Additionally, the FromBytes implementation constructed the instruction directly
  instead of going through the ::new() constructor, bypassing any validation. The
  fix adds a destination type sanity check in the constructor and updates FromBytes
  to use the validated constructor path.
