description: The `current_block_height` method panics when called on an empty block
  store. The code unconditionally computes `u32::try_from(self.tree.read().number_of_leaves()).unwrap().saturating_sub(1)`
  without first checking whether the store contains any blocks. The fix adds a guard
  to handle the empty block store case gracefully instead of panicking.
expected_findings:
- file: ledger/store/src/block/mod.rs
  line: 1197
  summary: 'Missing empty-store guard: `current_block_height` will panic when `number_of_leaves()`
    is 0. Should check for empty block store before computing height.'
- file: ledger/store/src/block/mod.rs
  line: 1384
  summary: Same missing empty-store guard in the second implementation of `current_block_height`.
    Needs a zero-leaves check before the height computation.
