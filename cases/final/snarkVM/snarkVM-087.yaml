description: The Metadata struct's `cumulative_weight` and `cumulative_proof_target`
  fields (both u128) were serialized and deserialized as raw JSON numbers. JSON numbers
  lose precision for large u128 values, causing data corruption during round-trip
  serde. The fix serializes these fields as strings and parses them back on deserialization.
expected_findings:
- file: ledger/block/src/header/metadata/serialize.rs
  line: 27
  summary: u128 field `cumulative_weight` is serialized as a raw JSON number via serialize_field
    without .to_string(); JSON cannot represent large u128 values without precision
    loss
  line_side: pre_fix
- file: ledger/block/src/header/metadata/serialize.rs
  line: 28
  summary: u128 field `cumulative_proof_target` is serialized as a raw JSON number;
    needs string serialization to avoid precision loss for values exceeding JSON number
    range
  line_side: pre_fix
- file: ledger/block/src/header/metadata/serialize.rs
  line: 50
  summary: Deserialization reads `cumulative_weight` and `cumulative_proof_target`
    directly as u128 from JSON value instead of parsing from string, which will fail
    or lose precision for large values
  line_side: pre_fix
