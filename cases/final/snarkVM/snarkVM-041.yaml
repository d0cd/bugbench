description: Committee member sorting incorrectly included the `is_open` flag in the
  sort comparator, which could cause non-deterministic or inconsistent ordering of
  committee members based on their open/closed state. The fix removes `is_open` from
  the `sorted_unstable_by` comparisons at three locations, ensuring deterministic
  ordering based only on relevant fields like address and stake.
