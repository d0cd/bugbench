description: Unsafe unchecked `as u16` casts in size_in_fields() for both Ciphertext
  and Plaintext types silently truncate when num_fields exceeds u16::MAX but is within
  MAX_DATA_SIZE_IN_FIELDS. Additionally, the bytes serialization bounds check in Ciphertext::write_le
  only validates against MAX_DATA_SIZE_IN_FIELDS but not u16::MAX, even though the
  length is subsequently written as a u16, risking silent truncation during serialization.
expected_findings:
- file: console/program/src/data/ciphertext/bytes.rs
  line: 41
  summary: 'Missing u16::MAX bounds check: length is only validated against MAX_DATA_SIZE_IN_FIELDS
    but is later written as u16, allowing silent truncation if length > 65535'
  line_side: pre_fix
- file: console/program/src/data/ciphertext/size_in_fields.rs
  line: 27
  summary: Unchecked `num_fields as u16` cast silently truncates values exceeding
    u16::MAX; should use u16::try_from() for safe conversion
  line_side: pre_fix
- file: console/program/src/data/plaintext/size_in_fields.rs
  line: 29
  summary: Same unchecked `num_fields as u16` truncation issue as in ciphertext/size_in_fields.rs
  line_side: pre_fix
- file: console/program/src/data/ciphertext/bytes.rs
  line: 38
  summary: Bounds check uses `u16::MAX` which is inconsistent with the correct field-count
    type; should match the type used in the canonical implementation
  line_side: pre_fix
- file: console/program/src/data/ciphertext/size_in_fields.rs
  line: 24
  summary: '`u16::try_from(num_fields)` uses wrong integer type for field count conversion;
    should use the same type as the corrected implementation in PR #977'
  line_side: pre_fix
- file: console/program/src/data/plaintext/size_in_fields.rs
  line: 26
  summary: '`u16::try_from(num_fields)` uses wrong integer type for field count conversion;
    same pattern as ciphertext that was missed in the original fix'
  line_side: pre_fix
