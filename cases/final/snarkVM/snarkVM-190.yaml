description: The block header Metadata was missing the `last_coinbase_target` field,
  which is required for correctly calculating subsequent coinbase targets. The fix
  adds this field to the Metadata struct, updates all serialization/deserialization
  paths (bytes, bits, hash, serialize/deserialize), adjusts the genesis block parameters,
  and corrects the `ANCHOR_TIME` constant.
expected_findings:
- file: synthesizer/src/block/header/metadata/mod.rs
  line: 37
  summary: Metadata struct is missing `last_coinbase_target` field, which is needed
    to compute subsequent coinbase targets correctly
- file: console/network/src/lib.rs
  line: 87
  summary: ANCHOR_TIME constant value is incorrect and needs to be updated to 25 for
    proper coinbase target calculations
- file: synthesizer/src/block/header/metadata/to_bits.rs
  line: 25
  summary: to_bits_le() serialization is missing `last_coinbase_target` bits, causing
    incorrect metadata hashing and Merkle root computation
