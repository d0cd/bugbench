description: Functions that retrieve programs from the ledger used the caller-provided
  edition number when looking up `credits.aleo`, but `credits.aleo` is a built-in
  program that should always be at edition 0. This caused lookups to fail or return
  incorrect results when a non-zero edition was passed. The fix adds a special case
  to force edition 0 whenever the program ID is `credits.aleo`.
expected_findings:
- file: ledger/src/get.rs
  line: 254
  summary: 'Logic error: `try_get_program_for_edition` is called with the user-supplied
    `edition` for `credits.aleo`, but `credits.aleo` should always use edition 0 since
    it is a built-in genesis program.'
- file: ledger/store/src/transaction/deployment.rs
  line: 392
  summary: 'Logic error: `program_map().get_confirmed` uses the provided `edition`
    for `credits.aleo` lookups instead of hardcoding edition 0, causing lookup failures
    for the built-in credits program.'
- file: ledger/store/src/transaction/deployment.rs
  line: 414
  summary: 'Same bug: edition parameter is passed through without special-casing `credits.aleo`
    to edition 0, leading to incorrect program retrieval.'
