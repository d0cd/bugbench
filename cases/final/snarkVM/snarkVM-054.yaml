description: The call graph used in `verify_execution` incorrectly included calls
  to closures, which do not produce separate transitions in an `Execution`. This caused
  the traversal stack to have extra entries, leading to 'Invalid traversal - traversal
  stack is not empty' errors. The fix excludes closure calls when building the call
  graph, so only function-to-function calls (which correspond to actual transitions)
  are tracked.
expected_findings:
- file: synthesizer/src/process/verify_execution.rs
  line: 324
  summary: Call graph construction does not distinguish between closure calls and
    function calls. Closure calls should be excluded since closures are inlined and
    do not produce separate transitions, causing the traversal stack to be inconsistent
    with the actual Execution transitions.
