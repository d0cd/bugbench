- file: console/program/src/data/future/parse.rs
  line: 28
  summary: 'Incorrect sanitizer before comma: `Sanitizer::parse` allows comments and
    newlines before the comma separator, but should be `Sanitizer::parse_whitespaces`
    to restrict to whitespace-only, consistent with other syntax parsers.'
- file: console/program/src/data/future/parse.rs
  line: 103
  summary: 'Same issue: `Sanitizer::parse` before comma in future argument parsing
    should be `Sanitizer::parse_whitespaces` to disallow comments and newlines before
