description: The future argument parser incorrectly used `Sanitizer::parse` (which
  permits comments and newlines) before commas separating future arguments, instead
  of `Sanitizer::parse_whitespaces` (whitespace only). This was inconsistent with
  other parts of the Aleo instruction syntax. The fix replaces `Sanitizer::parse`
  with `Sanitizer::parse_whitespaces` in the pre-comma position of the `pair` combinator
  at multiple parse sites.
