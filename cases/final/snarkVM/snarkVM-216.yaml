description: The POWERS_OF_ROOTS_OF_UNITY constants in BLS12-377 and Edwards BLS12
  curve parameter files were stored in the wrong representation (not in Montgomery
  form). This caused incorrect FFT computations. The fix converts all root-of-unity
  power constants to proper Montgomery form and updates the field arithmetic macros
  to use them correctly.
