description: The inner circuit gadget incorrectly computed the output record position
  number, using just the loop index `j` instead of offsetting it by `NUM_INPUT_RECORDS`.
  The fix changes the record number to `(C::NUM_INPUT_RECORDS + j) as u8`, ensuring
  output records are numbered after input records. This required resampling SNARK
  parameters and updating integration test expectations.
