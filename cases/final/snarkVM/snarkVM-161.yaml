pr_body: "## Motivation\r\n`cargo doc` currently fails for snarkVM. This is because\
  \ in `curves/src/edwards_bls12/fr.rs` a constant is set to `unimplemented!()`. This\
  \ PR simply disables documentation for that one constant.\r\n\r\n## Test Plan\r\n\
  This PR only adds an attribute to existing code and does not change any functionality.\
  \ Existing tests should be sufficient to verify that it is safe to merge.\r\n\r\n\
  ## Notes\r\n`cargo doc` still prints some warnings, such as links being formatted\
  \ incorrectly. I want to keep this PR minimal, but I can address those with a future\
  \ PR."
