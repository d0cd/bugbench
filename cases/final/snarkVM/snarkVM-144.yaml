description: The `hash_many` instruction parser failed to call `Sanitizer::parse_whitespaces`
  between operands, causing inputs like `hash_many.psd2 r1 r2 into r3 as field;` to
  fail parsing while `r1r2` (no space) would succeed. The fix adds systematic whitespace
  skipping before each operand, consistent with other parts of the Aleo instructions
  parser.
