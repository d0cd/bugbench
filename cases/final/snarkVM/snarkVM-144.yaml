description: 'Documentation comments contained formatting issues that caused `cargo
  doc` warnings: bare URLs not wrapped in angle brackets, struct/module references
  not in backticks, code blocks annotated with wrong language identifiers, and angle
  brackets in prose misinterpreted as HTML links. The fix corrects all rustdoc formatting
  to eliminate warnings.'
