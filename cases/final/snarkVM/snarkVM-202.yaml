description: 'The Aleo instruction parser did not allow whitespace before commas separating
  struct or array components (e.g., `{x: 0u8 , y: 1u8}` was rejected). The fix adds
  whitespace-consuming parse steps before the comma separator in struct/plaintext,
  record entry, and record plaintext parsers.'
expected_findings:
- file: console/program/src/data/plaintext/parse.rs
  line: 30
  summary: Missing whitespace parsing before the comma separator; space between a
    struct/array element and the following comma causes a parse failure.
- file: console/program/src/data/record/entry/parse.rs
  line: 47
  summary: Missing whitespace parsing before the comma separator in record entry parsing;
    should consume optional whitespace before the comma.
- file: console/program/src/data/record/parse_plaintext.rs
