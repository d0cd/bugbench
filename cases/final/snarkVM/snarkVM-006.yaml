description: The `is_reserved_opcode` check was implemented inconsistently across
  `add_program.rs` and `program/mod.rs`, with different call patterns (qualified `Program::<N>::is_reserved_opcode`
  vs `Self::is_reserved_opcode`) and argument types (`opcode` vs `&import_name.to_string()`).
  This unification PR consolidates the method to a single canonical form, fixing potential
  bypass scenarios where reserved opcode validation could behave differently depending
  on the call site.
expected_findings:
- file: vm/compiler/src/process/add_program.rs
  line: 279
  summary: 'Inconsistent `is_reserved_opcode` call: uses `Program::<N>::is_reserved_opcode(opcode)`
    instead of the unified method, potentially accepting different argument types
    than the canonical check in program/mod.rs.'
  line_side: pre_fix
- file: vm/compiler/src/process/add_program.rs
  line: 434
  summary: "Duplicate inconsistent `is_reserved_opcode` call with same non-unified\
    \ pattern \u2014 should match the canonical method signature after unification."
  line_side: pre_fix
- file: vm/compiler/src/program/mod.rs
  line: 214
  summary: Uses `Self::is_reserved_opcode(&import_name.to_string())` with unnecessary
    `&String` allocation; unification should align argument type and call convention
    with the rest of the codebase.
  line_side: pre_fix
- file: vm/compiler/src/program/mod.rs
  line: 495
  summary: '`is_reserved_opcode` uses prefix matching (`split(''.'').next()`) instead
    of exact opcode matching, which over-matches by treating any name that matches
    an opcode prefix as reserved'
  line_side: pre_fix
