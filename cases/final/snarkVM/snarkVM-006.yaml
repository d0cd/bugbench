description: The FinalizeStorage::replace_mapping method was missing a trigger to
  update historical maps. This meant that many mapping updates (account, bonded, committee,
  delegated, withdraw) were not recorded in the historical index, causing historical
  queries to return incomplete or missing data. The fix adds the historical map update
  call inside the replace_mapping code path, consistent with other mutation paths
  that already had it.
expected_findings:
- file: ledger/store/src/program/finalize.rs
  line: 387
  summary: 'Missing historical map update in replace_mapping: the replace_mapping
    method mutates mapping state but does not call the historical map update logic,
    unlike other mutation methods (insert, remove, etc.). This causes historical queries
    to miss data written through this code path.'
