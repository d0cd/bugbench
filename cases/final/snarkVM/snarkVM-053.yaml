description: The `shl_checked` implementation for signed integers incorrectly rejected
  valid shift-left operations. For example, `-1i8 << 7u8` should yield `-128i8` (a
  valid i8 value), but the intermediate computation `2^7 = 128` overflows i8, causing
  a spurious failure. The fix replaces num_traits' `CheckedShl` with a custom trait
  that computes the power as unsigned, then handles the signed MIN edge case, and
  updates both the circuit and VM test validation accordingly.
expected_findings:
- file: circuit/types/integers/src/lib.rs
  line: 32
  summary: The modulo operation module was included but incorrectly implemented -
    for signed integers it used rem_wrapped which doesn't properly handle the shl_checked
    edge case where intermediate power computation overflows signed type bounds
  line_side: pre_fix
- file: circuit/types/field/src/div.rs
  line: 61
  summary: Field division unnecessarily enforced a zero-check constraint (`E::assert(!other.is_zero())`)
    and used a band-aid witness that substituted 1 for 0 divisor, adding 2 extra constraints
    instead of letting the enforce constraint naturally fail on division by zero
  line_side: pre_fix
- file: circuit/algorithms/src/bhp/hasher/hash_uncompressed.rs
  line: 158
  summary: BHP hasher used division (`sum_x / sum_y`) costing 5 constraints with a
    TODO noting it could be optimized when sum_y is known nonzero; the fix reduces
    this to 1 constraint by leveraging the nonzero guarantee
  line_side: pre_fix
- file: console/program/src/data/record/parse_plaintext.rs
  line: 75
  summary: Record parser unconditionally required a comma after gates, causing parse
    failure for records with no data entries (empty records)
  line_side: pre_fix
- file: console/program/src/request/sign.rs
  line: 141
  summary: Record commitment was computed without a randomizer derived from tvk and
    index, causing commitment to be computed incorrectly using only program_id and
    record_name
  line_side: pre_fix
- file: console/program/src/response/mod.rs
  line: 114
  summary: Output record commitment was computed before deriving the encryption randomizer,
    and used output_register.locator() instead of (num_inputs + index) for the index,
    producing incorrect commitments
  line_side: pre_fix
- file: vm/compiler/src/program/instruction/operation/cast.rs
  line: 183
  summary: The cast instruction for records computed a nonce using HashToScalar(tvk
    || register_locator) and injected it into the record, but this caused shl_checked
    for signed integers to fail because the intermediate power computation overflowed
    the signed type. The fix removes the nonce computation from the cast operation
    entirely, delegating nonce creation to the transition construction phase instead.
  line_side: pre_fix
- file: vm/compiler/src/process/stack/helpers/insert.rs
  line: 88
  summary: The register type checking logic (check_input, check_output, check_instruction,
    check_instruction_opcode) was implemented as methods on Stack rather than on Process,
    meaning type checking used the wrong self reference and couldn't properly validate
    programs being added to the process
  line_side: pre_fix
- file: vm/compiler/src/ledger/transaction/merkle.rs
  line: 222
  summary: 'Off-by-one error: deployment size check used strict less-than (`< MAX_TRANSITIONS`)
    instead of less-than-or-equal, incorrectly reserving one slot for a now-removed
    additional fee, preventing deployments from using the full transition capacity'
  line_side: pre_fix
- file: vm/compiler/src/ledger/transaction/merkle.rs
  line: 231
  summary: 'Off-by-one error: execution size check used strict less-than (`< MAX_TRANSITIONS`)
    instead of less-than-or-equal, incorrectly reserving one slot for a now-removed
    additional fee'
  line_side: pre_fix
