pr_title: '[Fix] Include a missing trigger for historical mapping updates'
pr_body: "A follow-up to https://github.com/ProvableHQ/snarkVM/pull/3148.\r\n\r\n\
  It appears that the previously unaccounted for `FinalizeStorage::replace_mapping`\
  \ is responsible for many mapping updates.\r\n\r\nWith this extension, the dev validator\
  \ `0` could immediately (with just the genesis block) be queried for:\r\n- `account`\r\
  \n- `bonded`\r\n- `committee`\r\n- `delegated`\r\n- `withdraw`\r\n\r\nThe previously\
  \ checked (and already tested) 2 hardcoded addresses dedicated to the storage of\
  \ the number of committee members and delegators can still successfully be queried\
  \ for:\r\n- `metadata`\r\n\r\nNo luck with:\r\n- `pool` (there is a hardcoded address\
  \ mentioned in `credits.aleo`, but perhaps it is not being written in the dev genesis\
  \ blocks)\r\n- `unbonding` (probably only applicable after an unbonding operation,\
  \ which I don't expect in the genesis)"
