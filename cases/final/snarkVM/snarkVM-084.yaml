description: The `FinalizeStorage::replace_mapping` method was missing the trigger
  to update historical mapping records, unlike other mutation paths that already included
  this step. This caused mappings updated via `replace_mapping` (such as account,
  bonded, committee, delegated, withdraw) to be absent from historical queries, even
  though the data was written to current state.
