description: The Blake2Xs XOF num_rounds calculation used plain addition `xof_digest_length
  + 31` which can overflow for large digest lengths. The fix replaces it with `saturating_add(31)`
  to prevent integer overflow in the ceiling-division computation `(xof_digest_length
  + 31) / 32` that determines how many 32-byte hash rounds to perform.
