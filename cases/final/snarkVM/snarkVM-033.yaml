description: 'When a block insert operation fails, atomic writes remain in a paused
  state because the error path does not unpause them. On the next block insert attempt,
  the code asserts that writes are not already paused (`assertion failed: !already_paused`),
  causing a panic that crashes the node. The fix wraps the block insert in error handling
  that ensures atomic writes are unpaused on failure before propagating the error.'
expected_findings:
- file: synthesizer/src/vm/mod.rs
  line: 398
  summary: 'Missing unpause of atomic writes on error path: if `self.block_store().insert(block)`
    fails, atomic writes remain paused, causing a panic on the next insert attempt
    due to `!already_paused` assertion.'
- file: synthesizer/src/vm/mod.rs
  line: 462
  summary: 'Missing unpause of atomic writes on error path: if block_store insert
    fails here, atomic writes are not unpaused before returning the error.'
- file: synthesizer/src/vm/mod.rs
