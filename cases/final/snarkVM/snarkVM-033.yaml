description: 'The lazy load deployment optimization (PR #2553) was prematurely merged
  with insufficient testing, introducing issues in how Process and deployments were
  loaded across the synthesizer and ledger subsystems. The revert restores eager loading
  of Process and deployments to fix correctness issues that manifested at runtime
  but were not caught by the existing test suite.'
expected_findings:
- file: synthesizer/process/src/deploy.rs
  line: 41
  summary: load_deployment was modified for lazy loading but the deferred initialization
    can cause stale or missing state when deployments are verified or finalized later
    in the pipeline
  line_side: pre_fix
- file: synthesizer/process/src/lib.rs
  line: 108
  summary: Process loading/initialization logic was changed for lazy loading, but
    the new timing of when stacks and programs are loaded can lead to incorrect state
    during multi-step operations (execute, finalize, cost computation)
  line_side: pre_fix
- file: synthesizer/process/src/finalize.rs
  line: 54
  summary: Finalize operations depend on fully-loaded process/stack state; lazy loading
    may cause fee_stack or deployment stacks to be uninitialized when finalize_fee_transition
    is called
  line_side: pre_fix
