description: Ledger::check_next_block failed to verify that the given block is the
  direct successor of the latest block by height. It only checked whether a block
  with that height already existed, deferring the actual height validation to Metadata::verify,
  which produced confusing 'invalid previous state root' errors for out-of-sequence
  blocks. The fix adds an early height comparison against the latest cached block
  and a redundant check in advance_to_next_block to guard against race conditions.
expected_findings:
- file: ledger/src/check_next_block.rs
  line: 21
  summary: 'Missing early validation: check_next_block should verify the incoming
    block''s height equals latest_block.height() + 1, not just check for duplicate
    heights'
- file: ledger/src/check_next_block.rs
  line: 99
  summary: Second call site also lacks the successor-height check against the latest
    block, leading to deferred and confusing error messages
- file: ledger/src/advance.rs
  line: 91
  summary: 'Missing race condition guard: advance_to_next_block should re-verify block
    height matches expected next height before committing, in case ledger state changed
    between check and advance'
