description: The Display trait implementation for BigInteger was outputting an incorrect
  string representation instead of a proper radix-10 integer. The fix rewrites the
  Display impl to correctly convert the internal limb-based representation into a
  decimal string, likely by leveraging num-bigint for correct arbitrary-precision
  integer-to-string conversion.
