description: 'The Leo compiler''s assignment enforcement only supported plain identifiers
  as assignee targets, so `self.field = expr` inside circuit methods silently failed
  or errored. The fix introduces a `KeywordOrIdentifier` AST node, threads a `declared_circuit_reference`
  through function and statement enforcement, and updates assignment logic to resolve
  `self` to the correct circuit variable. However, the fix is incomplete: conditional
  branches hardcode the circuit reference to empty string, breaking `self` mutation
  inside if-blocks.'
