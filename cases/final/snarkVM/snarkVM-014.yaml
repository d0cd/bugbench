pr_title: A memory-efficient constraint system checker for CI
pr_body: "## Motivation\r\n\r\nThis PR supplies a memory-efficient test constraint\
  \ system, called `TestConstraintChecker`, that does not compute the full paths and\
  \ does not store constraints, but still preserves the functionality of checking\
  \ if a constraint system is satisfied.\r\n\r\n## Test Plan\r\n\r\nThe code has been\
  \ beta-tested on a few tests.\r\n\r\nWe will see if the CI time improves."
