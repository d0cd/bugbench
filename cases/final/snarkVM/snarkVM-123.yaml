description: The DPC model had an overly complex outer circuit requiring 4 proofs
  and lacked enforcement that input program IDs match output program IDs for each
  record pair. This upgrade simplifies the serial number nonce derivation, reduces
  outer circuit execution to a single proof, and adds critical program ID matching
  enforcement to prevent invalid state transitions between mismatched programs.
