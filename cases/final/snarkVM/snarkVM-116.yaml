description: The byte (de)serialization implementations for the `get` and `get.or_use`
  commands had incorrect field handling, likely reading or writing fields in the wrong
  order or using incorrect byte conversions. The fix corrected the FromBytes/ToBytes
  implementations to properly serialize and deserialize the mapping, key, destination
  (and default for get_or_use) fields.
expected_findings:
- file: synthesizer/program/src/logic/command/get.rs
  line: 342
  summary: ToBytes for Get used an `is_old` flag to conditionally serialize the mapping,
    causing incorrect byte output depending on stale boolean state rather than writing
    based on the actual mapping variant
  line_side: pre_fix
- file: synthesizer/program/src/logic/command/get_or_use.rs
  line: 263
  summary: ToBytes for GetOrUse similarly used the `is_old` flag for conditional serialization,
    producing wrong bytes and erroring on valid Locator variants when is_old was true
  line_side: pre_fix
- file: synthesizer/program/src/logic/command/get.rs
  line: 334
  summary: FromBytes for Get set `is_old` from the first byte of the mapping data,
    misinterpreting serialized data as a boolean flag and corrupting deserialization
  line_side: pre_fix
