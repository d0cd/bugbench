description: The `Bech32ID` and `Bech32Object` types implemented `Borrow<F>`, which
  allowed map functions to accept generic fields instead of their distinct wrapper
  types. This meant `StateRoot`, `BlockHash`, `TransactionID`, and `TransitionID`
  were all treated as equivalent field elements in map lookups, leading to incorrect
  map operations. The fix removes the `Borrow<F>` trait bound from both types and
  updates a call site in the block store that relied on the implicit `.into()` conversion.
expected_findings:
- file: console/network/src/helpers/id.rs
  line: 23
  summary: Bech32ID implements Borrow<F>, allowing distinct ID wrapper types to be
    used interchangeably as raw field elements in map lookups, defeating type safety
- file: console/network/src/helpers/object.rs
  line: 23
  summary: "Bech32Object implements Borrow<F>, same leniency issue as Bech32ID\u2014\
    wrapper types lose distinctness when used as map keys"
- file: synthesizer/src/store/block/mod.rs
  line: 359
  summary: Map lookup uses `.into()` to convert a wrapper type to a raw field, exploiting
    the overly permissive Borrow<F> bound instead of using the properly typed key
