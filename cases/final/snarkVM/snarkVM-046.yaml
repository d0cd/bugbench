description: The `Identifier::from_bits_le` deserialization path in both the console
  and circuit layers was missing string sanity checks, allowing potentially invalid
  or malformed identifiers to be constructed by bypassing normal validation. The fix
  adds UTF-8 and identifier-character validation during bit-level deserialization
  to match the checks already enforced on other construction paths.
expected_findings:
- file: console/program/src/data/identifier/from_bits.rs
  line: 24
  summary: 'Missing validation: bytes parsed from bits are converted to a string without
    checking that all characters are valid identifier characters (ASCII alphanumeric/underscore),
    allowing malformed identifiers through deserialization'
  line_side: pre_fix
- file: circuit/program/src/data/identifier/from_bits.rs
  line: 29
  summary: 'Missing validation in circuit-level from_bits_le: bits are ejected and
    converted to bytes without enforcing string sanity constraints, creating a mismatch
    between construction-time and deserialization-time validation'
  line_side: pre_fix
