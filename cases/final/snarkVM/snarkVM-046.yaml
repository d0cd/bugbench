description: The finalize cost calculation in cost.rs used `.sum()` which does not
  guard against integer overflow, potentially wrapping around and producing an incorrect
  (lower) cost value. The fix replaces `.sum()` with `try_fold` combined with `checked_add`
  to detect and propagate overflow errors instead of silently wrapping.
expected_findings:
- file: synthesizer/src/vm/helpers/cost.rs
  line: 199
  summary: Using `.sum()` on finalize operation costs does not guard against integer
    overflow; should use `try_fold` with `checked_add` to detect and handle overflow
    safely.
