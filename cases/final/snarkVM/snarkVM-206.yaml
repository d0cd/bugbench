description: The Blake2Xs XOF num_rounds calculation used incorrect arithmetic (likely
  floor division instead of ceiling division). The fix ensures ceiling division by
  using `xof_digest_length.saturating_add(31) / 32` so that the correct number of
  32-byte rounds are computed for any requested digest length.
