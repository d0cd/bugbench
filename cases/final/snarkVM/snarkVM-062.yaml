pr_title: Fix `Map` leniency
pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending the time\
  \ to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR handles the\
  \ `Map` leniency described here - https://github.com/AleoHQ/snarkVM/issues/1353.\
  \ This is done by removing `Borrow<F>` trait requirement from `Bech32ID` and `Bech32Object`.\r\
  \n\r\nThis leniency allowed map functions to take in generic fields by input instead\
  \ of their wrapper, Bech32ID. In other words, a map would consider `N::StateRoot`,\
  \ `N::BlockHash`, `N::TransactionID`, and `N::TransitionID` all the same (as fields),\
  \ instead of their wrapper types. This leads to possible errors in the map operations\
  \ like the one fixed in https://github.com/AleoHQ/snarkVM/pull/1345.\r\n\r\nAlternative\
  \ solutions are welcome, as this adds (minor) restrictions to the updated traits.\r\
  \n\r\n"
pr_commit_messages:
- Remove Borrow<F> for Bech32ID and Bech32Object
- Update use of map
