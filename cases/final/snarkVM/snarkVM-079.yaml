description: Upgrades the DPC model by simplifying the serial number nonce computation
  to use the previous record's serial number, reducing outer circuit execution from
  4 proofs to 1, and adding enforcement that input/output program IDs match. The prior
  model had incorrect or overly complex state transition logic that was refactored
  into explicit noop/add/remove/update/split/join/joinsplit transitions.
