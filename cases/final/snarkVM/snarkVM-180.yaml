description: Election certificate fields were added to BatchHeader and Subdag as a
  fix for audit finding [zksecurity 00] (Commit Flow Can Lead to Safety Violation),
  but the approach was unnecessary and deviated from vanilla Bullshark consensus.
  The revert removes the election certificate plumbing from batch headers and subdags,
  restoring the original protocol behavior, as a companion fix in snarkOS addresses
  the safety violation without requiring protocol-level changes.
