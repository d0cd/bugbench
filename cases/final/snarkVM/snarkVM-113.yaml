description: The string equality check in the ZK circuit was incorrect, failing to
  properly verify that two strings are equal. The fix updates the equality comparison
  logic in the circuit string type and adjusts the from_bits helper and field import
  to support the corrected implementation. This is noted as a temporary fix pending
  a larger string design rearchitecture.
