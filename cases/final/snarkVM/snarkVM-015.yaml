description: "CircuitVerifyingKey derived CanonicalDeserialize without bounding the\
  \ length of the circuit_commitments vector, allowing a malicious deserializer input\
  \ to specify an arbitrarily large length and exhaust memory (denial of service).\
  \ The fix replaces the derived deserialization with a custom implementation that\
  \ caps circuit_commitments at 12 elements (3 matrices \xD7 4 polynomials per Varuna\
  \ protocol)."
