description: The `test_consensus_heights` feature flag incorrectly also changed the
  `MAX_CERTIFICATES` constant in both canary_v0.rs and testnet_v0.rs. The cfg attribute
  `#[cfg(not(any(test, feature = "test")))]` was applied to MAX_CERTIFICATES when
  it should only gate consensus version heights, causing test builds to use a different
  (incorrect) MAX_CERTIFICATES value.
