pr_title: Fix address for deploy request
pr_body: "## Motivation\r\n\r\nThe address inside the body of the request sent to\
  \ the explorer to deploy a program, wasn't the expected one. \r\nThe used address\
  \ was the one associated with the program and not the one of the developer/owner\
  \ of it.\r\nNow the deploy command get the address from the manifest file and use\
  \ that to send it on the request.\r\n\r\n"
