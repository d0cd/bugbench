description: The deploy request used an address derived from the program ID (`program_id.to_address()`)
  instead of the developer/owner's address from the manifest file. This caused deploy
  requests to be sent with the wrong identity. A secondary bug had the serialization
  field count as 1 instead of 3.
expected_findings:
- file: vm/package/deploy.rs
  line: 32
  summary: 'Wrong address source: `program_id.to_address()` derives the program''s
    own address, not the deploying developer''s address. Should use the manifest''s
    `development_address()` instead.'
  line_side: pre_fix
- file: vm/package/deploy.rs
  line: 70
  summary: 'Incorrect serialize_struct field count: passing 1 but serializing 3 fields
    (deployment, address, program_id). Should be 3.'
  line_side: pre_fix
- file: vm/package/deploy.rs
  line: 155
  summary: Call site uses `DeployRequest::try_from(deployment)` which internally derives
    the wrong address. Should use `DeployRequest::new()` with the caller address from
    the manifest.
  line_side: pre_fix
