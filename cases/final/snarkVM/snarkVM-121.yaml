description: 'PR #2615 added additional subdag verification logic with committee lookback
  calculations in `check_next_block.rs` and `advance.rs` that was too strict or incorrect,
  breaking consensus in snarkOS (at least in --dev mode). The fix was a full revert
  of the problematic verification, as the snarkVM test suite did not cover this consensus-breaking
  edge case.'
expected_findings:
- file: console/network/environment/src/helpers/sanitizer.rs
  line: 147
  summary: "str_till_eol parser is overly strict when input has no trailing newline\
    \ \u2014 it rejects strings with unsupported characters instead of returning empty,\
    \ causing valid Aleo programs/blocks to fail parsing and breaking consensus"
  line_side: pre_fix
- file: ledger/block/src/lib.rs
  line: 240
  summary: from_unchecked is private (fn instead of pub fn), preventing external callers
    from constructing blocks without re-validation, which breaks block propagation
    paths needed for consensus
  line_side: pre_fix
- file: circuit/environment/src/helpers/variable.rs
  line: 94
  summary: Variable::index_value method and Arc-based storage keep full field-element
    values in Assignment/R1CS longer than needed, causing excessive memory usage that
    can break consensus under load; replaced by stripping values at Assignment construction
    time with Rc
  line_side: pre_fix
