description: The project was using nightly clippy and suppressing the `clippy::redundant_clone`
  lint in `rest/src/routes.rs` instead of fixing the unnecessary clone. The fix updates
  the CI and git-hook configuration to use stable clippy and removes the redundant
  clone suppression, eliminating the unnecessary allocation.
expected_findings:
- file: rest/src/routes.rs
  line: 25
  summary: "Unnecessary `#[allow(clippy::redundant_clone)]` suppresses a valid lint\
    \ \u2014 the clone here is redundant and should be removed rather than silenced"
- file: .rusty-hook.toml
  line: 1
  summary: Pre-commit hook uses `cargo +nightly clippy` instead of stable clippy,
    masking lints that stable clippy would catch
- file: .circleci/config.yml
  line: 127
  summary: CI clippy job uses an outdated Rust image (cimg/rust:1.64) and nightly
    toolchain; should use stable clippy for consistent lint coverage
