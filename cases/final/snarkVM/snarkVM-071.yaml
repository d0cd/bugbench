description: Multiple `FromBytes` implementations read u32 values from untrusted input
  and use them directly in `Vec::with_capacity(num as usize)` without bounds validation.
  On 32-bit architectures, values exceeding i32::MAX cause a panic, creating a denial-of-service
  vector. The fix adds upper-bound checks (against network constants like MAX_SOLUTIONS
  and MAX_COMMITTEE_MEMBERS) before allocation.
expected_findings:
- file: ledger/narwhal/batch-header/src/bytes.rs
  line: 34
  summary: 'Missing bounds check: `num_transmission_ids` read from untrusted input
    is used directly in Vec::with_capacity() without validating it is within allowed
    limits, enabling DoS via panic on 32-bit architectures'
- file: ledger/committee/src/bytes.rs
  line: 28
  summary: 'Missing bounds check: number of committee members read from untrusted
    bytes is passed to Vec::with_capacity() without verifying it does not exceed MAX_COMMITTEE_MEMBERS,
    enabling allocation panic'
- file: utilities/src/bytes.rs
  line: 145
  summary: 'Missing bounds check: `size_b` read from input used directly for Vec capacity
    allocation without validating it is within safe bounds, enabling DoS via oversized
    allocation or panic'
