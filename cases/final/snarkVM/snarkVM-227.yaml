description: Missing bounds checks during deserialization of program closures, functions,
  and instructions could cause panics when processing malformed input. The fix adds
  validation that instruction counts don't exceed MAX_FUNCTION_INSTRUCTIONS and that
  opcode indices are within the valid range before attempting to deserialize.
expected_findings:
- file: vm/compiler/src/program/closure/bytes.rs
  line: 32
  summary: 'Missing bounds check: deserialized num_instructions should be validated
    against N::MAX_FUNCTION_INSTRUCTIONS before proceeding, otherwise a maliciously
    large count causes a panic or excessive allocation'
- file: vm/compiler/src/program/function/bytes.rs
  line: 32
  summary: 'Missing bounds check: deserialized num_instructions should be validated
    against N::MAX_FUNCTION_INSTRUCTIONS before proceeding, otherwise a maliciously
    large count causes a panic or excessive allocation'
- file: vm/compiler/src/program/instruction/bytes.rs
  line: 30
  summary: 'Missing bounds check: deserialized opcode index should be validated against
    Instruction::OPCODES.len() before use, otherwise an out-of-bounds index causes
    a panic'
