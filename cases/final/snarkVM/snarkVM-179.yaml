pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending the time\
  \ to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis reduces the maximum\
  \ number of non-zero entries in the BHP gadget significantly.\r\n* For the inner\
  \ circuit, this results in a reduction from 538k to ~475k, which provides a big\
  \ speed up when proving the inner circuit on Marlin (14s -> 11.6s on a server-class\
  \ machine, which is a speedup of 17%). For context, proving the inner circuit with\
  \ Groth16 takes ~3.8s on this machine, so with this PR, Marlin is only 3x slower\
  \ than Groth16.\r\n\r\nThis change should also benefit any program SNARKs, as the\
  \ transition hash will be cheaper to compute.\r\n\r\n## Test Plan\r\n\r\n<!--\r\n\
