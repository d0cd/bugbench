description: 'The CLI `run` command incorrectly required `--function` and `--inputs`
  long flags due to clap derive attributes added in PR #1583. Additionally, clap''s
  default behavior doesn''t support multiple arguments, so passing multiple inputs
  was impossible. The fix removes the unnecessary clap attributes to restore positional
  argument syntax (`snarkvm run hello 1u32 2u32`).'
expected_findings:
- file: vm/cli/commands/run.rs
  line: 20
  summary: Clap derive attributes force `function` and `inputs` to be long-flag options
    (`--function`, `--inputs`) instead of positional arguments, breaking the intended
    CLI syntax `snarkvm run <function> <inputs>...`. Remove the attributes and ensure
    `inputs` uses `num_args` or equivalent to accept multiple values.
  line_side: pre_fix
- file: vm/cli/commands/run.rs
  line: 22
  summary: The `inputs` field lacks clap configuration for accepting multiple values,
    making it impossible to pass more than one input argument
  line_side: pre_fix
