- file: console/types/field/src/arithmetic.rs
  line: 279
  summary: Missing division-by-zero check in Field Div implementation; dividing by
    zero field element produces incorrect results instead of returning zero or panicking
- file: console/types/scalar/src/arithmetic.rs
  line: 140
  summary: Missing division-by-zero check in Scalar Div implementation; should guard
    with `match other.is_zero()` before performing division
- file: console/types/scalar/src/arithmetic.rs
