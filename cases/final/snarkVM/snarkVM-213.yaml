description: Reverts an unnecessary election certificate addition to BatchHeader and
  Subdag structures in the Narwhal BFT consensus protocol. The original change was
  intended to fix a commit flow safety violation (zksecurity audit finding 00), but
  was determined to be unnecessary and diverged from vanilla Bullshark consensus.
  The revert removes election certificate fields, version checks, and associated serialization/deserialization
  logic.
