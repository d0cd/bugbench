  line: 31
  summary: "BatchHeader::compute_batch_id includes election certificate IDs parameter\
    \ that should not be part of the batch ID computation \u2014 this diverges from\
    \ vanilla Bullshark and is unnecessary for the safety fix."
- file: ledger/narwhal/subdag/src/lib.rs
  line: 113
  summary: Subdag::from constructor includes election_certificate_id field that is
    unnecessary for BFT safety and adds unneeded complexity to the subdag structure.
- file: ledger/narwhal/batch-header/src/bytes.rs
  line: 20
  summary: "Version check 'if version != 1' was changed to support a new serialization\
    \ version for election certificates \u2014 this versioning change is unnecessary\
    \ and should remain at the simpler check."
