description: The block reward fee computation was incorrect, leading to wrong reward
  calculations for validators. Additionally, a fee check was missing from the transaction
  verification path, allowing transactions with invalid fees to pass validation. The
  fix corrects the block_reward calculation in target.rs, fixes the fee amount methods,
  and adds the missing fee verification in the VM's check_transaction flow.
expected_findings:
- file: ledger/block/src/helpers/target.rs
  line: 17
  summary: "Block reward calculation is incorrect \u2014 the function computes the\
    \ wrong reward amount, which affects validator compensation and consensus correctness"
  line_side: pre_fix
- file: synthesizer/src/vm/verify.rs
  line: 32
  summary: 'Missing fee verification check: transaction verification does not validate
    the fee, allowing transactions with invalid or insufficient fees to pass'
  line_side: pre_fix
- file: ledger/block/src/transaction/fee/mod.rs
  line: 90
  summary: "Fee amount computation returns incorrect value \u2014 the amount() method\
    \ does not properly account for the block reward component of the fee"
  line_side: pre_fix
- file: ledger/block/src/verify.rs
  line: 51
  summary: Block verification uses incorrect expected_block_reward value derived from
    the flawed fee computation, causing valid blocks to fail verification or invalid
    blocks to pass
  line_side: pre_fix
