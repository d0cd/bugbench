description: Using `reqwest::blocking` for inclusion proof HTTP requests internally
  spawns a Tokio runtime, which panics when called from within an existing Tokio executor
  (nested runtimes are forbidden). The fix replaces `reqwest` with `ureq`, a synchronous
  HTTP client that has no Tokio dependency, allowing the inclusion proof codepath
  to be safely called from Tokio-based servers.
