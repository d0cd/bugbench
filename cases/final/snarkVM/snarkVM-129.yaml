description: Aborted prover solutions were not being filtered out before block creation,
  allowing invalid solutions to be included in new blocks. The fix adds a filter for
  aborted solution IDs in the coinbase solution construction and verification paths,
  propagating the filter through CoinbaseSolution::new(), check_solutions(), and the
  block advance logic.
expected_findings:
- file: ledger/src/advance.rs
  line: 123
  summary: Missing filter for aborted solutions before constructing the next block;
    aborted solution IDs should be excluded from the coinbase solution passed to block
    creation.
- file: ledger/coinbase/src/lib.rs
  line: 158
  summary: check_solutions() does not accept or apply an aborted-solutions filter,
    allowing already-aborted solutions to pass verification.
- file: ledger/coinbase/src/helpers/coinbase_solution/mod.rs
  line: 29
  summary: CoinbaseSolution::new() does not filter out aborted prover solutions from
    the provided solution list before constructing the coinbase solution.
