pr_title: Fix LinearCombination build-time nondeterminism
pr_body: "This PR fixes build-time nondeterminism in `UInt::addmany` through `LinearCombination::add_assign`.\
  \ Issue was noticed during upgrade from rust 1.51.0 -> 1.52.0, where\r\n\r\n[rust\
  \ 18e44a1b](https://github.com/rust-lang/rust/commit/18e44a1be4d8aecf41d0b904d63f6c72f51d6b0d)\r\
  \n[rust 7d078cfb9](https://github.com/rust-lang/rust/commit/7d078cfb94fa75e5dee699535f3f9781d3a1d47d)\r\
  \n\r\nchanged internals of `binary_search_by` leading to a change in emitted R1CS.\
  \ `binary_search_by` doesn't guarantee stability if the items being sorted are not\
  \ unique, and the excess appending of duplicates this PR fixes removes the issue\
  \ encountered from changing internals of rust.\r\n\r\n*warning* This PR will change\
  \ emitted R1CS from that of rust `1.51.0, `1.52.0`, and all other versions of rust."
