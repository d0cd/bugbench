description: RestQuery unconditionally appends the API version suffix (v2) to the
  base URL, causing double-versioned URLs (e.g., '.../v1/v2/...') when the base URL
  already contains a version. Additionally, error responses were not inspected for
  content type before deserialization, leading to incorrect error handling for V1-style
  errors. The fix adds a check for existing version suffixes in the URL and inspects
  the response content type before deserializing errors.
expected_findings:
- file: ledger/query/src/query/rest.rs
  line: 33
  summary: 'Missing check for existing API version in base_url: the URL construction
    unconditionally appends a version suffix, which produces malformed URLs when the
    base URL already contains /v1 or /v2.'
- file: ledger/query/src/query/rest.rs
  line: 85
  summary: Error response deserialization does not inspect the Content-Type header,
    causing incorrect parsing when the server returns V1-format errors vs V2-format
    errors.
