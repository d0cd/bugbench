description: The scoped atomic write batch error handling unconditionally called `abort_atomic`
  on failure, even when no atomic batch was in progress. This could cause unexpected
  behavior since aborting a non-existent atomic batch is semantically incorrect. The
  fix guards `abort_atomic` calls with an `is_atomic_in_progress` check.
