pr_title: Conditionally abort failed scoped atomic batches
pr_body: This is a "tightening" for the behavior of scoped atomic write batches; if
  an error occurs outside of an atomic batch operation (which is unlikely, but technically
  possible), an `abort_atomic` is more appropriate, as there are no pending operations
  to roll back.
