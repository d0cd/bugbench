description: Match arms in the query module used the magic number 3 instead of 0 for
  MainnetV0's network ID, causing all REST calls to credits.aleo to fail on mainnet.
  The fix corrects the ID value and replaces magic numbers with named constants (e.g.,
  console::network::MainnetV0::ID) to prevent recurrence.
