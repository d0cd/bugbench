description: Using `reqwest::blocking` for inclusion proof HTTP requests internally
  spawns a Tokio runtime, which panics when called from within an existing Tokio executor
  (nested runtimes are not allowed). The fix replaces `reqwest` with `ureq`, a synchronous
  HTTP client with no Tokio dependency, allowing deploy/execute operations to work
  correctly inside async server contexts.
