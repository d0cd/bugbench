description: "CircuitVerifyingKey::deserialize used derived CanonicalDeserialize which\
  \ performed unbounded memory allocation for the circuit_commitments vector. A malicious\
  \ input could specify an arbitrarily large length, causing the deserializer to allocate\
  \ excessive memory and exhaust resources. The fix replaces the derived implementation\
  \ with a custom one that bounds circuit_commitments to 12 elements (3 matrices \xD7\
  \ 4 polynomials per the Varuna protocol)."
