description: The block verification logic only checked that transaction IDs from the
  subdag existed in the ledger but failed to verify that puzzle solution commitments
  (solution IDs) also existed. This allowed blocks to reference non-existent solutions
  without detection, undermining ledger integrity. The fix extends all verification
  methods to return and check both solution commitments and transaction IDs.
expected_findings:
- file: ledger/block/src/verify.rs
  line: 534
  summary: "check_subdag_transmissions only returns existing transaction IDs but discards\
    \ existing solution IDs \u2014 solution commitments from the subdag that should\
    \ already exist in the ledger are never propagated for validation"
  line_side: pre_fix
- file: ledger/src/check_next_block.rs
  line: 83
  summary: 'Missing ledger existence check for solution IDs: only transaction IDs
    are verified against the ledger, but puzzle commitments from the subdag are silently
    ignored, allowing blocks to reference non-existent solutions'
  line_side: pre_fix
- file: ledger/block/src/verify.rs
  line: 35
  summary: "verify() return type is Vec<TransactionID> \u2014 it should also return\
    \ Vec<PuzzleCommitment> so callers can check solution existence in the ledger"
  line_side: pre_fix
