description: The block header Metadata struct was missing a `last_coinbase_target`
  field needed for calculating subsequent coinbase targets. Without this field, the
  protocol cannot track the previous coinbase target across blocks, breaking the difficulty
  adjustment mechanism. The fix adds the field to the struct, all serialization paths
  (bytes, bits, hash, JSON), and the genesis block initialization.
