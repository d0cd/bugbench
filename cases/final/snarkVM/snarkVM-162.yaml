description: Serial numbers were serialized using `to_bytes_le` (ToBytes trait) which
  keeps both x and y coordinates of an elliptic curve point, instead of using compressed
  serialization that only keeps the x coordinate. This caused transaction sizes to
  increase by 64 bytes. The fix introduces a SchnorrCompressed signature variant that
  serializes only the x coordinate, leveraging the fact that on twisted Edwards curves,
  y can be recovered from x.
expected_findings:
- file: dpc/src/parameters/testnet1.rs
  line: 31
  summary: Signature scheme should use SchnorrCompressed instead of Schnorr to avoid
    serializing both x and y coordinates, inflating transaction size by 64 bytes
- file: dpc/src/parameters/testnet2.rs
  line: 31
  summary: Signature scheme should use SchnorrCompressed instead of Schnorr to produce
    shorter serial numbers via compressed point serialization
- file: algorithms/src/traits/signature.rs
  line: 15
  summary: SignatureScheme trait's PublicKey bound uses ToBytes which serializes full
    (x,y) point; should support compressed serialization keeping only x coordinate
