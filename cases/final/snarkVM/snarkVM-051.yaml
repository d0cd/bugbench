description: The `contains_transaction_id` check in the ledger was incorrectly implemented,
  likely querying the wrong store or using flawed lookup logic. The fix corrects the
  check in `contains.rs` to properly delegate to a new `contains_transaction_id` abstraction
  added to `BlockStore`, and updates the verification path in `verify.rs` to use the
  corrected method.
