pr_title: 'fix: Check for expected block height early'
pr_body: "This PR changes `Ledger::check_next_block` to not only check that no block\
  \ with the given height exists, but also that the given block is the direct successor\
  \ of the latest block in the ledger.\r\n\r\nCurrently, height is not checked until\
  \ later in `Metadata::verify`. If you give `check_next_block` a block that is higher\
  \ than the expected height, it will fail with something like \"invalid previous\
  \ state root\", which is not super helpful to debug the problem.\r\nThis change\
  \ also avoids an extra lookup in the storage for whether a block with the given\
  \ height already exists. Instead, it uses the height from the previous block already\
  \ cached in the ledger.\r\n\r\nAdditionally, this PR adds another height check in\
  \ `Ledger::advance_to_next_block` to make sure nothing has changed between calling\
  \ `check_next_block` and `advance_to_next_block`."
pr_commit_messages:
- 'fix (ledger): check for expected block height'
- 'fix (ledger): check block height in advance_to_next_block'
