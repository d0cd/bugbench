description: The Identifier parser did not reject identifiers that have the same form
  as LiteralType names (e.g., 'boolean', 'field', 'u64'), causing parsing ambiguity
  where a literal type could be incorrectly parsed as an identifier. The fix adds
  a validation check in the Identifier parser to disallow literal type names, and
  reorders parse alternatives in PlaintextType, RegisterType, and ValueType parsers
  to attempt LiteralType parsing before falling back to Identifier-based variants.
