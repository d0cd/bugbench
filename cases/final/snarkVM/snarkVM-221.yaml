description: Signed integer arithmetic operations (division, multiplication, power,
  shift) in circuit types did not correctly handle negative values due to missing
  absolute value implementations. The fix adds abs_checked and abs_wrapped operations
  and refactors div_checked, div_wrapped, mul_checked, pow_checked, pow_wrapped, shl_wrapped,
  and shr_wrapped to use them for correct signed integer handling.
expected_findings:
- file: circuits/types/integers/src/div_checked.rs
  line: 89
  summary: Signed integer division does not correctly compute absolute values before
    dividing; needs abs_wrapped to handle negative dividends/divisors properly, with
    special handling for I::MIN
- file: circuits/types/integers/src/div_wrapped.rs
  line: 33
  summary: Wrapping division of signed integers lacks abs_wrapped conversion before
    casting to unsigned for division, producing incorrect results for negative inputs
- file: circuits/types/integers/src/mul_checked.rs
  line: 77
  summary: Checked multiplication of signed integers does not use abs_wrapped to convert
    operands to unsigned before multiplying, leading to incorrect overflow detection
    and wrong results for negative values
