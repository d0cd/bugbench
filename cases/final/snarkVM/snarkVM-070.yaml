pr_title: '[Fix] Unpause atomic writes on block insert error'
pr_body: "This PR contains a _potential_ fix to one of the atomic panics we've seen\
  \ on the devnet:\r\n```\r\nMay 15 15:55:28 ip-172-31-42-88 snarkos[58891]: 2024-05-15T15:55:28.771227Z\
  \  WARN snarkos_node_sync::block_sync: Attempted to insert a block at the incorrect\
  \ height into storage\r\nMay 15 15:55:29 ip-172-31-42-88 snarkos[58891]: thread\
  \ 'tokio-runtime-worker' panicked at /Users/nkls/dev/snarkVM/ledger/store/src/helpers/rocksdb/internal/mod.rs:235:9:\r\
  \nMay 15 15:55:29 ip-172-31-42-88 snarkos[58891]: assertion failed: !already_paused\r\
  \n```\r\nI initially thought the error might suggest the occurrence of simultaneous\
  \ block inserts from different threads (there are no `await` points so it can't\
  \ be from the same task) but the block lock ruled this out. This leaves us with\
  \ improper handling of unpausing which this changeset aims to fix. \r\n\r\nDrafting\
  \ this PR as I haven't yet been able to confirm this fix is sufficient to resolve\
  \ the issue entirely. \r\n"
pr_commit_messages:
- 'fix: unpause atomics on block insert error'
- 'fix: no need to revert the tree on block insert error'
- 'tests: add a case for atomic unpausing on insertion error'
- 'chore: adjust the lockfile'
