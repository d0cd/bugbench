pr_title: Fix deserialization of authorizations with multiple transitions
pr_body: "## Motivation\r\n\r\nWhen deserializing an `Authorization` from string a\
  \ call stack that included multiple transitions, the structural assertion logic\
  \ would erroneously fail. This PR fixes the assertion logic but does not change\
  \ the underlying structure/order of the `Authorization` fields.\r\n\r\n## Test Plan\r\
  \n\r\nAdded two unit tests for authorization deserializations:\r\n* single transition\
  \ is in `synthesizer/process/src/stack/authorization/mod.rs`\r\n* multiple transitions\
  \ is in `synthesizer/src/vm/mod.rs`\r\n\r\nI'm happy to relocate the latter to `authorization/mod.rs`\
  \ but stuck it in `vm/mod.rs` since it needs to deploy several programs to the test\
  \ VM.\r\n\r\n## Related PRs\r\n\r\nnone"
