pr_title: '[Fix] Make `prepare_next_quorum_block` atomic'
pr_body: "This will avoid certain race conditions when preparing a block template.\
  \ \r\n\r\nConcretely, in the current design the following is possible:\r\n* There\
  \ is a thread t that calls `Ledger::prepare_next_beacon_block` which reads the value\
  \ of `current_block`\r\n* There is another thread t' that calls `Ledger::advance_to_next_block,\
  \ which updates `current_block` and the state root.\r\n* If t now continues execution\
  \ and reads the state root, it will return a block and not an error, but the block\
  \ will be invalid, i.e. the state root is incorrect.\r\n\r\nThis is problematic\
  \ for two reasons:\r\n* `Ledger` implements `Sync`, which implies concurrent calls\
  \ to its functions should be executed atomically and not read partial/inconsistent\
  \ data.\r\n* Such invalid blocks are harder to catch on the snarkOS side, as they\
  \ appear to have the correct height and inconsistencies in the state root will be\
  \ detected only later when the block is executed.\r\n\r\nWhile this PR will ensure\
  \ calls to the `Ledger` are atomic (formally, the Ledger being _linearizable_),\
  \ it does not ensure that multiple calls to these functions do not interleave in\
  \ unintended ways (formally, _serializable_). The latter is implemented in snarkOS\
  \ and out of the scope of snarkVM, while the former makes the implementation for\
  \ in snarkOS a lot easier. \r\n\r\nP.S.: There is this [great blog post by Peter\
  \ Bailis](http://www.bailis.org/blog/linearizability-versus-serializability/) describing\
  \ the two formal guarantees mentioned in the previous paragraph, in case you want\
  \ to learn more about the formalism behind it. \r\n\r\n### Other minor changes\r\
  \nThe PR also reduces log verbosity for sequential operations, as they add a decent\
  \ amount of noise otherwise."
