description: "Race condition in Ledger where concurrent calls to prepare_next_beacon_block\
  \ and advance_to_next_block can read inconsistent state \u2014 the block height\
  \ from one state and the state_root from another \u2014 producing an invalid block\
  \ that passes superficial checks. The fix makes ledger reads atomic by acquiring\
  \ a lock that prevents partial/inconsistent reads across concurrent operations."
