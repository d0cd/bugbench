description: The DeploymentStorage trait functions did not handle the built-in 'credits.aleo'
  program as a special case. Since credits.aleo is a default VM program and is never
  stored in the deployment store, queries for its transaction ID, edition, program,
  verifying key, certificate, or owner would either error or return incorrect None
  values instead of the proper built-in data.
expected_findings:
- file: synthesizer/src/store/transaction/deployment.rs
  line: 259
  summary: 'Missing guard: deployment store operation does not check whether the program
    ID is `credits.aleo`, allowing potential manipulation of the built-in credits
    program.'
  line_side: pre_fix
- file: synthesizer/src/store/transaction/deployment.rs
  line: 297
  summary: 'Missing guard: second store operation path also lacks a `credits.aleo`
    program ID check, same vulnerability as above.'
  line_side: pre_fix
- file: synthesizer/src/store/transaction/deployment.rs
  line: 312
  summary: 'Missing guard: third store operation path also lacks a `credits.aleo`
    program ID check, same vulnerability as above.'
  line_side: pre_fix
- file: synthesizer/src/store/transaction/deployment.rs
  line: 261
  summary: 'Missing special-case guard for ''credits.aleo'': find_transaction_id_from_program_id
    will attempt to look up the edition of the built-in credits program in the deployment
    store, which will fail since it was never deployed via a transaction.'
  line_side: pre_fix
- file: synthesizer/src/store/transaction/deployment.rs
  line: 300
  summary: 'Missing special-case guard for ''credits.aleo'': get_program will return
    None for the built-in credits program instead of returning Program::credits(),
    causing callers to believe the program does not exist.'
  line_side: pre_fix
- file: synthesizer/src/store/transaction/deployment.rs
  line: 318
  summary: 'Missing special-case guard for ''credits.aleo'': get_verifying_key will
    fail to return the built-in verifying key for credits functions, breaking transaction
    verification for credits operations.'
  line_side: pre_fix
