description: 'The CUDA implementation of MSM (Multi-Scalar Multiplication) in `blst_p1_add_affines_into_projective`
  failed to handle edge cases in elliptic curve point addition: specifically when
  one or both input points are the identity (zero point), or when the two points are
  equal (requiring doubling) or inverses (resulting in identity). The fix adds proper
  checks for these degenerate cases in the CUDA kernel and updates the compiled PTX
  files accordingly.'
expected_findings:
- file: algorithms/src/msm/variable_base/blst_377_cuda/blst_377_ops.cu
  line: 430
  summary: 'Missing edge-case handling in point addition: `blst_p1_add_affines_into_projective`
    assumes neither input point is the identity and that the two points are distinct
    and non-inverse. Must handle P=0, Q=0, P=Q (doubling), and P=-Q (result is identity)
    to avoid incorrect MSM results.'
  line_side: pre_fix
- file: algorithms/src/msm/variable_base/cuda.rs
  line: 256
  summary: Host-side MSM dispatch does not guard against identity points being passed
    into the CUDA kernel, which lacks edge-case handling for zero points and point
    doubling.
  line_side: pre_fix
