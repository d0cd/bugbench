description: The `ensure_equals` macro accepts variadic format arguments `$(, $format_args:tt)*`
  but does not forward them to the underlying `format!()` call, causing log messages
  to display raw format placeholders instead of interpolated values. The fix wraps
  `$message` in `format!($message $(, $format_args)*)` so arguments are properly interpolated.
expected_findings:
- file: utilities/src/errors.rs
  line: 62
  summary: "Macro arm captures `$format_args:tt` but drops them \u2014 `$message`\
    \ is passed directly to `anyhow::bail!` without `format!()`, so any caller-supplied\
    \ format arguments are silently ignored"
  line_side: pre_fix
- file: utilities/src/errors.rs
  line: 197
  summary: 'Same bug in the second (halt) variant of `ensure_equals`: format arguments
    captured but never forwarded to the message string'
  line_side: pre_fix
