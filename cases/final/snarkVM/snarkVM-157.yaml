description: The `snarkvm run` command was not checking constraints during execution,
  meaning programs could run successfully even with unsatisfied constraints. The fix
  introduces a new `CallStack::PackageRun` variant that enforces constraint checking
  (like `Execute` mode) without interfering with `CheckDeployment`/`verify_deployment`,
  and updates `package::run` to use this new call stack mode.
expected_findings:
- file: vm/package/run.rs
  line: 51
  summary: 'Wrong CallStack variant used for `snarkvm run`: constraints are not being
    checked during package run, allowing programs with unsatisfied constraints to
    pass silently. Should use a mode that enforces constraint checking.'
- file: synthesizer/process/src/stack/execute.rs
  line: 380
  summary: Constraint satisfaction check only applies to `Execute` mode but should
    also apply when running a package (`PackageRun`), otherwise `snarkvm run` silently
    skips constraint verification.
- file: synthesizer/process/src/stack/execute.rs
  line: 456
  summary: Second constraint satisfaction check also missing `PackageRun` mode coverage,
    allowing unchecked constraints during package runs.
