description: The coinbase target and proof target calculations incorrectly relied
  on timestamps and reference heights (last_coinbase_height), leading to potentially
  incorrect difficulty adjustments. The fix removes these fields from metadata, target
  helpers, and all dependent code paths (serialization, genesis, block validation,
  rewards), simplifying the target calculation to not depend on wall-clock time or
  coinbase reference heights.
expected_findings:
- file: ledger/src/helpers/target.rs
  line: 12
  summary: Target calculation functions use timestamp-based and reference-height-based
    parameters that can produce incorrect difficulty adjustments; these parameters
    should be removed from the target computation logic.
- file: ledger/block/src/header/metadata/mod.rs
  line: 43
  summary: Metadata struct contains a `last_coinbase_height` field (u32) that is used
    in target calculations but introduces incorrect coupling between coinbase history
    and difficulty adjustment.
- file: ledger/src/advance.rs
  line: 129
  summary: Block advancement logic constructs coinbase target using `last_coinbase_height`
    and timestamp-based parameters, which can produce incorrect targets; these should
    be removed from the target construction.
