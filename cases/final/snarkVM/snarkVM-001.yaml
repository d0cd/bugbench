pr_title: Fix `ConfirmedTransaction` indexing with a counter
pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending the time\
  \ to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR fixes the index\
  \ selection of `ConfirmedTransaction`s in `VM::atomic_speculate` by using a counter.\
  \ \r\n\r\nPreviously we were using `enumerate` which would not account for the possibility\
  \ of aborted transactions. This would cause an error in `VM::check_speculate` (`The\
  \ transactions after speculation do not match the transactions in the block`) because\
  \ the indexes would not align properly. \r\n"
pr_commit_messages:
- Use a counter to index confirmed transactions in atomic_speculate
- Add test to check indexes in blocks with aborted transactions
