description: RocksDB atomic write batches were only atomic within a single DataMap,
  meaning writes spanning multiple maps could be partially committed on failure, leading
  to data corruption. The fix introduces shared tracking of serialized operations
  across all DataMaps using a 'stack of stacks' approach to maintain atomicity through
  nested checkpoints, performing a single rocksDB write per atomic batch.
expected_findings:
- file: ledger/store/src/helpers/rocksdb/internal/mod.rs
  line: 33
  summary: Atomic write batch scope tracking is per-DataMap only; operations across
    multiple maps are not coordinated through shared state, breaking cross-map atomicity
    guarantees.
- file: ledger/store/src/helpers/rocksdb/internal/map.rs
  line: 29
  summary: DataMap performs its own independent write batch commit without coordinating
    with other maps in the same atomic scope, allowing partial writes if a failure
    occurs mid-batch across maps.
- file: ledger/store/src/helpers/rocksdb/internal/mod.rs
  line: 64
  summary: Checkpoint logic does not track atomic scope depth across DataMaps; nested
    storage operations spanning multiple maps cannot be properly rolled back on failure.
