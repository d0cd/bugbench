description: The `FromBytes` implementations for `FunctionCore`, `ClosureCore`, and
  `FinalizeCore` did not validate that the deserialized counts for inputs, outputs,
  instructions, and commands fall within allowed maximums. A crafted byte sequence
  could specify arbitrarily large counts, leading to excessive memory allocation or
  denial of service during deserialization. The fix adds bound checks comparing each
  count against `N::MAX_INPUTS` and similar constants before allocating.
expected_findings:
- file: synthesizer/program/src/function/bytes.rs
  line: 25
  summary: 'Missing bound check on `num_inputs` in `FromBytes`: deserialized u16 count
    is not validated against `N::MAX_INPUTS` before allocating, allowing crafted bytes
    to trigger excessive allocation'
  line_side: pre_fix
- file: synthesizer/program/src/closure/bytes.rs
  line: 23
  summary: 'Missing bound check on `num_inputs` in `ClosureCore::FromBytes`: no validation
    of deserialized count against maximum before use in allocation loop'
  line_side: pre_fix
- file: synthesizer/program/src/finalize/bytes.rs
  line: 23
  summary: 'Missing bound check on `num_inputs` in `FinalizeCore::FromBytes`: deserialized
    count not checked against `N::MAX_INPUTS`, allowing untrusted input to control
    allocation size'
  line_side: pre_fix
