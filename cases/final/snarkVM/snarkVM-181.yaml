description: LinearCombination::add_assign used binary_search_by to find existing
  variables but did not verify the found element actually matched the search variable
  when duplicates existed. Since binary_search_by does not guarantee which duplicate
  index is returned, different Rust versions produced different R1CS outputs, causing
  build-time nondeterminism. The fix adds an explicit check that the element at the
  found index matches the search variable before updating in place, preventing duplicate
  accumulation.
