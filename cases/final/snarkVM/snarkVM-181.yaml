description: The byte serialization of plaintext structs and records used `u8` to
  read/write the number of members/entries, limiting the count to 255 and causing
  incorrect serialization when the count exceeds that range. The fix changes the size
  type (likely to `u16`) for both plaintext and record byte serialization, and regenerates
  the genesis block to match the new encoding.
expected_findings:
- file: console/program/src/data/plaintext/bytes.rs
  line: 26
  summary: "Plaintext struct member count deserialized as u8, which silently truncates\
    \ counts above 255 \u2014 should use a wider integer type (e.g. u16) to match\
    \ serialization size"
  line_side: pre_fix
- file: console/program/src/data/plaintext/bytes.rs
  line: 62
  summary: "Same u8 truncation bug in the second deserialization path for plaintext\
    \ (likely the Struct variant write path) \u2014 member count written as u8 instead\
    \ of wider type"
  line_side: pre_fix
- file: console/program/src/data/record/bytes.rs
  line: 24
  summary: "Record entry count deserialized as u8, causing the same truncation/mismatch\
    \ bug \u2014 should use the same wider type as the serialization side"
  line_side: pre_fix
- file: console/program/src/data/record/bytes.rs
  line: 68
  summary: "Record entry count written as u8 in the write path \u2014 must match the\
    \ wider read type to maintain round-trip correctness"
  line_side: pre_fix
