description: The WASM parameter download mechanism attempted to spawn a local async
  task to download parameters alongside synchronous execution, which doesn't work
  correctly in the single-threaded WebAssembly/JavaScript event loop model. The fix
  replaces the broken async approach with a proper synchronous WASM-compatible download
  using appropriate web APIs (likely XMLHttpRequest or similar synchronous fetch),
  and refactors the inclusion/query modules to support WASM execution contexts.
expected_findings:
- file: parameters/src/macros.rs
  line: 90
  summary: The wasm remote_fetch function spawns a local async task to download parameters,
    which blocks the JavaScript event loop and fails in the single-threaded WASM execution
    model.
- file: utilities/src/parallel.rs
  line: 67
  summary: Parallelism configuration does not properly account for the wasm feature
    flag, leading to incorrect execution behavior when compiled to WebAssembly.
- file: synthesizer/src/process/mod.rs
  line: 159
  summary: Process initialization lacks a path to skip downloading credits.aleo circuit
    keys, which is needed for WASM environments where synchronous network fetching
    is constrained.
