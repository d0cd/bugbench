description: Poseidon sponge parameters were hardcoded rather than generated via standardized
  methods. While not insecure, the ad-hoc parameters did not follow current best practices
  for MDS matrix and round constant generation. The fix introduces a PoseidonMDSField
  trait and standardizes parameter generation across all field types.
