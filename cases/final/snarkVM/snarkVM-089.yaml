pr_title: Standardizing the treatment of Poseidon Sponge
pr_body: "## Motivation\r\n\r\nPreviously we hardcore a set of parameters for the\
  \ Poseidon sponge. Today such parameters have more standardized ways of generation,\
  \ which this PR leverages. (In other words, although prior parameters are not insecure,\
  \ they are not the best practice today.)\r\n\r\nIt has never been done in arkworks-rs\
  \ to have a formal treatment of Poseidon sponge parameters since each curve has\
  \ its own requirements. This PR makes the first attempts, by explicitly labeling\
  \ fields with configured MDS matrices and Poseidon parameters.\r\n\r\nThe update\
  \ may later be synced into `arkworks-rs`.\r\n\r\n## Test Plan\r\n\r\nIt passes the\
  \ test with respect to `marlin`.\r\n\r\n## Related PRs\r\n\r\nNope. This is part\
  \ of a follow-up to the Slack discussion.\r\n\r\n## Next steps\r\n\r\nThe PR was\
  \ based on the `master` branch instead of `feat/testnet2-dpc` since this change\
  \ is considerably large (and `feat/testnet2-dpc` is also very large now). Merging\
  \ to `master` appears to be a good idea to avoid conflicts with new PRs. "
