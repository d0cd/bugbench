description: 'The Aleo instructions parser disallowed whitespace between a struct/array
  component value and the comma separator (e.g., `{x: 0u8 , y: 1u8}` was rejected).
  The fix adds whitespace parsing before the comma in struct literal, record entry,
  and record plaintext parsers, consistent with how other parts of the syntax already
  handle optional whitespace before separators.'
