description: The future argument parser used `Sanitizer::parse` (which permits comments
  and newlines) before commas separating arguments, whereas the rest of the instruction
  syntax only allows plain whitespace (no comments, no newlines) in that position.
  The fix replaces `Sanitizer::parse` with `Sanitizer::parse_whitespaces` before each
  comma to make future-argument parsing consistent with other constructs.
