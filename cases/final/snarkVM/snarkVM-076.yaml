pr_title: '[TOB-1] Adds check for possible panics in FromBytes impls'
pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending the time\
  \ to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR adds guards\
  \ for possible denial of service vectors in `FromBytes` implementations.\r\n\r\n\
  Example:\r\n```\r\nlet num_ratifications = u32::read_le(&mut reader)?;\r\nlet mut\
  \ ratifications = Vec::with_capacity(num_ratifications as usize);\r\nThis will cause\
  \ a panic in 32-bit architectures if num_ratifications exceeds i32::MAX.\r\n```\r\
  \n\r\nNote: we are skipping some of the bound checks in `sonic_pc/data_structures`\
  \ because it won't practically hit these larger values. \r\n\r\nFinding: TOB-ALEO-1\r\
  \n"
