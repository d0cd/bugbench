description: "The VM tests and integer shift-left implementations were using an incorrect\
  \ version of checked_shl \u2014 likely the standard library's checked_shl instead\
  \ of the custom CheckedShl trait defined in the console environment. The fix updates\
  \ imports to include the custom CheckedShl trait and updates the bitwise.rs implementation\
  \ and macros.rs test scaffolding to use the correct trait method, ensuring shift-left\
  \ operations follow snarkVM's checked arithmetic semantics."
expected_findings:
- file: vm/compiler/src/program/instruction/operation/macros.rs
  line: 729
  summary: 'Wrong checked_shl used: the ''shl'' case should use console::prelude::traits::integers::CheckedShl::checked_shl
    instead of the std library version'
- file: console/types/integers/src/bitwise.rs
  line: 154
  summary: "Incorrect checked_shl implementation for integer shift-left \u2014 uses\
    \ wrong trait method that does not match snarkVM's checked shift semantics"
- file: console/network/environment/src/traits/mod.rs
  line: 52
  summary: Missing import of CheckedShl trait from integer_type module, causing consumers
    to resolve to the wrong checked_shl method
