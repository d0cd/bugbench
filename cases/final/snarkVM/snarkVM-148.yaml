description: The BHP commitment setup computed random bases using WINDOW_SIZE instead
  of NUM_SCALAR_BITS. When WINDOW_SIZE is smaller than the number of scalar bits,
  the commitment scheme has insufficient random bases to fully randomize the output,
  compromising the hiding property of the Pedersen-like commitment. The fix changes
  the random base generation loop bound and the assertion to use NUM_SCALAR_BITS,
  and updates the commit phase to iterate over all scalar bits.
expected_findings:
- file: algorithms/src/commitment/bhp.rs
  line: 47
  summary: 'Insufficient random bases: the loop generating `random_base` uses `WINDOW_SIZE`
    as the bound but should use `NUM_SCALAR_BITS`, resulting in fewer random bases
    than needed to cover all scalar bits of the randomness input'
  line_side: pre_fix
- file: algorithms/src/commitment/bhp.rs
  line: 56
  summary: Assertion checks `random_base.len() == WINDOW_SIZE` but should check against
    `num_scalar_bits` to ensure the full scalar field is covered
  line_side: pre_fix
- file: algorithms/src/commitment/bhp.rs
  line: 76
  summary: Commit loop `scalar_bits.take(WINDOW_SIZE)` truncates randomness to WINDOW_SIZE
    bits instead of iterating over all `ScalarField::size_in_bits()` bits, discarding
    high-order randomness bits
  line_side: pre_fix
