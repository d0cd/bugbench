description: 'DeployRequest''s Serialize impl only serialized the `deployment` field,
  omitting `address` and `program_id`, so the struct was incomplete when sent over
  the wire. DeployResponse''s Deserialize impl read from the wrong JSON key (`program_id`
  instead of `deployment`), causing deserialization to fail. Both bugs were introduced
  in PR #1000 when the deploy request/response types were added.'
expected_findings:
- file: vm/package/deploy.rs
  line: 68
  summary: DeployRequest::serialize only serializes the `deployment` field but the
    struct has three fields (deployment, address, program_id). The `address` and `program_id`
    fields are silently dropped during serialization.
  line_side: pre_fix
- file: vm/package/deploy.rs
  line: 122
  summary: "DeployResponse::deserialize reads from `response[\"program_id\"]` but\
    \ should read from `response[\"deployment\"]` \u2014 wrong JSON key used to reconstruct\
    \ the Deployment object, causing deserialization failure."
  line_side: pre_fix
