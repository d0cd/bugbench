description: Block validation in verify.rs had an incorrect ratification count check,
  allowing blocks with fewer than the required minimum number of ratifications to
  pass verification. The fix corrects the ensure! macro condition at line 221 to properly
  enforce that blocks must contain at least 2 ratifications. This was identified during
  an NCC Group security audit (JBV finding).
