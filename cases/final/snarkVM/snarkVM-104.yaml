description: "The group addition and doubling circuit implementations used `Self::from(x3,\
  \ y3)` / `Affine::from(x3, y3)` to construct the result, which internally adds redundant\
  \ validation constraints on already-correct coordinates. Replacing with direct struct\
  \ construction `Self { x: x3, y: y3 }` eliminates unnecessary R1CS constraints (add:\
  \ 9\u21926, double: 8\u21925), improving proving performance without affecting correctness."
expected_findings:
- file: circuits/src/group/add.rs
  line: 109
  summary: 'Using `Self::from(x3, y3)` introduces redundant validation constraints
    on coordinates that were already correctly computed within the circuit; use direct
    struct construction `Self { x: x3, y: y3 }` to avoid unnecessary R1CS constraints.'
  line_side: pre_fix
- file: circuits/src/group/double.rs
  line: 83
  summary: 'Using `Affine::from(x3, y3)` introduces redundant validation constraints
    on already-valid doubled coordinates; use direct struct construction `Affine {
    x: x3, y: y3 }` to reduce constraint count.'
  line_side: pre_fix
