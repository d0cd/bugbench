description: The u128/i128 circuit division operations (div_wrapped, div_checked,
  rem_wrapped, shr_wrapped) used an inefficient constraint-generation approach for
  division. The fix optimizes these operations by using witness-based division checks
  and removes a redundant zero-check on the divisor, reducing the number of constraints
  generated in the arithmetic circuit.
