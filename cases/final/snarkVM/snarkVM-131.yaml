  line: 44
  summary: 'Inefficient u128 division implementation: should use `unsigned_division_via_witness`
    for fewer constraints instead of the existing approach'
- file: circuit/types/integers/src/rem_wrapped.rs
  line: 42
  summary: 'Inefficient u128 remainder implementation: should use witness-based division
    (`unsigned_division_via_witness`) to reduce constraint count'
- file: circuit/types/integers/src/div_checked.rs
