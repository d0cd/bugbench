description: The DPC model upgrade simplifies the serial number nonce computation
  to use the previous record's serial number, reduces outer circuit execution from
  4 proofs to 1, and adds enforcement that input program IDs match output program
  IDs or the noop program ID for each record pair. The prior model had incorrect or
  overly complex state transition logic that failed to properly validate program ID
  matching across input/output record pairs.
expected_findings:
- file: dpc/src/circuits/inner_circuit.rs
  line: 26
  summary: Inner circuit missing enforcement that input program ID matches output
    program ID or noop program ID for each (input, output) record pair, allowing invalid
    state transitions
- file: dpc/src/circuits/outer_circuit.rs
  line: 84
  summary: Outer circuit unnecessarily verifies 4 proofs instead of 1; program commitment
    verification logic is redundant and should be removed
- file: dpc/src/dpc.rs
  line: 60
  summary: DPC state transition logic does not account for noop/add/remove/update/split/join/joinsplit
    transition types, leading to incorrect serial number nonce derivation
