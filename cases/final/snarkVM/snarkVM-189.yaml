description: JSON serialization of deployment objects did not preserve field ordering
  because `serde_json` uses a HashMap by default, which has non-deterministic iteration
  order. This caused Deployment transaction verification to fail after a round-trip
  serialize/deserialize cycle. The fix adds the `preserve_order` feature flag to `serde_json`
  (switching its internal map to IndexMap) and changes the Deployment struct's verifying_keys
  from IndexMap to Vec to guarantee deterministic ordering.
expected_findings:
- file: Cargo.toml
  line: 217
  summary: serde_json dependency lacks `preserve_order` feature, causing non-deterministic
    key ordering during serialization which breaks transaction verification
- file: synthesizer/src/process/stack/deployment/mod.rs
  line: 24
  summary: verifying_keys stored in an IndexMap which does not guarantee the same
    order as the program's function definitions; should use Vec to enforce explicit
    ordering
- file: synthesizer/src/process/stack/mod.rs
  line: 412
  summary: Equality check on finalize_types (stored in an unordered map) may produce
    inconsistent results if ordering is not preserved
