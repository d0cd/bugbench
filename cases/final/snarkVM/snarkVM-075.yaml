pr_title: '[Fix] CI for memory-intensive synthesizer tests'
pr_body: "Builds on #2593 and achieves sub 20 minute CI times for synthesiser tests\
  \ on `2xlarge` instances. Memory-intensive tests are moved to a dedicated multi-threaded\
  \ job (`synthesizer-mem-heavy`) and the other synthesizer tests can now be run in\
  \ parallel without OOM'ing. \r\n\r\nI have also commented out the highest power\
  \ test cases as the parameter download fails for them at the moment. We don't use\
  \ these in production but it might be possible to restore their testing on CI by:\r\
  \n1. ssh'ing into the machine while the main job sleeps (don't `pkill sleep` or\
  \ the job will fail)\r\n2. running the tests manually to download the parameters\
  \ (retries should eventually succeed)\r\n4. making sure the `resources` directory\
  \ gets cached\r\n"
pr_commit_messages:
- Remove aleonet circleci resource
- Lower the number of --test-threads to avoid SIGKILL
- 'ci: ignore two memory-intensive tests'
- 'ci: multi-thread synthesizer tests'
- 'ci: dedicated job for mem-heavy synthesizer tests'
- 'ci: multi-thread mem-heavy synthesizer tests'
- 'ci: temporarily disable highest power test cases'
