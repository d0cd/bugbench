description: 'CI was running out of memory (OOM) when executing memory-intensive synthesizer
  tests on shared jobs. The fix reorganizes CI by moving heavy tests to a dedicated
  multi-threaded job with appropriate instance sizing, annotating memory-intensive
  tests with #[ignore], and commenting out highest-power test cases whose parameter
  downloads were failing.'
