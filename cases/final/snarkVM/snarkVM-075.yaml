description: The block header Metadata was missing the `last_coinbase_target` field,
  which is required to correctly calculate subsequent coinbase targets. Without tracking
  the previous coinbase target, the consensus mechanism could not properly adjust
  difficulty. The fix adds `last_coinbase_target` (u64) throughout the Metadata struct,
  its serialization/deserialization, genesis initialization, and updates the ANCHOR_TIME
  constant.
expected_findings:
- file: synthesizer/src/block/header/metadata/mod.rs
  line: 37
  summary: Metadata struct is missing a `last_coinbase_target` field needed for computing
    subsequent coinbase targets; without it, target adjustment logic lacks historical
    context.
- file: console/network/src/lib.rs
  line: 87
  summary: ANCHOR_TIME constant value may be incorrect for the intended consensus
    timing, affecting coinbase target calculations.
- file: synthesizer/src/block/header/metadata/to_hash.rs
  line: 20
  summary: Metadata bit length comment and hash input are incorrect (should be 432
    bits, not the previous value) because `last_coinbase_target` (64 bits) is not
    included in the hash preimage.
