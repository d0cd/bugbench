description: The Identifier parser did not reject identifiers matching LiteralType
  names (e.g., 'boolean', 'field', 'u64'), causing parsing ambiguity where a literal
  type could be incorrectly parsed as a struct identifier. The fix adds a validation
  check in Identifier::from_str to reject reserved literal type names, and reorders
  parse alternatives in PlaintextType to try Identifier (now guarded) before LiteralType,
  so prefixes like 'u8jdsklaj' parse as identifiers rather than being partially consumed
  by LiteralType.
expected_findings:
- file: console/program/src/data/identifier/parse.rs
  line: 52
  summary: 'Missing validation: Identifier parser accepts strings that are reserved
    LiteralType names (''boolean'', ''field'', ''u64'', etc.). Should reject via LiteralType::from_str
    check to prevent ambiguous parsing.'
  line_side: pre_fix
- file: console/program/src/data_types/plaintext_type/parse.rs
  line: 24
  summary: 'Parse order bug: LiteralType::parse is tried before Identifier::parse
    in the alt() combinator, so inputs like ''u8jdsklaj'' get partially consumed by
    LiteralType as ''u8'' instead of being parsed as a struct identifier. Order should
    be swapped (with Identifier now guarded against literal type names).'
  line_side: pre_fix
