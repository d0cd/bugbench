description: Scalar::eject_mode() had a hand-rolled mode aggregation that would panic
  (halt) when encountering mixed Public and Private bits in the scalar's bits_le representation,
  instead of correctly lifting to Mode::Private. The fix delegates to self.bits_le.eject_mode()
  which uses the generic aggregation logic that properly handles all mode combinations
  by starting from Mode::Constant and lifting through Public to Private as needed.
expected_findings:
- file: circuits/types/scalar/src/lib.rs
  line: 56
  summary: Scalar::eject_mode() incorrectly halts on mixed Public+Private bit modes
    instead of lifting to Mode::Private; the custom aggregation logic fails when scalar_mode
    is Public and a Private bit is encountered. Should delegate to self.bits_le.eject_mode()
    instead of reimplementing mode aggregation.
  line_side: pre_fix
- file: circuits/types/scalar/src/lib.rs
  line: 63
  summary: 'Match arm `false => E::halt(...)` is too strict: when scalar_mode is Mode::Public
    and bit_mode is Mode::Private, the correct behavior is to lift to Mode::Private,
    not halt. This makes ternary operations on mixed-mode scalars crash.'
  line_side: pre_fix
