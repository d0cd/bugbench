description: The epoch_provers_cache was not cleared when loading from DB at exactly
  an epoch boundary (block_height % NUM_BLOCKS_PER_EPOCH == 0). While the runtime
  advance path correctly cleared the cache at epoch boundaries, the DB loading path
  missed this check, causing deviation from expected cached values and potential incorrect
  epoch prover data.
