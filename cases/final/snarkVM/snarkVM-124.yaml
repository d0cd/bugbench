pr_title: Implement Merkle path gadget
pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending the time\
  \ to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR implements an\
  \ initial version of a Merkle path gadget with the new circuits library. \r\n\r\n\
  One note is that this current implementation is hard-coded to the only existing\
  \ CRH gadget in the library - Poseidon. This will need to be generalized to support\
  \ other CRH implementations like Pedersen and BHP.\r\n\r\nAdditionally, because\
  \ the Merkle path gadget must match the native Merkle implantation that uses the\
  \ native `PoseidonCRH`, there is a lot of unnecessary padding being done. This is\
  \ due to `PoseidonCRH` requiring a padded bit implementation (using \r\na predetermined\
  \ `INPUT_SIZE_FE`). The struggle here is that the native Merkle tree implementation\
  \ deals with bytes for the hash inputs, while Poseidon prefers Field elements.\r\
  \n"
