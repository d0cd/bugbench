id: snarkVM-038
repo: ProvableHQ/snarkVM
base_commit: 24185ff684cefb92c4ff5481e167cedc34fb056e^
head_commit: 807988eb4ee620a78c85d760ed59c26983345791
fix_commit: 24185ff684cefb92c4ff5481e167cedc34fb056e
category: performance
difficulty: easy
severity: low
language: rust
pr_size: xl
description: The synthesizer/benches/instruction.rs benchmark file uses heavy macro
  expansion that significantly increases build and clippy times for all developers.
  The fix comments out the [[bench]] entry in Cargo.toml to disable the benchmark
  from default builds while preserving the source for manual use.
expected_findings:
- file: algorithms/Cargo.toml
  line: 25
  summary: Benchmark entries (commitment_bhp, pedersen_crh, bhp_crh, hash_to_curve,
    merkle_tree, encryption, prf, signature) included in default builds cause heavy
    macro expansion that significantly increases build and clippy times for all developers
  line_side: pre_fix
- file: algorithms/src/fft/domain.rs
  line: 119
  summary: next_power_of_two() can panic on overflow for large inputs; should use
    checked_next_power_of_two() to safely return None
  line_side: pre_fix
- file: algorithms/src/polycommit/kzg10/mod.rs
  line: 235
  summary: MSM bases slice is unbounded (`powers_of_beta_g[num_leading_zeros..]`)
    instead of being bounded to match the number of coefficients, causing unnecessary
    extra bases to be passed to the multi-scalar multiplication
  line_side: pre_fix
- file: algorithms/src/polycommit/kzg10/mod.rs
  line: 383
  summary: "Same unbounded MSM bases slice bug in open_with_witness_polynomial \u2014\
    \ `powers_of_beta_g[num_leading_zeros..]` should be bounded to `num_leading_zeros\
    \ + witness_coeffs.len()`"
  line_side: pre_fix
- file: circuit/algorithms/src/bhp/hasher/hash_uncompressed.rs
  line: 158
  summary: Converting Montgomery to Edwards using from_x_coordinate is inefficient
    (3 constraints + square root recovery); y-coordinate can be computed directly
    from Montgomery form, avoiding the expensive recovery
  line_side: pre_fix
- file: algorithms/src/traits/algebraic_sponge.rs
  line: 30
  summary: AlgebraicSponge trait uses separate CAPACITY const generic and a separate
    DefaultCapacityAlgebraicSponge trait, lacking integrated nonnative field absorption/squeezing
    needed for Fiat-Shamir in the SNARK
  line_side: pre_fix
- file: circuit/environment/src/helpers/linear_combination.rs
  line: 99
  summary: is_boolean_type uses `all` instead of `any`, meaning it only flags a violation
    when ALL terms are non-boolean rather than when ANY term is non-boolean
  line_side: pre_fix
- file: circuit/algorithms/src/poseidon/hash_many.rs
  line: 29
  summary: Hardcoded `RATE - 2` padding assumes exactly 2 elements were pushed to
    preimage; should use resize(RATE) to correctly pad to the rate regardless
  line_side: pre_fix
- file: circuit/algorithms/src/poseidon/hash_to_scalar.rs
  line: 29
  summary: Field-to-scalar conversion via bit decomposition and slicing is inefficient
    and less correct than using from_field_lossy which handles the truncation properly
  line_side: pre_fix
- file: circuit/program/src/data/record/decrypt.rs
  line: 28
  summary: Record decrypt method accepts an external nonce parameter instead of using
    self.nonce, allowing potential nonce mismatch during decryption
  line_side: pre_fix
- file: circuit/program/src/data/record/to_commitment.rs
  line: 31
  summary: Record commitment uses commit_bhp1024 with a randomizer scalar instead
    of hash_bhp1024, and omits the record_name from the preimage, producing incorrect
    commitment values
  line_side: pre_fix
- file: circuit/types/field/src/compare.rs
  line: 31
  summary: When self is constant, to_bits_le() creates unnecessary circuit variables
    instead of using eject_value().to_bits_le() to get native bits directly, wasting
    constraints
  line_side: pre_fix
- file: circuit/types/field/src/compare.rs
  line: 42
  summary: When other is constant, to_bits_le() creates unnecessary circuit variables
    instead of using eject_value().to_bits_le() to get native bits directly, wasting
    constraints
  line_side: pre_fix
- file: circuit/types/field/src/div.rs
  line: 64
  summary: Division by zero for non-constant divisor silently produces incorrect quotient
    witness instead of properly failing; the quotient*other==self constraint passes
    for 0/0 case
  line_side: pre_fix
- file: circuit/types/group/src/helpers/from_xy_coordinates.rs
  line: 24
  summary: from_xy_coordinates only checks the curve equation (ax^2+y^2=1+dx^2y^2)
    but does not enforce subgroup membership, allowing points outside the prime-order
    subgroup to be accepted as valid
  line_side: pre_fix
- file: circuit/types/group/src/lib.rs
  line: 59
  summary: Group::new (Inject) directly injects x,y coordinates and delegates to from_xy_coordinates
    without performing cofactor multiplication to enforce subgroup membership, a soundness
    vulnerability
  line_side: pre_fix
- file: circuit/types/integers/src/div_wrapped.rs
  line: 27
  summary: Division by zero for non-constant divisors uses E::assert which halts rather
    than producing unsatisfied constraints, preventing proper circuit-level enforcement
    when divisor is a variable that happens to be zero
  line_side: pre_fix
- file: circuit/types/scalar/src/compare.rs
  line: 30
  summary: Incorrect debug_assert used `modulus()` (which is the full modulus) with
    strict less-than instead of `(-one()).to_bigint()` (modulus minus one) with less-than-or-equal,
    causing a wrong safety invariant check for the scalar-to-base-field comparison
    optimization
  line_side: pre_fix
- file: circuit/types/scalar/src/add.rs
  line: 108
  summary: Scalar addition Metrics::count reported 254 constants for non-constant
    mode pairs instead of the correct 1, producing wrong constraint accounting
  line_side: pre_fix
- file: circuit/types/scalar/src/helpers/from_bits.rs
  line: 38
  summary: Excess bits check used OR-fold into a single Boolean then a single assert,
    which is less sound than asserting each excess bit is individually zero; also
    the subsequent modulus range check used Scalar::is_less_than_or_equal (an expensive
    circuit comparison) instead of the cheaper Boolean::assert_less_than_or_equal_constant
  line_side: pre_fix
- file: console/algorithms/src/bhp/hasher/mod.rs
  line: 84
  summary: Using cfg_iter! (parallel iterator) for bases lookup computation adds unnecessary
    overhead during BHP setup, replaced with sequential bases.iter()
  line_side: pre_fix
- file: console/algorithms/src/poseidon/helpers/sponge.rs
  line: 129
  summary: MDS matrix application uses individual Field multiply-and-sum instead of
    optimized sum_of_products, causing unnecessary intermediate allocations and reduced
    performance
  line_side: pre_fix
- file: console/network/environment/src/helpers/sanitizer.rs
  line: 53
  summary: Block comment parser used take_until("*/") which accepts any characters
    including unsafe/unsupported Unicode codepoints (bidi characters, control characters)
    without validation
  line_side: pre_fix
- file: console/network/environment/src/helpers/sanitizer.rs
  line: 105
  summary: Line comment parser used anychar which accepts any character including
    unsafe Unicode codepoints without checking if the character is supported/safe
  line_side: pre_fix
- file: synthesizer/benches/instruction.rs
  line: 1
  summary: Heavy macro expansion in benchmark file included in default builds significantly
    increases build and clippy times for all developers
  line_side: pre_fix
- file: console/types/field/src/arithmetic.rs
  line: 143
  summary: Field division does not check for division by zero, allowing undefined
    behavior when dividing by the zero field element
  line_side: pre_fix
- file: console/types/group/src/from_xy_coordinate.rs
  line: 23
  summary: Group construction from (x, y) coordinates does not validate that the point
    is on the curve, accepting potentially invalid group elements without error
  line_side: pre_fix
- file: console/types/scalar/src/arithmetic.rs
  line: 143
  summary: "Scalar division by zero not checked \u2014 `self.scalar / other.scalar`\
    \ proceeds without verifying `other` is non-zero, causing undefined behavior or\
    \ panic"
  line_side: pre_fix
- file: console/types/integers/src/size_in_bits.rs
  line: 23
  summary: Unsafe `as usize` cast of `I::BITS` (a u64) could silently truncate on
    platforms where usize is smaller than u64
  line_side: pre_fix
- file: console/types/string/src/bytes.rs
  line: 46
  summary: Unsafe `self.string.len() as u16` cast could silently truncate string length
    if it exceeds u16::MAX
  line_side: pre_fix
- file: curves/src/templates/short_weierstrass_jacobian/affine.rs
  line: 161
  summary: mul_bits does not skip leading zeros, causing incorrect scalar multiplication
    by processing unnecessary doublings
  line_side: pre_fix
- file: curves/src/templates/twisted_edwards_extended/projective.rs
  line: 214
  summary: 'Incorrect computation of C in Edwards addition: uses other.x * other.y
    instead of other.t, causing wrong point addition results'
  line_side: pre_fix
- file: curves/src/templates/macros.rs
  line: 140
  summary: Deserialization skips point validation when PROCESSING_SNARK_PARAMS flag
    is set, allowing invalid curve points to bypass checks
  line_side: pre_fix
- file: dpc/src/lib.rs
  line: 1
  summary: The entire dpc crate is included in the build, contributing heavy compilation
    overhead (macro expansion, complex generics, SNARK circuits) that significantly
    increases build and clippy times for all developers
  line_side: pre_fix
- file: fields/src/fp2.rs
  line: 414
  summary: Fp2 multiplication uses Karatsuba method with multiple intermediate allocations
    instead of more efficient sum_of_products approach
  line_side: pre_fix
- file: gadgets/src/fields/fp.rs
  line: 1
  summary: The gadgets crate contains heavy source files (e.g., 1321-line fp.rs, 1831-line
    boolean.rs) with extensive generic/macro code that significantly increases compile
    and clippy times for all developers, even though these files are not needed for
    default builds
  line_side: pre_fix
- file: gadgets/src/integers/uint/macros.rs
  line: 207
  summary: Heavy macro expansion in uint_impl! macro (addmany, mul, etc.) significantly
    increases build and clippy times for all developers by generating large amounts
    of code during compilation
  line_side: pre_fix
- file: synthesizer/Cargo.toml
  line: 37
  summary: The [[bench]] entry for instruction.rs is commented out to prevent heavy
    macro expansion from slowing down default builds and clippy for all developers
  line_side: pre_fix
- file: vm/compiler/src/snark/proof/bytes.rs
  line: 23
  summary: Proof version field read as u16 (2 bytes) instead of u8 (1 byte), inconsistent
    with all other serialized version fields in the codebase, causing incorrect deserialization
  line_side: pre_fix
- file: vm/compiler/src/snark/proof/bytes.rs
  line: 38
  summary: Proof version field written as u16 (2 bytes) instead of u8 (1 byte), wasting
    a byte and breaking compatibility with the expected serialization format
  line_side: pre_fix
- file: vm/compiler/src/process/transition/output/bytes.rs
  line: 54
  summary: Output::Record variant unnecessarily reads/writes a nonce field in byte
    serialization, bloating the serialized format with a field that is derivable from
    the record ciphertext
  line_side: pre_fix
- file: vm/compiler/src/process/transition/input/bytes.rs
  line: 52
  summary: Input::Record variant only stores the serial number but is missing the
    tag field, which is needed for record input verification
  line_side: pre_fix
- file: vm/compiler/src/process/transition/output/bytes.rs
  line: 65
  summary: Error message incorrectly says 'Failed to decode input variant' when it
    should say 'output variant' since this is the Output deserialization
  line_side: pre_fix
- file: vm/compiler/src/program/bytes.rs
  line: 35
  summary: Components count read as u8, limiting programs to 255 components; should
    be u16 to support larger programs
  line_side: pre_fix
- file: vm/compiler/src/program/closure/mod.rs
  line: 109
  summary: add_instruction checks that inputs are non-empty instead of checking that
    outputs are empty, allowing instructions to be added after output statements which
    breaks ordering invariants
  line_side: pre_fix
- file: vm/compiler/src/program/closure/mod.rs
  line: 113
  summary: 'Off-by-one error: uses <= instead of < for max instructions check, allowing
    one more instruction than the limit'
  line_side: pre_fix
- file: vm/compiler/src/program/instruction/operation/mod.rs
  line: 236
  summary: IsEqual and IsNotEqual defined via heavy crate::operation! macro expansion
    with 16 type combinations each, contributing to excessive build/clippy times;
    replaced with hand-written implementations in is.rs
  line_side: pre_fix
- file: utilities/Cargo.toml
  line: 64
  summary: Default features did not include parallelism (rayon/num_cpus/aleo-std),
    making parallel execution opt-in rather than default, hurting build and runtime
    performance for all developers
  line_side: pre_fix
- file: vm/package/build.rs
  line: 18
  summary: The build function unconditionally rebuilds every time without checking
    if a build is already up-to-date, wasting time on redundant compilation of proving/verifying
    keys
  line_side: pre_fix
