pr_body: "\u2026AX_COMMITTEE_SIZE\r\n\r\n## Summary\r\n\r\nThis is a bug fix related\
  \ to ARC-41. It fixes an issue where we were not properly extracting the validator\
  \ address from the `bond_validator` call. The result is that the check for exceeding\
  \ the maximum number of validators didn't work.\r\n\r\n## Testing\r\n\r\nRunning\
  \ the new unit test with the pre-existing confirms that the change ensures the check\
  \ now works again.\r\n\r\n## Release\r\n\r\nThis shouldn't require a reset or fork.\
  \ It should be deployable as a patch and validators can update asynchronously. "
