description: CRH and commitment scheme implementations returned projective curve points
  as output, but the Merkle tree gadget expected affine curve points, causing an inconsistency
  between the native and constraint worlds. The fix changes `type Output` to `G::Affine`
  across all Pedersen and Bowe-Hopwood hash/commitment implementations and introduces
  a `CurveGadget` trait to provide `AllocGadget<G::Affine, F>` in the constraint system.
