    interpret it as a hyperlink and emits a warning.
- file: circuit/environment/src/traits/operators.rs
  line: 36
  summary: Bare URL in doc comment not wrapped in `<>`, causing `cargo doc` warning.
- file: utilities/src/error.rs
  line: 41
  summary: Literal angle brackets `<line>` in doc comment are misinterpreted by rustdoc
    as an HTML tag / hyperlink; should use curly braces `{line}` instead.
