pr_title: Fix the Merkle tree inconsistency issue
pr_body: "## Motivation\r\n\r\nThis PR fixes the Merkle tree gadget failure in testnet2,\
  \ which consists of two parts:\r\n- in the native world, let CRH defined on the\
  \ projective curve outputs the hash as an affine curve element.\r\n- in the constraint\
  \ world, apply the corresponding changes.\r\n\r\nThe change in the constraint world\
  \ is slightly complicated, as previously the gadgets use `GroupGadget<G, F>` where\
  \ `G` is always a projective curve, and therefore it implements only `AllocGadget<G,\
  \ F>` but not `AllocGadget<G::Affine, F>` which we need. \r\n\r\nTherefore, a new\
  \ trait is introduced to reflect this need. \r\n```\r\npub trait CurveGadget<G:\
  \ ProjectiveCurve, F: Field>: GroupGadget<G, F> + AllocGadget<G::Affine, F> {}\r\
  \n```\r\n(open to suggestions for names for `CurveGadget`)\r\n\r\nThe requirement\
  \ `AllocGadget<G::Affine, F>` cannot be added to the `GroupGadget<G, F>` because\
  \ it is defined over generic groups `G: Group` rather than curves.\r\n\r\n## Test\
  \ Plan\r\n\r\nIt passes the tests in the gadgets and algorithms directory. \r\n\r\
  \n## Related PRs\r\n\r\nThis issue is discussed in #251.\r\n\r\nIt is part of `testnet2`\
  \ (#257)"
pr_commit_messages:
- add curve-gadget and use it
