description: Doc comments contained bare URLs, unescaped angle brackets, and incorrect
  code fence language annotations that caused `cargo doc` to emit warnings. The fix
  wraps URLs in angle brackets, puts type references in backticks, uses curly braces
  for literal angle brackets in prose, and corrects code block language tags.
