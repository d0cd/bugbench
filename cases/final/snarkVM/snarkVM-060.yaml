description: 'The `verify_authority` function contained unreachable dead code: a match
  on `expected_height == 0` included a genesis block beacon check that could never
  execute, since genesis blocks never pass through this path with a `previous_round`
  or `previous_height`. The fix removes the dead genesis branch and hoists the quorum
  block check unconditionally.'
expected_findings:
- file: ledger/block/src/verify.rs
  line: 143
  summary: 'Unreachable genesis block check: `match expected_height == 0 { true =>
    ensure!(self.authority.is_beacon(), ...)` is dead code because this function is
    never called for genesis blocks (previous_height is never such that expected_height
    == 0), giving a false sense of genesis validation coverage'
  line_side: pre_fix
