description: When looking up the built-in `credits.aleo` program, the code passed
  through whatever `edition` value was requested instead of always using edition 0.
  Since `credits.aleo` is a genesis/built-in program that only exists at version 0,
  requesting any other edition would fail to find it or return incorrect results.
  The fix forces edition 0 for `credits.aleo` lookups across all relevant code paths.
expected_findings:
- file: ledger/src/get.rs
  line: 254
  summary: credits.aleo lookup uses caller-supplied `edition` instead of hardcoding
    edition 0; credits.aleo is a genesis program that only exists at edition 0, so
    non-zero editions will fail to find it
  line_side: pre_fix
- file: ledger/store/src/transaction/deployment.rs
  line: 392
  summary: program_map().get_confirmed() passes variable `edition` for credits.aleo;
    should always use edition 0 for this built-in program
  line_side: pre_fix
- file: ledger/store/src/transaction/deployment.rs
  line: 414
  summary: 'Same edition bug: credits.aleo lookup should hardcode edition 0 instead
    of using the passed-in edition parameter'
  line_side: pre_fix
- file: ledger/store/src/transaction/deployment.rs
  line: 428
  summary: Same edition bug repeated in another lookup path for credits.aleo
  line_side: pre_fix
