pr_title: '[Fix] Selection of transition ID in finalize.'
pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending the time\
  \ to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThe motivating issue\
  \ for this PR is [here](https://github.com/AleoNet/snarkVM/issues/2570).\r\n\r\n\
  The original PR is [here](https://github.com/ProvableHQ/snarkVM/pull/2575).\r\n\r\
  \nFrom the original discussion:\r\n>Fundamentally, while the call graph is constructed\
  \ correctly, it is used in an unsound way to find the transition ID that corresponds\
  \ to `Future` that is passed in as an operand to an `await` command ([source](https://github.com/AleoNet/snarkVM/blob/4eb83d7f7276514baa9c44b920155750cfe855e7/synthesizer/process/src/finalize.rs#L269)).\
  \ The `child_transition_id` linked above is used to initialize the `FinalizeRegisters`.\
  \ The `transition_id` in `FinalizeRegisters` is only used to initialize an RNG in\
  \ the `rand` instructions. The purpose is the ensure that on-chain logic (in finalize\
  \ scopes) have a unique seed each time they are invoked. \r\n\r\n>The current implementation\
  \ has the following issues:\r\n>1. In the case where an async `function` calls a\
  \ mix of async and non-async functions, a [non-existent](https://github.com/AleoNet/snarkVM/blob/4eb83d7f7276514baa9c44b920155750cfe855e7/synthesizer/process/src/finalize.rs#L272)\
  \ transition is used in the call graph. Specifically it must an async function call\
  \ that itself makes an async function call that precedes a non-async call. This\
  \ results in the transaction getting rejected. **In this case, the impacted programs\
  \ are ones that use a specific mix of async and non-async calls.**\r\n>2. In the\
  \ case where only `async` calls are made, but are awaited in a different order than\
  \ the call graph, an incorrect transition ID is used for the `FinalizeRegisters`.\
  \ The only place where the transition ID is used is in the `rand.chacha` instruction.\
  \ **In this case, the impacted programs are ones that make async calls to programs\
  \ with `rand.chacha` but await the futures in a different order.**\r\n\r\n>There\
  \ are a number of possible ways this could be addressed:\r\n>1. Update the implementation\
  \ to get the correct transition ID. This would require more information to be passed\
  \ in during finalization.\r\n>2. Add a transition ID to the `Future`. This would\
  \ be a breaking change in the data format, but conceptually sound.\r\n>3. Fix the\
  \ use of the transition ID to not require the precise sub-transition, while maintaining\
  \ the invariant that RNG seeds are unique.\r\n\r\nThis PR proposes a solution to\
  \ this issue by introducing a nonce to `FinalizeRegisters`. This nonce is used to\
  \ seed the `rand` commands. Furthermore, instead of attempting to determine the\
  \ `child_transition_id` that corresponds to an awaited `Future` from the call graph,\
  \ this approach uses the main transition ID to initialize all `FinalizeRegisters`\
  \ for a given transaction. The main transition ID along with the nonce ensures that\
  \ each finalize context uses a unique seed for the RNG, while removing the need\
  \ to correctly determine the transition ID for a given `Future` (a complicated process).\r\
  \n\r\n## Migration\r\n\r\nThis proposal has been written to migrate at `N::CONSENSUS_V2_HEIGHT`.\r\
  \nGiven timelines, it's more likely that a new `N::CONSENSUS_V3_HEIGHT` would need\
  \ to be introduced. The migration would follow the process introduced in [ARC-0042](https://github.com/AleoNet/snarkVM/pull/2569).\r\
  \n\r\n## Test Plan\r\n\r\nThis PR includes a [test](https://github.com/ProvableHQ/snarkVM/blob/fix/rng-finalize/synthesizer/tests/tests/vm/execute_and_finalize/complex_finalization_2.aleo),\
  \ whose [expected output](https://github.com/ProvableHQ/snarkVM/blob/fix/rng-finalize/synthesizer/tests/expectations/vm/execute_and_finalize/complex_finalization_2.out)\
  \ demonstrates the the failure and the fix after `CONSENSUS_V2_HEIGHT` is reached.\r\
  \n\r\nIncluded is the [CI branch](https://github.com/ProvableHQ/snarkVM/tree/fix/rng-finalize-ci)\
  \ and the [CI diff](https://github.com/ProvableHQ/snarkVM/compare/fix/rng-finalize...fix/rng-finalize-ci).\r\
  \n\r\nNote that the `test_rand` integration test expectation changed because the\
  \ program integration tests now use the `test` feature which has different block\
  \ metadata, thus changing the blockhash, thus changing the on-chain RNG seed.\r\n\
  \r\n## Impact\r\n\r\nAs stated above, there are two classes of programs that are\
  \ impacted by this issue:\r\n1. those that use a mix of async and non-async calls\
  \ in a specific way.\r\n2. that make async calls to programs with `rand.chacha`\
  \ but await the futures in a different order that the async functions were called.\r\
  \n\r\nIn scanning all Aleo programs deployed on Mainnet as of **2/11/25 8AM PT**:\r\
  \n1. There are 13 functions among all programs deployed to mainnet, which contain\
  \ a non-async call, followed by an async call. In the above functions, none of the\
  \ async calls take a `Future` as input, thus do not exhibit this issue.\r\n\r\n\
  2. There are 28 programs that use the `rand.chacha` command and 0 programs that\
  \ import, and consequently, call them.\r\n\r\n**This was confirmed by a static analyzer\
  \ on all programs on mainnet at the above date and time** and double-checked by\
  \ manual audit.\r\n\r\n## Related PRs\r\n- https://github.com/ProvableHQ/leo/pull/28443\r\
  \n\r\n## To Reviewers\r\n\r\nAn important function of this PR is to provide an understanding\
  \ of how async execution mechanism works and why this PR is needed. If reviewers\
  \ need context or clarification, please feel to post your questions in this thread.\
  \ I am also happy to do a call explaining the original and proposed design/code.\r\
  \n\r\n"
