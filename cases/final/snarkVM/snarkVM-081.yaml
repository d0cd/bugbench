description: During block deserialization, bounds checks existed for transactions,
  aborted transaction IDs, and aborted solution IDs, but the check for the number
  of solutions was missing. An attacker could craft a malicious block with an out-of-bounds
  solution count, potentially causing excessive memory allocation or denial of service
  during deserialization.
