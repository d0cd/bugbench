description: The variable `modulus_minus_one` was assigned `E::Scalar::modulus()`
  (the full modulus, not modulus minus one), making the name misleading. The accompanying
  comments incorrectly stated the value was the modulus minus one and that the check
  was 'less than or equal to', when in fact the comparison was strict less-than against
  the full modulus. The fix renames the variable to `modulus` and corrects the comments
  to match the actual logic.
