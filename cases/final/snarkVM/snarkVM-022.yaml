  summary: 'Missing caller-type check: `bond_public` should verify the caller is a
    user (not a program) when bonding as a validator, since programs cannot participate
    in consensus'
  line_side: pre_fix
- file: synthesizer/program/src/resources/credits.aleo
  line: 123
  summary: 'Missing caller-type check: after validating the stake amount, `bond_public`
    proceeds to bond without verifying that the caller is a user account (self.caller
    == self.signer) when bonding as a validator (self.caller == r0). A program can
    bond as a validator even though programs cannot participate in consensus.'
  line_side: pre_fix
