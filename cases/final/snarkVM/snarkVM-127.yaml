description: The Varuna SNARK verifier did not validate the number of public inputs,
  allowing more inputs than the circuit supports to be passed in. This could lead
  to incorrect verification results. The fix adds a bounds check on the public input
  count against the circuit's expected size, and rejects inputs that exceed the limit.
