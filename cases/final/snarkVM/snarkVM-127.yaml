pr_title: Fully atomic rocksDB writes
pr_body: "While we're already using rocksDB's atomic write batches, they are currently\
  \ only atomic within a single `DataMap`. In order to have fully atomic writes, we\
  \ need to adjust the current logic to keep track of the queued operations across\
  \ all the maps and perform a write only once per atomic write batch.\r\n\r\nUnlike\
  \ with the typed `DataMap`s, this forces us to keep track of the untyped/serialized\
  \ operations within the shared storage object, and to update it in tandem with operations\
  \ on all the maps. This is made more complicated by the checkpointing logic, but\
  \ it can be achieved by keeping track of the atomic scope depth (i.e. the checkpoint\
  \ index) and using a \"stack of stacks\" instead of a single stack (like in the\
  \ `DataMap`). This way we are able to keep track of the checkpoints across all the\
  \ `DataMap`s, and gain improved tracking of nested storage operations.\r\n\r\nIn\
  \ order to better reflect the complexity of our typical storage operations, 2 new\
  \ tests containing nested `DataMap`s are also added.\r\n\r\nAs a drive-by, the `checkpoint`\
  \ field in `DataMap` is renamed to `checkpoints` in order to better reflect that\
  \ it contains a number of them as opposed to a single one at a time. Also, some\
  \ of the occurrences of replacing a vector with a new empty one are replaced with\
  \ a call to `Vec::clear` in order to preserve the earlier allocation(s)."
pr_commit_messages:
- 'fix: make the database write batches fully atomic'
- 'tests: add 2 multi-DataMap tests'
- 'fix: include the checkpoint logic in the atomic batch fix'
