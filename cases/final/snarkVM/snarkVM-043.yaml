description: WIP prototype of a constraint system for snarkVM circuits. As a large
  additive-only change (1337+ lines, 0 deletions) with no diff available and a 'WIP'
  title, this appears to be initial feature scaffolding rather than a targeted bug
  fix. The changed files span boolean constraints, field arithmetic (add, equal, zero,
  one), and circuit traits.
expected_findings:
- file: circuits/src/field/equal.rs
  line: 30
  summary: Equality check for Constant-vs-Variable and Variable-vs-Constant field
    cases are left as unimplemented!(), meaning any mixed-mode equality comparison
    will panic at runtime instead of producing a valid constraint
  line_side: pre_fix
- file: circuits/src/field/zero.rs
  line: 28
  summary: is_zero() is left as unimplemented!() rather than delegating to self.eq(&Self::zero()),
    so any zero-check on a Field will panic instead of producing a boolean constraint
  line_side: pre_fix
- file: circuits/src/field/one.rs
  line: 28
  summary: is_one() is left as unimplemented!() rather than delegating to self.eq(&Self::one()),
    so any one-check on a Field will panic instead of producing a boolean constraint
  line_side: pre_fix
