description: Large refactoring PR that introduces a `witness!` macro, updates circuit
  traits (Inject, TypeName), and switches LinearCombination internals from BTreeMap
  to IndexMap. The scope is broad, touching trait definitions, environment state management,
  macro hygiene, and constraint helpers across the circuits environment crate. Without
  the diff, the primary review concern is whether the IndexMap switch preserves deterministic
  ordering required for R1CS constraint generation, and whether the witness macro
  correctly manages the IN_WITNESS state flag across nested scopes.
expected_findings:
- file: circuits/environment/src/helpers/linear_combination.rs
  line: 21
  summary: Switching from BTreeMap to IndexMap changes iteration order from sorted-by-Variable
    to insertion-order; verify that R1CS constraint serialization and proof generation
    do not depend on a canonical variable ordering
  line_side: pre_fix
- file: circuits/environment/src/circuit.rs
  line: 25
  summary: "Thread-local IN_WITNESS flag uses RefCell<bool> with no RAII guard \u2014\
    \ if witness! macro panics mid-execution, the flag may remain set to true, corrupting\
    \ subsequent constraint generation in the same thread"
  line_side: pre_fix
- file: circuits/environment/src/helpers/converter.rs
  line: 58
  summary: "Public variable allocation iterates over LinearCombination terms; with\
    \ IndexMap the iteration order changed \u2014 confirm the converter produces identical\
    \ R1CS instances as before the refactor"
  line_side: pre_fix
