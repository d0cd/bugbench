description: "The code used `self.latest_committee()` when calculating the next block\
  \ timestamp from a subdag, but the correct committee to use is the committee lookback\
  \ \u2014 retrieved by subtracting COMMITTEE_LOOKBACK_RANGE from the subdag's anchor\
  \ round and fetching the committee for that earlier round. Using the wrong committee\
  \ could produce incorrect block timestamps and compromise consensus safety."
expected_findings:
- file: ledger/src/advance.rs
  line: 242
  summary: 'Wrong committee passed to subdag.timestamp(): uses self.latest_committee()
    but should use the committee lookback (committee at anchor_round - COMMITTEE_LOOKBACK_RANGE)
    to correctly weight the timestamp calculation.'
  line_side: pre_fix
