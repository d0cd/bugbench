description: The PR refactors the `FromBits` trait to remove the `mode` parameter
  from its methods, introduces `Inject::constant` for cleaner constant construction
  (e.g., `Boolean::constant(false)`), and adds an optional secondary little-endian
  bit representation for `Field`. The removal of `mode` from `FromBits` fixes incorrect
  or inconsistent mode handling across circuit types.
expected_findings:
- file: circuits/types/field/src/from_bits.rs
  line: 15
  summary: FromBits::from_bits_le previously accepted a `mode` parameter that could
    lead to incorrect circuit mode assignment; the mode should be derived from the
    bits themselves, not passed explicitly.
- file: circuits/types/boolean/src/from_bits.rs
  line: 20
  summary: FromBits::from_bits_le previously accepted a `mode` parameter, creating
    an inconsistent API where the mode could contradict the actual mode of the input
    bits.
- file: circuits/types/field/src/compare.rs
  line: 21
  summary: Initialization of `is_less_than` previously used a less clear or incorrect
    constant construction pattern; should use `Boolean::constant(false)` via the new
    `Inject::constant` trait method.
