description: The WASM parameter download implementation attempted to spawn a local
  async task within a single-threaded WebAssembly environment to fetch parameters
  alongside synchronous code. This approach is fundamentally broken because WASM shares
  the JavaScript event loop, so spawning an async task from synchronous code blocks
  the entire event loop, causing parameter downloads to hang or fail. The fix reworks
  the WASM fetch path and related synthesizer/inclusion code to properly handle parameter
  acquisition in the WASM execution model.
