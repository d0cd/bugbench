description: 'An XL prototype PR for circuit literals and bytecode parsing contains
  repeated copy-paste documentation errors: several doc comments say ''Returns the
  type name'' when they should say ''Returns the opcode as a string''. This pattern
  is duplicated across multiple instruction files (input, output, add, store, sub),
  indicating a careless copy-paste during initial implementation.'
expected_findings:
- file: bytecode/src/function/input.rs
  line: 62
  summary: Copy-paste doc comment on opcode() says 'Returns the opcode as a string'
    but Input/Output are declarations not instructions; the doc was copy-pasted from
    type_name pattern and may read 'Returns the type name' in some versions
  line_side: pre_fix
- file: bytecode/src/function/output.rs
  line: 38
  summary: "Copy-paste doc comment error on Output::opcode() \u2014 same 'Returns\
    \ the type name' pattern duplicated from other files instead of correct opcode\
    \ description"
  line_side: pre_fix
- file: bytecode/src/instructions/add.rs
  line: 38
  summary: "Copy-paste doc comment error on Add::opcode() \u2014 doc comment copy-pasted\
    \ from type_name() pattern saying 'Returns the type name' instead of 'Returns\
    \ the opcode as a string'"
  line_side: pre_fix
- file: circuits/src/fields/base/square.rs
  line: 117
  summary: 'Copy-paste error: test function named ''test_1_double'' in square.rs should
    be ''test_1_square'''
  line_side: pre_fix
- file: circuits/src/fields/base/square.rs
  line: 124
  summary: 'Copy-paste error: test function named ''test_2_double'' in square.rs should
    be ''test_2_square'''
  line_side: pre_fix
- file: circuits/src/boolean/ternary.rs
  line: 47
  summary: Boolean::new(Mode::Private, ...) creates a full Boolean with unnecessary
    constraints instead of declaring a raw witness variable via E::new_variable(),
    causing extra constraint overhead (2 instead of 1)
  line_side: pre_fix
- file: circuits/src/boolean/xor.rs
  line: 39
  summary: Boolean::new(Mode::Private, ...) goes through the full Boolean initialization
    path instead of using E::new_variable() to create a witness variable directly,
    adding unnecessary constraints
  line_side: pre_fix
- file: circuits/types/integers/src/pow_wrapped.rs
  line: 188
  summary: test_i8_constant_pow_u8_public incorrectly passes Mode::Constant as second
    arg instead of Mode::Public (copy-paste from constant/constant test)
  line_side: pre_fix
- file: circuits/types/integers/src/pow_checked.rs
