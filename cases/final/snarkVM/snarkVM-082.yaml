description: 'The block subdag verification was missing two critical checks: ensuring
  consecutive rounds from the latest ledger round, and ensuring the subdag is atomic
  (not a combination of multiple blocks'' subdags). Without these checks, block forging
  attacks were possible by submitting crafted subdags that skip rounds or combine
  subdags from separate blocks.'
expected_findings:
- file: ledger/block/src/verify.rs
  line: 173
  summary: 'Missing check: subdag rounds must be sequential/consecutive from the latest
    round in the ledger. Without this, a malicious subdag could skip rounds.'
  line_side: pre_fix
- file: ledger/src/check_next_block.rs
  line: 117
  summary: 'Missing check: subdag must be ''linked'' (atomic), ensuring it is not
    a combination of subdags from multiple blocks. Absence allows block forging via
    combined subdags.'
  line_side: pre_fix
- file: ledger/src/check_next_block.rs
  line: 136
  summary: Missing is_linked verification on the subdag in the alternative check path,
    same vulnerability as above.
  line_side: pre_fix
