pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending the time\
  \ to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR adds checks\
  \ to ensure that the Block Subdag checks are complete. There were 2 missing checks\
  \ previously:\r\n\r\n- Next block must have consecutive rounds from the latest round\
  \ in the ledger.\r\n- Subdag must be \"atomic\" and must not contain a combined\
  \ subdag from many blocks. _(This can be determined with a `is_linked` check)_\r\
  \n\r\n\r\nCI is run [here](https://app.circleci.com/pipelines/github/ProvableHQ/snarkVM?branch=fix%2Fsubdag-verification-ci).\r\
  \n## Test Plan\r\n\r\nThis PR adds tests to ensure that the block forging attacks\
  \ are mitigated. Extensive devnet testing has also been done to ensure that this\
  \ does not regress any launch criteria. \r\n\r\n\r\n"
pr_commit_messages:
- Add forged block test
- Add check for consequtive rounds
- Add is_linked checks in subdag
- Implement tests for blocks with forged subdags
