pr_title: Upgrades DPC model
pr_body: "## Motivation\r\n\r\nThis PR introduces the concept of `noop`, `add`, `remove`,\
  \ `update`, `split`, `join`, and `joinsplit` state transitions for records.\r\n\r\
  \n- Simplifies serial number nonce to be the previous record's serial number\r\n\
  - Reduces outer circuit execution from 4 to 1 proof, removes program commitments\
  \ as part of it\r\n- Adds enforcement that the input program ID either matches the\
  \ output program ID or noop program ID, for each (input, output) record pair\r\n\
  - Updates PoSW to depth 3\r\n- Adds metadata in block header leaves\r\n"
