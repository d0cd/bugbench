  line: 58
  summary: 'Inner circuit constraint changes: verify that program ID matching enforcement
    (input program ID == output program ID || noop program ID) is correctly constrained
    for every (input, output) record pair to prevent soundness issues'
  line_side: pre_fix
- file: dpc/src/circuits/outer_circuit.rs
  line: 84
  summary: 'Outer circuit reduced from 4 proof verifications to 1: verify the single
    proof verification correctly covers all cases previously handled by 4 separate
    proofs, as missing any case would be a soundness vulnerability'
  line_side: pre_fix
- file: dpc/src/dpc.rs
  line: 60
  summary: "State transition refactor: serial number nonce now derived from previous\
    \ record's serial number \u2014 verify this does not allow nonce collisions or\
