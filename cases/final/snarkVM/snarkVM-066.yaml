category: concurrency
difficulty: hard
severity: high
language: rust
pr_size: medium
description: Race condition in Ledger where `prepare_next_beacon_block` could read
  `current_block` from one state and `state_root` from a different state if `advance_to_next_block`
  executes concurrently between those two reads. The fix makes the block preparation
  functions atomic by acquiring a lock (likely reusing the sequential operation mutex)
  to prevent interleaved reads of inconsistent ledger state.
expected_findings:
- file: ledger/src/lib.rs
  line: 133
  summary: 'Missing synchronization: `prepare_next_beacon_block` reads `current_block`
    and `state_root` without holding a lock, allowing a concurrent `advance_to_next_block`
    to update state between the two reads, producing an invalid block with mismatched
    height and state root.'
- file: ledger/src/lib.rs
  line: 156
  summary: 'Missing synchronization: `prepare_next_quorum_block` similarly reads multiple
    ledger fields non-atomically, vulnerable to the same TOCTOU race condition where
    concurrent block advancement causes inconsistent reads.'
- file: ledger/src/advance.rs
  line: 21
  summary: The advance functions update `current_block` and `state_root` without coordinating
    with reader functions like `prepare_next_beacon_block`, enabling concurrent readers
    to observe partially-updated state.
