description: The BHP commitment setup generated `random_bases` using `WINDOW_SIZE`
  instead of `NUM_SCALAR_BITS`. When the window size was less than the number of scalar
  bits, there were insufficient random bases to properly randomize the commitment
  output, compromising cryptographic security. The fix changes the parameter to `NUM_SCALAR_BITS`
  to ensure full randomization coverage.
