description: The block header Metadata struct was missing a `last_coinbase_target`
  field needed for calculating subsequent coinbase targets. This PR adds the field
  throughout the data model including serialization, deserialization, genesis initialization,
  bit conversion, and hashing, and also introduces an ANCHOR_TIME constant.
