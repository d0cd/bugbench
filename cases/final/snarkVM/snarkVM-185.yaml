description: The block verification logic only checked that transaction IDs from the
  subdag existed in the ledger, but failed to verify that puzzle solution commitments
  (solutions) also existed. This PR extends the verification functions to return and
  check both solution commitments and transaction IDs, ensuring complete validation
  of subdag transmissions against the ledger.
