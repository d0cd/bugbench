description: The GET /testnet3/program/{program_id} endpoint did not handle the built-in
  `credits.aleo` program, which is not stored in the ledger's program storage but
  is a special built-in program. Requesting it returned an error instead of the program
  definition. The fix adds a special case to return `Program::credits()` when `credits.aleo`
  is requested.
expected_findings:
- file: rest/src/routes.rs
  line: 228
  summary: 'Missing special-case handling for built-in `credits.aleo` program: `ledger.read().get_program(program_id)`
    will fail for `credits.aleo` since it is not stored in the ledger''s program storage.
    Should check for `credits.aleo` and return `Program::credits()` instead.'
  line_side: pre_fix
- file: rest/src/routes.rs
  line: 225
  summary: GET program endpoint does not handle the built-in `credits.aleo` program;
    requests for it will fail even though it is a core system program that should
    always be available
  line_side: pre_fix
