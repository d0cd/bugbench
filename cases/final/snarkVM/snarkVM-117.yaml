pr_title: Use external Process in Package::deploy
pr_body: "## Motivation\r\n\r\nDeployment of programs with imports was recently broken,\
  \ because the deployment_cost function assumes the process contains all of the imports.\
  \ This PR ensures we are able to re-use a Process across the Package::deploy scope.\r\
  \n\r\n## Test Plan\r\n\r\nManually tested success of nested deployments. In the\
  \ future we'll have regression tests in CI on all known types of programs.\r\n\r\
  \n## Related PRs\r\n\r\nhttps://github.com/ProvableHQ/snarkOS/pull/3819"
