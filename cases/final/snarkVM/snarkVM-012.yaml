description: Deployment verification randomly generates inputs to execute the program
  and check that certificates match the assignment structure. The RNG was not deterministically
  seeded, so the verifier could generate different random inputs than the deployer,
  causing valid deployments to fail verification non-deterministically. The fix seeds
  the RNG deterministically (via rand_chacha) so both sides produce identical inputs.
