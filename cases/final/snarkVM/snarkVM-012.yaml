pr_title: '[Fix] Make deployment verification consistent by deterministically seeding
  the RNG.'
pr_body: "This PR:\r\n- fixes deployment verification by deterministically seeding\
  \ the RNG.\r\n\r\n## Failing Case\r\n\r\nThis issue was found in a deployed program\
  \ with a similar structure to:\r\n```\r\nprogram test.aleo;\r\nfunction foo:\r\n\
  \    input r0 as field.private;\r\n    cast r0 into r1 as scalar;\r\n```\r\n\r\n\
  At a high-level, deployments are verified by [randomly generating inputs](https://github.com/AleoNet/snarkVM/blob/be171ce0720544c2bc51e27e1674a62fff585adc/synthesizer/process/src/stack/deploy.rs#L107),\
  \ [executing the program](https://github.com/AleoNet/snarkVM/blob/be171ce0720544c2bc51e27e1674a62fff585adc/synthesizer/process/src/stack/deploy.rs#L161),\
  \ [extracting the assignment](https://github.com/AleoNet/snarkVM/blob/be171ce0720544c2bc51e27e1674a62fff585adc/synthesizer/process/src/stack/deploy.rs#L165),\
  \ and [checking that the associated certificates match the structure of the assignment](https://github.com/AleoNet/snarkVM/blob/be171ce0720544c2bc51e27e1674a62fff585adc/algorithms/src/snark/varuna/varuna.rs#L280).\
  \ **Note that the actual values do not matter. [Source](https://github.com/AleoNet/snarkVM/blob/be171ce0720544c2bc51e27e1674a62fff585adc/algorithms/src/snark/varuna/ahp/indexer/indexer.rs#L135)**\r\
  \n\r\nThe core issue is that RNG used in generating random inputs can differ across\
  \ different runs of [verify_deployment](https://github.com/AleoNet/snarkVM/blob/be171ce0720544c2bc51e27e1674a62fff585adc/synthesizer/process/src/stack/deploy.rs#L58).\r\
  \n\r\nThe failing case manifests in the following way:\r\n- The execution of `cast\
  \ r0 into r1 as scalar;` creates an invalid scalar field element when `r0` is larger\
  \ than the scalar field modulus.\r\n- The resulting value is [ejected](https://github.com/AleoNet/snarkVM/blob/be171ce0720544c2bc51e27e1674a62fff585adc/synthesizer/process/src/stack/registers/store.rs#L93)\
  \ before storing the result into the register `r1`.\r\n- [Scalar::eject_value](https://github.com/AleoNet/snarkVM/blob/be171ce0720544c2bc51e27e1674a62fff585adc/circuit/types/scalar/src/lib.rs#L75)\
  \ halts, if the scalar field element is invalid.\r\nConsequently, a deployment of\
  \ the above program can fail to verify depending on the random inputs that were\
  \ used. \r\n\r\n## Solution\r\n\r\nTo fix this issue, this PR deterministically\
  \ seeds the RNG used in deployment verification with the lower 64 bits of the deployment\
  \ ID. This ensures that validators will use the same seed for a particular deployment,\
  \ which ensures that they will always agree on whether the deployment is valid or\
  \ not.\r\n\r\n## Testing\r\n\r\nThis PR includes a test that attempts to deploy\
  \ a program that loads and stores data types with invalid scalar field elements.\
  \ The test verifies that the status of the deployment is consistent: always valid\
  \ or always invalid, independent of the RNG.\r\n\r\nCI for this branch is running\
  \ [here](https://app.circleci.com/pipelines/github/ProvableHQ/snarkVM?branch=fix%2Fdeployment-verification-ci).\r\
  \n\r\n## Considerations\r\n\r\nIn addition to this PR, additional mitigations can\
  \ be put in place to ensure that:\r\n- `Scalar::eject_value` does not halt\r\n-\
  \ Loading and storing circuits to registers does not invoke `eject_value`. This\
  \ is dependent on whether or not the invocations of `eject_value` are intended to\
  \ serve as a value check or a less strict type check.\r\n\r\n## Related PRs\r\n\r\
  \nUse this PR over #2534\r\n\r\n"
