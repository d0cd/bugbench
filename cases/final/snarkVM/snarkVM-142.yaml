description: The `output_type` method for the `commit` instruction incorrectly returned
  the same type (Field) for all commit variants. Pedersen64 and Pedersen128 commit
  operations produce a Group element, not a Field element, so their output type should
  be LiteralType::Group. This type mismatch could cause downstream type-checking failures
  or silent miscompilation of Aleo programs.
expected_findings:
- file: synthesizer/src/program/instruction/operation/commit.rs
  line: 175
  summary: Match arm incorrectly groups Pedersen commit variants (2 | 3) with BHP
    variants (0 | 1), returning LiteralType::Field for all. Pedersen64 and Pedersen128
    commit should return LiteralType::Group, not LiteralType::Field.
