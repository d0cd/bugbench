description: When parsing a line comment `// ...` that ends without a trailing newline
  (i.e., at EOF), the sanitizer neglected to verify that the comment contains no unsafe
  characters. This could allow unsafe characters to bypass validation in comments
  that happen to be the last content in the input. The fix adds the missing safety
  check for the EOF-terminated line comment path.
expected_findings:
