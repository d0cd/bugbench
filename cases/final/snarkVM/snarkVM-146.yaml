description: The call graph construction in `verify_execution` included all `Instruction::Call`
  targets without distinguishing between function calls (which produce separate transitions)
  and closure calls (which are inlined and produce no transitions). This caused the
  traversal stack to contain extra entries for closures, leading to 'Invalid traversal
  - traversal stack is not empty' errors when verifying executions of functions that
  call closures. The fix adds a `get_function` check to only include calls that resolve
  to actual functions/transitions.
expected_findings:
- file: synthesizer/src/process/verify_execution.rs
  line: 324
  summary: Call graph construction does not distinguish closure calls from function
    calls. The filter_map includes every Instruction::Call target as a child transition,
    but closures are inlined and do not produce separate transitions. This causes
    the traversal stack to have extra entries that don't match actual Execution transitions,
    resulting in 'Invalid traversal - traversal stack is not empty' errors.
  line_side: pre_fix
