pr_title: '[Fix] Fixes `verify_execution` on functions that call closures.'
pr_body: "This PR, fixes `verify_execution` on functions that call closures.\r\nPrior\
  \ to this PR, the call graph, used to verify transitions, would include calls to\
  \ closures. \r\nThis resulted in call graphs that were inconsistent with the transitions\
  \ in an `Execution`.\r\nThe errors produced were of the form:\r\n```\r\nInvalid\
  \ traversal - traversal stack is not empty',\r\n```\r\nThis PR fixes the issue by\
  \ excluding calls to closures from the call graph.\r\n"
