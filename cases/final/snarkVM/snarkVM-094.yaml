pr_title: Fix instruction opcodes with a dot `.`
pr_body: "## Overview\r\nRemoves a call to `Identifier::from_str` (which requires\
  \ alphanumeric characters) in `check_instruction_opcode`.\r\n\r\n\r\n## Previous\
  \ Error\r\nPreviously, any program that contained an instruction with a dot (`is.eq`,\
  \ `add.w`, etc) would fail to build in the Aleo CLI during a call to `Package::build`\
  \ which calls `check_instruction_opcode`.\r\n```\r\n\u26A0\uFE0F  Identifier 'is.eq'\
  \ must be alphanumeric and underscores\r\n```\r\n"
pr_commit_messages:
- remove call to Identifier::from_str in check_instruction_opcode
