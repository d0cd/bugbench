pr_title: Remove snarkVM CLI
pr_body: "This PR completely removes the snarkVM CLI and all related functionality\
  \ as requested in the issue. The CLI was identified as a maintenance burden with\
  \ limited utility since:\n\n- [x] Remove snarkVM CLI binary and all commands (execute,\
  \ new, run, clean, update)\n- [x] Remove CLI-specific features and dependencies\
  \ \n- [x] Clean up unused dependencies identified by cargo machete\n- [x] Update\
  \ README to focus on library usage instead of CLI\n- [x] Restore file and package\
  \ features as requested by maintainers\n- [x] Clean up formatting issues in Cargo.toml\
  \ (empty lines)\n- [x] Rebase branch to latest staging\n\n## What was removed:\n\
  \n- **Binary entry point**: Removed the `snarkvm` binary and all CLI commands (execute,\
  \ new, run, clean, update)\n- **Features**: Removed `cli` feature which was only\
  \ used by the CLI\n- **Dependencies**: Removed CLI-specific dependencies including\
  \ clap, colored (CLI usage only), self_update, num-format, and anstyle\n- **Additional\
  \ cleanup**: Removed unused dependencies (`anyhow`, `rand`) identified by cargo\
  \ machete\n- **Code**: Deleted entire `vm/cli` directory (13 files, 1,142 lines\
  \ of code)\n- **Documentation**: Updated README to remove CLI installation/usage\
  \ instructions and focus on library usage\n\n## What was preserved:\n\n- All core\
  \ snarkVM library functionality remains intact\n- All default features (algorithms,\
  \ circuit, console, ledger, parameters, synthesizer, utilities) are unchanged\n\
  - Library API is preserved for external consumers\n- **Restored `file` and `package`\
  \ features**: These features were restored as they are needed by existing projects\
  \ like snarkOS\n- **Core dependencies preserved**: The `colored` dependency is preserved\
  \ as it's used by core parameter downloading functionality\n- Project builds successfully\
  \ and all tests pass\n\nThe removal significantly reduces the maintenance burden\
  \ while preserving all essential functionality that external applications depend\
  \ on. The README now properly reflects snarkVM as a library rather than a CLI tool.\n\
  \n**Latest updates**: \n- \u2705 **Merged staging branch**: Successfully incorporated\
  \ all latest changes from staging while preserving CLI removal\n- \u2705 **Resolved\
  \ conflicts**: Removed CLI files that were modified in staging, kept library-focused\
  \ README\n- \u2705 **Fixed formatting**: Cleaned up empty lines in Cargo.toml per\
  \ feedback\n\nFixes #2916.\n\n<!-- START COPILOT CODING AGENT TIPS -->\n---\n\n\U0001F4A1\
  \ You can make Copilot smarter by setting up custom instructions, customizing its\
  \ development environment and configuring Model Context Protocol (MCP) servers.\
  \ Learn more [Copilot coding agent tips](https://gh.io/copilot-coding-agent-tips)\
  \ in the docs."
