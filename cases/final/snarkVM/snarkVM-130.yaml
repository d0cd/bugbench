pr_title: Fixes bug in `shl_checked` circuit
pr_body: "This PR\r\n- Fixes a bug in the `shl_checked` circuit.\r\n\r\nFor reference,\
  \ the specification for `shl_checked` is given below.\r\nSuppose we have `a.shl_checked(b)`,\
  \ where a is an integer of size `N`. \r\nThe operation must enforce that:\r\n- `b`\
  \ < `N`.\r\n- the **result** of `a * 2 ^ b` is a valid integer.\r\n\r\nOne noteworthy\
  \ case is `-1i8 << 7u8`. \r\nIn this case we have that `2i8 ^ 7u8 = 128i8`, which\
  \ is not a valid i8.\r\nHowever the result of the operation is `-128i8`, which is\
  \ a valid i8.\r\nThe operation must not error on this case.\r\n"
pr_commit_messages:
- Fix bug in shl_checked circuit
- Override native implementation of checked_shl
- Fix shl_checked implementation in console integers
- shl_checked conforms to spec; make precise unsatisfied tests
- Update instruction test macro to use the correct logic for shl_checked
- Fix shl_checked test
- Merge branch 'testnet3' into fix/shl-checked
- Remove use of num_traits::CheckedShl
