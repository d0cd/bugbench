description: The shl_checked circuit for signed integers computed the shift as self
  * base^rhs, but the intermediate power-of-two overflows for the maximum shift amount
  (e.g., 2i8^7 = 128 overflows i8), causing valid operations like -1i8 << 7u8 = -128i8
  to be incorrectly rejected. The fix computes the power-of-two in unsigned arithmetic,
  then handles the signed MIN edge case by negating the operand to balance signs,
  and replaces num_traits::CheckedShl with a custom trait implementation that mirrors
  this logic at the console level.
expected_findings:
- file: circuit/types/integers/src/shl_checked.rs
  line: 72
  summary: "Signed shl_checked computes base as ternary(msb, -2, 2) then does self.mul_checked(base.pow_checked(rhs))\
    \ \u2014 for rhs == BITS-1 the signed pow overflows (e.g. 2i8^7=128), rejecting\
    \ valid results like -1i8 << 7 = -128i8. Must compute power as unsigned then cast."
  line_side: pre_fix
- file: console/types/integers/src/bitwise.rs
  line: 185
  summary: "Console ShlChecked impl uses self.mul(&base.pow(n)) with the same signed-overflow\
    \ flaw \u2014 should use a custom checked_shl that computes 2^n as unsigned and\
    \ handles the MIN edge case via wrapping_neg."
  line_side: pre_fix
- file: vm/compiler/src/program/instruction/operation/macros.rs
  line: 729
  summary: "Test macro uses Rust's checked_shl for 'shl' opcode validation, which\
    \ has different semantics than the ZK shl_checked spec \u2014 it rejects cases\
    \ where the signed result is valid (MIN value). Also, should_panic_on_halt fires\
    \ for all shift operators with constant RHS, not just when shift exceeds bitwidth."
  line_side: pre_fix
