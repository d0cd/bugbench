description: Off-by-one error in input count validation for `ClosureCore::add_input`
  and `FinalizeCore::add_input`. The boundary check used `<` instead of `<=` (or vice
  versa) against `N::MAX_INPUTS`, allowing one more input than intended to be added
  before the validation triggered. The fix corrects the comparison operator to enforce
  the intended maximum.
expected_findings:
- file: synthesizer/program/src/closure/mod.rs
  line: 83
  summary: 'Off-by-one in input validation: `self.inputs.len() < N::MAX_INPUTS` uses
    wrong comparison operator, allowing MAX_INPUTS entries instead of MAX_INPUTS-1
    (or one fewer than intended). Should match the boundary semantics of FunctionCore.'
  line_side: pre_fix
- file: synthesizer/program/src/finalize/mod.rs
  line: 92
  summary: 'Same off-by-one in input validation: `self.inputs.len() < N::MAX_INPUTS`
    uses wrong comparison operator, same issue as ClosureCore::add_input.'
  line_side: pre_fix
- file: synthesizer/program/src/function/mod.rs
  line: 201
  summary: 'Reference: FunctionCore has the correct input validation boundary; ClosureCore
    and FinalizeCore should use the same comparison logic.'
  line_side: pre_fix
