description: TransmissionID lacked an integrity checksum, allowing malicious validators
  to tamper with solutions or transactions and broadcast malformed objects to honest
  validators. The fix adds a Sha3_256-based TransmissionChecksum (truncated to u128)
  to each TransmissionID variant and overwrites solution targets with values recalculated
  during verification, preventing injection of malicious solutions.
