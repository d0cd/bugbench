description: The `bond_public` function in credits.aleo did not restrict programs
  from bonding as validators. Since programs cannot participate in consensus, this
  missing authorization check could allow invalid validator registrations. The fix
  adds a caller check to ensure only user accounts (not programs) can bond as validators.
