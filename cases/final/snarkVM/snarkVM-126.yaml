description: This PR adds a `last_coinbase_target` field to block header Metadata
  across serialization, genesis, and merkle paths. The main review concern is ensuring
  the new field is consistently propagated through all code paths (construction, serialization,
  deserialization, hashing, bit conversion) and that the bundled `ANCHOR_TIME` constant
  change is intentional. The genesis block binary resource must be regenerated to
  match the new serialization format.
