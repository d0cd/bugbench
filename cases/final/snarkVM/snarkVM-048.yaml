pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending the time\
  \ to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR simplifies and\
  \ removes possible truncation from the `annual_reward` calculation in the `block_reward`\
  \ function.\r\n\r\nWe choose not to use `checked_add` for overflow checks in `block_reward\
  \ + coinbase_reward / 2 + transaction_fee`, because an overflow should never be\
  \ hit with our current parameters. \r\n\r\nAlso note that with our current parameters,\
  \ we would never hit a truncation case for `annual_reward`, however we elect to\
  \ make this change out of an abundance of caution.\r\n\r\nFinding: TOB-ALEO-26\r\
  \n"
