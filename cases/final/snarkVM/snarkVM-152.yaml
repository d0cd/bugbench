  summary: 'Signature domain separation issue: BatchHeader signs a payload that can
    collide with BatchCertificate signatures, enabling potential replay attacks. The
    timestamp field in the signed message does not provide sufficient domain separation
    and should be removed.'
  line_side: pre_fix
