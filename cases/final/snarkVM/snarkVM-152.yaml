description: The BatchHeader signature message included the timestamp field, making
  its signed payload collide with BatchCertificate signatures. This lack of domain
  separation between the two signature contexts could enable replay attacks where
  a valid BatchHeader signature is reused as a BatchCertificate signature (or vice
  versa). The fix removes timestamp from the BatchHeader signing payload to ensure
  distinct signature domains.
