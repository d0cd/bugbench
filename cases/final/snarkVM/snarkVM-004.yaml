description: 'PR #2783 removed the `console` feature from other crates but missed
  the wasm crate, leaving it with a dependency on `snarkvm_console` that doesn''t
  resolve when building without default features. The fix removes the `console` feature
  from the wasm crate and moves `snarkvm-utilities` to dev-dependencies since only
  tests use it.'
