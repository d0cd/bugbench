pr_title: '[Fix] Remove `console` feature for wasm'
pr_body: "#2783 removed the console feature for other crates, this PR also removes\
  \ it for wasm. Further, it makes `utilities` a dev-dependency because the wasm tests\
  \ rely on it.\r\n\r\n## Outcome\r\nBefore this PR building without default features\
  \ fails:\r\n```\r\n~> cargo clippy --workspace --all-targets --no-default-features\r\
  \n    Checking snarkvm-curves v3.8.0 (/Users/kaimast/dev/snarkVM/curves)\r\n   Compiling\
  \ snarkvm-algorithms-cuda v3.8.0 (/Users/kaimast/dev/snarkVM/algorithms/cuda)\r\n\
  \    Checking snarkvm-wasm v3.8.0 (/Users/kaimast/dev/snarkVM/wasm)\r\nerror[E0433]:\
  \ failed to resolve: use of undeclared crate or module `snarkvm_console`\r\n  -->\
  \ wasm/src/tests.rs:16:5\r\n   |\r\n16 | use snarkvm_console::{\r\n   |     ^^^^^^^^^^^^^^^\
  \ use of undeclared crate or module `snarkvm_console`\r\n\r\nerror[E0432]: unresolved\
  \ import `snarkvm_utilities`\r\n  --> wasm/src/tests.rs:20:5\r\n   |\r\n20 | use\
  \ snarkvm_utilities::TestRng;\r\n   |     ^^^^^^^^^^^^^^^^^ use of undeclared crate\
  \ or module `snarkvm_utilities`\r\n\r\nwarning: unused import: `core::str::FromStr`\r\
  \n  --> wasm/src/tests.rs:22:5\r\n   |\r\n22 | use core::str::FromStr;\r\n   | \
  \    ^^^^^^^^^^^^^^^^^^\r\n   |\r\n   = note: `#[warn(unused_imports)]` on by default\r\
  \n\r\nSome errors have detailed explanations: E0432, E0433.\r\nFor more information\
  \ about an error, try `rustc --explain E0432`.\r\nwarning: `snarkvm-wasm` (lib test)\
  \ generated 1 warning\r\nerror: could not compile `snarkvm-wasm` (lib test) due\
  \ to 2 previous errors; 1 warning emitted\r\n```\r\n\r\nAfter this PR, things work\
  \ as expected:\r\n```\r\n~> cargo clippy --workspace --all-targets --no-default-features\r\
  \n    Finished `dev` profile [optimized + debuginfo] target(s) in 0.39s\r\n```\r\
  \n\r\n## Notes\r\nWe should consider adding a check for building for a WebAssembly\
  \ target and a check for building without default features to CI."
pr_commit_messages:
- 'fix(wasm): remove console feature from wasm'
