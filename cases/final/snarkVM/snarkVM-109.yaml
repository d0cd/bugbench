pr_body: This is a quick fix for https://github.com/AleoHQ/snarkVM/issues/2179. IMO
  imposing a specific limit would be a superior solution (since we could still preallocate
  without room for malicious misuse), but if we don't know what it should be (or -
  alternatively - what the average number is), this will do.
