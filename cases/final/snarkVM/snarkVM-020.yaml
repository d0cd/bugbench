pr_title: '[Feature] Detect API version in a `Query`''s `base_url` and support V1
  errors'
pr_body: "This PR aims to address errors when using base URLs that contain a version\
  \ number. `RestQuery`s will default to v2, but if there is already a version contained\
  \ in the URL, it will not append anything.\r\n\r\nThere are two changes to how REST\
  \ queries work:\r\n1. It checks the presence of a `v1` or `v2` suffix in the base\
  \ URL, and will not append it a second time.\r\n2. When receiving an error, it will\
  \ inspect the content type to decide how to serialize it."
pr_commit_messages:
- 'feat(ledger/query): detect API version in base_url and support V1'
