description: The REST query client unconditionally appended '/v2/' to every base URL,
  producing malformed double-versioned paths (e.g. '/v1/v2/network/route') when the
  URL already contained a version suffix. Additionally, the error handler always attempted
  JSON deserialization, crashing on V1 endpoints that return plain-text error responses.
  The fix detects whether the base URL already contains an API version and conditionally
  appends it, and inspects Content-Type before choosing the error deserialization
  strategy.
expected_findings:
- file: ledger/query/src/query/rest.rs
  line: 192
  summary: build_path unconditionally formats the URL with API_VERSION ('v2'), causing
    double-versioned paths when the base URL already contains '/v1' or '/v2'. Should
    check whether a version is already present before appending.
  line_side: pre_fix
- file: ledger/query/src/query/rest.rs
  line: 228
  summary: Error response is always deserialized as JSON (RestError), but V1 API endpoints
    return plain-text errors. Should inspect Content-Type header before choosing deserialization
    strategy.
  line_side: pre_fix
- file: ledger/query/src/query/rest.rs
  line: 100
  summary: FromStr::from_str constructs RestQuery directly via struct literal instead
    of delegating to From<Uri>, bypassing any version-detection logic. Should use
    Self::from(base_url) to ensure consistent initialization.
  line_side: pre_fix
- file: ledger/query/src/query/rest.rs
  line: 195
  summary: API version 'v2' is unconditionally interpolated into the URL path even
    when the base URL already contains a version suffix, causing double-versioned
    paths like '/v1/v2/network/route'.
  line_side: pre_fix
