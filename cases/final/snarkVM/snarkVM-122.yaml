description: The `is_reserved_opcode` function was duplicated across multiple files
  with potentially inconsistent implementations. The fix unifies these into a single
  implementation, and also fixes the opcode validation checks in `add_program.rs`
  where `Program::<N>::is_reserved_opcode` was called instead of the unified version.
  An iterator inefficiency in `optional_vec.rs` was also corrected to use `filter_map`.
