description: The PR refactors the FromBits trait to remove an explicit `mode` parameter
  that could contradict the actual mode of input bits, introduces `Inject::constant`
  for cleaner constant construction, adds Field::pow and a Poseidon hash circuit,
  and adds an optional secondary little-endian bit representation for Field. The mode
  parameter removal fixes inconsistent circuit mode handling across types.
