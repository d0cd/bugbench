description: When loading programs from storage during VM initialization, deployments
  are iterated in lexicographical order by transaction ID. This means a program can
  be loaded before its imports (dependencies) have been loaded, causing VM initialization
  to fail. The fix introduces a recursive helper that resolves and loads all import
  dependencies before loading the program itself.
expected_findings:
- file: synthesizer/src/vm/mod.rs
  line: 77
  summary: Programs are loaded from storage via a simple loop in lexicographical order
    without resolving import dependencies. `process.load_deployment(&deployment)?`
    is called directly, which will fail if the program's imports have not yet been
    loaded into the process.
  line_side: pre_fix
- file: synthesizer/src/store/transaction/mod.rs
  line: 263
  summary: "The deployment store is not publicly exposed from TransactionStore, preventing\
    \ callers from looking up deployment transaction IDs by program ID \u2014 a capability\
    \ needed to recursively resolve and pre-load import dependencies."
  line_side: pre_fix
