description: The execution transaction store was using the wrong map (likely the execution
  map instead of the fee_map) when fetching the global_state_root and inclusion_proof
  for additional fee transitions. This caused incorrect data retrieval for execution
  transactions that include fees, even though the initial storage was correct. The
  fix updates the map lookups in two places in execution.rs to use fee_map and adds
  test coverage.
