description: The coinbase target and proof target calculation methods incorrectly
  relied on timestamps and reference heights (last_coinbase_height), which introduced
  unnecessary complexity and potential inaccuracy in difficulty adjustment. The fix
  removes the last_coinbase_height field from block header metadata and simplifies
  the target computation functions in ledger/src/helpers/target.rs, propagating the
  removal through serialization, genesis construction, block validation, and VM finalization.
expected_findings:
- file: ledger/src/helpers/target.rs
  line: 12
  summary: Target calculation functions use timestamp-based and reference-height-based
    parameters (last_coinbase_height) that introduce incorrect or unnecessary coupling
    in difficulty adjustment logic; these parameters should be removed from the coinbase_target
    and proof_target computations.
  line_side: pre_fix
- file: ledger/block/src/header/metadata/mod.rs
  line: 43
  summary: "Block metadata struct carries a last_coinbase_height field that is used\
    \ in target calculations but should not be \u2014 this field and its accessors\
    \ should be removed as the target methods no longer need reference heights."
  line_side: pre_fix
- file: ledger/src/advance.rs
  line: 129
  summary: Block advancement logic passes last_coinbase_height() to coinbase target
    construction, propagating the flawed timestamp/reference-height dependency into
    new block headers.
  line_side: pre_fix
