- file: dpc/src/circuits/tests.rs
  line: 70
  summary: 'Circuit split test coverage: verify that the new input/output circuit
    tests enforce the same constraint soundness guarantees as the former monolithic
    inner circuit, especially around value balance checks across variable input/output
    counts'
  line_side: pre_fix
- file: dpc/src/virtual_machine/operation.rs
  line: 35
  summary: "TODO left in code: 'Refactor transfers to support multiple recipients'\
    \ \u2014 the split circuit now supports N outputs but transfer logic still assumes\
    \ fixed recipients, creating an inconsistency between circuit capability and VM\
    \ operation logic"
  line_side: pre_fix
- file: dpc/src/transaction/response.rs
  line: 81
  summary: "is_dummy() check uses .all() which returns true for empty iterators \u2014\
    \ with variable output counts, an empty records vec would incorrectly report as\
    \ all-dummy, potentially allowing transitions with zero outputs to pass validation"
  line_side: pre_fix
