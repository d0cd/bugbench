pr_title: Split inner circuit to support variable inputs/outputs per transition
pr_body: "<!-- Thank you for submitting the PR! We appreciate you spending the time\
  \ to work on these changes! -->\r\n\r\n## Motivation\r\n\r\nThis PR is a first iteration\
  \ of a split circuit DPC, that supports many inputs and many outputs per transition.\
  \ This unbinds us from the constraint of 2 in 2 out for every transition and now\
  \ supports M-in and N-out transitions. \r\n\r\nThe single Inner proof in each transition\
  \ execution will be replaces with M input proofs, N output proofs, and 1 value check\
  \ proof. We may consider also reducing the number of transitions in each transaction,\
  \ since throughput is less of an issue with these changes.\r\n\r\nAs, this PR is\
  \ already quite large, additional VM features refactoring will be added in subsequent\
  \ PRs. Namely, support for variable output transfers, improved usability and composability\
  \ of transitions, etc.\r\n\r\n"
