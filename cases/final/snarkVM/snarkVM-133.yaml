pr_title: Disable StringType from V12
pr_body: "## Motivation\r\n\r\nThis PR disables the broken StringType from V12.\r\n\
  \r\nIt does not fix StringType sampling, to make it less likely any deployment with\
  \ strings will land before V12.\r\n\r\nThis does not win the efficiency award, but\
  \ we can prune all of this checking logic and the Entire StringType code in the\
  \ future.\r\n\r\n## Test Plan\r\n\r\nAdded unit tests showcasing behaviour."
pr_commit_messages:
- Do not allow StringType from ConsensusVersion::V12 onwards
- Introduce comprehensive contains_string_type
- Ensure instruction.contains_string_type checks any operands
- Ensure command.contains_string_type is more future-proof
