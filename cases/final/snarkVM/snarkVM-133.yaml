description: The byte serialization of Plaintext and Record types used u8 to read/write
  the number of members/entries, limiting counts to 255 and causing a size mismatch
  with the intended format. The fix changes the serialization size (likely u8 to u16)
  in both the read and write paths for plaintext members and record entries, and regenerates
  the genesis block to match the corrected format.
expected_findings:
- file: console/program/src/data/plaintext/bytes.rs
  line: 26
  summary: 'Incorrect serialization size: u8::read_le used for num_members count,
    should use a larger integer type (e.g., u16) to match the write side and avoid
    truncation'
- file: console/program/src/data/plaintext/bytes.rs
  line: 62
  summary: 'Incorrect serialization size: u8::read_le used for num_members in a second
    variant/path, same u8-vs-u16 mismatch'
- file: console/program/src/data/record/bytes.rs
  line: 24
  summary: 'Incorrect serialization size: u8::read_le used for num_entries in record
    deserialization, should match the corrected write size'
- file: console/program/src/data/record/bytes.rs
  line: 68
  summary: 'Incorrect serialization size: u8::read_le used for num_entries in record
    write path, write side also uses wrong size type'
