pr_title: Shorten the serial numbers
pr_body: "## Motivation\r\n\r\nA few PRs ago we discovered that the transaction sizes\
  \ increase by 64. This happens because we use `to_bytes_le` to serialize the serial\
  \ numbers, instead of `serialize` previously. These two APIs behave differently:\r\
  \n- `serialize`, from `CanonicalSerialize`, will keep minimal information, and therefore\
  \ the final results is about 32 bytes, for the x coordinate of a point and a flag\
  \ bit.\r\n- `to_bytes_le`, from `ToBytes`, will keep both `x` and `y` of the point.\r\
  \n\r\nIn this PR, we change how `ToBytes` works for the account signature public\
  \ key, so that it also only keeps the x coordinate. Note that it is not always okay\
  \ to strip away `y` and only keep `x`: commonly this is only okay in the twisted\
  \ Edwards curve.\r\n\r\nThis PR, therefore, makes the following changes:\r\n- propose\
  \ a variant of Schnorr, called Schnorr compressed, that uses the observation above.\r\
  \n- keep the original variant as an option\r\n\r\nThe reason we keep the original\
  \ variant is for compatibility, as the way how account signature public key is serialized,\
  \ actually affects how viewing keys are generated (!), so changing the account signature\
  \ public key serialization rule can cause a lot of keys to be invalid. It is a big\
  \ breaking change that one should do with cautions.\r\n\r\nSo, basically, there\
  \ are two versions:\r\n- Schnorr, everything unchanged, with a small overhead in\
  \ the transaction size.\r\n- SchnorrCompressed, everything is changed, overhead\
  \ is smaller.\r\n\r\n## Test Plan\r\n\r\nAfter resampling the parameterrrs, the\
  \ tests should pass. \r\n\r\n## Related PRs\r\n\r\nThis is related to an old issue\
  \ mentioned by Pratyush: https://github.com/AleoHQ/snarkVM/issues/277"
