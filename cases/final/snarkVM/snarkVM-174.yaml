description: The block verification logic used the current block's cumulative proof
  target instead of the previous block's cumulative proof target. This caused an asymmetry
  between block production and verification, meaning blocks that were correctly produced
  could fail verification (or vice versa). The fix changes the proof target lookup
  in verify.rs to use `previous_block.cumulative_proof_target()` instead of the current
  block's value.
