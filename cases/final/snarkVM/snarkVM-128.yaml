category: memory
difficulty: hard
severity: high
language: rust
pr_size: medium
description: 'Programs with deep nested imports consumed excessive memory due to two
  issues: (1) Stack trees containing all imported external_stacks were being deeply
  cloned instead of shared via Arc, causing exponential memory growth with nesting
  depth. (2) During CheckDeployment, `execute_function` was called instead of `evaluate_function`
  for nested calls, unnecessarily computing full execution when only the top-level
  circuit was needed. The fix wraps Stack in Arc for shared ownership and routes CheckDeployment
  through evaluate_function.'
expected_findings:
- file: synthesizer/process/src/stack/mod.rs
  line: 169
  summary: external_stacks stored as owned `Stack<N>` instead of `Arc<Stack<N>>`,
    causing deep clones of entire stack trees (including all nested imports) whenever
    a stack is cloned
- file: synthesizer/process/src/stack/evaluate.rs
  line: 106
  summary: CheckDeployment callstack variant incorrectly falls through to `execute_function`
    instead of `evaluate_function` for nested calls, performing unnecessary full execution
    when only circuit computation is needed
- file: synthesizer/process/src/lib.rs
  line: 75
  summary: Process-level stacks map stores owned `Stack<N>` instead of `Arc<Stack<N>>`,
    requiring full clones when stacks are shared across imports
