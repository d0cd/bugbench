description: The monolithic check_next_block method lacked support for validating
  blocks whose predecessors hadn't been committed yet (pending blocks), and had no
  lock guarding concurrent block advancement/speculation. The fix splits validation
  into check_block_subdag (DAG structure) and check_block_content (header/transactions),
  introduces a PendingBlock wrapper type, adds a block_advancement_lock mutex, and
  makes solution-ID and subdag-leaf checks aware of pending block sequences.
expected_findings:
- file: ledger/src/check_next_block.rs
  line: 18
  summary: "check_next_block validates everything monolithically with no support for\
    \ pending (uncommitted) predecessor blocks \u2014 subdag leaf checks only query\
    \ the block store, so blocks whose parents are still in-flight will be incorrectly\
    \ rejected"
  line_side: pre_fix
- file: ledger/src/advance.rs
  line: 94
  summary: "advance_to_next_block has no mutex guard \u2014 concurrent calls can race\
    \ on current_block.write(), allowing parallel block advancement or speculation\
    \ to corrupt ledger state"
  line_side: pre_fix
- file: ledger/src/check_next_block.rs
  line: 30
  summary: Solution ID uniqueness check only queries the committed ledger; if multiple
    pending blocks reuse a solution ID, the duplicate won't be detected until advancement
    time
  line_side: pre_fix
