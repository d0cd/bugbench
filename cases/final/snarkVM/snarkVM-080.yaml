description: The test `test_load_deployments_with_imports` used a non-deterministic
  RNG seed, causing the lexicographical ordering of `deployment_transaction_ids()`
  to vary between runs. When the random ordering happened to match deployment order,
  the test failed to exercise recursive import loading of parent programs before their
  imports, making it flaky. The fix pins the RNG to a fixed seed that guarantees the
  ordering reliably tests the intended behavior.
