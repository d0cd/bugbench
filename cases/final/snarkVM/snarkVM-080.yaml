  summary: 'Non-deterministic RNG in test: should use `TestRng::fixed(...)` with a
    constant seed instead of a non-deterministic RNG source to ensure reproducible
    test results'
  line_side: pre_fix
- file: synthesizer/src/vm/mod.rs
