description: The `GroupEncryptionGadget` signature verification was missing the message
  length in the Poseidon gadget hash input. Without including `message.len()` in the
  hash, the signature verification would produce incorrect results because the hash
  would not match the one used during signing. The fix adds `FpGadget::Constant(F::from(message.len()
  as u128))` to the hash input vector.
expected_findings:
- file: gadgets/src/algorithms/signature/group.rs
  line: 398
  summary: 'Missing message length in Poseidon hash input: `hash_input` should include
    `FpGadget::<F>::Constant(F::from(message.len() as u128))` to match the signing
    algorithm''s hash computation, otherwise signature verification will fail or be
    insecure.'
