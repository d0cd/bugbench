description: Random test string generation could produce strings exceeding the maximum
  allowed byte length or containing invalid sequences, causing intermittent test failures.
  The fix adds a `next_string()` method to `TestRng` that properly bounds generated
  string length to 1/4 of MAX_STRING_BYTES and allows controlling whether the string
  must be ASCII-safe, then updates all test call sites to use this bounded generator.
expected_findings:
- file: console/types/string/src/random.rs
  line: 19
  summary: Random string generation does not properly bound the output length relative
    to MAX_STRING_BYTES, allowing strings that exceed the limit and cause test failures.
- file: utilities/src/rand.rs
  line: 41
  summary: TestRng lacks a `next_string` method that generates bounded, valid test
    strings; callers must manually handle string length and validity constraints,
    leading to inconsistent and sometimes invalid test inputs.
- file: console/types/string/src/parse.rs
  line: 77
  summary: Test loop generates random strings without bounding length to a safe fraction
    of MAX_STRING_BYTES, risking parse failures on overly long strings.
