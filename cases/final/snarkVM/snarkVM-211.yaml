description: The transition ID selection in the finalize process was incorrect. While
  the call graph was constructed correctly, it was used unsoundly to find the transition
  ID corresponding to a Future passed as an operand to an `await` command. This `child_transition_id`
  is used to seed the RNG in `rand` instructions, meaning on-chain finalize logic
  could produce incorrect or non-unique random values. The fix introduces a nonce-based
  approach for FinalizeRegisters to ensure unique RNG seeding, gated behind a CONSENSUS_V3_HEIGHT
  check.
expected_findings:
- file: synthesizer/process/src/finalize.rs
  line: 269
  summary: 'Unsound lookup of child_transition_id from call graph: the transition
    ID selected for a Future operand in an `await` command does not correctly correspond
    to the actual transition, leading to incorrect RNG seeding in finalize scopes.'
- file: synthesizer/program/src/logic/command/rand_chacha.rs
  line: 89
  summary: RNG initialization uses transition_id from FinalizeRegisters which may
    be incorrect due to the unsound transition ID selection, potentially producing
    non-unique random seeds across invocations.
- file: synthesizer/process/src/stack/finalize_registers/mod.rs
  line: 46
  summary: FinalizeRegisters lacks a dedicated nonce field for RNG seeding, relying
    solely on the potentially-incorrect transition_id to seed randomness.
