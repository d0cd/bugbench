pr_title: '[Fix] Do not automatically append API version'
pr_body: "We recently added backwards compatibility to REST API v1, which is also\
  \ still the default. This enables us to not force \"v2\" anymore by appending it\
  \ to the base URL of a query.\r\n\r\nThis pull request\r\n* Removes the code that\
  \ detects an API version in the base URL and appends it ([8b13264](https://github.com/ProvableHQ/snarkVM/pull/3036/commits/8b13264de6bf97c00103973245c8b54f91be75e9))\r\
  \n* Uses a constant for detecting the content type of response instead of a hard-coded\
  \ string ([29e222d](https://github.com/ProvableHQ/snarkVM/pull/3036/commits/29e222d22ad89b7b4e116c4c50ad22da9f8bd011))"
