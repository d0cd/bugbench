description: The precomputed powers of the root of unity constants in BLS12-377 Fq,
  Fr, and Edwards BLS12 Fr were stored in raw integer representation instead of Montgomery
  form. Since the field arithmetic (Fp256) operates in Montgomery representation,
  using non-Montgomery constants in FFT computations produces incorrect results, breaking
  polynomial evaluation and by extension proof generation/verification.
expected_findings:
- file: curves/src/bls12_377/fq.rs
  line: 34
  summary: POWERS_OF_ROOTS_OF_UNITY values are in raw form, not Montgomery representation.
    All BigInteger constants used in Fp arithmetic must be in Montgomery form (multiplied
    by R mod p) for correctness.
  line_side: pre_fix
- file: curves/src/bls12_377/fr.rs
  line: 57
  summary: "POWERS_OF_ROOTS_OF_UNITY values are in raw form instead of Montgomery\
    \ form, same issue as in fq.rs \u2014 FFT operations using these constants will\
    \ produce incorrect field elements."
  line_side: pre_fix
- file: curves/src/edwards_bls12/fr.rs
  line: 33
  summary: "POWERS_OF_ROOTS_OF_UNITY is stubbed with unimplemented!() \u2014 this\
    \ will panic at runtime if Edwards BLS12 FFT is invoked. Needs actual Montgomery-form\
    \ constants."
  line_side: pre_fix
