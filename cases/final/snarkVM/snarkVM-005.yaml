pr_title: Reintroduce Add additional subdag verification
pr_body: "This PR reintroduces the changes from https://github.com/ProvableHQ/snarkVM/pull/2615\
  \ that were [reverted](https://github.com/ProvableHQ/snarkVM/pull/2645) because\
  \ of an incorrect calculation. The previous logic erroneously left out the author's\
  \ stake from the quorum calculation, which led to failures in block verification.\r\
  \n\r\n> This PR adds check to enforce that all certificates in a block subdag have\
  \ sufficient quorum requirements based on the signatures.\r\n> \r\n> Additionally,\
  \ a few constructions of `committee_lookback` have been refactored to properly use\
  \ the `Ledger::get_committee_lookback_for_round` helper method.\r\n> \r\n\r\n\r\n\
  \r\nResolves #2646 \r\n"
pr_commit_messages:
- Revert "Revert "Add additional subdag verification""
- Include the certificate author in quorum calculation
