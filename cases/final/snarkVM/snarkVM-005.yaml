description: Block subdag verification was missing a quorum check on certificates,
  meaning blocks with insufficient signature quorum could pass validation. Additionally,
  manual committee lookback calculations were duplicated and inconsistent with the
  existing `get_committee_lookback_for_round` helper method, risking incorrect committee
  resolution.
expected_findings:
- file: ledger/src/check_next_block.rs
  line: 129
  summary: 'Missing quorum verification for subdag certificates: `check_block_subdag_atomicity`
    is called but there is no check that each certificate in the subdag meets the
    quorum threshold based on its signers'' stake. An attacker could craft a block
    with certificates that lack sufficient signatures.'
  line_side: pre_fix
- file: ledger/src/check_next_block.rs
  line: 81
  summary: Manual committee lookback calculation duplicates logic from `get_committee_lookback_for_round`
    and may diverge from the canonical helper. Should delegate to the helper method
    instead of reimplementing the round arithmetic.
  line_side: pre_fix
- file: ledger/src/advance.rs
  line: 257
  summary: Same duplicated manual committee lookback round calculation as in check_next_block.rs.
    The round-parity arithmetic and subtraction logic should use `get_committee_lookback_for_round`
    to stay consistent.
  line_side: pre_fix
