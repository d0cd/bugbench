description: When checking external records and futures that reference external structs,
  the code used the current stack instead of the external program's stack to resolve
  types. This caused external struct lookups to fail because structs from other programs
  were not visible in the local stack. The fix ensures the correct external stack
  is used for record matching, future argument comparison, and that finalize input
  types are properly qualified with the external program name.
expected_findings:
- file: synthesizer/process/src/stack/helpers/stack_trait.rs
  line: 69
  summary: External record matching uses the local stack instead of the external program's
    stack, causing external struct resolution to fail when a record contains structs
    from another program.
- file: synthesizer/process/src/stack/helpers/stack_trait.rs
  line: 578
  summary: 'Same issue in another code path: matches_record_internal called with local
    stack context instead of external stack, preventing external struct types from
    being found.'
- file: synthesizer/process/src/stack/register_types/mod.rs
  line: 197
  summary: Finalize input Plaintext types from external programs are not qualified
    with the program name, causing subsequent type lookups to use the wrong stack
    and fail to resolve cross-program struct references.
