description: JSON serialization via serde_json uses HashMap internally by default,
  which does not preserve key insertion order. When Deployment transactions were serialized
  and deserialized, the ordering of keys could change, causing transaction verification
  to fail. The fix enables the `preserve_order` feature on serde_json (which switches
  to IndexMap) across all workspace crates.
expected_findings:
- file: Cargo.toml
  line: 217
  summary: serde_json dependency is missing the `preserve_order` feature flag, causing
    non-deterministic key ordering during JSON round-trips that breaks deployment
    transaction verification
  line_side: pre_fix
- file: synthesizer/src/process/stack/deployment/mod.rs
  line: 24
  summary: Deployment verifying_keys stored as Vec but serialized through JSON without
    order preservation; round-trip can reorder entries and break verification
  line_side: pre_fix
