description: New hash opcodes (e.g. keccak256 and related variants) were added to
  snarkVM but not registered in the opcode checklists within the register_types initializer.
  Three separate checklist blocks in initialize.rs were missing entries for the new
  opcodes, which would cause those instructions to be rejected or mishandled during
  register type initialization.
expected_findings:
- file: synthesizer/process/src/stack/register_types/initialize.rs
  line: 570
  summary: Opcode checklist is missing entries for newly added hash opcodes (e.g.
    hash.keccak256, hash.keccak384, hash.keccak512, hash.sha3_256, hash.sha3_384,
    hash.sha3_512); all new opcodes must be registered here
  line_side: pre_fix
- file: synthesizer/process/src/stack/register_types/initialize.rs
  line: 607
  summary: "Second opcode checklist block is also missing the same new hash opcodes\
    \ \u2014 must be kept in sync with the first checklist"
  line_side: pre_fix
- file: synthesizer/process/src/stack/register_types/initialize.rs
  line: 639
  summary: "Third opcode checklist block is missing the new hash opcodes \u2014 all\
    \ three checklist sites must enumerate every supported opcode"
  line_side: pre_fix
