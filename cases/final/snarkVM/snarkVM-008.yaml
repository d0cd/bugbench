description: The field division circuit did not properly handle the division-by-zero
  case, which is a soundness issue in the ZK constraint system. A malicious prover
  could potentially craft a proof involving division by zero that passes verification.
  The fix adds proper constraints to detect and handle the zero-divisor case in the
  circuit, and updates the console field arithmetic to match.
expected_findings:
- file: circuit/types/field/src/div.rs
  line: 58
  summary: Field division circuit lacks a zero-check constraint on the divisor. When
    `other` is not constant, the circuit computes the inverse without enforcing that
    `other != 0`, allowing a soundness violation where a prover can satisfy constraints
    with a zero divisor.
  line_side: pre_fix
- file: circuit/types/field/src/div.rs
  line: 97
  summary: "Same missing zero-divisor constraint in another match arm of the Div implementation\
    \ \u2014 the circuit unconditionally computes `self * other.inverse()` without\
    \ constraining `other` to be non-zero."
  line_side: pre_fix
- file: console/types/field/src/arithmetic.rs
  line: 140
  summary: Console field division returns inconsistent results on division by zero
    (returns zero instead of halting), creating a mismatch between console and circuit
    behavior that masks the circuit-level soundness bug.
  line_side: pre_fix
