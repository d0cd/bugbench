description: In the scoped atomic write batch helpers, `abort_atomic` was called unconditionally
  on error, even when no atomic batch was in progress. This could cause incorrect
  behavior when an error occurs outside of an active atomic batch. The fix adds a
  conditional check (`if is_atomic_in_progress`) before calling `abort_atomic`, so
  it only attempts rollback when there are actually pending operations.
