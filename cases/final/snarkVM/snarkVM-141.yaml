  line: 61
  summary: 'Missing guard: `abort_atomic` is called unconditionally on error without
    checking `is_atomic_in_progress`, which is incorrect when no atomic batch is active.'
- file: ledger/store/src/helpers/rocksdb/internal/map.rs
  line: 642
  summary: "Unconditional `abort_atomic` call in error path \u2014 should only abort\
