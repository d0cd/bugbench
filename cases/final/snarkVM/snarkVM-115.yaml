description: The boolean well-formedness check for linear combinations in the ZK circuit
  environment had an incorrect condition. The check was supposed to verify that every
  term in the linear combination is either zero or one, but the logic was inverted
  or used wrong operators, allowing malformed booleans to pass validation. The fix
  corrected the conditional at two branch points to properly detect when ANY term
  is not zero or one.
