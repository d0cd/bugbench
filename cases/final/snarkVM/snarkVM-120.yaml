description: The string parser trait in snarkVM was missing the `FromExternalError`
  bound/import from nom's error types, causing string parsing to fail when external
  errors needed conversion through `map_res` or similar nom combinators. The fix adds
  `FromExternalError` to the nom error imports in the string trait definition and
  updates the parse implementation accordingly.
