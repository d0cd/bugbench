pr_title: Fix bug in parsing of `hash_many`.
pr_body: "This failed\r\n```\r\nhash_many.psd2 r1 r2 into r3 as field;\r\n```\r\n\
  while this passed\r\n```\r\nhash_many.psd2 r1r2 into r3 as field;\r\n```\r\n\r\n\
  The problem was the lack of a call to `Sanitizer::parse_whitespaces` between the\
  \ two operands.\r\n\r\nThis PR fixes the problem by systematically skipping whitespace\
  \ just before each operand, as done in other parts of the Aleo instructions parser.\r\
  \n\r\nAlso add a test demonstrating that the previous failing example above now\
  \ passes.\r\n"
