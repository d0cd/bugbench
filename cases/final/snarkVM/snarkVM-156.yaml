description: The inclusion proof logic was using the global state path instead of
  the local transition path when computing inclusion proofs for transitions. This
  could cause proof verification failures or soundness issues, as the wrong Merkle
  path was being used to verify transition membership. The fix updates the path derivation
  in both execute and fee inclusion to use the local transition path.
expected_findings:
- file: synthesizer/src/process/trace/inclusion/execute.rs
  line: 47
  summary: 'Incorrect path derivation: `state_path` is computed from `task.local`
    but should use the local transition path instead of the global state path for
    inclusion proofs.'
  line_side: pre_fix
- file: synthesizer/src/process/trace/inclusion/execute.rs
  line: 80
  summary: 'Same incorrect path derivation pattern repeated: should use local transition
    path rather than matching on `task.local` for state path computation.'
  line_side: pre_fix
- file: synthesizer/src/process/trace/inclusion/fee.rs
  line: 53
  summary: Fee inclusion uses `task.local.is_none()` to determine global vs local,
    but should be using the local transition path directly for correct inclusion proof
    generation.
  line_side: pre_fix
