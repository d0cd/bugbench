description: The getTransitionId method in network-client.ts was parsing the API response
  from /find/transitionID/{inputOrOutputID} incorrectly after an upstream API change.
  The endpoint now returns the transition ID directly as a plain value, but the code
  was still trying to extract it from a wrapped object. The fix updates the response
  handling to match the new API response format.
