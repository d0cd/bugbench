description: The SDK server defined REST endpoints `/testnet3/latest/block/height`
  and `/testnet3/latest/block/hash` that did not match the corresponding endpoints
  implemented in snarkOS (`/testnet3/latest/height` and `/testnet3/latest/hash`).
