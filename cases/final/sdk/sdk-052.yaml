description: The AleoNetworkClient automatically adds a default `X-Aleo-SDK-Version`
  header on initialization with no way to remove or override it. When ProgramManager
  constructs the network client, this non-standard header triggers CORS preflight
  failures in browser environments. The fix adds setHeader/removeHeader methods and
  an optional headers parameter to ProgramManager's constructor.
