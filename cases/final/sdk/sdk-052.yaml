pr_title: '[Feature] Add setHeader and removeHeader methods for the AleoNetworkClient'
pr_body: "## Motivation\r\n\r\nPresently the network client headers may only be set\
  \ on initialization. If not specified, then a default header `X-Aleo-SDK-Version`\
  \ is added. When a `ProgramManager` is constructed, it constructs the `AleoNetworkClient`\
  \ with the default header. This can lead to [CORS issues](https://github.com/ProvableHQ/sdk/issues/1023).\r\
  \n\r\n## Changes\r\n\r\n`setHeader` and `removeHeader` methods were created for\
  \ the `AleoNetworkClient`. These methods were also added for `ProgramManager` and\
  \ they act on the network client in the program manager. An optional parameter was\
  \ also added to the `ProgramManager` constructor to allow initialization with desired\
  \ headers.\r\n\r\n## Test Plan\r\n\r\nTests for these new methods are added in `sdk/tests/network-client.test.ts`\
  \ and `sdk/tests/program-manager.test.ts`\r\n"
pr_commit_messages:
- added setHeader and removeHeader methods for the AleoNetworkClient
