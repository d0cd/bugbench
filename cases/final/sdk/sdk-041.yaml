description: The WASM SDK and Aleo.tools were incompatible with SnarkVM v0.12.5 due
  to breaking API changes in the upstream library. The fix updates function signatures
  (e.g., execute_program, execute_fee), import paths, type references, and version
  constraints across the Rust SDK, WASM bindings, TypeScript SDK, and website to align
  with the new SnarkVM API.
