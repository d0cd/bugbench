description: The SDK's KeyProvider was still fetching credits.aleo verifying keys
  from a remote server, a pattern left over from Testnet3. After the transition, these
  keys are provided directly by SnarkVM, so the remote fetch was both unnecessary
  and unreliable, causing failures for SDK users. The fix updates the KeyProvider
  to source keys locally from SnarkVM and updates the WASM bindings and SnarkVM dependency
  accordingly.
