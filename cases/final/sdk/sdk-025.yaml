description: The type guard in record-provider.ts checks for the existence of `startHeight`
  in searchParameters but then incorrectly type-checks `endHeight` instead of `startHeight`.
  This copy-paste error occurs at two locations (lines 193 and 290), meaning the `startHeight`
  value is used without proper type narrowing, which could cause TypeScript type errors
  or unexpected runtime behavior if `endHeight` is absent or a non-number type.
