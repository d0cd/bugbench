- file: sdk/src/record-provider.ts
  line: 193
  summary: "Wrong property in typeof guard: checks `typeof searchParameters[\"endHeight\"\
    ]` but should check `typeof searchParameters[\"startHeight\"]` \u2014 copy-paste\
    \ error means startHeight is not type-narrowed before use"
  line_side: pre_fix
- file: sdk/src/record-provider.ts
  line: 290
  summary: 'Same copy-paste error: typeof guard checks `endHeight` instead of `startHeight`,
    duplicating the bug from line 193'
  line_side: pre_fix
