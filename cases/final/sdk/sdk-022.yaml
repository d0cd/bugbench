description: The record searching logic only found grouped records if they were within
  50 record blocks of each other, rather than considering the entire block range.
  The fix updates the search algorithm in records.rs to scan the full range, and adjusts
  function signatures across blocking.rs and transfer.rs to propagate the corrected
  record lookup behavior.
