  line: 47
  summary: 'Incorrect guard condition: multiplicative inverse (''mulinv'') only requires
    one field element, but the existing condition blocks calculation unless both num1
    and num2 are populated. Should short-circuit for ''mulinv'' when only num1 is
    present.'
  line_side: pre_fix
- file: website/src/tabs/algebra/GroupArithmetic.jsx
  line: 152
  summary: 'Missing result update: the onScalarRandom handler sets the scalar state
    but does not trigger a recalculation of the group operation result, causing the
    displayed result to be stale after clicking Random.'
  line_side: pre_fix
- file: website/src/tabs/algebra/GroupArithmetic.jsx
  line: 270
  summary: 'Same missing result update in a second onScalarRandom handler: random
    scalar selection does not propagate to recompute the scalar multiplication output.'
  line_side: pre_fix
