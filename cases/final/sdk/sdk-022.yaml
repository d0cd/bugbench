pr_title: '[Fix] Fix minor UI issues with scalar multiplication and multiplicative
  inverse of fields.'
pr_body: "## Motivation\r\n\r\nTwo small UI errors on the provable.tools existed on\
  \ the new algebra page.\r\n* The multiplicative inverse calculation wasn't triggered\
  \ without two field elements being in the react state. (The second field element\
  \ wasn't used, the logic simply set the Result field to empty).\r\n* The scalar\
  \ multiplication calculation didn't update with the \"Random\" button.\r\n\r\n##\
  \ Changes\r\n* Logic is updated to ensure when the multiplicative inverse operation\
  \ is selected, only the first field element field needs to be populated to proceed\
  \ the inverse calculation.\r\n* The `random` button in the scalar input field triggers\
  \ a result update.\r\n"
pr_commit_messages:
- "Fix UI to ensure random button on scalar mul works + ensure multiplic\u2026"
