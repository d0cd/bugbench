pr_title: Updating versions
pr_body: "This upgrades all of the NPM and Cargo versions. It has a couple other benefits:\r\
  \n\r\n* It's no longer necessary to update the `build.js` file when adding a new\
  \ export from Wasm.\r\n\r\n* The `.wasm` file size has been reduced from 8.9 megabytes\
  \ to 7.3 megabytes (18% reduction).\r\n\r\n   With `opt-level = \"z\"` the `.wasm`\
  \ file size can be reduced down to 3.5 MB, but that's left for a future PR."
