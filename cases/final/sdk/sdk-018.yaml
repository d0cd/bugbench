description: The ProgramManager incorrectly retrieved program source by calling the
  wrong method or property on the program object. The fix changes line 137 in program-manager.ts
  to use `programObject.id()` instead of the previous incorrect accessor when fetching
  program source from the network client. Additionally, hardcoded block hash values
  in network client tests were updated to match current network state.
