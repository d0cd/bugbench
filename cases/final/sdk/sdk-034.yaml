description: The SDK's function execution verification did not support programs with
  multiple imports. The fix adds ImportedVerifyingKeys and ImportedPrograms types
  and threads them through the browser, network-client, and program-manager layers
  so that verification can resolve all imported programs and their verifying keys,
  not just the top-level program.
expected_findings:
- file: sdk/src/program-manager.ts
  line: 1952
  summary: "Verification of function executions does not account for multiple imported\
    \ programs \u2014 imported verifying keys and programs are not passed through,\
    \ causing verification to fail when the executed program has imports."
- file: wasm/src/programs/execution.rs
  line: 103
  summary: The WASM execution verification routine lacks parameters for imported programs
    and their verifying keys, so it cannot verify executions that depend on imports.
- file: sdk/src/network-client.ts
  line: 33
  summary: Network client does not fetch or supply imported program data needed for
    verifying executions with multiple imports.
