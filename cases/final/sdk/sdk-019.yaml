reviewer_notes:
- '[review] Added a few comments to make the error handling more robust.'
- '[review] Also we should ultimately do optional 400 based retries on specific `Transition`,
  `Transaction`, and `getMapping` functions but this should be done in a follow-on
  PR.'
- "[inline] These should probably be clarified be separated\r \r if (!retryable) throw\
  \ error;\r if (isLast) throw new Error(`Failed after ${maxAttempts} attempts: ${error.message}`);"
- '[inline] For the GET, we probably don''t want to wrap this directly as whether
  to retry depends on a lot of different factors for different methods. We should
  instead wrap the individual method gets themselves with error codes and conditions
  that are contextual to that.'
- "[inline] Good callout yeah, I updated the helper method to make this more robust.\
  \ It now checks `error.status` directly and lets `shouldRetry` handle everything\
  \ else, so we don\u2019t rely on string matching like \"5\" in the message anymore.\r\
  \ \r We still default to retrying on [500, 502, 503, 504] in most callers,"
- '[inline] `parseJSON` isn''t a network function capable of producing 500s however,
  so this would end up just retrying n^2 amount of times when a 500 gets piped upwards
  which will end up in people waiting for unreasonably long when there truly is a
  network error (i.e. about 6s)'
- '[inline] My intention here was to catch common transient network errors, but I''m
  definitely happy to refine if you have other error responses in mind!'
