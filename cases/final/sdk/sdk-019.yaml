description: Network requests in the SDK's network client would fail permanently on
  transient errors without any retry mechanism. The fix introduces a `retryWithBackoff`
  utility function in utils.ts and wraps network calls (e.g., fetchData, submitTransaction)
  in network-client.ts with this retry logic, providing exponential backoff on transient
  network failures.
expected_findings:
- file: sdk/src/network-client.ts
  line: 98
  summary: 'Network request lacks retry logic: transient failures (timeouts, 5xx errors)
    will propagate immediately without retrying, causing unnecessary user-facing errors.'
  line_side: pre_fix
- file: sdk/src/network-client.ts
  line: 117
  summary: 'Network request lacks retry logic: transient failures on this call path
    will fail permanently without any backoff or retry attempt.'
  line_side: pre_fix
