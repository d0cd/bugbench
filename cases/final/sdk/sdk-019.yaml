description: The `getFunctionInputs` WASM function omitted the `_nonce` field when
  building input descriptions for record types. This caused tools like aleo.tools
  to not display the nonce field for functions that take records as input (e.g., `transfer_private`
  in `credits.aleo`). The fix adds the `_nonce` member to the record's field list
  in the program input serialization logic.
