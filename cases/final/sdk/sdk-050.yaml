pr_title: Various fixes and improvements
pr_body: "* Fixing the SDK so that it works with Webpack and Rollup and Chrome / Firefox\
  \ extensions.\r\n* Adds in new `create-aleo-app/template-extension` example of using\
  \ Aleo in a Chrome extension.\r\n* Adds in CI tests for `template-extension` and\
  \ `template-react-leo`.\r\n* Fixes the CI so that it builds the `website` with the\
  \ local packages (instead of the published packages).\r\n* Removing `axios` from\
  \ the SDK, replacing it with a regular `fetch`.\r\n* Moving the thread spawning\
  \ code from `@aleohq/sdk` into `@aleohq/wasm`.\r\n* The `initThreadPool` function\
  \ can now be called with no arguments, which will cause it to spawn threads equal\
  \ to the number of cores. This is the preferred way to use it.\r\n* Updating documentation\
  \ for `initializeWasm` and `initThreadPool`."
pr_commit_messages:
- Various fixes and improvements
- Fixing POST requests
