description: The vite.config files across create-leo-app templates and the website
  used CommonJS `require()` syntax which is incompatible with Vite's ESM module system,
  causing build failures. The fix updates the vite configs to use proper ESM-compatible
  configuration, resolving the `require is not defined` error at build time.
