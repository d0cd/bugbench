description: Ant Design Form layout configurations across multiple SDK website tabs
  had labelCol span values that were too small, causing label text to collapse and
  become unreadable. The fix adjusts labelCol and wrapperCol span values across 14
  JSX files to restore proper label column widths.
expected_findings:
- file: website/src/tabs/develop/Deploy.jsx
  line: 200
  summary: labelCol span value is too small, causing form labels to collapse/truncate;
    span needs to be increased for readable label display
  line_side: pre_fix
- file: website/src/tabs/rest/GetMappingValue.jsx
  line: 79
  summary: labelCol span:4 is too narrow for the label text in this form layout, causing
    visual collapse of the label column
  line_side: pre_fix
- file: website/src/tabs/record/DecryptRecord.jsx
  line: 71
  summary: labelCol span:4 is insufficient for label text width, causing labels to
    wrap/collapse in the form layout
  line_side: pre_fix
