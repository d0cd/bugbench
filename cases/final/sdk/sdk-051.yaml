- file: sdk/src/network-client.ts
  line: 612
  summary: 'Wrong generic type parameter: fetchData<Transition> should be fetchData<string>
    because the API returns a plain string transition ID, not a Transition object'
  line_side: pre_fix
- file: sdk/src/network-client.ts
  line: 611
  summary: Incorrect return type Promise<Transition | Error> should be Promise<string
    | Error> to match the actual API response format
  line_side: pre_fix
