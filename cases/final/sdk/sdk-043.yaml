description: When starting a node with `aleo node start`, imported programs were not
  being deployed, causing programs with external calls to fail. The fix adds logic
  in the node start command to read the package manifest, iterate through program
  imports, and deploy each imported program before deploying the main program.
expected_findings:
- file: cli/commands/node.rs
  line: 69
  summary: 'Missing deployment of program imports: the node start logic deploys only
    the main program but does not iterate through and deploy imported programs first,
    causing external calls to fail.'
  line_side: pre_fix
- file: cli/helpers/server.rs
  line: 153
  summary: Server initialization does not account for deploying imported programs
    before the main program, so programs with imports will not function correctly
    on node start.
  line_side: pre_fix
