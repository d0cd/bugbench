description: The SDK used outdated SnarkVM 0.9.x APIs including the removed `gates`
  field on Records (replaced by `microcredits`), old Transaction construction methods,
  and prior serialization formats. The fix bumps SnarkVM to 0.10.2 and updates all
  call sites to use the new API surface including microcredits-based record handling,
  updated transaction builders, and the new `finalize` scope.
expected_findings:
- file: rust/src/program/helpers/records.rs
  line: 14
  summary: Record handling uses deprecated `gates` field instead of `microcredits`
    identifier within the record's identifier map, incompatible with SnarkVM 0.10.x
- file: rust/src/program/deploy.rs
  line: 14
  summary: Deployment transaction construction uses outdated SnarkVM 0.9.x Transaction
    API methods and fee parameters that changed in 0.10.x
- file: rust/src/program/execute.rs
  line: 14
  summary: Execution transaction construction uses outdated SnarkVM 0.9.x API; missing
    support for `finalize` scope and updated fee handling
