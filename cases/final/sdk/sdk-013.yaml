description: Unit tests import individual internal files within the SDK (e.g., `@provablehq/sdk/%%NETWORK%%.js`)
  instead of the package entry point (`@provablehq/sdk`). This bypasses the Node polyfill
  initialization that runs at the package entry point, causing intermittent test failures
  when the polyfill is not loaded.
