  summary: "Deploy pattern match uses wrong number of fields \u2014 SnarkVM 1.4.0\
    \ added a field to the Deploy variant, so the destructuring pattern (_, _, _,\
    \ _, fee) is incorrect"
- file: wasm/src/programs/manager/execute.rs
