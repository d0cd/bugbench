description: The SnarkVM dependency was outdated, causing the consensus version check
  in execute.rs to use a deprecated API instead of CurrentNetwork::CONSENSUS_HEIGHT.
  Additionally, the Deploy transaction pattern match in transaction.rs was missing
  a field introduced in SnarkVM 1.4.0, which would cause compilation failure or incorrect
  destructuring. Import statements were also updated to include newly required types
  like StackKeys.
