description: The SDK's execute_program, execute_fee, and related APIs were incompatible
  with SnarkVM v0.12.5 breaking changes. Function signatures, fee execution macros,
  and import paths needed updating to match the new upstream API. Without these fixes,
  program execution, deployments, transfers, and fee calculations would fail at compile
  time or runtime.
