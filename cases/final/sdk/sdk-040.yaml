pr_body: "## Motivation\r\n\r\nResolves #681\r\n\r\nSets some ground work for #693:\
  \ context provider added to ensure app doesn't load until worker is done initializing;\
  \ this context can eventually be used for worker management (and maybe eventually\
  \ moved to the TS SDK).\r\n\r\nThis issue will be iterated on in #693 and #596.\
  \ This PR is just meant to be a quick fix to resolve the app not loading in some\
  \ conditions.\r\n\r\n## Test Plan\r\n\r\nFunctionality should be identical but app\
  \ shouldn't need a refresh on mobile or slow connections. Should see spinner while\
  \ initial assets are loading.\r\n\r\nPreview link: https://improved-loading--aleo-tools-3481ab.netlify.app/\r\
  \n"
