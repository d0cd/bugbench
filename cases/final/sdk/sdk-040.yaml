description: The AleoKeyProvider's verifying key fetch method only supported downloading
  keys as bytes (binary), failing when keys were stored as text strings. The fix adds
  a try-catch in the key fetching logic to first attempt reading the verifying key
  as a string, then falling back to byte download if that fails. The worker.js was
  also updated to pass correct parameters to the updated function signatures.
