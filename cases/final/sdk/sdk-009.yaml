description: 'The SDK''s worker polyfill used `require("node:worker_threads")` inside
  a string-evaluated worker context that runs as ESM (all templates set `"type": "module"`),
  causing a runtime failure since `require` is not available in ES modules. Additionally,
  `core-js` was incorrectly listed as a devDependency instead of a runtime dependency,
  so SDK consumers wouldn''t have the polyfill available. The fix switches to dynamic
  `import()` for worker_threads and moves `core-js` to `dependencies`.'
expected_findings:
- file: sdk/src/polyfill/worker.ts
  line: 35
  summary: Using `require("node:worker_threads")` in code that will execute in an
    ESM context where `require` is undefined; must use dynamic `import("node:worker_threads")`
    instead
  line_side: pre_fix
- file: sdk/package.json
  line: 64
  summary: "`core-js` is listed in devDependencies but is needed at runtime by the\
    \ polyfill \u2014 should be in dependencies"
  line_side: pre_fix
