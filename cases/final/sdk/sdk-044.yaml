description: The codebase was using an outdated SnarkVM API that could produce malformed
  executions and deployments. The consensus version check in execute.rs used a deprecated
  method instead of the new `CurrentNetwork::CONSENSUS_HEIGHT` API, and the transaction
  Deploy destructuring pattern did not match the updated SnarkVM 1.4.0 struct layout.
  The fix updates the dependency and adapts all call sites to the new API surface.
