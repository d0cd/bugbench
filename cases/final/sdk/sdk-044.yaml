pr_body: "## Motivation\r\n\r\nThe `ProgramManager` doc comments had several errors\
  \ and non-standard doc comment organizational errors, this PR corrects those and\
  \ standardizes all doc comments.\r\n\r\nThis PR also updates to SnarkVM 1.4.0 to\
  \ ensure executions and deployments are properly formed when submitted.\r\n\r\n\
  ## Changelog\r\n\r\n- Updated and corrected ProgramManager doc comments\r\n- Updated\
  \ dependency versions in Cargo.toml\r\n- Refactored import statements for consistency\
  \ and added necessary imports (e.g., StackKeys)\r\n- Modified the consensus version\
  \ check in execute.rs to use the new CurrentNetwork::CONSENSUS_HEIGHT API"
