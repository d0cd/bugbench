pr_body: "## Motivation\r\n\r\nPrior to this PR the `buildExecutionTransaction` function\
  \ did not account for the lack of fees within the `split` or `upgrade` functions.\
  \ This PR fixes the wasm execution pathway for buildExecutionTransaction to skip\
  \ building a fee transaction when `split` or `upgrade` is invoked.\r\n\r\n## Test\
  \ Plan\r\n\r\nThis PR adds JS unit tests to ensure these functions result in transactions\
  \ without fees.\r\n"
