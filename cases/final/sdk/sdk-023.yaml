pr_title: '[Fix] Add string support for verifying keys in the AleoKeyProvider'
pr_body: "## Motivation\r\n\r\nCurrently the AleoKeyProvider only supports byte downloads\
  \ for verifying key. Verifying keys are now small and can be represented as short\
  \ strings. This PR allows trying strings when fetching keys and then fetching bytes\
  \ as a fallback.\r\n"
