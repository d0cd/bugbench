description: The AleoKeyProvider's verifying key fetch logic only supported downloading
  keys as bytes, ignoring the fact that verifying keys can now be represented as short
  strings. This caused failures or inefficiency when keys were served in string format.
  The fix adds string-format fetching with a byte-download fallback, and updates call
  sites in the website worker that were passing `undefined` for the new parameter.
