description: The webpack build was not copying public assets (favicon, manifest, logos)
  to the dist folder, causing missing assets in production. Additionally, the Header
  component had an incorrect inline style (height value) causing a UI rendering bug.
  The fix adds copy-webpack-plugin to the webpack config and corrects the Header's
  style prop.
