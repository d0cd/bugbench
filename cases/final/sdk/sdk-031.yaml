pr_title: '[Chore] aleo.tools prettier and eslint fixes'
pr_body: "## Motivation\r\n\r\nAdding prettier to reduce merge conflicts by having\
  \ a unifying style. I was working on the input generation and realized I was auto\
  \ formatting a lot and I think this PR will make that review and future reviews\
  \ easier by having less styling diff.\r\n\r\nFixed up some of our eslint errors\
  \ to make it easier to tell when new errors are introduced. Avoided certain errors\
  \ that may call for design changes.\r\n\r\n## Test Plan\r\n\r\naleo.tools functionality\
  \ should be identical locally and on deploy: https://prettier-eslint-sanity-check--aleo-tools-3481ab.netlify.app/\r\
  \n\r\n`npm run lint` should show 16 problems (down from over 60) and will now report\
  \ pretty violations (to be used in future CICD checks mainly)\r\n\r\n`npm run pretty`\
  \ should fix any formatting issues for people who want to run it manually (most\
  \ IDEs should support prettier though and will automatically pick up the config)\r\
  \n"
