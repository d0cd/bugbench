description: The SDK used `axios` for HTTP requests, which is incompatible with Webpack,
  Rollup, and Chrome/Firefox extensions. The fix replaces `axios` with native `fetch`,
  moves thread spawning code from `@aleohq/sdk` into `@aleohq/wasm`, and allows `initThreadPool`
  to be called without arguments. CI workflows were also fixed to build the website
  using local packages instead of published ones.
expected_findings:
- file: sdk/src/network-client.ts
  line: 1
  summary: SDK uses `axios` for HTTP requests, which breaks in browser extension and
    bundler environments; should use native `fetch` instead.
- file: sdk/src/function-key-provider.ts
  line: 1
  summary: Uses `axios` (`get`) for fetching function keys, which is not compatible
    with browser extensions and certain bundlers.
- file: sdk/src/index.ts
  line: 131
  summary: Thread pool initialization and worker spawning logic is in `@aleohq/sdk`
    instead of `@aleohq/wasm`, causing bundler compatibility issues and requiring
    unnecessary thread count argument.
