description: The Amplitude API key environment variable was not being passed through
  to the webpack build. Webpack does not automatically expose process.env variables
  like Vite does, so the key was undefined at runtime. The fix adds the dotenv package
  and uses webpack.DefinePlugin to inject VITE_AMPLITUDE_API_KEY into the bundle.
expected_findings:
- file: website/webpack.config.js
  line: 1
  summary: 'Missing webpack import and DefinePlugin configuration: environment variables
    like VITE_AMPLITUDE_API_KEY are not injected into the bundle, so process.env references
    will be undefined at runtime.'
- file: website/src/index.jsx
  line: 8
  summary: Reading process.env.VITE_AMPLITUDE_API_KEY without ensuring webpack DefinePlugin
    injects it; this will be undefined in the webpack build.
- file: website/package.json
  line: 42
  summary: Missing dotenv dependency needed to load .env files for webpack builds.
