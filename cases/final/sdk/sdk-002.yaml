description: 'TypeScript imports throughout the SDK lacked `.js` file extensions,
  which broke module resolution under `moduleResolution: "nodenext"` (or `"node16"`).
  The fix adds explicit `.js` extensions to all relative import paths and adds a nodenext
  e2e test to prevent regression.'
