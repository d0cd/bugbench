description: Standard JSON.parse() was used to parse API responses containing large
  integers (e.g., block heights, microcredit values), causing silent precision loss
  for values exceeding Number.MAX_SAFE_INTEGER (2^53-1). The fix introduces a custom
  parseJSON() utility in utils.ts that parses all integers as BigInt, and replaces
  JSON.parse() calls throughout network-client.ts and record-provider.ts.
expected_findings:
- file: sdk/src/network-client.ts
  line: 1
  summary: Uses standard JSON.parse() for API responses containing large integers
    (block heights, microcredits), causing silent precision loss for values exceeding
    Number.MAX_SAFE_INTEGER
- file: sdk/src/record-provider.ts
  line: 202
  summary: getLatestHeight() relies on network client response parsed with JSON.parse(),
    which can return imprecise block height values for heights exceeding 2^53-1
- file: sdk/src/utils.ts
  line: 1
  summary: Missing BigInt-aware JSON parsing utility; all integer parsing defaults
    to JavaScript Number type which cannot safely represent large blockchain integers
