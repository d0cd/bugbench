pr_title: '[Fix] Bump SnarkVM dependencies to 0.10.2 and add resulting fixes'
pr_body: "## Motivation\r\n\r\nSnarkVM underwent a minor version bump from 0.9.xx\
  \ to 0.10.xx and made some major changes including\r\n* Removing `gates` from `Records`\
  \ as a struct member in favor of `microcredits` within the identifier map within\
  \ records in order to enable microcredits to be carried by any program\r\n* Changes\
  \ to Transaction building methods and members of the `Transaction` struct\r\n* Addition\
  \ of the `finalize` scope\r\n* Changes to serialization of several import struct.\r\
  \n\r\nThis PR updates the `rust SDK` and `wasm SDK` to include the resulting changes.\
  \ \r\n\r\n### Changes Needed to Mark This PR Ready\r\nThis PR is currently in draft.\
  \ Several tests in the `wasm` crate are currently failing due to the fact that serialization\
  \ has changed and the test vectors currently in the `wasm` crate are modeled after\
  \ previous serialization models. Additionally the network is currently down for\
  \ maintenance, so several network tests are currently failing. These should be updated\
  \ to include data from the launch of the latest network.\r\n\r\n## Test Plan\r\n\
  * Fix WASM tests to include updated test vectors for new struct members serializations\r\
  \n* Fix Network tests when new network comes online"
pr_commit_messages:
- Bump SnarkVM dependencies to 0.10.2 and add resulting fixes
