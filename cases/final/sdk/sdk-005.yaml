pr_body: "## Motivation\r\n\r\nThe current string in encoding for message signing\
  \ fails in some edge cases causing false positives on some signature verifications\
  \ on [aleo.tools](https://aleo.tools). This PR switches the API to the `TextEncoder`\
  \ api officially supported by most browser and thus patches the issue.\r\n\r\nThis\
  \ fixes issue #600 "
