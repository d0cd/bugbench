description: Leo's PEG grammar did not correctly handle array slices with an omitted
  lower bound (e.g., `arr[..2]`). The grammar rule for range expressions and the corresponding
  Rust range struct in `grammar/src/common/range.rs` required both operands, causing
  parse failures when only the upper bound was provided. The fix updated the grammar
  rule in `leo.pest` and the range struct to make the lower bound optional.
expected_findings:
- file: grammar/src/leo.pest
  line: 70
  summary: Grammar rule for range_or_expression does not allow omitting the left-hand
    operand, so `..2` (lower slice) fails to parse. The left operand of the range
    operator should be optional.
- file: grammar/src/common/range.rs
  line: 20
  summary: Range struct derives FromPest but does not model the lower bound as optional
    (Option<T>), preventing correct AST construction when the lower bound is omitted
    in a slice expression like `arr[..2]`.
