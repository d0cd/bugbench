fix_pr_title: snarkVM can't handle duplicate outputs, or record outputs which were
  received as inputs.
fix_pr_body: "We can handle duplicate outputs by \"cloning\", and input record ouputs\
  \ too, unless they were external records. The latter case we need to catch.\r\n\r\
  \nThe following changes were made to support the above:\r\n\r\n- codegen can \"\
  clone\" registers (by casting it into a new register)\r\n\r\n- codegen tracks record\
  \ inputs and clones them if they are output (since record inputs cannot be output\
  \ by snarkVM)\r\n\r\n- codegen clones duplicate outputs\r\n\r\n- type checking disallows\
  \ assignment to an external record type\r\n\r\n- type checking disallows tuple expressions\
  \ containing an input external record type\r\n\r\n- type checking disallows ternary\
  \ expressions of external record type, or of tuples which contain such\r\n\r\n-\
  \ type checker track external record inputs and makes sure we don't output them\r\
  \n\r\n- tests of the above functionality\r\n\r\nFixes #28602"
