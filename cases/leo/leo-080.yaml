introducing_pr_title: Remove () expressions and () type except returns.
introducing_pr_body: "This PR removes `()` expressions and the `()` type except in\
  \ function output types.\r\nThis is because `()` serves no purpose beyond indicating\
  \ the absence of return values, at least until/unless we have some kind of type\
  \ polymorphism."
