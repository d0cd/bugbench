introducing_pr_title: '[Cleanup] Deployment and execution fixes for devnets and upgradability.'
introducing_pr_body: "## Motivation\r\nThis PR makes a number of quality of life improvements\
  \ around program upgradability, deployment, execution, and devnet testing. \r\n\
  - Removes redundant messages in deployment warnings.\r\n- Warns users if they are\
  \ deploying/upgrading a program that uses restricted syntax.\r\n- Enables the `test_consensus_heights`\
  \ for snarkVM and handles `mainnet`, `testnet`, and `canary` consensus heights through\
  \ environment variables. This allows users to work with devnets and different consensus\
  \ version using a single build of Leo.\r\n- Introduces the `--devnet` flag to CLI,\
  \ which should be used for devnet txns. If the flag is not provided, the environment\
  \ variable `DEVNET` including the `.env` file is checked.\r\n- Introduces the `--consensus-heights`\
  \ flag to CLI, which should be used for custom networks. If the flag is not provided,\
  \ the environment variable `CONSENSUS_VERSION_HEIGHTS` including the `.env` file\
  \ is checked.\r\n- Introduces `leo devnet` which optionally installs non-conflicting\
  \ snarkOS and spins up a devnet either in tmux or the background. Also handles graceful\
  \ shutdown.\r\n- Invokes [`dotenvy::dotenv`](https://docs.rs/dotenvy/latest/dotenvy/fn.dotenv.html)\
  \ before running the rest of the CLI which loads variables in `.env` files up the\
  \ directory tree. \r\n\r\nIt also\r\n- closes #28760.\r\n- closes #28756.\r\n\r\n\
  ## Guide\r\n\r\n### Running a Devnet\r\n`leo devnet` is a new command that allows\
  \ users to install released \r\nYou may run \r\n```bash\r\nleo devnet --help\r\n\
  ```\r\nto see the available options.\r\n\r\nTo quickly get started, you can run\
  \ the following commands:\r\n```bash\r\n> mkdir tmp\r\n> leo devnet --storage tmp\
  \ --clear-storage --snarkos ./tmp/snarkos --features test_network --tmux --consensus-heights\
  \ 0,1,2,3,4,5,6,7,999998,999999\r\n```\r\n#### Notes \r\n- You can pass in custom\
  \ `--consensus-heights to Leo. The above configuration will allow more time between\
  \ V8 and V9, allowing me to deploy my programs pre-upgradability.\r\n- The `--install`\
  \ flag will install a snarkOS binary at exact location provided by `--snarkos ./tmp/snarkos`\r\
  \n- If you'd like to use a version of snarkOS that was not released on `crates.io`,\
  \ you will need to build it manually and then provide it to the `--snarkos` option.\
  \ \r\n- If no `--snarkos` option is provided, `leo devnet` will default to the one\
  \ in your path.\r\n\r\n### Working with Devnets\r\nLeo now includes a `--devnet`\
  \ flag to specify that you are interacting with a devnet. If this flag is not provided,\
  \ Leo will use the default consensus heights defined in [snarkVM](https://github.com/ProvableHQ/snarkVM/blob/fc4951e24d1c2bbae71104b4bfce29d13a3c6289/console/network/src/consensus_heights.rs#L54)\
  \ which may be too far spaced out to test your code.\r\n\r\nSome examples\r\n- `leo\
  \ deploy --broadcast --devnet --consensus-heights 0,1,2,3,4,5,6,7,999998,999999\
  \ --yes`\r\n- `leo execute pondo_protocol.aleo/initialize \"1000000000u64\"  --broadcast\
  \ --yes --print --devnet`\r\n\r\nNote that in the second example, I didn't specify\
  \ consensus heights.\r\nAlternatively some of the flags can be specified in the\
  \ `.env` file or directly as an environment variable.\r\n```\r\nNETWORK=testnet\r\
  \nPRIVATE_KEY=APrivateKey1zkp8CZNn3yeCseEtxuVPbDCwSyhGW6yZKUYKfgXmcpoGPWH\r\nENDPOINT=http://localhost:3030\r\
  \nDEVNET=true\r\nCONSENSUS_VERSION_HEIGHTS=0,1,2,3,4,5,6,7,999998,999999\r\n```\r\
  \n\r\n**You only need specify consensus heights if you set up your devnet with them**.\r\
  \n"
