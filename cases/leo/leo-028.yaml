fix_pr_title: support CONSENSUS_VERSION_HEIGHTS env var in devnet command
fix_pr_body: "Fixes #28967\r\n\r\nI tested this locally by setting the environment\
  \ variable and saw this being printed:\r\n```\r\n% CONSENSUS_VERSION_HEIGHTS=0,1,2,300\
  \ ./target/debug/leo devnet --storage ~/Projects/aleo/devnet/tmp --clear-storage\
  \ --snarkos ~/Projects/aleo/devnet/tmp/snarkos --snarkos-features test_network --tmux\r\
  \n\U0001F527  Starting devnet with the following options:\r\n  \u2022 Network: testnet\r\
  \n  \u2022 Validators: 4\r\n  \u2022 Clients: 2\r\n  \u2022 Storage: /Users/eran/Projects/aleo/devnet/tmp\r\
  \n  \u2022 Using snarkOS binary at: /Users/eran/Projects/aleo/devnet/tmp/snarkos\r\
  \n  \u2022 Consensus heights: 0,1,2,300\r\n  \u2022 Clear storage: yes\r\n  \u2022\
  \ Verbosity: 1\r\n  \u2022 tmux: yes\r\n\U0001F50D  Detected: snarkos unknown_branch\
  \ 79936b5bfce6b158fe942c6cfb44a0cc07a7a3e0 features=[default,snarkos_node_metrics,test_network]\r\
  \n```\r\n\r\n`Consensus heights: 0,1,2,300` indicates the env var is being correctly\
  \ parsed"
