introducing_pr_title: '[Feature] Type inference for variables'
introducing_pr_body: "## Motivation\r\n\r\nCloses #28630\r\n\r\nThe goal is to make\
  \ it easy to define variables so that something like this would work:\r\n```\r\n\
  let x = 1u32;\r\nlet y = Foo { .. };\r\n// .. etc\r\n```\r\nwhere the types of `x`\
  \ and `y` are automatically set by the compiler.\r\n\r\n- `let` type annotation\
  \ is now optional\r\n- Continue to error out on annotations that don't match the\
  \ type of the RHS\r\n- Infer the types of defined variables from the type of the\
  \ RHS.\r\n- Continue to handle tuples and their errors as before. This error is\
  \ no longer used though:\r\n```rust\r\n@formatted\r\n    invalid_tuple {\r\n   \
  \     args: (),\r\n        msg: \"Tuples must be explicitly typed in Leo\".to_string(),\r\
  \n        help: Some(\"The function definition must match the function return statement\"\
  .to_string()),\r\n    }\r\n```\r\n\r\n## Test Plan\r\n- A few tests now emit the\
  \ intended errors. How to slightly modify a few of them.\r\n- Added two new tests"
