introducing_pr_title: Refactoring, especially Expression and Statement.
introducing_pr_body: "Change many `pub mod` declarations to just `mod` - if we're\
  \ exporting everything in the crate anyway, there's no need to show our users our\
  \ module structure.\r\n\r\nImplemented From<T> for Expression, for each T corresponding\
  \ to a variant of Expression. This allows using simple syntax like ArrayExpression\
  \ { .. }.into() to create Expressions.\r\n\r\nFor many Expression variants, removed\
  \ the `Box` from their members, and moved the `Box` to the variant; for instance\
  \ we now have Binary(Box<BinaryExpression>). This again allows easier syntax to\
  \ create BinaryExpression, as we don't have to explicitly refer to Box.\r\n\r\n\
  Moved the variants of Access to be variants of Expression, and removed Access.\r\
  \n\r\nMade Literal a struct with an enum member, and added associated functions\
  \ to create each variant.\r\n\r\nRemoved StructExpression::{check_record, to_record_string}\
  \ - these were unused.\r\n\r\nUse struct update syntax in many cases, like\r\nArrayAccess\
  \ {\r\n    array,\r\n    index,\r\n    ..input\r\n}\r\n\r\nFor Statement, also implemented\
  \ From<T> for its variants, and in some also moved the Box to the variant as with\
  \ Expression.\r\n\r\nRemoved ConsoleStatement.\r\n\r\nRemoved IterationStatement::{start_value,\
  \ stop_value} - there seemed to be no reason for these to be members. We created\
  \ them, put them in the struct, and then immediately threw it away.\r\n\r\nRemoved\
  \ empty_statement and is_empty_statement in const propagation, which were redundant\
  \ with Statement::dummy.\r\n\r\nRemoved span_json.rs - this is no longer necessary\
  \ with Literal's new structure.\r\n"
