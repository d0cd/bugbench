description: In the AST canonicalization pass, compound assignment desugaring incorrectly
  reversed the order of member/tuple accesses on the assignee (e.g., `a.0.1 += x`
  would produce wrong code). The fix removes the erroneous reversal of the accesses
  iterator and adds tests for compound assignments with nested tuple/member access
  patterns.
expected_findings:
- file: ast/src/reducer/canonicalization.rs
  line: 472
  summary: Accesses on the compound assignment target are iterated in the wrong order
    (reversed when they should not be), causing incorrect desugaring of nested member/tuple
    accesses like `a.0.1 += x`.
