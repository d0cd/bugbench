fix_pr_title: 'fix: avoid extra allocation when building record members'
fix_pr_body: "removes unnecessary allocations and cloning when constructing record\
  \ members in `from_external_record`, keeping the same behavior with more efficient\
  \ memory usage.\r\nReplaced the `vec!` + `collect_vec` + `concat` pattern with a\
  \ single preallocated `Vec` using `push` and `extend`."
