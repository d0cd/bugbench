description: The Leo parser's import path resolution used `expect_ident()` which only
  accepted standard identifiers without dashes. This caused imports from directories
  or files containing dashes in their names to fail. The fix extends the member access
  parsing in `file.rs` to consume dash-separated tokens and concatenate them into
  a valid path segment.
expected_findings:
- file: parser/src/parser/file.rs
  line: 173
  summary: Parser uses expect_ident() for import path segments, which rejects dashes.
    Should be extended to consume and concatenate dash-separated tokens (e.g., 'c-d')
    to support folder/file names with dashes.
