introducing_pr_title: 'feat(cli): add sign and verify to the account subcommand'
introducing_pr_body: "<!--\r\n    Thank you for submitting the PR! We appreciate you\
  \ spending the time to work on these changes.\r\n\r\n    Help us understand your\
  \ motivation by explaining why you decided to make this change.\r\n\r\n    Happy\
  \ contributing!\r\n-->\r\n\r\n## Motivation\r\n\r\nSignatures can be created/verified\
  \ programmatically both from [AleoHQ/sdk](https://github.com/AleoHQ/sdk) (web-ui\
  \ via [aleo.tools](https://aleo.tools/account)) and within [leo](https://developer.aleo.org/leo/language/#signatures)\
  \ but not from the official leo or snarkOS CLIs.\r\n\r\nThis PR creates two straightforward\
  \ commands for working with Aleo signatures:\r\n\r\n- `leo account sign [--private-key-file\
  \ <privateKeyFile>|--private-key <privateKey>] -m <message> -s [seed] [--raw]`\r\
  \n    outputs an Aleo signature of the message, signed with the private key.\r\n\
  - `leo account verify -s <signature> -m <message> -a <address> [--raw]`\r\n    outputs\
  \ `The signature is valid` or `The signature is invalid` if the signature is verified\
  \ or invalid respectfully.\r\n\r\nBy default, all messages are snarkVM values so\
  \ signatures are compatible with the [`signature::verify`](https://developer.aleo.org/leo/operators#signatureverify)\
  \ leo operator. If the `--raw` flag is passed, the message will be parsed as bytes,\
  \ which is compatible with the [AleoHQ/sdk].\r\n\r\nIf a private key is not specified\
  \ from arguments, the CLI will attempt to load it from environment, then from a\
  \ `.env` file.\r\n\r\n## Test Plan\r\n\r\nNo code outside of the new features were\
  \ changed and test coverage is as follows:\r\n\r\n- Signature creation (unseeded)\r\
  \n- Seeded signature creation\r\n- Valid signature verification\r\n- Invalid signature\
  \ verification (message is incorrect)\r\n- Invalid signature verification (address\
  \ is incorrect)\r\n- All of the above using plaintext messages (rather than aleo\
  \ values)\r\n\r\n## Related PRs\r\n\r\n<!--\r\n    If this PR adds or changes functionality,\r\
  \n    please take some time to update the docs at https://github.com/AleoHQ/leo,\r\
  \n    and link to your PR here.\r\n-->\r\n\r\n- https://github.com/AleoHQ/snarkOS/pull/2909\
  \ - Near identical API on snarkOS (with the exception of this one having `.env`\
  \ support)\r\n- https://github.com/AleoHQ/welcome/pull/334 - Documentation for these\
  \ new commands\r\n\r\n## Screenshots\r\n\r\nSigning raw messages\r\n![CLI sign and\
  \ verify commands on --raw messages](https://github.com/AleoHQ/leo/assets/4142480/c85cffcf-3295-426a-b11f-c188f1d28256)\r\
  \n\r\nGenerating a signature of an Aleo value (`5field`)\r\n![image](https://github.com/AleoHQ/leo/assets/4142480/7af03bd1-537d-4001-a9e7-0581df130b25)\r\
  \n\r\nVerifying a signed Aleo value in leo playground.\r\n![A screenshot of leo\
  \ playground with code that verifies a signature on the left, and a valid and invalid\
  \ run of the code on the right](https://github.com/AleoHQ/leo/assets/4142480/69370598-1c49-4e1b-8979-2bdef02a7a53)\r\
  \n\r\n```rust\r\nprogram helloworld_unk5cko.aleo {\r\n  transition main(public s:\
  \ signature, a: address, m: field) -> bool {\r\n      return s.verify(a, m);\r\n\
  \  }\r\n}\r\n```"
