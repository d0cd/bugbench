introducing_pr_title: Supports tuples.
introducing_pr_body: "This PR adds support for tuples in Leo.\r\nNote: We opt to error\
  \ on singleton tuples in order to reduce ambiguity in the code.\r\n\r\n- [x] Allow\
  \ tuple expressions in the AST.\r\n- [x] Allow tuple types in the AST.\r\n- [x]\
  \ Disallow nested tuples.\r\n- [x] Error on singleton tuples.\r\n- [x] Error on\
  \ misplaced unit types.\r\n- [x] Typechecking tuple expressions.\r\n- [x] Flatten\
  \ ternary expressions over tuples.\r\n- [x] Allow unit type as return type.\r\n\
  - [x] Support tuple destructuring.\r\n\r\nThis PR does **not**:\r\n- Allow nested\
  \ tuples.\r\n- Allow tuples in structs.\r\n\r\n\r\n"
