fix_pr_body: 'Bumps [anyhow](https://github.com/dtolnay/anyhow) from 1.0.88 to 1.0.89.

  <details>

  <summary>Release notes</summary>

  <p><em>Sourced from <a href="https://github.com/dtolnay/anyhow/releases">anyhow''s
  releases</a>.</em></p>

  <blockquote>

  <h2>1.0.89</h2>

  <ul>

  <li>Make anyhow::Error''s <code>UnwindSafe</code> and <code>RefUnwindSafe</code>
  impl consistently available between versions of Rust newer and older than 1.72 (<a
  href="https://redirect.github.com/dtolnay/anyhow/issues/386">#386</a>)</li>

  </ul>

  </blockquote>

