fix_pr_body: "## Motivation\r\n\r\n- Closes #28971\r\n\r\n## To-Do\r\n\r\n- [x] Add\
  \ a `CliError::tests_failed` variant, return it in the case that one or more tests\
  \ failed.\r\n- [x] Enable capturing exit code in integration test output, and compare\
  \ it alongside stdout and stderr.\r\n- [x] Add a dedicated test for checking `leo\
  \ test` exits with non-zero exit code on failing tests.\r\n- [x] Apply `REWRITE_EXPECTATIONS`\
  \ to update existing tests to check exit codes.\r\n    - This needs a workaround:\
  \ https://github.com/ProvableHQ/leo/issues/29014#issuecomment-3604786956 (just commenting\
  \ out condition locally seems to work).\r\n    - Pending https://github.com/ProvableHQ/leo/pull/29026."
