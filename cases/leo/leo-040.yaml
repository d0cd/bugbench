introducing_pr_title: Validate program names against reserved keywords in leo new
introducing_pr_body: "- Disallow program names that reserved or restricted SnarkVM\
  \ keywords.\r\n- Disallow program names that contain the substring `aleo`.\r\n\r\
  \n<img width=\"975\" height=\"193\" alt=\"image\" src=\"https://github.com/user-attachments/assets/91ff0164-fc30-46a7-9321-a47965ade091\"\
  \ />\r\n\r\n\r\nOriginal PR: https://github.com/ProvableHQ/leo/pull/28894\r\n\r\n\
  Previously, `leo new` would successfully create prjects with keyword names, but\
  \ later failed during build because of snarkVM validation.\r\n\r\nSo, this commit\
  \ adds upfront validation to reject reserved program names immediately when running\
  \ `leo new`, providing clear error messages.\r\n\r\nResolves: https://github.com/ProvableHQ/leo/issues/28780"
