description: Variable renaming during function inlining used incorrect identifier
  extraction (.identifier().name) for mapping input parameters, causing wrong variable
  substitutions in the inlined code. This was particularly problematic when the same
  function was inlined multiple times. The fix corrects how parameter names are extracted
  to build the renaming map.
expected_findings:
- file: compiler/passes/src/function_inlining/inline_expression.rs
  line: 58
  summary: 'Incorrect parameter name extraction: `.map(|input| input.identifier().name)`
    produces wrong renaming map for inlined function variables, causing name collisions
    or mismatches when a function is inlined multiple times.'
- file: compiler/passes/src/function_inlining/inline_expression.rs
  line: 74
  summary: 'Same incorrect identifier extraction pattern: `.map(|input| input.identifier().name)`
    should use a different method to get the correct variable name for the renaming
    substitution.'
