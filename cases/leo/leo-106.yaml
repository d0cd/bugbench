  <li><a href=\"https://github.com/seanmonstar/reqwest/commit/cc3dd510c0cb50ee03be217ea864d84e744658d1\"\
  ><code>cc3dd51</code></a> Add file function to async::multipart (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2106\"\
