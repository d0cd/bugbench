introducing_pr_body: "Bumps [reqwest](https://github.com/seanmonstar/reqwest) from\
  \ 0.12.7 to 0.12.8.\n<details>\n<summary>Release notes</summary>\n<p><em>Sourced\
  \ from <a href=\"https://github.com/seanmonstar/reqwest/releases\">reqwest's releases</a>.</em></p>\n\
  <blockquote>\n<h2>v0.12.8</h2>\n<h2>What's Changed</h2>\n<ul>\n<li>Add support for\
  \ SOCKS4 proxies.</li>\n<li>Add <code>multipart::Form::file()</code> method for\
  \ adding files easily.</li>\n<li>Add <code>Body::wrap()</code> to wrap any <code>http_body::Body</code>\
  \ type.</li>\n<li>Fix the pool configuration to use a timer to remove expired connections.</li>\n\
  </ul>\n<h2>New Contributors</h2>\n<ul>\n<li><a href=\"https://github.com/workingjubilee\"\
  ><code>@\u200Bworkingjubilee</code></a> made their first contribution in <a href=\"\
  https://redirect.github.com/seanmonstar/reqwest/pull/2402\">seanmonstar/reqwest#2402</a></li>\n\
  <li><a href=\"https://github.com/NaokiM03\"><code>@\u200BNaokiM03</code></a> made\
  \ their first contribution in <a href=\"https://redirect.github.com/seanmonstar/reqwest/pull/2106\"\
  >seanmonstar/reqwest#2106</a></li>\n<li><a href=\"https://github.com/Xuanwo\"><code>@\u200B\
  Xuanwo</code></a> made their first contribution in <a href=\"https://redirect.github.com/seanmonstar/reqwest/pull/2255\"\
  >seanmonstar/reqwest#2255</a></li>\n<li><a href=\"https://github.com/Jaltaire\"\
  ><code>@\u200BJaltaire</code></a> made their first contribution in <a href=\"https://redirect.github.com/seanmonstar/reqwest/pull/2400\"\
  >seanmonstar/reqwest#2400</a></li>\n<li><a href=\"https://github.com/Hyask\"><code>@\u200B\
  Hyask</code></a> made their first contribution in <a href=\"https://redirect.github.com/seanmonstar/reqwest/pull/2418\"\
  >seanmonstar/reqwest#2418</a></li>\n<li><a href=\"https://github.com/Jake-Shadle\"\
  ><code>@\u200BJake-Shadle</code></a> made their first contribution in <a href=\"\
  https://redirect.github.com/seanmonstar/reqwest/pull/2427\">seanmonstar/reqwest#2427</a></li>\n\
  <li><a href=\"https://github.com/RobMor\"><code>@\u200BRobMor</code></a> made their\
  \ first contribution in <a href=\"https://redirect.github.com/seanmonstar/reqwest/pull/2434\"\
  >seanmonstar/reqwest#2434</a></li>\n</ul>\n<p><strong>Full Changelog</strong>: <a\
  \ href=\"https://github.com/seanmonstar/reqwest/compare/v0.12.7...v0.12.8\">https://github.com/seanmonstar/reqwest/compare/v0.12.7...v0.12.8</a></p>\n\
  </blockquote>\n</details>\n<details>\n<summary>Changelog</summary>\n<p><em>Sourced\
  \ from <a href=\"https://github.com/seanmonstar/reqwest/blob/master/CHANGELOG.md\"\
  >reqwest's changelog</a>.</em></p>\n<blockquote>\n<h2>v0.12.8</h2>\n<ul>\n<li>Add\
  \ support for SOCKS4 proxies.</li>\n<li>Add <code>multipart::Form::file()</code>\
  \ method for adding files easily.</li>\n<li>Add <code>Body::wrap()</code> to wrap\
  \ any <code>http_body::Body</code> type.</li>\n<li>Fix the pool configuration to\
  \ use a timer to remove expired connections.</li>\n</ul>\n</blockquote>\n</details>\n\
  <details>\n<summary>Commits</summary>\n<ul>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/95fec09be9503d82c574f94e37dde0a814d1f850\"\
  ><code>95fec09</code></a> v0.12.8</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/baf9712df1ebfc3a5ed8504e1ab3372baf94b0ac\"\
  ><code>baf9712</code></a> fix: pass pool_timer to hyper_util to enable the idle\
  \ cleanup task (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2434\"\
  >#2434</a>)</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/d85f44b217f36f8bef065fe95877eab98c52c2e5\"\
  ><code>d85f44b</code></a> Bump rustls-native-certs (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2427\"\
  >#2427</a>)</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/c8665be59b070349401768f04cdc933e0107833a\"\
  ><code>c8665be</code></a> tests: use a documented test network for testing</li>\n\
  <li><a href=\"https://github.com/seanmonstar/reqwest/commit/964b1c62a1aff367fb560e0feb5f48bda3dcca7a\"\
