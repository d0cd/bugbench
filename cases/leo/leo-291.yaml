introducing_pr_title: '[Feat] Deploy new programs and execute on-chain programs from
  the command line'
introducing_pr_body: "- `leo deploy`:\r\n\t- Can now easily deploy programs to custom\
  \ networks, with custom broadcast endpoints, all while using private or public fees.\r\
  \n\t- Now supports easy deployment of projects that contain any depth of dependencies\
  \ by specifying `--recursive`. Customizable parameter `--wait <SECONDS>` to specify\
  \ how long to wait between nested program deployments to help avoid a parent program\
  \ from reaching a snarkOS node before its child. \r\n- `leo execute`:\r\n\t- Can\
  \ now easily execute existing on-chain programs, even if they don't match the current\
  \ directory you are in.\r\n- Examples:\r\n\t- `leo deploy --endpoint \"http://0.0.0.0:3030\"\
  \ --private-key \"<INSERT PRIVATE_KEY>\"`\r\n\t- `leo execute --program football_players_v001.aleo\
  \ add_player \"{player_id: 1000field,team_id: 1field,position: 1field,attack: 1u128,defense:\
  \ 1u128,speed: 1u128,power: 1u128,stamina: 1u128,technique: 1u128,goalkeeping: 1u128}\"\
  \ --endpoint \"http://0.0.0.0:3030\" --private-key \"<INSERT PRIVATE KEY>\" --broadcast\
  \ --record \"<INSERT RECORD>\"`\r\n\t- `leo execute --program credits.aleo --endpoint\
  \ \"http://0.0.0.0:3030\" --private-key \"<INSERT PRIVATE_KEY 1>\" --broadcast transfer_public_to_private\
  \ <INSERT RECIPIENT ADDRESS> 5000000u64`\r\n- [Previous discussion](https://github.com/AleoHQ/leo/pull/27920)"
