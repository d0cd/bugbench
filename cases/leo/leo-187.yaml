description: The arguments to AsgError::unexpected_type() were passed in the wrong
  order across multiple call sites, swapping the 'expected' and 'got' type parameters.
  This caused error messages to display the expected type as the actual type and vice
  versa. The fix corrects the argument ordering in all affected unexpected_type calls.
expected_findings:
- file: asg/src/expression/array_init.rs
  line: 74
  summary: 'Arguments to unexpected_type are in wrong order: expected type and actual
    type are swapped, producing a misleading error message.'
- file: asg/src/expression/binary.rs
  line: 123
  summary: 'unexpected_type arguments swapped: the expected type (Boolean) and actual
    type are in the wrong parameter positions.'
- file: asg/src/expression/circuit_access.rs
  line: 172
  summary: 'unexpected_type called with reversed arguments: ''none'' and expected_type
    are swapped, making the error message say the opposite of what it should.'
