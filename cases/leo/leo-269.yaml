introducing_pr_title: Implement code generation for Aleo instructions
introducing_pr_body: "## Overview\r\nAdds support for building a Leo program into\
  \ Aleo instructions and producing a `.aleo` program file.\r\n\r\nWrite a `main.leo`\
  \ Leo Program:\r\n```ts\r\n// The 'message' main function.\r\ncircuit Message {\r\
  \n    first: field,\r\n    second: field,\r\n}\r\n\r\nfunction main(m: Message)\
  \ -> field {\r\n    return m.first + m.second;\r\n}\r\n```\r\n\r\nCompile into a\
  \ `main.aleo` Aleo file with `leo build`.\r\n```\r\nprogram message.aleo;\r\n\r\n\
  interface message:\r\n    first as field;\r\n    second as field;\r\n\r\nfunction\
  \ main:\r\n    input r0 as message.private;\r\n    add r0.first r0.second into r1;\r\
  \n    output r1 as field.private;\r\n```\r\n\r\nSupply user-defined inputs `message.in`\r\
  \n```\r\n[main]\r\na: Message = Message { first: 2field, second: 3field };\r\n```\r\
  \n\r\nExecute the Aleo file with `leo run`\r\n```\r\n\U0001F680 Executing 'message.aleo/main'...\r\
  \n\r\n \u2022 Called prover: 986 ms\r\n\r\n\u27A1\uFE0F  Output\r\n\r\n \u2022 5field\r\
  \n\r\n```\r\n"
