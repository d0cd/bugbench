issue_bodies:
  '28504': "## \U0001F41B Bug Report\n\nUsing Leo v2.4.1 (on Leo playground),\nthis\
    \ program:\n```\nprogram sample.aleo {\n    transition main(public x: field, y:\
    \ field) -> field {\n        if y == 0field {\n            return x; \n      \
    \  } else {\n            return x / y;\n        }\n    }\n}\n```\ngenerates the\
    \ Aleo Instructions code\n```\nprogram sample.aleo;\n\nfunction main:\n    input\
    \ r0 as field.public;\n    input r1 as field.private;\n    is.eq r1 0field into\
    \ r2;\n    not r2 into r3;\n    div r0 r1 into r4;\n    ternary r2 r0 r4 into\
    \ r5;\n    output r5 as field.private;\n```\nNote the `not r2 into r3` is dead\
    \ code.\n\nThis is new; when I submitted issue#27482\nI saw:\n```\nfunction main:\n\
    \    input r0 as field.public;\n    input r1 as field.private;\n    is.eq r1 0field\
    \ into r2;\n    div r0 r1 into r3;\n    ternary r2 r0 r3 into r4;\n    output\
    \ r4 as field.private;\n````\n\n"
