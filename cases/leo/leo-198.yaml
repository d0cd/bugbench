bug_description: 'Bumps [itertools](https://github.com/rust-itertools/itertools) from
  0.12.1 to 0.13.0.

  <details>

  <summary>Changelog</summary>

  <p><em>Sourced from <a href="https://github.com/rust-itertools/itertools/blob/master/CHANGELOG.md">itertools''s
  changelog</a>.</em></p>

  <blockquote>

  <h2>0.13.0</h2>

  <h3>Breaking</h3>

  <ul>

  <li>Removed implementation of <code>DoubleEndedIterator</code> for <code>ConsTuples</code>
  (<a href="https://redirect.github.com/rust-itertools/itertools/issues/853">#853</a>)</li>

  <li>Made <code>MultiProduct</code> fused and fixed on an empty iterator (<a href="https://redirect.github.com/rust-itertools/itertools/issues/835">#835</a>,
  <a href="https://redirect.github.com/rust-itertools/itertools/issues/834">#834</a>)</li>

  <li>Changed <code>iproduct!</code> to return tuples for maxi one iterator too (<a
  href="https://redirect.github.com/rust-itertools/itertools/issues/870">#870</a>)</li>

  <li>Changed <code>PutBack::put_back</code> to return the old value (<a href="https://redirect.github.com/rust-itertools/itertools/issues/880">#880</a>)</li>

  <li>Removed deprecated <code>repeat_call, Itertools::{foreach, step, map_results,
  fold_results}</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/878">#878</a>)</li>

  <li>Removed <code>TakeWhileInclusive::new</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/912">#912</a>)</li>

  </ul>

  <h3>Added</h3>

  <ul>

  <li>Added <code>Itertools::{smallest_by, smallest_by_key, largest, largest_by, largest_by_key}</code>
  (<a href="https://redirect.github.com/rust-itertools/itertools/issues/654">#654</a>,
  <a href="https://redirect.github.com/rust-itertools/itertools/issues/885">#885</a>)</li>

  <li>Added <code>Itertools::tail</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/899">#899</a>)</li>

  <li>Implemented <code>DoubleEndedIterator</code> for <code>ProcessResults</code>
  (<a href="https://redirect.github.com/rust-itertools/itertools/issues/910">#910</a>)</li>

  <li>Implemented <code>Debug</code> for <code>FormatWith</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/931">#931</a>)</li>

  <li>Added <code>Itertools::get</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/891">#891</a>)</li>

  </ul>

  <h3>Changed</h3>

  <ul>

  <li>Deprecated <code>Itertools::group_by</code> (renamed <code>chunk_by</code>)
  (<a href="https://redirect.github.com/rust-itertools/itertools/issues/866">#866</a>,
  <a href="https://redirect.github.com/rust-itertools/itertools/issues/879">#879</a>)</li>

  <li>Deprecated <code>unfold</code> (use <code>std::iter::from_fn</code> instead)
  (<a href="https://redirect.github.com/rust-itertools/itertools/issues/871">#871</a>)</li>

  <li>Optimized <code>GroupingMapBy</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/873">#873</a>,
  <a href="https://redirect.github.com/rust-itertools/itertools/issues/876">#876</a>)</li>

  <li>Relaxed <code>Fn</code> bounds to <code>FnMut</code> in <code>diff_with, Itertools::into_group_map_by</code>
  (<a href="https://redirect.github.com/rust-itertools/itertools/issues/886">#886</a>)</li>

  <li>Relaxed <code>Debug/Clone</code> bounds for <code>MapInto</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/889">#889</a>)</li>

  <li>Documented the <code>use_alloc</code> feature (<a href="https://redirect.github.com/rust-itertools/itertools/issues/887">#887</a>)</li>

  <li>Optimized <code>Itertools::set_from</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/888">#888</a>)</li>

  <li>Removed badges in <code>README.md</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/890">#890</a>)</li>

  <li>Added &quot;no-std&quot; categories in <code>Cargo.toml</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/894">#894</a>)</li>

  <li>Fixed <code>Itertools::k_smallest</code> on short unfused iterators (<a href="https://redirect.github.com/rust-itertools/itertools/issues/900">#900</a>)</li>

  <li>Deprecated <code>Itertools::tree_fold1</code> (renamed <code>tree_reduce</code>)
  (<a href="https://redirect.github.com/rust-itertools/itertools/issues/895">#895</a>)</li>

  <li>Deprecated <code>GroupingMap::fold_first</code> (renamed <code>reduce</code>)
  (<a href="https://redirect.github.com/rust-itertools/itertools/issues/902">#902</a>)</li>

  <li>Fixed <code>Itertools::k_smallest(0)</code> to consume the iterator, optimized
  <code>Itertools::k_smallest(1)</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/909">#909</a>)</li>

  <li>Specialized <code>Combinations::nth</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/914">#914</a>)</li>

  <li>Specialized <code>MergeBy::fold</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/920">#920</a>)</li>

  <li>Specialized <code>CombinationsWithReplacement::nth</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/923">#923</a>)</li>

  <li>Specialized <code>FlattenOk::{fold, rfold}</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/927">#927</a>)</li>

  <li>Specialized <code>Powerset::nth</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/924">#924</a>)</li>

  <li>Documentation fixes (<a href="https://redirect.github.com/rust-itertools/itertools/issues/882">#882</a>,
  <a href="https://redirect.github.com/rust-itertools/itertools/issues/936">#936</a>)</li>

  <li>Fixed <code>assert_equal</code> for iterators longer than <code>i32::MAX</code>
  (<a href="https://redirect.github.com/rust-itertools/itertools/issues/932">#932</a>)</li>

  <li>Updated the <code>must_use</code> message of non-lazy <code>KMergeBy</code>
  and <code>TupleCombinations</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/939">#939</a>)</li>

  </ul>

  <h3>Notable Internal Changes</h3>

  <ul>

  <li>Tested iterator laziness (<a href="https://redirect.github.com/rust-itertools/itertools/issues/792">#792</a>)</li>

  <li>Created <code>CONTRIBUTING.md</code> (<a href="https://redirect.github.com/rust-itertools/itertools/issues/767">#767</a>)</li>

  </ul>

  </blockquote>

  </details>

  <details>

  <summary>Commits</summary>

  <ul>

  <li><a href="https://github.com/rust-itertools/itertools/commit/d5084d15e959b85d89a49e5cd33ad6267bc541a3"><code>d5084d1</code></a>
  Prepare v0.13.0 release (<a href="https://redirect.github.com/rust-itertools/itertools/issues/937">#937</a>)</li>

  <li><a href="https://github.com/rust-itertools/itertools/commit/d7c99d55daeaa76f482444e95beb99f5744ced4e"><code>d7c99d5</code></a>
  <code>TupleCombinations</code> is not lazy but must be used nonetheless</li>

  <li><a href="https://github.com/rust-itertools/itertools/commit/074c7fcc07c2bfd60f238585c05134ea3eb43f77"><code>074c7fc</code></a>
  <code>KMergeBy</code> is not lazy but must be used nonetheless</li>

  <li><a href="https://github.com/rust-itertools/itertools/commit/2ad9e07ae860bb891e48b35edfea5b3286dcb4ab"><code>2ad9e07</code></a>
  <code>assert_equal</code>: fix <code>clippy::default_numeric_fallback</code></li>

  <li><a href="https://github.com/rust-itertools/itertools/commit/0d4efc84323399b47b09ae9da1ff3fdfc2cf95e1"><code>0d4efc8</code></a>
  Remove free function <code>get</code></li>

  <li><a href="https://github.com/rust-itertools/itertools/commit/05cc0ee256e84d665e34209053ebc62ef7e4463d"><code>05cc0ee</code></a>
  <code>get(s..=usize::MAX)</code> should be fine when <code>s != 0</code></li>

  <li><a href="https://github.com/rust-itertools/itertools/commit/3c16f14baa5515376adcd8c530f6d3d275b14f44"><code>3c16f14</code></a>
  <code>get</code>: when is it ESI and/or DEI</li>

  <li><a href="https://github.com/rust-itertools/itertools/commit/4dd6ba0e7c44bb287dff1098d8fb6ab77c32bf87"><code>4dd6ba0</code></a>
  <code>get</code>: panics if the range includes <code>usize::MAX</code></li>

  <li><a href="https://github.com/rust-itertools/itertools/commit/7a9ce56fc59489668178d696db76afb3580a359c"><code>7a9ce56</code></a>
  <code>get(r: Range)</code> as <code>Skip\&lt;Take&gt;</code></li>

  <li><a href="https://github.com/rust-itertools/itertools/commit/f676f2f96451220c827c62f714d79ce6454d0184"><code>f676f2f</code></a>
