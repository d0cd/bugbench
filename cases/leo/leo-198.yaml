description: 'The `leo clean` command had two bugs: it would attempt to remove files
  without first verifying that a project manifest exists, potentially deleting files
  in the wrong directory. Additionally, it would fail with an error if the `outputs`
  or `build` directories did not exist, instead of gracefully handling their absence.
  The fix adds a manifest check before deletion and handles missing directories without
  erroring.'
expected_findings:
- file: leo/cli/commands/clean.rs
  line: 37
  summary: 'Missing manifest existence check: `clean` proceeds to remove files without
    verifying that a valid Leo manifest exists in the current directory, risking deletion
    in non-project directories.'
- file: leo/cli/commands/clean.rs
  line: 14
  summary: 'Missing error handling for non-existent directories: removing `outputs`
    or `build` directories fails if they don''t exist instead of silently succeeding.'
