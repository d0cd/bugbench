  \n-->\r\n\r\n## Motivation\r\n\r\nGetting error of `Failed to deploy 'program.aleo'\
  \ to http://api.explorer.aleo.org/v1/testnet/transaction/broadcast: (status code\
  \ 405: \"\")` while trying `leo deploy`.\r\n\r\nFix was to change default API endpoint\
  \ from `http://api.explorer.aleo.org/v1/testnet` to `https://api.explorer.aleo.org/v1/testnet`.\r\
  \n\r\n## Test Plan\r\n\r\n<!--\r\n    If you changed any code,\r\n    please provide\
