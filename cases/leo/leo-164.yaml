description: The Leo parser's PEG grammar did not enforce a valid address format,
  allowing empty or malformed addresses like `address()` to be accepted. The fix adds
  a strict PEG rule requiring addresses to match the pattern `aleo` + 1 ASCII digit
  + 58 alphanumeric characters, and adds corresponding error messages and tests for
  invalid prefix, invalid length, and empty addresses.
