introducing_pr_ci_status: ''
fix_pr_title: Add support for empty arrays
fix_pr_body: "This change adds support for empty array expressions and types and generally\
  \ improves handling of empty types in code generation.\r\n\r\nFunction arguments\
  \ that resolve to empty types, such as `[u32;0]` are ignored such that only non-empty\
  \ arguments exist at runtime. Empty return values are similarly ignored, or more\
  \ accurately treated as Unit is.\r\n\r\nThis support is currently restricted to\
  \ empty arrays, but a future PR could easily add support for `()` as an argument\
  \ type or empty structs with similar behavior.\r\n\r\nCloses #28715\r\n"
