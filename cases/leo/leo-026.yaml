introducing_pr_title: Repeat expressions
introducing_pr_body: "Closes #28670\r\nAlso closes #28699\r\n\r\nThis PR adds repeat\
  \ expression as in `[3u32; 4]` which is equivalent to `[3u32, 3u32, 3u32, 3u32]`.\
  \ Similarly to array type, the length (or count) is an expression that should evaluate\
  \ to a constant at some point.\r\n\r\nMost change in this PR are fairly clear and\
  \ straightforward. I still made the interpreter work with repeat expressions even\
  \ though it's getting replaced soon."
