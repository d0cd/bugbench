introducing_pr_title: '[Fix] Improve Leo release CI'
introducing_pr_body: "The Leo release CI can be quite problematic when there are updates\
  \ to the underlying images that are no longer compatible.\r\nSpecifically, it's\
  \ hard to adjust things on the fly when needed.\r\nThis PR requires that the release\
  \ CI is explicitly triggered and gives an option to actually upload the release.\r\
  \nThat way the Leo team can do a dry run, verify that everything builds, and trigger\
  \ a live run."
