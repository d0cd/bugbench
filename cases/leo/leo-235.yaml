introducing_pr_title: Feature - Add GitHub Action to add contributors to README
introducing_pr_body: "When a user submits a new issue, the bot first checks to see\
  \ whether it is a request to be added as a contributor. If not, it quickly exits.\
  \ The user will need to format the name of their request properly \"Add XXXXX to\
  \ contributors\" in order for the action to run.\r\n\r\nThe GitHub Action ensures\
  \ that:\r\n- the person opening the issue requests that their own name be added\
  \ to the README.\r\n- there is a link to a GitHub repo in the issue body\r\n- the\
  \ user has starred the Leo repo\r\n- the user is the author of the linked repo\r\
  \n- the linked repo contains a valid Leo application (by checking for presence of\
  \ a `main.leo` file) \r\n\r\nThen, the GitHub action:\r\n- creates a properly formatted\
  \ PR to insert the user along with the requested badge and emoji into the README\r\
  \n- increments the Contributor Count section of the README.\r\n- tags the techops\
  \ team to review that PR\r\n- comments on the issue and tags the user if there are\
  \ errors with their request\r\n\r\nNote: - For the GitHub action to be able to create\
  \ PRs, we must ensure that the \u201CAllow Github actions to create and approve\
  \ pull requests\u201D box is checked in the Leo repo under Settings -> Actions.\r\
  \n\r\n(cc @aharshbe )\r\n"
