description: The Leo parser example (parser/examples/parser.rs) would output the AST
  even when parse errors occurred. The fix adds proper error checking via the Handler
  from leo_errors::emitter, ensuring that when the parser encounters errors, the AST
  is not emitted as output.
expected_findings:
- file: parser/examples/parser.rs
  line: 15
  summary: "Missing import of Handler from leo_errors::emitter \u2014 without it,\
    \ parse errors are not checked before outputting the AST"
- file: parser/examples/parser.rs
  line: 55
  summary: 'Missing error check after parsing: should verify Handler has no errors
    before printing AST output, otherwise parse errors are silently ignored'
