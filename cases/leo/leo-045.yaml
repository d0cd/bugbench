fix_pr_title: Bump tracing-subscriber from 0.3.19 to 0.3.20
fix_pr_body: 'Bumps [tracing-subscriber](https://github.com/tokio-rs/tracing) from
  0.3.19 to 0.3.20.

  <details>

  <summary>Release notes</summary>

  <p><em>Sourced from <a href="https://github.com/tokio-rs/tracing/releases">tracing-subscriber''s
  releases</a>.</em></p>

  <blockquote>

  <h2>tracing-subscriber 0.3.20</h2>

  <p><strong>Security Fix</strong>: ANSI Escape Sequence Injection (CVE-TBD)</p>

  <h2>Impact</h2>

  <p>Previous versions of tracing-subscriber were vulnerable to ANSI escape sequence
  injection attacks. Untrusted user input containing ANSI escape sequences could be
  injected into terminal output when logged, potentially allowing attackers to:</p>

  <ul>

  <li>Manipulate terminal title bars</li>

  <li>Clear screens or modify terminal display</li>

  <li>Potentially mislead users through terminal manipulation</li>

  </ul>

  <p>In isolation, impact is minimal, however security issues have been found in terminal
  emulators that enabled an attacker to use ANSI escape sequences via logs to exploit
  vulnerabilities in the terminal emulator.</p>

  <h2>Solution</h2>

  <p>Version 0.3.20 fixes this vulnerability by escaping ANSI control characters in
  when writing events to destinations that may be printed to the terminal.</p>

  <h2>Affected Versions</h2>

  <p>All versions of tracing-subscriber prior to 0.3.20 are affected by this vulnerability.</p>

  <h2>Recommendations</h2>

  <p>Immediate Action Required: We recommend upgrading to tracing-subscriber 0.3.20
  immediately, especially if your application:</p>

  <ul>

  <li>Logs user-provided input (form data, HTTP headers, query parameters, etc.)</li>

  <li>Runs in environments where terminal output is displayed to users</li>

  </ul>

  <h2>Migration</h2>

  <p>This is a patch release with no breaking API changes. Simply update your Cargo.toml:</p>

  <pre lang="toml"><code>[dependencies]

  tracing-subscriber = &quot;0.3.20&quot;

  </code></pre>

  <h2>Acknowledgments</h2>

  <p>We would like to thank <a href="http://github.com/zefr0x">zefr0x</a> who responsibly
  reported the issue at <code>security@tokio.rs</code>.</p>

  <p>If you believe you have found a security vulnerability in any tokio-rs project,
  please email us at <code>security@tokio.rs</code>.</p>

  </blockquote>

  </details>

  <details>

  <summary>Commits</summary>

  <ul>

  <li><a href="https://github.com/tokio-rs/tracing/commit/4c52ca5266a3920fc5dfeebda2accf15ee7fb278"><code>4c52ca5</code></a>
  fmt: fix ANSI escape sequence injection vulnerability (<a href="https://redirect.github.com/tokio-rs/tracing/issues/3368">#3368</a>)</li>

  <li><a href="https://github.com/tokio-rs/tracing/commit/f71cebe41e4c12735b1d19ca804428d4ff7d905d"><code>f71cebe</code></a>
  subscriber: impl Clone for EnvFilter (<a href="https://redirect.github.com/tokio-rs/tracing/issues/3360">#3360</a>)</li>

  <li><a href="https://github.com/tokio-rs/tracing/commit/3a1f571102b38bcdca13d59f3c454989d179055d"><code>3a1f571</code></a>
  Fix CI (<a href="https://redirect.github.com/tokio-rs/tracing/issues/3361">#3361</a>)</li>

  <li><a href="https://github.com/tokio-rs/tracing/commit/e63ef57f3d686abe3727ddd586eb9af73d6715b7"><code>e63ef57</code></a>
  chore: prepare tracing-attributes 0.1.30 (<a href="https://redirect.github.com/tokio-rs/tracing/issues/3316">#3316</a>)</li>

  <li><a href="https://github.com/tokio-rs/tracing/commit/6e59a13b1a7bcdd78b8b5a7cbcf70a0b2cdd76f0"><code>6e59a13</code></a>
  attributes: fix tracing::instrument regression around shadowing (<a href="https://redirect.github.com/tokio-rs/tracing/issues/3311">#3311</a>)</li>

  <li><a href="https://github.com/tokio-rs/tracing/commit/e4df76127538aa8370d7dee32a6f84bbec6bbf10"><code>e4df761</code></a>
  tracing: update core to 0.1.34 and attributes to 0.1.29 (<a href="https://redirect.github.com/tokio-rs/tracing/issues/3305">#3305</a>)</li>

  <li><a href="https://github.com/tokio-rs/tracing/commit/643f392ebb73c4fb856f56a78c066c82582dd22c"><code>643f392</code></a>
  chore: prepare tracing-attributes 0.1.29 (<a href="https://redirect.github.com/tokio-rs/tracing/issues/3304">#3304</a>)</li>

  <li><a href="https://github.com/tokio-rs/tracing/commit/d08e7a6eea1833810ea527e18ea03b08cd402c9d"><code>d08e7a6</code></a>
  chore: prepare tracing-core 0.1.34 (<a href="https://redirect.github.com/tokio-rs/tracing/issues/3302">#3302</a>)</li>

  <li><a href="https://github.com/tokio-rs/tracing/commit/6e70c571d319a033d5f37c885ccf99aa675a9eac"><code>6e70c57</code></a>
  tracing-subscriber: count numbers of enters in <code>Timings</code> (<a href="https://redirect.github.com/tokio-rs/tracing/issues/2944">#2944</a>)</li>

  <li><a href="https://github.com/tokio-rs/tracing/commit/c01d4fd9def2fb061669a310598095c789ca0a32"><code>c01d4fd</code></a>
  fix docs and enable CI on <code>main</code> branch (<a href="https://redirect.github.com/tokio-rs/tracing/issues/3295">#3295</a>)</li>

  <li>Additional commits viewable in <a href="https://github.com/tokio-rs/tracing/compare/tracing-subscriber-0.3.19...tracing-subscriber-0.3.20">compare
  view</a></li>

  </ul>

  </details>

