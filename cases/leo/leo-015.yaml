fix_pr_title: 'feat(cli): add leo fmt command'
fix_pr_body: "Adds a `leo fmt` command to the CLI, emulating the behaviour of `cargo\
  \ fmt`:\r\n\r\n- **`leo fmt`** \u2014 silently formats all `.leo` files in `src/`\
  \ (or a given path). No output on success, just like `cargo fmt`.\r\n- **`leo fmt\
  \ --check`** \u2014 prints a colored diff of unformatted files and exits with code\
  \ 1, matching the `cargo fmt --check` output format.\r\n- Supports formatting individual\
  \ files or entire directories.\r\n\r\nAlso fixes `constructor()` spacing in `leo-fmt`\
  \ (was emitting `constructor ()` with a spurious space), deduplicates workspace\
  \ members in `Cargo.toml`, and adds an integration test covering both `fmt` and\
  \ `fmt --check`.\r\n\r\nHere is an example of running `leo fmt --check`\r\n\r\n\
  <img width=\"880\" height=\"707\" alt=\"Screenshot 2026-02-13 at 12 48 25\u202F\
  pm\" src=\"https://github.com/user-attachments/assets/379481d1-fb1c-4142-804c-9a1ca642cf49\"\
  \ />\r\n\r\nPart of #28579\r\n\r\nCorresponding documentation PR: https://github.com/ProvableHQ/leo-docs-source/pull/568"
