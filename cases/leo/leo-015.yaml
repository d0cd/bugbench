introducing_pr_title: 'feat: Add ABI Generation, including `leo-abi-types` and `leo-abi`
  crates'
introducing_pr_body: "# Summary\r\n\r\nThis PR adds ABI (Application Binary Interface)\
  \ generation to the Leo compiler. The ABI describes the public interface of a Leo\
  \ program, enabling downstream tooling to interact with deployed programs.\r\n\r\
  \n# Changes\r\n\r\nNew Crates:\r\n- `leo-abi-types` - Pure type definitions for\
  \ ABI (serializable with serde)\r\n- `leo-abi` - ABI generation logic from the Leo\
  \ AST\r\n\r\n### Compiler Integration\r\n\r\n- ABI is generated immediately after\
  \ `ProcessingAsync` pass (finalize functions exist) and before lowering passes (Leo\
  \ types preserved).\r\n- New `Compiled` struct returned from `compile()` containing\
  \ both `bytecode` and `abi`.\r\n- `intermediate_passes()` now returns the generated\
  \ ABI.\r\n\r\n### CLI Integration\r\n\r\n- `leo build` writes `abi.json` to the\
  \ build directory alongside `main.aleo`.\r\n- Added CLI error types for ABI serialization/write\
  \ failures.\r\n\r\n### ABI Contents\r\n\r\n- Program identifier.\r\n- Struct type\
  \ definitions.\r\n- Record type definitions.\r\n- Mapping definitions.\r\n- Transition\
  \ definitions (public entry points only).\r\n  - Input parameters with types and\
  \ modes.\r\n  - Output types and modes.\r\n  - Associated finalize function info\
  \ for async transitions.\r\n\r\n# Design Decisions\r\n\r\n- **Leo types, not Aleo\
  \ types:** ABI uses Leo's type representation (e.g., `Option<T>`) rather than lowered\
  \ Aleo types (e.g., \"T?\" structs). We instead clearly document how types are lowered\
  \ with doc comments on those that have a differing lowered representation (currently\
  \ only `Optional`).\r\n- **Transitions only:** Only transitions appear in the ABI\
  \ - regular functions and closures are internal.\r\n- **Post-`ProcessingAsync` generation:**\
  \ Finalize functions are found by analyzing the async transition's return statement\
  \ (which calls the generated async function).\r\n\r\n# To-Do\r\n\r\n- [x] Update\
  \ integration tests.\r\n- [x] Update documentation.\r\n\r\n# Future Work\r\n\r\n\
  - Rust/TypeScript codegen from ABI (separate crates).\r\n- ABI versioning scheme."
