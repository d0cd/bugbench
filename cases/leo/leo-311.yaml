introducing_pr_title: Use a prebuilt genesis block for execution tests
introducing_pr_body: "This also affects `leo test` since it uses `run_with_ledger(..)`.\r\
  \n\r\nHere I'm using the same `.bin` file that `leo devnode` uses. I did move it\
  \ into a new location though.\r\n\r\nThe impact of this is that we would avoid this\
  \ intermittent error which comes from attempting to create the genesis block every\
  \ time.\r\n```\r\nthread 'test_execution::execution_tests::execution_cond_exec_in_finalize_leo'\
  \ (14039) panicked at compiler/compiler/src/run.rs:291:10:\r\n\_\_\_\_called `Result::unwrap()`\
  \ on an `Err` value: Failed to download powers for degree 131071: Expected size\
  \ of 6291464, found size of 5242880\r\n```\r\n"
