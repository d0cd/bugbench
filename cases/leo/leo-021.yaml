description: The `leo execute` command did not handle program names that included
  the `.aleo` suffix, causing failures when users provided the full program name (e.g.,
  `my_program.aleo` instead of `my_program`). The fix strips the `.aleo` extension
  from the program name if it exists before using it.
expected_findings:
- file: leo/cli/commands/execute.rs
  line: 172
  summary: 'Missing normalization of program name: the `.aleo` suffix is not stripped
    before use, so passing a program name with `.aleo` extension causes execution
    to fail.'
