fix_pr_title: Enforce usage of latest program edition
fix_pr_body: '## Summary


  Closes #28983


  This PR improves how Leo handles program editions, ensuring we use actual editions
  from the network rather than arbitrary defaults.


  ## Changes


  ### Edition Handling by Command


  | Command | Local Programs | Network Dependencies |

  |---------|---------------|---------------------|

  | `run` | Default to edition 1 | Fetch from network |

  | `execute` | Default to edition 1 | Fetch from network |

  | `synthesize` | Default to edition 1 | Fetch from network |

  | `deploy` | N/A | Fetch from network + V8 constructor check |

  | `upgrade` | N/A | Fetch from network + V8 constructor check |


  ### Why edition 1 for local programs?


  Local programs haven''t been deployed yet, so they don''t have a real on-chain edition.
  We default to edition 1 to avoid snarkVM''s V8+ check that rejects edition 0 programs
  without constructors. This keeps local development frictionless.


  ### V8 Constructor Check


  The `check_edition_constructor_requirements` validation is **only** applied during
  `deploy` and `upgrade` - the commands that actually interact with on-chain programs.
  If a network dependency is at edition 0 without a constructor, we error early with
  a clear message explaining the program needs to be upgraded on-chain.


  <img width="819" height="106" alt="image" src="https://github.com/user-attachments/assets/3006d4a5-4f96-45cf-bb38-35dde212c566"
  />'
