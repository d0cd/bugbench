description: The Leo ABNF grammar for circuit definitions did not enforce that member
  variables must appear before member functions, and did not properly support trailing
  commas or semicolons after member variable declarations. The fix updates the grammar/parser
  to enforce variable-before-function ordering and accept both semicolons and commas
  as member variable delimiters.
