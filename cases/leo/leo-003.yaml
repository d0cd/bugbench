introducing_pr_body: "This PR:\r\n- improves `leo devnet` by:\r\n    - adding a `--clean-only`\
  \ flag to support cleaning residual artifacts.\r\n    - adding a `--storage` flag\
  \ to configure the storage directory\r\n    - adding options to specify specific\
  \ ports for the nodes in the network.\r\n- adds two new integration tests:\r\n \
  \   - `test_devnet`. Note that this test reads the environment variable `LEO_TEST_SNARKOS_PATH`\
  \ for a `snarkOS` binary to use.\r\n    - `test_devnode`"
