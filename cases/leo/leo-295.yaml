introducing_pr_title: Feat/futures
introducing_pr_body: "TLDR: This PR deprecates exisiting finalize syntax for the purpose\
  \ of taking advantage of Aleo instruction's asynchronous programming capabilities.\
  \ Previously all external transition calls were linearized in the order they were\
  \ asynchronously called, now Leo developers can create conditional logic to govern\
  \ which futures are awaited when, and interleave finalize operations in between.\
  \ \r\n\r\n# Further reference:\r\n- https://github.com/AleoHQ/snarkVM/pull/2009\r\
  \n# Example:\r\n```\r\nprogram basic_math.aleo {\r\n\tmapping add_uses: address\
  \ => u64;\r\n\tmapping sub_uses: address => u64;\r\n\r\n\tasync transition add_and_count(a:\
  \ i64, b: i64) -> (i64, Future) {\r\n\t\tlet finalize: Future = set_mapping(self.caller);\r\
  \n\t\treturn (a + b, finalize);\r\n\t}\r\n\t\r\n\tasync transition sub_and_count(a:\
  \ i64, b: i64) -> (i64, Future) {\r\n\t\treturn (a - b, set_mapping(self.caller));\r\
  \n\t}\r\n\r\n\tasync function set_mapping(user: address) {\r\n\t\tlet count:u64\
  \ = Mapping::get_or_use(add_uses, user, 0u64);\r\n\t\tMapping::set(add_uses, user,\
  \ count + 1u64);\r\n\t}\r\n}\r\n\r\n/////////////////////////////////////////////////////////////////////////\r\
  \n\r\nimport basic_math.aleo;\r\nprogram count_usages.aleo {\r\n\tasync transition\
  \ add_and_count(a: i64, b: i64) -> (i64, Future) {\r\n\t\tlet (result, add_future):\
  \ (i64, Future) = basic_math.aleo/add_and_count(a, b);\r\n\t\tlet (result_2, sub_future):\
  \ (i64, Future) = basic_math.aleo/sub_and_count(result, b);\r\n\t\tassert_eq(a,\
  \ result_2);\r\n\t\tassert_eq(add_future.0, sub_future.0); \r\n\t\tlet f: Future\
  \ = await_all(add_future, sub_future);\r\n\t\treturn (a, f);\r\n\t}\r\n\t\r\n\t\
  async function await_all(add_future: Future, sub_future: Future) {\r\n\t\tadd_future.await();\r\
  \n\t\tsub_future.await();\r\n\t}\r\n}\r\n```\r\n\r\n# Rules:\r\n- No calling async\
  \ function in async function (can support in the future)\r\n- Only one async function\
  \ call  per async transition (can support in the future)\r\n- All future types specified\
  \ as `Future` and type inferred\r\n- Async functions can call async or non-async\
  \ functions\r\n- Non-async functions can only call non-async functions\r\n- Can\
  \ use tuple access syntax to retrieve input arguments to futures (Ex: `f.1`)\r\n\
  - No ordering enforcements for propagating futures to async function or awiating\
  \ in finalize block\r\n\r\n\r\n# Todo: \r\n- [x] Convert testing framework to support\
  \ `async` syntax\r\n- [x] Add robust tests:\r\n\t- [x] Async transition must return\
  \ only one future, and it must be the final output\r\n\t- [x] Async function must\
  \ be declared to return nothing, but an inferred future is actually returned\r\n\
  \t- [x] All futures must be statically awaited\r\n\t- [x] Enforcement of aformentioned\
  \ rules\r\n- [ ] Complimentary features:\r\n\t- [x] Support for reading external\
  \ mappings\r\n\t- [ ] Converting finalize conditionals to `branch` syntax\r\n"
