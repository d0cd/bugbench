fix_pr_title: Bump zip from 2.1.1 to 2.1.3
fix_pr_body: "Bumps [zip](https://github.com/zip-rs/zip2) from 2.1.1 to 2.1.3.\n<details>\n\
  <summary>Release notes</summary>\n<p><em>Sourced from <a href=\"https://github.com/zip-rs/zip2/releases\"\
  >zip's releases</a>.</em></p>\n<blockquote>\n<h2>v2.1.3</h2>\n<h3><!-- raw HTML\
  \ omitted -->\U0001F41B Bug Fixes</h3>\n<ul>\n<li>Some date/time filters were previously\
  \ unreliable (i.e. later-pass filters had no earliest-pass or latest-fail, and vice-versa)</li>\n\
  <li>Decode Zip-Info UTF8 name and comment fields (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/159\"\
  >#159</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\U0001F69C Refactor</h3>\n\
  <ul>\n<li>Return extended timestamp fields copied rather than borrowed (<a href=\"\
  https://redirect.github.com/zip-rs/zip2/pull/183\">#183</a>)</li>\n</ul>\n<h3><!--\
  \ raw HTML omitted -->\u2699\uFE0F Miscellaneous Tasks</h3>\n<ul>\n<li>Fix a new\
  \ Clippy warning</li>\n<li>Fix a bug and inline <code>deserialize</code> for safety</li>\n\
  <li>Add check for wrong-length blocks, and incorporate fixed-size requirement into\
  \ the trait name</li>\n<li>Fix a fuzz failure by using checked_sub</li>\n<li>Add\
  \ feature gate for new unit test</li>\n</ul>\n<h2>v2.1.2</h2>\n<h3><!-- raw HTML\
  \ omitted -->\U0001F41B Bug Fixes</h3>\n<ul>\n<li>Derive <code>Debug</code> for\
  \ <code>ZipWriter</code></li>\n<li>lower default version to 4.5 and use the version-needed-to-extract\
  \ where feasible.</li>\n</ul>\n<h3><!-- raw HTML omitted -->\U0001F69C Refactor</h3>\n\
  <ul>\n<li>use a MIN_VERSION constant</li>\n</ul>\n<h3><!-- raw HTML omitted -->\u2699\
  \uFE0F Miscellaneous Tasks</h3>\n<ul>\n<li>Bug fixes for debug implementation</li>\n\
  <li>Bug fixes for debug implementation</li>\n<li>Update unit tests</li>\n<li>Remove\
  \ unused import</li>\n</ul>\n</blockquote>\n</details>\n<details>\n<summary>Changelog</summary>\n\
  <p><em>Sourced from <a href=\"https://github.com/zip-rs/zip2/blob/master/CHANGELOG.md\"\
  >zip's changelog</a>.</em></p>\n<blockquote>\n<h2><a href=\"https://github.com/zip-rs/zip2/compare/v2.1.2...v2.1.3\"\
  >2.1.3</a> - 2024-06-04</h2>\n<h3><!-- raw HTML omitted -->\U0001F41B Bug Fixes</h3>\n\
  <ul>\n<li>Some date/time filters were previously unreliable (i.e. later-pass filters\
  \ had no earliest-pass or latest-fail, and vice-versa)</li>\n<li>Decode Zip-Info\
  \ UTF8 name and comment fields (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/159\"\
  >#159</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\U0001F69C Refactor</h3>\n\
  <ul>\n<li>Return extended timestamp fields copied rather than borrowed (<a href=\"\
  https://redirect.github.com/zip-rs/zip2/pull/183\">#183</a>)</li>\n</ul>\n<h3><!--\
  \ raw HTML omitted -->\u2699\uFE0F Miscellaneous Tasks</h3>\n<ul>\n<li>Fix a new\
  \ Clippy warning</li>\n<li>Fix a bug and inline <code>deserialize</code> for safety</li>\n\
  <li>Add check for wrong-length blocks, and incorporate fixed-size requirement into\
  \ the trait name</li>\n<li>Fix a fuzz failure by using checked_sub</li>\n<li>Add\
  \ feature gate for new unit test</li>\n</ul>\n</blockquote>\n</details>\n<details>\n\
  <summary>Commits</summary>\n<ul>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/b5eb25d52fb457bcfe1bd535a5b5cda91825ae32\"\
