description: Using HashMap throughout the compiler produced non-deterministic iteration
  order, meaning the same Leo program could yield different ASTs across runs. The
  fix replaces all HashMap/HashSet usages with IndexMap/IndexSet, which preserve insertion
  order and guarantee deterministic behavior.
expected_findings:
- file: ast/src/program.rs
  line: 20
  summary: HashMap does not guarantee iteration order; compiling the same program
    multiple times can produce different ASTs. Should use an ordered map (IndexMap)
    for deterministic output.
- file: imports/src/parser/import_parser.rs
  line: 17
  summary: HashMap/HashSet used for import tracking causes non-deterministic ordering
    of parsed imports, harming reproducibility.
- file: symbol-table/src/symbol_table.rs
  line: 19
  summary: HashMap/HashSet in the symbol table leads to non-deterministic symbol resolution
    order; should use IndexMap/IndexSet for reproducible compilation.
