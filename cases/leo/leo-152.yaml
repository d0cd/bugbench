fix_pr_title: Bump openssl from 0.10.64 to 0.10.66
fix_pr_body: "Bumps [openssl](https://github.com/sfackler/rust-openssl) from 0.10.64\
  \ to 0.10.66.\n<details>\n<summary>Release notes</summary>\n<p><em>Sourced from\
  \ <a href=\"https://github.com/sfackler/rust-openssl/releases\">openssl's releases</a>.</em></p>\n\
  <blockquote>\n<h2>openssl-v0.10.66</h2>\n<h2>What's Changed</h2>\n<ul>\n<li>Fixed\
  \ invariant violation in <code>MemBio::get_buf</code> with empty results by <a href=\"\
  https://github.com/alex\"><code>@\u200Balex</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2266\"\
  >sfackler/rust-openssl#2266</a></li>\n<li>Release openssl v0.10.66 by <a href=\"\
  https://github.com/alex\"><code>@\u200Balex</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2267\"\
  >sfackler/rust-openssl#2267</a></li>\n</ul>\n<p><strong>Full Changelog</strong>:\
  \ <a href=\"https://github.com/sfackler/rust-openssl/compare/openssl-v0.10.65...openssl-v0.10.66\"\
  >https://github.com/sfackler/rust-openssl/compare/openssl-v0.10.65...openssl-v0.10.66</a></p>\n\
  <h2>openssl-v0.10.65</h2>\n<h2>What's Changed</h2>\n<ul>\n<li>don't emit rerun-if-changed\
  \ when vendoring by <a href=\"https://github.com/reaperhulk\"><code>@\u200Breaperhulk</code></a>\
  \ in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2177\">sfackler/rust-openssl#2177</a></li>\n\
  <li>Prepare for openssl-sys 0.9.101 release by <a href=\"https://github.com/alex\"\
  ><code>@\u200Balex</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2182\"\
  >sfackler/rust-openssl#2182</a></li>\n<li>don't emit rerun-if-changed unless the\
  \ path exists and is readable by <a href=\"https://github.com/reaperhulk\"><code>@\u200B\
  reaperhulk</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2187\"\
  >sfackler/rust-openssl#2187</a></li>\n<li>Added support for LibreSSL 3.9.0 by <a\
  \ href=\"https://github.com/alex\"><code>@\u200Balex</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2202\"\
  >sfackler/rust-openssl#2202</a></li>\n<li>Support stable LibreSSL 3.9.x by <a href=\"\
  https://github.com/alex\"><code>@\u200Balex</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2209\"\
  >sfackler/rust-openssl#2209</a></li>\n<li>openssl-sys 0.9.102 release by <a href=\"\
  https://github.com/alex\"><code>@\u200Balex</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2210\"\
  >sfackler/rust-openssl#2210</a></li>\n<li>Add repository field to openssl-macros\
  \ crate by <a href=\"https://github.com/paolobarbolini\"><code>@\u200Bpaolobarbolini</code></a>\
  \ in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2211\">sfackler/rust-openssl#2211</a></li>\n\
  <li>Add missing openssl-sys dependency by <a href=\"https://github.com/pieterdd\"\
  ><code>@\u200Bpieterdd</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2212\"\
  >sfackler/rust-openssl#2212</a></li>\n<li>Test OpenSSL 3.3.0-beta1 by <a href=\"\
  https://github.com/sfackler\"><code>@\u200Bsfackler</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2216\"\
  >sfackler/rust-openssl#2216</a></li>\n<li>test against 3.3.0 final by <a href=\"\
  https://github.com/alex\"><code>@\u200Balex</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2218\"\
  >sfackler/rust-openssl#2218</a></li>\n<li>fix min-versions in CI by <a href=\"https://github.com/alex\"\
  ><code>@\u200Balex</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2228\"\
  >sfackler/rust-openssl#2228</a></li>\n<li>Make X509_VAL opaque for LibreSSL 4.0.0\
  \ by <a href=\"https://github.com/botovq\"><code>@\u200Bbotovq</code></a> in <a\
  \ href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2227\">sfackler/rust-openssl#2227</a></li>\n\
  <li>Use the newer names for STACK_OF(T) functions with BoringSSL by <a href=\"https://github.com/davidben\"\
  ><code>@\u200Bdavidben</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2231\"\
  >sfackler/rust-openssl#2231</a></li>\n<li>Only declare OpensslCallbacks in bindgen\
  \ builds by <a href=\"https://github.com/alex\"><code>@\u200Balex</code></a> in\
  \ <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2234\">sfackler/rust-openssl#2234</a></li>\n\
  <li>Fix building with latest BoringSSL by <a href=\"https://github.com/davidben\"\
  ><code>@\u200Bdavidben</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2230\"\
  >sfackler/rust-openssl#2230</a></li>\n<li>Emit rustc-check-cfg for nightly by <a\
  \ href=\"https://github.com/alex\"><code>@\u200Balex</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2235\"\
  >sfackler/rust-openssl#2235</a></li>\n<li>Configure OpenSSL data dir on vendored\
  \ builds. by <a href=\"https://github.com/DanielSidhion\"><code>@\u200BDanielSidhion</code></a>\
  \ in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2122\">sfackler/rust-openssl#2122</a></li>\n\
  <li>Add boringssl keylog callback support by <a href=\"https://github.com/mspublic\"\
  ><code>@\u200Bmspublic</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2237\"\
  >sfackler/rust-openssl#2237</a></li>\n<li>Correct the name of the <code>pkgconf</code>\
  \ package on some distros  by <a href=\"https://github.com/JonathanBrouwer\"><code>@\u200B\
  JonathanBrouwer</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2253\"\
  >sfackler/rust-openssl#2253</a></li>\n<li>Add some OpenSSL 3 QUIC raw bindings by\
  \ <a href=\"https://github.com/bdbai\"><code>@\u200Bbdbai</code></a> in <a href=\"\
  https://redirect.github.com/sfackler/rust-openssl/pull/2257\">sfackler/rust-openssl#2257</a></li>\n\
  <li>Initialize OpenSSL in MD constructors by <a href=\"https://github.com/sfackler\"\
  ><code>@\u200Bsfackler</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2258\"\
  >sfackler/rust-openssl#2258</a></li>\n<li>Switch Pkey::from_ to use set1 functions\
  \ by <a href=\"https://github.com/alex\"><code>@\u200Balex</code></a> in <a href=\"\
  https://redirect.github.com/sfackler/rust-openssl/pull/2262\">sfackler/rust-openssl#2262</a></li>\n\
  <li>Release openssl v0.10.65 and openssl-sys v0.9.103 by <a href=\"https://github.com/alex\"\
  ><code>@\u200Balex</code></a> in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2265\"\
  >sfackler/rust-openssl#2265</a></li>\n</ul>\n<h2>New Contributors</h2>\n<ul>\n<li><a\
  \ href=\"https://github.com/paolobarbolini\"><code>@\u200Bpaolobarbolini</code></a>\
  \ made their first contribution in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2211\"\
  >sfackler/rust-openssl#2211</a></li>\n<li><a href=\"https://github.com/pieterdd\"\
  ><code>@\u200Bpieterdd</code></a> made their first contribution in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2212\"\
  >sfackler/rust-openssl#2212</a></li>\n<li><a href=\"https://github.com/DanielSidhion\"\
  ><code>@\u200BDanielSidhion</code></a> made their first contribution in <a href=\"\
  https://redirect.github.com/sfackler/rust-openssl/pull/2122\">sfackler/rust-openssl#2122</a></li>\n\
  <li><a href=\"https://github.com/mspublic\"><code>@\u200Bmspublic</code></a> made\
  \ their first contribution in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2237\"\
  >sfackler/rust-openssl#2237</a></li>\n<li><a href=\"https://github.com/JonathanBrouwer\"\
  ><code>@\u200BJonathanBrouwer</code></a> made their first contribution in <a href=\"\
  https://redirect.github.com/sfackler/rust-openssl/pull/2253\">sfackler/rust-openssl#2253</a></li>\n\
  <li><a href=\"https://github.com/bdbai\"><code>@\u200Bbdbai</code></a> made their\
  \ first contribution in <a href=\"https://redirect.github.com/sfackler/rust-openssl/pull/2257\"\
  >sfackler/rust-openssl#2257</a></li>\n</ul>\n<p><strong>Full Changelog</strong>:\
  \ <a href=\"https://github.com/sfackler/rust-openssl/compare/openssl-v0.10.64...openssl-v0.10.65\"\
  >https://github.com/sfackler/rust-openssl/compare/openssl-v0.10.64...openssl-v0.10.65</a></p>\n\
