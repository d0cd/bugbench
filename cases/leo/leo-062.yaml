fix_pr_title: A few fixes to binary ops in the interpreter
fix_pr_body: "1. We should be able to compare addresses and structs.\r\n2. We should\
  \ not be able to use `mod` with signed integers.\r\n\r\nI also added comprehensive\
  \ tests for unary and binary ops."
