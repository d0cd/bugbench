  \n- sanitizes endpoints before they are used in `snarkvm::Query`. A test has been\
  \ added verifying that this works, closing #28942 \r\n- improves an error message,\
  \ closing #28944 \r\n\r\n**Note. Because this PR fixes an issue in execution, a\
  \ patch testnet tag will need to be released.**"
