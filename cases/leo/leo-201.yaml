description: The Leo compiler's type checker and static analyzer did not properly
  validate future types, allowing futures to be incorrectly placed in tuples, accessed
  as tuple elements, and passed as function parameters without generating appropriate
  errors. The fix introduces a dedicated future_checker static analysis pass and tightens
  future consumption tracking across multiple type-checking expression and statement
  handlers.
expected_findings:
- file: compiler/passes/src/type_checking/checker.rs
  line: 1220
  summary: "Incomplete future type validation: `matches!(&input_var.type_(), Type::Future(_))`\
    \ check is insufficient \u2014 does not properly enforce constraints on how futures\
    \ can be used in variable contexts."
- file: compiler/passes/src/type_checking/check_expressions.rs
  line: 147
  summary: "Future consumption logic is missing or incorrect \u2014 futures are not\
    \ being properly tracked/consumed when used in expressions, allowing invalid future\
    \ usage patterns to pass type checking."
- file: compiler/passes/src/type_checking/check_statements.rs
  line: 23
  summary: "insert_variable call does not properly handle future types \u2014 missing\
    \ validation that futures cannot be stored in certain variable contexts (e.g.,\
    \ tuple bindings), allowing misplaced futures to go undetected."
