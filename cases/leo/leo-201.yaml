  Merge pull request <a href="https://redirect.github.com/serde-rs/serde/issues/2743">#2743</a>
  from dtolnay/renameallrules</li>

  <li><a href="https://github.com/serde-rs/serde/commit/f6ab0bc56f3df6d03974d233ffce352b0725ae09"><code>f6ab0bc</code></a>
