  \ <code>impl Service&lt;http::Request&lt;_&gt;&gt;</code> for <code>Client</code>.</li>\n\
  </ul>\n<p><strong>Full Changelog</strong>: <a href=\"https://github.com/seanmonstar/reqwest/compare/v0.12.6...v0.12.7\"\
