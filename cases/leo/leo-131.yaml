  <blockquote>\n<h2>v0.12.5</h2>\n<h2>What's Changed</h2>\n<ul>\n<li>Add <code>http3</code>\
  \ feature back, still requiring <code>reqwest_unstable</code>.</li>\n<li>Add <code>rustls-tls-no-provider</code>\
