description: The panic hook in Leo's main.rs incorrectly prints panic messages to
  stdout using `println!` instead of stderr. The fix changes `println!` to `eprintln!`
  so that panic output goes to stderr as is conventional, avoiding corruption of stdout
  program output.
expected_findings:
- file: leo/main.rs
  line: 180
  summary: Panic hook uses `println!` to write to stdout; should use `eprintln!` to
    write to stderr, as panic/error output must not mix with normal program output.
