introducing_pr_title: 'fix(finalize): consume Position command by incrementing instruction
  index'
introducing_pr_body: "Original PR: https://github.com/ProvableHQ/leo/pull/28848\r\n\
  \r\nFixes an infinite loop when executing finalize code: Position commands were\
  \ returned without advancing the instruction index, causing the executor to repeatedly\
  \ fetch the same Position. We now increment the instruction index upon encountering\
  \ Position, ensuring labels are consumed both during linear execution and after\
  \ branch() sets the index to a label. This aligns with how other commands advance\
  \ control flow and prevents hangs."
