introducing_pr_body: 'Bumps [regex](https://github.com/rust-lang/regex) from 1.10.6
  to 1.11.0.

  <details>

  <summary>Changelog</summary>

  <p><em>Sourced from <a href="https://github.com/rust-lang/regex/blob/master/CHANGELOG.md">regex''s
  changelog</a>.</em></p>

  <blockquote>

  <h1>1.11.0 (2024-09-29)</h1>

  <p>This is a new minor release of <code>regex</code> that brings in an update to
  the

  Unicode Character Database. Specifically, this updates the Unicode data

  used by <code>regex</code> internally to the version 16 release.</p>

  <p>New features:</p>

  <ul>

  <li>[FEATURE <a href="https://redirect.github.com/rust-lang/regex/issues/1228">#1228</a>](<a
  href="https://redirect.github.com/rust-lang/regex/pull/1228">rust-lang/regex#1228</a>):

  Add new <code>regex::SetMatches::matched_all</code> method.</li>

  <li>[FEATURE <a href="https://redirect.github.com/rust-lang/regex/issues/1229">#1229</a>](<a
  href="https://redirect.github.com/rust-lang/regex/pull/1229">rust-lang/regex#1229</a>):

  Update to Unicode Character Database (UCD) version 16.</li>

  </ul>

  </blockquote>

  </details>

  <details>

  <summary>Commits</summary>

  <ul>

  <li><a href="https://github.com/rust-lang/regex/commit/bcbe40342628b15ab2543d386c745f7f0811b791"><code>bcbe403</code></a>
