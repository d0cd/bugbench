fix_pr_title: Bump regex from 1.11.0 to 1.11.1
fix_pr_body: 'Bumps [regex](https://github.com/rust-lang/regex) from 1.11.0 to 1.11.1.

  <details>

  <summary>Changelog</summary>

  <p><em>Sourced from <a href="https://github.com/rust-lang/regex/blob/master/CHANGELOG.md">regex''s
  changelog</a>.</em></p>

  <blockquote>

  <h1>1.11.1 (2024-10-24)</h1>

  <p>This is a new patch release of <code>regex</code> that fixes compilation on nightly

  Rust when the unstable <code>pattern</code> crate feature is enabled. Users on nightly

  Rust without this feature enabled are unaffected.</p>

  <p>Bug fixes:</p>

  <ul>

  <li>[BUG <a href="https://redirect.github.com/rust-lang/regex/issues/1231">#1231</a>](<a
  href="https://redirect.github.com/rust-lang/regex/issues/1231">rust-lang/regex#1231</a>):

  Fix the <code>Pattern</code> trait implementation as a result of nightly API breakage.</li>

  </ul>

  </blockquote>

  </details>

  <details>

  <summary>Commits</summary>

  <ul>

  <li><a href="https://github.com/rust-lang/regex/commit/9870c06e6c772daaad7ab612faab29130753e41c"><code>9870c06</code></a>
  1.11.1</li>

  <li><a href="https://github.com/rust-lang/regex/commit/80df54e4b9ed4a9b14c502668856c3fc47b30cf4"><code>80df54e</code></a>
  changelog: 1.11.1</li>

  <li><a href="https://github.com/rust-lang/regex/commit/991ba8836b3dea741bdcb4e6f680543ab10331d6"><code>991ba88</code></a>
  unstable: fix <code>Pattern</code> trait implementation</li>

  <li>See full diff in <a href="https://github.com/rust-lang/regex/compare/1.11.0...1.11.1">compare
  view</a></li>

  </ul>

  </details>

  <br />



