  <li><a href="https://github.com/rust-lang/regex/commit/b790aa5d2880ad4aeb1820fcb4bd6046f9c50dd6"><code>b790aa5</code></a>
  api: add SetMatches::matched_all</li>

  <li><a href="https://github.com/rust-lang/regex/commit/d3d3ff7abe4d98972a2d2cde1202ce903ddd4e14"><code>d3d3ff7</code></a>
