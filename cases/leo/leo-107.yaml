description: The Leo parser incorrectly parsed negative scalar and field literals
  (e.g., `-1scalar`, `-1field`) as unary negation expressions applied to positive
  literals, rather than recognizing them as negative literal values directly. The
  fix modifies the expression parser in `expression.rs` to detect and consume the
  negative sign as part of the literal token for scalar and field types.
expected_findings:
- file: compiler/parser/src/parser/expression.rs
  line: 248
  summary: Parser does not handle negative sign as part of scalar/field literal tokens;
    `-1scalar` is incorrectly parsed as Unary(Negate, Literal(1scalar)) instead of
    Literal(-1scalar)
