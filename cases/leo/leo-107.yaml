  <li><a href="https://github.com/rust-lang/regex/commit/4bb1e3d992a4e237c5ad535f1798f7a46552c34d"><code>4bb1e3d</code></a>
  deps: bump regex-syntax</li>

  <li><a href="https://github.com/rust-lang/regex/commit/cba0fbc0194456f644040d7558ae6ed261d57cc2"><code>cba0fbc</code></a>
  regex-syntax-0.8.5</li>

  <li><a href="https://github.com/rust-lang/regex/commit/1533257e7d337022bbfae9df99fb99948044aa87"><code>1533257</code></a>
  changelog: 1.11.0</li>

  <li><a href="https://github.com/rust-lang/regex/commit/9239e7e2feb996e8d764dbda23614663a1882ece"><code>9239e7e</code></a>
