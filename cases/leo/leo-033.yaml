introducing_pr_title: Allow formatted errors to have additional labels
introducing_pr_body: "This PR builds on top of https://github.com/ProvableHQ/leo/pull/28893.\
  \ It contains all of its commits and makes additional refactoring changes.\r\n\r\
  \nEvery `Fromatted` error can now have labels which can be added as follows:\r\n\
  \r\n```rust\r\nTypeCheckerError::duplicate_record_variable(identifier.name, *span).with_labels(vec![\r\
  \n    Label::new(format!(\"`{}` first declared here\", identifier.name), *first_span).with_color(leo_errors::Color::Blue),\r\
  \n    Label::new(\"record variable already declared\", *span),\r\n])\r\n```\r\n\r\
  \nThe result is as follows (which mirrors Rust):\r\n\r\n<img width=\"549\" height=\"\
  783\" alt=\"image\" src=\"https://github.com/user-attachments/assets/0bbd4b92-c767-413d-997e-da7dfc6d425e\"\
  \ />\r\n\r\nNote that this now handles multi-line spans, single line gaps, multi-line\
  \ gaps, etc.\r\n\r\nI think overlapping spans would still cause some issues, but\
  \ that's a problem for another day."
