fix_pr_title: Bump zip from 1.1.4 to 1.2.1
fix_pr_body: "Bumps [zip](https://github.com/zip-rs/zip2) from 1.1.4 to 1.2.1.\n<details>\n\
  <summary>Release notes</summary>\n<p><em>Sourced from <a href=\"https://github.com/zip-rs/zip2/releases\"\
  >zip's releases</a>.</em></p>\n<blockquote>\n<h2>v1.2.1</h2>\n<h3><!-- raw HTML\
  \ omitted -->\U0001F41B Bug Fixes</h3>\n<ul>\n<li>Prevent panic when trying to read\
  \ a file with an unsupported compression method</li>\n<li>Prevent panic after reading\
  \ an invalid LZMA file</li>\n<li>Make <code>Stored</code> the default compression\
  \ method if <code>Deflated</code> isn't available, so that zip files are readable\
  \ by as much software as possible</li>\n<li>version_needed was wrong when e.g. cfg(bzip2)\
  \ but current file wasn't bzip2 (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/100\"\
  >#100</a>)</li>\n<li>file paths shouldn't start with slashes (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/102\"\
  >#102</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\U0001F69C Refactor</h3>\n\
  <ul>\n<li>Overhaul <code>impl Arbitrary for FileOptions</code></li>\n<li>Remove\
  \ unused <code>atomic</code> module</li>\n</ul>\n<h2>v1.2.0</h2>\n<h3><!-- raw HTML\
  \ omitted -->\U0001F680 Features</h3>\n<ul>\n<li>Add method <code>decompressed_size()</code>\
  \ so non-recursive ZIP bombs can be detected</li>\n</ul>\n<h3><!-- raw HTML omitted\
  \ -->\U0001F69C Refactor</h3>\n<ul>\n<li>Make <code>ZipWriter::finish()</code> consume\
  \ the <code>ZipWriter</code></li>\n</ul>\n<h3><!-- raw HTML omitted -->\u2699\uFE0F\
  \ Miscellaneous Tasks</h3>\n<ul>\n<li>Use panic! rather than abort to ensure the\
  \ fuzz harness can process the failure</li>\n<li>Update fuzz_write to use replace_with</li>\n\
  <li>Remove a drop that can no longer be explicit</li>\n<li>Add <code>#![allow(unexpected_cfgs)]</code>\
  \ in nightly</li>\n</ul>\n</blockquote>\n</details>\n<details>\n<summary>Changelog</summary>\n\
  <p><em>Sourced from <a href=\"https://github.com/zip-rs/zip2/blob/master/CHANGELOG.md\"\
  >zip's changelog</a>.</em></p>\n<blockquote>\n<h2><a href=\"https://github.com/zip-rs/zip2/compare/v1.2.0...v1.2.1\"\
  >1.2.1</a> - 2024-05-06</h2>\n<h3><!-- raw HTML omitted -->\U0001F41B Bug Fixes</h3>\n\
  <ul>\n<li>Prevent panic when trying to read a file with an unsupported compression\
  \ method</li>\n<li>Prevent panic after reading an invalid LZMA file</li>\n<li>Make\
  \ <code>Stored</code> the default compression method if <code>Deflated</code> isn't\
  \ available, so that zip files are readable by as much software as possible</li>\n\
  <li>version_needed was wrong when e.g. cfg(bzip2) but current file wasn't bzip2\
  \ (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/100\">#100</a>)</li>\n\
  <li>file paths shouldn't start with slashes (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/102\"\
  >#102</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\U0001F69C Refactor</h3>\n\
  <ul>\n<li>Overhaul <code>impl Arbitrary for FileOptions</code></li>\n<li>Remove\
  \ unused <code>atomic</code> module</li>\n</ul>\n<h2><a href=\"https://github.com/zip-rs/zip2/compare/v1.1.4...v1.2.0\"\
  >1.2.0</a> - 2024-05-06</h2>\n<h3><!-- raw HTML omitted -->\U0001F680 Features</h3>\n\
  <ul>\n<li>Add method <code>decompressed_size()</code> so non-recursive ZIP bombs\
  \ can be detected</li>\n</ul>\n<h3><!-- raw HTML omitted -->\U0001F69C Refactor</h3>\n\
  <ul>\n<li>Make <code>ZipWriter::finish()</code> consume the <code>ZipWriter</code></li>\n\
  </ul>\n<h3><!-- raw HTML omitted -->\u2699\uFE0F Miscellaneous Tasks</h3>\n<ul>\n\
  <li>Use panic! rather than abort to ensure the fuzz harness can process the failure</li>\n\
  <li>Update fuzz_write to use replace_with</li>\n<li>Remove a drop that can no longer\
  \ be explicit</li>\n<li>Add <code>#![allow(unexpected_cfgs)]</code> in nightly</li>\n\
  </ul>\n</blockquote>\n</details>\n<details>\n<summary>Commits</summary>\n<ul>\n\
  <li><a href=\"https://github.com/zip-rs/zip2/commit/b725303cce4fda36737da2c93d2228581bfd7632\"\
  ><code>b725303</code></a> Merge pull request <a href=\"https://redirect.github.com/zip-rs/zip2/issues/103\"\
  >#103</a> from zip-rs/release-plz-2024-05-06T17-54-03Z</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/a1f239980ebf4e78e36f2e45a1e00705c77adb73\"\
  ><code>a1f2399</code></a> chore: release</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/f7ab2ae506f7c6be05a8f9362731397ddd2f2d1d\"\
  ><code>f7ab2ae</code></a> fix: Prevent panic when trying to read a file with an\
  \ unsupported compression...</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/7f46b77da208648e311a0739a253365b4930c6b1\"\
  ><code>7f46b77</code></a> ci: Upload leak reports if fuzz fails</li>\n<li><a href=\"\
  https://github.com/zip-rs/zip2/commit/d13031cc14738d2c4c0d75e43b039a0e06dcdf15\"\
  ><code>d13031c</code></a> fix: Prevent panic after reading an invalid LZMA file</li>\n\
  <li><a href=\"https://github.com/zip-rs/zip2/commit/8868a11d23976ea5d8d6e1a34e854164b2723d7a\"\
  ><code>8868a11</code></a> test(fuzz): Fix a fuzz-read bug when finishing LZMA</li>\n\
  <li><a href=\"https://github.com/zip-rs/zip2/commit/b277298d7fdddb68e7e2a9f287b49a40e7db35e1\"\
  ><code>b277298</code></a> test(fuzz): Fix: need to accept FileNotFound from abort</li>\n\
  <li><a href=\"https://github.com/zip-rs/zip2/commit/162c9b7281736fb96a17e8cad3b3bf0758384ca7\"\
  ><code>162c9b7</code></a> test(fuzz): Fix bugs that were breaking the fuzz test</li>\n\
  <li><a href=\"https://github.com/zip-rs/zip2/commit/447f9c6e4f84801a859c78d3408b5b3e0738b0a5\"\
  ><code>447f9c6</code></a> refactor: Overhaul <code>impl Arbitrary for FileOptions</code></li>\n\
  <li><a href=\"https://github.com/zip-rs/zip2/commit/845c3ec91f1beff559af8b5da19b5fc3fa332abc\"\
  ><code>845c3ec</code></a> refactor: Remove unused <code>atomic</code> module</li>\n\
  <li>Additional commits viewable in <a href=\"https://github.com/zip-rs/zip2/compare/v1.1.4...v1.2.1\"\
  >compare view</a></li>\n</ul>\n</details>\n<br />\n\n\n[![Dependabot compatibility\
  \ score](https://dependabot-badges.githubapp.com/badges/compatibility_score?dependency-name=zip&package-manager=cargo&previous-version=1.1.4&new-version=1.2.1)](https://docs.github.com/en/github/managing-security-vulnerabilities/about-dependabot-security-updates#about-compatibility-scores)\n\
