description: Returning a multidimensional array from a function caused an error when
  the declared return type syntax differed from the value's type syntax (e.g., nested
  array syntax `[[u8; 2]; 3]` vs tuple array syntax `[u8; (3, 2)]`). The fix adds
  a `match_array_types` method to the `Type` enum that normalizes and compares array
  dimensions regardless of syntax, and uses it in the return statement type checker
  and value matching logic.
expected_findings:
- file: compiler/src/statement/return_/return_.rs
  line: 30
  summary: Return type check uses strict equality instead of semantic array type matching.
    Should use `match_array_types()` to allow equivalent array type syntaxes (nested
    vs tuple) to be accepted.
- file: compiler/src/value/value.rs
  line: 108
  summary: Array value matching does not account for equivalent array type representations.
    Needs to use `match_array_types()` to handle nested vs tuple array syntax equivalence.
