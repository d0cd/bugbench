description: Large feature/refactor PR that adds cost estimation for on-chain deployments
  and executions, removes the snarkOS dependency, and refactors `leo execute` to work
  with a generic network. The changes resolve issues where transactions were broadcast
  successfully but later rejected on-chain due to insufficient balance, and fix the
  forced adherence to a specific snarkVM network type.
expected_findings:
- file: leo/cli/commands/execute.rs
  line: 88
  summary: Execute command was hardcoded to a specific network type rather than being
    generic, causing all executions to be forced to the underlying snarkVM dependency's
    network.
- file: leo/cli/commands/deploy.rs
  line: 51
  summary: Deploy command lacked balance validation before broadcasting, allowing
    transactions that would later be rejected on-chain due to insufficient funds.
- file: leo/cli/commands/mod.rs
  line: 133
  summary: Shared command infrastructure imported and used snarkOS-specific types
    (Transaction, Address, etc.) tightly coupling CLI to snarkOS rather than working
    through snarkVM generics.
