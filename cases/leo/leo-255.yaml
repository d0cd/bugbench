fix_pr_title: Allow `address` in optionals and storage
fix_pr_body: "This PR allows `address` in optionals and storage. This was previously\
  \ disallowed because `address` has no clear default, which is needed when representing\
  \ `none`. Instead, we now just use the commonly used zero address: `aleo1qqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq3ljyzc`\r\
  \n\r\nCloses https://github.com/ProvableHQ/leo/issues/28991\r\n\r\nAlso closes https://github.com/ProvableHQ/leo/issues/28985"
