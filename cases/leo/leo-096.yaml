description: The Leo compiler's type checking used strict equality (`eq_flat`) for
  type comparisons, which failed when futures appeared inside tuples. The fix introduces
  `eq_flat_relaxed`, a relaxed type equality method that properly handles non-explicit
  futures and structs with differing program origins, and applies it across the type
  checker, flattening pass, and symbol table.
expected_findings:
- file: compiler/passes/src/type_checking/checker.rs
  line: 174
  summary: Type equality check uses strict comparison that fails for futures in tuples;
    should use eq_flat_relaxed to handle non-explicit futures and cross-program struct
    matching.
- file: compiler/passes/src/flattening/flatten_expression.rs
  line: 84
  summary: Assertion uses strict type equality (eq_flat) which will panic when future
    types appear in tuples; needs eq_flat_relaxed for relaxed future/struct comparison.
- file: compiler/passes/src/common/symbol_table/mod.rs
  line: 119
  summary: Struct member type comparison uses strict equality that rejects valid future
    types in tuple members; should use eq_flat_relaxed.
