introducing_pr_title: Write to array and struct members.
introducing_pr_body: "This is supported with a new pass, `WriteTransforming`, which\
  \ converts assignments to struct or array members into assignments to variables,\
  \ and any time the\r\nstruct or array is accessed, reconstructs it\r\nfrom the variables.\r\
  \n\r\nTests for this functionality are in `array_write.leo`.\r\n\r\nAlso fixed the\
  \ test `assign_fail.leo`, which seems to have been in a useless state for a long\
  \ time.\r\n\r\nFixes #28389, #28430\r\nCloses #28388"
