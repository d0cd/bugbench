description: The error message displayed when no private key argument is provided
  during `account import` (with --discreet=false) incorrectly suggested using a PRIVATE_KEY
  environment variable, but this command does not support reading from env or .env.
  The fix clarifies the message to instruct users to either pass the private key as
  an argument or use the --discreet flag.
