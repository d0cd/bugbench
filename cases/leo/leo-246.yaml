issue_bodies:
  '2343': "# *::commit() functions and others have different types between the documentation,\
    \ the Leo compiler and the Aleo compiler\r\n\r\nWe (@fuzzinglabs) found some disparities\
    \ between the Leo documentation, the Leo compiler and the Aleo compiler\r\n\r\n\
    ## Your Environment\r\n\r\n- <!-- Aleo Version --> Aleo version: v0.3.6\r\n- <!--\
    \ Leo Version --> Leo commit: 298c2036af9d19e282ebd6e0048b5fe0a259b62a\r\n- <!--\
    \ Rust Version --> rustc 1.66.0-nightly (a37499ae6 2022-09-18)\r\n- <!-- Computer\
    \ OS --> Ubuntu 20.04\r\n\r\n## Expected Behavior\r\n\r\nThe accepted types should\
    \ match the ones on the documentation, and should also be the same that Aleo accepts\r\
    \n\r\n## Test Files\r\n\r\n### main.aleo\r\n\r\n```aleo\r\nprogram foo.aleo;\r\
    \n\r\nfunction hello:\r\n        input r0 as u32.public;\r\n        commit.bhp512\
    \ r0 -76915328654976613059477945701456746133scalar into r1;\r\n        output\
    \ r1 as field.private;\r\n```\r\n\r\n### main.leo\r\n\r\n```rust\r\nprogram foo.aleo\
    \ {\r\n        function hello(r0: u32,) -> field {\r\n                let r1:\
    \ field = BHP512::commit(r0, -76915328654976613059477945701456746133scalar);\r\
    \n                return r1;\r\n        }\r\n}\r\n```\r\n\r\n## Result compilation\r\
    \n\r\n### Aleo\r\n```sh\r\naleo build\r\n\r\n\u2705 Built 'foo.aleo' (in \"/home/user/reprod_leo_crashes/foo\"\
    )\r\n```\r\n\r\nThis build, as per documentation let it appear (https://developer.aleo.org/aleo/opcodes/#commitbhp512)\r\
    \n\r\n\r\n### Leo\r\n```sh\r\n~/leo/target/debug/leo build\r\nError [ETYC0372007]:\
    \ Expected one type from `field, group, i8, i16, i32, i64, i128`, but got `scalar`\r\
    \n    --> /home/user/reprod_leo_crashes/src/main.leo:3:53\r\n     |\r\n   3 |\
    \                 let r1: field = BHP512::commit(r0, -76915328654976613059477945701456746133scalar);\r\
    \n     |     \r\n```\r\n\r\nIt does not build, in opposition with the documentation\
    \ (https://developer.aleo.org/leo/operators#bhp512commit)"
