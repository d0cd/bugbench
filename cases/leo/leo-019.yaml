description: "The `leo account sign` command exposed a `--seed` flag that allowed\
  \ users to seed the nonce used in signatures. This is a security vulnerability because\
  \ signature nonces must be random and must never be reused or shared \u2014 doing\
  \ so can leak the private key. The fix removes the `--seed` parameter from the Sign\
  \ command variant, its parsing logic, and its usage in the signing call."
expected_findings:
- file: leo/cli/commands/account.rs
  line: 88
  summary: 'Security issue: the Sign command variant includes a `seed` field that
    allows user-controlled nonce seeding for signatures, which can lead to private
    key leakage if nonces are reused'
- file: leo/cli/commands/account.rs
  line: 147
  summary: 'Security issue: the Sign match arm destructures and propagates the user-supplied
    `seed` value, enabling insecure deterministic nonce generation'
- file: leo/cli/commands/account.rs
  line: 262
  summary: "Security issue: the `seed` parameter is passed to the signing function,\
    \ allowing callers to control the nonce \u2014 signature nonces must be cryptographically\
    \ random"
