fix_pr_title: Bump serde from 1.0.204 to 1.0.207
fix_pr_body: "Bumps [serde](https://github.com/serde-rs/serde) from 1.0.204 to 1.0.207.\n\
  <details>\n<summary>Release notes</summary>\n<p><em>Sourced from <a href=\"https://github.com/serde-rs/serde/releases\"\
  >serde's releases</a>.</em></p>\n<blockquote>\n<h2>v1.0.207</h2>\n<ul>\n<li>Improve\
  \ interactions between <code>flatten</code> attribute and <code>skip_serializing</code>/<code>skip_deserializing</code>\
  \ (<a href=\"https://redirect.github.com/serde-rs/serde/issues/2795\">#2795</a>,\
  \ thanks <a href=\"https://github.com/Mingun\"><code>@\u200BMingun</code></a>)</li>\n\
  </ul>\n<h2>v1.0.206</h2>\n<ul>\n<li>Improve support for <code>flatten</code> attribute\
  \ inside of enums (<a href=\"https://redirect.github.com/serde-rs/serde/issues/2567\"\
  >#2567</a>, thanks <a href=\"https://github.com/Mingun\"><code>@\u200BMingun</code></a>)</li>\n\
  </ul>\n<h2>v1.0.205</h2>\n<ul>\n<li>Use serialize_entry instead of serialize_key\
  \ + serialize_value when serialize flattened newtype enum variants (<a href=\"https://redirect.github.com/serde-rs/serde/issues/2785\"\
  >#2785</a>, thanks <a href=\"https://github.com/Mingun\"><code>@\u200BMingun</code></a>)</li>\n\
  <li>Avoid triggering a collection_is_never_read lint in the deserialization of enums\
  \ containing flattened fields (<a href=\"https://redirect.github.com/serde-rs/serde/issues/2791\"\
  >#2791</a>)</li>\n</ul>\n</blockquote>\n</details>\n<details>\n<summary>Commits</summary>\n\
  <ul>\n<li><a href=\"https://github.com/serde-rs/serde/commit/1b4da41f970555e111f471633205bbcb4dadbc63\"\
  ><code>1b4da41</code></a> Release 1.0.207</li>\n<li><a href=\"https://github.com/serde-rs/serde/commit/f61d452814d6c7bf32d139e747d18c21592d702a\"\
  ><code>f61d452</code></a> Touch up PR 2795</li>\n<li><a href=\"https://github.com/serde-rs/serde/commit/f9866097a084e2e549e40c4d47f7ee171e0a6aaf\"\
  ><code>f986609</code></a> Merge pull request <a href=\"https://redirect.github.com/serde-rs/serde/issues/2795\"\
  >#2795</a> from Mingun/has-flatten-rework</li>\n<li><a href=\"https://github.com/serde-rs/serde/commit/77a6a9d4e193c82439aa0c35dfdbbb34fafdf38e\"\
  ><code>77a6a9d</code></a> Take into account only not skipped flatten fields when\
  \ choose serialization form</li>\n<li><a href=\"https://github.com/serde-rs/serde/commit/547d843ccaa1349b074991f5ceeda722cf245824\"\
  ><code>547d843</code></a> Remove dead code - serialize_struct_as_map always called\
  \ when cattrs.has_flat...</li>\n<li><a href=\"https://github.com/serde-rs/serde/commit/005cb84593e73cb3ba263232cc5f09b77859ec5b\"\
  ><code>005cb84</code></a> Fail with an understandable message is number of fields\
  \ for serialization is ...</li>\n<li><a href=\"https://github.com/serde-rs/serde/commit/fd5b5e9aa561e29d9312ecef2019ec670b4bc334\"\
  ><code>fd5b5e9</code></a> Correctly calculate <code>has_flatten</code> attribute\
  \ in all cases for deserialization</li>\n<li><a href=\"https://github.com/serde-rs/serde/commit/0647a7c1feafebacea6de4cb69f0aee9b2ba2919\"\
  ><code>0647a7c</code></a> Fix creating and filling a collections that was not read</li>\n\
  <li><a href=\"https://github.com/serde-rs/serde/commit/85c73ef8dea8966d88a03876e6f0dc9359e68cc9\"\
  ><code>85c73ef</code></a> Release 1.0.206</li>\n<li><a href=\"https://github.com/serde-rs/serde/commit/5ba1796a7e639839d4e18c3ae23b9bb32b0700b5\"\
  ><code>5ba1796</code></a> Resolve doc_markdown pedantic lint on regression test\
  \ function</li>\n<li>Additional commits viewable in <a href=\"https://github.com/serde-rs/serde/compare/v1.0.204...v1.0.207\"\
  >compare view</a></li>\n</ul>\n</details>\n<br />\n\n\n[![Dependabot compatibility\
  \ score](https://dependabot-badges.githubapp.com/badges/compatibility_score?dependency-name=serde&package-manager=cargo&previous-version=1.0.204&new-version=1.0.207)](https://docs.github.com/en/github/managing-security-vulnerabilities/about-dependabot-security-updates#about-compatibility-scores)\n\
