fix_pr_title: Bump regex from 1.10.5 to 1.10.6
fix_pr_body: 'Bumps [regex](https://github.com/rust-lang/regex) from 1.10.5 to 1.10.6.

  <details>

  <summary>Changelog</summary>

  <p><em>Sourced from <a href="https://github.com/rust-lang/regex/blob/master/CHANGELOG.md">regex''s
  changelog</a>.</em></p>

  <blockquote>

  <h1>1.10.6 (2024-08-02)</h1>

  <p>This is a new patch release with a fix for the <code>unstable</code> crate feature
  that

  enables <code>std::str::Pattern</code> trait integration.</p>

  <p>Bug fixes:</p>

  <ul>

  <li>[BUG <a href="https://redirect.github.com/rust-lang/regex/issues/1219">#1219</a>](<a
  href="https://redirect.github.com/rust-lang/regex/pull/1219">rust-lang/regex#1219</a>):

  Fix the <code>Pattern</code> trait implementation as a result of nightly API breakage.</li>

  </ul>

  </blockquote>

  </details>

  <details>

  <summary>Commits</summary>

  <ul>

  <li><a href="https://github.com/rust-lang/regex/commit/ab88aa5c6824ebe7c4b4c72fe5191681783b3a68"><code>ab88aa5</code></a>
  1.10.6</li>

  <li><a href="https://github.com/rust-lang/regex/commit/76f2d30d85eb70336b76d20bb6eb462de6391321"><code>76f2d30</code></a>
