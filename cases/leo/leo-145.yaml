fix_pr_body: "Bumps [crossterm](https://github.com/crossterm-rs/crossterm) from 0.27.0\
  \ to 0.28.1.\n<details>\n<summary>Release notes</summary>\n<p><em>Sourced from <a\
  \ href=\"https://github.com/crossterm-rs/crossterm/releases\">crossterm's releases</a>.</em></p>\n\
  <blockquote>\n<h2>0.28</h2>\n<h1>Version 0.28</h1>\n<h2>Added \u2B50</h2>\n<ul>\n\
  <li>Capture double click mouse events on windows (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/826\"\
  >#826</a>)</li>\n<li>(De)serialize Reset color (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/824\"\
  >#824</a>)</li>\n<li>Add functions to allow constructing <code>Attributes</code>\
  \ in a const context (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/817\"\
  >#817</a>)</li>\n<li>Implement <code>Display</code> for <code>KeyCode</code> and\
  \ <code>KeyModifiers</code> (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/862\"\
  >#862</a>)</li>\n</ul>\n<h2>Changed \u2699\uFE0F</h2>\n<ul>\n<li>Use Rustix by default\
  \ instead of libc. Libc can be re-enabled if necessary with the <code>libc</code>\
  \ feature flag (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/892\"\
  >#892</a>)</li>\n<li><code>FileDesc</code> now requires a lifetime annotation.</li>\n\
  <li>Improve available color detection (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/885\"\
  >#885</a>)</li>\n<li>Speed up <code>SetColors</code> by ~15-25% (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/879\"\
  >#879</a>)</li>\n<li>Remove unsafe and unnecessary size argument from <code>FileDesc::read()</code>\
  \ (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/821\">#821</a>)</li>\n\
  </ul>\n<h2>Breaking \u26A0\uFE0F</h2>\n<ul>\n<li>Fix duplicate bit masks for caps\
  \ lock and num lock (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/863\"\
  >#863</a>).\nThis breaks serialization of <code>KeyEventState</code></li>\n</ul>\n\
  <p><a href=\"https://github.com/rustco\"><code>@\u200Brustco</code></a> <a href=\"\
  https://github.com/timstr\"><code>@\u200Btimstr</code></a> <a href=\"https://github.com/illiteratewriter\"\
  ><code>@\u200Billiteratewriter</code></a> <a href=\"https://github.com/heaths\"\
  ><code>@\u200Bheaths</code></a> <a href=\"https://github.com/joshka\"><code>@\u200B\
  joshka</code></a> <a href=\"https://github.com/aschey\"><code>@\u200Baschey</code></a>\
  \ <a href=\"https://github.com/joshka\"><code>@\u200Bjoshka</code></a> <a href=\"\
  https://github.com/martinvonz\"><code>@\u200Bmartinvonz</code></a> <a href=\"https://github.com/linrongbin16\"\
  ><code>@\u200Blinrongbin16</code></a> <a href=\"https://github.com/rtczza\"><code>@\u200B\
  rtczza</code></a> <a href=\"https://github.com/sjakk\"><code>@\u200Bsjakk</code></a>\
  \ <a href=\"https://github.com/kierdavis\"><code>@\u200Bkierdavis</code></a> <a\
  \ href=\"https://github.com/Destroy666x\"><code>@\u200BDestroy666x</code></a> <a\
  \ href=\"https://github.com/stphnt\"><code>@\u200Bstphnt</code></a> <a href=\"https://github.com/5donuts\"\
  ><code>@\u200B5donuts</code></a> <a href=\"https://github.com/kdheepak\"><code>@\u200B\
  kdheepak</code></a> <a href=\"https://github.com/valerii15298\"><code>@\u200Bvalerii15298</code></a>\
  \ <a href=\"https://github.com/javaLux\"><code>@\u200BjavaLux</code></a> <a href=\"\
  https://github.com/alt-art\"><code>@\u200Balt-art</code></a> <a href=\"https://github.com/jumbledFox\"\
  ><code>@\u200BjumbledFox</code></a></p>\n</blockquote>\n</details>\n<details>\n\
  <summary>Changelog</summary>\n<p><em>Sourced from <a href=\"https://github.com/crossterm-rs/crossterm/blob/master/CHANGELOG.md\"\
  >crossterm's changelog</a>.</em></p>\n<blockquote>\n<h1>Version 0.28.1</h1>\n<h2>Fixed\
  \ \U0001F41B</h2>\n<ul>\n<li>Fix broken build on linux when using <code>use-dev-tty</code>\
  \ with (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/906\"\
  >#906</a>)</li>\n</ul>\n<h2>Breaking \u26A0\uFE0F</h2>\n<ul>\n<li>Fix desync with\
  \ mio and signalhook between repo and published crate. (upgrade to mio 1.0)</li>\n\
  </ul>\n<h1>Version 0.28</h1>\n<h2>Added \u2B50</h2>\n<ul>\n<li>Capture double click\
  \ mouse events on windows (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/826\"\
  >#826</a>)</li>\n<li>(De)serialize Reset color (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/824\"\
  >#824</a>)</li>\n<li>Add functions to allow constructing <code>Attributes</code>\
  \ in a const context (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/817\"\
  >#817</a>)</li>\n<li>Implement <code>Display</code> for <code>KeyCode</code> and\
  \ <code>KeyModifiers</code> (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/862\"\
  >#862</a>)</li>\n</ul>\n<h2>Changed \u2699\uFE0F</h2>\n<ul>\n<li>Use Rustix by default\
  \ instead of libc. Libc can be re-enabled if necessary with the <code>libc</code>\
  \ feature flag (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/892\"\
  >#892</a>)</li>\n<li><code>FileDesc</code> now requires a lifetime annotation.</li>\n\
  <li>Improve available color detection (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/885\"\
  >#885</a>)</li>\n<li>Speed up <code>SetColors</code> by ~15-25% (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/879\"\
  >#879</a>)</li>\n<li>Remove unsafe and unnecessary size argument from <code>FileDesc::read()</code>\
  \ (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/821\">#821</a>)</li>\n\
  </ul>\n<h2>Breaking \u26A0\uFE0F</h2>\n<ul>\n<li>Fix duplicate bit masks for caps\
  \ lock and num lock (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/863\"\
  >#863</a>).\nThis breaks serialization of <code>KeyEventState</code></li>\n</ul>\n\
  <h1>Version 0.27.1</h1>\n<h2>Added \u2B50</h2>\n<ul>\n<li>Add support for (de)serializing\
  \ <code>Reset</code> <code>Color</code></li>\n</ul>\n<h1>Version 0.27</h1>\n<h2>Added\
  \ \u2B50</h2>\n<ul>\n<li>Add <code>NO_COLOR</code> support (<a href=\"https://no-color.org/\"\
  >https://no-color.org/</a>)</li>\n<li>Add option to force overwrite <code>NO_COLOR</code>\
  \ (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/802\">#802</a>)</li>\n\
  <li>Add support for scroll left/right events on windows and unix systems (<a href=\"\
  https://redirect.github.com/crossterm-rs/crossterm/issues/788\">#788</a>).</li>\n\
  <li>Add <code>window_size</code> function to fetch pixel width/height of screen\
  \ for more sophisticated rendering in terminals.</li>\n<li>Add support for deserializing\
  \ hex color strings to <code>Color</code> e.g #fffff.</li>\n</ul>\n<h2>Changed \u2699\
  \uFE0F</h2>\n<ul>\n<li>Make the events module an optional feature <code>events</code>\
  \ (to make crossterm more lightweight) (<a href=\"https://redirect.github.com/crossterm-rs/crossterm/issues/776\"\
  >#776</a>)</li>\n</ul>\n<!-- raw HTML omitted -->\n</blockquote>\n<p>... (truncated)</p>\n\
