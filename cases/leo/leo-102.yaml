description: CI was broken because compiler tests in compile.rs and execute.rs used
  `disassemble_from_str` from `leo-disassembler`, but that crate was not declared
  as a dev-dependency in compiler/compiler/Cargo.toml. The fix adds the missing dependency
  and clears the sccache to ensure a clean rebuild.
