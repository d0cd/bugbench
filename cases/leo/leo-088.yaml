description: ArrayAccess in the interpreter popped the array and index values from
  the stack in the wrong order. Since the index is pushed onto the stack after the
  array, it sits on top and must be popped first. The fix swaps the pop order so the
  index is retrieved before the array, producing correct array element lookups.
expected_findings:
- file: interpreter/src/cursor.rs
  line: 654
  summary: 'Stack pop order bug: `let array = self.pop_value()?` pops the index (top
    of stack) instead of the array. The index should be popped first since it was
    pushed last (LIFO), then the array. Swapped operands cause incorrect array access.'
