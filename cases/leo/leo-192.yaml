description: The Leo CLI updater check would propagate errors fatally when it failed
  to fetch the latest release version, causing all Leo commands to exit early. The
  fix introduces proper error handling (likely an UpdaterError type and graceful error
  recovery) so that updater failures are caught and do not prevent CLI commands from
  executing.
expected_findings:
- file: leo/updater.rs
  line: 13
  summary: 'Updater error propagation halts CLI execution: errors from fetching the
    latest release version should be caught and handled gracefully rather than propagated
    with `?` or returned as fatal errors'
- file: leo/updater.rs
  line: 27
  summary: 'Missing error handling: updater check failure should warn/log instead
    of returning an error that terminates the CLI command'
