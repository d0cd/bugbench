introducing_pr_body: 'Bumps [zip](https://github.com/Pr0methean/zip) from 0.6.6 to
  1.1.1.

  <details>

  <summary>Changelog</summary>

  <p><em>Sourced from <a href="https://github.com/Pr0methean/zip/blob/master/CHANGELOG.md">zip''s
  changelog</a>.</em></p>

  <blockquote>

  <h2>[1.1.1]</h2>

  <h3>Added</h3>

  <ul>

  <li><code>index_for_name</code>, <code>index_for_path</code>, <code>name_for_index</code>:
  get the index of a file given its path or vice-versa, without

  initializing metadata from the local-file header or needing to mutably borrow the
  <code>ZipArchive</code>.</li>

  <li><code>add_symlink_from_path</code>, <code>shallow_copy_file_from_path</code>,
  <code>deep_copy_file_from_path</code>, <code>raw_copy_file_to_path</code>: copy
  a

  file or create a symlink using <code>AsRef&lt;Path&gt;</code> arguments</li>

  </ul>

  <h3>Changed</h3>

  <ul>

  <li><code>add_directory_from_path</code> and <code>start_file_from_path</code> are
  no longer deprecated, and they now normalize <code>..</code> as well as

  <code>.</code>.</li>

  </ul>

  <h2>[1.1.0]</h2>

  <h3>Added</h3>

  <ul>

  <li>Support for decoding LZMA.</li>

  </ul>

  <h3>Changed</h3>

  <ul>

  <li>Eliminated a custom <code>AtomicU64</code> type by replacing it with <code>OnceLock</code>
  in the only place it''s used.</li>

  <li><code>FileOptions</code> now has the subtype <code>SimpleFileOptions</code>
  which implements <code>Copy</code> but has no extra data.</li>

  </ul>

  <h2>[1.0.1]</h2>

  <h3>Changed</h3>

  <ul>

  <li>The published package on crates.io no longer includes the tests or examples.</li>

  </ul>

  <h2>[1.0.0]</h2>

  <h3>Changed</h3>

  <ul>

  <li>Now uses boxed slices rather than <code>String</code> or <code>Vec</code> for
  metadata fields that aren''t likely to grow.</li>

  </ul>

  <h2>[0.11.0]</h2>

  <h3>Added</h3>

  <ul>

  <li>Support for <code>DEFLATE64</code> (decompression only).</li>

  <li>Support for Zopfli compression levels up to <code>i64::MAX</code>.</li>

  </ul>

  <h3>Changed</h3>

  <ul>

  <li><code>InvalidPassword</code> is now a kind of <code>ZipError</code> to eliminate
  the need for nested <code>Result</code> structs.</li>

  <li>Updated dependencies.</li>

  </ul>

  <h2>[0.10.3]</h2>

  <!-- raw HTML omitted -->

  </blockquote>

  <p>... (truncated)</p>

  </details>

