  \ href=\"https://github.com/palfrey/serial_test/releases\">serial_test's releases</a>.</em></p>\n\
  <blockquote>\n<h2>v3.1.0</h2>\n<h2>What's Changed</h2>\n<ul>\n<li>Replace <code>lazy_static</code>\
  \ with <code>once_cell</code> by <a href=\"https://github.com/Expyron\"><code>@\u200B\
  Expyron</code></a> in <a href=\"https://redirect.github.com/palfrey/serial_test/pull/106\"\
  >palfrey/serial_test#106</a></li>\n<li>Replace <code>dashmap</code> with <code>scc</code>\
  \ by <a href=\"https://github.com/palfrey\"><code>@\u200Bpalfrey</code></a> in <a\
