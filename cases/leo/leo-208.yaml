fix_pr_title: '[Feat] `leo query` CLI tool'
fix_pr_body: "## TLDR\r\n`leo query` is a CLI tool that enables users to access all\
  \ available on-chain state, and easily retrieve relevant context to the programs\
  \ they are developing.\r\n\r\n## Features:\r\n- Full coverage of all available endpoints\
  \ in [snarkOS](https://github.com/AleoHQ/snarkOS/blob/96e86a9e3bec6fcc51d99df6dc0bc0b41c3c6b49/node/rest/src/lib.rs#L143-L184)\
  \ besides `/peers`, `/statePath` and `/memoryPool`:\r\n    - Those uncovered paths\
  \ can be added in the future depending on whether developers find them useful. The\
  \ primary reason for not including them is they are only accessible when running\
  \ a node.\r\n- Ability to specify custom endpoint with `--endpoint` and custom network\
  \ with`--network`\r\n- More intuitive grouping and syntax when interacting with\
  \ `leo query` than memorizing `snarkOS` endpoints\r\n    - Additionally, query inputs\
  \ are type checked, and specific errors are thrown to tell users how to correct\
  \ their inputs. (Ex: all transaction ids are 61 character sequences of either lower\
  \ case letters or numbers, and must be prefaced with `at1`).\r\n"
