introducing_pr_title: '[Draft] Network retriever module'
introducing_pr_body: "# Motivation\r\n- We want a richer dependency resolution system\
  \ in Leo. Leo users should be able to import programs from chain/local file system\
  \ as opposed to requiring `.leo` source files.\r\n\r\n# Components:\r\n  1. Specify\
  \ import configurations in `program.json`\r\n  2. `leo build` leverages `retriever`\
  \ module to pull programs from network/FS\r\n  3. Generate `leo.lock` file to house\
  \ the dependency configuration \r\n  4. `disassembler.rs` to convert Aleo instructions\
  \ into valid stub\r\n  5. Type checking modification to maintain soundness\r\n \
  \ 6. Codegen modification to print nested imports properly\r\n\r\n# Retriever Design\r\
  \n\r\n## Modifications to `~/.aleo` file structure\r\n\r\n- `.aleo/registry`:\r\n\
  \    - `.aleo/registry/git` : Where `.aleo` files from `github.com` are stored\r\
  \n    - `.aleo/registry/testnet3`: Where `.aleo` files from the network are stored\r\
  \n    - Note that new folders can be added for different networks like `./mainnet`\r\
  \n\r\n- Suppose building leo project `dex` and call `leo build` with `dex/program.json`\
  \ set to:\r\n\r\n```json\r\n{\r\n  \"program\": \"dex.aleo\",\r\n  \"version\":\
  \ \"0.0.0\",\r\n  \"description\": \"\",\r\n  \"license\": \"MIT\",\r\n  \"dependencies\"\
  : [\r\n    {\r\n\t  \"name\": \"credits.aleo\",\r\n\t  \"location\": \"network\"\
  ,\r\n\t\t\"network\": \"testnet3\"\r\n    },\r\n\t\t{\r\n\t\t\"name\": \"foo.aleo\"\
  ,\r\n\t  \"location\": \"git\",\r\n\t\t\"url\": \"https://github.com/alice/foo.git\"\
  \r\n\t\t\"branch\": \"bar\"\r\n\t\t\"rev\": \"3ab873bd89de\"\r\n\t\t},\r\n    {\r\
  \n\t  \"name\": \"board.aleo\",\r\n\t  \"location\": \"local\",\r\n\t  \"path\"\
  : \"/User/bob/home/work/board\", \r\n    },\r\n  ]\r\n}\r\n```\r\n\r\n## Specification\
  \ and example flow\r\n\r\n1. Retrieve imports based on configurations specified\
  \ in `dex/program.json`:\r\n    - Must keep track of nested programs trying to build,\
  \ and throw error for circular dependencies\r\n    - Location variations:\r\n\t\
  - `\"location\": \"network\"`:\r\n\t\t- Check if `credits.aleo` cached already in\
  \ `~/.aleo/registry/testnet3/credits.aleo`\r\n\t- Retrieve from network:\r\n\t\t\
  - Store copy in `~/.aleo/registry/testnet3/credits.aleo``\r\n\t\t- Update `leo.lock`\
  \ \r\n        - `\"location\": \"local\"`: TODO\r\n            - Build the directory\
  \ specified (ex `\"path\": \"~/work/board\"`) if no aleo program in `~/work/board/build/main.aleo`\r\
  \n            - Other wise use `~/work/board/build/main.aleo`\r\n            - Cache\
  \ in `.aleo` and update `leo.lock` \r\n        - `\"location\": \"git\"`: TODO\r\
  \n            - Example: `\"url\": \"<https://github.com/alice/foo.git>\"`\r\n \
  \           - Check if `board.aleo` cached already as `~/.aleo/registry/git/pranav/foo/board.aleo`\r\
  \n            - Otherwise retrieve from network and cache\r\n            - Allow\
  \ them to specify based on commit + branch\r\n2. Move a copy of the retrieved import(s)\
  \ into `dex/build/imports/`\r\n3. Convert all imported programs to AST before start\
  \ parsing `main.leo`\r\n\r\n# Suggested user behavior\r\n- Ideal: (in future)\r\n\
  \t- User writes `leo add credits.aleo` kicks off network retrieval + caching process\r\
  \n\t- Default to network for simplicity, but ability to use `git` or `local` too\
  \ \r\n- For now:\r\n\t- User manually edits `program.json`\r\n- Its ok if user manually\
  \ edits `{project}/build/imports/` as that is regenerated every time `build` is\
  \ invoked.\r\n- Assume that user will not modify  `~/.aleo/` & `leo.lock`\r\n\r\n\
  # Future features\r\n- Add support for local and git dependencies\r\n- Relax shadowing:\r\
  \n    - Should be able to import two functions of same name from different programs\
  \ \r\n- `Leo add {program}` CLI"
