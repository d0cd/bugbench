fix_pr_title: A few fixes to options in type checking and option lowering
fix_pr_body: "Closes #28961\r\nCloses #28973\r\nCloses #28972\r\n\r\nI started fixing\
  \ the first issue in #28961 and kept discovering other issues as I was adding tests...\
  \ So I ended up fixing a chain of issues in various places. Namely the following:\r\
  \n1. Destructuring had a bug where the following cases were note handled:\r\n  \
  \ - `assert_eq(t1, t2)` and `assert_neq(t1, t2)` where `t1` and `t2` are tuples:\
  \ here, we need to expand the assert into a sequence of asserts.\r\n   - `t1 ==\
  \ t2` and `t1 != t2` where `t1` and `t2` are tuples. Here, we need to fold the equality/inequality\
  \ into an AND/OR of individual equalities/inequalities.\r\n   - Ternary condition\
  \ was not being reconstructed.\r\n2. In `OptionLowering`, some newly created expressions\
  \ need types in the `type_table` because they are needed in the same pass.\r\n3.\
  \ In `OptionLowering`, when reconstructing tuple expressions, we were expecting\
  \ `additional` to be `Some` which isn't always the case.\r\n4. In `TypeChecking`,\
  \ we were wrapping the types of binary and unary ops in optionals in some cases.\
  \ This is never required. We were also wrapping unsuffixed literals with optionals\
  \ in some cases. The assumption in `OptionLowering` is that when we write `let x:\
  \ u32? = c + 1`, the type of `c + 1` in the type table is actually just `u32`. The\
  \ type annotation is later used to decide whether to wrap `c + 1` or not.\r\n5.\
  \ in `test_passes`, the node builder IDs were not consistent, so we were reusing\
  \ IDs.\r\n\r\nI added a bunch of tests. I made sure that at least 1 test fails if\
  \ any of the changes above is not made."
