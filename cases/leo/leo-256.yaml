introducing_pr_title: Properly unwrap optional types during operations
introducing_pr_body: "Original PR: https://github.com/ProvableHQ/leo/pull/28905\r\n\
  \r\nWhen optional types were used with unsuffixed literals in binary/unary ops,\
  \ the literals were incorrectly inferred as the full optional type.\r\n\r\nSo, this\
  \ adds unwrapping and wrapping back (when returning) to properly handle optional\
  \ types in binary and unary ops, to get unsuffixed literals to correctly infer as\
  \ T instead of T?.\r\n\r\nResolves: https://github.com/ProvableHQ/leo/issues/28902"
