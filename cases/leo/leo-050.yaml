introducing_pr_title: Refactor leo-package and remove leo-retriever.
introducing_pr_body: "leo-retriever is completely gone and its functionality is now\
  \ in leo-package. It seemed already there was considerable intermingling between\
  \ the functionality they offered, and there seems to have been some struggle to\
  \ not have them mutually dependent - for instance `Manifest` was in leo-retriever,\
  \ where it doesn't seem to belong.\r\n\r\nThere are no more leo.lock files - these\
  \ files were only used to cache dependency information after builds. Since we rebuild\
  \ by default, that's pretty unnecessary. Now the Build cli command produces a Package\
  \ as its output, which contains dependency information that can be produced by commands\
  \ which have Build as their prelude.\r\n\r\nNetworkName now implements FromStr rather\
  \ than TryFrom<String>.\r\n\r\nSome uses of SnarkVM's types, like Manifest, are\
  \ replaced with our own.\r\n\r\nThe APIs of leo-package types like Package are streamlined.\r\
  \n\r\nThe leo-package directory types like SourceDirectory and BuildDirectory are\
  \ gone - these were just copy+pasted implementations of the same functionality 4\
  \ times.\r\n\r\nThe immediate motivation for these changes is the upcoming Leo test\
  \ framework.\r\nMuch of it will be built on top of leo-package, and I want to start\r\
  \nwith an interface that's easy to use and understand."
