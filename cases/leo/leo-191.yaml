  \ was incorrect in central header, and version-made-by could be lower than that\
  \ (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/100\">#100</a>)</li>\n\
  <li>version-needed-to-extract was incorrect in central header, and version-made-by\
  \ could be lower than that (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/100\"\
  >#100</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\u2699\uFE0F Miscellaneous\
  \ Tasks</h3>\n<ul>\n<li>Another tweak to ensure <code>version_needed</code> is applied</li>\n\
