introducing_pr_body: "Bumps [zip](https://github.com/zip-rs/zip2) from 1.3.0 to 1.3.1.\n\
  <details>\n<summary>Release notes</summary>\n<p><em>Sourced from <a href=\"https://github.com/zip-rs/zip2/releases\"\
  >zip's releases</a>.</em></p>\n<blockquote>\n<h2>v1.3.1</h2>\n<h3><!-- raw HTML\
  \ omitted -->\U0001F69C Refactor</h3>\n<ul>\n<li>Make <code>deflate</code> enable\
  \ both default implementations</li>\n<li>Merge the hidden deflate-flate2 flag into\
  \ the public one</li>\n<li>Rename _deflate-non-zopfli to _deflate-flate2</li>\n\
  <li>Reject encrypted and using_data_descriptor files slightly faster in read_zipfile_from_stream</li>\n\
  <li>Convert <code>impl TryInto&lt;NaiveDateTime&gt; for DateTime</code> to <code>impl\
  \ TryFrom&lt;DateTime&gt; for NaiveDateTime</code> (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/136\"\
  >#136</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\u26A1 Performance</h3>\n<ul>\n\
  <li>Change default compression implementation to <code>flate2/zlib-ng</code></li>\n\
  </ul>\n<h3><!-- raw HTML omitted -->\u2699\uFE0F Miscellaneous Tasks</h3>\n<ul>\n\
  <li>chore(<a href=\"https://redirect.github.com/zip-rs/zip2/pull/132\">#132</a>):\
  \ Attribution for some copied test data</li>\n<li>chore(<a href=\"https://redirect.github.com/zip-rs/zip2/pull/133\"\
  >#133</a>): chmod -x src/result.rs</li>\n</ul>\n</blockquote>\n</details>\n<details>\n\
  <summary>Changelog</summary>\n<p><em>Sourced from <a href=\"https://github.com/zip-rs/zip2/blob/master/CHANGELOG.md\"\
  >zip's changelog</a>.</em></p>\n<blockquote>\n<h2><a href=\"https://github.com/zip-rs/zip2/compare/v1.3.0...v1.3.1\"\
  >1.3.1</a> - 2024-05-21</h2>\n<h3><!-- raw HTML omitted -->\U0001F69C Refactor</h3>\n\
  <ul>\n<li>Make <code>deflate</code> enable both default implementations</li>\n<li>Merge\
  \ the hidden deflate-flate2 flag into the public one</li>\n<li>Rename _deflate-non-zopfli\
  \ to _deflate-flate2</li>\n<li>Reject encrypted and using_data_descriptor files\
  \ slightly faster in read_zipfile_from_stream</li>\n<li>Convert <code>impl TryInto&lt;NaiveDateTime&gt;\
  \ for DateTime</code> to <code>impl TryFrom&lt;DateTime&gt; for NaiveDateTime</code>\
  \ (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/136\">#136</a>)</li>\n\
  </ul>\n<h3><!-- raw HTML omitted -->\u26A1 Performance</h3>\n<ul>\n<li>Change default\
  \ compression implementation to <code>flate2/zlib-ng</code></li>\n</ul>\n<h3><!--\
  \ raw HTML omitted -->\u2699\uFE0F Miscellaneous Tasks</h3>\n<ul>\n<li>chore(<a\
  \ href=\"https://redirect.github.com/zip-rs/zip2/pull/132\">#132</a>): Attribution\
  \ for some copied test data</li>\n<li>chore(<a href=\"https://redirect.github.com/zip-rs/zip2/pull/133\"\
  >#133</a>): chmod -x src/result.rs</li>\n</ul>\n</blockquote>\n</details>\n<details>\n\
  <summary>Commits</summary>\n<ul>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/6c60c67d92c31dc610bed5cc4626e9c20efdc61b\"\
