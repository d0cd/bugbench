fix_pr_title: Bump zip from 1.3.1 to 2.1.0
fix_pr_body: "Bumps [zip](https://github.com/zip-rs/zip2) from 1.3.1 to 2.1.0.\n<details>\n\
  <summary>Release notes</summary>\n<p><em>Sourced from <a href=\"https://github.com/zip-rs/zip2/releases\"\
  >zip's releases</a>.</em></p>\n<blockquote>\n<h2>v2.1.0</h2>\n<h3><!-- raw HTML\
  \ omitted -->\U0001F680 Features</h3>\n<ul>\n<li>Support mutual conversion between\
  \ <code>DateTime</code> and MS-DOS pair</li>\n</ul>\n<h3><!-- raw HTML omitted -->\U0001F41B\
  \ Bug Fixes</h3>\n<ul>\n<li>version-needed-to-extract was incorrect in central header,\
  \ and version-made-by could be lower than that (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/100\"\
  >#100</a>)</li>\n<li>version-needed-to-extract was incorrect in central header,\
  \ and version-made-by could be lower than that (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/100\"\
  >#100</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\u2699\uFE0F Miscellaneous\
  \ Tasks</h3>\n<ul>\n<li>Another tweak to ensure <code>version_needed</code> is applied</li>\n\
  <li>Tweaks to make <code>version_needed</code> and <code>version_made_by</code>\
  \ work with recently-merged changes</li>\n</ul>\n<h2>v2.0.0</h2>\n<h3><!-- raw HTML\
  \ omitted -->\U0001F680 Features</h3>\n<ul>\n<li>Add <code>fmt::Display</code> for\
  \ <code>DateTime</code></li>\n<li>Implement more traits for <code>DateTime</code></li>\n\
  </ul>\n<h3><!-- raw HTML omitted -->\U0001F69C Refactor</h3>\n<ul>\n<li>Change type\
  \ of <code>last_modified_time</code> to <code>Option&lt;DateTime&gt;</code></li>\n\
  <li>[<strong>breaking</strong>] Rename <code>from_msdos</code> to <code>from_msdos_unchecked</code>,\
  \ make it unsafe, and add <code>try_from_msdos</code> (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/145\"\
  >#145</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\u2699\uFE0F Miscellaneous\
  \ Tasks</h3>\n<ul>\n<li>Continue to accept archives with invalid DateTime, and use\
  \ <code>now_utc()</code> as default only when writing, not reading</li>\n</ul>\n\
  </blockquote>\n</details>\n<details>\n<summary>Changelog</summary>\n<p><em>Sourced\
  \ from <a href=\"https://github.com/zip-rs/zip2/blob/master/CHANGELOG.md\">zip's\
