description: Circuit variables in Leo lacked mutability tracking, meaning all circuit
  member assignments were either universally allowed or disallowed with no per-field
  control. The fix adds an optional `mut` keyword to circuit variable definitions,
  threads the `is_mutable` flag through the AST, typed representation, and compiler,
  and adds an immutability check in the circuit variable assignment path that emits
  an error when assigning to a non-mutable circuit field.
expected_findings:
- file: compiler/src/statement/assign/circuit_variable.rs
  line: 33
  summary: 'Missing mutability check: circuit variable assignment should verify the
    target field is declared `mut` before allowing assignment, otherwise emit an immutable_circuit_variable
    error.'
- file: compiler/src/expression/circuit/circuit.rs
  line: 55
  summary: CircuitMember::CircuitVariable pattern does not track or propagate the
    `is_mutable` flag, so downstream assignment checks cannot distinguish mutable
    from immutable fields.
- file: typed/src/circuits/circuit_member.rs
  line: 26
  summary: CircuitVariable variant lacks an `is_mutable` boolean field, preventing
    the type system from distinguishing mutable and immutable circuit members.
