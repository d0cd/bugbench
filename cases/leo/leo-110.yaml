introducing_pr_body: "Bumps [serde](https://github.com/serde-rs/serde) from 1.0.210\
  \ to 1.0.211.\n<details>\n<summary>Release notes</summary>\n<p><em>Sourced from\
  \ <a href=\"https://github.com/serde-rs/serde/releases\">serde's releases</a>.</em></p>\n\
  <blockquote>\n<h2>v1.0.211</h2>\n<ul>\n<li>Improve error reporting about mismatched\
  \ signature in <code>with</code> and <code>default</code> attributes (<a href=\"\
  https://redirect.github.com/serde-rs/serde/issues/2558\">#2558</a>, thanks <a href=\"\
  https://github.com/Mingun\"><code>@\u200BMingun</code></a>)</li>\n<li>Show variant\
  \ aliases in error message when variant deserialization fails (<a href=\"https://redirect.github.com/serde-rs/serde/issues/2566\"\
  >#2566</a>, thanks <a href=\"https://github.com/Mingun\"><code>@\u200BMingun</code></a>)</li>\n\
  <li>Improve binary size of untagged enum and internally tagged enum deserialization\
  \ by about 12% (<a href=\"https://redirect.github.com/serde-rs/serde/issues/2821\"\
  >#2821</a>)</li>\n</ul>\n</blockquote>\n</details>\n<details>\n<summary>Commits</summary>\n\
