  <li><a href="https://github.com/serde-rs/serde/commit/0058c7226e72e653d9e22c0879403ff6df195ec6"><code>0058c72</code></a>
  Add regression test for issue 2844</li>

  <li>Additional commits viewable in <a href="https://github.com/serde-rs/serde/compare/v1.0.211...v1.0.213">compare
  view</a></li>

  </ul>

  </details>

