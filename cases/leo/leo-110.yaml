fix_pr_title: Bump serde from 1.0.211 to 1.0.213
fix_pr_body: 'Bumps [serde](https://github.com/serde-rs/serde) from 1.0.211 to 1.0.213.

  <details>

  <summary>Release notes</summary>

  <p><em>Sourced from <a href="https://github.com/serde-rs/serde/releases">serde''s
  releases</a>.</em></p>

  <blockquote>

  <h2>v1.0.213</h2>

  <ul>

  <li>Fix support for macro-generated <code>with</code> attributes inside a newtype
  struct (<a href="https://redirect.github.com/serde-rs/serde/issues/2847">#2847</a>)</li>

  </ul>

  <h2>v1.0.212</h2>

  <ul>

  <li>Fix hygiene of macro-generated local variable accesses in serde(with) wrappers
  (<a href="https://redirect.github.com/serde-rs/serde/issues/2845">#2845</a>)</li>

  </ul>

  </blockquote>

  </details>

  <details>

  <summary>Commits</summary>

  <ul>

  <li><a href="https://github.com/serde-rs/serde/commit/58a8d229315553c4ae0a8d7eee8e382fbae4b4bf"><code>58a8d22</code></a>
  Release 1.0.213</li>

  <li><a href="https://github.com/serde-rs/serde/commit/ef0ed22593a17a5af5ebe48d3b6ef7c3de1b116a"><code>ef0ed22</code></a>
  Merge pull request <a href="https://redirect.github.com/serde-rs/serde/issues/2847">#2847</a>
  from dtolnay/newtypewith</li>

  <li><a href="https://github.com/serde-rs/serde/commit/79925ac3947483013ba8136e43bc0449b99bd10c"><code>79925ac</code></a>
  Ignore dead_code warning in regression test</li>

