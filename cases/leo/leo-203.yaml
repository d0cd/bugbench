  \ Unix, e.g. this ...</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/4a5d28ed30894c9d379529dea8f593e74ea2d358\"\
  ><code>4a5d28e</code></a> doc: Important correction: contents might not have been\
  \ extracted at all</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/ba4c6936d542731150dbf90e76967d8bde252ad1\"\
