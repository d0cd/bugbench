fix_pr_title: Bump zip from 1.2.1 to 1.2.3
fix_pr_body: "Bumps [zip](https://github.com/zip-rs/zip2) from 1.2.1 to 1.2.3.\n<details>\n\
  <summary>Release notes</summary>\n<p><em>Sourced from <a href=\"https://github.com/zip-rs/zip2/releases\"\
  >zip's releases</a>.</em></p>\n<blockquote>\n<h2>v1.2.3</h2>\n<h3><!-- raw HTML\
  \ omitted -->\U0001F41B Bug Fixes</h3>\n<ul>\n<li>Remove a window when an extracted\
  \ directory might be unexpectedly listable and/or <code>cd</code>able by non-owners</li>\n\
  <li>Extract directory contents on Unix even if the directory doesn't have write\
  \ permission (<a href=\"https://redirect.github.com/zip-rs/zip-old/issues/423\"\
  >zip-rs/zip-old#423</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\u2699\uFE0F\
  \ Miscellaneous Tasks</h3>\n<ul>\n<li>More conditionally-unused imports</li>\n</ul>\n\
  <h2>v1.2.2</h2>\n<h3><!-- raw HTML omitted -->\U0001F41B Bug Fixes</h3>\n<ul>\n\
  <li>Failed to clear &quot;writing_raw&quot; before finishing a symlink, leading\
  \ to dropped extra fields</li>\n</ul>\n<h3><!-- raw HTML omitted -->\u26A1 Performance</h3>\n\
  <ul>\n<li>Use boxed slice for archive comment, since it can't be concatenated</li>\n\
  <li>Optimize for the fact that false signatures can't overlap with real ones</li>\n\
  </ul>\n</blockquote>\n</details>\n<details>\n<summary>Changelog</summary>\n<p><em>Sourced\
  \ from <a href=\"https://github.com/zip-rs/zip2/blob/master/CHANGELOG.md\">zip's\
  \ changelog</a>.</em></p>\n<blockquote>\n<h2><a href=\"https://github.com/zip-rs/zip2/compare/v1.2.2...v1.2.3\"\
  >1.2.3</a> - 2024-05-10</h2>\n<h3><!-- raw HTML omitted -->\U0001F41B Bug Fixes</h3>\n\
  <ul>\n<li>Remove a window when an extracted directory might be unexpectedly listable\
  \ and/or <code>cd</code>able by non-owners</li>\n<li>Extract directory contents\
  \ on Unix even if the directory doesn't have write permission (<a href=\"https://redirect.github.com/zip-rs/zip-old/issues/423\"\
  >zip-rs/zip-old#423</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\u2699\uFE0F\
  \ Miscellaneous Tasks</h3>\n<ul>\n<li>More conditionally-unused imports</li>\n</ul>\n\
  <h2><a href=\"https://github.com/zip-rs/zip2/compare/v1.2.1...v1.2.2\">1.2.2</a>\
  \ - 2024-05-09</h2>\n<h3><!-- raw HTML omitted -->\U0001F41B Bug Fixes</h3>\n<ul>\n\
  <li>Failed to clear &quot;writing_raw&quot; before finishing a symlink, leading\
  \ to dropped extra fields</li>\n</ul>\n<h3><!-- raw HTML omitted -->\u26A1 Performance</h3>\n\
  <ul>\n<li>Use boxed slice for archive comment, since it can't be concatenated</li>\n\
  <li>Optimize for the fact that false signatures can't overlap with real ones</li>\n\
  </ul>\n</blockquote>\n</details>\n<details>\n<summary>Commits</summary>\n<ul>\n\
  <li><a href=\"https://github.com/zip-rs/zip2/commit/adb40b83d2b7efd9dc4bd2ea06fda14637dcdde4\"\
  ><code>adb40b8</code></a> Merge pull request <a href=\"https://redirect.github.com/zip-rs/zip2/issues/118\"\
  >#118</a> from zip-rs/release-plz-2024-05-10T23-54-42Z</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/3d7852a337c3f0359612d04c7751c70a0ef12c9e\"\
  ><code>3d7852a</code></a> chore: release</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/a385aaf854687020f23e03dbe0d1035b49c949a4\"\
