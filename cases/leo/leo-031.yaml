fix_pr_title: '[Feature] CLI improvements.'
fix_pr_body: "This PR,\r\n- uses a default endpoint for `leo build` allowing for network\
  \ dependencies to be retrieved without needing to specify a network.\r\n- sanitizes\
  \ endpoints before they are used in `snarkvm::Query`. A test has been added verifying\
  \ that this works, closing #28942 \r\n- improves an error message, closing #28944\
  \ \r\n\r\n**Note. Because this PR fixes an issue in execution, a patch testnet tag\
  \ will need to be released.**"
