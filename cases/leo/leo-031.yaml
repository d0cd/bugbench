  \ is deprecated.\r\n2. Use `m4pro` instead of `m2pro` in CircleCI.\r\n3. Install\
  \ SnarkOS in CI and verify its correctness\r\n4. E2E Leo CLI testing and using `leo\
  \ devnet` when needed."
