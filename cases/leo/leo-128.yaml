fix_pr_title: Bump backtrace from 0.3.73 to 0.3.74
fix_pr_body: "Bumps [backtrace](https://github.com/rust-lang/backtrace-rs) from 0.3.73\
  \ to 0.3.74.\n<details>\n<summary>Release notes</summary>\n<p><em>Sourced from <a\
  \ href=\"https://github.com/rust-lang/backtrace-rs/releases\">backtrace's releases</a>.</em></p>\n\
  <blockquote>\n<h2>0.3.74</h2>\n<h2>What's Changed</h2>\n<ul>\n<li>QNX Neutrino 7.0\
  \ support, thanks to <a href=\"https://github.com/nyurik\"><code>@\u200Bnyurik</code></a>\
  \ in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/648\">rust-lang/backtrace-rs#648</a></li>\n\
  <li>Cleaned up our Android support. This should massively improve backtraces for\
  \ ones with the API level sufficient to ship with libunwind, etc. Unfortunately,\
  \ it comes at the cost of dropping support for older ones! Thanks to <a href=\"\
  https://github.com/fengys\"><code>@\u200Bfengys</code></a> in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/656\"\
  >rust-lang/backtrace-rs#656</a></li>\n<li>Made PrintFmt, which was using the <code>Enum::__NonExhaustiveVariant</code>\
  \ pattern, use <code>#[non_exhaustive]</code> for real. Don't @ me if you were matching\
  \ on that! Thanks to <a href=\"https://github.com/nyurik\"><code>@\u200Bnyurik</code></a>\
  \ in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/651\">rust-lang/backtrace-rs#651</a></li>\n\
  <li>Massively cleaned up the windows code! We moved from winapi to windows-sys with\
  \ windows-targets thanks to <a href=\"https://github.com/CraftSpider\"><code>@\u200B\
  CraftSpider</code></a> and <a href=\"https://github.com/ChrisDenton\"><code>@\u200B\
  ChrisDenton</code></a> in\n<ul>\n<li>Don't cast HANDLE to usize and back by <a href=\"\
  https://github.com/CraftSpider\"><code>@\u200BCraftSpider</code></a> in <a href=\"\
  https://redirect.github.com/rust-lang/backtrace-rs/pull/635\">rust-lang/backtrace-rs#635</a></li>\n\
  <li>Switch from <code>winapi</code> to <code>windows-sys</code> by <a href=\"https://github.com/CraftSpider\"\
  ><code>@\u200BCraftSpider</code></a> in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/641\"\
  >rust-lang/backtrace-rs#641</a></li>\n<li>Update windows bindings and use windows-targets\
  \ by <a href=\"https://github.com/ChrisDenton\"><code>@\u200BChrisDenton</code></a>\
  \ in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/653\">rust-lang/backtrace-rs#653</a></li>\n\
  </ul>\n</li>\n<li>A bunch of updated dependencies. Thanks <a href=\"https://github.com/djc\"\
  ><code>@\u200Bdjc</code></a> and <a href=\"https://github.com/khuey\"><code>@\u200B\
  khuey</code></a>!</li>\n<li>Sorry if you were testing this code in miri! It started\
  \ yelling about sussy casts. A lot. We did a bunch of internal cleanups that should\
  \ make it quiet down, thanks to <a href=\"https://github.com/workingjubilee\"><code>@\u200B\
  workingjubilee</code></a> in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/641\"\
  >rust-lang/backtrace-rs#641</a></li>\n<li>Uhhh we had to tweak <code>dl_iterate_phdr</code>\
  \ in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/660\">rust-lang/backtrace-rs#660</a>\
  \ after Android revealed it was... kind of unsound actually and not doing things\
  \ like checking for null pointers before making slices! WHOOPS! Thanks to <a href=\"\
  https://github.com/saethlin\"><code>@\u200Bsaethlin</code></a> for implementing\
  \ detection for precisely that in rustc! It's really hard to find soundness issues\
  \ in inherited codebases like this one...</li>\n</ul>\n<h2>New Contributors</h2>\n\
  <ul>\n<li><a href=\"https://github.com/CraftSpider\"><code>@\u200BCraftSpider</code></a>\
  \ made their first contribution in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/635\"\
  >rust-lang/backtrace-rs#635</a></li>\n<li><a href=\"https://github.com/fengys1996\"\
  ><code>@\u200Bfengys1996</code></a> made their first contribution in <a href=\"\
  https://redirect.github.com/rust-lang/backtrace-rs/pull/656\">rust-lang/backtrace-rs#656</a></li>\n\
  <li><a href=\"https://github.com/djc\"><code>@\u200Bdjc</code></a> made their first\
  \ contribution in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/657\"\
  >rust-lang/backtrace-rs#657</a></li>\n</ul>\n<p><strong>Full Changelog</strong>:\
  \ <a href=\"https://github.com/rust-lang/backtrace-rs/compare/0.3.73...0.3.74\"\
  >https://github.com/rust-lang/backtrace-rs/compare/0.3.73...0.3.74</a></p>\n</blockquote>\n\
  </details>\n<details>\n<summary>Commits</summary>\n<ul>\n<li><a href=\"https://github.com/rust-lang/backtrace-rs/commit/38d49aa0395c50047ab26e418a0cb30d9955fb64\"\
  ><code>38d49aa</code></a> Merge pull request <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/issues/658\"\
  >#658</a> from workingjubilee/cut-0.3.74</li>\n<li><a href=\"https://github.com/rust-lang/backtrace-rs/commit/c1749ce9a8cc0105b9d224e66f9ce4632133c1ea\"\
  ><code>c1749ce</code></a> Cut backtrace 0.3.74</li>\n<li><a href=\"https://github.com/rust-lang/backtrace-rs/commit/230570f2dac80a601f5c0b30da00cc9480bd35eb\"\
  ><code>230570f</code></a> Merge pull request <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/issues/660\"\
  >#660</a> from workingjubilee/dont-unsoundly-iterate-phdr</li>\n<li><a href=\"https://github.com/rust-lang/backtrace-rs/commit/153f510013e9d486103dac7994d7f75205af397a\"\
  ><code>153f510</code></a> Do not destructure maybe-uninit fields</li>\n<li><a href=\"\
  https://github.com/rust-lang/backtrace-rs/commit/38589464ed3a901794f5858ccbd7f996f6712f64\"\
  ><code>3858946</code></a> Revise dl_iterate_phdr callback to be sound-ish</li>\n\
  <li><a href=\"https://github.com/rust-lang/backtrace-rs/commit/7d062c63749a4c07d9307c96b6cd9485ccd1ad18\"\
  ><code>7d062c6</code></a><code>rust-lang/backtrace-rs#653</code></li>\n<li><a href=\"\
  https://github.com/rust-lang/backtrace-rs/commit/fc37b22dc8a384d93f6b7b4817266eec6433875e\"\
  ><code>fc37b22</code></a><code>rust-lang/backtrace-rs#657</code></li>\n<li><a href=\"\
  https://github.com/rust-lang/backtrace-rs/commit/600beaa5074be0f40279584450d995c319061ce8\"\
  ><code>600beaa</code></a><code>rust-lang/backtrace-rs#648</code></li>\n<li><a href=\"\
  https://github.com/rust-lang/backtrace-rs/commit/84b6c1d56f4bd1b4297187db863c2db6d436c1cf\"\
  ><code>84b6c1d</code></a><code>rust-lang/backtrace-rs#652</code></li>\n<li><a href=\"\
  https://github.com/rust-lang/backtrace-rs/commit/95c3bacab9364620864208b651e77a524900480d\"\
  ><code>95c3bac</code></a> Make enum <code>print::PrintFmt</code><code>rust-lang/backtrace-rs#651</code></li>\n\
  <li>Additional commits viewable in <a href=\"https://github.com/rust-lang/backtrace-rs/compare/0.3.73...0.3.74\"\
  >compare view</a></li>\n</ul>\n</details>\n<br />\n\n\n[![Dependabot compatibility\
