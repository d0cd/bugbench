description: The Leo lexer did not properly handle the case where a single `&` character
  appeared without a following `&` to form the `&&` operator. Instead of producing
  a clear error message, it either panicked or produced a confusing error about unexpected
  characters. The fix adds proper error handling for lone `&` and simplifies the `eat`
  function.
expected_findings:
- file: compiler/parser/src/tokenizer/lexer.rs
  line: 172
  summary: 'Missing error handling for lone `&` not followed by another `&`: the lexer
    should produce a clear error when `&` appears without forming `&&`, but instead
    falls through to single-character token consumption with a confusing error.'
- file: compiler/parser/src/tokenizer/lexer.rs
  line: 229
  summary: The `eat` function does not properly validate expected follow-up characters
    for two-character operators like `&&`, leading to poor error messages when the
    second character is missing.
