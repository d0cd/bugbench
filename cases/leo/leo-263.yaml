fix_pr_title: Improve handling of guards while flattening.
fix_pr_body: "Specifically two changes are made:\r\n\r\n1. Cache Anded together chains\
  \ of conditionals for early returns. This prevents quadratic code being generated\
  \ in the face of a chain of ifs like\r\n\r\n```\r\nif a { return 0u32; } else if\
  \ b { return 1u32 } else if ...\r\n```\r\n\r\n2. Take into account early returns\
  \ for asserts.\r\n\r\nFixes #28386, #28387"
