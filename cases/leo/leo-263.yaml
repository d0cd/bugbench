    \ {\r\n    transition main(public a: field) -> u32 {\r\n        if a == 0field\
    \ {\r\n            return 0u32;\r\n        } else if a == 1field {\r\n       \
    \     return 1u32;\r\n        } else if a == 2field {\r\n            return 2u32;\r\
    \n        } else if a == 3field {\r\n            return 3u32;\r\n        } else\
    \ if a == 4field {\r\n            return 4u32;\r\n        } else if a == 5field\
    \ {\r\n            return 5u32;\r\n        } else if a == 6field {\r\n       \
    \     return 6u32;\r\n        } else {\r\n            return 7u32;\r\n       \
    \ }\r\n    }\r\n}\r\n```\r\n\r\nYields this aleo code:\r\n```\r\nprogram order_exp.aleo;\r\
    \n\r\n\r\n\r\nfunction main:\r\n    input r0 as field.public;\r\n    is.eq r0\
    \ 0field into r1;\r\n    is.eq r0 1field into r2;\r\n    is.eq r0 2field into\
    \ r3;\r\n    is.eq r0 3field into r4;\r\n    is.eq r0 4field into r5;\r\n    is.eq\
    \ r0 5field into r6;\r\n    is.eq r0 6field into r7;\r\n    not r1 into r8;\r\n\
    \    not r2 into r9;\r\n    and r8 r9 into r10;\r\n    not r3 into r11;\r\n  \
    \  and r10 r11 into r12;\r\n    not r4 into r13;\r\n    and r12 r13 into r14;\r\
    \n    not r5 into r15;\r\n    and r14 r15 into r16;\r\n    not r6 into r17;\r\n\
    \    and r16 r17 into r18;\r\n    and r18 r7 into r19;\r\n    ternary r19 6u32\
    \ 7u32 into r20;\r\n    not r1 into r21;\r\n    not r2 into r22;\r\n    and r21\
    \ r22 into r23;\r\n    not r3 into r24;\r\n    and r23 r24 into r25;\r\n    not\
    \ r4 into r26;\r\n    and r25 r26 into r27;\r\n    not r5 into r28;\r\n    and\
    \ r27 r28 into r29;\r\n    and r29 r6 into r30;\r\n    ternary r30 5u32 r20 into\
    \ r31;\r\n    not r1 into r32;\r\n    not r2 into r33;\r\n    and r32 r33 into\
    \ r34;\r\n    not r3 into r35;\r\n    and r34 r35 into r36;\r\n    not r4 into\
    \ r37;\r\n    and r36 r37 into r38;\r\n    and r38 r5 into r39;\r\n    ternary\
    \ r39 4u32 r31 into r40;\r\n    not r1 into r41;\r\n    not r2 into r42;\r\n \
    \   and r41 r42 into r43;\r\n    not r3 into r44;\r\n    and r43 r44 into r45;\r\
    \n    and r45 r4 into r46;\r\n    ternary r46 3u32 r40 into r47;\r\n    not r1\
    \ into r48;\r\n    not r2 into r49;\r\n    and r48 r49 into r50;\r\n    and r50\
    \ r3 into r51;\r\n    ternary r51 2u32 r47 into r52;\r\n    not r1 into r53;\r\
    \n    and r53 r2 into r54;\r\n    ternary r54 1u32 r52 into r55;\r\n    ternary\
    \ r1 0u32 r55 into r56;\r\n    output r56 as u32.private;\r\n```"
