introducing_pr_title: Overhaul `leo::{deploy, execute}`
introducing_pr_body: "## Motivation\r\n\r\nThis PR overhauls the implementations for\
  \ deployment and execution in the CLI. Specifically, it:\r\n- consolidates CLI options.\r\
  \n- removes reliance on `snarkVM::Package`\r\n- gives developers better feedback\
  \ on what the CLI is doing and the cost on the network.\r\n- allows for better save\
  \ options\r\n- generalizes fee inputs for a variable number of transactions\r\n\
  - introduces `leo check` which checks local dependencies against the remote ones.\r\
  \n\r\nThis is needed as a precursor to program upgradability."
