fix_pr_title: '[Fix] `leo deploy` build panic'
fix_pr_body: 'The `build` prelude of `leo deploy used `BuildOptions::default()` which
  set `conditional_block_max_depth` to `0` causing builds to panic that contained
  conditionals in async function scope. '
