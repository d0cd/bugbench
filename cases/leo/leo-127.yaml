  line: 226
  summary: "Ternary expression type checking does not properly validate that both\
    \ branches have compatible types \u2014 mismatched types should produce a type\
    \ error"
- file: compiler/passes/src/type_checker/check_statements.rs
  line: 31
  summary: "Missing tracking of whether a function body contains a return statement\
    \ \u2014 functions without returns are silently accepted instead of producing\
    \ an error"
- file: compiler/passes/src/type_checker/check_file.rs
