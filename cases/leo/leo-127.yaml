description: 'The Leo compiler''s type checker had multiple bugs: it failed to properly
  validate type compatibility in ternary/binary expressions (allowing mismatched types),
  did not detect missing return statements in functions, and did not catch usage of
  undeclared variables. The fix adds a `has_return` tracking field to the type checker,
  proper type-mismatch checks for ternary/binary expressions, and variable existence
  validation.'
expected_findings:
