fix_pr_title: Bump serde from 1.0.210 to 1.0.211
fix_pr_body: "Bumps [serde](https://github.com/serde-rs/serde) from 1.0.210 to 1.0.211.\n\
  <details>\n<summary>Release notes</summary>\n<p><em>Sourced from <a href=\"https://github.com/serde-rs/serde/releases\"\
  >serde's releases</a>.</em></p>\n<blockquote>\n<h2>v1.0.211</h2>\n<ul>\n<li>Improve\
  \ error reporting about mismatched signature in <code>with</code> and <code>default</code>\
  \ attributes (<a href=\"https://redirect.github.com/serde-rs/serde/issues/2558\"\
  >#2558</a>, thanks <a href=\"https://github.com/Mingun\"><code>@\u200BMingun</code></a>)</li>\n\
  <li>Show variant aliases in error message when variant deserialization fails (<a\
  \ href=\"https://redirect.github.com/serde-rs/serde/issues/2566\">#2566</a>, thanks\
  \ <a href=\"https://github.com/Mingun\"><code>@\u200BMingun</code></a>)</li>\n<li>Improve\
  \ binary size of untagged enum and internally tagged enum deserialization by about\
  \ 12% (<a href=\"https://redirect.github.com/serde-rs/serde/issues/2821\">#2821</a>)</li>\n\
  </ul>\n</blockquote>\n</details>\n<details>\n<summary>Commits</summary>\n<ul>\n\
  <li><a href=\"https://github.com/serde-rs/serde/commit/1b8310d98abf7366cad421e1ece94a42e43744b1\"\
  ><code>1b8310d</code></a> Release 1.0.211</li>\n<li><a href=\"https://github.com/serde-rs/serde/commit/af4c388dffdc290ad92e8c8506f6d7ee9a1365e3\"\
  ><code>af4c388</code></a> Merge pull request <a href=\"https://redirect.github.com/serde-rs/serde/issues/2843\"\
  >#2843</a> from dtolnay/fieldwithaliases</li>\n<li><a href=\"https://github.com/serde-rs/serde/commit/09f6d9361d464d5ed92afc8f7a5107069f95beb0\"\
  ><code>09f6d93</code></a> Collect field ident and aliases into a struct</li>\n<li><a\
  \ href=\"https://github.com/serde-rs/serde/commit/1f9eb8300f6f69a378f3b706524bc5874fd3cd31\"\
  ><code>1f9eb83</code></a> Merge pull request <a href=\"https://redirect.github.com/serde-rs/serde/issues/2842\"\
  >#2842</a> from dtolnay/identsaliases</li>\n<li><a href=\"https://github.com/serde-rs/serde/commit/c6a5be7f6ab350931a13166fbe63d91932705061\"\
  ><code>c6a5be7</code></a> Rename variant_names_idents -&gt; variant_idents_aliases</li>\n\
  <li><a href=\"https://github.com/serde-rs/serde/commit/0a06af8d216f066313f33855f44208accba2da06\"\
