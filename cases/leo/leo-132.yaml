description: The Leo compiler lacked a custom panic hook, causing raw Rust panic output
  to be shown to end users in release builds instead of a user-friendly error message.
  The fix adds a `set_panic_hook()` function called at the start of `main()` that
  registers a custom panic handler in release mode, displaying environment info and
  a link to the GitHub bug report template.
expected_findings:
- file: leo/main.rs
  line: 175
  summary: 'Missing custom panic hook: the main() entry point does not register a
    panic handler, so release-build panics show raw Rust output to users instead of
    a friendly error message with bug-reporting instructions.'
