fix_pr_title: '[Feature] Conditional execution in finalize.'
fix_pr_body: "This PR supports correct conditional code execution in `finalize` blocks\
  \ by using `branch` instructions.\r\nTo do this correctly, this introduces a restriction\
  \ that values in an outer scope cannot be reassigned from an inner conditional scope.\
  \ For example, the following code\r\n```\r\n  finalize foo() {\r\n      let value:\
  \ u8 = Mapping::get_or_use(data, 0u8);\r\n      if value == 0u8 {\r\n          value\
  \ = 10u8;\r\n      } else {\r\n          return;\r\n      }\r\n  }\r\n```\r\nresults\
  \ in the error:\r\n```\r\nError [ETYC0372097]: Cannot re-assign to `value` from\
  \ a conditional scope to an outer scope in a finalize block. This is a fundamental\
  \ restriction that can often be avoided by using a ternary operator `?` or re-declaring\
  \ the variable in the current scope. In the future, ARC XXXX (https://github.com/AleoHQ/ARCs)\
  \ will support more complex assignments in finalize blocks.\"\r\n```\r\nWhile this\
  \ restriction is slightly limiting, the feature allows users to conditionally operate\
  \ on mappings. This restriction can be entirely removed in a future ARC."
