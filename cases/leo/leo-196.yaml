  ><code>3e81fdd</code></a> style: cargo fmt --all</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/1cb0e1b3b7812182f4ac44750ee37353386ef48c\"\
  ><code>1cb0e1b</code></a> refactor: Eliminate deprecation warning when <code>--all-features</code>\
  \ implicitly enab...</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/fbf111ef9714a91edf4fed8d80c0b63748b80d63\"\
  ><code>fbf111e</code></a> style: cargo fmt --all</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/3e06f6433afdc485fbbf4e46f79070ade5996e63\"\
