description: The `leo upgrade` command was missing a `--skip` option that allows skipping
  upgrades for programs containing specified strings. The fix adds a `skip` field
  (Vec<String>) to the Upgrade, UpgradeImported, and UpgradeAll command structs, and
  threads it through the upgrade logic. Additionally, CLI compile output lacked spacing
  between sections making logs hard to parse, and integration tests used hardcoded
  ports causing flaky failures.
expected_findings:
- file: leo/cli/commands/upgrade.rs
  line: 61
  summary: 'Missing `--skip` CLI option on Upgrade struct: the upgrade command lacks
    the ability to skip programs matching given strings, which is needed for managing
    partner program deployments.'
- file: leo/cli/commands/build.rs
  line: 263
  summary: Missing newline/spacing in compile output makes CLI logs difficult to visually
    parse between compilation stages.
- file: leo/tests/integration.rs
  line: 41
  summary: Integration tests use hardcoded ports instead of dynamically finding available
    TCP ports, causing flaky test failures when ports are already in use.
