fix_pr_title: Bump zip from 1.2.3 to 1.3.0
fix_pr_body: "Bumps [zip](https://github.com/zip-rs/zip2) from 1.2.3 to 1.3.0.\n<details>\n\
  <summary>Release notes</summary>\n<p><em>Sourced from <a href=\"https://github.com/zip-rs/zip2/releases\"\
  >zip's releases</a>.</em></p>\n<blockquote>\n<h2>v1.3.0</h2>\n<h3><!-- raw HTML\
  \ omitted -->\U0001F680 Features</h3>\n<ul>\n<li>Add <code>is_symlink</code> method</li>\n\
  </ul>\n<h3><!-- raw HTML omitted -->\U0001F41B Bug Fixes</h3>\n<ul>\n<li>Extract\
  \ symlinks into symlinks on Unix and Windows, and fix a bug that affected making\
  \ directories writable on MacOS</li>\n</ul>\n<h3><!-- raw HTML omitted -->\U0001F69C\
  \ Refactor</h3>\n<ul>\n<li>Eliminate deprecation warning when <code>--all-features</code>\
  \ implicitly enables the deprecated feature</li>\n<li>Check if archive contains\
  \ a symlink's target, without borrowing both at the same time</li>\n<li>Eliminate\
  \ a clone that's no longer necessary</li>\n<li>is_dir only needs to look at the\
  \ filename</li>\n<li>Remove unnecessary #[cfg] attributes</li>\n</ul>\n<h3><!--\
  \ raw HTML omitted -->\u2699\uFE0F Miscellaneous Tasks</h3>\n<ul>\n<li>Fix borrow-of-moved-value</li>\n\
  <li>Box<!-- raw HTML omitted --> doesn't directly convert to PathBuf, so convert\
  \ back to String first</li>\n<li>partial revert - only &amp;str has chars(), but\
  \ Box<!-- raw HTML omitted --> should auto-deref</li>\n<li>contains_key needs a\
  \ <code>Box&lt;str&gt;</code>, so generify <code>is_dir</code> to accept one</li>\n\
  <li>Add missing <code>ZipFileData::is_dir()</code> method</li>\n<li>Fix another\
  \ Windows-specific error</li>\n<li>More bug fixes for Windows-specific symlink code</li>\n\
  <li>More bug fixes for Windows-specific symlink code</li>\n<li>Bug fix: variable\
  \ name change</li>\n<li>Bug fix: need both internal and output path to determine\
  \ whether to symlink_dir</li>\n<li>Another bug fix</li>\n<li>Fix another error-type\
  \ conversion error</li>\n<li>Fix error-type conversion on Windows</li>\n<li>Fix\
  \ conditionally-unused import</li>\n<li>Fix continued issues, and factor out the\
  \ Vec<!-- raw HTML omitted -->-to-OsString conversion (cc: <a href=\"https://redirect.github.com/zip-rs/zip2/pull/125\"\
  >#125</a>)</li>\n<li>Fix CI failure involving conversion to OsString for symlinks\
  \ (see my comments on <a href=\"https://redirect.github.com/zip-rs/zip2/pull/125\"\
  >#125</a>)</li>\n<li>Move path join into platform-independent code</li>\n</ul>\n\
  </blockquote>\n</details>\n<details>\n<summary>Changelog</summary>\n<p><em>Sourced\
  \ from <a href=\"https://github.com/zip-rs/zip2/blob/master/CHANGELOG.md\">zip's\
  \ changelog</a>.</em></p>\n<blockquote>\n<h2><a href=\"https://github.com/zip-rs/zip2/compare/v1.2.3...v1.3.0\"\
  >1.3.0</a> - 2024-05-17</h2>\n<h3><!-- raw HTML omitted -->\U0001F680 Features</h3>\n\
  <ul>\n<li>Add <code>is_symlink</code> method</li>\n</ul>\n<h3><!-- raw HTML omitted\
  \ -->\U0001F41B Bug Fixes</h3>\n<ul>\n<li>Extract symlinks into symlinks on Unix\
  \ and Windows, and fix a bug that affected making directories writable on MacOS</li>\n\
  </ul>\n<h3><!-- raw HTML omitted -->\U0001F69C Refactor</h3>\n<ul>\n<li>Eliminate\
  \ deprecation warning when <code>--all-features</code> implicitly enables the deprecated\
  \ feature</li>\n<li>Check if archive contains a symlink's target, without borrowing\
  \ both at the same time</li>\n<li>Eliminate a clone that's no longer necessary</li>\n\
  <li>is_dir only needs to look at the filename</li>\n<li>Remove unnecessary #[cfg]\
  \ attributes</li>\n</ul>\n<h3><!-- raw HTML omitted -->\u2699\uFE0F Miscellaneous\
  \ Tasks</h3>\n<ul>\n<li>Fix borrow-of-moved-value</li>\n<li>Box<!-- raw HTML omitted\
  \ --> doesn't directly convert to PathBuf, so convert back to String first</li>\n\
  <li>partial revert - only &amp;str has chars(), but Box<!-- raw HTML omitted -->\
  \ should auto-deref</li>\n<li>contains_key needs a <code>Box&lt;str&gt;</code>,\
  \ so generify <code>is_dir</code> to accept one</li>\n<li>Add missing <code>ZipFileData::is_dir()</code>\
  \ method</li>\n<li>Fix another Windows-specific error</li>\n<li>More bug fixes for\
  \ Windows-specific symlink code</li>\n<li>More bug fixes for Windows-specific symlink\
  \ code</li>\n<li>Bug fix: variable name change</li>\n<li>Bug fix: need both internal\
  \ and output path to determine whether to symlink_dir</li>\n<li>Another bug fix</li>\n\
  <li>Fix another error-type conversion error</li>\n<li>Fix error-type conversion\
  \ on Windows</li>\n<li>Fix conditionally-unused import</li>\n<li>Fix continued issues,\
  \ and factor out the Vec<!-- raw HTML omitted -->-to-OsString conversion (cc: <a\
  \ href=\"https://redirect.github.com/zip-rs/zip2/pull/125\">#125</a>)</li>\n<li>Fix\
  \ CI failure involving conversion to OsString for symlinks (see my comments on <a\
  \ href=\"https://redirect.github.com/zip-rs/zip2/pull/125\">#125</a>)</li>\n<li>Move\
  \ path join into platform-independent code</li>\n</ul>\n</blockquote>\n</details>\n\
  <details>\n<summary>Commits</summary>\n<ul>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/102e31113daa5e9553db14c985b1db3f519174a8\"\
