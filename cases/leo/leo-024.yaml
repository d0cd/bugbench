fix_pr_title: Simplify conditional blocks
fix_pr_body: "Modify const propagation to simplify conditional blocks whose execution\
  \ is certainly known.\r\n\r\nTo this end this adds a new step to const prop and\
  \ unroll that removes\r\nunreachable code such that when a return is lifted up from\
  \ a certainly\r\ntrue conditional, subsequent instructions are removed.\r\n\r\n\
  Fixes #28697\r\n"
