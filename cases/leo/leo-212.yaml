  <h2>v1.1.2</h2>\n<h3>Added</h3>\n<ul>\n<li><code>index_for_name</code>, <code>index_for_path</code>,\
  \ <code>name_for_index</code>: get the index of a file given its path or vice-versa,\
  \ without\ninitializing metadata from the local-file header or needing to mutably\
  \ borrow the <code>ZipArchive</code>.</li>\n<li><code>add_symlink_from_path</code>,\
  \ <code>shallow_copy_file_from_path</code>, <code>deep_copy_file_from_path</code>,\
  \ <code>raw_copy_file_to_path</code>: copy a\nfile or create a symlink using <code>AsRef&lt;Path&gt;</code>\
  \ arguments</li>\n</ul>\n<h3>Changed</h3>\n<ul>\n<li><code>add_directory_from_path</code>\
  \ and <code>start_file_from_path</code> are no longer deprecated, and they now normalize\
  \ <code>..</code> as well as\n<code>.</code>.</li>\n</ul>\n</blockquote>\n</details>\n\
