introducing_pr_title: Bump reqwest from 0.11.23 to 0.11.24
introducing_pr_body: "Bumps [reqwest](https://github.com/seanmonstar/reqwest) from\
  \ 0.11.23 to 0.11.24.\n<details>\n<summary>Release notes</summary>\n<p><em>Sourced\
  \ from <a href=\"https://github.com/seanmonstar/reqwest/releases\">reqwest's releases</a>.</em></p>\n\
  <blockquote>\n<h2>v0.11.24</h2>\n<h2>What's Changed</h2>\n<ul>\n<li>Add <code>Certificate::from_pem_bundle()</code>\
  \ to add a bundle.</li>\n<li>Add <code>http3_prior_knowledge()</code> to blocking\
  \ client builder.</li>\n<li>Remove <code>Sync</code> bounds requirement for <code>Body::wrap_stream()</code>.</li>\n\
  <li>Fix HTTP/2 to retry <code>REFUSED_STREAM</code> requests.</li>\n<li>Fix instances\
  \ of converting <code>Url</code> to <code>Uri</code> that could panic.</li>\n</ul>\n\
  <h2>New Contributors</h2>\n<ul>\n<li><a href=\"https://github.com/magurotuna\"><code>@\u200B\
  magurotuna</code></a> made their first contribution in <a href=\"https://redirect.github.com/seanmonstar/reqwest/pull/2081\"\
  >seanmonstar/reqwest#2081</a></li>\n<li><a href=\"https://github.com/michaelciraci\"\
  ><code>@\u200Bmichaelciraci</code></a> made their first contribution in <a href=\"\
  https://redirect.github.com/seanmonstar/reqwest/pull/2102\">seanmonstar/reqwest#2102</a></li>\n\
  <li><a href=\"https://github.com/basic-bgnr\"><code>@\u200Bbasic-bgnr</code></a>\
  \ made their first contribution in <a href=\"https://redirect.github.com/seanmonstar/reqwest/pull/2110\"\
  >seanmonstar/reqwest#2110</a></li>\n<li><a href=\"https://github.com/jgraef\"><code>@\u200B\
  jgraef</code></a> made their first contribution in <a href=\"https://redirect.github.com/seanmonstar/reqwest/pull/2114\"\
  >seanmonstar/reqwest#2114</a></li>\n<li><a href=\"https://github.com/LucasPickering\"\
  ><code>@\u200BLucasPickering</code></a> made their first contribution in <a href=\"\
  https://redirect.github.com/seanmonstar/reqwest/pull/2040\">seanmonstar/reqwest#2040</a></li>\n\
  <li><a href=\"https://github.com/gibbz00\"><code>@\u200Bgibbz00</code></a> made\
  \ their first contribution in <a href=\"https://redirect.github.com/seanmonstar/reqwest/pull/2032\"\
  >seanmonstar/reqwest#2032</a></li>\n</ul>\n<p><strong>Full Changelog</strong>: <a\
  \ href=\"https://github.com/seanmonstar/reqwest/compare/v0.11.23...v0.11.24\">https://github.com/seanmonstar/reqwest/compare/v0.11.23...v0.11.24</a></p>\n\
  </blockquote>\n</details>\n<details>\n<summary>Changelog</summary>\n<p><em>Sourced\
  \ from <a href=\"https://github.com/seanmonstar/reqwest/blob/master/CHANGELOG.md\"\
  >reqwest's changelog</a>.</em></p>\n<blockquote>\n<h2>v0.11.24</h2>\n<ul>\n<li>Add\
  \ <code>Certificate::from_pem_bundle()</code> to add a bundle.</li>\n<li>Add <code>http3_prior_knowledge()</code>\
  \ to blocking client builder.</li>\n<li>Remove <code>Sync</code> bounds requirement\
  \ for <code>Body::wrap_stream()</code>.</li>\n<li>Fix HTTP/2 to retry <code>REFUSED_STREAM</code>\
  \ requests.</li>\n<li>Fix instances of converting <code>Url</code> to <code>Uri</code>\
  \ that could panic.</li>\n</ul>\n</blockquote>\n</details>\n<details>\n<summary>Commits</summary>\n\
  <ul>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/c9b4b654cb804a8f5ca6b6f768758868ca7d36c3\"\
  ><code>c9b4b65</code></a> v0.11.24</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/ddf7f24dcadb9a310b52300c531fe516a05e0c43\"\
  ><code>ddf7f24</code></a> Add Certificate::from_pem_bundle() (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2032\"\
  >#2032</a>)</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/5d8443ddde43f184c245949b7c4c16c850ffd9cd\"\
  ><code>5d8443d</code></a> fix panic when parsing invalid Url to Uri (<a href=\"\
  https://redirect.github.com/seanmonstar/reqwest/issues/2040\">#2040</a>)</li>\n\
  <li><a href=\"https://github.com/seanmonstar/reqwest/commit/e3bf09006608015b565cbd22fc11589e91879c4d\"\
  ><code>e3bf090</code></a> docs: explain TLS backend features better (<a href=\"\
  https://redirect.github.com/seanmonstar/reqwest/issues/2117\">#2117</a>)</li>\n\
  <li><a href=\"https://github.com/seanmonstar/reqwest/commit/1bd939ba15bb1a673e1e9187d3773033b42cc6b6\"\
  ><code>1bd939b</code></a> update wasm-streams dependency (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2114\"\
  >#2114</a>)</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/87cdf12d3fbc175f1c5a6a06fd5940d6df75fed0\"\
  ><code>87cdf12</code></a> doc: clarify Cookie API usage (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2111\"\
  >#2111</a>)</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/b3feff6bd80d78d4f16c300ff92bf4c74eaa87d7\"\
  ><code>b3feff6</code></a> Add http3 feature to blocking client (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2110\"\
  >#2110</a>)</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/23329363c68afd7d5e30bcf603060f7af34f7b8c\"\
  ><code>2332936</code></a> Update cookie crates (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2089\"\
  >#2089</a>)</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/ef2c8ee50f25717755e3cb4410e3e6480f46d29a\"\
  ><code>ef2c8ee</code></a> Upgrading env_logger dep (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2102\"\
  >#2102</a>)</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/4ab5fb031c1d4672c685cb158e2cc6c644346fe2\"\
  ><code>4ab5fb0</code></a> Fix HTTP/2: retry requests rejected with <code>REFUSED_STREAM</code>\
  \ (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2081\">#2081</a>)</li>\n\
  <li>Additional commits viewable in <a href=\"https://github.com/seanmonstar/reqwest/compare/v0.11.23...v0.11.24\"\
  >compare view</a></li>\n</ul>\n</details>\n<br />\n\n\n[![Dependabot compatibility\
  \ score](https://dependabot-badges.githubapp.com/badges/compatibility_score?dependency-name=reqwest&package-manager=cargo&previous-version=0.11.23&new-version=0.11.24)](https://docs.github.com/en/github/managing-security-vulnerabilities/about-dependabot-security-updates#about-compatibility-scores)\n\
