introducing_pr_title: '[Feature] Support program upgrades.'
introducing_pr_body: "This PR supports program upgradability in Leo.\r\nTo that end\
  \ we:\r\n- introduce a new command `leo upgrade` which is used to deploy the upgrade\
  \ to the network.\r\n- supports upgrade configurations in the manifest.\r\n- adds\
  \ support for constructors in the compiler. The compiler also checks that certain\
  \ default constructors are well formed.\r\n- refactors the `Network` trait from\
  \ the compiler.\r\nand also closes:\r\n- #28678 \r\n- #28673 \r\n\r\nSee [this](https://github.com/ProvableHQ/snarkVM/issues/2654)\
  \ issue to track `snarkVM` support.\r\n\r\nSee the [examples](https://github.com/ProvableHQ/leo-examples/pull/7)\
  \ for more information.\r\n\r\n**To Reviewers.** This PR has ballooned since it's\
  \ inception. Let me know if you'd like me to break it up into pieces."
