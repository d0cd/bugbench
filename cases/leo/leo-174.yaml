  >seanmonstar/reqwest#2245</a></li>\n</ul>\n</blockquote>\n</details>\n<details>\n\
  <summary>Changelog</summary>\n<p><em>Sourced from <a href=\"https://github.com/seanmonstar/reqwest/blob/master/CHANGELOG.md\"\
  >reqwest's changelog</a>.</em></p>\n<blockquote>\n<h2>v0.12.4</h2>\n<ul>\n<li>Add\
  \ <code>zstd</code> support, enabled with <code>zstd</code> Cargo feature.</li>\n\
  <li>Add <code>ClientBuilder::read_timeout(Duration)</code>, which applies the duration\
  \ for each read operation. The timeout resets after a successful read.</li>\n</ul>\n\
  </blockquote>\n</details>\n<details>\n<summary>Commits</summary>\n<ul>\n<li><a href=\"\
  https://github.com/seanmonstar/reqwest/commit/de5dbb1ab849cc301dcefebaeabdf4ce2e0f1e53\"\
