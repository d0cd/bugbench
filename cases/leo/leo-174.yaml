introducing_pr_body: "Bumps [reqwest](https://github.com/seanmonstar/reqwest) from\
  \ 0.12.3 to 0.12.4.\n<details>\n<summary>Release notes</summary>\n<p><em>Sourced\
  \ from <a href=\"https://github.com/seanmonstar/reqwest/releases\">reqwest's releases</a>.</em></p>\n\
  <blockquote>\n<h2>v0.12.4</h2>\n<h2>What's Changed</h2>\n<ul>\n<li>Add <code>zstd</code>\
  \ support, enabled with <code>zstd</code> Cargo feature (thanks <a href=\"https://github.com/paolobarbolini\"\
  ><code>@\u200Bpaolobarbolini</code></a>!)</li>\n<li>Add <code>ClientBuilder::read_timeout(Duration)</code>,\
  \ which applies the duration for each read operation. The timeout resets after a\
  \ successful read.</li>\n</ul>\n<h2>New Contributors</h2>\n<ul>\n<li><a href=\"\
  https://github.com/SamuelMarks\"><code>@\u200BSamuelMarks</code></a> made their\
