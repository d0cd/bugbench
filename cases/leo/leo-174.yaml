fix_pr_title: Bump reqwest from 0.12.4 to 0.12.5
fix_pr_body: "Bumps [reqwest](https://github.com/seanmonstar/reqwest) from 0.12.4\
  \ to 0.12.5.\n<details>\n<summary>Release notes</summary>\n<p><em>Sourced from <a\
  \ href=\"https://github.com/seanmonstar/reqwest/releases\">reqwest's releases</a>.</em></p>\n\
  <blockquote>\n<h2>v0.12.5</h2>\n<h2>What's Changed</h2>\n<ul>\n<li>Add <code>http3</code>\
  \ feature back, still requiring <code>reqwest_unstable</code>.</li>\n<li>Add <code>rustls-tls-no-provider</code>\
  \ Cargo feature to use rustls without a crypto provider.</li>\n<li>Add <code>blocking::ClientBuilder::dns_resolver()</code>\
  \ method to change DNS resolver in blocking client.</li>\n<li>Fix <code>Accept-Encoding</code>\
  \ header combinations.</li>\n<li>Fix http3 resolving IPv6 addresses.</li>\n<li>Internal:\
  \ upgrade to rustls 0.23.</li>\n</ul>\n<h2>New Contributors</h2>\n<ul>\n<li><a href=\"\
  https://github.com/bnjmnjrk\"><code>@\u200Bbnjmnjrk</code></a> made their first\
