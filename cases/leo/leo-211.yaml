fix_pr_body: "Bumps [serde](https://github.com/serde-rs/serde) from 1.0.199 to 1.0.200.\n\
  <details>\n<summary>Release notes</summary>\n<p><em>Sourced from <a href=\"https://github.com/serde-rs/serde/releases\"\
  >serde's releases</a>.</em></p>\n<blockquote>\n<h2>v1.0.200</h2>\n<ul>\n<li>Fix\
  \ formatting of &quot;invalid type&quot; and &quot;invalid value&quot; deserialization\
  \ error messages containing NaN or infinite floats (<a href=\"https://redirect.github.com/serde-rs/serde/issues/2733\"\
  >#2733</a>, thanks <a href=\"https://github.com/jamessan\"><code>@\u200Bjamessan</code></a>)</li>\n\
