description: The interpreter's cursor duplicated futures in its output because it
  extended the futures vector at every processing step of an Element::Expression,
  rather than only on the final step. The fix adds a guard condition (checking if
  the call is user-initiated) so that futures are only collected once, preventing
  duplicate async call entries in the output.
expected_findings:
- file: interpreter/src/cursor.rs
  line: 1315
  summary: 'Missing guard: futures vector is extended on every intermediate processing
    step of Element::Expression, causing duplicate futures. Should only extend futures
    on the final (user-initiated) step.'
