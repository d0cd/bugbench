fix_pr_title: '[Fix] Futures in Tuples'
fix_pr_body: "Fixes #28312\r\n\r\nDesign choices:\r\n- Using `eq_flat_relaxed` over\
  \ `eq_flat` in TYC:\r\n    - ST makes sure that if we have multiple structs of the\
  \ same name, then there is an error (before TYC starts). \r\n    - `eq_flat` for\
  \ strict equality, `eq_flat_relaxed` for relaxed equality. (When future is not explicit\
  \ or struct matches but program origin is different).\r\n- For [change](https://github.com/ProvableHQ/leo/blob/1d1d01aeeee42eeb3d9343fc4cd61c959a99589c/compiler/passes/src/type_checking/check_expressions.rs#L152)\
  \ we could use `.eq_flat_relaxed` instead of `self.check_eq_types` but I thought\
  \ it would be nice to have consistent usage of `check_eq_types` throughout TYC."
