description: Reverse loop iteration in the Leo compiler did not correctly compute
  the loop bound. The fix adds the range value (currently always 1) to the loop values
  to produce the correct iteration bound, ensuring reverse loops like `for i in 9..0`
  iterate over the proper set of values.
