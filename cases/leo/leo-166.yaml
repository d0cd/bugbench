fix_pr_body: 'Bumps [ureq](https://github.com/algesten/ureq) from 2.9.7 to 2.10.0.

  <details>

  <summary>Changelog</summary>

  <p><em>Sourced from <a href="https://github.com/algesten/ureq/blob/main/CHANGELOG.md">ureq''s
  changelog</a>.</em></p>

  <blockquote>

  <h1>2.10.0</h1>

  <ul>

  <li>Bump MSRV 1.61 -&gt; 1.63 due to rustls (<a href="https://redirect.github.com/algesten/ureq/issues/764">#764</a>)</li>

  <li>Update deps (only patch versions in Cargo.lock) (<a href="https://redirect.github.com/algesten/ureq/issues/763">#763</a>)</li>

  <li>Refork frewsxcv/rust-chunked-transfer to fix MIT/Apache2.0 license (<a href="https://redirect.github.com/algesten/ureq/issues/761">#761</a>)</li>

  <li>Fix doc Rustls does now support IP address certificates (<a href="https://redirect.github.com/algesten/ureq/issues/759">#759</a>)</li>

  <li>Enable http-crate feature for docs (<a href="https://redirect.github.com/algesten/ureq/issues/755">#755</a>)</li>

  <li>Rustls dep to default to ring backend (<a href="https://redirect.github.com/algesten/ureq/issues/753">#753</a>)</li>

  <li>Remove direct dep rustls-webpki (<a href="https://redirect.github.com/algesten/ureq/issues/752">#752</a>)</li>

  </ul>

  </blockquote>

  </details>

  <details>

  <summary>Commits</summary>

  <ul>

  <li><a href="https://github.com/algesten/ureq/commit/1cad58f5a4f359e318858810de51666d63de70e8"><code>1cad58f</code></a>
  2.10.0</li>

  <li><a href="https://github.com/algesten/ureq/commit/3b348124db884dd3cf87e519ee525cb0e5ac4706"><code>3b34812</code></a>
  Update changelog</li>

  <li><a href="https://github.com/algesten/ureq/commit/733048f09293bce874ea9b6a940f0b818abba2d4"><code>733048f</code></a>
  Update deps</li>

  <li><a href="https://github.com/algesten/ureq/commit/dc3b43d6790de4cd0369daef87d6c048023ff0d1"><code>dc3b43d</code></a>
  Bump MSRV 1.61 -&gt; 1.63</li>

  <li><a href="https://github.com/algesten/ureq/commit/24828c063802563438eab7988e978dba0ef0f74c"><code>24828c0</code></a>
  rustls default to ring backend</li>

  <li><a href="https://github.com/algesten/ureq/commit/42bffb7363c89d9a6bc3400a1892125a15767222"><code>42bffb7</code></a>
  Handle missing \r\n with connection close</li>

  <li><a href="https://github.com/algesten/ureq/commit/96061c6aa201869edfb31cefe8fc047b21c75ccd"><code>96061c6</code></a>
  Refork frewsxcv/rust-chunked-transfer under MIT license</li>

  <li><a href="https://github.com/algesten/ureq/commit/a138d2e21a7e2adc981f17a3443a333b27498ea1"><code>a138d2e</code></a>
  Rustls supports IP SANs since 0.21.0</li>

  <li><a href="https://github.com/algesten/ureq/commit/5ed699d8986528c77519001ea895f571d783b0eb"><code>5ed699d</code></a>
  Enable <code>http-crate</code> feature while building docs</li>

  <li><a href="https://github.com/algesten/ureq/commit/6171608503c924498c394ec8588d4a41cfd78a72"><code>6171608</code></a>
  Remove direct dep on rustls-webpki</li>

  <li>Additional commits viewable in <a href="https://github.com/algesten/ureq/compare/2.9.7...2.10.0">compare
  view</a></li>

  </ul>

  </details>

  <br />



