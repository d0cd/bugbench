  summary: Missing `One` and `AffineCurve` trait imports needed to support `1group`
    generator point syntax for Edwards BLS12 curves
- file: compiler/src/group/mod.rs
  line: 4
  summary: Missing `One` trait import in group module; without it, the group type
    cannot resolve the multiplicative identity (`1group`) to the curve generator
- file: examples/pedersen_hash/src/main.leo
