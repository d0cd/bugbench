description: The Leo compiler's group type did not support `1group` syntax, which
  should produce the affine generator point of the Edwards BLS12 curve. The fix adds
  `One` trait imports (`AffineCurve`, `One`, `TEModelParameters`) to the group implementation
  in `edwards_bls12.rs` and `mod.rs`, and implements the logic to return the curve's
  generator when `1group` is used. A test case and updated pedersen hash example using
  `[1group; 256]` were also added.
expected_findings:
