description: The `get_indicator_value` method in statement.rs called `.unwrap()` on
  an `Option` returned by the `eq` method on an indicator boolean gadget. When `console.log`
  was used inside a conditional statement, this `Option` could be `None`, causing
  a panic. The fix replaces the bare `.unwrap()` with a fallback to `false` when the
  value is `None`.
expected_findings:
- file: compiler/src/statement/statement.rs
  line: 143
  summary: "Unsafe `.unwrap()` on `Option` returned by indicator boolean `eq` \u2014\
    \ will panic with `None` when console methods are called inside conditional blocks.\
    \ Should use `.unwrap_or(false)` or equivalent safe default."
