  \ to 3.12.0.\n<details>\n<summary>Changelog</summary>\n<p><em>Sourced from <a href=\"\
  https://github.com/Stebalien/tempfile/blob/master/CHANGELOG.md\">tempfile's changelog</a>.</em></p>\n\
  <blockquote>\n<h2>3.12.0</h2>\n<ul>\n<li>Add a <code>keep(keep: bool)</code> function\
  \ to builder that suppresses delete-on-drop behavior (thanks to <a href=\"https://github.com/RalfJung\"\
  ><code>@\u200BRalfJung</code></a>).</li>\n<li>Update <code>windows-sys</code> from\
