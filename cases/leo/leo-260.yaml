bug_description: "Closes #28722\r\n\r\nThis PR removes the call to the type checker\
  \ from the interpreter which was causing the problem in #28722. Instead, type inference\
  \ is now done manually in the interpreter. The way this works is by adding an optional\
  \ `expected_ty` to each `Expression` frame when it's pushed. The expected ty is\
  \ used to evaluate unsuffixed values, if possible.\r\n\r\nThe example test now works\
  \ again.\r\n\r\nI encountered a few issues along the way such as:\r\n1. Scalar comparisons\
  \ didn't work before and now they do.\r\n2. External structs weren't working at\
  \ all but now they do as well. However, I'm unable to add a test for that for now."
