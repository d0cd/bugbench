issue_bodies:
  '28722': "## \U0001F41B Bug Report\n\nThe `leo test` command fails to recognize\
    \ async functions when attempting to call them in test files, throwing error `ETYC0372111:\
    \ The async function 'function_name' does not exist` even when the function is\
    \ properly defined as an async transition in the main program. This makes it impossible\
    \ to test async transitions using the built-in Leo testing framework.\n\nThis\
    \ bug affects the ability to write comprehensive tests for Leo programs that use\
    \ async transitions, which is a core feature of the Aleo ecosystem. The issue\
    \ persists even with the official Leo examples.\n\n## Steps to Reproduce\n\nThis\
    \ issue can be reproduced using the official Leo example from the repository at\
    \ [example_with_test](https://github.com/ProvableHQ/leo-examples/tree/f0ebf32809001ce0e9794fa2dd9643cdee42e53b/example_with_test)\n\
    \n#### Code snippet to reproduce\n```leo\n\n// In main program file (example_program.leo)\n\
    async transition set_mapping(val: u32) -> Future {\n    return finalize_set_mapping(val);\n\
    }\n\nasync function finalize_set_mapping(val: u32) {\n    Mapping::set(account,\
    \ val);\n}\n\n// In test file (test_example_program.leo)\n@test\nfunction test_set_mapping()\
    \ {\n    let VAL: u32 = 1u32;\n    let fut: Future = example_program.aleo/set_mapping(VAL);\n\
    \    // Test continues...\n}\n```\n\nRun the command:\n\n```bash\nleo test\n```\n\
    \n#### Stack trace & error message\n```bash\n leo test\n       Leo     10 statements\
    \ before dead code elimination.\n       Leo     10 statements after dead code\
    \ elimination.\n       Leo \u2705 Compiled 'example_program.aleo' into Aleo instructions\n\
    \       Leo     18 statements before dead code elimination.\n       Leo     18\
    \ statements after dead code elimination.\n       Leo \u2705 Compiled 'test_example_program.aleo'\
    \ into Aleo instructions\nError [ETYC0372111]: The async function `set_mapping`\
    \ does not exist.\n    --> /home/angelos/Documents/work/axelar-aleo/temp/example_with_test/tests/test_example_program.leo:22:27\n\
    \     |\n  22 |         let fut: Future = example_program.aleo/set_mapping(VAL);\n\
    \     |                           ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^\n    \
    \ |\n     = Ensure that `set_mapping` is defined as an async function in the current\
    \ program.\n```\n\n## Expected Behavior\n\nThe leo test command should successfully\
    \ recognize and call async transitions defined in the main program when referenced\
    \ from test files. The test should execute without throwing the \"async function\
    \ does not exist\" error, allowing developers to properly test their async transitions.\n\
    \nThe expected behavior is that the test compiles and runs successfully, testing\
    \ the async transition functionality as intended.\n\n## Your Environment\nLeo\
    \ version: tag: 2.7.1, and mainnet commit: 72c6bebf5266f766a1cec6f2641e6eed61549e28\n\
    Rust version: cargo 1.89.0-nightly (2251525ae 2025-06-16)\n\n\n"
