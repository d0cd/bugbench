fix_pr_title: Update comment about Pedersen hash types.
fix_pr_body: "Previously we intended to be more flexible with type checking for Pedersen\
  \ hashes and allow composite types, but it turns out disallowing composite types\
  \ is the right idea.\r\n\r\nFixes #28484, #28482"
