introducing_pr_title: Refactor and improve type checking.
introducing_pr_body: "Superfluous contants like `ADDRESS_TYPE` in checker.rs\r\nare\
  \ removed, along with some of the `assert_*_type` methods.\r\n\r\nTypeChecker's\
  \ implementation of ExpressionVisitor\r\nhas `Output = Type` rather than `Output\
  \ = Some(Type)`,\r\nand its methods return `Type::Err` on errors rather than None.\r\
  \n\r\nMany functions in that implementation have a simpler implementation\r\nwith\
  \ fewer levels of nesting.\r\n\r\nIntroduced new errors for TypeCheckerError:\r\n\
  \r\n`type_should_be2` is a replacement for `type_should_be`\r\nwith a better message.\
  \ Also various `_mismatch` errors\r\nfor operators with incorrectly typed operands.\r\
  \n\r\nIntroduce `equal_user` for comparing whether two\r\ntypes are equal as seen\
  \ by the user - only difference between\r\nthe older eq_flat is it takes into account\
  \ current\r\nprogram name when comparing composite types\r\n\r\nDisplay CompositeType\
  \ with program name if present.\r\n\r\nParse CompositeType without program name\
  \ if it's not present.\r\n\r\nCatch type errors previously not caught:\r\n\r\n*\
  \ transition call after async function call (this should eventually\r\n be allowed,\
  \ but it will require changes to codegen)\r\n\r\n* Abs operand type\r\n\r\n* Binary\
  \ operation operand type\r\n\r\n* Comparing record types with the same name but\
  \ different programs\r\n\r\n* Ternary conditional operands not being the same type\r\
  \n\r\n(Some of these errors were caught before only in the case that their\r\nvisitor\
  \ received an expected type as addtional input.)"
