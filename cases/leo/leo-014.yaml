fix_pr_title: 'fix(cli): remove duplicate `EnvOptions` flatten in `devnode` subcommands'
fix_pr_body: "`EnvOptions` fields use `global = true`, so flattening at both `LeoDevnode`\
  \ (parent) and `Start`/`Advance` (subcommands) caused clap's debug assertions to\
  \ detect duplicate global arg registration, crashing `leo devnode start` in debug\
  \ builds.\r\n\r\nRemove the `EnvOptions` flatten from `Start` and `Advance`. Pass\
  \ the private key from the parent's `EnvOptions` through `Start::apply` via `type\
  \ Input = Option<String>`, matching the pattern used by `LeoQuery`.\r\n\r\nCloses\
  \ #29125 "
