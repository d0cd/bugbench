introducing_pr_body: "<!--\r\n    Thank you for submitting the PR! We appreciate you\
  \ spending the time to work on these changes.\r\n\r\n    Help us understand your\
  \ motivation by explaining why you decided to make this change.\r\n\r\n    Happy\
  \ contributing!\r\n-->\r\n\r\n## Motivation\r\n\r\nDevnode is a new tool that creates\
  \ a local development network to enable developers to rapidly test and iterate through\
  \ Aleo program design.\r\n\r\nleo devnode has two commands: `leo devnode start --private-key\
  \ APrivateKey1zkp8CZNn3yeCseEtxuVPbDCwSyhGW6yZKUYKfgXmcpoGPWH` which creates a local\
  \ network at localhost:3030 and `leo devnode advance` which creates a block and\
  \ adds it to the ledger. `leo devnode advance` takes an optional value n which advances\
  \ the ledger by n blocks. Default value is 1.\r\n\r\nFurthermore, this PR adds a\
  \ `--skip-execute-proof` flag for leo execute commands along with a `--skip-deploy-certificate`\
  \ for program deployment transactions.\r\n\r\n## JS SDK tests\r\nReviewers are welcome\
  \ to use the JS SDK Devnode support methods in this script:  https://github.com/ProvableHQ/sdk/tree/mainnet/create-leo-app/template-devnode-js\r\
  \n"
