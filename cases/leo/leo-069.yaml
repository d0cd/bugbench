introducing_pr_number: 28538
introducing_pr_title: Simplify test framework.
introducing_pr_body: "Previously the test framework had somewhat redundant concepts,\r\
  \nlike namespaces and categories, and was pretty complicated.\r\n\r\nNow there's\
  \ just a category (corresponding to a subdirectory of\r\n`tests`), and a test runner\
  \ simply accepts a test as a `&str` and\r\nreturns a `String`. A test fails if it\
  \ panics or if its output\r\ndoesn't match the previously generated output. An \"\
  expected failure\"\r\ncan be handled by the test runner returning a string representing\r\
  \nthe error(s).\r\n\r\nCompiler tests no longer emit hashes of the AST. This made\
  \ our\r\ncommits a lot bigger and was an extra pain when changing passes that\r\n\
  ultimately led to the same code output. In the future if it seems\r\nlike it'd be\
  \ useful I'll implement another easy way to compare pass\r\noutputs from different\
  \ runs of the compiler.\r\n\r\nAlso:\r\n\r\n* Compiler tests now use the pass structure\
  \ from the compiler,\r\nrather than duplicating it.\r\n\r\n* The test framework\
  \ is now in the base directory of the repo.\r\n\r\n* Manually implemented (de)serialization\
  \ for Identifier and\r\nProgramId is gone.\r\n\r\n* Serialization tests are gone."
