description: 'Three bugs found during documentation writing: (1) `eq` and `ne` operators
  had incorrect precedence, not matching other relational comparators; (2) the `address`
  keyword was missing from the protected/reserved names list in the parser grammar;
  (3) successful compilation of `lib.leo` files silently discarded the result (`let
  _program =`) instead of printing a success message to console.'
expected_findings:
- file: ast/src/ast.rs
  line: 45
  summary: 'Operator precedence bug: `eq` and `ne` are defined at a different precedence
    level than other relational comparators (`lt`, `le`, `gt`, `ge`); they should
    all share the same precedence.'
- file: ast/src/leo.pest
  line: 9
  summary: 'Missing protected keyword: `address` is not included in the protected/reserved
    names list, allowing it to be used as an identifier when it should be reserved.'
- file: leo/commands/build.rs
  line: 55
  summary: 'Silent discard: `let _program =` suppresses the compilation result for
    `lib.leo` without printing a success message to the console. The underscore prefix
    silences the unused variable warning.'
