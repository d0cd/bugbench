  <h3>Compatiblity</h3>

  <ul>

  <li><em>(unstable-ext)</em> <code>Arg::remove</code> changed return types</li>

  </ul>

  <h3>Fixes</h3>

  <ul>

  <li><em>(unstable-ext)</em> Make <code>Arg::remove</code> return the removed item</li>

  </ul>

  <h2>[4.5.14] - 2024-08-08</h2>

  <h3>Features</h3>

