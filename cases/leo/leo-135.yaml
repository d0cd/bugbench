  <details>

  <summary>Release notes</summary>

  <p><em>Sourced from <a href="https://github.com/clap-rs/clap/releases">clap''s releases</a>.</em></p>

  <blockquote>

  <h2>v4.5.15</h2>

  <h2>[4.5.15] - 2024-08-10</h2>

  <h3>Compatiblity</h3>

  <ul>

  <li><em>(unstable-ext)</em> <code>Arg::remove</code> changed return types</li>

  </ul>

  <h3>Fixes</h3>

  <ul>

  <li><em>(unstable-ext)</em> Make <code>Arg::remove</code> return the removed item</li>

  </ul>

  <h2>v4.5.14</h2>

  <h2>[4.5.14] - 2024-08-08</h2>

  <h3>Features</h3>

  <ul>

  <li><em>(unstable-ext)</em> Added <code>Arg::add</code> for attaching arbitrary
  state, like completion hints, to <code>Arg</code> without <code>Arg</code> knowing
  about it</li>

  </ul>

  </blockquote>

