introducing_pr_title: Rework program imports + external structs
introducing_pr_body: "This PR changes how program imports work when they are available\
  \ as actual Leo programs. Previously, such imports would be complied separately\
  \ then decompiled as stubs. Now, they are compiled with the primary program simultaneously.\
  \ The goal is for programs to be able to share high level features that are not\
  \ present in Aleo assembly such as option types, non-mapping storage types, const\
  \ generics, etc. That being said, those things aren't supported just yet. This PR\
  \ simply aims at changing how imports work without introducing new features.\r\n\
  \r\nThe changes in this PR are fairly simple but it did take a while to get everything\
  \ working correctly because a lot of features and compiler internals relied on the\
  \ fact that all dependencies are stubs generated from Aleo programs.\r\n\r\nThings\
  \ to note:\r\n1. A stub can now be a `FromLeo(Program)` or a `FromAleo(AleoProgram)`.\r\
  \n2. Stubs are still flattened in the top level program like before. It is assumed\
  \ that they are fed by the package manager in correct dependency order.\r\n3. The\
  \ symbol table now tracks dependencies using an `imports` map which maps programs\
  \ to the names of the programs they import.\r\n4. `lookup_*` methods for `SymbolTable`\
  \ now consule the `imports` map before trying to return an item.\r\n5. External\
  \ structs are now supported using the locator syntax `external_program.aleo/ExternalStruct`.\
  \ They work as one might expect.\r\n6. Codegen now produces bytecode for the primary\
  \ program and its dependencies.\r\n\r\nCloses #28839"
