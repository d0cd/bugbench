fix_pr_title: '[Feature] Additional validation for leo build'
fix_pr_body: "This PR adds additional validation to `leo build`.\r\nIf Leo produces\
  \ a sequence of programs that cannot be instantiated in a `Process`, an error is\
  \ returned to user.\r\nThis is an internal compiler error, and the user is directed\
  \ to file a bug."
