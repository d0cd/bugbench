description: Bug in the SSA (Static Single Assignment) pass where the order of renaming
  in assignment statements was incorrect. The left-hand side was being renamed before
  the right-hand side, causing the RHS to reference the wrong SSA variable version.
  The fix ensures the RHS is reconstructed first, then the LHS is assigned a new SSA
  name.
expected_findings:
