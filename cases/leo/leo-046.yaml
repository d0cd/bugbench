description: "The tokenizer's unexpected_token error handler used byte-level string\
  \ slicing (e.g., `&input[index..index+1]`) to extract the offending character. For\
  \ multi-byte UTF-8 characters like emoji (\U0001F980), this causes a panic because\
  \ slicing at a non-character boundary is invalid in Rust. The fix replaces byte\
  \ slicing with `.chars().next().unwrap()` to correctly extract the first character\
  \ regardless of its byte width."
expected_findings:
- file: parser/src/tokenizer/mod.rs
  line: 84
  summary: Byte-level string slicing on UTF-8 input will panic on multi-byte characters;
    should use `.chars().next().unwrap()` to safely extract the character at this
    position.
