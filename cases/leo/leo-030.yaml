introducing_pr_ci_status: ''
fix_pr_title: Name Validation pass
fix_pr_body: "This change adds a pass that consolidates checking of names that may\
  \ contain keywords\r\n\r\nIt checks for relevant keywords in:\r\n\r\n* program names\r\
  \n* struct names\r\n* record names\r\n* function names\r\n* struct fields\r\n* record\
  \ fields\r\n\r\nand produce well formatted errors early.\r\n\r\nFix #28764"
