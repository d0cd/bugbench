introducing_pr_number: 28629
introducing_pr_title: Disallow some illegal names
introducing_pr_body: "Specifically, enforce the following rules:\r\n\r\n1. A program\
  \ ID must not contain the keyword \"aleo\" in the program name.\r\n2. A record name\
  \ must not contain the keyword \"aleo\".\r\n3. Record names must not be prefixes\
  \ of other record names.\r\n4. Record entry names must not contain the keyword \"\
  aleo\".\r\n"
introducing_pr_commit_messages: []
introducing_pr_commit_shas: []
introducing_pr_author: mohammadfawaz
introducing_pr_merge_date: '2025-05-21T19:02:28Z'
