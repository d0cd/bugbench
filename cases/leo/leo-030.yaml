description: AST snapshot output files were written without prepending the program
  name to the filename. When compiling programs with imports, multiple programs would
  overwrite each other's AST output files since they all wrote to the same filename
  (e.g., 'initial_input_ast.json'). The fix prepends the program name to the output
  filename to avoid collisions.
expected_findings:
- file: compiler/compiler/src/compiler.rs
  line: 139
  summary: "AST output file written without program name prefix \u2014 will be overwritten\
    \ when compiling programs with imports that also produce AST snapshots"
- file: compiler/compiler/src/compiler.rs
  line: 236
  summary: 'Same issue: input_ast.to_json_file() called without prepending program
    name, causing filename collisions across imported programs'
- file: compiler/compiler/src/test.rs
  line: 233
  summary: "Test expects non-prefixed filename 'test.initial_input_ast.json' \u2014\
    \ should include program name prefix to match the corrected output format"
