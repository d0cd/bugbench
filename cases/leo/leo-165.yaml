description: The `leo test` command reused a single `TestConstraintSystem` object
  across all test cases instead of creating a new one per test, causing constraint
  state to leak between tests. The fix moves the `TestConstraintSystem::new()` call
  inside the per-test loop so each test runs with a fresh constraint system in isolation.
expected_findings:
- file: compiler/src/constraints/constraints.rs
  line: 42
  summary: TestConstraintSystem is created once and shared across multiple tests;
    it should be re-instantiated before each test to ensure isolation
- file: leo/commands/test.rs
  line: 12
  summary: compile_test_constraints is called with a shared constraint system that
    accumulates state across tests, leading to non-isolated test execution
