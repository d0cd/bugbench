introducing_pr_title: '[Feature] Function Inlining'
introducing_pr_body: "This PR provides support for function inlining in Leo.\r\nUsers\
  \ can specify inlined functions in the following way:\r\n```\r\ninline foo(a: u8,\
  \ b: u8) -> u8 { ... }\r\n```\r\nWith this new addition, the rules for functions\
  \ (in the traditional sense) are as follows:\r\n- There are three variants of functions:\
  \ `transition`, `function`, `inline`.\r\n- `transition`s can only call `function`s\
  \ and `inline`s.\r\n- `function`s can only call `inline`s.\r\n- `inline`s can only\
  \ call `inline`s.\r\n- Direct/indirect recursive calls are not allowed (implemented\
  \ in #2178)\r\n"
