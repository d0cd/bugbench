introducing_pr_body: "Bumps [num-traits](https://github.com/rust-num/num-traits) from\
  \ 0.2.17 to 0.2.18.\n<details>\n<summary>Changelog</summary>\n<p><em>Sourced from\
  \ <a href=\"https://github.com/rust-num/num-traits/blob/master/RELEASES.md\">num-traits's\
  \ changelog</a>.</em></p>\n<blockquote>\n<h1>Release 0.2.18 (2024-02-07)</h1>\n\
  <ul>\n<li><a href=\"https://redirect.github.com/rust-num/num-traits/pull/291\">The\
  \ new <code>Euclid::div_rem_euclid</code> and <code>CheckedEuclid::checked_div_rem_euclid</code>\
  \ methods</a>\ncompute and return the quotient and remainder at the same time.</li>\n\
  <li><a href=\"https://redirect.github.com/rust-num/num-traits/pull/295\">The new\
  \ <code>TotalOrder</code> trait implements the IEEE 754 <code>totalOrder</code>\
  \ predicate.</a></li>\n<li><a href=\"https://redirect.github.com/rust-num/num-traits/pull/303\"\
  >The new <code>ConstZero</code> and <code>ConstOne</code> traits offered associated\
  \ constants</a>,\nextending the non-const <code>Zero</code> and <code>One</code>\
  \ traits for types that have constant values.</li>\n</ul>\n<p><strong>Contributors</strong>:\
  \ <a href=\"https://github.com/andrewjradcliffe\"><code>@\u200Bandrewjradcliffe</code></a>,\
  \ <a href=\"https://github.com/cuviper\"><code>@\u200Bcuviper</code></a>, <a href=\"\
  https://github.com/tarcieri\"><code>@\u200Btarcieri</code></a>, <a href=\"https://github.com/tdelabro\"\
  ><code>@\u200Btdelabro</code></a>, <a href=\"https://github.com/waywardmonkeys\"\
  ><code>@\u200Bwaywardmonkeys</code></a></p>\n</blockquote>\n</details>\n<details>\n\
  <summary>Commits</summary>\n<ul>\n<li><a href=\"https://github.com/rust-num/num-traits/commit/eb20b4022c2dd8191ddd1160399d927886830764\"\
  ><code>eb20b40</code></a> Merge pull request <a href=\"https://redirect.github.com/rust-num/num-traits/issues/309\"\
  >#309</a> from cuviper/release-0.2.18</li>\n<li><a href=\"https://github.com/rust-num/num-traits/commit/5c2cc9bf5f42d8298ea2584cbb59549663f2713d\"\
  ><code>5c2cc9b</code></a> Release 0.2.18</li>\n<li><a href=\"https://github.com/rust-num/num-traits/commit/a095b703f39234d20076b30ab45ac792eacbe4cf\"\
  ><code>a095b70</code></a> Merge pull request <a href=\"https://redirect.github.com/rust-num/num-traits/issues/303\"\
  >#303</a> from tarcieri/constant-traits</li>\n<li><a href=\"https://github.com/rust-num/num-traits/commit/67d9e74acc4920777a5591c8bbc1a907da00b3f3\"\
  ><code>67d9e74</code></a> Avoid <code>Self</code> constructor for <code>Wrapping</code></li>\n\
  <li><a href=\"https://github.com/rust-num/num-traits/commit/6ab6de2cf7968dc7e93017ba40eabce5a0920950\"\
  ><code>6ab6de2</code></a> Update src/identities.rs</li>\n<li><a href=\"https://github.com/rust-num/num-traits/commit/e48ffe2118e8733f3715c37319996bd5dbfc59b6\"\
  ><code>e48ffe2</code></a> Update src/identities.rs</li>\n<li><a href=\"https://github.com/rust-num/num-traits/commit/bc42b83117155c84625837ea336691ca119a5b0c\"\
  ><code>bc42b83</code></a> Rename to ConstZero/ConstOne and re-export from toplevel</li>\n\
  <li><a href=\"https://github.com/rust-num/num-traits/commit/536dcf2588ee12a4934329aa08b01e42ed638cda\"\
  ><code>536dcf2</code></a> Remove blanket impls; add impls for <code>Wrapping</code></li>\n\
  <li><a href=\"https://github.com/rust-num/num-traits/commit/06c0ee035cb12a9d3ed1a32e8fde80c04922417f\"\
  ><code>06c0ee0</code></a> Add <code>ZeroConstant</code> and <code>OneConstant</code>\
  \ traits</li>\n<li><a href=\"https://github.com/rust-num/num-traits/commit/29c5b46e8e378bb4be9a6767c855103b9bd2b700\"\
  ><code>29c5b46</code></a> Merge pull request <a href=\"https://redirect.github.com/rust-num/num-traits/issues/308\"\
  >#308</a> from cuviper/ci</li>\n<li>Additional commits viewable in <a href=\"https://github.com/rust-num/num-traits/compare/num-traits-0.2.17...num-traits-0.2.18\"\
  >compare view</a></li>\n</ul>\n</details>\n<br />\n\n\n[![Dependabot compatibility\
