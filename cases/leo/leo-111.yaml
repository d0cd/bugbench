  to 1.0.65.

  <details>

  <summary>Release notes</summary>

  <p><em>Sourced from <a href="https://github.com/dtolnay/thiserror/releases">thiserror''s
  releases</a>.</em></p>

  <blockquote>

  <h2>1.0.65</h2>

  <ul>

  <li>Ensure OUT_DIR is left with deterministic contents after build script execution
  (<a href="https://redirect.github.com/dtolnay/thiserror/issues/325">#325</a>)</li>

  </ul>

  </blockquote>

  </details>

  <details>

  <summary>Commits</summary>

