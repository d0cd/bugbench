introducing_pr_title: Bump reqwest from 0.12.2 to 0.12.3
introducing_pr_body: "Bumps [reqwest](https://github.com/seanmonstar/reqwest) from\
  \ 0.12.2 to 0.12.3.\n<details>\n<summary>Release notes</summary>\n<p><em>Sourced\
  \ from <a href=\"https://github.com/seanmonstar/reqwest/releases\">reqwest's releases</a>.</em></p>\n\
  <blockquote>\n<h2>v0.12.3</h2>\n<h2>What's Changed</h2>\n<ul>\n<li>Add <code>FromStr</code>\
  \ for <code>dns::Name</code>.</li>\n<li>Add <code>ClientBuilder::built_in_webpki_certs(bool)</code>\
  \ to enable them separately.</li>\n<li>Add <code>ClientBuilder::built_in_native_certs(bool)</code>\
  \ to enable them separately.</li>\n<li>Fix sending <code>content-length: 0</code>\
  \ for GET requests.</li>\n<li>Fix response body <code>content_length()</code> to\
  \ return value when timeout is configured.</li>\n<li>Fix <code>ClientBuilder::resolve()</code>\
  \ to use lowercase domain names.</li>\n</ul>\n<h2>New Contributors</h2>\n<ul>\n\
  <li><a href=\"https://github.com/zuisong\"><code>@\u200Bzuisong</code></a> made\
  \ their first contribution in <a href=\"https://redirect.github.com/seanmonstar/reqwest/pull/2207\"\
  >seanmonstar/reqwest#2207</a></li>\n<li><a href=\"https://github.com/djc\"><code>@\u200B\
  djc</code></a> made their first contribution in <a href=\"https://redirect.github.com/seanmonstar/reqwest/pull/2222\"\
  >seanmonstar/reqwest#2222</a></li>\n<li><a href=\"https://github.com/krant\"><code>@\u200B\
  krant</code></a> made their first contribution in <a href=\"https://redirect.github.com/seanmonstar/reqwest/pull/2226\"\
  >seanmonstar/reqwest#2226</a></li>\n<li><a href=\"https://github.com/Kriskras99\"\
  ><code>@\u200BKriskras99</code></a> made their first contribution in <a href=\"\
  https://redirect.github.com/seanmonstar/reqwest/pull/2236\">seanmonstar/reqwest#2236</a></li>\n\
  </ul>\n<p><strong>Full Changelog</strong>: <a href=\"https://github.com/seanmonstar/reqwest/compare/v0.12.2...v0.12.3\"\
  >https://github.com/seanmonstar/reqwest/compare/v0.12.2...v0.12.3</a></p>\n</blockquote>\n\
  </details>\n<details>\n<summary>Changelog</summary>\n<p><em>Sourced from <a href=\"\
  https://github.com/seanmonstar/reqwest/blob/master/CHANGELOG.md\">reqwest's changelog</a>.</em></p>\n\
  <blockquote>\n<h2>v0.12.3</h2>\n<ul>\n<li>Add <code>FromStr</code> for <code>dns::Name</code>.</li>\n\
  <li>Add <code>ClientBuilder::built_in_webpki_certs(bool)</code> to enable them separately.</li>\n\
  <li>Add <code>ClientBuilder::built_in_native_certs(bool)</code> to enable them separately.</li>\n\
  <li>Fix sending <code>content-length: 0</code> for GET requests.</li>\n<li>Fix response\
  \ body <code>content_length()</code> to return value when timeout is configured.</li>\n\
  <li>Fix <code>ClientBuilder::resolve()</code> to use lowercase domain names.</li>\n\
  </ul>\n</blockquote>\n</details>\n<details>\n<summary>Commits</summary>\n<ul>\n\
  <li><a href=\"https://github.com/seanmonstar/reqwest/commit/0720159f6369f54e045a1fd315e0f24b7a0b4a39\"\
  ><code>0720159</code></a> v0.12.3</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/92096952b7257af6a9eea6f94c5be04c418be0e3\"\
  ><code>9209695</code></a> Remove duplicate example for ClientBuilder::default_headers\
  \ (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2236\">#2236</a>)</li>\n\
  <li><a href=\"https://github.com/seanmonstar/reqwest/commit/e3a15650d600f3ab1aa2c6f83dc7567a8677337e\"\
  ><code>e3a1565</code></a> fix: use lower case domain string when using <code>resolve</code>\
  \ and <code>resolve_to_addrs</code>...</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/b4c491a6ffa10418d8bfaa49fc38f2175312f90c\"\
  ><code>b4c491a</code></a> feat: allow fine-grained root certs for rustls (<a href=\"\
  https://redirect.github.com/seanmonstar/reqwest/issues/2232\">#2232</a>)</li>\n\
  <li><a href=\"https://github.com/seanmonstar/reqwest/commit/cf4295d59d614b1b813cacfe97f186fba952a358\"\
  ><code>cf4295d</code></a> chore: update winreg to 0.52.0 (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2226\"\
  >#2226</a>)</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/db25e802bf9a40782e5aac3505a7f1c76b902dd6\"\
  ><code>db25e80</code></a> chore: upgrade base64 to 0.22 (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2224\"\
  >#2224</a>)</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/13e27b75bfa734f4303173b69bcd59ca72463459\"\
  ><code>13e27b7</code></a> fix: response body timeout forwards the size hint</li>\n\
  <li><a href=\"https://github.com/seanmonstar/reqwest/commit/872af0c7bc2d1128f7120e52e2ccb1c365fb94a7\"\
  ><code>872af0c</code></a> refactor: upgrade to rustls-pemfile 2 (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2222\"\
  >#2222</a>)</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/68a3f5803b03393938c39a3794a5a9e5f5264796\"\
  ><code>68a3f58</code></a> fix: stop sending content-length: 0 for GET requests (<a\
  \ href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2207\">#2207</a>)</li>\n\
  <li><a href=\"https://github.com/seanmonstar/reqwest/commit/14e46ff8cb7550473c950f3471d049ad2e139d3f\"\
  ><code>14e46ff</code></a> FromStr trait implementation for Name (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2212\"\
  >#2212</a>)</li>\n<li>See full diff in <a href=\"https://github.com/seanmonstar/reqwest/compare/v0.12.2...v0.12.3\"\
  >compare view</a></li>\n</ul>\n</details>\n<br />\n\n\n[![Dependabot compatibility\
  \ score](https://dependabot-badges.githubapp.com/badges/compatibility_score?dependency-name=reqwest&package-manager=cargo&previous-version=0.12.2&new-version=0.12.3)](https://docs.github.com/en/github/managing-security-vulnerabilities/about-dependabot-security-updates#about-compatibility-scores)\n\
