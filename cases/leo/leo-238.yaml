introducing_pr_title: '[Feature] Support importing local and remote programs.'
introducing_pr_body: "# tldr \r\n- Now super easy to develop leo projects that make\
  \ external calls to on-chain and local programs!\r\n\t- [Battleship v2 - using local\
  \ dependencies](https://github.com/AleoHQ/leo/tree/testnet3/examples/battleship)\r\
  \n\t- [Nested network dependencies](https://github.com/AleoHQ/leo/blob/b85ed71b00bd9e9112f12dc695c952ff8f2ab799/leo/cli/cli.rs#L241-L339)\r\
  \n\t- [Mix of nested local and nested network dependencies](https://github.com/AleoHQ/leo/blob/b85ed71b00bd9e9112f12dc695c952ff8f2ab799/leo/cli/cli.rs#L341-L467)\r\
  \n- Dependencies must be written in `program.json` as well as `main.leo`\r\n- We\
  \ used to write `import credits.leo`, but now we have changed it to `import credits.aleo`\
  \ for consistency. \r\n- In order for external structs to work, they must be defined\
  \ exactly the same in both the external file and the local file. \r\n\r\n\r\n# Motivation\r\
  \n- We want a richer dependency resolution system in Leo. Leo users should be able\
  \ to import programs from chain/local file system as opposed to requiring `.leo`\
  \ source files.\r\n\r\n# Components:\r\n  1. Specify import configurations in `program.json`\r\
  \n  2. `leo build` leverages `retriever` module to pull programs from network/FS\r\
  \n  3. Generate `leo.lock` file to house the dependency configuration \r\n  4. `disassembler.rs`\
  \ to convert Aleo instructions into valid stub\r\n  5. Type checking modification\
  \ to maintain soundness\r\n  6. Codegen modification to print nested imports properly\r\
  \n\r\n# Retriever Design\r\n\r\n## Modifications to `~/.aleo` file structure\r\n\
  \r\n- `.aleo/registry`:\r\n    - `.aleo/registry/git` : Where `.aleo` files from\
  \ `github.com` are stored\r\n    - `.aleo/registry/testnet3`: Where `.aleo` files\
  \ from the network are stored\r\n    - Note that new folders can be added for different\
  \ networks like `./mainnet`\r\n\r\n- Suppose building leo project `dex` and call\
  \ `leo build` with `dex/program.json` set to:\r\n\r\n```json\r\n{\r\n  \"program\"\
  : \"dex.aleo\",\r\n  \"version\": \"0.0.0\",\r\n  \"description\": \"\",\r\n  \"\
  license\": \"MIT\",\r\n  \"dependencies\": [\r\n    {\r\n\t  \"name\": \"credits.aleo\"\
  ,\r\n\t  \"location\": \"network\",\r\n\t\t\"network\": \"testnet3\"\r\n    },\r\
  \n\t{\r\n\t\t\"name\": \"foo.aleo\",\r\n\t\t\"location\": \"git\",\r\n\t\t\"url\"\
  : \"https://github.com/alice/foo.git\"\r\n\t\t\"branch\": \"bar\"\r\n\t\t\"rev\"\
  : \"3ab873bd89de\"\r\n\t\t},\r\n    {\r\n\t  \"name\": \"board.aleo\",\r\n\t  \"\
  location\": \"local\",\r\n\t  \"path\": \"../board\", \r\n    },\r\n  ]\r\n}\r\n\
  ```\r\n\r\n## Specification and example flow\r\n\r\n1. Retrieve imports based on\
  \ configurations specified in `dex/program.json`:\r\n    - Must keep track of nested\
  \ programs trying to build, and throw error for circular dependencies\r\n    - Location\
  \ variations:\r\n\t- `\"location\": \"network\"`:\r\n\t\t- Check if `credits.aleo`\
  \ cached already in `~/.aleo/registry/testnet3/credits.aleo`\r\n\t\t- Retrieve from\
  \ network:\r\n\t\t\t- Store copy in `~/.aleo/registry/testnet3/credits.aleo``\r\n\
  \t\t\t- Update `leo.lock` \r\n\t- `\"location\": \"local\"`: \r\n\t\t- Recursively\
  \ build the directory (must read its `program.json` to see its dependencies)\r\n\
  \t\t- Cache in `.aleo` and update `leo.lock` \r\n\t- `\"location\": \"git\"`: TODO\r\
  \n\t\t- Example: `\"url\": \"<https://github.com/alice/foo.git>\"`\r\n\t\t- Check\
  \ if `board.aleo` cached already as `~/.aleo/registry/git/pranav/foo/board.aleo`\r\
  \n\t\t- Otherwise retrieve from network and cache\r\n\t\t- Allow them to specify\
  \ based on commit + branch\r\n2. Move a copy of the retrieved import(s) into `dex/build/imports/`\r\
  \n3. Convert all imported programs to AST before start parsing `main.leo`\r\n\r\n"
