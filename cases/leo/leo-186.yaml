description: The `PartialEq` implementation for `Identifier` was inconsistent with
  its `Hash` implementation. When hash collisions occurred in `IndexMap` (used for
  all top-level objects), the fallback to `PartialEq` produced incorrect equality
  results, causing random duplicate entries or missed lookups roughly 1% of the time
  across parser and canonicalization stages.
expected_findings:
- file: ast/src/common/identifier.rs
  line: 66
  summary: 'Incomplete `PartialEq` implementation for `Identifier`: does not compare
    all fields used by `Hash`, causing inconsistent behavior on IndexMap hash collisions.'
- file: ast/src/common/identifier.rs
  line: 95
  summary: The `Hash` impl hashes fields that `PartialEq` does not compare, violating
    the Rust contract that `a == b` implies `hash(a) == hash(b)` and vice versa for
    correctness.
- file: compiler/src/statement/assign/assignee/member.rs
  line: 36
  summary: Uses `matches()` method on `Identifier` which relies on the broken `PartialEq`
    implementation, leading to incorrect member lookups when hash collisions occur.
