  <blockquote>\n<h2>v0.12.7</h2>\n<h2>What's Changed</h2>\n<ul>\n<li>Revert adding\
  \ <code>impl Service&lt;http::Request&lt;_&gt;&gt;</code> for <code>Client</code>.</li>\n\
  </ul>\n<p><strong>Full Changelog</strong>: <a href=\"https://github.com/seanmonstar/reqwest/compare/v0.12.6...v0.12.7\"\
  >https://github.com/seanmonstar/reqwest/compare/v0.12.6...v0.12.7</a></p>\n<h2>v0.12.6</h2>\n\
  <h2>What's Changed</h2>\n<ul>\n<li>Add support for <code>danger_accept_invalid_hostnames</code>\
  \ for <code>rustls</code>.</li>\n<li>Add <code>impl Service&lt;http::Request&lt;Body&gt;&gt;</code>\
  \ for <code>Client</code> and <code>&amp;'_ Client</code>.</li>\n<li>Add support\
  \ for <code>!Sync</code> bodies in <code>Body::wrap_stream()</code>.</li>\n<li>Enable\
  \ happy eyeballs when <code>hickory-dns</code> is used.</li>\n<li>Fix <code>Proxy</code>\
  \ so that <code>HTTP(S)_PROXY</code> values take precendence over <code>ALL_PROXY</code>.</li>\n\
  <li>Fix <code>blocking::RequestBuilder::header()</code> from unsetting <code>sensitive</code>\
  \ on passed header values.</li>\n</ul>\n<h2>New Contributors</h2>\n<ul>\n<li><a\
