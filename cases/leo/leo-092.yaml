fix_pr_title: '[Fix] Select fee based on consensus height'
fix_pr_body: This PR allows for execution fees to be determined by block height. If
  the height is greater than the `CONSENSUS_V2_HEIGHT` then the new (cheaper) fee
  calculation is used.
