description: 'Two bugs in Leo''s error handling: (1) UtilError::network_error and
  failed_to_retrieve_from_endpoint were annotated as @formatted (requiring source
  spans) but are raised in contexts without spans, causing panics or misleading errors.
  (2) The Display impl for Formatted errors silently suppressed the error message
  when the source file couldn''t be found, hiding useful diagnostic information from
  users.'
expected_findings:
- file: errors/src/common/formatted.rs
  line: 88
  summary: Display impl silently skips error output when source file lookup fails;
    should still print the error message even if source_map.find_source_file returns
    None
- file: errors/src/errors/utils/util_errors.rs
  line: 61
  summary: network_error is marked @formatted but has no associated span; should be
    @backtraced since it is called from contexts without source locations
- file: errors/src/errors/utils/util_errors.rs
  line: 138
  summary: failed_to_retrieve_from_endpoint is marked @formatted but has no associated
    span; should be @backtraced since it is called from contexts without source locations
