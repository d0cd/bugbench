description: The ABNF-to-Markdown converter in grammar/src/main.rs was missing support
  for `%s` (case-sensitive strings), which is part of the ABNF standard. The converter
  skipped this rule because the Rust ABNF package does not natively support it. The
  fix adds explicit handling for `%s` case-sensitive string literals and updates the
  generated Markdown output accordingly.
expected_findings:
- file: grammar/src/main.rs
  line: 198
  summary: 'Missing handling for ABNF `%s` case-sensitive string rules: the converter
    silently skips `%s` literals instead of converting them to the appropriate Markdown
    representation'
- file: grammar/abnf-grammar.md
