description: 'The signed integer division algorithm fails when dividing by the minimum
  value (e.g., -128 for i8) because it computes the two''s complement of the denominator,
  and the minimum signed integer has no representable inverse. The fix adds special-case
  checks: if the denominator is the minimum value, the result is 1 when numerator
  equals denominator, and 0 otherwise, since division rounds toward zero.'
expected_findings:
- file: gadgets/src/signed_integer/arithmetic/div.rs
  line: 23
  summary: Division algorithm computes two's complement of the denominator without
    checking if the denominator is the minimum signed integer value (e.g., -128 for
    i8), which has no valid two's complement inverse and causes a failure.
- file: gadgets/src/signed_integer/arithmetic/div.rs
  line: 85
  summary: The division macro does not handle the edge case where the denominator
    is the minimum value; needs special-case logic to return 1 (if numerator == denominator)
    or 0 (otherwise).
- file: compiler/tests/integers/int_macro.rs
  line: 115
  summary: Test comment says 'make sure we can calculate the inverse of each number'
    but does not test division by the minimum signed integer value, missing the edge
    case that triggers the bug.
