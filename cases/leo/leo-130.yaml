fix_pr_title: Bump serde from 1.0.209 to 1.0.210
fix_pr_body: "Bumps [serde](https://github.com/serde-rs/serde) from 1.0.209 to 1.0.210.\n\
  <details>\n<summary>Release notes</summary>\n<p><em>Sourced from <a href=\"https://github.com/serde-rs/serde/releases\"\
  >serde's releases</a>.</em></p>\n<blockquote>\n<h2>v1.0.210</h2>\n<ul>\n<li>Support\
  \ serializing and deserializing <code>IpAddr</code> and <code>SocketAddr</code>\
  \ in no-std mode on Rust 1.77+ (<a href=\"https://redirect.github.com/serde-rs/serde/issues/2816\"\
  >#2816</a>, thanks <a href=\"https://github.com/MathiasKoch\"><code>@\u200BMathiasKoch</code></a>)</li>\n\
  <li>Make <code>serde::ser::StdError</code> and <code>serde::de::StdError</code>\
  \ equivalent to <code>core::error::Error</code> on Rust 1.81+ (<a href=\"https://redirect.github.com/serde-rs/serde/issues/2818\"\
  >#2818</a>)</li>\n</ul>\n</blockquote>\n</details>\n<details>\n<summary>Commits</summary>\n\
  <ul>\n<li><a href=\"https://github.com/serde-rs/serde/commit/89c4b02bf32ceae5b17d89f93a452ccc195ca038\"\
  ><code>89c4b02</code></a> Release 1.0.210</li>\n<li><a href=\"https://github.com/serde-rs/serde/commit/eeb8e44cda15f929796cd72241b0311e0bd04e67\"\
  ><code>eeb8e44</code></a> Merge pull request <a href=\"https://redirect.github.com/serde-rs/serde/issues/2818\"\
  >#2818</a> from dtolnay/coreerror</li>\n<li><a href=\"https://github.com/serde-rs/serde/commit/785c2d9605ee73cc172dfd421228c1dccca984c9\"\
  ><code>785c2d9</code></a> Stabilize no-std StdError trait</li>\n<li><a href=\"https://github.com/serde-rs/serde/commit/d549f048e10bcb5e677afaf7b99d0ed3604b113b\"\
  ><code>d549f04</code></a> Reformat parse_ip_impl definition and calls</li>\n<li><a\
  \ href=\"https://github.com/serde-rs/serde/commit/4c0dd63011434905265e2710bb9186e09e4f8ec2\"\
  ><code>4c0dd63</code></a> Delete attr support from core::net deserialization macros</li>\n\
  <li><a href=\"https://github.com/serde-rs/serde/commit/26fb1341651c4e0ae4d58c675db3ca2a0d6e12c2\"\
  ><code>26fb134</code></a> Relocate cfg attrs out of parse_ip_impl and parse_socket_impl</li>\n\
  <li><a href=\"https://github.com/serde-rs/serde/commit/07e614b52b5ab3387d86d3198e5f52cd1f5ff3cb\"\
  ><code>07e614b</code></a> Merge pull request <a href=\"https://redirect.github.com/serde-rs/serde/issues/2817\"\
  >#2817</a> from dtolnay/corenet</li>\n<li><a href=\"https://github.com/serde-rs/serde/commit/b1f899fbe81f070803d9f7ca6e5d1cc3f19c9ea2\"\
  ><code>b1f899f</code></a> Delete doc(cfg) attribute from impls that are supported\
  \ in no-std</li>\n<li><a href=\"https://github.com/serde-rs/serde/commit/b4f860e62767828beb3ef91721b6c56a31f9baad\"\
  ><code>b4f860e</code></a> Merge pull request <a href=\"https://redirect.github.com/serde-rs/serde/issues/2816\"\
  >#2816</a> from MathiasKoch/chore/core-net</li>\n<li><a href=\"https://github.com/serde-rs/serde/commit/d940fe1b4934f097b0333dcb87bec5ee308d39cd\"\
  ><code>d940fe1</code></a> Reuse existing Buf wrapper as replacement for std::io::Write</li>\n\
  <li>Additional commits viewable in <a href=\"https://github.com/serde-rs/serde/compare/v1.0.209...v1.0.210\"\
  >compare view</a></li>\n</ul>\n</details>\n<br />\n\n\n[![Dependabot compatibility\
  \ score](https://dependabot-badges.githubapp.com/badges/compatibility_score?dependency-name=serde&package-manager=cargo&previous-version=1.0.209&new-version=1.0.210)](https://docs.github.com/en/github/managing-security-vulnerabilities/about-dependabot-security-updates#about-compatibility-scores)\n\
