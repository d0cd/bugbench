description: When running `leo devnet` on a machine with an already-running tmux server,
  the CONSENSUS_VERSION_HEIGHTS environment variable was inherited from the existing
  server's environment instead of the current shell. The fix modifies the tmux command
  arguments construction to explicitly set or pass the environment variable so the
  devnet session uses the correct consensus version heights.
expected_findings:
- file: leo/cli/commands/devnet/mod.rs
  line: 344
  summary: Tmux command args do not explicitly set CONSENSUS_VERSION_HEIGHTS; existing
    tmux server will use its own stale environment variables instead of the caller's
    environment
