description: The leo-abnf grammar crate had a dependency conflict with the abnf crate,
  preventing it from being used. The fix patches the abnf dependency to version 0.12.0
  in grammar/Cargo.toml and updates grammar/src/main.rs to work with the new API,
  resolving the dependency conflict and restoring the leo-abnf crate.
