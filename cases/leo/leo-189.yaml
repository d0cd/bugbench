fix_pr_body: "Bumps [backtrace](https://github.com/rust-lang/backtrace-rs) from 0.3.71\
  \ to 0.3.72.\n<details>\n<summary>Release notes</summary>\n<p><em>Sourced from <a\
  \ href=\"https://github.com/rust-lang/backtrace-rs/releases\">backtrace's releases</a>.</em></p>\n\
  <blockquote>\n<h2>0.3.72</h2>\n<p>This release removes a lot of dead code. Some\
  \ feature flags that haven't done anything in a long time are gone. If you depend\
  \ on those features, Cargo's resolver will not update you to 0.3.72.</p>\n<p>If\
  \ your code runs on Windows, or you want it to run on visionOS, however, you should\
  \ probably update to this version. It contains a number of fixes for both OS. It\
  \ also uses the latest version of a number of dependencies.</p>\n<h2>What's Changed</h2>\n\
  <ul>\n<li>Revert &quot;Use rustc from stage0 instead of stage0-sysroot (rust-lang/ba\u2026\
  \ by <a href=\"https://github.com/Nilstrieb\"><code>@\u200BNilstrieb</code></a>\
  \ in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/603\">rust-lang/backtrace-rs#603</a></li>\n\
  <li>Remove dead code by <a href=\"https://github.com/ChrisDenton\"><code>@\u200B\
  ChrisDenton</code></a> in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/605\"\
  >rust-lang/backtrace-rs#605</a></li>\n<li>Fix CI and remove rustc-serialize by <a\
  \ href=\"https://github.com/ChrisDenton\"><code>@\u200BChrisDenton</code></a> in\
  \ <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/596\">rust-lang/backtrace-rs#596</a></li>\n\
  <li>Use correct base address and update comment by <a href=\"https://github.com/ChrisDenton\"\
  ><code>@\u200BChrisDenton</code></a> in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/604\"\
  >rust-lang/backtrace-rs#604</a></li>\n<li>Windows AArch64: Break out of tracing\
  \ when no longer making progress by <a href=\"https://github.com/dpaoliello\"><code>@\u200B\
  dpaoliello</code></a> in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/610\"\
  >rust-lang/backtrace-rs#610</a></li>\n<li>Remove obsolete rustc-serialize references\
  \ by <a href=\"https://github.com/atouchet\"><code>@\u200Batouchet</code></a> in\
  \ <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/614\">rust-lang/backtrace-rs#614</a></li>\n\
  <li>Update <code>object</code> and <code>addr2line</code> dependencies by <a href=\"\
  https://github.com/a1phyr\"><code>@\u200Ba1phyr</code></a> in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/612\"\
  >rust-lang/backtrace-rs#612</a></li>\n<li>Fix tests for rust 1.79 by <a href=\"\
  https://github.com/workingjubilee\"><code>@\u200Bworkingjubilee</code></a> in <a\
  \ href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/621\">rust-lang/backtrace-rs#621</a></li>\n\
  <li>Remove unused <code>libbacktrace</code> and <code>gimli-symbolize</code> features\
  \ by <a href=\"https://github.com/Enselic\"><code>@\u200BEnselic</code></a> in <a\
  \ href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/615\">rust-lang/backtrace-rs#615</a></li>\n\
  <li>remove some instances of dead_code by <a href=\"https://github.com/klensy\"\
  ><code>@\u200Bklensy</code></a> in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/619\"\
  >rust-lang/backtrace-rs#619</a></li>\n<li>Reduce panics in dbghelp by <a href=\"\
  https://github.com/ChrisDenton\"><code>@\u200BChrisDenton</code></a> in <a href=\"\
  https://redirect.github.com/rust-lang/backtrace-rs/pull/608\">rust-lang/backtrace-rs#608</a></li>\n\
  <li>Add Apple visionOS support by <a href=\"https://github.com/QuentinPerez\"><code>@\u200B\
  QuentinPerez</code></a> in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/613\"\
  >rust-lang/backtrace-rs#613</a></li>\n<li>Update cc crate to v1.0.97 by <a href=\"\
  https://github.com/jfgoog\"><code>@\u200Bjfgoog</code></a> in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/623\"\
  >rust-lang/backtrace-rs#623</a></li>\n<li>chore: add docs for the global re-entrant\
  \ lock by <a href=\"https://github.com/Gankra\"><code>@\u200BGankra</code></a> in\
  \ <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/609\">rust-lang/backtrace-rs#609</a></li>\n\
  <li>Test with lld-compatible args by <a href=\"https://github.com/workingjubilee\"\
  ><code>@\u200Bworkingjubilee</code></a> in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/627\"\
  >rust-lang/backtrace-rs#627</a></li>\n<li>Bump rustc-demangle version by <a href=\"\
  https://github.com/michaelwoerister\"><code>@\u200Bmichaelwoerister</code></a> in\
  \ <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/624\">rust-lang/backtrace-rs#624</a></li>\n\
  <li>cleanup dead_code around cpp_demangle feature by <a href=\"https://github.com/klensy\"\
  ><code>@\u200Bklensy</code></a> in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/622\"\
  >rust-lang/backtrace-rs#622</a></li>\n<li>Cut backtrace 0.3.72 by <a href=\"https://github.com/workingjubilee\"\
  ><code>@\u200Bworkingjubilee</code></a> in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/628\"\
  >rust-lang/backtrace-rs#628</a></li>\n</ul>\n<h2>New Contributors</h2>\n<ul>\n<li><a\
  \ href=\"https://github.com/Enselic\"><code>@\u200BEnselic</code></a> made their\
  \ first contribution in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/615\"\
  >rust-lang/backtrace-rs#615</a></li>\n<li><a href=\"https://github.com/QuentinPerez\"\
  ><code>@\u200BQuentinPerez</code></a> made their first contribution in <a href=\"\
  https://redirect.github.com/rust-lang/backtrace-rs/pull/613\">rust-lang/backtrace-rs#613</a></li>\n\
  <li><a href=\"https://github.com/Gankra\"><code>@\u200BGankra</code></a> made their\
  \ first contribution in <a href=\"https://redirect.github.com/rust-lang/backtrace-rs/pull/609\"\
  >rust-lang/backtrace-rs#609</a></li>\n</ul>\n<p><strong>Full Changelog</strong>:\
  \ <a href=\"https://github.com/rust-lang/backtrace-rs/compare/0.3.71...0.3.72\"\
  >https://github.com/rust-lang/backtrace-rs/compare/0.3.71...0.3.72</a></p>\n</blockquote>\n\
  </details>\n<details>\n<summary>Commits</summary>\n<ul>\n<li><a href=\"https://github.com/rust-lang/backtrace-rs/commit/5e05efa87905fb5b351a2bc5644d60c57d6d9327\"\
