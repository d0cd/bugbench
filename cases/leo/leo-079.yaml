fix_pr_title: '[Bug] Emit a warning when `self.caller` is used as a `record` owner.'
fix_pr_body: "## Motivation\r\n\r\nEmit a warning when `self.caller` is used as a\
  \ `record` owner. If `self.caller` is a program address, then this effectively burns\
  \ the record.\r\n\r\nFor now, this only checks for the case where the record is\
  \ initialized with `self.caller` as the `owner`. Alternatively, a record's `owner`\
  \ could be reassigned to `self.caller` but that case is harder to detect without\
  \ data flow analysis (imagine a long chain of temps etc.).\r\n\r\n## Test Plan\r\
  \n\r\nUpdated the testing infrastructure to always emit and expect warnings along\
  \ with the compiled program. Previously, we would only emit the warnings and stop.\r\
  \n\r\nAdd a simple test to check for the new warning even though many tests already\
  \ trigger the warning.\r\n\r\nCloses #28508"
