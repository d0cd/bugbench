issue_bodies:
  '2346': "## \U0001F41B Bug Report\r\n\r\nWhile running `leo build` I get the following\
    \ error message: `thread 'main' panicked at \"called  'Option::unwrap()' on a\
    \ 'None' value\",`.\r\n \r\n## Steps to Reproduce\r\n\r\n#### Code snippet to\
    \ reproduce\r\n\r\n```\r\nprogram bug.aleo {\r\n    \r\n    // Get the i-th bit\
    \ from a given 32-bit number\r\n    inline get_bit(number: u32, i: u8) -> bool\
    \ {\r\n        // The bug happens with either of these two ways of calculating\
    \ the mask:\r\n        // let mask: u32 = 2u32 ** i;\r\n        let mask: u32\
    \ = 1u32 << i;\r\n        return number.and(mask) > 0u32;\r\n    }\r\n\r\n   \
    \ // Get the occupant (player1 or player2) of the i-th cell in game board\r\n\
    \    inline get_cell_occupant(board: u32, i: u8) -> u8 {\r\n        return get_bit(board,\
    \ i) ? 2u8 : 1u8; // player1 -> 1u8, player2 -> 2u8\r\n    }\r\n\r\n    transition\
    \ make_move(board: u32, i: u8){\r\n        let occupant: u8 =  get_cell_occupant(board,\
    \ i);\r\n        // rest of the code was ommited as it's not needed to reproduce\
    \ the bug \r\n    }\r\n}\r\n```\r\n\r\n#### Stack trace & error message\r\n\r\n\
    ```\r\nthread `main` panicked at 'called `Option::unwrap()` on a `None` value',\
    \ compiler/passes/src/code_generation/visit_expressions.rs:64:49\r\nstack backtrace:\
    \ \r\n   0: backtrace::capture::Backtrace::new\r\n   1: leo::set_panic_hook::{{closure}}\r\
    \n   2: std::panicking::rust_panic_with_hook\r\n   3: std::panicking::begin_panic_handler::{{closure}}\r\
    \n   4: std::sys_common::backtrace::__rust_end_short_backtrace\r\n   5: _rust_begin_unwind\r\
    \n   6: core::panicking::panic_fmt\r\n   7: core::panicking::panic\r\n   8: leo_passes::code_generation::visit_expressions::<impl\
    \ leo_passes::code_generation::generator::CodeGenerator>::visit_expression\r\n\
    \   9: leo_passes::code_generation::visit_expressions::<impl leo_passes::code_generation::generator::CodeGenerator>::visit_expression\r\
    \n  10: leo_passes::code_generation::visit_statements::<impl leo_passes::code_generation::generator::CodeGenerator>::visit_statement\r\
    \n  11: itertools::Itertools::join\r\n  12: leo_passes::code_generation::visit_program::<impl\
    \ leo_passes::code_generation::generator::CodeGenerator>::visit_function\r\n \
    \ 13: itertools::Itertools::join\r\n  14: leo_passes::code_generation::visit_program::<impl\
    \ leo_passes::code_generation::generator::CodeGenerator>::visit_program\r\n  15:\
    \ leo_passes::code_generation::<impl leo_passes::pass::Pass for leo_passes::code_generation::generator::CodeGenerator>::do_pass\r\
    \n  16: leo_compiler::compiler::Compiler::compile\r\n  17: leo::commands::build::compile_leo_file\r\
    \n  18: <leo::commands::build::Build as leo::commands::Command>::apply\r\n  19:\
    \ leo::commands::Command::execute\r\n  20: leo::commands::Command::try_execute\r\
    \n  21: leo::run_with_args\r\n  22: scoped_tls::ScopedKey<T>::set\r\n  23: leo::main\r\
    \n  24: std::sys_common::backtrace::__rust_begin_short_backtrace\r\n  25: std::rt::lang_start::{{closure}}\r\
    \n  26: std::rt::lang_start_internal\r\n  27: _main\r\n\r\nerror: internal compiler\
    \ error: unexpected panic\r\n\r\nnote: the compiler unexpectedly panicked. this\
    \ is a bug.\r\n\r\nnote: we would appreciate a bug report: https://github.com/AleoHQ/leo/issues/new?labels=bug,panic&template=bug.md&title=[Bug]\r\
    \n\r\nnote: leo-lang 1.6.3 running on Darwin 20.6.0\r\n\r\nnote: compiler args:\
    \ leo build\r\n\r\nnote: compiler flags: CLI { debug: false, quiet: false, command:\
    \ Build { command: Build { options: BuildOptions { offline: false, enable_spans:\
    \ false, enable_dce: false, enable_all_ast_snapshots: false, enable_initial_input_ast_snapshot:\
    \ false, enable_initial_ast_snapshot: false, enable_unrolled_ast_snapshot: false,\
    \ enable_ssa_ast_snapshot: false, enable_flattened_ast_snapshot: false, enable_inlined_ast_snapshot:\
    \ false, enable_dce_ast_snapshot: false } } }, api: None, path: None }\r\n```\r\
    \n\r\n## Expected Behavior\r\n\r\nI would have expected a successful compilation\
    \ of the code. Instead it throws an error whenever I try to execute a `1u32 <<\
    \ i` or the equivalent expression `2u32 ** i `\r\n\r\n## Your Environment\r\n\r\
    \n- Leo version: 1.6.3\r\n- Rust compiler version: 1.67.1\r\n- Computer OS: macOS\
    \ Big Sur 11.6\r\n"
