introducing_pr_title: Improve error message for identifiers with leading underscore
introducing_pr_body: "Original PR: https://github.com/ProvableHQ/leo/pull/28897\r\n\
  \r\nWhen users write identifiers starting with underscore, (e.g.: let _c: u32),\
  \ the parser produces an uninformative error.\r\n\r\nRoot cause of that is that\
  \ lexer splits `_c` into two separate tokens, and the parser had no grammar rule\
  \ matching the pattern, so LARLPOP generates a generir error listing what tokens\
  \ it expected at that position (which happened to be '(' for tuple destructuring).\r\
  \n\r\nSo, this adds new lexer token - `InvalidLeadingUnderscoreIdent` that catches\
  \ any leading underscore next to identifiers.\r\n\r\nBefore:\r\n```\r\nError [EPAR0370005]:\
  \ expected an identifier, '(' -- found '_'\r\n    --> \\\\?\\C:\\Users\\tetektoza\\\
  source\\repos\\leo\\test_underscore_project\\test_underscore\\src\\main.leo:3:13\r\
  \n     |\r\n   3 |         let _c: u32 = a + b;\r\n     |             ^\r\n```\r\
  \n\r\nAfter:\r\n```\r\nError [EPAR0370047]: Identifier cannot start with an underscore\r\
  \n    --> \\\\?\\C:\\Users\\tetektoza\\source\\repos\\leo\\test_underscore_project\\\
  test_underscore\\src\\main.leo:3:13\r\n     |\r\n   3 |         let _c: u32 = a\
  \ + b;\r\n     |             ^^\r\n     |\r\n     = Identifiers must start with\
  \ a letter.\r\n```\r\n\r\nResolves: https://github.com/ProvableHQ/leo/issues/28755\r\
  \n"
