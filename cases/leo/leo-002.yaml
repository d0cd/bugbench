description: The `leo publish` command failed on Windows because file paths in zip
  archives used Windows-style backslash separators instead of Unix-style forward slashes.
  The fix uses the `zip` crate's deprecated (but recommended) path sanitization method
  to normalize paths before adding files to the archive, with `#[allow(deprecated)]`
  annotations.
expected_findings:
- file: package/src/root/zip.rs
  line: 106
  summary: File path added to zip archive without platform-independent normalization;
    on Windows, backslash separators will produce invalid zip entries. Should use
    the zip crate's path sanitization method.
- file: package/src/root/zip.rs
  line: 117
  summary: Directory path added to zip archive without platform-independent normalization;
    on Windows, backslash separators will produce invalid zip entries. Should use
    the zip crate's path sanitization method.
