introducing_pr_title: Change errors to use new vocabulary
introducing_pr_body: "Errors now use the new vocabulary from the Unified fn proposal:\r\
  \n\r\n| Term | Description |\r\n|------|-------------|\r\n| `entry point fn` | A\
  \ function declared inside the `program` block. Entry point fns can take records\
  \ as input/output and define the public interface of a program. |\r\n| `regular\
  \ fn` | A function declared outside the `program` block. Regular fns are inlined\
  \ and cannot take records as input/output. |\r\n| `final fn` | A function that executes\
  \ on-chain during finalization. Declared with `final fn` and called from `final`\
  \ blocks. |\r\n| `Final` | The type representing deferred on-chain execution. Returned\
  \ by entry point fns that have finalization logic. |\r\n| `final` block | An inline\
  \ block (`final { ... }`) containing on-chain finalization code. |\r\n| `.run()`\
  \ | Method to execute a `Final` within a `final` block or `final fn`. |\r\n\r\n\
  Some errors relating to async calls, which are no longer possible except as a byproduct\
  \ of the compiler's autogenerated `Finalize` functions have been turned into panics,\
  \ since they are irrecoverable by the user."
