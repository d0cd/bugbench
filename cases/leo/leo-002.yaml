fix_pr_title: Better errors for forbidden items in final blocks
fix_pr_body: "Final blocks may not contain invocations of `self.caller` or `self.signer`\
  \ or captures of record values. However this can almost always be alleviated by\
  \ capturing a local variable representing the value of these items.\r\n\r\nThe current\
  \ errors for those cases, though common in rewriting code for the new syntax, is\
  \ very unclear. This change provides better errors and guidance to the developper.\r\
  \n\r\nFixes #29185"
