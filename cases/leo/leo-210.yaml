fix_pr_title: Bump zip from 1.1.3 to 1.1.4
fix_pr_body: "Bumps [zip](https://github.com/zip-rs/zip2) from 1.1.3 to 1.1.4.\n<details>\n\
  <summary>Release notes</summary>\n<p><em>Sourced from <a href=\"https://github.com/zip-rs/zip2/releases\"\
  >zip's releases</a>.</em></p>\n<blockquote>\n<h2>v1.1.4</h2>\n<h3><!-- raw HTML\
  \ omitted -->\U0001F41B Bug Fixes</h3>\n<ul>\n<li>Rare bug where find_and_parse\
  \ would give up prematurely on detecting a false end-of-CDR header</li>\n</ul>\n\
  </blockquote>\n</details>\n<details>\n<summary>Changelog</summary>\n<p><em>Sourced\
  \ from <a href=\"https://github.com/zip-rs/zip2/blob/master/CHANGELOG.md\">zip's\
  \ changelog</a>.</em></p>\n<blockquote>\n<h2><a href=\"https://github.com/zip-rs/zip2/compare/v1.1.3...v1.1.4\"\
  >1.1.4</a> - 2024-05-04</h2>\n<h3><!-- raw HTML omitted -->\U0001F41B Bug Fixes</h3>\n\
  <ul>\n<li>Build was failing with bzip2 enabled</li>\n<li>use is_dir in more places\
  \ where Windows paths might be handled incorrectly</li>\n</ul>\n<h3><!-- raw HTML\
  \ omitted -->\u26A1 Performance</h3>\n<ul>\n<li>Quick filter for paths that contain\
  \ &quot;/../&quot; or &quot;/./&quot; or start with &quot;./&quot; or &quot;../&quot;</li>\n\
  <li>Fast handling for separator-free paths</li>\n<li>Speed up logic if main separator\
  \ isn't '/'</li>\n<li>Drop <code>normalized_components</code> slightly sooner when\
  \ not using it</li>\n<li>Speed up <code>path_to_string</code> in cases where the\
  \ path is already in the proper format</li>\n</ul>\n<h3><!-- raw HTML omitted -->\u2699\
  \uFE0F Miscellaneous Tasks</h3>\n<ul>\n<li>Refactor: can short-circuit handling\
  \ of paths that start with MAIN_SEPARATOR, no matter what MAIN_SEPARATOR is</li>\n\
  <li>Bug fix: non-canonical path detection when MAIN_SEPARATOR is not slash or occurs\
  \ twice in a row</li>\n<li>Bug fix: must recreate if . or .. is a path element</li>\n\
  <li>Bug fix</li>\n</ul>\n<h3><!-- raw HTML omitted -->\u25C0\uFE0F Revert</h3>\n\
  <ul>\n<li><a href=\"https://redirect.github.com/zip-rs/zip2/pull/58\">#58</a> (partial):\
  \ <code>bzip2-rs</code> can't replace <code>bzip2</code> because it's decompress-only</li>\n\
  </ul>\n</blockquote>\n</details>\n<details>\n<summary>Commits</summary>\n<ul>\n\
  <li><a href=\"https://github.com/zip-rs/zip2/commit/a9482ea8ca3d49bed824a38433160af1aae6aa44\"\
  ><code>a9482ea</code></a> Bump version to trigger new release PR</li>\n<li><a href=\"\
  https://github.com/zip-rs/zip2/commit/52af9ffd238443b47a2a36a5909d64ca04ff8eac\"\
  ><code>52af9ff</code></a> Merge pull request <a href=\"https://redirect.github.com/zip-rs/zip2/issues/96\"\
  >#96</a> from zip-rs/oldpr452</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/3ccaa3cc857ae01f0c0f93b6c4862a0add8b5674\"\
  ><code>3ccaa3c</code></a> style: cargo fmt --all &amp; <code>#![allow(dead_code)]</code></li>\n\
  <li><a href=\"https://github.com/zip-rs/zip2/commit/de95acc543d0f77ea13e860c5713941e2490c16c\"\
  ><code>de95acc</code></a> style: allow conditionally-unused variables in write_dir.rs</li>\n\
  <li><a href=\"https://github.com/zip-rs/zip2/commit/c4906cfd596edc54ec3a5b0d8686927c5e179adc\"\
  ><code>c4906cf</code></a> Merge remote-tracking branch 'allilo/add_compression_algo_arg'\
  \ into oldpr452</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/629707c0604542c5c2fc7e5f484611981b791f23\"\
  ><code>629707c</code></a> Merge pull request <a href=\"https://redirect.github.com/zip-rs/zip2/issues/95\"\
  >#95</a> from zip-rs/speedup_path_to_string</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/1852e96192927e5cdc873eade213a69e08739c1f\"\
  ><code>1852e96</code></a> Prelim changes to write_dir</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/1b2c42b199dcc69a4d4a43004f6030a6e8db02c1\"\
  ><code>1b2c42b</code></a> style: cargo fmt --all</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/74e76a94cabefcf506ccc8314be752c64b21e51d\"\
  ><code>74e76a9</code></a> chore: Refactor: can short-circuit handling of paths that\
  \ start with MAIN_SEP...</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/2adbbccb82ba60f90dd1302f0f6594213ca9abf0\"\
  ><code>2adbbcc</code></a> perf: Quick filter for paths that contain &quot;/../&quot;\
  \ or &quot;/./&quot; or start with &quot;./&quot; ...</li>\n<li>Additional commits\
  \ viewable in <a href=\"https://github.com/zip-rs/zip2/compare/v1.1.3...v1.1.4\"\
  >compare view</a></li>\n</ul>\n</details>\n<br />\n\n\n[![Dependabot compatibility\
