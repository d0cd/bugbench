fix_pr_title: Add signature literals and support optional signatures
fix_pr_body: "Closes #29078\r\n\r\nMostly a straightforward change... Adds signature\
  \ literals. The only weirdness is in parsing where I had to parse such literals\
  \ as identifiers first then in `conversion.rs` decide whether they are true signatures\
  \ or just regular identifiers. The goal was to not disallow identifiers that start\
  \ with `sign` but are not signatures.\r\n\r\nAlso now allow signatures in option..\
  \ might as well."
