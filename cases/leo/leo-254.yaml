issue_bodies:
  '29078': "## \U0001F41B Bug Report\n\nNot sure if this is a bug or a missing feature,\
    \ but you can't declare a pre-generated signature in Leo even though `signature`\
    \ is a valid data type.  This would be really useful in unit testing.\n\nExample:\n\
    ```leo\nlet test_signature: signature = sign195m229jvzr0wmnshj6f8gwplhkrkhjumgjmad553r997u7pjfgpfz4j2w0c9lp53mcqqdsmut2g3a2zuvgst85w38hv273mwjec3sqjsv9w6uglcy58gjh7x3l55z68zsf24kx7a73ctp8x8klhuw7l2p4s3aq8um5jp304js7qcnwdqj56q5r5088tyvxsgektun0rnmvtsuxpe6sj;\n\
    ```\nError:\n```\nError [ETYC0372005]: Unknown variable `sign195m229jvzr0wmnshj6f8gwplhkrkhjumgjmad553r997u7pjfgpfz4j2w0c9lp53mcqqdsmut2g3a2zuvgst85w38hv273mwjec3sqjsv9w6uglcy58gjh7x3l55z68zsf24kx7a73ctp8x8klhuw7l2p4s3aq8um5jp304js7qcnwdqj56q5r5088tyvxsgektun0rnmvtsuxpe6sj`\n\
    ```\n"
