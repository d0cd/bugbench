introducing_pr_title: ' Add support for `optional` types and lower them to structs'
introducing_pr_body: "Closes #28882\r\n\r\nThis PR introduces first-class support\
  \ for `optional` types (`T?`) in the Leo language \u2014 with **restrictions on\
  \ constants and certain usages** to maintain clear semantics.\r\n\r\n---\r\n\r\n\
  ### \U0001F527 Language Features Introduced\r\n\r\nLeo now supports writing optional\
  \ types using the `T?` syntax (e.g., `u8?`, `Foo?`, `[u64?; 2]`, etc.). Two core\
  \ operations are available on optionals:\r\n\r\n```leo\r\nlet x: u8? = 42u8;\r\n\
  let y = x.unwrap();        // Returns 42u8\r\n\r\nlet z: u8? = none;\r\nlet a =\
  \ z.unwrap_or(99u8); // Returns 99u8\r\n```\r\n\r\nOptional values can be compared\
  \ with `none`, assigned, passed into inline functions, and stored in arrays and\
  \ structs.\r\n\r\n\u26A0\uFE0F **Constants that are or contain optionals are currently\
  \ disallowed** since interpreter and constant evaluation support for optionals is\
  \ not yet implemented.\r\n\r\n---\r\n\r\n### \U0001F9F1 Option Lowering Pass (Core\
  \ of the PR)\r\n\r\nThe new `OptionLowering` pass is the centerpiece of this PR.\
  \ It transforms every `T?` into a dedicated struct of the form:\r\n\r\n```leo\r\n\
  struct \"u8?\" {\r\n    is_some: bool,\r\n    val: u8,\r\n}\r\n```\r\n\r\nFor example,\
  \ the following:\r\n\r\n```leo\r\nlet x: u8? = 42u8;\r\n\r\nis lowered to:\r\n\r\
  \nlet x: \"u8?\" = \"u8?\" { is_some: true, val: 42u8 };\r\n```\r\n\r\nWhen a value\
  \ is `none`, the `is_some` field is `false` and the `val` field is set to the \"\
  zero\" value of that type (e.g., `0u8`, `false`, etc.).\r\n\r\nNested structures\
  \ are lowered recursively. For instance:\r\n\r\n```leo\r\nlet arr: [u64?; 2] = [1u64,\
  \ none];\r\n```\r\n\r\nis lowered to:\r\n\r\n```leo\r\nlet arr: [\"u64?\"; 2] =\
  \ [\r\n    \"u64?\" { is_some: true, val: 1u64 },\r\n    \"u64?\" { is_some: false,\
  \ val: 0u64 },\r\n];\r\n```\r\n\r\nThis enables optionals to remain a first-class\
  \ user feature while being represented as regular structs in the lowered form \u2014\
  \ which is compatible with the backend.\r\n\r\n---\r\n\r\n### \U0001F9E0 Absolute\
  \ Paths for Internal Type Resolution\r\n\r\nThis PR also introduces **absolute paths**\
  \ for internal use in the compiler. These are not exposed to users but are used\
  \ to refer to auto-generated structs by OptionLowering since those structs are always\
  \ inserted in the root module.\r\n\r\n---\r\n\r\n### \U0001F39B Interpreter & Const\
  \ Evaluation Support\r\n\r\nInterpreter evaluation of optionals is **not yet supported**.\
  \  \r\nAs a result:\r\n\r\n- `const` declarations that are or contain optionals\
  \ are currently disallowed.\r\n- Runtime constructs (variables, arrays, structs,\
  \ etc.) can freely use optionals.\r\n- The debugger and unit testing cannot be used\
  \ when optionals are used. This is a deficiency that we plan on fixing asap.\r\n\
  \r\n---\r\n\r\n### \U0001F504 Reconstructor API Enhancement\r\n\r\nReconstructor\
  \ passes now accept an extra parameter, similar to visitor passes. This allows them\
  \ to access context needed for:\r\n\r\n- Implicit wrapping of values from `T` to\
  \ `T?` when appropriate\r\n- Handling expressions like `let x: u8? = 1u8;` during\
  \ reconstruction\r\n\r\n---\r\n\r\n### \U0001F300 Type Coercion Support (T \u2192\
  \ T?)\r\n\r\nType coercion from `T` to `T?` is allowed in a limited set of contexts:\r\
  \n\r\n- Variable definitions:\r\n  \r\n  ```leo\r\n  let x: u8? = 1u8; // Implicitly\
  \ wrapped into Some(1u8)\r\n  ```\r\n\r\n- Function calls (only to inline functions):\r\
  \n  \r\n  ```leo  \r\n  inline take_optional(x: u8?) { ... }\r\n  take_optional(42u8);\
  \ // 42u8 is implicitly wrapped\r\n  ```\r\n\r\n- Intermediate expressions:\r\n\r\
  \n  ```leo\r\n  let val: u8? = cond ? 10u8 : none;\r\n  ``\r\n\r\n\u26A0\uFE0F There\
  \ is **no implicit coercion from `T?` to `T`**. Unwrapping must be explicit using\
  \ `.unwrap()` or `.unwrap_or(...)`.\r\n\r\n---\r\n\r\n### \U0001F6AB Rejected Usages\
  \ and Diagnostics\r\n\r\nThe following are currently rejected:\r\n\r\n- \u274C Double\
  \ optionals are not allowed. For example:\r\n\r\n  ```leo\r\n  let x: u8?? = none;\
  \ // \u274C Invalid\r\n  ```\r\n\r\n- \u274C Constants containing optionals:\r\n\
  \r\n  ```leo\r\n  const BAD: u8? = none; // \u274C Invalid\r\n  ```\r\n\r\n- \u274C\
  \ Record fields that are or contain optionals:\r\n\r\n  ```leo\r\n  record Bad {\r\
  \n      data: u8?, // \u274C Invalid\r\n  }\r\n  ```\r\n\r\n- \u274C Mapping keys\
  \ that are or contain optionals.\r\n- \u274C `signature` and `address` types cannot\
  \ be optionals at this stage.\r\n- \u274C Optional tuples and `Future` types (e.g.,\
  \ `(u8, u8)?`, `Future<u8>?`) are disallowed.\r\n- \u274C Optional types cannot\
  \ be used as inputs or outputs of `transition`, `async transition` or `function`."
