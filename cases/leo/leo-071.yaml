fix_pr_title: Allow array indices to be unsuffixed literals
fix_pr_body: "Closes #28681\r\n\r\nInfer array indices to be `u32` if they are unsuffixed\
  \ literals. Also, if they are indeed unsuffixied literals, make sure they fit in\
  \ a `u32`. This is not exactly necessary since arrays cannot be larger than 32 elements\
  \ anyways, but adding the check feels more correct."
