description: The pest parser grammar in leo.pest did not require whitespace after
  keywords like 'mut', 'let', etc., allowing syntactically invalid programs like 'letmut
  a:u32 = 1+1' to parse successfully. The fix adds mandatory spacing after keywords
  in the grammar rules and also adds support for optional trailing commas on circuit
  member fields.
expected_findings:
- file: ast/src/leo.pest
  line: 18
  summary: Keyword rule 'mutable' does not require whitespace after 'mut', allowing
    invalid concatenated identifiers like 'letmut' to parse
- file: ast/src/leo.pest
  line: 177
  summary: Circuit member field rule does not allow optional trailing comma, preventing
    idiomatic trailing-comma syntax in circuit definitions
