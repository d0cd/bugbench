introducing_pr_title: '[Feature] Add unsuffixed literals'
introducing_pr_body: "## Motivation\r\nCloses #28626\r\n\r\nAdd support for things\
  \ like:\r\n```\r\nlet a0: u8 = 0;  // infer 0 as a u8\r\nlet a1 = 1 + 1u8; // infer\
  \ 1 as a u8\r\nlet g10 = 0group * 1; // infer 1 as a scalar\r\nlet g12 = 0scalar\
  \ * 2; // infer 2 as a group \r\nlet b8 = 2.square(); // infer 2 as a field\r\n\
  let t1: (u32, u16) = (1, 2); // infer 1 as u32 and 2 as u16\r\nlet a1: [u64; 3]\
  \ = [1, 2, 3]; // infer 1, 2, and 3, as u64\r\nlet x: u32 = 1 + (true ? 0 : 1);\
  \ // infer the 1s and 0 as u32\r\n\r\nlet z0 = bar(3, 4); // infer 3 as u32 and\
  \ y as u64\r\ninline bar(x: u32, y: u64) -> u16 {\r\n    return 0 + 1; // infer\
  \ 0 and 1 as u16\r\n}\r\n...\r\n```\r\nIntegers, fields, groups, and scalar are\
  \ now allowed to be unsuffixed and they get their types from the context if possible.\
  \ Otherwise, an error is emitted.\r\n\r\nWhat this PR does in detail:\r\n1. Moves\
  \ `Value` and all the evaluation functions from `leo-interpreter` to `leo-ast` under\
  \ `interpreter_value`. This should be merged with the existing `Value` in `leo-ast`.\
  \ I needed to do this to break the dependency of the compiler on the interpreter.\r\
  \n2. Runs the type checker and the symbol table creation in the interpreter because\
  \ we now need access to `type_table` in the interpreter due to unsuffixed literals.\r\
  \n3. Parser allows numerics to be unsuffixed and uses a new `Literal` variant called\
  \ `Unsuffixed`.\r\n4. New type called `Numeric` which should hopefully be fully\
  \ resolved by the end of type checking.\r\n5. Type checker attempts to change `Numeric`\
  \ to something more concrete based on the context and error out if that's not possible.\
  \ This is pretty localized for now and can be made better. See #28654 for more details.\r\
  \n6. Continue to check for overflow even for unsuffixed literals. Can't always do\
  \ that right away though. We may need to wait until the type is known to do that.\r\
  \n\r\nThe tests are fairly clear. A few positive tests and a few negative tests\
  \ to check for errors.\r\n"
