introducing_pr_title: Leo Deploy
introducing_pr_body: "- TLDR:\r\n\t- cd into project directory and type `leo deploy`\
  \ \r\n- Motivation:\r\n\t- Make it super easy for new developers to deploy their\
  \ programs\r\n\t\t- A lot of defaults preselected\r\n\t\t- If devs want more options\
  \ they can just use the snarkos tool\r\n\t- Not just a wrapper around `snarkos developer\
  \ deploy`, the reason its being built in Leo is so that it can recursively deploy\
  \ local dependencies. \r\n\t\t- This is an absolute pain to do using snarkos because\
  \ have to move all the local dependencies into their own folders, and name them\
  \ `main.aleo` with imports directory of their imports \r\n- Defaults:\r\n\t- Endpoint:\
  \ Aleo node\r\n\t- Builds project if unbuilt \r\n\t- Recursively deploys imports\r\
  \n\t\t- Already know all the paths to local directories\r\n\t\t- Do quick check\
  \ to see if the local project name already taken on chain"
