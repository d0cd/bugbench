description: The compiler's flattening pass did not properly handle `console` statements
  (e.g. `console.assert()`) inside conditional blocks. When flattening conditionals,
  console statements were emitted without being guarded by the branch condition, causing
  them to execute unconditionally. The fix adds logic to wrap console statements with
  the appropriate condition during flattening.
expected_findings:
- file: compiler/passes/src/flattening/flatten_statement.rs
  line: 110
  summary: Console statements inside conditional blocks are not guarded by the branch
    condition during flattening. The flattener should wrap console.assert (and similar)
    calls with the enclosing conditional's condition, but instead emits them unconditionally.
- file: compiler/passes/src/flattening/flatten_statement.rs
  line: 209
  summary: "Missing handling for console statements in the conditional flattening\
    \ logic \u2014 console statements should be transformed to include the condition\
    \ as a conjunct (e.g. `condition && assert_expr`) but are passed through unchanged."
- file: compiler/passes/src/flattening/flattener.rs
  line: 175
  summary: Flattener helper does not account for console statement variants when constructing
    conditional guards, causing console assertions in if/else branches to lose their
    conditional context.
