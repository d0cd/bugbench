  <li><a href="https://github.com/algesten/ureq/commit/eae34f6e3da2e3272e95473395b6d9a182056119"><code>eae34f6</code></a>
  rtls: default_tls_config() explicit <em>ring</em> choice</li>

  <li><a href="https://github.com/algesten/ureq/commit/7f6705bc88f9f5428d94926e73fed0892b8d27ab"><code>7f6705b</code></a>
