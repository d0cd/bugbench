fix_pr_title: Bump ureq from 2.10.0 to 2.10.1
fix_pr_body: 'Bumps [ureq](https://github.com/algesten/ureq) from 2.10.0 to 2.10.1.

  <details>

  <summary>Changelog</summary>

  <p><em>Sourced from <a href="https://github.com/algesten/ureq/blob/main/CHANGELOG.md">ureq''s
  changelog</a>.</em></p>

  <blockquote>

  <h1>2.10.1</h1>

  <ul>

  <li>default <code>ureq</code> Rustls tls config updated to avoid panic for applications

  that activate the default Rustls <code>aws-lc-rs</code> feature without setting

  a process-wide crypto provider. <code>ureq</code> will now use <code>*ring*</code>
  in this

  circumstance instead of panicking.</li>

  </ul>

  </blockquote>

  </details>

  <details>

  <summary>Commits</summary>

  <ul>

  <li><a href="https://github.com/algesten/ureq/commit/6b62ef3f629caec6f8f072a124f0c15d19f4292e"><code>6b62ef3</code></a>
  env_logger no rexex for MSRV</li>

  <li><a href="https://github.com/algesten/ureq/commit/76cb6715d1d4bf291e8fb1d4cc2fbdc700623dcc"><code>76cb671</code></a>
  2.10.1</li>

  <li><a href="https://github.com/algesten/ureq/commit/5696f1b7e4769041cec3970a28ad3110c9d8a730"><code>5696f1b</code></a>
