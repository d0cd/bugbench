fix_pr_title: Split Circle CI main-workflow into 3 logical workflows
fix_pr_body: "## \U0001F4A5 Changes\n\nThis PR splits the single `main-workflow` in\
  \ Circle CI into 3 separate, logical workflows that will show up independently in\
  \ PR status checks.\n\n## Motivation\n\nPreviously, all CI jobs were grouped under\
  \ a single workflow named `main-workflow`, making it harder to quickly identify\
  \ which category of checks failed. This follows the same pattern successfully implemented\
  \ in snarkVM/snarkOS (see [snarkVM#2908](https://github.com/provableHQ/snarkVM/issues/2908)).\n\
  \n## New Workflow Structure\n\n### 1. **platform-tests**\nCross-platform testing\
  \ workflow that runs the test suite on all supported platforms:\n- `test-windows`\n\
  - `test-macos`\n- `test-linux`\n\n### 2. **code-quality**\nCode quality checks workflow:\n\
  - `check-style-clippy-docs` (rustfmt, clippy, and documentation builds)\n\n### 3.\
  \ **leo-executable**\nLeo CLI build and integration tests workflow:\n- `leo-executable`\
  \ (builds the CLI)\n- `leo-new` (requires leo-executable)\n- `leo-clean` (requires\
  \ leo-executable)\n- `test-examples` (requires leo-executable)\n\n## Benefits\n\n\
  \u2705 **Better visibility** - Each workflow appears as a separate status check\
  \ in PRs  \n\u2705 **Logical grouping** - Related jobs are organized by purpose\
  \  \n\u2705 **Easier troubleshooting** - Failed jobs are easier to identify at a\
  \ glance  \n\u2705 **Maintained dependencies** - All job dependencies are preserved\
  \  \n\n## Impact\n\n- No functional changes - all jobs run exactly as before\n-\
  \ Same cache keys and configurations maintained\n- Job dependencies between CLI\
  \ tests and the executable build are preserved\n\n<!-- START COPILOT CODING AGENT\
  \ SUFFIX -->\n\n\n\n<details>\n\n<summary>Original prompt</summary>\n\n> \n> ----\n\
  > \n> *This section details on the original issue you should resolve*\n> \n> <issue_title>[Proposal]\
  \ Consider splitting `main-workflow` in Circle CI into multiple workflows flows</issue_title>\n\
  > <issue_description>## \U0001F4A5 Proposal\n> \n> So that each workflow shows up\
  \ separately in the PR as opposed to what we now see (which just a single flow named\
  \ `main-workflow`)</issue_description>\n> \n> <agent_instructions>Create at most\
  \ 5 workflows of logical groups</agent_instructions>\n> \n> ## Comments on the Issue\
  \ (you are @copilot in this section)\n> \n> <comments>\n> <comment_new><author>@vicsn</author><body>\n\
  > copilot one-shotted this for me on snarkVM/snarkOS: https://github.com/provableHQ/snarkVM/issues/2908</body></comment_new>\n\
  > </comments>\n> \n\n\n</details>\n\nFixes ProvableHQ/leo#28919\n\n<!-- START COPILOT\
  \ CODING AGENT TIPS -->\n---\n\n\u2728 Let Copilot coding agent [set things up for\
  \ you](https://github.com/ProvableHQ/leo/issues/new?title=\u2728+Set+up+Copilot+instructions&body=Configure%20instructions%20for%20this%20repository%20as%20documented%20in%20%5BBest%20practices%20for%20Copilot%20coding%20agent%20in%20your%20repository%5D%28https://gh.io/copilot-coding-agent-tips%29%2E%0A%0A%3COnboard%20this%20repo%3E&assignees=copilot)\
  \ \u2014 coding agent works faster and does higher quality work when set up for\
  \ your repo.\n"
