introducing_pr_title: '[Feature] Arrays.'
introducing_pr_body: "This PR:\r\n- adds support for arrays in the Leo language.\r\
  \n- introduces the `TypeTable`, which tracks the types of expressions across the\
  \ AST passes.\r\n- refactors tuple destructuring out of the flattening pass.\r\n\
  \r\n## Arrays\r\n- Arrays must be static.\r\n- Arrays **only** support constant\
  \ accesses (the index must be a constant value). \r\n- Arrays can be accessed by\
  \ any constant integer.\r\n- Arrays can contain primitive data types, structs, or\
  \ arrays.\r\n- Structs and records can contain arrays.\r\n- Arrays can be initialized\
  \ via an array expression, e.g `[a, b, c, d]` \r\n- Arrays **cannot** be empty.\r\
  \n- Arrays **cannot** be modified.\r\n\r\nLet's look at some example code.\r\n```\r\
  \nprogram test.aleo {\r\n    transition sum_with_loop(a: [u64; 4]) -> u64 {\r\n\
  \        let sum: u64 = 0u64;\r\n        for i: u8 in 0u8..4u8 {\r\n           \
  \ sum += a[i];\r\n        }\r\n        return sum;\r\n    }\r\n}\r\n```\r\nThis\
  \ function takes in an array as input and returns the sum of its elements.\r\nNote\
  \ that array types can be declared as `[<element_type>; <nonzero_number>]`\r\n"
