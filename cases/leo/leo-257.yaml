fix_pr_title: Adjust how SSA works for multi-place definitions
fix_pr_body: "Closes https://github.com/ProvableHQ/leo/issues/28963\r\n\r\nI am not\
  \ entirely sure why `Expression::Call` was singled out in the previous code. \r\n\
  \r\nWith this change, SSA actually converts \r\n```leo\r\nlet (x, y) = foo(a as\
  \ u32, b as u32);\r\n```\r\nto\r\n```leo\r\nlet $var$4 = a$$0 as u32;\r\nlet $var$5\
  \ = b$$1 as u32;\r\nlet (x$#2, y$#3) = foo(::$var$4, ::$var$5);\r\n```\r\nwhich\
  \ is what CSE expects."
