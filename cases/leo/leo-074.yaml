description: The `leo login` and `leo add` CLI commands lacked error handling for
  the case when a JWT token was not created, causing failures for non-authorized users.
  The fix adds proper error variants and checks to handle missing JWT gracefully,
  along with improved CLI output messages.
expected_findings:
- file: leo/commands/login.rs
  line: 76
  summary: 'Missing error handling: no check for absent JWT token after login attempt;
    non-authorized users will hit an unhandled error path'
- file: leo/commands/add.rs
  line: 111
  summary: 'Missing error handling: the add command does not verify that a valid JWT
    exists before proceeding, causing failure for unauthenticated users'
- file: leo/errors/commands/add.rs
  line: 18
  summary: 'New error variant needed: ConnectionUnavailable error was missing to properly
    surface JWT/auth failures to the user'
