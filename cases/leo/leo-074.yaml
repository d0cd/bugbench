introducing_pr_title: Core circuits
introducing_pr_body: "## Basic syntax\r\n`{circuit-name}::{method}({arguments})`\r\
  \n\r\nExample:\r\n`Pedersen64::hash(1u8)`\r\n\r\n## Circuits in testnet3 Leo\r\n\
  Circuits will be reintroduced to the language by this PR.\r\n\r\nFor user defined\
  \ circuits, we will only allow circuit member variables - no constants or functions.\r\
  \n```rust\r\ncircuit Foo {\r\n    bar: u8, // valid\r\n} \r\n\r\ncircuit Foo {\r\
  \n    const bar: u8, // invalid\r\n}\r\n\r\ncircuit Foo {\r\n    function bar()\
  \ -> u8 { // invalid\r\n        return 1u8;\r\n    }\r\n}\r\n```\r\n\r\nStatic functions\
  \ are implemented for core circuit functions ONLY.\r\n```rust\r\nlet x: field =\
  \ Pedersen64::hash(1u8); // valid\r\n\r\nlet y: field = Foo::bar(); // invalid\r\
  \n```\r\n\r\nConstants are implemented at the AST level for core constants (currently\
  \ wip in AVM).\r\n```rust\r\nlet x: u8 = u8::MAX;\r\n```\r\n\r\n## Circuits\r\n\
  - [x] BHP256::commit()\r\n- [x] BHP256::hash()\r\n- [x] BHP512::commit()\r\n- [x]\
  \ BHP512::hash()\r\n- [x] BHP768::commit()\r\n- [x] BHP768::hash()\r\n- [x] BHP1024::commit()\r\
  \n- [x] BHP1024::hash()\r\n- [x] Pedersen64::commit()\r\n- [x] Pedersen64::hash()\r\
  \n- [x] Pedersen128::commit()\r\n- [x] Pedersen128::hash()\r\n- [x] Poseidon2::hash()\r\
  \n- [x] Poseidon4::hash()\r\n- [x] Poseidon8::hash()            \r\n\r\n## Circuit\
  \ tests\r\n- [x] BHP256::commit()\r\n- [x] BHP256::hash()\r\n- [x] BHP512::commit()\r\
  \n- [x] BHP512::hash()\r\n- [x] BHP768::commit()\r\n- [x] BHP768::hash()\r\n- [x]\
  \ BHP1024::commit()\r\n- [x] BHP1024::hash()\r\n- [x] Pedersen64::commit()\r\n-\
  \ [x] Pedersen64::hash()\r\n- [x] Pedersen128::commit()\r\n- [x] Pedersen128::hash()\r\
  \n- [x] Poseidon2::hash()\r\n- [x] Poseidon4::hash()\r\n- [x] Poseidon8::hash()\
  \            "
