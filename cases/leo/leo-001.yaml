description: In Leo's ASG expression/call handling, a boolean flag controlling mutability
  context checking was incorrectly set to `true` at line 71 of `call.rs`, allowing
  mutable circuit member functions to be called from immutable contexts without error.
  The fix corrected the boolean value so that the compiler properly rejects calls
  to mutable methods when the calling context is immutable.
