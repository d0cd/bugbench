fix_pr_title: '[Fix] Harden leo-fmt for 4.0 syntax validation and integrate CI'
fix_pr_body: '## Summary


  Hardens `leo-fmt` and integrates it into CI ahead of the workspace-wide reformat.


  - Fixes formatter/parser edge cases found while validating against the workspace
  corpus

  - Adds CI step for formatter fixture validation (source/target AST equivalence and
  type checking)

  - Adds test infrastructure for workspace-wide and external-repo AST equivalence
  validation (intentionally disabled in CI for now)


  The bulk reformat of every tracked `.leo` file and re-enabling the workspace-wide
  validation are deferred to a stacked follow-up PR.


  Closes #29182

  Part of #28579'
