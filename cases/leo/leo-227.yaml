  </ul>\n<p><strong>Full Changelog</strong>: <a href=\"https://github.com/seanmonstar/reqwest/compare/v0.12.2...v0.12.3\"\
  >https://github.com/seanmonstar/reqwest/compare/v0.12.2...v0.12.3</a></p>\n</blockquote>\n\
  </details>\n<details>\n<summary>Changelog</summary>\n<p><em>Sourced from <a href=\"\
  https://github.com/seanmonstar/reqwest/blob/master/CHANGELOG.md\">reqwest's changelog</a>.</em></p>\n\
  <blockquote>\n<h2>v0.12.3</h2>\n<ul>\n<li>Add <code>FromStr</code> for <code>dns::Name</code>.</li>\n\
  <li>Add <code>ClientBuilder::built_in_webpki_certs(bool)</code> to enable them separately.</li>\n\
  <li>Add <code>ClientBuilder::built_in_native_certs(bool)</code> to enable them separately.</li>\n\
  <li>Fix sending <code>content-length: 0</code> for GET requests.</li>\n<li>Fix response\
  \ body <code>content_length()</code> to return value when timeout is configured.</li>\n\
  <li>Fix <code>ClientBuilder::resolve()</code> to use lowercase domain names.</li>\n\
  </ul>\n</blockquote>\n</details>\n<details>\n<summary>Commits</summary>\n<ul>\n\
  <li><a href=\"https://github.com/seanmonstar/reqwest/commit/0720159f6369f54e045a1fd315e0f24b7a0b4a39\"\
