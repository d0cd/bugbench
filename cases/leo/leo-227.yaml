introducing_pr_title: Bump reqwest from 0.11.24 to 0.12.2
introducing_pr_body: "Bumps [reqwest](https://github.com/seanmonstar/reqwest) from\
  \ 0.11.24 to 0.12.2.\n<details>\n<summary>Release notes</summary>\n<p><em>Sourced\
  \ from <a href=\"https://github.com/seanmonstar/reqwest/releases\">reqwest's releases</a>.</em></p>\n\
  <blockquote>\n<h2>v0.12.2</h2>\n<h2>What's Changed</h2>\n<ul>\n<li>Fix missing ALPN\
  \ when connecting to socks5 proxy with rustls.</li>\n<li>Fix TLS version limits\
  \ with rustls.</li>\n<li>Fix not detected ALPN h2 from server with native-tls.</li>\n\
  </ul>\n<h2>New Contributors</h2>\n<ul>\n<li><a href=\"https://github.com/cxw620\"\
  ><code>@\u200Bcxw620</code></a> made their first contribution in <a href=\"https://redirect.github.com/seanmonstar/reqwest/pull/2165\"\
  >seanmonstar/reqwest#2165</a></li>\n</ul>\n<p><strong>Full Changelog</strong>: <a\
  \ href=\"https://github.com/seanmonstar/reqwest/compare/v0.12.1...v0.12.2\">https://github.com/seanmonstar/reqwest/compare/v0.12.1...v0.12.2</a></p>\n\
  <h2>v0.12.1</h2>\n<h2>What's Changed</h2>\n<ul>\n<li>Fix <code>ClientBuilder::interface()</code>\
  \ when no TLS is enabled.</li>\n<li>Fix <code>TlsInfo::peer_certificate()</code>\
  \ being truncated with rustls.</li>\n<li>Fix panic if <code>http2</code> feature\
  \ disabled but TLS negotiated h2 in ALPN.</li>\n<li>Fix <code>Display</code> for\
  \ <code>Error</code> to not include its source error.</li>\n</ul>\n<h2>New Contributors</h2>\n\
  <ul>\n<li><a href=\"https://github.com/atouchet\"><code>@\u200Batouchet</code></a>\
  \ made their first contribution in <a href=\"https://redirect.github.com/seanmonstar/reqwest/pull/2193\"\
  >seanmonstar/reqwest#2193</a></li>\n<li><a href=\"https://github.com/mbme\"><code>@\u200B\
  mbme</code></a> made their first contribution in <a href=\"https://redirect.github.com/seanmonstar/reqwest/pull/2195\"\
  >seanmonstar/reqwest#2195</a></li>\n</ul>\n<p><strong>Full Changelog</strong>: <a\
  \ href=\"https://github.com/seanmonstar/reqwest/compare/v0.12.0...v0.12.1\">https://github.com/seanmonstar/reqwest/compare/v0.12.0...v0.12.1</a></p>\n\
  <h2>v0.12.0</h2>\n<h2>What's Changed</h2>\n<ul>\n<li>Upgrade to <code>hyper</code>,\
  \ <code>http</code>, and <code>http-body</code> v1.</li>\n<li>Add better support\
  \ for converting to and from <code>http::Request</code> and <code>http::Response</code>.</li>\n\
  <li>Add <code>http2</code> optional cargo feature, default on.</li>\n<li>Add <code>charset</code>\
  \ optional cargo feature, default on.</li>\n<li>Add <code>macos-system-configuration</code>\
  \ cargo feature, default on.</li>\n<li>Change all optional dependencies to no longer\
  \ be exposed as implicit features.</li>\n<li>Add <code>ClientBuilder::interface(str)</code>\
  \ to specify the local interface to bind to.</li>\n<li>Experimental: disables the\
  \ <code>http3</code> feature temporarily.</li>\n</ul>\n<p><strong>Full Changelog</strong>:\
  \ <a href=\"https://github.com/seanmonstar/reqwest/compare/v0.11.27...v0.12.0\"\
  >https://github.com/seanmonstar/reqwest/compare/v0.11.27...v0.12.0</a></p>\n<h2>v0.11.27</h2>\n\
  <h2>What's Changed</h2>\n<ul>\n<li>Add <code>hickory-dns</code> feature, deprecating\
  \ <code>trust-dns</code>.</li>\n<li>(wasm) Fix <code>Form::text()</code> to not\
  \ set octet-stream for plain text fields.</li>\n</ul>\n<h2>New Contributors</h2>\n\
  <ul>\n<li><a href=\"https://github.com/ashdnazg\"><code>@\u200Bashdnazg</code></a>\
  \ made their first contribution in <a href=\"https://redirect.github.com/seanmonstar/reqwest/pull/2174\"\
  >seanmonstar/reqwest#2174</a></li>\n</ul>\n<p><strong>Full Changelog</strong>: <a\
  \ href=\"https://github.com/seanmonstar/reqwest/compare/v0.11.26...v0.11.27\">https://github.com/seanmonstar/reqwest/compare/v0.11.26...v0.11.27</a></p>\n\
  <!-- raw HTML omitted -->\n</blockquote>\n<p>... (truncated)</p>\n</details>\n<details>\n\
  <summary>Changelog</summary>\n<p><em>Sourced from <a href=\"https://github.com/seanmonstar/reqwest/blob/master/CHANGELOG.md\"\
  >reqwest's changelog</a>.</em></p>\n<blockquote>\n<h2>v0.12.2</h2>\n<ul>\n<li>Fix\
  \ missing ALPN when connecting to socks5 proxy with rustls.</li>\n<li>Fix TLS version\
  \ limits with rustls.</li>\n<li>Fix not detected ALPN h2 from server with native-tls.</li>\n\
  </ul>\n<h2>v0.12.1</h2>\n<ul>\n<li>Fix <code>ClientBuilder::interface()</code> when\
  \ no TLS is enabled.</li>\n<li>Fix <code>TlsInfo::peer_certificate()</code> being\
  \ truncated with rustls.</li>\n<li>Fix panic if <code>http2</code> feature disabled\
  \ but TLS negotiated h2 in ALPN.</li>\n<li>Fix <code>Display</code> for <code>Error</code>\
  \ to not include its source error.</li>\n</ul>\n<h1>v0.12.0</h1>\n<ul>\n<li>Upgrade\
  \ to <code>hyper</code>, <code>http</code>, and <code>http-body</code> v1.</li>\n\
  <li>Add better support for converting to and from <code>http::Request</code> and\
  \ <code>http::Response</code>.</li>\n<li>Add <code>http2</code> optional cargo feature,\
  \ default on.</li>\n<li>Add <code>charset</code> optional cargo feature, default\
  \ on.</li>\n<li>Add <code>macos-system-configuration</code> cargo feature, default\
  \ on.</li>\n<li>Change all optional dependencies to no longer be exposed as implicit\
  \ features.</li>\n<li>Add <code>ClientBuilder::interface(str)</code> to specify\
  \ the local interface to bind to.</li>\n<li>Experimental: disables the <code>http3</code>\
  \ feature temporarily.</li>\n</ul>\n<h2>v0.11.27</h2>\n<ul>\n<li>Add <code>hickory-dns</code>\
  \ feature, deprecating <code>trust-dns</code>.</li>\n<li>(wasm) Fix <code>Form::text()</code>\
  \ to not set octet-stream for plain text fields.</li>\n</ul>\n<h2>v0.11.26</h2>\n\
  <ul>\n<li>Revert <code>system-configuration</code> upgrade, which broke MSRV on\
  \ macOS.</li>\n</ul>\n<h2>v0.11.25</h2>\n<ul>\n<li>Fix <code>Certificate::from_pem_bundle()</code>\
  \ parsing.</li>\n<li>Fix Apple linker errors from detecting system proxies.</li>\n\
  </ul>\n</blockquote>\n</details>\n<details>\n<summary>Commits</summary>\n<ul>\n\
  <li><a href=\"https://github.com/seanmonstar/reqwest/commit/6768a8e81849faebd044b65009f09fd119b600eb\"\
  ><code>6768a8e</code></a> v0.12.2</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/fff307bc6975144479b3067fead1756e9d80f47f\"\
  ><code>fff307b</code></a> fix(connect): ALPN missed when using socks5 proxy with\
  \ rustls backend (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2164\"\
  >#2164</a>)</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/04bf45f4ecc4e3f62cb6cd3e9ecea5476a728d7c\"\
  ><code>04bf45f</code></a> fix: tls version limit for rustls (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2203\"\
  >#2203</a>)</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/056f8c4ff4434811dcd3ed0230dcbab4bcf58b68\"\
  ><code>056f8c4</code></a> fix(connect): not negotiate h2 when using native-tls backend\
  \ (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2165\">#2165</a>)</li>\n\
  <li><a href=\"https://github.com/seanmonstar/reqwest/commit/e0ea15bd659561b236e8e507a0f704dca7091e1f\"\
  ><code>e0ea15b</code></a> v0.12.1</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/3d78fcbbb5af7eaf0aeef9b9c30a508ce44b4b08\"\
  ><code>3d78fcb</code></a> fix: Display for Error shouldn't include source (<a href=\"\
  https://redirect.github.com/seanmonstar/reqwest/issues/2199\">#2199</a>)</li>\n\
  <li><a href=\"https://github.com/seanmonstar/reqwest/commit/c53572410dcc6bc6a0b4c15b3ddf09450da0358b\"\
  ><code>c535724</code></a> Fix binding interface when no TLS is used (<a href=\"\
  https://redirect.github.com/seanmonstar/reqwest/issues/2200\">#2200</a>)</li>\n\
  <li><a href=\"https://github.com/seanmonstar/reqwest/commit/d5adcba6a2d7a6431d8cb1a193c8a6710fe40741\"\
  ><code>d5adcba</code></a> fix: rustls extraction of <code>TlsInfo::peer_certificate()</code>\
  \ being truncated (<a href=\"https://redirect.github.com/seanmonstar/reqwest/issues/2195\"\
  >#2195</a>)</li>\n<li><a href=\"https://github.com/seanmonstar/reqwest/commit/7a5df2126081b83d29758ef31f9f38369ac85ae4\"\
