description: Stack overflow caused by infinite recursion in field/group type allocation.
  The `to_allocated` conversion methods in `FieldType` and `GroupType` likely recursed
  infinitely when encountering an already-allocated value, instead of returning the
  allocated value directly. The fix adds proper handling of the `Allocated` variant
  to break the recursion.
expected_findings:
- file: compiler/src/group/mod.rs
  line: 35
  summary: 'Infinite recursion: `to_allocated` method lacks a base case for the already-allocated
    variant, causing stack overflow when converting group values'
- file: compiler/src/field/mod.rs
  line: 150
  summary: 'Infinite recursion: field allocation path re-allocates an already-allocated
    `FpGadget`, leading to stack overflow instead of returning the existing allocation'
- file: compiler/src/group/edwards_bls12.rs
  line: 133
  summary: Missing base case in group Edwards BLS12 allocation that triggers recursive
    allocation and stack overflow
