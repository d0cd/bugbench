description: The Leo compiler's code generation and destructuring passes did not handle
  the case where an array index is a const initialized with an unsuffixed integer
  literal (e.g., `const INDEX = 0;` instead of `const INDEX = 0u32;`). The fix adds
  handling for unsuffixed integer literals in the expression code generation pass
  and ensures the destructuring pass correctly propagates the integer type when replacing
  const references with their literal values.
expected_findings:
- file: compiler/passes/src/code_generation/expression.rs
  line: 316
  summary: Missing match arm for unsuffixed integer literals when generating code
    for array index expressions; an integer literal without a type suffix (e.g., `0`
    vs `0u32`) falls through or panics instead of being handled.
- file: compiler/passes/src/destructuring/expression.rs
  line: 50
  summary: Literal::integer() construction does not account for unsuffixed integer
    constants when inlining const values into array index positions; needs to preserve
    or infer the integer type for unsuffixed literals.
