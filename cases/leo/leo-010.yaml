description: Multi-dimensional array dimensions were processed in reversed order.
  For tuple-style array types like `[bool; (2, 3)]`, the compiler incorrectly accepted
  `[[true; 2]; 3]` (wrong nesting order) and rejected `[[true; 3]; 2]` (correct nesting
  order). The fix reverses the dimension iteration order so that the outermost dimension
  corresponds to the first tuple element.
expected_findings:
- file: compiler/src/expression/array/array.rs
  line: 46
  summary: Array initializer dimensions are iterated in the wrong order; the first
    dimension in the tuple should correspond to the outermost array, but dimensions
    are consumed front-to-back instead of back-to-front (or vice versa).
- file: compiler/src/expression/array/array.rs
  line: 69
  summary: "Same reversed-dimension bug in inline array expression handling \u2014\
    \ dimensions from the tuple type are matched against nested arrays in the wrong\
    \ order."
- file: typed/src/input/input_value.rs
  line: 108
  summary: Input value parsing checks outer array dimension against the wrong end
    of the dimensions tuple, causing valid nested inputs to be rejected and invalid
    ones to be accepted.
