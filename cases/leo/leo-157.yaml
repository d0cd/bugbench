description: Static functions could not call other static functions on the same circuit
  using `Self::method()`. The compiler's static access expression handler did not
  properly resolve the `Self` keyword to the enclosing circuit type when already inside
  a static function context. The fix adds `Self`/`SelfType` as a valid variant in
  the keyword-or-identifier AST node and updates the static access resolver to map
  `Self` to the current circuit.
expected_findings:
- file: compiler/src/expression/circuit/static_access.rs
  line: 36
  summary: Static access resolution does not handle the `Self` keyword as a circuit
    identifier, so `Self::bar()` inside a static function fails to resolve to the
    enclosing circuit type.
- file: ast/src/common/keyword_or_identifier.rs
  line: 20
  summary: The `KeywordOrIdentifier` enum lacks a `SelfType` variant, preventing the
    parser from recognizing `Self` as a valid circuit reference in static call expressions.
