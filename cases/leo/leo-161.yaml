description: 'This PR renames `circuit_field` to `circuit_variable` across the Leo
  compiler codebase to improve readability and consistency of naming. The change is
  a straightforward rename/refactor affecting AST definitions, compiler logic, typed
  representations, and test files. Issue #313 tracked the misleading naming where
  ''field'' could be confused with the cryptographic field type.'
