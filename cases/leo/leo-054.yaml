fix_pr_title: Const-evaluate struct/function const arguments before monomorphizing
fix_pr_body: "Closes #28799\r\n\r\nThis PR updates the monomorphization logic to **const-evaluate\
  \ all const arguments** before generating monomorphized names and inserting them\
  \ into the AST. This ensures that struct types, function calls, and struct expressions\
  \ are not only monomorphized when const arguments are literals, but also when they\
  \ _evaluate_ to literals.\r\n\r\nIt also updates how two arrays are compared using\
  \ `eq_flat_relaxed`. The logic there now matches the logic we have in `eq_user`\
  \ in type checking.\r\n\r\nThe core issue is as follows:\r\n\r\nIn something like\r\
  \n```\r\n    inline foo::[N: u32]() -> Foo::[2 * N] {\r\n        return Foo::[2\
  \ * N] { x: 0 };\r\n    }\r\n\r\n    transition bar() -> Foo::[16] {\r\n       \
  \ return foo::[8]();\r\n    }\r\n```\r\n`Foo::[16]` was getting monomorpized because\
  \ `16` is a literal. `foo[8]` also gets monomorphized because `8` is a literal.\
  \ When `foo` gets monomorphized, we update `Foo::[2 * N]` to `Foo::[2 * 8]` but\
  \ then when we try to monomorpize `Foo::[2 * 8]`, we fail because `2 * 8` is not\
  \ a literal. So, we end up with two types that should be the same but are deemed\
  \ different: `Foo::[2 * 8]` (not monomorphized) v.s. `Foo::[16]` (monomorphized).\
  \ What this PR does is kick off the const evaluator for the const arguments  before\
  \ proceeding so that `Foo::[2 * 8]` actually gets monomorphized."
