introducing_pr_title: Const generics for structs
introducing_pr_body: "Closes #28668 \r\n\r\nAdds const generic for structs. There\
  \ are three spots in the language that this change affects:\r\n1. struct declarations\
  \ now accept type parameters\r\n2. struct expressions now accept type arguments\r\
  \n3. struct type instantions (e.g. in type annotations) now accept type arguments.\r\
  \n\r\nAll the const params and const args are type checked as usual. We later monomorphize\
  \ structs as needed. We go through all their locations and create new versions of\
  \ each generic structs without duplication. \r\n\r\nBefore codegen, the names of\
  \ the resolved struct is something like `Foo::[1u32, 2u32]`. In code gen, we legalize\
  \ the name using its hash.\r\n\r\nThere really shouldn't be any surprises when reviewing\
  \ this change. I tried as many tests as possible to check for error messages and\
  \ such. I also added an interesting generic matrix example that is ran in both the\
  \ VM and the interpreter. \r\n\r\nBTW, I didn't need to change anything in the interpreter\
  \ to make generic structs work.. they just work fine because their purposes is mostly\
  \ type checking and we do that already."
