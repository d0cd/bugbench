    \ 147u8, 148u8, 250u8, 230u8, 9u8, 129u8, 210u8, 121u8, 201u8, 13u8, 104u8, 17u8,\
    \ 50u8, 68u8, 171u8, 82u8, 185u8, 188u8, 191u8]'.\n       Leo \u2705 Compiled\
    \ 'msw_dev.aleo' into Aleo instructions.\n\n\U0001F4E2 Using the following consensus\
    \ heights: 0,1,2,3,4,5,6,7,8\n```\n\n## Your Environment\n\n- leo 3.1.0\n- rustc\
