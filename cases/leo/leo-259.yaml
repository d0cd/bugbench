fix_pr_title: '[Redesign] Remove `.env` default created by `leo new`, refactor `leo
  run` to remove depedency on `snarkVM` CLI.'
fix_pr_body: "This PR:\r\n- removes `.env` files\r\n- refactors `leo run` so that\
  \ it uses `snarkvm::VM` directly (needed to pass tests)\r\n- continues support of\
  \ `.env` files if they exist.\r\n- add better help messages in the CLI provided\
  \ users the default devnet parameters.\r\n- closes #28796 \r\n- closes #28810 \r\
  \n- closes #28731 "
