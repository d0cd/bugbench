fix_pr_title: Bump regex from 1.10.4 to 1.10.5
fix_pr_body: 'Bumps [regex](https://github.com/rust-lang/regex) from 1.10.4 to 1.10.5.

  <details>

  <summary>Changelog</summary>

  <p><em>Sourced from <a href="https://github.com/rust-lang/regex/blob/master/CHANGELOG.md">regex''s
  changelog</a>.</em></p>

  <blockquote>

  <h1>1.10.5 (2024-06-09)</h1>

  <p>This is a new patch release with some minor fixes.</p>

  <p>Bug fixes:</p>

  <ul>

  <li>[BUG <a href="https://redirect.github.com/rust-lang/regex/issues/1203">#1203</a>](<a
  href="https://redirect.github.com/rust-lang/regex/pull/1203">rust-lang/regex#1203</a>):

  Escape invalid UTF-8 when in the <code>Debug</code> impl of <code>regex::bytes::Match</code>.</li>

  </ul>

  </blockquote>

  </details>

  <details>

  <summary>Commits</summary>

  <ul>

  <li><a href="https://github.com/rust-lang/regex/commit/0718fc5acbe91b84322ef1bd2c32e189e4668254"><code>0718fc5</code></a>
  1.10.5</li>

  <li><a href="https://github.com/rust-lang/regex/commit/377463bd8200c038e7997a550aa708e0c686d90f"><code>377463b</code></a>
  changelog: 1.10.4 and 1.10.5</li>

  <li><a href="https://github.com/rust-lang/regex/commit/68c4f0b7b7f500e0ab3fbdd42c14f837c4ed1be4"><code>68c4f0b</code></a>
  regex-automata-0.4.7</li>

  <li><a href="https://github.com/rust-lang/regex/commit/4757b5f01a7b9b6c8d89bd63b3d1500f7e0efa9e"><code>4757b5f</code></a>
  regex-syntax-0.8.4</li>

  <li><a href="https://github.com/rust-lang/regex/commit/1430b65baeebeb67b3335e26a71f251cce9964ef"><code>1430b65</code></a>
  changelog: 1.10.4</li>

  <li><a href="https://github.com/rust-lang/regex/commit/1f9f9ccd393fc5342aff6db5e3d47915e87a2554"><code>1f9f9cc</code></a>
  bytes: escape invalid UTF-8 bytes in debug output for Match</li>

  <li><a href="https://github.com/rust-lang/regex/commit/ab4c8d1f210a2e1011a4408476b2c708e64dcede"><code>ab4c8d1</code></a>
  doc: fix duplicate phrasing typo</li>

  <li><a href="https://github.com/rust-lang/regex/commit/ddeb85eaa3bdf79d6306cc92a9d8bd89d839b5cd"><code>ddeb85e</code></a>
  cli/deps: update memmap2 to 0.9</li>

  <li><a href="https://github.com/rust-lang/regex/commit/023f1c9ac117cd5ef2e45119b61b94f85d109667"><code>023f1c9</code></a>
  lite: fix attribute warning about rustfmt</li>

  <li><a href="https://github.com/rust-lang/regex/commit/9c139f4fa5c64a89075749cd5e57148c8eea8c22"><code>9c139f4</code></a>
  syntax: simplify <code>Hir::dot</code> constructors</li>

  <li>Additional commits viewable in <a href="https://github.com/rust-lang/regex/compare/1.10.4...1.10.5">compare
  view</a></li>

  </ul>

  </details>

  <br />



