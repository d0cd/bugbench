introducing_pr_title: Implement individual compiler passes tests
introducing_pr_body: "This builds on this original PR: https://github.com/ProvableHQ/leo/pull/28915\r\
  \n\r\nI mostly cleaned up `test_passes.rs` and made it fully macro-based so that\
  \ introducing a new pass to test requires a small change. I also made it so that\
  \ passes are running in isolation (as opposed to the previous approach of running\
  \ _until_ a pass). However, three passes have to always run first for this to work:\r\
  \n1. `PathResolution`\r\n2. `SymbolTableCreation`\r\n3. `TypeChecking`\r\n\r\nI\
  \ also tidied up the test a bit and added some (including storage ones).\r\n\r\n\
  Note that analysis tests are skipped here. To test analysis tests (such as `TypeChecking`),\
  \ we need a way to pull out debug information such as checking the content of the\
  \ type table etc. It can be done but I'm considering it out of scope for this PR.\r\
  \n\r\n## Original Description:\r\nThis patch implements testing infrastructure for\
  \ isolated compiler pass testing. Each pass can be tested independently with .leo\
  \ input files and .out expectation files showing the transformed AST in the output\
  \ file.\r\n\r\n+implemented a couple of testcases to demonstrate the outputs and\
  \ parts of the functionality.\r\n\r\nResolves: https://github.com/ProvableHQ/leo/issues/28671"
