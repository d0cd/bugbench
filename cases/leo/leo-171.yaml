description: Function inlining did not apply SSA (Static Single Assignment) renaming
  to the reconstructed block, causing variable shadowing when the same function was
  inlined multiple times or when inlined variable names collided with caller variables.
  The fix runs the SSA renaming pass on each inlined block to ensure all variables
  have unique names.
expected_findings:
- file: compiler/passes/src/function_inlining/ast.rs
  line: 60
  summary: After reconstructing the inlined block, no SSA renaming is applied, so
    inlined variables can shadow existing variables in the caller scope. Need to run
    SsaFormingVisitor on the reconstructed block to rename definitions and avoid shadowing.
