description: The transaction query CLI lacked support for the `/transaction/unconfirmed`
  endpoint and used manual `conflicts_with` declarations for mutually exclusive arguments,
  which is error-prone as arguments grow. The fix adds the `--unconfirmed` flag, refactors
  argument exclusivity to use `clap::ArgGroup`, and corrects the `--confirmed` help
  text to clarify it returns both original and fee transactions.
expected_findings:
- file: leo/cli/commands/query/transaction.rs
  line: 20
  summary: 'Missing ArgGroup definition: mutually exclusive transaction query flags
    (--confirmed, --unconfirmed) should use clap::ArgGroup instead of manual conflicts_with
    to prevent missed conflict declarations as new flags are added.'
- file: leo/cli/commands/query/transaction.rs
  line: 91
  summary: No support for querying the /transaction/unconfirmed endpoint; the match
    logic needs a branch to handle the --unconfirmed flag and construct the appropriate
    API URL.
