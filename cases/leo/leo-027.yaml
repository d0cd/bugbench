fix_pr_title: Don't delete local constants during const propagation and unroll
fix_pr_body: "This change allows local constant definitions to remain accross steps\
  \ of `ConstPropUnrollAndMorphing` so that they may be considered for loop unrolling.\r\
  \n\r\nThey are now treated similarly to global constants. Related variable declarations\
  \ are still cleared.\r\n\r\nFixes #28923"
