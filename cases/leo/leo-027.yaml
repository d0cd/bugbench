introducing_pr_title: Module System
introducing_pr_body: "Closes #28770\r\n\r\nThis PR introduces a structured module\
  \ system for Leo, enabling multi-file programs under the `src/` directory with clear\
  \ rules for module layout and resolution.\r\n\r\n### \U0001F4C1 Example Directory\
  \ Structure\r\n```\r\nsrc\r\n\u251C\u2500\u2500 common.leo\r\n\u251C\u2500\u2500\
  \ main.leo\r\n\u251C\u2500\u2500 outer.leo\r\n\u251C\u2500\u2500 outer\r\n\u2502\
  \   \u251C\u2500\u2500 inner.leo\r\n```\r\n\r\n### \U0001F4E6 Modules and Their\
  \ Access Paths\r\n\r\nGiven the structure above, the following modules are defined:\r\
  \n\r\n1. `common.leo` defines module `common`, accessible from `main.leo` via: \
  \ `common::<item>`\r\n2. `outer.leo` defines module `outer`, accessible from `main.leo`\
  \ via:  `outer::<item>`\r\n3. `outer/inner.leo` defines submodule `outer::inner`,\
  \ accessible from:\r\n   - `main.leo`:  `outer::inner::<item>`\r\n   - `outer.leo`:\
  \  `inner::<item>`\r\n\r\n### \U0001F4CF Module Layout Rules\r\n\r\nThis PR also\
  \ enforces new rules to prevent ambiguity and ensure consistency:\r\n1. **Leaf modules**\
  \ (i.e. modules without submodules) must be defined in a single file: `foo.leo`\r\
  \n2. **Modules with submodules** must be defined by an optional top-level `foo.leo`\
  \ file and a `foo/` directory containing the submodules:  \r\n   ```\r\n   foo.leo\
  \        # defines module `foo` - this is optional\r\n   foo/\r\n     \u251C\u2500\
  \u2500 bar.leo  # defines submodule `foo::bar`\r\n   ```\r\n\r\nOnly relative paths\
  \ are implemented so far. That means that items in `outer.leo` cannot be accessed\
  \ from items in `inner.leo`, for example. This is limiting for now but will no longer\
  \ be an issue when we add absolute paths.\r\n\r\nThe changes were tedious but not\
  \ particularly complicated. The largest changes in the compiler is the replacement\
  \ of `Expression::Identifier` with `Expression::Path`.\r\n\r\nFor now, modules can\
  \ only have `struct`, `inline`, and `const`. We may decide to relax that restriction\
  \ in the future.\r\n\r\nI've added support for modules in the current interpreter\
  \ and added some tests. Hopefully mirroring this implementation in the new interpreter\
  \ won't cause too much trouble."
