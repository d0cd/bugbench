introducing_pr_title: '`leo test` command.'
introducing_pr_body: "`leo test [TEST_NAME]` will run tests in the current package\
  \ containing `TEST_NAME`.\r\n\r\nFeatures:\r\n- dev dependencies\r\n- interpreted_test\
  \ annotation\r\n- native_test annotation (optionally with private_key)\r\n- should_fail\
  \ annotation\r\n- leo new makes tests directory\r\n- interpret function variant\
  \ (maybe `script` instead?)\r\n- new pass `ProcessingInterpret` to validate and\
  \ remove `interpret` functions.\r\n\r\nUse by making a directory `tests/` in your\
  \ Leo package directory structure and making test Leo files there.\r\n\r\nFor example,\
  \ a test Leo file might look like this:\r\n\r\n```\r\nimport write2.aleo;\r\n\r\n\
  program test_main.aleo {\r\n    @interpreted_test\r\n    interpret main() {\r\n\
  \        write2.aleo/nothing();\r\n    }\r\n\r\n    @interpreted_test\r\n    interpret\
  \ main2() {\r\n        assert(false);\r\n    }\r\n}\r\n```\r\nassuming your main\
  \ program is called `write2`.\r\n\r\nStructure of `Cursor` and `Interpreter` is\
  \ changed a bit - more owned types and fewer references, and consequently more clones.\
  \ It's all pretty suboptimal; I just did what was expedient. Ideally someday I'll\
  \ restructure this somewhat, but I very much doubt there will be real performance\
  \ impacts anyway."
