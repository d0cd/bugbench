fix_pr_body: "PR originally opened in https://github.com/ProvableHQ/leo/pull/28860\r\
  \n\r\nFix incorrect variable reference in error message for test file creation in\
  \ Package::initialize.\r\n\r\nThe error message was using main_path.display() instead\
  \ of test_file_path.display(), \r\ncausing misleading error messages that showed\
  \ the wrong file path when test file \r\nwrite operations failed."
