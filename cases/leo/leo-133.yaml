description: The Leo language tokenizer/parser was missing symbol definitions for
  ampersand (`&`) and at (`@`) characters. This meant input files using these symbols
  (e.g., for address literals or reference types) would fail to parse. The fix adds
  the missing `Ampersand` and `At` symbol entries in the symbol table and corresponding
  token-to-symbol mappings in the tokenizer.
expected_findings:
- file: span/src/symbol.rs
  line: 101
  summary: 'Missing symbol definition: `Ampersand` and `At` symbols are not defined
    in the symbol table, causing the tokenizer to fail on `&` and `@` characters in
    input files.'
- file: parser/src/tokenizer/token.rs
  line: 200
  summary: 'Missing token-to-symbol mapping: `Token::At` (and likely `Token::Ampersand`)
    lack mappings to their corresponding symbol constants, so they cannot be converted
    during parsing.'
