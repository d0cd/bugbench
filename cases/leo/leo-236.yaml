introducing_pr_title: 'Feat/global constants '
introducing_pr_body: "Implementation for #2585. \r\n\r\n# Overview \r\n- Allows for\
  \ constant variable definitions in both global and local scope. Will allow assignment\
  \ to constant expressions after the conclusion of constant folding.\r\n- Created\
  \ a new data structure called the constant propagation table to store constants\
  \ and their corresponding values. The design is similar to the symbol table.\r\n\
  - Changed the loop unrolling pass to now also build the CPT and substitute constant's\
  \ literal value for the constant's identifier in subsequent expressions. \r\n- Removed\
  \ all traces of constant variables from the ST and AST during the loop unrolling\
  \ pass. This is because after the LU pass invokes all the constant substitutions\
  \ there should be no more references to constants. \r\n- Encountered two bugs with\
  \ existing tuple definitions, and global shadowing of functions, mappings and structs,\
  \ that I will fix soon. \r\n# Testing\r\n- Added constants to execution tests\r\n\
  - Compiler tests:\r\n\t- Constant definitions in finalize blocks\r\n\t- Constants\
  \ as loop bounds\r\n\t- Typechecking constant usages and definitions\r\n\t- Shadowing\
  \ checks\r\n\t- Making sure constants can't be reassigned "
