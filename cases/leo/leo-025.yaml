introducing_pr_title: '[Feature] Add support for new raw hash/sign and ECDSA verification
  operations.'
introducing_pr_body: "## Motivation\r\n\r\nThis PR:\r\n- supports ECDSA signature\
  \ verification, \r\n- supports \"raw\" variants of hash and serialization functions,\
  \ \r\n- supports generic type parameters in core functions (only allowed for `Deserialize`)\r\
  \n- increases the maximum array size to 512 via the underlying snarkVM dependency.\r\
  \n\r\n## Usage\r\n\r\n### ECDSA\r\n\r\nECDSA signature verification is now supported\
  \ with 20 variants covering different hash algorithms and address formats:\r\n\r\
  \n  ```leo\r\n// Verify with digest (pre-hashed message)\r\nlet valid: bool = ECDSA::verify_digest(sig,\
  \ addr, digest);\r\nlet valid: bool = ECDSA::verify_digest_eth(sig, eth_addr, digest);\r\
  \n\r\n// Verify with Keccak256 hashing\r\nlet valid: bool = ECDSA::verify_keccak256(sig,\
  \ addr, msg);\r\nlet valid: bool = ECDSA::verify_keccak256_raw(sig, addr, msg);\r\
  \nlet valid: bool = ECDSA::verify_keccak256_eth(sig, eth_addr, msg);\r\n\r\n// Also\
  \ available: keccak384, keccak512, sha3_256, sha3_384, sha3_512\r\n```\r\n\r\nParameters:\r\
  \n- `sig: [u8; 65]` - ECDSA signature (r, s, v)\r\n- `addr: [u8; 33]` - Public key\
  \ for standard variants, `[u8; 20]` for `*_eth` variants\r\n- `digest: [u8; 32]`\
  \ - Pre-hashed message for digest variants\r\n- `msg`: Any byte-aligned type - Message\
  \ to hash and verify\r\n\r\n### Hashes\r\nRaw hash variants omit metadata and directly\
  \ hash the input bits. They are useful for interoperability with external, particularly\
  \ EVM, systems. Note: inputs for raw variants of `Keccak*` and `Sha3*` must by byte-aligned\
  \ (meaning the number of bits must be a multiple of 8). \r\n\r\n```leo\r\n// Raw\
  \ hash functions return the same types as standard variants\r\nlet h: field = Keccak256::hash_to_field_raw(input);\r\
  \nlet h: group = BHP256::hash_to_group_raw(input);\r\nlet h: address = Pedersen64::hash_to_address_raw(input);\r\
  \n\r\n// Native variants return bit arrays instead of field elements\r\nlet bits:\
  \ [bool; 256] = Keccak256::hash_native(input);\r\nlet bits: [bool; 256] = Keccak256::hash_native_raw(input);\r\
  \n\r\n// Available for: BHP256, BHP512, BHP768, BHP1024, Pedersen64, Pedersen128,\
  \ Poseidon2, Poseidon4, Poseidon8, Keccak256, Keccak384, Keccak512, SHA3_256, SHA3_384,\
  \ SHA3_512\r\n```\r\n\r\n### Serialize / Deserialize\r\n\r\nSerialize and deserialize\
  \ data to and from bits. This supports both metadata-inclusive and raw variants.\
  \ Note: the compiler will check that the bit sizes actually match.\r\n\r\n```leo\r\
  \n// Standard serialization (includes type metadata)\r\nlet bits: [bool; 58] = Serialize::to_bits(value);\r\
  \nlet value: u32 = Deserialize::from_bits::[u32](bits);\r\n\r\n// Raw serialization\
  \ (no metadata, just raw bits)\r\nlet bits: [bool; 32] = Serialize::to_bits_raw(value);\r\
  \nlet value: u32 = Deserialize::from_bits_raw::[u32](bits);\r\n\r\n// Works with\
  \ arrays too\r\nlet bits: [bool; 128] = Serialize::to_bits_raw([1u32, 2u32, 3u32,\
  \ 4u32]);\r\nlet arr: [u32; 4] = Deserialize::from_bits_raw::[[u32; 4]](bits);\r\
  \n```\r\n\r\n#### Bit Lengths\r\n- Raw: Exact type width\r\n  - u32 = 32, \r\n \
  \ - field = 253\r\n  - scalar = 251\r\n  - address = 253\r\n- Non-raw: Type width\
  \ + metadata overhead\r\n\r\n## Examples\r\nA more practical use case can be found\
  \ [here](https://github.com/hyperlane-xyz/hyperlane-aleo/blob/db1852748f81de7bec972bdfb0a4dc04ff23d4fc/validator_announce/src/main.leo#L65).\r\
  \n\r\n## Testing\r\n- Compiler tests: \r\n  - Positive tests covering ECDSA variants,\
  \ hash raw functions, and serialize/deserialize operations\r\n  - Negative tests\
  \ ensuring proper type validation for wrong input types and array sizes\r\n- Execution\
  \ test: Comprehensive round-trip test validating serialize/deserialize equivalence\
  \ for all primitive types in both transition and async contexts\r\n"
