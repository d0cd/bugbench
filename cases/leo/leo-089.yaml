description: Deployment limit error messages did not display the actual values that
  exceeded the limits, only showing the limit itself. The fix updates the error message
  definitions in cli_errors.rs to accept and format actual values alongside limits,
  and updates the call sites in deploy.rs to pass the actual values.
expected_findings:
- file: errors/src/errors/cli/cli_errors.rs
  line: 288
  summary: Error message format string does not include the actual value that exceeded
    the deployment limit, making it hard to debug. Should accept and display the actual
    value alongside the limit.
- file: leo/cli/commands/deploy.rs
  line: 195
  summary: Call site does not pass the actual value to the deployment limit error
    constructor, so the error message cannot show what value exceeded the limit.
