fix_pr_title: Bump self_update from 0.39.0 to 0.40.0
fix_pr_body: 'Bumps [self_update](https://github.com/jaemk/self_update) from 0.39.0
  to 0.40.0.

  <details>

  <summary>Changelog</summary>

  <p><em>Sourced from <a href="https://github.com/jaemk/self_update/blob/master/CHANGELOG.md">self_update''s
  changelog</a>.</em></p>

  <blockquote>

  <h2>[0.40.0]</h2>

  <h3>Added</h3>

  <h3>Changed</h3>

  <ul>

  <li><code>Release::asset_for</code> now searches for current <code>OS</code> and
  <code>ARCH</code> inside <code>asset.name</code> if <code>target</code> failed to
  match</li>

  <li>Update <code>reqwest</code> to <code>0.12.0</code></li>

  <li>Update <code>hyper</code> to <code>1.2.0</code></li>

  <li>Support variable substitutions in <code>bin_path_in_archive</code> at runtime</li>

  </ul>

  <h3>Removed</h3>

  </blockquote>

