description: Leo compiler could not find circuit definitions when referenced from
  within a circuit function. The scope resolution logic in the expression/circuit
  evaluator only searched the current function scope, not the file-level scope where
  circuit definitions are declared. The fix adds a `declared_circuit_reference` parameter
  threaded through enforce_function, enforce_statement, and enforce_expression to
  allow circuit lookups to fall back to the file-level scope.
expected_findings:
- file: compiler/src/expression/circuit/circuit.rs
  line: 39
  summary: "Circuit definition lookup is scoped incorrectly \u2014 when inside a circuit\
    \ function, the lookup does not reach the file-level scope where other circuit\
    \ definitions (e.g., Foo) are declared. Needs to search a broader scope or accept\
    \ a declared_circuit_reference to resolve circuit types."
- file: compiler/src/function/function.rs
  line: 47
  summary: enforce_function does not accept or propagate a declared_circuit_reference
    parameter, preventing circuit definitions from being resolved when called from
    within a circuit method context.
- file: compiler/src/statement/statement.rs
  line: 38
  summary: enforce_statement does not pass through the declared_circuit_reference,
    breaking the chain needed for inner expressions to resolve circuit types from
    file scope.
