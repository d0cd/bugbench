introducing_pr_title: Revise SourceMap and related types.
introducing_pr_body: "BytePos and CharPos and so on are gone - we just represent file\
  \ offsets with a `u32`.\r\n\r\nSourceMap no longer tracks locations of multiple\
  \ byte characters or newlines -- this can just be handled when displaying data.\
  \ As demonstrated in issue #28562, something was going wrong with that tracking,\
  \ but I didn't bother to diagnose the problem; I just threw out the code and took\
  \ a different approach. \r\n\r\nThere's a new type `LineContents` that handles displaying\
  \ spanned lines to the user.\r\n\r\nLines and columns are both reported starting\
  \ from index 1 - older comments claimed to report columns from index 0, but this\
  \ wasn't true.\r\n\r\nFixes #28562."
