fix_pr_title: Small fixes to errors.
fix_pr_body: "Specifically:\r\n\r\nUtilError::{network_error, failed_to_retrieve_from_endpoint}\
  \ are both now @backtraced instead of @formatted, as they don't have associated\
  \ spans.\r\n\r\nThe Display implementation for Formatted now prints the error message\
  \ even if it can't find a source file.\r\n\r\nFixes #28649"
