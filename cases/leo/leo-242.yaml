issue_bodies:
  '2512': "## \U0001F41B Bug Report\r\n\r\nI found that the \"leo run\" command works\
    \ when providing the transition name and the transition inputs, but the \"leo\
    \ execute\" command fails on my machine with a SnarkVM error message.\r\n\r\n\
    ## Steps to Reproduce\r\n\r\nCreate a new program using \"leo new projectname\"\
    , replacing \"projectname\" with the name of your project. You should get a simple\
    \ demo program computing c=a+b, like the following code snipped. \"cd\" into the\
    \ new directory.\r\nTry to run the \"leo run main 1u32 2u32\" command which should\
    \ work. The \"leo execute main 1u32 2u32\" command should produce the error below.\r\
    \n\r\n\r\n#### Code snippet to reproduce\r\n\r\n```\r\n// The 'leotest1' program.\r\
    \nprogram leotest1.aleo {\r\n    transition main(public a: u32, b: u32) -> u32\
    \ {\r\n        let c: u32 = a + b;\r\n        return c;\r\n    }\r\n}\r\n```\r\
    \n\r\n(for the project name \"leotest1\")\r\n\r\n#### Stack trace & error message\r\
    \n\r\n```\r\nkp@machine leotest1 % leo run main 1u32 2u32    \r\n       Leo \u2705\
    \ Compiled 'main.leo' into Aleo instructions\r\n\u26D3  Constraints\r\n \u2022\
    \  'leotest1.aleo/main' - 35 constraints (called 1 time)\r\n\u27A1\uFE0F  Output\r\
    \n \u2022 3u32\r\n       Leo \u2705 Finished 'leotest1.aleo/main' (in \"/Users/kp/dev/leotest1/build\"\
    )\r\n\r\nkp@machine leotest1 % leo execute main 1u32 2u32\r\n       Leo \u2705\
    \ Compiled 'main.leo' into Aleo instructions\r\nError [ECLI0377018]: Failed to\
    \ execute the `execute` command.\r\nSnarkVM Error: Function 'main' in program\
    \ 'leotest1.aleo' expects 2 inputs, but 1 inputs were found.\r\n```\r\n\r\n##\
    \ Expected Behavior\r\n\r\nI expected the \"leo execute main 1u32 2u32\" command\
    \ to run properly, similar to the \"leo run main 1u32 2u32\" command.\r\n\r\n\
    ## Your Environment\r\n\r\n- leo 1.9.1\r\n- rustc 1.71.0\r\n- macOS 13.4"
