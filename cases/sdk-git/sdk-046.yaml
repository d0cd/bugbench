description: The app failed to load on mobile or slow connections because worker initialization
  was not properly synchronized with app rendering. The fix adds a WorkerContext/WorkerProvider
  pattern to ensure the app waits for the web worker to finish initializing before
  rendering, and adds a loading spinner during initial asset loading.
expected_findings:
- file: website/src/aleo-wasm-hook.js
  line: 1
  summary: WASM initialization hook does not gate rendering on worker readiness, causing
    the app to render before the worker is initialized on slow connections
- file: website/src/index.jsx
  line: 3
  summary: App entry point lacks a provider/context wrapper to block rendering until
    the web worker signals it is ready
- file: website/src/workers/worker.js
  line: 1
  summary: Worker does not send an initialization-complete message back to the main
    thread, so the app cannot know when assets are loaded
