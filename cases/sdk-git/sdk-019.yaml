description: The getFunctionInputs function in the WASM SDK omitted the `_nonce` field
  when building the representation of record-type inputs. This caused tools like aleo.tools
  to not display the nonce for functions that accept records (e.g., `transfer_private`).
  The fix adds the nonce field to the record input construction in program.rs.
expected_findings:
- file: wasm/src/programs/program.rs
  line: 313
  summary: Record input construction is missing the `_nonce` field; getFunctionInputs
    should include nonce for record types
- file: wasm/src/programs/program.rs
  line: 683
  summary: Record field enumeration does not include the nonce, causing incomplete
    record representation for function inputs
