description: The consensus version check in execute.rs used an outdated API instead
  of the new CurrentNetwork::CONSENSUS_HEIGHT method, and the Deploy transaction pattern
  match in transaction.rs was missing a field after the SnarkVM 1.4.0 struct update.
  These issues caused executions and deployments to be improperly formed when submitted.
  Doc comments in ProgramManager were also corrected.
