description: When starting a node via `aleo node start`, imported programs (dependencies)
  were not deployed, causing programs with external calls to fail at runtime. The
  fix adds logic in the node startup command to iterate over program imports and deploy
  each one before deploying the main program.
expected_findings:
- file: cli/commands/node.rs
  line: 69
  summary: 'Missing import deployment: the node start logic deploys the main program
    but does not iterate over and deploy its imported dependencies first, causing
    external calls to fail at runtime.'
- file: cli/helpers/server.rs
  line: 153
  summary: Server initialization does not handle deploying imported programs before
    the main program, so programs with `import` statements will reference undeployed
    dependencies.
