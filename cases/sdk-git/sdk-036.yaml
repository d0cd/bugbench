description: The SDK's Node.js polyfills for fetch, Worker, and XMLHttpRequest were
  broken due to using the incompatible `xmlhttprequest-ssl` package. The fix replaced
  `xmlhttprequest-ssl` with `sync-request`, corrected the polyfill implementations
  in fetch.ts, worker.ts, and xmlhttprequest.ts, and updated rollup configs and package.json
  accordingly.
