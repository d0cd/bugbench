  line: 1
  summary: Using `xmlhttprequest-ssl` with a @ts-ignore suppression indicates the
    dependency is broken or has incompatible types; should be replaced with a working
    alternative like `sync-request`.
- file: sdk/src/polyfill/worker.ts
  line: 10
  summary: The Worker polyfill null check `globalThis.Worker == null` may not correctly
    detect missing Worker in all Node.js environments; polyfill setup logic needs
    revision.
- file: sdk/rollup.config.js
