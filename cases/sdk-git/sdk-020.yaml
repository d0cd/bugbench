description: The `useAleoWASM()` hook's return value was not properly destructured,
  causing the develop screen to fail when generating keys or viewing program inputs.
  The fix adds array destructuring (`const [aleoWASM] = useAleoWASM()`) so the WASM
  module is correctly extracted from the hook's return tuple.
