description: String-to-bytes encoding for message signing and verification used an
  incorrect method (likely charCodeAt-based) that failed on multi-byte/non-ASCII characters,
  causing false positives in signature verification. The fix replaces the custom encoding
  with the standard TextEncoder API which correctly handles UTF-8.
expected_findings:
- file: website/src/utils/Utils.js
  line: 1
  summary: String encoding utility uses charCodeAt or similar single-byte encoding
    that corrupts multi-byte Unicode characters, causing incorrect message bytes for
    signing/verification
- file: website/src/tabs/account/SignMessage.js
  line: 25
  summary: Message signing uses incorrect string-to-bytes encoding that fails on non-ASCII
    characters, producing wrong signatures
- file: website/src/tabs/account/VerifyMessage.js
  line: 9
  summary: Message verification uses the same flawed encoding as signing, but mismatches
    can occur when external tools use proper UTF-8, causing false positive/negative
    verification results
