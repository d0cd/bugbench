description: 'Two bugs fixed: (1) In Execute.js, the input validation check `if (!!inputs)`
  prevented programs with zero inputs from being executed, since an empty inputs array/string
  is falsy. (2) In updater.rs, the ALEO_REPO_NAME constant pointed to the wrong repository
  name, causing the CLI update mechanism to fail.'
