description: 'Two UI logic bugs in the algebra page: (1) The multiplicative inverse
  calculation required both field elements to be populated, but it only uses the first
  element, so the condition incorrectly blocked computation when the second field
  was empty. (2) The scalar multiplication ''Random'' button did not trigger a result
  update, so the displayed result was stale after randomizing the scalar input.'
expected_findings:
- file: website/src/tabs/algebra/FieldArithmetic.jsx
  line: 47
  summary: 'Incorrect guard condition: multiplicative inverse (''mulinv'') only requires
    num1, but the existing condition also requires num2 to be non-empty before proceeding.
    Should short-circuit for inverse operations when only num1 is populated.'
- file: website/src/tabs/algebra/GroupArithmetic.jsx
  line: 152
  summary: 'Missing result recalculation in onScalarRandom handler: setting a random
    scalar value without triggering the computation update, so the displayed result
    does not reflect the new random scalar.'
- file: website/src/tabs/algebra/GroupArithmetic.jsx
  line: 270
  summary: 'Same missing result update in a second onScalarRandom handler: random
    button sets state but does not trigger the scalar multiplication recalculation.'
