description: The webpack configuration was not set up to inject environment variables
  (specifically VITE_AMPLITUDE_API_KEY) into the client-side bundle. The fix adds
  the dotenv dependency, imports webpack in the config to use DefinePlugin/EnvironmentPlugin
  for passing env vars, and updates index.jsx to read the Amplitude API key from process.env
  properly.
expected_findings:
- file: website/webpack.config.js
  line: 1
  summary: Webpack config missing import of webpack module and DefinePlugin/EnvironmentPlugin
    configuration needed to inject process.env variables (like AMPLITUDE_API_KEY)
    into the client bundle
- file: website/src/index.jsx
  line: 8
  summary: process.env.VITE_AMPLITUDE_API_KEY will be undefined at runtime because
    webpack is not configured to substitute environment variables into the bundle
