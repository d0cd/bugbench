description: The SDK's function execution verification did not support programs with
  multiple imports. The fix adds ImportedVerifyingKeys and ImportedPrograms types
  and threads them through the browser, network-client, and program-manager layers
  so that verification can resolve all imported programs and their verifying keys,
  not just a single import.
expected_findings:
- file: sdk/src/program-manager.ts
  line: 1952
  summary: Verification of function executions does not accept or pass through imported
    programs and their verifying keys, causing verification to fail when the executed
    program has multiple imports.
- file: wasm/src/programs/execution.rs
  line: 103
  summary: The WASM execution verification binding does not accept imported programs
    or their verifying keys, so multi-import executions cannot be verified.
- file: sdk/src/network-client.ts
  line: 33
  summary: Network client lacks support for fetching or supplying multiple imported
    program artifacts needed for multi-import execution verification.
