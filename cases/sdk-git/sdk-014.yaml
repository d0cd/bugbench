description: The worker_threads polyfill used `import("node:worker_threads")` which
  fails in environments that don't support the `node:` protocol prefix. Additionally,
  the `sync-request` dependency was misplaced in package.json (likely missing from
  runtime dependencies or duplicated), and dev scripts/CI commands were incorrectly
  configured, preventing the SDK from building and running properly.
