description: The SDK's KeyProvider was incorrectly fetching credits.aleo verifying
  keys from a remote server, a leftover behavior from the Testnet3 era. The fix updates
  the KeyProvider to source these keys directly from SnarkVM, which now provides them
  locally, resolving failures experienced by SDK users.
expected_findings:
- file: sdk/src/function-key-provider.ts
  line: 33
  summary: KeyProvider fetches credits.aleo verifying keys from a remote URL instead
    of using the keys provided locally by SnarkVM, causing failures when the remote
    is unavailable or returns incompatible keys.
- file: wasm/src/programs/verifying_key/credits.rs
  line: 18
  summary: Missing or incorrect implementation of get_credits_verifying_key that should
    retrieve verifying keys directly from SnarkVM rather than relying on remote fetching.
- file: sdk/src/program-manager.ts
  line: 597
  summary: Transfer transaction builder passes key parameters that rely on remotely-fetched
    keys instead of using SnarkVM-provided verifying keys for credits.aleo functions.
