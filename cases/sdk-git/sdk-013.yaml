description: 'The vite.config files across create-leo-app templates and the website
  used CommonJS `require()` which is incompatible with Vite''s ESM module system,
  and were missing `assetsInclude` configuration for WASM files. The fix updates the
  vite configs to use proper ESM syntax and adds `assetsInclude: [''**/*.wasm'']`
  so templates and the website build and function correctly.'
expected_findings:
- file: create-leo-app/template-react-leo/vite.config.js
  line: 4
  summary: 'Vite config missing `assetsInclude: [''**/*.wasm'']` and/or using CommonJS
    `require()` instead of ESM imports, causing build failures'
- file: create-leo-app/template-react-managed-worker/vite.config.js
  line: 3
  summary: Vite config missing WASM asset include and/or using incompatible CommonJS
    require syntax
- file: website/vite.config.js
  line: 3
  summary: 'Website vite config missing `assetsInclude: [''**/*.wasm'']` and/or using
    CommonJS `require()`, preventing successful builds'
