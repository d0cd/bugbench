description: The SDK's REST server defined incorrect route paths for the 'latest height'
  and 'latest hash' endpoints. The routes included an extra '/block/' path segment
  (e.g., '/testnet3/latest/block/height' instead of '/testnet3/latest/height'), causing
  them to not match the corresponding snarkOS endpoints and resulting in 404s or misrouted
  requests.
