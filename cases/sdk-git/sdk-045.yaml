description: The SDK used `axios` for HTTP requests which is incompatible with Webpack,
  Rollup, and browser extensions (Chrome/Firefox). The fix replaces `axios` with native
  `fetch` via custom `get`/`post` utility functions, moves thread spawning code from
  `@aleohq/sdk` into `@aleohq/wasm`, and allows `initThreadPool` to be called with
  no arguments (defaulting to core count).
expected_findings:
- file: sdk/src/network-client.ts
  line: 1
  summary: Using `axios` for HTTP requests breaks compatibility with Webpack/Rollup
    bundlers and browser extensions; should use native `fetch` instead.
- file: sdk/src/function-key-provider.ts
  line: 1
  summary: Import of `axios` (or axios-based utility) for fetching function keys is
    incompatible with browser extension environments; should use native `fetch`.
- file: sdk/src/index.ts
  line: 131
  summary: Thread pool initialization and worker spawning code located in `@aleohq/sdk`
    instead of `@aleohq/wasm`, causing bundler compatibility issues in extension contexts.
