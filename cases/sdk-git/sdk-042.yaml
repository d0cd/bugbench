description: The SDK was using outdated SnarkVM 0.9.x APIs that changed in 0.10.x,
  including the removal of `gates` from Records in favor of `microcredits`, changes
  to Transaction building methods, addition of the `finalize` scope, and serialization
  changes. The fix bumps dependencies to 0.10.2 and updates all call sites and data
  structures to match the new upstream API.
expected_findings:
- file: rust/src/program/helpers/records.rs
  line: 14
  summary: Record struct references `gates` field which was removed in SnarkVM 0.10.x;
    must be replaced with `microcredits` accessed through the identifier map
- file: rust/src/program/deploy.rs
  line: 14
  summary: Deployment transaction building uses outdated SnarkVM 0.9.x Transaction
    construction API; fee parameter and builder methods changed in 0.10.x
- file: rust/src/program/execute.rs
  line: 14
  summary: Execution transaction building uses outdated SnarkVM 0.9.x API; must be
    updated for 0.10.x changes to Transaction struct and finalize scope
