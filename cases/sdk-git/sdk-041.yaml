description: The WASM SDK and Aleo.tools code was incompatible with SnarkVM v0.12.5
  due to changed API signatures and type exports. The fix updates dependency versions,
  adjusts function call signatures (e.g., execute_program, execute_fee), updates type
  imports (ProgramOwner, Response), and aligns the TypeScript SDK imports with the
  new WASM package.
