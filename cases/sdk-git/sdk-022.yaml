description: Record searching logic only found grouped records if they were within
  50 record blocks of each other, due to an artificially limited search range. The
  fix expands the search to consider the entire block range rather than a hardcoded
  50-block window, and adjusts function signatures to return record commitments (Field)
  alongside records for proper deduplication across the full range.
expected_findings:
- file: rust/src/program/helpers/records.rs
  line: 70
  summary: Record search range is artificially limited to 50 blocks, causing records
    outside that window to be silently missed. The search should consider the entire
    available range.
- file: rust/src/api/blocking.rs
  line: 166
  summary: Return type does not include record commitment (Field), preventing callers
    from properly tracking and deduplicating records across a wider search range.
- file: rust/src/program/transfer.rs
  line: 25
  summary: Transfer function accepts bare Record without commitment Field, which loses
    the ability to correlate records found across the full block range.
