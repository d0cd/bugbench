description: Outbound TCP connections in snarkOS did not bind to the local address
  configured by the `--node` flag. On multi-homed hosts, this caused outgoing connections
  to use the wrong source IP, leading peers to extrapolate incorrect socket addresses
  and preventing simultaneous connections to co-located nodes. The fix binds the outgoing
  TCP socket to the configured local address before initiating the connection.
expected_findings:
- file: node/tcp/src/tcp.rs
  line: 225
  summary: Outbound TCP connection does not bind to the configured local address before
    connecting; should use TcpSocket::bind() with self.config().listener_ip before
    calling connect(), so multi-homed hosts use the correct source address.
