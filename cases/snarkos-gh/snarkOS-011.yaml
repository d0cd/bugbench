description: Both the confirmed and unconfirmed transaction REST endpoints incorrectly
  used a generic `get_transaction` method instead of the endpoint-specific `get_confirmed_transaction`
  and `get_unconfirmed_transaction` getter methods. This caused the endpoints to return
  wrong results, as the generic method does not distinguish between confirmed and
  unconfirmed transactions. The fix replaces each call with the appropriate getter.
expected_findings:
- file: node/rest/src/routes.rs
  line: 276
  summary: 'Wrong API method: `get_transaction` is used for the confirmed transaction
    endpoint instead of `get_confirmed_transaction`, which fails to enforce confirmed-only
    semantics.'
- file: node/rest/src/routes.rs
  line: 287
  summary: 'Wrong API method: `get_transaction` is used for the unconfirmed transaction
    endpoint instead of `get_unconfirmed_transaction`, returning confirmed transactions
    from an endpoint that should only return unconfirmed ones.'
