description: The `#[cfg(not(any(test, feature = "test")))]` attributes referenced
  a `test` feature that does not exist in the crate's Cargo.toml. Clippy flagged this
  as an error. The fix removes the non-existent `feature = "test"` from all cfg attributes,
  leaving only the built-in `test` cfg predicate.
