description: PoolResponse message was incorrectly transmitting a block header instead
  of a PoSW proof, causing miners/provers to submit incorrect data to the operator.
  Additionally, sync and beacon node access logic caused connections to drop when
  running multiple provers locally. The fix changes the PoolResponse payload type
  from BlockHeader to PoSWProof and corrects the peer filtering for sync nodes.
expected_findings:
- file: src/network/message.rs
  line: 106
  summary: PoolResponse message variant carries a BlockHeader instead of a PoSWProof;
    the operator needs only the proof, not the full header
- file: src/network/peers.rs
  line: 196
  summary: Sync node peer filtering logic causes peers to be incorrectly dropped when
    multiple provers are connected; intersection with sync_nodes set is too restrictive
- file: src/network/prover.rs
  line: 245
  summary: Prover constructs PoolResponse with block header data instead of the PoSW
    proof, sending unnecessary data and causing validation issues at the operator
