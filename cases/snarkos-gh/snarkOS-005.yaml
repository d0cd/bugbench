  summary: Block request logic can starve when block response processing holds locks
    for extended periods, preventing new sync requests from being issued.
- file: node/sync/src/block_sync.rs
  line: 612
  summary: 'RwLock deadlock: write lock on `process` can deadlock against concurrent
    read locks acquired during block verification within the same sync flow.'
- file: node/sync/src/block_sync.rs
  line: 692
  summary: 'Lock scope too broad: holding the RwLock across block processing creates
    conditions for both deadlock (with verification read locks) and request starvation.'
