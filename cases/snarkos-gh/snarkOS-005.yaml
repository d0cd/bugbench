description: 'Two concurrency bugs in block sync: (1) an RwLock deadlock where `process.write()`
  blocks indefinitely because concurrent read locks (from `check_execution_internal`
  / `check_deployment_internal`) are held during block response processing, and (2)
  block request starvation where new block requests cannot be issued while a block
  response is being processed. The fix restructures lock acquisition order and separates
  the block request path from the response processing path to prevent both deadlock
  and starvation.'
