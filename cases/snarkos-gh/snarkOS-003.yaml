description: The REST API endpoint for fetching blocks did not return a proper 404
  status code when a requested block was missing. Instead, it likely returned a 500
  Internal Server Error or panicked on an uninitialized/unwrapped value. The fix adds
  proper error handling to return HTTP 404 when the queried block does not exist.
