description: Nodes running different consensus versions of snarkOS could sync blocks
  with each other, leading to potential chain inconsistencies. The fix adds a `latest_consensus_version`
  field to the `BlockResponse` message and aborts sync when the peer's consensus version
  differs from the local node's version, also bumping the message protocol version.
expected_findings:
- file: node/router/messages/src/block_response.rs
  line: 15
  summary: BlockResponse lacks a consensus version field, allowing nodes with incompatible
    consensus versions to exchange and process blocks during sync.
- file: node/bft/src/sync/mod.rs
  line: 239
  summary: "Missing consensus version check when processing incoming block sync responses\
    \ \u2014 should verify peer consensus version matches local version before accepting\
    \ blocks."
- file: node/router/messages/src/lib.rs
  line: 75
  summary: Message version not updated to reflect the changed BlockResponse format,
    allowing old-format messages to be accepted without version mismatch detection.
