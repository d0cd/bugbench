category: logic
difficulty: medium
severity: medium
language: rust
pr_size: small
description: 'A transaction was being added to the `transmissions_tracker` (metrics
  tracking) even when it would not actually be added to the mempool, due to the tracking
  call being placed before validation checks. This caused incorrect metrics and potentially
  stale transmission tracking (issue #3907). The fix moves the tracking call to after
  the mempool insertion is confirmed successful.'
expected_findings:
- file: node/consensus/src/lib.rs
  line: 372
  summary: "Transaction is tracked in transmissions_tracker before the mempool-duplicate\
    \ check completes \u2014 if the transaction is rejected, the tracker will have\
    \ a stale/phantom entry that never corresponds to an actual mempool item."
- file: node/consensus/src/lib.rs
  line: 384
  summary: Metrics tracking of the transmission should only occur after confirming
    the transaction was successfully added to the mempool, not before the validation/dedup
    checks.
